body:
  text: 第一百十五回矢橛有情帳中偎寡鵠風雲變色塞外失良駒話説李肅聽得他這番話便道如將軍言當以何種手段對待呢呂布道依我愚見現下即設計將這老賊除去李肅聽得忙道我早有此心了無奈一木難支大廈故遲遲至今未敢發動將軍如欲為國除害末將當追隨左右任將軍驅使如何呂布大喜便道都尉如肯助我一臂這事沒有不成的道理明日你可齎著聖旨到郿塢去偽言聖上新愈召他進京議事那時我們內應外合還怕他飛上天去麼李肅一口應承到了第二天李肅齎著聖旨便到郿塢見了董卓偽稱天子疾病新愈請太師入朝議事董卓忙問議論什麼事情李肅道太師不曉得麼當今天子見太師威德並茂欲將位禪讓于太師所以今天著我來請太師入朝受禪的董卓大喜便又問道王允意下若何李肅道天命攸歸王允當然也沒有什麼反對的了董卓至此毫無疑惑便命心腹爪牙李傕郭汜張濟樊稠等四人調兵保護郿塢自己大排儀仗進京剛剛到了半途所乘的四輪輦忽然折了一輪董卓驚問李肅這是何兆李肅道這是棄舊換新主公將乘金輦之兆也董卓不疑又走了一程忽聽得一群村童在草地上一齊唱著道千里草何青青十日蔔不得生董卓又問何兆李肅便道這分明是劉世滅董氏興之意他滿心歡喜不多時進了城只見百官齊具朝儀迎接董卓到北掖門口衆武士留在門外只有禦車的二十餘人推車直入董卓遙見王允等各執寶劍立在午門以外大吃一驚忙問李肅李肅不應推車直進王允大呼道反賊到此武士何在兩旁轉出百餘人各執利刃直撲董卓董卓大聲呼道吾兒奉先何在呂布從車後鑽出應道有詔討賊手起一戟將董卓刺死王允割下他的首級呂布在懷中取出詔書大聲念道奉詔討賊其餘不問將吏皆呼萬歲這時李儒的家將又將李儒綁了送來王允便命梟下首級棄于市曹呂布此刻無暇多計較趕緊帶兵到郿塢李傕等早得消息領著飛熊兵向涼州竄去呂布到了郿塢先將貂蟬接了出來然後將董卓一家殺了剿了錙珠金帛正要回京不妨卓賊女壻牛輔領著一彪軍殺到呂布便使李肅迎敵李肅領兵出陳未上十合招架不住不敗而回見了呂布陳述牛輔的厲害呂布大怒便將他斬首親自領兵出陳諒牛輔如何是呂布的對手呢不到三合大大失敗呂布只顧引兵追趕剛追到白屯山下猛聽得一聲鼓響一彪軍從右邊沖出來為首一將正是李催呂布慌忙迎敵戰未十合鼓角大鳴又是一隊軍從左邊沖了出來為首一將正是郭汜呂布雙戰二將大戰五十餘合二將抵敵不住卻引兵向長安奔去呂布引兵趕去方趕過郿塢猛聽得後面金鼓大震張濟樊稠齊領著飛熊軍從後面包抄過來這時李傕郭汜回頭又來廝拼前後夾攻呂布雖勇到了此時也沒有法子抵禦了再加那些飛熊軍十分驍勇不多時殺得呂布片甲無存呂布不敢戀戰大吼一聲沖出陳去一抹地直向長安而去李傕等統領十萬飛熊兵近逼京城呂布連敗數陳心中大憂便對王允説道司徒事急了我們只好且到別處去求救罷王允不肯這時四門的賊兵亂搭雲梯一齊上城呂布見王允不肯動身他也沒法一提絲韁殺東門投奔袁術去了李傕等大隊賊兵闖進京城將王允捉住殺了同時遇難的官員不計其數李郭兩賊還要提劍去殺獻帝張樊二賊説道不可不可今日殺之天下不服俟將諸侯賺到關內去其羽翼然後圖之大事可成李郭兩賊從議他們又自定職銜迫令獻帝照準獻帝沒法只得唯唯從命他四人得了封號便大張聲勢無所不為了不數日早有西涼太守馬騰率子馬超起兵來京救駕不幸賊勢浩大西涼兵竟未得勝只得引兵退向西涼而去賊兵只有一樊稠因私通馬騰韓遂被李傕殺了其餘士卒未曾損失分毫因此賊兵的威聲越發四揚他們鎮日價姦淫劫掠百姓失望天怨人愁獻帝處此惡勢力的下面真個是個求生不得求死不能幸虧楊彪董承等暗中定了一計使李郭不和大戰了數月他們乘著這個空子便保著獻帝以及後妃逃到了大陽一面飛詔到山東令曹操前來保駕曹操得著聖旨便統精兵十二萬前來將李傕殺得片甲不留李傕與幾個賊目一齊逃到深山落草去了曹操便保駕回洛陽故宮夏侯惇輩領兵屯在城外次日曹操進城見駕獻帝便加封為司隸校尉假節鉞録尚書事因此曹操大權在握威勢日盛行為雖不及董卓荒暴但是居心叵測居然隱隱有窺竊神器的念頭他見洛陽的宮殿破壞而且地勢又平坦不及許昌峻險便私下與衆人商議遷都這時有個謀士名叫許良他卻極力贊成他的話便道明公這個主意實在是好極了兩面俱到曹操會意便入奏獻帝請駕遷都獻帝怎敢不依只得遷都到許昌曹操便造宮室建宗廟司台司院衙門修理城廊街道又迫獻帝大封群臣一班文臣如荀彧荀攸郭嘉劉曄程昱等最高的位置至三輔最低的位置也在祭酒之上武將如夏侯惇夏侯淵曹洪曹仁李典樂進之輩俱封為將軍都尉看官以上的一班人誰不是操的心腹呢由此向後獻帝只做一個傀儡皇帝了光陰易逝略眨眨眼又到丁醜二年的春間了曹操正想領兵聯合劉備去滅呂布忽然探馬來報張濟南攻穰城中劍身死他的侄兒張繡屯兵宛城勾結劉表意欲犯厥曹操得報勃然大怒便點齊五萬精兵帶著大將典韋親自領兵到宛城下寨早有細作飛報張繡張繡聽説曹操親自帶兵前來吃驚不小忙與部下商議誰知大家聽説曹操親自帶兵前來一個個嚇得魂飛膽破同聲勸張繡投降為妙張繡明知不是曹操的對手只得開城投降曹操見他投降不費一兵一甲就攻下宛城自是歡喜便統大兵進城住下過了幾天曹操在城內一點事兒沒有悶得心慌便與他的侄兒曹安仁騎馬到各處去間逛剛剛出了太宣門迎面突然有一輛鈿殼香車慢慢地近來他在馬上瞥見那車內端坐著一個婦人年紀差不多在二十左右罷生得柳眉杏眼貝齒桃腮十分妖嬈出色把個曹操看得眼花繚亂口幹難言魂靈兒飛上了半天勒著絲韁瞪著兩眼不住地向車內發呆那婦人也脈脈含情秋波流電地向他瞟了一眼曹操被他這星眸一瞟不禁神魂飄飄身子早酥了半截險一些兒撞下馬來霎時香風過處鈿車去遠那張嬌而且俏的面龐兒卻不能再看見了曹操在馬上好像發狂似地叫了一聲好他本來是個好色之徒在二十左右的時候已經娶妻丁氏納妾劉氏又在娼家買得一個卞氏這卞氏的姿色倒也不差曹操大加寵愛今天看見這婦人和卞氏一比較的確有天淵之別他怎能不神魂顛倒呢他失魂落魄的哪里還有心去間逛沒精打采地和安仁兜馬回營悶悶不樂地坐在帳中一言不發安仁早巳窺透他的心病了忙問道叔父今天為什麼這樣的悶悶不快莫非有什麼不好解決的事情麼曹操歎了一口氣道便是有心事對你們説了有什麼用處呢曹安仁笑道或者可以有些用處呢曹操先用手向左右一擺一班侍立的將佐一個個都退出帳去他對安仁笑道方才你看見麼那婦人的模樣兒究竟好不好我行軍十數年年輕貌美的女子我不知道看見過多少了像這樣水蔥似的一個玉人兒我實在沒有看見過誰能替我將這個婦人謀到手我立刻賞他十萬安仁聽他這話將胸口拍得震天價響地説道你放心罷這事包在侄兒的身上就是了曹操聽得十分歡喜忙道我的兒要辦這事千萬不要魯莽萬一走漏了風聲那可不是耍的我現在是名高德重的人了與其敗壞聲名不若不做的為佳安仁笑道你老人家既羡慕著美色又何必藏頭露尾的怕誰呢曹操道你只知其一不知其二這些事情都是那些沒有資格的人做的像我們這些人就能幹出這不端的事來麼不獨失掉自己的身分便是被人家知道也要瞧我們不起的這事成與不成都要替我嚴守祕密為要安仁滿口答應出營去刺探那婦人的去處了曹操在營中左等右等一直等到天晚還未見安仁到來好不心焦像煞熱鍋上的螞蟻一般團團轉得一頭無著處不多一刻安仁由外邊進來曹操等不及地忙問道那件事兒怎樣了曹安仁笑道訪是訪著根底了不過是朵玫瑰花兒有針有刺很不容易採取呢曹操忙道怎見得的曹安仁道那婦人原來就是張濟的繼妻張繡的嬸娘鄒氏你道可以去勾搭麼曹操聽説是張繡的嬸娘不禁將那團孽火早就消滅到無何有之鄉了忙道怪不得他淡掃素抹的這時曹操嘴裏雖然説動不得心裏卻越發傾慕得厲害兀地嘰咕著道好個美人兒我竟沒福去消受豈不可惜麼曹安仁笑道叔父要想真個銷魂卻也不難不過這班將士都在這裏怎能不漏風聲呢曹操忙道依你便怎麼辦呢曹安仁笑道依我的愚見不若將他們一班人完全調到別處去防守關隘只將典韋留下保護你就是了他們走後做起這事來不是好放手了麼曹操忙道是極是極你的主見的確比我高就照這樣辦就是了他們商量已定一宿無話到了第二天早上曹操便下令將隨來的衆將士一齊調到別處去防守只留下一千精兵和大將典韋在營中保護曹安仁到了晚上帶了十幾名親兵直撲鄒氏的住宅而來剛到門口只見那鄒氏站在門邊正在那裏裝嬌賣俏地向街道上凝望曹安仁跳下馬來一把將鄒氏攔腰抱起來飛身上馬鄒氏嚇得玉容失色待要聲張曹安仁忙道曹公看中你了今要娶你為貴人你難道還不願意麼鄒氏昨天見曹操那種威儀早已心許了聽得曹安仁這話樂得半推半就地不聲張了無論如何總要比較寒衾獨擁的好得多了不多時到了營前下馬安仁將他慢慢地攙扶進帳曹操望見鄒氏進來好像接聖駕的一般趕緊迎了上來向安仁使了一個眼色安仁會意忙領著衆人退出帳去了此時單單的剩著曹操和鄒氏二人四目相對飽看了一回鄒氏含羞帶愧地上前福了一福低聲問道不知明公喚小婦人有什麼吩咐曹操還禮不疊滿臉堆下笑來道娘子天人敝人昨天得睹仙姿夢魂顛倒不知娘子還肯下憐我麼鄒氏本是個淫蕩性成的人加上張濟死了深閨久曠孤衾獨擁飽嘗單調的風味早就耐拼不得了今見曹操的威勢當然比較張濟高勝萬倍當世的英雄怎能不動心呢聽他這兩句話正中下懷只苦答不出話來羞得粉面緋紅默默的一聲不作曹操見他這種嬌羞不勝的樣子越發增加幾分嫵媚情不自禁地走過來拉著他的玉手雙雙進了內帳去幹那不見天的勾當春風一度穩過良宵説不盡百般旖旎千樣溫存須知天下事要得人不知除非己莫為鄒氏被安仁搶去的時候早有人去飛報張繡了張繡聽説曹操強奪他的嬸娘請教如何不氣立刻派人去一打聽不獨強奪簡直實行同居之愛了張繡怒沖牛鬥立刻點齊五千精兵殺出城來早有細作飛報曹操曹操全不在意以為有大將典韋他有萬夫不當之勇在他營門口守著誰也不敢前來送死的仍然與鄒氏卿卿我我寸步不離地廝混著誰知典韋吃醉了老酒倒在帳中正自好睡猛可裏喊聲四起鼓角大鳴那一千保護兵士見四面的燈球火把照耀得和白日相似只嚇得紛紛奔竄霎時跑得一乾二淨典韋從夢中驚醒霍地跳起來取了雙戟飛步出營這時張繡的大隊已經頂到營門口了典韋大吼一聲舞動雙戟好像紡車似地敵住來兵霎時被他殺得肢骸亂舞馬仰人翻張繡舞動長槍一馬當先邀住典韋大戰五十餘合未見勝敗張繡長嘯一聲將槍尖向後一招衆士卒一齊湧上刀矛並舉將典韋困住典韋身無片甲只穿一條犢鼻褲在陳雲裏往來衝突如入無人之境張繡見他這樣的凶猛心中好生著急他手下大將胡車兒一聲呼哨立刻萬箭如雨典韋忙用戟來格去説時遲那時快手腕上早中了兩箭典韋吼叫一聲托地跳開數丈阿唷一聲將雙戟拋去衆兵士見他拋去兵刃益發奮勇將他團團困住他一腿飛來早被他打倒二人他就地將二人抓起當著兵器使用只打得衆兵卒紛紛後退這時張繡和胡車兒見他拋去兵刃連忙催馬上前齊施兵刃將典韋逼住典韋此時雖有霸王之勇到了危迫確也難以抵禦了張繡的長槍舞得飛花滾雪價緊緊逼著沒有一些空子好脫身典韋料想難活了將手中的人爽性向張繡擲去張繡將馬頭一帶他趁著這個空子跳出圈子撒腿就跑走到五六步弓弦響處他大叫一聲堆金山倒玉柱地撲地倒下張繡飛馬趕上手起一槍刺入典韋的咽喉眼見一位萬夫不當的上將到閻羅王那裏去交帳了張繡與胡車兒督著大隊搗入後營誰知連一個人影子也沒有張繡大吃一驚忙命人四處去搜查哪里還有一些蹤迹呢流蘇帳內空洞洞的不見鴛鴦的影子了張繡料知他一定是逃走了忙與胡車兒領兵趕來不到半裏之遙果然望見曹操在前面和一干人狼狽而逃張繡厲聲罵道不要臉的淫賊到哪里去快快給我留下頭來這正是爽口味多生惡疾私心事過必遭殃要知曹操性命如何且看下回分解
