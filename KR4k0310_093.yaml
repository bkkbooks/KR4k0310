body:
  text: 第九十三回舒鬱憤無聊踏春冰憶舊恨有心擲簪珥卻説那孫文被困在使館裏一時不得脫身心上老大的著急便和館役商量叫他寄個信給醫師歔立德館役不肯答應深怕弄出禍來經孫文竭力地勸諭了他一番説你放大了膽盡管前去萬一有甚事發生我會叫外人幫忙自然可以挽回館役知道孫文也不是個尋常之人諒不至於纍及自己便允許下來於是祕密藏了孫文的信竟來見歔立德把孫文被幽囚的事細細告訴了一遍歔立德大驚説道我早就囑咐他留意一點如今果然入了牢籠了説著打發了館役回去一面托英文報記者將中國公使擅在英國境內捕人的事披露在報上英政府得了這個消息如何肯輕輕放過便打了照會給中國使館謂在英國境內捕人有損英國法權就是從萬國公法上講起來也決沒有這種成例中國使館見外人干涉怎敢違例只得把孫文釋放還向英政府道了歉這事才算了結孫文既得脫身就連夜離開英國仍舊到日本尋他的同志去了那時中國自孫文逃走後廣東的興中會由會員楊少白等一班人主持因鑒於前次孫文的失敗大家按兵不動地坐以待時倒是安化人李燮和在湖南鬧了一次給湖南巡捕偵悉派人密捕李燮和見事不妙一溜煙逃往美國去了這裏只苦了約期起義的長沙師範的學生全體都被逮捕學校也封了起來為首的就地處決附和的監禁了不知情的釋放然已無端枉送了幾十條命孫文在日本聽得興中會依舊不曾殲滅便又印了許多的會章由日本寄到中國來宣傳革命招攬那些青年入會這章程傳到京中滿人禦史竟上疏奏知西太后把章程附在疏中西太后讀了一遍見章程上的詞句都講的清廷行政什麼內政腐敗引用私人大權滿人獨攬以漢人為奴隸等等説得很為痛切列舉的弊端也正打中西太后的心坎西太后不覺笑道此人屢鬧革命人家很受他蠱惑的想來也有些才具可惜他不肯歸政不然倒也是個人材呢西太后輕輕的一句話人一班滿州人的禦史聽見了他們以為迎合太后的意旨第二天就上章請招安孫文西太后瞧了這類的奏疏也惟有付之一笑罷了且説光緒皇上自從西安回鑾之後西太后益發當他是眼中釘這是什麼緣故呢因為光緒帝戊戌變政重用康梁實行改革舊制被西太后將新政諸臣一網打盡了自己便三次垂簾不謂在這個時候聽信端王剛毅的話説誤用義和拳的滅洋政策結果弄得倉皇西奔一敗塗地倒不及光緒帝親政事時的太平了因此心上很為不安又經內監們的攛掇説皇上對於太后的信用拳民很多譏笑西太后初時也甚覺愧悔終至於惱羞變怒含恨皇上自不消説了而且把光緒帝所居瀛台的門禁比以前嚴厲了許多當庚子的前頭那瀛台的左面除了船楫以外本來有一座橋可通橋用白石砌成的起落可以自由日間原將橋放下宮女嬪妃隨時能夠往來但庚子以後兩宮回鑾光緒仍居瀛台起先倒極安適可是過不到幾時太后即命把橋收起無論晝夜不得任意放下嬪妃蒙召用小舟渡了過去由太監在水橋上接引這樣的幾乎成了慣例這時光緒帝的身邊只有瑾妃一個侍候光緒帝每於月夕花晨因瑾妃在側便想起珍妃來不免欷歔零涕瑾妃也痛哭失聲二人悲傷了一會相對黯然不樂有一次上因嚴寒大雪平地積雪三尺西太后叫小監做一件狐皮袍子去賜給皇上並吩咐小監道你把衣服呈與皇上只説是老佛爺親自所賜衣料是布的衣鈕卻是金的照這幾句話須接連上三四遍看皇上怎樣回答便來報知小監領了旨意用小船渡到瀛台將衣服呈上後依西太后所叮囑的話説個不了光緒帝先時只當不曾聽見末了給小監説得不耐煩起來就憤憤地説道我知道了太后的意思謂我將來死不得其所罷了但我以就這樣一死也不得其時還是苟延幾時的好不達人誰沒有一死呢有死得值與不值的分別太后雖望我即死我因不值得才不死的你去報給太后説我這般講就是了小監見光緒帝動怒自不敢再説竟匆匆地去了瑾妃在旁變色道皇上這話不怕太后生氣嗎光緒帝不覺微笑道我到了這樣地步還怕他則甚大不了他也和肅順般處置我好了瑾妃聽罷忙用眼示意光緒帝正在氣憤的時候哪里在心上呢原來其時恰巧香兒也來侍候皇上瑾妃知道他是太后的偵探所以竭力阻止光緒帝叫他不要信口開河免惹出許多是非來但這香兒是誰呢若然説起來讀者諸君或者也還記得當拳亂之先西太后不是在頤和園中設著什麼如意館嗎還招四方青年子弟入館去充館役在這個當兒內監李六六便遇見了那個管劬安把他薦入館中哪知管劬安入館後大得西太后的寵信不時召入奏對在宮監面前稱劬安做我兒又稱為香兒因而合宮的人都喚劬安做香貝子和從前香王權衡差不多上下香兒既這般得勢就出入宮禁專一替太后做耳目刺探了別人的行動去報給太后宮中的人又稱他做順風因不論瑣碎小事太后終是知道的都是這香兒去報告的阿瑾妃心上很明白見皇上這樣亂説雖是著急但也沒法去止住他停了一刻香兒果然去通知了後來禁止大臣到瀛台問皇上起居的旨意不久就下來了因光緒帝雖被禁在瀛台那大臣們去問安或疆吏的入覲本可以通融的自這次之後西太后疑光緒帝恨己甚深倘大臣們任意進去弄出衣帶詔的故事來所以不得不預先防止了還有一次岑春煊早在西安曾率師勤王西太后很是贊許他這時便攉他做了四川總督岑春煊在臨行的時候請入瀛台覲見皇上光緒帝一見春煊三數語後便潸然淚下正待訴説心事忽見香兒突從外面進來光緒帝即變色起立一句話也不説岑春煊知機便乘勢請安退出但那香兒是何等乖覺的人他眼見得君臣這種情形心裏早有些疑惑就暗中去告訴了太后依西太后的意思阻止入覲的諭旨這時已要實行的了為于香兒有礙才緩了下來如今光緒帝大發牢騷自己説出心事來香兒去對西太后一講西太后知道皇上一刻不忘自己的怨恨便立時把瀛台交通斷絶光緒帝在瀛台裏面只有兩個宮女和四個小監一天到晚同瑾妃相對著終覺得悶悶不樂因皇上居處的地方是在涵元殿瀛台是總名罷了這涵元殿的大小共有平屋三間每間不過丈余的寬闊後面僅有一座小樓光緒帝於悶極的時候也登樓去眺望一會但不到幾分鐘便長歎一聲慢慢地走了下來那涵元殿的對面叫做扆香殿是皇后的居室然皇后雖有時入侍光緒帝卻不大和他説話總之自幽禁以來從不一至扆香殿所以皇后和光緒帝是面和心非的又見皇上寵著瑾妃皇后益發惱恨了可是皇后那拉氏本是西太后的內侄女他要配給光緒帝想從此籠絡起來大權可以永遠獨攬哪知光緒帝卻不中意現在的皇后因西太后授意給他叫皇上於擇後時將玉如意遞與自己侄女故此凡皇帝册立皇后之前把有皇后資格的閨女排列在殿前任皇帝自己選擇選中了是誰就拿手中的玉如意授給誰光緒帝的心裏要想遞如意給珍妃的但西太后預先授意不敢違背只在那遞過去時假做失手掉在地上一隻很好的玉如意竟打得粉碎了西太后見了這般情形便老大不高興母子之間在這時已存了意見的了等到大婚以後光緒帝自然不喜歡皇后西太后要光緒帝的服從明知他愛的是珍妃就把珍妃姐妹立做了妃子光緒帝既有珍妃姐妹于皇后越不放在眼裏了皇后目睹著妃子受寵心上如何不氣呢以是不時在太后前哭訴乘間拿珍妃姊妹責打了一頓雖説借此出氣而光緒帝的心目中越當皇后似仇人一般了庚子拳亂起事兩宮料理出走西太后趁這個當兒把珍妃賜死也算替皇后報復回鑾之後光緒帝想念珍妃以為珍妃致死完全是皇后加害他的因此和皇后同居瀛台相去不過咫尺光緒帝卻從不到扆香殿去也不相互交談夫妻好似陌路一般一天光緒帝在瀛台實覺氣悶不過要想出去沒有橋梁和船隻不能飛渡過去便倚在窗上躊躇了一會見那水面上已結著很厚的冰不覺發奇想起來要待從冰上走到對面去瑾妃忙勸阻道那冰是浮在水上的到底不甚堅實倘踏到了那裏忽地陷了下去不是很危險的嗎光緒帝一意不肯聽決意踏冰渡水過去於是叫一個小監扶持了一步步望冰上走去在近岸的冰塊果然結得很厚人踐踏上去受得住重量不至於破裂但到了正中不漸漸地深了便不容易結冰那冰就薄了光緒帝走到這裏才覺得那冰有些靠不住正在懊悔時小監的一足已陷入水裏去了對面的太監都趕忙撑著小船來接這樣的忙了半天光緒帝才算登了彼岸哪知光緒帝踏冰的時候皇后方在扆香殿裏梳洗他從鏡中瞧見河裏有人走著一時很覺詫異便忙臨窗一望見皇上在那裏踏冰渡水就暗想道他近來神經錯亂舉動上很是乖謬但那瑾妃須不曾瘋癲為什麼不加阻諫的呢萬一皇上有了危險我也住在這裏豈能不認其咎當下便急急忙忙地妝飾好了也駕著小舟渡過河去報告給太后去了這裏光緒帝到了瀛台的那面如鳥脫籠似的好不快活一面叫小監打槳過去把瑾妃也接了來二人挽著手往各處玩了一遍走到仁壽殿面前光緒帝不由地長歎一聲道今還記得那年和翁師傅在這裏商議朝事也召見過康有為不料和袁世凱在此見面後就從此不能到這裏了回憶當日的情景宛如在眼前一樣不過從前和現在境地卻相去遠了許多想起來能不叫人傷心嗎光緒帝説罷眼看著瑾妃不免有點傷感起來瑾妃怕皇上憶起舊事因此抑鬱出病來所以忙慰勸道那是蛟龍暫困池中終有一朝逢著雷雨就可霹靂一聲直上青霄了光緒帝見説只略為點了點頭重又歎道人壽幾何韶華易老倒不如那些尋常的百姓人家夫唱婦隨其樂融融咱們到西安時見一般農人夫婦男耕女織他們家庭之間自有一種説不出的愈快咱們做了帝王倒不及他們呢怪不得明代的思宗説願生生世世不要生在帝王之家這話何等的沈痛阿光緒帝説到這裏不覺悽楚悲咽起來瑾妃在旁竭力地解勸了幾句但是怎能拼去皇上的悲感呢光緒帝越説越氣止不住撲簌簌地流下淚來這時瑾妃也牽動了愁腸君臣二人倒做了一場楚囚對泣當下光緒帝和瑾妃任意向各處走了一轉因心事上頭哪里真個要遊玩呢於是吩咐小監搖過小舟來上船仍回到瀛台光緒帝覺得百無聊賴叫宮女擺上酒來瑾妃侍立在側一杯杯地斟著酒慢慢地飲著這樣的過了一會忽見對面的河中頓時添了五六隻小舟七八個內監各人拿了一把鐵鏟紛紛地打槳過來光緒帝瞧著問瑾妃道他們不知又要做什麼鬼戲了瑾妃見説便走到窗前向內監一問只見一個內監答道奉了老佛爺的諭旨來鑿冰的瑾妃聽了回身告訴了皇上光緒帝冷笑道老佛爺令他們來鑿冰一定是咱在冰上走了幾步的緣故深恐咱沒有船來渡踏著冰走出去因此來鑿這冰塊了咱想天下無不敢的酒席何苦這般地管束呢光緒帝一面説著只把酒不住地喝著又指指扆香殿道這事必是那婆子去在太后面前攛掇才下諭旨來鑿冰的他們的舉動咱真如目睹一樣呢説罷又滿滿飲了一杯對瑾妃笑道咱若能夠再執政權這班狐狸的逆黨須得好好地收拾他一下呢瑾妃見皇上又要亂言忙搖手道隔牆有耳莫又連纍了臣妾阿光緒帝大聲道怕怎的誰敢拿你侮辱你的妹子已給他們生生地弄死了再要來暗算你時咱就和你同死看他們有什麼辦法莫不成真個殺了咱們嗎這個當兒光緒帝酒已上湧漸漸高談闊論起來瑾妃本已是驚弓之鳥恐皇上言語不慎惹出禍來所以呆在一邊擔心光緒帝原想借酒消愁誰知愈飲愈覺滿腔鬱憤都從心上起來了他正在獨酌獨語恰逢著皇后從太后那邊回來那涵元殿侍候皇上光緒帝對著皇后是不交言語的平日皇后過來只默默地坐一會便竟自走了今天光緒帝有酒意一見皇后不覺怒氣勃勃但礙著禮節不好當場發作內心早存了個尋釁的念頭咧當時故意問長問短皇后不便拒卻也只有隨問隨答地敷衍幾句光緒帝問了許多的話找不出皇后的事頭來便回頭叫瑾妃斟了一杯酒請皇后同飲皇后勉強飲過了光緒帝又命再斟上一杯皇后是不會飲酒的當然推託不飲光緒帝乘著酒興便作色道你的酒量很好的怎麼説不會飲呢那年的太后萬壽筵上你不是飲過百來杯嗎瑾妃見皇上怒容滿面知道有些不妙忙説道那時的禦酒也是宮人代飲的阿光緒冷笑道是親眼看見飲的你替他辨什麼呢説著執了酒杯強著皇后飲下豈知皇后的飲量的確很為狹窄一杯之後已覺頭昏眼花身不自主了這時見皇上逼著他飲酒不由順手將酒杯一推譁朗一聲把一隻碧玉的酒杯推落在地碎作七八塊了光緒帝想不到皇后會伸手推他故此不曾提防酒杯墮地時不覺吃了一驚便大怒説道咱好意叫你喝酒為什麼把酒杯也打落了你既不飲咱偏要你飲上幾杯哩説畢連叫瑾妃換個杯子再斟上來瑾妃正在進退兩難的時候忽見皇後突然立起身兒搖搖擺擺地望外便走光緒帝疑他去告訴太後要待羞辱了他一頓始放他出去所以見皇后一走光緒帝也跟在後面一頭去阻止他的出門不期酒醉腳軟一歪身幾乎倒了下去瑾妃慌忙來攙扶時光緒帝的右手已牽住皇后的衣袖趁勢望裏面一扯皇后也險些兒跌倒原來皇后因不勝酒力頓時頭重腳軟了他起身想回扆香殿去光緒帝誤會了意思便去阻攔他起來這樣的一牽一扯弄得皇后七跌八撞那頭上倏然掉下一樣東西來瑾妃眼快趕緊用手反接哪里來得及呢拍的一響早掉在地上了皇后也回身瞧見大驚説道怎麼把這禦賜的寶物跌壞了呢光緒皇帝見説看見瑾妃將掉在地上的東西拾了起來再仔細一瞧卻已跌做兩段心裏也覺吃驚不小要知那是什麼寶物且聽下回分解
