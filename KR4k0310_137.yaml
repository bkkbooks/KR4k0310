body:
  text: 第九十七回易叉而辨蕩婦迷人浪哭淫啼昏君中毒卻説大竇對小竇説道妹子你可知道麼萬歲他為的什麼事情才薄待我們的唯一的目標恐怕我們有什麼不端的行為罷了如今再不想出一個法子補救補救説不定還不知失敗到什麼地位呢我想萬歲既聽那魏老兒的話暗地裏一定要提防我們的倒不如想出一個疑兵之計來騙騙他能夠上了我們的圈套那就好辦了小竇問道依你説怎樣辦呢他笑道用不著你盡來追問我自有道理小竇笑道祕密事兒你不先來告訴我萬一弄出破綻來反為不美大竇笑道要想堅固我們原有的寵幸非要教化兒改扮一個男人隨我一同到萬歲那裏去探探他的究竟如果是不疑惑他必然又是一個樣子了小竇拍手笑道這樣去探究竟倒是別出心裁呢化兒不知他肯去不肯去呢話猶未了化兒和能兒手牽手兒走了進來見大竇坐在這裏連忙一齊過來見禮小竇掩口笑道看不出他們倆倒十分恩愛哩外面看起來像一對姐妹花其實內裏卻是一雌一雄永遠不會被人家看破的化兒笑道娘娘不要來尋我的開心吧能兒扭扭捏捏地走到大竇的面前慢展宮袖做了一個萬福輕啓朱唇直著喉嚨説道娘娘在上奴婢有禮了大小兩竇不禁掩口失笑化兒忙道現在的成績如何大竇滿口誇讚道很好很好嚴師出好徒沒有這個玲瓏的先生哪里有這個出色的學生呢小竇道哪里是這樣的説他教授這個學生卻是在夜裏教授的多所以能兒才有這樣的進步的化兒閃著星眼向小竇下死力一瞅笑道娘娘不要這樣的沒良心我們不過是個奴婢怎敢硬奪娘娘的一碗菜呢我不過替娘娘做一個開路的先鋒罷了大竇笑道你聽見麼他這兩句話分明是埋怨你獨占一碗不肯稍分一些肥料與他你可明白些總要看破一點才好小竇滿臉緋紅低頭笑道頗耐這個蹄子專門來造謠言還虧你去聽他的話呢我要是個刻薄的老實説我前天還教他到濯龍園裏去與你解渴麼大竇聽他這話不禁滿面桃花忙向他啐道狗口沒象牙不怕穢了嘴麼好端端地又將我拉到混水去做什麼呢小竇咬著櫻唇笑道罷呀不要來裝腔作勢的了現在有個鐵證在此地他還未説完能兒湊趣説道不要説罷你們兩個人的花樣真沒有他多小竇趕著問道前天共做出幾個花樣呀能兒將手一豎説道六個化兒笑得前俯後仰地問道做六個花樣是什麼名目能兒笑道什麼老漢推車咧喜鵲跳寒梅咧鼇魚翻身咧還有幾個我記不得了他數蓮花落似地説了半天把個小竇笑得花枝招展捧心呼痛停了片晌忍住笑向大竇説道到底是姐姐的本領大現在還有什麼話可以掩飾呢大竇也笑道不錯我的花樣是不少但是絶不像你們成日成夜地纏著一個人究竟能有多大的精神萬一弄出病來那才沒法子咧小竇笑道這話也不需要你説我們自然有數至多每夜不過演一回萬不會像你這樣窮凶極惡地釘上五六次什麼人不疲倦呢大竇笑道我扯和下來還是不及你們來得多咧能兒笑道你們休要這樣的爭論不休都怪我不好化兒笑道這話不是天外奇談麼我們爭論與你有什麼相干呢他笑道我要是有分身法每人教你們得著一個豈不是沒有話説了嗎三人聽他這話一齊向他啐道誰稀罕你這個寶貨呢沒有你我們難道就不過日子了麼能兒笑道雖然是不稀罕可是每夜就要例行公事化兒笑道你不用快活了謹防著你的小性命靠不住能兒將頭搖得撥浪鼓一般地説道不要緊不要緊無需你替我擔憂自古道牡丹花下死做鬼也風流我就是登時死了都是情願的大竇向化兒笑道我今天有一件事要煩你做一下子不知你肯麼化兒笑道娘娘這是什麼話無論什麼事情委到我還能不去麼大竇笑道現在萬歲待我們已不像從前那樣的寵幸了我們急急要想出一個妙策來去籠絡他呢聽説現在萬歲就要搜宮這個消息不知你曉得麼化兒聽説這話不禁吃驚問道果真有這樣的事麼大竇正色説道這事與我們有絶大的關係怎好來騙你呢化兒呆了半晌不禁説道如果搜查起來他説到這裏用手指著能兒説道將這個冤家安放在什麼地方呢大竇笑道正是阿能兒不禁矮了半截向大竇央告道千萬要請娘娘救一救我的性命他微微地向他一笑然後説道你不要害怕我早有道理不教你受罪就是了化兒正色對他説道娘娘不要作耍總要想出一個萬全的方法來將他安放好了才沒有岔子萬一露出馬腳你我們還想活麼大竇笑道這倒不必我今天與你一同到坤寧宮裏去探探他的形色再定行止萬一他認真要搜宮我早就預備一個地方了他道莫非是暴室麼他搖首説道不是不是他又道除卻暴室宮中再也沒有第二處祕密之所了大竇笑道你只知其一不知其二他如果要搜還不是一概搜查麼這暴室裏怎能得免呢最好的祕密地方就是濯龍園裏假山石下的緑室裏為最好要是將他擺在裏面恐怕大羅神仙也難知道哩化兒拍手笑道虧你想得出這個地方真是再祕密沒有了小竇笑道偏是你們曉得我雖然是到濯龍園裏去過了不少次數可是這個緑室我就不知道在什麼地方呢大竇笑道你哪里知道這緑室是老王爺當年到濯龍園裏去遊玩那時正當三月天氣進了園門瞥見一人身身二丈以外形如笆斗眼似銅鈴五色花斑臉朝著老王爺發笑老王爺為他一嚇將濯龍園封起來不準一個人進園去遊覽後來請了一個西域的高僧到園中作法捉怪他便到園中仔細地四下裏一打量便教老王爺在假山肚裏起一座小房子給他住老王爺問是個什麼怪物那西域的和尚連説不是它就是青草神因為路過濯龍園想討萬歲封贈的如今造這房子還恐它再來時我有符録貼在這門上它見了自然就會進去了它一進去可算千年萬載再也不會出來了老王爺當時就命動工在假山腳下造了一座房子那和尚就用朱砂畫了兩道符十字交叉貼在門上他對老王爺説如果這門上的符破了那草頭神就吸進去了老王爺深信不疑誰知到了現在那門上的符分毫未動我想哪里什麼草頭神花頭鬼呢這不過是老王爺一時眼花或是疑心被那個和尚騙了罷萬歲爺如果真地搜查起來我們預先將能兒送到那裏支他們見門上符録破了不要説搜查了只怕連進去還不敢進去呢到那時我們不妨托內侍到外邊多尋幾個漂亮的來將他們放在裏面人不知鬼不覺的要怎麼便怎麼你道如何化兒與小竇聽他這番話無不道好化兒説道這計不獨不會被他覷破而且可以長久快活下去呢大竇便對化兒説道現在的辰光也不早了我們早點去罷萬歲爺也就要退朝了你趕緊先去裝扮起來隨我一同前去化兒笑道去便去又要裝扮著甚麼呢大竇笑道原是我説錯了我是教你去改扮的化兒吃驚問道又教我改扮什麼人呢他笑道你去改扮一個男子化兒笑道這可不是奇怪麼好端端地又教我改扮什麼男子呢他道你快些去我自有道理他笑道那麼到你的宮裏去改扮罷省得走在路上被他們宮女瞧見了像個什麼呢他點頭道好起身便與化兒回到淑德宮裏化兒進了臥房不多一會改扮停當緩步走了出來大竇見他改扮得十分出色果然是個美男子俏丈夫毫無半點巾幗的樣子不禁滿口誇讚道好一個美男可惜胯下只少一點不然我見猶憐呢不表他們在這裏戲謔再説章帝退朝之後在坤寧宮裏息了一刻心中挂念著竇後不由得信步出宮到了淑德宮門口只見裏面靜蕩蕩的鴉雀不聞不禁心中疑惑道難道他此刻又不在宮裏麼一個六宮之主有什麼大事這樣的忙法他自言自語地説到這裏不禁哼了一聲暗道這兩竇的神形與從前大有分別我想他們一定是有什麼曖昧的事情發生了不然不會這樣的神情恍惚的他一面懷疑一面動步不知不覺地走到房門外將簾子一揭瞥見竇娘娘與一個美男子在窗前著棋章帝不由得將那無名的毒火高舉三千丈按捺不下一步跨進房門潑口罵道好賤人你身為六宮之主竟敢做這些不端的事情怪不得這幾天孤王見了你總是淡淡的不瞅不睬原來還是這樣的花頭呢他説罷喘吁吁地往一張椅子上一坐連聲問道你這個賤人該怎樣處治你自己説罷他微微地朝他一笑説道今天萬歲爺為著什麼這樣的發揮人呢他氣衝衝地罵道你這個大膽的賤人你對面坐的是誰他不慌不忙地對他説道要問他麼萬歲你認不得麼還要我説出來做什麼呢他聽得這話更是氣不可遏立起來腰間拔出寶劍就來奔向那個男子那男子笑嘻嘻地將袍衫一揭露出一雙不滿三寸的瘦箏來章帝一見不禁倒抽一口冷氣忙將寶劍入鞘轉怒為喜地問道你是誰竟這樣的來和孤王取笑大竇此時反而滿臉怒容故意哽哽咽咽地哭將起來化兒見他做作還不是一個極伶俐的麼連忙走過來到他的面前雙膝一屈撲通一跪口中連説道奴婢該死不應異想天開的改換男妝教娘娘無辜的被萬歲責罰奴婢知罪請娘娘嚴辦就是了大竇見他這樣不由得暗暗誇讚道怪不得妹妹常説他伶俐精細果然有見識他卻故意説道化兒你去卸妝罷這事我不怪你只怪我自己不應隨你改裝男人教萬歲生氣他説罷取了手帕慢慢地拭淚化兒將男妝隨時卸下依然是一個花容月貌霧鬢雲鬟的絶色美人章帝此時自知理屈見他哭得嬌啼不勝不由得起了憐愛之心深悔自己過於孟浪但是又礙著化兒在這裏不能徑來賠罪只得默默無言停了半晌搭訕著向化兒説道你從哪里想起來的好端端的為什麼要改扮男妝呢要不是你將腳露出來的快被我一劍將你砍死那才冤枉呢化兒笑道罷呀還問什麼我今天到娘娘這裏來請安見萬歲的衣裳擺在箱子上我就順手拿起來往身上一穿本來是玩的後來朝著鏡子裏一望不禁自己也覺好笑爽性戴起冠來因為娘娘喊我著棋我就忘記卸下不想被萬歲碰見了起了疑心奴婢萬死還求萬歲恕罪章帝道事已過了就算了化兒連忙謝恩大竇便朝他偷偷地丟去一個眼色化兒會意起身走了章帝見化兒走了忙不疊地走到他的身邊並肩坐下正要開口賠罪他將宮袖一拂走到榻前坐下章帝跟著又走到榻前他卻粉龐兒背著他只是嗎咽不住章帝到了這時真是肝腸欲斷伸出手來將他往懷中一摟悄悄地説道娘娘今天只怪孤王一著之錯得罪了你孤家自知不是千萬要請娘娘恕我一朝才好呢他哭道萬歲請你就將我殺了罷我本是個賤人做這些不端的事情理該萬死章帝慰道好娘娘只怪孤王一時粗魯不看今天還看往日的情分呢他仰著粉頰問道你和誰有情這些話只好去騙那些三歲的小孩子今天不要多講廢話請你趕緊將我結果了罷省得丟了你的臉面他説罷故意伸手到章帝的腰中拔劍要自刎章帝慌忙死力扯住央求道好娘娘請暫且息怒千不是萬不是只怪孤家的不是你實在要尋死孤王也不活了他聽罷不禁冷笑一聲説道你死歸你死與我有什麼相干呢橫豎我這個人已經成了人家的擯棄的人了便是死了誰還肯來可憐我一聲呢章帝忙道娘娘我這樣的招賠你你還是與我十分決裂誰沒有一時之錯呢我看你從來待我是再恩愛沒有的為何今天説出這樣的話來呢他道你這話問我做什麼呢你自己去層層次次的細細地想想吧也用不著我細説了章帝聽他這話沈吟了一會子説道娘娘莫非是怪孤家削去竇氏弟兄的權麼他道萬歲這是什麼話自古道王子犯法庶民同罪難道因為我的情面就不去究辦內戚了麼自古也沒有這個道理的他道除卻這一層孤家自己料想也沒有什麼去處得罪娘娘的了大竇冷笑一聲道萬歲説哪里的説來只有我得罪萬歲萬歲哪里有得罪我的地方呢即使得罪我我還有什麼怨恨呢章帝忙道娘娘你向來是爽直人從未像今天這樣的牽絲扳藤地纏不清究竟為了一回什麼事情這樣的生氣就是今天孤王粗魯得罪了你孤王在這裏連連地招賠不是也該就算了為什麼儘是與孤王為難呢他冷笑道誰與你為難你在這裏自己纏不清倒説我不是這不是笑話麼老實問你一句你為著什麼緣故這幾天陡然的要搜宮這不是顯系看不起我麼漢家從來沒有過這樣的舉動倒是萬歲爺別出心裁的想必宮中一定是發生什麼噯昧了不然萬歲何能有此舉動呢他這一番話説得章帝閉口無言半天答不出一句話來停了片刻才吞吞吐吐地對他説道此事娘娘休要見疑我聽他們説的不過我的心中絶不會有這種用意的他道萬歲你究竟是聽誰説的説的是些什麼話呢章帝忙道那個倒不要去追求只要我不搜有什麼大不了呢他道那是不可以的無論如何倒要萬歲搜搜究竟宮中出些什麼噯昧的事情呢章帝又道這話不要提了自古以來從未聽説過有這樣的舉動呢不要説我無論是誰也不會做出這自糟面子的事來的他道萬歲既然這樣的説想是一定不搜了他道自然不搜阿他道他不搜我倒有些不放心我明天就去大大地搜查一下子但看宮中出了什麼花樣兒了章帝道那可動不得搜宮是個蹭蹬的事不是預兆別人進宮搜查麼他道管他許多呢我既然做了一個六宮之主有不好的去處當然究辦以維國法而整坤綱省得有什麼不端的事情發生天下人皆不能知道內幕情形誰不説是我主使和疏失之罪呢章帝笑道這又奇了宮中出了什麼事情要你去搜查麼他道萬歲爺你這話又來欺騙我了如果宮中沒有花樣翻了出來難道你好端端的無緣無故的要搜宮了麼章帝道娘娘你千萬不要聽外人的誘惑才好呢他冷笑道這是什麼話呢不是從萬歲爺的口中説出來麼他二人一直辨論了多時中膳也不用了他和衣倒在床上一聲不作章帝百般地溫慰他他正眼也不去看他一下子到了晚間章帝更不敢走開他見章帝像生了根似坐著不動便故意三番兩次地催他動身章帝再也不走憑他怎樣的攆他走兩個人一直熬到三更以後大竇也疲倦極了不知不覺地沈沈睡去章帝才替他寬衣解帶同入鴦衾幹了一回老調兒他明知故意的只裝著不曉得這正是春風一度情無限除卻燈花訴與誰要知後事如何且看下回分解
