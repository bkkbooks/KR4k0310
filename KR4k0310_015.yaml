body:
  text: 第十四回蘇子河邊淹戰將薩滸山下困雄師卻説英明皇帝聽了軍師一番談話恍然大悟忙傳令留下五百人對付南來敵軍撥一千人馬擋寬甸一方面的敵軍自己卻領著八旗六萬大軍晝夜兼程向西進發不多幾日看看到了界凡山吩咐扎定營頭築起堡壘來這時明將杜松和劉遇節帶領三萬人馬駐扎在薩爾滸山的山岡上兩軍隔著一條蘇子河遙遙相對講到這位杜將軍原是一位勇將他在邊疆身經大小百十回惡戰從不退怯長得一身好氣力等間一二百人不在他眼中他有一種古怪脾氣每到交戰的時候便把衣服脫去露出一身黑肉來那刀槍著在他身上淌下血來他也不在意因此他身上處處都是傷疤他也愛喝酒到酒醉的時候便脫下衣服來數著刀疤談論那戰功雖説如此但他每次戰爭總是在左右翼跟著主帥從不曾獨當一面做過主帥如今他挂著正先鋒的印出兵到渾河地方相過地勢便下令把三萬人馬都扎在山岡上劉遇節看了便勸他説道從來扎營都是靠山傍水的如今主帥把全隊人馬都搬上山去倘然敵兵渡過河來我軍從山上下來又是纍墜又是費時依末將的主意分五千人馬沿河扎定再分五千人馬沿蘇子河上下遊偵探敵軍可有偷渡的情事一萬五千人馬分為中左右三營靠山腳扎住主帥統帶五千人馬在薩爾滸山岡上遠可以瞭望近可以督戰杜將軍聽了劉將軍一番話且冷笑幾聲不去睬他卻依然在山岡上吃酒談兵看看過了十多天那對河的敵兵卻毫無動靜杜將軍等得不耐煩起來便親自帶了一萬人馬赤膊大呼渡地河去討戰待得劉遇節知道趕上前去勸阻説兵分則力單渡河而戰又是十分危險的事體敵人不肯渡河過來他一來是防我軍在半河裏攻擊他二來是誘我軍過河以逸待勞將軍千萬不可渡河這時明兵已大半渡過河去一任劉將軍千言萬語杜將軍如何肯聽他只囑咐劉將軍緊守山營大喝一聲渡過河去了那英明皇帝坐在帳中打聽得明兵已渡過河來便留下兩旗兵士在界凡山等待敵軍自己卻統著五萬五千大軍從蘇子河上流頭悄悄地渡過去這時劉將軍依著將令在薩爾滸山上緊守著老營河岸旁並無兵丁看守誰知那建州兵馬已是渡過大河漫山遍野而來這是半夜時分明朝將士正在山上做他的好夢只聽得四下裏一聲呐喊那建州兵已搶上山岡來劉遇節從夢中驚醒過來跳上馬沖下山去這時夜色昏黑那敵兵擎著火把分八路進攻好似八條火龍劉遇節看看抵敵不住他帶了一萬多人馬揀那沒有火光的地方沖下山去這劉將軍是不曾到過關外的他手下又都是江南兵不熟地理那建州兵卻十分熟悉只揀那大路殺上山去可憐許多明兵只因不識道路撞在敵軍裏被他打得片甲不留便是劉將軍帶著的一萬兵士也都因不識道路撞在叢莽中不得脫身的也有翻在陷坑裏遭人馬踏死的也有劉將軍左沖右突四下裏找路竟找不出一條下山的道路他奔波了半夜跑得人馬疲乏一個眼錯被絆馬索絆翻了活捉到建州大營去他見了建州皇帝不住口地大罵惱了大貝勒便在他父親眼前一刀揮作兩段這一場惡戰薩爾滸山上的明兵死了五千多人逃去了五千多人被建州兵活捉住一萬人馬奪得的旗幟馬匹不計其數這個消息傳到杜將軍耳朵裏不覺嚇了一大跳他渡過河足足費了一天光陰待到傍晚時候那天上忽然下起傾盆似的大雨來把個杜將軍打得和落湯雞似的好不容易渡到對岸那兵士們拖泥帶水地走著人人怨恨個個疲乏看看到了那界凡山下遠遠見那敵人營中全無燈火杜將軍心中疑惑忙傳命兵馬站住派探馬前去打探誰知前面的探子不曾回來後面的探馬卻已報到説薩爾滸山的大營全軍覆滅杜將軍聽了慌得手足無措急傳人馬悄悄地退回渾河右岸去他知道蘇子河右岸有敵兵攔住便想從渾河退回去這時便是四更天氣天上烏雲滿布漆黑無光只有前面一條渾河發出白茫茫的光來杜將軍一邊走著一邊肚子裏暗想幸而界凡山的敵兵不曾覺得倘然給敵兵知道了追趕上來這時前有大河後有追兵不死在刀下也要死在水裏看看全軍已到了渾河岸邊便傳令渡過河去到天色微明人馬才渡得一半杜將軍自己也下了船在河中照料這時所有木筏船隻裝滿了人馬在河中行駛還有一半人馬一齊站在河岸邊守候船筏忽然身後塵頭大起喊殺連天那建州一萬五千人馬和一陳風似地趕到見人便殺見馬便砍那班明兵在泥水中跋涉了一夜受盡風寒肚子又飢餓身體又疲乏這時逼得他前無去路後有追兵杜將軍在河中望見建州兵馬十分驍勇縱橫馳騁殺得明兵大喊大哭一半落在水裏一半死在刀下五千人馬被殺得半個不留岸上堆著一墩一墩的尸首渾河的水也紅了杜將軍看了也無可奈何只催著船隻快渡一會兒大軍渡到右岸看看岸上一片平沙靜悄悄的不見人影杜將軍才放心了那五千兵馬零零落落也整不起隊伍來杜將軍帶著他們向西面走去走了十五六裏路程見前面一座大樹林那山角斜插在樹林裏杜將軍傳令到山下樹中去造飯息力兵士們到了樹林中便七歪八斜地倒在地下將辨們上去喝起了這個那個又睡倒了杜將軍看著士兵也可憐裝做看不見一任他們遊散去正休息時候忽聽得樹林後一聲炮響左面大貝勒代善殺到右面四貝勒皇太極殺出杜將軍也不及招呼兵士只帶了遊擊王宣趙夢麟和三五百親兵跳上馬一溜煙逃去這裏兩個貝勒在林中只是搜殺明兵殺得他們呼爺喊娘到底一個也不曾逃得性命那杜將軍騎在馬上連連地打著馬也不分東西南北見路便走走到一座山谷下只見前面閃出一支人馬來黃傘寶蓋馬上端端正正坐著一個建州可汗左有大交扈爾汗右有軍師範文程那扈爾汗拍馬上前説道俺們等候你多時了你快快獻上頭來杜將軍看看不是路忙撥轉馬頭逃走後面建州兵風馳電掣一般追來杜將軍慌不擇路只向那荒僻小路走去流星趕馬似的足足追了二十多裏路看看前面一座高山攔住去路那山壁直豎無路可尋杜將軍知道此番性命難保便掉轉馬頭大喝一聲向建州兵沖來兩將對陳交戰了半個時辰那建州兵土也被他殺死不少一瞥眼那王宣趙夢麟俱被扈爾漢殺死在馬下杜將軍大怒丟下來將上去和扈爾漢對敵山上站著一個小將放過一支冷箭來蔔的一聲直穿杜將軍的咽喉只聽得阿喲一聲跌下馬來死了原來這座山名叫勺琴山那山上的小將軍是英明皇帝第十三個兒子名叫賴慕布他奉了父皇之命領二千人馬在勺琴山上守候著當下他二人回到大營獻上杜松首級英明皇帝論功行賞要算大貝勒的功勞最大把虜來的器械馬匹都賞了將士們這夜總兵馬林得了杜將軍全軍覆沒的消息他行軍到尚間崖深掘壕溝嚴陳自守大貝勒吃過慶功酒便向他父親要三百名騎兵連夜趕到尚間崖去馬林見建州兵到便把炮兵列在營外騎兵列在營內另派潘宗顔自領一軍在西面三裏外斐芬山駐扎互為犄角這時英明皇帝大軍也陸續到來和大貝勒的兵合在一處探馬報稱空開萼漠地方有明左翼中路後營遊擊龔念遂李希沁統步騎軍一萬人用大車外面遮著藤牌列陳英明皇帝囑咐大貝勒看守大營他和四貝勒親自帶了一千人馬去察看龔念遂的軍隊四貝勒一見那大車環列好似城牆便喝令放火箭頓時好似幾千條火龍向敵營射去那大車轉動十分笨重一霎時都著了火烈焰飛騰四貝勒發出一聲喊搶上前去那後面的兵士也跟著猛力進攻人人奮勇個個當先早把那大車攻破明兵被自己的車子攔住一時逃不脫身大半死在建州兵的刀槍之下那李希沁龔念遂都力戰而死英明皇帝正站在高處見他兒子在左沖右突如入無人之境心下好不歡喜忽然一騎報到説道大貝勒已與馬林開仗了英明皇帝便丟下四貝勒跑回大營去只見馬林軍隊在尚間崖下扎營便傳令軍士從山陰面爬上山去皇帝親自在山上搖著紅旗建州兵士奮勇衝殺下山明兵看看擋不住了正要轉身抵敵那大貝勒帶著一萬鐵騎從前面直衝殺過來馬林兵士腹背受敵不戰而逃建州兵士追一陳殺一陳明朝副將麻岩及大小將士一齊陳亡只有馬林逃得性命落荒而走這裏大貝勒追殺一陳看看明朝人馬被他殺盡這時四貝勒也得勝回來兩軍合在一處轉向斐芬山攻打潘宗顔去那斐芬山勢十分險惡英明皇帝下令騎兵一齊下馬上山仰攻明兵在山上打下大炮來建州兵死亡甚多大貝勒和四貝勒在山下奮勇督戰只苦得建州兵是沒有大炮的四貝勒向禦營裏調來一支大隊弓箭手那箭和飛蝗一般地飛向山頂上去看看明兵陳角還是兀立不動後來扈爾漢看看力攻難以勝便帶了一千名校刀手爬向山後小路繞過敵營背後去發一聲喊殺進營去明兵便大亂起來山下的兵見山上敵軍亂了陳腳便又冒死上前潘宗顔卻是一位勇將他一任山後如何擾亂只顧前面抵住敵兵看看建州兵已到半山他便指揮兵士用炮火猛打因此建州兵士又死亡了二三千人直到建州兵士占住山頭他還親自開炮轟打後來炮架子翻倒把他的身體直摔下山去可憐一位猛士跌得腦漿迸裂血肉模糊到這時馬林這支人馬可以算得全軍覆沒那葉赫貝勒金台石布相古原帶有三千人馬與明兵約定共打建州的他走到開原中古城聽得明朝兵敗嚇得他卷旗息鼓悄悄地逃回本部去這時英明皇帝已破了明朝兩路兵馬範文程便兌陛下快快回軍防護興京要緊英明皇帝便收集八旗軍隊回兵到固勒班暫駐那時明朝總兵官劉綎李如柏兩支兵馬由董鄂虎攔兩路進兵看看已離興京不遠一個消息報到建州大營裏英明皇帝便拜扈爾漢做先鋒先帶一千人馬晝夜兼程回去保護興京第二天又打發二貝勒帶本部人馬二千名接應英明皇帝自己帶了貝勒大臣和文武官員回到界凡山下行凱旋禮斬倒八頭牛祭旗告天大貝勒見二貝勒已去怕他奪了頭功忙去對父皇説願帶二十個騎兵前去打探消息大軍隨後來皇帝答應了他三貝勒聽得了也要跟著去四貝勒這時在山後圍獵聽説他哥哥先去他便匹馬趕到父皇跟前求著父皇也要和兩位哥哥一塊兒去英明皇帝是喜歡四貝勒的當時把他摟在懷裏説道好兒子你兩個哥哥已去了留下你一個在營裏陪伴著父親豈不是好四貝勒心中原是想家便再三求著父親先放他回興京去三個貝勒回至興京宮中幾位妃子聽説了便喚進宮去圍著他們打聽營中消息四個貝勒便手舞足蹈地把戰場的情形細細説了那妃子們聽了又是歡喜又是害怕只有三貝勒莽古爾泰是有母親的當下他母親富察氏聽到出神的時候便一把摟過他兒子來我的心肝乖乖亂叫講到四貝勒皇太極他母親葉赫氏雖早去世了只因他面貌長得俊美説話又討人歡喜宮中的妃子沒有一個不喜歡他的那烏拉氏又是格外喜歡當下也一把摟過皇太極去心肝寶貝地亂叫那十四皇子多爾袞見他母親歡喜哥哥也搶上去倒在他母親懷裏烏拉氏一手摟著多爾袞一手摟著皇太極大家看時他弟兄兩人一般的長得得人意兒多爾袞年紀小望去似乎比他哥哥還要俊些大貝勒和二貝勒看了這個情形想起自己的母親不覺心中一酸一掉頭走出宮門去了天色微明忽然聽得城外連珠炮響鼓角齊鳴知是皇帝駕到城中大小臣工忙出城去迎接進宮英明皇帝到得宮裏烏拉氏忙備辦筵席替皇帝接風這時營中捉得幾個明朝美女送進宮去那妃子公主們見他裙下尖尖的一雙小腳都十分詫異齊圍定了他脫下弓鞋來捏著看著把那美女只是低垂粉頸再也擡不起頭來停了一會宮女上來領去梳洗這一夜送去陪侍皇帝皇帝見他長得溫柔美貌倒也十分寵愛那阿敏也是十分好色的這一夜他了弄得兩個明朝女去侍寢第二天帶進宮去求皇帝賞他封號皇帝便封他做詩妾把自己的封做庶妃阿敏看看皇帝的比自己的長得格外俊便怔怔地看著只是憨孜孜地笑皇帝見了不覺大怒命宮女推出宮去從此皇帝心中有幾分厭惡二貝勒不常召他進宮到了第二天皇帝坐朝便有扈爾漢出班奏稱現有明朝西路兵馬已從寬甸進董鄂路居民逃匿深山茂林中那總兵劉綎縱兵焚掠村落殺死百姓很多當有牛録額真托保爾額爾納額黑乙三人率駐防兵五百人迎敵被劉綎軍隊重重圍住額爾納額黑乙又被亂兵殺死又殺死兵士三百人托保爾帶了殘餘兵馬逃來興京求救請皇上下令快發大兵前去迎敵英明皇帝聽了忙下令大貝勒三貝勒四貝勒統原有人馬先往董鄂路迎敵又令扈爾漢帶領一支人馬在深山茂林中策應留四千精兵保守興京預備抵敵李如柏賀世賢兵馬此番出兵大貝勒當大元帥三貝勒當副元帥四貝勒當先鋒元帥拔寨先起看看走到富察地方探馬報説前面明兵沿佟家江來相距只有十六裏四貝勒聽了吩咐在山谷中扎下營盤一面在後營挑選二百名明朝浙江兵士傳進帳來給他酒肉又用好言撫慰一番教他們依舊穿著明朝軍裝打著明朝旗號迎上去到佟家江劉綎營裏謊報説杜松將軍已得了興京城池特打發來迎接將軍進城去的又説你們好好的前去倘能誑得劉綎到來便算是你們的頭功立刻放你們回浙江見你們的妻兒老小去那班兵士聽説放他回家見妻兒老小去便個個感激人人奮勇當下他們便打扮停當打著杜元帥的旗號向佟家江一路迎上去了這裏扈爾漢也帶著他的馬隊趕到和四貝勒合兵一處托保爾帶著敗殘軍馬來投見四貝勒四貝勒吩咐他到深山茂林中去偵探敵蹤卻説那劉綎從瀋陽出發由寬甸東向迤邐沿佟家江一帶過來沿途山路崎嶇叢莽深密心中又怕杜松先得了興京奪了自己大功因此催促兵士晝夜趕程真是逢山開路遇水搭橋兵士們走得疲倦萬分叫苦連天看看到了董鄂路上實指望借著民房休息一會兒誰知到了董鄂那百姓走得十室九空莫説牛羊雞犬不見一隻便是那屋子也拆毀了大軍到此吃既沒東西吃住也沒地方可住劉綎十分憤恨兵士們便放一把火把民房燒了依舊拔隊前進看看前面一帶大江渡過江已是富察地方劉綎原與朝鮮兵約會在此十日前早已派海介道康應乾帶五百名步兵前去迎接到如今既不見朝鮮兵到也不見康應乾回來劉綎無可奈何便傳令大軍暫行沿江扎定一俟朝鮮兵到便即合兵進攻誰知守候了幾天那朝鮮兵隊卻查無資訊劉綎等得不耐煩起來便下令兵士們明曰四鼓造飯五鼓渡江那兵士正忙著收拾營裝忽然江對面渡過一小隊人馬來夕陽照著旗上顯出一個杜字來兵士們忙去通報元帥劉綎叫傳進帳來一看果然是自家的兵士問起杜元帥時原來早於三日前奪得興京城池建州都督已被亂軍殺死杜元帥住在都督府裏專候劉元帥過江去商量收服北路部落這班兵士説得活靈活現不由劉綎不信劉綎聽了心中不覺一喜一恨喜的是建州夷人已滅中國從此可以高枕無憂恨的是朝鮮軍隊延誤時日這項破興京的一番大功被杜元帥奪去自己枉做了一個先鋒元帥此番出軍來不曾立得尺寸功勞回去難見經略的面當下便把興京來的兵士安頓下食宿的地方傳令兵士明天緩緩起行把所有戰器都收藏起來兵士們也個個卸下甲胄準備渡江入城去休養幾天要知劉綎究竟如何結局再聽下回分解
