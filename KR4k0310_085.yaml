body:
  text: 第八十五回西苑內皇帝聽豔歌坤寧宮美人受虜掠卻説翁師傅聽皇上説了這一番話知道皇上生性忠厚上面被皇太后的威權壓制住了下面又受親王太監們的愚弄覺得皇帝十分可憐便奏稱如今時局艱難宮庭多故皇上須大振乾綱宸衷獨斷轟轟烈烈地做一番事業把國家大權收回來才能夠鎮服群小此次日本稱兵請皇上下令大張撻伐把日本打敗了那時陛下內外都立了威權皇太后便不足慮了光緒皇帝聽信了翁相國的話傳諭李鴻章積極備戰李鴻章只因皇太后把海軍經費拿去蓋頤和園心中老大的不願意只因皇上的旨意不好違背便得又調了聶貴林及左寶貴的軍隊去救應誰知聶軍戰敗左軍戰死陸路上既不得力便要借助水路上去了那時日本海軍已經攻入仁川李鴻章便飛調海軍提督丁汝昌帶了海軍前去救援那時中國的兵船還有定遠鎮遠經遠來遠靖遠致遠揚威超勇平遠廣甲濟遠等十二艘此外還有水雷艇八艘還可以和日本較量較量丁汝昌見日本海軍進了仁川口便想去把仁川口封住飛電去請李鴻章的示下李鴻章又不敢擅自做主又去請示于總督衙門那班王大臣商量了半天便議出了相機行事四個大字待到丁汝昌接到回電正打算前去封港那日本艦隊已闖進了鴨緑江丁汝昌下令開炮這時中國兵船和日本兵船還隔著九裏遠那大炮轟了一陳炮彈個個都落在海中日本兵船不曾傷得分毫看看兩面的距離慢慢地近了丁汝昌正要發令放第二炮時日本的遊擊艦隊已經飛也似地向中國艦隊後面包抄過來前後夾攻中國的艦隊被圍困在中央乒乒乓乓一陳打打得黑煙蔽日白浪接天中國艦隊頓時四分五裂首尾不能相顧丁汝昌坐在艦上遙遙地望著只見那致遠兵艦的日本兵艦互相轟擊著打到十分凶惡的時候忽見致遠兵艦開足了機力向敵船直撞過去轟天也似地一聲響亮海水和高山一般地直立了起來可憐致遠艦上的管帶鄧世昌連人帶船地直沈下海底去了還有經遠艦的管帶林永升在這驚濤駭浪裏面轟破了一隻敵艦他自己也不幸中了敵人的魚雷把船身炸沈了此外的艦隊被日本的兵船包圍著虜去了丁汝昌坐著旗艦幸逃得性命駛出了旅順口外暫時在劉公島下碇一面飛電李鴻章告急這時北洋的海陸軍隊都已調遣在外李鴻章接了這告急的電報也無法可想只得轉電到江南各省去請救兵日本明治天皇連連得了捷報便親自帶了大隊人馬駐扎在廣島地方一面下令派陸軍大將山縣有朋公兵去攻打旅順威海口岸把中國殘餘的海軍圍困在港內日本軍隊來勢十分勇猛他的海軍陸戰隊上得岸來從炮臺後面猛撲過來不多一刻那各港口的炮臺都被日本軍隊占據了去便拿中國的炮臺攻打中國艦隊霎時打得中國的兵船斷桅碎舷飄零滿地那時鎮遠兵船上有一個炮兵長名叫黎元洪的見了這情形萬分悲憤他便大叫一聲縱身跳下海去只圖個自盡誰知被日本的飛鷹兵船上人看見了急急派了小兵船去把黎元洪救起來日本兵也不去難為他把黎元洪送到劉公島上丁汝昌的坐艦裏去遠遠見那坐艦上已高挂白旗一打聽才知道丁汝昌寫信給日本大將求他保全全船的性命自己卻服毒死了一面日本的陸軍連日攻下九連城鳳凰城蓋州大連岫嚴海城旅順一帶地方這城池失守的消息接二連三地報到京裏光緒皇帝急急傳翁師傅進宮去問話翁同和也無計可施滿朝文武都看得自己的身家性命重一齊勸皇上講和皇太后也埋怨著皇帝不該聽信翁師傅的話輕易和日本開戰如今弄得傷師辱國還不快和日本去講和直待到兵臨城下再去割地求和悔之晚矣光緒皇帝給皇太后終日在耳邊絮聒著又看看自己的勢力孤單沒奈何只得派李鴻章做議和全權大臣和日本的大臣伊藤博文去議和這一次的議和我們中國放棄了高麗割去了臺灣賠去了軍費險些要把個東三省完全送去幸虧俄德法三國逼著日本把遼東半島退還了中國自從這個交涉失敗下來光緒皇帝也心灰意懶所以朝廷大事自己也不願顧問依舊請皇太后垂簾親政自己樂得退在宮庭裏終日和那瑾妃珍妃尋歡作樂講到這兩位妃子果然一般有沈魚落雁之容閉月羞花之貌但講到那聰明徑兒和那活潑的性情自然珍妃越發叫人可痛些那瑾貴妃卻一味的溫柔忠厚光緒皇帝也十分寵愛他這時候正在春夏之交光緒皇帝終日坐在宮裏悶得慌便傳旨下去明日駕幸西苑這西苑又名西海子周圍數裏萬圓水面上架一座石橋有五六百步長雕欄曲檻都是白石築成橋的東西面矗著兩座華表東面的稱做玉蛛西面的稱做金鼇水中突出一塊陸地名叫瓊華島島上一般的也建造著樓閣亭台另有一座石橋接通瓊華島橋的南北兩面也豎著兩座華表上面刻著積翠堆雲兩方匾額瀛台在瓊島的南面五龍亭又在北面蕉園和紫光閣又隔水對峙層甍接天飛簷拂雲夾岸榆柳古槐都是幾百年前的遺物池中萍荇菱蒲青翠奪目翠鳥文鴛遊泳于緑漪碧波之間悠然自得水上藕花攢聚望去好似一片錦繡後人有兩律西苑詩道紅嶼青林閣道重淩晨霄氣散千峰牙檣錦幕懸翔鳳水殿金鋪隱濯龍仗外輕陰當檻靜筵前積翠入杯濃此身疑是來天上瑤島風光仿佛逢高張廣樂播南薰寶幄樓船劍佩兮玉潤鳴泉雲際落璚蕭奏曲水中聞槐煙密幕依岩障藻影連牽寫波紋共喜升平邀帝澤豈同漢武宴橫汾這日光緒帝駕幸西苑殿上安排酒席瑾珍兩妃輪流把盞開懷暢飲這光緒帝自從幼年抱進宮庭二十年來起居遊息總是跟隨著太后處處受著束縛難得今天自由自在地遊玩著便是那班宮女太監們見皇上在殿上飲酒也便各自散去玩耍或在假山邊曲水泮畫欄前花徑裏三個一堆五個一簇也有看花的也有釣魚的也有坐在湖石上説笑的也有倚在欄杆邊唱曲子的宛如千花競秀萬卉爭妍光緒吃了幾杯酒帶著兩位妃子走下殿來後面跟著一隊宮女太監們慢慢地踱過幾重庭院狂花撲面香草勾衣見一帶疏籬花障順著花障委委曲曲走去便到了紫光閣一眼見那邊粉牆兒東首杏花樹下面有十數個宮人在花陰下面鋪著錦禱盤膝兒團團坐著一面吃著酒兒一面唱著曲兒十分高興皇上後面的太監正要上前喝住光緒帝急搖著手叫不要聲張自己卻帶著兩個妃子繞過杏花樹後面去偷聽著只見一個嬌小身裁的宮女拍著手掌兒嬌聲唱道哪里有什麼春風初試薄羅裳棉襖棉裙棉褲子膀脹哪裏有什麼夜深私語口脂香生蔥生蒜生韭菜臘髒哪里有什麼蘭陵美酒鬱金香舉杯便吃燒刀子難當哪里有什麼雲髻巧梳宮樣裝頭上松髻高二尺蠻娘哪里有鴛鴦夜宿銷金帳行雲行雨在何方土炕光緒帝聽了也不禁呵呵大笑那班宮女們聽得樹蔭裏發出笑聲來大家都不覺嚇了一跳忙看時只見皇上左手拉住珍妃的手右手拉住瑾妃的手笑容可掬地從花叢裏踱了出來宮女們忙上去跪接光緒帝傳諭叫他們不必拘束揀那好的曲兒再唱幾支聽聽太監們聽皇上説要聽曲子了便去端一張逍遙椅來安放在草地上請萬歲坐下珍妃傳諭宮女們索性拿了三弦鼓板來唱那宮女聽了口稱領旨他們原預備下樂器的便有小太監捧上來正預備彈唱忽見那總管太監李蓮英急匆匆地走來見了光緒帝忙跪下奏道萬歲爺快回宮去老佛爺看了重要的奏本正找萬歲爺回宮去商量去呢光緒帝原是畏懼太后的一聽説太后傳喚他如何敢怠慢急急擺駕回宮見了西太后太后正和一班王大臣在勤政殿看黃紙匣裏的奏章見光緒帝進去了便把奏章遞給皇帝看光緒帝看時見是軍機大臣榮祿的奏本上面説的是請皇太后移蹕頤和園舉行慶祝萬壽的典禮光緒帝每次陪著皇太后閲看奏章看完了依舊把奏章放入黃紙匣裏不説一句話惇親王在一旁卻耐不住了便奏請皇上皇太后準榮祿的奏在十月裏舉行萬壽大典西太后聽了連連搖著頭説道不興不興俺們堂堂大清國吃小小日本打了敗仗賠款割地我的臉也丟盡了還有什麼心思逛花園去呢西太后氣憤憤地説著那兩道眼光卻注定在光緒帝臉上光緒帝明知道太后在那裏譏諷他便也低著脖了不敢作聲兒嚇得惇親王忙爬在地下磕頭後來衆大臣會議擬了一道停止慶賀的諭旨呈給兩宮看過了發下去那道上諭説道本年十月豫六旬慶辰率土臚歡同深懷祝屆時皇率中外臣工詣萬壽山行慶賀禮向大內至頤和園沿途蹕路所經臣民報效點綴景物建設經壇豫因康熙乾隆年間歷屆盛典崇隆垂為成憲又值民康物阜海宇人安不能過為矯情特允皇帝之請在頤和園受賀詎意自六月後倭人肇釁侵豫藩封尋復毀我舟船不得已興師致討刻下干戈未戢徵調頻仍兩國生靈場罹鋒鏑每一念及悼憫何窮前因念士卒臨陳之苦特頒發內帑三百萬金俾資飽騰茲者慶辰將屆豫何心肆耳目之觀受台之祝耶所有慶辰典禮著仍在宮中舉行其頤和園受賀事宜即行停辦欽此朕仰承懿旨孺懷實有未安再三籲請未蒙慈允敬維盛德所關不敢不仰遵慈意物諭爾中外臣工一體知之欽此光緒帝見西太后臉上不快活想來因停止慶典不能到頤和園去遊玩所以心中鬱鬱不樂便拿好話勸説又説現在俺們已和日本講了和時局早已太平了雖説下了上諭停正慶典但俺也得替老佛爺做做壽到那天依舊請老佛爺進頤和園遊玩去惇王也在一邊附和著説道難得主子一片孝心到老佛爺萬壽的一天奴才們都要到園子裏去給老佛爺磕頭那天老佛爺也得開開恩賞奴才們逛一天園子西太后原是滿腔怒意的經惇親王求著才漸漸地和緩下來便微微地點著頭接著小太監上來請老佛爺進福壽膏許多宮女把太后簇擁著進去什麼叫做福壽膏呢便是那鴉片煙這鴉片煙自從道光末年開了五口和外國通商以後英國人盡把鴉片煙運到中國來銷售那時百姓們都吃了鴉片煙內中有一個廣東人名叫陸作圖的他家裏煮成的煙十分香美別人都不得他的法子任你如何考究煮法總不及陸家的芬芳有味第一那陸家有一口井井水十分清潔拿這井水盛在碗裏望去一片緑色和翡翠一般拿這個井水煮煙才能有那樣的香味倘換一種水那香味便大減了第二那陸作圖的煮煙另有一種祕法他這法子連自己的兒女也不傳授的只傳給他妻子郭氏當時廣東地方的富家大産都托那郭氏煎煙每煎一次要二兩銀子的工錢郭氏也很賺了許多銀錢便是那兩廣總督吃的煙也是郭氏煎煮的總督吃得好便煎了一缸煙送進京去孝敬太后太后吃了也十分讚美賞它名稱叫福壽膏從此凡是做兩廣總督的都成了一個例規每月總要煎一缸煙送進京去孝敬皇太后太后傳諭每月賞郭氏工食銀二百兩因此那郭氏的名氣通國皆知各省的文武大員凡是有煙癮的都托郭氏煎煙講到皇太后的吃煙宮裏用的煙槍都是出在廣州的竹做成的和小孩兒的臂兒一般粗上面接一支小管做嘴煙槍有架子的吃煙的時候拿槍擱在架子上這架子高低遠近都可以隨意伸縮小太監打煙的時候便跪在地下捧住煙斗燒著吃著內中有一支槍是咸豐帝吃的傳給太后年深日久那竹面紅潤光滑好似紅玉一般這一天太后退回宮去正在吃煙的時候忽然見那李大姑娘進來趴在太后的耳邊低低地説了幾句話太后臉上立刻轉了怒容把手裏的煙槍往地上一丟只聽得刮的一聲那個煙斗也打破了煙槍也碰壞了一塊李蓮英站在一旁忙上去把那摔壞的煙槍拿過來吩咐小太監叫他傳侍衛拿去前門外福記古董鋪子裏去修理這裏皇太后把煙竿兒丟下了便坐起身來喝叫把這狐狸精揪來待俺親自問他的話原來那李大姑娘便是李蓮英的妹子只因李蓮英在宮裏得了皇太后的寵信他妹妹也是一個伶俐乖巧的女孩兒便對他哥哥説要進宮去玩耍李蓮英仗著自己在宮裏是有權勢的也沒有人敢説他的間話他非但帶著他妹子進宮去且又帶他的妹子去見太后太后生平最喜歡女孩兒凡是在太后身邊侍候説笑的宮眷大半是宗室的格格不然也是在正黃鑲黃正白三旗裏挑選出來的年輕姑娘其中雖有少數幾個少婦但都是十分伶俐能説能笑的或是能書能畫的終日陪在皇太后左右聽候差遣那有夫之婦每隔二三個月放他回家去一次這時太后見了李蓮英的妹子模樣兒也俊美説話也伶俐便也留他在宮裏當一名宮眷這時光緒皇后原是太后的內侄女兒皇帝心中厭惡皇后因此一切説話舉動常常避著皇后的耳目和瑾妃珍妃説話去又常常在珍妃宮中住宿皇后心中不免起了妒念常常來告訴太后太后替他出主意把李蓮英的妹子撥在皇帝宮裏隨時偵探消息去告訴太后太后宮中的人都稱呼他李大姑娘這李大姑娘天天在皇帝的身邊侍候著卻改了名姓皇帝和珍瑾二妃都不知道他是太后派來的那李大姑娘正好于中行事這一天光緒帝帶著珍瑾二妃去遊西苑李大姑娘早已打發人去報告太后皇后知道皇后又跑到太后宮中哭訴説在這國家危迫的時候皇上還是一味迷戀女色不問朝政倘然從此昏瞆下去豈不要把大清數百年江山送到昏君手裏了嗎要求老佛爺做主救俺這皇上這皇后和光緒帝平日原沒有感情的見光緒帝常常在瑾珍二貴妃宮中住宿心中萬分妒忌只因怕人説他吃醋拈酸所以一向隱忍著如今見皇帝索性帶著妃子出宮遊玩去了他如何忍得便趁此機會借著國家的大題目到太后跟前來哭訴一番太后替皇帝做主給他選自己侄女做皇后原是想皇帝受著皇后的牢籠從此幡然就港便可以為所欲為今見皇上卻不受皇后的牢籠反去寵愛著瑾珍二妃心中早已不樂如今見皇后來哭訴便對皇后説道俺大清的家法何在一句話提醒了皇后忙給太后磕著頭回宮去了一面太后便借著看奏章為名把皇上召回宮來平日太后看奏章也不召喚皇帝同看的有時遇到皇上太後在一塊兒太后把奏章看過了便隨手交給皇帝看去皇帝看完奏章隨手放入那裝奏摺的黃紙匣子裏去他一句話也不説一憑皇太后如何做主如何批諭如今光緒帝聽説太后召他去看奏章心中早已料到有些不妙待見了太后果然見太後滿臉怒容説話之間隱隱説皇上不該獨自遊園尋快樂去皇上碰了一鼻子灰也不敢説話誰知這時珍瑾二妃被皇后召進坤寧宮裏去竟依著太后的旨意請出家法來把這兩位妃子痛痛地打一頓説他二人不該迷惑主子那珍妃模樣兒長得格外好看皇后尤其是看他不得吩咐宮女把珍妃格外打得凶些可憐珍妃是個嬌弱的身軀如何經得起這般毒打早不覺雨打梨花似的血肉狼藉待到光緒帝趕進宮去看視只見珍妃吃打得玉容失色氣息微弱見了皇帝只有嬌聲嗚咽的分兒皇帝見了不覺勃然大怒咬著牙説道好狠心的婆子總有一天也叫你死在俺的手裏一面撫著珍妃的傷處説了許多安慰的話忙傳禦醫下藥調治一面又轉身出去走到禦書房裏把總管喚來叫他快去傳翁師傅要知後事如何且聽下回分解
