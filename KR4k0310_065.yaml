body:
  text: 第六十五回金蓮貼地瓊兒被寵粉龐失色紫瑛喪生卻説明妃謀刺洪天皇不成送了小命但從此宮裏的禁衛更森嚴了暫且不表但那時的咸豐帝也仍然過著荒淫無度的日子他年紀雖輕只因好色過度宮中既有許多妃嬪園裏又住著許多美人叫他一個人血肉之軀如何抵擋得住看看身體慢慢地有些支撑不住了那宮中的崔總管為討皇上的歡心時時勾引皇帝去幹那偷香竊玉的事體他見皇帝精神不濟了不知什麼地方弄來一種極靈驗的媚藥咸豐帝服了媚藥得了妙處便朝朝和那班妃嬪尋歡仗著藥力格外玩得厲害鹹豐帝還有一種極古怪的脾氣他玩女人不揀地方不揀時候也不避人耳目他懷裏藏著媚藥不論走到什麼地方見有中意的宮女拉住便幹幹過了那剩下的媚藥也不收藏起來隨處亂丟有一天咸豐帝在園中召見翰林丁文誠那丁文誠進園來時候過早皇上還不曾叫起小太監便領他到禦書房去坐著守候那書房中擺設得十分精致丁文誠在裏面看著消遣一眼見那小茶几上白玉盆中有一串鮮葡萄紫果緑葉約有十數粒粒粒肥大這時五月天氣什麼地方來的葡萄丁文誠看了又是詫異又是心愛便忍不住伸手去摘下一粒葡萄來送在嘴裏吃著覺得十分甜美正要吃第二粒時忽然覺得一股熱氣直鑽到小肚子上那陽物忽然長大起來長到一尺許這時丁文誠穿著紗袍套那東西隔著衣服都看得出來嚇得他彎著腰兩手按著小肚子不敢走動心想如此形狀停一會皇上起來如何進見他情急生智立刻倒臥在地上大聲喊痛那班太監聽得了一齊趕來問時丁文誠推説是急痧症肚子痛得厲害他一邊嚷著痛一邊在地上打滾太監拿痧藥給他吃也是無用沒奈何太監扶著他走出園旁小門回家去一面立刻上奏説是急病不能進見這丁文誠回到家裏在床上僵睡了五天才慢慢地復原這豈不是一件大笑話嗎第二次丁文誠進園去見了咸豐旁便勸諫説皇上調養聖體最好每天飲鹿血一杯燥熱之藥切不可用咸豐帝道飲鹿血有何功效奏説鹿血為壯陽活血之妙品從此咸豐帝吩咐內務府買花鹿百數十頭在園中養著天天取鹿血吃著果然有效這時東南的太平軍勢力一天強似一天咸豐帝在宮裏天天接到打敗仗失城池的消息他越發心灰意懶後來他連文書也不願看了天天找那班嬪妃玩耍去皇帝新得了冰花十分寵愛十天倒有七八天宿在冰花宮中的那冰花見皇帝恩情深厚便也有説有笑屈意逢迎著皇帝最愛摟著妃子在白天睡覺卻叫那小太監和宮女們都在龍床前追趕跌撲著玩耍皇帝看到高興的時候自己也跳下床來打在一堆每當玩到高興的時候便拉著四個宮女走到院子裏去叫他們脫了上下衣服每人站一個牆角皇帝自己拿著一架彈弓站在臺階上拿鐵彈子向那宮女打去宮女們光著身子無可躲避嚇得渾身發抖哀聲求告著皇帝看了不禁哈哈大笑後來還是冰花上去把皇帝手中的彈弓接過來説道臣妾代皇上射去皇帝便把彈弓交給冰花那班宮女見冰花替皇帝打彈便暗暗地罵他誰知那冰花把彈弓接在手中並不射問皇帝道這四個宮女什麼事冒犯了皇上卻要拿彈子打死他們那皇帝笑著説道那宮女原不犯什麼罪只是朕看他們長著一身白肉拿彈子打破他們的皮肉看雪白的皮膚上淌著鮮紅的血豈不有趣冰花聽了笑説道原來如此臣妾卻有一個法子能叫宮女身上淌著血又不打破他們的皮肉説著便吩咐別的宮女把胭脂水灌在皮紙球裏抵作彈子打上去有打在宮女乳頭上的有打在小肚子上的有打在肩窩裏的有打在脖子上的雪也似的皮肉淌著鮮紅的胭脂水果然十分好看皇帝看了不禁拍手歡笑起來便賞這四個宮女每人一件繡花旗袍因為咸豐性格殘忍愛作踐太監宮女以取樂消除煩惱這四個宮女雖然保住了性命作踐宮女的事還是經常發生咸豐身邊有一個妃子章佳氏原也受過寵愛的如今皇帝有了冰花便把他丟在腦後章佳氏在背地裏不免有許多怨言那湊趣的宮女把章佳氏的怨言傳給皇帝知道皇帝叫把章妃傳來章妃忽聽得皇帝宣召認做是要臨幸他忙裝扮著起來皇帝見了他也不發怒仍和他有説有笑吩咐賞妃子三杯酒章佳氏是不會吃酒的如今奉著聖旨只得硬著脖子喝下肚去頓覺臉紅耳熱心跳眼花章佳氏最愛打秋千皇帝便説道章佳氏打秋千的本領是諸妃嬪所不能及的現在朕便吩咐他打秋千給大家看説著又吩咐把章佳氏身上的衣服脫去了扶他上秋千架那章佳氏酒醉了渾身打顫如何有氣力打秋千皇帝聖旨不能違背便懶洋洋地上了秋千架宮女們拿起繩子來那秋千架在空中飛動著起初飛得很低那章佳氏在上面還支撑得住後來那宮女越拉越高竟把個赤條條的章佳氏送在半天裏他在上面支援不住了便嬌聲哭喊萬歲爺救命那皇帝聽了非但不叫停止反吩咐宮女再拉高些只見章佳氏大喊一聲一脫手從半天裏拋下地來只聽得拍的一聲早已摔得頭破骨斷死過去了宮女們見了個個回過臉去不忍看他皇帝卻微微一笑吩咐內監把章佳氏尸身拖出去收殮了自己一手拉著冰花走進房去從此皇帝越發把冰花寵愛著那冰花也慢慢地恃寵而驕把皇帝霸占住了不許他臨幸別的妃嬪但是這時皇帝天天玩著冰花也有些玩厭了便不免背著冰花又做出許多偷偷摸摸的事體冰花知道了便和皇帝嘔氣皇帝也慢慢地有些厭惡起來咸豐帝最愛小腳前回已説過如今他雖寵愛冰花但冰花一雙弓鞋在四寸以上咸豐帝常對著冰花的腳歎説美中不足聽得崔總管説起揚州女人的小腳端正尖瘦在全國中算最美可惜揚州城已為太平天國占領不能前去遊幸便暗暗地吩咐太監在京城裏留心有小腳的女人想法子弄進宮來便有重賞後來崔總管依舊在宣武門外尋到一個小腳女子名叫瓊兒他原是個揚州的小家女子只因避難到京城裏來住在舅舅家他舅舅是東大街德興飯館跑堂的家中十分窮苦瓊兒住在舅舅家裏幫著舅母每天做些針線只因屋子裏又黑暗又齷齪他便搬一張小椅凳每天坐在門口湊著天光做活兒他一雙尖小玲瓏的腳擱在門檻上穿著紅鞋白襪十分清秀有在他家門口走過的人見了他一雙小腳兒誰不讚歎幾句有幾個好色的男子見了他一雙小腳便好似把魂靈吊住在他腳尖兒上每天沒事也要在他門口轉回了十七八轉再也丟不下他無奈這瓊兒面貌雖長得美麗性情卻十分貞節任那班間蜂浪蝶如何挑逗他總是低著脖子不睬後來他的名氣一天大似一天傳到崔總管耳朵裏便也前去探視果然長得不差他一雙小腳兒尤其是纖瘦動人崔總管打聽得他舅舅是飯館裏跑堂的便去找著他舅舅吳三興那吳三興正苦得走投無路聽説宮裏的崔總管來找他又聽説給他一萬兩銀子弄他到宮裏去禦廚房裏當一名廚子吃著每月五十兩銀子的俸祿只叫他把外甥女送進宮去他如何不願意如何不快活回家去便和他妻子商量他妻子便把外甥女瓊兒拉進內房去再三勸導説你性格又高傲脾氣又愛潔淨非嫁給大戶人家才能如你的心願但俺們這種人家門當戶對至多嫁一個經紀人家依舊纍你吃苦一世如今宮裏來要你你好好的進去得了萬歲爺的寵愛你也可以稱了一生的心願俺們也得攀個高枝上去豈不是兩全其美瓊兒聽他舅母的話説得有理便也依從了第二天崔總管兌了銀子悄悄地把瓊兒送進宮去皇帝在山高水長樓召見那瓊兒一雙小腳兒貼在地下只有二寸多長尖瘦玲瓏皇帝看了不覺先喝了一聲好兩邊宮女攙扶著慢慢地走近禦座前來嫋嫋婷婷地拜倒在地皇帝賜他平身瓊兒站起來那一搦腰肢和風擺楊柳似的搖曳不定皇帝把他喚近身來捏著他的手細細打量一番只見他肌膚白膩眉清目秀當夜便樓中臨幸了從此把他安頓在絳雪軒中皇帝只因瓊兒腳小終日叫兩個宮女攙扶著他走路有時在召幸的時候皇帝自己扶著他走路偶然放了手讓他一人站著他便腰肢搖擺著好似風吹蓮花皇帝越看越愛便在他房中滿地鋪著繡花軟墊瓊兒穿著白羅襪在上面走著瓊兒又喜歡清早起來在花間小步日子過得十分快活這時冰花那邊皇帝慢慢地冷淡他起來冰花打聽得皇帝新近寵上了一個瓊兒心中十分妒恨又打聽得瓊兒十分愛清潔的他便打發宮女悄悄地把污穢東西塗在花枝上清早起來瓊兒扶著一個宮女到花間去小步忽覺得一陳陳穢惡的氣息送進鼻管裏來瓊兒四面找尋看時那花枝上都塗著污穢東西連他衣袖裙衫上都染得斑斑點點急退縮時腳下踏著一大堆糞瓊兒哎唷一聲踉踉蹌蹌地逃去腳下被石子絆住他小腳兒原站不住的一個倒栽蔥那額角碰在臺階上早淌出一縷鮮血來宮女忙上去扶住走進門他聞得渾身臭味便撑不住哇的一聲翻腸倒胃大嘔起來宮女服侍他脫去衣裙香湯淋浴瓊兒撑不住便病了這一病整整鬧了一個月皇帝格外體貼他在害病的時候不叫他侍寢只在冰花宮中臨幸那冰花看看自己的計策靈驗心中十分快活後來瓊兒的病慢慢地好了皇帝又丟下他臨幸瓊兒去了冰花心中萬分憤恨他和宮女們商量總想來個斬草除根的法子暑天來到了瓊兒越發愛潔淨每天要洗五次澡洗一次頭髮他洗頭髮總在清晨時候洗過了頭髮便披在背上和宮女倆人搖一隻小艇子搖到荷花深處披散頭髮給風吹幹又把荷葉上的露珠漱著口直待到太陽照在池面上他才打著槳回宮去這個消息傳到冰花耳朵裏去冰花又有了主意便打通了太監悄悄地買了毒藥進宮來讓它溶化在水裏然後在夜深時候去倒在荷葉面上第二天瓊兒不知道去把毒藥吃在肚子裏不到半天工夫藥性發作皇帝眼看著他在床上翻騰了一會兩眼一翻死去了皇帝正在寵愛頭上禁不住摟著尸身大哭一場便吩咐用上等棺殮擡出園去埋葬從此以後這咸豐帝想起瓊兒便掉眼淚一任那班妃嬪在一邊勸著也是無用皇帝越想起瓊兒的好處越是傷心想得十分厲害便生起相思病來崔總管看看皇帝的病知道不是醫藥可以治得的便在外面暗暗物色居然給他找到一個和瓊兒一模一樣的美人兒送進宮來服侍皇帝的病這時皇帝昏昏迷迷地睡在龍床上見於那美人認做是瓊兒轉世過來的問好名字他自己説名叫紫瑛皇帝看紫瑛的聲容笑貌和瓊兒活著一般慢慢地把想念瓊兒的心冷淡下來皇帝的病痊愈以後把紫瑛封做貴妃紫瑛生長在窮苦人家卻愛讀書求著皇帝替他去請一位老先生到園中來教讀皇上心想上書房中侍讀原是不少但他們看見又納了一個新貴人便又要鬧什麼勸諫的奏章實在討厭如今不如另外去請一個老先生來在園中教讀著皇帝便和崔總管商量崔總管略一思索便想起了一個人原來這裏大柵欄有一家長安客店店中有一位姓鄭的舉人他進京來會試落在客店裏誰知會試不中回家去的盤纏又花完了流落在客店裏替人寫信寫門對換幾個錢崔總管和那長安客店的掌匱是同鄉因此常常到他客店裏去間談也常見這位落第的舉子年紀已有五十歲了花白鬍子做人極和氣如今皇帝要替紫瑛請教書先生崔總管便想起那鄭舉人來和皇帝説明了便跑到長安客店裏請去而那鄭舉人原不認識崔總管是什麼人認做他是大戶人家的二太爺如今聽他説要請自己去做教書先生便也答應了崔總管雇一輛車四面用青布圍住鄭舉人坐在裏面一點也看不見外面的景象曲曲折折地走了許多路耳中覺得離熱鬧街市漸漸地遠了車子在空曠地方又走了一陳便停住了揭開車簾一看只見一帶粉牆之內露出樓臺層頂夾著樹梢這鄭舉人認做是大戶人家的花園但心中十分疑惑既説是請先生怎麼不由大門出入卻走這花園邊門走進門去果然好大一座園林望去花木扶疏樓臺層疊崔總管領著他在園中彎彎曲曲走著踱過九曲橋露出一座月洞門來門上石匾刻著藻園兩字走進月洞門去見靠西一溜精舍曲檻紗窗走廊下一字兒站著四個書童大家上來蹲身下去齊聲説請師爺安上去打起門簾鄭舉人踱進屋子裏去見裏面窗明几淨圖書滿架崔總管請先生坐下書童送上茶來崔總管又拿出聘書來雙手遞給先生裏面封著整整二百兩白銀説這是第一個月束修先生倘要寄回家去可交給我包你不錯鄭舉人看那聘書下面具名寫著養心齋主人並沒有名姓便問你家主人什麼名字書童回説俺主人是京城裏第一位王爺先生不必問將來總可以知道如今俺王爺出門去了家裏只有女眷不便出來招呼先生先生只要好好的指教學生讀書俺王爺決不虧待你的鄭舉人看看這班下人都是大模大樣的心中很不高興又想到地方精雅束修豐厚也便勉強住了到了第二天學生出來拜見先生鄭舉人看時原來是一位絶色的美人有四個豔婢陪伴著每天讀書不到兩個時辰便進去了第二天查問功課卻都熟讀沒有遺忘的鄭舉人見學生十分聰明心中也快活每天吃著山珍海味睡著羅帳錦被書童服侍也很周到只是行動不自由莫説出園門一步便是在書房左近略略走遠些便有書童上來攔住説園裏隨處有女眷遊玩著先生須回避的鄭舉人到園中不覺又三個月了頗想到大街上去遊玩一趟將此意對書童説了書童説須去請命主人後來鄭舉人忍不住了自己偷偷地走出園去只見園外一片荒涼莫辨南北走了幾步又折回來那書童已候在門口説道這地方十分荒野常有狼豺盜賊傷人性命如必要出去須坐著驢車派人保護出去那童兒真的去雇了一乘車子來兩個雄赳赳的大漢跨著轅兒鄭舉人坐在車廂裏外面依舊用青布密密圍住車子曲曲折折地走著走有兩三個時辰慢慢地聽得市聲又在熱鬧街上走了一陳車子停住揭開布圍走下車來看時依舊在大柵欄長安客店門口客店掌匱的見了鄭舉人忙搶出來迎接又拿出兩封家書來鄭舉人看時信上面説三次彙銀子六百兩都已收到家中人口平安鄭舉人看了心中十分快活便拉這掌匱上飯館去吃酒中間鄭舉人問那教書的人家是什麼功名主人的姓名是什麼掌匱聽了只是搖搖頭説不知道兩人吃完了酒飯又在大街上間逛了一會兒兩個大漢催他上車回去從此每隔兩個月便出去一趟且説那女學生在一年裏讀的書也不少鄭舉人年老慈祥女學生也慢慢地和他親近起來説長道短每當鄭舉人問起他家裏的事體他卻絶口不肯説過了幾天看看已是年關歲尾鄭舉人在客地裏不覺勾起了思鄉的念頭正淒涼的時候那女學生從裏面出來四個丫頭扶著他鄭舉人問他臉上看時見這女學生紅潮滿頰頗有酒意鄭舉人上去問他怎麼了那女學生向先生嫣然一笑坐在椅子上動不得了忽然聽得他大喊一聲兩手按住肚子説十分疼痛接著朱唇也褪了色眼珠也定住了嚇得這四個丫頭手忙腳亂把這女學生擡進內屋去只見那班書童也慌慌張張地跑來跑去丟下鄭舉人一人在書房中他看了莫名其妙直到傍晚時候崔總管急匆匆地走出來説道可憐這女學生急病死了主人吩咐請先生出園去這裏有五百兩銀子先生拿去回到家裏千萬莫把這裏的情形對人提起説著一輛驢車已停在園門口崔總管送先生上了車關上園門進去了鄭舉人回到客店裏把這情形告訴掌匱又悄悄地問掌匱這到底是什麼人家到這時候那掌匱才告訴他你去的地方便是圓明圓那女學生便是當今皇上新納的貴人原來那女學生便是紫瑛皇帝因他愛讀書便吩咐崔總管把這鄭舉人去請來在院中讀了一年書紫瑛卻十分聰明識得的字也不少皇帝看了十分歡喜誰知那冰花打聽得皇上又寵上了一個貴人天天臨幸著自己這裏受到冷落懷著一肚子的怨恨卻故意和紫瑛好常常暗地裏來往著又送許多好吃好玩的東西給紫瑛紫瑛到底是個小孩兒的心性他哪能知道此中姦計便也和冰花好兩人背著皇上把肺腑裏的話也説了出來後來他們打夥的日子久了冰花看紫瑛慢慢地有些入港了有一天紫瑛悄悄地告訴冰花説皇上服下春藥十分精神常常一夜到天明地纏繞不休俺們女人嬌怯怯的身體如何抵擋得住冰花聽了心中越發妒忌便想了一條毒計暗暗地弄了一小瓶毒藥給紫瑛説這是提神的藥酒須早晨空肚子喝下去到夜裏自然有精神了紫瑛聽了他的話他和皇上正在恩愛頭裏要討好皇上便背著人把這一小瓶毒藥一齊倒下肚子去點滴不留他原不會吃酒的吃了這酒頓覺臉紅耳熱心頭亂跳他便忍耐著依舊上學去誰知一到了書房裏那藥力頓時發作起來這藥毒發作先封住喉嚨所以紫瑛只説得一聲痛便説不出第二句話來皇帝見自己最愛的美人快死了急得把紫瑛摟在懷裏連連嚷著召禦醫待將禦醫召進宮來紫瑛已死在皇帝懷裏皇帝見接連死了兩個美人都是中毒的樣子知道他們一定是遭人的毒手便立刻要搜查宮中要知後事如何且聽下回分解
