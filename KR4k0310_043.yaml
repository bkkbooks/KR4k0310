body:
  text: 第四十四回鶯鶯燕燕龍須纖葉葉花花雲雨樓卻説乾隆皇帝兩眼看著那樹上的大桃子那個桃子忽然自己移動起來看它離了樹枝落下地來又慢慢地在地下轉動移近岸來直到龍舟邊近看時它有房屋一般高大外面鮮豔紅潤配著兩片緑葉引得那班官員都圍著觀看正看時只聽得一棒鑼響桃子裏打起十番鼓聲鼓聲才住豁的一聲那桃兒對縫裂開變成兩半個裏面露出一座小戲臺來正搬演那群仙祝壽的故事一串珠喉唱著萬壽無疆的曲兒皇帝看時那扮皇母的正是那雪如豐容盛鬋越發出落得美豔了皇帝和他幾年不見想起舊情未免動心再看那班祝壽的仙子個個都是輕柔嬌小風光流動正看得出神的時候忽然走出一個垂髻的女郎來輕去冉冉豔絶人寰身披羽衣下曳霓裳珠喉巧轉舞袖翩翩歌舞多時看他直走下臺來手中捧著玉盤寶瓶走近船窗獻與皇上乾隆帝看他秀眉入畫笑靨承睫早不覺心旌搖蕩看他翠袖裏露出纖纖玉指養著尺許長的指爪兒乾隆帝笑問道卿可是麻姑再世朕卻要問你的小名兒是什麼女郎見問便低低地奏稱小女子賤名叫昭容接著掩袖一笑橫眸一轉皇帝急喚內監拉住他的裙角兒只見他驚鴻一瞥早已跑上臺去唱起霓裳羽衣曲滿台的女孩兒和著歌唱歌聲嫋嫋動人心魄乾隆帝吩咐賞雪如玉如意一柄碧霞洗搬指及粉盒各一個金瓶一對緑玉簪一對赤瑛杯一白玉杯一珠串一挂昭容也賞玉如意一柄金瓶一對緑玉簪一對珠串一挂其餘女郎各賜緑玉簪一支珠串一挂雪如在臺上領著一班女孩謝賞到了晚上雪如昭容兩人被傳下禦舟侍寢昭容原是雪如的妹子豆蔻年華洛神風韻皇帝看他嬌憨可憐越發寵愛他第三天把汪如龍宣上禦舟去又賞他二品頂戴銀錢五十兩叫他先趕回揚州去照料一切那汪如龍領了聖旨謝恩出來回到揚州便耀武揚威地越發不把江鶴亭放在眼裏江鶴亭見汪如龍得了好處便和惠風在暗地裏預備新奇的煙火接駕和汪如龍爭勝那汪如龍卻睡在鼓裏禦舟到了揚州那日皇帝在高樓上文武百官兩旁陪侍起初只見對面漆裏一片慢慢地露出一點火星來那火星四處亂滾愈滾愈大忽然拍的一聲火星爆裂滿地紅光紅光中現出一株大樹來滿樹桃花在火光中層動那花朵兒愈大一霎時花謝蒂落枝條上結著一串桃子那桃子又漸漸地大起來內中有一個最木的從樓上落下來從中裂開兩半個桃子向左右移開變成兩座戲臺一座臺上搬演西遊記的故事妖魔鬼怪變幻無窮一座戲臺上裝出莊嚴寶相上面蓮臺上坐著一尊觀音衆仙女在下面膜拜停了一會那邊戲臺上的孫行者演一出偷桃的戲把一盤仙桃偷了出來這邊戲臺上走下一個仙女來接過盤子去直獻到皇帝座前乾隆帝看時又是一個絶色的女郎見他低鬟斂袖嫵媚天然便笑道江南地方真多美人這句話一説早有一個內監上去把他留下了三位美人輪流著伺候皇上皇上好似進了迷魂陳那禦舟在河心裏行著兩岸的官紳忙著迎送皇帝也沒工夫傳見那禦舟出了揚州地界忽然聽得兩岸有嬌聲唱曲的皇帝推窗一望只見兩岸有兩隊婦女一隊穿著青色衫裙一隊穿著紅色衣褲兩隊約有一百個女人個個都長得妖嬈白淨每人肩上都背著一條五色的纖繩那一百支小繩子都歸總在兩大支纖繩上面這兩大支纖繩用五色捆帶子纏著綁在禦舟的一株牙杆上牙杆下面插著繡花的小龍旗從船頭上密密地直插到船尾上船的兩舷又有兩隊婦女打槳一隊是女尼穿著紺青色的衣衫一隊是道姑穿著絳色的衣裳個個臉上施著脂粉妖媚萬狀船上的打著槳岸上的拉著纖輪流唱著妖豔的曲兒皇帝看了不覺心花怒放回頭問太監道這是什麼太監回奏道這是揚州紳士江鶴亭孝敬的名叫龍須纖皇帝再看時見岸上遍種著桃柳桃花如火柳葉成蔭一紅一緑相間成色那桃柳樹下又攔著錦幛每隔一裏築著一座錦亭亭中帷帳袍褥色色齊備皇帝問那亭子做什麼用總管回奏説是預備婦女們休息宿用的乾隆帝笑道兩岸風景很美朕也想上岸看他們去太監聽了忙吩咐停船皇帝踏上船頭百官們上來迎接扈從著皇帝走進錦亭去見裏面妝台鏡屏陳設得十分精美皇帝吩咐傳那四班婦女進來第一班穿紅色衣褲的是孤女長得柳眉杏靨嬌小可憐第二班穿青色衣裙的是寡婦雅淡梳妝別饒風韻第三班便是女尼第四班便是道姑妖冶風流動人心魄皇帝見了他們不禁笑逐顔開伸過手去撫著他們的粉頸捏著他們的纖手那班婦女便覺得十分榮耀傳旨下去每人賞一個金瓶銀錢五百塊又叫留下陳四姨王氏汪二姑玉尼四人那陳四姨是青衣隊魁首雖説是一個孀婦卻是年輕貌美萬分妖嬈那王氏是道姑的魁首長得玉立亭亭神韻清遠兩人得了皇帝的召幸便曲意逢迎拿出全副本領來勾引把個皇帝弄得顛倒昏迷十分快樂那汪二姑是紅衣隊的班頭玉尼是女尼的班頭講到他兩人的姿色實在勝過陳四姨和王氏兩人一笑傾城雪膚花貌這四隊中的婦女有誰趕得上他那種美豔無奈他兩人都長著桃李之姿冰霜之操都因為不合皇上的心意可憐一個死在亂棍之下一個死在水裏那汪二姑原是窮村家女他父親以賣水果度日二姑因從小死了母親便自操井臼雖説亂頭粗服但他那副美麗的容光總是不能遮掩的村坊上見了這個天仙的女孩兒如何肯輕輕放過他便有幾個無賴常常到二姑家裏去胡鬧後來惱了二姑的父親把那無賴告到官裏官廳派了幾個差役來把無賴捉去從此這汪二姑的美貌連官府也知道了此番江鶴亭承辦接駕要討皇上的好兒便想出這龍須纖的法子來四處搜尋婦女知道二姑的美名便托官府用重金去請來那二姑起初不肯後來他父親貪圖錢多再三勸説二姑沒奈何也只得去了到了那裏自有管事婆婆給他香湯沐浴披上錦繡施上脂粉頓覺容光煥發妖媚動人管事婆婆便派他做紅衣隊的領班這時皇帝先召陳四姨和王氏進去傳説出來他兩人得了皇帝的臨幸得了上萬銀錢的賞賜那班婦女聽了誰不羡慕停了一會聖旨傳汪二姑進去那汪二姑知道這一進去凶多吉少便抵死不肯進去無奈那兩個太監氣力很大拉著他兩條臂兒硬拽進去在亭外的人只聽亭子裏二姑的哭聲十分淒慘接著兩個太監慌慌張張地出來把個朱家女拉了進去那朱家女兒姿色也長得不差現當著紅衣隊的副班頭只因汪二姑見了皇帝十分倔強便喚朱家女兒進去替他這時亭子裏面有許多婦女候著半晌只見一個小太監扶著那朱家女兒出來大家看時只見他雲鬢蓬鬆紅霞滿臉低著脖子出來那髻兒上早巳插著一支雙鳳珠叉鳳嘴裏含著一粒桂圓似大的明珠只説這一粒珠子也值到一萬塊錢再看他臂上套著一對金鑲玉琢的釧兒衆婦女圍著看他口中嘖嘖稱羡又停了一回太監出來傳喚侍衛們把汪二姑的尸首拖出去便有兩個侍衛進去把汪二姑的尸首橫拖豎拽地拋出亭外只見那尸首雙目緊閉血迹模糊大家見了這情形便去問朱家女兒那朱家女兒説道我走進亭子去只見皇帝手裏拖著汪二姑二姑一邊哭吵著一邊抵拒著惱了皇上把他推在地下喝聲拉下去打死只見走出兩個太監來手中拿著朱漆長輥揪住二姑頭髮到隔室去這時我正受著皇帝的臨幸耳中聽著二姑的慘號聲嚇得早已魂靈出了腔子想來那二姑是被太監打死的了大家聽了朱家女兒的話不覺寒毛倒豎驚詫不已後來二姑的父親尋到這地方來地方官推説二姑是急病死的他父親也無可奈何只得把女兒的棺材拿回埋葬當時還有一個玉尼見二姑死得如此淒慘知道自己當著女尼班頭免不了這醜事他覷著旁人不留心的時候咕咚一聲跳在水裏那管事的怕給皇上知道惹起公案來便也聽他淹死不去救他一面另選了一個尼姑獻出去伺候皇上皇上此次一路遊玩召幸的共有十六個女人這都是江鶴亭一人的心思財力皇帝心中也感激他便把江鶴亭宜召進去當面稱讚了一番賞他紅頂花翎又吩咐江寧藩司賞銀六十萬兩那江鶴亭感激皇帝的恩德便把自己家裏的樗園獻與皇上他那樗園造得曲折幽勝原是隋煬帝迷樓的舊址揚州人稱它做小迷樓園裏面有挹勝軒延曦閣當風亭揚柳台藏春塢夢蕉廊碧城十二樓等幾處名勝的地方皇帝得了這座樗園便把那班召幸過的女人安置在各處名勝地方裏面那碧城十二樓又算得風景最好的地方江鶴亭又把自己最寵愛的姨太太郭氏獻與皇上那郭氏雖説嫁了江鶴亭只因他年紀太小還不曾破身那郭氏伺候皇上的第一晚還是一個處女皇帝萬分歡喜把他住在碧城十二樓上封他做煙花院主那郭氏有一個大丫頭姓蔣年紀也有十八歲了生性卻十分放蕩他伺候男人的時候卻什麼把戲都玩得出來這時候不知怎的卻勾搭上了皇帝皇帝一生玩女人卻不曾經過這味兒便又把蔣氏百般地寵愛起來皇帝到杭州去把這婦女都寄在樗園裏面獨把這蔣氏帶在身旁禦舟航行到了蘇州地方皇帝忽然想起金閶女閭妙甲天下朕貴為天子深恨不能享民間之樂當時便把這意思對總管太監説了那太監十分解事便悄悄地去叮囑接駕的官員又因為日間皇帝公然宿娼招人議論在人靜的時候用蒲輪小車把那金閶名花送上禦舟來粉白黛緑共有三十六個吳儂輕語花柳嬌態早把這位風流天子心眼兒醉倒了皇帝吩咐設宴那三十六枝名花輪流把盞又各唱豔曲一折皇帝左擁右抱目眩心迷早忍不住摟著幾個絶色的真個消魂去了直玩到四更向盡那班妓女辭謝了皇帝上岸坐車去了這皇帝一路來眠花宿柳都瞞著皇太后的耳目一來因皇太后的坐船在禦舟後面不甚覺得二來那太后手下的宮監都得了皇帝的好處凡事替他遮瞞況且皇帝如有臨幸不是上岸去在官紳家裏便是深夜悄悄地將人弄上船來叫這位年老龍鍾的太后如何知道皇帝此番南下種種的風流事體卻瞞不住那正宮富察後在皇帝心中只知道富察後遠在京城耳目決不能及誰知他這時卻悄悄地躲在太后舟中那富察後少年時候和皇上十分恩愛他如今見皇帝愛偷香竊玉心中如何不惱又打聽得皇上第一次南巡寵幸雪如在京城裏又寵幸三姑娘此番南巡皇后便求著皇帝要一塊兒出去皇帝不願意皇后便和太后説通了扮著太后的侍女混出京來悄悄地躲在太后船中一路上派幾個心腹太監把聽皇帝的舉動他見皇帝如此荒淫心中如何不惱只因皇太后十分溺愛皇帝皇帝種種無道的事體也不便告訴太后自己又是私自出京的更不能直接去見皇上因此他一路忍耐著如今見太監報説皇上把許多窯姐兒接上船來玩耍把個富察後氣得愁眉雙鎖玉容失色他原想立刻趕到禦舟上去勸諫又怕當了窯姐兒的面羞了皇上聽那禦舟中一陳陳歌舞歡笑皇后心中十分難受他原是深通文墨的便回艙去拿起筆來寫了一本極長的奏章勸皇上保重身體不可荒淫寫到傷心的地方不禁掩面痛哭哭過又寫那宮女太臨在一旁伺候著勸又不好勸得皇后寫完奏章看岸上時正是燈火通明車馬雜遝那班妓女辭別皇上登岸回院的時候皇后悄悄地説道這班妖精走了俺可以見皇上去了他便匆匆地梳妝了一會抹去臉上的淚痕手中拿著奏章任你太監宮女們拉住他的衣角死死的勸諫他總不肯聽那總管太監急得爬在皇后腳下連連碰著頭説道皇上正快活時候娘娘這一去不但得不到好處反叫皇上生氣那時不但奴才的腦袋不保怕娘娘也未便況且時候已四更打過了那班窯姐兒也去了皇上正好睡娘娘縱有奏章待天明以後奴才替娘娘送去豈不是好娘娘聽了止不住又流下淚來嗚嗚咽咽地説道皇上這樣荒淫眼見得天怒民怨國亡家破便在眼前俺和皇上終是夫妻情份如何忍得如今便主意已定拼著一死總要去見他一面俺倘然死在禦舟上你們便把俺的貼身衣服和皇後寶璽送去俺父親大將軍家裏只説俺因苦諫皇上而死皇后説到這裏哽咽痛苦萬分不能説話了一倒身坐在椅子上宮女上去服侍洗臉送茶停了一會皇后止住了哭突然一縱身從椅子上直跳起來嘴裏説著俺終須要見皇上去飛也似地走出後艙只因前艙有太后睡著怕驚醒了他皇后這時從後艙踏上跳板那宮女太監們忙去攙扶著皇后一邊走著兩眼望著前面的禦舟忽然見那禦舟桅杆上挂著一盞紅燈閃閃爍爍射出光來皇后看在眼裏只氣得話也説不出來伸著手向那紅燈指著兩眼一翻倒在宮女們的懷裏暈絶過去了慌得那班宮女不敢聲張又不敢叫喚扶著皇后回船艙去輕輕地拍著皇后的胸口又灌下參湯去皇后才慢慢地清醒過來那眼淚又不覺直淌下來皇后見了禦舟上的紅燈為何如此傷心只因宮中的規矩皇帝在屋子裏倘有召幸那屋子外面便點著一盞紅燈叫人知道回避又叫人不可驚動皇上的意思如今在禦舟上那盞紅燈沒有地方可以挂便挂在桅杆上因此皇后見了知道皇上有寵幸的人心中不覺一酸眼前一陳黑便暈絶過去待到醒來吩咐到禦舟上去打聽誰在那裏侍寢那太監去打聽回來悄悄地報説如今在禦舟上侍寢的有三個人一個是蔣氏是從揚州帶來的兩個是方才留下的窯姐兒皇后聽了不覺歎了一口氣説道皇上敢是不要命了嗎俺越發不能不去勸諫了説著聽得遠遠的雞聲喔喔皇后説道五更時分了皇上也可以叫起了便整一整衣裳悄悄地走上岸去宮女們扶著太監們隨著前面照著一對羊角小燈慢慢地走近禦舟來禦舟上值夜的侍衛和岸上守衛的兵土見皇後忽然到來慌得他們忙爬下地去跪見太監傳著皇后的懿旨不許聲張驚動了皇上那守頭艙的太監見皇后突如其來臉上的氣色十分嚴厲慌得他們都縮過一邊不敢聲張皇后也不用人通報走進中艙見桌上放著三五隻酒杯兒杯中殘酒未冷桌下落著一隻小腳鞋兒金錢紅菱十分鮮豔皇后看了輕輕歎了一口氣他便直入後艙只見錦帳繡帷正是皇帝的寢室要知乾隆皇帝見了富察後如何發付且聽下回分解
