body:
  text: 第九十五回開賄賂奕劻鬻爵興賭博小德擺莊卻説紹興府提審女俠秋瑾那秋瑾並不畏懼因和府是他的義父意為這嫌疑罪名必可設法開脫的不料知府忽然反面無情坐起了大堂把驚木一拍大聲喝道秋瑾你將怎樣的私結黨羽勾通革命從實供了免得本府用刑秋瑾見他突然翻臉便大聲叫道義父你也下井投石嗎那知府怕他牽連自己忙用衣袖遮著臉勉強支吾道什麼依附不依附你罪狀已經核實不容抵賴喝令鞭背花四十收了監待上詳處決就這樣含含糊糊地退堂了後來秋瑾在軒亭口處斬臨刑時高聲説道我不過一點革命嫌疑罪不至於死萬不料因結交了官場轉送了性命後人如愛與官場往來望以我為鑒説罷引頸受刑一時瞧著的人都齊聲嗟歎又罵知府無情而且貪功枉送別人的頭顱去博自己的富貴不是殺不可赦嗎這且按下不提再説清廷見革命黨不時鬧事此殄彼起簡直一月數見似這般不安逸哪里能不設法補救呢這時張之洞等一班大臣都主張立憲以順民意民心一平革命自然而然地絶迹了西太后説也很贊成這個主張於是即派載澤等赴海外各國去考察憲政載澤等領了諭旨正待動身卻在正陽門外被吳樾放了一炸彈出洋的五大臣中倒傷了兩人這樣一來清廷十分震驚立憲的念頭益發堅決了當下只得另訂日期再料理出洋其時慶親王奕劻秉了大權那時黨羽如耆善良弼載洵鐵良蔭昌等等都握著重權奕劻的為人非常地貪婪一切的政事聽任群小擺布自己只知以聚斂為事西太后自西安回鑾之後於政事也不大問訊斂財的一道卻絲毫不肯放過因為在拳亂之前西太后有私蓄金圓一千五百多萬八國聯軍入京西太后倉皇出走這金圓都給內監們竊盜乾淨西太后回宮一查見分文也不剩很覺得可惜所以對內監們常常説起非恢復所失不止奕劻乘得了這個機會乘勢假名斂錢只説是孝敬太后實在十分之八倒落自己的腰包後來斂錢的名目越來越多了江蘇的上海道台缺是最稱肥美每年須貢銀十萬兩叫做太后的脂粉費疆吏如撫台以下藩臬兩使到任先繳五萬元名叫衣料金諸凡文武官員一概都要貢獻銀兩數目的大小不論職級高下只講缺的瘠肥這樣的公然聚斂官吏們怎能不貪因此清末的政治腐敗到不堪官之在任惟計金錢的多寡一若賣買之盈餘一般苦了小百姓多方的受著盤剝無不叫苦連天清廷的滅亡奕劻也算一個拆臺的大主角阿到了最後的時期因地方官吏已剝無可剝了奕劻又想出別法來索性大開賄賂之門官爵居然標價出售了例如知縣五千元知府一刀元官職一級級的大上去錢也一萬二萬的增加上去所不能辦到的只有王位和公爵這兩種是較重一點白身是不能買到但二品以上的對於公爵還可以設法咧獨剩下王爵算無人問津自賣爵的門一開但須錢多不論是烏龜強盜目不識丁的就立時可以上任於是奕劻的邸中頓時城門如市一班有做官熱的富翁都奔走他的門下也有三四人合夥共捐一官一個出面上任其餘的跟著到了任上揀緊要的地位把住大肆搜括得了錢除去資本大家朋分這樣的弊病百姓起初如睡鼓中吃了苦全不知道不期事有湊巧甘肅的地方有甲乙丙三個酒店夥計因買賣蝕了本很為懊喪那甲忽異想天開道現今官吏這般剝削小民做生意是萬不會發財的了我們要想發迹非做官不行乙丙同笑道就給你做了官也沒這資格阿甲正色説道如今做官還問什麼資格只要有四五千塊立刻是個知縣老爺了乙丙聽了心動便七拼八湊弄了幾千塊錢叫甲去捐知縣不多幾天青田縣丁艱出缺甲竟去補上了然在上任之先三人預訂契約甲做了知縣乙丙為跟班等到一至任上乙丙占了簽押房和收發處狠命地撈起錢來卻各人入自己的腰包那甲的官聲當然狼藉不堪被知府把他劾革甲既失了官依然兩手空空乙丙倒成了富翁甲以徒得虛名心裏老大的不憤就拿所訂的契約和乙丙興訟承審官問了口供為之絶倒當時將三人重責一頓追出貪贓充公只好了這位承審的官兒甲乙丙算枉費心機可是這事漸漸地傳揚開來當作官的笑史清代官吏大都是這一類的人怎不亡國呢間話少説言歸正傳且説奕劻賣官鬻爵弄到了錢有時也略為孝敬些西太后西太后在這時也明知奕劻貪婪卻無法禁止他自己也只知聚斂一味含含糊糊地過去到了光緒末葉行政已窳敗得不可收拾了然而西太后的私蓄失去一千五百萬已完全補足之外還增加了二千萬那時宮廷裏面李蓮英等已老的老了死的死了最是得勢的內監要推小德了這小德原姓是張宮中都稱他小德張他進宮的時候年紀還只得十八歲容貌卻異常地秀麗小德張的母親因只有此子自然格外愛惜一點及至長大起來吃喝嫖賭沒有一樣不幹把他老子的遺産只做潑水般地用出去他的母親勸他不住氣得一病不起竟追隨他的老子去了小德已沒有拘束越發無法無天不到半年將家資弄得乾乾淨淨末了無可為生就去投在小王的門下那小王是清宮一個內監見小德相貌秀媚便勸他道似你這般容貌如肯淨身時咱保你一生富貴受用不盡小德張真個聽了他的話將生殖器割去由小王把他舉薦入宮小德為人很是伶俐因此不多幾時西太后就令他做了小監的首領在自己身邊服侍但小德張到底是個小人他受著太后的寵容在宮中無所不為他平生最好的是賭便和一班內監賭起那青龍白虎來西太后對於搖寶也略略懂得就命小德張搖著骰子自己同了宮嬪內監們押注這賭風一開闔宮的人都弄起來了內監們因賭錢爭執甚至互相鬥毆宮內的規例至此也紊亂了一天小德張擺莊西太后和福晉格格在一邊下注西太后正閉著眼細細地揣著骰路小德張故意按著盆蓋高聲喊道開啦開啦西太後睜目怒道誰教你這種下流腔小德張慌忙叩頭道奴才本來不知這個法子去年有個山西候補徐子明他叫奴才這樣的他説倘是押注的揣著骰路便有輸無贏了似這般一叫押注心慌了不問好歹下注自然忘了骰路就不易押著了西太后見説不覺微笑點頭但這消息傳出宮去到了候補道徐子明的耳朵裏就大言道我的賭錢連當今皇太后都知道咧於是在山西設了賭場公然聚賭了山西知府陶景如將他拘禁劾去道銜徐子明在獄中大索供張知府不勝其擾又在上峰面前説他老病把他開脫徐子明一脫身依舊大賭特賭官府也無可如何這也算是官場怪現象中的趣史阿那小德張既在宮中有這般的勢力一班不得志的內監自然是要趨奉小德了但許多宮婦嬪妃中無不聽小德張的吩咐所不受他指揮的只有隆裕皇后一人説也奇怪小德張平時西太后之外沒一個畏懼的惟獨對於隆裕皇后卻是唯命是聽所以隆裕皇后也極相信小德張的話説這樣一天天地下去小德漸漸變做詩候皇后的人了宮廷之間不免穢聞彰著西太后因礙于衆議不得不將小德驅逐出宮後來兩宮晏駕隆裕後仍把小德張起用還聽了他的主張起造水晶宮哩不過那時清運已然不久告終了這是後話暫且按下卻説隆裕後自和光緒皇上在醉中摔斷玉簪後西太后知道二人始終不睦的了當下隔不幾時令皇后遷出扆香殿就在頤心閣裏居住隆裕後以皇上這般薄情心上自然鬱鬱不樂然自小德進宮百般在皇后面上獻媚討好皇后由此很喜歡小德無論一事一物凡是小德做的都説是好換一人去做了便不稱心了宮裏的內監曉得內中緣故自己樂得退在後頭如皇后的遣使一概是小德一人包辦有一天上正值細雨濛濛西太后乘雨遊園皇后因推病不曾隨駕其餘的嬪妃一齊跟著其時瑾妃也在那裏不料天雨越下得大了西太后就令妃子們各自回去休息瑾妃卻冒著雨急急地走著因為西太后的索性最喜的是微雨中遊玩一班嬪妃也只好隨在後面雖有了傘也不敢張阿往時西太后冒雨遊園妃子和福晉格格都硬著頭皮淋雨倘西太後坐轎便也紛紛坐轎西太后如步行大家只得步行這天下雨出遊瑾妃曉得西太后的脾氣所以沒有備傘等到了遊完回來衣上潮濕自然急於更換了當下瑾妃三腳兩步地走著經過頤心閣下忽聽裏面一陳的咳嗽聲吐下一口痰來在吐的人原是無心的哪知撲地一下不偏不倚恰恰吐在瑾妃的臉上瑾妃起先卻毫不在意地走過經這一口痰唾在面上倒猛然記起皇后來了他想皇后不是説有病不來侍候太后遊玩了嗎我既知道了應該去請安的免得被責有失禮節主意打定悄悄地望那頤心閣上走去瑾妃的腳步很輕又加地上都鋪著紅毯以故皇后在裏面一點也不曾覺察等到瑾妃走進了門口皇后只當是小監哩便在內喝問道誰在外面亂闖嬪妃進見帝後都得小監預先報知瑾妃是走慣了的所以不先通稟現在隆裕後一問倒嚇得站住了腳不敢進去皇后見他猶豫不前自然疑惑起來就起身走出來瑾妃一見忙請了安即隨著皇后走進去時瞧見小德還倚在榻上皇后這時故意放下面孔喝道你還不快收拾啦誰叫你如此放肆小德原料不著瑾妃會悄聲匿迹地跑來在皇后問訊的時候他依然很大意地臥著哪里曉得冤家路窄偏偏瑾妃來請安了只得慌忙起來一邊手足無措的進退都覺不好幸得皇后一言把他提醒趕緊去找著拂塵胡亂地拍弄一會但隆裕後終是心虛那粉面不由得紅了起來瑾妃是很識趣的見他們這種情形心裏早已明白因和皇后搭訕了幾句辭了出來回他的瀛台去了瑾妃住在瀛台本是服侍光緒帝的光緒皇上自那天吐血之後病症沒有輕鬆過而且在昏瞀之中不時咬齒怒目痛恨著皇后今天瑾妃于無意中瞧見這麼一出鬼戲要待不告訴皇上卻恨那皇后在太后面前攛掇幾次令自己受著苦痛假使説與光緒帝知道他在病中轉令多增氣惱瑾妃沈默了一會終至於將目睹的情狀細細地對光緒帝講了一遍光緒皇上聽罷早從榻上直跳起來無恥的婆子俺且和你算帳説著要穿了衣服往見西太后去慌得瑾妃玉容失色急急地阻攔道皇上病體初痊正宜靜養這事早晚可以解決的阿況且當時臣妾所親見的一旦鬧了出來不是又纍及臣妾麼光緒帝沈默半晌道俺既經得知了若不給他一點厲害以後還當了得嗎現在就不去告訴太后俺只把小德懲警一下就是了説著便呼小監去召小德來瀛台見駕小內監去了那小德待瑾妃出去知道已惹出禍來便對隆裕皇后説道小妖此去萬一皇上追究這事須皇后包庇奴才則個皇後見説不覺恨恨地道不知怎的會給狐媚子瞧見那都怪自己太大意了但皇上是和我不睦的你未嘗不曉得得知其要同我認真我也無奈何他的恐怕我自己還保不定咧小德聽了做聲不得只呆呆地立在一邊正發這當兒忽見小監來召小德皇后曉得其事發作便眼看著小德默默不語小德沒法只有戰戰兢兢地隨著小監一步懶一步地往瀛台而來由小監引到榻前小德見皇上怒容滿面地坐著嚇得跪下慌忙叩頭俯伏著不敢起來光緒帝大聲説道你幹的好事俺也不和你講什麼喝令內監捆打一百送往太后那裏發落去內監領了諭旨將小德拉了出去責打完畢光緒帝隨手寫了小德無禮四個字令內監押著送到西太后面前其時西太后已得了消息正宣了皇后過去埋怨了一會忽見內監押了小德來了便回頭命皇后避開小德一見西太后就仆地跪了眼中流著淚道求老佛爺饒恕西太后説道這可是你自己不好我也不便專主現皇上即令我發落宮中自容不得你了那麼你趕快收拾了出去罷小德只得磕了一個頭起身去料理了些衣物出宮去了當下光緒帝責打小德之後心裏還是怒氣不息又加病體危弱經這一氣病又增添了幾分了從此那病症就天天沈重起來到了這年的冬天光緒帝已骨瘦如柴神形俱失看看已去死境不遠了不期革命的首領孫文黃興在暗中運動了越民結連守備的軍隊又舉起事來他們的計劃是從越南出兵攻打鎮陽關占了幾座炮臺聲勢十分浩大鎮陽關的總鎮張惠芝發電告急李俊彥提督領了大兵會同張惠芝和革命軍血戰到底清兵衆多革命黨沒有後援遷延時日餉盡兵疲被清兵殺得落花流水各自逃命孫文黃興見大事不成又白送了許多性命便大哭一場亡命海外而去然這音耗傳來西太后很為憂慮光緒聽得革命黨屢屢興兵鬧事諒來如此鬧下去終非了局因此心裏愈覺愁悶病也越難好了一天的晚上光緒帝忽然氣喘不止漸漸地急促起來瑾妃一頭替他按摩一面叫小監飛報西太后不到一刻西太后已同了太醫來了診斷即畢太醫便奏道皇上的病因元氣已傷動了肝風所以氣喘不住倘然這般的不止還須防昏厥咧一時七八個太醫都一樣的説法西太后見説才也有點著急了於是命瑾妃小心侍候自己匆匆回到養心殿立刻召軍機大臣連夜進宮議事這時張之洞已卸職只有那桐一班人了衆臣進宮見了西太后禮罷西太后就將皇上的病勢對衆人宣布了並説道如皇上有不幸這大位是誰繼續呢慶親王奕劻奏道從前所立溥俊現因端王遣戍那溥俊是不能入繼的了但屈指算來若承繼穆宗毅皇帝時還是從溥字一輩上選擇西太后點頭説道我也籌思過溥字輩中除了醇親王之子溥儀恭親王之子溥勳外其餘載洵既屬遠支他的兒子更比溥儀等幼稚而且載洵的為人實不足付與大政我以為就溥儀或溥勳二人中選擇一人罷不過衆親王的主見不知怎樣奕劻頓首道那是國家大政自然是老佛爺宸衷獨斷的何必咨詢親王們的同意因一是宗族關係和政事完全兩樣的求老佛爺明鑒那桐也奏道慶王之言極是奴才也是這個意思西太后説道話雖有理但大權究屬皇上我不過代主而已今決然由我下命將來不怕他們另起波折嗎奕劻忙道那可不必過慮到了臨時再行解決不遲西太后正和衆臣計議忽聽內監報説皇上昏過去了要知後事如何且聽下回分解
