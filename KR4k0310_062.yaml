body:
  text: 第六十二回美人計宣嬌救阿兄烈女行文宗罷選秀卻説當時洪宣嬌把如何被那大漢姦拐流落江湖上如何遇到蕭朝貴蕭朝貴又如何替他報仇殺死了人亡命出來一一説了洪秀全正想利用蕭氏的家財如今聽了他妹子話正合心意當下便勸朝貴入了上帝教拜過教主秀全又説朝貴始得入道只怕他心志不堅且朝貴年富力強會中要借用他的地方很多常常要打發他出外辦事去暫時不能成親須待三年以後夫妻方可團圓便把蕭朝奉接上山來叫宣嬌跟著公公一塊兒住著卻打發朝貴出門勸道去後來蕭朝奉因住在山上不方便洪秀全便安排他在桂平縣大黃江地方那地方沿江都是高山山上樹木茂盛有一個山主姓楊名嗣龍少年英俊他手下養著四五千工人每日在山上砍樹燒炭後來也投到玉平軍裏來如今且把太平天國的事兒擱起再掉過筆頭來説清宮的風流天子那咸豐皇帝不是説很英明嗎又有孝貞那樣賢德的皇后輔佐著便該把這朝政一天一天地弄興旺起來誰知這時朝政早已被道光皇帝寵信的穆彰阿弄壞了弄得天怒人怨洪秀全又打進南京建立了太平天國半個天下已不是滿清皇帝的了咸豐皇帝看看大勢已去索性每天躲在宮中醇酒婦人竭力尋其快樂去日子多了宮中這幾個妃嬪他漸漸地玩厭了便有總管太監獻計向八旗官宦人家挑選秀女去揀有姿色出衆的獻與皇帝臨幸這個旨意一下那京中的八旗人家頓時慌亂起來你想誰家肯把好好的女兒葬送到永世不見天日的深宮裏去便有許多人家把女兒藏起來但那班太監們耳目十分繁多誰家有幾個女兒誰家的女兒多大年紀他們平日都打聽在肚子裏如今聽説宮中要選秀女那班有女孩兒的人家早已被太監們看守住了你便要逃避也不能了到這時候幾個有錢的人家便暗地裏送幾百兩銀子給管事的他便放你過去你若沒有銀子那女孩兒免不了要和他父母生離死別了那時有一個姓喜塔臘的當了名驍騎校小武官年老無子膝下只有一個女兒名叫愛姑因他長得聰明伶俐相貌美麗父母便自幼拿他當男孩兒看待一般的給他讀書識字愛姑肚子裏讀得很通很懂得大義他又做得一手好針線活計家中貧寒便靠他做些針線又在家中設一個學堂教幾個蒙童換幾個銀錢養著父母這一年宮中挑選秀女也把愛姑的名字寫在册子上了愛姑知道了哭得死去活來打算帶了父母逃走可被官裏看管著行動不自由了沒奈何到了日子跟著太監進宮去在坤寧宮外甬道上侍候著這時宮門外女孩有一百多個了個個嚇得玉容失色珠淚雙流太監們看見了還要吆喝著不許啼哭稍稍倔強太監手中的鞭子便向嫩皮膚上抽下來愛姑看在眼裏已是十分憤怒誰知他們從天色微明去站班直站到日光西斜也不見皇帝出來這時正是大冷天氣宮門外地方又空曠北風又大刮得這班女孩個個皮膚青紫渾身索索打顫他們肚子又餓又私急了有幾個女孩兒禁不住哇的一聲哭了出來管事太監大怒舉著皮鞭惡狠狠地打下去愛姑這時耐不住了便搶過太監的鞭子響響亮亮地説俺們離了家門拋了父母到這地方來倘然選上了便終身幽閉在深宮裏不見天日想到這兒那得叫俺們不哭正喧鬧的時候忽然唵唵幾聲咸豐帝出來了大家頓時靜寂無聲皇帝這時臉上有憤怒之色大家嚇得越發不敢作聲獨有這愛姑嘴裏還嘰哩咕嚕説個不休太監暗暗拉他的袖子他也不睬皇帝的軟嬌已走到他跟前問他説些什麼太監推他上去愛姑便跪下來説道如今南方大亂半壁江山已屬他人不聞皇帝請求將帥保祖宗大業反迷戀女色強奪民間女兒幽閉在宮中皇帝只圖縱欲不思保全社稷眼看這滿清天下要給皇帝送去小女子既到這地方來早已將生死置於度外刀斧俺都不怕只為皇上不敢呢這咸豐皇帝正在氣憤頭裏呢聽了愛姑這一番正大光明的話不覺把氣平了下去怔怔地向愛姑臉上看了一回冷笑了一聲一摔袖子説道好好都帶他們出去吧朕不選秀女了總管太監聽了皇帝的吩咐只得把這班女孩一一送還家去從此京城裏的人都知道愛姑是個才貌雙全的女子大家搶著來求親後來愛姑到底嫁了一個滿尚書的公子一雙兩好地過日子挑選秀女這一天皇帝和皇后在宮中吵了嘴皇后勸皇帝罷了選秀的事體説如今南方大亂皇上每天辦理軍務還不得空間哪有工夫去挑選秀女一句話觸惱了皇帝便大怒起來説皇后有意吃醋皇后是最賢德的平生最怕這吃醋的名氣如今聽皇帝説他他真是一肚皮冤屈無訴處不免和皇帝爭辨了幾句他兩人從上午爭吵到下午所以那班女孩在宮門外直站了一天皇帝出宮來聽了愛姑幾句一肚子沒好氣便把選秀女的事體作罷咸豐皇帝天生有一種古怪脾氣他在宮中玩妃嬪玩得厭了説滿洲婦子粗蠢笨直沒有那漢人的婦女好玩他宮中雖有幾個漢女但都是姿色平平又是近山東直隸地方人高大身體天然大腳皇帝是愛小腳的又愛南方的女人他説南方女人嬌小溫柔裙下雙鈎尤是尖瘦動人因此咸豐在沒有人的時候常問太監京城裏有南方的窯姐嗎太監崔三生性十分狡猾他見皇帝有尋花問柳的意思平日就在外邊各處間逛京城地面的情形他打聽得十分明白這時見皇上問他他便悄悄地奏道皇上貴體想那花賤質如何配伺皇上莫説京城地面那蘇杭地方的窯姐兒很少便是有那些齷齪地方皇上也是去不得的皇帝説朕如今想南方的女子想得切你有什麼法子領朕出去玩玩便是好人家女兒朕去見一回和他説幾句話兒也是有趣的崔三見皇帝急了便道這裏宣武門外面住的都是南方紳宦人家奴才有時打宣武門外走過見靠晚時候那些牆門口都站著些小腳兒娘兒們個個都長得粉妝玉琢似的嬌滴滴地説著蘇杭話煞是好看原來蘇杭地方的婦女都有站門口的習氣每到夕陽西下姊妹們在深閨繡倦便拉著手間站去那些油滑少年都在這時候打扮著大街小蒼間逛著以一飽眼福當時咸豐皇帝聽了崔三的話心癢癢的巴不得到宣武門外逛去他和崔三説通了兩人改扮著悄悄溜出宮去騎兩匹白馬直跑出宣武門外到大街上買些筆墨紙張等物自稱是四川的陳貢生又上館子去吃點心延挨到傍晚兩人便上馬慢慢地在街頭巷尾間走著果然見兩旁牆門口站著許多婦女蠢的俏的老的少的個個打扮得花枝招展的露出半面向門外探頭兒越是小腳兒卻故意把裙幅兒挂得高高的露出尖尖的一雙紅菱似的小鞋幫兒來還有那長得俊俏的卻故意躲在人後露出一點粉臉來偷看街上的男子見有人走來他故意把身體縮回去把門遮住臉待那男子走過了便伸出頭來看著男子的背影低聲俏氣地批評著這鹹豐皇帝自幼生長在深宮裏不曾到外面來逛過如今他第一次出來遊街坊見了大街上的熱鬧情形又見了許多美貌的女婦把他眼也看花了只是騎在馬上笑得合不攏嘴來要知後事如何且聽下回分解
