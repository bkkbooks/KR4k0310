body:
  text: 第五回割發要盟英雄氣短裂袍勸駕兒女情長桃花馬上紅粉嬌娃看他一雙小蠻靴輕輕地踏住金鐙一雙玉纖手緊緊地扣住紫韁回眸一笑百媚橫生渥濟格跨在馬上怔怔地看著魂靈兒虛飄飄的幾乎跌下馬來那美人兒看他呆得可笑又回過頭來低鬟一笑勒轉馬頭跑去這渥濟格如何肯舍便催動馬蹄在後面緊緊跟著八個馬蹄和串子線似的一前一後走著看看穿過幾座林子抹過幾個山峽那美人忽地不見了這地方是個山谷四面高山夾住好似落在井圈子裏腳下滿地荊棘馬蹄被它纏住一步也不能行動渥濟格癡癡迷迷的如在夢中那顆頭如潑浪鼓似地左右搖擺著尋找那美人一眼見那妙人兒立馬在高岡上對他微微含笑渥濟格見了好似小孩子見了乳母似的撲向前去無奈滿眼叢莽那馬蹄兒休想動得一步渥濟格急了忙跳下馬來撥開荊棘向叢莽中走去那樹枝兒刺破了他的頭面刺藤兒拉破了他的衣袖他也顧不得了腳下山石高高低低跌跌仆仆地走著可憐他跌得頭破血流他也不肯罷休賣盡力氣走到那山岡下面看看那峭壁十分光滑上去不得渥濟格四面找路時也找不出一條可以上山的路只有那高岡西面在半壁上略略長些藤蘿渥濟格鼓一鼓勇氣攀藤附葛地上去幸得有幾處石縫還可以插下腳去爬到半壁上已經氣喘噓噓滿頭是汗渥濟格也顧不了這許多便鼓勇直前看看快到山頂那山勢愈陡了誰知渥濟格腳下的石頭一鬆動撲落落滾下山去這時渥濟格腳下一滑身體向後一仰跟著正要跌下山去那山岡上的那美人看了到底不忍便急忙伸出玉臂來上去把渥濟格的衣領緊緊拉住渥濟格趁勢一躍上了山岡一陳頭暈倒在那美人的腳下這美人看渥濟格的臉兒倒也長得十分俊美心中不覺一動又看他滿身衣服扯得粉碎和蝴蝶一般那頭臉手臂都淌出血來那美人兒從懷裏掏出汗巾來輕輕地替他拭著汗巾上一陳香氣直刺入渥濟格的鼻管裏他清醒過來睜眼看時正和美人兒臉對臉地看個仔細他有一張鵝蛋似的臉兒擦著紅紅的胭脂一雙彎彎的眉兒下面蓋著兩點漆黑似的眼珠發出亮晶晶的光來格外覺得異樣動人再看他額上罩著一排短髮一綹青絲襯著雪也似的脖子越發覺得黑白耀眼最可愛的那一點血也似的朱唇嘴角上微含笑意渥濟格趁他不留意的時候便湊近臉去在他朱唇上親了一個嘴那美人霍地變了臉了緊蹙著眉峰滿含著薄怒一摔手轉身走去渥濟格急了忙上去拉住他的衣角兒那美人回過臉來正顔厲色地問道你是什麼地方的野男人一句話不曾完便颼地拔出刀來便砍渥濟格伸手扼手他的臂膀一面把自己的來蹤去迹説明白了又接著説了許多求他可憐的話那美人聽他説是都督的侄兒知道他不是個平常人又看看他臉上十分英俊聽他説話又是十分溫柔便把心軟了下來微微一笑把那口刀收了回去渥濟格又向他屈著膝跪了下來説願和他做一對夫妻那美人聽了臉上罩著一朵紅雲低著頭説不出話來禁不住渥濟格千姑娘萬姑娘地喚著他便説了一句你留下你的頭髮來一摔手跨上馬飛也似地下岡去了這割下頭髮來的一句話是他們滿族人表達男女私情最重要的一句話意思説男人把頭髮割去了不能再長愛上了這個女人不能夠再愛別的女人了女人拿了男人的頭發這一顆心從此被男人絆住了那美人説這句話原是心裏十分愛上了渥濟格只因怕羞便逃下山去了這裏渥濟格聽了這美人嬌滴滴甜蜜蜜的一句話早已把他的魂靈從腔子裏提出來直跟著那美人去了他怔怔地站著細細地咀嚼那一句話的味兒不由得他哈哈大笑起來笑過了才想起我不曾問那美人的名姓家住在什麼地方他想到這裏便拔腳飛奔直追下山岡去你想一個步行一個騎馬如何追得上渥濟格一邊腳下追著一邊嘴裏姑娘姑娘地喊著追到山下滿頭淌著汗看不見那美人人兒的蹤迹渥濟格心中萬分懊悔一轉眼見他自己的馬卻在那裏吃草他便跨上馬垂頭喪氣地回去渥濟格回到得都督府裏他的伯媽見他臉上血迹斑斑身上衣服破碎不覺嚇了一大跳忙問時渥濟格便一五一十地説了出來他伯母和他姊姊聽了不覺笑得前仰後合他姊姊還拍著手説道阿彌陀佛這才是天有眼睛呢我媽媽好好的替你説媒你卻不要今天説什麼美人明天説什麼美人如今卻真正説出報應來了渥濟格這時正一肚子骯髒氣沒有出處只聽他姊姊們冷嘲熱罵把他一張玉也似的臉兒急得通紅雙腳頓地説道我今生今世若不得那美人兒做妻房我便剃了頭髮做和尚去正説著他伯父覺昌安一腳跨進門來見了他侄兒問道你怎麼悄悄地回來了我打發人上東山上找你去呢福晉笑著説道你知道嗎這位小貝勒在東山上會過美人來呢覺昌安忙問什麼美人他大格格又搶著把這番情形告訴他父親渥濟格撲地跪在地下求他伯父替他想法子去找尋那美人務必要伯父做主把那美人娶回家來他伯父原是很愛這侄兒的便滿口答應説既是在我們左近的女孩兒想來不難找到的我的好孩子你不要急壞了身子從此以後覺昌安便傳出命令去找尋那美人不消三五天工夫便把那美人查出一個下落來原來那美人並不是寧古塔人是那巴斯翰巴圖魯的女兒長得有沈魚落雁之容閉月羞花之貌今年二十歲了他父親十分寵愛遠近各部落裏的牛録貝勒都向巴斯翰來説媒巴斯翰總一概拒絶他心裏早有一個主意他想我女兒這樣一個美人胎子非嫁一個富貴才貌樣樣完全的丈夫不可因此他凡是有來説媒的他看不上眼的便也不和女兒商量一概回絶了過了幾天覺昌安忽然振人來向巴斯翰求親巴斯翰見堂堂都督居然來向他求婚當初認做都督自己要娶去做福晉心中萬分願意只是嫌覺昌安年紀大些怕對不起女兒不然都督的兒子要娶他女兒去做妻房年紀又輕將來又是一位都督卻也算得富貴雙全待那人開出口來卻是替都督的侄兒來説媒心裏已是有幾分不願又聽説在東山上和他女兒見過面難免裏面沒有調戲的事體心裏越發不願意只是礙於都督的面子不好立即回絶只説請渥濟格小貝勒自己來當面談談俺們先結一個交情慢慢地提親事罷巴斯翰的意思也想看看這渥濟格品貌如何過了幾天那渥濟格居然來了一走進門便大模大樣的他自以為是都督的侄兒你這一個區區巴圖魯真不在我眼裏當下他便對巴斯翰説道令嬡在什麼地方請出來俺們見見巴斯翰聽了不由得勃然大怒便冷冷地説道小女生長深閨頗守禮教不輕易和男子見面的渥濟格説道我和他將來有夫妻之份見見也不礙事巴斯翰不待説完接著説道小貝勒卻來得不巧了昨天俺已經把小女的終身許給別人了渥濟格忙追問許給了什麼人巴斯翰説道是俺女兒自己作主許給董鄂部酋長克轍巴顔的兒子額爾機瓦額了渥濟格不聽此話時猶可聽了此話不由得他三魂暴跳七竅生煙兩隻眼珠睜得大大的説不出話來半晌才説得一句果然是令媛自己作主的嗎那巴斯翰冷笑一聲不去睬他渥濟格急了颼地拔出一柄腰刀來巴斯翰認做他要廝殺忙也拔下腰刀拿在手裏誰知渥濟格並不是殺人只見他一舉刀把那支辮發齊根割了下來向桌上一丟説道請你拿這個去給令嬡看我渥濟格今生今世若不得令嬡為妻也算不得一個頂天立地的奇男子説著他便頭也不回大步走出門去了董鄂部的額爾機瓦額原也向巴斯翰求過親他的人品才貌巴斯翰也深知道勉強也配得上他女兒如今見事體急了巴斯翰便給他個迅雷不及掩耳在三天之內真的把他女兒嫁到董鄂部去風聲傳到渥濟格耳朵裏愈加恨入骨髓不多幾天那額爾機瓦額一個人騎著馬在八達山下間逛忽然從山坳裏跳出九個大漢來七手八腳把額爾機瓦額拖下馬來九柄鋼刀一齊下去早斬成肉泥隔著兩天克轍巴顔才在山中找出他兒子的尸首來巴顔膝下只有這個兒子叫他如何不傷心痛恨他一面收拾兒子的尸首一面查拿凶手到處貼下告示説倘然有人知道凶手的名姓便賞一百頭牛一百匹馬和十斤金子這個消息一傳出去便有人沸沸揚揚説九個凶手裏面也有一個叫渥濟格的只因渥濟格是建州衛都督的侄兒沒有人敢出來出首可憐瓦額好好一個英俊男子只因娶了一個美貌妻子送去了自己的性命尸首擡進城去他父親巴顔看見親生兒子遭人毒手弄得血肉模糊心中好不淒慘抱住尸身一場大哭他媳婦兒也跟著嬌啼宛轉一聲郎君一聲兒天哭得一屋子的人個個酸心人人下淚正在傷心的時候外面報説巴斯翰巴圖魯來了巴顔正要出去迎接巴斯翰已經走進內院來見了他女兒一把拖住他女兒跪在父親面前口口聲聲説要求爹爹替丈夫報仇巴斯翰勸住了女兒的哭一面對他親家巴顔説道我在外面打聽得謀死你兒子的不是別人正是那建州衛都督的侄兒渥濟格巴顔聽了便十分詫異忙問渥濟格和我兒子前世無仇今世無怨為什麼要下這般毒手巴斯翰吃他一句話問住了一時回答不出話來回過頭去向他女兒看了一眼他女兒起初見丈夫遭人毒手滿肚子懷著怨恨如今聽説那凶手是渥濟格不覺臉上一紅心腸一軟回想到從前和他在山岡上相見那種癡情的樣子後來親自上門來求親割下頭髮來那種熱烈的愛情我原不該辜負他的只因我父親一時固執打破我倆的姻緣如今鬧出這一場禍來真是前世的冤孽他想到這裏見父親正回過頭來看他由不得他低低歎了一口氣拿羅帕掩住粉臉踅進內房去了巴斯翰見女兒進去了才把那渥濟格和他女兒的前因後果原原本本地説了出來巴顔不聽猶可一聽了這個話不禁氣憤填膺開口便罵老糊塗你女兒在家結識了情人不該害我的兒子巴斯翰也不肯讓他兩親家在屋子裏對罵起來他們關外人性情特別暴躁一言不合便拔刀相見當時他兩親家各個拔下佩刀來兩廊下的侍衛聽屋子裏鬧得不成樣子忙進去勸開了一面把巴斯翰送出去巴顔的福晉也出來把丈夫勸了進去巴顔兩夫妻看看膝下空虛終日愁眉淚眼十分淒慘巴顔終究耐不住到了第七日上他渾身換了戎裝上了大校場喚齊部下各城章京各個帶了本城的軍隊齊集聽令巴顔站在將臺上把渥濟格如何謀殺瓦額建州衛人如何欺侮董鄂部人説得慷慨淋漓部下的兵士聽了個個摩拳擦掌髮指目裂巴顔教訓過一番接著步馬兵士操演陳圖到晚各自搭帳休息巴顔這夜也不回家露宿在營帳裏帳外火把燒得通明號角鳴鳴巴顔獨坐帳中想起兒子死得可憐不由他滿腹悲憤好似萬箭穿胸正寂寞的時候忽見侍衛進來報説外面有奉哈達汗和索長阿部主來見巴顔聽了不覺嚇了一跳這奉哈達汗是關外數一數二的國王他手下有雄兵一萬名城數十座都聽他的號令輕易不出來找人的如今連夜到董鄂部來一定有什麼重大事件巴顔忙出去迎接一看奉哈達汗的軍隊也有二三千人遠遠地扎住奉哈達汗騎在馬上見了巴顔忙跳下馬來笑容滿面兩人手拉手兒地走進帳來索長阿部主也跟在後面三人坐下巴顔吩咐預備酒席一會兒酒席擺齊巴顔讓奉哈達汗坐在首位索長阿部主坐了客位酒過三巡奉哈達汗便開口説道我連夜到此不為別事只得知你和建州衛都督的侄兒渥濟格結下了深仇兩家各自調動兵馬預備廝殺我如今來給兩家做一個和事老可好麼奉哈達汗説到這裏停住了暫時不説巴顔一肚子的怒氣叫他如何一時答應得下只是低著頭不説話奉哈達汗接著又説道你兒子是吃九個強盜殺死的九個強盜裏面也有一個叫渥濟格的你須明白這個渥濟格不是那個渥濟格那個渥濟格是堂堂都督的侄兒他豈肯做這樣盜賊狗竊的行為如今都督覺昌安為兩家和氣要緊特意托我出來給你兩家講和現在他侄兒渥濟格親自帶了牛羊金帛在營門外聽令你若肯時便吩咐傳他進來當面謝過罪還叫他拜在你膝下做一個幹兒解了你多少寂寞你若不肯我也帶著三五千精兵在此看誰先動手我便打誰奉哈達汗説到這裏立刻把臉沈了下來巴顔害怕奉哈達汗的勢力不容他不答應奉哈達汗的調解回想到殺了之仇又萬無講和之理他儘自沈吟著講不出話來忽然耳邊一片鑼鼓喇叭的聲音外面接二連三地報進來説渥濟格公子親自來犒師現在營門外聽候部主的命令巴顔看看奉哈達汗兀自沈著臉索長阿部主眼睜睜看住他臉上露出一種凶惡的神氣來不由他不點頭答應侍衛出去一片聲嚷説請渥濟格公子一會兒公子大腳闊步地走進來見了巴顔急搶上幾步行了全禮又退下去恭恭敬敬站在一旁巴顔起初見了渥濟格原是一腔憤怒一轉眼看看渥濟格那種英俊秀美的風度站在眼前好似玉樹臨風他原是很喜歡男孩兒的見了不由他心腸不軟下來怎麼又經得起渥濟格滿嘴的乾爹長乾爹短早把他一肚子的冤仇丟向爪哇國裏去了營內外擺列著大塊的牛肉羊肉大籮的金銀綢帛犒賞軍士那軍士得了賞賜便齊聲嚷道多謝公子營帳裏面重復擺上酒席渥濟格親自把盞勸酒巴顔年老貪杯又是這樣一個英俊少年站在他跟前耳朵裏聽著親密的説話不覺開懷暢飲早把他灌得酩酊大醉當夜三個人都留在帳中寄宿一霄到了第二天一清早起來巴顔帶領著進城直到部主府中又帶領渥濟格到內院去拜見福晉把收渥濟格做幹兒和凶手又是一名叫渥濟格的原因説明那福晉見了渥濟格這樣一個漂亮人物早歡喜得無可無不可他膝下正苦寂寞見了這幹兒便留他住在府裏每天給他好吃好玩這時他媳婦見了渥濟格一個是新寡之婦一個是前度劉郎兩人背著人説不盡的舊恨新歡山盟海誓快樂光陰容易過去渥濟格在府中一住十天渥濟格自己也帶著一千兵士來駐扎在城外看看渥濟格進城去不見他出來認做被巴顔殺死了大家鼓噪起來把一座城池團團圍住口口聲聲説還我主將外面報進府去渥濟格正和他的心上人在花園中説笑遊玩難捨難分後來還是那媳婦想出一條計策來慫恿他對巴顔説董鄂部和建州衛本是一祖所生現在分做十二處形勢渙散倘有別外兵馬到來怕一時照顧不到還不如兩家合在一起如今建州兵強將廣你老人家搬進建州城去住有我叔叔保護著也可以過幾天安間歲月享幾年福免得提心吊膽這一番話果然打動了巴顔的心他帶著妻子媳婦跟著渥濟格搬到建州城去住建州都督覺昌安不費一兵一卒之力得了董鄂部許多城池渥濟格又因和巴顔一處住著頗多不便便又在董鄂部中取得兩處部落和他心上人搬去一塊兒住著從此覺昌安叔侄兩人的威名一天大似一天占據的城池也一天多似一天話説索長阿部主在一旁看了害怕建州人慢慢地侵犯到他的地界上來便打發兒子吳泰去求他親家哈達萬汗王台借兵這時王台手下稱女真部族有城池二十餘座精兵數萬人人見了害怕當時王台便答應借他雄兵五千保守各處城池説定建州衛今倘然不犯我們的地界我們也各守疆土不去侵犯別人但是他們的擔心並不是多餘的還是那個建州都督覺昌安他有五個兒子好似五個大蟲個個帶了兵馬到處侵城掠地打劫村坊大兒子叫禮敦巴圖魯第二個兒子名額爾袞第三個兒子名界堪第四個兒子名塔克世第五個兒子名塔克篇古這五個兒子裏面要算禮敦格外英雄出衆他在千軍萬馬之中往來馳聘匹馬當先如入無人之境這時他們直打到蘇克蘇滸河部把全部的城池都收伏下來部中有一座圖倫城只因不肯投降建州人吃他殺得尸骨如山血流成河滿洲地方各部落聽了這消息人人嚇得魂飛魄散王台看著事體緊急便派人到明朝去進貢又密奏建州人強橫不法的話明萬曆皇帝便想借重他以毒攻毒又查王台的祖父速黑忒也曾受過明朝的封號便封王台做哈達部的右都督官又吩咐遼東經略使派兵送他回部王台得了明朝的榮龐便十分強橫起來各處部落投降他的也一天多似一天他在中間暗暗地出死力抵抗建州人和蒙古人不讓他侵犯明朝的疆土覺昌安親自帶兵和他打仗建州人便把王台恨入骨髓這時建州地方有一個健將名叫王杲他手下有一大隊狼虎兵爬山如虎渡河如狼他軍隊所到的地方不用交戰便嚇得敵人下馬歸降五嶺以東一帶地方都是他一個人收伏下來的覺昌安也便另眼看待他常常備下酒席兩人在府中相對吃酒有一天是他們滿族人的娘娘節各處娘娘廟裏打唱跳神十分熱鬧家家也備下酒菜接待賓客那時都督府中自然也是賓客如雲酒肉如林王杲便要算裏邊一個上客他帶了兒子阿太入席當時阿太年紀只十八歲長得好像玉樹臨風英秀不在渥濟格以下酒吃到一半裏面覺昌安的妃子打發人拿出許多荷包煙袋來賞給親族子侄輩的連阿太也得了一個荷包散席以後照例要到內室去謝賞阿太也隨著衆人進去這天都督的家中也大開筵席那五位貝勒的福晉各個帶了子女都在府中赴席內中要算塔克世的大福晉喜塔喇氏長得最標致能説能笑進屋子只聽他説笑的聲音他一見了阿太便一把拉住了説道阿唷長得好俊的小子説著把他推到覺昌安妃子身旁去他婆婆已是老眼昏花把阿太拉進身去對他臉上身上仔仔細細地看著把個阿太看得不好意思嫩臉通紅起來喜塔喇氏和塔克世的次妻納喇氏在一旁拍手大笑還有禮敦的福晉和妯娌們都團團圍定了看他妃子笑説道人家嬌生慣養的哪里見過你們這班潑辣女人的陳仗兒還不快放尊重些你們不看見他小臉兒脹得通紅了怪可憐兒的接著納喇氏説道婆婆天天抱怨找不到一個好女壻如今這位奇兒大概可以上得婆婆的眼了我們快不要錯過了留他住在府裏配我們的女孩兒呢一句話提醒了妃子説道好阿我們把孫女兒配給他罷大孫女兒便是禮敦的大女兒也長得面龐圓潤體格苗條當時禮敦的福晉聽了便接著説道婆婆説好總是好的你老人家的眼光決不會有錯正説著都督外面進來他本來有聯絡王杲的意思一聽了這個話便竭力慫恿説好禮敦夫妻兩人原不願把女兒嫁到遠地去只因父母作主也不敢反抗不多幾天都督府裏辦起喜事來當然十分熱鬧建州部下各處章京不消説都來送禮賀喜便是蘇克蘇滸部渾河部王甲部哲陳部鴨緑江部瓦爾喀部庫爾哈部葉赫部滿洲地方有名的部主都來道賀都督派人一一招待這一場熱鬧算是建州地方數一數二的大事那阿太娶了大孫女做妻子那大孫女面貌又長得十分標致性情又十分和順夫妻兩人又十分恩愛那嶽父嶽母和妃子又看侍得他十分好他落在溫柔鄉中真有樂不思蜀的樣子到底大孫女關心丈夫的前程悄悄地去替阿太求他的祖父都督看在自己孫女兒面上便封阿太到古埒城去做一個章京大孫女得了這個功名心中十分快樂忙催著他丈夫動身到古埒城去到任誰知阿太兒女情長英雄氣短只是迷戀著妻子不肯去一任他妻子再三勸説他總是不去不覺惱了這位夫人他把臉上的胭脂一齊洗去又把身上穿的一件錦繡旗袍扯得一片一片和蝴蝶一般又翻身跪在他丈夫跟前嗚嗚咽咽地哭個不住阿太也摟住妻子撲簌簌地滴下眼淚來要知後事如何且聽下回分解
