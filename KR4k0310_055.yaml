body:
  text: 第五十五回崇節儉滿朝成乞丐慶功勞一室做餓夫卻説那太監原是內苑的總管他的下臣又離瓊島春陰甚近凡是董氏一舉一動他都知道當時他對王森説道自你妻子董氏進宮以後皇上十分敬愛他每天皇上坐著看董氏捏塑西湖十景常常讚歎稱他絶技董氏每天工作完畢皇上總有賞賜的或是寶珠或是衣服董氏也伴著皇上或下一局棋或説笑一會兩人雖十分親密卻是各不相犯的這幾天皇上因為被瑩嬪管住了不曾到瓊島春陰來董氏一個人住在屋子裏做工到昨天晚上忽然鬧出亂子來了那太監説到這裏王森的臉也青了太監還勸他莫急壞身子又接著説道昨夜宮裏才打過三更忽聽得有開動宮門的聲音俺在睡夢中不聽得十分清切停了一會俺又睡熟去了只聽又是一聲窗戶開動的聲音恍惚是在瓊島春陰裏接著又一聲女人叫喊的聲音俺才忍不住了急披衣起來喚醒同伴搶到瓊島春陰正屋裏去只見董氏睡的屋子裏窗戶洞開著走進屋子去看時那床上的被褥攪得一團糟那睡鞋兒金叉兒沿路散著直到窗戶外面欄杆邊還落下一支玉簪兒卻已打得粉碎了這玉簪兒是董氏平日插戴的俺還認得出來只是那董氏不知到什麼地方去了今天一清早俺們去奏明皇上皇上也打發人四處找尋後來見太液池水面上浮著一件小小紅襖兒看那領口袖子的鑲邊皇上認識是董氏平日穿的忙喚會水的鑽到水底去四處撈尋卻又毫無形迹王森一句一句地聽著起初早已支撑不住了只望他妻子還有救星如今知道他妻子是不得救的了他覷著太監不防備的時候只喊得一聲我的苦命妻子一縱身向後樓窗口一跳太監忙上前拉救已來不及了那座湖樓高出湖面五六丈王森跳下去直撞到水底那湖面又很闊可憐他一對恩愛夫妻只因這絶藝卻不料送掉了一雙性命嘉慶帝自從見了董氏因他生得貞靜美麗天天對他坐著看一會心中便得了安慰如今不見了這位美人想得他好苦他年紀已六十歲了精神也衰了心裏有了悲傷的事體也無心管理朝政了所有一切大小國事統統交給滿相國穆彰阿處理那穆彰阿相國又是一個貪贓枉法的姦臣他做了宰相把國事弄得更壞特別是廣東因鴉片的案件和英國交情一天一天地壞起來弄得全國不得安寧百姓怨恨那班禦史官紛紛上奏章參他卻被穆相國派人在暗地裏把那參折一齊捺住了不送進去這時智親王旻寧也隨侍在行宮卻有十分孝心的誰知嘉慶帝因想念董氏想得厲害那瑩嬪和別的妃子又常常在皇帝跟前鬧著嘔氣年老的人又傷心又氣惱不覺病了這一病來勢很凶智親王天天在屋子裏衣不解帶地服侍父皇嘉慶帝一病三個月看看自己不中用了便召集禦前大臣穆彰阿軍機大臣戴均元托津等一班老臣在榻前寫了遺詔大略説朕于嘉慶四年已照家法寫下二皇子旻寧之名密藏正大光明匾額後朕逝世後著傳位於二皇子智親王旻寧汝等身受厚恩宜盡心輔導嗣皇務宜恭儉仁孝毋改祖宗成法欽此這道諭旨下了的第二天嘉慶帝便死了智親王回京在太和殿上即位受百官的朝賀改年號稱道光元年説也奇怪這道光帝在年輕的時候十分勇敢性情也豪爽舉動也漂亮到大婚發後忽然改了性情十分吝嗇起來登了大位以後在銀錢進出上越發精明起來自從嘉慶帝沒收和珅大量家産以後皇宮原是十分富厚但道光帝卻天天嚷窮説做人總須節儉見了大臣們總勸他們節省費用那班大臣們都是善於逢迎的聽了皇上的話便個個裝出窮相業內中第一個刁滑的便是那穆相國他每次上朝總穿著破舊的袍褂皇帝見了便稱讚他有大臣風度他卻忘了穆相國在外面做的貪贓枉法窮奢極欲的事體不多幾天朝的臣子都看著他的樣個個穿著破舊袍褂從殿上望去好似站著兩排叫化子那皇帝是個化子頭從此以後官員們也不改穿新的袍褂了一時京城裏舊貨鋪子裏的破舊袍褂都賣得好價錢起初還和新袍褂的價錢一樣有許多官宦人家把嶄新的袍褂拿到占衣鋪子裏去換一套破舊的穿穿後來那舊袍褂越賣越少了那價錢飛漲竟比做兩套新的還貴有幾個官員無法可想只得把新的打上幾個補子在衣襟袖子上故意弄齷齪些皇帝看了才沒有説話冬天到了大家都要換皮衣了家裏原都藏著上好的細毛皮因怕受皇帝的責備大家都忍著凍不敢穿武英殿大學士曹振鏞卻是天性愛省儉的和道光皇帝可以稱得一對兒因此道泖皇帝也和他十分談得入港每天總要把這位曹學士召進宮去長談大監們認做皇上和大學士那裏談國家大事誰知留心聽時每天談的都是些家常瑣事有一天曹學士穿一條破套褲進宮去那兩隻膝蓋上補著兩個嶄新的掌道光皇帝見便問道你補這兩個掌要花多少錢曹學士稱奏三錢銀子皇帝聽了十分驚異説道朕照樣打了兩個掌怎麼內務報銷五兩銀子呢説著揭起龍袍來給曹學士看曹學士沒得説了只得推脫説皇上打的掌比臣的考究所以價格格外貴了道光帝歎了一口氣從此逼著宮裏的皇后妃嬪都學著做針線皇帝身上衣服有破綻的地方都交給後妃們修補內務部卻一個錢也不得沾光弄得那堂司各官窮極了都當著當著過日子道光皇帝還嫌宮裏的開銷太大又把許多宮女太監們遣散出宮叫他們去自謀生活偌大一座大內弄得十分冷落有許多庭院都封鎖起來皇帝也不愛遊玩終日在宮裏和那班妃嬪們做些米鹽瑣屑的事體他又把宮中的費用細細地盤算一番下一道聖旨內庭用款以後每年不得過二十萬銀元那班嬪妃終年不得添制新衣大家都穿著破舊衣衫便是皇后宮裏也鋪著破舊的椅墊皇帝天天和曹學士談談越發精明起來了那曹學士平日花一個錢都要打算盤他家中有一輛破舊的驢車家裏的廚子又兼著趕車的差使曹學士每天坐著車來早朝出來趕到菜市便脫去袍褂從車廂裏拿出菜筐和稱稈兒來親自買菜去和萊販子爭多論少常常為了一個錢的上下兩面破口大罵到這時曹振鏞卻要拿出大學士牌子來把這菜販子送到步軍衙門辦去那菜販子一聽説是大學士嚇得屁滾尿流忙爬在地上磕頭求饒到底總要依了他那曹學士占了一文錢的便宜便洋洋得意地去了他空下來常常在前門外大街上各處酒館飯莊裏去打聽價錢他打聽了價錢並不是自己想吃他卻去報告皇上那皇上聽了便宜的菜便吩咐內膳房做去説也可憐道光皇帝只因宮中的萊蔬很貴卻竭力節省照例每餐禦膳總要花到八百兩銀子後來道光皇帝只吃素菜不吃葷菜每桌也要花到一百四十兩銀子若要另添一樣愛吃的菜不論葷素總要花到六七兩銀子皇帝便是吃一個雞蛋也要花五兩銀子有一天皇帝和曹振鏞間談便問起你在家可吃雞蛋麼曹學士奏稱雞蛋是補品臣每天清早起來總要吃四個氽水雞蛋皇帝聽了嚇了一跳説道雞蛋每個要五兩銀子你每天吃四個雞蛋豈不是每天要花二十兩銀子麼曹學士忙回奏道臣家裏原養著母雞臣吃的雞蛋都是臣家中母雞下的道光皇帝聽了笑道有這樣便宜事體養了幾隻母雞就可以吃不花錢的雞蛋當下便吩咐內務部去買母雞在宮中養起雞來但是內務部報銷每一頭雞也要花到二十四兩銀子道光帝看了也只得歎一口氣第二天曹學士又從前門飯館裏打聽得一樣便宜葷菜來進宮見了皇上便説前門外福興飯莊裏有一樣豆腐燒豬肝的葷菜味兒十分可口價錢也十分便宜道光帝問豆腐豬肝朕卻不曾吃過不知要賣多少銀子一碗曹學士奏道飯莊裏買去每碗只須大錢四十文皇帝聽了直跳起來説道天下哪有這樣便宜的菜便吩咐內監傳話到內膳房去從明天起旁的東西都不用每上膳只須一碗豆腐燒豬肝便了內膳房正苦得沒有差使無可沾光如今忽奉聖旨點道菜便派委了幾個內膳上街忙忙地預備起來第二天午膳便上了這道萊道光帝吃著果然又鮮又嫩便是這一樣菜連吃了十天當內務府呈上帳目來道光帝一看卻大吃一驚光是這豆腐燒豬肝一項已花去銀子二千餘兩下面又開著細帳計供奉豆腐燒豬肝一品每天用豬一頭計銀四十兩黃豆一鬥銀十兩添委內膳房行走專使殺豬二人每員每天工食銀四兩豆腐工人四名每員每天工食銀一兩五錢此外刀械鍋竈豆腐磨子和搭蓋廚房豬棚等共需銀四百六十兩又置辦雜品油鹽醬醋共需銀兩一百四十五兩以上備膳一月計共需銀二千五百二十五兩道光帝看了這帳單連連拍桌子説道糟了糟了立刻把內膳房的總管傳上來大大訓斥了一場又説前門外福興飯莊賣四十文一碗偏是朕吃的要花這許多銀子以後快把這一項開支取銷要吃豆腐燒豬肝只須每天拿四十文錢到前門外去跑一趟便得了那總管回奏説祖宗的成法宮中向不在外間買熟食吃的道光帝聽了把袖子一摔説道什麼成法不成法省錢更是了那總管聽了不敢做聲只悄悄地跑到前門外去逼著福興飯莊關門又取了四鄰的保結回宮來奏明皇上説福興飯莊已關了門這豆腐燒豬肝一味無處可買第三天皇帝特意打發曹學士到前門外踏勘過後他才相信從此取消了這一味豆腐燒豬肝那內膳房又沒得沾光了便在背後抱怨皇帝説再照這樣清苦下去俺們可不用活命了隔了一個月宮裏又舉行了大慶典了這時大學土長齡打平了回疆把逆首張格爾檻送京師道光帝親禦午門受俘以後便在萬壽山玉瀾堂上開慶功筵宴吩咐內膳房自辦酒菜皇帝又怕內膳房太耗費銀錢便傳旨須格外節儉當時請的客除楊威將軍大學士威勇公長齡以外還有十五個老臣這許多人擠了兩桌桌面上擺著看不清的幾樣菜這班大臣卻不敢舉箸只怕一動筷便要吃光吃光了是很不好看的那道光帝坐在上面也不吃菜也不吃酒只和大臣們談些前朝的武功後來又談到做詩便即席聯起句來有幾個不會做詩的卻請那文學大臣代做做成一首八十韻的七言古詩記當時君臣之樂又吩咐戴均元把君臣同樂畫成一幅畫在席上談論足足兩個時辰茶也不曾吃得便散席了這時是嚴冬道光帝見大臣們都穿著灰鼠出風的皮褂子便問你們的皮褂單做出風要花多少銀兩內中有許多人都回答不出來獨有曹學士回奏説臣的皮褂單做出風須花工料銀二十兩道光帝歎道便宜便宜朕前幾天一件黑狐皮褂只因裏面的襯緞太寬了打算做一做出風交尚衣監拿到內務府去核算竟要朕一千兩銀子朕因太貴至今還擱在那裏不曾做得曹學士聽了回奏道臣的皮褂是只有出風沒有統子的説著便把那袍幅的裏子揭起來大家時果然是一片光皮板只有四周做著出風道光帝看了連説妙又省錢又好看穿皮褂目的是取暖做不做出風是無關緊要的從此以後那班大臣穿的皮褂卻把出風拉去一時裏官場裏都穿沒有出風的皮褂了穆相國外面雖裝出許多寒酸樣他家裏卻娶著三妻四妾又養著一班女戲子常常請著客吃酒聽戲走過他門外的只聽得裏面一片笙歌因此有許多清正的大臣都和他不對只因道光帝十分信任他説他是先帝顧命之臣凡事聽他主張那穆相國在皇帝面前花言巧語哄得皇帝十分信任只有曹學士不喜歡他他倆人常常在皇帝面前爭辨皇帝常常替他們解和那穆相一天驕傲似一天無論京裏京外的官員倘然未孝敬到他他能叫你丟了功名因此穆相國家裏常有京外官員私送銀錢珍寶來那時有個福建進士林則徐曾外放過一任杭嘉湖道後來做江蘇按察使升江西巡府他為官清正所到之處百姓稱頌皇帝也十分器重他這時英國的商船常常把鴉片煙運到中國來在廣東一帶上岸中國人吃了煙形銷骨立個個好似病息一樣林則徐上了本奏摺説鴉片不禁國日貧民日弱數十年後不惟無可籌之餉抑且無可用之兵道光帝看了這奏章十分動容便把他升任兩廣總督進京陛見又説了許多禁煙的話道光帝給他佩帶欽差大臣關防兼查辦廣東海口事務節制廣東水師林則徐忽然太紅了早惱了一位姦臣穆彰阿那林則徐進京來又沒有好處送穆相國門下那穆相國便忌恨在心看看林則徐一到廣東便雷厲風行逼著英國商船繳出二萬零三百八十箱鴉片煙來放一把火燒了那英國人大怒帶了兵船到福建浙江沿海一帶地方騷擾穆相國趁此機會在皇帝跟前説了林則徐許多壞話説他剛愎自用害國不淺一面派人暗暗地去和英國人打通叫他們帶兵船去廣東一面又指使廣東的官吏到京來告密有個滿禦使名叫琦善的聽了穆相國的唆使狠狠地參了林則徐一本穆相國又在皇帝跟前打邊鼓把皇帝也弄昏了一道聖旨下去把林則徐革了職又派琦善做兩廣總督琦善一到任便和英國人講和賠償七百萬兩銀子開放廣州廈門福州寧波上海作外國的租界英國人還不罷休硬要拿林則徐問罪穆彰阿出主意代皇帝擬一道聖旨把林則徐充軍到新疆去這時惱了一個大學土名叫王鼎的他見林則徐是一個大忠臣受了這不白之冤便屢次在朝廷上找穆相國論説那穆相國聽了王鼎的話總是笑而不答有一天穆彰阿和王鼎兩人同時在禦書房中召見那王鼎一見穆相國由不得又大怒起來大聲喝問道林則徐是一個大忠臣你為什麼一定要哄著皇上把他充軍到新疆去像相國這樣一個大姦臣為什麼還要在朝中做著大官你真是宋朝的秦檜明朝的嚴嵩眼看天下蒼生都要被你誤盡了穆彰阿聽了不覺變了臉色道光帝看他兩人爭得下不了臺便喚太監把王鼎挾出宮去説道王學士醉了那王鼎爬在地上連連叩頭還要諫諍道光帝把袖一拂走進宮去了王鼎回到家裏越想越氣連夜寫起一道奏章來説穆彰阿如何欺君林則徐如何委屈洋洋灑灑足足寫了五萬多字一面把奏摺拜發了一面悄悄回房去自己吊死第二天王鼎的兒子發覺了又是傷心又是驚慌照例大臣自盡要奏請皇上驗看以後收殮那穆彰阿耳目甚長得了這個消息立刻派了一個門客趕到王家去要看王學士的遺折那王公子是老實人便拿出遺逝出來給那門客看摺子上都是參穆相國的話要知後事如何且看下回分解
