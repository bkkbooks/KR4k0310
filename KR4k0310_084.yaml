body:
  text: 第八十四回花明柳暗頤和園彈雨硝煙高麗宮卻説慈禧太后自從那天逛三海回宮來和李蓮英説三海地方許久不曾修理了坍敗的地方很多在前幾年俺早想叫內務府修理了只因恭親王説沒有錢東太后又説不必修理直到如今越發坍敗得厲害了再不修理還成個什麼花園呢李蓮英聽了太后的話忙去報告給軍機大臣知道那班軍機大臣誰不要討太后的好兒便大家商量著叫內務大臣出面大家籌了一筆款子立刻動工去修理三海又怕三海的地方太小便連舊時從西城到後門的一條大路也包圍了進去造了兩座高大的白石橋名叫金鼇玉蝀那三海修理完工使請太后去遊玩太后到了三海一看果然氣勢闊大亭台壯麗便也讚不絶口許多親王福晉陪著遊玩逛了一處又一處正逛得高興的時候忽然慈禧太后又想起從前的圓明園來了説道這三海的地方雖好如何趕得上圓明園的萬分之一可惜先帝也亡故了圓明園也毀了再要和先帝在日一般熱鬧怕也沒有這個日子了慈禧太后説著止不住掉下眼淚來妃嬪們趕忙勸解護衛著太后回宮來李蓮英見太后記念圓明園心中又有了主意第二天悄悄地跑到軍機處去和一班大臣商議重興圓明園叫老佛爺歡喜內中有一個軍機大臣説道要重興圓明園非有四五千萬銀子不辦即算把圓明園修理好了老佛爺進園去遊玩如今先帝不在了園中處處都留著傷心的地方老佛爺也不一定歡喜的俺們有這重興圓明園的錢不如另蓋造一所園子樣子和圓明園一般闊大老佛爺在裏面遊玩著既覺得新鮮別致又不致傷了老佛爺的心當時一班大臣聽了這一番議論齊聲稱妙恭親王道俺們老佛爺六十歲萬壽快到了這一座花園須在萬壽以前趕造成功到萬壽的這一天俺們請老佛爺進園去遊玩一天也叫老佛爺開開心現在是光緒十五年老佛爺六十萬壽是光緒二十年在這五年裏面這花園的工程總可以完成了衆大臣齊説可以成了奕欣又説道若大一座花園蓋造起來最少也得一千多萬兩銀子只是這一笑錢從什麼地方出難道叫老佛爺自己挖腰包嗎奕欣説到這裏衆大臣一齊低著頭思索起來這時李蓮英也坐在一旁忽然拍一拍掌説道有了有了衆大臣問他有了什麼好法子李蓮英説道俺們不是有每年提出的海軍經費二百萬兩嗎如今積了已五年有一千萬兩咱家想來俺們中全全是陸地用不著什麼海軍便是外國都是俺們大清朝的臣子且都是小國決不敢來侵犯我們天朝的這海軍簡直沒有什麼用處俺們不如把它挪過來作為蓋造花園的經費誰敢説一個不字再有不夠的地方俺也有一個好法子在這裏索性借著振興海軍的名目開一個海軍報效捐凡是報效海軍經費實銀七千兩的作一萬兩算請俺老佛爺賞他一個即選知縣做做再有不夠的地方説不得俺們哥兒們挖挖腰包湊上了豈不是成了李蓮英的話衆大臣拿它當老佛爺的話一般看待便大家附和著説總管的話不錯當時便動起公事來先把部裏存著的歷年積蓄下的海軍經費一千萬兩銀子提出來應用一面由皇太后皇上下諭開海軍報效捐的例一面指定在萬壽山一帶空曠地方建造花園這花園為預備皇上恭祝皇太后萬壽用的便定名稱頤和園是取頤養天和的意思這時榮祿已經起用在西安做將軍他聽得京裏建造頤和園便首先捐俸銀二十五萬兩算是送太后的壽禮慈禧太后原是歡喜榮祿的便把他調時京來也入了軍機處接著便有許多王公大臣報效銀兩的你也十萬我也二十萬又在報效海軍經費項下收得了四五百萬兩銀子這一年年底閻敬銘做戶部尚書部中照例到每年終須把庫中的存款造一本册子報告進宮去請兩宮查看那册子上列入的照例都是正款此外歷年查抄下來的款項以及罰款變價的款便拿這間款去彌縫二來從堂官到庫官每年在這筆間款上多少也分得一些好處自從閻敬銘做了戶部尚書以後他要討好皇太后到年底造册子的時候便把許多間款一古腦兒地都報告進去皇太后一看忽然平空多出七百多萬間款來便吩咐李蓮英去把這筆款子提進來一併充作建造頤和園經費有了這許多錢便把這座頤和園造得格外富麗堂皇到光緒十九年上便把這座園子蓋造得端端整整那監工大臣便請諸位王公大臣去踏勘這一天恭親王便一早起來帶了許從大官員們進園去做書的也趁此機會把這頤和園的大略情形説一説頤和園原是清漪園的舊址在京城外西北面地方離京城大約二十裏路背靠著萬壽山把一座昆明湖圍在園裏從東角門進去過仁壽門殿屋十分高大便是仁壽殿進殿門門裏面院子中央有一座月臺第一層臺上平列著四座大鼎第二層對安著盤二龍二鳳的銅缸兩座殿裏面設著烏木寶座殿門封鎖著向西面走不多幾步路上面有一個匾寫著水木自親四個字西面便是昆明池池北面有一座樂壽堂這一座堂將來便是皇太后的寢宮堂前也有一座月臺一旁有一座亭子蓋造得好似暖房一般全是玻璃蓋成亭子裏面藏著柏樹一株樣子好似珊瑚一般又曲曲折折向西面走去經過幾十丈的回廊北面有一座山山頂上有一座台名叫國華台這座台蓋得有幾十丈高台下有一殿殿名排雲殿殿屋九間十分寬大太后便在這座殿上坐朝殿裏面有一副對聯上聯寫著萬笏晴山朝北極下聯寫著九華仙樂奏南薰殿的兩壁造著幾十座什錦櫥高接棟宇殿階十四層月臺上平列著銅鼎鐵鼎各四座銅龍銅鳳各兩座殿后面有一座佛香閣幾十級階石上去從偏門進去門裏面一座石牌坊上面寫著暮靄朝嵐常自寫七個字又從北面上去是一座寶雲閣蓋成八卦樣子門欄棟檻都是生鐵鑄成閣裏面三座長方桌也是銅鑄成的從寶雲閣向東面下去便是太湖假山山有洞回環曲折好似螞蟻窠穿出洞門上去便到了佛香閣閣裏面供著三座金佛閣子後面又有一座亭子稱做衆香界這地方便是萬壽山的最高處向南出去有一座門門上題著導養正性四個字門前一帶短牆抱住山頂靠在牆上向南望去池面上亭臺樓閣好似盤中盆景十分清楚再從石洞向東穿出去有一座殿殿上寫著轉輪藏三個字殿旁有幾座八角亭子轉輪藏原是兩座木制的寶塔每一座塔有十幾層每一層上面都刻著佛像每一座藏有三丈高日夜自己轉著不停息的後來庚子年八國聯軍打進京城占據了頤和園這兩座轉輪藏才停止不轉了院子裏又有幾座日規面上刻著時辰刻數中央豎一支鋼針太陽照著針影指在什麼時刻上便知道是什麼時候了從轉輪藏繞出去便是德暉殿殿上匾額寫著敷光榮慶四個字這地方已在排雲殿的東面了西面又有一座殿名聽鸝殿殿對面一座戲臺建造得金碧輝煌便是將來慈禧太后聽戲的地方東面沿著山路曲折上去有一座亭子匾上寫著畫中遊三字亭旁有一個石洞穿出石洞迎面便矗著一座石牌坊上面刻著山川映發使人應接不暇十個字再上去有一座亭亭上匾額題著湖山真意四個字這地方將來慈禧太后常常在這裏納涼的這裏已是萬壽山最高的地方了向北面山下一望見園牆外面十裏多地方便是京城裏的大街亭上面又有一亭上面題著智慧海三字對面有三座園門門上寫著祗樹林三個字樓上面稍低的地方向東北面望去幾裏遠地方平地上繞著一帶短垣便是圓明園的廢址在山頂上東面走去一帶都是拿水磨方磚鋪成的大路那路有幾裏長山嶺雖有起伏但這路卻鋪得甚是平坦路的盡頭有一座亭子名叫薈亭從薈亭下山到景福閣是慈禧太后每天進小米粥的地方從景福閣出去走過如意莊平安室直到樂農軒軒的正中安著一張禦座禦座後面列著條几左面一張西式搖椅上面罩著黃幔再從樂農軒向東南下去便是矚新樓涵遠堂堂前有一口方池池水通著山泉終日水流著淙淙有聲這地方很像是從前西太后做妃子的時候住的桐蔭深處曲欄畫楹備極清幽池旁有一座和春堂堂畔有一座橋名叫知魚橋橋的四面都造著亭台過知魚橋又是一座院落南北對列著四五間房屋南面的屋子裏藏著一隻龍舟北面的屋子裏藏著一部圖書集成又向西面過去便是德和園園中央蓋著一座殿宇名頤樂殿殿前造著一座大戲臺台共高三層從最高一層望去便見玉蘭堂這地方便是將來光緒皇帝的寢宮殿前兩邊各有廂房十一間每間用木板隔開便是賞王公大臣聽戲的地方從南面走去便是昆明湖沿著東牆走兩裏路遠近到了宮門口門左面立著一座石牌名叫織女石有四五尺高是甲申年立的右面臥著一頭銅牛約四五尺長名牽牛對宮門造著一座白石河埠是遊昆明湖上船的地方沿昆明湖向西走去有一座十七環洞的長橋過橋向北行便到龍王廟廟門外東西南三面都立著石牌坊廟後便是涵虛堂堂後面便是昆明湖對湖西面便是玉泉山頤和園的風景大概是這樣子的園子裏面有電燈廠有鐵路有汽船每一處都有總辦幫辦委員幾十個人一大半都是滿人後來皇太后帶著光緒皇帝皇后進園去住只是伙食開支每天要用到一萬二千塊錢當時造這座花園原打算待皇太后萬壽請太后遊玩著歡喜歡喜的所以在光緒十九年上便造成第二年正是慈禧太后六十歲萬壽便由榮祿奕欣領頭兒預先入奏籌備慶賀的大典誰知到了光緒甲午年六月裏的時候便和日本開戰了講到中國和日本開戰的大原因還是因光緒皇帝和慈禧太後鬧意見鬧成功的只因中國的屬國朝鮮自從國王李熙入承大統以後那王父李罡應還常常要干預朝政父子之間便起了齟齠李熙便把父皇封為大院君原要叫他不問國事的意思誰知那大院君越發驕橫起來了因此滿朝文武也分做兩黨互相傾軋朝鮮王沒奈何便上表到中國來告急慈禧太后見了朝鮮國的表文立刻派提督吳兆漼率同同知袁世凱帶兵直入朝鮮宮廷代平內亂又派吳大澄慶裕續昌辦理善後事宜一面下諭李鴻章調動兵輪隨同水師提督丁汝昌到朝鮮去保護中國兵隊捉住了大院君解回北京來皇太后命把他幽居在保定地方但朝鮮國王不免有父子之情一再上表求釋放他父親誰知這大院君釋放回國去卻暗暗地私通了日本日本便派了大臣伊藤博文到天津來和李鴻章商量朝鮮事體説吳兆漼袁世凱這班人袒護朝鮮拒絶日本要求中國把這兩人調回懲辦後來究竟依了日本的主意訂定兩國派兵保護朝鮮的條約因此兩國在朝鮮的兵隊時時要起衝突這時已伏下了中日開戰的禍根了後來慈禧太后在宮中處處和皇帝作對最初光緒皇帝大婚的時候在皇帝的意思頗注意江西巡撫德馨的兩個女兒慈禧太后卻定要選他兄弟桂祥的女兒做皇後在暗地裏指使皇帝把如意遞給那桂祥的女兒光緒皇帝心中不願意便故意失手把如意打得粉碎但桂祥的女兒究竟做了皇后只把侍郎長敘的兩個女兒分封做瑾貴妃珍貴妃但光緒皇帝獨愛珍貴妃皇后和皇太后是打通在一起的所以皇帝便不愛他因此皇太后和皇后也把這珍妃恨入骨髓但是光緒皇帝年紀已長成了皇太后不得不歸還政權給皇帝無奈光緒皇帝的時運真不濟自從皇帝親政以後國事日非外交日緊滿朝大臣都和李蓮英打通一氣只有那師傅翁同和是忠心于皇帝的這時日本在朝鮮地方著著進逼那朝鮮國中的臣子原分做獨立事大兩黨後來又添出東學黨那黨的勢力很大從全羅忠清兩道直打到漢城左議政朴詠孝原是獨立黨的首領仗著日本庇護他他蓄意要脫離中國只因礙著中國通商委員袁世凱在左右監視著一時不敢動手後來聽得東學黨起事朴詠孝便殺入王宮燒死閔妃這閔妃是世界上第一個美人活活地燒死天下人知道了都十分痛惜閔妃的哥哥閔詠俊便趕到袁世凱衙門裏去哭訴求中國發兵替他報仇袁世凱打了一個電報給李鴻章一面照會日本一面立刻調動海軍向朝鮮仁川進發又派陸軍到朝鮮牙山駐扎仗著水陸軍的威力把朝鮮的內亂平定日將大鳥圭介想趁此向中國尋事便將清軍先到緣由報告日本政府日政府志問朝鮮國王是否獨立國朝鮮國王害怕日本國的威力便不敢不認大鳥圭介便照會中國請中國撤兵袁世凱如何肯依又電告李鴻章李鴻章根據天津的條約要求兩國同時撤兵誰知日本不答應李鴻章便陸續增加軍隊到朝鮮去防備著又因日本人厭惡袁世凱便把袁世凱調回奉天調衛汝貴一支兵馬把守平壤馬玉昆一支人馬把守義州牙山守將葉志超首當其衝日本並不宣戰便直攻牙山志超一無防備兵馬一齊潰散水軍也在半島地方打了敗仗這消息傳到宮裏光緒皇帝第一個沒了主意便去見皇太后近來皇太后因皇帝寵愛瑾妃珍妃皇后常常到太后跟前去哭訴太后心中越發不樂意見皇帝來説牙山的軍情便冷笑一聲説道咱也管不了這些事皇帝放著親信的人不去和他商量卻來問咱們懂得什麼呀光緒皇帝碰了一鼻子灰退出宮來便在禦書房裏召見師傅翁同和把太后嘲笑的話和目前軍情緊急的話一一説了翁師傅一聽便有了主意要知後事如何且聽下回分解
