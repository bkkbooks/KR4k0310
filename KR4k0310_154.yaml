body:
  text: 第一百十四回好事難諧遷鶯上喬木密謀暗定調虎出深山卻説董卓得了貂蟬如魚得水鎮日價尋歡取樂將一切的事情完全都付與呂布李儒二人照料還有那些虜得來的良家婦女他見了貂蟬便將他們視同糞土一樣完全賞給與手下侍尉從仆真個是一人中意衆美遭殃這貂蟬見他這樣的寵愛自己他也展出十二分籠絡的手段來將一個董卓哄得百依百順險些把他當做活觀音供養那天董卓早朝未回貂蟬料知呂布在後園裏監工他便趁著這個空子單身獨自走到後園裏去在鳳儀亭內不期而然地遇著了呂布他便哭得淚人一樣呂布再三追問他歎了一口氣道事已如此説它還有什麼用呢呂布急道卿卿什麼事你也應該説出來我才明白呢他道我也料不到你們太師爺竟是這樣人面獸心的老賊他前天到我家裏去我們爺子以為你是奴家的丈夫他自然是我的公爺了我們爺教我出來見禮不想他見了我便對我們爺説道奉先是我的兒子一切婚事籌備當然是我來出頭辦理的如今先將令嬡接到我們的府中去我們爺當然不好推辭便教我乘著轎子隨他到這裏來誰知那老賊竟起心不良他説到這裏淚拋星眼便又哽哽咽咽地哭將起來呂布急問道以後便怎麼樣呢他哭道不料那老禽獸將奴家藏在一間牢房裏黑夜裏帶了許多的僕婦到那裏去將奴家的清白被他玷污了將軍妾身只道今生你我永無相見之日的呢不料天也見憐我們還有一面的緣分我的心迹已表明白了再也沒有顔面來見將軍了你且放手讓我去死了倒乾淨省得在世上辱沒你的英名妾身死後也要變一個厲鬼將那老賊的魂追了去才罷呢呂布聽了這話將那股無名豪火高舉三千丈按捺不下冷笑一聲道萬料不到這老禽獸竟有這樣的行為貂蟬哭道還是讓我去死了是正經不要為著我一個女子使你家父子不和呂布聽説這話更是氣沖牛斗急道他能做這些禽獸的事情還算什麼父子呢貂蟬道妾身未出閨門就聞得將軍的英名如雷貫耳滿望攀龍附鳳嫁給英雄不料大禮未成橫遭這老賊玷污奴家如何對得起將軍呢但是奴家耿耿寸心惟天可表除卻將軍之外卻沒有第二人了將軍如肯見憐將我救出火坑奴家情願為將軍充一個侍婢還比受那老賊蹂躪的好多了呂布聽他這番話真個是萬箭鑽心利刀割膽又氣又憤又愛又憐心頭上翻倒了五味瓶酸甜苦辣鹹一齊湧上心來不知怎樣才好呢貂蟬又哭道將軍肯與否請快些兒作個決定罷呂布還未答話猛聽得外面氣如牛喘有人大聲罵道好賊子賤人在這裏做的好事呂布聽得是董卓的聲音不禁一驚忙將貂蟬放下揭起竹簾瞥見董卓手執他平日用的一杆方天畫戟圓睜二目惡狠狠地站在門外原來董卓早朝回來到了貂蟬的房中不見了貂蟬吃驚不小忙問侍女他到哪里去了有個侍女道到後園裏去遊玩去了董卓聽説這話忙向後面尋來走到大廳後面劈面撞見一個小廝名叫宋刮的他便問道刮兒你可曾看見新夫人在什麼地方呢宋刮支吾著説道小的看是看見的只是不敢説董卓聽得心下大疑忙道快點説告訴我怕什麼呢宋刮道我方才從後園裏鳳儀亭門口經過猛聽得裏面嘰嘰咕咕有人談話我倒被他們嚇得一大跳悄悄地從竹簾子外面往裏一瞧只見新夫人倒在呂將軍的懷裏只是哭我倒不解是怎麼一回事正想去告訴你老人家不想在這裏竟碰到你老人家了董卓聽得不暇多問順手在大廳東廊將呂布的畫戟取下來飛向後園奔來到了鳳儀亭門口就聽得裏面仍在喁喁不休地談著把個董卓氣得光是發喘半天才厲聲大罵這時呂布從裏面一頭鑽了出來他見了呂布不禁將腦門幾乎氣破潑口罵道好賊子竟敢做出這樣無父無君不倫不類的事來他罵著舞動方天畫戟便來刺呂布呂布將頭一偏他一戟落空身子往前一傾險些兒跌了下去呂布順手一把將戟的頭龍吞口抓住就是一擰不想董卓的蠻力大英想動得分毫呂布一撒手拔步就走董卓便將戟擲去呂布往旁邊一閃沒有擲到董卓哪里肯舍依舊緊緊地追來剛剛追出園門卓賊和一個人撲地撞個滿懷他不問青紅皂白一把將那人抓住拔出寶劍就要動手只聽得那人喊道太師爺慢來慢來他聽得忙低頭一看不是別人卻是左大夫李儒他道要不是你喊得快險些兒一劍將你結果李儒忙問他與呂布究為著什麼事情這樣衝突的董卓便將以上的事情氣衝衝地説了一遍李儒頓足道主公大事去矣為了一個貂蟬惱了一員大將他萬一反起來試問主公誰人能去征服他主公這時正在招賢納士的當兒奉先雖有小過主公也該稍為原諒才好呢還有一句老實話對太師爺説太師得有今日完全是誰一手造成的呢我敢説一句除卻呂奉先卻沒有第二個罷貂蟬雖美于主公何益主公要是一個明白人今天不獨不能做出這一套來而且既曉得呂奉先看中貂蟬要想鞏固他的心不妨就將貂蟬賜給與他還怕他不死心塌地的保護主公麼還有一個比例就是昔日熊羽在摘纓會上不殺戲莊姬之蔣雄後為秦兵所困才得其死力相救今貂蟬不過一女子呂布系主公一心腹猛將以一女子失一大將不知利害孰甚呢他這一番話説得董卓閉口無言停了半天才開口向李儒問道依你便怎麼樣呢李儒道照我的愚見莫若就此將貂蟬賜與呂布布感主公大恩必以死力相報哩愚直之言是否還請主公三思董卓點頭道你的話未嘗不是讓我去細細地思量思量李儒便謝恩退出董卓回到貂蟬的房中命人將貂蟬喚來他厲聲問道賤人何故與呂布私通貂蟬放聲大哭説道妾身久聞侍女們講過後園修葺的怎樣好法妾身成日價地閉在這房裏悶得十分難受也是妾身一時之錯不該到後園去遊覽的賤妾剛走到鳳儀亭迎面就碰見呂布不想這個奴才將妾嬲住硬行非禮不是太師爺到來救妾一命那時妾身少不得要死在這匹夫的手裏了卓賊道我現在倒有一件事和你商量未知你肯與不肯貂蟬拭淚問他何事董卓道難得奉先看中了你我想將你賜給與他貂蟬聽得大吃一驚掩著粉頰大哭道賤妾已是貴人不日將有後妃之望今天忽然要使妾委身與下賤家奴便是頓時死了莫想我答應的他説罷移動蓮步走到帳幃前去將寶劍取下颼地出鞘向頸上就勒慌得董卓搶了過來死力扳住他的粉臂説道快休自尋短見方才那幾句話本來是和你玩的原想借此來試驗試驗你的心不料心肝美人竟認真了他説著從他的手中將寶劍奪了下來貂蟬哭道太師休要哄我這一定是那個李儒賊子出的主意他本與呂布是一類他想害妾身的性命敗太師爺的聲名這個萬惡的賊子我要生食其肉死寢其皮呢董卓道他無論如何説項我怎能捨得你呢貂蟬道如今他們既然是不懷好意料想此地也不能久居了萬一上了他們的算便怎麼好呢董卓忙道心肝你且莫要擔憂我明天就和你一同到郿塢去同享快樂如何貂蟬這才收淚拜謝到了次日清晨李儒便在大廳上候著董卓不一會董卓來了李儒便對他説道主公昨天既然答應將貂蟬賜與呂布的今日正是黃道吉期何不就將貂蟬賜給他成為好事嗎卓賊道我與呂布究竟有父子的關係不便賜給與他但是我也不去追究他昨日的錯處了你去對他可用好言勸慰李儒萬不料他今天忽然變卦便毅然説道主公千萬不可為婦人所迷惑才好呢卓賊聽得不禁將臉往下一沈冷冷地答道然則你的女人可肯賜給呂布麼這種不近人情的話昨天我不過是權為應你一聲不想你竟堅執要教我將女人送給別人我不看平日之情恨不將你這匹夫一刀兩段識風頭不要來纏不清下次誰再講出這字來提頭相見李儒不敢再講只得退了出來仰天歎道我等不久皆要死在這賤人的手裏了不表他在那裏歎息再表董卓早朝之後回府令搬場一時百官都來送行這個當兒呂布在人群中望見貂蟬在車中掩面痛哭呂布覷著董卓的車仗去得遠了他便將馬一帶趕到貂蟬的車仗對過只見他粉腮淚落伸出玉手上一指下一指又朝呂布一指最後朝自己一指呂布看見如同萬箭鑽心十分難受又不敢近來恐被董卓望見只好兜馬立在土岡之上攬轡痛恨不止望著車仗越去越遠煙塵迷漫雲樹參差一轉眼便不見了車仗的影子他悵恨欲死地坐在馬背上還在伸長著脖子遙望不瞬這時候後面突然有個人將他肩頭一拍笑道溫侯不隨太師爺一同到郡塢去為著什麼緣故孤影單形地立在這裏發愣呢呂布被他一拍倒是一驚連忙回頭看時不是別人正是司徒王允呂布見是他不禁歎了一口氣道司徒還問什麼呢橫豎不過是為著你家女兒罷了王允道莫非小女到府上之後有什麼不到之處麼萬一得罪了將軍千乞將軍還看老朽的薄面總要原諒這個癡丫頭一些那麼也不枉他鎮日價地景仰將軍的一番苦心了他説罷呂布道咳司徒你好糊塗了難道這事你還不曉得麼王允故意驚道小女自被太師爺帶去一月有餘至今也未曾回來過一次有什麼事情我焉能知道呢呂布道老實對你説罷你們的令嬡我倒沒有撈到反被那老禽獸視為已有了王允忙道溫侯這是什麼話難道太師此刻還未曾替你們結過婚麼呂布大聲説道我倒沒有和你們令嬡結婚那老禽獸倒與你們令嬡成其伉儷了王允佯作大驚失色的樣子説道這從哪里説起這從哪里説起他説罷便對呂布説道溫侯此地非是談話之所請到寒舍去再作商量呂布沒精打彩地隨著他復行入都到了司徒府的門口二人下馬一同到了大廳上落座王允便道究竟是怎樣的請溫侯再述一遍呂布便將鳳儀亭前後細細地説了一個究竟王允只是頓腳半晌無語又眼盯著呂布呂布垂頭喪氣的也是一語不發二人默默的半天王允才開口説道太師淫吾女兒奪將軍妻室這一層誠為天下人恥笑非恥笑太師不過恥笑將軍與老朽罷但是老朽昏邁無能尚無足道可惜將軍蓋世英雄亦受這樣的奇恥大辱呂布聽得這話不禁怒氣衝天拍案大叫王允忙道老朽失言死罪死罪萬望將軍息怒呂布厲聲罵道不將這老賊殺了誓不為人王允聽得這話忙跑過來用手將呂布的嘴堵住説道將軍切不可如此任意太師爺耳目衆多萬一被他們聽壁角的聽了去那時連老朽都不免要滅門九族了呂布歎道大丈夫豈可鬱鬱久居人下王允連忙説道以將軍之才實在非是董太師所可限制的呂布便道殺這個老賊真個一些兒不費吹灰之力不過有一個緣故礙著不好動手王允忙問他是什麼緣故呂布道這個老賊作此禽獸之行論理殺之不足以償其辜只是他與我名義上有父子的關係所以不能下此毒手恐被天下後世唾罵王允冷笑道將軍真糊塗極了他姓董你姓呂在名義上固無父子之可言談到情分上越發不堪設想了他與你既是父子就不應當在鳳儀亭前擲戟廝拼了呂布聽得這話怒髮衝冠地説道要不是司徒點破我險一些兒自誤王允聽他這話便知道他的意已堅決了便趁機又向他説道將軍若扶正漢室後來這忠臣兩個字是千古不磨的要是幫助董卓這反賊兩個字再也逃不了的一面是流芳千古一面是遺臭萬年天生萬物自是難齊好醜不過隨人自取吧今日之事尚請將軍三思呂布聽得這番話真個如夢方醒趕著離席謝道我意已決司徒勿疑王允道恐怕事未成機先露反招大禍呂布聽得颼地在腰裏拔出寶劍刺臂出血為盟王允撲地納頭便拜説道漢祚不斬皆出於將軍之賜了但是此等密謀有關身家性命無論何人不能泄露一字的呂布慌忙答拜道司徒放心俺呂布一言既出永不翻悔的二人起身呂布便向王允道這事要下手宜急不宜緩最好在日內將這老賊結果了好替萬民早除掉了痛苦王允道將軍切勿性急這事老夫自有定奪到了必要的時間我總先通知你就是了呂布答道司徒有什麼高見不妨先説給我聽聽王允道卓賊此刻遷到郿塢我想他是防人去辦他的定有準備卻再不能到郿塢去除掉他了只好從反面想出一條調虎離山的法子將這老賊騙到京城裏面將他殺了豈不是千穩萬妥麼呂布道這計果然不錯但是要想出了一個什麼名目來好去騙他入都呢王允拈著鬍鬚沈吟了一會子猛地對呂布道有了有了何不假著萬歲新愈召他入朝共議國事麼呂布拍手道妙王允又道但是此計雖然是好可是還需一個能言之士前去才行呢呂布道可不是麼誰是我們的心腹肯去呢王允又想了半天便對呂布説道這人倒是個能言之士而且卓賊平時又很相信他只恐他不肯去呂布忙道司徒所説的莫非是騎都尉李肅麼王允道不是他還有誰呢呂布道這人如果用到他他一定肯去王允便道怎見得的呂布道他因為升缺的緣故早就與老賊意見不合了我想他一定可以幫助我們的王允大喜道既是這樣就請將軍去將他請來大家共同商量辦法呂布道昔日殺丁原的也是他的主謀今天如果他肯去沒有話講萬一他不肯前去先將他殺去以滅人口王允稱是隨著即派人悄悄地將李肅請來他見呂布也在這裏不禁吃了一驚忙問道此刻太師爺已遷到郿塢溫侯還留在京中作甚呢呂布冷笑一聲説道騎都尉還問呢不是你當初好説好歹説的硬勸我將丁原殺去何致有今日的羞辱李肅聽他這話便料他也和董卓不對了忙道溫侯這話未免也太冤枉我了想當初在丁原那裏當一個區區的主簿如今封侯顯爵不來謝我倒也罷了反而倒怪起我的不是來了我真莫名其妙還請溫侯講明究有哪樣不如意處出入高車怒馬又是皇皇太師爺的義子還不稱心究要怎樣才滿意呢呂布道這些話都休提了我且問你自古道棄暗投明方不失英雄的身分昔日為你一席話我便毅然將丁原殺了來投董卓滿指望青史標名榮宗耀祖誰知這卓賊上欺天子下壓群臣罪惡滔天神人共憤他這樣的行為我豈不是被他連帶唾罵於後世麼這正是豪傑不貽千古恨英雄只執一時迷要知後事如何且看下回分解
