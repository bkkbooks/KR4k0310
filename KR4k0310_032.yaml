body:
  text: 第三十一回康熙帝揮淚廢太子汪紳士接駕失弱女卻説陳閣老一腳踏進房門只見他夫人滿面淌著淚拍著手嚷道我好好的一個哥兒到王府裏去了一趟怎麼變成姐兒了陳世倌聽了心中便已明白忙搖著手説莫聲張一面把屋裏的人一齊趕出去關上房門把乳母喚近身來低低地盤問他那乳母一面拭著淚一面把如何到王府去如何一個媽媽把哥兒抱進去如何直到靠晚送出來如何不許他去揭那方罩臉的綢子回家如何哥兒變了姐兒説了把自己吃酒的事體瞞著陳閣老聽了乳母這番話心中越發雪亮便對乳母説道哥兒姐兒你莫管你在俺家中好好地乳著孩子到王府去的事以後不許提起一個字倘然再有間言間語俺先取了你的性命喝一聲退去嚇得那乳母抱著孩子悄悄地退去陳世倌即對他夫人説道這明明是王妃養了一個公主只因他一向瞞著説養了一個小王爺如今把俺孩子帶進宮去趁此便換了一個俺們如今非但不能向王妃去要回來並且也不能聲張俺們若聲張出來非但俺孩子的性命不保便是俺一家人的性命都要不保了好太太千萬莫再提起了俺們命中有子終是有子的你既養過一個哥兒也許養第二哥兒呢陳夫人吃他丈夫再三勸戒便也明白了從此以後他們合家上下絶口不談此事看看第了第二個滿月王妃才把孩子抱出來給雍王爺見面雍王看孩子長得白淨肥胖又是妃子鈕鑽祿氏所生的便十分寵愛府中人都稱他四王子看官須記著這是陳閣老的嫡親兒子也便是將來的高宗皇帝這時陳世倌深怕換子的事體敗露出來拖纍自己便一再上書求皇帝放歸田裏聖祖挽留不住只得準了他的奏放他回去這裏雍郡王見去了一個親信的陳世倌心中鬱鬱不樂虧得那鄂爾泰張廷玉兩人竭力幫助他看看那許多皇子大半收服做了雍郡王的心腹內中只有胤祉胤禛胤祐胤示我胤禟胤祹胤禵常常自立門戶不肯和雍郡王同走一條路他們一面做著陰謀祕密的事體一面又在皇帝跟前討好皇帝便把胤祉胤禛封做親王胤祐胤示我封做郡王胤禟胤祹胤禵封做貝子雍郡王知道了越發懷恨在心內中要算胤祀胤禵兩人最和雍郡王作對其實他們暗地裏謀奪太子位的心思十分凶惡他們卻不練習什麼本領不結識什麼好漢只打通了幾個太監去結識那班妃嬪天天在皇帝耳跟邊説了許多太子的壞話後來越説越凶竟説太子有時進宮來調戲妃嬪甚至暗結死黨謀殺皇上這種凶險的話任你是鐵石人聽了也要動氣況且説話的幾位妃嬪都是皇帝十分寵愛的他如何有不信之理便立刻傳宗人府意欲把太子廢了後來還是固倫公主再三勸住説皇上暫時耐著這口氣這廢立太子是一件大事須和衆大臣慎重商量的第二天卻巧得到邊報説噶爾丹部造反十分猖獗那車臣部扎薩克部都被他占據紛紛打發人進京來告急皇上得了這個消息立刻坐朝和幾位大臣商議後一連發下幾道聖旨第一道封裕親王全福為撫遠大將軍皇長子胤禵為撫遠副將軍帶領五萬人馬出古北口第二道封親王常寧為安北大將軍簡親王雅布和信郡王鄂禮都封副將軍帶領五萬人馬出喜峰口第三道又命內大臣舅舅佟國剛佟國維大臣案額圖明珠阿密達都蘇努喇克遲彰春阿席坦諾邁護軍統領苗齊納楊岱前鋒統領班達爾沙邁圖都等隨營參贊軍務十萬大兵浩浩蕩蕩殺奔關外來誰知這一場戰爭從第一年的秋天出兵直到第二年的夏天還不能把噶爾丹打退皇帝心中十分焦急便派了康親王傑書去換回恭親王來自己又帶了禦林兵馬親到博洛河地方去督戰一面命太子胤礽留守在京裏監國誰知皇帝一到關外那告太子的狀紙雪片也似地飛來有的告他欺淩宗至室有的告他擾害百姓有的告他擅動官物有的告他擾亂宮廷有的告他謀殺父皇聖祖看了舊恨重提心中説不出的惱恨立刻下一道聖旨叫人進京去提出關外來不多幾天那胤礽到了行營進帳來跪在父皇跟前皇帝看他説話瘋瘋癲癲心中越發氣憤颼地撥出一柄佩劍來向太子斬去虧得舅舅佟國維在一旁攔住皇帝拍案大罵一邊罵一邊自己淌下眼淚來説太子胡行妄為自己早已知道只因看在他母親面上忍氣二十年到如今他罪惡愈深結黨營私侮辱大臣生性凶惡謀害骨肉甚至擾亂宮廷謀殺朕躬這樣狂妄悖逆的人留他在世上何用皇帝罵到傷心的時候一口痰向胸口一湧不覺暈倒在地待清醒過來看太子還直挺挺地跪在地下皇帝氣憤極了上前去親自動手在太子臉上打了兩巴掌喝一聲滾下去第二天把太子廢去把兵權交給康親王擺駕回京去一面把太子幽囚起來一面召集許多大臣商量改立太子的事體那班大臣受了諸位皇子的好處各人幫著自己的主人那時八皇子胤祀私地裏送了許多金珠給國舅佟國維和大學士馬齊便暗暗地指使內大臣阿靈阿散秩大臣鄂倫岱尚書王鴻緒侍郎揆敘還有巴渾岱一班人上奏章説八阿哥可以繼立皇帝看看奏章不由得大怒起來説八阿哥少不更事況從前有謀害太子的嫌疑他母親又出身微淺如何可立為太子一面派人祕密查問果然查出胤祀私通大臣的事迹來第二天皇帝上殿厲聲喝問巴渾岱嚇得渾身抖動爬在地下把佟國維和馬齊兩人如何指使他們保奏八阿哥的情形一一奏聞天顔震怒立刻把那班官員革了職又革去了胤祀親王的爵位佟國維只因他是國舅便當面訓斥了幾句驅逐出京永遠不許進宮大學士馬齊離間骨肉罪情較重下旨交刑部斬首後來自滿朝文武代求恩免聖旨下來著革去功名嚴行管束自從此雷厲風行之後滿朝官員都絶口不敢説立太子的事便是聖祖自己也不再立太子後來還是皇后覷著皇帝略略平了氣便勸著説道册立諸君是國家一件大事如今陛下皇子衆多不得不預立太子免得將來的變亂皇帝聽了皇后的話倒也説得不錯便和皇后商量究竟立誰妥當皇後説皇十四子胤禵生性慈厚堪為儲君這句話卻深合聖祖的意思但是皇十四子年紀尚小這時倘然把聖旨宣布出去又怕太子被人謀害聖祖想到這裏便想起鄂爾泰張廷玉兩個人來皇后也説這兩人是朝廷的忠臣可以信託當下立刻把鄂張兩位大臣宣召進宮來商量立十四皇子為太子的事體那鄂爾泰便想出一個主意來説請陛下親筆寫下傳立的詔書悄悄地去藏在正大光明殿匾額的後面待陛下萬年之後由顧命大臣把詔書取下來宣讀那時諸位皇子見是陛下的親筆也沒話可説了聖祖聽了連稱妙妙便又想起國舅隆科多來立刻把他召進宮來一面由聖祖親自寫下詔書道胤牣染有狂疾早經廢黜難承大寶朕晏駕後傳位十四皇子爾隆科多身為為元舅鄂爾泰張廷玉受朕特達之知可合心輔助嗣皇帝以臻上理勿得辜恩溺職有負朕意欽此這三位大臣受了皇帝的顧命便把詔書捧去悄悄地藏在正大光明殿匾額後面又悄悄地退出宮來各自散去自從行了這個預藏遺詔法子以後曆雍正乾隆嘉慶道光咸豐同治光緒七朝都沿用這個法子這是後話且不去説他如今再説國舅隆科多回到府中便有雍郡王打發來的內監候在府中隆科多見了彼此會意便暗暗地對那內監只説了今夜三更四個字內監回府把話回稟過過三更時候隆科多便悄悄地從後門出去踅進雍王府的後門到了一間密室裏只見大學士張廷玉將軍鄂爾泰都在那裏還有幾位國師和一班劍客停了一會雍王走進密室來大家便低聲悄語地商量了一會直到天明大家吃過燕窩粥才散出來隆科多鄂爾泰張廷玉三人依舊上朝去聖祖升殿便不象昨日一般厲聲厲色了兵部尚書出班奏稱康親王八百里文書告捷説噶爾丹部主兵敗大積山連夜逃至剛阿腦爾如今已把噶爾丹全部收服部主親到兵營中來納款投降康親王不日班師回京聖祖聽了這個消息越發歡喜吩咐傳旨嘉獎一面預備得勝酒筵只待康親王進京親自犒勞不多幾日康親王帶領大兵凱旋聖祖真的擺動禦駕出城迎接十萬大軍見了皇上齊呼萬歲聖祖在馬上賞過酒帶隊進城第二天康親王帶了一班從征大員上朝謝恩皇上又在崇政殿賜宴一面又下聖旨升各個人的官級又賞康親王紫禁城騎馬這時四境平安聖祖又舉舉行第六次南巡內大臣早行文江南各省沿途接駕聖祖五次南巡都到蘇州遊玩蘇州地方有一位首富的紳士姓汪名琬皇上每次駕到都是這位汪姓紳士率領合城大夫出城接駕汪琬家裏又蓋得好大園林叫獅子林是江南地方有名的在聖祖第一次南巡的時候是康熙二十三年曾經在獅子林駐蹕聖祖和汪琬十分要好臨走的時候賞他禦筆手卷一軸直傳到汪琬的兒子手裏十分寶貴汪琬的兒子名叫汪源這時年紀只八歲他父親接駕時候的情形他都記在腦子裏家裏曾經禦用過的器物和房屋都封鎖起來直到聖祖第六次南巡已隔了二十多年京中公文行到蘇州蘇州紳士又忙亂起來蘇州巡撫天天和地方紳士商量接駕的事體那班紳士聽説要見皇上個個嚇得捏一把汗內中雖有幾個從前接過駕的卻個個是年老昏聵不能辦事後來幾個後輩子弟誰見過這陳仗兒誰也不肯擔任接駕的事體後來蘇州巡撫出的主意仍舊公推汪家承辦接駕的差使汪家花園又大家裏又有錢那禦用的器具也是現成的當下汪源見衆口一詞便也不推託把這大事擔任下來汪家有兩位小姐大的名蓮小的名蓉都出落得一雙玉人似的美容面楊柳腰樊素口小蠻腰凡是從古來美人的態度名嬡的風韻他姊妹兩人都占盡了姊姊十七歲妹妹十六歲真是豆蔻年華洛神風度蘇州城裏上中下三等人都知道汪家美人是天上少地下無的有多少宦家貴族都來向汪家求婚汪源不捨得把女兒年紀輕輕地遣嫁出去便一律回絶他姊妹兩人原住在園裏的如今預備皇帝駐蹕便把他姊妹搬出園來住在內院裏看看到了二月初一日忽然有個內監送皇帝的密諭到蘇州來直闖進撫台衙門去蘇州撫台一面招呼兩個太監打開密諭來一看説聖駕已到鎮江著蘇州官紳趕到鎮江去迎接那兩個太監還説皇上聖旨著咱家到蘇州來尋訪一百良家婦女帶去侍候如今限貴部院三天工夫務必要把一百個婦女選齊由咱家帶去撫台聽了這個話雖不成體統卻也不能駁回連夜召集了許多當地紳士商議這件事內中有一位紳士説道這事容易得很俺蘇州地方盡多娼家如今選一百個略平頭整臉的妓女送去便得了撫台聽了這個話連聲稱妙便發落首府凡中城中官娼私娼一齊搜捉進撫台衙門去由撫台親自挑選一百個先交給太監送去這裏撫台帶領合城文武官員和合境紳士趕到鎮江去接駕隔了幾天皇帝坐著船到滸墅關上岸十六個太監擡著一乘龍轎直到汪紳士花園裏住蹕那汪源見天子光降頓覺十分榮耀終日在花園門外伺候著皇帝在花園裏天天和這班妓女調笑無間長枕大被晝夜行樂撫台帶著藩台臬台道府等官在汪家門外站班太監把守住大門不放他們進去後來各官湊集了十萬銀子孝敬太監才肯替他去通報皇帝一一傳見最後傳見汪源兩人長談到二更時分才退出來從此皇帝天天傳汪源進園去談天汪源也備了許多好玩好吃的去孝敬皇帝因此皇帝和汪源十分知己皇帝説道古時有天子而有布衣的如今朕和卿也結個異姓兄弟如何汪源聽了嚇得他忙爬在地下磕著頭連稱微臣不敢受命皇帝親自去扶他起來又吩咐請夫人小姐來俺們見一面兒認個通家汪源如何敢違背聖旨忙進去叫他夫人方氏女兒汪蓮汪蓉打扮齊整進園去見駕皇帝見了兩個美人不由得連連稱讚吩咐擺下酒席皇帝親自陪他母女三人吃酒吃到燈昏月上還不見他母女出園來把個汪源急得走投無路只是在花園外面探頭兒好不容易盼到他夫人方氏出園來問兩個女兒時方氏歎了一口氣説皇上留在屋子裏了汪源聽了只是跺腳但也無可奈何了一連三天皇帝也不傳見到了第四天上太監忽然傳出話來皇上要回京了於是蘇州地方的文武大員又忙碌起來紛紛預備程儀送各太監又備著十六號官船送皇帝下船汪源也在後面送著眼看著兩個女兒送下船去一聲鑼響扯起龍旗放纜去了汪源送過了聖駕垂頭喪氣地回到家裏便有許多親友向他賀喜説他轉眼要做國丈了到了第二天忽然撫院裏打發一個武巡捕來説大人今天接到一件緊要公文請老爺快進衙門商量去汪源聽了他的話一時摸不著頭腦便立刻坐轎上撫院去只見那位撫台和許多官員紳士們坐在一間屋子裏發怔案上擱著一張公文他們見汪源來了拿公文給他看原來這是淮安府送來的公文上面説聖駕於二月十日過淮安算計起來二十六日可以到蘇州原來從前來的是假皇帝如今才是真正的康熙皇帝呢別人看了這公文猶可獨有汪紳士看了這張公文不住地跺著腳嘴裏連説糟糕糟糕苦了我這兩個女孩兒呢説著不由得掉下淚來當時衆官員紛紛勸慰説這個大膽的假皇帝俺們多派幾個幹役四處悄悄地去察訪總要拿住他辦他一個死罪那時你兩位千金也可以合浦還珠了撫台接著説道如今這件事俺們都擔干系諸位仁兄切莫在外面流露半個字倘然給當今知道俺們還要活命嗎一句話説得衆人啞口無言各自散去依舊去預備接駕的事二月二十六日聖駕臨幸虎丘三十日遊鄧尉山聖恩寺的老和尚際志是當年接過駕的如今七十三歲了白髯飄拂跪在山門口接駕皇上命太監賞他和尚人參二斤哈密瓜松子楱子蘋果葡萄等很多聖祖去摸著際志和尚的須髯説道和尚老了三月十二日到無錫惠山駐蹕在寄暢園園中有一株大樟樹樹身有二人合抱的粗聖祖常常在樹下間步著後來回京去後常常寫信去問樟樹無恙耶這時有一個紳士名叫查慎行他做一首詩寄呈皇帝説樹身平安那首詩道合抱淩雲勢不孤名材得並豫章無平安上報天顔喜此樹江南只一株聖祖自從在惠山見了際志和尚以後回到京裏心中常常記念後來聖祖年紀到了六十九歲那際志和尚已是八十八歲還是十分康健皇帝便打發內監到無錫去把他接進京來舉行千叟宴什麼叫千叟宴是搜集六十五歲以上的滿漢臣民共有一千個老頭兒用暖轎擡進弘德殿去賞宴一連吃了三天都請際志和尚做主席另外備一桌酒賞際志和尚康熙皇帝也坐在上面陪席一時歡笑暢飲許多老頭兒都忘了君臣之份三天散席皇帝又各賞字畫一幅送回家去這一年聖祖分外高興在正月到二月的時候巡幸畿甸四月到九月的時候巡幸熱河十月巡幸南苑舉行圍獵皇帝親自跑馬射鹿十分勇武到十一月有一天忽然害起病來十分沈重聖家便吩咐從南園移駕到暢春園的離宮裏去養病要知康熙皇帝性命如何再聽下回分解
