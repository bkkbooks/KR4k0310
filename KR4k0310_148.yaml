body:
  text: 第一百八回移花接木刺客成擒換日偷天佞臣滅族卻説壽娥領了一班娘子軍長驅大進直搗香巢進了門恰巧梁冀又不在內只有兩個僕役在外邊灑掃只見他們凶神似地直往裏擁進忙大聲喝道何處的野婆娘膽有天大你可知此地是什麼地方擅自闖進來他還未説完壽娥嬌聲喝道給我掌嘴話猶未了猛聽得劈啪幾聲又輕又脆早將那兩個僕役打了一個趔趄有個丫頭潑口罵道你這死囚開口罵誰不要説你這兩個狗頭即便是梁將軍來我們奉著太太的命令來誰也不敢來干涉的那兩個僕役聽説這話嚇得倒抽一口冷氣趕緊一溜煙地走了壽娥忙喝道這兩個狗頭不要準他走他一走馬上就要報信去了衆人連忙喊他站住他們只得努著嘴直挺挺地站在那裏壽娥罵道我把你們這班助紂為虐的畜生今天誰敢走先送誰的狗命那兩個僕役也不敢翻嘴只得暗暗地叫苦壽娥此刻火高萬丈領著衆女僕徑到友通期的臥房門口壽娥將簾子一揭瞥見友通期坐在窗前正自梳洗壽娥不見猶可一見他把那一股無明的醋火高舉三千丈再也按捺不下潑口喊道來人給我將這個賤人打死了再説話猶未了門外轟雷也似的一聲答應霎時擁進了一班胭脂虎粉拳玉掌一齊加到友通期一人的身上友通期見了他們已經嚇得手顫足搖不知所措哪里還有能力去和他們對抗呢只好聽他們任意毒打了不一刻將一個絶色的美女打得雲鬢蓬鬆花容憔悴滿口哀告不止壽娥打了半天還未出氣忙命僕婦將他的八千煩惱絲完全付諸並州一剪霎時牛山濯濯醜態畢露友通期此時被他們一班人毒打要怎麼便怎麼無法退避欲生不得欲死不能壽娥見他仍是哀告不止霍地將剪刀搶到手中向他的櫻口中亂戳惡狠狠罵道我把你這個不要臉的賤貨強占人家的男子在這裏成日價貪歡取樂可知撈到你太太的手裏你這條狗命也許是要送掉了他一面罵一面戳只戳得友通期滿嘴鮮血不一會連喊也不喊了嗚的一聲向後便倒衆僕婦勸道這個狗賤貨差不多也算到外婆家去了太太請息怒回去罷壽娥點點頭復又用手向他一指罵道頗耐你這個不要臉的東西在老娘的面前還裝死呢今天先饒你一條狗命識風頭趕緊給我滾開去不要和我們梁將軍在一起廝混老娘便和你沒有話説萬一仍要在一起輪到老娘的手裏料想你生翅膀也飛不去的他説罷便領著衆僕婦打著得勝鼓回去了再表梁冀早上本來是要到工程處去監工的他到那裏指揮著衆人搬磚弄瓦手忙腳亂的一些兒也不讓衆人偷間到了已牌的時候肚子也餓了正要回去用飯瞥見一個守門的僕役飛也似地奔來氣急敗壞跑到梁冀的跟前張口結舌只是喘個不住梁冀見他這樣料知事非小可忙問道什麼事情便這樣的驚慌他張著嘴翻起白眼停了半天才冒出一句來道不不不好了梁冀又追問他什麼事情他漲紅了臉費了九牛二虎的氣力吞吞吐吐地説道不好了夫人被大夫人帶了許多女人不由分説打死了請將軍回去定奪梁冀聽説這話好似半天裏起了一個焦雷驚得呆了忙問道你這話當真麼他急道這事非同小可怎敢撒謊梁冀飛身上馬霎時騰雲價地回到香巢下了馬趕到房裏瞥見他睡在地上滿口流血一頭的烏雲已經不翼而飛了梁冀見了這種情形好不心疼肉痛又不知怎樣才好像煞熱禍上的螞蟻一般團團轉得一頭無著處蹲下身子用手在他的嘴上一摸不禁叫了一聲慚愧還有一絲遊氣呢他命人將他從地上移到榻上又命人去買刀瘡藥替他敷傷口喊茶喚水的半天才聽得他微微地舒了一口回氣粱冀見他蘇醒過來不禁滿心歡喜忙附著他的耳朵旁邊輕輕地喚道卿卿你現在覺得怎樣他微開杏眼見梁冀坐在他的身邊不禁淚如雨下絶無言語梁冀又低聲安慰他道卿卿這都是我的不是了如果我家教嚴厲他們又何敢這樣的無法無天呢他歎氣答道將軍休要自己引咎只怪奴家的命該如此罷了梁冀忙問道卿卿你現在身子上覺得怎麼樣了他柳眉緊蹙地答道別的倒不覺得怎樣可是渾身酸痛和嘴上脹痛罷了梁冀千般安慰百樣溫存友通期本來不是壽娥等一流人物雖然這樣的受罪他卻毫不怨尤他人只怪自己的苦命隔了幾日傷勢漸漸地平了因為自己的頭髮被他剪去他便灰心絶念決意要入空門不願再與梁冀廝混可是梁冀哪里肯放他走呢友通期求去不得無計可施便向梁冀哭道要得妾身服侍將軍非要先和你家大太太講明瞭得了他的準許才行呢否則既來一次難免十次百次長此下去是活活地將奴家的一條性命送去了麼梁冀聽他這話只氣得怒目咬牙按劍在手忿忿地對他説道卿卿你盡放心那個夜叉早晚都要死在我手裏我今天就回去問問他他如識相暫時一顆頭寄存他的肩上否則一劍兩段看他凶不凶了友通期哭道將軍事宜三思千萬不要任性你縱一時氣忿將他殺了無論如何他是個正室別人全要説我使攛掇的居心想僭居正位呢梁冀道誰敢來説呢請你不要過慮我自有道理他説罷徑自上馬回來進了府早有丫頭進去報與壽娥壽娥笑吟吟從裏面迎了出來見了粱冀便道將軍辛苦了梁冀便笑道自家的事情有什麼辛苦可言呢説著手攜手兒進房坐下壽娥向他笑道前天錯聽人家一句話帶了許多人到友姐姐那裏一場胡鬧過後我細細地想起來著實無味萬分抱歉這兩天我本預備前去到姐姐那裏去賠個罪一來教他消消氣二來將軍的面子上也好過去了不想將軍今天回來我卻先給將軍賠個不是明天再到姐姐那邊去賠罪罷梁冀聽罷真是出乎意料之外哈哈大笑道我早就料定了夫人是一定錯聽人家的話了不然永不會做出這沒道理的事來呢既是錯了好歹都是自己人什麼大不了呢明天也用不著夫人親自前去我便替你説一聲就是了他笑道隨便什麼人自己做錯了事當時都不會省悟的過後卻能曉得錯處了即如這事理論起來他不是和我合作一副臉麼我將他糟踏了豈不和糟自己的面子一樣麼梁冀聽他這些話真是喜不自勝忙道夫人休要只是引咎這事只怪我不好我要是不去和他姘識也不致惹夫人生氣了他笑道將軍哪里話來一切的不是都因我的脾氣不好才有這場笑話的官宦人家誰沒有三房四室的呢總而言之只怪我的器量太小了不能容人罷了看官這壽娥本來是個淫悍非常的潑辣貨他和友通期還不是成為冰炭了麼焉能又就説出這番講情順理的一番話來呢讀者一定要説小子任意謅張了原來有一個原因呢那天壽娥將友通期毒打了一頓打得奄奄一息胸中的醋火也算平了回得府來迎面就碰見了慶雪兩兒壽娥誰都不怕大模大樣的將他們帶到房中飲酒取樂雪兒對他説道我們在家裏度日如年的何等難過你現在也不想回去了所以我們無法可施只得前來就你的教了但是長此下去一個天南一個地北一朝想念起來真要將人想殺了呢無論如何都要想出一個良善的方法來才好呢他沈吟了半晌便向他們笑道有了你們先住在這裏等他回來我自有方法將你們留在府中好在他多半不在家裏那時我們不是要怎麼便怎麼嗎他兩個聽了大喜今天壽娥聽説梁冀回來心中暗想如今我將他的心上人兒打得這個樣子料想他必不甘心他回來一定是替他報復的了我反不能去和他撑硬只好先使個柔軟的手腕來試驗試驗如果他服從那是再好沒有了萬一不從我的話上來再作道理他打定主意見了梁冀説了一番道歉賠罪的話梁冀哪知就裏喜得眉開眼笑的他見梁冀已中圈套趁勢又用許多想煞人愛煞人的甜蜜米湯灌了一個暢快把個梁冀弄得樂不可支手舞足蹈的對他笑道我梁冀並非是自己誇口像我這樣的豔福滿朝中除卻萬歲爺恐怕再也尋不出第二個罷他笑道我有一件小事要奉煩將軍他忙道什麼事只管説罷我沒有不贊成的他道就是我們老太太前次我在家裏的時候他曾對我説的我既然蒙將軍的福澤身榮名顯但是別人家每每因著女兒飛黃騰達的可是我們的家裏也沒有三兄四弟所以也沾不著你的光不過我們太太現在收了兩個義子滿心想請將軍提攜提攜他們得到個一官半職也好教他老人家歡喜歡喜那時我卻未敢答應今天特地來告訴你不知你的意下如何呢他頓腳道你何不早説前天我手裏還放出兩個縣缺去呢且罷教他們來到我府中在這裏守候著不上三兩月一有缺我隨便就替他們謀好了就是了他假意謝道將軍肯體諒家母的心妾身也就感謝不盡了他笑道這又何必呢我替你家效一點勞還不是應當的麼他們又談了一會子天色漸晚這夜梁冀便留在府中住宿到了第二天梁冀臨走的時候向他叮嚀道教慶雪兩兒早點來要緊他假意應著其實早已到府中了粱冀還在鼓裏呢光陰似箭不知不覺又到八月間了梁冀只戀著友通期壽娥便與雪慶在府中廝混著各有所得絶不相擾梁冀因為自已有了心上人壽娥的私事也只好睜一隻眼閉一隻眼明知故昧的讓他們一著壽娥在六月間得著封誥便是桓帝封他為襄城君儀文比長公主這一來壽娥越發驕橫得不可收拾了在私第的對面又造了一宅房子周圍二十多裏寬闊樓閣連雲笙歌匝地説不盡繁華景象描不出侈麗的情形滿朝文武十有八九都是梁孫二家的私人他心還未足將和熹皇后從子鄧香的女兒鄧猛進到宮中桓帝見他的姿色足可壓倒群芳便封為貴人壽娥暗地裏卻教他改姓為梁偽言是梁冀的女兒原來鄧香中年就棄世了單單留下鄧猛一人所以壽娥為保固自己的根基起見便將他改名換姓的進與桓帝他只有一個親眷便是議郎邴尊壽娥深怕被他知道可不是耍的暗地裏與梁冀設計去害邴尊梁冀道這邴尊生性不苟深得桓帝的歡心萬不能彰明較著地去陷害他要想將這個賊子除去只有暗中派刺客將他結果了那才一乾二淨的毫無痕迹呢壽娥道這計好是好可是有誰肯去冒險呢梁冀沈思了一會便向他説道我們這裏不乏有武藝的人可是這事太險了恐怕他們畏縮不前依我的主意將他們完全帶來開了一個祕密的會議有誰肯將邴尊結果了賞絹五百匹黃金一百斤重賞之下必有勇夫的壽娥拍手道妙隨命將府中所有的家將完全請來梁冀將來意對大家説了一遍那些家將好像木偶一般誰也不敢出來承認梁冀好不生氣正要發作猛聽得一聲狂笑屏風左邊轉出一個人來滿臉虯髯濃眉大眼紫衣找扎大踏步走到梁冀的面前躬身説道不才願去梁冀閃目一看卻是侍尉朱洪心中大喜忙道將軍願去那就再好沒有了可是千萬要小心為好他笑道用手將胸脯子上一拍説道請將軍放心只要小人前去還不是探囊取物麼他説罷在兵器架上取下單刀往背上一插飛身上屋徑向邴尊的府第而來到了他家大廳上他伏著天窗往下面一看只見邴尊和衆人正自在那裏用晚膳呢他縱身落地一個箭步跳進大廳衆人中有一個名叫寅生的他的眼快忙大聲喊道刺客刺客慌得衆人連忙鑽入床肚這時邴尊府內家將聞聲各拖兵器一齊擁了出去接著他大殺起來自古道能狼不如衆犬好手只怕人多朱洪雖有霸王之勇也就無能為力了不多會一失神中了一刀正砍在他的腿上他大吼一聲堆金山倒玉柱地跌了下去被衆人橫拖倒拽地擒住了邴尊升坐詢問他起首還嘴強不肯直説後來熬刑不住便一五一十地將梁冀的詭謀完全説了出來邴尊勃然大怒便命人將朱洪拘起就在燈光下修一道奏章又將朱洪供詞抄録一通更不延留立刻將朱洪帶到午朝門外黃門官便問他何事進宮他道現在有緊急的要事煩你引我到宮那黃門官見他深夜前來料知事非小可便向他説道請大人稍待片晌等我先進去通報萬歲一聲邴尊點首那黃門官腳不點地地進去了不一會復行出來對他説道萬歲現在坤寧宮裏請大人進去罷他又吩咐禦林軍將朱洪守著他自己一徑向坤寧宮而來到了坤寧宮的門口只見桓帝與鄧貴人正在對面著棋他搶近俯伏先行個君臣之禮桓帝忙呼平身便問他道卿家深夜進宮有何要事邴尊道請屏退左右微臣有奏本上瀆天顔桓帝拂退殘棋龍袖一甩左右退去邴尊便將奏章和朱洪的供詞呈上請閲桓帝看罷大驚失色忙道卿家有什麼妙策可以剷除這個欺君賊子呢邴尊奏道萬歲德被四海仁馳天下所以將這賊子驕縱得不可收拾現今此賊威權並重耽耽有窺竊神器之野心萬歲若再不施以決裂手段恐怕向後就要不堪設想了桓帝道孤家何嘗沒有這樣的用意可是這賊根深葉密耳目衆多只怕事機不密反生別變所以遲遲至今都未敢貿然發作如今這賊的野心愈熾卻怎生應付呢邴尊奏道依臣愚見要除此賊須用一個迅雷不及掩耳的計劃才行呢最好今夜派人前去將他捉住然後那班姦賊群龍無首眼見得不敢亂動了未知萬歲以為如何桓帝瞿然答道卿家之言正合孤意邴尊又奏道此事刻不容緩緩必生變他既派人來刺微臣再停一會他不見朱洪回去必起疑心疑心一起勢必要預防那可就棘手了最好請萬歲即發旨差禦林軍前去兜剿他一個措手不及才是千穩萬安的計劃呢桓帝大喜便星夜下旨將九城兵馬司張惲召來命他領了三千禦林軍前去捉拿梁冀又另命揚威將軍單超點五千禦林軍把守各處禁口張惲帶著禦林兵直撲梁冀府而去再表梁冀將朱洪差去之後便和壽娥商議道如今朱洪去了能將邴尊結果了是再好沒有萬一發生意外那怎麼辦呢壽娥笑道將軍大權在手朝中百官誰不是你的心腹呢就是有什麼差錯只消動一動嘴唇皮硬便硬軟便軟還不是隨你主張麼梁冀聽他這番話正要回答猛聽得人嘶馬吼的呐喊聲聲不禁心中疑惑道這夜靜更深哪里來的人馬聲音呢莫非是巡城司捕捉強盜的麼他正要起身出去探看探看瞥見一個家丁一路飛了進來大叫禍事來了梁冀不由得大驚失色這正是刀兵加頸猶嫌晚死到臨頭尚不知要知後事如何且看下回分解
