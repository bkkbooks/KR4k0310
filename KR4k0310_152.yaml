body:
  text: 第一百十二回舌妙吳歌似曾相識腰輕楚舞于意雲何卻説丁原見那異丐廝殺得十分厲害不由得十分佩服不多會賊兵引退他趕緊催馬上前高聲説道請將軍留下姓名好讓下官去按功上奏那異丐見他問話便道俺坐不更名行不改姓不過有段隱情此地耳目衆多非是談話之所丁原忙將馬頭一帶用手朝那異丐一招斜刺裏直向荒僻之處奔去異丐隨後拍馬跟上不多時到了一個無人之處丁原兜住馬頭向他問道將軍有什麼隱情請講罷那異丐翻身下馬撲倒虎軀便拜慌得丁原也就滾鞍下馬用手將他扶起説道將軍你這算什麼呢有話你儘管説罷何必這樣呢那異丐道小人姓呂名布原籍九原因為犯了命案逃避出來改姓埋名已非一日了常思稍建微功為國家出力奈人情冷暖無處可以作進身之階可巧黃巾作亂小人不辭萬死為國家出些力不過想冀此稍贖前愆還敢有分外的欲望麼丁原聽他這番話又驚又愛忙道往事都不去提了一個人只要能悔過自新還不是一個有志氣的英雄麼如今我且問你尊府不知還有什麼人呢呂布道小人罪惡滔天一言難盡只因小人闖下命案家父家母聞得這個消息又氣又怕未上一個月他們兩個老人一齊西去了小子孑然一身無依無靠生平又不喜趨炎附勢加之命案在身未敢久留所以背離鄉井飄泊江湖差不多將近三年了今天一見明公料非平常之輩可比傾肝吐膽直言上告的了丁原聽他這番話不由得點頭歎息道可憐可憐英雄沒路真是人世間第一件大恨事照你方才的一番話竟是孤身只影了他道正是丁原朝他的面龐看個仔細便笑道將軍我有句斗膽的話要對你説未知你可許麼呂布忙道明公請講吧只要小人辦得到的就是赴湯蹈火也不敢辭的丁原捋著鬍子笑道老夫年過五十膝下猶虛今天得晤將軍私懷不禁感觸要是將軍不棄寒微他説到這裏呂布心中早就明白忙道明公請住小人也無須客氣老實點寄託明公蔭下倘得收為螟蛉更是萬幸了丁原忙笑道不敢不敢呂布不等他開口翻身便拜口中説道義父在上孩兒這裏有禮了丁原哈哈大笑伸手將他扶起説道好好好老夫竟唐突了呂布忙道父親哪里話來孩兒得托在膝下已算萬幸了丁原便道我們且回城去再講罷説罷二人上馬一面命人鳴金收兵一齊大唱凱歌回到河內城中那一班百姓聽説是將黃巾賊打退不由得個個歡騰人人鼓舞一齊壺漿酒肉充滿街道丁原下令不準騷擾一點那班士卒素來是守律奉紀的得著這個令誰也不敢稍動民間的一點酒食那一班老百姓頭頂酒甕手舉肉盆將去路遮得水泄不通齊聲喊道將軍舍生卻敵救活我們性命難道連這一些兒我們都不能孝敬麼一個發喊個個開口頓時嚷成一片丁原在後面聽見回頭便對呂布笑道今天如不是我兒為父的焉有這樣的體面呢呂布忙道父親哪里話來這全是你老人家的威風萬歲爺的福氣孩兒有何能何力呢丁原聽得心花怒放笑不合口那一副得意的情形只恨小子的筆禿不能描寫出來這時呂布又對丁原説道難得他們老百姓有這一番誠意你老人家倒不可拂掉人家的一片好意呢丁原忙道可不是麼我正是這樣的想著可是手下的兒郎們貪心無厭萬不能隨他們自主的呂布便道那麼父親下令教他們這些送犒的人都送到營中去令軍需處按功犒賞你老人家以為如何呢丁原大喜道吾兒這話入情入理他説罷便下令命這班人將犒師的物品送到大營中去這班人馬連忙又趕奔大營而來一個個爭先恐後地擁進大營將禮物留下方才空手回去不一會丁原和呂布等領著大隊進營丁原便令軍需官論功行賞一方面又命在中軍大帳擺下酒宴預備慶功他將各事指揮停當便領著呂布到了後帳替他換上一身嶄新的盔甲一會子扎束停當隨著丁原出了大帳與諸將領相見諸將在戰場上已經十分佩服了現在見他又拜丁原為義父加倍和他廝近了不多時大家入席了歡呼暢飲十分熱鬧酒未三巡守門卒進來報道聖旨到丁原聽説這話忙命撤退酒宴擺開香案他領著衆將出門拜接聖旨那傳旨官背著聖旨與丁原打了一個躬凸著胸口直挺挺走進大帳當中立定從背上將聖旨取下口中喊道猛武都尉丁原接旨丁原忙俯伏帳下口中呼道萬歲萬歲萬萬歲那背旨官將聖旨揭開大聲讀道孝靈皇帝新棄天下太子辨嗣立未久黃巾猖獗日盛一日朝廷多故太子辨尚在沖齡未能執政朕夙夜憂煎旦夕惶惕誠恐籌幄有疏辜負先帝之重托乃者前將軍董卓鷹視狼顧挾天子令諸侯威權日熾近復有窺竊神器之野心朕昨得卿之捷報賊氛已靖曷勝欣慰惟國事多艱朝夕有變仰即班師回朝密圖姦佞欽此丁原聽罷俯伏謝恩起身對衆將怒目咬牙説道董賊野心老夫早已窺破近來竟敢出此難道朝中諸文武一個個都是聾啞之輩麼那背旨官便答道都尉還説什麼如今朝中百官雖不少的忠義人物但是多半懼著他的威權噤口不言了丁原怒髮衝冠便請他先即回京自己領著大隊浩浩蕩蕩直向京城進發不斷日已經抵京他便下令將十萬精兵一齊扎在城外自己帶著呂布一同進了禁城何太后聽得丁原已到忙命人將他召進宮去對他曉諭道如今董賊有廢主之心只怕就在旦夕了卿家千萬勿忘先帝重托須要設法將此賊除去才好呢丁原聽説這話俯伏奏道太后請放寬心為臣的自有道理此番抵抗不住臣情願將這顆頭顱不要了和這逆賊去廝拼一下子他説罷起身走出朝來回到自己的營中便與呂布商議進行的計劃呂布便道方才他已經派人來請過你老人家了約定明早到朝堂會議廢立的事情我想明天他真個要使強迫的手段那麼我們竟先將這姦賊除了再作道理丁原忙道我兒明天早朝會議的時候千萬不能魯莽但看這賊如何舉動如果到了必要的時候我就要向你丟個眼色那時你再動手不遲呂布點頭稱是到了次日清晨董卓果然大會群臣於朝堂之上當著衆人發言道今上沖昏不合為萬乘之主每念靈帝昏庸令人嗟悒今城留王協年雖較稚智卻過兄我意欲立他為帝未知衆卿意下如何他這幾句話説得衆大臣張口結舌敢怒而不敢言丁原正待開口駁斥不料司隸校尉袁紹劈頭跳起厲聲説道漢家君臨天下垂四百年恩澤深宏兆民仰戴今上尚值沖年未有大過宣聞天下汝欲廢嫡立庶誠恐衆心不服有妨社稷那時汝卻難逃其咎哩董卓大怒道天下事操諸我手誰敢不遵袁紹也大聲答道朝廷豈無公卿汝焉敢獨自專斷董卓聽他這話更是怒不可言掣劍在手厲聲罵道豎子敢爾豈謂卓劍不利麼袁紹更是不能下臺也忙將寶劍拔了出來喊道汝有劍誰沒有劍今天且不與計較自有一日便了他説罷大踏步出了朝堂跨馬加鞭直向冀州而去這時董卓尚不肯罷議仍來徵求衆人的同意便又向衆人説道皇帝暗弱不足奉宗廟安社稷今欲效伊尹霍光故事改立城留王可好麼大衆聽了面面相覷沒有一個敢説半個不字來此刻丁原怒氣填胸忍無可忍霍地立起來答道昔太甲既立不明君道伊尹乃放諸桐宮邑昌王嗣位僅二十七日罪過千余霍光將他廢去改立皇帝今皇上春秋方富行未有失怎得以前相比呢董卓聞言大怒叱道丁原鼠子朝堂上焉有汝置啄餘地識風頭少要逞舌休要惹我性起一劍兩段丁原拍案罵道你這賊子欺君罔上妄自廢立與王莽何異天下萬民實欲食汝之肉寢汝之皮汝尚在夢中嗎今天你口出浪言要殺哪個董卓聽到這裏推翻桌案搶劍就要過來動手這時左大夫李儒見丁原身後站著一個人身高八尺頭戴束發紫金冠身穿麒麟寶鎧按劍怒目直視董卓李儒料知來者不善善者不來他忙搶過來一把拉住董卓附著他的耳朵説了幾句董卓會意這時丁原和呂布昂然出了朝堂出城回營百官皆散董卓便問李儒道我剛才正要去殺丁原你説殺他不得究竟有個什麼緣故呢李儒道你方才沒有介意阿他剛才身後立著那個人便是呂布有萬夫不當之勇萬一你和丁原動起手來他還不是幫助丁原麼那時卻怎麼了呢董卓道原來如此但是此番放他走了我想他一定不肯服從我了他現在手下有十萬精兵反了起來恐怕倒十分棘手呢李儒道丁原所恃的不過是呂布我倒有一條妙計派一個能言之士到呂布那裏去將利害説給他聽同時再用金帛去誘惑他到那時還怕他不來依附明公麼董卓大喜忙問何人肯去李肅應聲願去董卓便在禦廄裏挑出一匹赤兔追風馬來並且預備許多金帛之類與李肅教他見機行事李肅答應告辭而去到了午後李肅賚著金帛帶著赤兔馬出了西門徑到呂布的營中和呂布通了姓氏便説上許多景慕渴仰的話呂布本來是個草莽之夫哪里曉得他們的詭計見李肅恭維自己早就快活得什麼似的及至聽得要送他許多金帛還有一匹良馬名喚赤兔逐電追風日行千里不由得心花大放樂得手舞足蹈起來李肅何等的機警便趁著他在快活的當兒便要求他刺殺丁原投降董卓將來不失封侯之位口似懸河説上半天呂布迷著金帛良馬也不顧什麼父子名義知遇厚情竟一口答應下來李肅見他答應便告辭走了誰知到了第二天呂布手裏提著丁原的頭竟來依順董卓董卓大喜連忙上表硬挾何後下旨封他為溫侯平白的手裏又添十萬精兵一員虎將他的勢焰不覺又高百丈他還怕呂布生心便使李儒説合拜他為義父趁勢要挾群臣將太子辨廢去立陳留王協為漢獻帝百官側目莫敢奈何只好低首服從誰敢牙縫裏碰出半個不字來只得唯唯聽命他廢立已定便又將何太后幽禁起來何太后也沒法抵抗免不得帶哭帶罵口口聲聲詛咒董卓老賊當有人報知董卓他竟使人賚著鳩酒至暴室迫令何太后吃下不一時毒發而亡董卓因永樂太后與己同姓力為報怨既將何太后毒死還未泄心中之恨復查得何苗的遺骸拋擲路旁又拘苗母舞陽君一併處以極刑裸棄枳棘中不準收葬他自稱為郿侯稱他的母親為池陽君出入朝儀比皇太后還要勝三分自己更不要説了虎賁斧鉞差不多天子也沒有他這樣的威風這時朝中百官誰敢直言半句卓雲亦雲卓否亦否齊打著順風旗附勢趨炎哪里還有劉家的天下簡直是董家的社稷了然而朝中有一位大臣卻不忘漢室的宏恩時時刻刻思想將這些惡賊除去可是自己是個手無縛雞之力的文官而且又無別個可以幫著共同謀劃的所以他雖有此心無奈力不能為只好鎮日價地愁眉苦臉憂國憂民無計可施眼見朝內一班正直的忠臣被卓賊趕走的趕走殺死的殺死風流雲散他好不心痛因此隱憂愈深列位小子説到這裏還沒有將他的名字提了出來究竟是誰呢卻原來就是司徒王允他籌措了數月終於未曾得到一個良善的辦法有一天到了亥子相交的時候他在床上翻來覆去再也莫想睡得著他便披衣下床信步走到後園只見月光皎潔萬籟無聲只有許多秋蟲唧唧地叫著破那死僵的空氣這時正是深秋的時候霜華器重冷氣侵人王允觸景生情不禁念道山河破碎兮空有影天公悲感兮寂無聲他念罷猛聽得假山後面有歎息的聲音他吃驚不小躡足潛蹤轉過假山瞥見一個人亭亭地立在一棵桂樹下面從背後望去好像是貂蟬王允揚聲問道現在夜闌人靜誰在這裏歎息那人轉過面來答道賤妾在此王允仔細一看卻不是別人正是貂蟬忙喝道賤人此刻孤身在此長籲短歎一定是有什麼隱事快些給我出來貂蟬不慌不忙地答道妾身之受大恩雖十死不足報於萬一焉敢再有不端行為呢因為近數月來時見大人面有戚容妾非草木怎能不知大人的心事呢背地興歎非為別故實因大人憂國憂民惶急無計妾自恨一弱女子不能稍替大人分憂所以興歎的王允聽他這番話又驚又喜地説道我的兒誰也料不著你有這樣的心事好好好這漢家的天下卻要操在你的手裏了貂蟬答道大人哪里話來只要有使用賤妾的去處雖刀斧加頸亦所不辭王允便道我見了你倒想起一條計劃來了但是你卻太苦了尚不知你能行與否我倒不大好意思説了出來貂蟬何等的伶俐見王允這樣吞吞吐吐的卻早已心中明白了便插口説道大人莫非要使美人計麼王允笑道我這計名目雖不是美人計實際上卻與美人計有同等的效力呢貂蟬道大人乞示其詳王允便附著他的耳朵道如此如此未知你可做得到麼他聽罷粉頰一紅毅然答道只要與國家有益賤妾又吝惜一個身體嗎王允聽了撲地納頭便拜驚得貂蟬忙俯伏地道大人這算什麼呢豈不將賤妾折殺了麼王允道我拜的是漢室得人並非是拜你的他説罷扶起貂蟬又叮嚀了一番才各自回去安寢到了次日清晨王允便命預備酒席早朝方罷他便對呂布説道今天下官不揣譾陋想請溫侯到寒舍小酌一回未知能得溫侯允許否呂布笑道司徒多禮我卻不客氣了倒要去消受你們府上的盛饌豐肴呢王允忙道溫侯肯下降茅舍有光了他説著便和呂布一同回到自己的府裏這時府中的衆人早巳將席預備好了王允便與呂布對面坐下開懷暢飲酒至三巡王允便向屏風後面喊道我兒呂將軍是我至友你不妨出來同吃一杯罷話聲未了只聽屏風後面嬌滴滴地應了一聲來了接著一陳蘭芳麝氣香風過處從屏風後面走出一位千嬌百媚的麗人來他走到王允的身邊瓢犀微露著問道那邊就是呂將軍麼王允道是快點過去見禮他羞答答地到呂布面前深深地福了兩福呂布慌忙答拜王允笑道小女粗知幾首俚曲將軍如不厭聞使他歌舞一回為將軍侑酒如何呂布沒口地説道豈敢豈敢願聞願聞他也不推辭輕點朱唇歌喉嚦嚦慢移玉體舞影婆娑呂布連聲道好不多一時他舞畢王允趁勢托故走開他卻到王允的位置上坐了下來呂布向他細細地一打量不禁大吃一驚暗道他不是葛巧蘇麼看他那種秀色委實比從前出落得美麗十二分了這正是裙拖八福湘江水鬢剪巫山一段雲要知後事如何且看下回分解
