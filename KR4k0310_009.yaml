body:
  text: 第九回脂香粉陳靡雄主睡眼朦朧退敵兵話説董鄂部主何和裏模模糊糊被他們推進洞房以後定睛一看見屋子裏布置得金碧輝煌那一股異香直鑽進鼻子早把他弄得神魂飄蕩一位美人兒亭亭玉立地站在他跟前他便説道姑娘請坐那女孩兒也回説了一句部主請坐這一聲嬌滴滴的嗓音直叫人聽了心旌搖蕩何和裏到這時便忍不住去攜著他的手並肩坐下覺得他的手又滑又軟一邊捏弄著他的手一邊問道姑娘是大貝勒的什麼人怎麼和我做夫婦來你可知道我家裏原娶有福晉那女孩兒聽了回身一笑説道我便是大貝勒的大公主今年十六歲了俺父親只因愛部主一表人才便打發我來侍候部主部主家裏娶有福晉這是我父親知道的只求部主念今宵一夜的恩愛將來不要丟我在腦背後便是我的萬幸了公主説到這裏不覺低垂粉頸拿大紅手帕抹著眼淚哭得鳴鳴咽咽擡不起頭來到這時任你一等英雄也免不了軟化在姑娘的眼淚中他便上前去拉著公主的玉手一邊替他抹眼淚一邊打疊起許多溫柔話勸慰他到最後他兩人雙雙對著窗口跪下來説了終身不離的誓語又拉著手雙雙上炕並頭睡下了到第二天起來何和裏見了努爾哈齊行了翁壻之禮又説了許多感激的話從此把何和裏留在府中三日一小宴五日一大宴把個赫赫董鄂部主調理得伏伏貼貼後來日子久了努爾哈齊把自己如何有大志如何要報仇如何兵馬不足的話一古腦兒對他説了何和裏毫不遲疑便拍著自己胸脯説道我幫助嶽父五萬兵馬怎麼樣努爾哈齊聽了忙站起來兜頭一揖連聲道謝何和裏説道這調動兵馬的大事非我親自回去一趟不可索爾果在一旁説道既然如此事不宜遲便請附馬今天便行如何當下何和裏散了席便出門上馬帶了自己原來的侍衛回董鄂部去這時何和裏的原配哲陳妃在母家住關於他丈夫入贅在興京和回來調動兵馬的事他都不知道直待到何和裏兵馬調齊各處部落沸沸揚場地傳説努爾哈齊招何和裏做了駙馬這句話聽在哲陳妃耳朵裏最是傷心他不由得胸中憤恨立刻向父親調了二千人馬星夜趕回董鄂部去正走到摩天嶺下面當頭來了一隊人馬正打著董鄂部的旗號這時何和裏新得了公主離開不多幾天心中便萬分挂念匆匆忙忙把兵馬調齊吩咐在後慢慢行來自己便帶了一小隊侍衛不到得六百人便攢路先行急急要回興京去見他那位新夫人誰知走到摩天嶺下何和裏恰恰遇到他這正妻哲陳氏何和裏心下十分抱愧當即拍馬上去迎接打著謊説道你怎麼去了這麼許多日子我一個人在家裏冷清清的正想得你苦打算自己帶著兵來迎接你回家誰知今天我夫妻二人在此地相遇你快快跟我一塊兒回去吧他一邊説著一邊看他妻子身後旌旗蔽日刀劍如林他心知有些不妙還強裝著笑容問道妃子回家來怎麼帶這許多兵士敢是和誰廝殺去那哲陳妃坐在馬上手提長槍桃花臉上罩著一層嚴霜蛾眉梢頭還帶幾天殺氣這位哲陳妃原也長得絶世容顔他又從父親那裏學得一身武藝平時何和裏見了他恩愛裏面還帶幾分懼怕如今自己做了虧心事體又看看這位夫人桃腮帶赤櫻唇含嗔早已有些不得徑了正靦腆的時候忽聽他夫人劈空説了一句特找你廝殺來這一句話説得好似鶯嗔燕吒又嬌又脆又嚴厲聽在何和裏耳朵裏早不禁打了一個寒噤他夫人把話説過便放馬過來廝殺好好一對夫妻只因打破了醋罐在摩天嶺下一來一往一縱一合大戰起來超初何和裏看在夫妻面上不忍動手一味地招架後來看看他夫人實在逼得厲害那槍尖兒和雨點似地落下來他便也動了氣舉起大刀向前砍去他夫人勒轉馬頭便走何和裏拍馬趕上去一前一後和趕流星似地在嶺下跑著看看追到一座山峽口兩面老樹參天濃蔭密布何和裏説一聲不好這裏面一定有埋伏急急勒轉馬頭已是來不及了只聽得疙瘩一聲響絆馬索把何和裏的坐騎絆倒了馬上的人也跟著倒在地下哲陳妃親自趕來拿一捆繩子把他的丈夫左一道右一道捆綁起來何和裏的侍衛兵見了忙上前來搭救早被哲陳部的大隊人馬四面沖出來趕散了夫人把何和裏活捉回營也不解放也不斬首自己睡在榻上把他丈夫綁在榻下一任丈夫如何求饒他只説一句你求那個公主去何和裏知道他夫人鬧醋徑鬧得很厲害求也無益只得不求了這樣昏昏沈沈地過了一天一晚哲陳妃子便和他的部下商量攻打興京去他意思要把那公主親自捉來和他丈夫雙雙斬首才解了他心頭之恨誰知正商量時忽聽得營門外連珠炮響接著四面都響起來一片鼓聲喇叭聲震動山谷哲陳妃忙忙披挂上馬出去一看原來建州人馬四面包圍著努爾哈齊一匹馬直趕到營前口口聲聲還我女壻來哲陳氏見了努爾哈齊罵一聲老烏龜咬一咬牙拍馬上前和他拼命你想一個脂粉嬌娃任你有如何本領怎敵得努爾哈齊的神力戰了十多個回合早已敗進營去哲陳妃子吩咐緊閉營門不肯交戰過了一天那何和裏調動的五萬兵馬也一齊趕到幫著努爾哈齊攻打哲陳營盤哲陳妃子看看把守不住便悄悄地挾著他丈夫偷出了後營上馬逃去誰知才出營門便被努爾哈齊捉住照努爾哈齊的意思要拿哲陳妃子正法後來還是何和裏看夫妻份上救下性命來努爾哈齊把妃子喚上帳來狠狠地申斥了幾句放他回董鄂本部去從此建州人都呼哲陳妃子做厄赫媽媽厄赫是惡的意思這樣一來努爾哈齊憑空裏又得了五萬人馬又得董鄂哲陳兩部靠著他們的力量在十月裏的時候行軍直到松花江上流收服了珠舍裏訥殷兩部第二年六月裏又打破了多壁城後來又取得安褚拉庫一路收服了愛呼部努爾哈齊知道建州部人口太少不能成事因此他大兵所到之處便虜掠百姓送到建州地方去住下不到幾年建州地方居然人煙稠密村落相望這時那佟氏也年紀大了努爾哈齊便又娶了一位妃子富察氏又在他虜掠來的女子中挑選了幾個美貌的充當自己的小老婆這時他新造的都城裏已是十分熱鬧了努爾哈齊從愛呼部回來在興京地方休息了幾年又把從前失散的二弟舒爾合齊三弟雅爾哈齊找回來一塊兒住著又替他們娶了妻房他們三弟兄常常在一起説笑著慢慢地談起哈達漢王台來不由得切齒痛恨努爾哈齊便起了討伐哈達的念頭當時便點齊兵馬親自統帶出城把興京的事情託付給他二弟舒爾哈齊富察妃見丈夫要打仗出去他便隨營服侍拔寨齊起到了前面連山關口忽見探馬報説哈達汗王台早已死了他兒子虎兒罕也短命死去只留下一個孫子名叫歹商葉赫酋長卜寨把女兒許配給他叫歹商到葉赫去迎親誰知走到半路上卻來了一群葉赫的強徒把歹商殺了只因當初哈達漢王台受了明朝的命令因為葉赫都督祝鞏革倔強不奉命便起兵把祝鞏革殺了祝鞏革兩個兒子逞家奴仰家奴懷恨在心常常想替父報仇到了王台手裏便想法子要和葉赫部講和情願將自己的女兒許配給仰家奴做妻子誰知仰家奴卻不願意便向蒙古酋長去求婚娶了一位蒙古夫人王台便大怒起來仗著自己兵強力壯便要去攻打葉赫部後來明朝總兵官出來講和叫兩家永息干戈不料葉赫酋長卜寨卻居心不善如今借嫁女為名哄著歹商出來迎親在半路上暗暗地埋伏著刺客用毒箭射死他報了世代的冤仇努爾哈齊聽了這個消息接著問道歹商被蔔寨殺死難道哈達部人就此罷手不在那探子回説道歹商前妻原生下一個兒子名叫騷台柱因為年紀太小不能報仇現在逃在外婆家裏努爾哈齊又問騷台柱既躲在外婆家裏那哈達部的事體究竟什麼人在那裏料理探子又説有一個是王台遠房的孫子名叫蒙格布祿他是一位少年英雄哈達人便把他請出來當部長那蒙格布祿便日夜練著兵打算替歹商報仇蔔寨知道了也不敢去侵犯他便帶了兵向蘇子河渾河一帶去了努爾哈齊聽了不覺驚慌起來心想這渾河一帶不是向我們地界上來了嗎正説話時接著第二路探子報告説道葉赫酋長如今聯合烏拉輝發科爾沁錫伯桂勒察等九路兵馬由三路攻打興京請大貝勒作速準備抵敵努爾哈齊聽了卻毫不慌張低著頭半晌忽然喚人去把三貝勒雅爾哈爾傳來弟兄兩人在帳中唧唧噥噥商量了半天雅爾哈齊出得帳來便拍馬向東北方去了這裏努爾哈齊依舊催動兵馬向北關進發看看路上走了五天前面一條大河攔住去路先鋒隊報説前面已是蘇子河口努爾哈齊吩咐扎住營頭元帥的大營扎在樹林深處一面吩咐隨營廚役預備酒萊到傍晚時候酒席都已擺齊擺在林木深處努爾哈齊踱出帳來親自替諸位將士斟酒慌得那班將士個個爬在地下磕頭謝賞努爾哈齊説道諸位將軍滿飲此杯今夜早早休息準備明天廝殺一時衆兵將便大嚼起來努爾哈齊又打發人頻頻勸酒那酒都用大缸盛著大家喝了一碗又是一碗喝個不休直喝到月落西山鴉鵲噪林努爾哈齊坐在帳中和富察氏傳杯遞盞又有五七個美貌的侍妾在帳下彈著琵琶唱著小曲兒十二個侍女兩旁一字兒站著斟酒的斟酒上菜的上菜夫妻兩人猜拳行令吃得杯盤狼藉看著點上燈來努爾哈齊便發下將令去叫營口一律熄火安眠不許再有説笑喝酒的聲音果然令如出山全營立刻黑漆一片不聞一些聲息努爾哈齊自己也撤去酒席上炕安眠頭一落枕鼻息便齁齁地響富察氏卻不敢睡好斜靠著薰籠和侍妾們間談著聽聽外面打過三更努爾哈齊兀自深睡不醒那地面忽然覺得微微震動側耳一聽又覺得有兵馬奔騰的聲音富察氏覺得有些害怕起來便上去輕輕地推著努爾哈齊低低地喚道快醒來九國的兵要打來了怎麼反這樣渴睡起來努爾哈齊聽了略略轉動身體又打起鼾來了外面兵馬的聲音越聽越近富察氏又去喚著努爾哈齊醒來還説道你難道是心裏害怕嗎努爾哈齊睜開眼來笑笑説道我倘然真的害怕便是要睡也睡不熟了前幾天聽説葉赫部帶著九國的兵打來我不知道他們什麼時候來所以心裏挂著如今既然來了我也放心了説著他依舊閉上眼翻過身睡去富察氏聽了他的話不知道他葫蘆裏賣的什麼藥又怕嘔起他的氣來只得靜悄悄地在一旁坐著但是那兵馬的聲音越聽越近似乎已經到了營門外卻又寂靜起來富察氏不覺心頭小鹿兒亂跳正疑惑的時候忽聽得營門外一聲呐喊接著火光燭天廝殺起來富察氏急了忙去推醒努爾哈齊努爾哈齊擺著手叫他不要聲張但是聽聽那喊殺的聲音越發厲害富察氏坐在營帳裏好似山搖地動一般這樣子經過一個時辰喊殺的聲音才慢慢地遠了努爾哈齊從炕上直跳起來拍手大笑一手拉過富察氏來坐在炕邊説道你看我的計策怎麼樣那九國的兵葉赫部的兵跑在前面我早已知道他們快到了所以假裝酒吃醉了叫兵士們早睡原是要他們知道了來偷營的其實我們喝的完全是茶並不是酒兵士們也沒有睡個個全副披挂在暗地拿著兵器悄悄地候著果然不出我所料他們連夜來偷營了我卻四處有埋伏他們到一處中一處計想來他們的兵被我們捉住的很多了他們在暗地裏中了我們的埋伏不知道我們有多少人馬早已嚇得退過河去我又打聽得他們的主力軍隊在渾河一帶我卻早已打發三弟悄悄地到哈達部去知會蒙格布祿叫他們速速出兵跟在那葉赫兵後面待他渡過渾河我和他前後夾攻此番那蔔寨難逃我手掌的了正説話時候外面接二連三地傳報進來説先鋒隊已經打過蘇子河去了又報説殺死了葉赫兵三百生擒的又是五百接著又報説虜得糧草兵器帳篷都堆在營門外請大貝勒出去查點努爾哈齊才從炕上下來踱出帳去把虜來的葉赫兵的將官都一一審問過了又看過糧草兵器便傳令拔寨都起直向渾河西岸奔去那葉赫兵正在前面慢慢地渡河努爾哈齊追殺一陳葉赫部兵紛紛落水溺死了不計其數那蔔寨兵正渡過對岸忽然迎頭一支兵馬打著哈達部的旗號直沖過來蔔寨陳腳還沒有站住早被殺得東西飄散蔔寨看看前面被哈達兵馬攔住便帶著一小隊兵士從上流頭又逃過河去才上得岸那河邊有大隊人馬趕來真是冤家路狹那來的不是別人正是努爾哈齊那卜寨便匹馬落荒而走努爾哈齊哪里肯舍忙也匹馬單槍趕去這地方是一座大村子蔔寨在前面繞著樹東奔西走努爾哈齊又緊緊地跟著兩人一前一後走到樹林深處蔔寨回過頭來看看努爾哈齊快趕上了馬頭接著馬尾只聽努爾哈齊大喝一聲一槍刺來蔔寨心下一慌忙拍著馬向一株大樹下鑽去誰知一個錯眼那大樹低低地伸出一條橫枝蔔寨的馬跑得快來勢很猛蔔寨的腦袋打在橫枝上只聽他阿喲一聲眼前一陳黑落下馬來努爾哈齊手下的兵士一齊搶上前去舉槍便刺好好一條大漢身上搠了十七八個窟窿死了努爾哈齊趁勢渡過河去和蒙格布祿合兵在一處收服了葉赫部下的許多城池那八國的兵馬打聽得蔔寨已死早嚇得躲在家裏不敢出頭這一場大戰蒙格布祿的功勞也是不小努爾哈齊邀他到自己的營盤裏去大擺筵宴又喚富察氏陪著他一塊兒吃酒又喚許多侍妾在一旁伺候他蒙格布祿雖説是個英雄卻也是個少年好色的人見了許多美貌佳人不由得他魂靈兒飄蕩舉動慢慢地輕狂起來努爾哈齊也不惱他便給他許多牛馬糧草送他回國去這時建州的兵力越發強盛人人見了害怕但是努爾哈齊心裏還不滿足常常想鄰近諸部只有烏拉部最強不滅去烏拉不能夠打通東海因此他常常有併吞烏拉的心在明朝萬曆三十五年正月的時候恰巧有東海瓦爾格部長名策穆特黑的打發人來對努爾哈齊説道我們因為地方隔得遠一向歸附烏拉的如今烏拉貝勒名布占泰的常虐待我們我們沒有法想只好投降你們建州了求你們快快發兵來幫我們趕走烏拉人努爾哈齊聽了深中下懷當時點齊兵馬叫二弟舒爾哈齊做先鋒隊帶領三千人馬從松花河上流過黑江渡圖門江穿過朝鮮城寨到慶源府江岸再渡圖門江到了瓦爾喀部的蜚悠城這消息給烏拉部主布占泰知道了便出兵到圖門江打算切斷舒爾哈齊的後路有舒爾哈齊的先鋒兵名扈爾漢蝦的押著虜來的百姓牛馬幾千到舒城江邊去在山上走過遠遠地望見敵人的兵馬來到便飛馬報與主帥知道那舒爾哈齊立刻出兵和他開戰那布占泰正用全副精神對付敵兵忽然後面努爾哈齊三路兵趕到一路兵直沖後陳一路兵渡過下灘攔住他的去路自己卻帶著他兒子代善貝勒向中軍打來那代善貝勒雖説年輕卻十分勇敢布占泰親自出馬和他對敵戰了四五十個回合還不分上下布占泰退去換了一員猛將上來名叫卓鬥一口氣又戰了三十餘回合代善貝勒賣個破綻卓鬥兩手捧定大刀攔腰橫劈過來代善一側身讓過刀去把刀劈了一個空代善拍馬搶上幾步一手拖住他的刀柄猛力一砍砍去卓鬥半個腦袋倒撞在馬下死了那手下的兵丁看著傷了這一員大將個個膽寒一轉身和一陳狂風似的逃去後面的陳腳也沖散了努爾哈齊在馬上把手中的小黃旗一揮大隊人馬和山崩海嘯似地追上去這時天上忽然刮下幾陳大風吹得天昏地暗飛沙走石布占泰帶著人馬且戰且退無奈山路崎嶇天又黑暗兵馬慌慌張張踏死的踏死跌死的跌死建州兵追到了代善貝勒匹馬當先擎著大刀縱橫馳騁殺得十分暢快大小將官被他殺死的有二三十個兵士不計其數有一個押糧官是布占泰的叔父名昌主的只因帶著糧草走得慢了一步被代善貝勒追過去把他拖下鞍來活捉過去追了四十多裏路布占泰在前面逃著逃得人疲馬乏代善在後面看看追上忙從肩上取下弓來彎弓搭箭覷得清切正要射過去忽然布占泰身後一員大將大聲喚道來將不得暗箭傷人説著拍馬過來和代善廝殺被代善從馬上伸過手去一把揪住辮子割下頭來這一場戰布占泰一共損失七千多兵丁布占泰落荒逃去直退到吉林地方努爾哈齊大獲全勝班師回去暫過殘冬到了第二年初夏時候努爾哈齊又帶了第二個兒子名代善的第八個兒子名皇太極的出師吉林討伐那烏拉國那國主布占泰聽了這個消息早嚇得魂膽飄搖忙親自帶著幾個臣子坐著船渡過伏爾哈河來求和努爾哈齊不許一面摧動大兵直搗烏拉打破了城池在城裏殺了五天全城人口差不多都殺完了布占泰早逃到葉赫部去了要知葉赫部收留不收留再聽下回分解
