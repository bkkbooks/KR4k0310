body:
  text: 第九十九回賣草兔壯士遇知音捉山貓英雄逢豔侶話説章帝見了這樣的情形料想一定是發生了什麼暖昧的事情了他怒氣衝衝的龍袖一展回到坤寧宮使了一個迅雷不及掩耳之計突然下了一道旨意大舉搜宮小竇趕緊著人去關照大竇叫他設法阻止誰知大竇還未到坤寧宮只見許多錦衣校尉雄赳赳地闖進了淑德宮翻箱倒篋四處去搜查了一會子見沒有什麼痕迹急忙又趕到別的宮裏去搜查整整地鬧了三天竟一點痕迹沒有章帝好不生氣又下旨將宮裏的大小太監帶來了向他們説道如今宮裏出了什麼花樣兒料想你們一定是知道的快快地説出來孤王還可以饒恕倘有半字含糊立即叫你們身首異處了那些太監早受過大小竇的囑咐誰敢泄漏春光一齊回答道求萬歲開恩奴才等實不知情如其萬歲不相信請盡搜查若查出私弊來奴才等情願領罪就是了章帝又軟敲硬嚇的一番無奈那一班太監再也逼不出一個字來章帝沒法又命將一班宮娥彩女帶來嚴詢了一番果然有一個宮女將他們的玩意兒一一地説個清楚把章帝氣得發昏章第十一火速命人到濯龍園裏去拿人誰知那幾個校尉完全是大竇的心腹到了濯龍園裏將能兒等私放走了然後放起一把火來燒得煙焰障天連忙回來奏道臣等奉旨前去捉人誰知到了園裏那緑室突然伸出一雙緑毛大手來足有車輪般大臣等忙拔箭射去誰知一轉眼濃煙密布就起火了章帝聽説這話不覺得毛骨悚然隔了半天猛地省悟道這莫非是他們的鬼計麼他連忙親自到濯龍園裏去查看只見濃煙密布火勢熊熊得不可收拾他忙命人前去救火這時衆內監七手八腳地一齊上來救火不一時火勢漸衰又被他們大鬥小戽的水一陳亂澆已經熄了章帝便親自到火場上去察看只見除卻已經燒完的東西餘下儘是些婦女應用的東西鳳履弓鞋尤不計其數其中有一雙珍珠穿成的繡履章帝認得是小竇的不禁怒從心上起醋向膽邊生他卻不露聲色回到坤寧宮便下旨將小竇化兒一併收入暴室還有許多宮女只要一有嫌疑便照樣辦理這一來共殺大小太監一百余人大竇仗著他那副迷人的手段竟得逍遙法外未曾譴責這也是章帝的晦氣罷了章帝自從這一來不知不覺地生了一個惱氣傷肝的病漸漸不起到了他駕崩之後竇氏弄權和帝接位幸虧他除姦鋤惡將竇氏的根株完全鏟去以後便經過了殤帝安帝順帝質帝以及到漢桓帝可是以上這幾個皇帝的事實為何不去敘敘呢看官要知道小子做的本是豔史演義不是歷史綱鑒所以有可記便記下來沒有什麼香豔的事實只好將他們高高地擱起揀熱鬧的地方説了間話少説如今且説洛陽城外媚茹村有兩個獵戶一個姓吳名古一個姓陸名曾他兩個生就千斤大力十八般兵器馬上馬下無所不通他們鎮日價登山越嶺采獵生活有一天他們到日已含山才從山裏回來原來這陸曾才十八歲那吳古卻有三十多了他兩個俱是父母早亡無兄無弟的孤兒他們因為常常在一起打獵性情十分契合便拜了弟兄吳古居長陸曾本來是住在悲雲寺裏的自從結拜之後便搬到媚茹村來與吳古同住在一起了這天他們兩個人打了許多獐兔之類高高興興地由山裏回來二人進了屋子陸曾將肩上的獵包放了下來對吳古笑道我們今天吃點什麼呢吳古笑道隨便吃些罷不過我這幾天悶得厲害想點酒吃吃難得今天又獵了兩隻野雞何不將它燒了下酒呢陸曾拍手笑道好阿我正是這樣的想法我來辦酒你去燒雞好麼吳古道好陸曾便提了一隻小口酒瓶順手提了兩隻灰色的大兔子出得門來向西走過數家便是一家酒店他笑嘻嘻地走了進來將兔子往匱檯上一放説道葛老闆這兩隻獵包你估量著值得幾文請你換些酒給我們那帳臺子上坐的一個人擡間朝他望了一眼便擺下一副板板六十四的面孔來説道陸曾你什麼緣故隔幾天總要來纏一回我們的酒須知是白灼灼的銀子買得來的誰與你這些獵包調換呢他聽説這話便低聲下氣地向那人笑道葛先生今天對不起你請換一換因為天色晚了送到洛陽去賣也來不及了只此一遭下次斷不來麻煩你老人家的那葛先生把臉往下一沈説道陸曾你也太不識相一次兩次倒不要去説你到我們這做生意的人家來不應拿這樣東西蹭蹬我們陸曾聽他話不禁疑問道葛先生你這是什麼話難道這兩隻獵包就不值錢麼他道誰説你不值錢的不過你不曉得我們的規矩罷了陸曾笑道既然值錢就請你換一換罷那姓葛的聽這話將筆往桌上一擲説道你這個傢夥忒也胡話我不是對你説過了嗎難道你的耳朵有些不管用麼別的東西可以換酒惟有這東西不可以的陸曾賠笑道你老人家方才不是説值錢的麼既然值錢又為什麼兀的不換呢他大聲説道你這獵包只可到洛陽去賣自然值錢要調換東西隨你到誰家去大約沒有人要吧陸曾笑道究竟是一個什麼緣故呢他道你也不用纏了請出去罷再在這裏我們的生意還要被你蹭蹬盡了呢你要換酒你去尋金老闆我不相關陸曾道請你不要講這樣的推牌的話換便換不換算罷什麼金老闆銀老闆的他怒道不換不換快點請出去休要在這裏嘰嘛嚕蘇誰有空子與你講這些廢話陸曾到了這會真是忍無可忍耐無可耐禁不住心頭火起大聲説道換不換有什麼要緊呢誰像你鼓眼暴筋的哪個來看你的臉嘴呢不要這樣頭伸天外的自大自臭我陸曾也是拿東西來換你的酒的又不是來白向你討酒吃的何必這樣的赤頭紅臉的呢那姓葛的聽他這句話更是怒不可遏將桌一拍大聲罵道滾出去陸曾聽這一罵禁不住將那一股無名的孽火高舉三千丈按捺不下便潑口罵道好雜種出口傷人誰是你吃的小魚小蝦擡舉你喊你一聲先生不客氣誰認得你這野種咱老子的飯碗也不擺在你的鍋上你好罵誰你將狗眼睜開不要太低看了人他正在罵得起徑的當兒早驚動了金老闆從後面走了出來見葛先生被他罵得閉口無言作聲不得忙上前對他笑道陸曾你今天又為什麼事情在這裏亂發揮人呢陸曾見他出來忙將以上的話告訴與他他笑道原來為著這一些事兒葛先生你忒也拘謹了就換些酒與他又何妨呢他説罷便自己親自動手倒了一甕子酒對他笑道你卻不要怪他你不知道我們做生意的規矩看見兔子和老鼠是第一討厭的像你前幾次拿幾隻野雞不是就換給你了嗎陸曾笑道這是什麼規矩呢金老闆道大凡做生意的都怕忌諱這兔子是最會跑的如果看見了兔子那一天的生意必定盡跑光了一筆不成功的陸曾笑得打跌道原來是這樣我卻不知早知有這樣的規矩無論如何也不將它拿來換酒的金老闆笑道只管拿來我是不怕忌諱的陸曾又道謝了一番才將酒甕提了動身到了家裏吳古已經將雞肉燒得停當正在那裏往碗裏盛呢見了他便擡頭向他説道你去換酒怎的到這會才來呢他笑道還要問呢險一些兒與那酒店裏的一個牛子動手打起來吳古忙問道換酒公平交易有什麼爭執呢他笑道要是照你這樣説倒沒有什麼話説了偏是那個牛子歪頭扭頸的不要野兔他説這獵包最蹭蹬不過吳古笑道你是拿兔子與他去換酒的嗎他道是的吳古笑道怪不道人家不肯換這獵包可賣不可換的他們這些生意人見了是犯惡的他道後來金老闆從後面出來倒傾了一甕子好酒與我你道可笑不可笑呢吳古笑道這金利他本是個再好沒有的人他在這媚菰村上倒很有些善名陸曾道那金老闆果然不錯一出來就滿口招呼我我倒不好意思起來他説著便扳起甕子倒了兩大碗向吳古問道大哥你吃暖的還是吃冷的他道現在天氣這樣的冷法怎好吃冷酒呢他道那麼就將酒甕搬到炭爐子上面一邊吃一邊溫罷吳古道好他們便將酒甕子搬到爐子上面坐下來先倒了兩大碗送一碗與吳古一碗放在自己的面前拿起筷子夾了一塊雞肉放在嘴裏啅啯啅啯的吃了不禁皺眉説道忒鹹了吳古笑道鹽被我放得失手了所以咸一些兒我不喜歡吃淡所以多放點鹽吃起來較有味些他説罷便端著酒碗呷了兩口陸曾也端起酒碗喝了幾口兩個人一面吃酒一面談話一直吃到二鼓以後正要收拾去睡覺猛聽得外邊人聲鼎沸呐喊震天陸吳二人大吃一驚忙開門一看只見有許多人手裏執著兵器東一沖西一撞好像是找什麼東西似的這正是在臘月中旬的時候月光如水寒風獵獵將二人吹得滿面發火陸曾耐不住翻身進房取出一把佩劍一個箭步竄出門來吳古忙對他説道兄弟你要到哪里去他道我去看看究竟是一回什麼事吳古忙道事不關己何必去多事呢他道我且看看再説他説罷方要動身猛聽有一個人連哭帶喊道阿呀我的兄弟被那畜生咬死了陸曾聽了這話便向吳古説道你聽見麼這準是什麼野獸沖到我們這裏來了你在家裏守門讓我去結果了它好替大家除害吳古道兄弟你去須要當心千萬不要大意他點頭答應大踏步向西走來只見前面一個五穀場上站了足有二百多人燈球火把照耀如同白日大家虛張聲勢地在那裏只是呐喊卻一個也不敢移動他走到他們的跟前只見那些人一個個縮頭攢頸地站在朔風之下不住地抖個不止還有的連褲子都沒有穿蹲在衆人的當中手裏拿一把火來預備去打野獸呢他揚聲問道你們在這裏做什麼的有兩個朝他上下一打量冷冷地答道我們是打野獸的你問它難道你還敢去打麼他笑道什麼野獸這樣的厲害要這許多的人在這裏打草驚蛇的衆人一齊説道你這兩句風涼話説得倒好聽我們這裏二百多人還不敢與它去碰險呢他道嗄我倒不相信什麼畜生這樣的厲害呢衆人道你要問麼就是西穀山上著名的大蟲名叫賽狻猊它不知怎樣好端端的要和我們做對競到我們的村裏來尋食了他笑道這畜生現在到哪里去了衆人一齊説道現在到西邊的深林子去了你難道還敢去捉它麼他聽這話不禁勃然大怒道我不敢捉就來了嗎可笑你們這班膿包空看人倒不少原來全是豆腐架子阿他説罷便一個箭步離開了五穀場耳朵邊還聽他們在那裏嘰咕道哪里來的這個冒失鬼不知死活他就想去捉大蟲豈不是自討其死麼還有個人説道你們這些人忒也沒有良心了誰不知道這畜生厲害呢他要去你們當阻止人家他這一去還怕不將小性命送掉了麼他耳朵裏明明聽著卻不去睬他們一徑向西邊而來不多時已到樹林的面前他緊一緊束帶握住佩劍仔細一聽果然聽裏面啅啯啅啯的聲音他暗道不好不好已經被這畜生傷了一個人了麼他蹲下身子趁著月光向林子裏面瞧去只見一隻極大的斑斕白額吊睛大蟲他暗道它在林子裏千萬不能去捉要將它引了出來才行呢他俯首尋了一塊碗大的石頭擎在手中運動全力對定畜生的腦袋擲去只聽得殼禿一聲他知道打中了便不敢怠慢立個勢子等待它出來這時候聽得怪吼一聲好似半空中起了一個霹靂那大蟲由林裏跳了出來直奔陸曾撲來他趕緊將身子一歪往斜次裏一躥那大蟲撲了一個空剪了一剪尾巴壁立起來伸開前爪復又撲了下來他便將劍往上一迎禁不住險些連劍震脫了手他飛也似地又讓到旁邊料瞧那大蟲前爪已被劃傷那大蟲狂吼一聲卻不奔他直向村裏奔來將一班站在五穀場上的人嚇得魂落膽飛沒命地向家裏逃去霎時家家閉戶個個關門一個影子都看不見了那大蟲轉過濠河直向五穀場上奔去陸曾哪里肯舍拔步飛也似地追到五穀場邊和大蟲對了面一沖一撞地鬥了多時那大蟲漸漸地爪慢腰松陸曾正要下手那大蟲回頭直向村後面奔去他仍然緊緊追去不多時追到一家的花圃裏那大蟲探探腰伏在地下動也不動他卻疲倦了站在大蟲的面前一手叉腰一手執劍喘息不止他兩個熬了多時陸曾一縱身搶劍就刺那大蟲霍地跳了起來舉起右爪劈面抓來他將頭一偏讓過它一爪跟手還它一劍那大蟲吼了一聲跳開了數丈他追上來又是一劍那大蟲就地一縱四足離地足有四尺多高他趕緊往邊一躥差不多剛立定腳那大蟲張開血盆似的大口搖一搖頭就要來咬他忙將身子往後一縮冷不提防腳底下絆著一塊石頭便立腳不穩推金山倒玉柱地跌了下去那大蟲趕過來兩爪搭著他的肩頭張口就咬他急用劍削去只聽哢嚓一聲那大蟲的下頜被他削去那大蟲受了痛沒命地把頭一埋正埋在他的胸口這一撞他卻吃不消了便不知不覺地昏厥過去幸虧那只大蟲也就死於非命了不表他昏厥過去再説這花圃裏主人姓孫名扶乃是一莊的首領他在三十九歲的時候就死了只留下他的夫人童氏和一個女兒小字壽娥並有良田千頃富為一縣之冠童夫人自丈夫死後恐怕有人想謀産害他們母女兩個所以請了二十個有武藝的人在家保護今晚聽説西穀山的賽狻猊撞到他們的村上來吃了好幾個人了不禁魂飛膽落忙吩咐一班保家的前門十個後門十個加意防範母女兩個卻躲到後面一座高樓上恰巧陸曾趕到他們家花圃和虎惡鬥他們看得清清楚楚後來見陸曾與虎全倒在地下動也不動童夫人與壽娥一同下樓喊一班家丁到花圃裏去看看究竟那守後門的十個人各執兵器蜂擁向花圃裏而來瞥見一只頭如笆斗腰廣百圍的大蟲倒在血泊裏不禁嚇得倒抽一口冷氣一齊回身要走有一個喊道它已經死了怕的什麼呢衆人齊道你不用來搗鬼那大蟲是不曾死休要去白送了性命罷那人笑道你們難道全是瞎子嗎兀的那地下的不是大蟲的下頜麼它如果是一隻活的見你們來還這樣的聞風不動麼衆人聽他這話很有道理便一齊立定了腳步再仔細一看那大蟲的身旁邊睡著一個人手裏還執著一把雪亮的青鋒劍呢有一個説道怪不道這大蟲丟了性命差不多一定是這個人將它刺死的衆人齊聲道是這正是一燈如豆行將熄幸遇添火送油人要知後事如何且看下回分解
