body:
  text: 第一百二十回漢祚告終一王死孝暢談風月結束全書卻説東方大娘和鶼兒從左邊甬道直向後面而來轉過聽雨台便到輔德宮了他兩個潛身進去裏面空洞洞的暗無人聲東方大娘好生疑惑悄悄地向鶼兒説道我們上了那兩個牛子的當了你看這裏一些兒人聲也沒有他們一定是不在這裏了鶼兒搖頭道未必未必這裏是明間他們倆或許是在上房裏也未可知東方大娘半信半疑和鶼兒走進上房只見裏面燈光未熄簾幃沈沈帳子裏有鼻息的聲音東方大娘一個箭步縱到床前用刀將帳子一挑只見司馬師和郭氏並頭交頸的正在好夢方酣的時候東方大娘只氣得渾身發抖翻起三角稜的眼睛一聲怪叫道我的兒你巡察得好阿他這一聲怪叫將他兩個從夢中驚醒睜眼一看把個司馬師嚇得三魂落地七魄升天渾身好像得著寒熱病似的零零碎碎地動個不住東方大娘露出一嘴的黃牙一聲獰笑道好極了巡察巡到貴人的床上來了司馬師哪里還敢答話披起衣裳便想動身東方大娘的三角稜眼睛一睜冷冷地道到哪里去司馬師嚇得趕緊將腦袋往腔子裏一縮動也不敢動一下於東方大娘向鶼兒罵道你這呆貨站在那裏發你娘的什麼呆還不過來幫助我動手等待何時鶼兒慌忙過來一把將郭貴人從被窩裏拖了出來赤條條的一絲不挂東方大娘指著他罵我把你這個不要臉的賤貨司馬師他是個怎樣的一個人你也不去打聽打聽就和他勾搭了枉把你做了一位堂堂皇皇的先帝的愛妃這些偷漢子的勾當就像你做的嗎好賤貨我殺了你看你有什麼臉面去見泉下的曹丕罵得郭氏低首無言閉目等死東方大娘又指著司馬師罵道天殺的今天還有什麼花樣在老娘面前擺了快一些兒擺出來罷怪不得成日價借著閲操巡察的調兒來哄騙我呀原來還有這一回事呢好不要面孔的東西你的祖宗差不多也未曾積德才生下你這個亂倫滅理的畜生來的我且和你去見萬歲去嚇得司馬師磕頭如搗蒜地央告道夫人不看今日的面上還要想想當年的恩愛好夫好妻的都要原諒我一些才好便是我做錯了事今天你恕我初犯下次改過自新就是了如果下次我再犯這些毛病隨打隨罰如何東方大娘聽他這番話越發火上加油兜頭一口道呸休放你娘的屁這些話我不知道聽見過幾次了當初鹹的辣的死貓死狗亂去勾搭我倒不大去和你計較深怕人家曉得了損失你的威名誰想你這不知高下的雜種給你搽粉你不知道白越來膽越大竟和主子爺的愛妃勾搭了你不怕天下萬人唾罵也要留兩個指頭給你的老子遮遮才是今天任你説出血來我只當蘇木水非要和你去見萬歲不可司馬師哪里肯去只管千夫人萬賢妻的在地上討饒不止東方大娘罵得心頭火起拔出朴刀霍地在郭氏的粉頸上一橫説時遲那時快一顆頭骨碌碌滾向床肚裹去了鮮血直噴霎時將一頂白羅的帳子染成胭脂的顔色司馬師嚇得魂不附體俯伏在地上連大氣也不敢喘一下子東方大娘拿著血刀向他一指道如今你好去和他尋樂了話猶未了只聽得宮門外人聲嘈雜霎時間一對一對的宮燈由宮女們撑著擁了進來曹睿和一群守宮的武士陸續趕到大家擁進房見了這種情形一個個張口結舌連一句話都説不出來東方大娘走到曹睿的面前正想説話不料有個侍衛太不識相他攔住喝道那裏來的野婦人聖駕在此休得亂闖東方大娘將金黃色的眼珠一轉罵道放你娘的狗屁老娘認不得什麼聖駕神駕他説著劈面一掌將那個侍衛打出三丈以外餘下的侍衛嚇得好像泥塑木雕的一般沒有一個敢再來討沒趣東方大娘振振有辭地將方才一番情形説了一個暢快迫著曹睿定司馬師的罪曹睿此刻才如夢初醒不覺又羞又氣又惱又怕要是不定司馬師的罪眼見東方大娘煞神也似地站在旁邊萬一定了罪又怕司馬懿回來翻臉倒弄得無話可説怔怔的半天才説道夫人且請回府孤家自有處分東方大娘很爽快地説道好極好極他回頭向司馬師説道我和你做了八年的夫妻一場我想起來在你家總算沒有什麼失德之處不想你這個估惡不悛的東西三番兩次兀地不肯改掉你那畜生的行為我和你的緣份滿了我如今要走了我卻要交代你兩句話我走後你若改過我還可以重來如若不改前非我不獨不來你還要當心你那顆腦袋他説罷長嘯一聲帶著鶼兒身子一晃早巳不知去向了曹睿一腔子的惱怒無處發泄惡狠狠地盯了司馬師一眼悶悶地回宮去了司馬師從地上爬起來一溜煙回府去了曹睿經這番驚恐羞憤不禁病了不上兩月一命嗚呼司馬懿回都與衆大臣立太子芳為魏王從此司馬的勢力更進一層加之曹家的梁柱像曹仁曹洪曹休等先後死亡他們越發肆無忌憚了司馬懿司馬師在丙子十四年至十九年相繼而亡司馬昭愈覺無法無天出入羽葆自加封為相國並加九錫此刻稚子曹芳已被廢為齊王遷居河內立曹髦為魏王了不上數年曹髦見司馬昭威權日重自己沒有一些權柄心中十分怨恨對內侍臣每每談到司馬昭即切齒咬牙宛然有殺昭的念頭不想一般內侍臣為趨奉司馬昭起見暗地裏報與司馬昭司馬昭聽得勃然大怒與成濟賈充等一班佞臣生生將曹髦刺死在南闕下又立燕王曹宇的兒子曹奐為魏主炎興元年司馬昭大舉犯闕遣鄧艾率大兵三萬自狄道甘松集中以拒薑維諸葛瞻率兵三萬自祁山趣武街橋頭斷薑維的歸路鍾會領兵十萬分斜谷駱穀子午谷三路進窺漢中勢如破竹不到兩月各路的賊兵已由陰平近逼成都雖有薑維張翼輩死力抵禦無奈人衆我寡連連失敗諸葛瞻在綿竹戰死此刻劉後主在都中一些兒風聲也沒有得到鎮日價飲酒調琴晝寢夜興度他的夢中生活讀者聽我這話不要罵我胡謅麼不原來有個原因後主的駕前文武尚稱齊整論兵力論地勢賊兵皆沒有入寇成功的可能其誤在諸葛瞻若在陰平扼險拒守縱使賊兵衆多不曾發生效力的陰平一錯遂將漢室江山斷送與他人了再誤在黃皓這黃皓本是個禍國殃民的賊子後主偏偏要器重他言聽計從此刻風聲鶴唳草木皆兵的時候各處告急的本章如同雪片相似皆被黃皓收起不教後主知道一些兒風聲等到賊兵將都城困得水泄不通後主才如夢初醒忙召群臣商議退敵的計劃黃皓進言道魏兵勢大料想我們不能抵禦了不如開城投降為妙話猶未了瞥見文班中走出一人手執牙笏指著黃皓罵道你這老賊師婆的神言今天如何不驗漢室的江山斷送在你這老賊的一人手裏了你此刻還要落井下石勸我主投降他人你難道沒有心肝麼就是投降魏主未必就讓你一個人去偷生了好姦賊我與你將性命拼了罷那人説罷舉起牙笏向黃皓劈面擲來黃皓趕緊躲避不料黃皓卻沒有擲到後主額上倒著了一下子後主大怒忙命拿下兩邊的武士不由分説將中大夫楊沖從禦座前抓了就走後主連聲喊道欺君罔上的賊子給我推出去砍了不多時一顆血淋淋的人頭捧了進來後主才算息怒群臣有的主張投吳有的主張降魏意見分歧莫衷誰是譙周越班奏道自古沒有寄居他國做皇帝的道理而且孫亮器小不能容物與其受間接之辱不若受直接之辱現在奉璽乞降或者不失封侯之位呢後主還未答話從屏風後面轉出一人厲聲罵道譙周匹夫漢家哪里薄待於你竟勸萬歲乞降于國賊腐儒偷生畏死豈可妄議社稷大事自古安有降敵的道理後主一望來者不是別人正是白帝王劉諶後主張目厲聲道衆大臣皆議以降為佳你偏欲仗血氣之勇要滿城流血麼劉諶叩頭道先帝在日譙周未嘗干預國政今妄議大事言輒非理臣竊料成都之兵尚有五萬多人薑維全師在劍閣若知魏兵犯闕焉有坐視的道理我們這裏開城拒敵薑維得信必來援救那時內外夾攻管叫他片甲不回豈可聽這班賣國賊的話輕輕地廢棄先帝之基業後主聽得勃然大怒叱道你是個不識天時的小孩子曉得些什麼劉諶笑道如果勢窮力竭寧可君臣父子背城一戰戰勝固佳萬一殉難也好見泉下的先帝了後主不聽劉諶放聲大哭道吾祖創此基業誠非容易今一旦棄之吾臨死不辱後主不耐他的瑣屑命人將他推出宮門這裏和張紹鄧良譙周等商議一會子決定先命他們三人奉璽乞降又令蔣顯齎旨去招薑維降魏擇定於十二月十一日君臣開城出降這個風聲傳到劉諶的耳朵裏可憐他心膽俱碎獨坐在中堂上將那股無名的憤火高舉三千丈按捺不下坐立不寧在中堂上踱來踱去一陳子想起先主在日何等艱苦豈輕容易創此基業不料如今一旦棄了他想到這裏不由得捶胸頓足哭聲如雷吼他的夫人崔氏正在後方教子讀書猛聽得中堂上有人號哭大吃一驚忙向丫頭小雪蓮道你快些到前面去看看誰在中堂裏啼哭小雪蓮答應著走到中堂的屏風後面偷偷地望了一眼慌忙轉身飛也似地跑進來對崔夫人説道王爺不知為著什麼事情正在中堂上哭著哩崔氏夫人不敢怠慢輕移蓮步扶著小雪蓮向中堂而來不多時走進中堂劉諶的哭聲未止眼中流血夫人忙近來襝衽問道王爺什麼事情這樣的悲傷劉諶拭淚止住哭聲歎了一口氣道夫人你可知道我劉家四百多年的基業要送給他人了崔氏夫人聽得這話大吃一驚忙問道王爺這是什麼話呢劉諶半晌不答兩眼望著天空只是發愣崔氏夫人真是丈二的金剛摸不著頭腦侍立在旁邊不敢再問列位現在魏兵已困城多日了難道崔夫人就一些兒不曉得麼原來劉諶向來和崔氏敬愛如賓劉諶早朝回來只談家事不談國事崔夫人一向知道劉諶的脾氣他從不問過一句他生了三個小爵主乃是劉恕劉忠劉驥他除了料理家事以外鎮日在閨中教著他們讀書所以外邊隨便怎樣的變動他卻不知道一些兒的此時聽得劉諶突然説出這樣話來他如何不驚眼見劉諶滿眼鮮血一頭的青筋根根暴起仰首直視好像瘋了的一樣崔夫人見這等光景料知事出非常低聲問道王爺究竟是怎麼一回事呀他轉過身來見崔夫人立在身邊忙問道夫人你是幾時來的我怎麼沒有看見你崔夫人道王爺今天吃醉了不成劉諶道我未曾醉劉諶説罷復又流著血淚崔夫人問道王爺既沒有醉何以失卻常態呢劉諶霍地跳起來握著夫人的手哭道我的夫人我要盡忠了你替我將三個兒子看顧成人他們能替我出口怨氣替祖宗報仇我在九泉之下也就瞑目了他説罷一掇手拔出寶劍向頸上就就勒慌得夫人死力扳著他的臂膊哭道王爺你究竟為著什麼事情呀劉諶哭道夫人還問什麼現在魏兵已將都城圍得水泄不通了一班偷生怕死的賊臣儘是勸著父王降魏前天我在朝上扳駁了一本無奈父王執迷不悟不聽我的諫勸將我趕出朝來今天聽得城中的人十個有九個説父王已將玉璽著人送與鄧艾了擇定十二月十一日開城出降夫人你想先帝三十年血汗換來的基業父王毫不經意地棄於他人我雖説沒有反對的可能但是父王既降了賊國我還能隨他一起去面見他麼不如死了九泉之下也好見先祖父了崔夫人哭道王爺你能盡忠我難道就不能盡節麼劉諶聽説又驚又喜的緊握著他的手笑道夫人你是真話還是假話呢崔夫人正色説道王爺哪里話來王爺盡忠我偷生在世上眼見萬歲投降敵國我難道認真做一個不節的婦人麼劉諶道夫人你的話固屬不錯但是你我死後那三個孩兒卻依靠何人來撫養呢夫人哭道王爺盡忠妾身盡節他們當然也要盡孝了劉諶大笑道好哇這才算是我劉諶的妻子呢崔夫人撒手對著劉諶福了一福哽咽著説道王爺妾身先到泉下去候你了劉諶悽惶著一句話也答不出來崔夫人扶著小雪蓮向後面而去不多時小雪蓮出來報道王爺不好了夫人在後面自縊歸天了劉諶道罷了你去將三個公子喊來我有話説小雪蓮心中明白忙向後而來到了書房裏將劉恕等三人喊來劉諶將以上的事情怒氣衝天地説了一遍劉恕等人一齊跪下哭道母親已經先去了我們當然隨父王一道去他們説著在袖裏取出砒霜納入口中不多時藥性發作一個個撲地倒下七孔流血三道魂靈追隨著崔氏去了劉諶心肝俱碎忙將家中的僕從傭人一齊喊來對他們慷慨激昂地説道現在我和諸位要分手了承你們一場侍候我實在對不起你們你們各自去罷願你們以後一個個飛黃騰達我在九泉之下也就安慰了衆人一齊流淚説道王爺哪里話來王爺盡忠夫人盡節公子盡孝我們難道就不能成全王爺的一個義字麼他們説罷東碰頭西撞柱霎時七歪八倒沒有一個的活了劉諶提劍徑入後堂只見小雪蓮也自縊在夫人的旁邊他將崔夫人的頭用劍割下復又走到中堂將劉恕等的首級割下提在手中就地放起一把火來他大踏步出了府門直向昭烈齋而來到了昭烈廟倒身跪下大哭道臣羞見基業棄於他人無法挽救故殺妻子以絶挂念後將一命報祖祖如有靈知孫之心不負孫今朝一死了他説罷大哭一場拔出寶劍向頸一橫鮮血直噴一道英靈直隨夫人去了後主聽説劉諶自刎毫不悲痛直命人將他葬下滿城的百姓聽説白帝王盡忠沒有一個不痛哭流涕後主到十二月十一日的清晨大開四門魏兵大隊進城從此以後再沒有漢家的書説了總計蜀漢二帝在位共四十三年合兩漢二十六帝共四百六十九年一座錦繡江山給後主容容易易送與他人豈不可惜小子這部漢宮寫到這裏也就擱筆了
