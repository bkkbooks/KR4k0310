body:
  text: 第三十二回改遺詔雍正登位好美色胤示我喪命卻説康熙皇帝在暢春園養病這個消息傳到雍郡王胤禛耳中他便趕先到暢春園去叩請聖安無奈這時皇帝病勢十分沈重心情又十分煩燥不願見家人骨肉胤禛請過聖安以後只得退出房外在隔室悄悄地打探消息這時在皇帝跟前的除幾個親近的內監和宮女以外只有國舅隆科多將軍鄂爾泰大學士張廷玉三位大臣終日陪著幾位禦醫料理方藥這三位大臣原和雍王打成一片的自不必説便是那太監宮女平日也得了雍王的好處凡是皇帝一舉一動一言一語都悄悄地去報告雍王知道內中有一位宮女原是貴佐領的女兒進宮來已有四年因他長得美麗性情也十分伶俐便把他派在暢春園裏專候臨幸時伺候皇帝皇后的他如今見雍王相貌十分威武知道他將來有發達之日便覷空溜到隔房去陪些小心凡是茶水飲食有不周不備的地方都是他在暗中料理雍王這時獨居寂寞得了這個知已自然十人歡喜覷人不防備的時候他兩人居然結了私情雍王答應他倘然一朝登了皇位便封他做貴妃那宮女越發感激從此格外忠心這時雍王和隆科多又商量過假造皇帝的旨意説病中怕煩所有家人骨肉一概不許進園可憐那些妃嬪郡王公主親貴一齊都擋住在園門外便是皇后也只得在園門口叩問聖安一任雍王在園里弄神弄鬼看看那皇帝病勢一天重似一天那些禦醫看了也是束手無策只是天天灌下人參湯去苟延殘喘看看到十一月底天氣十分寒冷皇帝睡在禦床上喘氣十分急迫他自己知道不中用了忙吩咐隆科多把十四皇子召來那隆科多早已和雍王預定下計策奉了皇帝的命令出來把雍王喚進屋去看皇帝時已進氣少出氣多這時隆科多走出園來見園門外擠了許多皇子妃賓他便故意大聲喊道皇上有旨諸皇子到園不必進內單召四皇子見駕説罷喚親隨的拉過自己的馬來嘴裏説找四皇子去快馬加鞭地去了你道他真的去找尋四皇子麼只見他飛也似地跑進宮門走到正大光明殿上命心腹太監悄悄地從匾額後面拿出那康熙皇帝的遺詔來現成的筆黑他便提起筆來把詔書上寫著傳位十四皇子一句改做傳位於四皇子改好以後仍舊藏在原處悄悄地出了宮門又飛也似地回到暢春園去這時康熙皇帝暈厥過去幾回到傍晚時候才慢慢地清醒過來睜眼一看見床前有一個人跪著雙手高高地捧著一杯參湯口中連喚著父皇康熙皇帝模模糊糊認做是十四皇子便伸手過去摸他的臉那雍王趁此機會爬上床去皇帝睜著眼端詳了半天才認出並不是十四皇子乃是四皇子胤禛不由他心頭一氣只喊得一聲你好一口氣轉不過來便死過去了胤禛看了假裝做十分悲哀嗥啕大哭起來外面太監一聽得裏面哭聲忙搶進來手忙腳亂替皇帝沐浴更衣這裏隆科多進來把雍郡王扶了出去雍郡王悄悄地問道大事成功了嗎那隆科多只是點點頭不作聲兒停了一會園門外的諸王妃嬪聽説皇帝駕崩便一擁進來這時除胤礽病著胤禔胤祀禁著胤禵出征在外所有三皇子胤祉七皇子胤祐九皇十胤禟十皇子胤示我十二皇子胤祹十三皇子胤祥此外還有胤祺胤禌胤禑胤祿胤禮胤禧胤祜胤祁胤祜共十六個皇子和三宮六院的妃賓趕到禦床前趴在地下放聲舉哀哭了多時隆科多上來勸住説道國不可一日無君民不可一日無主如今大行皇帝龍馭上賓本大臣受先帝寄託之重請諸位郡王快到正大光明殿去聽本大臣宣讀遺詔諸位皇子聽説父皇有遺詔個個心中疑惑不知道是誰繼承皇位內中胤禟胤示我尤其著急只怕這個皇位被別人得去因此急急地趕到正大光明殿去候旨一會兒那滿朝文武都已到齊階下三千名禦林軍排得密密麻麻大家靜悄悄地候著只見那隆科多鄂爾泰張廷玉三人走上殿去殿上設著香案三人望空行過禮便從匾額後面請出遺詔來隆科多站在當殿高聲宣讀讀到傳位於四皇子一句階下頓時起了一片喧鬧聲值殿大臣上來喝住才把那遺詔讀完四皇子胤禛也一塊兒跪在階下候旨這時便有全班侍衛上來把胤禛迎上殿去老實不客氣把皇帝的冠服全副披挂起來擁上寶座殿下禦林軍三呼萬歲那文武百官一個個上來朝見禮畢新皇帝率領諸位郡王親王貝子大臣等再回到暢春園去設靈叩奠遵制成服第二日把先皇遺體奉定在大內白虎殿棺殮供靈新皇帝下旨改年號為為雍正元年這位雍正皇帝便是在清史中著名毒手狠心的世宗當時他跪在地下聽讀遺詔的時候誰在下面喧鬧他都暗暗地看著到了一登龍位他第一道聖旨便革去胤禟胤禟的爵位説他們擾亂朝堂犯了大不敬的罪立刻把這兩人捉住送交宗人俯嚴刑審問那胤禟熬刑不過只得招認了説如何和胤祀兩人在外面結黨營私謀害胤礽後來見胤礽得了瘋病幽囚在宮中便知道他是不中用了因此日夜想法謀害胤禛無奈胤禛手下養著許多好漢非但不能傷著他分毫而且眼看著他得了皇位因此心中氣憤不過當時禁不住在朝堂上喧鬧起來宗人府録了口供奏明雍正皇帝皇帝吩咐從牢監裏把胤祀提出來審問胤祀見胤禟都招認了便也無可抵賴當即直認不諱只求皇帝開恩饒他性命聖旨下來把胤祀胤禟兩人打入宗人府監獄裏稱胤祀阿其那阿其那是豬的意思你胤禟為塞思黑塞思黑是狗的意思第二天又提胤示我出來審問這胤示我卻不是尋常郡王可比他是少林寺的嫡派弟子學得通身本領能飛簷走壁銅拳鐵臂等間三五十人近不得他的身雍正皇帝做郡王的時候也曾吃過他的虧常常被他打倒在地故見了他就害怕遠遠見胤示我走來便躲避開去因此含恨在心如今登了皇位便要報這個仇恨胤示我這時候被宗人府捉來到得審問的時候他給你一個老不開口那府尹惱了吩咐用炯只見他大聲一笑一縱身飛上瓦去得無影無蹤那府尹忙去奏明皇帝皇帝也奈何他不得忙去把喇嘛請來要喇嘛用法術去殺死他喇嘛搖著頭説道要處治不容易他身邊常常帶著達賴一世的金符等間符咒近不得他的身皇帝問這金符可以奪下來嗎喇嘛説道平常時候不能下手只有候著他和女人親近的時候方可下手奪取他的金符雍正皇帝把喇嘛的話記在腦子裏吩咐心腹太監去設計擺布胤示我那胤示我自從逃出宗人府來超發狂妄不羈他最愛吃酒京城裏大小酒鋪子都有他的腳迹他穿著平常人的衣服有誰知道他是皇子他每到一處酒家便拉著店小二同吃東華門外有一家太白樓酒家釀得好三月白那店小二名余三人又生得和氣胤璟和他最説得上因此常在太白樓走動吃到酒酣耳熱的時候便拉著餘三坐下對酌談些市言村語越發借杯酒以澆塊壘便常常到太白樓來每來餘三便陪著談些花街柳巷的故事陌上桑間的豔聞那風流事務胤示我原是不擅長的只因這時他胸中萬分氣憤拿它來解悶消愁也未為不可誰知今天聽明天聽把胤示我這個心打活了越聽越聽出滋味來那餘三又説些風流家數花柳祕訣打個胤示我説得心癢難搔正在無可奈何的時候那酒壚邊忽然出現一個嬌滴滴的女孩兒來只見他斜嚲香肩低垂粉頸坐著有時向胤示我溜過一眼來頓覺魂靈兒被勾攝了去胤示我看了不覺拍案喝好只因滿屋子酒客坐著不便向他勾搭看看那女孩兒的粉腮嬌滴滴的越顯紅白胤示我看了忍不住喚了一聲美人兒那女孩子抿著櫻桃小嘴嚶嚀一笑轉過臉兒去看別處這情形被餘三看見了便哈哈大笑道相如賣酒卓女當壚俺家三妹子今天得貴人賞識也是他三生有幸説著便向那女孩兒招手兒説道三妹子過來陪爺吃一杯何妨那女孩兒聽了便笑吟吟地走過來在胤示我肩下坐著低著頭只是不作一聲兒胤示我看時長眉侵鬢星眼微斜不覺伸手去握著他的纖手一手送過一杯酒去那女孩兒含羞帶笑地便在胤示我手中吃幹了一杯胤示我連連嚷著妙一擡頭見那店小二余三早已避開了他兩人便唧唧噥噥地説笑起來了談到夜靜更深那女孩兒便悄悄地伸手過去把胤示我的衣角一扯站起身來便走胤示我也不覺身子虛飄飄地跟著他走到一間繡房裏羅帳寶鏡照眼銷魂那女孩兒服侍他寬衣睡下自己也卸裝解珮鑽進繡衾去和胤示我並頭睡倒胤示我睡在枕上只覺得一陳一陳芳香送進鼻孔來他到了這時便忍不住轉過身來對女孩微微一笑正在得趣的時候忽聽得譁啦啦的一聲一個大漢跳進屋子來伸手在衣架上先奪了胤示我衣襟上佩著的金符一轉身手中執著明晃晃的鋼刀向床上撲來胤示我忙把懷中的女孩兒推開喝了一聲只見他口中飛出許多金蛇直沖那大漢這時窗外跳進來四五個壯土個個手擎寶劍圍住這繡床奮力攻打無奈他口中金蛇來得厲害那刀劍碰著金蛇便毫無用處那大漢鬥了半天見不能取勝便打一聲呼哨帶著一班壯士跳出窗子逃走了回到宮裏回奏雍正皇帝皇帝聽了十分詫異忙問國師那國師説道這是婆羅門的靈蛇陳陛下放心凡學這靈蛇陳的必須對天立誓不貪人間富貴想來這胤示我決沒有叛逆的意思雍正皇帝聽了國師的説話將信將疑後來到底趁胤示我害病沒氣力的時候把他捉來關在監牢裏用毒劍殺死那胤示我和力士還奮鬥到三天連殺了三個劍客方死呢雍正皇帝拔去這幾個眼中釘心中才覺爽快誰知隔了不多幾天又有邊關報到説青海的羅布藏丹津引誘喇嘛察罕諾門覷著世宗新接皇位多庭多故的時候便乘機造反先派人去勸額尼爾德尼郡王察罕丹津親王兩人一同舉兵殺進關去誰知他兩人都不聽從便惱了羅布藏丹津調動兵馬先把一位郡王一位親王趕進關來那親王和郡王被他逼得走投無路便動文書進京來告急雍正皇帝看了文書心下正在躊躇忽內侍進來報説國舅隆科多求見皇帝連説請進兩人見了面皇帝説道舅舅來得正好便拿邊關告急文書遞給他看那隆科多看了便説道臣也為此事而來陛下不是常常説起那年羹堯擁戴之功不曾報麼又不是説那胤禵屢經征戰深得軍心是可怕嗎還有陛下做郡王的時候招納了許多好漢養在府裏如今大功已成他們都仗著自己是有功的人在京城裏橫行不法實在不成事體如今卻巧邊關上出了事體陛下不如下一道諭旨派胤禵做撫遠大將軍年羹堯做副將軍從前陛下招納的英雄好漢都一齊封他們做了武官由年羹堯帶他們到青海去免得留在京城惹是生非雍正聽了説道計雖是好計但是老年辛苦了一場叫他做一個副將軍怕委屈他罷再者那胤禵給他做了一個大將軍怕越發不能制服他呢況且那班英雄好漢怕也不都永遠叫他住在青海地方他日回京來依舊是個不了隆科多聽了皇帝的話笑説道陛下莫愁臣自有作用在裏面接著又低低地把裏面的深意説了雍正皇帝聽了不覺拍案叫絶第二天坐朝便把胤禵封為撫遠大將軍年羹堯為副將軍一面又叫鄂爾泰袖著密諭去見年羹堯吩咐他如此如此年羹堯受了密諭連日搜集那班江湖好漢保舉他做副將做參贊做都統千總把總的那班好漢一旦做了大官便十分歡喜看看調齊了八萬大兵皇帝吩咐副將軍帶領兵馬先行起程撥隊那一天天子親自出效送行在路上足有三個月行程到了四川邊疆地方會合了四川的副將嶽鍾琪手下四萬兵馬浩浩蕩蕩殺向青海去雍正皇帝待年羹堯去了兩個月才放胤禵出京挂了大將軍帥印帶著一百個親兵輕裝簡從地趕著路程到了四川成都省城打聽得年羹堯已帶兵殺出關去了胤禵心中疑惑怎麼副將軍不待大將軍的軍令擅自出兵正氣悶的時候忽然有廷寄送到胤禵忙擺設香案接受聖旨一位太監宣讀道撫遠大將軍胤禵著即免職所有印緩交年羹堯收著授年羹堯為撫遠大將軍嶽鍾琪為參贊胤禵才聽罷聖旨回過頭來一看那年羹堯也和自己並肩跪著接旨到這時胤禵心中才明白皇帝是調虎離山之計如今他自己的軍隊又不是跟前手中又失了兵權便也無可奈何窩著一肚子氣把印信交出拂袖而去只因他這時無權無勢他的行蹤也便沒有人去查問他這且按下不表説話廣東省珠市上有一有買賣行主人姓梁連年買賣不佳虧折已盡店主人和夥計們終日愁眉不展坐在店堂裏發怔看看已到年關債戶四逼這姓梁的無法可想吩咐小夥計到江邊照財神去原來這照財神是廣東商家的風俗倘有營業不振便在江邊樹一杆旗杆杆頭挂一盞紅燈名叫照財神這家買賣行恰巧開設在江邊誰知紅燈才挂上忽然有一隻大貨船駛近店門口停下船上跳下一個大鼻子家人來操著北京話問道行主人在嗎姓梁的忙出來招呼那家人領他到船上只見一個中年男子體態魁悟舉動闊綽他自己説姓金此次販賣許多北貨茶果特到廣州來銷售只因找不到熟悉的行家只見你家門口挂著紅燈特來拜託那姓梁的看船中貨如山積沒有三五十萬銀子休想買得到手但是這時廣東正缺少北貨倘能把這一船貨買下定可大大地發一筆財只恨自己手頭沒有本錢心中便萬分焦急那男人看出了店主人的心事説道你倘沒有本錢也不要緊我船中有四十萬銀子的貨物暫時寄存在你店中托你慢慢地銷售現在我並不要你分文待到明年這個時候我再來和你結帳那店主人聽了他的話十分喜歡連連對他作揖道謝一面備辦極豐富的酒席款待這客人一面雇了許多夫役把船上的貨物統統搬進店去那客人吃過了酒飯説一聲叨擾便上船去了這姓梁的在店中替他經營貨物不上半年功夫那許多貨物都已銷去了整整的賺了十萬銀子店主人將貨款去存在錢鋪子裏生利只待那客人到來結帳看看又到年底姓梁的便打掃店堂預備誕席自己穿著袍褂恭候著那夜裏那客人果然來了十隻大船一字兒停泊在這買賣行門口船上都載滿著南北貨物和參佳藥品那客人走上岸來一見了主人便拉著手笑吟吟地説道此番夠你忙了我船上有四百多萬銀子的貨物你快快想法子起岸吧那店主人一面招呼客人吃酒一面招集了合城的買賣行主人商量堆積貨物的事體頓時雇了五七百個伕役搬運貨物吆喝之聲滿街都聽得搬完了貨物姓梁的才進來陪著客人吃酒酒醉飯飽主人捧出帳簿來正要結帳那客人把帳簿推開説道你決不有錯俺們慢慢地算罷説著站起身來便告辭去了臨走的時候説道此去以三年為限到那時我自己來和你算帳現在不必急説著跳上船頭解纜去了這姓梁的自從那客人去後著意經營居然十分發達不上三年工夫那十船貨物早已銷完姓梁的天天候著到了大除夕這一天那客人果然來了一見主人便説恭喜主人一面招呼酒食一面告訴他那宗貨銀連本搭利已在六百萬以上分存在廣州各錢莊家如何處置悉聽大爺吩咐那客人聽了便説道提出一半貨銀劃付漢口德裕錢莊其餘的一半且存在廣州再説主人聽了客人的吩咐便連夜到各錢莊去彙劃銀子看看到了正月初五那客人孑然一身只帶一個家丁住在姓梁的買賣行裏姓梁的雖是天天好酒好菜看待他但他總覺得寂寞無聊要知道這客人到底是什麼人且聽下回分解
