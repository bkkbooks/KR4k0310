body:
  text: 第二天皇帝坐朝那刑部滿尚書出班來正要奉請把那回酋犯妻發還乾隆皇帝知道他的意思不待他開口便先説道霍集占大逆不道屢抗皇師朕原意將他夫妻正法只因罪大惡極朕昨夜已經拿他的女人糟踏了言畢哈哈大笑一時文武官員見皇帝語無論次都十分詫異大家面面相覷殿角鐘鼓聲響皇帝已退朝了那霍集占的妻子十分妖冶的乾隆皇帝上了手便夜夜舍他不得把他留在景仁宮裏朝朝取樂並封他為回妃第二年便生下一回皇子皇帝越發寵愛他回妃説自己生長回部不慣清室的起居乾隆皇帝便要內務府在皇城海內造一座寶月樓樓上造一座妝台高矗在半天裏樓大九間四壁都嵌著大鏡屋子裏床帳帷幕都從回部辦來壁上滿畫著回部的風景這寶月樓緊靠皇城城外周圍二裏地方造著回回營回妃每天倚在樓頭盼望有時回憶起了家鄉之念不覺淌下眼淚來皇帝極意勸慰拿了許多珍寶博他的歡心回妃回嗔作喜便和皇帝在密室裏淫樂一回那密室建造得十分精巧壁上用金銀寶嵌成精細的花紋滿地鋪著厚軟的地毯室中除一衣架外一無所有北向壁上嵌一面大銅鏡高一丈五尺寬六尺人走在室中一舉一動都映射出來皇帝和回妃天天在室中調笑取樂第三年上回妃又生了一個皇子皇帝便把回妃改做旗女裝束去拜見太后太后認做皇帝新選的妃子又因他生了皇子便也十分寵愛他過了幾天適值皇太后萬壽皇帝為博太后的歡心命內務府傳集京城裏的伶人在大內戲臺上演劇皇帝親自扮做老萊子挂上胡演斑衣皇太后十分歡喜命宮女拿了許多糖果撤上戲臺去説賞老萊子那皇帝便在臺上謝賞引得皇太后呵呵大笑那班陪坐看戲的文武大員都一齊跪下采喚皇太后皇上萬壽無疆皇帝看了這情形心中忽然想起聖祖在日奉慈聖太后六巡江浙萬民歡悅如今朕登極十五年天下太平皇太后春秋正盛正可以及時行樂看看左右沒有人可商量的便想起高恪敏公正從南方回京來便在西書房召見恪敏恪敏是一個先朝老臣當下便竭力勸止説皇上為萬民所仰望只宜雍客坐守不宜輕盲出京乾隆皇帝聽了他的説話一時裏打不定主意心想和太后商量去便也不帶侍衛悄悄地向慈寧宮走去走過月畢門正要向隆宗門走去只聽得門裏有竊竊私議的聲音皇帝便站住了腳隔著一座穹窿偷聽時認得一個是自己逢格氏保姆的聲音一個不知什麼人對説著話那人間道如今公主還在陳家嗎逢格氏保姆説道那陳閣老被俺們換了他的兒子來只怕鬧出事來告老回家如今快四十年了彼此資訊不也通不知那公主嫁給誰了那人又問道照你這樣説來陳家的小姐卻是俺皇太后的嫡親公主當今的皇上又是陳家的嫡親兒子嗎那保姆道怎麼不是那人説道這種大事可不是鬧著玩的呢你確實不曾弄錯嗎保姆認真地答道千真萬確當年是俺親手換出去的那主意也是俺替皇太后想出來的只因俺皇太后做了正宮多年不育又深怕別的皇子得了大位恰巧這時皇太后有了身孕那陳閣老太太也有了身孕陳太太和俺皇太后先時原是十分要好的皇太后常常召他進宮來遊玩打聽得他的肚子和俺皇太后肚裏是同月的皇太後便和俺商量養下孩兒倘是皇子那不必説倘是公主也須瞞著先皇假説是皇子一面打聽陳家消息倘陳家生下男孩子來便哄著陳太太把那男孩抱進宮來暗地裏把公主換出去後來果然陳家生了一個男孩子俺皇太后生了一個公主到兩家滿了月太后哄著陳太太把他兒子交乳母抱進宮來俺們一面把乳母留在宮門口廂房裏拿他弄醉了皇太后悄悄地喚俺去把陳家孩子換下來又把公主換出去公主臉上罩著一方龍袱那乳母醉眼朦朧也便抱著公主出宮去了那人聽保姆説到這地方便説道這樣説來俺們的當今皇上卻真正是陳家的種子了那保姆説道怎的不真可歎俺當時白辛苦了一場到如今皇太后和皇上眼裏看我好似沒事人兒一大堆罷了乾隆皇帝偷聽了這許多話心中十分詫異急忙轉身回禦書房一面打發人悄悄地把那保姆喚來當面盤問那保姆見皇上問他嚇得他爬在地下連連磕頭説皇上寬懷大量莫計較小人的説話奴才罪該萬死只求皇上饒奴才一條狗命乾隆皇帝便用好言安慰他命他起來説話又盤問他當時把自己換進宮來的情形保姆見皇上臉色十分和順便大膽把當時的情形細細地説了又説道奴才雖然該死卻不敢欺瞞皇上皇帝聽了他的説話知道這情形是真的不覺歎了一口氣怔怔的半天不説話那保姆站在一旁又不敢説話也不敢退出半晌只見皇帝把桌子一拍説道俺決意看他們去又叮囑保姆從此以後莫把這話告訴別人回房去罷那保姆回到房裏不久就被太監勒死了悄悄地把他埋葬在院子的牆角裏當乾隆皇帝和保姆説話的時候在禦書房裏面的一間古董房裏早把左右侍衛和太監們打發開了所以他們一番話卻絶沒有第三個人聽得但是皇帝聽了這個消息以後便處處留心覺得自己的面貌口音和先皇帝是截然不同的便心中越發疑惑第二天乾隆到了慈寧宮去請安見了皇太后便問道俺的面貌何以與先皇的面貌截然不同皇太后聽了這話臉上陡地變了顔色説不出話來乾隆皇帝看了心中越發雪亮從此便打定主意要到陳閣老家去探望他的父母但是皇帝深居簡出不能輕言巡遊如今要到江南去須假託一事故才可免得臣下諫阻忽然想起皇太后萬壽的日子快到了不妨説是承歡母后奉遊江南況且先皇奉慈聖太后六巡江浙已有先例這時工部又報稱海塘工竣更可以借閲海塘為名悄悄地到海寧探望陳閣老去主意一定便進宮去見太后説奉母出巡江南承歡膝下那太后聽了起初推託説此去又得勞動百姓不如免了罷後來皇帝再三慫恿著太后心想從前慈聖太后也曾享過這個福皇上有這一片孝心俺也可以享得便也答應了第二天皇帝坐朝把奉母南巡查閲海塘的意思説了當時雖有裘日修陳大受幾個大臣出班諫阻無奈乾隆皇帝南遊之心已定便也不去聽他一會下旨定於乾隆十六年四月南巡一面命大學士劉統勳代理朝政史貽直總攬軍務這個聖旨一下把那班沿途的官員忙得走投無路內中第一個自告奮勇的要算楊州的鹽商那商人平日恃勢壟斷得的不下數千萬內中要算江汪馬黃四姓最是豪富真是揮金如土日食萬錢的兩江總督知道他們有錢便叫他們承辦皇差有一個江鶴亭是個首商他家中有一座水竹園十分清幽養著一班小戲子天天在園中演唱歌舞如今聽得皇上南巡他便把花園修改得十分華麗那班戲子裏邊有一個唱小旦的名叫惠風長得玉膚花貌又能妙舞清歌江鶴亭又親自教授他許多新曲預備供奉皇上的同時另有一個大鹽商汪如龍他打聽得江家的事體便也預備接駕他家卻有一班女戲子個個長得仙姿國色煙視媚行內中也有一個頂尖兒的名叫雪如豆蔻年華洛神風韻全個揚州地方誰不知道汪家有這個尤物便是汪如龍自己也萬分憐惜雖説美玉當前也不忍加以狂暴所以雪如到十八歲年紀還是一塊無瑕美玉未經採摘此番聽説皇上南遊那汪坤士便和總督説知願以家伎全部供皇上娛樂到了兩宮動身那日車馬如雲帆檣相接一路上花迎劍佩露拂旌旗看看到了清江那兩岸的官紳手版腳靴匍匐在船頭上接駕皇帝傳總督進艙問話此地何處可奉太后駐駕總督奏稱有江紳的水竹園聊堪駐足皇帝便吩咐移駕水竹園一霎時水竹園中人頭簇擁車馬雜遝園內笙歌鐺鎝園外兵戟森嚴那江鶴亭上下奔走照料一切皇帝奉著太后禦宴觀劇席間見惠風軟舞清唱十分歎賞直到日影西移才登車回舟那江紳士送皇帝上船以後因惠風獻技深得皇帝的歡心意想明天總可以得到皇帝的賞賜心中十分欣慰便是那地方上的大小官員都替他預先道賀第二天一早兩江總督帶著文武官員到禦舟上叩問聖安那江鶴亭也夾在裏面誰知才到得埠頭只見太監們向他們搖手悄悄地説皇上正在舟中聽歌莫擾了皇上的清興嚇得那班官員躡手躡腳地不敢説一句那兩江總督求太監放他們到船頭上去伺候那太監也不肯大家沒法只得一字兒站在岸上伺候那汪紳士坐在船頭上和一班太監們説笑自如江紳士看了十分詫異又看看那船上四面黃幔低垂那一陳陳的清歌細樂傳上岸來叫人聽了不覺神往那江紳士心中十分詫異他想揚州歌舞在全國中要算第一而我家的集慶班在揚州地方又算是最上乘了如今什麼地方來了這班清歌妙舞竟叫聖上為他顛倒至此心中實在有些氣憤不過便拉著一個太監悄悄地問時不知那太監肯説不肯説且聽下回分解
