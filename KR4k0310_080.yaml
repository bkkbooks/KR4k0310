body:
  text: 第八十回李蓮英擅寵專權慈安後遭妒惹禍卻説慈安太后要照後與妃的禮節叫慈禧太后跪在後面拜見先帝陵寢慈禧太后執意不肯反而啼啼哭哭鬧起來口口聲聲説東太后欺淩他説什麼明知道俺兒子死了沒有出頭日子了當著衆大臣的跟前要硬按下我的頭來慈安太后看他哭吵得厲害反沒了主意後來各位親王大臣調停仍舊依了慈禧太后的意思和慈安太后並肩兒跪拜著從此以後慈禧心中越發把個慈安怨恨得厲害説他不該在祖宗陵寢的地方當著衆大臣的面前削他的臉面既不雅觀又褻瀆了太后的尊嚴西太后也知道恭親王也預聞這件事體的便時時刻刻想革恭親王的職常常把醇親王喚進宮去和他商量又和李蓮英商量這時候李蓮英早已升做總管那崔總管已退位回家去了李蓮英常常拿銀錢去周濟他崔總管説小李還有點良心李蓮英在宮中權柄很大不但是一班宮女太監見他害怕便是那班王公大臣見他得了慈禧太后的寵愛誰敢不趨奉他李蓮英這人面目雖不十分俊美但他天生成一副媚骨笑一笑説一句話兒總是十分和軟他又打扮得十分瀟灑走起路來翩翩顧影太后看了十分愛他他又生成一張利嘴終日在太后跟前或是唱著小調兒或是説幾句笑話總引得太后笑逐顔開他便見了大臣們也是詼諧百出那班大臣見了他都和他好便是那方正不過的恭親王見了他那種嬉皮笑臉的樣子也是沒法奈何他西太后最愛畫像或是照相把那京城裏照相的喚進宮去太后在北海船頭上扮一個觀音大土命李蓮英扮一個韋馱菩薩站在一旁拍一張照有時太后扮一個西王母李蓮英便扮一個東方曼倩學著偷桃的樣兒拍一張照有時太后改了男裝扮一個太原公子李蓮英扮一個李衛公拍一張照太后和李蓮英扮著一出一出的戲文拍的照片很多便有許多太監把這種照片偷出去賣錢這照片也給東太后看見了卻大不以為然也曾勸過西太後説做了太后的十分尊嚴了不該有這樣兒戲的照片無奈西太后非但不聽話反格外和李蓮英親熱太后自己躺在榻上卻喚李蓮英睡在榻下留他談些家常事體李蓮英又最會在女人身用功夫他體貼女人的心性説出話來句句叫婦女們聽了歡喜慈禧太后又告訴他自己從前的娘家的情形他説母親是不喜歡我的父親死後十分窮苦虧得自己打定主意趁挑秀女的時候選進宮來得了先帝的寵幸生了一個皇子俺的地位越發牢固了但是以後又交了壞運咸豐末年的時候文宗皇帝害病很厲害外國兵又打進城來了燒了圓明園俺跟隨先帝逃到熱河避難去這時候俺年紀還輕文宗的病勢又十分不好皇帝年紀還小那東宮的侄子是一個壞人謀奪大位勢甚危急是俺抱了皇子到先帝的床前問大事怎樣辦理先帝病勢十分昏沈一時答不出來俺又對先帝説兒子在此先帝才睜大眼睛看了一眼説道自然是他接位這句話説了便賓天去了俺見大事已定便也放了心那時見死了先帝心裏雖十分悲傷但以為還有兒子可以依靠誰知道穆宗到了十九歲便也賓天去了從此以後我的境遇一天壞似一天滿肚子的願望都斷了那東太后又是和俺不對的皇帝年紀又小身體也單薄看來他也只知道親熱東太后不知道親熱我真正叫人灰心西太后説到這裏不覺連連地歎氣李蓮英竭力地勸戒又接著説了一個笑話西太后轉憂為喜又説起他小時的話來他説俺做妃子的時候因想念母親想得厲害承蒙文宗的特恩賜俺回家省親一次先幾日派安總管到家中去傳話説貴妃某日回家省親某時進門某時見駕某時省親某時更衣某時開宴某時休息某時回宮都有一定時候寫在黃榜上發在家中大堂上張貼我母親得了這個消息便一面預備接駕的戲酒一面去邀請親戚到家裏來陪宴到了日子俺坐了一頂黃轎四十名小太監簇擁著另有宮女太監們拿著傘扇巾盆許多東西二千名禦林軍保護著排著隊到了家裏遠望家門口挂著彩燈上面罩著五色漫天帳地下鋪著黃毯直通內宅所有家裏的男丁都在大門外跪接所有女眷都在內宅門外跪接到了內廳下轎升座除俺母親和長輩的女客以外都一班一班地來跪見便是俺母親和長輩的女客也都穿著朝衣上來請安站班接著便有那班男客都遞進手折來請安俺換去了大衣再進母親房去行省親的禮俺母親原是不喜歡我的如今多年不見面俺母女兩人見了面便撑不住掉下眼淚來看看家裏房子也造蓋得很高大妹子和兄弟都富貴了也便放了心停了一會戲酒開場一班女眷簇擁著俺到內廳上去坐席吃酒我這桌只有母親陪坐在下面我原是愛看戲的那時隔著一重簾子簾子外面坐著男客是俺嫌氣悶吩咐把簾子卷起這才由俺爽爽快快地看了一天戲待到回宮來已是上燈時候了先帝聽得俺回來了便特地走進俺房來問俺今天你母女見面心中可快樂嗎俺回奏説臣妾家中受皇上雨露深思今日骨肉團圓非常快樂先帝聽了俺的話隔了幾天又傳諭宜俺母親進宮來讓俺母女見面先帝錯會了俺的意認做俺在宮中記念母親所以常常賜俺母女見面先帝怎麼知道俺在家裏俺和母親是不對的那時俺母親只歡喜俺妹妹常常罵我賠錢貨俺的省親原是要在俺母親跟前誇耀誇耀並沒有一點骨肉之情的如今皇帝把俺母親傳進宮來又給我母女見面了俺便也要趁此在母親跟前擺擺架子照規矩後妃的母親進宮來見了他女兒是要行大禮的做女兒的也不敢受見他母親拜時做後妃的便側身避開俺那天要借此殺殺從前的水氣便直挺挺地坐著受俺母親的拜也不叫起來後來還是宮女去把俺母親扶起來看俺母親臉上已有氣憤憤的樣子俺假做不看見和他有一搭沒一搭地説著俺母親原想與俺商量把兄弟的官兒往上升每見母親開口俺便説如今家裏也夠了比我未進宮來以前苦得衣食不全卻好得萬倍了我看俺兄弟福分也淺做了這個官也可以心滿意足了再升他的官兒怕他也受不住母親聽了這個話已氣得受不住了便要站起來告辭是俺留著吩咐宮女賞飯我母女兩人一塊兒吃著吃完了飯宮女拿一隻大漆盤上來盤中滿盛著插鬢的花朵俺原是最愛花的又最愛那大紅的洋牡丹當下俺揀了一朵碗口似大的大紅洋牡丹宮女替俺戴著俺又揀了一朵萬壽菊兒親自替俺母親插在鬢邊俺知道母親是不愛花的自從俺父親死過以後花朵兒絶不上頭了那天我們母女見面高興便替他多戴些把盤裏的花兒統統給母親戴上蓬蓬松松的一頭我看了笑得前仰後合誰知我母親卻十分惱怒當時推託説丈夫已死自己是個側身不便再插戴花朵了把那頭上的花朵統統拔了下來急急告辭出宮去從此以後憑俺再三宜召他總推託著不肯進宮來直到死時俺母女再也不曾見得一面兒慈禧對李蓮英説了這番話可見對李蓮英是何等的信賴和寵愛且説這年祭東陵的時候兩位太后又大傷了和氣為的是兩人拜陵的時候爭名位慈安太后看看慈禧的權力一天大似一天他的舉動也一天驕狂一天便要借這名位的事體壓倒了慈禧免得將來再在宮中弄權因此在祭東陵的前幾天便和恭親王祕密説妥到了祭陵的時候慈安太后便傳諭王大臣會議兩太后行禮的先後恭親王早受了東太后的旨意便奏稱請慈安太后先行禮隨後再是慈禧太后行禮慈禧太后聽了不服便説同是一樣太后又同理著朝政為什麼謁陵獨有先後之分極力主張兩太后不分先後並肩行著禮慈安太后聽了又不以為然便對著大臣侃侃地説道在目下論起來俺和西太后同是太后原不分什麼大小但如今在先帝陵前卻必得分個大小若不分大小是欺先帝了西宮在咸豐帝生前不過是一個妃嬪之位待到升做太后已是在咸豐帝賓天之後對咸豐帝卻依舊是一位妃嬪位次應該設在右面旁邊比俺的地位略低一級便是俺自己也只能在右面的邊位那左面的正位還須留給已死的中宮中宮雖比先帝早薨但總是先帝的正後俺們也越不過這個禮兒去的東太后的這幾句話説得光明正大誰也不能批駁便叫慈禧太后當著這大衆的面前如何坍得下這個台何況西宮自從在先帝跟關做妃子直到現在向來都是尊貴驕縱慣的如何肯咽下這口氣去但是要批駁東宮的説話卻又説不出什麼道理來只説自己母儀天下已久不能再以妃嬪之位來羞辱我説著便對著東陵掩面大哭起來慈安太后雖説是辦事嚴正但又是心軟不過的人見慈禧太后哭早巳弄得沒有主意了又經著許多大臣的勸解説兩宮同肩國家大任必須要和衷共濟才得保國家太平到後來到底依了慈禧太后的主意兩位太后並肩行著禮慈禧太后因慈安太后當著大衆削他的臉面從此以後又把這東宮恨入切骨李蓮英又打探得那天的事體是慈安太后和恭親王事前商量好的從此西太后心中時刻想弄去恭親王除了眼中之釘因為李蓮英能替西太后探聽事兒西太后越發寵愛李蓮英起來這時宮裏有一個太監綽號叫陰劉的見李蓮英的權勢漸漸地爬到自己上面去了便十分不服氣這陰劉原是姓劉只因他的生性陰沈深刻舉動遲緩人人便取他的綽號稱他陰劉這陰劉在李蓮英未進宮以前原是很有勢力的當一名總管宮裏的宮女太監都見了他害怕也很得西太后的寵用後來李蓮英進宮來西太后才把寵愛陰劉的心慢慢地移到李蓮英身上去了這李蓮英是何等乖巧的人他見自己得了勢便竭力擠軋那陰劉言裏語裏常常在西太后跟前説陰劉的壞話但是講到資格總是陰劉的資格深宮裏有許多規矩故事李蓮英不知道的不得不去問陰劉因此陰劉有時也蒙西太后傳去問話陰劉在奏對的時候也説著李蓮英的壞話因此他兩人的冤仇越結越深他們瞞著太后在背地裏也曾打過架來李蓮英年輕力大陰劉被他打敗了受傷很重因此見不得太后只得請假回去養傷在這個當兒李蓮英在太后跟前又竭力説陰劉的壞話太后這時正寵用李蓮英便也聽信了他的説話心中漸漸地厭惡陰劉了陰劉銷假進宮來也知道自己的勢力漸漸地敵不住李蓮英了有人替他們兩人打圓場講和李蓮英也怕陰劉在太后跟前説出打架的事體來便也假意和陰劉言歸於好但在背地裏説陰劉的壞話越發説得厲害把個西太后也説動了氣立刻把陰劉傳來當面訓斥了一番陰劉知道是李蓮英鬧的鬼心中萬分氣憤他一時也不及細想竟直奏説李蓮英招權納賄聲名狼藉還有許多齷齪的話竟把太后的名氣也拖纍進去了太后聽了止不住勃然大怒起來説他有意譭謗宮廷便要立刻發交侍衛去正法嚇得陰劉連連磕頭求饒説道奴才罪該萬死只求佛爺可憐奴才伺候了三十年當初也承蒙佛爺稱奴才是個忠順的孩子這裏面不無犬馬之勞還求佛爺開恩賜奴才一個全尸奴才便死也甘心的接著兩旁的宮女太監也都替他跪求著太后的怒氣雖稍稍平了下去但心中忽然轉了一個念頭喝令拉下去下屋子裏去鎖起來兩旁的太監得了懿旨便上來把陰劉拉了下去關在宮門外的小屋子裏太後退進寢宮去倚在榻上李蓮英在一旁跪著替太后捶著腿兒太后笑對著李蓮英説道這老劉兒這樣可惡俺便給他一個奇怪的死法李蓮英便請問如何是奇怪死法西太後便吩咐宮女去拿出一串鑰匙來太后便在裏面找出一個鑰匙來交給李蓮英拿去吩吩到景仁宮東偏殿裏開了第四座大櫥拿出一瓶藥粉來衆宮女看時見那藥粉兒是粉紅色的太后又吩咐把藥粉倒出少許和開水沖在杯子裏滿沖一杯太后吩咐把這杯水拿去賞給陰劉喝下陰劉知道太后賜他死了便一面淌著眼淚一面把水吃下叩頭謝過惠別的太監扶他睡在榻上依舊把門鎖上到太后跟前復旨去這裏妃嬪宮女們服侍太后吃過飯照例太后要去打中覺的太后進臥房的時候吩咐衆妃嬪切莫走開待俺起來便帶你們去看一樣怪東西衆妃嬪聽了都莫名其妙但太后吩咐的又不得不候著大家靜悄悄地在外屋子裏坐著守著隔了一個多時辰聽得裏面喊老佛爺起身了外面廊下站著的太監也接著喊道老佛爺起身了李蓮英帶著兩名小太監急忙進去西太后生性是愛好天然的便是午睡醒來也要重心脂粉更換衣服李蓮英直伺候著西太后出房來衆妃嬪上前去迎接著西太后笑對著衆人説道俺們看怪東西去前面許多太監後面許多宮女簇擁著到那下屋裏李蓮英上去開了門進去太后在椅子上坐下指著榻上叫衆人看只見榻上一個小孩子縮做一堆面向裏睡著太后吩咐去把榻上的人轉過身來原來那人已死了再看死人臉上時滿面皺紋皮肉已縮成千兒了太后指著説道這便是老劉兒他吃了景仁宮裏的毒藥死後縮成這小孩兒樣子衆妃嬪看了這奇怪的樣子聽了太后的話早嚇得魂膽飄搖又聽太后接著説道景仁宮裏歷代祖傳下來有許多猛烈的毒藥有吃下去尸身化作灰的有吃下去尸身化作血水的也有吃下去化作一股氣兒的凡有犯罪的宮女太監們皇上皇太后都得拿這毒藥賞他吃下如今老劉兒求著給他全尸俺便賞他吃這毒藥名叫返老還童西太后説著也不禁哈哈地笑了吩咐李蓮英把老劉兒的尸身送回他家去李蓮英上去把陰劉的尸身一提好似提一個小孩兒似的拿出宮去裝在盒子裏指著尸身説道老劉老劉你也有今天嗎説著吩咐小太監搬去李蓮英自從西太后毒死了陰劉以後越發得了意兒西太後也越發拿他寵用起來只要是李總管説的話皇太后無有不依一班宮女太監們無有不怕因此李蓮英眼中也沒有忌憚的人了有一天正值西太后午睡李蓮英偷空兒出來在殿廊下和小太監踢著球兒玩耍正當踢得高興的時候一球飛去在廊下柱子上一碰那球兒直滾過東走廊去瞥眼見那慈安太後帶著兩個宮女一個太監從東走廊上走來那球兒恰恰滾在慈安太后的腳下李蓮英站在正面廊下雖也看見他知道慈安太后是到慈禧太后宮裏去的繞過第二個穹門出去是不走殿廊下過的李蓮英便假裝不看見竟站在廊下和小太監説著笑著慈安太后是素性嚴正的人他見有人在殿廊下踢球已經是心裏不自在了又瞥眼見那李蓮英站在殿廊下也不上來磕頭只是旁若無人地説笑著慈安太后近日也聞得李蓮英專權恃寵的事體平日暗地裏留心他那種諂媚西太后的樣子心中原是厭惡他的只因礙著慈禧太后的面子不好説得如今見他竟在殿廊下踢球已是犯了不大敬的罪又見了自己不上來磕頭卻假作不曾看見站在廊下嬉笑自若不覺勃然大怒立刻命太監去把李蓮英傳來那李蓮英也不害怕只是慢慢吞吞地走上前去直挺挺地站著慈安太后看了愈加生氣喝令他跪下一個太監去搬了一打椅子來請東太后坐下東太後手指著李蓮英痛痛地訓斥了一番説你這王八羔子仗著誰的勢力這樣放肆這殿上是你踢球玩耍的地方嗎再者你見俺走來膽敢大模大樣地裝做不看見宮庭裏面也沒有一個禮兒了自從先帝升天以後主子年紀小俺也看在西太後面上不來查考你們盡放著你們這班王八羔子在宮裏造反了打量你們背著我做的事體俺不知道嗎你們可是活得不耐煩了越發弄得無法無天了打量俺管不到你們所以不把俺放在你們眼裏麼打躉兒説一句話俺是受過先帝遺詔的這宮裏不論誰俺都有權處治他慈安太后愈説愈氣説到十分憤怒的時候便喝令快傳侍衛把這王八羔子拉去砍了要知李蓮英的性命如何且聽下回分解
