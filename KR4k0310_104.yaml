body:
  text: 第六十四回芍藥茵中明兒行暖昧荼蘼架下賊子竊風流鬥移星換夜色沈沈簾卷落花帳籠餘馨海棠已睡垂柳驕人當此萬籟俱寂的時候劉文叔坐在他的旁邊用手在他的香肩上輕輕一拍低聲喚道卿卿我已經來了他微開倦眼打了一個呵欠輕舒玉臂不知不覺地搭在劉文叔的肩上含羞帶喜地問道你幾時來的劉文叔忙道我久已來了不過在後園門口等了好久才得明兒將我帶來的他微微一笑啓朱唇説道勞你久等了文叔忙道這是什麼話只怪我急性兒來得忒早了他問道你受了風沒有文叔忙道不曾不曾他伸出玉手將文叔的手一握笑道嘴還強呢手冰凍也似的快點倚到薰籠上來度度暖氣文叔忙將靴子脫下上了床他便將薰籠讓了出來文叔橫著身子仰起臉來細細地正在飽餐秀色他被他望得倒不好意思起來笑道你儘管目不轉睛地朝我望什麼文叔笑道我先前因為沒有晚飯吃肚子裏非常之餓現在看見你我倒不覺得餓了他聽了這話驚問道你還沒有吃晚飯嗎文叔笑道日裏我們家兄約會了四周的鄉勇在日升穀會操我也去看操到了晚上我回來的時候剛才坐下來入席猛地想起昨天的約來忙得連飯都沒敢吃生怕耽擱辰光再則又怕你盼望故而晚飯沒吃就來了他嗤的一笑也不答話起身下床婷婷嫋嫋地走了出去文叔不解他是什麼用意一會他走進來坐到床邊對他笑道你餓壞了才是我的罪過呢劉文叔忙道不要煩神我此刻一些兒也不餓他笑道難道要成仙了麼此刻就一些也不餓話猶未了但見明兒捧了一個紅漆盒子進來擺在桌上又倒了兩杯茶便要退下他輕輕地問道太太睡了不曾明兒笑道已經睡熟了他又豎起兩個指頭問道他們呢明兒笑道也睡了好久了他正色對文叔説道君今天到這裏我要擔著不孝不義不貞不節的四個大罪名但是貞姬守節淑女憐才二者俱賢照這樣看來我只好忍著羞恥做這些不正當的事情惟望君始終要與今朝一樣那就不負我的一片私心了劉文叔忙答道荷蒙小姐垂愛我劉某向後如有變卦他剛剛説到這裏陰麗華伸出纖纖的玉腕將他的口掩著笑道只要居心不壞何必指天示日學那些小家的樣子做什麼呢現在不需囉嗦了明兒剛才已經將點心拿來你不嫌粗糙請過去胡亂吃一些罷文叔也不推辭站起來走到桌邊坐下他跟著也過來對面坐下用手將蓋子揭去只見裏面安放著各種點心做得非常精巧他十指纖纖用牙箸夾了些送到他的面前文叔一面吃著一面細細認著吃起來色香味三樁沒有一樁不佳就是不知道叫什麼名字也不好意思去問他只好皺著眉毛細細地品著味道他見文叔這樣忙問道敢是不合口嗎文叔笑道極好極好他道不要客氣罷我知道這裏的粗食物你一定吃不來的文叔道哪里話來這些點心要想再比它好恐怕沒有了他笑道既然説好為什麼又將眉毛皺起來呢這不是顯系不合口嗎劉文叔悄悄地笑道我皺眉毛原不是不合口老實對你説一句我吃的這些點心一樣也認不得所以慢慢地品品味道究竟是什麼東西做的他聽了笑道原來這樣我來告訴你罷他説著用牙箸在盤裏點著道這是梅花髓的餅兒這是玫瑰酥這是桂蕊餑餑這是銀杏盒兒他説了半天劉文叔只是點頭歎賞不止又停一會猛聽譙樓更鼓已是三敲劉文叔放下牙箸對他低聲説道夜深了我們也該去安寢了他低首含羞半晌無話劉文叔便走過來伸手拉著他的玉腕同入羅幃説不出的無邊風景蛺蝶穿花蜻蜓掠水含苞嫩萼乍得甘霖欲放蓓蕾初經春雨自是百般愈快一往情深了但是他們兩個已經如願已償了誰也不知還有一個人卻早已看得眼中出火你道哪一個卻原來就是明兒他的芳齡已有二八零一再是他生成的一副玲瓏心肝風騷性兒看見這種情形心裏還能按捺得住嗎他站在房門外邊起首他們兩個私話喁喁還不感覺怎樣後來聽得解衣上床一個半推半就一個又驚又愛霎時就聽得零雲斷雨的聲音一聲聲鑽到他的耳朵裏他可是登時春心蕩漾滿面發燒再也忍耐不住便想進去分嘗一臠回轉一想到底礙著主仆的關係究竟理上講不過去再則劉文叔答應倒沒有什麼假若劉文叔不答應豈不是難為情嗎他思前想後到底不能前去他只得將手放在嘴裏咬了幾口春心才算捺下去了一些一會子又聽得裏面動作起來禁不住芳心復又怦怦地跳了起來此番卻十分利害再也不能收束了他皺眉一想猛地想出一個念頭來便輕輕地下了樓將門一道一道地放開直向後園而來進了園門瞥見海棠花根下蹲著一個黑東西兩隻眼和銅鈴一樣灼灼地朝自己望個不住他嚇得一噤忙止住腳步細細地望了一會無奈月色昏沈一時看不清楚究竟是什麼東西可怪那東西兀自動也不動地蹲在那裏他到這時進又不敢退又不肯正在為難之際只見那東西忽地竄了出來咪呼咪呼地亂叫他嚇得倒退數步原來是一隻大黑貓他暗罵道狗嚼頭的個畜生沒來由的在這裏大驚小怪呢他説罷恨得拾起一塊磚頭來迎面向那黑貓擲去那只黑貓一溜煙不知去向他才又向前走去霎時到了書房門口他輕輕地在門上拍了一拍就聽得裏面有人問道誰呀他輕輕地答道是我裏面又問道你究竟是誰呀明兒道我是明兒裏面忙道明姐嗎請你等一等我就來開門不一會一個十五六歲的童兒將門開放笑問道明姐你此時還未睡嗎他笑道沒有你們為何到這時也不睡呢那童兒笑道和小平趕圍棋一直趕到這會還沒睡呢姐姐你來做什麼的他笑吟吟將那童兒的手一拉説道我來和你們耍子不知你們肯帶我麼那童兒笑道那就好極了我們兩個人睡又睡不著你來我們大家耍子倒覺得有趣咧他和他手拉手兒進了房但見裏面還有一個小童兒大約在十一二歲的光景正坐在那裏注目凝神地朝著棋盤裏望著見他來忙笑道明姐你來了正好我這盤棋剛要輸了快些來幫著我小才專門會和我賴明兒笑道你輸幾盤給他了小平道連輸三盤給他了我和他講的是二十記手心一盤現在已經欠他六十記手心了好姐姐快來幫助我吧他笑道好好我來幫助你小才道那可不成誰是你的對手呢明兒笑道不要這樣的認真他小你大我不去幫著他難道還來幫著你不成説著便靠著桌子坐下一把將小才拉了坐在自己懷裏一面教小平動棋一面暗暗地盤算道在這裏斷不能做勾當的那小平雖然小假使明天露了風聲那就糟了越是這小孩子嘴裏越沒有關欄他想了半天猛地想起一個調虎離山的法子來便向小平笑道這撈什子沒有什麼趣不如我們三個人去捉迷藏倒反有趣得多咧小平搖頭説道我不去我不去這夜靜更深的誰願意出去玩呢怪害怕的遇著馬猴子還要嚇煞了呢他笑道小孩子家一點膽氣也沒有今天外邊的月色真是好極了和白天差不多怕什麼小才道我也不願意出去還是在家裏玩的好他笑道捉迷藏你不是喜歡捉的嗎今天為何反不高興呢小才笑道日裏大家玩要是高興的現在我們人少誰高興呢他暗道這條計竟不濟事便怎生再想法子呢他又想了半天悄悄地對小才道你不是對我説過要杏子吃的嗎你看後門口的杏子都熟了這時何不去摘幾個來吃吃呢小才聽了這話大喜道有何不可有何不可不是你提起我倒忘了白天又不敢大明大白地去摘來吃小碧他們的嘴最壞不過被他看見了馬上又要去告訴現在去摘光了也沒有人曉得的小平聽得要去摘杏子十分高興也要想去他忙説道動不得你卻不能去這裏全走了假如有個強盜怎生是好呢小平努著嘴説道你們不帶我去我明天去告訴太太他慌地哄他道好兄弟你不要心急我們去隨便摘多少我們一個也不吃弄回來和你同吃如何小平笑道那麼我明天自然就不去告訴太太了小才道事不宜遲我們就去吧他又怕小平跟他們出來破他們的好事臨走的時候千叮嚀萬囑咐教他不要亂走小平諾諾連聲地答應他才和小才出了門繞著花徑走了一會小才問道姐姐路走錯了杏子樹不是在門外邊嗎為什麼走了向西呢明兒也不答應轉眼走過一大段芍藥花的籬邊拉著小才的手説道兄弟你隨我進來我有句話要和你説小才也不知就裏隨著他走進芍藥花的中間一塊青茵地上他往地上一坐小才也跟他往身旁一坐向他問道姐姐你有什麼話和我説請你説罷他乜斜著眼對小才嗤的一笑悄悄地説道我喊你到這裏來難道你心裏還不明白嗎小才急道你不告訴我我明白什麼呢他一把將小才摟到懷中兄弟長兄弟短的叫了一陳子才停住聲音半晌又開口問道好兄弟你究竟歡喜我嗎小才仰起臉來説道自家好姐妹不歡喜難道歡喜別人嗎他笑道你光是嘴上説歡喜心裏恐怕未必罷小才笑道你這是什麼話呢心裏如果不歡喜我也不願意和你在一起頑耍了他説到這裏猛聽得東邊梧桐樹下飛起一樣東西來怪叫了兩聲飛得不知去向他嚇得無地可鑽忙埋怨明兒道我説不要出來你偏要出來怪害怕的他慌地哄他道好兄弟你不要怕方才飛的那東西一定是野雉小才説道管它是什麼我們回去吧他忙摟住他説道你不須急我還有幾句話和你説呢小才急道親娘你有什麼話只管説罷我要被你纏死了他附著他的耳朵説了一會小才翻起眼睛説道那麼就算恩愛了嗎他笑道是呀那才算恩愛呢小才道我們就來試試看明兒便寬衣解帶二人就實行交易了一回小才少精無力地問道怎麼這也奇怪極了我從來還不知道這樣的趣味他坐起來把粉臉偎著小才的面孔笑問道你説如何小才滿口贊道果然有趣極了二人坐在草地上南天北地地又談了一會子小才忽然問道姐姐我有一樁事情始終不明白人家討了老婆怎的就會生出小兒來呢他笑道癡子虧你到了十六七歲怎麼連一點事情都不曉得你要知道人家生小兒就是我們方才做的那個玩意兒他拍手笑道原來原來原來是這樣的我還要問你人家本來是兩個人做那勾當的怎的反是一個人生小孩呢而且全是女人家生的我們男人從沒看見過生小孩這又是什麼道理呢他笑道誰和你來纏不清連這些都不曉得真是氣數不要多講了我們回去吧他笑道好姐姐你回去也和小平去弄一回看他舒服不舒服他聽了這句話兜頭向他一啐道你這個糊塗種子真是天生不該生地不該長怎的這樣地油蒙了心説出話來不曉得一些高下呢他笑道姐姐肯就肯不肯就算了急的什麼呢他見他這樣呆頭呆腦的不覺又好氣又好笑又深怕他口沒遮攔露出風聲來可不是玩的忙哄他道兄弟你不曉得我和你剛才做的這件事千萬不能告訴別人他翻起白眼問道告訴別人怎樣他恐嚇道如果告訴別人馬上天雷就要來打你了他用手摸著頭説道好險好險還虧我沒有告訴別人不然豈不是白白的送了一條性命嗎他笑道你留心一點就是了他又笑問道我方才教你和小平去弄一會子你為什麼現出生氣的樣子來呢他正色説道你曉得什麼這件玩意豈能輕易和人去亂弄的嗎他笑道怕什麼橫豎不是一樣的他急道傻瓜我老實對你説罷他小呢現在不能夠幹那個玩意兒呢他問道幹了怎樣他笑道幹了要死的他嚇得將舌頭伸出來半晌縮不進去停了一會哭喪著臉説道姐姐你可害了我了我今天不是要死了嗎他笑道你過了十五歲就不要緊了他聽了這話登時笑起來了他説道我們到外邊去摘杏子罷他道可不是呢如果沒有杏子回去小平一定要説我們幹什麼的了他也不答話和小才一直出了後園門走到兩棵杏子樹下小才笑道你上去還是我上去呢他笑道自然是你上去小才撩起衣服像煞猢猻一樣爬了上去他站在樹根底下説道留神一點不要跌了下來小才嘴裏答應著手裏摘著不多時摘了許多的杏子用外邊的衣服兜住卸了下來自己也隨後下來向他説道姐姐我們回去吧他向小才説道你先進去吧我要解手去小才點頭進去了他走到東邊一個荼蘼架下面扯起羅裙蹲下身子一會子完了事剛要站了起來這時後面突來一個人將他憑地抱起往東走了幾步將他放下他又不敢聲張偷眼往那人一望原來是個十九歲多的少年生得凶眉大眼滿臉橫肉向他獰笑道今天可是巧極了不要推辭吧他曉得來者定非好意無奈又不能聲張只得低頭無語説時遲那時快那個人竟像餓虎擒羊一般將他往地上一按他連忙喊道你是哪里來的野人趕快給我滾去話還未了瞥見那人颼地拔出一把刀來對著他喝道你再喊馬上就給你一刀他可嚇得魂落膽飛還敢聲張麼霎時間便任他狂浪起來一會事畢那人摟著他又親了一回嘴才站直來走了他慢慢地從地上爬起來心中倒反十分愈快因為小才究竟年輕不解風流誰知無意中倒得著一回趣他慢慢地走進園門又朝外邊望望那人早巳不知去向他順手將門關好走到書房裏只見小才和小平兩個人掏著杏子滿口大嚼見他進來小才忙問道你到哪里去了到這會才來他一笑答道我因為看見一隻野兔我想將它捉來玩玩不想趕了半天竟沒有趕上放它逃了小才笑道你這人真癡兔子跑起來能夠追上風呢你就趕上了嗎他笑道我見它頭埋在草窠裏當它是睡著呢從背後抄上去不想它來得乖覺忽然跳起來就逃去了他們正在談話之間猛聽得更樓上當當當地連敲四下子他才將間話丟開別了他們一徑向前面而來將門一重一重地關好上了麗華的繡樓進了房但見他兩個交頸鴛鴦正尋好夢他一想再遲恐怕要露出破綻來忙走進來輕輕地將二人推醒説道天要亮了你可不能再耽擱了二人聽説這話連忙起身披衣下床明兒走過來替麗華幫著將衣裳穿好劉文叔這時也將衣服穿好推窗一望但見霧氣重重月已挂到屋角東方漸漸地露出魚肚的色彩他忙將窗子關好走到床前向麗華深深一揖口中説道荷蒙小姐垂愛慨然以身相許劉某感謝無地刻骨難忘惟望早酬大志寶馬香車來接小姐這正是無限春風成一度有情鶼鰈訂三生要知後事如何且看下回分解
