body:
  text: 第九十四回露春色總監吞聲逞淫威詩郎受辱話説大小竇一同到望荷亭裏納涼兩個人懷著兩樣的心事一個躊躇志滿一個滿腹牢騷真是一宮之內一殿之間苦樂不同大竇坐在棠梨椅上星眼少神嬌軀無力怔怔地望著荷池裏那些錦毛鴛鴦一對對地往來戲水他不禁觸景生情深深地歎了一口氣自言自語地説道草木禽獸尚且有情惟有我一個孤鬼兒鎮日價和那要死不活的尸首伴在一起真是老鷹綁在腿上飛也飛不走爬也爬不動流光易過眼見大好青春一轉就要成為白頭老媼了到那時還有什麼人生的真趣呢他説罷歎了一口怨氣閃著星眸只是朝池裏那些鴛鴦發呆小竇暗道欲知內心事但聽口邊言他既然説出這些話來我想一定熬不住了何不將那能兒喚來替他解渴呢他正要開口猛地省悟道不好不好我假若將能兒讓與他解解悶萬一他看中了硬奪了去那便怎生是好還是不説罷他忽然又轉念頭道他與我本是姐妹不見得就要強占了去罷我現在已經受用不少了也落得做個人情與他解解饞未為不可如果一味地視為己有萬一以後走漏了風聲反而不對了不若趁此就讓他開心一回吧他受了我的惠或許可以幫助我再想別的法子去尋歡也未可知他想到這裏便向大竇笑道姐姐我有一個宮女生得花容月貌吹彈歌舞沒有一樣不精將他喊來替你解解悶如何他連連搖頭道用不著用不著我的愁悶斷非宮女所能解的小竇笑道或者可以解渴大竇笑道我的愁悶難道你不知道麼小竇笑道我怎麼不知道所以教他來替你解悶呀大竇道任他是個天仙終於是和我一樣的有什麼趣味至於説到吹彈歌舞我又不是沒有聽見過的小竇嗤地一聲笑道或者有一些不同之處你用不著這樣的頭伸天外一百二十個不要那人來只要替你解一回悶恐怕下次離也離不掉他呢大竇聽他這話便料瞧著五分忙道帶得來試驗試驗看如果合適便解解悶也不妨事的小竇笑道你既然不要我又何必去多事呢大竇道你又來了君子重一諾你既然承認現在又何必反悔呢小竇笑道人家倒是一片好心要想來替你設法解悶誰知你不識人情反而不要我還不趁此就住嗎大竇笑道好妹妹快些去將他喊來讓我看看究竟是一個什麼人你再推三阻四的休怪我翻起臉來就要他説到這裏不禁望著小竇嫣然一笑小竇笑道你看你這個樣兒又來對我做狐媚子了可惜我是個女子要是個男人魂靈還要被你攝去哩我且問你我不去將他喊來你預備什麼手段來對待我他笑道你再不去我就老實不客氣親自去調查一下子但看你到底藏著一個什麼人在宮裏小竇纖手將酥胸一拍笑道誰怕你去搜查呢你不用拿大話來嚇我你須知愈是這樣愈不對我倒要你去搜查一下子我才去喊他呢大竇笑道那是玩話你千萬不要認真才好小竇便用星眼向他一瞅口中説道依我的性子今朝偏不去教他來大竇道好妹妹還看姐妹的分上罷我不過講錯了一句話你便這樣認真不去了麼他説著雙膝一彎撲通往小竇面前一跪口中説道看你去不去小竇笑道羞也不羞虧你做得出他説著便起身回到自己的宮中只見化兒正與能兒在那裏説笑呢見他進來忙一齊來讓坐小竇含笑對能兒道你的造化真不小現在娘娘指明要你去服侍他這事卻怎麼辦呢化兒慌忙問道這話當真麼他正色説道誰來騙你們呢能兒大驚失色一把摟住他只是央告道千萬要請你想個法子去回掉他我如果去服侍他豈有個不走漏風聲的道理一露出馬腳來不獨我沒有性命就連你們也有些不利的了化兒道這可奇了他怎麼曉得我想我們這層事憑是誰也不會猜破的小竇笑道癡貨你自己以為計妙難道外面就沒人比你再刁鑽些嗎化兒道如此便怎麼好呢小竇説道事已如此我也沒法去挽救只好讓與他罷化兒急道娘娘你忒也糊塗了你也不細細地想想這可以讓他去麼小竇笑道在你看有什麼法來挽救敷衍呢化兒沈思了一會子忙道有了有了此刻先將他藏到我那裏你去對他説就説他生病了不能服侍慢慢的一步一步來搪塞他到了緊要的時候爽性將他藏到病室裏去就説他死了他還有什麼法子來糾纏呢小竇笑道還虧你想出這個主意來呢你可知道他現在已説過了如不送去馬上帶宮女就到我們這裏搜查了你可有什麼法子去應付呢化兒聽了這話不禁揉耳抓腮苦眉皺臉無計可施連道這從哪里説起可是他這一去準是送掉了性命娘娘你和他有這樣的關係為什麼反坐視不救小竇笑道我倒不著急偏是你和他倒比我來得著急可見還是你們的情義重了化兒急得滿臉緋紅向他説道娘娘真會打趣到了這要緊的關頭還儘管嘻嘻不覺的難道與你沒有關係麼小竇笑道癡丫頭不要急得什麼似的我告訴你罷他再大些和我是姐妹我有了什麼事情他還能來尋我的短處麼要是他替我聲揚出去與他的臉上有什麼光榮呢化兒道我別樣倒不躊躇我怕他見了他硬要他永遠服侍你豈不是替他做了一個傀儡麼小竇笑道那也沒有法子只他讓與他罷能兒急道我不去我不去化兒説道娘娘既是這樣的説法你就去罷料想娘娘此刻看到你也不見得和從前一樣了你去了好也罷壞也罷還想竇娘娘救你也是不容易的了小竇笑道你看這個癡丫頭指桑罵槐的説出多少連柄子的話來到底是個甚麼意思呢他道什麼意思不過我替別人可惜罷了你救不救與我有什麼相干小窶笑道還虧沒有相干如真有相干今天還不知道怎樣地磕頭打滾呢化兒道本來和我是沒有相干小竇到這時才對他們笑道你也不用急他也不用慌我老實對你們説罷娘娘並不曉得倒是我今朝提起來的化兒道這更奇了這層事瞞人還怕瞞不住呢偏是你自己招出來這又是什麼用意呢我倒要請教請教他笑道這個玩意兒非是你可以料到的你原來是不工心計的不怪你不能知道我來告訴你吧一個人無論做什麼祕密的事情千萬不可只顧眼前不望將來的你想我們這事不是極其祕密麼除了我們三人恐怕再也沒有第四個曉得了但是天下事要得人不知除非己不為日久無論如何都要露出些蛛絲馬迹的到了那時候萬一發生什麼意外娘娘一定要怨恨我們做下這些不端之事而且他自己也好趁此顯出自己是個一塵不染的好人了所以我想現在也教他加入我們這個祕密團一則可以滅他的口二則他的勢力原比我們大等到必要的時候還怕他不來極力幫忙麼化兒拍手笑道我真呆極了不是你説我真料不到能兒笑道這計雖然是好當中最吃苦的就是我了化兒向他啐道遇著這些天仙似的人兒來陪你作樂還不知足還要説出這些沒良心的話來不怕傷天理麼小竇笑道這也難怪他一個人能應付幾個嗎化兒笑道別的我倒不怕但怕娘娘得不甜頭不肯鬆手那就糟糕了小竇笑道不會的他現在不過因為萬歲病著實在沒處可以解饞才像這樣餓鬼似的萬歲病一好還不是朝朝暮暮暮暮朝朝弄那個調兒麼他到了那時應付萬歲一個人還覺得有些吃不住呢哪里還能再帶外課呢你快點將能兒送到濯龍園裏去他在望荷亭裏估量等得不耐煩了快點去罷你將他送去你要識相些不要在他們的眼前阻礙他們的工作要緊化兒連聲應道理會得用不著娘娘關照都教他們稱心滿意的就是了他又向能兒説道你到他那裏須要見機行事務必使他滿意為要千萬不要駭得和木頭人一樣那就不對了他的脾氣我曉得他最相信活潑乖巧的我關照你的話你卻要留心能兒點頭答應便和化兒直向園內而來一路上雖有宮監內侍誰都不來查問而且化兒沒有一個不認得他的不多時到瞭望荷亭裏只見他獨自一個躺在一只沈香的睡榻上面那兩頰紅得和胭指一樣眼含秋水眉簇春山説不盡千般旖旎萬種風流見他們進來懶懶地坐了起來口中問道化兒隨你來的這個宮女就是新來的麼化兒見他問話忙拉著能兒一齊跪下能兒説道願娘娘萬壽無疆他香腮帶笑杏眼含情地向他問道你叫個什麼名字你是哪里的人氏化兒見他們談起來忙托故出去了能兒答道娘娘要問我麼我就是娘娘府裏的人我名字叫能兒他聽説這話又驚又喜地一把將他從地下拉了起來問道你姓什麼我可健忘一時想不起來了能兒笑道我姓潘他聽説這話心中明白卻故意裝作不知向他笑道你坐下我好和你談話能兒也不客氣一屁股送到他的身邊並肩坐下他一點也不嗔怪含笑問道你今年幾歲了他道十九歲了他不知不覺地輕舒皓腕輕輕地搭在他的肩上將粉臉偎到他的腮邊悄悄地笑道你幾時到我們府中的能兒笑道我早就在娘娘的府中了不過娘娘未曾看見我吧這也難怪我成日價沒有事也不到前面來都是在後園裏修理花草的多他聽説這話更覺得萬無疑惑了那一顆芳心登時突突地跳躍起來呼吸同時也緊張起來斜乜著星眼笑眯眯地盯著能兒這時一陳涼風吹了進來兩個人不約而同地打了一個寒噤他便向他説道這裏涼風太大我們到恰薇軒裏去坐坐吧能兒點頭答應他便起身和能兒走過假山到了一座雅而且靜的房子裏面乃是一明兩暗他便和他手牽手進東邊的房裏能兒的鼻子裏嗅著一陳甜習習的幽香不禁眼餳手軟那一股孽火從腳跟一直湧到泥丸宮的上面再也不能忍耐了但是卻不敢造次只得按住心神看他的動靜只見他一把摟到懷中那一股蘭芬麝氣直沖著鼻管心中越覺得勃勃欲動只聽他悄悄地説道能兒我方才聽你們的娘娘説的你有什麼本領可以使人開心呢不妨來試驗試驗能兒聽説這話便知道時機已到再不下手等待何時便笑道娘娘真的試驗我卻斗膽動手了他説罷便來替他解去羅糯自己也將下衣解下露出一根衝鋒的利器來將他往榻上一按便幹起那個勾當來果然是再開心沒有了他也是久旱無雨了像煞又餓又渴的人陡然得著一碗糜粥似地擺出百般的浪態來把個能兒弄得恨不能將全身化在他的身上他兩個正在這雲迷雨急的時候猛可裏聽見外面有一陳腳步的聲音從外面走了進來他忙放下手道有人來了能兒正是在要緊的關頭哪里肯放緊緊抱著大動不住説時遲那時快只見有個人將簾子一掀伸頭朝裏面仔細一望不禁倒抽一口冷氣趕緊退身出來你道這人是誰卻就是六宮總監魏西他也到園裏納涼的不想偶然走到怡薇軒的門口聽見裏面有人説話的聲音他便進來看看是誰萬料不到這六宮專寵的竇皇后在這裏幹那不見天的事情他吃驚不小趕緊退出來立在假山的腳下暗道這岔子可不小我要不去奏與萬歲料想他一定也要疑惑我有心和他作對他勢必不能放我過門我去奏與萬歲那是更不要説了準是沒有性命了他躊躇了半天自己對自己説道魏西你今年不是六十三歲了你受了漢家多少恩典你難道就將良心昧起去趨奉這個淫亂無倫的賤貨麼好我情願納下這顆白頭和賤婦去碰一下子罷他打定主意扶著拐杖一徑向坤寧宮而來進了坤寧宮只見黃門侍郎竇篤跪在章帝病榻之下放聲大哭章帝呻吟著問道愛卿何事這樣的悲傷那竇篤哭道今天無論如何要萬歲替微臣伸冤微臣今天被九城軍馬司的部下將我打壞了萬歲如果不信微臣自有傷痕請萬歲親察他説罷將腿上的褲子虜起果然大一塊小一塊的傷痕而且頭上還有幾個雞蛋大的疙瘩一股鮮血還在殷殷地淌個不住列位要知這竇篤是誰就是竇憲的堂兄弟九城軍馬司他是何人膽敢將竇篤打得這般狼狽呢難道他就不怕竇憲的威勢麼原來有一個緣故小子也好趁此交代明白這九城軍馬司姓周名紆本來是做雒陽令的因為他辦事認真剛廉毅正從不徇情所以章帝極其器重他由雒陽令一躍而為京都九城軍馬司他感受當今的厚德越加懍守厥職不敢偷安一刻未到三月將京都內外整理得一絲不亂章帝見他這樣的忠城自是恩寵有加可是他生性骨鯁章帝常常有些賞賜他完全退回向未受過一絲一縷由此章帝格外敬愛他的第一個好友就是第五倫平時常在一起磋商政治他的老師就是那鐵面無私的趙熹所以他的根本也算不淺竇氏群雄見他還畏懼三分本來忠姦極不能融洽的各行各路河水不犯井水周紆雖然不肯阿私但是不在他的範圍之內卻也不喜多事所以竇氏處了二年多尚未反過面孔他今天正領著禁城的校尉在大操場上操那黃門侍郎竇篤因為別事耽擱一直過午才出禁門縱馬到了止姦亭前看官這止姦亭又是什麼去處呢原來禁城以外四門建設四個止姦亭每亭派兵一百一個亭長專門搜查過時出禁城官員的那竇篤一馬放到止姦亭邊這亭內的亭長霍延挺身出來攔住馬頭厲聲問道來者住馬黃門侍郎竇篤眼睛哪里還有他呢昂頭問道你是何人攔在馬前意欲何為呢霍延答應道你休問我憑他是誰過午出禁門我們是要搜查的竇篤道我今天因為在朝中議論國家大事所以到這時才出來我又不是個罪犯要我們搜查什麼霍延答道我們不知道你是罪犯還是好人我們只曉得奉上司的命令搜查的竇篤大聲説道你們奉的誰的命令要在這裏搜查行人霍延笑道虧你還是朝廷議論國事的大臣連這一點兒都不知道止姦亭也不是今朝才立的你要問我們受的誰人命令我告訴你罷我們是受的九城軍馬司的命令九城軍馬司是受萬歲的命令你不準搜查也可以但是你去和萬歲講理到我們這裏我們當要照公辦公的請快些下馬讓我們搜查一下子你便走罷竇篤大怒喝道今天咱老子不準你們這些狗頭搜查便怎麼樣呢霍延也不答話忙向手下喝道將這狗官拖下來話猶未了走上幾個守亭兵將竇篤從馬上不由分説地拖了下來你也搜我也查將個竇篤弄得氣起不由得潑口大罵惱得霍延性起忙喝道打那些兵士你一拳他一足打得他發昏章第十一這正是半途遭毒打狹遭遇冤家要知後事如何且看下回分解
