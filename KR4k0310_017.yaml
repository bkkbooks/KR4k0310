body:
  text: 第十六回翠華園神宗醉玉膚慈慶宮妃子進紅丸卻説滿州英明皇帝一面與蒙古五部落貝勒訂定攻守同盟的誓約一面打發人進關去探聽明朝的消息自己班師回興京去教練八旗兵士預備早晚廝殺有一天正在西偏殿上和許多貝勒大臣講究如何併吞明朝天下的法子忽宣承官上殿來秦稱今有探馬探得明朝的消息在殿門外守候陛下的旨意英明皇帝聽了忙傳聖旨宣探馬上殿那探子走上殿來跪倒在地口稱臣奉旨進關探得明朝的消息意欲奏明皇上知道英明皇帝便吩咐快快奏來探子便説道如今明朝神宗皇帝拜張居正做宰相整理朝綱大非昔比英明皇帝便問如何整理法呢探子奏道張宰相把在朝姦臣一齊革退用了許多正人君子在朝輔政又派人到江南江北調查戶口測量田地查出許多田稅上的弊端每年朝廷可多收錢糧一百多萬兩銀子又裁去關口糧船上沒用的官員一千多名今年正月又下令免天下欠租二百多萬銀子百姓人人感激他皇上忠心待他的皇上張宰相又吩咐兵部尚書多招兵馬用心教練準備和我們滿洲廝殺他一面派戚繼光帶領大兵駐扎在蒙古邊境刻刻提防一面多派得力兵士在山海關用心把守那神宗皇帝見張宰相忠心愛國便也十分敬重他卻也十分害怕他英明皇帝聽了十分詫異説道敬重他也罷了怎麼又害怕起來呢那探子又説道陛下卻不知道那張宰相對待神宗皇帝真是十分嚴厲呢聽説張宰相推薦了許多有才學的江南人做皇帝的日講官每日把皇帝的行住起坐和説笑都要記在册子上給張宰相看過倘然有不在道理的地方張宰相便當面埋怨因此神宗皇帝便不敢偷懶胡為又叫許多大臣天天陪著皇帝讀書張宰相自己也陪著皇帝每天在講壇上坐一個時辰那張宰相坐在一塊兒的時候把個神宗直急得背脊上淌下汗珠來有一天神宗皇帝讀論語讀到色勃如也一句把個勃字錯讀做背字一樣的聲音張宰相便板起面孔站起來大聲大氣對皇帝説道這不是背字的聲音是勃然大怒的勃字聲音這幾句話把個神宗皇帝嚇了一大跳當時許多日講官聽了也個個臉上變了顔色英明皇帝聽到這裏便不禁歎了一口氣説道好宰相明朝有這個張居正看來我們一時還惹他不得一面忙把這個消息去報與林丹汗知道一面吩咐探子再進關打聽去誰知明朝神宗皇帝自從張宰相死去以後卻十分不濟事滿朝都站滿了姦臣神宗皇帝又懶管朝政終日在深宮裏和妃子遊玩朝廷大事聽憑幾個太監在那裏作威作福接著甘肅寧夏地方的哱拜反亂起來那日本大將豐城秀吉又帶領十三萬陸軍和九千二百名水師來攻打朝鮮打破了王城朝鮮王李昭逃到義州一面到明朝來求救那英明皇帝趁此機會便把李昭兩個王子抓來攻打朝鮮北面這個消息傳到神宗皇帝耳朵裏忙打發將軍祖承訓帶領大隊人馬前去救援在路上遇到日本的先鋒隊小西行長打了一仗大敗逃回那時李如松的兵隊正駐扎在關外他仗著兵強馬壯帶著兵隊和日本小早川將軍在碧蹄驛惡戰一場如松逃回平壤明朝宰相石星得了這個消息十分害怕便立刻打發沈惟敬前去講和但是明朝此番在寧夏用兵用去兵費一百八十七萬八千多兩銀子在朝鮮用兵七年又用去兵費七百八十二萬二千多兩銀子弄得國庫空虛人心大亂神宗皇帝急得搔耳摸腮無法可想便有那親近的太監趁此機會勸説把全國的礦産開放了許百姓開採朝廷便從中取礦稅那時國庫裏豈不是又多了一宗收入神宗皇帝答應了聖旨下去凡是有礦脈的地方許百姓隨時報告開採那班太監便借著這個名目和地方官串通一氣到處騷擾凡是礦苗旺盛的地方都被他們霸占了去還借著朝廷的勢力硬逼著百姓替他開採倘然采不得礦苗還要硬逼著百姓賠償他的損失百姓若稍不依順他便硬説你田地房屋下面有礦脈把你的田地也收沒了房屋又拉坍了弄得百姓個個怨恨人人切齒那班太監還不知足又哄著神宗皇帝下上諭在天津地方收店鋪稅廣州地方收采珠稅兩淮地方收鹽稅浙江廣東福建地方收市舶稅成都地方收茶鹽稅重慶地方收名木稅長江一帶收船稅荊州地方收店稅寶坻地方收魚草稅那班貪官污吏便趁火打劫百般敲詐在平常人家一隻雞一頭豬都要抽稅鬧得民窮財盡十室九空可笑那神宗皇帝天天在深宮裏和妃子美人玩得天昏地黑好似睡在鼓裏怎會知道百姓的痛苦和憤恨那班太監還怕皇帝一旦臨朝查出他們的底細來便又買通宮裏總管魏太監求他在皇帝跟前欺哄著説國家大事自有百官料理天子玉食萬方理應享受人間的極樂從來説的人壽幾何陛下倘不趁這年富力強的時候及時行樂百年以後和草木同腐豈不可歎一句話觸動了皇帝的歪性便越發連日連夜地尋起快活來了從此金鑾殿上永不設朝冷冷清清的景陽鐘鼓伴著荒荒涼涼的殿頭野草只有那成群結伴的狐鼠蝙蝠在裏面封王拜相便了這裏魏太監見皇帝高興便大興土木仿著元朝的舊制在大內建造德壽宮翠華宮連天樓紅鑾殿入霄殿五花殿這時正值盛夏天氣魏太監便在樹木茂盛的地方造一座清林閣四面圍著長松翠竹南風吹著樹葉簫簫地響著他似吹彈絲竹東面又有松聲亭西面又有竹風亭在清林閣的南面萬壽山腳下又造一座春熙堂拿花椒滿塗著牆壁四面滿挂著錦繡簾幃拿香桂做柱子烏骨做屏風孔雀毛做帳子滿地鋪著又軟又厚的繡毯一走進屋子真是溫柔香豔鬧得神宗皇帝神魂顛倒眼花繚亂這些還不夠魏太監又在江南地方選了五七百個絶色的秀女安頓在各處房櫳宮闈裏聽憑皇帝隨時遊幸他又仿著元朝的名稱在桃花盛開的時候宮中便擺下筵宴稱做愛嬌之宴紅梅初開的時候稱做澆紅宴海棠花開的時候稱做暖妝宴瑞香花開的時候稱做撥寒宴牡丹花開的時候稱做惜香宴花落的時候稱做戀春宴花未開的時候稱做奪秀宴此外還有落帽宴清暑宴清寒宴迎春宴佩蘭宴采蓮宴沒有一事不宴沒有一地不宴天天鬧著筵宴處處聽得笙歌脂香粉膩把個風流天子鬧得昏昏沈沈這裏面最得皇帝寵愛的便是鄭貴妃説起那鄭貴妃的美貌真可抵得上回頭一笑百媚生六宮粉黛無顔色兩句詞兒神宗皇帝行動坐臥沒有鄭貴妃陪在一旁他是不歡喜的那鄭貴妃和魏太監打成一片想出各種新奇玩意兒來哄著皇帝魏太監又替鄭貴妃制一套霧帔雲裳又輕又薄暑天穿著好似霧裏看花一肌一膚都隱隱約約露在外面皇帝看了越發神思顛倒起來一霎時宮裏的婦女全都穿起這種輕薄衣裳來走來走去在日光下面映著好似精赤一般這時正是炎天盛暑到了夜間還是熏蒸得叫人耐不住幸而一輪皓月挂在空中那夜神宗皇帝到太液池中泛月去魏太監得了這個號令忙忙過去預備這裏皇帝和鄭貴妃拉著手走到太液池邊上了畫舫慢慢地蕩到水中央只見月色射波水光映月緑荷含香芳藻吐秀回頭看畫舫四周都有采蓮小艇夾持著艇子上都載著女軍左面領隊的一個宮女倒也長得花容月貌異常清秀頭上戴著赤羽冠披著斑紋甲手裏拿著泥金畫戟船頭上插著鳳尾旗風吹著旗上露出鳳隊兩字來右面領隊的一個宮女也出落得長眉秀眼十分嫵媚他頭上戴著漆朱帽穿著雪氅甲手裏擎著瀝粉雕戈船頭上插著鶴翼旗月光照著旗上露出鶴團兩字來此外又有采菱采蓮的小船船上結著緑紗滿載著宮女輕快便捷在水面上往來如飛這時候看看月麗中天彩雲四合鄭貴妃便吩咐下去開宴張樂皇帝和貴妃並肩兒坐在中艙四面窗桶子打開月光射進船艙來照在筵席上分外有光彩那細樂吹打到中間便有一隊披羅曳彀的宮女在筵前作群仙之舞月光射進羅裳裏去照出他們雪也似的肢體來婉轉輕盈又嬌聲滴滴唱著賀新涼的曲子神宗皇帝看了十分高興笑著對鄭貴妃説道昔西王母宴穆天子在瑤池的地方後人稱羡他古往今來沒有比他再快活的了但是朕今天和卿等賞此月圓共此良夜液池之樂卻不減於瑤池可惜沒有上元夫人在坐不得聽他一曲步玄之聲貴妃聽了便吩咐樂隊奏月照臨之曲自己出席來當筵舞著唱著道五華兮如織照臨兮一色麗正兮中城同樂兮萬國鄭貴妃唱罷皇帝親自上去扶他入席又賞貴妃八寶盤玳瑁盞貴妃又起來拜謝船中宮女又都向貴妃道賀這時神宗皇帝已吃得半醉便靠鄭貴妃的肩頭離席而起船窗外面采菱船送來青菱來采蓮船送來蓮子來貴妃坐在皇帝腳下親自剝著菱肉蓮子給皇帝吃皇帝一面吃著一面望著船艙外只見月到中天分外明淨水面上照出萬道金光來一隻一隻小艇子在金光中蕩漾著一陳陳笙歌從水面吹來悠幽悅耳皇帝憑著船舷傳旨下去教兩軍水戲只聽著一聲鼓響那鳳隊和鶴團排成陳勢來往旋轉愈轉愈快水面上起了一層波瀾兩隊宮女有的拿戟打有的用槍挑弄得滿船是水身上穿的紗衫被水濕透了粘住在身上襯出雪也似的肌膚來分外妖豔皇帝看了不禁大笑那宮女們也一齊笑起來一時裏鶯嗔燕叱水面上起了一陳繁噪遊戲多時皇帝下旨停戰那兩隊水軍便一字兒排在皇帝坐船跟前皇帝吩咐賞下紗羅脂粉去幾百個宮女便一齊嬌聲喚道皇帝萬歲神宗皇帝又把那個領隊的宮女宣上船來帶回翠華宮臨幸去了過了幾天魏太監又請皇帝駕臨漾碧池去遊玩那裏用緑石砌成四面圍著緑色的羅幃又種著緑葉的花草池中滿儲清水望去好似碧玉盤一般池上橫跨三個橋洞橋上結著三座錦亭排著三方匾額左面是凝霞兩字右面是承霄兩字中央是進鑾兩字皇帝和各院妃嬪在亭中飲酒作樂酒罷一隊細樂領著三十六院妃嬪到香泉潭中去洗躁皇帝便張著紫雲九華蓋坐在潭邊觀看只見那潭熱氣噴騰芬香觸鼻那班妃嬪一個個跳下水去戲弄著水中間立著一頭頭玉狻猊水晶鹿紅石馬那班妃嬪戲弄一陳各個騎上牲口背去有斜依著的有橫陳的有抱著的有撲著的有騎著的有坐著的有的手拿著各種花枝的有的彈著各種樂器的有的在水面上打著彩球的有的在水裏對舞著的鄭貴妃看了高興便也卸下衣裙跳進潭水裏去遊戲了一會然後爬在一頭玉馬背上騎著皇帝看去見貴妃長著一身雪也似的肌膚心中十分歡喜那許多妃嬪見貴妃來了便大家圍著他在水裏跳著唱著那水花飛舞起來濺得皇帝也是一頭一臉皇帝卻不惱怒哈哈大笑起來自己拿汗巾揩去水珠又從水裏把貴妃扶了出來回宮尋他的歡樂去了神宗這樣荒淫無度精神漸漸有點不濟起來鄭貴妃暗暗地和魏太監商量魏太監弄來鴉片煙來勸皇帝吃皇帝果然能振作精神便又終日吞雲吐霧大吃起來他這樣子在深宮裏昏黑地鬧了二十年工夫那朝廷大事越發糟得不堪設想魏太監裏面打通鄭貴妃外面結識了一班姦臣大弄威權神宗皇帝原有兩個兒子大兒子名叫常洛是王恭妃生的次子名叫常洵是鄭貴妃生的這常洵子以母貴神宗十分寵愛他三歲的時候便封他做福王那長子常洛卻落得無名無位便有許多正直的大臣出來幫助他常常上奏章請皇帝立常洛為太子無奈神宗聽了鄭貴妃的枕邊狀便不許臣子議論太子的事體那班大臣還不肯罷休早上一本晚上一本都是説請皇上早立太子那許多奏章都被魏太監捺住了神宗皇帝一眼也不曾瞧見好在皇帝在二十六年裏面不曾設過一次朝那班臣子也無從面奏這裏面惱動了一位吏部郎中名叫顧憲成的特別地又上了一本奏章設法買通小太監送進宮去神宗看了大發雷霆立刻下一道聖旨把顧憲成革職那時還有考功郎趙南星左都禦史鄒元標和王家屏一班官員一齊丟了功名回到家鄉地方召集一班自命為清流的讀書人在無錫地方立了一個東林書院他們借著講學名義天天聚在一塊兒談論朝政辱罵太監內中有一個高攀龍最是厲害他朋友又多不多幾時便到處有他們的同黨人人稱他們為東林黨他們又結識了一班在朝做禦史官的常常上奏章彈劾那班私通太監的大官有一個祭酒官湯賓尹立了一個宣昆黨在直隸山東湖南湖北江蘇浙江幾省地方都有他的同黨日子久了那班大臣見了這兩黨的人也有些害怕這兩黨的人口口聲聲要立常洛為太子後來越鬧越凶了那班太監和大臣都有性命之憂他們沒有辦法把二十六年不坐朝的神宗皇帝請出來上了一本奏章説東林黨和宣昆黨的人如何凶橫皇帝勃然大怒連下幾道上諭把兩黨的人革職的革職捉拿的捉拿一齊關在監牢裏一面便把常洛册立為太子又把福王調到河南去造座高大的王府花了三千多萬兩銀子這鄭貴妃心中還是十分不願意暗暗地和魏太監商量在萬曆四十三年上忽然有一個大漢名叫張節的手裏拿著木棍慌慌張張地闖進皇太子住的慈慶宮裏去那看守宮門的侍衛上去攔阻也被他打傷了一時裏宮裏太監聲張起來跑來許多護兵把張節捉住了送到刑部衙門裏去審問那刺客供認是鄭貴妃宮裏的太監馬三道指使他來行刺太子的這一句話傳出去外面便沸沸揚揚説是貴妃謀死太子那鄭貴妃聽得了便在神宗皇帝面前撒癡撒嬌地哭訴神宗皇帝便把太子宣進宮去一手拉著貴妃一手拉著太子替貴妃辨白説這事貴妃完全不知情的太子看在父子情面上也推説那張節是個瘋癲的刑部郎中胡士相便把張節定下了個殺頭的罪又把馬三道充軍到三千裏外去自從出了這個案件以後這鄭貴妃忽然拿好心看待太子起來常常做些針線活送給太子又弄些食物給太子吃太子看他並無惡意便也常常進宮朝見貴妃因此太子和神宗父子的恩愛又十分濃厚起來鄭貴妃又怕太子不相信他便和神宗説了下一道聖旨給福王以後不奉宣召不得擅自進宮這一來又討好太子又杜絶了他母子間的嫌疑誰知這神宗皇帝在萬曆四十八年上死了太子常洛即位便是光宗皇帝這光宗皇帝因為鄭貴妃和他好便把他留在宮裏和母親一般看待又誰知光宗即位不多幾天便害起病來光宗皇后卻沒有急壞倒急壞了鄭貴妃便傳命出去叫大臣到處求醫問藥這時有一個太監名叫崔文升獻了一味丹方給皇帝吃了下去那病勢越發沈重了這時又有一位大臣名叫方從哲的打發鴻臚寺丞李可灼送進一粒紅丸來鄭貴妃勸光宗服下那時鄭貴妃做媒給光宗做妃子的李選侍也力勸皇帝服這一粒紅丸光宗聽了兩位妃子的話便把紅丸吞下肚去誰知第二天那藥性發作起來這位做不上一年的光宗皇帝便有些性命難呆了要知光宗皇帝性命如何且聽下回分解
