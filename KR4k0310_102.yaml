body:
  text: 第六十二回妝閣重來留情一笑幽齋數語默證三生卻説劉文叔走進書房靠著桌子坐下一手托腮光是追想方才情景這時他的兩個哥哥見他這樣都十分詫異劉縯道他從來沒有過像今朝這樣愁眉苦臉的敢是受了人家的欺侮了嗎我們且過去問問看説著二人走進書房劉仲首先問道三弟今天是到哪裏去的他坐在桌子旁邊紋絲不動竟一個字都沒有聽見劉仲問劉縯道大哥你看三弟今朝這個樣兒一定和誰淘氣的如果不是為何這樣的不瞅不睬劉縯點著頭走到他的身邊用手在他的肩上一拍笑道三弟你今天敢是和哪個爭吵這樣氣沖鬥牛的愚兄等一連問你幾聲為什麼連一個字都不答我們究竟是什麼意思呢他正自想得出神不提防有人猛地將他一拍他倒是嚇得一跳急收回飛出去的魂靈定睛一看但見兩個哥哥站在身旁問話可是他也未曾聽得清楚只當是問他田事的呢忙答道瓜田裏的肥料已經派人布好豆子田裏的草已經鋤去還有麥田裏的潭已動手了只有菜子還沒收別的差不多全沒有事了劉縯劉仲聽了他這番所答非所問的話不禁哈哈大笑他見他們笑起來還只當是他們聽了自己説的話贊成的呢他便高興起來又説道不是我誇一句海口憑這六百多頃田我一個人調度任他們佃戶怎樣的刁鑽在我的面前總是掉不過鬼去的他們聽了更是大笑不止劉文叔到了此時還不曉得他們為的是什麼事發笑的復又開口説道大哥二哥聽了我這番話敢是有些不對嗎劉縯忙道你的話原是正經有什麼不對呢劉文叔忙道既然對的又為何這樣的發笑呢劉仲笑道我們不是笑的別樣方才你走進門我們兩個人就問你幾句你好像帶了聖旨一樣的直朝後面走一聲也不答應我們我們倒大惑不解究竟不知你為著什麼事情這樣的生氣我們又不放心一直跟你到這裏大哥先問你我又問你總沒有聽見你答應我們一句腔後來大哥在你肩上拍了一下子你才開口不想你講出這許多驢頭不對馬嘴的話來我們豈不好笑他聽了這番話怔怔的半天才開口説道我委實沒有聽見你們説什麼呀劉縯忙道我看你今天在田裏一定遇著什麼風了不然何至這樣的神經錯亂呢劉仲道不錯不錯或者可能碰到什麼怪風也説不定趕緊叫人拿薑湯醒醒脾劉縯便要著人去辦薑湯他急道這不是奇談麼我又不是生病了好端端的要吃什麼薑湯呢劉仲道你用不著嘴強還是飲一些薑湯的好你不曉得這薑湯的功用很大既可以辟邪去祟又可以醒脾開胃你吃一些不是很好的嗎劉文叔急道你們真是無風三尺浪我一點毛病也沒有需什麼薑湯蔥汁呢劉縯道那麼方才連問你十幾句也沒有聽見你答一句這是什麼意思呢劉方叔沈思了一會記得方才想起陰麗華的事想得出神所以他們的話一句沒有聽見想到這裏不禁滿面緋紅低首無語劉縯劉仲見他這樣更加疑惑便令人出去辦薑湯一會子薑湯燒好一個小廝捧了進來劉縯捧著走到他身邊説道兄弟你吃一杯薑湯精神馬上就得清楚劉文叔心中暗笑也不答話將薑湯接了過來輕輕地往地下一潑笑道真個這樣的見神見鬼了我方才因為想了一件事情想得出神所以你們問我就沒有在意你們馬上來亂弄了劉縯笑道既然這樣便不準你一個人坐在這裏發呆要隨我們一同去談談才好呢劉文叔被他們纏得沒法只好答應跟他們一同走到大廳上那一班劉縯的朋友足有四百多人東西兩個廂房裏以及花廳正廳上跑來跑去十分熱鬧有的鬚眉如雪有的年未弱冠胖的瘦的蠢的俏的形形色色真是個珠覆三千劉文叔正眼也不去看他們一下子懶洋洋的一個人往椅子上一坐也不和衆人談話只是直著雙目呆呆地出神劉縯劉仲也只當他是為著田裏什麼事沒有辦妥呢也不再去理他各有各的事情去了不多時已到申牌時候一班廚子紛紛地到大廳上擺酒搬菜一會子安擺停當那班門下客一個個不消去請老老實實地都來就坐劉縯劉仲劉文叔三個人和五個年紀大些的老頭子坐在一張桌子上酒未數巡忽有一個人擲杯於地掩著面孔號啕大哭劉縯忙問道李先生今天何故這樣的悲傷煩惱莫非下人怠慢先生嗎如果有什麼不到之處請直接可以告訴鄙人那人拭淚道明公哪里話來兄弟在府上一切承蒙看顧已是感激不盡哪里有什麼不到之處呢不過我哭的並非別事因為今天得著一個消息聽説太皇太后駕崩故而傷心落淚的試看現在亂到什麼程度了莽賊篡位自號新皇帝眼看著要到五年了不幸太皇太后又崩駕歸西這是多麼可悲可歎的一件事阿有個老頭子蹺起鬍子歎道莽賊正式篡位的那一年差不多是戊辰吧今年癸酉卻整整六年了怎麼説是要到五年呢劉縯皺眉歎道在這六年之內人民受了多少塗炭何日方能遂我的心頭願呢劉仲道大哥你這話忒也沒有勇氣了大丈夫乘時而起守如處女出如脫兔既想恢復我們漢家基業還能在這裏猶疑不決麼時機一到還不趁風下桌殺他個片甲不留這才是英雄的行徑呢衆人附和道如果賢昆仲義旗一樹吾等誰不願效死力呢劉文叔笑道諸公的高見全不是安邦定國的議論不錯現在莽賊果然鬧得天怨民愁的了但是他雖然罪不容誅要是憑你們嘴裏説豎義旗就豎義旗談何容易憑諸公的智勇並不是我劉文叔説一句敗興的話恐怕用一杯水去救一車子火結果絶對不會有一點效力的要做這種掀天揭地的大事業斷不是仗著一己的見識和才智所能成事的老實説一句照諸公的才幹談天説地還可以如果正經辦起大事來連當一名小卒的資格還沒有呢他將這番話一口氣説了到底把一班門下客嚇得一個個倒抽一口冷氣面面相覷半晌答不出話來劉縯忙喝道你是個小孩子家曉得天多高地多厚呢沒由的在這裏信口雌黃你可知道得罪人麼劉文叔冷笑不語劉縯忙又向衆人招呼賠罪道舍弟年幼無知言語衝撞諸公務望原諒才好衆人齊説道明公説哪里話來令弟一番議論自是高明得很我們真個十分拜服劉仲道請諸公不要客氣小孩子家只曉得胡説亂道的稱得起什麼高明不要折煞他罷他們正自謙虛著劉文叔也不答話站起身來出了席向劉縯説道大哥我今天身體非常疲倦此刻我要去睡了劉縯笑道我曉得你是個生成的勞碌命間著一天馬上就不對了今天可是弄得疲倦了他也不回答一徑往後面書房裏走來進了自己的書房便命小僮將門閉好自己在屋裏踱來踱去心中暗想道明天去想什麼法子教那人兒出來呢但是寫信這個法子不是不好恐怕他一時翻起臉來將這信送給他的哥哥那麼我不是就要糟糕了麼他停了一會子猛地又想道那陰麗華曾朝他狠狠地望了一眼的他如果沒有意與我還能叫明兒將我送出來麼是的他定有意與我的可是這封信怎樣寫法呢寫得過深又怕他的學識淺不能了解寫得淺些又怕他笑我不通他究竟是個才女或者是一個目不識丁女子這倒是一個疑問了他是個才女見了我的信任他無情總不至來怪罪我的假若是個不識字的女子可不白費了我一番心思去討沒趣麼他想到這裏真個是十分納悶停了一會忽然又轉過念頭道我想他一定是個識字的才女只聽明兒講話大半夾著風雅的口吻如果他是個不識字的他的丫頭自然就會粗俗了他想到這裏不覺喜形於色忙到桌子跟前取筆磨墨預備寫信給他他剛拿起筆來猛然又轉起一個念頭來忙放下筆説道到底不能寫信因為這信是有痕迹的不如明天去用話探試他罷他又踱了一回已有些倦意便走到床前揭開帳子和衣睡下那窗外的月色直射進來他剛要入夢忽聽得窗外一陳微風將竹葉吹得颯颯作響他睜開睡眼一骨碌爬起來便去將門放開伸頭四下一看也不見有什麼東西只得重行關好門坐到自己的床邊自言自語道不是奇怪極了明明的聽見有個女人走路的聲音還夾著一種環佩的響聲怎麼開門望望就沒有了呢他正自説著猛可裏又聽得叮叮噹噹的環珮聲音他仔細一聽絲毫不錯忙又開門走出去尋找了一回誰知連一些影子也沒有他無奈只得回到門口直挺挺立著目不轉睛地等候著不一會果然又響了他仔細一聽不是別的原來是竹葉參差作響他自己也覺得好笑重行將門關好躺到床上可是奇怪地得很一閉眼睛就看見一個滿面笑容的陰麗華玉立亭亭地站住在他的床前他不由得將眼睛睜睜開來瞧瞧翻來覆去一直到子牌的時候還未曾睡著幾次強將眼睛閉起無奈稍一合攏來馬上又撑了開來不多時東方已經漸漸地發白他疲倦極了不知道在什麼時候合起眼來真的睡著了再説那明兒回去到了陰麗華的繡樓上只見麗華手托香腮秋波凝視默默地在那裏出神明兒輕輕走過來笑道姑娘我已經將那個高鼻子送出去了麗華嫣然一笑道人家的鼻子怎樣高法呢明兒笑道姑娘你倒不要問這人的鼻子委實比較尋常人來得高許多哩麗華笑道管他高不高既然將他送了出去就算了還嚕嗦什麼呢明兒笑道我還有一件事情要來稟知姑娘不知姑娘曉得嗎麗華笑道癡丫頭你不説我怎麼能曉得呢明兒笑道我送那高鼻子出去的時候他曾對我説過他有個表妹名字叫什麼君子求他寫一封信要帶給你我想從沒有聽見過一個姓君的是你的朋友呀麗華笑道你説什麼我沒有聽得清楚你再説一遍明兒道你有沒有一個朋友姓君的麗華方才入神忙問道他叫什麼名字明兒道叫做君子求他有一封信要帶給你他聽了這話皺著柳眉想一會道沒有呀明兒笑道既然沒有為什麼人家要寄信給你呢那個高鼻子説得千真萬真準於明天將信送得來難道假麼他仔細的一想芳心中早已料著八九分可是他何等的機警連忙正色對明兒道這個姓君的果然是我的好友但是他和我交接的時候你們大主人與二主人皆不曉得現在他既然有信來你可不能聲張出去的萬一被他們曉得一定要説我不守規矩勾朋結類的了明兒哪里知道就裏連連地答應道姑娘請你放心我斷不在別人面前露一言半句的麗華大喜道既然如此你明天早上就到園裏去守他收信切切明兒唯唯答應不在話下岔回來再表劉文叔一夢醒來不覺已到午時望日當窗那外面的鳥聲叫得一團糟似的他披衣下榻開門一望只見炊煙縷縷花氣襲人正是巳牌的時候他懶洋洋地將衣服穿好稍稍地一梳洗便起身出門到了五殺場上看見劉縯帶著二千多名鄉勇在那草地上操練呢他也沒心去看一徑走到豪河口的吊橋上劉縯見他出來正要和他説話見他走上吊橋似就要出村去的樣子不由得趕上來勸道兄弟你昨天已經吃足辛苦了今天又要到哪里去他冷冷地答道因為這幾天身上非常不大爽快所以住在家裏氣悶煞人還是到外面去跑跑的好劉縯道遊玩你儘管遊玩不過我勸你是不要操勞的為妙田裏的各事自然有長佃的是問需不著你去煩神的他們如果錯了一些兒馬上就教他們提頭見我劉文叔笑道話雖然這樣的説但是天下事大小都是一樣的待小人宜寬防小人宜嚴要是照你這樣的做法不消一年包管要怨聲栽道了劉縯笑道你這話完全又不對了古話雲賞罰分明威恩並濟事無不成的如果一味敷衍一定要引起他們小視了劉文叔笑道你這話簡直是錯極了用佃戶豈能以用兵的手段來應付他們不獨不能發生效力還怕要激成變亂呢劉縯被他説得噤口難開半晌才道兄弟的見識果然比我們高明得多哩劉文叔此刻心中有事再也不情願和他多講廢話忙告辭了出得村來順著舊路仿仿佛佛地走向南來不一會又到了那一條溪邊的小橋上面可怪那些小鳥和水裏的魚兒似乎已經認識了的樣子一個個毫不退避叫的跳的遊的飛的像煞一幅天然的圖畫他的心中是多麼快活多麼自在似乎存著無窮的希望放在前面的樣子兩條腿子也很奇怪走起來兀的有力氣不多一會早到了他家的後園門口只見後門口立著一個麗人他心中大喜道這一定是麗華了三步兩步地跑了過去定睛一看不是別人卻是明兒但見他春風滿面的第一句就問道你的信送來了嗎他故意答道送是送來但是我們小姐説過的不要別人接需要你們家小姐親自來接信才行呢明兒笑道你這人可不古怪極了任你是什麼機密的信我又不去替你拆開怕什麼呢劉文叔笑道那是不行的因為我們的小姐再三叮嚀教我這封函千萬不可落到別人的手裏我是抱定受人之托忠人之事的宗旨姐姐請你帶你們的小姐出來我好交信與他明兒強他不過只得向他瞪了一眼説道死人你跟我進來吧他聽了這話如同奉了聖旨一樣輕手輕腳地跟著他走進園去不多時走到書房門口明兒對他道煩你在這裏等等我去帶小姐馬上就來他唯唯答應他便起身去了劉文叔在書案上翻看了一會等得心焦忙出書房張目向前面望去猛可裏聽見西南角上呀的一聲他擡起頭來凝神一望只見樓窗開處立著一個絶代佳人他料想一定是陰麗華毫無疑義了但見他閃著秋波朝劉文叔上下打量個不住最後嫣然一笑便閉了樓門這一笑倒不打緊把個劉文叔笑得有癢沒處搔神魂飛越在書房裏轉來踱去像煞熱鍋上螞蟻一樣等了一會伸出頭來望了一會不見動靜他滿心焦躁道明兒假使去報告他家主人那就糟了忽然又轉過念頭道不會的不會的方才他朝我一笑顯系他已得明兒的消息才能這樣的又等了半晌突聞著一陳蘭麝香風接著又是斷斷續續的一陳環珮的聲音從裏面發了出來他暗暗地歡喜道那人兒來了不多時果見明兒在前面領著路但見他婷婷嫋嫋地來了劉文叔這時不知怎樣才好又要整冠又要理衣真是一處弄不著霎時他走到書房門口停了停便又走了進來嬌羞萬狀脈脈含情劉文叔到了這時一肚子話盡華到無何有之鄉張口結舌做聲不得明兒對他説道這是我們的小姐先生有什麼信可拿出來吧劉文叔忙搶上前躬身一揖口中道請屏退侍從以便將信奉上陰麗華宮袖一拂明兒會意連忙退出他嬌聲問道先生有什麼信請拿出來吧這正是休道落花原有意須知流水亦多情要知後事如何且看下回分解
