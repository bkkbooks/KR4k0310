body:
  text: 第八十二回慈安太后為嘴喪命洞元道士望氣得意卻説懿妃第一天受了西太后的一番訓斥以後心中已十分害怕時時防著有大禍臨身一夜不曾闔眼第二天一早起來梳妝已罷看看沒有什麼消息便趕到仁壽宮去伺候著慈禧太後起身太后見了他卻不説話懿妃心中稍稍安下候著太后坐早朝去便偷空回到自己屋子裏去休息留下一個宮女在太後宮裏打聽消息待到太后回宮看了翁同和的摺子把榮祿傳進宮去大加訓斥懿妃的宮女在廊下聽得十分清楚急急趕去告訴懿妃知道懿妃一想這個罪名看來不能免了將來拋頭露面到宗人府去受著審問叫我如何丟得下這個臉我還不如趁早尋個自盡罷他打了這個主意把跟前的宮女一齊調出房去他自己闔上房門向空磕了幾個頭拿了一條鸞帶在當門口吊死了待到那宮女去做了事回進房來房門反關著在門外叫喚也不聽得房裏有什麼聲響宮女們知道事情不妙便去通報總管那總管看了情形知道出了事體便傳齊許多小太監從窗戶裏打進屋子去一看見懿妃的身體高高地挂在當門上去摸一摸早已斷了氣小太監嚇得跳出房來把情形報與總管知道總管也不敢做主忙去報與李總管李總管便報與太后身邊的宮女宮女不敢延緩立刻去報與太后慈禧太后受了慈安太后的埋怨一肚子沒好氣見宮女報説懿妃自縊身死便説道他們自己作的孽我也管不得這許多一面指著榮祿説道他雖説是我的親侄兒但他如今被翁師傅參奏下來我也不能夠包庇他求姊姊帶去嚴嚴地審問他該殺該剮俺決沒有半句間話俺做了太后為了這畜生給臣子們説我袒護私親我的臉也丟盡了西太后説到這裏也撑不住掉下眼淚來慈安太后便傳總管來把翁師傅的原折連同榮祿送去刑部大堂審問明白那刑部大臣知道榮祿是慈禧太后的內親也不敢擬什麼重罪只擬了永不敘用四個字把奏摺送上兩宮太后西太后避著嫌疑由東太后批了依議兩個字從此榮祿革去了一切職銜間住在家裏不能再進宮去見太后了西太后跟前少了這兩個人陪伴頓時覺得十分寂寞肚子裏一肚的心腹話也沒有地方可以説得因此越發把個慈安太后恨入骨髓時時刻刻和李蓮英商量要想報他的仇恨慈禧太后説近來東太后處處抓我的錯外我倘不想法子報仇致他的死命將來還有我自由的地步嗎在慈安太后看來慈禧有許多事體犯在他手裏總可以從此改過自新感激自己的恩德了知道西太后去了懿妃和榮祿兩人跟前十分寂寞便每日到西太后宮裏找他説些間話西太后在面子上雖敷衍著心中卻時刻留意看可有下手報仇的機會沒有東太后生平最愛吃小食兒他不論到什麼地方總有一個宮女捧著點心盒子跟在後邊盒子裏面各色糖果糕餅餑餑都有東太后説著話便隨手拿著糖果點心吃著西太后看了這情形心中忽然有了主意隔了幾天正是召見軍機大臣之期慈安太后絶早起來慈禧太后起身略遲慈安太后便到慈禧宮中去候著慈禧一面梳妝著一面和慈安説著話忽然想起東太后未曾用得早餐忙吩咐宮女去把那精細餑餑拿出來獻與東太后吃東太后看時那餑餑真做得精細可愛有做成八仙的有做成鶴鹿的裏面拿雞絲火腿做成餡子吃著味很美東太后一面稱讚著一連吃了幾個西太后説這是宮中新進來的膳夫制了一百個餑餑進呈先嘗嘗味兒的姊姊既愛吃索性叫宮女多拿幾個回宮去吃著玩兒説著便有宮女捧著一大盒餑餑來交給那捧點心盒子的宮女先給東太后送回宮去西太后梳洗完畢與東太后一同出去坐朝當時召見的大臣是恭親王奕欣大學士佐宗棠尚書王文韶等一班人這一天正是光緒辛亥年三月初十日照宮廷的規矩太後坐朝大臣們原跪在簾子外奏對的只因西太后嫌隔著簾子説話十分氣悶吩咐把當殿的簾子卷起從此臣僚上朝都能望見兩太后的顔色這一天諸大臣奏對的時候獨有恭親王的眼力最鋭望見慈安太后禦容甚是和悅説話也獨多只是兩腮紅暈好似酒醉一般這一天開禦前會議議的是法國進寇越南的事體到午膳的時候諸大臣稍退兩宮太后在偏殿傳膳膳罷略事休息又復召集臣工繼續會議直議到下午四點鍾才議出一個頭緒來由兩宮下諭北洋大臣李鴻章籌商辦法並命沿邊沿江沿海各督撫密為籌備旨意擬成慈安太后便覺得頭目昏花有些支撑不住了急急回宮去在禦榻上睡下外面大臣們退朝在朝房裏又商議了一會個個退出午門正打算回家忽然內廷飛報出來説慈安太后駕崩了傳軍機大臣們莫散去速速進宮商議大事那班大臣們聽了面面相覷目瞪口呆內中惟有恭親王最是關心聽了便撑不住嗥啕大哭起來諸大臣勸住了恭親王的哭趕進東太后寢宮去見慈禧太後坐在矮椅上宮女們正在替東太后入殮大臣們看了這個情形忍不住個個掉下眼淚來只聽得西太后自言自語地説道東太后一向是一個好身體近來也不見害病怎麼忽然丟下我去了呢慈禧太后一邊數説著一邊伏在尸身旁鳴嗚咽咽地痛哭起來諸位大臣見西太后哭得傷心便一齊跪下地來勸解著説皇太后請勉抑悲懷料理後事要緊照宮廷的舊例凡是帝後上賓所有藥方醫案都要交軍機大臣驗看如今東太后死得這樣快所以也不及延醫服藥也不曾留得方案後妃死後照例又須召椒房戚族進宮去看著入殮如今西太后的主意不叫去通報東太后的母家鈕鈷祿氏的族人大臣們也沒有人敢出這個主意一任那班宮女在那裏替東太后草草成殮慈禧太后一面把一班軍機大臣召喚到自己書房裏去商量擬遺詔的事體早發遺詔以掩人耳目那遺詔上説道豫以薄德詆承文宗顯皇帝册命備位宮壺逮穆宗毅皇帝寅紹丕基孝思純篤承歡奉養必敬必誠今皇帝入纘大統親膳問安秉性誠孝且自禦極以來典學維勤克懋致德豫心彌深欣慰雖當時事多艱宵旰勤政然幸體氣素稱強健或翼克享遐齡得資頤養本月初九偶染微症皇帝侍藥問安祈豫速痊不意初十日病勢倍重延至戌時神忽漸散遂至彌留年四十有五母儀尊養垂二十年屢逢慶典疊晉徽稱夫復何憾第念皇帝遭茲大故自極哀傷惟人主一身關係天下務當勉節哀思一以國事為重以仰慰慈禧端佑康頤昭豫莊誠皇太后教育之心中外文武恪供厥職共襄郅治豫靈爽實與嘉之其喪服酌遵舊典皇帝持服二十七日而除大祀固不可疏群祀亦不可輟再豫以儉約朴素為宮闈先一切事關典禮固不容矯縱抑損至於飾終遺物有可從儉約者務惜物力即所以副豫之素願也故茲昭諭其名遺行一道遺詔便輕輕把一樁絶大的疑案掩飾過去了那孝貞皇太后的家族也不敢問信慈安太后一死慈禧太后在宮中可以獨斷專行了他第二步就是要除去恭親王奕欣恭親王在王大臣中資格最老又是先朝顧命之臣他常常和慈安太后呼成一氣和自己做對有此人在朝終不能暢所欲為常常和李蓮英商量著要革去恭親王的職但恭親王入軍機已久諸大臣都和他通同一氣他辦事又公正從沒有失職的事體便是要去他也無可藉口恰巧第二年中法戰事起了説他議和失策把這罪名全個兒擱在恭親王身上趁此機會下一道上諭把從前慈安太后的同黨一齊革職為一網打盡之計但這一道上諭説得吞吞吐吐文不對題那班被革職的大臣們知道慈禧太后有意排除異己只因天語煌煌也只得忍氣吞聲地退出了軍機處慈禧太后又把幾個自己親信的王大臣下旨選入了軍機處那醇親王原是太后的一黨慈禧便暗暗地指使孫育漢奏請把醇親王調入軍機處做太后的耳目醇親王是帝父照祖宗成法是不能入軍機處的如今慈禧太后另有用意把醇親王調入了軍機處一面下上諭説軍機處遇有緊要事件著會同醇親王商辦俟皇帝親政後再降懿旨翁同和看了這道上諭大不以為然便指使左庶子盛昱上奏力爭接著那左庶子錫鈞禦史趙爾巽都上書勸諫説醇親王不宜參預軍機事務慈禧太后如何肯聽上諭下來只有應毋庸議四個字那班臣子看了也無可如何光緒皇帝原和醇親王不對的皇帝真正的父親卻是奕譞那慈禧太后又和奕譞不對的光緒皇帝進宮的時候奕譞的福晉原不十分願意他們是妯娌輩知道慈禧的脾氣十分姦刁自己的兒子要在他手裏長大一定是要吃苦的當光緒進宮的時候奕譞的福晉也曾痛痛地哭了幾場説活活地把我一個兒子葬送了這話傳到慈禧耳朵裏去説奕譞福晉不受擡舉從此因恨奕譞夫妻兩人也便不歡喜光緒皇帝了實在此番慈禧太后的立光緒帝在慈禧心中還算是報奕譞的恩的奕譞有什麼恩原來當初文宗在日和奕譞十分友愛弟兄兩人常常在宮中見面文宗所有心腹話都向奕譞説出來這時文宗看出慈禧太后是一個不安分的女人便想廢去他妃子的名位免得他將來倚勢弄權常常把這個意思和奕譞商量著是奕譞再三勸住保全了慈禧的名位慈禧心中感激他夫婦兩人所以把他兒子立做皇帝卻不料奕譞夫妻兩人是不中擡舉的背地裏常常説慈禧的壞話再加光緒帝處處和皇太后對抗自幼兒性情便不能相投慈禧疑心是奕譞在暗地裏教唆這個樣兒的也便處處防備傳諭宮門非有特詔不得令皇帝和奕譞夫妻見面因此奕譞福晉越發恨著太后常常因想念兒子在府中哭泣這時光緒帝已定了親選定的皇后是桂祥的女兒便是慈禧太后的侄女性情和太后差不多光緒帝心中十分不願意皇帝所喜歡的便是一個瑾妃瑾妃的面貌又美麗性情又和順光緒帝很想立他做皇后無奈皇太后不答應因此皇帝和皇太后的分歧又深了一層那班趨奉皇太后的宮監臣子們見皇太后不喜歡皇帝和奕譞夫妻們便造出許多謠言來説京師西直門外白雲觀裏有一道士名叫洞元他能夠望氣每到夜深洞元在庭心裏遠望見奕譞府中屋頂上面罩著一重雲氣那雲氣裏隱約見一條黃龍在半天裏騰挪飛舞奕譞怕要做本朝的真命天子不可不防皇太后聽了這個話十分相信吩咐李總管把這洞雲道士傳進宮來親自詢問那洞元道士説屋上有雲氣確是出真命天子之兆今蒙皇太后垂問容小道再到王府門口去細察看再來復旨太后準了他的奏便派幾個小太監打扮得和平常人模樣到奕譞府門口細細地觀望了一回洞元道士點點頭心中明白急回宮去奏明皇太后説王府中有一株古柏樹那雲氣便從柏樹頂上出來只須想法把那柏樹截斷便破了風水可以無礙了太后聽了便賞了道士些銀錢去訖又擺駕出宮悄悄地趕到奕譞府中去把奕譞夫妻兩人嚇得屁滾尿流急急出來把聖駕接進屋子去慈禧太后笑著拉住奕譞福晉的手説道俺們自己姊妹不必客氣我在宮中悶得慌想起妹妹府中的花園十分幽雅特來遊玩一回奕譞得了太后的話便把酒席擺在花廳裏請皇太后吃酒賞花那株古柏適當庭心看它老幹擎天濃蔭匝地太后不住地讚歎説好高大的柏樹俺如今建造頤和園正缺少這樣的大木料奕譞站在一旁聽了太后的説話便信以為真忙奏稱道臣願把這件木料獻與老佛爺皇太后聽了正合他的來意待用膳已畢便吩咐傳集府中的工匠一齊動手把這株五六百年的老柏樹齊根挖了出來這時皇太后正坐在廊下看著只聽得一聲響亮大樹倒地樹心裏忽然飛出十數條大蛇來金鱗火眼向四處亂撲有一條大蛇直向皇太后臉上撲來要知皇太后的性命如何且聽下回分解
