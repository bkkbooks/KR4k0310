body:
  text: 第六十三回宣武門外名媛倚閭釘鞋鋪中貞婦投梭卻説咸豐皇帝跟著崔三常常在宣武門外間逛見了許多美貌娘兒們樂得他心花怒放恨不得闖進人家去摟抱一回還是崔總管悄悄地勸住説皇上且耐著性兒容奴才打聽去有可以遊玩的人家再奉皇上遊玩去有一天咸豐騎著馬走過一家門口見有許多浮頭少年在這家門口踅來踅去嘴裏唱著那男女私情的歌兒再看時那牆門口一簇站著四個姑娘個個長得鞭蓉如面楊柳細腰裏面站個年紀最小的望去大約十五六歲長得尤為嬌小嫵媚那一雙眼波溜來溜去真是勾魂攝魄看他下面一雙小腳兒又尖又瘦穿著紅緞繡花鞋兒貼在地上只有二寸許長咸豐帝看了也不覺喝一聲好這四個姑娘前面還站著一個半老佳人他一邊對那班浮頭少年低低地罵著叫他們走開不許他們看他的女兒一邊卻對他們搔首弄姿那種風騷樣兒不覺把個皇帝也看怔了咸豐帝騎在馬上在他們門口蜇來蜇去繞了三遍這娘兒五個人被他們看得害起羞來便砰地關上大門進去了咸豐帝回到宮裏禁不住冥思夢想他也曾在那家門口去跑過幾次無奈總不能和他們再見一面便吩咐崔三打聽去那崔總管一連去打聽了三天才興衝衝地跑進宮來對皇帝説陛下可知道宣武門外有一個美人兒叫小腳蘭花的麼咸豐帝説道朕卻不知道誰是小腳蘭花小腳蘭花是怎麼樣的崔總管奏説陛下那天看見的四個姑娘奴才已去打聽得他是張家的女兒原籍蘇州人他父親張藝台在刑部做過侍郎家裏原有妻子的到京裏來便娶了一個窯姐兒竺氏做太太生下這四個女兒便一病死了虧得四個女兒都已長大成人且長得個個都是美人胎子似的竺氏便仗著他女兒做幌子招惹幾個遊蜂浪蝶進去靠聚賭抽頭過日子竺氏陪伴著一班客人那班客人愛他長得風騷因此京城裏一班紈袴子弟都在他家遊玩他們個個歡喜他家的女兒竺氏卻管束得很嚴沒有一個人上得手的那班富家公子見越不得上手越肯花錢那竺氏見他們越肯花錢卻越不給他上手到如今竺氏也賺得上萬家財了他的門戶也越緊了非是王公大臣他是不接待的他四個女兒大女兒名荷兒第二個名桂兒第三個名蓉兒最小的名蘭兒因蘭兒長得最是嬌小動人又是一雙二寸許長的小腳滿京城人都嚷著小腳蘭花咸豐帝聽了便問道可是那天朕在他家門口看見站他姊妹背後臉上擦著鮮紅的胭脂一雙水盈盈的秋波向人亂轉的嗎崔總管回答正是他咸豐帝不禁把手在腿上拍説道好一個美人兒真是名不虛傳朕怎麼也得玩玩去崔總管奏説道陛下莫性急奴才聽得前門大街福記金店的掌匱老胡是竺氏的舊相好奴才便托他説去咸豐帝聽到這裏忙問道你敢是説朕要到他家逛去嗎崔總管搖著手説不不奴才推説有一位江西木商進京來他要去見識見識張家姐妹求你做一個向導那掌匱聽了便去和竺氏商量第二天傳出了竺氏的話那客人既愛俺家女兒叫他每一個姑娘拿出五萬兩銀子見面錢來那蘭兒另外要十萬兩銀子遮羞錢老身也要五萬兩銀子共是三十五萬兩銀子少一兩不得那金莊掌匱也要五萬兩銀子咸豐帝聽了一算要四十萬兩銀子不覺伸了一伸舌頭但是他想一想那四個姑娘的面貌便頓時高興起來立刻催著崔總管到庫上去提銀子送至福記金店去這一回崔總管自己整整賺了十二萬兩銀子分三萬兩銀子給金店老胡那竺氏淨到手了二十五萬兩銀子這竺氏自出娘胎也不曾見過這許多銀子便笑得合不上嘴來到了第三天崔總管悄悄地雇一輛車把皇帝藏在車廂裏外面用布圍著自己跨著轅兒悄悄地趕出宣武門去到張家門口把皇帝扶下車來竺氏接進院子去皇帝看竺氏臉上一般的膩粉紅脂眉彎入鬢便笑説道徐娘韻姿風騷可愛那竺氏聽了一溜眼伸手輕輕地在皇帝肩上一拍掩著嘴笑説道打你這個油嘴皇帝哈哈大笑走進堂屋去只見上面紅燭雲燒繡氈貼地崔總管扶著皇帝向南坐下停了一會那四個女兒打扮得好似四枝牡丹花嫋嫋婷婷地走了出來由四個小丫頭扶著向皇帝深深地拜了一拜皇帝這時忍不住上去拉近身來細細地認識一番連聲説妙隨即拿出四個翠玉指環來親自替他們套在小指兒上停了一會擺下筵席來四個姑娘輪流把盞皇帝也把竺氏拉住了叫他坐一旁陪伴著五娘女一杯一杯把個皇帝灌得爛醉如泥竺氏在前面引著燭四個姊妹在前後左右挽著皇帝進房去服侍他脫去鞋帽袍褂忽然在臂膀下面露出小印來拿黃帶子終住在手臂上那蘭兒原是認識字見印著傳國玉璽四個小篆字不覺嚇了一跳忙悄悄告訴母親竺氏急出門問崔總管時他起初還不肯説竺氏急了説道如今南方大亂京城裏禁令森嚴像這種來歷不明的客人任你錢多俺家中也不敢接待扶送他出去罷崔總管才悄悄告訴他道這實是當今的萬歲爺你母女好好伺候著管叫你一世享福不盡呢竺氏聽了心中又歡喜又害怕回進房去告訴女兒皇帝見了竺氏便拉住不放他出房去皇帝連玩三天兀自不肯回宮去被步統領衙門和九門提督知道了忙派了三千禦林軍在張家圍牆外面把守著打更吹號通夜不息後來一班大臣也知道了便趕到宣武門外來接駕張家院子裏擠滿了王公大臣其中有一位侍讀學土杜受田直闖進內院去切實勸諫還有一位禦史沈葆楨他上了一本參折是參崔總管説他不該引導皇上作狎邪遊請皇上交內務府立行杖斃誰知這位風流天子一任你們如何勸諫著他總是迷戀著這母女五人不肯回宮去後來崔總管急了悄悄去勸著皇帝説皇上作速回宮去這四位姑娘交給奴才奴才能在三天以內把他們安頓到圓明園裏去那時皇上早晚臨幸著有誰敢來説話皇帝聽了忙搖著手説道莫送他們到園裏去那園子裏醋罐子多呢不能叫他們姊妹吃虧去崔總管聽了略思索了一會磕著頭説奴才又有一處極幽靜的地方離圓明園不遠送他姊妹四人去住下三天以內待奴才安頓停當便再請皇上去團聚現在務求皇上先回宮去皇上倘再不回宮去奴才的腦袋便不保了皇帝看他求得可憐便答應回宮去外面擺齊鑾駕皇帝臨走的時候還依依不舍和他們姊妹四人分別著出來外面文武百官接著擁上鑾輿皇帝忽然想起一句話來忙喚崔總管到鑾輿跟前低低地吩咐他道你安頓他姊妹四人卻也不要忘了那竺氏他也是一個妙人兒呢説著哈哈大笑三十二個人擡著一肩鑾輿回宮去了咸豐回到宮裏那孝貞皇后怕犯嫉妒的名兒便一句話也不敢勸諫倒是那班妃嬪見了皇上不免有怨恨的氣色咸豐帝也不去理睬他們過了三天皇上又到圓明園去園裏自然有一班妃嬪伺候著皇帝正和那班妃嬪説笑著忽然那崔總管上來悄悄地把皇帝的龍袖一拉皇帝便跟著趕出藻園門來向西繞過一個牆角見一座高大的叢林崔總管領著繞過佛殿走進西側門是一座竹園穿過竹林一帶粉牆露出一個月洞門來走進洞門裏面一帶湘簾隱著六間精舍簾外架上的鸚哥見有人來便喚道客來了客來了屋裏面的人聽了掀著簾子出來皇帝留神看時認得是竺氏便撲向前去拉著竺氏的手並肩兒走進屋子去那荷桂蓉蘭四姊妹也迎出屋子來圍定了皇帝請下安去皇帝一手一個拉著坐上炕問崔總管這是什麼地方崔總管回奏道這裏是千佛寺原是前朝的王府後來因為這位王爺沒有兒子便把這府第舍做佛寺如今奴才把寺裏的喇嘛和尚都趕到別處去從園裏調二十名太監來伺候著又把這四位姑娘安頓在此地皇上早晚臨幸著豈不便利皇帝聽了點點頭説道難為你費心賞你一萬兩銀子罷崔總管謝了賞去庫上領了銀子這裏皇帝和張家四姊妹日夜尋歡也不進園去了那時太平軍的勢力一天大似一天那洪天皇既得了南京便打發第一支兵馬攻打鎮江鎮江的滿洲兵不發一箭便棄城逃走接著太平軍又得了揚州統帶的將軍名叫林鳳祥十分驍勇他接連攻得安徽的鳳陽河南的歸德又渡黃河占領懷慶他忽然轉向打進山西省奪得平陽又從山西打進直隸奪得平野又占領稿城接著攻陷深州沿運河上去攻得靜海獨流一帶地方另一支兵馬取得念祖連鎮阜城一帶地方離京城一天近似一天京城的文武大臣得了這個消息個個害怕起來南方奏報失陷城池的文書雪片似地送進京來那軍機處接了文書連夜封送進宮去無奈這時皇帝正深入溫柔鄉里不理朝政只把一班大臣急得走投無路天天在午門外候著卻不見皇上聖旨下來洪秀全看看北伐的第一軍得了勝利接著派遣戰將吉文元李開芳兩人統帶第二軍也向北打去他一步打進安慶桐城舒城一帶繁華的州縣又攻取廬州安徽巡撫江忠源在廬州戰死第二軍軍聲大震接著又克六合克臨清州和高唐州山東巡撫接連飛馬快報報進京去這時宮裏不見皇帝的蹤迹已有五六天了宮中頓時慌亂起來孝貞皇后一面穩住衆人一面傳崔總管並喝叫綁起來送交內務府去拷問他説從前皇上出宮去遊玩是他引誘的如今一定也是他把皇上藏過了崔總管熬刑不過只得招出來説皇上住在千佛寺裏內務府差役押著他到了千佛寺裏果然找到了皇上皇上問什麼事體崔總管將娘娘發怒把奴才送交內務府拷打的情形説了皇帝聽説皇后動怒知道他姊妹四人不能再留下了便一面打道回宮去一面把崔總管放了悄悄地吩咐他把他姊妹送到禁城外安頓去這孝貞皇后看皇帝回宮來便又跪下來勸諫説如今軍務變亂皇上宵旰憂勤還恐不及如何可以把朝政擱置自己一味尋樂去皇帝聽了笑笑説道朕因國事憂愁在宮中悶得慌出宮去打幾天圍獵卿又何必如此慌張咸豐踱出坤寧宮到禦書房裏看案上奏本堆積如山隨手一翻見都是各處州縣失陷的緊急奏報不覺嚇一大跳忙召集了王公大臣開禦前會議足足談了四個時辰才決定辦法立刻傳旨下去派兵部尚書勝保親統大兵去擋平野一路的太平軍又派蒙古科爾沁親王僧格林沁統領騎兵去擋連鎮一路的太平軍這兩位都是戰將奉了聖旨奮勇殺賊不多幾天勝保果然收復稿城一帶僧王也收復阜城一帶僧王還用了那道員張晉祥的計策決運河的水淹斃馮官屯的太平軍太平軍將軍李開芳到僧王大營中來投降僧王拿囚籠關住他押進京來咸豐帝下諭綁送西校場正法從此太平軍北伐的兩路人馬一齊逃回南京去咸豐皇帝看看眼前又太平了便又想出宮遊玩私地裏喚崔三來問他姊妹還在嗎崔總管搖搖頭説自從皇上吩咐奴才送出禁城外去不多幾天他們各個嫁了京中大官做如夫人去了皇帝聽了不覺長歎一聲崔總管知道皇上不樂隔了幾天他忽然興衝衝地跑到皇上跟前悄悄説道奴才又打聽到城南又出了個美人名叫冰花人稱蓋南城皇帝聽了詫異便問怎麼他的名字叫冰花呢崔總管回答説因為美人長得跟花兒一般性格冷得和冰一樣終日板著一張面孔沒人敢去招惹他倘有浮浪子弟去調戲他便以冷語辱罵因此人人都取他綽號冰花皇帝聽了直跳起來道有這樣的美人待朕親自去看崔總管攔住説道皇上需謹慎些他是有夫之婦況他家開了一個釘鞋鋪在熱鬧街上怕等間下不得手皇帝説道朕卻不信待朕去看看包叫他冰花變成桃花弄得他進宮陪伴朕過日子呢説著催崔總管快備馬去皇帝改了裝扮做富家公子模樣悄悄出了宮門跳上馬和崔三兩人一前一後跑出南城去果然有一家釘鞋鋪子有一個禿頂男人絡腮鬍子爬在凳上正在那裏工作卻不見女子他兩人故意在門口繞來繞去終不見那女人出來皇帝沒奈何只得敗興回來第二天再去依舊看不見打聽得那禿發男子便是那女子的丈夫皇帝歎了一口氣道好一朵冰花插在牛糞裏到了第三日皇帝又去了果然看到了當時他丈夫不在店中只看一個年輕女子蓬著頭在匱檯裏面洗衣服皇帝和崔總管下了馬一腳跨進店裏去只見滿地爛泥一陳一陳臭味送進鼻管裏來皇帝生平不到這種骯髒地方如今只得看在女子面上暫時忍受著那女人見有買主來了忙丟下衣服擎著水淋淋的一雙手他一邊拿衣角拭著手一邊上來招呼皇帝看他臉時果然長得長眉雪膚望去好似一尊活觀音又看他手時玲瓏白潤雖終日操作著卻沒有凍裂粗糙的紋路又打量他身材時真可以稱得肥瘦適中長短合度把這個風流天子看得酥呆了半天崔總管假裝買他的釘靴和他討價還價皇帝站在一旁怔怔地看那女人到這時他實在忍不住了便開口低低地向那女人問道前幾天我也曾看望你你卻不在店裏你到什麼地方去了那女人好似沒聽見一樣只是低著頭做他的買賣接著皇帝又問你家那禿了頂的丈夫今天到什麼地方去了女人聽了滿臉怒容轉過臉去不理他到這時皇帝的膽子大起來隔著匱身伸手去捏他的手兒那女人大怒拿著手裏的釘靴直向皇帝臉上打過去虧得崔總管的手快忙去奪了那女人倒豎柳眉十分氣憤大聲哭嚷起街坊鄰舍來頓時在店門口擠了許多人大家説青天白日在大街上調戲女人真正豈有此理俺們打這個囚囊一個説打大家都接著喝打崔總管見勢不妙忙從身旁拔出劍來站在門口攔住衆人衆人看他拔劍越發生氣一片聲嚷這死囚囊拿刀動杖的敢是沒有王法嗎俺們打上去打打打各人手裏拿著棍棒擁進店來皇帝看看事體危急了他便縱身一跳跳上匱檯隨手在貨架上抓起釘鞋釘靴向衆人擲去許多人被皇帝拿著釘靴打得頭破血流大家越發憤恨了便拾著釘靴回擲皇帝皇帝自幼練過武藝知道躲避的法子一時間滿街的東西飛來飛去崔總管頭也給打破了淌著鮮血他還拿著劍尖兒搠人許多人看劍鋒厲害到底怕死的人多沒有一人敢沖進去正在危急時候聽得開鑼喝道的聲音大家説道好了好了巡城禦史來了頓時肅靜起來那禦史官見許多人被打得頭破血流跪在轎前告狀又是滿街的釘靴棍棒便大怒喝聲拿來便有差役擁進店來要抓皇帝皇帝高高站在匱檯上只是暗笑崔總管見差役進來便跟著他一塊兒走到禦史官轎前那禦史官認得他是宮裏的總管崔總管又湊近身去和禦史官咬著耳朵慌得那禦史官走出轎來趕到店中便在匱身前拜倒在地上那些街坊見了這情景知道惹了禍慌得一個一個溜回去躲著不敢出來要知這冰花日後如何結果且聽下回分解
