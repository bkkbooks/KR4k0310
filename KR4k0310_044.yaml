body:
  text: 第四十五回脫簪苦諫皇后落發奮拳狠鬥天子被擒卻説富察後走到禦榻前也不去喚醒皇帝突然跪倒在地拔去頭上的簪子一縷雲鬟直瀉下地來懷中捧出一本祖訓來朗朗地背著那皇帝正摟著兩個妓女好睡那妓女卻不敢合眼見忽然走進一個貴婦人來知道不是平常的妃嬪忙悄悄地把皇帝推醒皇帝正睡在夢中聽得有人背詛訓只得從被裏跳起身來披上衣服便在被面上跪倒恭恭敬敬地聽著待聽完了祖訓皇帝下床來十分惱怒質問皇后你什麼時候出京來的那富察後低頭答道臣妾萬死不曾奏明皇上實是和陛下同時出京的一向伴著太后不曾來請得聖安皇上聽了這個話越發生氣冷笑説道好一個不知體統的皇后你悄悄地跟著朕出京來敢是在暗地裏監察朕躬你在暗地裏臨察朕躬倒也罷了如今在這夜靜更深的時候你悄悄地闖進寢室來敢是要謀刺朕躬嗎這句話説得太重了皇后慍地變了臉色挂下兩行淚珠來説道陛下這句話叫賤妾如何擔當得起賤妾既已備位中宮聖駕起居是賤妾應當伺候的如今聽説皇上有過當的行為賤妾不自揣量竊欲有所規勸又怕在白天拋頭露面失了體統特於深夜到此務請陛下三思煙花賤娼人盡可夫陛下不宜狎近倘有不測賤妾罪該萬死了皇帝的好夢被驚醒了心中十分憤怒又聽皇后罵那妓女越發忍耐不住把床頭的小鍾打了一下進來四個太監皇帝喝聲拉出去太監看見是皇后不敢待慢便恭恭敬敬走上去扶皇后起來皇后直挺挺地跪著抵死不肯起來哭著説道陛下不顧念賤妾的名位也須顧念俺夫妻一場怎麼沒有一點香火情呢陛下無論如何憤怒只求看了臣妾的奏章臣妾便是死了也不怨的説著把那奏章高高捧起皇帝無可奈何把奏章接過來約略看了幾句見上面拿他比著隋煬帝不覺大怒把奏章拋在地上直搶上前去揚手一巴掌打在皇后左麵粉頰上接著右面臉上又是一下打得皇后兩腮現紅嘴裏淌出血來太監忙上去遮住皇帝氣憤憤地披上兜風走出艙去這皇后拿膝蓋走著路搶上幾步抱牲皇帝的右腿抵死不放説道陛下今日便是殺了妾也要求看完了賤妾的奏章再走也不遲皇帝被皇后抱住了脫不得身一時火起提起靴腳來奮力一踢可憐皇后肋骨上著了一下痛得暈倒在地皇帝也不回頭直搶出船頭跳上岸去走進太后船中這時天色已明太后正在梳洗侍女們報説萬歲駕到太后不覺嚇一跳忙看時只見皇帝衣服不整滿面怒氣走進艙來一開口便把皇后如何胡鬧如何失體統的話説了又説他深夜直入居心叵測請太后下詔賜死皇太后聽了十分詫異説皇后好好的住在後艙什麼時候到禦舟上去的立刻把侍候皇后的宮女太監喚來吩咐拉下去交總管用大棍打死一面打發內監拿著皇太后的節去到禦舟上把皇后召來停了一會皇后來了太后見他披頭散髮血淚滿面歎了一口氣説道鬧成這個樣兒皇后的體面何在皇后只是痛哭説不出一句話來皇帝在一旁只催著太后下詔賜死皇后看皇上一點香火情也沒有了心中不覺灰冷覷旁人不防備的時候搶到船頭上去蔔通一聲向河心裏一跳可憐一代母后一陳水花動蕩早已去得無影無蹤了皇帝看了好似沒事一般到底太后看著皇后可憐便傳命下去吩咐太監侍衛們四處打撈兩岸的兵士和官民都在上流頭下流頭撈救直到玉龍橋下面撈得皇后已被水灌得昏迷不醒內監們七手八腳地擡上船去仍在後艙頭榻上睡下嘔出了許多水才清醒過來從此皇后睡床三日不起他的心中好似萬箭鑽刺十分悲傷到了第四天上他忽然心地開朗主意已定覷著宮女們不在跟前的時候袖子裏拿出金剪來颼的一聲把一縷青絲齊根剪下走到前艙去跪在太后跟前求太后開恩準他削髮為尼太后看看事已如此又明知道皇帝和皇后決不能和好的了便把皇后扶起説道俺過山東的時候見大明湖邊有一座清心庵水木明瑟十分清靜如今俺打發人送你到那邊去住著俟皇上回鑾的時候再帶你進京去你可願意麼皇后聽了又跪下去謝太后的恩典太后便喚過四個小太監來吩咐他另雇一號大船把皇后應用的衣服器物搬過船去陪著皇后過船去直送到濟南府清心庵去山東省裏的文武官員見皇后駕到一齊前來迎接官家眷屬經常來陪伴他又常常送禮物進去皇后只和庵中的一個老尼姑好所有官府來往他一概謝絶皇太后皇上都回京了皇上便下旨廢了孝賢皇后的名號皇后知道了在庵中痛哭了三日三夜粒米不進後來還是那老尼姑再三勸説才慢慢地吃些粥飯從來説的福無雙至禍不單行皇后自從被皇帝廢了名號那地方官的供養也從此斷絶了官家眷屬再也不來看望他庵中的女尼也從此冷淡他起來連那帶來的四個小太監一個一個逃走只剩下一個這且不去説他到了八月十五的夜裏忽然來了十多個強盜打進庵門別的都不拿獨把皇后的衣服首飾箱籠器具搶得幹乾淨淨一些也不留皇后受了驚嚇又是傷心自己跑到州縣衙門裏去報官求官府替他追捉強盜那州縣官見皇后失了勢便含糊答應皇后看看那強盜去得無影無蹤自己一生的財寶都丟得寸草不留一個金枝玉葉的皇后只落得自己燒茶煮飯只有一個小太監伺候著他皇后到了這山窮水盡的時候也曾尋過幾次短見都被這小太監救活從此他和小太監兩人孤苦相依度著歲月在皇帝心中早巳忘了這故劍之情皇後離舟永別的時候正是皇帝醉倒花前的時候這時扈從大臣裏面有一個梁詩正見皇帝荒淫無度也上了一本奏章勸皇帝愛惜身體保持令名那皇帝正落在迷魂陳中如何肯聽他把梁詩正傳上禦舟去當面訓斥了一場説道你雖做了大學土只因朕賞識你的詩做得好也好似娼優一般養你著你們玩兒罷了怎麼這樣大膽來管起朕的事體來了這一頓教訓嚇得文武百官從此鉗口結舌不敢勸諫皇帝還因為自己住在禦舟裏有衛兵內監們伺候著耳目衆多不能十分放縱他便暗暗地和幾個親信的太監商量打算在夜靜的時候上岸微行到娼家住宿去他在妓女言語中打聽得蘇州地方妓女的面貌要算銀紅最美銀紅有一個小妹妹名叫小紅比他姊姊還要美只因那小紅生性冷僻不肯接客到如今還是一個處女皇帝聽了十分羡慕便逼著太監領他到銀紅院子裏去誰知這一去一連七天不見皇帝回船來把個皇太后和合城的文武官員慌得沒了手腳江蘇撫台發落全班的巡捕和元和縣的捕快在城裏城外大街小巷搜查直到第八天上皇帝被人捉去綁在馬房裏打發一個小校到撫台衙門裏去報信嚇得那文武官員齊趕到馬房裏去把皇帝接出來送到船上來原來蘇州地方有一個橫行不法的惡少終日在三瓦兩舍無事生非又生成十分好色凡有絶色的娼妓都被他霸占了別的人都不敢去問津他仗著父親做過大同總兵的家中有錢有勢他自己又仗著有水牛般的氣力手下又有一二十個幫間的大漢到處敲詐恐嚇人人見了他害怕因此把惡少取一個綽號名叫小霸王小霸王最心愛的妓女便是銀紅講到那銀紅的姿色真可以壓倒煙花隊此番皇帝召幸那銀紅仗著小霸王的勢力不曾接駕但那銀紅心中另有一個知己便是徐翰林的兒子徐大華這人風流年少貌美多才小霸王占住了銀紅的院子徐大華不能公然在銀紅院子裏出入但他兩人也曾背著小霸王私會過幾次十分恩愛已經約定婚姻之事了覷著小霸王不防備時候徐大華一肩彩輿把銀紅娶了過去鴇母怕小霸王到他院子裏來吵鬧便把院子門關了帶了小紅躲在一條小巷裏往忽然來了一個闊客見了鴇母一擲萬金指名要小紅侍寢小紅抵死不肯無奈鴇母愛這客人有錢再三勸著小紅這時小霸王得了消息帶了一班無賴趕到銀紅的院子裏撲了一個空十分憤恨打聽得銀紅得被徐大華娶去的又趕到徐家徐大華早得了消息忙帶得銀紅從後門逃出小霸王趕到徐家又撲了一個空便無可發泄喝一聲打衆無賴一齊動手把徐家房屋搗成雪片臨走的時候放一把火燒成焦土那徐大華帶了銀紅無地投奔便找到小紅院子裏來這小紅院子裏正到一個闊客肯出一萬銀錢梳攏小紅他如今見銀紅和徐大華如此恩愛又見徐大華走投無路便出來打抱不平對徐大華説道你們好好的住著不用害怕俺明天和你打抱不平去管叫那小霸王送了性命那小紅見這客人肯幫姐姐的忙便也敬重他當夜陪他吃酒又給他梳攏了這客人一住三天外面的風聲一天緊似一天那小霸王天天帶著一班無賴在大街小巷中搜查把個徐大華嚇得躲在家裏不敢向外面探頭兒那小紅在枕上夜夜催著那客人到第四天上那客人打聽得這小霸王每日在片石山房吃茶他便拉著徐大華直走到片石山房那徐大華嚇得混身亂抖那客人拍著胸脯叫他放大膽子片石山房裏有一個坐位是錦墊交椅桌上排列著一色白胎的江西窯瓷茶壺茶杯特留著候小霸王來坐的這時小霸王未到這客人便大模大樣地上去坐在交椅上命徐大華坐在一旁茶博土上來裝著笑臉説請客人這邊坐這座位是小霸王的那客人聽了把雙目一瞪提著醋鉢大的拳頭在桌上一按惡狠狠地説道俺大爺不知道什麼小霸王不小霸王大爺有的是錢愛坐哪里便是哪里你若怕事快把招牌除下來不賣茶了俺便出去那茶博士碰了一個釘子嚇得他忙縮著脖子下去他知道這客人來得不妙今天不免有一場惡打便悄悄地把那碗盞茶壺收拾起來兩臂兒交叉著打著結站在一旁看冷眼停了一會那小霸王果然來了徐大華見了他早嚇得嘴唇失色兩排牙齒捉對兒撕打起來小霸王身後跟著五七個豎眉橫眼的大漢一手忒楞楞地轉著兩粒鐵彈子一擁搶到徐大華跟前小霸王伸手直指上徐大華的臉來惡狠狠地説道你今天也敢來送死拐賣婦女應得什麼罪快快自己供來莫再煩你老爺親自動手説著伸手來拉那客人的衣袖叫他讓座的意思只見那客人雙眉一豎猛向地下一蹲捏住他的小腿把個小霸王倒提起來衆人上來救時那客人拿小霸王做了兵器提著他東蕩西掃那小霸王把兩手捧著頭嚷痛他也不理會把那班人打得東倒西歪看看小霸王腦袋上直淌下血來那客人冷笑一聲直把他提出窗外去説一聲去你媽的啪嗒一聲那小霸王從樓上直撞下街心來早跌得三魂邈邈六魄悠悠看是死了那班大漢一齊抱頭鼠竄逃去茶鋪子掌匱的見鬧出人命來便不肯放那客人走那客人也不走吩咐茶博士再泡上茶來和徐大華兩人慢慢地喝著一會兒那小霸王的父親總兵親自借了營裏的一千兵丁帶著到茶鋪子裏來把那茶樓圍得鐵桶一般高聲地嚷著該死的囚囊快下來送死這一聲喊把個徐大華嚇得躲在桌子底下瑟瑟地抖動那客人上去把徐大華扶起來拉著他一同下樓去他站在扶梯上對大衆説道諸位不用動惱從來説的殺人者抵命俺如今打死了小霸王俺兩人準備抵他的命但是抵命的事體自有官府在你們快把俺兩人綁起來送到官府裏去那總兵聽了便吩咐上去把他兩人捆綁起來帶回家再説那客人也不抵抗聽他們用麻繩左一道右一道地綁住徐大華也吃他們綁起來牽豬羊似地擁到總兵家裏總兵吩咐去吊在後園馬棚裏待小霸王收殮時候把這兩個囚囊拉出來剜心活祭徐大華和那客人被綁在馬棚裏有兩個小校看守著徐大華自以為是死定的了那眼淚和下雨似地落下來只有那客人談笑自若常常和那小校講著話覷著一人小校走到牆根撤尿的時候便悄悄地把另一個小校喚近身來低低地對他説了幾句話那小校聽了嚇了一跳怔怔地對那客人臉上看著那客人對他説道你不用害怕你倘然給俺去報了信這總兵家裏的産業妻小一齊賞給你可好嗎那小校説別的我不愛只愛他家那三小姐長得好似水蔥兒似的勾人魂魄那客人便點點頭説道便把他家三小姐賞給你那小校聽了便高興起來説道這樣空手白眼的去報信有誰相信我那客人便叫小校走近身來在自己懷裏摸出一顆小印來吩咐他快把這粒印送到官府裏去你自有好處那小校得了印便飛也似地出去這裏總兵官正忙著收殮兒子又吩咐家裏的劊子手當小霸王的尸首擱在棺材蓋上時便把馬棚裏吊著的兩個囚犯拉出來破肚子這總兵仗著自己勢焰薰天地方官也趨奉他便是他在家裏用私刑殺死人地方官也不敢去問他他曾經在家打死一個丫頭踢死一個書僮又逼死一個姨太太私自埋葬了也沒人敢去問他何況如今兒子被人打死拿凶手來抵命越發是名正言順了總兵家裏正忙亂的時候忽然牆外一棒鑼響門丁進來報説合城文武官員上自巡撫大人下至縣太爺都來了那總兵官認做是來為他兒子吊孝的忙穿戴衣帽迎接出去待到見了撫台大人的面正要作下揖去只聽得耳根邊一聲抓那撫台早已放下臉來走過四個中軍官來把總兵官揪住總兵官問俺犯了什麼罪那撫台也不説話帶他直走到後園馬棚去那班文武官員見了那客人一齊跪倒徐大華在一旁看了也十分詫異撫台親自上來替那客人松了綁又叫人把徐大華也松了綁只見那撫台又爬下地去在馬糞堆裏磕著頭口稱臣罪該死到這時那總兵才明白過來被綁的人便是當今的聖天子嚇得他忙跪下地去連連磕著頭説道罪臣該死只求皇上賞一個全尸那皇帝也不去理他出去大門去外面早已須備下龍輿皇帝坐著回船太后七八天不見皇上了如今見了便捧住了不放手又再三勸説皇上萬乘之尊切不可微行出外倘有不測叫天下臣民負罪先皇便有許多臣子也紛紛上奏章勸諫皇上吃了這個驚嚇從此卻也膽小了只是舍不下那小紅便把他用軟轎悄悄地擡上禦舟來朝朝寵幸那徐大華和銀紅兩人受了這一番磨折皇帝賞徐大華做刑部侍郎準他把銀紅帶進京去供職又連下三道上諭第一道把那總兵官立即正法他兒子戮尸第二道把全城的文武官員一齊革職第三道把總兵官的家産妻孥全沒入官分一半家産賞給這報信的小校又賞他都司的官職還把三小姐配給他做妻子乾隆帝也遊玩得厭倦了匆匆到杭州去了一趟便下旨回鑾禦駕走到山東涿洲地方忽然又出了一宗離奇案件把好好一個皇孫殺死了要知後事如何且聽下回分解
