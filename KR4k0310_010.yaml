body:
  text: 第十回姦外母蒙格枉死避內訌努爾求尸話説布占泰投降了葉赫部這時部主名叫納林布祿想起從前酋長卜寨被努爾哈齊殺死不由得切齒痛恨如今布占泰也吃了建州人的虧從來説的是同病相憐他便收留下了兩人天天商量如何報仇的法子因想起建州人便又想起哈達部主蒙格布祿他不該幫著努爾哈齊來欺侮葉赫部如今我們要報仇第一要去討伐蒙格布祿明朝萬曆二十七年五月的時候納林布祿調齊大隊人馬去攻打哈達城哈達部主十分驚慌心想我閃從前幫建州人有功如今不妨求努爾哈齊去他當時便帶著三個兒子親自到建州去願意把三個兒子作抵押求努爾哈齊快快發兵努爾哈齊連蒙格布祿一齊留下一面打發蜚英東帶領三千精兵去救哈達這裏努爾哈齊天天陪蒙格布祿在府中吃酒談笑富察氏又把他三個兒子養在內宅裏這三個兒子面貌長得十分清秀腦子又聰明見了富察氏趕著喊媽媽富察氏又是十分歡喜孩子的便常常摟著他們坐在膝蓋上問話問到他們的母親説是早已死了富察氏看著他們可憐不覺落下眼淚來第二天富察氏陪著努爾哈齊用膳夫妻兩人談起蒙格布祿死了妻子的話富察氏的意思要把自己大公主許配給他一來公主嫁給一個部主也是十分榮耀的二來蒙格布祿做了女壻便能忠心向著嶽家了努爾哈齊聽了富察氏的話心中大不為然只是默默地不説一句話富察氏再三追問努爾哈齊便冷冷地説了一句聽憑你去做主只因努爾哈齊平日是寵愛富察氏富察氏又一眼看中了蒙格布祿的人才天天催著他丈夫去對去蒙格布祿説這個話努爾哈齊拗他不過只得説了蒙格布祿聽説努爾哈齊肯把公主配給他真是喜出望外當時進內室去謝過富察氏富察氏又催薩滿揀一個吉日府中挂燈結彩準備做喜事呢喜期的前一天努爾哈齊在府中擺酒請蒙格布祿入席席中努爾哈齊竭力誇獎他又喚一個絶色的侍妾出來站在他身旁唱著曲子頻頻勸酒蒙格布祿眼睛中看了美色耳中聽了嬌聲那酒便是一杯又一杯地吃下肚去看看吃到酩酊大醉努爾哈齊對那侍妾丟了一睛色一個侍女在前面照著燈那侍妾卻親自把蒙格布祿扶到一個小院落裏去睡到得天明那蒙格布祿睜著眼來一看見自己和那侍妾各個脫去了外衣雙雙綁在一塊兒倒在炕上炕前圍著一大群兵士努爾哈齊怒氣衝衝地站在當地指天劃地地大罵口口聲聲説蒙格布祿姦污了嶽母也不由他分説一揮手上來七八個兵士拖著蒙格布祿便走蒙格布祿竭力喊冤也沒有人去理他看看拉到一所荒園裏把他綁在一株大樹上一瞥眼見蒙格布祿的大兒子名叫吾兒忽答的從外面踉踉蹌蹌地跑進來嘴裏喊刀下留人趕到努爾哈齊跟前爬在地下不住地磕頭替他父親求饒努爾哈齊一面推開了吾兒忽答一面喝一聲動手只聽得疙瘩一聲蒙格布祿的頭早已落下地來吾兒忽答見了縱上去捧著他父親的頭哭倒在地暈絶過去待到醒來只有空空落落的一座荒園也不見一個人吾兒忽答心想我如今不能再住在府中了他們不久便要害我的性命便跳起身來往外便逃可喜這時黃昏人靜這園又在荒僻地方他出得園來也沒有人去查問他急急逃出了興京城意欲趕回哈達城去起兵報仇走到界凡山下遇到一個明朝總兵手下的一位元巡查官是他一向認識的見吾兒忽答慌慌張張的樣子忙拉住他問原因吾兒忽答便把父親遭難如今打算回哈達去起兵報仇的話説了那巡查官聽了笑説道呆孩子你這一次回家去不用説大仇報不成便是你的性命也難保吾兒忽答聽了十分詫異忙問他什麼道理那巡查官説道你忘了蜚英東帶了三千人馬在你家裏候著嗎吾兒忽答聽了便恍然大悟撲地跪下地來求他幫忙巡查官一面扶他起來帶著他回撫順關去那吾兒忽答見了李成梁便不住地哭著求著李成梁看他可憐便替他上奏章皇帝聖旨下來派李成梁帶兵到興京查問那努爾哈齊見走了吾兒忽答正在四處找尋忽然探子報到説明朝總兵親自帶兵前來問罪努爾哈齊雖説凶狠但他一聽説明朝兵到也有些害怕一面打發舒爾哈齊前去擋駕一面把蒙格布祿的尸身送還給他兒子李成梁見他服了輸也便罷了誰知那富察氏見他丈夫謀害了他得意的女壻心中老大的不願意他最喜歡吾兒忽答的如今也不在他身旁便和丈夫常常吵嘴便是那公主也因父親誤了他終身便常常在暗地裏哭泣努爾哈齊被他們母女兩人吵得頭昏沒奈何仍把吾兒忽答接進府來富察氏做主把公主嫁給吾兒忽答吾兒忽答也老實不客氣把父親的聘妻娶來做了自己的妻房李成梁又把吾兒忽答的弟弟帶進關去這裏他新婚夫妻兩人十分恩愛富察氏看了也喜歡過了四十天便雙雙回哈達部去了從此努爾哈齊和富察氏心中各有了意見夫妻兩人不十分和睦了這時佟氏已死生下兩個兒子大兒子名褚英第二個兒子便是代善褚英性情倔強努爾哈齊便叫他帶兵去駐扎在外面富察氏也生下兩個兒子大兒子名莽古爾泰第二個兒子名德格類他父樣原不十分歡喜他們如今和他母親有意見父子之間越覺得淡淡的這時還有大妃葉赫納喇氏生的一個兒子便是皇太極也深得努爾哈齊的歡心和代善一樣看待此外側妃伊爾根覺羅氏生的兒子名叫阿巴泰和庶妃生的兒子阿拜湯古岱塔拜巴爾泰和巴布海五人都不能常和他父親見面吾兒忽答成親的時候便是那大妃葉赫納喇氏去世的時候努爾哈齊因和他多年的夫妻心中不免悲傷因此越發寵愛皇太極了在努爾哈齊本意葉赫氏死了原想把富察氏升做大福晉如今既然不睦便想另外娶一個大福晉打聽得葉赫部長布揚古的妹妹是一個絶世佳人在關外地方誰人不知道有這個天仙美女努爾哈齊也很想娶他來做妃子恰巧這時他二弟舒爾哈齊娶烏拉貝勒布占泰的妹妹做妻子布占泰親自送妹妹到興京來見了努爾哈齊十分慚愧努爾哈齊因為大家都是親威便忘了從前的仇怨和他吃酒談笑談論之間布占泰知道努爾哈齊死了大福晉便説起布揚古的妹妹長得如何美貌努爾哈齊便托他向葉赫部去求婚到了第二年葉赫哈達烏拉輝發四部部主都打發人來向努爾哈齊認罪布揚古又親自答應把妹妹許給努爾哈齊做大福晉努爾哈齊便送布揚古上等鞍馬盔甲算是聘禮當時殺了一頭白馬祭天立誓讀著誓語道既盟以後若棄婚姻背盟好其如此土如此骨如此血永墜厥命若始終不渝飲此酒食此肉福祿永昌誓畢邀請四國的貝勒大開筵宴熱鬧一場這努爾哈齊一天天得意權力一天天大他同族的弟兄叔伯都壓在他勢力之下便是那失寵的兒女和妃子侍妾們也十分怨恨他努爾哈齊也有幾分覺得便把同族的叔伯都搬到城外去住這一搬動那弟兄們心中越發緊張起來德世庫劉闡索長阿寶實的一班子孫便祕密商量各個召集了自己的家將在半夜時分爬城進去殺死努爾哈齊這一夜月黑風緊努爾哈齊一個人睡在炕上忽然覺得心頭跳動他説一聲不好跳起身來手裏拿著寶劍悄悄地開著門出去他兒子代善和皇太極也跟在後面一路狂風街上靜悄悄的慢慢地走到西城腳下這西城地方是一個最冷靜的所在努爾哈齊等一齊趕上城去攀著城垛向下一望果然見十幾個人爬著繩梯上來努爾哈齊擎著劍在城上大喝一聲那城外的人嚇了一大跳直從繩梯上都滾下地去這一聲喝不打緊早把那守城池的兵丁和將官一齊驚起見努爾哈齊直立在城樓上大家便十分驚慌一齊跪倒在地請大貝勒回府照皇太極的意思要開城去追捉賊人努爾哈齊不許誰知到了第二天夜裏努爾哈齊和他的大公主及代善皇太極兩人睡在內院正好睡的時候努爾哈齊有一頭狗名叫揚古哈的忽然大叫起來努爾哈齊在黑地裏跳起身來一看看那狗和人一般地站了起來對著窗外狂叫再看窗外時也有人影子移動努爾哈齊知道又有人來謀害他了忙悄悄地把大公主推醒代善和皇太極也跳起身來每人給他們一柄刀叫他們把守窗戶他自己一手擎著刀對門外喝道外面什麼人既然來了為什麼不進來你們再不進來我卻要出來了你們敢和我對敵嗎説著拿刀柄打著窗櫺腳踢著窗板裝著要打窗子裏跳出去的樣子一轉身卻從門裏箭也似地沖出去門外面的刺客大吃一驚轉身逃去努爾哈齊正要追上去腳下倒著一個死人幾乎吃他絆倒急看時卻是一名侍衛名帕海的被刺客殺死了努爾哈齊十分惱恨一面傳集府中侍衛打算關著城門大捉刺客第二天有一個族叔名稜敦的從尼麻喇城來對努爾哈齊説道合族的人都是你的仇敵你捉誰好呢努爾哈齊聽了不覺害怕起來不敢搜捉凶手便搬到他側妃伊爾根覺羅氏房裏去睡睡到人靜的時候忽聽得房門外有悉悉索索的響聲努爾哈齊急急披衣起來覺羅氏的兒子阿巴泰這時跟著他母親睡在一塊兒他拿著刀跟在他父親後面悄悄地走出門去努爾哈齊躲在煙囪邊候著這時天色昏沈滿院漆黑地看不出人影那刺客站在院子裏摸索著走進來慢慢地走到煙囪跟前忽然天上隱隱有雷聲一個閃電下來照得滿院子通明努爾哈齊趁著電光舉起刀背猛力一打打在那刺客的背上倒下地去努爾哈齊趕上來一腳踏住一疊連聲喊著洛漢那洛漢是努爾哈齊貼身的侍衛聽得大貝勒叫喚忙提著刀趕進來努爾哈齊吩咐把凶手捆綁起來洛漢説道這惡人既犯大貝勒的駕不如殺了罷休努爾哈齊怕得罪族人便假問著那凶手道你不是來偷牛的嗎那凶手聽了點點頭努爾哈齊便一笑叫放了綁這凶手給努爾哈齊磕過頭轉身去了在努爾哈齊的意思我這樣寬大待人他們總也該悔悟了誰知隔不幾天又鬧出亂子來了一天夜裏努爾哈齊正要脫衣睡覺一瞥眼見一個侍女在隔房探頭探腦已經睡下忽然又起來點著燈一霎時又吹熄了一霎時又點起來努爾哈齊看在眼裏知道今夜必要出事便悄悄地起來換上軟甲挂著弓箭假裝出恭去走在院子裏一片昏黑見那邊籬房一團黑影一幌一幌地逼近身來努爾哈齊抽弓挽箭颼的一箭那刺客十分靈敏縱身一跳避去了箭鋒努爾哈齊追上前去連發三箭射在那凶手的腳骨上倒下地去這時侍衛一齊趕進院子來綁住了拷打著問他那凶手自己説名叫義蘇努爾哈齊也放他走了從此以後合府的人刻刻提防皇太極這時年紀雖小卻很有見識他暗暗對父親説道如今仇家衆多父親防不勝防依孩兒的意思不如暫時出去一趟避避風色努爾哈齊聽了皇太極的話忽然想起那李成梁串通尼堪外蘭殺死我父親和祖父直到如今仇也不曾報得便是祖父的尸首也不曾尋回來我如今帶兵出去向明朝問罪那時得勝回來一來可以壓服同族弟兄二來也可以對得起已死的祖父和父親當下主意已定便樹起一面白旗上面寫著報仇雪恨四個大字挑選五千名精兵一律挂孝國內的事體交給他二弟舒爾哈齊代管合族的人聽説他此去替祖父報仇卻也人人心服一齊送出興京城努爾哈齊辭別了衆人浩浩蕩蕩殺奔撫順關來那守關將士報與寧遠伯李成粱知道卻説李成梁自從殺死覺昌安塔克世父子兩人以後心中原時時提防努爾哈齊來報仇如今聽説努爾哈齊果然帶領大隊人馬前來問罪早心中沒了主意幸虧他手下一個遊擊官是十分有智謀的當下替他想定了一條計策且待兵臨城下再説不多幾日探馬接二連三地報來説建州兵馬離城十裏又説建州兵馬離城五裏了又説建州人馬已靠城扎營了李成梁聽了一概不去理他只吩咐緊守四門不得和他開戰那努爾哈齊到了撫順城外連日挑戰卻不見城中兵馬出來心中也弄得沒有主意到了第四日努爾哈齊又到城下去挑戰忽然城上射下一封書信來努爾哈齊拆開書信看時不但一天怒氣化為烏有反把個李成梁感激到十分當下努爾哈齊依了信上的話把兵馬約退十裏第二日全身軟裝只帶著三五十名親兵走進城去才到城下只見城門大開那李成梁親自到城外來迎接進城直到總兵衙門前下馬擺上筵席來兩人淺斟低酌李成梁慢慢地把誤殺二祖的話説出來如今為顧全兩家交情起見情願歸還二祖的尸首另給敕書三十道馬三十匹説著吩咐侍衛官把敕書捧出來供在案上又把馬拉出來擺列在院子裏努爾哈齊看時那馬卻都是俊物不由是心中一喜又回頭看堂上燈燭輝煌香煙繚繞供著三十道黃緞色的敕書他不由得兩條腿兒軟了下來要拜下地去李成梁上前來攔住了説道慢著謝恩我三日前已替大貝勒請得聖旨在此皇恩浩蕩仍舊封貝勒做建州都督説道高聲唱一句請出來只聽得裏面一陳吹打兩個公公擡著聖旨一步一步地踱了出來努爾哈齊這幾年來朝思暮想的便是恢復都督原官如今見了不由得爬在地下碰著頭高呼萬歲萬歲萬萬歲謝恩已畢李成梁和他手下大小官員一齊上來向努爾哈齊道賀到夜裏接著又是吃賀酒堂下吹打堂上喧譁直鬧了一夜努爾哈齊便在總兵府裏歇了到了第二天起來一看一座總兵府中又四處挂著素彩從大門起一直挂著白幔好似一座玉樓努爾哈齊看了十分詫異問時原來李成梁做主替被害的建州都督覺昌安和塔克世兩人開吊到了午膳時候早見外面擡進兩口棺木來努爾哈齊見了不由得搶上前去爬在地下嗥啕大哭李成梁忙上去扶他起來把棺木停在大廳全城文武官員都來祭奠行禮已畢努爾哈齊便問祖父二人尸首一向是何人保存李成梁便拿手指著旁邊一人説他也是一位部主名叫約掉的你祖父兩人的尸首一向是他收管著努爾哈齊上去向那人道了謝第二天努爾哈齊帶著兩口棺木出城去李成梁送他出城臨走的時候努爾哈齊送一匹馬給李成梁那馬名叫三非原是關外的一匹寶馬上高山如履平地李成梁心中也很感激他又替他上奏章給皇帝説努爾哈齊怎麼感激聖恩隔幾天北京聖旨下來説每年賞建州都督銀子八千兩蟒緞十五匹這道聖旨到了興京城裏努爾哈齊臉上覺得越發添了光彩果然那同族中人沒有人敢欺侮他了努爾哈齊越發要立些功業借此誇耀親族他兒子代善替他出主意叫他親自到北京去進貢一次那時得些好處回來一來可以誇耀家族二來也可以壓服部落努爾哈齊聽了他兒子的話説得不錯便立刻發下號令去各處部落裏搜集了許多土貨還有東珠貂皮人參等許多貴重的東西又選了一百匹好馬帶著一千名衛兵揀了好日子起身這裏各部落貝勒和同族弟兄自然有一番熱鬧輪著給都督餞行都督在路上不多幾日便到了撫順關那位寧遠伯李成梁聽説建州都督進京朝貢去便十分歡喜立刻收拾房屋給他住下揀定吉日親自陪他一塊兒進京去努爾哈齊意思要帶三百衛兵進京去李成梁説進貢規矩不能多帶人馬只許他帶親兵四十名去他二弟舒爾哈齊也跟著一塊進京去要知後事如何再聽下回分解
