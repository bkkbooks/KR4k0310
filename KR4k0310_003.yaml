去請了百里姑娘出來兩人在臺上對面坐著吃著從辰時吃到午時吃得大家酒醉肉飽便手拉手跳起舞來一邊跳著一邊唱著貝勒看了也歡喜在臺上也拉著百里姑娘的臂兒跳舞跳了一陳貝勒忽然想起那對黑馬便吩咐左右衛兵瞞著衆人偷偷地下了台和百里姑娘走出了柵門跳上馬背一對黑馬馬磨馬耳人擦人肩並著向俄漠惠野地方跑去一面跑著一面説笑道不知不覺跑出了一座大樹林子回過頭來看看後面許多村落早在雲樹縹眇之中百里姑娘許久不騎馬了今天一口氣跑了許多路早跑得嬌喘細細香汗涔涔貝勒在一旁看了這情形忙扶他下馬兩人手挽手兒去到前面一帶牆根上坐下這時貝勒坐倒在百里姑娘旁邊兩人靜悄悄的一句話也不説仰著脖子只是看那天上的飛雲那百里姑娘櫻唇微動一陳一陳鼻息吹在貝勒面上覺得一陳甜香貝勒心頭一動忙翻過身來撲上前去捧著百里姑娘的手兒不住地接吻説也可憐這百里姑娘快六十歲了還是一個女孩兒的身子這接吻的勾當今天和貝勒算是破題兒第一遭這位六十歲的老處女心上不覺感動起來便也回過頭來看看貝勒只是一笑兩人正談話的時候飛鳥兒都飄飄飛在半空他們也沒有留神耳中也聽不到什麼待到他們回過去擡起頭來看時早見一隊兵士們靜悄悄地站在他們面前後面又跟著許多村裏的百姓個個對他兩人笑眯眯的把個百里姑娘羞得粉臉通紅恨不得有個地洞鑽下去耳中聽得幾百人齊聲嚷道貝勒大喜阿百格格大喜阿三姓的百姓大喜阿嚷過了一齊上來男的簇擁著布庫裏雍順女的簇擁著百里姑娘上了馬大家圍在他倆的馬前馬後走著喝著直送到他們的屋子裏一面有十四個管事人上來勸貝勒在當夜娶百里姑娘做福晉貝勒答應了管事人出去便召集了村坊上許多百姓把這件事對他們説了合村的人便個個高興人人踴躍頓時角聲到處吹動貝勒用上空地上人山人海擠滿了場中立著大旗杆有四個薩滿全致打扮上前來祭堂子貝勒和福晉也跟著拜過四下裏百姓一片歡呼聲接著有十六個跳神的女孩兒打扮得千伶百俐在中間跳著又有十四個村的管事人齊來送禮賀喜貝勒便留他們在空地上吃酒吃肉直吃到黃昏時候院子裏燒著天燈他們兀只嚓著添酒鬧得不肯罷休貝勒這時也喝得酩酊大醉百里福晉扶著他進屋子去雙雙睡倒做了百年的好夢到了第二天百里福晉醒來想想自己父母在時為婚姻之事也不知操了多少心總是自己看不中男人直蹉跎過去如今沒想到六十歲的老處女卻嫁給了這二十歲的少年貝勒看來這位貝勒又是個有兒女恩情英雄虎膽的我如今嫁了他卻不可埋沒了他男兒的志氣須得要拿出我生平的智謀來幫助他做一番事業才不冤枉和他做一場夫妻福晉想定了主意貝勒正從夢裏醒來見了這位新娘娘和他並頭睡著雖説是一個老美人但在枕上望去還很有風韻貝勒伸手過去拉住了他的手十分親熱福晉便在被窩裏和他商量國家大事第一件事體要把全村的人搬去一個山水險要的所在築起城堡來自成一國一面多練兵士出去併吞鄰近的部落慢慢地成一個大國那時莫説一個貝勒便是做一個可汗也是分內的事貝勒聽了福晉一番話頓時雄心勃勃從被窩裏直跳起來立刻召集了十四村的管事人商量遷地築城的事體大家十分贊成貝勒又問起這裏左近有什麼山水險要的地方一句話不曾説完只見門簾一動一個花枝招展似的福晉走了出來大家忙搶上去行過禮不知福晉出來有什麼話説且聽下回分解
