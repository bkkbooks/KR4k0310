body:
  text: 第三回三尺粉牆重溫舊夢六十處女老作新娘話説幹木兒屋子後面粉牆如帶繁花如錦一樹馬櫻花折著腰兒從牆缺裏探出頭來那花瓣兒一片一片地落下地去牆根邊這時有一對男女靜悄悄地坐著那女的便是佛庫倫男的正是烏拉特佛庫倫軟靠在烏拉特懷裏一邊哭著一邊訴説他別後的相思和養孩兒的痛苦烏拉特一邊勸慰著一邊伸手替他抹去眼淚正是千恩萬愛婉轉纏綿那一抹斜陽紅上樹梢也好似替他兩人含羞抱恨這時幹木兒的外孫兒印阿是恩庫倫的兒子年紀也有十二歲了他正爬在樹上采花兒一眼見牆根下一對男女對泣著再定睛看時認得那男人是烏拉特女人便是他阿姨佛庫倫這烏拉特是布林胡裏村上男女老小人人認識他的也是人人切齒痛恨不忘記他的印阿一時興頭也忘記了忌諱便悄悄地去告訴了他公公幹木兒幹木兒是一村之長又是一個好勝的老頭兒叫他如何忍得呢便立刻跳起身來趕出大門去要和烏拉特去廝拼這時村坊有一個霍集英長得高大身材氣力又大全村的人除了幹木兒以外要算他最得人心當時他見了忙上前去一把拉住幹木兒問起情由幹木兒又不好説得這時客人未散大家便圍著印阿他母親恩庫倫在一旁聽了捏著一把冷汗大家聽完印阿的話便面面相覷一時裏説不出話來霍集英一轉身把幹木兒兩手捉住反綁起來同時大家翻過臉來把幹木兒合家老小一齊捉住綁在院子裏大樹上一面霍集英帶了五十個大漢趕到後院子悄悄地埋伏在牆頭上霍集英自己爬在樹梢頭倒著耳朵聽時他兩人唧唧噥噥正談到情濃的時候忽聽得一聲大吼和半天裏起了霹靂似的牆頭上跳下許多人來有一個大漢從烏拉特頭頂上跳下來騎在他脖兒上被烏拉特一聳肩那人直摔在五丈外腦袋砸在石塊兒上死了這時佛庫倫嚇得只向烏拉特懷裏倒躲霍集英見了怒不可當趕上前去搶奪烏拉特一手摟著佛庫倫倒退在牆角裏騰出一隻手來揪住人便摔也有被他摔死的也有被他腳踢著受了傷倒在地下哼的烏拉特地位又站得好氣力又大一時被他弄翻了一二十人看看奈何他不得可是村裏的人越來越多有許多人拿著刀槍蜂擁上去正在亂哄哄的時候忽然半空中飛來一條套馬繩子烏拉特一時措手不及連臂兒腰兒都被套住了隨手一拽掀翻在地八九十人一齊擁上去動起手來把他上下十幾道繩子捆綁起來綁得和粽子相似佛庫倫也被他們綁住了一齊推進院子來霍集英坐在當地審問烏拉特一句也不躲賴把上一回如何受傷如何躲在湖邊林子裏如何在月下與佛庫倫相見如何佛庫倫答應他在真真廟裏相見如何上駱駝嘴去打掃山洞如何假裝猛虎劫佛庫倫上山峰如何在山裏結下恩情如何送他下山如何打聽得佛庫倫生下小孩如何暗地裏通消息與佛庫倫第三次相見商量帶了孩兒逃回梨皮峪去做長久夫妻從頭至尾説得一字不漏兩旁的人聽得個個咬牙切齒許多女人都拿手指著佛庫倫罵他不認恩仇不顧廉恥頓時院子裏鬧盈盈地嚷成一片霍集英站起來喝住衆人便招呼了十二個在村中管事的家長上去商量了一會大家都説這私通仇家的罪名俺村裏祖宗一向傳下來是該燒死的如今俺們也把烏拉特佛庫倫和愛新覺羅布庫裏雍順三人拿去燒死至於幹木兒身為村長他女兒做下這丟臉的事體也應該把他全家趕出村去這番話大家聽了都説快意當夜便把烏拉特佛庫倫和他們孩兒三個人關在一間屋子裏又把幹木兒兩老夫妻和正庫倫諾因阿拉四個人關在一間屋子裏恩庫倫原也有罪只因他兒子印阿有報信的功將功贖罪又輕為他是已經出嫁的人便依舊放他回丈夫家去第二天在村口山坳裏搭了一個台台上鋪了許多麻稈柴草引火之物遠近村坊裏的人從早起便圍在台下看熱鬧直到正午時分只見一簇人拿板門擡著烏拉特佛庫倫二人那小孩子也綁在佛庫倫懷裏一會兒推上了台臺上豎有兩根木柱他兩人緊緊地綁在木柱上看烏拉特時依舊是笑吟吟的臉不變色只有佛庫倫低垂粉頸那眼淚如斷線似的珍珠滴個不止布庫裏雍順在他母親懷裏也哭得聲廝力竭台下許多人都圍著看著笑著罵著跳著鬧成一片停了一會佛庫倫睜眼看時見他爹爹媽媽和哥哥姊姊垂頭喪氣地在前面走著後面一大群村民各個肩上扛著刀槍押著走出村去只有恩庫倫一個人哭哭啼啼跟在後面送著走過台下的時候他母親擡起頭來喚了一聲我的孩兒早被台下一班間著的人連聲喊打推出山坳去了佛庫倫眼前一陳昏黑便暈絶過去隔了多時一陳一陳濃煙沖進鼻管驚醒來看時那台下早已轟轟烈烈地燒著一條一條火焰像毒蛇舌頭似的直向他身上撲來可憐嚇得他渾身亂顫烏拉特回過頭來只説得一句我害了姑娘這時忽聽得台下一聲呐喊接著山峽上潮水似地擁出一大群人來各個執著刀槍見人便砍猛不可當烏拉特認識是自己村裏的人便大聲喊道快來救我便跳上五七個大漢來在火焰堆裏斬斷繩索搶出人來這時佛庫倫兩條腿已經軟了一步也動不得烏拉特挾著他從台後面縱下地有一個人擎著大劈刀砍來烏拉特一擡腿踢在那人脈息上一鬆手呼啷啷一柄刀落在地上烏拉特搶過刀來舞動得颼颼地響十多個人跟著他近不得他的身烏拉特且戰且退直退到布林胡裏湖邊趕進松樹林子看看追兵遠了便扶起佛庫倫來揀一塊山石坐下息力看懷中孩子早已呼呼入睡佛庫倫只説得一聲慚愧烏拉特急向他搖手原來林子外面又有十多個追兵在四下裏搜尋正緊急的時候忽然懷裏的孩子哇的一聲哭起來給林子外面的追兵聽得了急搶進林子來烏拉特拉著佛庫倫沿湖逃去那地方左是峭壁右是深淵佛庫倫一顛一蹶在林子裏走時那懷中的孩兒越是哭得響亮看看後面的追兵越近了烏拉特便站住腳手裏橫著刀等待廝打他一邊揮手叫佛庫倫快逃佛庫倫無可奈何離了烏拉特抱著孩兒向前走去轉過山峽那孩子越哭得厲害佛庫倫深怕追兵從背面抄過來這時一個女人一個孩兒性命難保這地方正是駱蛇嘴下面一股瀑布疾如奔馬那淺灘上擱著一隻獨木舟佛庫倫見景生情立刻有了主意忙把孩兒抱在獨木舟上把船推下湖去這地方正當急湍船被一股急流沖著便和箭似的瞬息千里佛庫倫看看船去遠了聽不見哭聲了便在湖邊上跪下來禱告佛爺保佑兒子佛庫倫正傷心的時候忽然後面伸過兩隻手來被攔腰抱住他嚇了一跳急回頭看時原來是烏拉特看他渾身血迹氣喘噓噓不住地微笑問時原來那些追兵被他殺得半個不留問起孩兒佛庫倫便説放在獨木船裏沿湖水氽下去了烏拉特到了這時也不禁傷心起來對著湖面出了一回神兩人便手挽手地向山腳下樹木深處走去慢慢地不見兩人的影兒了山環水繞柳暗花明一股桃花春水依著緑草堤岸曲折流去流到一個幽靜所在鳥鳴東西樹影婆娑這水勢便遲緩下來了一個垂髫女郎一手提著一個水桶柢著頭慢慢地走到堤邊見了這爛漫春光不覺勾起了他的一腔心事他且不汲水一蹲身坐在一株梨花樹下那樹身倒挂在河邊一片一片花瓣兒落在水面上和天上明星似的動也不動那一灣春水越覺得十分明淨這女郎看了便向天歎了一口氣説道好花易謝春光易逝我百里長在這窮荒僻野的地方眼前都是一班勇男蠢漢哪里有一個是俊秀男兒我如今年紀已是三十六歲了女孩兒家最好的光陰都已過去眼見得把我這如花美眷埋沒在這似水年華里罷了我便是願嫁哪里有一個是配做我丈夫的這百里姑娘在三姓地方也算得是一個出類拔萃的女子模樣兒長得又好心眼又聰明三姓地方誰不願意娶他去做媳婦但是他卻不把這班蠢男子放在眼裏他母親早已故世只有一個父親名叫博多裏自小視他為掌上明珠每次勸他嫁丈夫總吃他女兒搶白一頓哭鬧一場便罷了看看他女兒年直蹉蛇到三十六歲上做父親的更急了這一天博多裏又對他女兒提起婚姻的事説西山上穆俄爾的大兒子顧順長得身體魁偉牲口又多田地也不少意思要勸百里嫁給他百里姑娘説穆俄爾顧順是一個粗魯的漢子每打架的時候只知道強姦娘兒們誰願嫁這凶惡光棍當時不免和他父親頂撞了幾句又説自己願一生一世守著身子做女孩兒不嫁丈夫了他説完話提著水桶到河邊來汲水如今見了這一番春景不覺勾起了方才的心事怔怔地看著水發怔這一顆心跟著水不知道流到什麼地方去了正寂靜的時候忽聽得耳邊颼的一聲一支箭破空飛來不偏不斜正射在那株梨花樹上接著遠遠地起了一片呐喊聲音只慌得百里姑娘玉容失色忙低著頭走到堤下面去躲著耳中只聽得人聲嘈雜也有喝打的也有哭喊的原來這三姓地方自從老村長明德死了三姓的人大家搶村長做每搶一回便打一回各個拿著刀槍逢人便殺見人便刺每打一回不知送了多少性命看看過了三五個年頭打也打過八九回了這村長的交椅還沒有人敢坐如今春光明媚正是田地忙的時候三姓的人在田裏碰到了一言不合便拔刀相見這一場打直打得血流遍野尸積成堆嚇得百里姑娘躲在堤下不敢探頭兒百里姑娘正驚慌的時候忽見一個女人哭喊著連滾帶跌地向堤岸上逃走後面一個大漢飛也似地追來一任那女人在下面哀求悲啼他總不肯放手一會兒那大漢站起身來百里姑娘留神看時原來不是別人正是那西山上的穆俄爾顧順百里姑娘正探頭時那大漢一眼瞥見了便翻身過來捉他急得百里姑娘忙向水心裏跳時接著又聽得颼的一聲一支箭飛來不偏不倚地射在那大漢的耳門裏從左邊耳朵鑽進從右邊耳朵鑽出大漢阿喲喊了一聲倒在地下死了看那支箭時兀自鼓著余勇向河心裏飛去説也奇怪這時河心裏有一隻獨木船正從上流頭源下來那支箭恰恰地飛進船裏去了這裏原是河身彎曲的地方水勢流到堤便要停住那時獨木舟也輕輕地靠了岸忽然聽得小孩兒的哭聲從船裏出來百里忙搶上去看時見一個孩子仰天倒在船底裏手腳不住地動著張著嘴哭著那一支箭離他頭頂二三分恭恭正正在船板上插著再看這孩兒時長得肥胖白淨十分可愛百里姑娘忙上去抱在懷裏那孩子立刻停了哭這當兒堤岸上已經擠了許多人見這孩子大家搶著上來抱他那孩子在水面上氽了一夜又是驚慌又是飢餓如今見有人抱他他立刻止住了哭見了人只是嘻嘻地笑這時博多裏也在人堆裏見了這孩子十分可愛便上去抱在懷裏打開他的衣襟一看見頸子上挂著一個黃布袋子袋子外面有薩滿的咒符掏出一張紙來上面寫道他母親前生原是天女只因此地要出一位英雄特叫神鵲含胎寄在天女肚子裏他是天上的貴種不能姓你們姓他姓愛新覺羅名叫布庫裏雍順這一番話是當時幹木兒聽了薩滿的話找人記下特地做一個袋子挂在他胸前算是鬥邪的意思不想如今給三姓地方人看見了到底博多裏年老有主意當時他立刻站起來對大衆説道我們三姓地方年年為了搶奪村長的位置死的人不知多少如今天上送下這位英雄來是我們三姓地方的福氣我勸諸位看在這位英雄面上從此大家便罷了手我們便拜這位小英雄做了村長他是天人下凡總能夠保佑我們人人平安這時有三五百人圍著聽著他們個個打得