body:
  text: 第二十九回甘鳳池座上獻技白泰官心中訪盜卻説甘鳳池號稱江南第一俠他的拳法有內外兩家祕訣大江南北沒有人能勝他的他又生性爽直愛打抱不平因此江南地方紳士家裏輪流著請他住下拿好酒好菜供養他甘鳳池酒吃到高興的時候便也獻些小本領給主人開開心這一天金家請了許多貴客在花廳上吃酒主人請甘鳳池坐在上位酒吃到一半甘鳳池説道窗外梅花盛開我們正可以吃酒賞花如今把這窗戶關得緊騰騰的未免太煞風景了説著只見他嘴裏噓地吹了一口氣那向南的八扇文窗格孱孱地都開得挺直一陳一陳梅花香吹進屋子來滿屋子的客人都喝好內中有一位客人説道久知好漢手彈能在百步外打人百發百中今天可否領教甘鳳池便説如今便獻一套落梅花的玩兒先打發人拿著筆在梅花上做著暗記又説明第幾枝第幾朵花甘鳳池便把紙搓成小團兒從手指上彈出窗外梅花樹上去那梅花一朵一朵落下來落下來的花便是預先做上暗記的花當下大家看了都覺詫異這時酒罷主人便領著客人到西莊上去遊玩這西莊是主人的田莊也有些茅亭竹舍點綴些鄉間景致衆人正遊玩時忽然一個牧牛童兒哭著跑來對姓金的説道兩頭牛打架從午刻直打到如今還是不休呢衆人聽了便跟著這童兒到屋後去看果然見兩頭黃牛互把頭上的角抵住不放甘鳳池上去輕輕地把四隻角分開揪住牛角向兩旁田地上一推只見那牛四條腿兒深深地陷在泥地再也掙扎不起來兩旁的人不禁哈哈大笑甘鳳池又上去把兩頭牛從田地裏輕輕地拉起正在這時候家人上來説有京裏的一位白龍道人求見甘老爺甘鳳池聽説他徒弟來了心下十分歡喜便借著姓金的客室相見當下胤禛見了甘鳳池便推説是姓李白龍道人也説姓李的是徒弟的主子因為久聞師父的大名特來拜訪要求師父一塊兒進京去又説了許多胤禛如何慷慨好義本領高強的話甘鳳池聽了也不多説話帶他兩人進去和姓金的相見夜間姓金的備下酒席替胤禛接風吃酒中間甘鳳池要請教胤禛的本領胤禛便拿出少林派運氣的本領把脊背緊貼著牆根他一鼓氣身子便沿著牆壁飛上去又慢慢地落下來甘鳳池笑了一笑站起來也去立在牆根下面叫胤禛用力打他的肚子這時胤禛要試他的本領便把全身氣力用在胳膊上送過一拳去只見那甘鳳池把肚子一吸吸成一片和紙一般貼在牆壁上胤禛的拳頭打上去好似打在牆上一般待要收回拳頭來時卻被他的臍眼緊緊吸住那拳頭好似膠住在肚皮上休想離開停了半晌甘鳳池哈哈大笑胤禛才收回拳頭來酒罷以後白龍道人跟著甘鳳池睡在一屋子見沒有人便把胤禛是當今的四皇子暗地裏和太子做對要爭奪皇位如今特來請師父進京去的話對甘鳳池説了甘鳳池聽了連連搖手説俺不去白龍道人再三懇求甘鳳池只是搖頭一旁惱了這位雍王站起身來一把拉住甘鳳池的衣袖甘鳳池一摔手轉身一晃便不見了白龍道人在屋子四下裏找尋卻不見他的蹤迹後來胤禛在衣櫥下面看見兩隻腳他兩人把衣櫥打開見甘鳳池全身和紙一般緊貼在牆上白龍道人對他打恭作揖請他下來他總是不下來胤禛伸上手去拉他休想動他分毫胤禛又念動喇嘛的咒語他也不下來胤禛心想這樣大本領的人卻不肯歸俺留在外面不能給太子請去來和俺做對待俺如今結果了他的性命罷他想著便拿出手槍來對著甘鳳池砰地一響一手拉著那白龍道人轉身便逃到江邊跳下坐船一直駛回北京去這裏甘鳳池被一粒槍子送到隔壁屋子裏大笑起來許多人聽得槍聲忙上前來問訊甘鳳池便把這情由説了那姓金的問他為什麼不願意跟四皇子進京去甘鳳池説道這四皇子確是帝王之相但是俺看他腮骨外露必是忘恩負義之輩因此不願跟他大家聽了他的話十分佩服那時胤禛回到京裏正是康熙皇帝第三次巡幸蘇州回來滿京城的人都説萬歲在太湖遇刺客的事體胤禛聽了忙進宮去見父皇請安這時有一個蒙古王名叫塞示咢額的對胤禛説道皇上在太湖遇刺客是確有其事的小王這時也隨駕在一塊兒俺們逛過金山便到蘇州在蘇州住了三天便到太湖皇上見太湖四面七十二峰忽遠忽近十分開懷坐在船頭上下網網得大鯉魚兩尾皇上非常快樂吩咐賞漁船上元寶兩錠歡笑時候忽見一個大漢從水面上大踏步走來和飛一般直跳上禦舟只見那大漢飛起手中寶劍向皇上面門刺來也是皇上洪福齊天皇上眼快説聲不好忙將身子一歪躲過劍鋒只見一道寒光早把身後一個太監刺死這時候驚動了隨身侍衛大喊有刺客一面個個拔出佩刀來上前抵擋這時小王在船艙裏聽得船頭上吵嚷忙搶出去看時見那大漢正跨進船艙向皇上殺來是小王拔刀向前用盡平生之力殺出艙去那刺客見小王力大知難取勝便轉身一躍鑽入湖底不知去向了皇上吃了這個驚慌心下大怒便把兩江總督張鵬翮江蘇巡撫宋榮傳來大大申斥了一番把個江蘇巡撫急得只是磕頭忙動公文下長元吳三縣派出通班捕快火速訪拿一面招請天下好漢保護聖駕當時便來了兩位英雄一位名叫白泰官一位是沒有名姓的那沒有名姓的英雄張總督領他來見皇上的時候見他身上穿著魚皮衣服求皇上賞他一個名字皇上便喚他魚殼皇上問魚殼有什麼本領魚殼説小人能在水面走路又能在水裏住三日三夜再是小人有一條褲帶可以敵得千軍萬馬魚殼説著便解下褲帶來那褲帶是鋼片打成的圍在腰上的時候軟綿綿地好似一條絲帶拿在手中舞弄時寒光四射皇上吩咐四十個侍衛個個拿著刀劍上去對敵打了半天休想近得他身皇上看了也十分讚歎便收在身旁充一名侍從武官講到那白泰官原是一個無賴年輕的時候專愛姦淫婦女他縱身一跳能跳過幾十丈的高牆任你是大家閨秀倘然看在白泰官眼裏他便在半夜時分跳進院子去任意姦污那大家婦女吃了他的虧也不敢聲張有一次他在揚州一家姓湯的人家姑嫂兩人都長得十分美貌白泰官打聽明白便跳進牆去正要用強只覺腦後著了一大棍頓時暈倒在地待到醒來已是被他們用粗繩子渾身綁住上面坐著一個老頭兒正吩咐人架起來柴炭要把他燒死白泰官知道性命難保便用盡平生氣力在地上亂滾一霎時把屋子裏的桌椅什物一齊碰倒勢力極大鋭不可當那桌上的燈火也打倒在地頓時火焰四起把屋子也燃燒起來屋子裏人忙著救火白泰官趁此機會掙脫了繩索跳出屋子逃走他多年不回家了便悄悄地回家鄉去看看快到家門遠遠看見一個小孩子在關帝廟門口遊玩他擎著小拳頭在石獅子上打著玩兒打得那石獅子火星亂迸白泰官看了十分詫異心想這孩子有這樣本領將來長大起來怕不在俺之下他心中霎起了妒嫉的念頭便上前去和小孩對打那小孩子受了重傷一邊哭著嚷道你如今欺侮我孩子我爹爹白泰官是天下無敵手的侍俺爹爹回來一定要替俺報仇説著只見他嘴裏連吐幾口鮮血死了白泰官到此時才知道打死了自己的兒子心中説不出的懊恨便轉身出去從此痛改前非在江湖上專打抱不平救人性命有一天他走到蘇州宜亭地方借住在一家客店裏到半夜時分聽到隔壁有女人的哭聲白泰官悄悄地走出院子跳上屋項去看時見一家樓窗開著那哭聲從樓窗裏飛出來白泰官跳進窗去看時見一年輕女子被剝得不挂一絲倒在床上床前擱著一盆熱水一個黑醜和尚正提著熱騰騰的一方手巾在那女人肚子上磨擦白泰官在江湖上原聽得説起一個西藏來的惡僧專一姦淫婦女又愛吃孕婦肚子裏的胎兒見有孕婦他便拿熱水硬捺下胎兒來煮著吃如今果然給他遇見了不覺大怒便搶上前去這時和尚背脊向外白泰官意欲摘他的腎囊那和尚覺察了疾忙轉身飛過一腿來白泰官手快擒住他的右腳那和尚一縱身把左腳飛起這是有名的鴛鴦雙飛腿白泰官也懂得這個解數便騰出右手來又把他的左腳擒住趁勢一摔那和尚被他摔下樓去倒在院子裏撞破了腦殼頓時腦漿迸裂死了一時驚動了鄰舍大家起來看那女子的丈夫見白泰官救了他妻子的性命忙對白泰官連連磕頭便是那左右鄰舍也上來個個對他打恭作揖説道這個和尚霸占住這地方已有多日了專一姦淫婦女擾亂地方報到縣衙門裏知縣派兵士下來捉拿都被他打得落花流水嚇得兵士們逃回城去如今這和尚也是惡貫滿盈死在好漢手裏好漢替地方除害真是合村的恩人當時把白泰官接到一家鄉紳士家去好酒好飯看待到了第二天給知縣官知道忙打發官轎來把白泰官接進衙門去這時皇上在太湖上遇到刺客正要招請天下好漢知縣便把白泰官保舉上去巡撫又轉報總督總督當即帶著他和魚殼還有十幾位好漢一同去見皇上皇上見他本領高強也給他充一位侍從武官其餘的都充了侍衛一齊帶進京來雍王聽了塞示咢額一番話心中又詫異又妒嫉心想天下有這般大本領的人可惜不在俺府中這時當著胤礽胤禔胤祀胤禟胤示我胤祉胤祺胤禵胤祥一班弟兄也不便説什麼他只和大哥十分投機他兩人當即回到私宅去商量大事又打聽得皇上已把魚殼派在太子名下保護東宮把白泰官派到蘇州去幫助地方官緝拿太湖刺客那太湖刺客名叫金飛原是陝甘一帶的大盜太湖上好漢喚他金爺爺只因他一向在陝西甘肅四川一帶出沒因此江浙一帶的人不甚知道他的底細講到他的本領卻高出白泰官以上他在四川一帶專伏在三峽急湍裏身上穿著緑油衣褲在水裏鑽來鑽去好似魚鱉一般見有船隻在峽下停泊他便上船去搶掠財物從不傷人後來他名氣愈傳愈大長江一帶好漢來歸服他的共有一千多人他便在宜昌路上占住一個山頭有許多好漢帶了家眷在山下住家開鋪子後來年深月久山下慢慢地成了一座村坊村坊上男女老少都是金爺爺的弟兄此番他受了明朝遺臣張蒼水部下石把總的託付打聽得康熙帝南巡便到蘇州來行刺他從金山地到太湖上一擊不中便也回山去了後來聖旨下來嚴催各縣捕快查拿刺客卻被吳縣的捕頭打聽出這刺客的來歷只是不敢上宜昌去找他恰巧皇上又派白泰官下來白泰官自己仗著本領高強便帶領全班捕快趕到宜昌去打聽得那座名山叫獨龍岡山下村坊叫獨龍村白泰官一班人到了宜昌便起岸雇著大車走旱道在路上走了兩天才遠遠地看見前面一座惡岡子四面山頭環抱著岡下樹木參天陰森可怖白泰官大車正走著見前面也有一輛車兒車上坐一個絶色女子一十約十一二歲的小孩跨在轅上趕車慢慢地走著白泰官的車快看看趕上那車上的女子喝著小孩子道白太爺來了快讓路白泰官聽了十分詫異看那女子又是不認識的再看那小孩子正跳下車來繞過車身後面去把輪子一端端過一旁讓白泰官的車子先過去白泰官見這小小孩童有這樣的神力心便灰了一半當下他也不説話到了山岡下面找到一家客店住下天色已晚大家安睡第二天一早起來白泰官出去付帳時見匱內坐著一個女子便是昨天坐在車上的那個女子白泰官要試試他的本領看把那大錢一個個嵌在匱板木頭裏面那女子看了笑了一笑他只用手在匱檯上輕輕一拍那大錢一齊跳了出來白泰官知道這村坊裏個個都是有本領的人心又灰了許多正躊躇的時候只見門外走進一個大漢來見了白泰官便兜頭一揖説道俺山門知道白太爺到了便打發俺來請你一個人上山去白泰官問山主是什麼人那人回答説便是金爺爺白泰官到了這時候也不肯丟臉便吩咐那一班捕快在客店候著他獨自一人跟大漢上山去那山岡子很高那大漢連縱帶跳地上去白泰官縱跳的本領也不弱跳了幾跳轉了幾個彎那金飛已在山岡上守候著見了白泰官便迎接上來自己通過姓名白泰官見他身後站著三五十條好漢也上去一一招呼了大家陪他走進屋子去裏面院子很大廳堂也闊寬堂屋裏已擺下幾大桌酒席金飛當即請白泰官坐了首位衆好漢也一齊坐了下來看各人跟前時都沒有筷子只有尖刀數柄白泰官跟前連尖刀也沒有滿桌子的雞鴨魚肉不知如何吃法停了一會主人吩咐衆弟兄敬客只見各人拿尖刀挑著魚肉向白泰官嘴裏送來白泰官也故意要獻些本領給他們看見尖刀送進嘴裏時他忙把門牙咬住刀夾刮地一聲刀尖咬斷魚肉吃下肚去就這樣一個一個上前敬他他從從容容地吃著嘴上一點不受損傷直到桌面上的尖刀一齊被他咬去刀尖看看白泰官跟前堆著一大堆刀頭兒大家都喝彩接著拿上一大盤糕來外面熱氣騰騰白泰官拿一塊送進嘴去一咬糕裏裹著十多支鐵釘白泰官不動聲色把糕慢慢地吃完含著一嘴鐵釘向牆一噴只見那十多支鐵釘一齊牢牢地釘在牆上金飛看了也喝一聲好站起身來送客白泰官自料衆寡不敵又見他手下人本領高強便把一團豪氣冰消瓦解了走到大門口已有一扇鐵閘門擋住一旁趕過一個童兒來把這門閘輕輕舉起看那塊閘板足有一千斤白泰官這時越發死了心下得山去不好意思去見那捕快便一溜煙逃到別處去了這時康熙仗著魚殼保護又第四次出巡江南這一次可不比得上一次皇上帶著禦林軍士沿路又有地方軍隊保護皇上暗暗地打聽還有許多讀書人不服清朝做許多誹謗朝廷的詩文從速舉發不得循私誰知道這密諭下得不多幾天在浙江湖州府地方便鬧出一起文字的大獄來當地有一富翁姓莊名廷壟他讀書不多卻好名心重很想弄些著作傳之後世藏諸名山因此他便天天捏一支筆咿咿唔唔地帶唱帶寫不知寫些什麼偏偏肚子裏不爭氣寫了一年半載也寫不出什麼正經東西來後來他忽然想出一條好計策來好在他有的是錢便拿銀錢去那班窮讀書人家裏收買稿件占為已有後來不知從什麼地方買到一部烏程朱氏明史的稿本他便快活非凡湊上些崇禎朝的事實換了自己的名字又請當地有名的讀書人姓陸的姓查的姓範的替他做幾篇後記居然刻印出來他想這洋洋大作當年孔子作春秋司馬光作史記也不過如此傳之後世怕不與春秋史記鼎足而三誰知樂極生悲這各省地方官正在暗地裏查訪有誹謗本朝的著作查到這部明史那湖州知府便鄭重其事親自進京去告密那刑部尚書秦明皇上聖旨下來嚴密查辦這莊廷壟消息得到很快知道事體難了忙服毒自盡聖旨下來見莊廷壟已死便開棺戮尸又把那時刻印的販賣的一齊捉去殺了那做後記的查家范家陸家也得信很快便預先聲明是莊廷壟捏名假造的好不容易求得一個免罪已弄得傾家蕩産從此以後一班讀書人都縮著頸子不敢多寫一個字康熙皇帝心中十分快樂在外遊玩多時便啓蹕回京去誰知京裏的太子和直郡王雍郡王又鬧出一樁大事來要知後事如何且聽下回分解
