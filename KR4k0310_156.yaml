body:
  text: 第一百十六回弄假成真將軍得嬌壻轉禍為福帝子續新弦話説曹操聽得喊聲四起料知事變與鄒氏豁地分開連長衣都未曾來得及穿好就聽得營門口喊殺連天曹操此刻真個是魂落膽飛和曹昂曹安仁以及鄒氏等各自上馬慌不擇路地出了後營直向西北逃去剛剛走了一裏多路猛聽得後面鼓角震天燈球火把照耀得和白日一樣曹操回頭一望不禁將一顆腦袋嚇得縮到腔子裏面伸也不敢伸一下子連説今天活該要將性命丟掉了話還未了弓弦聲響曹操的坐馬屁股上早著了一下子那馬怪叫一聲壁立起來將曹操掀翻在地曹昂見了飛身下馬將自己的馬讓與曹操張繡望見忙拍馬趕去曹操用馬鞭子在馬身上著力打了幾下子那馬雙耳一豎騰雲價地奔去一口氣跑到清水河邊可巧有一隻漁船曹操牽馬上船忙叫舟子渡到對岸他登岸之後眼見張繡領著大兵將他的大兒子曹昂大侄兒曹安仁以及情人鄒氏等一干人追到對岸一刀一個全請到鬼門關去交帳了曹操也不暇多計較伏在馬鞍上直向舞陰逃去到了舞陰才知道典韋被害他痛哭一場方才收兵回許昌而去暫按不表再説劉備和關張二人自從安喜縣出走之後輾轉奔波毫無成績誰知英雄有路馬上就得有能人出來幫助他了南陽諸葛亮神機莫測居然被他請出隆中助他克圖大業還有常山趙雲長沙黃忠輩都是智勇雙全的良將加上諸葛亮指揮有素運籌幃幄決勝千里先後占據荊州各郡旌旗到處百姓望風而拜於是長沙桂陽各地俱先後攻下虎踞一方大有和群雄對峙之勢這時江東的孫堅早已去世長子孫策也未終天年二十六歲時即棄世了孫策有弟名權碧眼紫髯十分英俊胸懷大志自他哥哥死後他便坐鎮江東雄據八十一州郡文有魯肅張昭諸葛瑾之流武有韓當周泰程普蔣欽甘寧淩統之輩兵精糧足加之還有一個周瑜智略過人孫權對於他十分器重到了現在的時候曹操在赤壁一戰將八十三萬人馬斷送得片甲不回諸葛亮幫同周瑜巨謀碩劃趁曹操新敗的當兒就中取利卻也奪了不少地盤周瑜見劉備聲勢日擴心中十分憂慮暗中和孫權商量道現在曹操倒不足為慮所最可慮者便是劉備如今你看他仗著諸葛孔明的神出鬼沒的詭謀關張趙雲的武藝東吞西並眼見他的勢焰一日一日地擴張到不可收拾的地步了如今再不設法去將他剷除將來説不定東吳還要受他的影響呢孫權聽了皺眉説道你的主見應當怎樣呢周瑜説道依我的主見須要先將劉備設法除去群龍無首他們當然不擊自散了孫權道除劉備這層事恐怕不易罷不要説別的單講他手下有這許多的文武兼全的能士輔助他我們雖然有這個念頭但是究竟怎樣下手呢周瑜笑道談到武力來解決這層事當然是辦不到的如今我有一條計策在此主公採用與否我尚未敢料定主公如果採用一定可以致劉備的死命了孫權大喜道只要能剷除劉備我又有什麼不答應呢周瑜便走過來附著孫權的耳朵嘰咕了一陳子孫權點頭道這計果然是妙但是誰去作媒人呢周瑜沈吟了一會兒説道我想這事非呂範去不可孫權便將呂範召來密囑了一回呂范受計而去到了荊州入見劉備説道我主有妹年已二九才貌兼優聞得明公佳偶新殤急待續弦我主慕將軍威德欲與將軍連秦晉之好不知將軍還肯俯允嗎劉備還未答話孔明搶著説道你們主公既肯下顧那是再好沒有了而且我主是中山靖王之後漢家嫡派兩家聯姻真夠是門戶相當再恰合沒有了呂范知道劉備一向是凡事俱聽孔明調度的今見孔明首先答應料想這事一定是沒有阻礙了孔明隨又命人齎著金帛隨著呂範去了劉備便對孔明説道先生來免忒也性急了這事豈可造次的萬一他們在那裏盤算我們那麼我們豈不是上了他們的當了嗎孔明笑道諺雲明知山有虎故作采樵人主公凡事請放寬心都有我來維持就是了不到幾天呂範齎著回聘到來擇定建安十四年十月初六日到東吳去就親劉備聽説是到東吳去就親不禁心中十五個吊桶打水七上八下地忐忑不寧孔明坦然答應又命孫乾作男媒和呂范到東吳去復命劉備向孔明説道先生你何其這樣的糊塗他們叫我去就親分明是將我誘去任他們殺了就是了你替我答應就是送我到鬼門關罷了孔明笑道不必怕山人早已算定主公此去不獨他們不敢來加害你並且還可以得到一個智勇兼全才貌雙絶的佳人回來呢劉備哪里肯信只管埋怨不休光陰易過轉眼就到小春的朔日了孔明便替劉備打點去招親的手續暗中給趙雲三條妙計吩咐他好生藏著趙雲受了命令領著五百名兵士先到江口駕船等候劉備誰知劉備抵死也不肯前去諸葛亮勸得舌敝唇焦他仍是疑懼著不肯毅然前去孔明沒法便向他説道你放心罷我的錦囊早就預伏下去了你此番去誰敢碰你一根毫毛我陪償你一塊肉如何劉備説道罷了罷了人心難測你知道他們是什麼用意對待我呢孔明笑道我主平素最相信我的話今天為何兀地不相信呢難道我還有心教你去送掉性命嗎你只管去罷有什麼疑難的事情只消去問子龍便了劉備聽得才放心下船孔明又將子龍喊來叮嚀了一番子龍連聲答應才和劉備一同過江到了江南趙雲便將第一條錦囊拆開和劉備細細的一看劉備便令人齎著花紅酒禮到南徐去拜見喬國老喬國老乃二喬之父他聽劉備説呂範為媒將孫權的妹子嫁給他自是十分歡喜劉備便與趙雲一同進城由張昭等招待至館驛安息周瑜聽説劉備已到便和孫權定計道如今他既自己前來送死明天主公可在會文堂上請客兩廊預伏刀斧手一聲令下將他剁成肉泥然後再去假著他的命令前去襲荊州這不是一舉兩得麼我此刻還要到柴桑去辦理預防事宜主公三天之內都要將情形火速地告訴我以便相機行事孫權答應著周瑜星夜趕奔柴桑去了再説喬國老得著這個喜信連忙進城到吳國太那裏見了面忙賀喜道恭喜國太如今得著佳壻了吳國太聽他這話不禁大吃一驚忙道國老這話從何説起我的女兒尚未有門當戶對哪里來的佳壻呢國老哈哈大笑道你用不著來逗趣了難道你瞞著我我就不討喜酒吃了麼吳國太忙道和誰家結親的誰做媒人誰作主的怎的我一些兒也未曾知道呢喬國老聽他這話才知道他實在不知道便將呂範做媒的一番話對國太細細地説個究竟把個吳國太氣得一佛出世二佛涅槃忙命人立刻將孫權召來氣呼呼地問道誰給你作主將我女兒許配劉備的我養的我倒一些兒不能作主你們簡直眼睛裏沒有我了好好好他説罷老淚縱橫地號啕大哭起來嚇得孫權撲地跪下忙道母親息怒這事不幹我事完全是周瑜的主謀他想將劉備騙來殺了藉此去將荊州奪回並不是真將妹子嫁給他的吳國太聽説這話越發火高萬丈指著周瑜罵道這個壞透心腸的畜生自己沒有本領去將荊州取來就生出這種不要面皮的主意來將我女兒做引子去騙劉備殺了他我女兒不是做一世的望門寡麼喬國老道周瑜這計未免忒失算了照這樣的做去便是得了荊州也不免天下的恥笑美人計的主人便是吳侯的妹子你想這事丟得起這個面了麼在我看事已如此不若將雪英小姐就嫁給劉備罷劉備是堂堂的漢室的嫡裔而且又是當世的英雄和吳侯結親正是門當戶對也不為辱沒你家的吳國太道明天叫他到甘露寺去讓我親自去看一下子如果合我意的我便將我的女兒嫁給他誰來干涉一句先將他的狗頭砍下來再説萬一我看不中式便隨你們怎生去處治便了孫權聽説這話心裏雖然是一百二十分不情願無奈母命難違而且孫權又是個大孝的人到了這時只是唯唯稱是到了第二天暗中與呂范賈華等商議預先派了五百名刀斧手在甘露寺的兩廊埋伏等候劉備一到擊桌為號國太國老早就到了孫權親自到館驛裏去請劉備二人相見孫權見劉備堂堂一表英氣逼人不禁有幾分畏怯他兩個出門上馬趙子龍躍馬橫槍在後面保住不多時到了甘露寺門前下馬趙雲插槍提劍緊緊地隨著劉備寸步不離走到大雄寶殿下劉備對國太倒身下拜國太見他生得龍眉鳳目美髯過胸方面大耳果然是個俊俏豪傑丈夫不禁心花大放忙呼免禮對喬國老笑道這才是我的女壻呢這時趙雲見兩廊內藏著無數的刀斧手便知事情不妙忙向劉備一搗又使了一個眼色劉備會意趁勢往吳國太面前一跪哽咽著説道國太要殺我就請直接殺了罷吳國太大驚問道這是什麼話呢劉備道要是不想加害劉備兩廊下又何必埋伏著無數的刀斧手做什麼呢吳國太聽得這話不禁勃然大怒忙將孫權喊來罵道你這畜生居心不良如今他既是我的女壻當然就是我的兒女誰叫刀斧手在兩廊下埋伏的嚇得孫權連忙回答道這事我委實一些不知道請母親問呂范他定知道的國太又將呂範喊來誰知呂范又推賈華國太又將賈華喊來罵得狗血噴頭忙命人推出去砍了慌得劉備又跪下來求饒國太又將賈華臭罵了一頓才算消氣嚇得那廊下的刀斧手抱頭鼠竄走得一乾二淨當日劉備回到館驛孫乾向他説道主公在這裏簡直是和虎口一樣如不早些結婚必生別變劉備道我何嘗不知道呢但是想什麼法子好早一些兒脫身呢孫乾道明天主公去哀求喬國老設法完姻禮成之後主公就可以和新主母一同回荊州了到那時還有誰來阻止呢劉備稱是到了第二天見了喬國老便請他去對國太説早日完姻免生意外國老便如言去告訴國太國太怒不可遏忙命人將劉備的行李馬匹等搬到內宮裏就叫劉備住進來又命趙雲也搬進來擇定吉日大排會宴舉行結婚的禮儀樂人奏樂儐相扶著一對新人出來交拜天地然後又拜國太國老國太坐在上面望見這一對佳兒佳婦不禁將他嘴笑得和鱖魚一般的大合不攏來喜洋洋地向孫權説道我的兒你看你的妹子幾多的福分竟和一個帝胄英雄配偶不怪他成日價地目空一切東家不願意西家不合適的揀著原來還等著這樣的一個如意稱心的夫壻呢喬國老道雪姑娘平日誰給他做媒誰便要碰他個一鼻子灰今天卻一點脾氣也沒有了伏伏帖帖地聽人作主這不是件奇事麼他這兩句話説得衆人哄堂大笑起來霎時將各種儀式做過由管家先扶新娘進房然後又引新郎進房同飲交杯劉備進了房擡頭一望不禁嚇得退走幾步倒抽一口冷氣你道是什麼緣故呢原來新房中衆婢女個個持槍佩劍雄赳赳氣昂昂地侍立兩旁宛然逢著大敵的一樣劉備站在洞房外面呆呆地進退兩難暗自打算道此番性命一定要送掉了他想到這裏那額角上的汗珠黃豆般地滾個不住管家婆淩媽見了這種情形他便走到劉備的跟前低聲説道吉時到了請貴人進房去同飲交杯罷劉備好像陡然得了一個寒熱病似的那三十六顆牙齒在嘴裏兀地不住捉對兒廝打停了半天才勉強説道洞房裏既非戰場又何必插劍佩刀殺氣森森的作什麼來管家婆不禁笑道怪不得新郎遲疑著不敢進房原來還是為著這個玩意兒呢沒事沒事我們家公主平素好武所以新房中不脫兵器的劉備忙道今天是什麼日子洞房裏從來沒有聽説過陳設兵器的趕緊撤去管家婆聽他這話狗顛屁股地跑進房對雪英説道新郎看見房中陳設兵器十分驚疑要求公主撤去方敢進房來呢他微微地一笑説道好男兒在沙場上廝殺半生難道還怕兵器麼管家婆忙道並非是怕實在是不知公主什麼用意故驚疑不定他道好命他們換起宮妝説著自己也將腰裏的寶劍除下那些侍女連忙換妝輕描淡抹的越顯出衆香國裏的風光來了劉備這才進房和他同飲交杯魚更三弄攜手入幃説不盡千般慰貼萬種溫存良宵苦短永晝偏長曾幾何時又是東方發白他兩個起身梳洗已畢攜手去參見國太國太見了當然歡喜這時孫權萬不料竟弄假成直又羞又氣暗地裏派人去飛報周瑜周瑜得報也是氣得三尸神暴跳七竅內生煙趕緊寫一封信交給來人帶回來孫權拆開一看上面大略是前計不成弄假成真只得作罷惟現在不妨就前計施行第二步軟禁的方法盛築宮殿藏著美女使備耽沈聲色不思回荊以離諸葛關張之心彼等心一離則事可圖了孫權看罷大喜便在靜安宮之東新建一所迷香別野內藏樂女百餘人將劉備移居在內鎮日箏琶激楚笙管嗷嘈真個是脂天粉地五光十色衆美爭妍劉備雖然是個頂天立地的奇男子到了此時也就沈溺在這裏樂不思歸了趙雲在外面一無所事成日價騎馬射獵看看年終心中好不著急又聽不見劉備提起回去一字暗道先生臨走的時候吩咐我的這三條妙計第一條是在南徐開拆的第二條須到年終開拆現在主公沈迷酒色看看要到年終了也未曾聽他提起回去的一個字何不將第二個錦囊拆開來看看呢他便在背地裏將第二個錦囊計放開來一看忙走進迷香別墅對守門人説道煩你進去通報一聲就説趙雲要見我主有要事面談守門人不敢怠慢連忙進去報與劉備劉備忙出來向他道什麼事這樣的要緊趙雲故意大驚失色地問道主公還不曉得麼於今曹操要復赤壁的深仇統領雄兵五十萬直殺向荊州來了主公成日價居在這深宮大苑裏關於自己利害存亡的大事還不曉得這卻如何是好劉備聽得好像半天裏突然起了一個焦雷一樣忙道你且退去我自有道理這正是溫柔鄉里風光好能使英雄壯志磨要知後事如何且看下回分解
