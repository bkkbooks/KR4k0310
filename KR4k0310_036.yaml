body:
  text: 第三十八回弓鞋到處天子被刺手帕傳采郎君入彀卻説寶親王自從那日無意中領略了董額氏的香澤以後時時把這美人兒擱在心裏眼前常常現出那副嬌羞嫵媚的面貌來鼻管裏常常好似有董額氏脖子上的粉花香味留著因此他把眼前的一班庸脂俗粉丟在腦後常常慫恿著自己福晉去把他舅嫂子接近園來從來女人愛和自己娘家人親近如今得了王爺的允許他姑嫂兩人常常見面那董額氏也乖覺見寶親王來了他便立刻回避把個寶親王弄得心癢難搔看看董額氏一舉一動飄飄欲仙越看越愛恨不得把他一口吞下肚去只是可惜沒有下手的機會後來富察氏也看出丈夫的心事來了索興把董額氏藏在密室裏姑嫂兩人談著心不給寶親王見面寶親王許久不見董額氏了心中好似勢鍋上的螞蟻在屋子裏坐立不安廢寢忘餐起來寶親王有一個心腹太監名叫小富子卻長得十分伶俐見王爺有心事便悄悄地獻計如此如此一定可叫王爺了卻心願寶親王聽了他的計策連稱好孩子快照辦去那小富子奉了王爺的命令先在園內竹林清響館裏預備下床帳鏡臺一面打發兩個小太監和兩個侍女押著一輛車兒到常明家裏去把舅太太接了來這董額氏見富察氏的帖身侍女前來迎接也是常有的事心中毫不疑惑便略略梳妝坐上車向圓明園來照例車子到了藻園門外停住便有八個小太監出來擡著車子進園去曲曲的折走了許多路這時盛夏天氣在外面赤日當空十分悶熱一進園來樹蔭深密清風吹拂頓覺胸襟清爽起來董額氏坐在車子裏一路貪看景色不覺到了一個清涼的所在車子停下兩個侍女上來把董額氏扶下地來擡頭一看只見四面竹林圍著一座小院子耳中只聽得風吹竹葉那竹梢上挂著金鈴兒一陳一陳叮鈴的聲音走進院子去小小一座客室一面挂著一方匾額寫著竹林清響館五個字四壁挂著字畫滿屋子都是紫竹幾椅十分清雅侍女引導著走進側室去只見珠簾牙榻紗帳水簟鏡臺上放著梳具脂粉黑漆的桌子上琉璃盆中放著各色水果窗前書桌上一個水晶缸養著幾尾金魚窗外面一叢翠竹映在窗紙上成一片緑色連屋子裏的衣襟上也緑了董額氏看了不由得贊了一聲好一個清涼所在見兩個特女跟在他後面不住地打扇一個侍女送上涼茶來董額氏便問怎麼不見你家福晉一個侍女回道福晉在荷靜軒洗澡吩咐請舅太太在屋裏略坐一坐董額氏便也不説話停了一會兩個年紀略大的侍女捧著衣巾盆鏡等物進來説道請舅太太也洗個澡兒董額氏天性怕熱在家裏又常洗澡慣的聽得請他洗澡他也歡喜侍女們忙服侍他卸妝脫衣披上浴衣趿著睡鞋兩個侍女領著到後面一間密室裏洗澡去待他洗畢出來自有侍女替他重行梳妝再勻脂粉便有一個人伸過手來替他的鬢邊插上一朵蘭花董額氏在鏡中望去見站在他身後替他戴花的不是什麼侍女竟是那寶親王董額氏這一羞直羞得他低著脖子靠在妝臺上擡不起頭來溜過眼去看寶親王時只見了直挺挺地跪在地上嘴裏不住地天仙美人地喚著又説俺自從見了嫂子以後頓覺得俺這人活在世上毫無趣味那天在嫂子脖子上偷偷地嗅了一下這香味直留到現在可憐把我想得飯也不想吃覺也不想睡天下的女人也不在俺眼中求嫂子可憐俺看俺近來的形容消瘦便知道俺想得嫂子苦嫂子倘再不救俺眼見得俺這條命保不住了説著這寶親王真的鳴嗚咽咽地哭起來哭得十分悽楚他一邊哭著一邊拿出手帕來抹眼淚董額氏認識這手帕是自己的停了一會又聽寶親王説道嫂子放心今天的事俺俱已安排停當這裏在園的極西面離著福晉的屋子又遠那班侍女內監們都是俺的心腹嫂子倘然順了俺決不使外邊人知道嫂子倘然不順我聲張起來一來嫂子和俺的臉面從此丟了二來便是聲張這地方十分冷僻也沒人聽得把俺們好好的交情反鬧翻了嫂子倘然依從了俺俺便到死也忘不了嫂子的恩德嫂子倘然不依從了俺俺橫豎是個死便死在嫂子跟前也做個風流鬼寶親王説到這裏從腰裏颼地拔出一柄寶劍來向脖子抹去任你是鐵石心腸的女人見人在他跟前尋死他心腸便不由得軟下來況且天下美人大都是風流性格見寶親王又是一表人材又明知道他將來要繼承大位做皇帝的又動了幾分羡慕的心腸如今聽他一聲聲喚著好嫂子又見他要自刎便又動了幾分憐惜的心腸他自己看看浴罷出來只外面披著一件薄紗的浴衣玉雪也似的肌膚映在紗衫外面早已被寶親王看一個飽看看自己的衣服一齊脫在床上眼見被寶親王攔住了不能拿來便是拿來當著寶親王的面也不能穿董額氏想到這種種地方不覺歎了一口氣轉過身來奪去寶親王的手中的寶劍伸著一個手指在他額上一戳説道你真是我前世的冤家寶親王趁此機會便過去把董額氏順手一拖一個半推半就一個輕憐輕愛成就了好事事過以後寶親王親自服侍他穿戴兩人一時捨不得走開又調笑了一會直到傍晚才送他出房那董額氏臨去的時候轉過秋波來向寶親王溜了一眼低低地罵了一聲鬼靈精上車去了寶親王心中十分得意從此以後他倆一遇機會便偷偷地在園中冷僻的地方尋歡作樂看看天氣漸冷寶親王和董額氏在露香齋一間密室裏私會正快樂的時候只聽得隔院碧桐書院裏發一聲喊頓時人聲大亂起來寶親王忙丟下董額氏趕到隔院去一走進院子只見大小太監慌慌張張地説道皇上腦袋不見了這座碧桐書院正是雍正皇帝平日辦公的地方雍正皇帝因住在宮裏十分拘束又常常記念著寶親王便移到園中來住宿在大宮門後面依舊設立宗人府內閣吏部禮部兵部都察院理藩院翰林院詹事府國子監鑾儀衛東四旗各衙門的直廬又在大宮門西面設立戶部刑部工部欽天監內務府光祿寺通政司大理寺鴻臚寺太常寺太仆寺禦書處上駟院武備院西四旗各衙門的直廬每天在正大光明殿坐朝已有一年十分安靜不料到忽然出了這件大亂子皇帝每到秋天總在碧桐書院批閲奏章院子裏和書案前都有太監和宮女伺候著這一天伺候到黃昏月上的時候內監們點上宮燈皇帝在燈下翻閲奏章忽然院子裏梧桐樹上飛過兩道白光來飛進屋子去盤旋一會便不見了那班宮女太監眼見著兩道白光頓覺昏迷過去開不得口待到醒來見皇帝已倒在地下急上去扶時脖子上的腦袋已不知到什麼地方去了內監們發一聲喊那班侍衛大臣們都一齊跑進來見了這個情形個個嚇得兩條腿發顫沒了主意停了一會一班妃嬪和寶親王都從人叢裏搶進來圍著雍正皇帝的尸首嗥啕大哭後來還是寶親王有主意吩咐幾監快請鄂爾泰和史貽直兩人來商議大事那太監們走出園來跳上馬分頭趕去鄂爾泰這時已經安睡忽然外面大門打得震天價響家仆去開著門一個太監飛也似地搶步進來滿頭淌著汗氣喘噓噓地説道快請大人快請大人皇上腦袋丟了這句話傳到鄂爾泰耳朵裏慌得他從床上直跳起來連爬帶跌地出去也不及備馬便騎了太監騎來的馬沒命地跑到圓明園跳下馬搶進園去那史貽直已先到了這時別的且不去管它找皇帝的腦袋要緊大家拿著燈火四處找尋後來還是惠妃在尸首的褲襠裏找到了那惠妃捧著雍正皇帝的腦袋嗚嗚咽咽地哭得十分淒涼你知道這惠妃是什麼人便是那弘皙的妻子胤礽的兒媳雍正皇帝嫡親的侄兒媳婦被雍正皇帝硬取進宮來待他十分有恩情封他做惠妃惠妃這時早已忘了他的故夫見雍正皇帝死得淒慘便哭得十分悲哀當時鄂爾泰忙把皇上的頭裝在脖子上吩咐宮人給尸體淋浴穿戴起來一面和史貽直兩人趕到正大光明殿裏從匾額後面取出那金盒來打開盒子抓出遺詔來一讀見上面寫著皇四子弘曆即皇帝位便去拉了寶親王帶著五百名勇健軍趕進京城到了太和殿打起鐘鼓來滿朝文武齊集朝房鄂爾泰滿面淌著淚訴説皇上被刺時的情形衆大臣圍著他靜聽正聽到傷心的時候忽然一個內監指著鄂爾泰説道鄂中堂你還穿著短衣呢停一會怎麼上朝一句話提醒了他才想著出來得匆忙不及穿外衣便立刻打發人到家中去拿朝衣朝帽穿戴齊全正要上朝去忽然史貽直想起一件事對衆大臣説道皇上被人割了腦袋説出去太不好聽況且這件事俺們做臣子的都有罪的也得關起城門來大大搜一下一面行文各省文武衙門捉拿凶手這一聲張若人人傳説著豈不是笑話如今依下官的思想不如把這件事隱過了一來保住先皇的面子二來也省了多少騷擾俺們須把遺招改成害急病的口氣才得妥當當時鄂爾泰也連説不錯立刻動筆在朝房改好了文官由鄂爾泰率領武官由史貽直率領走上太和殿那班親王貝勒貝子和六部九卿文武百官一齊跪倒由鄂爾泰走上殿去宣讀遺詔道朕攖急病自知不起皇四子弘曆深肖朕躬繼朕即皇帝位欽此當時寶親王也一同跪在階下鄂爾泰讀過遺詔便有一隊侍衛宮女太監們各個手裏捧著儀仗下來把他迎上殿去換了龍袍戴上大帽簇擁他上了寶座階下衆大臣齊呼萬歲爬下地去行過禮新皇帝便下旨改年號為乾隆元年大赦天下一面為大行皇帝發喪一面卻暗暗地下密旨給史貽直叫他查拿凶手祕密處死這史貽直奉了密旨四處派下偵探搜查行刺皇帝的凶手那凶手見大仇已報早已遠揚在深山僻靜地方逍遙自在去了叫這史貽直到什麼地去捉他如今又要説説呂四娘這邊的事了呂四娘跟著虯髯公住在京城裏和魚娘做著伴還有一個朱蓉鏡因捨不得丟下呂四娘便離鄉背井也跟著呂四娘到京裏來一塊兒住著四娘感念蓉鏡的恩情答應他待大仇報後把終身許給他從此以後蓉鏡便格外和四娘親熱兩人真是同坐同行百般恩愛便是魚娘蓉鏡也用十分好心看待他凡是魚娘有什麼事呼喚他他便立刻做去因此魚娘也和蓉鏡好他們三人常常坐在一間屋子裏有説有笑在外人望去好似虯髯公一子一女一媳一家人卻沒有人去疑心他虯髯公也因住在京城裏間著無事叫旁人惹眼便把自己家裏的古董搬些出來開一爿古董鋪子他鋪子裏常常有大臣太監們進出虯髯公在他們嘴裏打聽得宮裏的道路四娘和魚娘兩人便在夜靜更深的時候跳進宮牆去在月光下看去見殿角森森宮瓦鱗鱗映著冷靜的月光一陳風來夾著殿角的銅鈴聲也不知道何處是皇帝的寢宮他兩人即到了裏面如何肯罷休仗著他飛簷走壁的本領東闖西闖那宮裏的侍衛太監們只見兩條白光飛來飛去那侍衛待要上去捉拿那白光來去又很快如何捉得住他那時咸安宮有一個宮女正在廓下走著一道白光沖來那宮女的腦袋便不見了因此宮內的人便吵嚷起來虯髯公怕四娘在宮裏亂闖壞了大事便勸他再耐守幾時打聽得皇帝確實住宿的地方再動手也不遲因此四娘和魚娘暫時斂迹那宮中也便安靜了許多這時雍正皇帝已遷居在圓明園內那圓明園卻不比得宮裏地方又曠野侍衛又稀少有幾處庭院竟有科年不見人迹的四娘和魚娘兩人帶了乾糧去躲在園中的冷僻去處打聽皇帝的消息有時也聽得那班宮女太監們嘴裏露一兩句話來知道皇帝每天在碧桐書院辦公到更深夜靜的時候他兩人又悄悄地出來打探路徑後來他們把園中出入的門路看得十分熟了便動起手來一動手便成功他們隨身帶著悶香所以皇帝被殺的時候那班左右侍衛都一時昏迷過去四娘割下皇帝的頭來意欲帶它回去在他祖父父親的墳前祭祀魚娘説這反叫人看出痕迹來不如不拿去的好魚娘便把雍正皇帝的頭拿來塞在尸首的褲襠裏兩個相視一笑便一縱身出了圓明園虯髯公早已安排停當悄悄地把古董鋪子收了雇了一隻小船泊在城外十裏堡地方候著連候了三天只見四娘和魚娘兩人手拉著手兒笑嘻嘻地走來跳上船頭吩咐立刻開船待到鄂爾泰進園去慌成一片的時候四娘的船已和箭一般地搖過了楊村向南去了説也奇怪這呂四娘不曾報得父仇以前便終日愁眉淚眼淡裝素服不施脂粉不苟言笑如今他見大仇已報忽然滿臉堆上笑來穿著鮮豔的衣裙濃施脂粉終日有説有笑滿屋子只聽得他的笑聲朱蓉鏡看了有説不出的歡喜兩人一路同起同坐十分親愛到了湖南地界虯髯公送蓉鏡回家蓉鏡的父親見兒子回來了好似得了寶貝一般當下蓉鏡便和父親説知要娶四娘做妻子虯髯公自願替他倆做媒當下便擇了吉期給兩人成親四娘做了新娘便一改從前嚴冷的態度頓覺嫵媚嬌豔起來魚娘伴著他在新房裏終日逗著他玩笑蓉鏡終日跟住四娘寸步不離每日做些調脂弄粉畫眉拾叉的事體光陰很快不覺又過了一個月虯髯公要告辭回去朱家父子再三留他不肯住下四娘説俺夫妻多仗師傅才有今日如今師傅要去俺夫妻須直送他到四川蓉鏡也説不錯這時猶有魚娘捨不得四娘又想起父親被仇家害死自己欲歸無家心中十分淒涼便止不住掉下眼淚來四娘再三勸説虯髯公也把魚娘認做自己的女兒答應永遠不丟開他當時依舊四個人一齊上路沿著長江上去一路山光水色叫人看了忘卻憂愁不少看看走進了四川地界那一路山勢雄峻他四人個個騎著馬從旱道走去走出了劍閣前面便是五老山四人立馬在山頂上忽然見一個老頭兒一個少年也騎著馬從山坡上走來負娘眼快認識那老人便是他父親魚殼忙拍馬迎上前去父女兩十抱頭痛哭這時四娘夫婦兩人和虯髯公都跟了上來問起情由原來從前被於清瑞捉住殺死的原是一個地痞冒著魚殼的名字在地方上橫行不法後來被官廳捉去正了法這真的魚殼反得逍遙自在只是常常想念女兒也曾到虯髯公家裏去訪尋過又因虯髯公帶著魚娘到京裏去了如今得在此相會真是喜出望外説起多虧虯髯公平日管教女兒魚殼連連拜謝又説起大仇已報大家便覺得十分快意五個人説得熱鬧獨把那少年放在一邊還是魚殼介紹他們見面説這位少年姓鄧名禹九是四川地方一個大財主專好結識天下英雄好漢豪商大賈如今魚殼也被他留在家中朝夕講論武藝盤桓山水十分投機當下鄧禹九便邀大家到他東莊裏去這東莊便在那五老峰下面蓋著兩百多間房屋養著五六百莊客都是懂得點武藝的這鄧禹九堂上還有老母自己年紀三十八歲還未娶得妻房他立志要娶一個才貌雙全的女子到今日還沒有他中意的人兒當日鄧禹九擺上筵席請他們父女夫妻師徒吃酒吃酒中間説起魚娘的武藝虯髯公便吩咐魚娘當筵舞一回劍給大衆下酒魚娘聽了便下來卸去外衣把住鴛鴦劍走到當地舞動起來起初只見劍光鬢影一閃一閃地轉動後來那劍光越轉得密了只見一團白光著地滾來滾去坐在席上的人只覺冷風淒淒寒光逼人鄧禹九看了忍不住喝了一聲好只見一道白光直射庭心那魚娘收住劍笑吟吟地走進屋子來屋裏衆人個個擎著酒杯對魚娘説一聲辛苦一齊吃幹了一杯酒這一席酒吃得賓主盡歡直到夜深才散這夜各自回房安歇獨有鄧禹九伴著虯髯公睡一房兩人在房裏説起魚娘的武藝那鄧禹九看看屋子裏沒有人便連連向虯髯公作揖求他做媒和魚殼説去要娶魚娘做妻子那虯髯公一口擔承拍著胸脯説這件親事包在老漢身上第二天虯髯公真的找魚殼替他女兒説媒去那魚殼也很願意只怕父女多年不見人大心大不知魚娘心下如何虯髯公便把四娘喚來把鄧禹九求婚的意思對他説了又托他去探問魚娘的意思四娘走到房裏先把丈夫打發開拉著魚娘的手兩人肩並肩兒地坐在床沿上低低地告訴他鄧禹九求婚和魚殼心中願意的話問他願意不願意魚娘起初聽了這話羞得他只是低著頭不做聲兒後來四娘催得緊了魚娘不覺掉下眼淚來四娘忙問時魚娘説道和姊姊廝混熟了只是舍不下姊姊我情願老不嫁人跟著姊姊一輩子豈不很好四娘聽了笑推他説道小妮子説孩子話呢你姊姊已嫁了丈夫了來去總得聽丈夫的意思如何由得俺們做主呢妹妹既捨不得我我帶著你姐夫常來看望你便了那魚娘只是搖著頭不肯又説那姓鄧的倘然有心叫他去了家鄉跟著姊姊一塊兒到湖南去住著四娘聽了拍著魚娘的肩頭笑説道妹妹説笑話了叫人撇下這莊田家産跟俺到湖南喝西北風去麼那魚娘一歪脖子説到不相干不去俺便不嫁四娘正在為難的當兒忽然蓉鏡從床後跳出來拍手笑道姊姊捨不得妹妹妹妹捨不得姊姊便是俺也舍不得妹妹如今俺把湖南的家去搬來在五老峰下住著給你們姊妹早晚見面妹妹總可以嫁了那魚娘聽了白了蓉鏡一眼説道俺嫁不嫁與你什麼相干你們串通一氣要逼俺嫁俺偏不嫁看你們怎麼樣接著四娘又説了許多好話又答應把家搬來陪他一塊兒住魚娘這時心裏雖然肯了嘴裏卻是不做聲低著脖子手裏只是弄著一方紅綢帕兒蓉鏡暗暗地向四娘呶一呶嘴又指指魚娘的手帕四娘會意劈手去把魚娘那方手帕奪來急遞給蓉鏡説道快把這手帕拿出去對師傅説俺妹妹已答應了拿這方手帕為憑叫師傅快去説媒去那蓉鏡接過手帕來轉身飛也似地跑去鄧禹九見魚娘答應了真是喜出望外準備選定吉日行禮那魚娘見事已如此便也無話可説只托四娘出來説定三個條件第一件父親住在鄧家要鄧禹九養老歸山第二件師傅虯髯公也要鄧禹九供養在家不可怠慢第三件姊姊四娘姐夫蓉鏡也要留他住在一塊兒那鄧禹九聽了件件答應一面打掃房屋安排魚殼和虯髯公兩位老人的住處一面在隔院建造房屋安頓朱蓉鏡夫妻兩人那蓉鏡又趕回家去把父親接上山來一塊兒住著到了魚娘的喜期那江湖上一班英雄好漢都趕來賀喜那院中擺下一百二十桌喜酒客人們吃得河枯酒幹盡歡而散要知後事如何且聽下回分解
