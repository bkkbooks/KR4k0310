body:
  text: 第一百五回麥壟中雲迷巫峽茅亭內雨潤高原卻說她慌不擇路地跑了多時高一步低一步險些兒將柳腰折斷好不容易走了半天才走到一塊芳草平地這一塊平原一眼望去足有三四裏寬闊青毿毿地夾著無際的菜花金黃得和朝霞一樣的還有許多不識名小鳥兒在草地上跳來躍去鳴著一種叫駡的聲音似乎它們知道她被歹人騙去複又逃出來的樣子還有幾棵細柳夾著桃杏排列四圍微風吹來送過許多的香氣她此刻正急急如喪家之犬漏網之魚哪里還有心去領略這些春色呢仍舊低著頭只往前走不多會耳朵裏突然沖著一股嘈雜的聲音她不由得粉頸一擡只見前面一帶杏林的左邊有許多十五六歲的小村童在那裏趕圍場呢她心中暗道我這樣的胡沖瞎撞地亂走究竟不是個長久之計終要問問人家回去從哪條路走才不致摸錯了路呢她打定主意便含羞帶愧地向這林子左邊走不多時到了林子裏面只見桃杏根下栽著許多的野薔薇針刺刺地遮得去路她正想轉道前去不料裙子似乎被人抓住一把她打了一個蹭蹬立定了倒是一噤連忙回頭看時說也好笑卻原來是一個鋸去的樹根將她的裙子絆住她驚出一身冷汗忙蹲下柳腰將裙子揭提在手裏走出樹外伸著粉頸四處盼望了一回瞥見順著這林子有一條遲寬的小道已被蕪草埋掩得半明半昧只留下一線路徑她便順著這條小道直向南走去不多時到了林子盡頭之處不覺足酸腿軟不能再走了試想她本是個深閨弱質從來沒有受過這樣的奔波這樣的驚恐無怪她疲倦得不能動彈了她還兀地不服氣偏生將銀牙咬了一咬複行向前面走去未到幾步渾身香汗嬌喘細細再也不能移動一步了她只得將手帕取了出來鋪在路旁的草地上她一探身往下一坐撩起袖子不住地在粉腮上拭汗她到了這會子才想起她的生身的老母來不禁珠淚兩行滴濕春衫微微地歎了一口氣道娘啊你老人家見你的女兒不見了不知要怎樣的傷心斷腸呢可恨這些賊子起心不良不知在何時將奴家騙到那牢獄裏去的她哽哽咽咽自言自語的一會子百無聊賴這時候一輪紅日漸漸地和遠山碰頭了那黃燦燦的光華反射過來映在她那一張粉龐上還挂著幾點牽牽的熱淚可真和雨後桃花一樣的她見日已含山天色漸漸地要入幕了暗自焦急道如此便怎麽好呢眼見快要入暮了舉目無親棲身何所呢而且這兩隻腿再也不能走了坐在這裏馬上昏黑起來冷風刺骨豈不要活活地凍死了麽就不凍死萬一遇到豺狼虎豹落草強徒也難逃性命了她想到這裏憂愁交集那一顆芳心中好似十五個吊桶打水七上八下惶恐的毫無一些主意停了一會只見日沒西山野雀兒撲喇喇的直向樹林裏爭先恐後地飛著蒼莽長郊登時起了一片白靄呈出一種真正的暮景來了她暗道不好不好此刻再不走難道真個坐在這裏一夜麽她說罷從地上按著盤膝慢慢地立了起來兩眼發花頭暈心悸趕緊按著心神閉著星眼定心一會才將芳心鎮住便展開蓮步進三步退兩步地向前慢慢地走去剛剛走到一棵夾竹桃的跟前猛聽得忽喇一聲飛出一個五色斑斕的東西來朝她怪叫兩聲騰空飛去她嚇得倒退數步閃著星眼隨著那個飛去的東西一望卻原來是一隻錦毛山雞她可是暗暗地又叫一聲慚愧正要向前走去猛的想起鋪在地上的那一塊手帕未曾帶來便又轉到原處那塊手帕不知去向她暗暗懊惱道這准是被風吹掉了且不管它先去問路去她重行向前邊走來不多一刻到了那一群村童的面前又要去問路又怕羞正在這進退兩難的當兒忽聽得一片笑聲震天價地喊道神仙姐姐來了神仙姐姐來了我們大家快些朝拜她她有仙桃仙果賞給我們呢你們趕緊跪下來罷說著一群的小孩子撲通撲通的跪下一彎來把個壽娥嚇得手足無措趔趄著金蓮只往後退那一群村兒之中有一個說道她要走了她要走了我們趕緊將她扯住不然她馬上就得騰雲上天了衆孩子聽這話一個個連忙從草地上一骨碌爬起來蜂擁前來七手八腳扯裙拉襖地將她纏住一齊央告道神仙姐姐請你不要走給我一人一隻仙桃果我們吃下去成了老神仙和你一同到天上玩耍如何壽娥見他們不分皂白硬將自己纏住不禁沒有主意喊又沒有用走又走不掉被他們纏得玉容失色粉面無光淚光點點嬌喘微微正在這萬分危急的當兒從後面突然有人喊道夥計們你們在這裏和誰打架啊說著飛奔到壽娥的面前壽娥忙展秋波仔細一看卻原來是兩個放牛的牧童頭戴箬笠身穿老藍布的直裰足登多耳麻鞋他兩個原是一樣打扮站在東邊的一個大約在二十左右生得伏犀貫頂虎背蜂腰面如古鏡雙目有神雖是粗妝淡抹那一股英氣兀自掩不下去愈是這樸衣素裳的愈顯出雄赳赳氣昂昂的樣子來站在西邊的一個大約總在十六七歲的樣子生得比東邊的一個還要來得俊俏目如朗星眉如漆刷面如傅粉粗看上去哪裏還像是田舍人家生的子弟簡直是官宦人家的後裔不說她在這裏打量再表那兩個牧童的來歷卻也很長一個二十左右的名叫薛雪兒那個十六七歲的名叫張慶兒他兩個都是寧圩的人氏只因爲家中困苦他們的父母養不起便賣給梁冀做螟蛉子這梁冀就是現在的梁太后的兄長漢順帝的大舅子他的爲人卻詭譎不正在順帝時代還安分些後來順帝駕崩他的老子梁商死了又當他的妹子梁太后臨朝攝政他便野心勃勃爲所欲爲他所做的事沒有一件不欺君罔上百官誰不側目相看無奈他的威重勢大根基深固所以百官敢怒而不敢言只得由他橫行霸道的了他見衆僚不去和他爲難越發目無紀律獨斷獨行順者生逆者死真個是第二個竇憲梁太后見他這樣的行爲不正每每欲按律治罪究竟礙著同胞情分不忍見他受罪而且他的威勢著實不小萬一他不服從豈不要急則生變了嗎所以粱太后沒有辦法只好閉一只眼睜一隻眼聽任他去這一來將個梁冀愈驕縱得不可收拾了鎮日價沒有別的事情專門占妻奪産剝削民資弄得天怒人愁怨聲載道他在洛陽左右共買沃田三百頃一班佃戶終年血汗無論多寡均歸梁冀受用從未和衆佃戶按地均分過一次萬一有了水澇旱災那班佃戶卻要倒楣了這梁冀收不到莊稼他不說是天災偏說是一班佃戶將他的種子偷去了鞭抽斧砍把一班佃戶打得沒處去叫屈辭還辭不掉只得伸長脖子受罪這梁冀除了以上這些惡事以外還有一種慘無人道的玩意兒便是那班佃戶誰家有兩個兒子便要送他一個給做螟蛉子在名譽上不是再榮耀沒有了麽可是內容卻不是這樣了他將這些人收了去二十歲以外的都派他們到各處開墾每日兩頓飯每頓飯三人兩碗還要限制每人每天一定要做及格的苦活如不及格一次便少吃一頓試想這些做苦工的人每天攤派吃四碗飯哪里還有力氣去做呢越是不做越晦氣不獨沒有飯吃那一班監工的魔頭還要任意毒打去了三個月不知道被他們打死多少餓死多少誰不是父母生養的那班佃戶怎能不傷心呢可是怕梁冀知道沒有性命連大聲都不敢哭出來眼淚往肚子裏淌還有一班未曾過二十歲的小童他們卻教他們去放馬牧牛組織許多的隊來一隊裏面有個首領管五十頭牛五十匹馬他們的待遇卻比較大人倒好些每日三餐四色小菜他們衣服也由梁冀賜給他爲什麽待遇這些小孩子反爾厚呢卻原來有個緣故他的心理想將這些小孩子一齊培養出來將來一旦用到他們都可以得著他們的真心二十歲向外的人隨便怎樣去優待他們總怕買不到他們的心因此就重小輕大了這薛雪兒與張慶兒本是這群孩子中的兩個正副首領他們這時正由村南走來領他們回去走到桃杏樹的旁邊瞥見一塊手帕雪白的鋪在草地上雪兒搶上去一把從地下抓起擺在鼻子上一嗅震天價的只嚷好香慶兒便伸手去奪雪兒飛也似地跑了慶兒隨後追來一直追到一群孩子跟前只見他們團團地圍著噪的笑的鬧得一天星斗雪兒慶兒近前仔細一看原來他們圍著一個年輕的女子只見那女子生得十分美豔萬種風流可是被一群孩子纏得粉面通紅淚抛星眼雪兒此刻不禁又憐又愛忙對衆孩子大聲喝道你們這些小狗頭作死了好端端的和人家鬧的什麽呢衆孩子見他們兩個到了嚇得頓時一齊放了手排班立著大氣也不敢喘雪兒問道是誰領頭和人家取鬧的趕緊說出來衆孩子到了這時好似老鼠見貓一樣頓時將那一股活潑天真的態度完全消滅了好似泥塑木雕的一樣垂手低頭動也不動慶兒道如果不說慪得我性子起來一個人給你們一頓皮鞭子看你們裝愚不裝愚咧孩子聽說這話嚇得你推我我推你大家都不肯承認雪兒道用不著推諉這主意一定是小癩痢出的衆孩子聽說便一齊指著那個小禿子說道是他是他雪兒又問道他說些什麽呢衆孩子搶著答道我們正在這裏趕圍場玩耍他憑空就喊神仙姐姐來了他又教我們將人家圍著要仙桃要仙果慶兒便走到那個小禿子面前還未開口那小癩痢頭聽他們說了出來已經嚇得尿撒在褲子裏面了見慶兒走過來更嚇得魂不附體撲通往下一跪閃著一雙烏溜溜的眼睛盯著慶兒一面伸手在耳朵旁邊打個不住慶兒喝道頗耐你這個小雜種無風三尺浪什麽花頭你都幹得出今天可又見你娘的什麽鬼他急得那張麻而且黑的臉上現出一重紫醬色的顔色來一面用袖子去揩鼻涕一面吞吞吐吐地說道二隊長不要怪我看見她和我家供的那個菩薩一般無二她不是菩薩變的麽慶兒和雪兒聽他這話不禁嗤的一笑便道既是這樣還好下次小心如再領頭闖禍就要打了那小禿子聽說這話連忙從地下一骨碌爬起來嘴裏連說不闖禍不闖禍再闖盡你打此時壽娥見他們這番做作不禁看呆了暗道這真奇了這許多的孩子見了他們怎的就這樣的怕呢想必是他們的長輩罷了她正自在那裏猜測瞥見雪兒從懷裏取出一隻亮晶晶的銅螺來放在嘴裏瞿瞿瞿吹了幾聲不多時許多的散繮的牛馬從四處奔來到了他們跟前說也奇怪一齊抵耳停蹄站在那裏紋風不動那些小孩子一個個猢猻似地飛身上去一人騎著一匹排行列隊向西慢慢地走去壽娥見他們要走便不能再緩忙向雪兒一招手雪兒見她招手忙趕過來問道你這位姐姐招呼我有什麽事嗎她瞥見他手裏拿著一塊手帕卻正是自己的便向他笑道你手裏的一塊絹頭原是我的請你還給我罷他笑道怎見得是你的她道我在南邊的樹林下面憩息的臨走就忘記在地上了他向她一笑將手帕往懷中一揣說道要想手絹是不容易了我且問你你從哪里來的現在要到哪里去你告訴我我便還給你她聽說這話才自提醒忙將問路的來意告訴與他他道媚茹村離開這裏有二十多裏呢現在天已晚了哪里來得及呢她皺眉不語雪兒便道姐姐你此地有親眷沒有她搖著頭道有親眷倒無須問你了他很爽快地答道那麽我看你今天是去不成了不如老實些隨我們去住一宵明天我送你回去好麽她早就看中雪兒了聽他這話趁口笑道那就感謝不盡了雪兒見她答應滿心歡喜便對她道姐姐你就跟我走罷她隨著他走了眼見前面的牛馬隊已去得遠了他兩個一前一後走了半天她突然要小解便提起羅裙走到一個土墩子的後面蹲下身子撒個暢快雪兒正走之間偶然不見了她心中好生詫異連忙回頭來尋找口中喊道姐姐你到哪里去了她答道我在這裏解手呢列位這孫壽娥她不是一個女子嗎難道就不知一些羞恥麽自己解手何必定要告訴雪兒呢原來她的用意很深諸位請將書合起來想一想包你瞭解她的用意了這雪兒雖生長十八九歲卻是一個頂呱呱的童子雞尚未開知識呢今天見了她不知不覺的那一縷小魂靈被她攝去了聽說她在那裏小解便大膽走了過來蹲下身子面對面又要說又不敢那一副不可思議的面孔實在使人好笑她還不是個已經世務的嗎見他這樣心中早已明白便向他說道兄弟現在天晚了早點走罷他吞吞吐吐地說道姐姐我要她嗤地笑道你要做什麽你儘管說罷這裏又沒有第三個人怕什麽羞她說罷乜斜著星眼朝他一笑把一個雪兒笑得骨軟筋麻不由得將她往懷中一摟她也不推讓口中說道冤家仔細著有人看見可不是耍的嘴裏說著手裏卻早就將下衣卸去了他兩個便實地交易起來正在這一髮千鈞之際猛聽得有人在後面狂笑一聲說道你們幹得好事啊他兩個人大吃一驚豁地分開雪兒定睛一看不是別人正是慶兒壽娥滿面羞慚低著頭恨不得有地洞鑽了下去慶兒哈哈地笑個不住雪兒忙道兄弟你也忒促狹了從哪里來的他笑得打跌道我早就看出你們倆的玩意來了現在也沒有別的話我馬上回去替你宣佈宣佈雪兒聽這話嚇得慌了手腳忙道好兄弟那可動不得你一吵出來我還想有性命麽他道這話奇了難道只准你做不准我說麽雪兒忙道好兄弟今天也是爲兄一著之錯千萬望你不要聲張你要我怎麽我便怎麽慶兒笑道那麽要樂大家樂不能叫你一個人快活雪兒沒口地答應就是就是只要你不聲張咱們兄弟分什麽彼此呢慶兒道光是你答應總不能算數還不曉得她的意下如何呢雪兒忙道我包她答應就是現在天也不早了你先回去將我們屋子裏的孩子們發放到別處去我們三個人一張床好麽慶兒點頭道好他說罷邁開大步飛也似地先自跑了回去這裏雪兒和她慢慢地走來不多一會到了一個所在一間一間的小茅亭中間一座極大的牛皮帳大約有一裏多路長在月光之下一眼望去裏面一式全是牛馬黑白相間煞是有趣走過牛皮帳到了一所茅亭門口早見慶兒立在門口向他們笑道你們來了麽我已將他們打發到別處去了雪兒便和她進去只見裏面擺好飯菜雪兒將門關好三人將晚飯吃過同攜手登床車輪大戰這正是石上三生圓好夢春宵一刻值千金要知後事如何且看下回分解
