body:
  text: 第一百六回釵墮玉樓將軍下馬嬌藏金屋佞賊銷魂話說壽娥和雪慶二人並睡一床其中的滋味過來人誰不會意真個青年稚子乍得甜頭黃花少女飽嘗滋味歡娛夜短永晝偏長曾幾何時又是紗窗曙色這時慶兒和壽娥交頸鴛鴦春眠正穩惟有雪兒心中忐忑深怕被衆孩子撞進來泄漏私情那可不是耍的忙喊她和他醒來誰知他們這一夜辛苦得過分了所以兩人一時總不能醒雪兒急了便用手將慶兒著力一揪慶兒啊喲一聲在夢中痛得醒了一骨碌坐了起來揉開睡眼只見雪兒笑嘻嘻說道你的膽也忒大了自己幹這些勾當還不知警防別人大模大樣地睡著了萬一他們走進一兩個來便怎麽得了呢慶兒笑道不知怎樣起首我倒十分精神後來就渾身發軟不知不覺地沈沈睡去要不是你來喊我揪我還不知到什麽時候才醒呢說時壽娥雲發蓬鬆春風滿面地也從被窩裏坐了起來雪兒笑道姐姐今天對不起你了她聽說這話乜斜著眼向他盯了一下子笑道不要油嘴滑舌的了趕緊起來送我回去不能在這裏再延挨了他忙道那個自然要送你回去啊她微微地一笑說道我真糊塗極了和你們在一起半天一夜到現在還不知你二人的名姓呢雪兒笑道你的芳名大姓我們倒曉得了你不提起我們竟忘記了姐姐弟弟的混喊一陣子如果下次再碰見姐姐弟弟還能當著別人喊麽我告訴你罷我姓薛名字叫雪兒他說罷又指著慶兒道他姓張名字叫慶兒她聽罷詫異地問道照你這樣說他姓張你姓薛不是嫡親兄弟麽雪兒含笑搖頭道不是不是但是我們雖然是異姓兄弟可是感情方面比較人家同胞弟兄來得好咧她道你們有父母沒有他笑道怎麽沒有她道既然有父母現在何不與父母在一起住呢他笑道你不知道她搶著說道我怎麽不曉得這一定是你們和父母的性情不合分居罷了他笑道不是這樣你這話也太不近情理了無論性情合與否但是我們的老婆還沒有呢就能和父母分居了麽她道那麽你們一定是逆子被父母逐出來的也未可知吧雪兒笑道更是胡說了我與慶兒現已成丁有什麽不好的去處被父母逐出還在情理之中但是還有那一班未到十六歲的衆孩子們他們也和父母分居難道也被父母逐出來的麽壽娥聽得不禁很詫異地問道怎的那一班孩子沒有和父母在一起住麽他笑道不曾不曾也是和我們二人一樣她搖頭說道這卻不曉得了雪兒便將梁冀的一番話原原本本地告訴與她她皺眉說道這梁冀也太傷天害理的了誰家不愛兒女偏是他依權仗勢的活活地教人家父子家人離散這事何等的殘酷但是你們何不逃走呢免得在這裏像獄犯似的何等難過雪兒聽她這話嚇得將舌頭一伸慶兒介面說道不要提起逃走還好提起逃走的一層事告訴你還要教你傷心呢去年有兩個孩子因爲想家回去住了十幾天不料被梁冀知道了活活地將那兩個孩子抓了去砍成肉泥你道兇狠不兇狠呢她道可憐可憐那些小孩子還未知人事呢殺了他們還未曉得是爲著什麽事情死得不明不白的豈不可歎但是我有句話倒要對你們說就是你們現在沒有什麽錯處他才待你們好一點如果度下去誰沒有一著之差呢到那時還愁不和他們一樣的麽你們與其拿性命換一碗飯吃吃得也太不值得了不如遠走高飛隨處都好尋得著生活何必定要拘在這個牢籠裏面呢他們一齊說道我們何嘗沒有這種心但是離了這裏至少要到五百里之外方可出他的範圍若是在他的範圍之內仍然逃不了我們到五百里之外舉目無親地異人殊又有什麽生活好尋呢她笑道那麽何不隨我一同回去呢在我府裏憑他是誰也不會知道的豈不是千穩萬妥麽雪兒笑道那就更不對了你們府上離開此地不過二十多裏路他的耳目衆多豈有不曉得的道理萬一他搜查起來還不是罪加一等到那時說不定恐怕連你還要受罪呢壽娥聽說將酥胸一拍說道請放寬心我們府上莫說是梁冀便是萬歲爺只要我們沒有做賊做盜誰也不好去搜查的萬一這梁冀搜查起來我自有道理你們且放寬心就是了雪兒便問慶兒道兄弟你的意下如何呢慶兒戀著她巴不得地忙答道妙極妙極事不宜遲說走便走省得被他們知道畫虎不成可不是耍的雪兒見他願意去自己也樂於附議三人略略地整頓開門便走這時殘星熒熒曉風習習霧氣迷浪春寒料峭雪兒領著他們認明了路徑直向媚茹村而來不多時那一顆胭脂似的紅日從東方高高升起霎時霧散雲消天清氣爽那郊外的春色越發日盛一日了他們三人一路上談談笑笑一些兒也不寂寞走到辰牌時候雪兒用手向前面一指說道兀的那前面的一座村落大約就是媚茹村了壽娥忙展目仔細一看只見自家的樓臺直矗矗立在眼前不禁滿心歡喜便對雪兒慶兒道那村西的樓房便是我家的住宅了你們看比較你們的茅亭如何雪兒見她家有這樣的闊氣不禁滿心歡喜忙道比較我們那裏高上不知多少倍數呢慶兒向她笑道你家這樣還不能算十分好最好要數我們那死鬼幹爺的府中了差不多除了皇宮金殿就要數他家的房屋爲第一了雪兒道且慢說閒話我倒想起一件事來了現在我們將你送到府上萬一有人問起來我們拿什麽話去回答呢壽娥笑道需不著你們多慮我自有道理說著離家不遠瞥見大門外面高搭著孝帳不禁大吃一驚暗道我家除了我們的娘也沒有第二個了莫非她老人家升天了麽她想到這裏不禁芳心如割禁不住兩眶一紅流下淚來你道是什麽緣故呢原來昨天童老太太得著信趕緊到觀裏只見那兩個道士臥在血泊當中連忙命家將搜尋整整地鬧了半天連一些影子都沒有倒抄出無數的女人用品來便料知壽娥凶多吉少了童老太太哭得肝腸寸斷到洛陽官府裏去告狀洛陽令見她來告狀當然不敢怠慢隨後命人將煉石觀所有的道士一併鎖起嚴拷了一頓那些道士吃不住刑遂一五一十地完全招了出來原來松月水雲自從到這煉石觀不知道害殺多少婦女了因此童老太太料她也難免了不禁心肝肉兒大哭一場回府便設靈祭奠左鄰右舍聽說壽娥被道士強姦害死誰不歎息說她是個官宦後裔三貞九烈的佳人死得實在可惜一時東村傳到西村沸沸揚揚喧說不了這時壽娥進了村口把一班鄰居嚇得不知所云都說她一定是魂靈不散回來顯魂的了頓時全村皆知膽大的墊著腳兒遠遠地張望膽小的閉戶關門深怕她僵屍早有人飛也似地跪到州府去報信童老太太正在她靈前兒天兒地的痛哭聽見這個消息再也不肯相信扶著丫頭正要出門去瞧望個究竟瞥見門外走進三個人來爲首一個卻正是壽娥衆賓客正自上席吃得熱鬧的時候猛地見她回來不約而同的一噤忙道今天日腳不好僵屍鬼來了快些逃呀一聲喊人家爭先恐後地一齊向後逃去有的往桌肚裏鑽頓時桌翻椅倒乒乒乓乓的秩序大亂惟有童老太太一毫不怕顫聲問道兒呀你是活的還是死的如果死了千萬不要如此驚世駭俗的鬧得別人不安愈增你自己的罪過爲娘的已經替你伸冤超度了壽娥見此情形才知大家誤會了忙道娘呀你老人家不要悲傷女兒沒有死啊童老太太又驚又喜地問道心肝你果真沒有死麽她忙將出險遇救的一番話說了一遍童老太太喜得險些瘋了忙命人將孝帳撤去靈牌莫物一齊燒了這時衆人在後面聽得果然沒有死才敢出來你問我答的一陣子才曉得她逃出來的真相大家不禁讚歎一番各自要走童老太太誰也不准一面將他們留下一面派人去將全村的人全請來大排宴席酬謝他們挂念之恩宴散後大家回去童老太太便對壽娥道這兩位哥兒是你的救命恩人千萬不能怠慢人家的忙命人取出些上等絹緞的衣服替他們換了一個新壽娥見他們換了新衣愈顯出十分清秀英俊來果然人是衣裳馬是鞍子她不禁將愛他們的熱度無形中又高了百尺由不得對童太太說道太太你老人家知道麽我與他們已經結爲兄妹了童老太太聽說這話更加歡喜忙將他們摟到懷中笑道我哪世修的憑空的得著兩個粉琢玉砌的兒子我什麽都不要了她說罷呵呵大笑那一種得意的情形簡直描不出來到了晚間壽娥早命人在她的樓下收拾出兩個房間來給他們住明修棧道暗渡陳倉其中的暖昧情事我也不能去細說了再表梁冀停了幾天奉旨到洛陽調查戶口從寧圩經過當有人將慶雪兩兒逃走的話報告與他梁冀倒十分注意因爲他在衆孩子之中最歡喜的就是他們二人聽說他們走了好生著急忙派一班爪牙在四處尋訪未上三天竟被他們訪著了便去報知梁冀梁冀更不怠慢帶了一隊人直撲縣府而來進了媚茹村就有一個侍尉向他說道將軍你知道這孫府是何人梁冀道不曉得他道便是老王爺面前的首輔大臣孫扶梁冀聽說是孫扶的府卻也暗暗地吃驚轉想自己威勢便不怕了而且孫扶早已死了他想到這裏毫無顧忌領著衆人一徑闖進孫府命人搜查童老太太不知何事忙出來喝道何處野人竟敢闖到我家來亂動那些侍尉揚聲答道你休問我我們是驃騎大將軍部下的侍尉聽說你家私藏人犯我們特地來搜查的說話時梁冀挺著肚子騎著高頭大馬一直闖到百客廳前揚眉問道搜到沒有話還未了只見衆侍尉簇擁著雪兒慶兒從裏走了出來他兩個見了梁冀嚇得魂飛天外魄散九霄趕緊一齊跪下梁冀冷笑一聲也不說話只道好好帶了走童老太太忙趕來討回早被侍尉攔住這時壽娥正在樓上早妝得了這個消息她卻早打定主意不慌不忙地走到欄杆的旁邊閃著秋波一看只見梁冀坐在馬上正在那裏指著衆人要走了她心生一計忙在頭上拔下一根金釵往地下一抛正抛在梁冀的馬前當的一聲梁冀先是一驚接著又聽得鶯聲嚦嚦地喊道小梅我頭上的釵落下去了你趕緊下去給我取上來梁冀聽得這種妙音不由得心神皆醉由不得仰起面來一看把個梁冀看得眼花繚亂噤口難言不禁脫口叫了一聲好她乜斜著星眼朝他一瞟連接著又是嫣然一笑冉冉地退到裏面去了梁冀此時三魄少二七魄去五趕緊飛身下馬將那落在地下亮晶晶的一支金釵搶到手中上馬帶著衆人便走到了洛陽急不能待便請洛陽縣前去求親童老太太勃然大怒道我家世世清白代代忠良誰肯和這欺君罔上的狗奸賊做親呢請你回去對他說叫他趕緊將念頭打斷少要妄想罷她說到這裏洛陽縣滿臉堆下笑來對她說道請太太不要動氣下官有一言奉勸梁將軍今天來吵鬧府上惹太太生煩不安他心中很抱歉的可是偏巧又得著你家小姐的金釵在他的意思以爲是天緣巧遇他家中雖有許多的夫人卻缺少一個正室所以他很願意高攀如果太太答應隨要多少奠雁總不缺少在下官的意思還請太太答應罷梁將軍的威勢你老人家又不是不曉得的童老太太聽罷越發火上加油厲聲罵道放你娘的屁梁將軍熱將軍的老身沒有這些眼睛看見我家女兒莫說不和他結親即使和他結親誰道我沒有看見過他那幾個臭錢麽莫雁奠鵝的又不是賣給他的趕快給我滾出去不要慪得我性起先將你這狗頭打了一頓然後再去和他拼命洛陽縣被她罵得一佛出世二佛升天開口不得忙起要走這時屏風後面轉出一個人來蓮步婷婷走到童老太太面前折柳腰施了一個常禮啓朱唇對童老太太道方才這位縣大人的來意你老人家誤會了他本是好意女兒倒請母親平平氣三思而行罷洛陽縣見了她便料知一定是壽娥了不禁暗暗喝彩道不怪粱將軍這樣戀慕果然是個絕色的女子又聽她說出這兩句話來不禁心中大喜接著童老太太說道兒呀依你的意思怎樣她便老老實實對洛陽縣說道可煩你回去對梁將軍說要想我和他結婚須准我三件事如有一件不遵趁早不要癲狗想吃天鵝肉洛陽縣聽罷忙道哪三件事請道其詳讓下官好回去答復她道第一件貴縣方才說他沒有正室這句話我是絕對不相信他如不想和我結婚隨他有沒有我都不管既想和我結婚不是正室趁早休提洛陽縣忙道這頭一件我可以替他代准了因爲他自己說的請講第二件她道第二件教他趕緊將慶雪二人送到我家成婚之後還要稱他們爲舅爺第三件我們老太太年紀高了並且就是生我一個人一個月裏至少要在家裏住十天別的話也不要煩屑了請縣太爺回去複罷洛陽縣忙答應出門回到洛陽將以上的話說了一遍梁冀道這三件之中我答應了二件半還有半件我卻不能答應的洛陽縣忙問道哪半件呢他吞吞吐吐地說道這第二件忒也爲人所難了這雪兒慶兒本是我的義子我怎能叫他們做舅子呢將他們放了倒辦得到可是照她的話一定要實行喊舅子未免太也難爲情了洛陽縣聽他這話拍手大笑道將軍此話錯極了既能放了何不先爽性去答應她等到成婚之後答應不答應喊與不喊還不是隨你麽梁冀聽了心中大喜便道畢竟還是你的見識高我真及不來你還煩你的清神替我就送齎奠雁聘禮前去擇定三月初七吉日洛陽縣道下官替將軍將媒做成功之後有什麽酬勞呢梁冀將胸口一拍道你放心就是了事成之後少不得另眼看待就是了洛陽縣歡歡喜喜地買了許多彩銀爵和金帛等徑送到孫府上將梁冀的話又說了一遍童老太太本來最疼愛她的女兒今見她自己答應便也順水推舟地不加阻止了飯後梁冀連忙將雪兒慶兒親自送到孫府又在童老太太面前磕頭謝過童老太太雖是一個正直無私的人到了這時也沒有什麽話了而且又溺愛女兒足見是個婦道毫無成見的光陰過得飛快一轉眼到了吉期了車水馬龍自有一番熱鬧成親之後倒十分恩愛打得火熱不能稍離一時可是壽娥哪里是和他真心廝守的不過爲著雪慶二人不得不犧牲自己的色相與他去敷衍但是每月至少要在家裏住上半個月和雪慶二人尋樂不料事機不密這風聲漸漸有一些傳到梁冀的耳朵裏勃然大怒立刻派人將她帶轉來見了面可是那一股無名火早已消滅於無何有之鄉了這正是豔色確能迷鐵漢柔情鋒利勝鋼刀要知後事如何且看下回分解
