body:
  text: 第九十五回妖態逼人難爲長舌婦忠言逆耳斷送老頭皮卻說黃門侍郎竇篤依官仗勢居然不准檢查而且滿口狂言任意亂罵惱得霍延火起厲聲喝道來人給我將這狗官抓下馬來話說未了早擁出數十武士你一拉我一扯不由得將一個竇篤拖下馬來那竇篤還不知厲害潑口大罵道好狗頭膽敢來和老爺做對頭好好好今天看你怎麽樣咱老子就是了霍延聽罷幾乎將腦門氣破大聲罵道好奸賊你過午從止奸亭經過膽敢不服王命拒抗搜查還滿口胡言老爺們當真懼怕你這狗官的威勢麽衆士卒他嘴裏再不乾不淨的就給我打將這奸賊打死了我去償命那竇篤眼睛裏真沒有這個小小的亭長了聽他這話更是怒駡不已那些士卒還不敢毅然動手霍延大聲說道你們剛才難道沒有聽見我的話麽那些士卒這才放大了膽將竇篤按住在地上你一拳我一足將個竇篤打得掙扎不得這時早有人去報知周紆了周紆聽說這樣的事情趕緊飛馬來到止奸亭瞥見衆士卒將一個竇篤已經打得動彈不得了他忙下了坐騎詢問情由霍延便將以上的一番情形告訴與他他冷笑一聲說道他們這些王公大人眼睛裏哪還有一個王法呢竇篤見了周紆便說道爺爺你好你仗著你九城軍馬司的勢力來欺壓我麽好好咱現在和你沒有話說明天上朝再和你這匹夫見個高下就是了周紆微微一笑道侍郎大人請不要動怒只怪他們這些士卒太也狗眼看人低認不得侍郎大人並且膽有天大竟敢來和侍郎大人作耍要是卑職在這裏見了大人應當早就護送到府上了哪里還敢檢搜呢這也許是這班士卒依官仗勢目無法紀罷了但是還有一層要請大人原諒他們奉著上司的旨意不得不這樣做的所以就得罪了大人了竇篤含嗔帶怒地苦著臉說道周紆你縱使手下爪牙毆辱朝廷的命官還來說這些俏皮話麽好好管教你認得咱家厲害就是了周紆冷笑一聲說道侍郎大人打已經打過了自古道推倒龍床跌倒太子也不過一個陪罪罷了侍郎大人還看卑職的面分上得過且過罷竇大人卑職這裏賠禮了他笑嘻嘻地躬身一揖這一來把個竇篤弄得又羞又氣又惱又怒勉強從地上掙扎起來爬了半天好容易才爬上了馬對周紆說道周紆你也不必油腔滑調的了咱家也不是個三歲的小孩子苦頭吃過了難道聽了你這兩句甜蜜話就和你罷了不成周紆笑問道依侍郎便怎麽樣呢他剔起眼睛說道依我怎麽樣是和你一同去見萬歲評個是非周紆笑道照這樣的說大人一定要與卑職爲難了他道你這是什麽話呢我與你河水不犯井水你偏要使手下來和我作對我也沒法只好去到萬歲面前見見高下了周紆笑道當真要去麽在卑職看起來還是不去的爲佳他大聲說道誰和你在這裏牽絲扳藤的咱家先得罪你了他說罷帶轉馬頭正要動身周紆對他笑道大人一定要去卑職此刻還有些事情未曾完畢沒有空子陪大人一同去只好請大人獨自去罷他在馬上說道只要聖上有什麽是非下來還怕你逃上天去不成周紆笑道那個是自然的竇篤一馬進了禁城到了午朝門口下了馬一跛一顛地走了進去那一班內外的侍臣見他被人家打得鼻塌唇歪盔斜袍壞不由得一齊問他究竟他大聲對衆侍臣說道周紆領著手下爪牙把守在東門外的止奸亭裏我走到那裏他們便不由分說將我拖下馬一頓毒打你們看這班人還有王法嗎不是簡直就反了麽衆內外侍臣一個個都替周紆捏著一把汗暗道周紆膽也忒大了誰不知道竇家不是好惹的偏是他要在虎身上捉蟲子不是自己討死麽不說大家暗地裏替周紆擔憂再說他一徑入了坤甯宮在章帝面前哭訴周紆無禮毒打大臣的一番話說了一遍滿想萬歲就傳旨去拿周紆問罪誰知章帝聽他這番話不禁勃然大怒呻吟著緊蹙雙眉對竇篤說道我問你你既做一個黃門侍郎難道連王法都不知道麽你可曉得那止奸亭是誰立的他連忙答道微臣怎麽不知道呢那是萬歲的旨意搜查過午出禁城的官吏的不過微臣今天回去遲了他們一定要搜查我也沒有說什麽他們便一些也不講情理一味蠻橫將微臣毒打一頓這事一定要求萬歲替微臣伸冤他說罷一把鼻涕一把眼淚地哭個不住章帝聽他這一番啓奏不由得向他說道卿家剛才這番話未免忒也強詞奪理了我想那周紆與你又沒有什麽深仇大怨的他又何必這樣要與你爲難呢而且你好端端的給他查搜他又不是個野人就能這樣的無禮舉動麽竇篤聽得章帝這番話真是出於他的意料之外不禁滿面羞慚半晌無語章帝又向他說道卿家你今天先且回去誰是誰非孤家自然要派人打聽清楚如其照卿家的話周紆無禮毆辱大臣那周紆當然要按律治罪萬一不是那麽卿家也不得輕辭其咎的他這番話說了把個竇篤嚇得面如土色忙道我主容稟微臣並非有意與周紆尋隙不過他這番舉動未免過於蔑視人了還請萬歲訓斥他一番叫他下次萬不可再這樣橫行霸道的就是了微臣也不記前仇深願和他釋嫌交好未識我主以爲如何呢章帝早知是他的不是故意說道周紆目無王法殊屬可殺那麽孤家一定要調查根底究竟誰是誰非都要照律治罪以儆效尤的他知道非言語所可挽回只得忍氣吞生怏怏地退了出去這且慢表再說章帝被他麻煩得頭昏腦脹見他走了正要躺下去靜養靜養瞥見六宮總監魏老兒立在榻前滿面怒容章帝心中不禁暗暗地納罕問道老公爺到這裏莫非有什麽事情麽魏西聽見章帝問話喘吁吁地雙膝跪下口中說道我主萬歲微臣有一事冒死上瀆天顔微臣自知身該分爲萬段但是老奴受我主累世鴻恩不能欺滅主公寧可教老奴碎屍粉骨這件事一定是要奏與我主的章帝猛聽得他這番沒頭沒尾的話倒弄得十分疑惑莫名其妙連忙說道老公爺有什麽事儘管奏來孤家斷不加罪與你的他便將竇娘娘的一套玩意兒一五一十整整地說個爽快把個章帝氣得一佛出世二佛升天大叫一聲昏厥過去這時將一班宮娥彩女嚇得手忙腳亂忙上前來灌救停了半天章帝才回過一口氣來微微說了一聲氣死我也按下慢表再說大竇與能兒正幹到一髮千鈞的要緊時候猛聽得外面有人走了進來大竇不禁大吃一驚忙教能兒快些放手誰知能兒正自弄到得趣的時候哪里肯毅然放手呢就是後面有一把刀砍來他也不鬆手的說時遲那時快門簾一掀從外面鑽進一個頭來大竇仔細一望那人一縮頭一陣腳步聲音又出去了她到了這時心慌意亂伸手將能兒往旁邊一推說道冤家你今天可害了我了能兒忙坐了起來趕緊先將衣服穿好然後又替她將衣服穿好向她問道娘娘方才那人是誰我沒有看得清楚她苦著臉答道此番好道休也還只管的什麽呢能兒忽然向她笑道那人一定不會去泄漏我們事情的她閃著星眼向他一瞅問道你難道認得他麽能兒道他不是化兒麽大竇道啐如果是化兒我還這樣的著急做什麽呢能兒道除卻化兒還有誰呢她道你只管貪著眼前的快活你還問日後麽他就是六宮總監魏老頭兒他聽罷不禁倒抽一口冷氣忙道這便怎生是好呢她道可不是麽此番我們的隱情被他窺破還想他不去泄漏恐怕也不能夠了萬歲如果知道這樣的玩意兒你我二人還怕不作刀下之鬼麽他道娘娘這事我倒想出一個法子來了她道你想出什麽法子來呢他道現在橫豎我們隱情被他揭破了不如索性使一條計反過頭來咬他一口倒也值得些她道但是想出一個什麽法子去反噬他呢能兒停了半響才說道那麽只好說他調戲娘娘的了她聽罷不禁嗤地笑道笨貨你這個規矩都不曉得麽他道管他娘的只是他要我們的命我們也只好用這條計抵抗了她道呸如果照你的話去做真是自尋死路了他道你這是什麽話大竇掩口苦笑道他們內監都是有本無利的人怎樣來調戲我呢我要是用這話去抵抗萬歲還肯相信麽他聽說這話心中更不明白忙道什麽叫做有本無利呢她道笨貨我被你纏煞了你生了十八九歲難道這有本無利還不知道他將頭搖得撥浪鼓一般地說道委實不知道她道他們的陽物全被割去了沒有那東西還想這個事情麽他不禁笑道原來如此我還在鼓裏呢既是這樣再想別的法子去對待他便了她道火到眉頭這不能再緩了你快到妹妹的宮裏暫且安身不要抛頭露面免得被他們看見露出破綻來反而不美我自有法子將這個老賊結果就是了她說罷便與能兒下床分手不說能兒和化兒在望荷亭前碰見了一同回到留風院去的事情再說大竇一徑向淑德宮而來還未到淑德宮只見一群宮女一齊過來施禮說道萬歲請娘娘回宮她聽說這話心中早已明白微微點首挾著宮女慢慢地走到坤甯宮門口取出手帕著力在眼上揉擦了一陣子那一雙杏眼登時紅腫起來她到了章帝的榻前盈盈地折花枝跪下嬌啼宛轉粉黛無光口中直嚷萬歲救命那章帝本來是一腔怒氣不可遏止恨不得將她立刻抓來砍爲兩段才泄胸中的醋火及至見她進來雙眼紅腫得和杏子一般粉殘釵亂不禁將那一股醋火早消了一半又聽得她鶯啼嚦嚦更覺楚楚可憐便將那氣忿欲死的念頭消入於無何有之鄉了最後又聽得她口中連喊救命他不禁十分驚訝地說道梓童快些平身有誰敢來欺你快些奏來孤家自有道理她哭道妾身自萬歲龍體欠安恨不能以身替代何日不提心吊膽滿望萬歲早日大瘳治理國事以免奸佞弄權萬民顛倒詎料災星未退雖日有起色可是未能一旦霍然妾身何等的憂鬱今天逢著黃道吉日妾身想到濯龍園素香樓上去替萬歲祈禱不想步到濯龍園口迎面碰見六宮總監魏老公公他就問我到園裏去作著什麽我說到素香樓牟尼佛的像前去求福消災他便大聲說道萬歲有旨早就不准人進去了等待萬歲爺病好了再進去不遲的我道萬歲從未下過這個旨意而且我今天專爲萬歲才來的他道憑你說難道我們就算了嗎無論如何今天是不准進去那時也怪賤妾說錯了一句話就是說這園子是我家的難道就讓你們這些奴才擅自作主麽我說罷他便指手劃腳地向我說道我們奉了萬歲的旨意誰也不准去的你說你自家人這三宮六院七十二妃誰不是自家人難道是外人不成你不過做了幾天皇后就想依勢來壓迫我老魏了麽老實說一句休要說你這個皇後便是萬歲什麽事還要讓我三分呢我魏老兒從進宮陪伴漢家三代了就是老王爺太王爺還沒有一件事不信我呢我到了晚年難道反來受你們的鳥氣麽憑你是誰今天都不准進去的你要是回去告訴萬歲休要帶著別人就說我魏老兒阻止的橫豎我在這裏守候著就是了我聽了這番話不由得心中生氣便責問道難道你們這起人不知國法麽他便對那班手下的宮監說道將她趕出去誰耐煩和她嚕蘇再在這裏纏不清給我打那一班宮監誰不是如狼似虎的一齊擎著兵器便奔我來那時我嚇得魂落膽飛放步回頭逃命幸虧衆宮女將我扶出來不然今朝還不是活活地被他們打死了麽萬歲爺你老人家不替賤妾伸冤賤妾的性命也不要了她說罷拉起羅裙遮著粉臉立起來故意就要撞了嚇得章帝手足無措忙喚宮女將她死力扯住章帝連呼道反了反了頗耐這個老賊竟懷著這樣的野心呢怪不得他方才在我的面前一派花言巧語孤家險些上了他的算梓童請且息怒孤家自有道理管教你消氣就是了她嬌啼不勝地說道賤妾今天受了奇恥大辱倒沒有什麽要緊只恐怕這些目無法紀的叛徒膽子越大到了那時還不襲取漢室的江山麽章帝忙道娘娘請保重玉體孤家自有定奪他忙向內侍臣說道快點將這老賊和園內的宮監一起傳上話猶未了兩旁內侍轟雷也似的一聲答應不多一會將魏總監和十六個守園的太監一併傳到章帝見了魏總監不由得怒髮衝冠用手一指厲聲大罵道你這個老賊無法無天膽敢目無法紀衝撞娘娘漢家待你哪樣虧負我竟這樣的失心瘋了自己闖下滔天大禍還不思改過反來花言巧語噬咬別人天理難容國法何在來人給我將這老賊捆去砍了話猶未了早擁出幾個武士來鷹拿活鵲般將魏總監抓了就走那魏總監毫不驚慌從容地仰天笑道我早就料到有此一出了不過我這樣的死了也好去見太王爺老王爺于九泉之下了爲人還是宜乎存心奸詭反能夠活壽百年像我這樣的憨直居然伴了三個皇帝活了六十多年這一死也就不枉了萬歲老奴今天和你老人家長別了他說罷被衆武士擁出了午門刀光一亮可憐一縷忠魂早到鬼門關去交帳了再說章帝又命將十六個守園的內監一齊收禁竇娘娘見衆武士將一顆血淋淋魏總監的白頭提了進來心中早已如願了又見章帝要收禁內監不禁強盜發善心忙上前奏道欺君罔上罪在魏總監一人如今他已明正典刑也就算了萬歲可格外施恩饒恕他們初犯帶罪任事就是了她說了這番話章帝一連說幾個是忙吩咐衆人教他們給娘娘謝恩可憐那些人沒頭沒腦地被抓得來只見魏總監未曾說了幾句話立刻身首異處不禁一個個三魂落地七魄升天料知事非小可後又聽見章帝吩咐命將他們收禁一個個不知深淺渾身抖抖地動個不停沒奈何只得引頸待命不想憑空得著竇娘娘的幾句話竟赦了他們的罪誰也感激無地了便一齊向竇娘娘施禮拜謝高呼娘娘萬歲竇娘娘到了此刻心中暗喜道這也落得替他們講一個人情這一來他們誰敢出我的範圍了向後去還不是聽我自由麽她想到這裏不禁喜形於色對衆人說道姑念你們無知初犯所以萬歲開恩赦了你們但是你們向後去都要勤謹任事不可疏忽致加罪戾衆人沒口地答應著退了出去章帝見衆人走了之後不禁滿口誇讚道娘娘仁義如天真不愧爲六宮之主了她正要答話瞥見一個宮女慌慌地跑了進來大聲說道不好了不好了這正是總監方爲刀下鬼宮娥又訴腹中冤要知後事如何且看下回分解
