body:
  text: 第九十二回園丁得寵薔薇花下廚役銷魂翡翠衾中卻說兩個侍尉將他們的屍首用被褥裹好拖到後園用土掩埋不提這時竇憲對杜清說道你將這裏的血迹打掃乾淨替我將那些禿驢完全趕了出去用不著他們在這裏鬼混杜清忙道動不得千萬不能這樣的做法明天娘娘駕到見這裏一個和尚沒有不怕她責問麽再則你現在將小法師殺了他們還不知道呢如果你突然要將他們趕出去不是顯易被他們看出破綻來嗎我看千萬不能這樣做法只好多派幾個人在前面監視他們不會再有什麽意外之事發生了竇憲翻一回白眼說道依你這樣的說我是不能趕他們的了他道動不得只好忍耐幾天罷了竇憲說道既如此你替我派幾個人暗地偵視他們便了他說罷回房而去杜清一面將房裏的血迹打掃乾淨一面又派好幾個人去暗裏頭偵視一群和尚再說那些放焰口幾個和尚一個個打了半天瞌睡都醒了敲著木魚金磬嘴裏哼著不多一會敲鼓的和尚回頭一看不見了小法師不禁大吃一驚暗道他到哪里去了敢是去登廁了麽我想他是一個法師理應知道規矩才是個道理難道這台焰口還未放完就能去登廁了麽我想決不會的他順手向後面的一個和尚一搗那和尚正在打盹被他一搗不禁嚇得一噤揉開睡眼大聲念道嘛咪吽嘛咪吽這敲鼓的和尚忙悄悄地說道喂你可見正座的小法師到哪里去了那和尚聽他這話用手向背後一指說道不是坐在上面嗎敲鼓的和尚用嘴一呶說道你看看哪里在這裏呢那和尚回頭一看果然不見正座的小法師坐在那裏了不禁很詫異地問道這可奇了到哪里去了呢這兩句話聲音說得大一點了將衆和尚都驚動了不約而同一齊朝正座上一望一個個目瞪口呆不知所措面面相覷了半天那敲木魚的和尚猛地跳起來對大家說道我曉得了這小法師一定不是凡人恐怕的羅漢化身來點化我們的也未可知他現在騰雲走了衆和尚聽他這話有的念佛有的合掌有的不信嘰嘰咕咕在那裏紛亂不住又有一個和尚說道方才靜悟大和尚這話未免忒也不符他既是個神僧還吃煙火之食麽我想他一定是個騙吃騙喝的流僧他怕這台焰口放不下來趁我們打盹他輕手輕腳地逃走了也未可知又有一個和尚極力辯白道你這話未免太小視了人連我們方丈都十分恭敬他如果他是個流僧我們方丈還這樣的和他接近嗎那敲鼓的和尚說道如今他既然走了管他是個好和尚壞和尚但是我們這裏沒有了正座這焰口怎樣放法萬一被人家知道了便怎樣辦呢大家道這話不錯我們趕緊先舉出一個正座來遮人耳目才是正經說罷你推我我請你地謙虛了一陣子結果那個敲鼓的和尚被他們選出來做正座馬馬虎虎將一台焰口勉強放了到了天亮那方丈主持一齊走了進來見小法師不在裏面忙齊聲問道小法師到哪里去了衆和尚一齊撒謊答道我們放到半夜子時的時候小法師頭上放出五彩毫光腳上生出千朵蓮花將他輕輕地托起騰空去了那主持方丈便合掌念道阿彌陀佛我們早就知道這小法師是個神僧了正在說話之時竇憲從裏面走來方丈和尚連忙上前來打個稽首地他說道恭喜老王爺洪福齊天他老人家歸西竟有神僧前來超度還愁他老人家不成仙成佛麽就是大人將來也要高升萬代的竇憲猛地聽他這些話倒弄得丈二的金剛摸不著頭腦忙問他什麽緣故那方丈連忙將夜來衆和尚看見小法師飛騰上天的一番話告訴竇憲竇憲才會過意來不禁點頭暗笑也不回話不多會早有飛馬進來報道娘娘的鑾駕已出宮門了趕緊預備接駕要緊竇憲聽說忙去安排接駕泚陽公主帶著衆姬妾迎出孝帳俯伏地下停了一會只見羽葆執事一隊一隊的慢慢近來隨後音樂悠揚擁著兩輛鳳輦鳳輦前面無數的宮嬪彩女一齊捧著巾櫛之類緩緩地走到孝帳面前泚陽公主連忙呼著接駕竇娘娘坐在前面輦上見她母親接駕趕緊下來用手將她攙起口中說道孩兒不孝服侍聖躬無暇晨昏定省已經有罪何敢再勞老母前來接駕豈不是將孩兒折殺了麽小竇貴人也跟著下了輦與她母親見禮母女三個握手嗚咽默默的一會子竇憲又趕出來接駕接著那些姬妾跪下一大堆來齊呼娘娘萬歲竇娘娘一概吩咐免去方與泚陽公主一同進了孝帳舉哀致敬將諸般儀式做過竇娘娘便隨她的母親妹妹一齊到了後面這時有個背黃色袱的官員飛馬而來到了府前下了馬一徑向孝堂而來走到孝堂門口口中喊道聖上有旨並挽額前來致祭大司馬快來接旨竇憲忙擺香案跪下來接旨那個司儀官放開黃袱取出聖旨讀了一遍又將祭詞奏樂讀了然後許多的校尉指揮禦林軍找著一塊沈香木的匾額並許多表哀的挽聯竇憲三呼萬歲謝恩司儀官便告辭領著校尉禦林軍回朝而去這且不表再說大小兩竇進了內宅和她的母親以及竇憲的夫人談了一會子小竇笑道媽媽我們那裏好像坐牢的一樣一步不能亂走真是氣悶極了在人家看起來表面上不知道要多少福分才能選到宮裏去做一個貴人呢其實有什麽好處鎮日價的冷冷清清一點趣味也沒有反不及我們家來得熱鬧呢泚陽公主笑道兒呀你們這樣的高貴要什麽有什麽還這樣的三不足四不願嗎大竇笑道她還這樣怨天怨地的呢要是像我這樣的拘束你還要怨殺了呢話都不能亂說一句小竇笑道我究竟不解平常百姓家生個女兒一年之內至少也要回來省望一兩次從不像我們一進了那牢三年多了兀的不能回來望望泚陽公主笑道我兒你真呆極了你可知道你是個什麽人呢就能拿那些平常人一般比較了麽你們卻都是貴人了小竇笑道什麽貴人簡直說一句罪人罷了無論要做甚麽事情全受盡了拘束一點不得自由自便的大竇笑道你看她這些話可有一句在情理之中你既不願做貴人難道還情願做一個賤人麽小竇道你倒不要說尋常人家一夫一妻的多麽有趣不像我們三宮六院的而且見了他都要跪接這些事最教人不平的大竇笑道罷呀休要這樣的不知足罷你拿梁宋兩個比較比較我包你不再怨天尤人了人都不可以任意說沒良心的話萬歲對於我們還不是言聽計從的麽小竇正要答話忽見一個侍尉走進來說道現在道場擺齊了請娘娘貴人太夫人去做齋大竇聽了這話便向小竇使了一個眼色小竇會意連忙對泚陽公主說道姐姐的身體不大好我也懶懶的請太太前去罷讓我們舒舒服服地住一天明天就要回宮了泚陽公主聽了這話忙道那裏做齋自有我去用不著你們了她說著便起身帶了一群的姬妾徑到前面去做齋了小竇便對那些宮女說道這裏到了我們的家裏自然有人服侍我們用不著你們在這裏侍候了你們可以退出去隨意去遊玩罷那些宮女隨即謝恩退了出去這裏只有大小兩竇大竇悄悄對她說道妹妹難得我們有這樣的好機會回來千萬不能失去都要想出一個法子來將那兩個弄進宮去要怎樣便怎樣豈不大妙列位她說了這兩句話你們一定又要生疑了那兩個究竟是誰呢小於也好趁此交代明白了原來這大小兩竇未曾選到宮裏的時候在家裏本來是個風騷成性的人物又見她的哥哥成日家抱玉偎香受盡人間豔福不知不覺的芳心受了一種感觸但是她們家候門似海沒事不能看見一個人雖然有意尋春無奈沒法可以任意選擇一個如意的郎君大竇究竟比小竇大了兩歲那勃勃欲動的一顆芳心早就有了主見她們廚房的大司務共有十六個內中有一個名叫江貴的生得倒也不錯年紀約在二十以內她卻有心和他勾搭不到三月居然就實行做過那不見人的調兒了他們一度春風之後真是如膠似漆再恩愛沒有了可是家中除了小竇以外卻沒有第二個知道有這回事的小竇見他們打得火一般的熱不禁也眼紅便在僕從身上留心暗暗選了多時終於沒有一個看得上眼的有一天無意走到後面園裏去散悶瞥見有一個人蹲在玫瑰花簇子那邊在那裏持剪修節她仔細一看原來是一個十六七的童子生得唇紅齒白面如古月雙目有神英俊得令人可愛她不由地立定腳低聲問道你姓什麽叫什麽名字你是幾時到我們家裏來的那童子擡頭朝她一望連忙住手立起答道小姐問我麽我姓潘名能上月來的她微笑點首又問道你今年幾歲了你的家裏還有什麽人呢他笑道我今年十七歲了我們家裏還有一個母親別的沒有人了她又道你娶了親沒有他聽說這話不禁面紅過耳片晌怔怔地答不出一句話來她掩口向他催道這裏就是我們兩個人在什麽話不好說什麽事不能做呢儘管羞人答答地怕什麽呢那童子愣愣的半晌才吞吞吐吐地說道還沒有女人呢到哪里去娶親呢她聽罷朝他嫣然一笑說道你一個人在這裏不覺得冷清麽他道我們做慣了也不覺得怎樣的冷清她道你跟我到一處地方去玩耍罷他道小姐那可不能我們做工的人怎能亂走倘被他們管事的看見就要吃苦頭的她道你跟我去憑他是誰也不能來問的他聽說這話便放下剪刀隨著她一徑向裏面一間亭子裏而去不到一會一對童男處女一齊破了色戒了從此以後小竇每天無論如何都要到他這裏來一次不想有一天突然接到聖旨選她們姐妹進宮欲想去應選又捨不得心坎上的人兒若要不去無奈王命難違只得將他摜下來一去三年她雖然身爲貴人可是沒有一天不思想潘能怎奈宮禁森嚴沒事不能亂出宮門一步所以怨天恨地的無法可施天也見憐忽然得著這個機會她也知道非在這時候將他帶進宮去不可她便對大竇說道你在這裏坐一會子我到園裏去閒逛一回馬上就來大竇笑道你去罷我曉得了但是要小心一點不要弄出破綻來大家沒臉她用手將大竇一指悄悄地笑駡道騷貨誰叫你說出這樣的話來不怕穢了嘴麽大竇笑道快些去吧趁這會兒沒人一刻千金不要耽誤了她微微地笑著也不答話輕移蓮步嫋嫋婷婷地直向後園而來走進園門只見園內的花草樹木和從前比較大不相同一處一處的十分齊整她暗暗喜道不料他竟有這樣的妙手將這些花草修理得這般齊整她想到這裏腦筋裏便浮出一個嬌憨活潑的小少年來她遮遮掩掩地走到三年前初會的那一簇玫瑰花跟前不覺芳心一動滿臉發燒似乎還有一個潘能坐在那裏的樣子她定一定神四處一打量卻不見他的影迹不禁心中著急道不好不好難道被他們回掉了麽我想決不會的她又走過假山四下裏尋找了一會仍未見有一些蹤迹她芳心早就灰了大半癡呆地站在一棵梧桐樹下面暗道這可了不得了眼見他不知到何處去了莫不是回去了麽她想到這裏險些兒落下淚來她默默片晌心仍不死又複順著假山向右邊尋去瞥見前面山腳下面一帶的薔薇花擋住去路她剛要轉身耳鼓猛聽得有人的鼻息聲音她趕緊止住腳步側耳凝神地細細一聽那鼻聲就在薔薇花的那面她靠近從籬眼裏望去果然見有一個人睡在薔薇花下但是頭臉均被花葉重重的遮著看不清楚她便轉了半天轉到這人跟前仔細一看不禁說了一聲慚愧你道是誰卻原來是她遍尋不著的潘能但見他頭枕著一塊青方石倒在薔薇葉裏正自尋他的黑甜風味她見他不由得身子軟了半截呼吸也緊張起來不由分說一探身往他的身子旁邊一坐用手將他輕輕地一推他還未醒她又微微地用力將他一推潘能夢懵懵的口中埋怨道老王你忒也不知趣人家睡覺你總要來羅唕算什麽呢她不禁嗤地一笑附著他的耳朵輕輕的喊道醒醒是我他聽得是小竇的聲音連忙揉開睡眼仔細一看只見面前坐著一個滿頭珠翠的美人兒不是她還有誰呢他連忙坐起打了一個呵欠摟著她顫聲說道你由哪里來的我們莫非是在夢中相見麽她仰起粉臉對他笑道明明是真的哪里是夢呢他又說道我不信你怎麽出來的她笑道休問我我是單爲你才想法子出來的潘能也不再問便伸手去解她的羅帶她笑道你怎的就這樣的窮凶極惡的他道快些兒罷馬上有人又做不成了她便寬了下衣兩個人在薔薇叢中竟交易起來停了一會雲收雨散二人坐起來她向他說道我明天進宮去了還不知幾時才能會面呢他道可不是麽自從你走後我何日不將你挂在心裏她道我倒有個法子不知你可肯依從我麽他忙道只要我們能聚在一起我什麽事都答應她附著他的耳朵道如此如此不是計出萬全麽潘能點頭笑道這計雖好但怕走了風聲露出破綻來那可不是玩的她搖手道請放心只要你去便是被他們看出破綻也不怕的誰敢來和我們作對呢他道既如此就照你的吩咐就是了她起身說道你明天早點到化兒那裏去教她替你改扮就是了我現在不能再在這裏久留了她說罷起身出園一徑向前面大竇的臥室而來走到客堂裏瞥見一個小丫頭立在房門口在那裏探頭探腦的張望見她來忙迎上來笑道貴人現在娘娘正在房裏洗澡請停一會子再來吧她笑道別扯你娘的淡我和她是姐妹難道你不曉得麽自家人何必拘避呢那小丫頭滿臉通紅半晌不敢答話她見了這樣的情形心中本就料到八九分了她向那小丫頭用嘴一呶小丫頭連忙退了出來她躡足潛蹤地走到房門口猛聽得裏面吱咯吱咯的響聲和男女喘息的聲音她不禁倒退數步暗道不料她也在這裏幹這老調兒這我倒不能進去的一進去破壞了他們的好事反而不美罷罷罷讓人一著不算癡呆而且我也有個破傷風彼此全要聯絡才對呢她想到這裏連忙退了出來剛剛走到外邊瞥見竇憲大踏步走進來她吃驚不小只見他雄赳赳地就要向房內走去她連忙喊道哥哥你到哪裏去他道我來請娘娘去拈香的她急道慢一刻現在她正在淨身哩他聽說這話忙諾諾連聲地退了出去她不敢怠慢走到門口四下裏一打量見一個人也沒有回轉身來正要去喊他們出來瞥見他倆已經整衣出房只見大竇雲髻松蓬春風滿面見了她不禁低下頭去兩靨緋紅默默地一聲不作那江貴見了她微微地一笑一溜煙走了這正是春風放膽來梳柳夜雨瞞人去潤花要知後事如何且看下回分解
