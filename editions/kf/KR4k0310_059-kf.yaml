body:
  text: 第五十九回姑謀婦皇后中毒妾救夫烈婦偷屍卻說淳郡王這時跟著兄弟們在上書房讀書師傅是大學士徐鴻逵卻是一位極嚴正的老先生皇子們都見了他害怕獨有這奕誴不怕他非但不怕有時還拿先生開開玩笑他拿一個桔子放在先生坐的椅子上先生一不小心坐下去便在屁股上沾著一大攤水這把戲是他在夏天常玩的又捉著一隻青蛙去悶在先生的墨盒子裏待先生去揭開蓋來青蛙帶著墨汁滿桌子跳著書本兒弄得一塌糊塗這也是他常玩的把戲徐鴻逵雖心中憤恨卻也無可奈何有一天上書房裏的阿哥們忽然吵嚷起來說五皇子不見了師傅便打發許多太監滿院子找尋直找了兩三個時辰卻找尋不到後來奕誴忽然在正大光明殿的柱子上溜下來這正大光明殿上設著寶座宮裏規矩無論什麽人走過殿前必須繞著路非有大事行禮不能在殿上行走如今這五皇子卻犯了大不敬的罪師傅便請出祖訓來把五皇子的手心打了三下五皇子從此含恨在心時時想報這個恨這時正是夏天徐學士身體肥胖常常飲茶師傅飲茶有一定茶杯的這時師傅正在那裏講書那皇子們一齊站著聽講徐學土講到口渴的時候拿起茶杯一喝便幹不知什麽時候那奕誴悄悄地又去倒了一杯茶來擱在桌上這時大家不曾留心只有四皇子冷眼看著停了一會師傅又拿起茶杯來才喝了一口便哇的一聲吐了出來氣得他滿面怒容瞪著眼大聲問道誰撒尿在裏面那班皇子頓時嚇得不敢作聲這時四皇子忍不住了便上去說道俺看見五弟拿過這茶杯來奕誴聽說正要抵賴師傅大喝一聲上去拉住他奕誴便又大嚷起來正在這當兒道光帝恰巧從裏面踱出來見了這樣子問道怎麽了敢是五阿哥背不出書來嗎徐鴻逵見了皇帝便上去迎接回答道五阿哥賜臣茶一杯茶中頗有異味請陛下一聞便知道光帝正拿茶來嗅時那五皇子看看事體不妙急拔腳溜出門去皇帝大怒喝一聲抓進來便有兩個太監上去揪著奕誴進來道光帝氣極了拔下佩刀來向奕誴砍去虧得徐鴻逵上去跳下來攔住替五皇子討饒道光帝見師傅跪下了便把氣放寬上去把師傅扶起來徐鴻逵又說了許多好話奕誴趁這時也跪下地來連連磕著頭求命皇帝擡腳來兜心一腳把五皇子踢倒在地又拿了一根大板子遞給師傅督促著師傅在大腿上打了十板才罷休道光帝想起五皇子是靜妃生的如今五皇子做了這種狂妄的事他母親也該有罪便氣憤憤地走進宮去誰知那靜妃早已得到資訊忙拔去了簪子披著頭髮手裏捧著妃子的冠帶冊書跪在宮門口見皇帝進來她便連連磕著頭口稱臣妾教子無方上觸聖怒罪該萬死如今情願將冊封冠帶納還求皇上大發慈悲賜妾一死說著那眼眶子裏的眼淚便和潮水一般地奔湧出來道光帝進來的時候原是有氣的如今見了靜妃做出這可憐的樣子來早已把心腸軟下來便伸過手去把靜妃扶起來說道放心罷你是沒罪的只是這逆子得好好地辦他一辦說著靜妃上來把皇帝扶進宮去在沒人的時候靜妃又替五皇子求著第二天皇帝傳諭出去把奕誴淳郡王的爵位革了在青宮裏幽閉三年不許出外道光帝雖把五皇子從輕發落卻把這靜妃格外地寵愛起來五皇於是靜妃的親生兒子母子之間關乎天性她仗著自己手中有錢便買通青宮太監常常送些衣服食物去又叫人安慰著五皇子叫些耐心守著等皇上氣惱已過便替他求著皇上赦他的罪這個消息傳到皇后耳朵裏說她私通外監交結青宮皇帝正迷戀靜妃的時候看了這奏本便也付之一笑因此那靜妃和皇后的感情卻一天壞似一天靜妃也時時刻刻在那裏想計策要中傷皇后她原是和皇太後身邊的侍女打成一片的便叫那侍女天天在太后跟前說皇后許多壞話又說皇后在宮中沒有人的時候詛咒著皇太后說太后在世一天她做皇后的總沒有出頭的日子只願太后早早死去她可以在宮中大行威權了太后年紀老了老年人總不十分明理的如今聽了她們的讒言心中已是將信將疑的了後來有慈甯宮裏的宮女到皇后宮裏去遊玩的拾得一個紙剪的人兒上面刺著七支繡花針兒那宮女看了很奇怪她原是貼身服侍太后的便悄悄地拿這紙人去給太后一看上面還寫著生辰八字再仔細一算這八字正是太后的年庚這一來太后便大怒起來連連追問這紙人兒從什麽地方拾得的那宮女見太后生氣也十分害怕起來把如何到皇后宮中去遊玩如何在寢宮門外拾得這紙人的情形一一說了那太后聽了越發生氣說道俺的年庚八字除皇后以外沒有人知道的如今這紙人一定是這賤人在那裏鬧的鬼把戲這賤人原天天詛咒俺死看俺不死便想出這魘魔法子來活逼死我這真叫天網恢恢如今這紙人兒恰恰落在俺們自己人手裏好好俺親自問這賤人去太后氣得渾身打顫一邊拿著紙人一邊站起身來顫巍巍地走出寢宮來嘴裏一叠連聲嚷道快打俺的軟轎來到翊坤宮裏請問這賤人去那侍女慌了這紙人是她拾來的這一鬧下來怕禍水惹到自己身上去忙跪下來攔住太后的駕說道太后莫動氣這件事也得在暗地裏查問明白再去動問也不遲慈甯宮裏許多宮女見太后從來也沒有發過這樣大怒也個個嚇怔了宮女們正在急慌的時候恰巧靜妃進宮來見了這樣子也幫著跪下來又思著太后回房去悄悄問時太后才把這紙人的事體說了出來靜妃也一口咬定說是皇后鬧的鬼又說太后若去請問她這種沒憑沒據的事體她原可以抵賴的太后如要報仇臣妾倒有一個好法子太后忙問她什麽法子靜妃湊近身來在太後耳邊低低地說了幾句太后連連點著頭當時便吩咐那侍女叫她傳話出去給宮女們今天的事體在外面一字也不許提起誰敢多嘴便取誰的性命那宮女們聽了這個話誰還敢多說從此慈甯宮和翊坤官兩面的人頓時安靜起來有時鈕鈷祿後來朝見太后太后也絕不露聲色仍是好言好語地看待她皇后認做太后回心轉意了她心中也快活皇太后萬壽的日子又到了穆相國依舊獻上一班女戲子在宮中演戲祝壽皇帝見了那班女戲子便想起從前蕊香妃子死得可憐他原打算自己上臺去扮老萊子祝壽的到了這時候他滿肚子淒涼便也懶得扮演吩咐四皇子奕詝代他扮演皇帝覰人不留心的時候便溜出席來回到宮裏後面只有一個小太監跟著皇帝走進寢殿拿出一幅蕊香妃子的畫像來挂在床前點上一爐香作下揖去喚了一聲妃子說道是朕害了你了如今你同伴姊妹們又在那裏演戲了妃子又在什麽地方朕每在睡夢中想著你你如何不來看看我這幾句話說得淒涼婉轉小太監聽了也不免掉下淚來皇帝祝贊過了便悄悄地對著那畫像坐了一會吩咐小太監收去了畫像又回去聽戲這時戲臺上正是四皇子扮著老萊子一手裏拿著撥浪鼓搖著倒在地下滾著唱曲子皇帝看了也不覺笑逐顔開只有太后心中有事坐在上面不說不笑皇后見自己的兒子在臺上唱戲格外要討好便即席做了四首絕句祝太后萬壽的上去獻與太后太后看看連聲說好又吩咐快賞酒靜妃早已預備好了聽得說一聲賞酒忙捧著一個酒壺上來宮女在一旁捧著一個金盤盤中放著三隻黃金酒杯兒靜妃滿滿地斟了三杯酒皇后見婆婆賞酒忙跪下來直著脖子把二杯酒喝下肚去只覺得一股熱氣直鑽到丹田裏當下謝了賞起來這時皇四於戲也唱完了太后把他喚近身來親自拿一挂多寶串珠替他挂在衣襟上四皇子謝過了賞下去太后吩咐道唱曲子吸了冷氣在肚子裏不受用的快喝一杯熱酒下去暖著些兒四皇子答應了一聲入席去了這裏太後坐了一會說腰痛支撐不住了便散了席回慈甯宮去皇后和許多福晉見太后散了大家也散了皇后回宮因她本不吃酒的多吃了酒便覺得頭腦重沈沈的渾身不舒服便早早睡下睡了一夜越發渾身發燒神志昏迷起來內務府忙傳太醫院裏禦醫請診一連看了三個大夫也識不出是什麽症候到了第二天那情況越發壞了皇帝因皇后平日嫉妒心太重夫妻之間本來感情淡薄的如今得了這個消息只傳諭四皇子進宮來叩請母后的聖安那皇后見了自己的兒子略清醒些只是拉著四皇子的手大哭說不出一句話來正哭時只見皇后兩眼直視大喊一聲兩手向胸前亂抓衣襟撕破露出乳頭來宮女上去替她遮住又聽皇后大喊一聲從床上直跳下地來赤著腳在屋子裏亂轉一邊走一邊嚷著一邊把身上的衣服統統拉下來丟滿一地看皇后胸前只掩了一幅繡花的肚兜下身穿著一條紅緞褲子她把宮女們推開竟要闖出房去四皇子看了上前竭力抱住這時皇后什麽地方來的氣力四皇子也算有氣力的了她只把臂兒一伸把四皇子推倒在地一腳搶出房去了屋子裏的宮女們發一聲喊外面的一群宮女也趕進來把皇后抱住擁進房去這皇后兩眼發赤見人便打見物便摔只聽得屋子裏一片宮女哭器物破碎的聲音那四皇子也嚇得逃出宮去一邊哭著一邊告訴父皇道光帝聽了也進宮去隔著窗兒望了一望出來傳禦醫進宮去請脈皇后赤身露體癡癡癲癲的樣子那禦醫如何敢進去請脈也無法下藥大家束手無策只得關起宮門來一任她叫著跳著直瘋了兩天三夜後來精神也疲倦了嗓子也喊啞了倒在床上動不得了只是直著喉嚨叫著宮女替她身上遮蓋好了禦醫才放進來診脈下藥吃下藥去依然好似石沈大海毫無效驗到了後半夜那皇后喊聲越奇怪了好似鬼叫許多宮女在屋裏陪伴著到了第二天皇太后知道了也來看她靜妃也陪著進來了這時皇后睡在床上昏昏沈沈的已不省人事了宮女扶她從床上坐起來接駕靜妃在一旁見宮女遞上一杯藥來她急忙上去接過來吹著看溫涼了便自己先嘗一口又從頭上拔下金針來在藥裏攪一攪勻端上去服侍皇后吃下又坐了一會退出宮來隔上三天鈕鈷祿後薨逝了內務部忙著辦喪事禮部忙著擬禮布獨有皇太后和靜妃在暗地裏十分遂意原來這皇後的性命是活活被她兩人逼死的這是靜妃出的主意她和太后預先約定了在萬壽節這一天故意賞皇后吃酒靜妃在篩酒的時候已悄悄地換了一隻酒壺那酒壺裏和著七粒阿蘇肌丸刃藥泡爛了皇后吃下肚去不知不覺作起怪來這阿蘇肌丸原是喇嘛僧秘制的一種靈藥藥性極熱人到害病的時候只服一丸下去便可以立即痊愈那丸藥只有綠豆一般大朱砂色藥力卻極強倘多吃一粒反要成病多吃到三粒以上人便是發狂從前睿親王多爾袞因好色府中養了許多姬妾便全靠這阿蘇肌丸支撐精神那時多爾袞把喇嘛僧供養在府中專門制煉這丸藥據說制練這丸藥是十分神秘的最初煉藥必有一粒雌藥丸和一粒雄藥丸做種清宮裏煉這種藥第一次是打發人特意到西城去取來的喇嘛僧拿了這兩粒丸藥封在淨瓶裏供在淨室裏喇嘛每天一清早起來走進淨室去對著淨瓶上香念咒供到第四十九日上把瓶取下來揭開瓶看時那丸藥已有滿滿一瓶了待這瓶藥快吃完只剩下兩粒時再如法制煉又是一滿瓶因此吃這藥丸時當時時留心瓶裏不能使它斷種倘吃得一粒不剩便無法再制煉了清宮只有喇嘛僧藏著這藥能治百病也能送人性命雍正皇帝買通了大國師拿阿蘇肌丸去給康熙太子胤扔吃下結果發癡被廢了如今這道光皇后也因中了阿蘇肌丸藥毒送去了性命道光皇帝明知道皇后病來得古怪但他和皇后早已沒有情愛了便也不去細心考查一轉眼皇后出了喪好似拔出一隻眼中釘他自己也知道年紀也老了便也不繼續立皇后只把這博爾濟錦氏冊立爲貴妃從此一雙兩好在宮中過起歡樂的歲月來這道光帝自從死了蕊香妃子以後心灰意懶久已不把朝政放在心上他是信任穆彰阿的所有一切事務都交給他一個人去辦這穆相國又是只圖錢財不管事體的人那英國人在廣東鬧得天翻地覆他總是把消息滿著不給皇帝知道那兩廣總督弈山原是穆相國的心腹他到了廣東忽然帶了水兵去打英國的兵船反被英國炮船上開過炮來打得片甲不留還說中國人擅自開釁便趕上岸來把廣東沿海的各炮臺都拆毀了弈山才急得起投無路忙去和英國人講和後來因爲中國不肯割讓香港英國水兵便直闖到福建廈門地方大炮小炮一陣子亂放廈門總督顔燾一點也沒有預防被英國兵打進內池地方另外有幾隻外國炮船又打到寧波定海地方當時浙閩總督正調定海鎮總兵葛雲飛處州鎮總兵鄭國鴻壽春鎮總兵王錫明分三路把守誰知鄭王兩總兵到了定海按兵不動眼看著葛雲飛被英國兵四面圍逼著竹山失守炮彈打穿胸膛死在荒山腳下英國人把他屍首拖到營裏去藏著這葛總兵原隨營帶一愛妾在身邊她聽說老爺陣亡了哭得死去活來哭罷了向她手下的婢女兵士們跪下來連連磕著頭那兵士們見了也忙跪下來還禮不叠這位夫人哭求大家幫她到英國兵營去把老爺的屍首偷回來他手下人見這位姨太太如此忠烈深受感動齊口答應當夜月黑星高英國的兵營駐紮在海邊上這姨太太領著頭兒悄悄地掩進黃國營盤裏去居然被他們把葛總兵的屍首偷了回來到家去依舊開吊發喪後人做有一篇葛將軍妾歌稱頌她自從葛總兵死了以後那王鄭兩總兵也相繼陣亡這事都壞在將軍裕謙手裏他帶著兵馬見死不救待那三路兵馬死的死散的散英國兵直攻到裕謙營盤裏來裕謙且戰且退直到退無可退他也跳在洋池內自盡了這時穆相國知道事體越鬧越大接著又是寧波失守上海失守福建被圍的消息接二連三地報來再也瞞不住了只得報與皇帝知道道光帝久睡在鼓裏如今聽說大局敗壞至此也急得左右爲難但他依舊聽信穆彰阿的話起用耆英那時英國戰船已直逼江甯耆英無可奈何便和英人講和割讓香港賠償鴉片損失六百萬兩軍費一千二百萬兩又開闢廣州廈門福州寧波上海五處爲通商口岸這一戰名叫鴉片之戰這回訂的和約名叫江寧和納是中國近代外交第一次最大的失敗要知後事如何且聽下回分解
