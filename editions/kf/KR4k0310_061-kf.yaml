body:
  text: 第六十一回昏燈哀語慈後逝世香鈎情眼蕩子銷魂卻說咸豐時候清宮裏還有一位孝穆皇太后也是十分賢德的這孝穆太后原是道光帝的寵妃那時因靜妃長得標致雖召幸靜妃的時候多但靜妃常常仗著皇帝的寵倖十分驕傲總沒有孝穆後性情溫柔心地慈悲有什麽正經事都去和孝穆後商量去靜妃那裏不過玩笑取樂罷了那時道光皇后被皇太后謀死丟下四皇子孤苦零丁道光帝便把四皇子托給孝穆後吩咐她好生撫養凡是四皇子的冷暖饑飽孝穆後時時在意孝穆後原有兒子的便是那六皇子奕訢但是孝穆後看待四皇子勝過自己親生兒子她說四皇子是沒有母親的孤兒原該多疼他些因此四皇子也十分依戀這孝穆後平日總喚她媽媽道光帝要立太子也曾私地裏和孝穆後商量過道光平日很愛六皇子因他精明強幹性格和自己相像後來聽了四皇子幾句仁慈的話心裏便打不定主意回宮來和孝穆後商量孝穆後這時一味要得到好名氣便竭力保舉四皇子道光皇帝卻有定六皇子的意思孝穆後再三推辭說這是萬萬使不得的不說別的那四皇子原是正宮生的也強過她兄弟萬倍道光帝聽了孝穆的話便立四皇子做太子從此心裏越發敬重她道光帝臨死的時候把這孝穆妃再三托給咸豐帝咸豐即了位知道自己是皇位是全靠孝穆幫的忙便立刻晉封孝穆做皇太后請她住在慈甯宮裏自己天天去叩問聖安像對待自己親生母親一般又封六皇子做恭忠親王清宮裏規矩是父皇死了除做太子的以外別的皇子不許進宮來獨有咸豐帝格外開恩准許恭忠親王隨時進宮謁見太后因此他母子二人十分感激咸豐帝但是後來孝穆皇太后年紀老了慢慢地後悔起來想到親生兒子遠隔在宮外自己年紀又老了倘然早晚有個不測也沒一個送終的親人那時悔不把他立做太子想在這裏便十分怨恨著咸豐帝每逢咸豐帝朝見的時候總不給他好臉色看咸豐帝常挨駡卻仍是和顔悅色地孝敬著皇太后後來皇太后病重恭忠親王雖常進宮來問候但終因宮禁森嚴不能夠在宮中住宿只有咸豐帝卻早晚在皇太後病慶前料理湯藥常常和孝貞皇后兩人輪班看守著有一天太后從睡夢裏醒來天色已晚只見床前有一個人坐著他錯認做是奕訢便伸手過去拉住他的手說道我的兒你母親早晚便要去世了受當今皇上孝養了八年便死了也值得只恨當年先皇立太子的時候被我再三辭去這個念頭一錯便害了我兒從此低頭在別人手下過日子太后說著便灑下淚來誰知那床前坐的並不是恭忠親王而是咸豐皇帝皇帝聽了非但不惱反勸太后好好養病不可胡思亂想那太后忽然清醒過來知道說錯了話心中萬分懊悔一陣咳嗽痰湧上來便死去了咸豐帝依舊十分敬重太后當時下詔發喪行著太后的喪禮始終拿好心看待恭忠親王親王也十分忠心辦理國家的事體這時南方洪秀全正鬧得厲害在永安地方建立太平天國咸豐帝下詔先重新起用林則徐帶兵到廣西剿匪林則徐到得潮州便一病身亡皇帝只好下詔派向榮張必祿兩人帶兵堵截那太平天國的兵馬十分活躍避開向張兩人去打得桂平貴武宣平一帶州縣又取得泉州朝廷見官兵人馬單薄便委兩江總督李星沅會同大學士塞尚阿率領都統巴清副都統洪阿帶著京中精兵去圍攻泉州打退了楊秀清誰知太平軍見西面不能得手須轉身東向打進湖南地界去得了全州又得道州接連著得桂陽郴州渡河奪得安紅醴陵咸豐二年七月打到長沙圍城七十多天打不進去洪秀全在長沙南門外得到一顆玉璽從此越發有吞併天下稱霸稱王的意思那時太平天國西王蕭朝貴戰死在長沙九月又轉向常德得了常德又得益陽捉得小船幾千隻渡洞庭湖直攻進嶽州城得到許多康熙年間清兵討吳三桂時留下的兵器洪秀全見得了兵器越發膽大沿著長沙下來佔據漢陽武昌接著陷九江陷安慶陷堯湖一個月以內取得很大戰果那時官兵見了太平軍人人害怕望風而逃那戰敗失守的資訊一天十幾次報到京裏把個咸豐皇帝急得走投無路天天下聖旨調兵遣將也是無用到了感豐三年二月初十這一天洪秀全打進南京城殺死城中滿兵男女二萬多人把屍首抛在長江裏從此洪秀全在南京城裏大興土木造成宮殿自稱太平天皇照樣也立起三宮六院來洪秀全住在宮裏何等快樂講到他皇宮裏一般也是象廊畫檻繡幕珠簾金碧輝煌十分華麗天王駕到那後妃宮嬪卻要跪著迎接天王身穿黃緞盤繡五爪金龍的長袍頭戴四角垂旒的天冠披著長髮濃眉長須身材矮小坐著一肩十六人擡的軒轎一般也是朱傘黃幄宮裏有一座寓台名叫瑤台周圍有二十畝地臺上種著花木造著池館和平地上一般台是六角的造著六座白石臺階嵌著五色花岡石十分美麗宮中人喚它白玉天梯臺上有正殿一座別殿四座殿的四角又接造著三座院子合起來恰巧是十二座院子管正殿的是一位徐妃別殿四座又有四個妃子管著又分派淑娥才人管著十二院天皇每夜總在正殿住宿只有徐妃能得長夜的恩寵那龍床上挂著各妃嬪的鳳頭銅牌天皇睡到高興的時候便隨手拿下一塊銅牌來丟出帳門去床外自有女司拾起牌來按著牌上的名字去傳喚妃子那妃子見了鳳頭牌便拔下簪子披著發由有大力的元女拿著一幅繡鳳的軟披向妃子兜頭一裹抱著送到正殿去正殿上的女司見妃子來了便在殿中挂一幅繡幔把正妃請出來坐在繡幔外面左面站著一隊宮女手捧巾盆香爐嗽盂稱做文班右邊站著一隊侍衛身上披著甲胄手裏拿著弓劍稱做武班這兩班人非有正妃的號令不得行動一班少年男子對一班年輕女子站著耳中聽著繡幔裏面調笑狎昵的聲音大家便垂著眼皮板著臉笑也不敢笑那天皇玩到高興的時候便又丟出幾塊銅牌來叫人把牌上的妃子喚來走繡幔去名叫賞春那班妃子在一旁須拍手歡笑助著興子徐妃原是天皇宮中的第一位美人是由手下采芳使在浙江地方尋到身材長短腳寸大小都合標準徐氏進宮來的時候洪天皇正在瑤臺上看花四個宮女扶著她走上瑤台來看她腰肢嫋娜臨風若仙這一天天皇便在徭臺上召幸了封她爲瑤台第一妃後來又封爲皇后東王楊秀清原是一個好色之徒他打聽得徐皇后長得標致便假託說皇后是上帝的女兒太平皇宮裏有一座承天堂是東王講道的地方宮中每七月便請東王楊秀清在堂中講道楊秀清自己說是上帝降生到世界上來傳道的那徐皇后是上帝的女兒也便是東王的女兒他便要傳見徐皇后那洪天皇無法只得把徐皇后打扮著出來拜見東王那東王見了這樣一個絕色美人早已把他樂得魂靈兒飛上半天從此以後他便常常借著上帝的名義把徐皇后接進東王府來這上帝教是太平天國的國教便是洪天皇也不敢反對那東王又是執掌教權的勢力很大便是天皇也不敢奈何他後來還是徐皇后想出一條計策來說東王身邊有一個女書記官名叫傅善祥的長得天姿國色東王十分寵愛陛下可假說宮中缺人抄寫秘密文件把那傅善祥去宣召進宮來天皇聽了便依了這個主意每逢東王來請徐皇后天皇便也把傅善祥宣召進宮來東王只怕失了傅善祥從此便也不敢來請徐皇后了講到這傅善祥原是金陵地方好人家女兒自幼知書識字精通文墨又長得一副閉月羞花的容貌太平天國把金陵地方做了京城便搜民間女子安頓在女館裏見有才貌雙全的女子便假說請做女書記送進宮去這時傅善祥年紀只有十七歲被東王楊秀清見了請進府去安置在多寶樓中執掌府中文書那多寶樓在王府花園紫霞塢東南樓外花木環繞魚鳥羅列樓中陳設珠寶四壁俱滿傅善祥又愛古董字畫東王便吩咐手下的兵丁到各處大戶人家去搜來凡是古玉鍾鼎都搜集在樓中傅善祥終日焚香讀書卻也十分閒雅東王心中雖十分寵愛她但也不敢十分纏她只和那洪宣嬌終日在花園西南角上洞天春裏尋歡作樂這洞天春是拿湖石疊成的玲瓏剔透裏面地上鋪著絨毯四壁挂著繡幕在石壁四角裏裝著反光燈照耀得好似白晝到夏天四壁開著天窗涼風習習十分涼爽到冬天洞門嚴閉地下燒著火炕十分溫暖那石洞又造得返環曲折走在裏面好似進了迷魂洞洪宣嬌每進府來東王便和她攜手進洞尋歡作樂講到這洪宣嬌原是人間尤物她和洪天皇是異母兄妹後來洪秀全的父親死了他母親丟下宣嬌續嫁別人去了洪秀全自幼愛結交朋友在江湖上來來去去行蹤不定他又可憐妹子孤苦無依便把宣嬌交托給他哥哥洪仁發這宣嬌自幼長得眉清目秀生性豪爽愛學著男孩兒打扮十歲的時候見鄰舍有人懂得武藝的看他踢打縱跳好玩便也跟著去學年深日久宣嬌不但能縱跳如飛且也舞得一手好刀劍正在這時候洪仁發家裏忽然被火燒了宣嬌無家可歸便跟了人走江湖去了這時洪秀全正和馮雲山朱九濤信奉上帝會九濤死了秀全做了會首回家來看望妹子已不知去向了這時武宣地方有一個姓蕭的大財主洪秀全在桂平地方正苦沒有銀錢這個會怕不得發達打算勸那姓蕭的入會向他借錢便把會中弟兄都搬到武宣地方的鵬化山裏駐紮自己天天到蕭家去勸蕭朝奉進上帝會這蕭朝奉原是愛做善事的聽說上帝會是救人苦厄的便也有幾分相信無奈他兒子蕭朝貴是一個漂亮少年性情豪爽武藝高強對洪秀全那一套不太相信便掉頭不顧蕭朝奉只有這個兒子十分寵愛的他見兒子不信他也不肯拿出錢來幫助洪秀全了洪秀全正在無可如何的時候那蕭朝貴忽然得到一樁意外良緣原來蕭朝貴終日在大街小巷閑闖有一天忽然見圍場上擠著許多人看賣解兒的朝貴也擠身去看大家認得他是蕭百萬家的大公子便讓他站在前面只見一個黑臉大漢站在場口說過幾句開場白一棒鑼響跳出一個嬌小玲瓏的女孩兒來看她臉上凝脂擁豔春色橫眉向大衆微微一笑朝貴便忍不住了喝了一聲彩接著那女孩兒搬弄著各樣武藝件件精通朝貴忍不住喝一聲好一位女英雄那女孩兒聽得了暗地裏向他瞟了一眼朝貴是一個血性男兒如何忍得早被她這一眼勾了魂靈去待她收場的時候朝貴便上去對那大漢說要買這女孩兒那大漢靠這女孩兒爲活的如何肯賣朝貴見他不肯情急智生他明仗自己是當地富豪又生成一副鋼筋鐵骨便一橫眉大喝一聲說道大膽的囚囊敢在光天化日之下拐帶人口嗎你依便依不依時送你到縣太爺那裏去你可要試試你蕭太爺的手段說著便上去抓住那大漢的手臂那大漢見他聲勢煊赫力大無窮早把他嚇矮了一大截忙悄悄地拉他到一家小茶館裏講妥了由蕭朝貴拿出二百兩銀子來把這女孩買回家去誰知當夜朝貴發現那女孩已破過身了朝貴問時那女孩說是被大漢恃強姦污的朝貴大怒第二天懷著刺刀悄悄去找那大漢那大漢還在客房裏朝貴闖進門去劈頭一刀那大漢倒在地上死了朝貴抽身逃去回家把這情形告訴他父親蕭朝奉聽說兒子殺了人早嚇得手忙腳亂便對朝貴說道事已至此速往鵬化山中求洪教主幫忙他手下的人多可以救你朝貴聽了父親的話便帶了這女孩連夜投鵬化山中來洪秀全一見那女孩兒認得便是他妹子洪宣嬌當下兄妹兩人抱頭痛哭秀全問起情由宣嬌便把過去的事兒說了要知後事如何且聽下回分解
