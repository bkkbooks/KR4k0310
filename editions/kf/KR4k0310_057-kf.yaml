body:
  text: 第五十七回敬事房馱妃進禦豫王府奸婢殺生卻說皇后怒殺蕊香妃子的事很快傳遍皇宮個個都聽得目蹬口呆如今做書的趁這個當兒把清宮裏萬曆媽媽的故事說一說原來這萬曆媽媽便是明朝的萬曆太后據說在明朝萬曆年間清太祖帶兵打撫甯被明朝的兵士抓住關在撫寧牢監裏清兵營裏送了十萬兩銀子給明朝的太監太監替他去求著萬曆太后太后對萬曆皇帝說了把太祖放回國去從此清宮裏十分感激萬曆太后直到清兵入關便在紫禁城東北角上造著三間小屋裏面供著萬曆太后的牌位宮裏人都稱她萬曆媽媽從清世祖傳下來每年三百六十日每天拿兩隻豬去祭著萬曆媽媽管萬曆媽媽廟的是一個老婆婆這個老婆婆每夜酉正二刻趕著空車兒出城去到子正三刻車箱裏裝著兩口活豬老婆婆自己跨著轅兒趕著車到東華門口候著不點燈的這豬車進去了接著便是奏事處官員擎著一盞圓紗燈跟在車子後面進來接著又是各部院衙門遞奏官和各省的折弁再後面便跟著一班上朝的官員到朝房去的清宮規矩紫禁城裏不許張燈只許奏事處用燈講官用燈南書房用燈此外上朝陛見的各官員都站在東華門外候著見有一盞燈來便搶著去跟在後面紫禁城裏行車的只有這祭萬曆媽媽的豬車那老婆婆把車趕進了東華門沿著宮牆向東北走去到了廟門口停住見有人出來幫助她把豬殺了洗刮乾淨整個放到大鍋裏煮熟了祭著萬曆媽媽祭過了割成大塊兒送到各門去給侍衛官吃那豬肉是白水煮的不加鹽味另有大缽兒盛著白汁肉湯侍衛吃時不許加鹽味也不許用湯匙筷子只許用解手刀把肉割成片兒拿到小碗裏去吃起初大家因爲淡吃著沒有味兒後來侍衛中有一個聰明的想出法子來拿原高麗紙切成小方塊浸在好醬油裏煮透又拿到太陽裏去曬乾每到值班各把這紙塊拿一疊藏在身邊到吃肉的時候把紙拿出來泡在肉湯裏蘸著豬肉吃著它的味兒鮮美無比一面吃著一面把宮中的事體說出來說到淒慘的地方大家不覺打起寒噤來話說皇帝自從那夜和皇后吵鬧過後來到底還是皇帝自己認了錯皇后才罷休從此以後皇帝怕皇后吃酸便常常到皇后宮中去住宿便是有時召幸別的妃嬪也須有皇后的小印那妃嬪才肯應召宮裏的規矩皇帝召幸妃嬪原要皇后下手諭的自從乾隆帝廢了皇后以後這個規矩已多年不行了如今這位道光皇后重新拿出祖制來道光皇帝便不敢不依你道祖制是怎麽樣的原來是除皇后以外皇帝倘要召幸妃子只許在皇帝寢宮裏臨幸不許皇帝私下到妃子宮裏去的那管皇帝和後妃房裏的事體的名叫敬事房那敬事房有總管太監一人馱妃子太監四人請印太監兩人總管太監是主管進膳牌叫起寫冊子等事體的馱妃子太監是專馱妃子的請印太監是到皇后宮中去領小印的那膳牌把宮中所有的妃嬪都寫在小牙牌上每一妃嬪有一塊牌子牌子頭上漆著綠色油漆又稱作綠頭牌總管太監每天把綠頭牌平鋪在一隻大銀盤裏如遇妃嬪有月事的便把牌子側豎起來覰著皇帝用晚膳的時候總管太監便頭頂著銀盤上去跪在皇帝面前皇帝倘然要到皇后宮中去住宿只說一句留下總管太監便把這銀盤擱置桌上倒身退出屋子去皇帝倘然不召幸妃嬪也不到皇後宮中去便說一聲拿去那總管太監便捧著盤子退出去皇帝倘然要召幸某妃便只須伸手把這妃子的牌子翻過來牌背向上擺著那總管太監一面奉著盤子退出去一面把那牌子拿下來交給管印太監到皇后宮中去請印皇后的管印太監一面奏明皇后一面在一張紙條兒上打上一顆小印交給那太監那太監拿著出來交給馱妃太監那馱妃太監見了膳牌和小印便拿著一件黃緞子的大氅走到那妃子宮裏把小印紙條兒交給宮女宮女拿進去給妃子看了服侍妃子梳洗一番宮女扶著太監進去把大氅向妃子身上一裹背著直送到皇帝榻前解去大氅妃子站著這時皇帝也由太監服侍著脫去上下衣睡在床上蓋一床短被露出臉和腳太監退出房外妃子便上去從皇帝的腳下爬進被裏去和皇帝並頭睡下這時敬事房的總管太監帶著一班太監一齊站在房門外看看過了兩個時辰便在房門外跪倒拉長了調子高聲喊道是時候了聽屋子裏沒有聲息接著又唱唱到第三聲只聽得皇帝在床上喚一聲來那馱妃子太監便走進屋子去這時妃子已鑽出被來站在床前太監上去依舊拿大氅裹住馱著送回原處接著那總管太監進屋子來跪在床前問道留不留皇帝倘然說留那總管太監便回敬事房去在冊子上寫著某年某月某日某時皇帝幸某妃留一行字倘然皇帝說不留那總管太監便到妃子宮中去在妃子小肚子下面穴道上用指兒輕輕一按那水一齊流出來清宮定這個規矩原是仿明朝的制度如今道光皇后要行使自己的威權又防皇帝荒淫無度又請出祖制來道光帝也無可奈何只得忍受著宮中的風流案件才了接著豫王府裏又鬧出一樁風流案件來那豫親王裕德興原是近支宗室清宮制度做王爺的不許有職業因此這裕德興吃飽了飯沒有事做終日三街六巷地閑闖他又天一副好色的膽子仗著自己有錢有勢看見些乎頭整臉些的娘兒們他總要千方百計地弄到手京城裏有許多私窩兒都是豫王爺養著大家取他綽號稱他花花太歲還有許多良家婦女吃他照上眼他便不管你是什麽人家闖進門去強硬奸宿有許多女人被他生生地糟蹋了背地裏含垢忍辱有懸梁的有投井的那人家怕壞了名聲又怕豫王爺的勢力大只得耐著氣不敢聲張出來後來這豫王爺爲了自己家裏的一個小丫頭幾乎送去了性命這真是天網恢恢疏而不漏這個丫頭名叫寅格原是豫王福晉娘家陪嫁來的只因她長得白淨嬌豔性情又十分和順王府裏上上下下的人都和她好豫王的大兒子名叫振德和寅格是同年伴歲他兩人格外說得投機常常在沒人的時候說著許多知心話這位福晉又愛調理女孩兒把個寅格調理得好似一盆水仙花兒又清潔又高傲大公子看在眼裏越覺得可愛便是寅格心眼兒裏也只有大公子誰知這丫頭越打扮得出色那豫王在暗地裏看了越是動心豫王福晉知道自己丈夫是個色中餓鬼便時時看管著他這豫王看看無可下手便也只得耐著守候機會看看寅格十八歲了越發出落得雪膚花貌嫵媚動人寅格也知道王爺不懷好意每到沒人在跟前的時候王爺總拿風言風語調戲她有時甚至動手動腳寅格便鐵板著臉兒一甩手逃出房去這種事體也不止一次了這一天合該有事正是正月初六原輪到近支宗室進宮去拜年豫親王帶領福晉格格公子一家人照倒進宮去皇上便在宮中賜宴那皇后和豫王福晉說得上便留著她在宮中多說幾句話兒豫王爺在外面看看福晉還不出來他忽然想起家中的寅格心想這是千載難逢的好機會便匆匆退出宮來回到府裏走進內院把那班姨太太丫頭僕婦都支開了悄悄地掩進福晉房裏去他知道寅格總在房裏守著誰知一踏進房門時靜悄悄的一個人也沒有再細看時見床上羅帳低垂帳門裏露出兩隻粉底兒高心鞋子來繡著滿幫花兒豫王平日留心著認得是寅格的腳他心中一喜非同小可原來寅格在房中守候著靜悄悄的不覺疲倦起來心想回房睡去又因福晉房中無人很不放心況且福晉臨走的時候吩咐她看守著房戶她仗著主母寵愛她便一倒身在主母床上睡熟了豫王一面把房門輕輕關上躡著腳走近床前去揭去帳門一看不由他低低地說一聲妙只見她一點朱唇上擦著鮮紅的胭脂畫著兩彎蛾眉閉上眼深深地睡去那面龐兒越俊了豫王忍不住伸手去替她解著紐扣兒接著又把帶兒松了寅格猛從夢中驚醒過來已是來不及了她百般地哀求啼哭著終是無用這身體己吃王爺糟蹋了豫王見得了便宜便丟下了寅格洋洋得意地走出房去這時寅格又氣憤又悲傷下體也受了傷止不住一陣一陣地疼痛她哭到氣憤極處便站起來關上房門解下帶子便在她主母的床頭吊死了可憐她臨死的時候還喚了一聲大公子俺今生今世不能侍奉你了王府裏屋子又大這福晉房裏又不是尋常奴僕可以進去得的因此寅格吊死在裏面竟沒有一個人知道傍晚豫王福晉帶了公子格格從宮裏出來那大公子心裏原記挂著寅格搶在前面走到內院去推推房門裏面是反閂著打了半天也不聽得房中有動靜大公子疑惑起來急急跑來告訴他母親他母親還在他父親書房裏告訴見皇后的事體聽了大公子的話十分詫異忙趕進上房去那豫王還裝著沒事兒也跟著進來許多丫頭女僕把房門撬開了進去一看大家不禁齊喊了一聲啊唷原來是福晉的床頭直挺挺地挂了一個死人大家看時不是別人正是那寅格這時獨苦壞了那大公子他當著衆人又不好哭得只是暗暗地淌著眼淚那福晉見她最寵愛的丫頭死了也不由得掉下眼淚來一面吩咐快把屍身解下來擡到下屋子去停著管事媽媽上來對福晉說道府中出了命案照例須去通報宗人府到府來踏勘過才能收斂又說屋子裏的床帳器具動也不能動的須經宮裏驗看過豫王聽了這些話心中已是虛了接著說道死了一個黃毛丫頭報什麽宗人府這時豫王福晉因這丫頭是她心愛的又看她死得苦知道她一定有冤屈的事體在裏面她也萬想不到這樁案件便出在她丈夫身上她要替丫頭伸冤的心很急一時也不曾細細打算便去報了宗人府這豫王因爲是自己鬧出來的事體不好十分攔阻反叫人看出形迹來又仗著自己是近支宗室那宗人府也不在他心眼兒上這時管宗人府的是一位鐵面無私的隆格親王論輩份原是豫王的叔輩當下他接了豫王家中人的報告便親自到豫王府裏來驗看他見那福晉床上羅帳低垂被褥淩亂心下已有幾分猜到後來相驗到寅格的屍身見她下身破碎褲兒裏塗滿了血污這顯然是強姦受傷羞憤自盡的但這堂堂王府裏有誰這樣大膽在福晉床上強姦福晉貼身的侍女隆格親王起初疑心是豫王大公子鬧的案子後來背著人把大公子喚來盤問一番只見他是一個羞怯怯的公子哥兒不像是做淫惡事體的人正沒有主意的時候忽然那相驗屍身的仵作悄悄地送上一粒金扣兒來扣兒上刻著豫親王的名字中的一個裕字那大公子見了便嚷道這扣兒是俺父親褂子上的隆格親王看時扣兒下面果然連著一截緞子的瓣兒還看得出拉斷的線腳兒來當時便把管衣的丫頭喚來那丫頭名叫喜子原是一個蠢貨她一見這粒金扣兒便嚷道啊唷原來丟在這裏怪不得我說怎麽王爺褂子上的金扣兒少了一粒了隆格親王喚她把王爺褂子拿來一看見當胸第三檔紐瓣兒拉去了一粒看得出是硬拉下來的因爲那褂子對襟上還拉破一條小小的裂縫便問這件褂子王爺幾時穿過的喜子說是昨天拿出來的王爺穿著進宮去的又問王爺什麽時候回府的回說午後回府的問可看見王爺走進誰的房裏回說見王爺去進大福晉房裏去問這時大福晉可曾回府答大福晉和公子格格們直到靠晚才回府問王爺什麽時候出房來的答王爺進房去大約隔了一個時辰才出房來問王爺在房裏的時候可聽得房裏有叫喊的聲音嗎答王爺一進院子便吩咐婢子們人出去不奉呼喚不許進上房來因此那時婢子們離上房很遠有沒有叫喊的聲音不但婢子不曾聽得便是闔府裏的姐姐媽媽們都不曾聽得問王爺進房去的時候寅格在什麽地方答不知道大概在大福晉房裏因爲寅格姐姐終年在大福晉房裏侍候著問王爺走出上房來身上還穿著褂子嗎答穿著問你怎麽知道還穿著褂子答王爺從上房裏出來回到書房裏叫外面爺們傳話進來叫拿衣服去換婢子立刻去捧了一包衣服交給那爺們停了一會那爺們又捧著一包衣服進來交給婢子婢子打開來看時見裏麵包著一套出門去穿的袍褂再看時那衣襟上缺少了一粒金扣兒又拉破了一條縫婢子肚子裏正疑惑問又不敢去問若不去問又怕過幾天王爺穿時查問起來婢子又當不起這個罪如今這一粒金扣兒卻不料落在老王爺手裏謝謝老王爺婢子給老王爺磕響頭求老王爺賞還了婢子罷免得俺們王爺查問時婢子受罪說著她真的磕下頭去隆格親王用好語安慰著喜子說這粒金扣子暫借給俺一用你家王爺查問時有我呢隨後又把那天服侍王爺換衣服的小廝傳來問那天王爺脫下褂子來的時候你可曾留心那件褂子上的金扣有缺少沒有那小廝回說小的也曾留心看過衣襟上缺少一粒扣子那衣褂還拉破一條縫好似新近硬拉下來的當時小的也不敢說便把衣服送進上房去了接著隆格又把那仵作傳上來問這一粒金扣子從什麽地方拾得的那仵作回說是在死人手掌中拿出來的那死人手掌捏得很緊不像是死過以後再塞在手掌裏的隆格親王聽了這一番口供心中已十分明白便拿了這件褂子親自到書房裏去見豫王一見面便問這扣子可是王爺自己的豫親王當時雖丟了扣子自己卻還不知道當隆格問時隨口答道這副扣子還是那年皇太后萬壽俺進宮去拜夀太后親自賞的所以扣子刻著俺的名字同時惇親王瑞親王也照樣得了一副俺因爲是太后賞的格外尊重些把它配在這件褂子上王爺如今忽然問起這扣子來是什麽意思隆格親王說道如今王爺丟了一粒扣子你自己知道嗎豫王爺聽了瞪著眼睛在那裏想接著隆格又說道如今俺卻替你找到了豫王爺聽了這句話不禁臉上脹得通紅他強姦寅格的時候被寅格拉去一粒扣子當時糊塗一時記不清楚如今吃隆格親王一語道破便頓時言語支吾手腳局促起采隆格親王一眼看出他是犯了罪了便喝一聲抓當時上來十多個番役扶著豫親王出府去要知後事如何且聽下回分解
