body:
  text: 第九十六回恨綿綿瀛台晏駕陰慘慘廣殿停屍卻說西太后正和衆臣在那裏議善後的辦法忽見內監來報光緒皇上昏厥過去了慌忙同了奕劻等一班大臣到瀛台來看視時只見光緒皇上面色已和白紙一般牙關緊咬兩眼直視瑾妃含著一泡眼淚嗚嗚咽咽地喚著這時隆裕皇后也得報過來侍候瞧見光緒帝這副模樣也不免流下幾滴淚來西太後坐在一邊只吩咐她們不要心慌說皇上是氣厥等一刻自然會醒過來的一面打發了小監速召太醫前來診治奕劻等一班人只在涵元殿外屏息靜候著一會太醫來了內監們一齊叫道皇上醒了光緒帝在朦朧之間睜眼見四面坐的坐立的立圍滿了人不覺詫異道你們都來做什麽瑾妃低低說道他們來侍候陛下啊光緒帝說道我很好的要侍候做甚說著長歎一聲回身望裏去睡了西太后在旁說道他是昏瞀初醒神經錯亂你們且不要去和他多說話現在只叫太醫院診一診再說於是由太醫院診過了無非叮囑小心服侍的話太醫院出去立時配了藥來瑾妃親自動手煎好了藥慢慢給光緒帝服下西太后等皇上神色複了原狀才起身回宮皇后及奕劻等一班王大臣也進內問了安各自散去光緒帝見衆人走了才回過身來瞧著瑾妃問道他們已去了麽只問得這一句早已喘得說不出話來瑾妃忙伏在枕邊輕輕地說道陛下還請保重龍體有什麽話待痊愈了再說光緒帝微微搖搖頭表示不贊成的意思這樣又挨了一刻氣才覺平了些便伸出他估瘠的手來握住瑾妃的玉臂喘著說道俺的病症已是不起的了今天卻要和你說幾句最後的話瑾妃聽了那淚已同珠子般直望著腮邊滾下來光緒帝揮著手似乎叫她不要哭又繼續說道以俺目下的境地已沒有可以留戀倒是閉了兩眼一瞑不視的乾淨但是俺沒子嗣政權握在母后手裏俺若一死這大統是誰繼承卻不曾知道也不與我相干不過我如一言不發就這般默默地去了於我的心裏未免過意不去想俺自入繼到如今屈指已三十多年了其中雖沒甚勳績總算平平穩穩地過去至於政權得而複失怪俺太懦弱的緣故然俺是自幼進宮內無心腹之人外乏忠良輔助就是要想振刷精神也無從下手啊但戊戌政變俺原想把舊制大大改革一番重整旗鼓再張銳氣狠狠地幹他一下誰知母后不諒中途下手將俺弄得如囚徒似的這一次的打擊令俺著實灰心所以從此於一切政事不論對內對外不再開口了假使當初能依了俺的計劃國家或不至於到目今地步哩後來庚子拳亂從西安回來母后果然知道改過可已遲了總而言之俺們清代江山不久便是別人的咧光緒帝說到這裏又複喘起氣來瑾妃忍著眼淚說道陛下少說些罷光緒帝止住了喘氣大聲道今天不說還等到幾時去呢當下叮囑瑾妃道俺有句要緊的話聽不聽由著他們俺若不說出來卻很對不住祖宗皇帝因爲俺的身後入繼的人直不曾定局終是這幾個人罷了然而載洵少不更事倘付與大政守業尚不足亡國則有餘還有溥俊曾立爲大阿哥其人呆呆怎好秉政呢如其溥儀入繼他猶在稚年不曉得長成了怎樣但以孩子臨朝當然須有人攝政這攝政的人還不是醇王載澧嗎他們父子之間果是盡心輔政那可不消說了不過載澧爲人懦而無斷也非定國之人弄不好要把國家送在他手裏哩以我的主意溥字輩都在幼年必得央旁人攝政做那木偶的君主不如就俺的輩中擇一人臨政不是較爲妥當嗎不知母後怎樣辦咧光緒帝說時眼看了瑾妃說完之後雙目發定不住地瞧著瑾妃要等她的答復瑾妃知道他的意思便點頭答道待臣妾就這般告訴太后就是了光緒帝略略頷首漸漸把眼閉上氣越發急了瑾妃想皇上的病已是凶多吉少一頭嗚咽著一頭伏在床邊乘光緒帝睜眼的時候低聲說道陛下可覺清爽了些麽光緒帝微哼了一聲瑾妃又道倘然陛下真有不幸叫臣妾怎樣好呢光緒帝聽說對瑾妃瞧了一眼凝了一會神才向瑾妃道你倒不必憂慮了他們有我活著一般的作威作福我一死後一朝天子一朝臣他們也和你一樣了那時節要想自顧也不暇決不會來同你做對你倒比現在快樂哩瑾妃待要再問光緒帝已神志模糊了瑾妃見形色不好寸步不敢離開直等到天將微明光緒帝已不能說話唯拿手指著心口瑾妃忙用手去替他托著到了辰刻隆裕皇后也來了光緒帝一見皇后睜著眼望了幾望把拳頭在榻上槌了兩下似乎很是憤恨皇后一邊淌著眼淚絮絮地問瑾妃探詢皇上的病狀又過了一刻太醫來診過幾次回奏病尚可以挽回暗中已報給西太后請料理皇上後事那西太后自昨天由瀛台回宮忽覺不快雖經太醫診斷兩日之中病症也由輕變重因此支援不住及聞光緒帝病篤西太后要待親往瀛台給宮監們勸住了只令隆裕皇后代自己來慰問這天下午光緒帝只剩得三分氣息了西太后自己卻也頭昏目眩不能料理善後的事體當下召軍機大臣那桐世續等一班人入宮商議大計其時慶王奕劻往謁東陵去了所以不在朝中世續那桐等入見西太后用碧帕裹著頭斜倚在床上一見那桐等來了便開口問道咱欲在這個時候立儲你們的意見怎樣世續忙奏道皇上聖體不舒太后正宜在此時早定大計西太后點點頭道咱擬在近支的親王中選一王子入宮你們以爲如何那桐默默不語世續頓首奏道太后意在選儲是文王擇賢之心確極緊要的事但爲社稷萬世而謀現值國家多故之秋自宜擇其年長者方能臨政獨斷庶乎有望於將來不至倚權於佐臣這是奴才的愚意西太后聽了拍床大怒道立儲是何等重大你也得亂髮議論世續嚇得叩頭不止西太后望著那桐說道你道怎樣那桐奏道那選儲是國家的大事自聽太后裁處西太后說道那麽醇親王之子溥儀如何不過她年紀太幼稚輔佐的人卻不可不鄭重一下那桐知西太后意志已定諒空爭無益於是乘間道醇親王誼關父子又甚賢明就令之輔佐是最宜沒有了西太后才霽顔說道既然這樣你即去擬了詔書來那桐叩首道慶親王謁陵未還明天決然可到到了那時共同酌議進呈就是西太后沈吟了一會揮手叫他們退去第二天慶親王奕劻回朝那桐世續等便把太后的旨意說了一遍奕劻說道爲什麽又立一個稚童呢如今的時世國多變故似乎宜立年長的人世續忙說道我也這樣的說但太后因此大怒了原來世續的意見正和光緒帝臨危所講的立儲之言暗合可惜西太后固執成見不肯聽從結果將天下送掉不是天數嗎這是後話不提再說那桐等把草詔擬就給奕劻攜帶入宮叫他在太後面前隨時諫阻最好拿這成議打消別立長君奕劻滿口答應便匆匆地進宮去了奕劻進見時西太后正昏臥不醒只得靜候在外等了一會內監在窗外打著號聲道老佛爺醒了那一班宮監聽得呼聲紛紛進去遞水進茶地忙了一陣才詔奕劻進見奕劻慢慢地走到床前叩頭既畢西太后問道你已回來了麽立儲的事他們可曾告訴過你奕劻忙奏道奴才已經知道了現擬草詔在這裏請太后禦鑒西太后接過草詔讀了一遍望著奕劻道你的意見如何奕劻是何等乖覺的人平日本以迎合西太后爲趨旨世續還希望他諫阻誰知奕劻始終不曾開口呢當下西太后吩咐奕劻道那你可下詔去布告天下吧奕劻領了諭旨出來即會同那桐等發詔頒佈立儲進宮去複了旨意即召集內外臣工宣讀詔書畢著世續赴醇王府邸召載澧入宮世續去不多一會便和醇親王載澧進宮謁見太后西太后對醇王說道咱現立你之子爲儲君你意下怎樣載澧叩頭道奴才悉聽聖裁西太后道你子尚在稚年不可無教之之人可命世續任太傅你也同心相輔毋負咱意醇王載澧謝恩退出當由滿漢大臣捧了詔書到醇王府去迎溥儀入宮不期醇王的太福晉抱住了溥儀堅不肯放大臣等再三地解說太福晉大哭道他們把咱的兒子快要弄死了卻又來要咱的孫子去嗎這是咱們萬萬不答應的了因爲那太福晉是老醇王奕譞的妻子也是西太后的妹子光緒皇上乃老醇親王之子和醇王載澧是親兄弟啊所以溥儀的入繼同光緒帝是叔侄並兼祧穆宗皇帝但太福晉既不答應一班大臣自然束手無策後來醇王載澧在宮中等得不耐煩了回到邸中來探問時見太福晉不肯領旨知道她痛惜孫兒不由得也潸然淚下於是由醇王跪著泣告把太福晉苦勸一番說諭旨不可以違逆的太福晉無法只得抱持著浦儀親自送他上車又哭了一陣始含淚回到邸中這裏王大臣等擁著溥儀蜂聚似地將他護衛進宮腳步還不曾立定忽聽得內監飛般地跑來報道皇上已在瀛台薨逝西太后聽說皇上薨逝便長歎了一聲回身倒在床上半晌方才醒過來這時王大臣等已都齊集榻前聽候旨下西太后草命了遺詔一面令衆大臣等先扶持溥儀正位由慶親王詔布天下遺詔上令醇親王載澧暫照開國睿親王輔政例爲政事攝政王一切大事均由攝政王擬定後再呈禦覽施行諸事已畢大臣等忙著料理光緒皇上的喪事正在這個當兒忽報老佛爺病篤速命衆大臣進宮聽受遺命這樣一來宮中立時紛亂起來了隆裕皇后和壽昌公主及一班親王大臣慌忙到西太后宮中見西太后已兩目緊閉一言不發衆人侍立了半天隆裕後在床前立得近西太后忽然睜眼問道溥儀已正位了嗎隆裕後答道今天正位的已布告天下了西太后不語又等了一會才吞吞吐吐地說道以後政事你可和攝政王共同酌議行事又召攝政王載澧近床低聲叮囑道你既受著攝政重任對於國家大事須秉承隆裕後意旨而行不可獨斷致貽後來之患載澧頓首受命西太后要待再說幾句那喉間痰已上湧舌頭發木話語含糊不清只恨恨地槌床而已這樣的過了些時衆臣鴉雀無聲地靜待著忽見西太后從床上直跳起來瞪著兩眼形狀十分可怕隆裕後慌忙上前和內監等竭力把她扶住西太後兀是掙扎著要掙脫了身子任她去狂跳一會才是舒適哩這種現象是表示病人胸臆中非常難過所以連睡也不安穩了但到底人多終究把西太后按捺下去後來在場的內監對人說當時西太后的氣力比什麽人都大因西太后于沒病的時候喜歡習練拳術每天清晨起身之先坐在床上練一套八段錦的功夫練好之後內監遞上一杯人乳西太后飲畢又墨坐一會飲幾口參湯才穿衣起身待盥嗽好了再進一碗燕窩粥方始出去臨朝天天這樣自西安回宮後從不曾間斷過於是西太后的身體異常地強健她在未死之前只稍爲冒一些寒或不致於就死但光緒帝賓天的隔日西太后還命發遺詔又親自過目形色很是舒適怎麽相去兩日西太后出就死了呢因此有疑她是服了毒的又說她是吞金的到底怎樣後人也只有一種猜測罷了其時西太后和蚯蚓般滾撲了幾次看看力盡了才倒頭睡下倒抽了兩口氣雙足一挺隨著光緒帝到黃泉相見去了西太后既死她的身體都變了青黑色人家說她服毒而死這句話或許有些因頭咧但西太后起病的緣由實是鴉片煙的孽根當道光壬子年五口通商把鴉片的禁令從此廢馳了那時不但宮禁如此就是一般滿漢大臣以及紳縉平民都視鴉片如命此時社會交際拿鴉片做唯一的應酬品凡是熱鬧的都會無不設有煙土買賣處和吃喝的大煙間不過宮中所吸的鴉片是廣東地方貢獻來的那鴉片的氣味格外來得香一點第一個發明的是廣東陸作圖因他家裏那口井水色碧綠用來熬煎煙膏香味比別的要勝十倍廣東的人都曉得的兩廣總督將這煙進呈宮中西太后十分讚美從此以後凡任兩廣總督的照例要每年進呈煙膏若干而西太后尚嫌不足索性請了陸作圖入宮專替她燒煙陸作圖死後他燒煙的法子只傳授他的妻子西太后又命陸妻進宮月給工資二百兩充了熬煙的女役當文宗登極身體很爲脆弱不時吸著鴉片借它助長精神洪秀全起義其勢猶如破竹清廷震駭異常文宗焦思不安一天到晚把鴉片解悶時西太后還是貴妃孝貞後每規勸文宗不要沈溺在阿芙蓉裏文宗極畏懼孝貞不敢公然吸食便悄悄地到西太后宮中去吸一連三天不曾出宮孝貞後聽得不覺大驚道國勢如此危急皇上怎好這般糊塗於是親自到西太后宮外叫太監朗誦祖訓照例內監奉懿誦訓皇上須要跪下聽的所以文宗慌忙出來跪聽讀訓畢匆匆離去孝貞後見文宗出宮便召西太后到坤甯宮因坤甯宮是皇後行大賞罰的地方文宗聽得孝貞後在坤甯宮責西太后趕忙前去救護孝貞不肯答應說西太后蒙迷聖聰罪當受責文宗百般地央告並說西太后已有孕孝貞才恕了她咸豐庚申英法聯軍進京文宗出守熱河心裏愈加憂急簡直在鴉片煙裏度日了西太后已生了穆宗冊封爲懿妃了就伴著文宗侍候裝煙也把鴉片煙吸上穆宗繼統西太后進位聖母孝欽皇太后和文宗皇太后同臨朝政便公然吸食鴉片了而且命廣撫進貢廣煙煙槍是文宗遺物有人瞧見過那煙杆已和紅玉一般了光緒戊申年清廷鑒於鴉片的危害決定再下禁令西太后見滿族的親王吸煙的太多怕一時不得實行想拿自己做表率先自戒起煙來誰知煙癮已深一旦屏除如何吃得往呢不到幾天就感到不快光緒帝病重時西太后正在戒煙第一次皇上病昏西太后還勉強能支援後來雖連得到光緒帝的病篤消息西太后已然臥床不起了以故只令隆裕後替代著去探視皇上光緒帝駕崩的隔日西太後還想勉力起來給內監們勸住其時慶王奕劻也有鴉片煙的嗜好他見西太后戒煙得病就去弄了一隻金盒裏面滿盛著煙膏于進見西太后時從袖中取出來進上去道老佛爺慈躬不豫莫如開了這個戒罷西太后見說把金盒往地上一擲道誰要吸這鬼東西快與我拿出去慶王碰了一鼻子灰就諾諾地退出不到兩天西太后就此薨逝臨終的時候還諄諄告誡著親王們切莫吸食鴉片咧要知後事如何且聽下回分解
