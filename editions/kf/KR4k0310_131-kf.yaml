body:
  text: 第九十一回乍解羅褥小禿驢得趣鬧翻繡闥大司馬捉姦卻說竇娘娘偎在章帝的懷裏故意哽哽咽咽地哭將起來章帝被她這一哭倒弄得莫名其妙忙問她道娘娘什麽事不如意這樣的悲傷莫非怪孤家強暴了麽她答道萬歲哪里話來妾身不許與萬歲便罷既沐天恩還有什麽不如意處呢不過臣妾今天聽得一個消息非常真切如果這事發生恐怕要與萬歲大大的不利呢章帝聽她這話連忙問道娘娘得著是什麽消息快道其詳她道萬歲將宋貴人囚入冷宮究竟爲著怎麽一回事呢章帝道這狗賤人私通太醫殺之不足以償過將她囚入冷宮還算格外加恩哩她道萬歲雖然不錯但是她的哥哥宋揚聽說妹妹囚入冷宮大爲不服聯絡梁貴人的父親梁竦陰謀不軌並在京內造謠惑衆弄得人民惴惴不安所以臣妾想到這裏很替萬歲憂愁不淺因此落淚章帝聽她這番話驚得呆了半晌對她說道哦果然有這樣的事麽她道誰敢在萬歲面前講一句虛話呢章帝道怪不道這些賊子近兩天早朝都是默默的沒有什麽議論原本還懷著這樣野心呢別的我倒不說單講這梁貴人難道孤家待她薄麽她的父親居然這樣的無法無天我想她一定是知道的竇娘娘在枕上垂淚道萬歲不提起梁貴人倒也罷了提起她來臣妾不得不將她的隱事告訴萬歲了章帝道你說你說我沒有不相信的她道這梁貴人的性子真是一個火燎毛一言不合馬上就來胡纏瞎鬧章帝詫異道那麽她見了我總是溫存和藹的從未失一次禮節呢她連忙說道萬歲哪里知道她見了你當然不敢放肆但是萬歲只要三天不到她的宮裏去暗地裏不知咒駡多少呢我幾次聽見她的宮女們來告訴我我還未十分相信前天我到濯龍園裏去散心從她的宮門口經過她不但不出來迎接在宮裏面潑聲辣語地指張罵李萬歲爺你想想看我是一個六宮之主豈可和她去一般見識麽只得忍耐在心不去計較她誰想她竟得步進步在宮中越發肆無忌憚了前天萬歲在未牌時候可曾召哪個大臣進宮議論什麽事情章帝忙道不曾不曾她故意恨了一聲道我早就知道這賤人的私事了原來還有這樣的能耐呢我倒要佩服她好大膽章帝聽她這話不禁問她什麽事情她停了一會才說道還是不要說罷說出來又要得罪了別人章帝急道娘娘你只管說出來我怕得罪誰她道萬歲既然不怕我當然是說出來聽說那天未奉旨意的大臣據他們傳說就是第五倫章帝聽得這話不禁勃然大怒道好好好怪不道那匹夫每每諫阻孤家的命令原來還有這樣的事呢他們兩個談談說說不一會雞聲三唱景陽鍾響章帝匆匆地起身上朝受衆文武參拜已畢便下旨意將梁竦宋揚拘提到殿章帝將龍案一拍罵道孤王對於你們有什麽不到之處膽敢這樣的目無法紀造謠惑衆你們的眼睛裏還有一些王法嗎章帝越罵越氣不由地傳了一道聖旨推出午門斬首這時三百文臣四百武將一個個如同泥塑木雕的一樣誰也不敢出班多事獨有大司空第五倫越班出衆俯伏金階三呼萬歲章帝見來者正是第五倫不由得怒從心上起惡向膽邊生冷笑一聲對第五倫問道大司空出班敢是又有什麽見教麽第五倫奏道我主容奏臣聞湯武伐紂尚須先明罪狀今梁竦宋揚陰謀不軌應即處以死刑惟謀叛的憑證何在或者爲人告發萬歲當亦指出此人與梁宋對質使彼等雖死無怨臣濫膺重任迫于大義思自策勵雖有死不敢擇地愚衷上瀆伏乞聖裁他奏罷俯伏地下聽候章帝發落章帝聽罷氣衝衝地喝道第五倫你身居台輔不思報效國家爲民除害反而爲這些亂臣賊子狡詞辯白顯系有意通叛來人將他抓出去砍了第五倫面不改色從容立起來就綁那一班值殿的武士刀光灼灼將第五倫牽了出去這一來衆文武越不敢置詞保奏正在這萬分危急的時候太傅趙熹剛由洛陽回京聽說要斬第五倫大吃一驚火速上朝剛走到午朝門外瞥見第五倫等三個人已上樁撅只等旨下便來動刑了趙熹大踏步喘吁吁地喊道刀下留人我來保奏衆武士見太傅上朝誰也不敢動手了這時太尉牟副司寇陳凡吏部尚書魚重見事到如此再不出來保奏眼見第五倫第三個人就要送掉性命了他三人一齊出班保奏第五倫章帝哪里准奏忙命值殿官懸起上方寶劍他口中說道誰來保奏就令他和第五倫同樣受刑嚇得他們不敢再奏退身下來暗暗叫苦牟融悄悄地說道可惜太傅在洛陽又未曾回來如果他來一定能夠將第五倫保奏下來的除了他別人再沒有這樣能力話還未了瞥見黃門官進來報道太傅由洛陽回來要見萬歲章帝聽了便著了忙連教請進來一方火速傳旨去斬三人誰知那些武士見聖旨出來就如未曾看見的一樣挺腰叉手動也不動那傳旨官疊疊地催道聖旨下快快用刑罷那些武士齊聲答道現在太傅前去保奏了難道你不知道麽誰敢去和他老人家作對呢我們沒有兩個頭顱只好守候他老人家去保奏過了若是不准再爲動手不遲那傳旨官喊道難道你們不服聖旨麽他們齊道他老人家已經對我們關照過了誰敢去捋虎須呢雖有聖旨只好再等一會子罷不說他們在這裏辯論再說趙熹踉踉蹌蹌地趕到金階之下握住鬍子喘了半天才俯伏下去三呼萬歲章帝即命金墩賜座趙熹發出一個顫巍巍的聲音說道敢問我主大司空犯了什麽大罪章帝安慰他道老愛卿遠涉風霜何等的勞苦孤家實在不安請回去靜養靜養吧第五倫身犯不赦之罪所以孤家一定要將他斬首的這事也無須老愛卿煩神趙熹忙道萬歲這是什麽話第五倫犯法應當斬首但是也該將他的罪狀宣佈於微臣考察考察是否可有死刑之罪那時方不致失卻萬民之望而且第五倫司蜀郡十有二年清廉簡正有口皆即使他縱有一二不到之處我主也應念他的前功施以懲勸方不失仁君之大旨今萬歲遽然不念前功施以極刑不獨離散群心亦失天下之仰望將來社稷前途何堪設想呢我主要殺第五倫微臣不敢阻止但是先要將他的罪狀宣佈如果欲以莫須有三字屠殺朝廷的柱石寧可先將老臣這白頭砍下懸在午朝門外那時隨我主怎樣了他說罷起身下座重行俯伏地上聽候章帝發落章帝被他這番話說得閉口無言沒了主意停了半天方才答道老愛卿且請歸坐容孤家再議趙熹奏道我主請不必粉飾赦殺與否請付一明決罷章帝答道老愛卿請勿深究孤家准奏將他們放下就是了趙熹奏道這如何使得要是被萬民知道還要說老臣壓迫聖躬強放罪魁呢章帝道前情一概不究命他改過自新這是孤家的主見怎好說是老愛卿強迫呢他說罷忙下旨將第五倫放下官還原職梁竦宋揚削職徙歸趙熹舞蹈謝恩滿朝文武誰不咋舌稱險退朝之後趙熹又將群僚責問一陣子誰也不敢開口和他辯白再說章帝回宮便命梁貴人收入暴室竇娘娘便將她所生的兒子劉肇收到正宮撫養章帝趁此就將劉慶發爲清河王將劉肇立爲太子可憐梁貴人到了暴室中不到半月竟香消玉殞了隔了幾天竇勳忽然得了一個中風的症未上幾小時竟嗚呼哀哉大司馬竇憲聞訃進宮竇娘娘聽說父親死了只哭得淚盡腸枯便在章帝面前說要回去省親致祭章帝很讚美她的孝行一詞不阻便准了旨擇定建初六年四月二十日回家致祭大司馬得旨忙命人高搭孝篷長至四五裏之遙延請高僧六七十個在府中超度文武百官誰不來趨奉他呢你送禮我擺祭真個是車水馬龍極一時之盛但是在這熱鬧場中卻有一件極有趣味的事情不妨趁此表了出來這竇憲依著他妹妹脂粉勢力出車入馬富埒王侯婢仆如雲妾媵盈室一舉一動莫不窮極華貴滿朝側目敢怒而不敢言雖有趙熹第五倫第幾個剛直不阿無奈第五倫因爲前次受了挫折不願再作傀儡趙熹年高昏耄眼花耳聾漸漸的沒有什麽精神來彈劾這些奸佞了牟副爲人靜肅不喜多事所以將一個竇憲驕得不可一世了這次他的父親死了居然出斧入鉞一切儀仗與天子無甚差別單說他的姬妾一共有四十七個俱是橫占霸奪來的其中有一個我叫驪兒的生得花容月貌貝齒星眸芳齡只有二九零一可是她的生性鳳騷那竇憲疲於奔命一天應付一個派下來須要一個多月才臨到她這裏一次呢得到實惠與得不著實惠還未可知試想這朵剛剛開放的鮮花常常挨饑受餓得不到雨露還能不生欲望麽只好在暗裏別尋頭路以救燃眉她的解饞人本是竇憲面前一個侍尉名叫杜清年輕力足還能滿她的欲望常常到了風雨之夕這杜清見他的主人不來便很忠實地來替他主人做一個全權代表了暗渡陳倉的老調兒竟有二年多了終未有被一個人看出破綻來到了現在府中正忙著喪事人多眼雜那個越俎代皰的事情只好暫告停止所有的妻妾一齊住在孝帳裏守孝那些和尚成日價的鐃缽叮噹地念著到了第四天新到一個西域的小法師大和尚與恩光禪院的方丈便請他登堂拜懺那小法師年紀不過十七八歲穿著五色輕俏的袒衣雜著衆僧走到孝堂裏面去拜懺一時哆羅哆羅不南嚕蘇之聲不絕於耳那一群婦女循例嬌啼婉轉和衆僧的念懺的聲音互相混著煞是好聽停了一會衆僧將一卷玉皇懺拜完一齊坐在薄團上休息那孝帳裏一群粉白黛綠之流不住地伸頭向外窺探大家不約而同將視線一齊集到這位元小法師的臉上這小法師也拍了回電只見一群婦女之內只有一個入他的眼睛無形中四道目光接觸了好幾次各自會意不多時天色已晚衆和尚又在孝堂裏擺下法器放著瑜珈焰口放到四更以後那些和尚東倒西歪的都在那裏打瞌睡了這小法師卻懷著滿腔心事兩隻眼不時向孝帳瞄著不多一會瞥見有一個人從孝帳裏婷婷嫋嫋地走了出來他定睛一看不是別人卻就是日間看中的那個麗人他不禁滿心歡喜只見她輕移蓮步慢展秋波四下裏一打量不禁向小法師媚眼一瞟嫣然一笑這一笑倒不打緊將一個小法師骨頭都酥了她用手向小法師一招慢慢地退向屏風後頭而去這小法師身不由己地站了起來隨後進了屏風只見她蓮步悠揚地在前面走著這小法師色膽如天一切都不暇去計較了追到她的身邊伸手將她一摟親了一個嘴說道女菩薩可能大發慈悲施救小僧則個她微微一笑也不答話用手將他推開一徑向左邊的耳房而來他哪里肯舍竟跟著她進了房只見裏面除了她沒有第二個他不禁喜從天降一返身撲地將門閂起走到她的面前雙膝一屈撲通往下一跪央告道女菩薩可憐貧僧吧她故意嬌嗔說道你這和尚忒也大膽爲什麽好端端地闖到人家的閨閣裏來做什麽的難道你不怕死麽小法師道娘子日間早就對我打過照面了怎的到了這會子反而假裝起正經人來是什麽緣故呢今天我就是死了也不出去的求娘子快點開發我吧她揚起玉掌照定他的臉上啪的就是一下子故意說道誰和你在這裏混說呢趕緊給我滾出去不要惹得我性起馬上喊人將你捆了小法師不獨不怕反滿臉堆下笑來忙道不想我這嘴巴上竟有這樣的福氣得與娘子的玉手相親近還請娘子再賜我幾掌她星眼斜飄嗤地一笑道看不出你這個小禿驢反知趣咧你起來罷小法師聽她這話真是如同奉著聖旨一樣一骨碌從地上爬起來將她往床上一抱寬衣解帶共赴陽臺了不說他們正在巫山一度再說那個杜清將竇憲送到十八姨娘的房裏自己退了出來正走到前面的孝帳裏用目一張只見那些守孝的人和一群和尚均已酣然入夢了他大膽著伸頭朝孝帳裏面一張卻單單不見了驪兒他不由得心中詫異道她本來是與大衆一同守孝的此刻不見莫非是回房去睡覺了嗎他尋思了半天暗道我且去看看她究竟是到哪里去了他便離了孝帳一徑向後面而來剛剛走到她的房門外耳朵裏忽然聽到一種奇怪的聲音他屏氣凝神地聽了片晌不禁怒火中燒不可遏止暗道原來這賤人還是這樣的人物呢好好管教你今日認得咱老子的手段他說罷離開這裏一徑向竇憲房中而來不一會到了竇憲的房門口用手在房門上面一拍裏面有人問道誰呀杜清連忙答道是我竇憲聽見他的聲音連忙問道杜清你此刻還不去睡覺到我這裏來做什麽呢他道請大人起來我有要事稟報竇憲見他半夜三更的前來料知事非小可連忙一骨碌起身將門放開只見他滿臉怒容竇憲問道杜清你有什麽要緊的事請你就說吧杜清道請大人將寶劍帶著跟我到一個地方去自有分解竇憲真的挂起寶劍隨著一徑向前面而來走到驪兒門口杜清止住腳步悄悄對竇憲笑道大人請你近來細細地聽聽看究竟是一回什麽事情竇憲附耳靠門聽了一會只聽得裏面吱咯吱咯的床響和一種狎昵的聲音他不聽猶可這一聽不禁將那無名怒火高舉三千丈按捺不下一腳將門踢開瞥見床上一對男女正在那裏幹那不見天的事哩他定睛一看男的卻是一個六根未盡的小法師女的卻是自己的愛妾驪兒他不禁勃然大怒拔出劍來颼的一劍砍去那法師上面的頭卻離了本位骨碌碌向房外去了這時鮮血直噴驪兒見了這樣只嚇得魂不附體啊呀兩個字還未喊得出口劍光到處早已身首異處了杜清見將她殺了未免心中倒暗暗地懊悔起來卻不敢說了出口只得私下裏叫苦竇憲將二人殺了便對杜清道你趕緊去喊兩個侍尉將這狗賤人與禿驢的屍首悄悄拖出後門埋入花園裏面不准聲張杜清唯唯答應轉身出去不多一會帶來兩個人將他們的屍首用力一提說也奇怪小法師的兩隻手緊緊抱著驪兒竟像生根了一樣任你怎麽提拔紋風不動他們見了這樣反倒沒了主意杜清道提不開就將他們兩個屍首一併擡了去罷有一個侍尉答道那卻如何使得擡出去萬一被人看見這赤身露體的一男一女究竟像一個什麽樣子呢竇憲見他們盡在這裏猶豫不禁怒道你們這些無用狗頭這一點事都不能完全的辦妥了還有什麽用處他說罷拔出寶劍將小法師的兩隻膀子砍了下來這一來可離開了他們一人背著一個徑向後園而去這正是生前何幸同羅帳死後還應共一邱要知後事如何且看下回分解
