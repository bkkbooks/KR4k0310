body:
  text: 第九十回接木移花種因孽果劍光血痕禍起蕭牆卻說西太后自幽囚德宗之後自己便第三次垂簾再握朝政一班掌權的大臣如榮祿剛毅趙舒翹等沒有一個不是親信之人舊臣裏除了王文韶之外多革職的革職遣戍的遣戍王文韶因和榮祿最要好所以能保持著地位但西太后於內政雖一手把持對於外事不免有鞭長莫及之歎了其時康有爲和梁啓超等又在日本設立什麽保皇會宗旨是保護德宗驅逐西太后附和的人一時很覺不少這消息傳來西太後十分不安當時召集軍機大臣議善全的辦法西太后的意思以爲康梁雖遠在海外恐終久爲患必得一個消弭的良策方能高枕無憂可是衆人躊躇了半天卻籌不出善策來這時剛毅要討西太后的好便密奏道奴才的愚見那康梁在海外招搖無非借著保皇的目標罷了要剷除他們假借的名目唯有從立儲入手再慢慢地設法正位斬草除根他們沒有頭兒自然易解了這幾句話倒把西太后提醒於是趕緊辦立儲的手續那些近支親王貝勒貝子聽了立儲的消息誰不想嘗禁臠呢尤其是和德宗同輩的親王都想把自己的兒子入繼將來一登大寶至少也失不了攝政王的名分因此大家在暗中競爭異常地劇烈其中惟端王載漪的兒子溥俊希望最大醇王載澧貝勒載瀾也在那裏鑽謀但最後的結果卻被端王占了優勝這樣一來便引起下面的糾紛來了總而言之是滿清氣數垂盡的表現啊不過端王的兒子溥俊被立爲儲君的經過也有一段因果在裏面原來端王的福晉生得月貌花容很是楚楚可人西太后也不時地召入去和格格們一起值班那福晉又善體人意所以極得太后的歡心溥俊因他母親入值的原故也得出入宮禁了然溥俊的爲人很是愚笨對於讀書兩字視做七世冤家一樣而于街巷俚曲卻很是用心而且一學便會不論徽調秦腔昆曲都能胡亂唱幾句西太後所喜歡的是聽戲空閒時叫溥俊唱兩聲倒不見十分討厭於是常常得溥俊留在宮中此次立儲諸大臣當然共保溥俊西太后也正合心意因西太后志在政權她知道溥俊愚憨易入自己的掌握假使立了個聰明幹練的人一旦政權在握怕不演出第二次政變來嗎故此決意立了溥俊那是西太后的盤算啊當下西太后命召端王載漪到頤和園議事把溥俊承嗣穆宗入繼大統的諭旨給端王看過了端王滿口應許並擇定吉日送溥俊進宮立爲大阿哥西太后把第一步辦妥便待實行第二步了以立儲的名目諭知內外臣工準備廢去德宗再立溥俊爲皇帝期定明年新正一面通電各省疆吏一般舊臣如王夢樓孫毓文等上疏力爭疆臣如李鴻章張之洞劉坤一等紛紛上章諫阻說皇上未曾失德不可輕易廢立還有英法日俄各國得了廢立的消息深恐中國因內政鬧出事來也提出警告西太后見大勢如此只得和諸大臣商議儲君既已成立於廢立一事俟外界空氣和緩時再議不遲但這樣的一阻礙朝裏誰也不敢提廢立的事了這樣便把個端王載漪直氣得咆哮如雷倘溥俊做了皇帝自己就是太上皇了如今到手的榮華眼見得成了泡影這如何不氣呢況廷臣疆吏的阻諫都可以用專制手段強迫不怕他們不承認獨有外人的借名干涉卻是無法奈何他們了所以端王的憤怒外人無異切骨之仇常常乘機報復要想設法把外人盡行驅逐出去私下和載瀾剛毅一班人密議籌那對付外人的計劃語雲物必先腐而後蟲生端王既有了仇外之心自有那拒殺洋人的義和拳乘時而起不是天數嗎這且不在話下再講到那義和拳的起點本在山東地方其中的首領原是八卦教的張鸞八卦教自經清兵剿滅後多年不敢出頭甲午之役清廷割地求和民間很有幾個義憤不平的人紛紛議論說清廷懦弱受外夷的欺淩長此下去中國勢必至豆剖瓜分不已張鸞見民氣激昂便和他女婿李來忠女兒張秀英豎起扶清滅洋的旗幟到處傳教招攬人民入教張鸞也會些左道旁門替人用符咒治病很有些小驗因而一班愚夫愚婦信以爲真都紛紛入教這時山東的巡撫毓賢恰巧他的愛妾生産不下請醫生用藥好似石沈大海毫不見效毓賢急得沒了主意便有人舉薦張鸞毓賢聽了不問他靈不靈立時召見張鸞到撫署裏把符咒來診治張鸞就做了一套鬼戲念了幾句神咒胎兒果然下地母子俱不曾損害毓賢大喜叫用自己的大轎送張鸞回去過了幾天毓賢命人賞三千塊錢去謝那張鸞張鸞卻分文不受只要求毓賢出一張保護的告示毓賢也不躊躇即令出示曉諭本省的官府謂義和拳是一種義民志在扶清滅洋地方官員須一體保護巡撫既這般慫恿那些州縣下層益發不敢得罪他們了於是張鸞在山東地方得任意作爲又不受官廳的禁阻崇信的人民越多勢力漸漸地擴大起來張鸞的女兒秀英便自稱黃蓮聖母招了一隊婦女各人穿著紅衣紅褲手裏拿了一盞紅燈出遊四處又倡言道洋人的槍炮雖厲害只要把紅燈一照他們自爲炸裂的於是紅燈照的名目傳遍了山東全區張鸞和他女婿李來忠還造出一種靈符來令人佩帶在身上臨陣時刀槍水火都不能傷這般的狂言號召不到半年黨羽已有八九千人了外人在山東設立的教堂一齊被他們焚毀還殺了十幾個教士當時的外人在中國的勢力遠不如今日他們吃了義和拳的虧惟向督撫交涉毓賢便敷衍幾句外人也忍氣吞聲地罷了義和拳的威勢便日振一日外人著實有點懼怕一聽義和拳三字早嚇得魂膽俱碎了後來毓賢調任袁世凱來做山東撫台其時的義和拳差不多鬧得到處皆是了袁世凱見他們這樣地混亂道不是好現象就傳了總鎮把義和拳痛剿一番直打得落花流水張鸞也死在亂軍之中所逃出的是李來忠和他的妻子張秀英並一班殺不盡的餘黨然義和拳形勢已成各省都有黨羽他們因山東不能立腳跑到天津來了直隸總督裕祿見義和拳張著滅洋旗幟很是敬重他們還請李來忠到督署裏和神佛般供養著因而義和拳的勢力在天津更是擴大了那時李鴻章出任兩廣總督後所練的神虎營兵馬本歸端王統帶端王爲憤恨外人干預內政想報這口怨氣天天把神虎營操練著可巧剛毅南下返京經過天津時裕祿將義和拳的情形細細地講了一遍說他們興清室滅洋人這是清朝的洪福不該被外夷吞併所以天降異人來扶助若能令太后信任大事成功清室中興那功績可就大了剛毅和裕祿原系姑表親現被裕祿把言語打動早已深信不疑便應許隨時保薦義和拳等剛毅回京時端王恰和他商議編練神虎營要待改爲兩鎮剛毅乘間問道那神虎營的兵馬還是從前曾左的舊制若那時征剿發逆似乎有些力量倘要和洋人開仗就變沒用的了你不記得甲午的一戰麽洋人的槍炮真不知多麽厲害哩端王聽了如兜頭澆了一勺冷水半晌才說道那麽我們永受洋人的欺淩簡直沒有報複的時日了說著便深深歎了一口氣剛毅接著說道且不要灰心古語說得好一物一制洋人的槍炮果然狠了卻還有能制服槍炮的呢端王說道你看滿朝臣工哪一個能敵得住槍炮就是全中國也不見得有這樣的人吧剛毅笑道這話太一筆抹殺了當初發軍起事何等厲害真是所向無敵末了卻給曾左諸人殺得東敗西竄出一種人自有一種人去克制他這也是本朝的洪福啊端王見剛毅話裏有因忙很誠懇地說道俺老住在京裏外面的事絲毫也不知道你方從外省回來或者曉得有能制服槍炮的人你如舉薦出來俺當即奏聞太后立時把那人重用就是了剛毅說道王爺既這般真誠現放著義和拳的人馬何妨召他們來用一下呢因把裕祿招留的義和拳怎樣地厲害裕祿親自試驗過的確槍炮不務便將他們的名稱改爲義和團細細講了聽得端王哈哈狂笑起來道天下有這樣的神兵真是天助我大清了當時即令剛毅飛馬出去著裕祿知照義和團連夜進京聽候調遣剛毅見說正中下懷立即去通知裕祿於中行事這裏端王在上朝的時候就拿義和團保清滅洋神通廣大奏聞了西太后西太后搖搖頭道那怕未必見得多不過是白蓮教一類邪術罷了端王見太后不信又來和剛毅商量一面招收義和團一頭托李蓮英在太后面前攛掇西太后心上很在些被他們說得活動起來那天津的義和拳已紛紛入京到處設壇傳教毀教堂殺教民各國公使提出交涉直隸總督榮祿因受端王指使一味遷延不理各公使沒奈何只得調外兵登陸保護自己的使館這消息給義和團得知便要求端王發令去圍攻使館端王一時未敢作主團衆在邸外鼓噪愈聚愈多恰巧日本領事館書記官杉山彬木和德國公使克林德氏兩人乘車經過團衆瞥見杉山彬木劉聲大呼殺日本人報甲午戰敗之仇這時人多口雜不由分說拳足刀劍齊用將杉山彬木砍死在車中了德公使見此情狀正待回身逃走團衆又連呼快殺洋人把德國公使克林德也殺死了才一哄散去端王見事已鬧大恐西太后見罪便私下和剛毅徐桐趙舒翹等秘密商議捏造了一張公使團的警告書令太后歸政廢去大阿哥即日請光緒皇上臨朝他們計議妥當便來見西太后其時因團衆殺了德使和日本書記官榮祿聽得慌忙奏知太后說端王慫恿邪教羽翼殺死公使將來必釀成大交涉西太后聽了深責端王妄爲方待宣召問話端王恰來進見並將僞警告書呈上西太后讀了正觸自己的忌諱不覺勃然大怒道他們敢干預咱們內政麽咱歸政與否和外人有什麽相干他們既這樣放肆咱非把他們趕出去不行端王忙奏道奴才已飛電徵調董福祥的甘勇進京諒早晚可到那時一鼓而下將使館圍住一齊驅逐他們出京就是了西太後聽說只略略點點頭榮祿在旁知西太后方盛怒的時候不敢阻攔但朝裏滿漢大臣聽得圍攻使館驅逐外人都曉得不是好事於是漢臣徐用儀許景澄滿人聯元立山等一齊入諫西太后還余怒未息便厲聲說道你們只知袒護著外人可知道他們欺本朝太甚嗎徐用儀等欲待分辯西太后喝令將徐用儀等交刑部議處端王乘機奏道徐許諸人曾私通外人證據確實若不預給他們一個儆戒難保無後繼之人這種漢奸萬不可容留求太后聖裁西太后稱是即命端王任了監斬將徐許等一干人綁赴西市處斬一時滿朝文武皆噤如寒蟬誰敢開半句口自取罪戾呢自從徐用儀等處斬後朝中斥漢奸之聲差不多天天有得聽見稍涉一些嫌疑即被指爲通洋人的漢奸立刻處斬還有那不信邪教的官員都給端王奏聞治罪義和團的黨羽在京建了高壇聲言召神文武大臣須每天赴壇前叩頭如其有不依從的無論滿漢大臣一概處私通外人的罪名這個當兒漢臣已殺戮革職去了大半所餘的寥寥無幾了舊臣如王文韶也幾乎不免在大殺漢奸的時候載瀾上疏時附片裏說王文韶也是漢奸應當斬草除根其時榮祿與王文韶同在軍機處辦事歷朝的舊章滿漢軍機大臣同是大學士那朝臣的奏疏例須滿臣先看過了才遞給漢人當時榮祿看了載瀾的奏事再瞧了瞧附片便往袖管裏一塞他裝著沒有這事一般仍看別的奏疏王文韶也漸漸瞧到載瀾的奏疏回頭問榮祿道瀾公有張附片掉到哪里去了榮祿含糊應道只怕失去了吧王文韶見說也只得點頭而已兩人看畢奏章同去見西太后把所看的各處奏疏一一奏聞了榮祿便從袖管中取出那張附片呈給西太后道載瀾不是胡說麽西太後接了附片看了一遍勃然變色道你可以保得定他嗎榮祿頓首奏道奴才願以百口保他西太后厲聲說道那麽將此人交給你如有變端唯你是問榮祿忙叩了頭謝安退出王文韶這時雖也跪在一旁但他因爲耳朵重聽所以始終不曾聽見這且不提再講義和團此時聯合甘勇攻打了使館各國紛紛調了軍艦直撲天津而來要知後事如何且聽下回分解
