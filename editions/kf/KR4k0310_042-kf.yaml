body:
  text: 第四十三回證前盟和珅弄權結深歡高宗宿娼卻說乾隆帝當時見了那擡轎的少年不覺心裏一動心想這人十分面善在什麽地方見過的朕和他從前是十分親熱的怎麽一時想不起來了他怎麽又替朕擡著鑾輿呢乾隆帝這樣怔怔地想著那班侗候的內監看見皇上這副神氣也十分詫異只得靜悄悄地看著忽然看見皇帝走下鑾輿來吩咐儀仗收了不出宮去了一面自己踱進宮去一面傳旨把那擡轎的少年傳進宮來那少年也莫名其妙他從來也不曾進宮去過今見天子傳喚他嚇得他渾身打戰走進宮去內監領他走進禦書房跪在地下一動也不敢動動皇帝在屋子裏踱來踱去吩咐內監一齊退出便開口問你叫什麽名字那人磕著頭說名叫和珅又問他多大年紀回奏說二十四歲又問他什麽出身回奏說是滿洲官學生這時乾隆帝忽然想起來了原來這和珅的面貌和從前勒死在月華門下的馬佳妃一模一樣絲毫不差屈著指兒算一算那馬佳妃死後到現在恰恰二十四年乾隆帝想起以前馬佳氏一番情形不覺心中一酸自己在椅子上坐下喚和珅近身來又喚他把衣領解開來乾隆帝看時見他頸子上果然有一點鮮紅的血痣乾隆帝忍不住把和珅一抱抱在懷裏掉下眼淚來說到你怎麽投了一個男身呢和珅認做皇上發瘋了慌得他動也不敢動一任皇帝哭著說著但他原是十分伶俐的聽皇上說起從前和馬佳氏的一番情義便裝癡撒嬌地說道陛下害得我好苦說著也掉下眼淚來皇帝舉起龍袖替他拭淚兩人唧唧噥噥地在禦書房裏說了半天話乾隆帝又送了他許多貴重的衣服古董另外又賞他五萬兩銀子第二天聖旨下來特拔他做掌管儀仗的內務大臣從此乾隆帝把個和珅百般寵愛起來起那和珅也常常進宮去伺候皇帝有時在禦書房裏同榻而眠和珅放出許多嬌眉的樣兒來迷住皇帝那乾隆帝真的拿他當馬佳妃子一般看待外面許多大臣知道和珅得了寵便又搶著去趨奉他有的送錢鈔有的送房産有的送美人有的送古董珠寶這和珅原是小人得志不知道什麽禮法的他仗著皇帝的寵愛盡力地做那貪贓枉法的事不到幾年和珅家裏居然宅第連雲家財千萬奴婢成群美人滿室不用說別的便是和珅的家奴也有許多官員去孝敬他只叫那家奴在他主人前說一句話便可以升官發財那乾隆帝心中只有一個和珅別人的話他都不信只有和珅說的話他句句相信有時遇到皇帝動怒的時候只叫和珅進來說一句話立刻轉怒爲喜皇帝常常喚和珅稱他我的人那四方進貢來的寶物皇帝吩咐和珅自己挑選把十成裏的三四成都賞給他按到實在和珅已和皇帝對分了現物因爲那進貢的東西先要經過和坤的手他早已揀好的東西拿到自己家裏去藏起來卻把揀剩的送給皇帝皇帝又分給他因此和珅家裏珍寶越積越多有許多還勝過大內的有一天正是十五日皇子皇女都進宮來朝見皇后留他們在宮中遊玩七阿哥和誠親王兩人在長春宮中遊玩那七阿哥一不小心打碎了陳設在宮中的一隻碧玉盤那玉盤直徑有一尺寬顔色翠綠是乾隆皇帝最心愛的如今七阿哥見打破了嚇得他只守著那玉盤哭泣恰巧和珅從院子裏走來誠親王年紀大些知道這件事只有和珅能幫忙他倆忙給和珅磕頭和珅起初不肯管閒事後來看七阿哥真急了誠親王又許他回家去對父母說知情願孝敬他一萬塊錢求他想一個法子和珅才答應到了第二天那誠親王的父親真的送過一萬塊錢去和珅便在家中拿了一隻碧玉盤悄悄地依舊去安放在長春宮裏那碧玉盤卻比宮中舊時的要大一倍這原是進貢來的和珅卻把大的留在家裏去用了和珅不獨要偷皇帝的定物他平日到大臣家去見了珍貴的東西便也老實不客氣地向那主人要了去那大臣雖也心愛見和珅向他要他也沒有法想只得送給他因此各大臣相約都把珍寶收藏起來不給他看見有一次早朝時候和珅先到朝房去見大臣孫士毅封文靖公的也先在房裏了那孫士毅閑著無事從懷裏掏出一隻鼻煙壺來把玩著和珅湊過身去看時見那鼻煙壺是用一顆雞蛋般大的珍珠雕刻成功的和珅看了歡喜伸手向他要那孫土毅急了說這是此番俺出征越南得來的昨天已奏明皇上今天須把它孝敬皇上萬萬不能再送給大人了和珅看他急得厲害便笑著說道俺和大人說著玩的誰要你的來隔不到三天孫士毅又在朝房裏遇到了和珅和珅便從懷裏掏出一個鼻煙壺來給孫士毅看說道俺也得了一個孫土毅看時和他孝敬皇上的那個一模一樣的便問他從什麽地方得來的和珅說道俺向皇上去要來的和珅這種肆無忌憚的事體看在那班禦史的眼裏實在有些忍不住便今天一本明天一本大家雪片也似地奏參和珅無奈乾隆帝認定和珅是馬佳氏的替身總是放縱他常對和珅說道俺們是一家人有福同享朕的錢便是你的你多要些也不礙事非但不降他的官還飛也似地升他的官不多幾年直升到大學士拜他做首相那劉文正公反做了一個協辦大學士但劉文正是一個正直的人見和珅鬧得太不像話了常常當面責備他兩人又常常揪到皇帝跟前去辯論曲直乾隆帝看劉文正是正直的老臣自己不肯責備和珅便借劉文正監督著和珅叫和珅不敢十分放肆因此每見劉文正來奏告和珅如何貪贓如何枉法便用好言安慰他這一年平定準噶爾回部凱旋受俘立碑太學乾隆帝硬把這個功勞加在和珅身上說他有贊畫之功封他公爵和珅受賀的時候家中擺下七天的戲酒第一天請皇上臨幸乾隆帝在傍晚時候擺駕出宮沿途燈火照徹天地直到相府門口好似一條火龍那和珅府中越發熱鬧燈燭輝煌遠望去好似一座火城上面搭著五色漫天帳地下鋪著幾寸厚的棉毯從大門口直到內堂馬腳踏在上面好似踏要草地上肅靜無聲和珅親自在門口接駕禮問尚書做招待官九門提督在鼓臺上打鼓那吹鼓亭中吹打的都是三品以上的大員一會兒皇上坐席開宴戲劇開場皇帝親自點了一出堯舜禪讓的故事使兩旁伺候的大臣都十分詫異那皇帝和和珅有說有笑和珅竭力勸酒皇上不覺吃醉了酒大臣們都退出在外面和珅把家妓喚出來歌舞著勸皇上吃酒皇帝十分快樂和那班家妓調笑著不覺酩酊大醉和珅命內中最美的一個家妓扶著皇帝進裏屋去睡下那家妓便被皇帝臨幸了皇帝醒來已是三更時候他拖著那家妓洗盞再酌吃到高興的時候皇帝把自己的禦服脫下把扮戲穿的龍袍穿在身上笑著問妓女道朕似漢家天子否那和珅這時也吃醉了酒把皇帝脫下的禦服穿在身上笑問皇帝道臣可似陛下否君臣調笑一陣不覺東方已白乾隆帝此時見和珅襯衣領子上繡著金龍問他什麽意思和珅回奏說道這頸子曾經陛下禦手撫摩過因此用繡龍的領子護著乾隆帝伸手摸著和珅的頸子說道卿真能善體朕意君臣二人說說笑笑延挨到天光了那第二天的賀客都已到了門口打聽得皇上尚未回宮嚇得他們一齊退出獨有劉統勳直闖進裏屋去請皇上回宮乾隆帝見劉文正來了心中卻有幾分忌憚只得擺駕回宮去後來和珅暗暗地把自己的一個妹子送進宮去說見臣妹如見臣乾隆帝也把他妹子十分寵愛起來從此和珅不但引導皇上在宮內淫樂且慢慢地引著皇帝出禁城來暗地裏逛私娼去這時京城裏有一個鼎鼎大名的私娼名叫三姑娘一班達官貴人都在她妝閣裏進出便是和珅也是一位入幕之賓因此京城裏有一班官員要鑽營門路的都來求三姑娘這三姑娘頤指氣使氣焰萬丈她門口常常有二三品的大員伺候了一天進不得門的如今和珅又把天子引到三姑娘房裏去那三姑娘越發不把這班官員放在眼裏天天哄著那皇帝講到這三姑娘的姿色綺年玉貌再加上一段旖旎的風韻任你宮中第一等美人也趕她不上不用說別的便是床笫上的工夫也叫這位皇帝拜倒在石榴裙下從此皇帝時刻捨不得三姑娘天天溜出宮來尋歡買笑去那時候有一位頤親王的公子打聽得三姑娘的名氣便花了上萬的金錢只圖得和三姑娘見一面兒想和她一親肌膚那公子整整的花了二十萬銀錢但還沒放在三姑娘眼裏此事被他父親知道了不禁勃然大怒立刻趕到步軍統領和九門提督兩衙門去一陣咆哮逼著他派出差役去向三姑娘要銀錢來立刻把三姑娘驅逐出境那統領和提督聽說有這樣放肆的窯姐兒便也十分震怒立刻派了差役趕到三姑娘那裏那班人奉著上官的命令如狼似虎見人便捉見物便毀院子裏的鴇母龜兒一齊被他們捆綁起來看看打進後院去忽然迎出一個老漢來伸手攔住那班差役如肯依一擁上去要推開這老漢誰知那老漢兩條臂兒和鐵棒相似任你三五十人的氣力休想推得他動那班人沒法正要向老漢脅下鑽進去早被老漢伸著一個指頭在他們肩窩裏一點那班差役個個都目定口呆地直挺挺地站在地上好似拿釘子釘住一般後面的差役看這個情形不妙一轉身逃回衙門去這時做步軍統領的是富察氏的叔父得了這個消息氣得他三屍神咆哮七竅內生煙便立刻親自帶了一隊親兵趕到三姑娘院子裏去這時已是黃昏人靜院子裏靜悄悄的不見一個人出來那位統領直闖進後院去只見文窗繡幕裏面隱隱射出燈火柒裏面一陣調笑的聲音夾著三姑娘的弦索歌唱的聲音統領站在院子裏喝一聲抓那班親兵正要搶進房去忽見那三姑娘穿著一件銀紅小襖兒款步出來後面跟著一個俏丫環手中捧著風燈罩兒照在三姑娘粉臉上越顯得她唇紅齒白俊俏動人只聽得她嚦嚦鶯聲似地說道禁聲些裏面貴人正要睡呢你們倘若驚動了貴人俺問你們有幾個腦袋那統領聽了愈加生氣喝一聲打進去休聽這賤人的花言巧語正在緊急的時候忽然房裏面走出一個小丫頭來手裏拿著一張紙條兒直送在統領手裏那統領看了嚇了一跳頓時矮了一截原來那張紙條上寫著汝且去明日朕當有旨欽此下面還蓋著一顆鮮紅的皇帝之璽印鑒統領到了此時一句話也不敢說悄悄地帶著原來的親兵退回衙門去一面另派了一大隊守衛兵暗暗地在三姑娘的屋子四周保護著第二天統領朝見皇帝正要奏諫皇上不可微行誰知他不曾開得口那乾隆帝早已對他笑著說道卿辦事甚勤但也不必過於認真殺了風景那統領聽了嚇得他連連磕頭乾隆帝嘴裏雖這般說心中卻疑惑是皇后指使這統領來的因此十分厭惡皇后那富察後夫妻恩情很厚的又生性爽直爲皇帝好色多寵妃嬪的事體常常暗地裏勸諫他清宮裏有背祖訓的規矩富察後只怕皇帝荒淫無度打聽得皇帝睡在妃子房裏到五更還不起身便打發太監頭頂著祖訓直到皇帝的臥房門外跪下嘴裏滔滔不絕地背著祖訓一遍背完又是一遍那皇帝一聽得太監背祖訓便要立刻披衣下床跪聽祖訓那皇帝倘然不下床那太監便背誦不休直到皇帝起身爲度富察後常常拿這個法子去治著皇帝皇帝因此心中越發厭惡皇后有一天皇帝從三姑娘那裏回宮來給富察後知道了便拔下簪子披散了頭髮再三苦諫乾隆帝看了冷冷地說道皇后竟打通內外壓制朕躬嗎只是朕非李唐諸兒柔懦無能的可比皇后不必枉費心血罷說著轉身走出宮去了從此乾降帝天天在三姑娘院子裏尋樂回宮去總要聽富察後嘰咕幾聲乾隆皇帝覺得宮中的鉗制不復可忍便又打算恭奉太后慈駕南巡去借此可以物色美人快遂平生之願主意已定便下詔巡幸江南他此番卻把大權交給和珅又叫劉統勳在一旁監督著自己伴著皇太后動身出京去滿朝文武百官都齊集在午門外送行獨有和珅直送出京城乾隆帝看和珅滿面愁容認是他捨不得離開皇上便對他說道朕原打算和你一塊兒到江南遊玩去如今國事沒有人照料只得偏勞你了待朕回京時候再和你吃酒尋樂你也不可憂愁和珅回奏道皇上有旨意臣敢不奉命只因家中近日死了一個愛妾心中萬分悽楚因此不覺憂形於色還求皇上寬恕皇帝聽了哈哈笑道莫傷心江南盡多佳麗朕此去便當替你物色一個美人來解你的憂愁和珅聽了忙跪下地來謝恩乾隆皇帝離了京城母子兩人坐了大號龍船兩隻又跟著一百號官船沿著運河下駛過了天津入了山東界那沿途地方官的供應接送十分忙碌這且不去說他單說那揚州地方的鹽商仗著有千萬的家財都要在皇帝跟前討好他們從前也曾辦過接駕如今聽說乾隆皇帝又要南巡便個個興高彩烈地準備接駕炫奇鬥富各窮心計就中單表那江鶴亭和汪如龍兩人從前因承辦接駕結下冤仇如今他兩人豈肯錯過機會便用盡心計想出奇妙的玩意兒來討皇帝的好在此這一番揚州紳士的接駕又要算汪江兩人第一精妙你道那汪如龍是拿什麽來接駕原來汪如龍自從第一次接駕以後便暗暗地預備第二次接駕的事體那雪如自從得了皇帝寵倖以後汪如龍便把她安頓在藻水園裏她的兩肩因爲得乾隆皇帝的手扶搭過便在小襖的兩肩上繡著兩條小龍從此汪紳士喚她雪娘娘十分敬重她另外買了二十幾個女孩子在園中請雪如教授歌舞那雪如便揀皇帝愛聽的曲兒教給她們又教她們新樣兒的舞姿汪紳士又請了許多名士編了幾出新曲文教她們練習練習純熟了恰巧得了乾隆帝南巡的消息汪紳士便趕上一程在清江浦地方接駕清江浦是出山東界第一個碼頭皇上禦舟從濟南兗州一帶行來忽看了這奇異的玩意兒容易叫聖心快活那汪紳士帶了工匠人等早在江邊忙碌了許多日子待得禦舟一到那兩岸接駕的官紳排列跪著好似長蛇陣乾隆帝在禦舟中望去只見遠山含黛近樹列屏停了一會禦舟到了船埠那接駕的臣民齊聲歡呼皇太后皇上萬歲皇帝正含笑倚著船窗望時只見岸上大樹上挂著一枚大桃子要知這桃子有什麽奇異之外且聽下回分解
