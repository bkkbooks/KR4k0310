body:
  text: 第八十一回榮祿初入宮禁地懿妃死償恩情債卻說慈安太后訓斥李蓮英的時候已有許多太監遠遠地在廊下站著一聽說太后傳侍衛要砍李蓮英的腦袋慌得許多太監都上去爬在地下磕頭替李蓮英求饒那李蓮英也不住地磕著頭一面求著道佛爺看西宮太后的面上饒了奴才一條狗命罷慈安太后生性仁慈一見大家求著她的心便軟了下去又聽李蓮英說看在西宮太后的面上便也想到倘然真的殺了李蓮英在慈禧太後面上須是不好看想到這裏便不覺把一股氣慢慢地按捺下去了但那侍衛已傳了進來向太后磕過頭站在一邊那太監們見侍衛進來了越發替李蓮英求得厲害隔了半晌慈安太后便諭把李蓮英拉出去打二百板子那李蓮英聽了忙向太后磕頭謝恩侍衛上來把李蓮英拉著出去了慈安太后余怒未息回過頭去對衆太監說道二百年的祖宗規矩壞在這王八羔子手裏俺若再不管便對不住列祖列宗說著便氣憤憤地帶了宮女們趕到慈禧太后宮裏慈禧正午睡起來勻著脂粉卻不見李蓮英來服侍心中十分詫異正要傳喚去忽聽宮女傳東太后來了慈禧太后忙站起來迎接時那慈安太后已進房來了看她氣憤憤地在椅子上一坐一開口便說道李蓮英不過是一個太監罷了便算他有才情能服侍主子也須顧全祖宗的規矩萬不能聽他胡鬧去再者他雖說是妹子的奴才和俺的奴才有什麽分別如今這奴才眼睛裏只知有妹妹不知有俺他見了俺尚且不知道規矩那名位比俺低的皇后妃嬪們他見了越發要肆無忌憚了他在宮裏放肆慣了出去對著大臣們更是驕橫成什麽體統俺也嘗聽得外邊人稱李蓮英爲九千歲的妹妹你想一個太監聲勢大到這個樣子將來鬧出和魏忠賢一般的事體來俺們還有什麽臉面去見列祖列宗慈安太后愈說愈氣慈禧太後聽她說話好似句句在那裏譏笑自己不覺也生起氣來便冷冷地說道李蓮英也不過一個奴才罷了姊姊倘然看他不入眼要攆便攆他要殺他便殺他俺也決不包庇他聽姊姊的口氣好似怨俺拿他寵用壞了這是姊姊錯會了意了至於外面的謠言那是聽不得的慈安太后聽了又說道奴才是妹妹的奴才旁人也管不得這許多妹妹既歡喜他也何必俺多嘴但是妹妹的名氣吃一個奴才糟踢了也是可惜的慈禧太后聽東太后的話越說越厲害了便也忍不住氣把衣袖兒一甩轉過臉兒去不說話了慈安太后也便氣憤憤地站起身來便走也不向西太后告辭從此以後東太后和西太后意見愈鬧愈深兩位太后有許多日子不見面了西太后便常常宜詔內務府大臣榮祿進宮去和他商量抵制東太后的計策榮祿拍著胸脯說道太后便請放心奴才已在外面聯絡了許多大臣都願效忠太后若東太後有懿旨下來俺們都不奉詔西太后聽了心中甚是歡喜連稱好忠臣從此以後榮祿更是無事也常常進宮來和太后閑談榮祿十分乖巧凡是太后跟前的宮女太監們他都暗暗送金銀要他們在太后跟前稱讚自己內中有一個李蓮英和榮祿更是相投兩人換帖結拜了弟兄李蓮英對榮祿說宮裏有一位懿妃她是同治皇上的妃子長得好鋒利的嘴兒終日伺候著太后極得太后的歡心你不可不用一番手段去聯絡她榮祿說俺每召對的時候每見有一位妃子似的打扮得十分俏麗穿著高高的鞋跟兒聽太后常常問她話俺因在太后跟前不敢細看不知是不是她李蓮英點頭說正是她正是她長得好一副臉蛋子今年才十八歲呢你好好用一番功夫下去能得了她的歡心替你在太后跟前說著話比俺說的話強多呢榮祿聽在耳裏記在心裏第二天榮祿跑到琉璃廠去買了許多西洋來的鏡箱兒粉盒兒和手帕汗巾都是十分精致十分靈巧的拿進宮去孝敬太后太后雖是一個中年婦人見了這些東西卻十分歡喜從此以後榮祿每進宮去都帶有孝敬的東西也有是繡貨也有是玩物兒內中有一隻洋鐵皮的西洋小輪船把火油倒在裏面燒著那輪船便啪啪地自己行動起來宮裏的人看了人人都歡喜懿妃還是小孩子的心性看了更是歡喜有一天榮祿在太後跟前奏對出來才走到穹門口只聽得身後有嬌聲喚四爺的榮祿急回轉臉去看時見不是別人正是那懿妃榮祿滿臉堆著笑走上前去忙爬下磕頭口稱貴妃呼喚奴才有什麽吩咐慌得懿妃躲避不叠把帕兒俺著朱唇笑說道四爺快起來要折煞俺了老佛爺有什麽話忘了請四爺進去呢榮祿聽了急急又趕進太后房裏去待奏對完畢出來那懿妃還站在穹門邊望著榮祿走上前去低低地說道奴才有一份孝敬的東西給貴妃留著只苦沒有奉獻的機會說時恰巧有一個小太監從廊下來榮祿便叫他快去把總管找來那小太監去了榮祿便乘機對懿妃說些外面的風景街市的情形懿妃自幼兒進宮來幽居多年怎麽知道外面這些奇奇怪怪的情形榮祿又把那些市井瑣碎的事體告訴她又說誰家賣的美味食物誰家賣的新樣兒綢緞誰家賣的貴重古董把個懿妃聽得只是嘻著嘴笑說道四爺幾時也替我買一隻那小輪船兒玩玩榮祿聽了連聲說有有接著總管李蓮英來了後面跟著四個小太監手中各抱著大小包裹兒走到跟前李蓮英向懿妃請了一個安站起來指著那大小包裹說道這裏面都是四爺孝敬娘娘的東西四爺有這個心長久了每次把東西帶進宮來只苦於沒有機會見娘娘的面和娘娘說一句話兒因此把每次帶來的東西存積在奴才的屋子裏如今難得見了娘娘的面奴才把四爺孝敬娘娘的東西都帶來了請娘娘過目懿妃聽了這個話兩眼看著四爺露出一肚子歡喜一肚子感激來榮祿接著說道請貴妃吩咐一句把這東西送到什麽地方去懿妃一想倘然直送到自己屋子裏給別的宮女太監看見了便要生出許多閒話來不如叫他們暫時送在太后書房裏去待夜靜更深的時候再叫自己的心腹宮女悄悄地搬運到自己屋子裏去當時主意已定便向小太監招招手兒那四個小太監手中抱著包裹兒跟著懿妃進穹門去這裏榮祿和李蓮英一齊告辭出來走出宮門李蓮英伸手在榮祿肩上拍著笑說道魚兒快上鈎了四爺須好好地做去不要弄毛了再抱怨咱家榮祿聽了一笑去了第二天榮祿故意早一點進宮去到寢宮外一打聽果然太后還未起身便有一個宮女走出來悄悄地對榮祿說道請四爺到那邊屋子裏坐說著自己在前面領路榮祿在後面跟著走到一座屋子門口那宮女從身邊掏出鑰匙來上去開了門榮祿踏進屋子去一看只見圖書插架琳琅滿目那什錦架上蘭草瓊芝發出靜靜的香味來他自己孝敬的那只小輪船也擱在什錦架子上地上鋪著厚厚的地毯人走在上面一點兒也聽不出聲息來靠窗安著一張大書桌上面擺設著文房四寶都是珠玉鑲成的那大大小小的自鳴鍾觸目都是靜悄悄地坐著滿耳只聽得鏜鏜之聲榮祿正回頭看壁上的字畫時忽聽身後有衣裳悉索之聲一看那懿妃玉立亭亭地已站在跟前了看她滿臉堆著笑低低地說道四爺怎麽給這許多東西叫我受了心上實在過意不去不受呢又怕四爺生氣沒有法子只得謝謝四爺了說著掩唇一笑在一張長榻上坐了下來榮祿趁勢也並肩兒坐下接著又講了許多外面的新聞故事懿妃最愛聽這些閒話聽了只是笑榮祿看她笑得有趣便越說越起勁了他兩人忘其所以那身體越發挨近了正在這時候忽然宮女來報說老佛爺醒了懿妃忙丟下榮祿急急進去伺候停了一會裏面又傳榮祿榮祿進去奏對過出來依舊是懿妃送到穹門邊覰著左右沒有人懿妃拿出一個繡花荷包兒來向榮祿袖子裏一塞說道這是俺自己繡的四爺收著玩兒罷從此以後他兩人假這太后的書房做一個聚會之所交情十分濃厚日子久了那班小宮女小太監總不免有言三語四不知怎麽的傳在一個七格格耳朵裏講到這七格格原是慈安太后的內侄兒出落得玉貌花容當時宮裏有兩個美人兒一個是懿妃一個便是七格格這兩個美人都在慈禧太后跟前的慈禧太后最愛女孩兒凡是宗室格格和大臣家裏的女公子有聰明伶俐的給太后知道了便召進宮去當著女官終日陪著太后說笑遊玩這七格格雖是慈安太后這邊的人但因她常常到慈禧太后宮裏去慈禧太后看她活潑有趣常常留她在宮中賞飯賞衣服七格格是何等聰明的女孩子她面子上雖親近著慈禧太后但慈禧要留她在身邊她總是婉言辭謝去跟著慈安太后住宿有時慈禧太后向她打聽慈安太后那邊的事情她總是推說不知道的慈禧太后也明知道她們姑母侄女總互相回護的但舍不下她的美貌依舊常常去宣召來帶在身邊說笑玩耍天下的美人生性最妒七格格仗著自己美貌又聽宮中的人拿她去比懿妃說她們是一對美人兒因此七格格有些氣不過常常在背地裏說懿妃的壞話說懿妃如何不避嫌疑榮祿進宮出宮總是懿妃接送著兩人在太后書房裏調笑無忌便是當著太后說話之間也是嬉笑無忌的其實西太后也是看在眼裏的明知道他們不妥但這兩個人都是自己的心腹也不好說什麽倒是七格格在暗裏卻刻刻留心他們的舉動要抓點錯處出來好丟懿妃的臉這一天合該有事七格格奉了慈安太后之命跑到慈禧太後宮中去向慈禧要兩廣總督的奏摺看待到了那邊爲時尚早慈禧不曾起身呢無奈這奏摺是慈安太后立等著要看的七格格不便空手回宮去便打算找懿妃閒談去看看走到懿妃的房門口忽見一個小太監坐在房門外見了七格格忙向她搖手兒叫她莫進去七格格看了詫異她也不理會徑自闖進房去小太監急在七格格身後大聲喊道七格格來了懿妃原在裏面套房裏的聽得了忙迎出房來七格格在房門外仿佛聽得有男人說話的聲音看懿妃的臉上時紅潮雙暈雲鬢微松對七格格說話的時候也是氣噓噓的七格格越發動了疑劈頭第一句便問道你在屋子裏和誰說話懿妃已被她一句話揭穿了知道無可抵賴便說四爺在俺屋子裏坐呢說著回過頭去向屋子裏喊道四爺快快出來七格格在這裏看你呢榮祿聽了趁此口夭地答應一聲趕出外屋子來向七格格請了一個安滿臉堆著笑一面端奇子請她坐一面問道七格格到這屋子裏有什麽事七格格聽了把頸脖子一歪說道什麽話這地方只許你來卻不許俺來嗎到這裏來一定要有事才來得嗎那麽俺請問四爺四爺是有什麽事來的呢問得榮祿一句口也開不得只說好格格俺不會說話饒恕了俺罷說著又做出許多醜相來又問七格格這幾天可到什麽地方去逛來老佛爺可有什麽話來又說什刹海這幾天正熱鬧呢格格可曾去逛過麽改幾天有空兒俺陪著格格逛去可好麽東拉西扯地說了許多話七格格睬也不去睬他只和懿妃說著話兒停了一會小太監來通報說老佛爺傳七格格呢七格格聽了忙丟下他兩人轉身跟著小太監走進慈禧宮中去見了太后便說慈安太后打發來向老佛爺要兩廣總督的奏摺去看慈禧太後聽了忙傳李蓮英叫他到書房去把那奏摺揀出來送去又留住七格格在宮中陪著吃飯吃飯的時候有許多妃嬪宮女在兩旁站著伺候著獨有那班格格們可以陪伴太后吃飯這時懿妃也站在一旁待慈禧太後吃完了飯進房去那班妃嬪們才就太后吃剩的飯萊胡亂吃了一回那時慈禧太后和七格格在屋子裏閒磕牙說話之間七格格便把榮祿在懿妃房中逗留調笑的情形約略地說了幾句榮祿和懿妃的事體在西太后心中早也料到如今聽七格格說出這話來心想七格格是慈安太后的內侄女兒那榮祿又是自己的內侄倘然這風聲傳到東太后耳中去少不得自己也要擔著處分忙拉著七格格說道好孩子你既撞見了俺娘們都是一家人你便包庇他們些他們總忘不了你的好處說著把自己頭上插著的一支玉搔頭拔下來替七格格插在髻兒邊七格格忙跪下去謝恩正起來那懿妃也吃完了飯走進屋子來慈禧太后吩咐懿妃叫她向七格格請安懿妃一時摸不著頭腦但太后的吩咐又不能違背便向七格格蹲身請下安去七格格推說是東太后那邊有差遣便辭出宮去這裏慈禧太后立刻把臉色沈下問懿妃道我吩咐你向七格格請安你知道我的用意麽嚇得懿妃不敢開口忙爬在地下磕頭慈禧太后吩咐把榮祿喚進來榮祿那邊早有太監去報信給他說老佛爺正生氣呢一聽得宣召捏著一把汗躡著腳走進太后房中去見懿妃跪下他也爬下地去恰和懿妃跪了一個並肩兒只聽得慈禧太后很嚴厲的聲音說道我因看你們兩個孩子長得比別人聰明些凡事也不免信託你們些寬縱你們些你們索性在背地裏做出那種事體來今天給七格格撞破了她回去告訴東太后知道明天不免要見奏章那時我自己也洗不清管不得你們的事了你們準備著腦袋砍下來便了一句話說得榮祿和懿妃兩人連連磕頭求饒榮祿又說奴才在貴妃房中不敢爲非作歹只因奴才進宮來時打聽得老佛爺還安臥不曾起身奴才要打聽老佛爺昨夜身體可大安一時又無從打聽知道懿妃是老佛爺寵愛的人早晚伺候著老佛爺的便到貴妃屋子裏去一來是打探老佛爺的消息二來是去請貴妃的安原是奴才不知嫌疑罪該萬死但說奴才有什麽暖昧事體這是青天在上奴才萬萬不敢的奴才一死原不足惜只是拖累了貴妃的名聲叫奴才如何對得起人這事體只求老佛爺替奴才做主說著又不住地磕下頭去慈禧太后聽了榮祿的話冷笑著說道你兩人也不用在俺眼前裝神弄鬼俺也沒有這個心勁來管你們的閒事只看你兩人的造化明天東太后倘沒有什麽話落在俺耳朵裏臣子們倘沒有奏章照在俺眼睛裏就也饒恕了你們不然的話倘有三言二語落在俺耳根裏如今東太后正天天要抓我的錯兒那皇上也不親近我我自身也難保只得把你兩人和盤托出去殺也罷剮也罷可不幹我事懿貴妃聽了這個話嚇得那眼淚直滾出來西太后喝一聲起來他兩人又給西太后磕頭退出房來在背地裏懿妃又拉著榮祿痛哭榮祿拿好言安慰她又說俺和李總管商量去決不叫貴妃吃虧的當夜榮祿果然去找李蓮英告訴他的來意李蓮英也常常吃東太后的訓斥銜恨在心聽了榮祿的話便拍著胸脯說道四爺放心這件事體不鬧出來便罷倘然鬧出來俺們索性一不做二不休施一條毒計把俺們的仇人一網打盡大家痛痛快快做一下榮祿聽了暫時告別出宮門第二天一早榮祿又急急趕到宮裏去候信那西太后早朝回宮便傳榮祿進去榮祿知道大事不好只得硬著頭皮走進西太后房裏便跪下只見西太后滿面怒容擲下一個摺子來叫他們自己看去榮祿見那摺子是翁同和上的摺子上不但說榮祿和懿妃的事體汙亂宮廷請兩宮太后立交內務府明正典刑並說慈禧太后侈靡驕縱袒護私親榮祿一面看著摺子一面聽西太后喝道你們這班孽畜自己做出不要臉的事體來拖累我也受著翁師傅的嘲笑你們還不給我去快快地死嗎一句話不曾說完宮女報說慈安太后來了慈禧太后忙起身迎接慈安太后也滿臉含著怒氣走進房來慈禧太后臉上不覺露出羞慚之色慈安太后一坐定便問道今天翁師傅的奏章妹妹看見了沒有慈禧太后還不曾答話忽然宮女又進來報說懿妃自縊身死榮祿聽了真好似萬箭鑽心欲知懿妃自盡的情形且聽下回分解
