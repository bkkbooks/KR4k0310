body:
  text: 第七十二回蘭貴妃寄腹産載淳咸豐帝避難走熱河卻說葉總督迷信了乩仙的話他打定主意百事不管躲在衙門裏靜候過十五日外國兵自退司道等官來請發兵紳商等人來請練勇他都不准英國公使要求五條第一條與總督相見第二條欲在南河岸造洋樓第三條欲通商第四條欲進城第五條索賠款六百萬兩葉總督益發不去理他各國公使大怒第二天滿城只見貼的香港總督的告示說定於次日破城那城裏一般百姓看了立刻慌亂起來扶老攜幼紛紛逃避葉總督要禁止也禁止不住不到黎明果然城外炮聲隆隆煙焰四起葉總督沒奈何暫到粵華書院去避難廣州紳士伍崇耀和將軍暗地裏說通了在城頭上豎起白旗求外國兵暫停炮火把城中難民一齊放出去逃命去那邊香港總督也下文書給合城官民說只打葉總督一人於是巡撫將軍都統等官員以及紳土們都到觀音山上去避難外國兵營裏炮火又響葉名琛無地可躲城門一破英國兵先進城來趕到粵華書院裏把葉名琛捉住橫七豎八地把他拖上英國兵船這時有一個戈什哈跟隨在葉總督身旁他趁外國兵不留意的時候悄悄地對總督指著海水說道大人瞧這海水不是很清的麽那葉總督聽了他的話莫名莫妙這戈什哈氣憤極了便縱身一躍自己沈在海裏死了這時英國公使做主把捉來的廣州官民一齊放回只帶了這個葉名琛從廣州到香港又從香港到印度把他關在一間樓房裏葉名琛住在印度卻也自得其樂終日吟詩作畫空下來又時時誦讀呂祖經他的詩畫署名海上蘇武流傳在外國的卻也不少廣東巡撫見外國兵去了以後才提奏入朝咸豐帝看了不禁大怒立刻下諭從兩廣總督起所有廣州合城文武官員一律革職另委了兩廣總督去和英美法三國的公使講和又委黑龍江辦事大臣和俄國講和這時外國所提出來的條件卻比不得從前了總督大臣見條款十分嚴厲卻不敢做主便去奏明朝廷咸豐帝把條款發給軍機大臣會議議了許多日子也議不出一個眉目來那四國兵將見所求不遂便索性開了兵船打到北京去英國兵船十四隻法國兵船六隻美國兵船三只俄國兵船一隻一齊停自在天津白河裏一面又提出條件托直隸總督譚廷襄轉奏皇上咸豐帝便派戶部侍郎郭崇綸內閣學士烏爾棍泰前去議和英國公使見這兩個官銜上沒有全權兩字說中國政府沒有誠意又說中國政府瞧他不起便不由分說帶同兵船從白河直闖進大沽口去不費吹灰之力佔據了大沽炮臺咸豐帝沒奈何改派了桂良花沙納兩位欽差大臣全權去和各國議和各國提出的條款又多又嚴內中單講英國公使提出的條款已有五十六條最重要的三條第一條是於舊有上海寧波等通商五口外加開牛莊登州臺灣潮州瓊州等處又于長江一帶從漢口到海州許其選擇三口爲洋商出運貨物往來之所第二條是洋人所帶眷屬可長住北京第三條是償還洋商虧損兩百萬兩軍費二百萬兩付清賠款方將廣州城交還中國還有修改稅則允准傳教等條此外法國也提出了四十二條又另索賠款一百萬兩這兩位欽差也不敢自專請命於朝廷咸豐帝這時身體不好常常害病也沒有這許多精神去對付外國人便傳諭一概允准口令桂花兩位欽差會同兩江總督何桂清親自去查察各海口何處宜於通商再定稅則四國兵船先後駛離天津到上海會齊總算把這樁外交案件暫時告一個結束蘭貴人這時居然生了一個皇子不但是皇帝皇后歡喜便是那滿朝文武和海內居民人人都歡欣鼓舞大小衙門懸燈慶祝這也是當時專制時代奴隸人民的現象按到實在真正肚子裏歡喜的只有咸豐帝一個人這時立刻把蘭貴人升做蘭貴妃那新生的皇子取名載淳從此這蘭貴妃也因自己生得皇子十分驕傲起來非但不把宮中的妃嬪放在眼裏便是那孝貞後也因她生了皇子另眼看待她幾分說實在的這個皇子也不是蘭貴妃生的乃是圓明園裏的一個漢女名叫楚英生的這楚英也是讀書人家小姐她父親是湖南人在京裏做了幾年小京官僅僅糊得口他女兒楚英卻出落得洛神一般的風韻官場中慕她的美名都托人來說媒無奈她父親生性清高說他們都是濁富不配娶我的女兒誰知到楚英十六歲上她父親一病死去了只落得兩手空空身後蕭條後來宮裏雇用管宮漢女楚英的母親貪圖俸祿大便把楚英送進宮去便是在楚英心想也不過到宮裏去打掃庭院看守房屋決沒有意外事體的誰知這位風流天子卻出奇地歡喜玩弄漢女他最愛的是那三寸金蓮怡好這楚英不但臉兒長得好而且裹得一雙好端正瘦小的金蓮有一天她在牡丹花叢中間閑玩著咸豐帝從廊下走來遠遠地望見花叢下面露出一雙小腳兒來勾動了他情懷忙向侍衛們搖手那侍衛們也看慣了皇帝的情景知道皇帝又要幹風流事體了便悄悄地避去楚英便在這一天受了皇帝臨幸任你如何貞節的女子待到一踏進宮門總難保得貞節了楚英那時迫於勢利也是無可如何一連召幸了幾次不覺已有了身孕肚子一大皇帝便丟在腦後了這時正是蘭貴妃初得寵的時候專一和漢女作對她住在園裏瞞著咸豐帝的耳目將那班漢女暗地裏打死溺死的不計其數後來蘭貴人又打聽得有一個楚英曾受過皇帝的臨幸便吩咐太監把那楚英去喚來在蘭貴妃心思上滿想把她打死後來一看見楚英帶著肚子細細一盤問知道是龍種她便立刻變了一個主意從此把個楚英藏在自己後房自己也裝著假肚子哄著皇帝說自己受了孕了又怕住在園中耳目衆多敗露出來她便把楚英裝成大腳改了旗裝夾在宮女隊裏帶進宮去依舊藏在一間密室裏待到那楚英十月滿足養下一個男孩兒來便趁著楚英肚子痛得昏昏沈沈的時候拿一杯毒酒灌在她肚子裏去立刻把個産婦藥死了一面暗地裏雇了乳母在密室中乳著這孩子看看自己裝的假肚子也已十月滿足了便把那孩子抱來滿身塗著血水只推說是自己生下來的後來皇帝皇后見這孩子長得格外魁梧便也格外歡喜蘭貴妃見大事成功便不覺驕傲起來又因爲住在宮中有這正宮娘娘管束著不得任性便又慫恿著皇帝搬到圓明園去住這時已在三月終照例原可以搬進園裏去住了皇帝便依了蘭貴妃的話進園去依舊住在天地一家春裏咸豐帝許久不到園中來又在這春深的時候園中景色分外鮮媚把個風流天子樂得早把朝廷大事丟在腦後去了終日帶著這蘭貴妃到處遊玩但是咸豐帝大病以後身體十分虛弱在園中遊玩要人扶持常常坐著黃轎或是坐著禦舟代替行走這時園中也養著許多鹿皇帝天天飲一杯鹿血幾百頭花鹿養在碧瀾橋東面坦坦蕩蕩的地方蘭貴妃每天帶幾個宮女在這地方騎射射著花鹿玩兒咸豐帝見蘭貴妃騎馬騎得很好便帶她出園打鳥雀去三千禦林軍保護著在萬壽山腳下玩了一天打得無數鳥雀看看天色傍晚那園中文武大臣知道皇上快要回園了便排齊了班次在園門口候著遠遠地聽靜鞭聲響禦駕已到了門口文武百官一齊跪下地去這時正在鴉雀無聲的時候忽聽得馬蹄聲響當先一個旗裝的少婦騎著馬跑進園門來見兩旁百官跪著便在馬上笑說道怎麽今天矮子這樣多啊嬌聲嚦嚦一騎馬早已過去了嚇得百官們頭也不敢擡後來打聽那騎馬的少婦便是如今最得寵的蘭貴妃蘭貴妃進園了半晌才是禦駕到這一天皇帝玩得非常盡興第二天是蘭貴妃的生辰在園裏吃酒聽戲又熱鬧了一天皇帝聖旨下來把蘭貴妃改作懿貴妃這一天懿貴妃陪皇上在壺中日月長軒裏吃酒吃到夜深才安寢第二天皇上病了忽然吐起血來慌得懿貴妃忙傳禦醫一面報進宮去那孝貞後夫妻情分原是深的得了這消息便急急趕到園中來看視虧得皇上的血是急氣攻肺吐的是肺血調養了三五天便漸漸地止住了又養了半個月一般也能遊玩行走了皇上在病中孝貞後又切切實實勸他保養身體莫過寵了懿貴妃又說懿貴妃是個受寵不起的人常常要干預朝政這不是我們女人應該管的事體那懿貴妃自從生了皇子以後那言語舉止之間便是對於皇帝也不覺露出驕縱的神色來咸豐帝也有些覺得只是心中實在溺愛她便也不忍去說她如今聽了孝貞後說話知道皇后是一片好意又知道懿貴妃是十分陰險的女子便也推著病不和懿貴妃見面這時皇上又想起四春來了便把牡丹春杏花春兩人傳來一看她們已經消瘦得多遠不如從前那種嬌豔模樣了皇帝問她們爲什麽這樣憔悴杏花忍不住哭了牡丹春便告訴說懿貴妃如何虐待她們那班宮女太監都害怕貴妃的勢力吃也不給我們好吃穿也不給我們好穿住在園裏真是苦不堪言杏花春又奏說懿貴妃住在園裏專一與漢女爲難瞞著皇上的耳目拉到屋子裏去被懿貴妃活活打死的又拉去抛在太液池裏活活淹死的不知有多少皇上聽了不覺大怒第二天傳旨把懿貴妃召來那懿貴妃耳目很長有那總管安得海替她打聽消息知道皇上動怒了懿貴妃便披頭散髮懷中抱著皇子進宮去跪在皇帝面前只是碰頭求饒又做出那可憐的樣子來說也奇怪皇上不曾看見懿貴妃的時候把這懿貴妃恨入切骨等見了這懿貴妃便想起從前的一番恩愛又看見她眉眼兒實在迷人又見她一哭一求如帶雨梨花似的越發叫人可憐再看看她懷中抱著皇子又看在他皇子的面上不覺把心腸軟了下來懿貴妃趁此又撒癡撒嬌地說了許多牡丹春杏花春的壞話咸豐反而勸慰她這一夜雨露深思堂堂一位萬歲爺又吃懿貴妃迷住了懿貴妃把聖駕接到天地一家春去住著自己料理皇上飲食調養病體暗地裏吩咐安得海外面不論有什麽事不叫他通報因此那杏花春牡丹春和皇上見了一面以後從此又隔絕了直到五月時候皇上身體漸漸地強健起來常常到園中各處來散步納涼記得各處妃嬪便傳旨召來在清水濯纓室裏開宴那班妃嬪和皇上久別生疏了也不敢多說話獨有這懿貴妃仗著自己是皇上寵愛的在皇帝跟前有說有笑皇帝的事體她一個人攬著服侍又因爲自己是生了皇子的便不把同輩的妃嬪放在眼裏外面軍機大臣有奏摺拿進來懿貴妃便瞞著皇上說皇上正在吃酒開懷的時候莫給他看奏摺便和安得海私地裏冒了皇上的意旨把那奏摺批出去了隔了幾天皇上坐朝懿貴妃才把代批奏摺的事體奏明皇上心中雖不樂但因寵她寵得厲害也不好意思說什麽後來懿貴妃看看皇上不說什麽每逢皇上和大臣們議論朝政她也在一旁出主意皇上也因自己懶得管事漸漸把那些奏摺都叫懿貴妃代他批發去因此懿貴妃漸漸地預聞外事有幾個手腳快的人都偷偷地拿了銀錢走安得海的路子孝敬懿貴妃去懿貴妃一方面得了外人的錢財一方面在皇帝跟前包攬事體皇上也有些看出懿貴妃的弊病來只因自己身體實在虛弱得厲害沒有精神看奏章以後每逢有大事便請孝貞後傳見大臣隔著簾子親自詢問孝貞後有忙不過來的地方便叫懿貴妃在一旁讀著奏章皇上又把醇親王恭親王傳進園裏幫著皇上辦理國事皇上有時和醇親王恭親王閒談著懿貴妃站在一旁也不避忌懿貴妃見醇親王面目姣好年紀很輕打聽得醇親王正死了福晉便和皇上說了把懿貴妃的妹妹蓉兒指配給醇親王那醇親王見皇上的命令也不敢不遵從從此以後那蓉兒在外面也暗暗地和懿貴妃通聲氣獨有恭親王和肅順兩人不和懿貴妃聯絡常常在皇帝跟前勸諫不可使貴妃幹政咸豐帝也明知道這懿貴妃居心叵測無奈自己寵愛她厲害懿貴妃干預朝政也慣了那孝貞後是十分沈靜的見了大臣期期艾艾地說不出什麽話來懿貴妃在一旁代問話口齒清楚語言漂亮且另有一種威脅大臣們見了她都害怕後來日子久了孝貞後卻也省她不得懿貴妃自恃有才能便也越發地驕傲了那年春天宮裏照例鬧著龍舟皇帝帶著妃嬪們坐在禦舟裏吃著酒看著龍船這時皇帝身體還不十分健旺不願意和許多妃嬪們擠在一起卻自己帶著孝貞後坐著一隻小艇子在湖中蕩漾著四邊岸上的宮女們見禦舟在湖中便齊聲嚷著安樂渡三字原來宮中的規矩皇帝坐在船裏那船身一離開岸便令宮女站在兩岸齊聲喚著安樂渡三字直到皇上的船到那邊岸上才停住喚聲這雖是一樁迷信事體但兩岸幾千個宮女嬌聲喚著卻也很有風韻這時皇子載淳年紀尚小聽著喚聲也跟著她們嚷著懿貴妃拉了他和要好的妃嬪宮女們另外坐一隻船遊玩著打聽得皇上在映水蘭香開宴她們便趕去伺候那地方是靠著湖邊的埠頭上泊著三隻龍舟龍舟兩旁一字兒停著許多小船懿貴妃自小在南邊學得弄槳渡水這時她們飯都吃罷懿貴妃見了埠頭的小艇不覺觸動了她的舊好便縱身一跳跳在小艇子上拿了一支槳正要蕩開去忽然給皇上看見了說有趣朕也搭著你的船渡過去懿貴妃見皇上也高興忙把那小艇靠近埠頭候皇帝走下艇子來誰知咸豐帝才下得艇子兩腳不曾立定那艇子便蕩開了皇上是久病之後身體虛飃飃的兩腳又沒有力那艇子一晃身子向側面一撲一個倒栽蔥噗通一聲皇帝翻身落水只聽得岸上宮女太監們大聲呼救那孝貞後正在屋子裏聽了忙趕來看時虧得湖邊水淺下面又鋪著石階皇上落水的時候急把兩手攀住埠頭石條身子浸在水裏從肩膀以上露出在水面上七八個太監一齊跳下水去把皇帝扶上岸來滿身水淋淋的把個皇后嚇得臉上也變了色一面吩咐把皇上送到就近靜香屋去更換衣服一面喝令太監把懿貴妃送到永巷裏去關起來待罪這咸豐帝身體原不曾復原如今經了這一嚇又受了凍不覺舊病復發起來孝貞後日夜看護著這一場病直到深秋才慢慢好起來那懿貴妃平日是一個如何飛揚跋扈的人如今關在永巷裏一住四五個月宮裏的人何等勢利大家見她失了勢都來打落水狗那肅順和懿貴妃最是不對便買通了服侍懿貴妃的宮女故意到皇后跟前去告密說懿貴妃住在永巷裏終日怨恨皇上又拿滿洲咒語罵皇上孝貞後聽了忙親自到永巷裏去勸慰懿貴妃說你暫時安心靜守過幾天待皇上歡喜的時候俺替你求求恩典放你出來不知怎麽這懿貴妃詛咒皇上的話給皇帝知道了便不覺大怒恰巧肅順站在一旁皇上便問肅順道朕意欲把蘭貴妃廢了賜她自盡你看怎麽樣慌得肅順忙跪下地去碰頭說道奴才不敢預聞宮禁裏的事體這句話傳到孝貞皇后的耳朵裏忙去見皇帝竭力替懿貴妃辯護著說這都是平日和她不對的人造的謠言臣妾也常常去察看過懿貴妃十分恭順深知道自己的錯處常常自己悔恨著臣妾敢替她在皇上面前求求恩典放了她出來她在冷宮裏時時想念皇上日夜哭泣看了也十分可憐皇帝到這時候又想起懿貴妃是生了皇子的一時不能廢去她妃子的名號便也把怒氣消掉了後來孝貞後時常在皇帝跟前替懿貴妃求恩典皇上看在皇后的面上便赦了罪把懿貴妃放了出來要知後事如何且聽下回分解
