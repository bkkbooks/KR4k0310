body:
  text: 第八十回繪遺容劉莊承大統驚異夢蔡諳詣靈山卻說衆蠻兵被煙熏得雙目滿布紅雲兩手不住揉擦淚如雨下不能再在洞裏藏身了只得拼命價你擠我我軋你向洞外紛紛出來各尋生路誰知奔到洞口嚇得倒抽一口煙回身又往洞裏逃生洞裏面的蠻兵不知底細只往外擁來有幾個曉得洞口有漢兵守著的出去准是送死要想開口無奈煙焰噤口不能說話身不由己的被衆人推了出來真個是禿頭上的蒼蠅來一個死一個那征側也被煙熏得十分難過手揮兵刃殺出洞來迎頭碰著馬援只聽他大喝一聲手起一刀將征側斬爲兩段霎時數千蠻兵死的死亡的亡自相踐踏要想半個活的也沒有馬援見蠻兵已經絕迹隨後遣官填缺自己班師回朝光武帝聽說馬援班師回來當然喜不自勝忙命校尉排齊儀仗親自出都迎接慰勞備至這也不在話下再說陰麗華自從做了正宮之後可是願望已足每每想起皇太子還未易去仍舊是郭娘娘生的劉疆爲儲君心中未免常常憂慮暗想如果皇太子不易將來我一定做不成正娘娘的就此常在光武帝面前撒嬌撤癡的無奈光武帝雖然被她迷惑但是皇太子疆實在沒有一點不好之處所以不忍更易陰娘娘屢次挑撥劉疆的罪惡光武帝只是裝聾作啞不去理她她曉得欲更易皇太子斷非言詞可動便暗中設法買通劉疆的近臣旁敲側擊嚇詐他自己讓與劉揚那劉疆本是一個大賢大孝的人見自己久處於疑忌的地位早有退避之心現在又聽得各處的傳聞俱說光武帝急急的就要易儲自己也落得借此告退免得旨下反而不美遂毅然上表請卸皇太子之職願爲藩位光武帝不忍答應劉疆又請左右諸臣代爲說項光武帝見劉疆辭意已決萬分無奈只得下詔道春秋之義立子爲貴東海王陰皇后之子宜承大皇太子疆崇執謙退願備藩國父子之情聖賢同其以疆爲東海王此詔劉疆奉了詔書之後忙將太子印綬交給劉揚光武帝即日冊立東海王劉揚爲皇太子改名莊從此陰娘娘高枕無憂也不再妄生邪念了光陰易過略泛泛眼已到了建武三十三年了光武帝在二月間突然染病日重一日未到十天在南宮的前殿中壽畢歸天了總計光武在位三十三年起兵春陵叠經艱險終能光復舊物削平群雄可見他的智勇深沈不讓高祖了閒話少說光武帝既然駕崩太子莊當然嗣位是爲孝明皇帝即日正位命太尉趙熹主持喪事自從王莽亂後舊有禮節出一概散佚無存諸王俱來辰喪全與孝明帝同食同桌凡爲藩家的官屬亦得出入宮廷百官無別此時惱動了趙熹正色立朝手執寶劍分別尊卑整理儀節複令校尉把守宮門無論藩爵皆不得擅入宮闈如有故犯格殺勿論孝明帝又是個無剛斷的人只得聽趙熹指使此時內外百官沒有一個不懍遵法律真個是穆穆雍雍一堂肅然尊陰娘娘爲皇太后奉葬光武帝于原陵廟名世祖光武帝曾有遺言一切葬具俱如孝文帝制度務從節省不得妄費因此多從樸實屏去紛華明帝承奉遺囑在南宮的雲台中命巧手畫匠圖繪亡故的二十八個功臣的遺像乃是太傅高密侯鄧禹中山太守全椒侯馬成大馬司廣平侯吳漢河南尹阜成侯王梁左將軍膠東侯賈複琅琊太守祝阿侯陳俊建威大將軍好畦侯耿弇驃騎大將軍參蘧侯杜茂執金吾雍奴侯寇恂積弩將軍昆陽侯傅俊征南大將軍舞陽侯岑彭左曹合肥侯堅鐔征西大將軍陽夏侯馮異上穀大守淮陽侯王霸建義大將軍鬲侯朱枯信都太守阿陵侯任光征虜將軍潁陽侯祭遵豫章太守中水侯李忠驃騎大將軍櫟陽侯景丹右將軍槐裏侯萬修虎牙大將軍安平侯蓋延太常靈壽侯邳彤衛尉安成侯銚期驍騎將軍昌成侯劉植東郡太守東光侯耿純城門校尉朗陵侯臧宮捕虜將軍揚虛侯馬武驃騎將軍慎侯劉隆橫野大將軍山桑侯王常大司空固始侯李通大司空安豐侯竇融太傅褒德侯卓茂以上諸將在小子這部漢宮演義裏有的曾提過有的沒有提過不過有個疑問我想讀者諸君一定是要來責問的以上諸將在什麽時死的怎麽不一一的敘明呢是的應當要敘明不過小子有幾句話要對讀者們道歉我所著的是漢宮演義不是完全歷史小說所以沒有什麽驚奇和香豔的資料只得高高擱起不去多說廢話了所以將他們的死亡情形也只好馬馬虎虎地總束一筆了再說明帝令人將二十八個功臣的遺容描好擇日登臺文武百官一齊頂禮致敬東平王劉蒼也到雲台敬禮遍看遺容獨少馬援不禁滿肚狐疑便向明帝問道馬援勞苦功高爲什麽反落雲台之外呢明帝微笑不答看官馬援自從征了交趾之後又領兵去征武陵在壺頭山病歿了可是他血戰沙場南征北討論功績不在鄧禹馮異之下爲何反落雲台之外呢有個極大的緣故小子趁此交待明白馬援乎交趾之後誰知他是患濕氣的人愛吃交趾出的薏仁臨回的時候特買了十余石用車裝回因此引起文武的議論說馬援賣國求榮此番回來裝著十余石珍寶回來這個風聲傳到光武帝的耳朵裏心中大怒便要拿馬援問黑暗幸虧朱勃一力保奏始得罷議但是光武帝從此不肯重視馬援了馬援死後光武帝越發恩待稀少蘭夫人見丈夫蒙此不白之冤終日啼泣還是朱勃上了一封奏章將馬援生平的戰績細細地表明又替他剖白冤枉光武帝才准歸葬舊塋又到馬援家中將他生的第三個女兒選進宮中伺候陰娘娘格外施恩又封馬援四個兒子爵位誰知馬援的三女兒靜儀進了皇宮一舉一動陰娘娘無不歡喜選入宮中的時候才十三歲舉止端莊不同凡女所以光武駕崩之後陰太后便將馬靜儀冊立爲正宮這一點也可稍慰馬援於九泉之下再說明帝見劉蒼問詢含笑不語劉蒼暗忖明帝的心理大約是爲內親的關係不便列入吧其實舉不避親何妨列入呢明帝與衆大臣致敬已畢禮成告退是晚入宮所幸的是扶玉宮睡到三更時候突然入夢恍惚中瞥見有兩個青衣童子手執幢幡寶蓋頭梳雙丫髻面如古月走到明帝跟前點首示禮明帝不知不覺地立起來隨著兩個童兒信步出了皇宮腳下生風漸漸地平地而起把個明帝大吃一驚身不由己地隨風逐霧的行去走了多時只見前面有條極闊的黑水大河他騰身過去到了對岸再睜眼一看只見青山隱隱殿閣重重祥光瑞氣五色紛逞鸞鶴成群花木籠罩明帝十分高興暗道孤家爲一朝萬民之主論福也算享著了不知道還有這般出處呢真個是神仙之處何日到此靜修一世倒比做皇帝來得好呢正自遲疑之間那兩個青衣小童一轉眼不知去向了明帝好生奇怪東張西望哪里還有一些蹤迹呢瞥見那座山頭上霞光直沖霄漢從那霞光裏面泛出無數的蓮花霎時萬朵菡萏結成一個修羅寶蓋在寶蓋上面又現出一個丈六的金人頂上白光像煞雨後白虹一樣扶搖直上和祥光一樣透入雲端明帝仰起脖子看得呆了不一會祥光漸漸散去那個金人也就淡淡地消滅於無形了明帝還仰著頭在那裏望呢猛聽得震天價響的一聲狂吼明帝低下頭來仔細一看只見斑斕猛虎從山麓裏跳了出來張牙舞爪直奔明帝把個明帝嚇得魂不附體連呼救命正在這危急之時瞥見天空落下一種東西來像屏風一樣擋住大蟲的去路那個大蟲見了倒豎著尾巴向山麓裏沒命地逃去了明帝好不奇怪忙近來仔細一看哪里是屏風原來是一本極大的書上面簽著四個大字乃是大乘寶卷明帝暗自尋思道這書我倒沒有看見過呢不想它竟有這樣的厲害居然將大蟲嚇得走了倒要細細的來看它一看他邁步就向這大乘寶卷跟前而來到了這書的面前定睛一看可奇怪極了不獨那書上沒有一個字便是那簽上明明白白的大乘寶卷四個字也入於無何有之鄉了明帝十分詫異暗道久聞靈山有佛此地莫非就是靈山麽明帝偶然一回頭那書冉冉地騰空而起明帝再擡頭一看那大乘寶卷升到半空迎風一晃猛地化成萬丈金龍從半空搖頭擺尾地翻騰下來將明帝周身纏住明帝嚇得張口結舌一身冷汗猛可裏聽得有人在耳邊呼喚道萬歲醒來萬歲醒來明帝再睜眼一看原來是黃梁一夢見賈貴人在身邊不住地輕輕叫喚明帝醒來覺得一身冷汗翻著眼睛只是在榻上尋思夢境賈貴人見他從夢中驚醒頭上汗珠如黃豆一般流個不住不禁著了忙低聲問道陛下方才夢見什麽的這樣大驚小怪敢是著了夢魘了麽明帝搖手道沒事沒事賈貴人不敢再問忙喚宮女將香湯伺候明帝盥了面稍定一定賈貴人複又含笑問道萬歲方才究竟看見什麽的將臣妾嚇得抖做一堆明帝便將夢中的情事仔細說了一遍賈貴人緊簇娥眉想了半天莫名其妙一會子景陽鍾響明帝披衣而起匆匆地上朝受了百官朝拜已畢便對衆臣將夢境細細地說了一遍衆大臣中有的說好有的說壞議論紛紛莫衷一是獨博聞大夫傅毅出班奏道臣聞西方有神傳聞爲佛佛有佛經旨玄意奧從前大將軍霍去病征討匈奴的時候曾得屠修王所供的金人置於甘泉宮早晚焚香致敬後被王莽一亂想不復存萬歲所夢的金人莫非就是佛的幻影而且西方有一國名叫天竺國離此地不過萬餘裏世稱爲佛主隆生之地佛的始祖名叫釋迦牟尼乃是天竺迦淮衛國王的太子國母摩耶氏夢得天降金人後來有娠生下釋迦牟尼生時正當周靈王十五年天放祥光已有一種預兆到了他十九歲的時候自以爲人生在世永遠脫不了生老病死四個字他想超出三界之外便立志修行摒絕六欲不食煙火經過了二十八年方得成道獨創一種教旨傳受生徒教旨分淺深兩種淺的名叫小乘經深的名叫大乘經有地獄輪回的討論這時天竺國頗多邪教能使猛虎毒龍化爲幻術自從佛主得道之後便一一反邪皈正了後來突然在無那宮中死了國王國母大驚啼哭用棺將他的屍身盛好不意他突然在棺中坐起講經說法說得玉龍采鳳俯伏階前聽他說法花雨繽紛瑞氣滿布宮廷他將經講過之後屍身又複倒下在棺材外面不知哪里來的一蓬火將棺材和屍身完全燒化在空中現出丈六的金身祥光照耀鼻子裏沖出兩道白毫像兩條玉籠管一樣頭上滿露舍利于金光直沖霄漢他的大徒弟阿難二徒弟迦葉領著五百多名的信教人虔心朝禮停了半天那空中的莊嚴佛祖才淡淡地騰空而逝阿難迦葉後來到寶鶩峰修道不知道兀立山上有一隻大鵬殊爲厲害一口能將四十裏方圓的人吸下肚去當時阿難迦葉便同心協力想將這大鵬除去無奈自己法力微淺不能制服有一天觸動了大鵬之怒便和阿難迦葉二人爲難鬥起法來阿難迦葉竟不是大鵬的對手正在性命相搏的時候佛祖和普賢文殊兩菩薩從空而至各自先將蓮花寶座降下隔住他們誰知大鵬不知高下竟來和佛祖較量佛祖廣大慈悲不忍傷它性命那大鵬見佛祖未曾動作只當他沒有什麽能耐便展開雙翅掄起利爪來抓佛祖頭上的舍利子佛祖用手一指喝道好孽障你還不皈依等待何時那大鵬張著翅膀再也飛不起來阿難迦葉文殊普賢合掌念道善哉善哉那大鵬立在佛祖的面前厲聲說道釋迦你使廣大法力將我纏住害了我也佛祖諭道爾作惡萬般食人無算上天早已震怒欲雷劈汝身風裂汝肉汝至今尚不知省悟如今快快依皈佛門懺悔前愆同登樂土大鵬點首會悟飛上佛祖的頂上劍翅合目佛祖便邀文殊普賢永住靈山了萬歲德行感動天地昨夜莫非是到靈山去嗎再則萬歲曾雲親眼看見大乘寶卷並佛祖的金身更是班班可考再無疑惑了這番話說得明帝滿心歡喜忙對傅毅說道卿家的高見是極是極孤家意欲派人到西域去求取真經以救萬民而拯愚惡但未知卿家以爲如何傅毅忙奏道天下現在清平正需感化萬歲此舉真是甘露遍施澤及萬民了微臣等敢不仰望呢孝明帝便對衆臣說道哪位卿家肯體貼孤意往天竺求經去呢連問數聲竟未有一人答應一個個面面相覷呆若木雞不置一詞誰也不願意抛妻別子遠涉異地啊還有幾個曠達之流可不要將肚子笑痛暗嗤迷信只好在腔子裏格格的不敢笑出聲來明帝連問十幾聲見沒有人答應好不動氣便發作道朝廷有事現在連應命的都沒有了將來一有什麽變化可不是束手無救麽衆大臣見明帝怪罪越發不敢聲張木立兩旁毫無聲息這時中郎蔡諳出班奏道微臣願往天竺求經明帝見蔡諳願去滿心歡喜忙道卿家肯去真是社稷之幸了蔡諳又奏道微臣尚有一言不知我主可能准許否明帝答道卿家只管奏來孤家無不依從蔡請奏道微臣此去預算行程來去至少有一年的時光但是沿途千山萬水無數的艱險一朝遇著毒蛇猛獸可不要枉送了性命麽明帝忙道既是卿家願去孤家早就預備三千武士隨你保護了蔡諳又奏道主公差矣此行非尋常可比如果照陛下的意思一則多費時日二則徒耗金錢於是有損無益依臣看來不若差一二勇士與微臣一同前去足矣明帝道卿家之言正合孤意但是階下群臣誰能再像卿家這樣體貼孤意呢話猶未了武班中走出一人大踏步走到金階之下三呼萬歲俯伏奏道微臣願保蔡中郎前去明帝展目仔細一看原來虎賁中郎將林英心中大喜正要傳旨瞥見胡明也挺身出班奏與明帝情願隨往明帝便准了旨擇了吉日沐浴齋戒在西門外建立一壇名叫受經壇到了他們起程的那一天命文武百官一齊登壇敬禮明帝每人親敬三杯禦酒命人獻上黃金三百斤作爲路程之用蔡諳等拜謝受下便辭了明帝又和群僚作別之後三人道出西門直向潼關進發在路非止一日有一天走到酉牌時候看看天色已晚無處投宿一眼望去俱是荒郊曠野衰草連天蔡諳好不心慌忙對林胡二將說道如今天色已暗肚中非常的饑餓又無住宿的去處如何是好林英道且再走一程看總有人家的話猶未了瞥見前面樹林中有一絲燈光直透出來三人大喜放馬直奔這燈光的所在而來這正是水窮山盡疑無路柳暗花明又一村要知後事如何且看下回分解
