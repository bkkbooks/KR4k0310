body:
  text: 第五十三回奇珍異寶和珅抄家擎石蹋樹成得獻技卻說乾隆帝一部十全大武功記才得編纂成功接著那白蓮教徒又大鬧起來湖北地方的荊州枝江宣都一帶接連失陷宜昌長樂許多地方的白蓮教徒也回應起來那告急的文書雪片也似地送進京來嘉慶帝看了心中也著了忙這時福安康已死和琳也染上了瘴毒死在苗族地方將軍明亮又征苗未回一時沒有能征慣戰的大將打聽得白蓮教匪裏面有三個頭目一個名劉之協一個名姚之富一個是女匪齊林的妻子王氏都是十分兇狠他們趁著湖北官兵征苗未回便乘勢攻進襄鄖荊宜施五府勢焰十分兇猛那地方上的統兵官都是和珅的私黨暗地裏受了和相國的密意平日把軍情隱匿不報常常誑奏殺賊數萬冒功領賞直到後來大局糜爛不可收拾才到京中去告急這種情形嘉慶帝打聽得明明白白一面暗暗地記入和珅罪狀裏一面下旨著兩湖總督畢沅待衛舒亮統帶兵隊剿辦荊門宜昌一路匪黨湖北巡撫惠齡總兵富志那剿辦荊州江南一路匪黨著都統永保將軍恒瑞剿辦襄陽一路匪黨著提督鄂輝陝甘總督宜綿剿辦川陽一路匪黨又調回明亮的征苗兵防堵川陝一帶那班教徒被官兵殺得東奔西逃後來又有四川教徒王三槐冷天祿一班都回應起來把湖北教徒迎進四川去稱爲川教十分猖獗官兵聽了他也害怕那匪禍又從四川蔓延到陝西省嘉慶帝在宮中一日數驚日夜和大臣們商量剿撫的辦法便是那太上皇也因爲白蓮教的事體急得他寢食不安後來方得南充地方一個知縣官名叫劉清的思威並用把那班白蓮教徒漸漸地收服下來但是太上皇到底是年高的人吃不得驚嚇在正月初一這一天死在乾清宮裏這邊太上皇一死便有一班九卿科道紛紛奏參大學士和珅貪贓枉法弄權舞弊等種種大逆不道的罪內中要算監察禦史廣興吏部給事中王懷祖參得最是厲害說和珅有大逆之罪十有可死之罪十六真是一字一刀罵得他體無完膚嘉慶帝共收到參折六十八扣勃然大怒立刻下旨命成親王儀親王帶禦林軍去捉拿和珅怕路上有人劫奪又派禦前侍衛勇士阿蘭保沿路保護把個和珅直拖進刑部大堂上諭派劉相國董中堂八王爺七駙馬用嚴刑審問和珅熬刑不過只得一一招認劉相國吩咐釘上鐐銬收在大牢裏一面把審問情形詳細呈奏上去嘉慶帝看了奏章便把劉相國召進宮去商量查辦的事體劉相國奏稱似這般貪贓專權大逆枉法的奸臣理宜從嚴究辦嘉慶帝便下旨派十一王爺去查抄和珅的住宅派二皇子綿甯查抄和珅別墅那兩位王爺奉了聖旨怎敢怠慢立刻帶同番役人等如狼似虎地分頭查抄去了和珅屋子很大家產又多直查了五日五夜才一一查點清楚回宮複旨十一王爺奏稱和珅家中有一座楠木廳房是照大內格局蓋造用龍柱鳳頂又有一座多寶閣他那槅段式樣是仿照甯壽宮蓋造的便是講他的花園樣式竟是仿圓明園裏的蓬島瑤台此外珍寶多不勝數單查和珅的家奴名劉全的也有七百余萬家財其平日仗著主子的權勢任意勒索可想而知那七駙馬接著奏道和珅的珍寶不說別的單說他密室裏收藏著一挂正珠朝珠和那禦用衣帽已是大逆不道死有餘辜臣當即詢和珅貼身的家奴據說和珅常常在夜深時候穿戴著禦用衣帽挂上正珠朝珠對鏡子照著讓家奴跪拜稱臣顯系心存叛逆不僅是貪黷營私的罪名罷了說著十一王爺又呈上一張查抄和珅家產的總單來上面寫著共有家產一百零九號已經估價的二十六號合計共值二萬二千余萬兩又看那清單上寫著正屋一所十三進七十二間東屋一所七進三十八間西屋一所七進三十三間徽式房屋一所六十二間花園一所樓臺四十二座東屋側室一所除房屋外還開列有古銅鼎端硯珍珠寶石白玉羅漢漢玉觀音金銀碗盞金銀面盆腳盆等若干金珠翠寶首飾大小共計二萬八千餘件另外還有金元寶一千個每個重一百兩赤金五百萬兩生沙金二百余萬兩銀錠折銀九百余萬兩當鋪七十五家古玩鋪十二家銀號四十二家總計經營資本達一千二百余萬兩銀子家中還有綢緞庫房洋貨庫房磁器家具庫房共四所存儲呢絨裘皮家具洋貨無數外抄劉馬兩戶家奴宅子光金銀玉器首飾古玩皮貨藥財房屋地産等項就折銀七百余萬兩嘉慶皇帝看完了上列各類清單便吩咐將現有金銀存儲戶部外庫以備撫恤川陝楚豫等省的兵災之用對於已查抄而未經估價的大量産業著將原單交與八王爺綿二爺劉相國會同戶工二部詳細估價所估銀兩悉數充公這一抄除古玩珍寶送入大內不計外嘉慶帝實在到手八萬六千萬萬銀兩因此京城裏小兒都唱著和珅跌倒嘉慶吃飽的歌謠嘉慶帝又下諭旨著大學士六部九卿科道會同擬具和珅應得的罪名隔了幾天那許多會湊趣的官員紛紛上折說和珅貪贓枉法貽誤軍機心懷異志大逆不道有說應該斬首的有說應該淩遲碎剮的有說應該滅族的那嘉慶帝看過奏本心想這和珅是先帝的寵臣如今皇帝上賓不久便將他正法在朕心實有所未安如今朕格外施恩賜他一個全屍罷立刻下旨說姑念和珅是首輔大臣于萬無可貸之中免其肆市著加恩賜令其自盡至於和珅之子豐紳敬德也屬罪無可貸只因其早年尚主和孝固倫公主平日又最爲皇考所寵愛朕今仰體皇考慈愛之心曲加體恤若驟將豐紳敬德革去職位降爲平民則于額駙體制不符其原有和珅公爵應照議革去著加恩另賞伯爵令豐紳敬德承襲自朕加恩以後該額駙只許在家靜守不准出外滋事這道旨下去了以後劉相國當即到刑部大堂把和珅從大牢裏提出來驗明正身把聖旨宣讀一過和珅上拜過聖思不覺落下淚來當有番役把他推進一間空屋裏那屋梁上挂著一幅白綢子和珅便在那白綢子上吊死了自從和珅死了以後接二連三有人密奏那福尚書有心濟惡皇帝也把他下獄治罪又有人奏大學士蘇淩阿是和珅的姻親皇帝也勒令他休致又有人奏說侍郎吳省蘭李潢太仆卿李光雲都是和珅引用的人皇帝一律將他們降職調用這一場大參案鬧得人人膽戰個個心驚虧得這時白蓮教匪次第肅清到嘉慶四年二月那匪魁王廷詔被將軍明亮擒住徐天德也跳海溺死那經略大臣和三省總督都奏稱大功戡定仁宗便在京裏祭告陵廟封賞功臣看看國家太平皇帝便打算舉行巡狩典禮西幸五臺山去忽然那皇后喜塔臘氏一病薨逝嘉慶帝十分傷心那鈕鈷祿妃原是十分賢德的皇帝平日也十分寵愛她便冊立鈕鈷祿氏做了皇后照例晉封後父恭阿拉做承恩公那皇后卻再三辭謝滿朝文武官都上奏章稱她是賢後直到喜塔臘後靈柩出殯以後皇帝才慢慢地去了傷心在宮中閑著無事又打算出幸五臺山不料那西北角天上忽然出現了一顆彗星欽天監奏勸皇上彗星出現主有刀兵不可出幸又把這年閏八月改在第二年的二月京中小孩又唱著二八中秋黃花落地的歌謠又說這刀兵之災應在嘉慶十八年九月十五日午時到了那時日河南巡撫高杞果然接到滑縣知縣張克捷的密稟說滑縣現有白蓮教徒弟李文成設立邪教改名天理教又名八卦教招集黨徒預備起事請大帥趕速派兵掩捕他一面又密告衛輝知府誰知這兩位上司都不理他張克捷便用計把李文成騙進衙門來捉住斬斷他的腿骨這時李文成的同黨已有幾萬和那大興縣的林清都是八卦教中的大頭目如今見李頭目吃了虧越發忍不了兩方面便悄悄地約定在閏八月的中秋節起事那林清和宮裏的太監都有交情的便拿銀兩買通太監趁嘉慶帝出幸五臺山的時候在宮中起事又約定李文成在外面接應誰知那嘉慶簾聽了欽天監的話便中止了巡狩的事林清看看計謀不成便另用方法花六萬兩銀子買通了一個刺客去行刺嘉慶帝刺客名叫成得原是內務府的廚役在皇宮裏算他第一個有氣力那時有一個侍衛官八駙馬氣力也相大閑著沒事的時候常常拿延禧宮外的一對石獅子玩弄著那對石獅少說也有五七百斤重八駙馬常把它擎在手裏繞著回廓走一個圈子又輕輕地將它歸還原處兩旁閑看的內監們都唱彩說駙馬真是神力內中有一個太監說道那成得也算得一個大力氣的了卻如何比得上駙馬爺八駙馬聽得說起成得便問成得是什麽人那太監回說是內務府的一個廚子八駙馬是最愛有氣力的人當下聽了便逼太監去把那成得喚來那成得見了駙馬爺嚇得他趴在地下不敢擡起頭來八駙馬把好言安慰他又吩咐他有多少氣力盡力拿出來倘能勝得過俺俺便提拔你成得聽了駙馬的話才把膽放大駙馬吩咐他擎石獅子成得上去一手一隻石獅子拿起便走飛也似地繞著回廓走了三個圈然後放在原處氣不發喘臉不紅八駙馬看了十分歡喜上去和他拉拉手又吩咐把七根樹樁一字兒插在院子裏每根插入泥地裏有三尺來深八駙馬上去一蹲身伸出右腿來向樹樁踢去只聽得嘩啦啦一聲響亮那七根樹樁齊根踢斷兩旁內監們又齊聲喝好八駙馬站起身來吩咐太監再插上七株樁兒叫成得踢去那成得上去相了一相叫再添樁子太監又添了一株成得叫再添上又插上了一株成得還叫添上直添到十二株上成得才點頭說可以了看他不慌不忙也不去學著駙馬的身架一蹲身一飛腿那十二株樹樁像刀削似的一齊斷了那兩旁看的人個個吐出舌頭來八駙馬連聲喝好從此把他收在宮裏當一名神機營的管帶每逢八駙馬值班成得總在一旁伺候著後來成得力大的名氣給林清知道了便由太監們引他兩人見面林清送他六萬兩銀子在他們同黨崔士俊家裏過付又許他事成以後封他做王爺成得滿口答應回到宮裏八月十五中秋夜嘉慶帝駕幸圓明園的涵虛朗鑒臺上開筵賞月那班妃嬪宮娥都陪坐在兩旁八駙馬在臺上值班成得也莊台下侍衛酒吃到半酣嘉慶帝起來小便後面跟著三五個太監忽見那成得搶上臺來急急跟在皇帝的身後那太監們看他臉色有異忙上去攔住他成得袖子裏拿出雪亮的鋼刀來那太監胸口著了一刀倒地死了成得丟下太監直奔皇帝嘉慶帝見事急了一邊嘴裏嚷著有賊一邊繞著一株大桂花樹逃著八駙馬在臺上聽得皇上的喊聲忙趕過去見成得手中擎著尖刀正繞著樹追著皇上八駙馬大嘯一聲跳上去把成得兩手捉住接著那班禦林軍也趕來四面圍住了發一聲大喊講到那成得的氣力原勝過八駙馬在這時候他見人多了心也慌了手也軟了兩眼瞪瞪地望著八駙馬的臉一動也不敢動禦林軍一擁上前把他捉住送到刑部大牢裏當夜六部九卿都到圓明園來叩問聖安嘉慶帝吩咐在朝的王公大臣和六部九卿官員會審刺客這時由張觀齋相國主審連審了九日審不出一句口供來又用大刑逼著他也閉著嘴不說話成得受刑到最厲害的時候只聽得他冷笑幾聲說道這有什麽審問的事不成便拼送去了俺的腦袋事若成了大人們坐的地方便是俺坐的說完這幾句他又閉著嘴不響了張相國卻也沒奈何他第二天入朝把這情形奏明皇上嘉慶帝吩咐不用審了推出去碎割了罷張相國奉著聖旨出來把成得定了淩遲的罪又查得成得有兩個兒子一個十六歲一個十四歲都在學堂裏讀書派差役把這兄弟兩人都從學堂裏捉來到了行刑的那日一隊兵馬把成得押到西校場綁在鐵樁子上又把他兩個兒子綁在對面這兩個孩子哭著喊爸爸那成得閉上眼看也不看到了時候劊子手先把兩個孩子殺了再動手碎割成得成得這時剝得渾身赤條條的兩個劊子手各拿著尖刀上去先割去他的耳鼻和兩個乳頭又從兩手臂割起把他身上的肉一片一片地細割下來從肩頭割到背後又割到胸前起初還淌著血後來血水淌完了只流著黃水上半身統統割完只剩一副骨頭了成得月然睜開眼來大聲喝道割快些那劊子手回答他道聖上有旨意叫我們慢慢地割叫你多吃些苦痛成得便閉上眼不說話直到割完了渾身的肉才給他喉頭一刀結果了性命成得在京中送了性命那京外的八卦教卻越鬧得厲害在滑縣的教徒于九月初七日起事聚衆三千人殺進衙門去打開監牢把牢中的李文成劫出來又把縣官張克捷和家眷十余口齊殺死同時直隸省的長垣東明山東省的曹縣定陶金鄉各州縣一齊回應林清卻帶著二百名死黨埋伏在京城裏一面聽京外的消息一面打通了宮中的太監約定九月十五日半夜在菜市口會齊從宣武門殺進宮去要知林清如何結局且聽下分解
