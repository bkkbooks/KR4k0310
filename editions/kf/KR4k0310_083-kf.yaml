body:
  text: 第八十三回白雲觀太后拈香神仙會郁氏納贄卻說那條大蛇直向皇太后臉上撲來的時候奕譞和李蓮英兩人正站在慈禧太后的身後只聽得太后大叫一聲暈倒在椅子上李蓮英這時也顧不得什麽了忙搶去把太后把住奕譞也不要性命了向那大蛇迎上去掄著拳頭在蛇頭上奮力一擊大蛇暈倒在地奕譞便提起靴腳把蛇頭踏住那蛇受了痛掉轉尾兒來把奕譞攔腰盤住蛇身愈盤愈緊奕譞幾乎喘不過氣來虧得那班工匠在一旁見了大家上去拿斧子把蛇身支解開來奕譞腳心裏受了毒氣站立不住了慈禧太后還坐在花廳裏家人扶著奕譞走進屋子去忽爬在地下磕著頭說奴才該死老佛爺受驚了這時慈禧太后神志已清一班太監們忙著拍胸捶腿送參湯裝煙忙了大半天太后才開口吩咐回宮去這裏奕譞跪送慈禧出了大門回到上房忙傳府中的外科醫生在腿上打針服下解毒的藥去隔了一宵那毒氣卻漸漸地退了只是頭暈心跳精神疲倦醫生正要下第二劑藥忽然慈禧太后派了蕭禦醫到府中來診奕譞的病奕譞當即叩頭謝恩禦醫診過了脈並不開方便在隨帶的藥箱裏掇些藥看著奕譞服下便走了從此禦醫便每天替醇親王診一次病每一次必看著奕譞服下藥才去但奕譞自從改服了禦醫的藥以後那病勢反覺得一天一天地沈重起來府中雖養著幾位內外科醫生但因禦醫來下過藥都不敢再下藥這一天直隸總督李少荃親自進府去探望奕譞見了李總督只是淌眼淚說我的病看來不能好了我只有一塊肉留在宮裏他如今是咱們的皇上了我死以後別的沒有什麽舍不下只求總督多多看顧我們這位皇上罷說著便在床上向李總督拱手李少荃忙回著禮說王爺放心做臣子的豈有不忠心於皇上之理便是王爺的病也不見得便有什麽凶危奕譞這時兩眼朦朧低低地說道我很想見他一見李少荃聽了知道王爺想見他的兒子第二天李總督便入奏說奕譞病勢危篤頗欲與皇上見一面即皇上天性純孝生父病狀亦時在念中可否仰求皇太后垂念父子天性賜予一面慈禧太后見了這奏摺便立刻親自帶了光緒皇帝到王府裏去探望奕譞的病那奕譞正病得神志昏沈的時候見了光緒皇帝頓覺心裏清醒起來忙爬在枕頭上磕頭接駕光緒雖說年紀尚輕但父子究關天性見奕譞病得十分瘦弱也不覺掉下眼淚來了回宮去又打發內監賞人參十斤黃金千兩這時總督衙門裏有一位書啓師爺很懂得醫理李總督一家人有病都是這位師爺看好的當時李總督便把這位師爺推薦到王爺府裏去無奈宮中的規矩有禦醫診著病別的醫生任你有天大的神通也要避著嫌疑不能再給病人診病了這位書啓師爺在王府裏住了幾天無事可做到後來眼看著一個年紀輕輕身體強健的奕譞活活地吃禦醫治死了光緒皇帝在宮中得到生父死的資訊便撐不住嚎啕大哭慈禧太后分派李蓮英傳諭勸皇上節哀保重又吩咐隆裕皇后隨時勸慰一面下諭從優撫恤發內帑銀萬兩給王爺治喪自從奕譞死了以後慈禧太后才放了心一面卻把那峒元道士十分信任起來皇太后親自下諭封峒元道士爲總道教司與江西龍虎山的正乙真人並行又發銀一萬兩替他重蓋白雲觀這白雲觀在北京西直門外原是一座荒涼古刹門前匾額剝落門內佛座歪斜自從皇太后敕建白雲觀那峒元道士便竭力經營他仗著皇太后指帑的名兒到各王爺各大臣家裏去募捐上自督撫大員下至府尹小吏都捧著銀錢去孝敬他要他在太后跟前說一句好話兒這一次峒元道士足足捐了六七十萬銀兩便在西直門外舊址大興土木白雲觀的原基只有四五分地皮如今峒元道士有了錢了便把左近四五百畝地連房屋統統買下來他出的地價只有二三十塊錢一畝鄰舍人家都懼憚他的勢力不敢不賣給他峒元道士買得了地皮便把房屋統統拆去重新蓋造外面殿閣崇宏裏面亭台曲折夾著許多花木池治外面望去好一座闊大的園庭新觀落成的這一天峒遠道士便進宮去恭請皇太后降臨替菩薩開光慈禧太后原是信佛的當下聽了便也高興便下諭揀定正月十五日聖駕親臨白雲觀拈香這個諭旨一下卻把那文武大臣忙得走投無路你道爲什麽這樣忙原來皇太后諭中有著王大臣眷屬隨同拈香的話那班官家眷屬平時深居簡出的如今得了這道懿旨是奉旨燒香做丈夫的如何敢違拗她太太一出門第一要緊的事體便是穿戴兩字那些年老的福晉夫人們還容易對付只有那年輕的官太太或是格格小姐們最是不容易打發她們都是在妙齡盛年花貌瓊姿各各有逞奇好勝的心思如何不趁此在皇太后跟前顯煥顯煥那班太太小姐們都向她的丈夫父親百般需索有的要兌首飾有的要做衣服到了正月十五一清早個個打扮著坐著自己府中的車輛趕到西直門外白雲觀裏接駕去那文武官員親王大臣卻在城門口接駕停了一刻遠遠見旌旗蔽日壚煙簇雲又有一大隊兵馬擁護著皇太后的聖駕來了到得跟前那班大臣們忙爬下地去跪接待聖駕過去那大臣們個個上馬的上馬上車的上車從小路裏抄上前去又在白雲觀前跪接皇太后皇上和皇后的禦車直進中庭甬道上下車這時甬道兩旁跪的儘是官家眷屬一時釵光鬢影滿庭春色皇太後向兩面看著臉上不覺露出笑容來皇太后進殿峒元道士早在殿階上俯伏著高呼著皇太后皇上萬歲萬歲萬萬歲皇太后走到佛座前見正中塑著一座丈二金身認識是玉皇大帝李蓮英遞過禦香皇太后和皇帝皇后一齊跪在繡墩上參拜後面二三百位官眷殿廊下二三百位大臣都一齊跟著跪在蒲團上滿院子鴉雀無聲的只聽得鐘鼓之聲女眷們的環佩鏗鏘聲大臣們的朝珠叮噹聲微微地內外相應拈香已畢大臣們退出皇太后把峒元道士宣召進來吩咐他領導隨喜那峒元道士全身披挂精神抖擻在前面斜著肩兒彎著腰兒走著皇太后走過幾重佛殿見塑的儘是天神天將繞過後面月洞門便露出一座花園來蓋造得精致曲折花園裏隨處養著鶴鹿孔雀錦雞白兔之類也有在草地上跑著的也有在假山洞裏躲著的皇太后看了十分歡喜走過幾處回廊曲院才見正屋蓋的是九間正廳五明四暗廳上已排列著茶桌廳對面建著一座金碧輝煌的戲臺這時滿屋結著燈彩戲臺上預備下場面兩邊暗房是皇太后皇后的更衣室皇太后皇后入更衣室略略休息一會外麵茶果擺齊戲臺上鑼鼓一響戲文開場峒元道士早已把內廷供奉的幾個戲子邀在觀裏聽候太后點戲皇太后出來用茶果果然點了一出混元盒一出趕三點皇上點了一出回龍閣皇后知道皇太后是愛小旦戲的便點了一出鴻鸞禧太后十分歡喜一屋子官眷們都陪坐著聽戲臺上笙歌嘹亮台下珠圍翠繞文武官員一律回避著獨有這峒元道士在脂粉隊裏如穿花蝴蝶似地跑來跑去承迎著皇太后的色笑這一場戲直看到日落西山皇太後才擺駕回宮那班女眷們正看得出神聽說太后要回宮去了大家只得依依不捨地個個出門上車跟著太后進城去這裏留下那班大臣們峒元道士便把那王爺大臣們邀進正廳去坐那班大臣們都和峒元道士好大家稱兄道弟地喝酒聽戲有許多戲子原認識那班王爺大臣們的唱完了戲個個打扮著下臺來坐在大人們身後那班大人們見了戲子越發樂得忘形個個摟著小戲子狂呼痛飲起來這一場酒直喝得黃昏入靜才個個打著燈籠坐車進城去隔了幾天峒元道士進宮去謝恩皇太后留著他在宮中一連住了幾宵峒元道士講些練氣打坐的功夫又教著皇太后練八段錦功夫說每日在起床之前練習一套功能延年益壽皇太后聽信他的話從此便認真練習起來後來便習慣了隨便在什麽地方總須練過一套八段錦才肯起身這功夫直到老也不間斷的因此慈禧太后的身體日見豐美到老也不衰敗這都是後話且說這峒元道士得了皇太后的歡心常常宣他進宮去賜座奏對道術從早談到晚也不厭倦有許多王公大臣見他得了勢便輪流著請他進府去置酒高會喝酒喝到高興頭裏便把自己的夫人福晉格格小姐們喚出來拜峒元道士做師父這個風氣一開京城裏有許多官家眷屬都搶著拜在峒元道士門下做一個女弟子算是十分榮耀的事那做女弟子的都有贄儀多則上萬少也數千銀錢以外還送著各種繡貨有繡一件道袍的也有繡一件鶴氅的也有繡佛著幢幡的那官階小些或贄見禮少些的硬把自己妻女湊去拜他還不在他眼睛裏呢有許多王爺求著要和他換帖峒元道士還推三阻四地不肯他只和李蓮英拜把稱弟兄爲的是結下這個交情彼此在太后跟前可以互相說著好話又因這一年正月十五日太后親到白雲觀中拈過香從此每年正月十五這一天便有京城裏文武官員到觀中來拈香皇太后皇上也必要下諭派一位王爺代行拈香這一天峒元道士備下戲酒邀著王爺大臣們在觀裏熱鬧一天從十五這一天起便把廟門開放任人進廟燒香直開到二十五在這十天裏面紅男綠女進廟來燒香的擠得水泄不通京城裏人稱做會神仙來會神仙的不獨是平民百姓那京城裏王爺的福晉大臣的命婦以及貴家的格格小姐都打扮得花朵兒似的到廟裏來會神仙他們的會神仙又與平常婦女不同到了廟裏決不肯當日回府必得要在廟中睡下一宵真的去會神仙名叫宿山如此這班貴婦女大半是峒元道士的女弟子年輕的格格小姐們又寄名給峒元道士做幹女因此那班貴婦小姐見了道士大家搶著把師父幹爺嚷成一片峒元道士見女弟子幹女兒來了便格外巴結在廟裏預備幾十間精美房間錦繡床帳留她們女眷住下會神仙去內中有長得美貌的越發留著多宿幾宵有許多官員想升官的便托他妻女在這會神仙的時候求著師父幹爺給她自己的丈夫父親在太後跟前說幾句話又拿整萬幾十萬銀兩交給峒元道士托他上下打點只須師父幹爺一答應那官兒在十天裏面便可以往上升那班官眷會得神仙的便出來對同伴們誇耀著只有幾個年紀略大些的官太太或是銀錢不濟事的竟有幾年會不到神仙的記得那年有一個杭州的吳侍郎在京城裏做了多年的窮京官實在窮得過不下日子去要走走門路手頭又苦於沒有銀錢吳侍郎的妻子郁氏是個頭等美人京城裏一班官家眷屬人人都知道的這一年也是正月十七這一天鬱氏到八王府中去拜年那王爺的福晉正打扮著要到白雲觀去會神仙鬱氏一時之興也跟著福晉同去峒元道士一見了鬱氏忙問這位是誰家的太太福晉便對他說是吳侍郎的夫人郁氏的美名峒元道士也是久慕的如今見了她如何肯放當時便要收鬱氏做幹女鬱氏推說沒有帶贄儀在峒元道士跟前做女弟子或是做幹女多少總要獻贄儀的多則上萬少也要幾千況且這做幹女兒做女弟子的事體都要那班官家女眷再三求著峒元道士才肯答應如今這峒元道士自己求著鬱氏要收她做幹女兒這是何等榮幸的事體當時那福晉便在一旁慫恿著叫郁氏快答應師父一定有好處給你後來聽鬱氏說不曾帶得贄儀福晉忙著說我有我有說著忙掏了一張二千銀元的莊票來交給鬱氏郁氏轉交給峒元道士峒元道士搖著手說貧道看吳太太臉上有仙根俺們結一個仙緣不用贄儀的當晚鬱氏便在白雲觀中會得了神仙一連宿了三宵跟著八王爺的福晉回家來鬱氏臨走的時候峒元道士還給她一張一萬兩銀子的莊票算是幹爺的見面禮兒一過了二十五廟會收場峒元道士受郁氏之托便進宮去奏明太后說吳侍郎如何清苦求老佛爺賞他一個差使這時太后正要下諭點放學差在中國各省中要算廣東學差的缺分最美的了如今因峒元道士的說話便放吳侍郎做了廣東學差那吳侍郎接了這個上諭親自跑到白雲觀去謝恩回家來又對他妻子郁氏磕頭謝恩興高采烈地赴任去了有一天慈禧太后在宮中和峒元道士閒談說白雲觀中花園造得很好只可惜少些字畫峒元道士聽了忙跪下地去磕著頭說求老佛爺賞幾件字畫慈禧太后一時高興便吩咐李蓮英磨墨拿起大筆來寫了一個極大的福字又拿出平日畫成的一堂花卉畫屏來一齊賞給峒元道士峒元道士又磕頭謝恩歡歡喜喜地捧著出宮去交裱畫匠裝裱起來待裝裱成了峒元道士又揀了一個日子在白雲觀裏擺下戲酒把慈禧太后的字畫張挂起來邀著許多王爺大臣在花園裏吃酒聽戲吃酒中間有一位王爺說起老佛爺每年賞給大臣們的字畫很多老佛爺雖能寫字作畫但一個人如何忙得過來如今裏面賞出來的除福壽幾個擘窠大字以外其餘的小楷字花鳥畫兒都是繆太太代寫代畫的峒元道士忙問誰是繆太太那王爺說道師父卻不知道宮裏的規矩內外臣工除南北兩書房內廷供奉及內務府人員以外不是官做到二品的不能賞福字無論什麽大官年紀不到五十歲不能賞壽字自從到了俺老佛爺手裏格外開恩常常賞著字畫老佛爺一高興不論什麽人都得賞賜親筆的福字壽字有時賞賜花鳥畫兒小楷字兒老佛爺從在桐蔭深處當妃子的時侯原學得一手好字畫但如今要賞人也太多了一個人忙不過來便降下密旨給各省的督撫叫尋覓能書畫的命婦選進宮去替老佛爺寫字畫花那時四川督撫便把這繆太太悄悄地送進宮了繆太太名素筠原是雲南人她丈夫在四川做官便死在四川地方家裏境況很是艱難繆太太的兒子雖也是一個舉人但一時也沒有出息幸得繆太太能畫惲派花鳥畫得很是工細她又能彈琴又寫得一手靈飛經體的小楷在四川地方靠著官場中賣她的字畫度日如今四川督撫得了老佛爺的密旨便日夜兼程的悄悄地把繆太太送進宮去老佛爺一見十分歡喜便每月給她二百塊錢畫金在宮中終日代老佛爺寫著字俸繆素筠生得身體臃腫面目闊大慈禧太后常常拿她開玩笑說繆太太的身體好似不倒人兒但因繆太太的字畫高明卻也很看重她宮裏規矩凡宮女女官見了太后都要跪拜獨有這繆太太太后吩咐得免跪拜宮裏上上下下的人都稱她繆太太繆太太做人和氣大家都和她好這一天是太后的萬壽那班妃嬪們要使太后歡喜預先備了一頂大號的鳳冠到了那日宮裏衆妃嬪都按品大裝起來便叫宮女也給繆太太裝扮繆太太果然把披風紅裙鳳冠霞帔穿戴起來繆太太身體又生得矮胖那衣冠又十分寬大穿戴上了站在地下越覺得臃腫了宮女們都忍著笑把繆太太扶去拜太后的萬壽這時太后正坐在內殿受禮已有許多滿州福晉格格們一齊大裝了站在太后兩旁忽然見繆太太打扮得繡球兒似的一個身體滾著上來大家已忍不住要笑了只因光緒皇帝站在殿上大家不敢笑出聲來後來皇上出去了繆太太便爬在當地行禮望去好似一隻地鼈蟲慈禧太后先忍不住哈哈大笑起來接著兩旁的貴婦人和妃嬪們也撐不住笑起來了滿殿只聽得嬌脆的笑聲慈禧太后還問誰給她打扮成這個樣兒的說著又忍不住笑了一陣接著又說今天原是大家歡喜的日子繆太太伴著咱們玩一天罷繆太太忙磕頭謝恩這一天繆太太跟著太后逛三海那三海地方又大許多妃嬪貴婦跟著太后跑來跑來那班滿州婦女都是大腳還可以支援得獨這繆太太是小腳頭上戴的鳳冠又重走一走晃一晃因爲太后的遊興很濃直逛到天色快晚才回宮賞了繆太太許多珍貴的東西繆太太謝了賞回到自己屋子裏真是一步也動不得了要知後事如何且聽下回分解
