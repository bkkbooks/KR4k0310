body:
  text: 第八十六回勸親政翁師傅薦賢興醋波瑾珍妃被謫卻說光緒帝叫總管去傳翁師傅進來不多一會兒翁同和隨著總管匆匆地走到禦書房禮畢賜了坐光緒帝便憤憤地說道俺空有了這身登九五天下至尊的名目連一個妃子也無法庇護不是很慚愧麽說著便把瑾珍二妃給皇后痛打的事一一說了翁同和聽罷便乘間奏道愚臣早曾言及陛下政權旁落須設法收回來然後獨斷獨行一件件地做去將來威權在握休說皇后親王們就是皇太后也得懼怕三分呢光緒帝點頭說道師傅的話的確是治本的方法收回政權這個意思俺也不知籌劃幾次只是礙著太后和一班親王在那裏叫俺怎樣做起一時想不出兩全的計劃來翁同和沈吟了一會奏道法子倒有一個在這裏不知陛下有膽量去做了麽光緒帝道那只要有利於俺的都可以實行的就是俺真個去做了出來太后和親王們也不見得拿俺怎樣翁同和說道既然這樣陛下可趁著太后終日在頤和園行樂的時候對於外任大吏的奏牘揀可以獨裁的便一一批答了萬一關係緊要一些的始同太后去商量太后那時大有樂不思蜀的光景見陛下如此樂得安閒一點決不會疑心的因太後素知陛下忠厚真誠諒無專政之意所以想不到這一著以後照這般一天天地下去即有緊急事也不用同太后酌議了這政權不是從不知不覺之中還了過來嗎那時再把幾個舊時的親王臣子的權柄一齊削去將舊日的不良制度大大改革一番國事日興天下大治中外讚揚都說陛下是個英明之主咧到了這時太后即使要來幹政也自知望塵莫及了還怕甚麽呢光緒帝聽了翁同和一席話不覺高興起來道師傅替俺爲謀自然很不差的不過滿朝之中很忠心於俺的師傅之外只有李鴻章還耿直些但怕他未肯冒這個險餘如劉坤一等又均爲外臣一時不便內調但俺的左右無人算起來沒有一個不是母黨連內侍閹奴也常常偵察俺的行動這般到處荊棘算有三五個親信之臣辦事一定很爲掣肘呢翁同和忙奏道講到人才倒不愁沒有本朝很有幾個傑出之士可惜一班親王弄權將他們埋沒了說起來真也可歎之至光緒帝說道如今事迫了翁師傅但有能幹的人才舉薦出來俺立刻把他升遷重用就是了翁同和奏道愚臣那年做會試總裁的時候在許多舉子當中選著一個才具極優的人給他中了第七名進士現任著工部主事因他職分甚小不能上達天聽所呈的幾種條陳被大臣扣留壓下了此人姓康名有爲號叫長素是廣東南海縣人他在南方有聖人之目就是他自己也很自命不凡他還有一個弟子叫做梁啓超學問也極淵博而且所發的議論也深知世界大勢陛下如欲整頓朝政一意革新者非用此兩人不可光緒帝聽罷欣然說道師傅既有這等能人何不早說俺若曉得早就擢升他了翁同和奏道皇上如一意革新事還不遲慢慢地入手做起來就是了但切一可鋒芒太露使太后疑心那就是累贅了光緒帝聽了不住地點著頭道師傅言之有理俺就隨時留心進行吧說道便叫翁同和退去自己也回到後宮去了不談光緒帝君臣在禦書房計議單講那天西太后下了停止慶祝的詔書以後心上老大的不快幸虧惇王在一旁乖覺忙奏道到了萬壽的那天老佛爺仍進頤和園去奴才們也得替老佛爺叩頭希望賞一杯壽酒哩這幾句話才把西太后的怒氣漸漸地平下去只略略點一點頭當下由一班宮女們簇擁了太后到後宮進福壽膏去西太后正在榻上吸著鴉片煙忽然李大姑娘進來在太后耳邊低低說了幾句太后立時大怒連叫把這兩個妖精抓來待俺親自問他李蓮英在一旁會意趕緊出去叫小太監去傳瑾珍二妃來見太后不一刻瑾珍二妃隨著小太監進來二人戰戰兢兢地行過了禮站在一邊西太后一見二人早怒氣上升便大聲喝道你這兩個狐媚子做的好事可恨迷惑了皇上還要干預政事難道我朝沒了家法麽妃子敢這樣放肆還當了得說著連聲命取家法過來這時光緒帝聽得瑾珍二妃被太后召去怕有不測的事於是也匆匆地趕來太后正要喝打二妃可憐珍妃被皇后責打的創傷還不曾平復今天見又要受刑不覺哭得如帶雨海棠似的光緒帝見了這般情形便禮也不及行忙跪下說道聖母責罰她兩個究竟爲什麽事情呢請明白示下了再加刑不遲西太后怒道她兩人這樣膽大都是你寵的你問她兩個可曾私通外臣文廷式是和她兩個什麽稱呼就可明白了珍妃見說忙叩頭道文廷式雖系婢子的先生但已多年不見了西太后冷笑道多年不見你卻幫著他賣官鬻爵天天見面不知要鬧到怎樣呢說罷喝叫用刑光緒帝忙代求道聖母的明鑒她二人私通外臣決沒有這回事還請饒恕她兩個吧西太后怒道你還替她二人隱瞞麽今日非打她兩個不行光緒帝見說只得一味地哀求李蓮英也在旁作好作歹地求著西太后只把臉一沈道既然你們都這般求情刑罰就免了降級是萬不能免的便喝聲把她兩人降爲貴人幽禁半年誰敢替二人求告的便家法從事這諭旨一出就有幾個太監過來擁著瑾珍二妃去羈禁了光緒帝見事已弄糟諒求也無益只得揮著一把眼淚退了出來但是始終不明白兩個妃子爲甚要犯幽禁的罪名一頭回宮心裏只是想著又因瑾珍二妃被禁益覺得冷清之極十分無聊就長籲短歎地垂起淚來恰巧內監寇連材侍候著他見皇上悶悶不樂就過來慰勸光緒帝一面歎氣一面將拘禁兩妃的事講了一遍便恨恨地說道俺不知她二人犯了何罪卻受這般的糟蹋說道連連頓足不已寇連材聽了跪奏道這一定又是李蓮英的鬼戲了陛下還記得養心殿上引見那個侯補道徐誠的事麽這徐誠是李蓮英的拜把兄弟陛下弄得他當場出醜李蓮英自然要記恨在心乘機報復了光緒帝一聽寇連材的話便恍然大悟從此皇上收回政權的那顆心越發地急了不過皇上引見外任官吏爲什麽會涉及瑾珍二妃的呢講起來這事很有一段因果在裏面原來文廷式本是一個翰林清廷的朝臣要算翰林院最清苦了倘沒有運動外放時猶如寺觀中老雄雞一樣永遠沒有出山的日子就是有錢運動了也要手腕敏活否則外放出去還是弄不到好缺仍然窮苦非凡那麽倒不如縮著尾巴躲在翰林院中好了因一經外放就得負擔責任一個不小心腦袋便要搬家若做翰林只要安分守己多吃飯少開口是沒有什麽風險的不過只賺一點死俸祿永不會發迹的所以有窮翰林的綽號但俗語說要發財去做官做了官仍然這般困苦誰耐得住呢閒話少說且言歸正傳卻說這文廷式雖是個翰林他和瑾珍二妃的確有師生之誼因此他仗著女弟子做著貴妃免不了借勢行事幹此運動官爵的勾當人家見他是貴妃面上也就眼開眼閉含糊過去了這樣一來那文廷式的膽量自然一天大似一天了這次合該有事陝中有個道台出缺這缺又是非常的肥美運動的人當然很多那時有個姓李的道員情願拿出六十萬銀子來托人向文廷式說項要想做這個道台文廷式答應了便來吏部裏挖門路誰知早已有人補上了文廷式這一氣幾乎發昏眼見得六十萬銀子不能入自己的腰包了心上如何不氣呢又去細細地一打聽知道補上的道台是捐班出身和李蓮英是結拜兄弟姓徐名誠從前做過庫丁的後來發了財在前門外打磨廠開設了一爿竹木行生意十分發達使他增多了三四百萬銀子這徐誠錢多了便想要做官了因此叫人把一百萬孝敬了李蓮英又讓自己的兒子拜了李蓮英做幹爺李蓮英見他有的是錢樂得和他結交不多幾時居然做了換帖弟兄了李蓮英又替徐誠捐了一個道銜應許他遇缺即補這時陝中道台出缺了李蓮英忙叮囑吏部把徐誠補上哪知冤家逢著對頭碰著文廷式也替人謀這個缺子現被李蓮英搶去文廷式如何肯甘心呢他眉頭一皺計上心來暗想那李蓮英這廝我勢力敵他不過姓徐的王八須還在我手裏終要弄到他做不成道台才出我胸中之氣主意已定便又仔細去一打聽知道那個徐誠不但是市場出身簡直連鬥大的字也識不了兩三個文廷式聽了便大喜道那就可以計較了於是他將這一般情形私下叫一個小監秘密地告訴珍妃叫她在皇帝面前幫助一下珍妃見是師傅的事不好推卻更想不到會弄出拘禁的事來因此她乘德宗臨幸的時候就于有意無意中談起了外政珍妃又道現在外面可有疆吏出缺嗎光緒帝答道不曾聽說起珍妃問道臣妾聞得有個新任的陝中道台是李蓮英的拜把弟兄聽說他字也不識得一個怎好去做道台呢光緒帝的生平最恨的是李蓮英一聽珍妃說的話也不追問她這消息從何處來的便大怒道李蓮英的權柄一天天地大起來咱們的國政也一天天地衰下去不講別的只看那些禦吏侍郎也都是不識字的了那一次和日本打仗禦史鐵令上章請用檀道濟去打日本侍郎王永化請旨複黃天霸的原官俺只知道檀道濟是宋代時人黃天霸卻不知是誰俺就召他兩個一問才知道他兩人在市上聽了說書的談起檀道濟怎樣能帶兵黃天霸在施公案小說上怎樣的有武藝他兩個一查朝裏沒有檀黃的名字疑是休職的官吏所以上章保薦你道可笑不可笑尤其是我們滿族的大臣常常鬧這種笑話俺終把這奏章毀去免得漢臣們見笑且因此輕視我們滿族但這許多荒謬不通的人沒一個不是李蓮英薦來的俺將來整頓朝政把此輩完全除去才行哩今據你說來那新任的道台又是鐵令王永化一類人物疆吏似這般混充豈不誤事不是去害百姓嗎但不知他姓甚名誰珍妃在旁應道聞得那道台叫徐誠吧光緒帝點一點頭道知道了他須逃不出我的掌握等他引見的時候慢慢和他算這盤帳說著就和珍瑾二妃閒談了一會兒一天無話到了次日吏部既補了徐誠的道台自然照例要引見皇上的當下徐誠便朝珠補褂地在偏廳裏侍候著李蓮英還親自出來教了徐誠晉見皇上的禮節和應對的語言徐誠一一記在心上不一刻內監傳聖諭出來著陝中道徐誠養心殿上見駕徐誠領了旨意便搖搖擺擺地走上養心殿來一見殿上嶄齊地列著內監珠簾高卷隱隱見上面穿著黃衣裳的但實在離得太遠了些一時瞧不清楚大約是皇上了這時徐誠早慌了兩腳不住地發抖沒奈何只得硬著頭皮上去叩見勉強把三跪九叩禮行畢俯伏在地上聽皇上勉勵幾句就好謝恩下來了這是歷代的舊制也是李蓮英預先對徐誠說過的所以他很是安定準備出去受同僚的賀喜他正這般想得得意忽聽上面問道你是徐誠嗎徐誠見問不覺吃了一驚暗想李蓮英不曾教過自己別的閒話萬一要問起別樣來不是糟了嗎他正著急一面只得答應一個是字卻聽得上面又問道徐誠你從前是做什麽生業的徐誠益發慌了更應不出來囁嚅了半天才頓著奏道奴才是做木行生意的光緒帝喝道你既是木商爲什麽不去做你的掌櫃卻來謀官做呢徐誠心裏慌極了只得奏道不瞞陛下說做生意的出息哪里及得上做官的好所以奴才要謀官做光緒帝喝道你做官知道有多少出息呢徐誠伏在地上叩了一個頭道奴才不想多少只要老有三十萬塊錢的積蓄奴才也心足了光緒帝叱道你可曉得做一任道台有若干俸銀呢徐成戰兢兢地奏道奴才聽人講過做官靠俸銀是要餓死的到了那時自有百姓們奉敬上來的說到這裏只見內監擲下一張紙和一支筆來道皇上叫你把履曆寫上來徐誠聽了早魂飛魄散又不好說不能寫一頭抖著一頭伏在地上握著一枝枯竹管好像千斤重擔一樣再也提不起來內監又一疊連聲催促著可憐徐誠急得頭上的汗珠似黃豆般的粒粒直滾下來掙了半天還只寫好半個徐字歪歪斜斜的不知像些什麽內監將這半個徐字呈了上去便聽得光緒帝冷笑道連自己的履歷都寫不明白倒想去做官發財了即使上得任去還不是做害民的汙吏嗎快給我驅逐出去這諭旨一下內監把徐誠的頂子摘去便喝到趕快滾吧徐誠聽了如釋重負立起身來退了幾步抱頭鼠竄著出來外面那些和李蓮英一党的太監都來問訊徐誠垂頭喪氣地說道我上了李總管的當了這腦袋留著還是僥幸兒哩衆太監忙問原故徐誠把引見的經過一一說了踉踉蹌蹌地回去這裏將徐誠的事都當作官迷者的笑史但消息傳到李蓮英耳朵裏心上很爲詫異想平日皇上引見外吏老於做官的便問些風俗人情至於新上任的官員除了訓勉的話更沒別的枝節現在徐誠覲見卻要考起才學來這一定有內線在那裏作梗是不必說了於是他連夜到吏部衙門一打聽知道徐誠已然徐名補上是姓李的運動人是文廷式李蓮英一聽心裏已明白了八九分因咬著牙齒道這文廷式那廝不是瑾珍兩個妃子的師傅他仗著女弟子充著貴妃便去走門路把我到口的饅頭奪去倒也罷了不該唆使皇上在養心殿上和徐誠爲難當場叫他出醜無異丟了我的臉一般這口冤氣不可不報於是李蓮英就去同他的妹子計議叫她捏一個謊去報給西太后說瑾珍兩妃干涉外政因她二人的師傅文廷式竭力主張和日本開仗叫二妃從中說項二人便在皇上面前日夜地攛掇把皇上的心說得活動起來才叫李鴻章去奮戰終至於喪師辱國那不是瑾珍二妃的不好嗎李大姑娘得了爲兄的指使第二天上就來見西太后正值太后在榻吸著鴉片煙李大姑娘俯在太后的耳畔把這事細細說了一遍太后如何不生氣呢所以立時跳起身來把煙槍一擲連煙斗都打破了口裏只叫抓那兩個狐媚子可憐瑾珍二妃受這場大冤枉連做夢也想不到的呀雖然當時有皇上求情但終至於幽禁起來李蓮英的手段也算得厲害的了但皇上自瑾珍兩妃被幽禁後便覺冷靜寂寥百無聊賴每到無可消遣時便頓足把李蓮英恨著一天德宗方和寇連材談起瑾珍二妃的事忽見一小太監連跌帶爬地跑進來要想說出時卻回不過氣一句也說不出來德宗見了這種情形知道定有非常的事故發生不覺大驚要知後事如何且聽下回分解
