body:
  text: 第五十六回棄舊憐新宮中殺眷鶯啼獅吼床上戕妃卻說穆彰阿的門客見王鼎遺折上都是參奏穆相國的話便把那遺折捺住哄住王公子道尊大人此番逝世俺東翁十分悲傷打算入奏在皇上跟前替尊大人多多地求幾兩撫恤銀子如今這遺折倘然一遞上去一來壞了同仁的義氣二來那筆撫恤銀兩便分文無著了看官須知道道光皇帝崇尚節儉做大官的都是很窮做清官的越發窮如今王公子聽說有恤銀便把那遺折銷毀了另外改做了一本摺子說是害急病死的穆相國居然去替王鼎請了五千兩的恤金穆相國暗地裏又送了王公子一萬兩銀子王鼎一條性命便白白地送去這時到了皇太后萬壽的日了早幾天便有禮部尚書奏請籌備大典道光帝只怕多花銀錢便下旨說天子以天下養只須國泰民安便足以盡頤養之道皇太后節儉重教若于萬壽大典過事鋪張反非所以順慈聖之意萬壽之期只須大小臣工入宮行禮便足以表示孝敬之心毋得過事奢靡有違祖宗黜奢崇儉之遺訓欽此這道聖旨下去那班官員都明白皇上省錢的意思便由穆相國領頭和皇上說明不需花內帑一文所有萬壽節一切鋪張都由臣民孝敬皇帝聽了這個話自然合意便由皇上下諭立一個皇太后萬壽大典籌備處委穆彰阿做籌辦大臣那穆相國背地裏反借著這承辦萬壽的名兒到各省大小衙門裏去勒索孝敬小官員拼拼湊湊從一百兩報效起直到總督部臣報效到三十萬五十萬爲止這一場萬壽穆相國足足到手了一千萬兩銀子的好處萬壽節到了大小臣工帶了眷屬進慈甯宮拜皇太后萬壽去皇太后自己拿出銀子來辦面席女眷在宮裏賞吃面官員們在保和殿賞吃面吃過面穆相國把家裏一班女戲子獻上去在慈甯宮裏演戲演的都是瑤池宴東海宴等吉利的戲文道光帝看那班女戲子個個都是嫵媚輕盈清歌妙舞那服飾又十分鮮明笙簫又十分悅耳不禁有些心癢了他在幼年時候原也玩過韻舞到這時皇帝自己也上臺去扮了一個老萊子歌唱起來只因是皇上扮著老萊子臺上便無人敢扮老萊子的父母皇帝唱了一陣皇太后看了十分歡喜吩咐賞便有許多宮女捧著花果丟向臺上去齊聲說皇太后賞老萊子花果那皇帝在臺上也便跪下來謝賞皇帝下臺來那班親王貝勒也都高興起來他們終年在家裏沒有事做這唱戲的玩意原是他們的拿手便個個揀自己得意的戲目登臺演唱去有的扮演關雲長挂印封金的故事有的演堯舜讓位的故事一出演完又是一出臺上的做得出神台下的也看得出神在這個時候道光帝卻跑到溫柔鄉里去了原來皇上扮戲的時候穆相國便派一個領班的姑娘名叫蕊香的服侍皇上穿戴裝扮的事體講到這個蕊香的容貌在戲班子裏要算得一個頂尖兒的了那蕊香一邊侍候著皇上一邊卻放出十分迷人的手段來在皇帝跟前有意無意地賣弄風騷把個一肚子道學氣的道光皇帝引得心癢癢的深深地跌入迷魂陣兒去了直到皇上演過了戲退進台房去那蕊香也跟了進來服侍皇上脫去戲衣換上袍褂又服侍他洗過臉梳過辮子便倒了一杯香茶去獻在皇上手裏蕊香滿屋子走著那皇帝的眼珠總跟著蕊香的腳跟蕊香的一雙腳長得又瘦又小紅菱子似的一雙鞋走一步也可人意如今見她走近身來皇帝再也忍耐不住了便伸手拉著蕊香兩人並肩坐下咕咕噥噥地說起話來外面戲越做得熱鬧他倆人話越說越近說到後來皇帝實在丟不下這蕊香蕊香也願進宮去服侍皇帝皇帝便把穆相國喚進密室把意思對他說了穆彰阿滿口答應皇帝快活極了當時無可賞賜便把自己頸上挂著的一串正朝珠除下來賞給他穆彰阿忙跪下謝恩一轉身袖著朝珠出去了當時皇帝便把這蕊香接進宮去在蕊珠宮內召幸了一連六晚皇上召幸不曾換過第二人那班妃嬪不見皇上召幸個個心中狐疑後來一打聽才知道皇上另有新寵卻把她們忘了也無可奈何只得在背地裏怨恨著罷了內中只有一個蘭嬪她原長的比別的妃嬪俊些又是皇帝寵愛的她知道皇上愛上了別人不覺一股酸氣從腳後跟直沖上頂門她便花了許多銀錢買通了太監那晚皇帝吩咐擡轎的太監擡到月華宮裏去原來這時蕊香已封了妃子住在月華宮裏那擡轎的太監得了蘭嬪的好處故意走錯路把皇帝擡到鍾粹宮裏來這鍾粹宮原是蘭嬪住著的她見皇上臨幸便忙出來迎接皇帝見了蘭嬪心中明知道走錯了但是這蘭嬪也是他心愛的便也將錯就錯地住下了誰知這蘭嬪卻恃寵而驕她見了皇帝不但不肯低聲下氣反噘著一張小嘴嘮嘮叨叨地抱怨皇上不該丟了她六七天不召幸道光帝起初並不惱恨後來聽她嘮叨不休心中便有幾分氣那蘭嬪也不伺候皇上的茶水只冷冷地在一旁站著皇上到這時覺得沒趣極了只好低著頭去看帶嚴宮來的奏章從酉時直看到亥時蘭嬪也不服侍皇上睡覺這時皇上正看著一本兩廣總督奏報廣西匪亂的重要奏摺那蘭嬪在一旁守得不耐煩了便上去把這本奏摺搶在手裏皇上正要去奪時只聽得嗤嗤幾聲響那本奏摺被她扯成幾十條紙條兒丟在地下把兩腳在上面亂踏到這時皇上忍不住大怒起來一言不發一甩手走出宮去跨上轎回到西書房來依舊把蕊香召幸一面把一個姓王的值班侍衛傳來給他一柄寶刀喚一個內監領著到鍾粹宮第八號屋子裏把蘭嬪的頭割下來那姓王的聽了心中又害怕又詫異但是皇上的旨意不能違背只得捧著寶刀趕到鍾粹宮來那蘭嬪正因皇帝去了在那裏悲悲切切地哭後來聽太監傳話皇上有旨意取蘭嬪的腦袋一句話把蘭嬪嚇怔了更加嚎啕大哭起來一時鐘粹宮裏各嬪娥都被她從睡夢中驚醒過來趕到屋子裏來看她那太監一連催逼著她快梳妝起來旁邊的宮女便幫著她梳頭洗臉換上吉服扶著她叩頭謝過恩那蘭嬪的眼淚好似泉水一般地直湧著諸事舒齊了那王侍衛上來擎著佩刀喀嚓一聲向蘭嬪的粉頸上斬下去血淋淋地拿了一個人頭出宮複命去了從此以後那蕊香天天受著皇上召幸誰也不敢在背地裏說一句怨恨的話深怕因此得禍嬪妃被殺卻觸惱了皇后娘娘這位皇后原長得十分俊俏道光帝起初把她升做皇后的時候夫妻之間十分恩愛但是皇後仗著自己美貌她對待皇帝卻十分嚴峻這皇帝因愛而寵因寵而懼他見了皇后十分害怕因害怕而疏淡自從即皇帝位以後和皇后終年不常見面自己做的事體常常瞞著皇后那皇后因皇帝疏遠她常常和那班妃嬪親近心中不免有了醋意只因自己做了皇后不便因床笫之事和皇帝尋鬧但皇帝在外面一舉一動她在暗地裏卻打聽得明明白白如今聽說因寵愛一個蕊香便殺死一個宮嬪便親自出宮來見皇帝切切實實地勸諫了一番說陛下當以國事爲重不當迷於色欲誤國家大事尤不當在宮中輕啓殺戮違天地之和氣幾句話說得又正統又大方皇帝原是見了皇后害怕的當下便是是地應著再三勸著皇后回宮去但是皇帝心下實在舍不得蕊香看皇后一轉背他立刻又去把蕊香傳來陪伴著到了夜裏依舊把她召幸了一連又是三夜他兩人終不肯離開後來還是蕊香勸著皇上說陛下如此寵愛賤妾皇后不免妒恨陛下爲保全賤妾起見也須到皇后宮中去敷衍一番皇帝聽她的話這天夜裏便到皇后宮中去誰知這一去惹出禍水來了原來皇后打聽得皇帝依舊臨幸蕊香心中萬分氣憤便打主意要行些威權給皇帝看看趁勢制服皇帝這夜皇帝到皇后宮中去皇后正悶著一腔子惡氣兩人一言一語不知怎麽競爭吵起來皇后大怒不一會只見兩個宮女從床後面揪出一個美貌女子來望去好似妃嬪模樣可憐她上下都穿著單衣深身索索地發抖那一段粉頸子上鮮紅的血一縷一縷地淌下來她一邊哭著一邊爬在地下連連碰著頭皇后不住地冷笑說道好一個美人兒好一個狐媚子你哄著皇帝殺死蘭嬪再下去你便要殺死我了說著又回過頭去對皇帝說道陛下不常到俺宮中來沒有夫妻的情分我也不希罕只是陛下在外面也得放尊重點怎麽不論腥的臭的都拉來和她睡覺不論狐狸妖精都給她封了妃子這種妖精做了妃子俺做皇后的也丟臉陛下打量在外面做的事情俺不知道嗎陛下和這妖精睡覺俺都記著遭數兒在敬事房睡了四夜可有嗎在遇喜所睡過三夜可有嗎在綠蔭深處睡過四夜可有嗎在禦書房裏又睡過四次有嗎陛下和這妖精睡覺也便罷了爲什麽一定要殺死蘭嬪又爲什麽把別個妃嬪丟在腦後一個也不召幸了呢皇后越說越氣拍著床前的象牙桌兒連連罵著昏君那皇帝坐在椅子上低著頭只是不作聲兒忽然皇后傳侍衛官快把這賤貨拉出去殺了侍衛官便上去拉著那女子便走可憐這蕊香哭得和淚人兒一般拉住侍衛官的袍角只是嚷道大爺救我的命罷侍衛官揪住她的手臂橫拖豎拽地拉出了寢宮門外隨即把她殺了提頭去複命要知後事如何且聽下回分解
