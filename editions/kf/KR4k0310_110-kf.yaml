body:
  text: 第七十回寶馬香車麗華出閣長矛大纛文叔興師話說劉文叔將書看過心中大喜忙向陰識說道來意已悉目下正在需人之際如果足下肯以身許國那就好極了陰識道山野村夫全望明公指教二人謙虛了一會子李通入帳報道定陵的主將來降劉文叔忙教人將他帶進來那個降將走進大帳雙膝跪下口中說道降將胡文願隨明公麾下執鞭隨鐙共剿莽賊區區微忱萬望明公容納劉文叔急忙親自下來將他從地上扶起說道良禽擇木而棲賢臣擇主而事將軍能明大義漢家之幸也胡文見劉文叔一表非凡自是暗喜劉文叔帶了衆將領兵進城安民已畢即大排筵席犒賞三軍席上李通對鄧辰說道鄧辰你可認識那個姓陰的鄧辰道不認得李能道我看文叔和他非常親密不知是何道理鄧辰道大約是他的舊友罷了到了天晚鄧辰私自對文叔道今天來的這個姓陰的是你的朋友麽劉文叔忙道你來了正好我有一件心事剛要去和你商議鄧辰道什麽事劉文叔含羞咽住鄧辰不禁詫異起來忙道這不是奇怪麽話還未講倒先怕羞起來這兩句話說得文叔更是滿面通紅開口不得鄧辰道自家親戚有什麽話儘管說不要學那些兒女之態才是英雄的本色哩劉文叔道原是自家的親戚才喊你來商議的鄧辰道不要指東畫西的了請你直接說罷劉文叔便將陰麗華的情形大略揀有面子的話說了一遍意思想請鄧辰作伐和陰識求親鄧辰聽他說過這番話之後哈哈大笑道我道是什麽事呢原來如此怪不得你和他十分親近既然這樣那就妙極了我豈有不盡力的道理你放心多在三天包管你洞房花燭但是我是個男媒再請個女媒才像個事體文叔道你不要忙先向陰識去探探口氣再說鄧辰把胸脯拍得震天價地說道這事無須你過慮我敢包辦如其不成功算不了我的本事了劉文叔道姐丈玩話少說你去和陰識談談看鄧辰道那個自然但是我一個人去未免太輕忽人家最好請李將軍和我一同去方像個正經劉文叔未曾置個可否鄧辰笑道躊躇什麽難道李通不是你的妹丈麽劉文叔道並不是這樣講的我想李通的人粗率出言不雅故爾沈思鄧辰道你又呆了他和我去預先關照他不准他開口直做個樣子什麽話全讓我來講豈不是好麽劉文叔大喜道如果成功定然辦酒謝媒鄧辰笑道媒酒那還怕你不預備麽不過我這個人從來沒有給人家做過一回媒人你可要聽明劉文叔笑道天下的事只要有了個謝字還不好麽休再嚕嗦了快些去罷鄧辰笑著出來一徑到李通的家裏但見李通正在裏面與劉伯姬暢談一把寶劍的來歷見他到了二人忙起身相迎鄧辰進了客室便向李通笑道我們剛剛吃過了慶功筵馬上又有喜酒吃了李通詫異問道你這是什麽話鄧辰坐了下來將以上的事一五一十地說個究竟李通拍手道怪不得他與那個姓陰的非常親近啊原來還有這樣事呢真是可喜可賀劉伯姬忙問道敢是我們前村的楊花塢的陰麗華麽鄧辰道你怎麽知道的不是她還有誰呢她笑道怪道我在家的時候常聽他說在宦當作執金吾娶妻必取陰麗華這兩句差不多是他的口頭禪一天不知說了幾遍料想這陰麗華一定是個才貌雙全的女子如不然他不能這樣的記念著她的鄧辰笑道管她好的醜的目下都不能知道我們且去替他將媒做好再說到訂婚之後自然就曉得了李通笑道可不是哩我們就去給他說罷鄧辰笑道這事用不著你著急可是有兩句話我要先向你聲明李通道你說你說鄧辰道你和我去你不准開口才和你去呢李通笑道這不是奇談麽難道我講話就犯了法了麽鄧辰笑道你不要誤會因爲你沒有媒才所以用不著你開口李通笑道什麽叫做媒才我倒來請教鄧辰笑道啊做媒這件事看起來一點也沒有什麽稀奇一有稀奇任你舌長八丈口似懸河那是沒有用的李通道我只當是什麽難事呢原來這點玩意兒我曉得了今天去我就揀好話就是了鄧辰搖手道話有幾等說法萬一說得不對憑你說的什麽好話也要壞事的李通道照你這樣說我竟不配說話了鄧辰笑道你又來了誰說你不配說話的不過今天的話不比尋常的話一句也不能亂說的劉伯姬笑道他既不要你開口你就不開口少煩了神吃現成的喜酒做現成的媒人可不是再好沒有呢李通大笑道就這樣的辦我今天跟他去只裝個啞子一聲也不響好麽鄧辰道好極了我們就去罷說著和李通出得門來一路上千叮嚀萬囑咐教他到那裏不要開口亂說李通道你放心罷我決不開口的一會子到了陰識住的所在敲門進去只見陰識秉燭觀書見二人進來忙起身讓坐二人坐下陰識問道二位尊姓鄧辰便說了名姓李通坐在那裏和大木頭神一樣一聲不響陰識忙走過來向李通深深一揖口中說道少請教尊姓台甫李通忙站起來回了一揖便又坐下仍然一聲不響鄧辰心中暗暗著急暗道這個傻瓜真是氣煞人呢教他不開口認真就閉口不響了忙用手向他一搗意思教他將他名姓說出來誰知李通見他一搗越覺不敢開口真個和六月裏的蛤蜊一樣緊緊地努著嘴雙眼管著鼻子不敢亂視鄧辰卻被他急得無法只得站起來替他通了一回名字陰識問道二位深夜下顧必有見教鄧辰忙答道豈敢特有一要事相求陰識忙問道有何貴幹請即言明罷鄧辰便道劉將軍文叔與敝人忝屬葭莩他的才幹諒足下已經深知無須小子贅言了陰識忙道劉將軍英武出衆拔類的奇才鄧辰繼續道他的年齡已過弱冠不過中饋無人但是他的眼界高闊輕易不肯就範聞足下令妹才德兼優頗有相攀之念故敝人等不揣冒昧來做一回月老不知足下還肯俯允否陰識聽了滿口答應道鄧兄哪里話來惜恐舍妹蒲柳之姿不能攀龍附鳳既蒙劉將軍不棄寒微閣下又殷殷下顧何敢抗命呢鄧辰見他已答應不禁滿心歡喜道承蒙不棄不獨舍親之幸便是小弟也好討杯媒酒吃了陰識大笑道鄧兄哪里話來等到吉日小弟當恭備喜酒相請就是了鄧辰也不便多講與李通告辭出來先到李通家中李通才開口說道好了好了今天的媒人也做穩了喜酒也吃定了劉伯姬忙問究竟鄧辰笑得打跌道罷了罷了像這樣的媒人我真是頭一朝兒看見的劉伯姬笑問道難道又弄出笑話來了麽鄧辰便將陰識請教名字的一事說了一遍把個劉伯姬只笑得花枝招展李通瞪起眼睛說道咦不是你們教我不要開口的嗎我當然不開口了任他問我什麽我沒有破戒還不好麽劉伯姬笑道果然不錯應當這樣的她說著又向鄧辰問道媒事如何鄧辰道成功了劉伯姬只是十分喜悅鄧辰便告辭徑到劉秀的住處劉文叔正在那裏盼望他回話瞥見他進來忙問道姐丈所托之事如何鄧辰笑道成功是成功了但是你拿什麽謝謝大媒人呢劉文叔聽得成功不禁滿心歡喜沒口地答應道有有有鄧辰笑道只管有有有究竟拿什麽來謝我呢劉文叔道要什麽有什麽還不好嗎鄧辰笑道別的我不要只將好酒多辦些供我吃一頓就是了劉文叔道容易容易遵辦就是了鄧辰收了笑容正色對他說道三弟難得人家答應在我的拙見趁現在沒有事的當兒不如早成好事倒了卻一層手續你看如何文叔沈吟了一會子然後向他說道事非不好不知對方能否答應倒是一個問題鄧辰道這倒用不著你躊躇還是我和陰識商議不難答應的鄧辰忙又到陰識這裏只見陰識尚未睡覺鄧辰忙對他道陰兄小弟又來吵攪你陰識忙起身讓坐笑問道現在下顧還有什麽見教麽鄧辰說道忝在知己無庸客氣了我剛才回去對舍弟親說過舍親自然是喜不自勝他對小弟曾有兩句話所以小弟再來麻煩的陰識道願聞願聞鄧辰道男婚女嫁原是一件大事但是舍親現在以身報國當然沒有什麽閒暇的時候可巧這兩天將定陵得了暫息兵戎在他的意思欲在這幾天擇個吉日將這層手續了去省得後來麻煩陰識滿口答應道好極了明天兄弟回去就和家母預備吉日大約就在這月裏罷鄧辰道依我看就是九月十六罷陰識道好極好極鄧辰道還有幾句話要和閣下商議就是妝奩等類千萬不要過事鋪張徒將有用的錢財使於無用之地最好就簡單一些爲好舍親文叔他也是個不尚浮華的人陰識道閣下的見解真是體貼人情已極兄弟無不遵辦就是了鄧辰便站立起來笑道吵鬧吵鬧陰識便送他出來鄧辰到了劉文叔這裏將剛才的話說了一遍劉文叔真個是喜從天降鄧辰笑道自古道媒人十八吃新人才吉席我做這個媒連一嘴還未吃到就將這頭親事做好了豈不是便宜你們兩家了嗎劉文叔道那個我總有數請你放心就是了到了吉日我預備十八個席面盡你吃如何鄧辰笑道那是玩話我當真就是這樣的一個老饕嗎劉文叔道我要不是這樣辦惹得你又要說我小氣了鄧辰笑道就這樣辦二人又說笑了一會子不覺已交四鼓鄧辰便告辭回去安息了一宵無話到了第二天早上陰識便到劉文叔這裏來告辭臨行的時候向文叔問道你幾時到捨下去文叔道我到十五過去陰識喜洋洋地走了在路數日不覺到九月初九早上已經到了楊花塢早有家丁進去報與陰興陰興心中好生疑惑暗道難道劉文叔不肯錄用他麽如其錄用現在回來做什麽呢他正自疑惑陰識已經走了進來陰興問道大哥什麽緣故去了幾天就回來呢陰識便將劉文叔和妹子訂婚一節告訴陰興陰興自然歡喜陰識忙問道太太呢陰興道現在後園牡丹亭裏飲酒賞菊呢陰識笑道她老人家的興致很爲不淺咧他兩個正自談話雪兒早已聽得清清楚楚飛也似地跑到後園裏只見麗華坐在一旁朝著菊花只是發呆出神邢老安人倒了一杯酒在她面前說道我的兒來吃一杯暖酒吧她正自想得出神竟一些沒有聽見邢老安人又用箸夾了一隻大蟹送到她的面前說道乖乖這蟹是南湖買來的最有味的你吃一隻看她才回過頭來對邢老安人說道謝謝母親孩兒因爲病後一切葷冷都不大敢亂吃蟹性大涼不吃也好老安人笑道還是我兒仔細我竟忘了這時雪兒跑得一佛出世二佛涅槃喘吁吁地進來向邢老安人笑道恭喜小姐她說了兩句便張口喘個不住邢老安人瞥見她凶神似地跑進來倒嚇著一跳後來聽了她說恭喜兩字不禁詫異問道癡丫頭什麽事這樣冒失鬼似的麗華也介面問道什麽事雪兒又停了半天才將陰識回來的話一五一十說個究竟邢老安人放下酒杯問道真的麽雪兒笑道誰敢在太太面前撒謊呢邢老安人真個喜得心花大放忙用眼去瞧麗華正想說出什麽話來只見她低垂粉頸梨面堆霞嬌羞不勝老安人笑道我早就說過了我們這小姐一定要配個貴人今日果然應了我的話了我的兒你的福氣真不淺咧麗華雖然不勝羞愧但是那一顆芳心早已如願十分滿意了這時邢老安人正要去請陰識陰識已經進園來了到了亭子裏先向邢老安人請了安然後將文叔求親的事情說個究竟邢老安人笑道我養的女兒難道隨你們作主嗎陰識只當她的母親認真的忙道母親這事不要怪我在我的意見將妹子配了劉家豈不是再好沒有麽憑他家的世胄難道配不上我家麽不是孩兒說一句錯過劉文叔再去訂一個老實說不獨妹妹不答應再像劉文叔這樣子恐怕沒有了邢老安人忙笑道我兒爲娘方才那是句玩話難道你就認真了麽陰識也笑道我明知母親和我打趣我也和母親打趣的麗華早就羞得回樓去了當下陰識對邢老安人商議道看看吉期已近我今天就要著手預備了邢老安人道可不是妝奩傢夥一樣沒有趕快要著人去辦才好呢陰識笑道不需不需邢老安人道這倒奇怪怎的連嫁妝都不要呢陰識便將緣由說了一遍邢老安人道原來這樣那倒省得多麻煩了陰識道別的倒不要預備但是此番來道賀的人一定不在少數呢將前面的三座大廳一齊收拾起來預備酒席兩邊的廂房也要收拾清淨預備把他們歇宿邢老安人也是無可無不可的陰識便和陰興兄弟兩個手忙腳亂一直忙了三四天到了十五早上各式停妥專等劉文叔到來一直等到未牌的時候陰識心中好不焦急暗道文叔難道今天沒空來麽我想決不會的他正在猜測的當兒猛地見一個家丁進來報道大姑父到了陰識急忙起身出門去迎接陰興也吩咐家丁預備招待自己也隨後出來只見劉文叔高車駿馬遠遠而來一刻兒到了村口陰興便吩咐家丁放起爆竹一霎時劈劈拍拍放得震天價響一班音樂也同時奏起劉文叔在前面走後面跟著李通王常還有一隊兵陰識忙迎上去與三人握手寒喧向文叔問道鄧兄今天沒有下臨嗎文叔答道因爲定陵城初下我到此地不能不留一個人在那裏彈壓陰識點頭道那是自然說著又與李通王常見了禮大家握手進村到了門口各自下馬入內陰識一面招待李通王常一面引著劉文叔拜見他的母親到了第二天遠近聽說文叔結婚誰也要敬一份賀禮真是個車水馬龍賀客盈門十分熱鬧到了晚上合巹交杯同入羅帳自有一番敍別之情不必細說讀者們誰不是過來人呢良宵易過永晝偏長曾幾何時又是雞聲喔喔日出東方了麗華忙起身梳洗劉文叔也就起身梳洗二人梳洗停當攜手去參拜邢老安人把個邢老安人樂得心花怒放試想這一對璧人怎能不歡喜呢陰識忙又到大廳上擺酒招待衆人大家還未入席瞥見有個家丁進來報道外邊有個背著青包袱的人口中說道是奉著聖旨前來有事的陰識忙起身迎接那人進了大廳往中間直挺挺站著口中喊道劉文叔前來接旨文叔在後面早已有人報知與他聽說這話忙命人擺下了香案自己往下一跪三拜九叩首已畢那個官長口中喊道破虜大將軍劉文叔聖旨下劉文叔伏地奏道微臣聽旨那個背旨官又喊道破虜大將軍武信侯劉文叔因其破虜有功勞績卓著特升授司隸校尉行大司馬事克日即行往定河北欽此文叔聽罷三呼萬歲舞蹈謝恩陰識忙設席招待那個背旨的官員也不赴筵就匆匆地走了劉文叔忙向邢老安人辭行又與麗華握別新婚乍離總不免英雄氣短兒女情長這正是昨夜帳中春意滿今朝塞外曉風寒要知後事如何且看下回分解
