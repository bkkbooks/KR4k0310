body:
  text: 第三十七回破腹挖腦和尚造孽褰簾入幃親王銷魂卻說呂四娘悄悄地離開了朱家別的人且不去說他便是那朱蓉鏡第一個要想煞他不見了呂四娘終日裏廢寢忘食如醉如狂他父親看了不忍料定呂四娘此去一定北京報仇去便和虯髯公說知求他到北京去找尋那蓉鏡哭著嚷著要一塊兒去恰巧虯髯公家裏有一個女徒弟名叫魚娘的也要到北京去三個人便一路行沿路打聽四娘的消息只聽得一路人沸沸揚揚說有一個女賣解的臉兒又長得俊本領又高強虯髯公聽在耳中料定是四娘待到京裏卻又聽不得消息虯髯公料定四娘要做大事在冷僻地方隱藏起來了他先找一家客店住下推說是爺兒三人每天夜靜更深虯髯公帶了魚娘便跳上屋子出去找尋四娘如今居然被他們找到了一同回到客店裏虯髯公先介紹四娘見過魚娘四娘見魚娘面貌和自己不相上下便十分親熱起來問魚娘進京來幹什麽事魚娘便把父親魚殼如何給於清瑞捉去殺死如今進京來是要替父報仇兩人走了一條道路越發親熱起來只有那朱蓉鏡見了四娘好似小孩子見了乳母似的一把拉住她袖子不放又再三勸四娘莫去冒險徒然送了自己性命那四娘如何肯聽但是回心一想蓉鏡待她的一番恩情恐怕世間找不出第二個男子了我此番倘能成了大事女孩子終是要嫁人的到那時不嫁給他卻又嫁給誰去她想到這裏心中有了主意四娘在江湖上閱曆了一番那女孩兒嬌怯怯的態度都已收去便老老實實地對蓉鏡說道我這個身體總是你的了但是現在我還要向你借我自己的身體一用待我報了大仇以後任憑你叫我怎樣便怎樣現在卻萬萬不能遵命這幾句話說得蓉鏡心中又憂又喜卻也說不出什麽話來從此由虯髯公做主在西便門外租了一間屋子住著假裝是兒媳姑娘一家人卻也沒有人去疑心他們他們便天天出去打聽皇帝的蹤迹那雍正皇帝得了偵探的報告知道京城裏現在到了許多刺客在暗地計算他便也著著防備處處留神一面秘密吩咐步軍衙門嚴密查拿這時快到了祭天的日子欽太監便擇定吉時請皇上祭天雍正皇帝因外面風兒很緊怕得出去回心又想倘然老躲在宮裏一來給那班刺客見笑二來那百姓見皇帝不出宮來便要謠言蜂起因此硬一硬頭皮傳旨擺駕祭天一面調集宮中侍衛護駕出宮那街道上自有那步軍統領九門提督帶領全部人馬沿途照料那軍士位掮著雪亮的刀槍一路上站得水泄不通沿路搭著五色漫天帳直到天壇面前停了一會那一對一對鑾儀到了壇上滿朝文武大員一字兒在兩旁站著班雍正皇帝從鑾輿中下來侍衛們簇擁著走上壇去上面設著祭品雍正皇帝行過禮正要轉身忽聽得那天幔上豁一聲響皇帝急把手指一彈只見一道白光向天幔上飛去落下一個狐狸頭來皇帝才覺放心那左右侍衛齊呼萬歲這時鄂爾泰站在皇帝身後皇帝笑著對鄂爾泰說道朕聽說有一班亡命之徒欲謀刺朕京城裏面刺客很多朕今天小試手段叫他們知道朕的本領也不弱他們也不用來自投羅網了說著冷笑一聲把個鄂爾泰嚇得諾諾連聲不敢多說一句話雍正皇帝回到宮裏心中總是鬱鬱不樂想起從前在少林寺學本領的時候有一個鐵布衫和尚本領在同輩中要算第一他也能指頭放劍如今把他留在外面終不是好事體也許爲仇家所指使來謀刺朕躬這卻不可不防當時便把鄂爾泰傳進宮來和他商量鄂爾泰說道臣聞得這和尚在江南橫行不法便沒有仇家指使也須趕快去殺死他爲人民除去大害雍正皇帝說道從前那些好漢如今都不在了且叫什麽人去幹這件事鄂爾泰思索了一會忽然想起當年岳鍾琪將軍曾說起有一個大岩和尚如今在揚州天寧寺不如下一道密劄給江蘇撫台便請大岩去除了鐵布衫和尚當下便把這意思奏明皇上稱善鄂爾泰退出宮來如法炮製去說話這鐵布衫和尚在四川峨嵋山亡霸佔一座大寺院派他手下的徒弟下山去偷人頭他每天要吃三個人腦子峨嵋山下一班男女常常在半夜裏失去他的腦袋弄得人人驚慌個個害怕大家逃避村坊都空了後來這和尚忽然異想天開愛吃孕婦肚子裏的小孩又派他的徒弟在深夜裏闖進人家的內室見有懷孕的女人先姦污了再取她的胎兒那班徒弟個個都淫惡萬分誰敢去攔阻他這時白泰官閑住在家裏他聽說四川峨嵋山的景致好玩便動身到四川來遊玩偶然到一座村坊裏時已更深他們走江湖的人愛走夜路他走過一座屋檐前只見裏面窗紙上射出淡淡的燈光來忽見一個人影兒一閃卻是一個光頭白泰官心中疑惑這和尚深夜入人家非奸即盜他便站腳聽時只聽得裏面有女人低低的求哭的聲音說道師父饒了我罷我痛死了白泰官心下越發動了疑便施展他的手段輕輕地撬開了外屋子的門踅進內室去一看只見一個年輕女子被剝得一絲不挂躺在床亡喉嚨裏呻吟著一個和尚爬在床沿下兩手不住地在那裏拓那女人的肚子白泰官看了有禁大怒一聳身搶上前去一把揪住和尚的衣領提下地來一摔那和尚站腳不住倒下地去白泰官便提著缽兒似的拳頭向那和尚面門上不住地打去那和尚滿臉地淌著血嘴裏不住地討著饒那時便有許多人走進房來一面把白泰官勸住一面喝問那和尚那和尚說道這原不幹我的事是俺師父硬逼著我來取這娘娘的胎兒白泰官問你師你是什麽人那和尚說鐵布衫和尚白泰官在江湖亡了聽得鐵布衫的名氣便說好一個淫和尚徒我見見他去說時天色已明這人家拿出餑餑稀飯來請白泰官吃白泰官肚子吃飽了押著這和尚叫了一個鄉下人領路走到日落才走到峨嵋山腳下見前面也有一個和尚坐在大樹下納涼白泰官認是他們一路的喝一聲賊禿休走搶步上前便交起手來打了二十回合兩人手腳愈打愈緊打到緊要關頭那和尚忽然跳出圈子問道你敢是鐵布衫和尚的門徒白泰官說俺是來捉拿這賊禿的你敢是這賊禿的徒弟這大岩和尚也說俺是來捉拿鐵布衫和尚的白泰官心想打來打去原來打的是自家人忙問道好漢奉誰的命來的那和尚把胸脯一拍大拇指一伸說道俺奉江蘇撫台大人之命敢問好漢奉誰的命白泰官便把在村坊裏遇到這和尚拓取胎兒的事一一說了大岩和尚氣憤起來罵道烏賊禿你敗俺佛門的規矩說著颼的一聲拔出腰刀來結果了這個和尚的性命轉過身去向樹林裏一招手便跳出十五六個大漢來大岩和尚帶著他們走上山去看看到了山門口大岩和尚便和白泰官商量分兩路殺進去白泰官把上風他一聳身跳上瓦去這裏大岩和尚先把衆人藏過自己一人先上去打開山門問鐵布衫和尚那守山門的見是和尚便也不疑心領著他走進內院去留他在知客室暫坐自己進去通報這裏大岩和尚招招手兒一班大漢都跟了進來大岩和尚悄悄地跟在那和尚身後曲曲折折走過幾個院子到了一個所在庭心裏放著一張竹榻一個胖大和尚上身赤膊赤著腳躺在竹榻上一個女人滿臉抹著指粉坐在和尚的身後在那裏替和尚搔背和尚伸手到背後去撫著那女人的脖子另一個女人正送過一碗涼茶去見把門的和尚進來了她便站住通報道師父有人來了那胖大和尚聽了忙坐起來看時只見那把門和尚的身後也跟著一個和尚便指著問道他是什麽人大岩和尚給他一個措手不及搶步上前擒住他一條腿這鐵布衫和尚到底是本領高強忙拿出看家的本領來飛過鴛鴦腿去大岩和尚見擒住他的左腿他又把右腿飛過來知是少林派的內家功忙放了手鐵布衫和尚在地上站住伸手在竹榻上拿起一件布衫來打過去說也奇怪這件布衫拿在他手裏迎著風要來打去好似一杆鐵棒一般因此外人取他的綽號鐵布衫這時門外候著的許多大漢一擁進來個個拿出兵器來圍住了這和尚攻打那和尚指東打東指西打西打了半天休想近得他的身但是這和尚被他們團團圍住了一時裏也不得脫身他正想聳身上屋時只聽得屋檐上一聲大吼跳下一個人來一刀劈在鐵布衫和尚的頂門上那個腦袋頓時好似西瓜對破開直劈到脖子上和尚死了那村坊上人聽說和尚死了個個快意大家把和尚和屍首割成幾十塊拿回家去熬油點燈白泰官見打了抱不平也不和大岩和尚招呼一聳身上屋去了四川總督岳鍾琪忙把大岩和尚接進衙門去在精室裏供養起來不多幾天北京密旨到來賞大岩和尚白銀一萬兩岳大將軍又派了材官護送他回南方下幾下道劄子給沿途的地方官叫他們舟車迎送隨地照料大岩和尚回到揚州便大興土木造倉聖殿殿旁造一座吳園園裏建一座華嚴堂那些工程材料都是地方上各紳董捐助的大岩和尚天天在華嚴堂裏會客吃酒這時揚州地方有三個地痞仗著自己力大專一敲詐百姓一個是魏五善騎馬又能懂得馬的話幾年前有個狼山總兵到揚州來閱兵那營裏的馬忽然齊聲嘶叫起來魏五聽得了對人說道這個總兵官三個月後要死了後來那總兵官回去果然隔了三個月死去一個是張飲源善舞雙刀舞成一團任他幾十個人近不得他身一個是薛三能夠拉五十石的硬弓這時揚州人稱他們魏馬張刀薛硬弓自從大岩和尚來了以後這三個人不服氣常常到天寧寺去尋事都被大岩和尚打敗出來這三個人沒有面目住在揚州便悄悄避到別的地方去了有一天大岩和尚正從方丈室裏送客出來才走到階下忽然見一個鐵香爐劈空飛來大岩眼快忙伸手接住看時原來是薛三來報仇的誰知那薛三因用力過分嘴裏嘔出一口血來踉踉蹌蹌地逃回家去連嘔了幾口血便死了接著那張三拿著雙刀到華嚴堂去找大岩和尚兩人交起手來被大岩斬去了一條臂膀剩下的一個魏五他知道明攻不能得勝打聽得大岩尚身上長癬疥的每天起身用熱水洗澡魏五便邀了七八個同黨趁大岩在浴池裏洗澡的進候打門進去個個拿出兵器來攻打大岩和尚赤手空拳又是渾身赤條條的如何敵得住雖也打死了兩個人後來到底被魏五斬去一條腿死在浴池裏大岩和尚死的消息報到京裏雍正皇帝十分可惜但他想這種有本領的人留在世上終是心腹之患如今那班好漢都收拾完了剩下幾個沒本領的人也不去怕他從此雍正皇帝依舊是尋歡作樂不去防備了呂四娘住在京城裏天天出去打探找不到下手的機會心中十分焦躁朱蓉鏡和虯髯公勸她耐心等待這時滿京城沸沸揚傳說寶親王要大婚了這寶親王是什麽人便是鈕鈷祿皇后從陳世倌家裏換來的兒子取名弘曆只因他出落得一表人材性情溫和語言伶利在他弟兄輩中有誰趕得上他那種清秀白淨雍正皇帝又因他是皇后的嫡子便也格外歡喜他這時打聽得湖北將軍常明有一個女兒出落得端莊美麗那常明的夫人郭爾額氏和皇后鈕鑽祿氏是幼時的鄰居十分要好後來郭爾額氏嫁了丈夫生了一個女兒她母女兩人常常被皇后宣召進宮去遊玩那皇后也很愛她女兒時時賞賜首飾手帕許多東西後來常明帶了家眷到湖北做將軍去皇后也常常記念他們有時和皇上提起皇上說你既愛他家的女兒俺們何妨指婚給弘曆做了你的媳婦豈不可以常常見面一句話提醒了鈕鈷祿氏看看寶親王也到了大婚之年便催著皇帝下聖旨指婚湖北將軍常明的女兒富察氏爲福晉一面把常明內調進京做軍機大臣一面派親信大臣鄂爾泰和史貽直兩人做大媒到常明家裏去行聘到了吉期雍正皇帝便把從前聖祖賞他的圓明園轉賞給了寶親王做他們新夫婦的洞房這一天滿園燈彩笙蕭聒耳把富察氏迎進園來交拜成禮寶親王見富察氏長得嫵媚秀美便一刻也不捨得離開她皇后鈕鈷祿氏見了這一對佳兒佳婦心中也十分快樂誰知天底下的事體大都樂極生悲雍正皇帝自從寶親王大婚以後身體便覺不快這也是他平日好色太過積下的病根他每日非有兩個妃子輪流侍寢不可起初還仗著喇嘛的阿蘇肌丸勉強支援後來漸漸有點不濟了那班妃嬪爲固寵起見還夜夜纏著皇上後來看皇帝實在動不得了皇后鈕鈷祿氏便把那班妃子趕開親自守著皇上侍奉湯藥禦醫輪流住在宮裏診脈處方看看皇帝病勢略略清健好轉忽然宮裏一班太監們吵嚷起來說在長春宮鍾粹宮一帶常常聽得有人在瓦上走動的聲間又有門窗開閹的聲音接著那翊坤宮永和宮一帶的太監侍衛們也吵嚷起來說每夜見屋頂上有兩道白光飛來飛去又有咸安宮的宮女被人殺死在廊下頓時把一座皇宮鬧得人心惶亂雞犬不寧皇后也曾派侍衛們四處搜尋又是毫無蹤迹後來愈鬧愈厲害了所有延禧宮承乾宮景陽宮景仁宮咸福宮永壽宮啓祥宮儲秀宮的一班宮女太監們每當夜靜更深的時候就驚擾起來不是說見屋上有人行走便是說屋內有白光來去雍正皇帝害病在床聽了這種消息知道必緣故只是不便說出這時史貽直當勇健統領是皇上最親信的那勇健軍又是由各省將軍舉薦奇才異能的好漢編練成的一共有四千人員如今宮廷不安雍正皇帝便把史貽直傳進宮來吩咐他帶領全隊勇健軍在宮中值宿這宮廷裏面憑空裏添了四千個人馬便覺得安靜起來白光不見了響動也沒有了那雍正皇帝的病體也一天一天有起色了後來皇后直待皇帝起了床行動如常才回宮去雍正皇帝一病幾個月在病勢沈重的時候寶親王帶了他的福晉也天天進宮來問候如今皇帝病好了就想起他一雙小夫妻來便推說養病自己也搬進圓明園去住著那班得寵的妃嬪也進園去伺候富察氏面貌又長得俊又能孝順公公雍正皇帝十分歡喜已暗暗地把寶親王的名字寫在遺詔上了講到那座圓明園周圍有四十裏路大小園裏有極大的池沼有茂密的森林有小山有高塔有四時常生的花草有終年不敗的風景寶親王和富察氏兩人終日遊玩也遊玩不盡起初他夫妻兩人新婚燕爾似漆如膠專揀湖山幽靜花草深密的地方調笑作樂便是那班伺候他的宮女太監們他也嫌他們站在跟前礙眼攆他們出去後來他兩人也玩夠了便覺得枯寂起來雖一般也有妃嬪侍女如何趕得上富察氏的姿色一個也不在寶親王眼裏寶親王心中常常想如此名園不可無美人作伴俺那福晉也可算得美的了但她一個人枯寂無伴也覺無味從此他存心要去尋訪一個美人來給富察氏作伴幾個乖巧的太監看出親王的心事便悄悄地引導他出園去闖私娃子那南池子一帶有盡多的私娟寶親王嘗著了這個味兒如何肯舍天天推說在涵德書屋讀書卻天天在私門子裏和窯姐兒溫被頭但他玩私娃子只能在白天因爲父皇住在園中要早晚請安去那班窯姐兒竟有幾個長得俊的寶親王要把她們娶進園去她們都不肯只偶爾帶一兩姑娘進園去遊玩在安樂窩裏吃酒行樂只瞞著富察氏和父皇兩個人什麽風流事都幹出來有一天寶親王從安樂窩裏出來時候尚早他已有三分酒意悄悄地走進富察氏臥房去院子裏靜悄悄的兩個侍女在房外打盹寶親王也不去喚醒她踅進房裏只見羅帳低垂寶親王認是富察氏一個人午睡未醒心想去賞識美人兒的睡態便躡著靴腳兒掩近床前去再一看只見四隻繡花幫兒的高底鞋子伸出在羅帳外面寶親王知道是有兩個女人睡著他心中十分詫異走上前去輕輕把帳門兒揭開一看一個是他的福晉福察氏另一個卻不認識是誰家的眷屬只見她兩人互摟著腰兒臉貼著臉沈沈地睡著再看那女人時不覺把寶親王的魂靈兒吸出了腔子飄飄蕩蕩的不知怎麽是好原來那女人長得真俊呢鵝蛋式的臉兒長著兩道彎彎的眉兒豐潤的鼻子兩麵粉腮上兩點酒渦兒露出滿臉笑容來那一點朱唇血也似地紅潤最動人的是那一段白玉似的脖子上襯著一片烏雲似的鬢角鬢邊插一朵大紅的菊花真是嬌滴滴越顯紅白她春蔥也似的纖手松松地捏著一方粉紅手帕寶親王看夠多時不覺情不自持輕輕地伸手把那方手帕從那女人手中抽出送在鼻子邊一嗅奇香撲鼻寶親王不覺心中一蕩他一面把那手帕揣在自己懷裏一面湊近鼻子去在那段粉也似的脖子上輕輕一嗅急閃身在床背後躲著那女人被寶親王這一嗅驚醒過來低低地喚了一聲妹妹那富察氏也被她喚醒了便笑說道怎麽俺兩人說著話兒便睡熟了呢那女人說道妹妹屋裏敢有野貓來著我正好睡著只覺得一隻貓兒跳上床來在俺脖子上嗅著待俺驚醒過來那野貓已跳下床去了這幾聲說話真是隔葉黃鸝嬌脆動人寶親王聽了忍不住了忙從床背後跳出來說笑道對不起那野貓便是俺說著連連地向那女人作下揖去慌得那女人還禮不叠寶親王轉過臉來對富察氏說道那時俺把這位太太錯認裏你正要湊近耳邊去喚你起來細細一看才認出來一時自己臊了便急急躲到床後去誰知這位太太說話也厲害竟罵俺是野貓俺原也是該罵的只是俺很佩服老天爺你也算是俊的了怎麽又生出這位太太來比你長得還俊這位太太敢不是人竟是天仙嗎看官從來天下的女人一般的性情是你若當面贊她長得俊她沒有不歡喜的這時這女人被寶親王捧上天去她心中如何不樂只見她羞得粉腮兒十分紅潤低著脖子坐在床沿上只是兩手兒弄著那圍巾的排須說不出話來富察氏聽了寶親王的話把小嘴兒一噘笑說道你看俺這位王爺真是不曾見過世面的饞嘴貓兒怪不得俺嫂子罵你是野貓你可在放尊重些這位便是俺的嫂子俺姑嫂倆在家裏過得很好的如今把我弄進園來生生地把俺倆分散了如今嫂子在家裏想得我苦悄悄地瞧我來又吃你撞來你既說她是天仙快過去拜見天仙拜過了快出去那寶親王巴不得富察氏一句話忙搶上前去行禮嘴裏也喚嫂子又問嫂子貴姓那女人站起身來一手摸著鬢笑吟吟地說道俺母家姓董額氏俺丈夫名傅恒寶親王拍著手笑說道俺這傅恒哥哥幾世修到嫂子這樣天仙似的美人兒一句話說得董額氏粉腮兒上又紅暈起來富察氏見嫂子害羞忙把寶親王推出房去這裏董額氏也告辭出園去了寶親王自從見了董額氏以後時時把她的名兒提在嘴裏他從此私娃子也不玩了終日癡癡地想著董額氏那副美麗的容貌要知寶親王將來和董額氏鬧出什麽風流案件來且聽下回分解
