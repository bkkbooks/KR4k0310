body:
  text: 第四十六回涿州府皇孫出現同樂園宦女失身卻說乾隆帝回鑾禦舟停泊涿州地方自有一班地方官上船去叩請聖安官員退出以後皇帝便把鄉間的父老傳上船來親自問他民情風俗和稻麥的收成正問話時忽見一個老年和尚攙著一個六七歲的男孩兒上船來跪在當地不住地磕頭這時禦舟上的人看了都十分詫異乾隆帝打發總管太監下去盤問那老和尚說貧僧名叫圓真當年和四皇子多羅履端郡王永城十分要好郡王在日常常蒙召進府去談經說道如今郡王死了老僧便出京來在這涿州地方聖明寺裏做主持這個孩子便是當年郡王的親生子當今皇上的嫡親孫兒只因家庭大變流落在外面一向是老僧收養著現在聽說聖駕過此老僧想貴子龍孫不可抛棄在外邊特把他帶來送還皇上一來叫這孩子回京去安享富貴二來也不負了當年和郡王的一番交情這件事來得離奇突兀那總管太監聽說是皇孫便也不敢怠慢急忙奏明皇上乾隆帝聽了也覺得十分詫異吩咐把小孩傳進艙去皇帝看那小孩生得方臉大耳舉動從容談吐洪亮一時也看不出他的真假來便傳旨把那和尚和小孩一起帶進京去審問到了京裏乾隆帝把這案件交給和珅和珅回府去先把那小孩傳進來問時那小孩朗朗地說道俺從小便養在圓真和尚廟裏認圓真是俺的父親後來俺到五歲上懂得事了圓真和尚便說俺是多羅履端郡王的兒子只因是側福晉生的那大福晉時時想弄死俺才將俺偷偷地救出來養在廟中俺聽了和尚的話知道自己是當今的皇孫便時時對和尚說要進京見皇祖父去如今既蒙皇祖父把俺帶進京來便請貴大臣替俺奏明皇上快快放俺回家去和珅聽了他的說話看了他的神情一時也猜不出是真是假暫把他留在府裏又傳那和尚來審問那圓真和尚供說郡王在日和老僧十分知己常常把老僧傳進府去談道參禪下棋吃酒又把內室的事件告訴老僧原來郡王有兩位福晉一位正福晉一位側福晉那正福晉是豐貝勒的閨女面貌美麗性情十分潑辣側福晉原是小家碧玉常常被正福晉虐待郡王有時勸說幾句連郡王也被辱駡因此郡王十分生氣常常對老僧說起老僧勸郡王閨房裏面總以忍耐爲是後來不多幾年那側福晉生下一位公子來那大福晉知道了越發懷恨她覰著郡王出差在外面的時候悄悄地打發一個丫頭把那公子偷出府去意欲把他丟在空野地方餓死他那時老僧正到郡王府去被俺撞見了便求他們佈施給老僧抱回廟剃度做了小和尚去那丫頭進去對福晉說知福晉也答應了一面叫老僧把這小公子偷偷地抱去一面報到宗人府假說是害天花死了那側福晉同時也被大福晉弄走了待到郡王回來見母子兩人都不見把他一氣便吐血死了如今老僧念郡王身後只有這個種子又是皇上的嫡親孫兒因此把他送還皇上給他骨肉團圓老僧看在郡王的交好面上原沒有別的貪圖只求大人早早審問明白老僧也得早早回廟去那和珅得了兩人的口供便急急進宮去回奏乾隆帝聽說那和尚重翻舊案心中也有幾分著慌忙進宮到綠天深處和春阿妃商量去列位你知道這春阿妃是什麽人原來便是多羅履端郡王的大福晉如今給皇帝收下封了妃子住在綠天深處十分寵愛她當初宗人府奏報永城郡王生了一個兒子乾隆帝心中即也十分歡喜後來又報說害天花死了皇上想起皇嗣單薄便也覺得不歡傳旨把郡王喚進宮去問起皇孫害天花的情形那永城便回奏皇孫死時臣兒恰恰出差在外當時實在情形臣兒不曾親見不敢謊奏須問兒媳春阿氏才得明白待到把永城的大福晉傳來不禁把個公公看怔了那大福晉花容玉貌舉止風流果然是極好的了她說話的時候口齒伶俐笑靨承睫越發把個風流天子勾引得神魂填顛倒乾隆帝暗暗地留心她一言一笑絕似從前死去的香妃這時勾起了皇帝的一片癡心他這時也忘了翁媳的名分竟把個大福晉著意憐惜起來那大福晉原是一個聰明人見了皇上這一副神氣便放出她迷人的手段來一派花言巧語回眸低笑早把個皇帝捏在手掌裏乾隆帝聽春阿氏說完了話便對郡王說道這個媳婦兒真能說話好似朕院子裏的鸚哥聽了叫人忘倦如今皇太后正好少一個陪伴說話的人朕如今把她留在宮裏每日陪著皇太后說話消遣兒朕也做了一個孝子你也不失爲賢孫永城郡王雖明知皇帝不懷好意但也不好說得只得把他的福晉留在宮裏垂頭喪氣地出來冷冷清清住在家裏他想起愛妾亡兒鬱鬱寡歡不多幾天便成了咯血之症一病死了永城郡王死過以後那春阿氏便升做妃子每天和皇上尋歡作樂調笑無間正快活的時候忽然那皇孫出現了在乾隆帝心中還不免有子孫骨肉之念去和春阿妃一商量那妃子一口咬定說陛下收留不得的事隔多年真假不可知即使果然是真的他日續嗣郡王長大起來知道妾尚在宮中必不甘心於妾爲他生母報仇那時外間傳播皇上也有不便的地方倘然一定要招認他做皇孫便請陛下賜妾一死妾也無顔侍奉陛下了說著便掩袖嬌啼起來皇帝最寵愛這個妃子見她一哭便心疼起來忙拉著她說了許多安慰的話到了第二天又把和珅傳進來忽然換了一副嚴冷的面色說道那皇孫已死七年宗人府中有案可查現在忽然外面又有一個皇孫出現定是那奸僧妄圖富貴欲仿宋是明的故事卿須傳集刑部官員另立特別法庭從嚴審問明白莫叫村野小兒冒認天家骨肉和珅聽了這番話心中早已明白退出宮去把皇上的聖旨宣佈了第二天由刑部主審請大學士都禦史諸官員們在一旁陪審公堂設在乾清門左面空屋內和珅和劉統勳兩位大學士高坐中間兩旁坐著六部人員刑部有一個章京名保成口才敏捷性情狡猾和珅知道他是一個能員便委他做主審官坐在公案下面停了一會把那和尚和孩子兩人提上堂來先由保成照例把他兩人的來蹤去迹審問一過便站起來對堂上說道諸位大人據卑職看來這裏面大有疑竇諸位大人倘肯給卑職審問的權柄卑職立刻可以把這案件問個水落石出和珅聽了保成的話便微微地點頭答應他保成轉過臉來喝聲把妖僧捉出去便走上兩個虎狼一般的差役來揪住圓真和尚的衣領直拉出堂外去保成便慢慢踱到那孩子眼前舉手便是兩個嘴巴打得那孩子哇地哭起來滿堂官員看了都大驚失色只聽那保成大聲問道你是什麽地方來的村野小兒受那妖僧的欺哄膽敢在朝廷上冒認皇孫這是犯的死罪你若不好好招供出來便當砍下你的腦袋來說著擎起佩刀來擱在那孩子的頭頸上那孩子被嚇得直叫起來一邊哭著一邊說道我原不知道什麽是皇孫我只知道那和尚是我的爸爸我記得四五歲的時候和尚常常指著我對別人說道這孩子姓劉這樣看來我是劉家的孩子原不是什麽皇孫我本不知道皇孫是什麽那和尚對我說到了皇上家去可讀書做官有好飯好菜穿好衣服出門騎小馬坐小轎有許多人侍奉我如今你們不給我騎小馬坐小轎又要拿刀殺我我不願做皇孫了求你們放我仍舊跟著和尚一塊回去可好嗎這孩子說完了話又大哭起來堂上許多官員看這孩子可憐便都替他抱屈只因怕和珅的威勢大家不敢多嘴保成聽這孩子招供了心上十分得意回過頭來對堂上笑說道諸位大人聽得麽他原不是什麽皇孫竟是劉家的孩子如今卑職審問明白了請大人們定案這時劉統勳坐在堂上忍不住站起來說道這案且慢定試問三尺孩童在威嚇之下何求不得況且據那和尚說這孩子生下地不多幾月便抱出府去究竟是不是皇孫莫說這孩子自己不知道便是俺們活了偌大年紀那自己在父母懷抱中的情形怕也不能明白據本大臣看來今日這樁案件非得再把那和尚傳上來審問一番不可和珅聽了他的話心中好不耐煩便冷冷地說道貴大臣若不嫌煩便再把和尚傳上來審問審問也不防事保成在下面又疊連聲喊傳和尚那差役又把和尚擁上堂來這孩子一見那和尚便指著和尚哭道俺好好的姓劉怎麽叫我來冒認皇家孫子如今卻害我殺頭來了說著又拉住和尚的衣角大哭起來這和尚露出十分詫異的神色來說道你明明的一位皇孫如何今天變了口供從前俺對人說你姓劉原是怕人知道爲遮人耳目起見那保成不容他說話把公案一拍喝聲妖僧胡說這孩子自己已供認了你還不快招麽喝一聲用刑那左右差役接著一聲喊呼啷啷鐵鏈夾棍一齊丟在那和尚身旁嚇得這孩子又大哭起來說道俺們快回去罷俺不願做皇帝家裏的人皇帝家裏嚇死人也和尚氣憤憤的指著堂上說道都是你們這班奸臣上欺君皇下虐人民你們吃的是清朝俸祿永城郡王嫡親的皇子和你們有什麽仇怨卻要滅絕他的後代俺死了做鬼也要和郡王來揪你們的魂靈呢圓真和尚說罷還咬著牙齒奸臣奸臣罵不絕口罵得和珅火起喝一聲打死這賊禿那左右差役正要動手時那劉相國起來攔住說道且慢如今俺們屈打成招叫天下人說俺們不公平據本大臣意思須把那舊日抱這皇孫的丫頭找來叫他當堂認明究竟是否皇孫俺們才可定案這時天色已晚和珅吩咐退堂當夜進宮去奏明皇上皇帝便傳旨所有從前郡王府中的丫頭老媽子一齊上堂證明那丫頭老媽子早已得了春阿妃的好處第二日上了公堂把那孩子喚上堂來給她們認她們齊口說不像又說從前的皇孫是瘦小長頰臉兒手臂上有一塊紅斑的如今這孩子卻沒有內中有一個丫頭供說當年皇孫死了是她親手收殮的如何現在又有一個皇孫出現又有一個老媽子供說俺是從前那皇孫的乳母那皇孫確實是死在她懷中的決不有錯你一句我一句說得那和尚啞口無言那劉相國坐在上面明知他冤枉也無法挽救他停了一會衆大臣商量定下罪來圓真和尚立即正法那孩子發配伊犁圓真和尚臨刑的這一天大罵昏君奸臣那孩子到了伊犁年紀慢慢地大起來自己知道確是當今皇孫便去和伊犁將軍說知那將軍替他轉奏朝廷和珅見了奏章悄悄地先去通報春阿妃子那春阿妃子便和皇帝撒癡撒嬌要皇帝下旨把伊犁將軍革了放和珅的親戚名叫松筠的去做伊犁將軍又要把那孩子在伊犁地方正法這皇帝聽了妃子的話統統依她可憐堂堂一位皇孫只落得一刀結果了性命這是皇帝越發把春阿妃寵上天去雖說皇上從江南回來帶了一個郭佳氏一個蔣氏進宮但也總爬不到春阿氏上面去那蔣氏郭佳氏又是蘇州人性情和順語言伶俐一味趨奉著春阿妃子春阿妃子也和她們好妃子自小兒深居閨閣不曾見過外面的情形郭蔣兩人告訴她江南地方如何如何好玩那街市如何如何熱鬧把個春阿氏哄得心裏熱辣辣的常常和乾隆帝說要一塊兒到江南遊玩去乾隆帝說朕才從江南回來如今又要到江南去怕給臣子們說話後來還是春阿氏想出一個法子來在圓是園裏造一條買賣街那店堂格局統照蘇杭式樣古玩店衣裝店酒樓茶館色色俱全那店鋪中夥計值堂的也都從蘇杭地方覓來下至賣花的賣水果的賣瓜子的都拿著籃在街上叫賣宮裏的太監個個拿出錢來做店東各種貨物由崇文門監督在外城各店肆中采辦進來把各種貨物記明價格賣去的貨物照值還價不曾賣去的仍將貨物退還正月初一開園皇帝下諭准滿漢各大臣進園遊戲那班官員在大街上來往觀看見有賣食物水果的大家搶著購買有時邀集許多同仁上酒樓茶館去沽飲晶茗那跑堂的往來招呼和在外城店鋪中一模一樣有時皇上穿著便服後面跟著幾位妃嬪到飯館來吃飯見了大臣們彼此點一點頭好似朋友一般店小二往上菜呼酒報帳吃酒的客人猜拳行令有說有笑一時諸聲雜作皇帝和妃嬪們看了這樣子不覺大笑有時皇帝也寫著請貼請客一二人大概都是宗室閒散大臣和西清館中的供奉陪著皇帝吃酒一般的也談笑猜拳毫不拘束那大臣們吃到高興的時候也叫幾個條子來請酒有時皇帝一個人出來遊玩在酒館中叫了許多條子和那班窯姐兒糾纏捉弄倘遇到皇帝酒醉的時候便擁著妓女走到套房裏睡去直到天晚也不肯回宮太監們無法可想便在房外打著雲板原來宮中的規矩皇帝一聽得雲板響便當起身離開這地方皇帝有時陪著太后來遊園那太后也打扮得和平常婦人一般見園中那些走江湖賣膏藥變把戲賣草藥賣卦蔔字的也擠在人堆裏去看熱鬧那侍衛只得遠遠地站著保護著正月十三到十八這六天裏面稱做燈節皇帝吩咐把園門開放傳諭滿漢臣民眷屬下至小家夫婦都准許進園來遊玩算是與民同樂的意思皇帝在這時候在人堆裏擠來擠去和那班小家兒女宦室夫人調笑著十分快樂太監們迎合皇帝的心意在各處套房裏鋪設下床帳聽皇帝隨意坐臥到了第三天忽然有一個大漢闖進套房來手中握著一柄尖刀四處找人的樣子被侍衛看見了搶上去把那大漢捉住發交步軍統領衙門審問那大漢氣憤憤地說道俺妻子進園去遊玩被昏君誘進套房去姦淫了俺如今找昏君去和他拼命那問官聽他嘴裏說得十分齷齬便也不問下去打入死囚牢第二天便在牢監裏殺死了自從出了這案件以後那園中便禁止男子出入圓明園中自從這一年設了買賣街以後每年正月便成了例規皇帝和妃嬪們在園中遊玩直到燈節以後才把街市收拾起來乾隆帝取與民同樂的意思把這買賣稱做同樂園到第二年同樂園開門的時候園裏又鬧出一樁風流案件來原來京裏有一位禮部侍郎姓莊的他年紀已六十歲了只因死了結髮妻子便在窯子裏去娶一個姑娘來那姑娘名賽昭君她面貌的美麗且不去說她她年紀只二十四歲生性十分活潑常常愛在外面閒逛凡是京城裏香廠廟會熱鬧的地方到處有她的腳迹莊侍郎前妻生下有一個女兒也生成風流性格俊俏容貌和這後母十分投機她母女兩人瞞著侍郎終日在大街小巷閑闖引得那班遊蜂浪蝶終日跟在她母女兩人後面評頭晶足調笑無忌那賽昭君有一種極淫賤的脾氣愛和人調笑愛聽人稱讚她的美貌因此這些店家夥計都和她閒談笑謔無所不爲那女兒到底是大家閨秀初見她繼母這種輕狂的樣子不覺羞得她低著脖子說不出話來後來漸漸地也看慣了連她自己也和人調笑無忌起來這女兒名叫秋官年紀只十八歲人人知道她是莊侍郎的小姐那班油頭光棍便一盆火似地向著她秋官又故意賣弄風騷若近若拒到後來到底受了風流的孽報要知後事如何且聽下回分解
