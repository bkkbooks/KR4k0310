body:
  text: 第三十九回寶親王私通舅嫂乾隆帝寵愛香妃卻說雍正皇帝被四娘魚娘二人刺死之後寶親王便安然登上了大寶這乾隆帝第一個不能忘懷的便是他舅嫂董額氏他又怕他舅子傅恒從中作梗便先下一道聖旨把傅恒升任爲禮部尚書這傅恒原是一個小京官忽見皇上驟加恩寵把他感激得肝腦塗地任皇上叫做什麽他都願意乾隆皇帝見傅恒一面已打通了便假說皇后想念嫂嫂爲名常常把董額氏接進宮去董額氏每一次進宮來必先到一間密室裏和皇帝相會那乾隆帝一見了董額氏早已魂飛魄散骨軟筋酥皇帝也不像做皇帝了那董額氏也實在長得美每逢她掩唇一笑回眸一睞乾隆皇帝便不覺對著她天仙天仙地喚不住口那董額氏又故意賣弄那卸衣脫履送茶捶腿的事體都叫皇帝做去皇帝也十分高興做董額氏常常脫去鞋子把一雙腳擱在皇帝的膝蓋上叫皇帝捶腿那皇帝對董額氏屈著一膝蹲在地上一面替她捶腿一面嘴裏嫂子長嫂子短地說笑著他們玩夠多時重行梳妝一番再進坤甯宮去見皇后那皇后富察氏見了嫂子也十分親熱有時留她住在宮裏姑嫂兩人同床睡著說說笑笑那富察氏還蒙在鼓裏不知她嫂子和皇帝早已結下深厚的私情反時時把嫂子傳進宮來敘家人之禮董額氏自從和皇帝有了私情以後自己看自己十分尊貴回家去便不肯和他丈夫同房那傅恒在家裏常常被他夫人驅逐出來和他侍姬一塊兒睡去傅恒有四個侍姬相貌都趕不上董額氏如今董額氏十分冷淡他傅恒也沒法只得和侍姬胡纏去董額氏和皇帝暗地裏來去看看已有兩年光陰了這年春天董額氏忽然有身孕了這件事第一個瞞不過丈夫兩年裏邊不曾和丈夫同房忽然肚子裏有了孩兒便難免要受丈夫的責問她心中十分害怕後來她悄悄地的皇帝商量了一條計策這一天從宮裏回家來忽然在自己房裏擺下酒菜把傅恒請進房來陪他吃酒那傅恒許久不見妻子的面了如今看看妻子的面貌越發標致了再加上今夜董額氏看待他格外殷勤早把個傅恒理得神魂顛倒他兩人一邊吃著酒一邊調笑著酒罷以後董額氏理把丈夫留在房裏那傅恒真是受寵若驚這一夜的恩典真是鞠躬盡瘁治髓論肌隔了幾天董額氏對丈夫說道肚子裏已有孕了傅恒聽了歡喜得什麽似的傅恒這時雖已生了三個兒子但都是他侍妾生的董額氏去不曾生過一個如今聽說董額氏有了身孕怎麽不叫他快活死到了時候董額氏臨盆果然生下一個男孩兒來但是傅恒暗暗地一算這個孩子在肚子裏只有八個月便出世了忙悄悄地問妻子去那董額氏見丈夫倒也十分精細便哄著他說自己身體單薄養不住胎兒所以八個月便漏下來了這孩子先天足須要好好調養他傅恒聽了妻子的話便也信以爲真從此著意調養這個小孩但是這小兒子養下地來便已十分雄壯哭聲也極其洪亮到了滿月以後董額氏抱他進宮去朝見皇帝求皇帝賞他一個名字那乾隆皇帝這孩子長得和自己一般相貌魁梧心中很是歡喜想把他留在宮中又怕傅恒面子上太過不去便賜他一個名兒叫福康安是望他長大起來有福康健平安的意思皇帝皇后賞了許多珍寶玩物又怕外面乳母不潔淨這時富察氏正生下一個皇子來便從皇子的四十個乳娘裏面選了二十個到傅恒家裏去乳著福康安又推說皇后愛這個孩子每月朔望須把這孩子抱進宮去見一個面福康安到了五六歲上皇帝便把他召進宮去跟著皇子一塊兒在上書房上學這時董額氏姿色略減乾隆皇帝在宮中已別有寵愛他兩人的交情也略略疏淡了些但是傅恒的官階總不住地往上升一會兒升到文華殿大學士傅恒的三個兒子最小的也有十四歲了皇帝下旨一齊選做駙馬把三個公主下嫁給他獨有福康安不得尚主但乾隆皇帝看待福康安恩情十分隆重十二歲時但封他做貝子又把自己的禦林軍交給福康安統帶暗地裏選了許多名將武士去保護他那班武將知道皇帝的意思每遇出兵總讓福康安得頭功每遇交戰自己故意敗下來讓福康安搶上去又在暗地裏幫著他打待到打得勝仗功勞全歸福康安一個人因此福康安每出兵總打勝仗每打勝仗回來皇帝必召他進宮去賜宴賜物福康安家裏禦賜的東西堆滿了屋子後來回部大小和卓木舉兵謀反乾隆皇帝要顯福康安的本領下旨命他統領大兵會合伊犁將軍兆惠出師回部那兆惠臨行請訓的時候乾隆皇帝悄悄地囑咐他照看福康安又說朕久聽得大卓木有一個妃子名叫香妃不但面貌長得美麗而且體有異香將軍此去須格外留意探訪香妃的下落兆惠聽了皇上的話心下已十分明白便諾諾連聲告退出宮和福康安合兵在一起浩浩蕩蕩殺奔回部去了福康安這時的年紀只有十八歲打扮得風流俊俏每天騎馬帶一隊衛兵在大營四周深山茂林中圍獵取樂他雖受得皇命官做到督師卻把營盤紮在山陝邊界地方並不出去打仗自有一班名士每日陪伴他下棋飲酒談笑消閒那將軍兆惠卻帶領十萬大兵從烏什地方打進喀什噶爾去都統富德又由和闌打進葉爾羌和卓木兄弟兩人連吃敗仗丟了這兩座城池越過蔥嶺逃去兆惠派一支先鋒兵追殺傅羅尼都直迫到阿楚爾山殺死敵軍人馬數萬兆惠看看得勝便催動人馬長驅直入殺到呂達克山地界的伊西渾河邊大小和卓木兄弟兩人逃過河去後來被巴達克山地方的酋長擒住割下頭來獻與兆惠將軍那兆惠將軍不敢居功忙把兩個人頭裝在匣子裏派人連夜送到督師福康安營裏福康安得兆惠將軍的戰報便專折入奏聖旨下來封福康安爲靖安伯准用親王儀仗又把回部總名改做新疆分設伊犁塔爾巴哈台烏魯木齊喀什噶爾四鎮升兆惠爲新疆將軍兼辦事大臣富德升任參贊大臣又令福康安客日班師回京這時兆惠心中念念不忘的便那個香妃那大卓木自從被巴達克山酋長殺死以後這香妃便不知下落看看福康安班師的日期很近了兆惠便多打發手下人四處打聽香妃的下落總打聽不到他想此番若不把香妃送進京去皇帝定要惱恨前程怕要不保後來還是富德說那大木卓既被巴達克酋長殺死那香妃也一定落在巴達克地方俺們不如向巴達克酋長去要回來富德這句話果然不錯被他猜著那巴達克酋長也見香妃長得美貌所以把大卓木殺了願意要享這豔福誰知香妃見丈夫被巴達克酋長殺了心中十分憤恨任那酋長如何硬逼軟騙她總不肯失節你若逼得她厲害些她便痛哭覓死那酋長見一塊肥羊肉上不得嘴正在進退兩難忽然兆惠將軍打發人來要這香妃說她是罪人的妻奴須要把她解進京去獻俘朝廷那酋長聽了看看這香妃不肯從他樂利做一個現成人情只說這香妃是回部地方第一個美人得來很不容易香花供養保存顔色更不容易如今天朝須拿和闐白璧十對來交換兆惠爲要討好皇上只得把十對上好的和闐白璧送去酋長得了白璧便把香妃送來兆惠親自穿戴衣冠迎進將軍衙門去看香妃時果然長得雪膚花貌嬌豔動人兆惠安慰了一番說此去皇上十分寵愛享不盡的榮華受不盡的富貴他日得寵休忘了我這遠臣推薦之功那香妃聽了只是憨笑也不說話兆惠又問她此去萬里京華可有什麽要攜帶的奴婢器物早早吩咐我都可以照辦香妃聽了便說別的沒有什麽只是舊時兩個心腹丫環舍她不下求貴將軍許她一塊兒跟進京去兆惠聽了便打發人到大卓木的宮裏去把兩個丫環傳喚出來又吩咐她們凡是香妃平日裝飾服用的東西一齊帶進京去新疆到北京沿途造著客館館裏面錦衾繡帷鋪設十分華麗又怕香妃在路上冒了風霜減卻了顔色便造了一輛薄輪寢車四面用錦帳遮蔽香妃睡在車子裏一路走去十分安適到了一個客館裏除她兩個帖身丫環伺候外又派二十名使女十二名差官在館內奔走供應館外面自有福康安的兵隊駐紮保護那香妃每日要洗澡福康安備了羊乳牛酪奇花異香供香妃洗用據服侍香妃的使女傳說出來香妃天天用羊乳牛酪擦洗她皮膚十分白嫩每洗過澡用各種異香熏過又用香茶漱口因此香妃每說一句話每坐一坐那香味終日不散講到她的面貌端莊美麗叫人見了敬又愛不用說是男子便是女子見了她這白郊的肌膚嫵媚的容顔也要神魂顛倒一路往來福康安因爲她是天子的禁臠便也不敢和她親近倒是香妃常常把福康安喚進客館去笑談雜作最動人的便是她回眸一笑齒白唇紅真令人心醉看她終日嬉笑也好似忘了國仇家恨福康安少年倜儻也算得是一個風流健將了但是見了這香妃也不覺得低頭斂息退避三舍在路上走了半年看看到了京師乾隆皇帝第一個挂心的是福康安第二個挂心的是香妃如今兩個人都到了跟前叫他如何不喜他一面暗暗地吩咐內監把香妃安置在西內一面禦殿受俘福康安出殿朝拜便把出師新疆得勝回進的情形一一奏聞乾隆皇帝看這少年將軍立功絕域說不出的滿心歡喜又因他是自己的私生子便格外寵愛恨不得把他拉在懷裏撫慰一番只因礙著君臣的禮節便著實稱讚了一番接著又獻上俘虜來那回部的君臣和他們的眷屬一齊被福康安押解進京送上殿來個個都匍匐在地不敢擡頭皇帝翻閱獻俘名冊見頭兩名便是回部酋長霍集占夫妻兩人皇帝便命把他夫妻傳上殿去跪在龍案下面吩咐他擡起頭來那霍集占見了皇帝不住地碰頭求饒又看那酋婦雲鬢蓬鬆玉容憔悴雖說風塵勞頓卻也嫵媚動人乾隆皇帝看了心中詫異怎麽回部地方專出美人我看這酋婦也可算得美人兒的了不知那香妃又怎麽的美呢皇帝這時忽然想起了香妃便潦潦草草地受過俘吩咐把霍集占夫婦打人刑部牢獄其餘都押赴刑場正法可憐一聲旨下不知送去了多少性命這裏霍集占夫婦兩人只得孤孤淒淒地去享受鐵窗風味乾隆皇帝一面吩咐在懋勤殿大開慶功筵宴一面急急走進西內看香妃去那香妃自從進了皇宮見宮殿巍峨人物富麗便也十分快活她終日和那妃嬪宮女遊玩著只因她性情和順舉動嬌憨便大家和她好有時和那宮女替換穿著衣服有時和宮女們去一床兒睡不多幾天那宮中的妃嬪個個和她十分親熱到了第八天上忽然傳說天子臨幸西內那班宮女七手八腳地把她打扮起來叫她出房去迎接聖駕那香妃抵死不肯也只得罷了一會兒皇帝走進房來香妃低著脖子坐在床前動也不動左右宮女連連喚她接駕她只是低頭弄著帶兒好似不曾聽得一般皇帝急急擺手叫宮女不要驚動美人自己走上前去在香妃身子前後細細觀著只見她長眉侵鬢玉頤籠羞那一點朱唇紅得和櫻桃一般十分鮮豔看她後面粉頸琢玉低鬟垂雲柳腰一搦香肩雙斜再看她兩手玲瓏纖潔幾疑是白玉雕成的乾隆皇帝靜靜地賞鑒了一回覺得她神光高潔秀美天成反把他那邪淫的念頭壓了下去只覺得一陣陣暖香送入鼻管來把個皇帝愛得他手尖兒也不敢去觸她一觸只是連連地歎著氣說道好一個美人好一個天仙天地靈秀之氣都被你一人占盡了只恨朕無福不能早與美人相見今日相見卻叫朕拿什麽來博你的歡心呢說著又歎了幾口氣便走出房去叮囑宮女須小心侍候美人離鄉萬里也難怪她心中悲苦你們須竭力勸慰美人要什麽須立刻傳總管太監辦到誰敢怠慢美人吃朕知道了立刻砍他的腦袋誰能叫美人歡喜也重重有賞美人沿途辛苦了朕如今且去讓她多休息幾天你們須靜靜地侍候不可驚動了美人那班宮女太監們聽了皇帝的吩咐只得諾諾連聲皇帝這樣的溫柔有禮貌他們卻第一次看見待皇帝走了大家不覺在暗地裏好笑說也奇怪那位香妃見了皇帝便板著面孔不言不笑皇帝去了卻依舊嬉笑顔開和宮女們玩耍去了這西內建得一座好大的園林香妃生長在蠻荒地方卻不曾見過這大內的景色她帶著自己兩個侍女和一班宮女有時在西池蕩槳有時在瑤島登高有時在花港垂釣有時在小苑射鹿正遊玩得高興忽然說皇帝令賞香妃物件那宮女催香妃快謝恩領賞去那香妃把粉頸兒一歪逃在摘星樓上躲避去了那送物件的太監見香妃嬌憨可掬便也無可如何只得把實在情形複旨去了又隔了幾天乾隆皇帝實在想得香妃厲害下朝回宮悄悄地走到西內去走進宮門只聽得內屋裏一片香妃的歡笑聲那內監們見皇帝來了正要喝威皇帝忙搖著手叫他不要聲張自己躡著腳走進屋去只見香妃袒著酥胸散著雲鬢兩個宮女正服侍她梳頭三四個侍女坐在地下香婦赤著一雙白足踏在侍女懷裏面前幾個大盤盤裏都是皇帝新近賞她的珠寶脂粉她拿著一樣一樣地賞給侍女那班侍女一邊笑著一邊謝賞香妃把賞剩的東西隨手亂抛惹著那班侍女滿屋子搶著一時嘻嘻嘩嘩一片嬌聲好似樹林中的鶯燕一般乾隆皇帝在簾外看了半天忍不住哈哈大笑掀著簾子進來屋子裏的宮女見天子駕到忙各個爬在地上接駕獨有香妃好似不曾看見一般自己對鏡理妝皇帝也不去驚動她靜悄悄地坐在鏡臺一邊看她梳頭梳成了頭穿衣著襪一任皇帝怔怔地看著香妃只是撅著嘴垂著眼一睬也不睬乾隆皇帝細細問宮女香妃飲食起居可有什麽不適每天做什麽事體消遣又問她住在宮中可快樂麽那宮女一一回奏皇帝看著香妃歎了一口氣說道天上神仙可望而不可即朕和這美人怎的這般無緣隨即把兩個年長的宮女傳喚到跟前來悄悄地吩咐她叫她覰香妃喜歡的時候勸香妃趁早依順了皇帝好處正多著呢那宮女口稱領旨送皇帝出宮宮女回進屋子來便把皇帝諭旨對香妃勸說一番那香妃卻嬉笑自若好似不聽得一般第二天皇帝又賞香妃許多珍寶衣飾香妃拿來依舊分賞給她的侍婢從此以後皇帝天天有東西賞給香妃香妃有時拿來給太監宮女們有時便隨手棄擲毫不愛惜又隔了不久的一天乾隆皇帝酒醉了想起香妃便命太監扶著走到西內去一走進宮門內監們唵唵的喊了幾聲宮女知道聖駕又到忙催香妃出去接駕香妃抵死不肯宮女們沒法只得出來把皇帝接進內室去香妃見皇帝來了依舊氣憤憤地低著脖子坐著皇帝連喚幾聲香妃又喚美人兒她都不理皇帝哈哈大笑道美人兒害羞也說著把衣袖向門外一揮那宮女太監們一齊退出門外去屋子裏只留下了香妃和乾隆皇帝兩人皇帝到了這時候實在忍耐不住了便走過去捏住香妃的手腕只說得一句好白嫩的臂兒只見香妃颼地拔出一柄尖刀來向臂上割去皇帝手快連忙奪住她的尖刀那雪也似的臂上已割了一個裂口淌出鮮紅的血來皇上的酒也嚇醒了忙拿袍袖去替她遮掩一面喚宮女進來替她包紮傷口乾隆皇帝見香妃性情節烈便也不敢威逼她吩咐宮女隨時規勸她香妃自從割臂以後終日哭著嚷著要回家鄉去皇帝可憐她異地孤淒使吩咐內務府在香妃住的樓外空地上連日連夜趕造回部的街市和回回營回回教堂又弄了許多回族人在街市上做買賣跑來跑去和回部的風俗一絲不差又命宮女每日領著香妃在樓上看望那香妃見了回部街市知道皇帝怕她想念家鄉爲她大興土木造成許多回部的房屋她心中雖感念皇帝待她的一番深意但她見了回部街市思鄉的念頭越發厲害了常常倚在樓窗口對著那窗外風景淌眼淚有時皇帝親自到她宮中來打疊起千萬溫柔用好話勸她無奈她一聽得皇帝提起回部那眼淚便好似斷了線的珍珠一般撲簌簌地濕透了衣襟皇帝看了她這可憐樣子便也不忍去逼她只來坐一會看望一回便去了那些宮女也經常暗地裏勸著香妃說皇帝的威權很大妃子終是拗不過去的將來惱了皇帝的性子說不定要恃強來姦污你也許綁出宮去殺了到那時妃子一般總是一個死一般守不住貞節還不如趁早依順了皇帝多享幾年快樂皇帝也是一個多情種子那時妃子得了寵保不定和唐明皇寵楊貴妃一般留下千古韻事也不負上天生妃子這一副美麗容顔了任你宮女說得天花亂墜那香妃聽了總當做耳邊風一般勸得多了那香妃便從袖子裏拿出一柄尖刀來向脖子上抹去嚇得那宮女魂不附體忙上去奪下來那香妃冷笑數聲說道你奪去何用我身邊藏著這樣的尖刀四五十柄呢你們不逼我便罷你們倘然逼得我過狠了俺便自己結果我自己的性命不然那皇帝倘然逼我俺有尖刀在此叫他和我一塊死宮女聽了香妃一番話深怕將來闖出大禍來便悄悄地去通報皇后皇后富察氏得了這個消息心中又氣又害怕她夫妻之間因爲董額氏的事體叫皇后知道了便禁止董額氏進宮皇帝恨極了皇后從此也不進皇后的宮兩口子鬧翻了皇后知道自己不能勸諫皇上便把這事體偷偷去告訴了皇太后皇太后鈕鈷祿氏生平十分痛愛皇帝的又知道皇帝有些任性當面一定勸他不轉須得想一個釜底抽薪的法子去斷了皇帝這條心她婆媳兩人商量了半天商量不出什麽好法子來後來還是坤甯宮裏一個老太監名叫余壽的想出一條計策來如此如此對皇太后說了皇太后連說不錯當下叮囑宮中上下人嚴守秘密暫時不動聲色乾隆皇帝又去看望過香妃幾趟那香妃總是冷如冰霜任你溫情軟意她總是個不理不睬乾隆皇帝看了這樣暗地裏自己傷心心想我貴爲天子卻不能享受這一段豔福真是人生在世各有姻緣但眼看著這樣一個美人兒叫朕如何放手得要用強威逼呢心中卻又不忍他日思夜想心中十分鬱悶任你千嬌百媚的妃嬪在他眼前山珍海味供在桌上他總是食不知味寢不安席從來說的憂能傷人乾隆皇帝慢慢地積憂成病皇太后見他容顔一天消瘦一天心中好似刀割她知道要救皇帝的性命這計策萬不能不用了看看冬至節近禮部奏請皇上祭天這是每年的大禮照例在祭天的前三日皇上齋戒沐浴住宿在齋宮裏到祭天的這一天文武百官五更時候起來先到圜丘去迎接聖駕那皇上祭過了天心中念念不忘香妃心想我四五天不見她不知她容顔怎麽樣了一進宮門便趕到西內去一看見屋內靜悄悄的不但不見香妃連那班宮女也不知到什麽地方去了看看室內衣服抛棄滿地忙傳管宮太監時那太監跪稱香妃和一班宮女都被太后宣召去了乾隆皇帝聽了忙把靴底亂頓嘴裏連說糟糕糟糕一轉身忙向坤甯宮趕去要知香妃下落且聽下回分解
