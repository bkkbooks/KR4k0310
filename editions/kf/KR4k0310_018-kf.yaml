body:
  text: 第十七回依翠偎紅將軍短氣嬌妻雛兒天子托孤卻說光宗皇帝自從服了李可灼的紅丸到第二天一命歸了天宮裏便頓時慌亂起來李可灼進了紅丸藥死了皇帝非但沒有罪名那方從哲反推說皇帝的遺旨賞李可灼銀兩外面有人疑心是鄭貴妃的指使便有禮部尚書孫慎行禦史王安舜給事中惠世揚上奏章說方從哲有弑逆的罪名這時熹宗皇帝即了位知道國事已糟到十分不願追究家事但是明朝自從楊鎬兵敗張宰相去世以後神宗皇帝二十多年不問朝政光宗皇帝即位不到一年便即逝世這裏邊再加上太監弄權大臣貪贓開礦加稅的事體鬧得天怒人怨又是什麽東林黨宣昆黨鬧得昏天黑地宮裏又鬧什麽梃擊紅丸的案件全國的君臣和老百姓終日在慘霧愁雲裏還有什麽工夫去管那關外的滿洲人那滿洲的英明皇帝卻趁機會得步進步他一方面勤修內政一方面結好蒙古一方面卻悄悄地買馬招兵先鋒隊已到瀋陽一帶先攻取了瀋陽東面的懿路蒲河兩座城池這軍情報到明朝京裏那神宗皇帝正在宮裏遊玩得了這個消息便忙得手足無措立刻升殿召集了大小臣子商議禦敵之策當時便有人保舉江夏人熊廷弼熟悉邊情才堪大用神宗皇帝聽了便接二連三的聖旨下去把熊廷弼召進京來給他挂上遼東經略使的印綬又賜尚方寶劍一口准他先斬後奏神宗皇帝打發熊廷弼去了以後便又躲在宮裏不問外事了他在二十六年裏面只有這一回接見大臣那熊經略奉了皇上的旨意帶領十八萬大兵殺奔關外來誰知他才出得山海關探子報來那鐵嶺又失守了熊經略便催促兵士晝夜兼程而進到了瀋陽地方看看那沿路逃難的軍民實在狼狽得可憐又看那駐紮的兵隊實在腐敗得不成個樣子便赫然大怒促住劉遇節王捷王文鼎三個逃將綁在院子裏審問明白砍下腦袋來送到各營去示衆那班軍士們看了個個害怕人人聽令熊經略一面訓練兵士一面督造戰車火炮掘壕修城把十八萬精兵分紮在靉陽清河撫順柴河三岔兒鎮江幾個緊要隘口上這時打聽得滿洲兵隊已到了奉集堡只離瀋陽四五十裏路熊經略忙帶領大兵乘雪夜趕到瀋陽一面安撫百姓一面又進守撫順和滿洲兵對壘那英明皇帝打聽得熊廷弼是中原第一條好漢也便不敢進去傳令退守興京去了這裏熊經略正要整隊進兵忽然北京接連來了幾道上諭把熊廷弼革了職又派袁應泰接任遼東經略使熊經略接了聖旨不得不交卸了兵權垂頭喪氣地回去到得京裏才知道朝廷大捉東林黨人因爲熊廷弼也和東林黨人通聲氣所以也把他革了職這時神宗皇帝已死朝廷裏正亂得不可開交熊經略也只得歎了一口氣回老家種地去了這裏袁應泰接了經略的任消息傳到英明皇帝耳朵裏便拍手大笑道我獨怕那個熊蠻子如今他去了這個袁蠻子卻是一個文官懂得什麽兵法便又點起大兵進駐奉集堡明朝的守將李秉誠出城應敵英明皇帝分左翼四旗兵去和他廝殺卻分右翼四旗兵去攻打黃山四貝勒獨領一支精兵殺向武靖營去英明皇帝親統八旗大軍進圍瀋陽一面約蒙古兵在西北角上夾攻打了十三天便把瀋陽城打破急進兵至遼陽那時經略袁應泰統領大兵在遼陽駐紮一聽得瀋陽失守的消息便嚇得魂不附體忙召集大小將領商量守城之策巡按史張銓獻計快快決太子河的水灌入城壕沿壕排列槍炮小心把守另派守道何廷魁帶領五千人馬在城外東北角上駐紮成爲犄角之勢那東北角上有一座馬鞍山是進遼陽城的咽喉何廷魁一貫有名的武將袁應泰所以派他去當這個要隘說起這位何將軍雖十分有英雄氣卻又很有兒女情他有兩位如夫人是他心上的人兒那兩位如夫人原也長得標致一個能操琴一個能作畫日夜伴著何將軍寸步不離的這兩位如夫人又各生得一女那面龐兒和她母親長得一模一樣何將軍看了又是十分寵愛如今聽得要調他去把守馬鞍山叫他如何丟得下這四個寶貝嘴裏雖答應著臉上早露出不快活的神色來袁應泰深知道他的心病便許他把家眷隨帶在營裏這一來把個何廷魁感激得五體投地便說了一句末將以死報國立刻出城去了那邊英明皇帝打聽明白便帶著炮車渡過太子河在東山上結一個大營和東門的明兵炮火交攻明兵漸漸有些不支英明皇帝親統八千步兵去攻打小西門一面又約蒙古兵去當東門又打發大貝勒帶領左翼四旗直取馬鞍山的明兵那何將軍帶兵在馬鞍山駐紮原要在山下紮營又怕兩位如夫人受了驚慌便搬到山頂上一座娘娘廟中去住下來卻派一二百名兵士在山下做探子誰知那大貝勒在深夜時候踏雪進兵這三百名探子兵在睡夢中被他們打得一個不留待到山頂上何將軍知道要衝殺下去早已被滿洲兵圍得鐵桶相似休想下得山來眼看著滿洲大隊人馬在山下走過卻不曾攔得一個到第三天上忽見遼陽城中火光燭天何將軍知道大勢已去這時也顧不得他的家眷催逼人馬衝殺下山去卻被大貝勒的兵殺死的殺死活捉的活捉休想逃得一個何將軍也被他們捉住了便破口大駡又被滿洲兵斬成肉泥山上的兩位如夫人聽說丈夫已死便各個抱著她的女兒向廟後井中一跳後人感動她們的烈性便把這座廟改稱雙烈婦廟供著兩位如夫人的神主此是後話卻說當時滿洲兵打進遼陽城的小西門放起一把火城內大亂袁應泰知事不可救便跑上城樓去意欲跳下城去盡忠後面巡按史張銓卻上來扯住了袁應泰淌著眼淚對張銓說道我受了皇上的恩典不能保守城池原當以身殉國但將軍有關外之寄我死後還望將軍收集殘兵爲退守河西之計袁經略說罷急拔下佩刀來自刎而死張銓捧著屍首哭了一陣正要走下樓去那滿洲兵已蜂擁似地上來將他們捉住推到大營裏去見了英明皇帝頓足大罵四貝勒聽了大怒一刀砍下頭來這時遼河以東七十多城池都投降了滿洲英明皇帝便把京師搬到遼陽城中來遼陽城失守的消息報到北京城裏把個熹宗皇帝急得捶胸頓足第二天臨朝便商議抵敵滿兵的計策當時大臣劉一燝出班奏請皇上仍起用熊廷弼又薦王化臣巡撫遼東皇帝一一依他奏章立刻派人到鄉間去把熊廷弼拉進京來熹宗皇帝在偏殿賜宴封他做遼東經略使給他統領二十萬大兵又向山東登州萊州地方調動海軍歸他節制大軍出發的時候皇帝親送出城賞一件麒麟戰袍彩幣四箱又在城外設宴命滿朝文武大臣陪他餞行熊經略打發王化臣帶領大兵先出關去自己卻帶了四千名親兵慢慢地向遼東進發沿路察看地勢撫問民情到了廣寧便住在經略衙門裏第二天王化臣來見熊經略問起兵隊的事王化臣回稱已把大軍分成六營沿遼河西岸把守著熊經略聽了大不高興說遼河狹窄難守堡小難容大兵今日情形只須牢守廣寧如今駐兵河上分便無力倘然敵兵以輕騎偷渡專打一營力必不敵一營敗那六營都敗便是廣寧也守不住了熊經略再三開導無奈王化臣生性倔強依舊把守遼河去這裏只留經略使的親兵四千人把守廣寧城熊經略看看王化臣不聽號令他是一位巡撫官又不好輕易得罪他只得寫了一本奏章送回北京去誰知滿州英明皇帝用兵神速他統領八旗大軍渡過遼河來攻打鎮武西平閭陽鎮寧一路的明兵卻十分勇猛打一處得一處攻一城破一城王化臣在閭陽地主大敗這戰報傳到廣甯熊經略十分驚慌急急帶了兵隊從錦州趕到大淩河去在山僻小路上遇到王化臣赤腳蓬頭只跟得兩個差役他見了熊經略不禁嚎啕大哭起來熊經略歎了一口氣說道早不聽我的話致有今日之敗如今大勢已去我兩人只有拼命而已正說話時忽聽得前面金鼓大震一彪軍殺出正是大貝勒代善帶領他一萬鐵騎兵直沖過來一陣混殺早把四千個明兵殺得落花流水一般熊經略和王巡撫夾在難民裏面逃進關來這時英明皇帝早已攻破了廣寧城北京城裏接連著敗陣失城的戰報嚇得全朝文武俱上都面無人色熹宗皇帝勃然大怒下旨捉住熊王兩人押進西城去斬首把他們的腦袋送到邊地上去號令滿清英明皇帝既得了廣寧各地便又把京城搬到瀋陽來駐紮把東路兵馬聚集在瀋陽地方兵有十萬人一面請貝勒大臣商議進攻山海關之計一面再派精明的探子前去探聽明朝的消息這時明朝已改任王在晉爲遼東經略使在山海關外八裏鋪地方造一座新城設下關隘小心把守這時忽然有一大漢獨自騎著一匹馬闖出城來嘴裏大聲說道只求皇上給我軍馬錢谷我一人便足以對付十萬滿兵那把城兵士聽得了立刻送他去見王在晉問起遼東的事體他便滔滔不絕地說個透徹王經略大喜一面把他留在城中一面上奏皇帝原來這大漢名叫袁崇煥在熊經略任上也曾做過武官後來明兵大敗他便流落在關外到處察看地勢訪問風俗因此結識了許多關外的屯民和關內的敗兵後來聖旨下來任袁崇煥爲關外監軍發國庫銀二十萬兩著他招募散兵這時兵部尚書孫承宗也十分信任袁崇煥常常在熹宗皇帝面前替他說話後來王在晉告退袁崇煥便做了遼東經略使袁經略主張水陸並重陸路守寧遠城水路守覺華島袁崇煥在寧遠地方造高大的城池激勵將士與城共存亡到天啓六年正月英明皇帝親統大兵十三萬去攻寧遠袁經略聽說滿洲兵到便把葡萄牙國的大炮排列在城上又調善放火箭的福建兵把守城頭並親自登城督戰吃喝睡息都在城樓上和兵士一樣那兵士們個個感激都肯爲袁崇煥拼命袁崇煥在城上和他的翻譯官談論詩文忽然在外金鼓大震袁經略笑說道敵兵來了忙把大炮架起又從城堞上推出一隻一隻木櫃櫃裏面躲著火箭兵看看滿洲兵已到外城這是袁經略的計策把敵兵誘進外城一聲炮響那外城門緊緊關住滿洲兵好似圍在鐵桶裏城頭上炮火齊發只聽得一片哭聲打死了滿洲兵無數過了一會轟的一聲地雷大發只見空中抛起許多滿洲兵都是焦頭爛腦斷手折腿的這時那滿洲英明皇帝也被困在內城被地雷打倒在地虧得他身旁有一個小兵搶得快把英明皇帝抱起接著又是第二個地雷爆炸正在英明皇帝倒下的地方那小兵跑得快已經被城牆上一塊磚頭落下來打在英明皇帝的腦殼上一下就暈過去了這時滿洲兵馬大亂各人自投生路大貝勒在塵土中爬起來找到了他父親忙扶上馬幸而這時東面城根被地雷震坍了一個缺口大貝勒保著他父親從缺口裏逃出來在路上遇見四貝勒帶兵接應這時英明皇帝已清醒過來覺得渾身疼痛知道自己內傷甚重便吩咐大貝勒從速退兵守住廣寧要緊自己卻坐著船沿太子河下去到清河地方在溫泉裏洗了一個澡看看傷勢一天重似一天英明皇帝睡在床上幾回暈絕過去他昏昏沈沈的時候心中便記念著他最心愛的繼大妃烏拉納喇氏和納喇氏生的十四王子多爾袞便打發人星夜到瀋陽去召他母子到來一面又到營中去把大貝勒代善喚來大貝勒聽說父皇傳召忙把兵權交給四貝勒匆匆趕到離瀋陽城四十裏靉雞堡地方來納喇氏先到見皇帝病勢危在旦夕不由得坐在榻前悲悲切切地哭泣起來第二天大貝勒也到了英明皇帝偶然清醒過來一手拉著納喇氏一手拉著代善囑咐了許多身後的話說道納喇氏是我最愛的妃子我死以後你須如母親一樣看待她當時大貝勒聽了父親的話便對納喇氏跪了下去磕了三個頭嘴裏喚著母親說道母親放心孩兒一輩子孝順便了英明皇帝在枕上看了便點著頭說道這才是我的好孩子停了一會又說道講到立太子的事體我心裏很喜歡十四王子多爾袞可惜他年紀還小懂不得什麽你是大哥哥又是我的孝順兒子我死以後你做個攝政王守候你的弟弟年紀大了便保護他登了皇位這是我肚子裏的第一件心事如今趁沒人在跟著的時候俺爺兒兩個說定了免得日後爭執說道便拉過多爾袞的手來放在大貝勒手心裏大貝勒一時感動了骨肉的情分便把弟弟攬在懷裏緊緊地摟住英明皇帝看了微微一笑便把雙腳一登眼一翻死過去了納喇氏倒在丈夫身上嚎啕大哭那代善和多爾袞弟兄兩人也拉著手對哭正悽惶的時候急見四貝勒慌慌張張地進來父皇死了他也不哭泣還連連追問父皇可曾吩咐立誰爲太子大貝勒見他氣色不善知道一時不能直說便含糊說道父皇才死我們諸事再從長計較四貝勒聽了冷冷地說道有什麽從長計較父皇身後立太子是第一件緊要事體大哥請在裏面料理父皇的喪事俺如今手中有的是兵權可以做得主便是那阿敏莽古爾泰兩位哥哥俺也和他們商量過了他們也很聽俺的話外面的事體大哥不用管由俺安排去四貝勒說完了話便洋洋得意地去了這裏納喇氏和大貝勒看了這情形知道四貝勒上面已有預備這件事倘若爭鬧起來定然十分兇險便是納喇氏也不願讓自己寵愛的兒子送性命去當下便悄悄地求大貝勒千萬不要把父皇要立多爾袞做太子的話說出去情願丟了這個皇位保全母子的性命大貝勒看看納喇氏求得可憐便也忍了這口氣第二天諸位貝勒大臣把英明皇帝的屍首迎進瀋陽城去在正殿上供著自有達海法師帶領衆喇嘛僧在殿上念經超度看看到了大殮時候那許多文武百官和貝勒親王都齊集在殿上預備送殮忽然四貝勒二貝勒三貝勒名個帶著佩刀闖進殿來後面跟定了二三百武士一字兒站在階下四貝勒走上殿去口中大聲嚷道還有大事未定父皇遺體且慢收殮說著一把把大貝勒拉了過來嚇得滿殿大臣都面無神色只聽得四貝勒大聲對大貝勒說道國不可一日無君民不可一日無主如今父皇殯天已有三日還不曾立定國主弄得外面軍心搖亂我雖掌握著兵權卻一天一天地壓不住起來你若不信你看四貝勒說著舉手向殿門外一指只聽得呼喇喇一聲響亮那殿門一重一重地一齊打開殿門外站著無數的兵士各個全身披挂擎著雪亮的刀槍他們見了四貝勒便大聲嚷著四貝勒萬歲把手裏的刀槍高高舉起要知大貝勒見了這情形如何回答且聽下回分解
