body:
  text: 第一百三回女自多情郎何薄幸客來不速形實迷離卻說一班上夜的家將剛走到陸曾的臥房門口瞥見壽娥笑容可掬地也在房裏大家不由地停了腳步數十道目光不約而同地一齊向裏面射去這時把個陸曾弄得又羞又氣他本來是個最愛臉面的人怎禁得起這衆目睽睽之下現出這種醜態來呢暗自悔惱不叠地道早知今日悔不當初了我一身的英名豈不被她一朝敗盡了麽他想到這裏不禁恨的一聲向她說道小姐夜深了請回罷她見那班家將立在門口那灼灼的眼睛向裏面盡看登時一張梨花似的粉臉泛起紅雲低垂螓首也沒有回話便站起來出了門扶著樓梯懶洋洋地走一步怕走一步地上樓去了這裏衆家將見了這樣的情形不由得嘁嘁喳喳的一陣子離開房門到了後面有一個名叫滑因的向衆人先將大拇指豎起腦袋晃了兩晃笑道諸位今朝可要相信我的話了罷我姓滑的並不是誇一句海口憑他是誰只消從我眼睛裏一過馬上就分別出好的醜的來就是螞蟻小蟲只要在我眼睛裏一過就能辨出雌雄來呢前回這姓陸的和盛大哥作對我便說過了無非是爭的一個她那時你們卻不肯相信我的話都說姓陸的是個天底下沒有第二個的好人今天可是要相信我不是瞎嚼了他說罷洋洋得意有兩個猛地將屁股一拍同聲說道我們錯極了方才這樣的好機會反而輕輕地放棄了豈不可惜麽衆人問是什麽機會他們倆答道方才趁他們在房間裏何不闖進去將他和她捆個結實送到太太那裏去但看她怎生的應付法這也可以暫替盛大哥稍稍地出一口惡氣衆人聽得這話一齊將舌頭伸了一伸對他們倆同聲說道你們的話說得風涼真個吃燈草的放輕屁一些也不費力竟要到老虎身上去捉蝨子佩服你們的好大膽啊不要說我們這幾個便是再來一倍只要進去還有一個活麽他兩個又道你們這話未免太長他人的志氣滅了自己的威風憑那個姓陸的能有多大的本領一個人一刀就將他砍成肉醬了衆人都道只有你們的膽大武藝高可以去和陸曾見個高下我們自知力量小不敢去以卵擊石自去討死滑因笑道你們這些話都是不能實行的話依我看不若去將老太太騙下樓梯叫她去看個究竟那時既可以揭穿他們的假面皮並且那個姓陸的就是通天的本領到了理虧舌頭短的時候估量他雖明知是我們的玩意卻也不敢當著太太和我們爲難的了等到太太見此情形還能再讓他在這裏耀武揚威的麽可不是恭請出府呢衆人聽了他這番話一個個都道好是好只可惜是太遲了現在已經沒有效力了還有一個說道我看今天還是未曾與他爲難的爲上著如果和他爲起難來不獨我們大吃苦頭呢而且太太平素很歡喜他的暗地裏難免沒有招贅的意思就是鬧得明瞭太太倒不如將計就計就替他們趁此成了好事我們倒替他們白白地做一回傀儡呢我們現在未曾揭破他們的私事倒無意中和姓陸的做一個人情明天我們再碰見那姓陸的倒不要過於去挖苦他免得惱羞變怒轉討沒趣知道還只當不知道淡淡的還同當初一樣他也不是一個不明世理的不獨暗暗地感激我們十分便是平素的架子說不定也要卸下了誰沒有心只要自己做下什麽虧心的事情一朝被人瞧破不獨自己萬分慚愧且要時時刻刻地去趨那個看破隱事的人深恐他露出來呢衆人聽他這番話都道是極事不關己又何必去白白地惱人做什麽呢大家七搭八搭的一陣子便各自巡閱去了不料陸曾見衆家將一陣嘻笑向後面而去料想一定要談出自己什麽不好的去處了不由得躡足潛蹤地隨著衆人聽了半天一句句的十分清楚沒有一字遺漏他怎能夠不生氣呢咬一咬牙齒回到自己的房裏取了單刀便要去結果他們他剛剛走出房門猛地轉念道我也忒糊塗了這事只怪那賤人不知廉恥半夜私奔到我這裏來萬不料被他們看見了怎能不在背地裏談論呢而且他們又不明白內中情形當然指定我與她有染了我此刻去將他們就是全殺了他們還不曉得的他說著複又回到房中放下單刀往床邊上一坐好不懊悔暗道吳大哥今天和我談的話我還兀的不去相信不料事出意外竟弄出這一套來豈不要被人唾駡麽如今不要講別的單說那幾個家將誰不是嘴尖腮薄的成日價說好說歹的無風三尺浪呢還禁得起有這樣的花頭落在他們的口內麽豈不要謅得滿城風雨麽到那時我雖然跳下西江也濯不了這個臭名了那童老太太待我何等的優厚差不多要將我作一個兒子看待了萬一這風聲傳到她老人家的耳朵裏豈不要怨恨我切骨麽一定要說我是個人面獸心之輩欺侮她們寡婦娘兒我雖渾身是嘴也難辯白了他想到這裏不禁深深地歎了一口氣道童老太太你卻不要怪我你只可恨自己生下這不爭氣的女兒行爲不端敗壞你的家聲罷了他胡思亂想的一陣子不覺已到五鼓將盡了他自己對自己說道陸曾也是你命裏蹭蹬和吳大哥在一起度著光陰何等的快活不知不覺地爲著一隻大蟲就落在這裏來將一身的英名敗盡了明天還有什麽顔面去見衆人呢不如趁此走了倒也乾淨隨便他們說些什麽耳不聽心不煩他打定了主意便到床前渾身紮束一會子停當了握著單刀走出房來迎面就碰著那一班家將撞個滿懷衆人見他裝束得十分整齊手執單刀預備和誰動手的樣子大家大吃一驚互相喊唔道不好不好我們的話一定是被他聽見了如今他要來和我們廝拼了這卻怎麽好有幾個膽小的聽說這話嚇得撲通一聲跪了下去接著大家一齊跪下滑因首先開口說道陸將軍今天千萬要請你老人家原諒我們失口亂言之罪陸曾出門碰見大家正愁著沒有話應付呢瞥見大家一齊跪了下來不禁心中暗喜道既是這樣倒不如趁此表明自己的心迹了他便對衆家將問道諸位這算是什麽意思呢衆人一齊答道望將軍高擡貴手饒恕我們的狗命陸曾正色對衆人說道諸位且請起來兄弟現在要和諸位告別了不過兄弟此番到童府上效勞也不過是因爲她家孤兒寡婦乏人管理家務起見所以存了一個惻隱之心不想在這裏沒有多時就察破那個盛方不良之徒兄弟不在這裏則已既在這裏焉能讓他無法無天妄作妄爲呢不得不稍加儆戒不料諸位倒誤會我爭權奪勢了他說到這裏衆人一齊辯道這是將軍自己說的我們何敢誣陸將軍呢陸曾笑道這也無須各位辯白了方才兄弟我完全聽得清清楚楚的了不知道是哪一位老兄說的衆人一齊指著滑因說道是他說的我們並沒有相信他半句嚇得滑因磕頭如搗蒜似地道那是我測度的話並不一定就是指定有這回事的陸曾笑道不問你測度不測度總而言之一個人心是主不論誰說誰我有我主意卻不能爲著別人的話就改了自己的行爲的天下事要得人不知除非自不爲自古道路遙知馬力日久見人心就如今天這回事兄弟我也未嘗不曉得諸位不明白內容的可是背地裏議論人長短就這一點自己的人格上未免要跌落了但是諸位眼見本來非假我又要講一句翻身話了人家看得清清楚楚的而且半夜三更她是一個女孩子家在我的房中究竟是一回什麽勾當呢難道只准我做就不准別人說麽豈不是只准州官放火不許百姓點燈麽恐怕天底下沒有這種不講情理的人罷是的諸位的議論原是有理兄弟我不應當駁回但是內裏頭有一種冤枉兄弟現在要和諸位告別了不得不明明心迹衆人道請將軍講罷他道我昨天夜裏爲著那個盛方我一夜沒有睡覺所以日裏有些疲倦飯後就要睡覺了偏生她不知何時在我的房中將一部春秋六論拿去那時我也不曉得到晚上我因爲日裏已經睡過了再也不想睡了一直到三鼓左右我還未登床不料她在這時候在樓上將書送了下來此時我就不客氣很嚴厲地給她一個警告男女授受不親夜闌人靜尤須各守禮節不應獨自下樓即使送書也該派個丫頭送來就是了何必親自送來呢她被我這一番話說得無詞可答這也難怪她雖是名門閨秀嬌生慣養而且未經世務不知道禮節也是真的卻斷不是有心爲此的我陸曾堂堂的奇男子大丈夫焉能欺人暗室做這些喪心病狂的事呢我的心迹表明了諸位相信也罷不相信也罷皇天後土神祗有眼但是兄弟去後一切要奉勸諸君無論何人不拘何事皆要將良心發現我希望全和陸曾一樣那就是了千萬不要瞞天昧己欺孤滅寡免得貽羞萬代這就是兄弟不枉對諸君一番勸告了現在也沒有什麽話說了再會罷他說罷大踏步直向吳古房中而去這裏衆人聽他這番話誰不佩服從地下爬起來互相說道還是我們的眼淺不識好人人家這樣的見色不迷見財不愛真不愧爲大英雄大豪傑哩不說衆人在這裏議論再說陸曾到了吳古的房中只見吳古已經起身正在那裏練八段錦呢見他進來渾身紮束不由得一驚忙問道兄弟你和誰動手這樣的裝紮起來他歎了一口氣道兄長悔不聽你的話致有今日的事吳古忙問是什麽事情他便將以上的事情細細地說了一遍吳古跌腳歎道我早就料到有此一出了那個丫頭裝妖作怪的每每的在你的面前賣俏撒嬌的你卻大意我早已看出她不是好貨了爲今之計只好一走了事這裏再也不可停留了他說罷也略略的一裝紮便要動身陸曾忙道大丈夫明去明來我們也該去通知童老太太一聲才是個道理呢吳古忙道那可動不得我們要走便走如其去通知她料想她一定是要苦苦地挽留我們那時不是依舊走不掉麽陸曾道你的話未爲不是但是她們是寡婦娘兒又有這極大的財産我們走雖然一文未取但是被外人知道他們也不知道究竟是爲著什麽事情走的如此不明不白免不得又要人言嘖嘖飛短流長了吳古聽他這番話很爲有理俯首沈吟了一會子便對他笑道那麽何不去騙她一下子就說我們現在要到某處某處投親去大約在一月之內就來了我想這樣她一定不會阻止的了陸曾搖頭說道不妥不妥還不是和暗地走一樣的嗎我想這樣罷也不要去通知童太太只消我們寫一封信留下來就是了吳古道好極了就是這樣的辦罷他說罷便去將筆墨紙硯取了過來陸曾一面將紙鋪下一面磨墨一會子提起筆來上面寫著道仆等本山野蠢材除放浪形骸外無所事事謬蒙青眼委爲保家俯首銜恩何敢方命兢兢終日惟恐厥職有疏致失推崇之望但仆等閱世以來早失怙恃所以對於治家之道一無所長所經各事頗多舛誤惶愧莫名自如汗牛充棟誤事實深不得已留書告退俾另聘賢者負荊有日不盡欲言仆吳古陸曾叩同上他將這封信寫完之後吳古便道寫完了我們應該早些動身了免得童太太起身我們又不能動身陸曾道是說著便與他一躍登屋輕如禽鳥早已不知去向了從此隱姓埋名不知下落小子這部漢宮原不是爲他兩個著的只好就此將他們結束不談罷床話少說再表童太太到辰牌時候才起身忽見一個丫頭進來報道吳將軍和陸將軍不知爲著什麽事情夜裏走了童太太聽說這話大吃一驚忙問道你這話果真麽那個小丫頭忙道誰敢在太太面前撒謊呢童太太連忙下樓到了吳古的房裏只見一切的用物和衣服一點也不缺少桌子上面擺著一封信童太太忙將信拆開一看不禁十分詫異地說道這真奇了他們在這裏所做的事十分精明強幹沒有一些兒錯處怎麽這信上說這些話呢一定是誰得罪了說罷便將家中所有的僕婦家丁一齊喊來大罵一頓罵得衆人狗血噴頭開口不得受著十二分委屈再也不敢說一句童太太罵了一陣子氣衝衝扶著拐杖徑到壽娥的樓上只見壽娥晨妝初罷坐在窗前只是發愣見了童太太進來只得起身迎接童太太便向她說道兒呀你可知道吳陸兩將軍走了她聽說這話心坎上賽如戳了一刀忙道啊喲這話果真麽童太太道還不是真的麽我想他們走一定是我們這裏的傭人不好不知道什麽地方怠慢了人家也未可知天下再也找不出這兩個好人了唉這也許是我孫家沒福存留不住好人罷了壽娥聽說陸曾真正地走了那一顆芳心不知不覺地碎了但是當著她的母親也不敢過霹形迹等到她走了之後少不得哽哽咽咽地哭泣一陣子自歎命薄誰知傷感交加不知不覺地病倒了百藥罔效眼見病到一月之久把童老太太急得一點主意也沒有終日心肝兒子的哭個不住她的病卻也奇怪也不見好也不見歹老半明半昧的不省人事鎮日價嘴裏終是胡說不已童老太太不知道費了多少錢請過多少醫生說也不信一點效驗也沒見童老太太的念頭已絕只得等著她死了有一天正到午牌的時候家裏一共請了有三十幾個先生互相論症用藥到了開飯入席的當兒只見衆人的當中有一個二十幾歲的道士頭戴綸巾身穿紫罩一口鍾的道袍足蹬雲鞋手執羽扇面如豬肺眼若銅鈴但見他也不推讓徑從首席上往下一坐衆醫士好不生氣孫府裏衆家將和一班執事的人們見他上坐還只當他是衆醫生請來替小姐看病的呢所以分外恭敬獻茶獻水的一毫不敢怠慢衆醫士見孫府的人這樣的恭敬道士一個個心中好生不平暗道既然是將我們請來何必又請這道士做什麽呢這樣的恭敬他想必他的醫術高強能夠將小姐的病醫好了也未可料定不說大家在那裏互相猜忌單表那道士拖湯帶水的大吃特吃嘴不離匙手不離箸只吃得滿桌淋漓衆醫生不覺十分討厭賭氣爽性一筷子不動讓他去盡性吃他見衆人不動手卻再也不會客氣一聲仍舊大張獅子口啅啯啅啯的不停手一會子席散了童老太太從屏風後面轉了出來向衆醫士檢衽說道小女命在垂危務請諸位先生施行回天之術能將小女救活酬金隨要多少不敢稍缺一點的衆醫士異口同聲地說道請太太不要客氣了你家已經請得回天之手我們有何能幹童太太驚問是誰衆醫土一齊指著那個道士說道不是他麽這正是筵上何由來怪客觀中設計騙嬌娃要知後事如何且看下回分解
