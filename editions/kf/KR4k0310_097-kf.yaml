body:
  text: 第九十七回亂禁闕再建晶園爭封典兩哭寢陵卻說光緒戊申的那年皇上和西太后先後開升算來相去只有兩天可算得同歸於盡了所以人家都說西太后是自盡的這事連當時在場目睹的人也不曾弄得明白我們局外只知道聽途說自然更無從揣摸了但是兩宮既同時賓天當由親王大臣扶醇王之子溥儀登位尊光緒後爲隆裕皇太后醇親王爲攝政王諸事草草已畢才料理兩宮的喪事其時宮廷裏面異常地混亂西太后的屍首停在外殿內監十餘人都拈香跪守著西太后的身上只蓋著一幅黃幔殿裏燈光慘澹望上去很爲冷清淒涼直到次日的午牌時分方有十幾個喇嘛到殿上來念經這時香煙縹緲才把陰霾之氣打掃乾淨以西太后生時的威權死後卻這般的慘澹足證爲人攘天奪地無一不是空的要最後的結果美滿方好算一世定局哩這是閒話且按在一邊且說光緒皇后受了西太后遺訓對於政事想和西太后在日一般照例也垂簾聽政攝政王載澧因西太后臨終所囑政事秉承隆裕後而行於是凡遇緊要的事件不得不請命於隆裕後了當時王大臣等也爲西太后瀕危所定立溥儀爲儲君光緒駕崩溥儀正位年號改光緒爲宣統元年大赦罪囚這是歷朝舊制自不用重說了那隆裕後既然做了太后政事不論巨細都親加批答載澧雖做了攝政王大權卻在隆裕後掌中載澧簡直是有名無實而且偶有不合隆裕後意旨的地方便召進宮申飭因此攝政王載澧和隆裕後的心上未免各存了一種私見所以內外政弄得一敗塗地不可收拾了但講到才德兩件事西太后有才無德是人人知道的至於隆裕後呢才是萬不及西太后德行是更不用說了還要處處學著西太后自聽政實行一時有垂簾西太后第二之稱隆裕後因西太后寵容太監李蓮英也想用一個心腹內監便把給西太后驅逐出去的小德張命人去找他進宮叫小德張做了內務總管又使他偵探攝政王的舉動報給自己知道小德張東西攛掇權柄立時擴大儼然西太后的李蓮英了隆裕後又嫌頤和園景致太熱要待另造一個花園小德忙去請了建築家在四處打樣過了些時來奏隆裕後道奴才在各處園林中都打聽過了只有大內的禦花園的東首有一塊土阜那塊地方德宗皇帝未升遐時聽信江湖術士的話不准建築舍宇以奴才看來那都是迷信之談有什麽交待呢倘在建裏造起來四周開有池沼再引玉泉山的水與池中相通上面鋪了玻璃可成一座水晶宮哩隆裕後聽了大喜即命日夜加工前去建造令小德去監工另選名畫家在宮中四周的窗上畫了人物山水宮內陳設不問一幾一案以及琴棋劍匣一概用玻璃製成正中置一大玻璃球藏玻璃明燈一百盞一到晚上將燈一開內外通明真如水晶世界一般小德領旨監工逐日報銷費用只就玻璃一項索價七百五十萬元其餘的一切建築雜物費用和工人等費自不消說了這水晶宮自宣統元年造起至二年的冬季還只造了一半隆裕後親自題名曰靈沼軒又把大內的秘室從新修理起來原來這間秘室共有十多間是西太后所造尋常的內監也不知秘室的所在因秘室有一道總門唯西太后一人曉得總門以外望去都和牆壁一樣無路可通當庚於八國聯軍進京西太后命內監把貴重的寶器一齊搬入秘室及搬好以後將這幾個內監一併推入池中以爲滅口之計故辛醜回宮各處物件一無留存惟秘室內的東西卻一件也不曾少西太后死後這個秘室所在逐漸發見出來然已多年不住人裏面的舍宇多半頹圮了隆裕叫工匠依然把它修葺起來這秘室的門前是一幅極大的圖畫畫在粉牆上的不知道的還當是真的石牆哩那石牆的下面有一個機紐但把機紐一撥牆壁立時分開變成一間房室了進了這間房室再用手轉動機關由房室的中間豁然開朗又顯出一間客室來了走進客室照樣做去客室又變做臥房了不過這個臥室還是一個預備的西太后的正式臥房還是照這般的轉進去從客室變爲天井天井又變爲書齋書齋又化作天井天井再變爲客室似這般的變化無窮層層疊疊地進去到最適中的一間才是西太后的臥房哩那臥房裏面的陳設自不消講它當然十二分地精致臥床的裏面卻藏著一隻空管西太后睡時把空管放在枕邊百步以外的聲音說話都歷歷如在耳邊西太后生時深怕有人暗算因而備辦這樣東西內監們也有瞧見過的說這空管是從前兆惠出征的時候得之緬甸王的宮中那管子用獸角雕成很爲考究只不知這獸是叫什麽名目罷了隆裕後修這個秘室有什麽用處讀者諒也明白自不用做書的細說了這樣的一來隆裕的名氣也漸漸壞了起來在這個當兒卻弄出一樁事來了因穆宗還有一位妃子就是瑜貴妃她的爲人聰穎而有才幹諸如琴棋書畫沒有一樣不精當穆宗立後的時候以瑜妃是鳳秀的女兒西太后欲冊她做皇后孝貞太后卻不贊成結果召穆宗自己選擇穆宗選了崇綺的女兒鳳秀的女兒便封做瑜妃西太后心上雖不悅但也無可如何以是常對穆宗說皇后太年少瑜妃有才你應當看重一些穆宗口裏微微答應對於崇綺的女兒孝哲皇后伉儷非常之篤有這一緣故西太后對於穆宗母子之間不大親密了西太后又因瑜妃不得立爲皇后便格外優遇她一點穆宗賓天德宗接位瑜妃依然侍候著西太后因她生性活潑言語應對都能稱旨西太后越發地喜歡她了那時隆裕皇后雖是西太后的侄女現代的皇后而寵遇上頭反遠不如瑜妃有時隆裕後妒忌瑜妃於話說中諷刺她瑜妃就去哭訴西太后西太后大怒立召隆裕後責問道你是堂堂皇後瑜妃已是寡鵠了無論何人要可憐她的你是我的侄女于我心愛的人自宜分外看待不期你轉仗勢淩人叫她一個寡婦咽得下嗎即使別人欺她你也得幫助她哩隆裕後被西太后一頓申飭後從此見了瑜妃連正眼也不敢瞧一瞧了瑜妃于西太后在日既這般地得寵她的性情也自然一天天驕傲上去差不多的宮嬪妃子毫不在她眼中只有對光緒帝的瑾珍兩妃倒十分要好當庚子拳亂時西太后把珍妃逼死瑜妃在無人的地方也常常痛哭每見隆裕後傾軋瑾妃瑜妃總在邊幫襯著說她們姊妹兩人一同進宮侍候皇上現今恩未受著倒把一個珍妃活活地弄死了我們再去捉她的差處真是於心何忍呢隆裕後給瑜妃一說不好意思再事苛求了瑾妃得瑜妃的暗中援助要少吃無數的痛苦咧但瑾妃自己卻絲毫不曾知道啊自光緒帝薨逝西太后也隔不兩日升仙由溥儀入繼大統封隆裕皇后爲皇太后瑾妃也晉了太妃獨有瑜妃因爲是穆宗的妃子所以不曾加封照例妃子進見太后自己要稱奴才的瑜妃和隆裕皇后原是並輩西太后時瑜妃不但和隆裕後比肩寵容還過於隆裕後咧現今叫她去對隆裕後稱奴才不是太說不出去嗎以是瑜妃不願去見隆裕後雖經宮嬪的苦勸瑜妃死也不肯去只得罷了過了幾天恰巧到了謁陵的期上這天因去謁西太后的寢陵自宣統帝攝政王以下王宮大臣以及隆裕太后上下嬪妃等一齊都到那裏大家行禮既畢瑜妃同了縉妃瑾妃當時也在其間瑜妃見親王大臣已齊集在一起便走了上去正色問醇王道皇上入繼是只繼德宗皇帝還是兼祧穆宗皇帝醇王突然給瑜妃一問倒也呆了一呆道自然兼祧穆宗皇帝瑜妃決然道那麽穆宗孝哲皇后今已賓天所留不過我一人了皇上既兼祧的爲什麽隆裕後稱得母后我卻還做奴才呢醇王聽了瞠目不能答瑜妃便跪在西太后的陵前放聲大哭起來當由醇王再三勸諭令回宮後再行計議瑜妃才收淚登車醇王等既回京又把這事漸漸地淡忘了到了第二次謁陵時醇王因有事不去派載振做了代表宮中嬪妃依然都到那天的瑜妃仍提起這件事來要求載振立刻解決載振不敢作主也拿醇王回去再言一句話搪塞誰知瑜妃以爲醇王前次失信是有意瞧不起她今番須要定奪不然就死在陵前說罷望著龍柱上一頭撞去嚇得縉瑾兩妃慌忙把她拉住用好言安慰著一面由載振進京與醇親王等商議於是才算議妥立即齎了詔書前往封瑜妃爲太妃進謁太后不稱奴才並排半副鑾輿迎接入宮瑜妃才沒有說話其實隆裕後在禁中也沒有一樣不做所以瑜妃很看輕她不肯自稱奴才多半爲這個緣故當西太后時宮中常常演戲隆裕後也侍候在側這時每逢時節照舊召伶人入宮演戲親王的福晉格格門一遇大內演戲自然循例進宮從前伶人之中不是有個唱武生的柳筱閣嗎他因得西太后的寵遇妻子和女兒都曾入大內侍候過太後柳筱閣自己也仗著勢兒居然也進出禁宮了自西太后死柳筱閣的妻子女兒只得出宮回家隆裕後雖也相信瞧戲以居著大喪究屬礙於禮節不便公然行樂後來日子久了大家有些忘記下去隆裕後也天天命在宮中演戲伶人柳筱閣也被召入內他的武戲原是很不差的西太后時常常做戲受賞隆裕後要顯出自己的尊嚴每演一出戲即令每個伶人賞一百兩柳筱閣因做戲出力額外蒙賜這樣一來卻有一位福晉就看上了柳筱閣了但在滿清末季王公大臣的妻妾同伶人們勾搭本是一件極平常的事有什麽希罕呢不過這結識柳筱閣的福晉不是常人卻是醇王的大福晉也就是溥儀的生母啊在起初的時候大福晉和柳筱閣只是眉來眼去到了後來漸漸地兜搭起來了可是在宮庭之間究不比別的地方第一是耳目衆多二人做那鬼戲自覺得有些不便當下大福晉借了一個空悄悄跑到太湖石邊等著不一刻工夫柳筱閣也來了大福晉笑著說道你的戲唱得真不差咱倒很喜歡瞧你的戲呢柳筱閣忙謙虛道承蒙福晉過獎了大福晉又道這裏人口很雜咱們不便多說話你如其有空可到咱們邸中來玩玩咱們的王爺每天清晨要上朝的到午後才回來你就在這個時候到咱們邸中來是不妨事的了柳筱閣原是個淫伶一聽有這好機會怎肯錯過呢連連答應了便匆匆地自去這裏大福晉待戲完畢也謝了恩回去第二天清晨柳彼閣大踏步地往著醇王府來到了門前見警衛森森不敢進去只在大門外望了一會卻始終不敢進去這樣的呆立了一會柳筱閣忽然福至心靈暗想前門既這般嚴禁後門怕未必見得如此罷於是便匆匆地往後門進來原來醇王邸中後面是一個很大的花園柳筱閣轉到門前只見一個小宮女笑嘻嘻地立在那裏一見柳筱閣就招呼道你可是柳大官人麽柳彼閣見問忙應道正是正是那小宮女便道福晉叫咱候得你久啦說著微微地一笑當下領了柳筱閣往花園內彎彎曲曲地走進來轉了幾個螺旋彎到了一個所在只見重樓疊閣好一座樓臺小宮女說道官人在這裏稍等一下待咱去給你通報去說罷三腳兩步地去了過了一刻那小宮女出來笑著對柳筱閣說道請你裏面略坐一坐大福晉快就來了柳彼閣點點頭走進那座樓臺裏面卻是一個客室陳設得非常地幽雅小宮女端上一杯茶來柳筱閣喝著閑看了一遍見室中琴棋書畫沒有一樣不全正瞧得出神忽聽得腳步聲音回頭看時來的正是大福晉操著純正的京話笑著說道好呀你怎麽到這時候才來呢柳筱閣忙笑答道這是小人不識路徑走錯了的緣故啊大福晉道此地很不便的咱們再到那裏去坐說時同了柳筱閣往東邊一帶的房舍走去到了裏頭卻又換了一副氣象所擺的東西都是寶貴的古玩大福晉令柳筱閣坐了大家慢慢地寒暄起來談了半晌大福晉吩咐小宮女去把內室的菊花酒拿來小宮女去了柳筱閣便問大福晉道王爺此刻不曾回來嗎大福晉說道平日是早已回邸了今天因太后有旨進宮去議大事大約須晚上方得脫身哩正在說著小宮女已笑盈盈地提了一個食盒一手提著一個玻璃瓶子跑到案前把食盒打開取出幾樣精致的肴饌來又將兩雙白玉箸子一對白玉杯一一擺好了拿玻璃瓶打開滿滿地斟上兩杯酒才放下了瓶垂手立在一邊柳筱閣覺得杯中的酒味馥鬱馥芬異常地香美真正生平所不曾飲過忍不住拿起杯來喝了一口清涼震齒那香味從鼻管中直沖出來因問大福晉道這是什麽酒卻有如此的香味吃在口裏甘美極了大福晉笑道這酒還是老佛爺禦賜的咧從前高麗的國王不是年年來進貢的麽當高宗皇帝萬壽時高麗王遣使貢禮物到本朝內中就有十瓶酒據他的使臣說這酒是高麗王妃親手釀的用了五色的菊花浸在蜜裏蒸哩曬哩著實下一番手續才把它釀成所以叫做菊花冰麟酒飲了這酒可以益壽延年壯精健骨高宗時遺傳下來現在十瓶只剩一半有一天上午西太后忽然想了起來命內監去拿出那五瓶菊酒賜與醇王兩瓶醇王看得很爲寶貴非在佳節不肯亂飲現還有一瓶沒有啓蓋呢柳筱閣所飲的是醇王飲餘之物啊福晉說畢也將酒飲了一口兩人飲酒談心漸漸投機起來了小宮女立在旁邊只顧一杯杯地斟著柳筱閣因酒味甘芳不免多飲了幾口已有些醉意了大福晉也面泛桃花有點情不自禁了二人說一會笑一會吩咐小宮女收去了殘肴大福晉便攙了柳彼閣的手一同走入內室遂他們的心願去了從此以後柳筱閣居然出入醇王府邸邸中的宮人僕婦以及當差等等沒有一個不知道的了但是世上的事往往有出人意料的柳筱閣出入王府無非是用錢把內外僕人都塞住了口誰知還有一位王府的管事老九和柳筱閣暗中鬥起醋勁來這個老九也同大福晉有過暖昧的事近來見大福晉私下有了柳彼閣自己刮不著油水倒讓柳筱閣去穿綢著緞心上如何不氣所以乘柳筱閣清晨進邸的時光老九等在門後必要向柳筱閣借錢柳筱閣起先是不得不應酬後來次數多了便不答應了老九見柳筱閣不理他早已大怒恨恨地說道咱去告訴了王爺去看你們怎樣要知後事如何且聽下回分解
