body:
  text: 第一百七回獅吼河東懦夫屈膝雞鳴閫內美妾傷顔話說壽娥自從彌月之後迫不及待地就回娘家與雪慶兩兒去尋樂了在家裏共住了十多天把個梁冀守得幹著急因爲她是初次回家不能急急地就邀回來只得度日如年地守著好容易到了二十幾天她才回來紅綃帳裏少不得重敘舊情誰知壽娥心有別念梁冀雖然極力望承色笑她總是懶懶的不肯十分和他親熱梁冀不知就理還當她初到這裏總有些陌生生的所以不去疑惑她有什麽軌外行動壽娥雖身子住在他的府中可是心神沒一刻不在家裏和他們倆接觸轉眼到清和月四日她卻不能再挨了便對梁冀道我們太爺正是今朝忌辰我要回去祭掃梁冀道好請你回去罷不過此番回去千萬要早一些回來不要叫人守得舌苦喉幹的她聽了這話便向梁冀道啐誰和你來說這些不相干的話呢你又不是個三歲的小孩子不能離乳娘的他笑道我的心肝我隨便什麽皆可以離開但是你一天不在家我便是比一年還要難過呢壽娥嗤地笑道少要放屁她說罷上轎回去了這一去足足又住在家裏二十多天梁冀像煞狗不得過河似的在家裏搓手頓腳抓撓不著又耐著性子等了幾天仍然未見她回去再也不能耐了便打發一個侍尉到她府上去請到了第二天侍尉回來對他說道上複將軍小人奉命前去夫人有話對小人說過非要在家將老太太的壽辰過了才得有空回來呢粱冀聽說這話心中十分不悅暗道她家的事情實在不少冥壽過了馬上又鬧著陽壽他便向侍尉問道她可曾告訴你老太太的壽辰在何時他道便是五月十八日梁冀聽罷好生不快暗道現在還離壽期十幾天呢她在家裏有什麽事不肯回來呢這時那侍尉忽然很奇異地向梁冀說道我們寧圩的牛馬隊隊長慶兒雪兒幾時到她家裏的梁冀道這事你還不曉得麽早就去了那侍尉笑著說道我看大夫人和他們倒十分親熱呼兄稱弟的呼兄稱弟他說到這裏忙噎住了滿臉漲紅梁冀見他這樣不禁疑雲突起連忙問道你怎見得他們親熱呢他撲地往下一跪忙道小人該死失口亂言萬望將軍原宥梁冀本來是一個刁鑽之徒見了這種情形心中豈有不明白的道理料想用大話去嚇壓反成僵局不如施一個欺騙的手段定可套出他的實話來他打定了主意便和顔悅色地向他說道你快起來好好地說我又不是個野人怎能爲你說了兩句話便要治你的罪也沒有這種道理的那侍尉見他毫無怒色心中才放了下來便站起來說道小子有一句話要對將軍說但是萬望將軍先恕我死罪我才敢說呢梁冀聽他這話更加溫和地說道你有話肯直說這是你的忠實之處我不獨贊成你並且還要賞賜你呢你可趕緊說罷那侍尉說道昨天我到她的家裏進了百客廳和她家的執事談了兩句話就看見大夫人和慶兒從裏面手牽手兒走了出來有說有笑的慶兒見了我忙一撒手回頭溜到後面去了那時大夫人見了我臉上也現出一種不大愜意的樣子來所以我到現在心中還未曾明白她和慶兒究竟還有什麽關係呢他說罷這番話把個梁冀氣得三屍神暴躁七竅裏生煙但是他一點不露聲色只笑嘻嘻地說道你哪里知道她們的老太太現在已經將雪慶兩兒認爲義子了所以他們在一起很是親熱這也不足爲怪的刃附尉笑道這更奇了他們不是將軍的義子麽怎麽又與童老太太拜爲義子呢這名義上卻是將軍的義舅爺了可不是陡跌一代麽梁冀冷笑道管他娘的他不是童老太太親生的義子幹爺有什麽重要的關係呢他說罷一揮手那侍尉退去梁冀越想越氣暗道怪不得她要賴在娘家過日子原來還有這些玩意兒呢好好好管教她樂不成就是了他隨後喊了一個家丁寫了一封信叫她急要回來刻不容緩那家丁帶了信到了孫府壽娥見信知道梁冀動怒也就不敢怠慢忙收拾回來進了門耳朵裏只聽得衆人七舌八嘴的私下裏議論不休她還未知道他們是議論自己的一徑到了自己的房中衆人沒有一個不替她捏著一把汗誰知梁冀本是火高萬丈預備等她回來一刀兩段了事等到她進了房見了那一副可憐可愛的梨花面早將心中的醋火消去十分之九了她進了房瞥見梁冀按著劍滿臉怒色心中大吃一驚暗自打算道不妙不妙莫非那件事情被他知道了麽她想到這裏十分害怕忙展開笑靨對梁冀深深的一個萬福口中說道久違了梁冀忙伸手將她拉起答道家裏不須常禮夫人請坐吧她輕移蓮步走到他的身旁並肩坐下含笑低聲問道今天將軍著人去將妾身接了回來有什麽緊急的事呢粱冀冷笑一聲道有什麽要事呢不過是多時未有請你的安特地將你接回來給你請安的她見話頭不對暗自打算道今天的事頭著實不對要是一味讓給他反而教他疑心不若硬起頭來將他的威風挫下去下次他才不敢再來依威仗勢的擺架子了她打定了主意便也冷笑著答道將軍哪里話來自家夫妻有什麽客氣呢梁冀道夫人這幾天在府上還稱心麽她笑道這不過是因爲我們的娘現在年紀老了她老人家也未生三男四女不過就生妾身一人所以不得不時時回去替老人家解解愁悶這不過是聊盡我們子女的道理罷了又有什麽稱心可言呢梁冀冷笑道你回去恐怕不是安慰你的老太太一個人吧她道你這是什麽話我不安慰我的娘別的還有誰呢梁冀道就是那一班哥哥弟弟大約也安慰得不少罷她聽說這話料知春色已漏再也不能隱瞞了反而使一個欲擒故縱的手段來應付了她便將臉往下一沈問道將軍你方才說些什麽話我沒有聽得清楚請你複說一遍梁冀很爽快地重新又說了一遍她登時玉容慘澹杏眼圓睜霍地站了起來伸出纖纖玉手向梁冀一指潑口罵道我看你是個禽獸這兩句話就像你說出來的麽怪不到三日一次五天一趟著些追命鬼的到我家裏去定要接我因來乃是這種玩意兒呢我且問你你家有沒有姐姐妹妹她們回來可是安慰你的麽梁冀聽得這幾句話啞口無言垂頭喪氣坐在床邊左腿撓上右腿一起懸空兩手托腮上眼睛皮和下眼睛皮做親她見他這種情形便曉得他的威風已被挫了趁此爬上頭去弄他一個嘴落地她想罷放聲大哭一面哭一面說道好好好奴家自命不凡待字閨中年過二八多少人家來求親奴家久慕將軍的大名卻未肯和他人貿然訂婚天也見憐得償夙願滿望隨著將軍博得一個官誥替父母揚眉吐氣萬料不到今生不幸碰到你這個不尷不尬的鬼這也許是奴家生來薄命應該罷了你既然疑心生暗鬼的不妨就請你將我結果免得存在世上敗你的英名惹得人家談說起來堂堂的一位驃騎大將的夫人竟做出這些無恥的事來豈不要沒辱你家三代的先靈麽不錯人家是不曉得內中情形的我是個三貞九烈的人家也要說我是個狗彘不知的賤貨了好賊子我一身的貞名賣給你了我還有什麽顔面在世上呢不如當著你這殺坯將一條性命摜掉了罷她說罷手理羅裙遮著粉面認著粉牆便欲撞去梁冀嚇得慌了手腳趕緊跳過來一把將她扯住口中央告道夫人也是我一句話說得不好惹得你誤會了我本來是句無心話不料你竟誤會我是個壞意了她哭道你可不要來花言巧語的了我又不是三歲孩子可以隨你哄騙的請你快些放手讓我死了倒是安逸梁冀急道夫人你再不信我可以發得誓他說罷死天活地地賭起咒來她哭道無論你賭什麽咒誰還來相信呢這時梁冀的母親正在後園賞牡丹猛聽得丫頭們來報告說老爺和夫人不知爲著什麽事情在房裏拼死拼活的老太太趕緊去遲一步兒就要出岔子了梁母聽得吃驚不小忙扶著丫頭跌跌撞撞地向壽娥的房中而來到了房外只聽得裏面嚎啕叫噪沸反盈天她進了房梁冀見母親進來忙起身迎接口中說道太太請坐壽娥見婆婆來到格外放刁撒賴地大哭不止梁母忙問道是什麽事梁冀忙答道沒有什麽事請太太不要煩神梁母道沒有事難道就吵得這樣的天翻地覆的麽壽娥搶進一步撲通往梁母面前一跪掩面痛哭道孩兒今天冤枉死了要求婆婆給我伸冤呢梁母忙命僕婦將她從地上扶了起來說道壽娥你有什麽冤枉盡可來告訴我讓我好來責問這個畜生壽娥便一五一十加油加醋地說了一遍把個梁母氣得只是喘氣厲聲罵道我把你這個不肖的畜生枉做了一位大將軍連三綱五常都不曉得成日價雞頭扭到鴨頭亂來尋著人我可問你究竟是誰告訴你的毫不忖度就對人家這種樣子你說她做下這些不端的事你的臉上有什麽光榮休說人家是個官宦後裔便是平常的女孩子也不能義兄義妹做那些禽獸勾當的我曉得了你這畜生向來是個見新忘舊的現在差不多又搭上什麽鹹雞臘鵝了回來鬧得別人不得安生了梁冀忙賠笑躬身說道請太太不要動怒這事總怪我不是我給夫人賠罪就是了梁母說道賠罪不賠罪倒沒有什麽要緊可是下次如果再這樣子我就不答應了梁冀受著一肚子屈不敢回嘴只是諾諾連聲的答應道遵示遵示下次不敢梁母又向壽娥說道你也不要氣了下次他如果再這樣委屈你盡可到我那裏來說我一頓棍子打他個爛羊頭看他改不改脾氣了壽娥拭淚道太太請回去吧今天勞動孩兒心中實在不安我又不是不知好歹的只要他不尋著我再也不敢教太太生氣的梁母笑道好孩子你進了我家門我就疼你隨便什麽事情都比人家來得伶俐從不像人家撒嬌撤癡的不識體統她說罷扶著丫頭走了這裏梁冀見太太走了滿指望她從此消氣誰知她仍舊柳眉緊蹙杏眼含嗔俯首流淚梁冀火已熄了也顧不得許多便走過來涎著臉笑道夫人方才我們太太來給你打過不平也該就此息怒了她也不答話仍舊只有嗚咽的分兒梁冀見她哭得雙眼腫得和杏子一樣梨花帶雨可憐可愛情不自禁地挨肩坐下向她低聲說道夫人誰沒有一些錯處呢就是我亂說了一句話我們娘也來替你消過氣了我在這裏賠罪也該算了爲什麽兀地哭得不休呢萬一傷感過度弄出毛病來便怎麽辦呢她下死勁朝他一瞅說道誰要你在這裏囉嗦沒了我死了與你有什麽相干呢我橫豎是一個下賤的人要殺要剮還不是隨你的嗎梁冀忙道夫人你又來了你再這樣一口氣不轉來我就要她道你要殺便殺我豈是個怕死的梁冀急道你又誤會了我哪里是這樣呢她道不是這樣是怎樣呢他也不回答便撲通往下一跪口中說道我就跪下了她才微微地露出一點笑容用手在粉臉上羞著道梁冀羞也不羞枉把你做個男子漢大丈夫竟做得出來梁冀笑道好在是跪在活觀音前的又不是去亂跪旁人的便又怕誰來羞我呢她暗想道勁也使足了再緊反要生變得著上風便可住了休要自討沒趣她便將他從地上拉了起來梁冀又千不是萬不該的賠了一番小心總算將她的一肚子假氣哄平了心中十分慶慰過了幾天梁母因爲看花受了一些寒涼究竟年紀大了經不起磨折不知不覺地生病了梁冀連忙請醫診視誰知將太醫差不多請過了仍然未見有一些效驗到了五月初九竟一命嗚呼梁冀大開孝帳滿朝的文武誰不來趨承他呢一時車水馬龍十分熱鬧到了第四天的早上中常侍曹騰帶了許多奠禮許多從仆擁簇著一輛車仗到了梁府梁冀聽說是曹騰連忙親自出來迎接曹騰見面先和他行了一個喪禮梁冀便道常侍太也客氣了曹騰答道豈敢豈敢下官此番到府一來是奠唁太夫人二來還有一件事和將軍商議梁冀忙問是什麽事他悄悄地笑道尊太爺在日不是進過一個美人與老王爺麽他道莫非是友通期麽曹騰道不是她還有誰呢他道久聞她的豔色尚未見過面不知是個什麽樣子的人後來聽說老王爺沒有中意竟將她退了那時我很替她可惜現在你提起來難道這人有了下落了麽他道你且慢著急我來慢慢地告訴你他道你說你說曹騰道老王爺將她退了之後我便暗暗地將她留在家中那時她只有十四歲現在已經有二十三歲了但是徐娘半老她的丰姿卻仍不減豆蔻梢頭真個是傾國傾城沈魚落雁她的心志卻非常的高傲常常的對我說非像將軍這樣她才肯下嫁呢我便對她說你如果願意我便替你去做媒她聽我這話心中已是默許了所以我今天已將她帶來請將軍親眼一看如果合適收下來做個妾媵也未爲不可梁冀聽他這話大喜問道現在哪里曹騰便將他領到車前打開簾子梁冀仔細一看禁不住身子酥了半截果然是位絕色的麗姝較孫壽娥尚要占勝三分呢把個梁冀險一些兒喜得瘋了忙附曹騰的耳朵吩咐道如此如此曹騰點頭會意忙命回車仗而去梁冀又送了一程才回家料理喪事好容易挨了四十九天七期一過他便對壽娥說道夫人我現在要將太太的靈柩搬到西陵去安葬開槨築墓至少要有三月的工程家中我卻不能兼顧了我要到西陵去監工府裏的事情都要請你照應才好呢壽娥哪知就裏便滿口答應他又上朝告假三月桓帝本來是他一手托出來的而且他的妹子又是現在的六宮之主什麽事都是百依百順的准假三個月複又禦賜許多奠典他便到西陵一面著人修造槨墓一面尋了一所幽靜的去處築了一座香巢將友通期安放在裏面朝夕尋樂人不知鬼不覺的一個多月壽娥在家裏好不寂寞暗自猜道他就是監工夜間也應該回來的爲什麽一去一個多月竟是連晃都不回來晃一下子呢說不定這人莫非有了什麽外遇了麽而且我離他一月半旬的還不見得怎樣但是他從來不是這樣一個人就在這個地方便可以看出他的破綻來了她越想越疑惑便派幾個心腹人在暗地裏四下打聽可是天下事要想人不知除非己莫爲未到三天居然被他們將根底完全摸去了回到府上一五一十地對她說了一個究竟把個壽娥只氣得渾身肉頗那一股醋火酸溜溜地從腳心裏一直沖到頭頂上便不延挨點齊一班有力的僕婦大隊娘子軍浩浩蕩蕩只向西陵進發到了香巢之內湊巧梁冀又不在家壽娥便吩咐衆僕婦將友通期拖了出來仇人相見分外眼紅不由得喝了一聲打這正是悍婦有心翻醋海殘花無主怨生風要知後事如何且看下回分解
