body:
  text: 第七十三回玉殞香消殺妻投古井頭飛血濺背母突重圍卻說祭遵將王明殺了之後忽然有個人向他說道軍司令今天將王明毅然殺了豈不怕主公見罪於你嗎祭遵道用不著你們發愁我自有道理此刻早已有人飛報劉文叔說道祭遵將王明殺了劉文叔聽得這話勃然大怒道祭遵是個什麽東西他竟敢藐視我目無法紀膽敢將我的舍中兒殺去說到這裏鄧禹忙用手將他一推附著劉文叔的耳朵悄悄地說道主公你錯了當此之時假使軍令不嚴何能壓服衆將呢祭遵這事足見他能盡職辦事主公不察反說他不好豈不令衆將不服麽劉文叔恍然大悟一會子祭遵領著人犯和抄出的金銀財寶一齊擡到帳內前來交令手裏執著一張報單點著報道抄出逆産如下黃金三萬斤白金五百斤紋銀三百箱每箱五百斤國幣八萬貫珊瑚器皿十二件瑪瑙器皿三十三件羊脂玉物三百四十七件綢緞絹綾三萬五千三百二十四匹布帛八百箱每箱三百匹衣服四百五十箱刀槍一庫馬六十匹木器共七千六百五十四件零星物件三百箱糧食六萬石人犯一百三十四口現已全到請主公示下這時帳下的衆將一個個都替祭遵擔憂劉文叔問道我方才聽說你將我的舍中兒殺去果然有這回事麽祭遵挺身直認不諱地說道不錯是我殺的劉文叔笑著問道你怕我見罪你麽祭遵走到劉文叔的面前躬身答道主公哪里話來主公不委我任軍司令則已既然任我做軍司令我當然不負主公的重任任憑他是主公的什麽人只要他不守規矩犯到我的手裏都要按軍法從事我今天將王明殺了主公莫非要見罪麽既如此請主公就按軍法辦我罷他說罷直立帳前等候劉文叔的示下劉文叔毫不動怒反而滿臉堆著笑容問道卿家今天殺了王明但是他究竟犯的是什麽罪祭遵答道那個自然要將他的罪惡宣佈出來今天末將到蘇家去抄拿主公是否教他去沒有劉文叔道沒有祭遵道未得軍令私出營門一罪強姦婦女二罪私竊逆産三罪有這三個罪名殺得究竟冤枉不冤枉呢劉文叔大笑道原來如此該殺該殺莫說殺了一個便是殺了十個百個也不爲多忙命人賞祭遵黃金三百斤絹帛五百匹加封刺奸將軍祭遵忙謝恩退下劉文叔便將那一班捉來的人犯詢審了半天一個個地賜些金帛發放他們走了又命人將抄來的逆産寄存於鄗城以備軍需發放已畢鄧禹講議道連日奔走士卒們辛苦極了只好休息兩天再遣他們征伐劉文叔說道先生之言極是我也是這樣的設想讓他們養足銳氣再爲調動不遲話猶未了探馬飛來報道漁陽上穀兩郡的兵馬到了劉文叔大喜忙命大開城門領著衆將開城迎接只見漁陽上穀的兩處兵馬足有六七萬衆旌旗蔽天戈矛耀日軍容十分齊整劉文叔心中說不出的十分歡喜忙催馬到耿況彭寵跟前施禮招呼道勞駕遠來秀實不安彭寵耿況忙回手致敬道明公遠涉長征爲萬民造福我們敢不附驥麽劉文叔又和他們寒喧一陣子便一同進城耿況彭寵將帶來的四員大將與文叔相見一個是昌平人姓寇名恂字子翼一是個櫟陽人姓景名丹字孫卿一個是安陽人姓蓋名延字巨卿一個是姓王名梁籍貫與蓋延相同劉文叔見他們個個俱是威風凜凜的將才不禁滿心歡喜忙叫人殺豬宰羊大排宴席款待來賓並犒賞三軍馬步衆將到了第二天領兵出城留下耿純守城餘下均拔寨動身這番出兵總數有二十余萬不上半日已離鉅鹿只有三裏之遙了劉文叔便吩咐紮下大營預備攻城王郎早得急報忙差倪宏劉奉兩員大將帶了三萬人馬來救鉅鹿隨後又派胡平郭左兩員大將又帶兵三萬駐防南蠻作爲犄角之勢到了第二天鉅鹿主將王饒見劉奉倪宏的兵到十分壯膽便留吳漢守城自己帶三千兵馬出得城來擺成陣勢匹馬雙錘直闖到劉秀的寨前罵戰霎時金鼓大震馮異領了一隊人馬從寨後沖了出來王饒忙回馬到了垓心馮異已經趕到舉起獨腳銅人劈頭就打王饒也不慌忙便掄錘迎敵各奮神威酣鬥了一百多合不分勝我這時劉文叔已經點齊衆將一齊出寨掠陣只見他二人殺得塵沙蔽天難分難解劉伯姬哪里還能耐忍一拍桃花征駒闖到垓心正想替回馮異瞥見對陣沖出一個賊將來手持方天畫戟也不打話扭住劉伯姬便鬥王霸大吼一聲一馬沖到垓心替回馮異便和王饒大殺起來四隻大錘只殺得天旋四轉那邊劉伯姬和劉奉大戰了八十多合不分高下銚期看得眼熱也不待命令拍馬舞刀殺到垓心那賊兵的陣裏跟著也出來一個賊將手執雙鐧接住銚期喝道來將通名咱老爺刀下不死無名之鬼那員賊將一陣狂笑道反寇你且在馬背上坐穩不要嚇得翻下馬去咱老子乃大漢皇帝座前右大將軍倪宏便是識風頭早些歸順省得咱老子動手銚期大怒也不答話揮刀就砍倪宏舉鐧相迎這時垓心裏只見刀光錘影十二隻背膀撩亂二十四個馬蹄掀翻只殺得目眩心駭鄧禹對劉秀道你看這鉅鹿城上沒有多少賊兵何不趁勢就此襲取城池呢劉文叔點頭道是忙令馮異岑彭帶了一隊兵來襲城池剛剛沖到濠邊瞥見城上石於灰瓶暴雨般打了下來前隊的兵被打傷不少這時城上現出一個賊將兩邊站著無數的兵士手裏俱是拿著鹿角鐵蒺藜那個賊將向馮異笑道要想攻城這裏恐怕你沒有這樣的能力了請向別處去罷馮異大怒一聲令下萬弩俱發城頭上霎時現出五色雲牌來說也奇怪射來的箭完全嵌入雲牌裏一枝也落不掉霎時箭盡一班兵士只得住手這時城頭的雲牌立刻撤去那員賊將依舊立在城頭向馮異岑彭道多勞賜箭心中感謝現在對不起卻要回敬了話聲未了城上登時萬弩齊發如同暴雨一般前隊的兵士被射倒數百人馮異大驚忙和岑彭下令退兵劉文叔見城上的守將如此厲害不禁暗自吃驚馮岑兩將回到劉文叔馬前齊聲說道城上的守將委實厲害無法進攻劉文叔道兩位將軍請暫休息再作道理馮異岑彭帶兵退下這時城上一片鳴金的聲音王饒等三個賊將領兵進城王霸等也就收兵回營劉文叔對衆將讚賞了一番鄧禹開口說道單是出城的三個賊將倒不足爲患不過匹夫之勇但是守城的那個賊將倒著實棘手馮異插口說道可不是麽憑我們的攻法任他是誰也有些應付不來不料那個賊將來得十分厲害耿況道那個賊將姓甚名誰馮異道姓什麽倒不曉得耿況道我有個朋友姓吳名漢這人端是智勇雙全前月聽人說他投奔王郎我倒替他可惜如果是他我能憑三寸不爛之舌說他來歸降主公鄧禹笑道但願是吳漢那就好辦了大家吃了夜飯衆人剛要去安息鄧禹道今天遇著勁敵大家都要防備一些才好這句話提醒了劉文叔忙道不錯不錯凡事都宜謹慎爲佳李通王霸同聲說道你們也忒過慮了今天你不看見那幾個賊將殺得精疲力盡麽夜裏還敢再來討死不成馮異說休要這樣道還是預備一些的好他說罷便與岑彭前來請令鄧禹便教他們帶兵在寨左寨右埋伏景丹蓋延也過來請令鄧禹見他們日間沒有廝殺再則要試試他們的本領便令他們帶兵五千在寨前埋伏不提再說王饒倪宏劉奉收兵回城一齊責問吳漢何故鳴金吳漢對三人說道你們只顧廝殺那劉秀的部將來攻城你們知道嗎王饒道怎麽不知道呢你在城上做什麽的吳漢笑道雙拳不敵四手他們假若派出許多兵馬教我一個人怎樣來得及呢王饒才恍然大悟忙道不錯不錯應當要鳴金吳漢道方才聽探馬來報說主公又派了胡平郭左兩員大將帶了三萬兵馬現已到欒城今天夜裏趁他初到此地將全城的人馬調到城外一面著人到欒城教郭左胡平到三更時候來接應我們我們在二更左右分著三路前去劫寨趁他不備殺他個片甲不存王饒大喜忙差人飛馬到南欒去關照郭胡二將自己將全城的人馬共有八萬多分四門出來悄悄地紮下大營將一座鉅鹿保護得鐵桶相似吳漢一面點兵調將一面教探馬到劉秀寨前探聽虛實一會兒探馬忙回來報道劉秀的寨前一點動靜也沒有王饒大喜忙與倪宏劉奉各領了五千人馬分著三路悄悄地向劉秀的大寨進發這時星移鬥換已到子牌時候了王饒等到了劉秀寨前一聲呐喊殺了進去不提防左右突然沖出兩支人馬暴丹蓋延各自揮動傢夥擋住王饒兩邊的燈球火把照耀得如同白日一樣王饒見有預備忙奮勇敵住二人劉奉倪宏的兩支兵從兩邊趁勢直抄進去還未到寨前猛地一聲號角馮異岑彭的兩支埋伏兵斜刺裏沖了出來擋住馮異大笑道老子們早就曉得你們要來送死了倪宏也不答話揮動雙鐧直取馮異馮異不慌不忙展開獨腳銅人大戰起來這裏岑彭和劉奉早就扭成一團大殺不止霎時金鼓震天喊聲動地把劉文叔等從夢中驚醒這時後寨又發喊起來原來南欒的賊將得著這個消息星夜拔寨前來接應鄧禹卻沒有料到後面有人抄來只弄得措手不及王霸連盔甲也來不及穿戴赤膊上馬舞動雙錘向後寨抵敵劉伯姬只著了一件貼身小襖攪動梨花槍飛花滾雪價地殺了出去銚期李通王梁寇恂馬武耿弇等一班武將保住劉文叔鄧禹耿況彭寵奪路便走剛出了寨門差不多有二裏之遙瞥見一將從斜刺裏沖了出來銚期慌忙上前敵住戰了二十餘合那員賊將長嘯一聲伏兵齊起霎時火光燭天四處的賊兵不知有多少翻翻騰騰地滾了上來李通馬武等分頭迎殺無奈殺了半天竟未殺出重圍賊兵愈來愈衆這時燈球火把照得雪亮那耿況一眼看見一員賊將不是別人正是吳漢他滿心歡喜催馬大叫道銚將軍與吳將軍請暫且住手我有話說銚期聽得有人喊忙住了手吳漢也住了手耿況一馬闖到垓心向吳漢拱手道子顔別來無恙否吳漢見是耿況連忙也拱手道承問明公何故到此地的耿況便趁勢將自己如何歸降劉秀劉秀爲人何等英武勢力怎樣的偉大說了一番又用旁敲側擊的話來勸解他歸降劉秀吳漢沈吟了一會對耿況道承明公指教敢不如命但是漢有老母尚在城中容回去與老母商量再來報命耿況大喜吳漢假意與銚期戰了幾合回馬敗走他將手中的槍一招那一隊兵全隨著他退去了鄧禹忙令銚期耿弇李通馬武四員大將前去助戰四人領了令飛馬前來助戰只見戰場上兵對兵將對將只殺得一天星斗慘澹無光那些賊將各自遇著勁敵正在拼命價地惡鬥不提防憑空飛出四隻猛虎似的勇將來在陣內往來衝突如入無人之境殺得血流似海屍集如山那一群賊兵只恨爹娘少生兩隻腿沒命地四散逃走王饒見勢頭不好虛晃一錘收兵退走倪宏劉奉郭左胡平各自收兵退去劉文叔等才回到大寨一一檢查共死五千多名士卒幸喜糧草輜重一點兒也沒有被他們劫去衆將中只有景丹手腕被賊將刺傷餘下毫沒有一些損傷劉文叔深自慶慰鄧禹對他說道三軍易得一將難求損失五千兵得一吳漢還是主公的洪福不表他們在這裏議論再說吳漢收兵回營一個人只是盤算著自己對自己說道吳漢吳漢憑你這樣的才幹難道終與這夥亡命之徒在一起就算長久之計了麽耿況這番話何嘗不是但是王郎雖是個亡命之徒待我總未有一分錯現在我毅然去投降劉秀未免于良心上有些過不去罷罷罷忠臣不事二主無論如何一心保王郎吧他正是自言自語的當兒王饒氣衝衝地和劉奉等一班人走進吳漢的帳篷大聲說道我早就說過今天不可去劫寨偏是你要自逞才能要去劫寨現在查過了共損失一萬五千幾百名兒郎這不是你招的麽吳漢正自不大自在聽他這番話不禁勃然大怒對王饒冷笑一聲答道誰是主將令是誰發出去的自己不認錯反來亂怪別人不是笑話麽假若今天去打個勝仗你又怎麽樣呢王饒被他這幾句搶白得暴跳如雷颼地拔出劍來剔起眼睛向吳漢說道誰來和你拌嘴今天先將你這個狗頭殺了再說吳漢更是按捺不住也拔劍站了起來大聲說道好你這狗頭想殺哪個劉奉倪宏忙過來勸住吳漢郭左胡平早將王饒的背膊扳住齊聲說道勝負軍家常事何必這樣爭長較短的呢現在劉秀未除自家先鬥了起來不怕人家笑話麽郭胡二人忙將王饒勸出帳走了倪宏劉奉說好說歹又勸吳漢一陣子才起身走了吳漢這時便將投劉秀的心十分堅決了他馬上進城到了自己的家裏先對他的母親將來意說明吳母大喜道吾兒棄暗投明爲娘固然贊成但是你的媳婦恐怕她未必肯罷吳漢道只要你老人家答應就行了她答應更好不答便將她殺了有什麽大不了呢原來吳漢的妻子就是王郎的侄女吳漢大踏步走到後面王氏見他回來連忙來迎接滿臉堆下笑來乜斜眼說道我只當你就此不回來的呢撇下了我夜裏冷冷清清一些趣味也沒有你怎麽就這樣狠心毒意呢吳漢此時哪里還有心去聽進這些話忙向她問道我有一件事特來問你不知你可肯答應嗎她笑道自家夫妻什麽事兒不肯呢吳漢便將要去投劉秀的一番話告訴她她氣得一佛出世二佛升天用手指著吳漢罵道你這負心的殺才我家哪樣待錯你吃著穿著還不算數又將我匹配與你高車大馬威風十足心裏還不知足要想去投劉秀我勸你不要胡思亂想著好得多呢吳漢也不答話冷笑一聲向她招手她見吳漢這樣只當他是要親嘴呢也就半推半就地走了過來仰起粉腮說時遲那時快只聽得喀嚓一聲她的頭早就滾落在地吳漢忙將寶劍入鞘將手上的血迹拭抹乾淨不慌不忙將她的屍首連頭捆好攜到後園往井裏一送此刻他也顧不得許多到了吳母的房裏說道母親那賤人已被我殺了我們走罷吳母聽了大吃一驚忙道你果真將她殺了嗎吳漢道誰敢哄騙你老人家吳母不禁垂淚道我與你投奔劉秀她不答應就罷了何苦又將她殺了呢吳漢陪笑道請老人家快些收拾吧已經殺了說也無用的吳母道收拾什麽這裏的東西還要麽就走罷吳漢便用綢巾將吳母拴在自己的背上掉槍上馬就走剛到了城外誰知王饒早已得著消息見他出來忙命衆兵將他團團圍住一齊大叫道反賊吳漢要想到哪里趕快留下頭來吳漢也不答應攪起長槍上護其身下護其馬與賊將大殺起來這正是驪龍豈是池中物玉鳳原非棲內禽要知後事如何且看下回分解
