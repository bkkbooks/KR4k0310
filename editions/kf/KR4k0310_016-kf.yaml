body:
  text: 第十五回兄逼弟當筵結恨甥殺舅登臺焚身卻說劉綎帶有一萬兵士個個都是強壯精悍只因山河跋涉飽受風塵十停中倒有五停鬧起病來如今所說杜將軍得了興京派兵來迎接進城去休息幾天兵士們聽了便個個喜笑顔開把兵器收藏起來身上穿著軟甲談笑歌唱著渡過江去先前來報信的二百名浙江兵士走在前面領路看看走了二十多裏路後面忽然金鼓大震一支人馬殺來正是三貝勒統領的人馬劉綎十分慌張再看那領路的浙江兵已是去得無影無蹤幸而劉綎有五百名親兵還不曾卸甲便掉轉身來列成陣勢自己拍馬當先和三貝勒廝殺無奈那建州兵馬越來越多他後面的兵士又來不及穿甲綎知道前去有一座阿布達裏岡可以駐得兵馬便傳令兵士速速後退到阿布達裏達岡上守住山頂再與敵人廝殺劉綎親自押後且戰且退看看到了阿布裏岡明兵便搶著上山去才走到山腰裏忽聽得山頂上一聲號炮響四貝勒領著一支人馬大喊衝殺下來明朝兵士手無寸鐵又是身披軟甲只見山頂上箭如驟雨打得明軍馬仰人翻那屍身填滿了山谷劉綎手下人馬折去大半這時前無去路後有追兵他便帶著人馬向西逃去前面有一座山峽雙峰對峙中間只露出一條羊腸鳥道劉綎把兵馬排成一營直線親自押後慢慢地行去才有小半人馬走出山谷忽然西南兩支人馬殺出左有大貝勒代善右有扈爾漢把明朝人馬切做兩段大貝勒親自來戰劉綎劉綎見了眼中冒火擎著大刀奮力殺去兩人在山峽下一來一往殺了五六十回合不分勝負大貝勒撇下劉綎向山峽外走去劉綎拍馬迫去卻被建州兵四下裏圍住劉綎東沖西突往來馳騁總逃不出這個圈子看看自己手下兵士被建州兵殺得只剩五六十人那箭鋒四下裏和飛蝗一般射來劉綎拿刀背撥開只是四下裏找路走忽然一支箭飛來射中馬眼那馬受痛和人一般直立起來一翻身把劉綎掀下地來建州兵一擁上前來捉他劉綎手快爭拔下佩刀自刎死了大貝勒上去割下他的首級來轉過馬頭來帶著本部兵馬向富察趕去話說代善已打聽得明海介道康應乾帶著朝鮮一萬兵士從富察南路走來那朝鮮兵都是身披紙甲頭帶柳條盔於是心生一計待到半夜時他親自帶一千騎兵各各帶著火種沖進朝鮮營去前門廝殺後門放起火來這時東南風大作那火頭撲入前營頓時燒得滿天通紅朝鮮兵士身上紙甲藤盔著了火一時脫不得身立刻燒死了一大半那燒得焦頭爛額逃出營來的都被大貝勒四下的伏兵捉住這時三貝勒四貝勒扈爾漢的兵馬都已趕到四面圍定一齊放箭從半夜殺起直殺到第二天午時那一萬兵馬不死於火便死於箭只有康應乾卻被他逃跑了這一場惡戰建州兵又擄得馬匹器械無數扈爾漢領了得勝兵士先走在路上又遇到明朝遊擊喬一琦一小隊兵馬扈爾漢和他戰一琦敗走扈爾漢追上去看看追到固拉庫崖下忽見崖上紮著一個營盤風吹著露出朝鮮的旗幟來扈爾漢心下狐疑認做喬一琦是誘敵之計便把馬頭勒住不敢前進一面遣報馬去報與大貝勒三貝勒知道不多時候那大貝勒三貝勒四貝勒帶著全部人馬趕到那朝鮮都元帥姜宏立打聽得明兵大敗便偃旗息鼓打發通事宜到建州營裏來投誠說道幫助明朝原不是我國王的本意只因從前日本兵打進我國裏來霸佔住我們城池那時多虧明朝派兵來幫助我們打退日本兵如今明朝又送文書來叫我們出軍到寬甸我們義不容辭分派一萬人馬在富察地方駐紮我們原不知道和什麽人開戰如今既是你們建州人馬我們也不敢冒犯上國況且那一萬兵士已蒙上國殺死如今我們元帥願修兩國之好立刻停戰大貝勒聽了這番話便和扈爾漢商議四貝爾便立刻有了主意打發通事官跟著來人到固拉庫崖朝鮮營裏去回話說你們既有誠意投誠便當把所有明朝人馬殺死都元帥姜宏立親自到我們營中來投降我們看天有好生之德才肯赦他的罪孽那薑宏立聽了這番話無法可想便把明朝遊擊官捉住連他的兵士都從山頂上抛下去可憐這五百多明兵個個跌得斷腰折腿腦破血流死在山下建州兵就山下割了喬一琦的首級帶著朝鮮國的都元帥和副元帥兩人回到興京去那姜宏立見了英明皇帝嚇得只是爬在地下磕頭英明皇帝叫人扶起在偏殿裏賞賜酒肉一面又備辦慶功酒席請大小從征官員在禦花園吃酒英明皇帝又在宮裏召集各妃子太子公主福晉們開一個家庭筵宴當時妃子們有富察氏覺羅氏和庶妃等太子們有次子代善三子阿拜四子湯古岱五子莽古爾泰六子塔拜七子阿巴泰八子皇太極九子巴布泰十子德格類十一子巴布海十二子阿濟格十三子賴慕布十四子多爾袞十五子多鐸十六子費揚古都團團圓圓陪著父皇坐在一桌這時英明皇帝一壁吃著酒一壁聽大貝勒三貝勒四貝勒三人輔敘戰功心中好不快樂皇帝心中最歡喜的是十四子多爾袞看他面貌又長得清秀腦子又聰明性情又和順宮中各妃子福晉們沒有一個不喜歡他的多爾袞在酒席上也和穿花蛺蝶似的跑來跑去不是在這位妃子懷裏坐一回便是在那位福晉膝前靠一回皇帝吃到高興的時候也把多爾袞拉過來摟在懷裏一手摸著他的脖子問道這幾天可拉弓嗎多爾兗忙回說這幾天天天五更起來拉弓師傅說孩兒有勁明日打算添上一個力呢皇帝微笑說道不添也好省得拉狠了乏了力父子兩人正說道話烏拉氏見他兒子得了光彩心中也說不出的歡喜忙離席出來擺著腰走到皇帝跟前笑說道陛下莫看他一個十歲的小孩子他已跟著師傅學上中國的詩了皇帝聽了伸著一個大拇指說一聲好兒子當下多爾袞要賣弄自己的才學便討來筆硯來上面先寫著西郊試箭四個字接著寫了一首七言絕句道繡旗隊隊出西林鞸箭腰弓在柳蔭衆裏一支飛電過准能巧射比穿針他略加思索地寫成了詩忙捧著去獻給父皇英明皇帝接紙在手哈哈大笑說道你父親枉做了一朝天子這中國字我卻一個不認識好孩子你快譯給我聽聽多爾袞便把詩裏的意思仔仔細細地譯了出來滿殿的人聽了說好這時獨有富察氏見烏拉氏太得意了心中酸溜溜的有說不出的一種難受便悄悄地向自己兩個兒子丟了一個眼色那莽古爾泰因父親封他做了三貝勒心中感激父親卻不敢十分放肆獨有德格類因父皇不肯封他貝勒心中久懷怨恨如今見有母親壯他的膽便想借此出出氣但是一個人也不敢說話他一向知道四貝勒皇太極是不滿意多爾袞的便暗暗去拉著四貝勒的袖子向他擠擠眼皇太極心下明白講到皇太極是太妃的兒子又是一身好武藝面貌也長得英俊但是總比不上多爾袞長得秀美因此宮裏的妃子總是喜歡多爾袞的多皇太極這一點醋氣也捺在肚子裏長久了如今見他大要過面子去便不覺心中勃然大怒明仗著自己新有戰功父皇決不奈何他的當下他便在鼻管中冷笑一聲說道這些都是書呆子鬧著玩的事情我大金國以馬上得天下我們現在用不著這個這幾句話雖然說得正大光明但是聽在英明皇帝耳朵裏明明知道他弟兄兩人在那裏吃醋心想這弟兄嫉妒不是好事體很想說幾句話責備他無奈這皇太極也是自己十分寵愛的文武百官又都和他好他新近又立了戰功便不好意思去說他誰知這裏皇太極才說完話那邊德格類又發話了他冷笑著說道這些句子聽在耳阿裏怪熟的我師父也曾教我過莫不是在什麽書上直抄下來哄著父皇的嗎這多爾袞到底是小孩子聽兩個哥哥這樣奚落他便把小嘴兒一扁哇的一聲哭了烏拉氏忙上來拉過去英明皇帝氣得雙眉倒豎喝著德格類說道你弟兄兩人欺侮他年紀小這一點點小過節兒便氣他不過將來會怎麽呢一句話罵得滿殿的太子啞口無言英明皇帝便傳旨把德格類逐出宮去從此不奉宣召不得進宮旁的太子也覺得臉上沒有光彩怏怏地退出宮來獨有皇太極心中不服卻暗暗地在外面買服文武百官結黨營私這且不在話下卻說明經略使楊鎬在瀋陽城中一次一次得到三路兵隊全軍覆沒的報告嚇得他神魂顛倒手足無措他一面寫奏章報與神宗皇帝一面立刻傳出軍令去令清河城一路總兵李如柏的軍隊趕速退回瀋陽保護城池這薩爾滸山戰役明朝共陣亡兵士八萬八千五百九十余名將領陣亡三百十餘名燒死朝鮮兵士一萬余名楊鎬這時心中最挂念的是他盟弟劉綎的屍首便派了五十名兵士悄悄地到阿布達裏岡下去覓得劉將軍的屍道來用香木雕刻一個人頭裝在死人的頸子上又買了一具上等棺木把他裝下了親自送回北京去劉綎的妻子見了丈夫的棺木哭得死去活來虧得楊夫人和她好打疊起千言萬語安慰她從此劉綎的兒子便在楊府中養大楊夫人便把女兒許配給劉公子兩家便在了眷屬劉夫人也得一個靠傍明朝自從吃了這個大虧便牢守關隘不敢問關外的事那建州皇帝便趁此機會取了開源城又打破鐵嶺城打敗蒙古喀爾喀的軍隊活捉酋長宰賽扈爾漢又對英明皇帝說那葉赫部主從前賴我婚姻如今又幫助明朝前來攻我這個仇恨不可不報願陛下下令征之英明皇帝說道朕並非忘葉赫之仇只因那葉赫部主和我四貝勒有甥舅的名分如今出兵打他怕于親戚面上不好看這時大貝勒站在一旁跳起來說道從來說的大義滅親俺們要成大事的人顧慮不得這許多英明皇帝聽了點點頭說道這個話卻也不錯四貝勒便向父皇求得先鋒元帥帶一萬人馬先行英明皇帝親自帶了二萬人馬隨後行去諸貝勒大臣也隨營聽用卻說那葉赫部主弟兄兩人一名金台石住在東城一名布揚古住在西城他弟兄兩人自從明兵大敗以後便帶著兵馬逃回本部刻刻防備建州兵來攻打他到這時建州兵果然來了英明皇帝親自攻打東城卻令貝勒攻打西城英明皇帝攻到第三天上打破了東城的外郭心中還念郎舅之情便令兵士大呼道金台石快快出降饒爾一死那金台石站在城樓上說道努爾哈齊你莫說這個話我不是明朝人可比我和你在滿洲地方一般是雄主豈肯束手歸順與其降汝毋寧戰死也說罷城上飛石滾木一齊下來打得建州兵頭破血流倒在地下死去的卻也不少英明皇帝看著大怒自己搖著令箭拍馬跳上去後面軍士張著藤牌冒死猛攻大喊一聲城牆坍了建州兵一齊搶進城來葉赫兵在城裏還是拼死抵敵金台石一手拉著他的福晉一手抱著他的小兒子在高臺上躲避建州兵四下裏把高臺圍住口中連喊道金台石快快投降金台石在上面說道你家四貝勒是我的外甥若要我降請你四貝勒上臺來一見我便下臺投降當下英明皇帝聽了便約退兵馬一箭之地又差人到西城去把四貝勒皇太極喚來那四貝勒到了台下口稱舅父金台石招手喚四貝勒上臺去四貝勒正要上去一個侍衛站在一旁冷眼看出金台石的臉上霹出兇惡的神氣忙去向四貝勒耳旁悄悄地說道貝勒莫上去可看見他臉上的神氣麽他心中一定不懷好意呢四貝勒給他一句話點醒了忙站住了一面對他舅父說道我已在此舅父快快下臺來金台石冷笑說道你既不肯上來我也不曾和你見過面你是不是我那真的外甥叫我也難信我如何肯輕易下臺來呢這時大臣費東英額駙達爾哈在一旁大聲喝道你看平常人裏面可有像我四貝勒這樣英俊魁武的人嗎你下來便下來不下來時我們便放火燒台了金台石又說道我兒子德爾格勒聽說他受傷在家你何不喚他來俺父子見一見面再商量下臺的事停了一會德爾格勒上臺來見了他父親說道事到如今守住在臺上也無用了俺父子兩人快快下臺去見了英明皇帝或者他看在親戚面上饒恕我們也未可知金台石聽兒子勸他投降不覺大怒拔下佩刀來向他兒子砍去他福晉見了忙上去抱住了德爾格勒看他父親不肯投降只得抹著眼淚走下臺來他福晉見丈夫固執不肯下臺便也抱著幼子走下臺去他母子三人走到英明皇帝跟前磕著頭大哭起來英明皇帝用好話勸慰著又賞他母子酒飯叫四貝勒陪著一塊兒吃說道他是你的哥哥弟弟和舅母從此以後你須好眼相看費英東看著金台石到底不肯下臺便喝聲殺上去建州兵便一齊拿起斧子砍那臺柱子金台石在臺上放起一把火來頓時轟轟烈烈燒得滿台通紅建州兵在四下圍著看著那台燒到一半便震天價一聲響亮台腳坍了金台石還不曾燒死從臺上直翻下來建州兵上去捉住了拿繩子把他活活勒死報與英明皇帝那裏聖旨下來了好好地棺斂埋葬這時西城正被建州兵圍得緊急布揚古聽說東城已破心中十分害怕和他兄弟布林杭古商量投降又怕建州皇帝不准他母親聽得了便說待我先出城去和大貝勒說妥了你弟兄再投降未遲當下他母親出城來見大貝勒大貝勒見他外祖母來了便迎接進帳十分恭敬他外祖母說你兩個舅舅極願投降又怕你父皇不許特求俺來問你大貝勒聽了立刻拿起桌上一杯酒來喝下半杯剩下的半杯叫人送去給布揚古吃下拍著胸脯說道我外甥保舅舅的性命如何布揚古吃下半杯酒吩咐開城把大貝勒迎進城來擺上酒席他兩人對酌起來說起親戚的情分布揚古不住掉下眼淚來大貝勒一面催促他快投降去布揚古便站起身來走到後院去和他妻子告別那福晉拉著布揚古的手哭著說道聽說金台石已被建州兵逼死丈夫此去須得處處小心那努爾哈齊十分陰險怕他不懷好意布揚古便揮淚而別走到前院和他弟弟布林杭古一同跟著大貝勒到大營裏去見英明皇帝布揚古肚子裏記得他妻子囑咐的兩句話刻刻提防他跨著馬走到營門口不見有人出來迎接心下便懷疑起來勒定了馬不敢下來大貝勒見了忙搶上前來拉住他的馬繮說道你不是一個好漢話既說定還有什麽疑心呢布揚古勉強下得馬來走進帳去見英明皇帝鐵板著臉兒坐在上面兩旁站著許多侍衛各挂上腰刀眼睜睜地看定他靜悄悄的真是威風凜凜殺氣騰騰布揚古心裏越來害怕便屈著一條腿跪下去心想他們倘要殺我我一條腿不曾跪下也可以逃得快些半晌隻聽得上面吩咐賞酒便有侍衛捧著金酒杯滿滿地盛著一杯酒送到布揚古面前布揚古看了這一杯酒心頭止不住亂跳起來他心想這一定是一杯毒酒我可不能吃的他便接過酒來送到唇邊去一手擎起袖子來遮住悄悄地把一杯酒倒在地下也不拜謝也不磕頭便站了起來只聽得英明皇帝冷笑一聲吩咐大貝勒說道領你舅舅回西城去布揚古布林杭古兩人急急退了出來回到西城去那布揚古的福晉正盼望著見丈夫平安回來便笑逐顔開夫妻兩人在內院重整筵席淺斟低酌起來吃到更深時候便雙雙攜手入幃上炕做他的好夢去正甜蜜的時候忽然窗戶外面跳進兩個大漢來手拿一條粗繩上來套住布揚古的頸子見聽得布揚古大喊一聲可憐活活的勒死了他福晉從睡夢中驚醒過來見了這情形哭得死去活來這時布揚古手下的侍衛已走得乾乾淨淨還有誰來理會他呢那兩個大漢看看人已死了便一縱身跳出窗檻去了原來這兩個大漢是英明皇帝差遣來的他見布揚古那種桀騖不馴的樣子怕他還有反意因此打發這兩個刺客來勒死了他爲斬草除根之計那布林杭古和大貝勒有郎舅之親便饒恕了他這時葉赫全部都投降了建州英明皇帝在東城住了三天便班師回國去人馬趕到半路忽然探馬來報說前面有一小隊兵馬打著蒙古旗號攔住去路還有一位將軍口口聲聲說奉了林丹汗之命捧有國書在此要見你建州皇帝英明皇帝聽了心想蒙古是西北大國林丹汗又是蒙古王部的盟主今既有使臣到來不可怠慢了他忙吩咐紮住人馬傳來使進帳當下見營門外走進一個大將來手捧國書口稱林丹汗使臣康喀爾拜虎請英明皇帝安說著行下禮層這時大貝勒四貝勒都站在一旁四貝勒過去接過國書來送與他父皇打開國書看時見上面寫道統四十萬蒙古國主巴圖魯成吉思汗問水濱三萬人滿洲國主英明皇帝安寧無恙耶明與吾兩國仇敵也聞自戊午年來汝數苦明國今年夏我已親往明之廣寧招撫其城收其貢賦倘汝兵往廣寧吾將牽制汝吾二人非有釁端也但以吾已服之城爲汝所得吾名安在若不從吾言則我二人是非天必鑒之先是二國使者常相往來因汝使臣謂不以禮相遇構吾兩人遂不復聘問如以吾言爲是汝其令前使來複至我國英明皇帝看了國書一言不發便把國書遞給大貝勒許多貝勒和大臣一齊圍上來一邊看著一邊連說豈有此理就中四貝勒忍耐不住搶上前去一把揪住了那拜虎拔下佩刀來要割去他的鼻子英明皇帝見了忙搖著手止住他一面喚人把拜虎領出去拿酒肉好好看等一面在帳中召集了一班貝勒大臣商量回答國書的事件有的說把拜虎殺了莫去理他有的說把蒙古營裏的兵都捉來割去耳朵放他回去也叫他們知道我們的厲害英明皇帝聽了連連搖著頭說不妥不妥這時十四皇子多爾袞年紀雖小也跟著他父親在營帳裏當下他卻站起來說道蒙古有兵四十萬我們如今正要奪明朝的天下何妨暫時利用蒙古的兵力和他結盟合力攻打明朝得了明朝的天下那時我們路近他們路遠不怕明朝的天下不歸我們掌握多爾兗說到這裏英明皇帝拍著他的頸子說道小孩子主意倒不差到了第二天把拜虎宣進帳來便拿兩國結盟合力攻打明朝的話對他說了拜虎連聲說好好當下便斬倒一頭白馬一頭烏牛對天立誓道今滿洲八旗執政貝勒與蒙古國王部落執政貝勒蒙天地眷佑俾合謀並力與明修怨如其與明釋舊憾結和好亦心合謀然後許之若滿洲渝盟不偕喀爾喀貝勒合謀先與明和好皇天後土其降之罰若明欲與喀爾喀貝勒和好密遣離間貝勒等不以其言告我滿洲英明皇帝者皇天後土亦降之罰吾二國同踐盟言天地佑之其飲是酒食是肉二國執政貝勒尚克永命子孫百世及千萬年二國如一共用太平要知蒙古和滿洲兩國如何合力攻打明朝且聽下回分解
