body:
  text: 第一百二回扉上指聲芳心惕惕窗前足影醋火熊熊話說陸曾見他那裏用刀撬門心中暗想道他到她這裏准是轉什麽念頭的了但又帶著刀來做什麽呢莫非與她有什麽仇恨麽且不管他在這裏但看他怎麽樣他打定了主意身子往後樓的板壁旁邊一掩悄悄地看他的動靜他此刻已經將門撬開大踏步走了進去只見房裏的燈光還未熄去繡幕深沈靜悄悄地只聽得有鼻息之聲他輕輕地溜到她的床前那一陣子的蘭麝香氣從帳子裏面直發了出來使人聞著不禁魂銷魄蕩不能自持盛方此時恍若登仙用手輕輕地將帳子一揭只見壽娥面朝床外正自香息微呼好夢方濃左邊一隻手露在虎皮被的外面墊著香腮那一種可憐可愛的狀況任你是魯男子柳下惠複生也要道我見猶憐誰能遣此哩何況盛方是個好色之徒不消說身子早酥了半截不知怎的才好心中一忙手裏的刀不知不覺的嗆啷一聲丟落在地板上他大吃一驚忙要蹲身去拾刀瞥見她星眸乍閃伸出一雙玉手將眼睛揉了一揉瞥見他立在床前不禁一嚇霍的坐了起來厲聲問道盛方你半夜三更的到奴家的繡房裏來做什麽的識風頭快些兒下去不要慪得我氣起馬上聲張起來看你往哪里逃盛方笑嘻嘻地說道小姐我實在等不及了今天無論如何都要小姐可憐我一片真誠了卻我的夙願我就感激不盡了遲早你總是我的夫人何必定挨到那時做什麽呢他說罷虎撲羊羔似地過來將她往懷中一抱她抵死撐著說道盛方你敢是瘋了嗎誰是你的夫人呢你不要做夢罷從前我不過是被你逼得沒法給個榧子你吃吃想你改過的誰想你這匹夫賊心未改竟敢闖到我的樓上用強迫的手段來對我須知你愈是這樣奴家越是不遂你的獸欲看你這匹夫怎樣我便了盛方聽她這些話只當春風過耳仗著一身蠻力將她按下伸手便去給她解去下衣她急得滿面通紅拼命價地喊道強盜強盜盛方忙伸手堵住她的嘴一面自己忙著解衣陸曾在門外看到這會將那股無名的業火高舉三千丈按捺不下一個箭步跳進房去大聲喝道該死的奴才膽敢在這裏做這樣欺天滅主的事情可知我陸曾的厲害麽盛方聽到陸曾兩個字嚇得倒抽一口冷氣連忙預備下床逃命說時遲那時快後領頭被陸曾一把抓住撲地摜下床去摔得他眼花肉跳發昏章第十一跟著又被一腳踏在小腹之上陸曾喝道你這個奴才主人待你哪樣薄竟敢幹出這樣的事來盛方被他踏著小腹深恐他一著力肚子裏貨色就要搬家了動也不敢動見他說話不禁計上心來口中說道小人知罪求陸將軍饒我初犯下次再也不敢了陸曾正要答話冷不提防他一個鯉魚跌子將右腿一屈左腿一撓直向陸曾的左肋踢來好個陸曾手明眼快趕緊使了一個水底撈月的勢子將他左腿抓住隨手取出單刀指著他冷笑道頗耐你這個狗頭還敢在老爺的面前弄鬼麽你如果再動一下子登時請你到外婆家去了盛方此時明知難以活命便潑口對壽娥罵道我恨你這個賤人見新忘舊我盛方雖然死了也要追你的魂靈總不得讓你這個賤人在這裏快活的陸曾聽到這話倒弄得丈二和尚摸頭不著便厲聲說道你這個刁惡的奴才自己做下這喪心病狂的事情還兀的不肯認錯麽他大聲說道姓陸的我和你也是前世的冤家現在也用不著在這裏多羅唆了請你趕快結果了我到來世我們再見就是了陸曾聽到這話更是莫名其妙便向他喊道盛方據你這樣說敢是我和你作對錯了麽他冷笑一聲道誰說你錯的要殺便殺不要提東畫西的我盛方死後都不能讓你們兩個人在一起快活就是了陸曾聽他這話心中才明白過來不禁勃然大怒道好雜種你將咱老子當著什麽人不給個厲害你還要信口亂咬呢他說罷用刀向他的大腿上一連搠了兩下子好個厲害的盛方連哼未曾哼一聲咬緊牙關向他說道姓陸的是英雄漢子就將俺一刀丟了不要用小錢俺盛方是捨得的陸曾冷笑一聲道那樣一刀請你回去到便宜你這個奴才了他們正在鬧得不可開交的當兒壽娥從床上一骨碌起來飛奔下樓去報信了不多一時衆家將聽說她的樓上有賊一個個擎著兵刃趕上樓來童老太太扶著丫頭也跟上樓來衆家將見被陸曾捉住的不是別人卻正是盛方大家不禁吃了一驚面面相覷不知道究竟是一回什麽事只聽得盛方向他們大家說道我盛方死了千萬請諸位要替我伸冤報仇我就是在九泉之下也就瞑目了他說罷衆家將一齊向陸曾責問道盛方犯的是什麽法你就將他捉住了腿上搠的這樣陸曾見衆人問話便答道諸位休問我陸曾也是寄人籬下常言道吃主子的飯救主子難如果無緣無故我陸曾也不是發瘋病的就來戕害同伴了的他說完這話衆家將齊聲說道他究竟是犯了什麽罪你也該宣佈出來不能含含糊糊的就置他於死地說罷一個個的怒目相向拔刀在手大有一觸即發之勢這時猛聽得外面發著顫巍巍的聲音罵道盛方你這個奴才我哪樣怠慢你的竟敢做這些禽獸的事情說著大家回頭一看不是別人正是童老太太和壽娥等一大群子人走了進來衆人聽她這話又見壽娥滿臉怒氣裏眸含淚大家就料瞧著五分了她們走到盛方的面前壽娥纖手一指潑開櫻口罵道你這個匹夫三番兩次在我面前鬼頭鬼腦的我總沒有去理你全指望你改過自新的不想你這匹夫油蒙了心膽大包天竟闖到我的臥室裏來要不是陸將軍她說到這裏卻哽哽咽咽地哭將起來童老太太更氣得一佛出世二佛升天喘吁吁地對陸曾說道陸將軍趕快給我將這個匹夫結果了她說罷衆家將一齊跪下來央求道求太太從寬發落他雖然一時之錯還求太太念他前功才是童老太太聽了這話更加生氣便道好好好眼見你們這些匹夫都是互通聲氣的顯系想來謀奪我們孤兒寡婦的財産罷了童老太太說罷禁不住雙目流淚鳴嗚啕啕地哭將起來衆人見老太太動氣誰也不敢再開口了陸曾對她說道請太太暫且息怒容我一言童老太太拭淚問道陸將軍有什麽見教請講罷他道這盛方的罪惡論理殺之不足以償其辜但是上天有好生之德還望太太稍存側隱之心暫將他的雙眼挖去使他成個廢人就是了他說罷太太含淚說道老身昏邁謀事不能裁奪幸得將軍垂憐孤寡遇事莫不重施恩澤先夫在九泉之下也要盛激將軍盛德的今天的事隨將軍怎麽辦我無不贊成就是了陸曾也不答話用刀向盛方的右眼一挖霎時眼珠和眼眶宣告脫離了隨手又將左邊眼挖了下來登時血流滿面陸曾在身邊取出一包金瘡藥替他敷上就命人將他擡到後面的一間空房子裏面日給三頓豢養著他一個廢人這樣一來衆家將沒有一個不提心吊膽一絲也不敢有軌外的行動了陸曾到了第二天吃過午飯的時候正要去睡中覺剛剛走到大廳的東耳房廊下迎面碰見了吳古便笑問道大哥你飯吃過了沒有吳古道吃過了你此刻到哪里去他笑道因爲夜來被那個狗頭鬧得一夜沒有睡現在精神疲倦正想去睡覺去吳古笑道且慢去睡我有兩句話要問你陸曾忙道什麽話吳古道昨天夜裏究竟是爲著一回什麽事情呢他笑道你真呆極了這事還未明白麽他搖頭道不曉得是什麽一回事呢陸曾笑道那個盛方卻也太沒有天良了吃人家的俸祿還懷著野心去想壽娥的心事昨夜便到她那裏去想用一個強迫的手段不料碰著我了這也許是他晦氣罷了吳古聽他這話不禁將屁股一拍笑道兄弟我真佩服你遇事都比我來得機警他笑道還說呢不是有個緣故我夜來也不會知道的吳古笑道什麽緣故你敢是也想去轉她的念頭的麽陸曾聽他這話不禁面紅過耳忙道呸還虧你是我的哥哥呢這句話就像你說的麽他笑道那是笑話兄弟你千萬莫要認真究竟是爲什麽緣故呢他道昨天我們在後園裏指導他們武藝的時候有個破綻你看出沒有他俯首沈吟了一會子道我曉得了莫非就是那個盛方用冷刀想刺你的不成陸曾笑道正是啊吳古道我倒不明白我們究竟和他們有什麽仇恨呢陸曾道你哪里知道他們見我們在這裏眼睛裏早起了浮雲了估量著一定是嫉妒生恨所以我昨天受了那次驚嚇夜裏就步步留神在床上再也睡不著到了三鼓的時候就見他提刀上樓去了還有一個笑話那個狗頭自己存心不良倒不要說還要血口噴人疑心生暗鬼的誣別人有不端的行爲你道好笑麽吳古笑道他誣誰的陸曾道我細聽他的口氣竟像我奪了他的愛一樣這不是以小人之心度君子之腹麽吳古道凡事都不能過急急則生變譬如一隻狗你要是打它一兩下子它還不致就來回頭咬你的你如果關起門來一定要將它打死它卻不得不回頭咬你了陸曾道可不是麽現在的人心真是非常地靠不住就像盛方這一流人物還不是養虎成害麽吳古歎了一口氣然後說道兄弟你的脾氣未免也忒拘直了就像這個事情不獨與你毫無利益而且和這起奴才彰明較著的做對了要是被外人知道還說你越俎代皰呢而且那起奴才誰不與盛方是多年的老夥伴呢你如今將他的眼睛挖去他們難免沒有兔死狐悲之歎勢必不能輕輕地就算了面上卻不敢有什麽舉動暗地裏怎能不想法子來報復呢天有不測風雲人有暫時的禍福萬一上了他們的當你想還值得麽他這番話說得陸曾半晌無言停了一會才答道我何嘗不曉得呢可是情不自禁見了這些事情不由得就要橫加干涉了但是他們這些死囚不生心便罷萬一再有什麽破綻被我們看了出來爽性殺他一個乾淨救人救到底免得叫她們母女受罪吳古道你可錯極了人衆我寡動起手來說不定就是必勝的陸曾笑道這幾個毛鬼虧你過慮得厲害輪到我的手裏一百個送他九十九還有一個做好事吳古將頭搖得撥浪鼓似地說道不要說明槍易躲暗箭難防在我看這裏斷非你我久居之處孤兒寡婦最易受人的鼓弄而且我們是堂堂的奇男子大丈夫到了沒趣的時候再走未免名譽上要大大地損失了陸曾道這個也不能我們不答應人家便罷既答應替人家照應門戶憑空就走不叫人家寒心唾駡麽而且人家待我們還不算仁至義盡嗎我們撒手一走那一起奴才沒有懼怕還不任意欺侮她母女兩個麽總而言之我行我素人雖不知天自曉得既錯於前不該承認人家應不悔於後我們有始有終替人家維持下去就是了吳古也沒有什麽話說了只得對他道兄弟你的話原屬不錯但是我們向後都要十分小心才好呢陸曾說道無須兄長交代兄弟自理會得說罷轉身回房去睡午覺了再說壽娥見陸曾奮勇將盛方捉住挖去眼睛自是不勝歡喜把愛陸曾的熱度不知不覺地又高了一百尺心中早已打定主意除了陸曾憑他是誰也不嫁了她命丫頭將樓上的血迹打掃乾淨燒起一爐妙香她斜倚熏籠心中不住地顛倒著陸曾何等的勇敢何等的誠實何等的漂亮那心裏好像紡車一般轉個不住暗道我看他也不是個無情的人物不要講別的單說盛賊到我這裏來只有他留心來救我畢竟他的心中一定是愛我了她想到這裏不禁眉飛色舞一寸芳心中不知道包藏著多少快樂呢她想了一會猛地自己對自己說道你且慢歡喜著我與他雖然是同有這個意思但是還有我的娘不知道她老人家做美不做美呢如果她沒有這樣的意思卻又怎麽樣呢她說到這裏柳眉鎖起不禁歎了一口氣默默的半天忽然轉過念頭說道我也太愚了我們娘不過就生我一個人什麽事情對我全是百依百順的而且又很歡喜他的這事只要我一開口對她說還怕她不答應麽她想到這裏不禁躊躇滿志別的願望也沒有了只望早日成就了大事了她的心願就是了這時有一個小丫頭上來對她說道小姐太太請你下去用晚飯呢她便答應了一聲道曉得了你先下去我就來了那小丫頭下樓去了她對著妝台晚妝了一會子便婷婷嫋嫋地走下樓來到了陸曾的房門口故意慢了一步閃開星眼向裏面一瞟只見陸曾在床上酣睡未醒那一副惹人憐愛的面孔直使她的芳體酥了半截險些兒軟癱下來那一顆芳心不禁突突地跳個不住恨不得跑進去與他立刻成就了好事才好呢這時候突然有個小丫頭跑來對她說道太太等你好久了還在這裏做什麽呢她連忙隨著小丫頭到了暖套房裏胡亂用了些晚飯此刻雖有山珍海味也無心去領略滋味了一會子晚飯吃過她便忙不叠地回樓走到陸曾的房門口只見他正起身坐在床前只是發愣她見了不由得開口問道陸將軍用了晚飯不曾他道還未有用呢多承小姐記念著她聽了這兩句話也不好再問只得回樓去了不多時夜闌人靜大約在三鼓左右她在榻上輾轉反側再也睡不著眼睛一閉就看見一個很英俊的陸曾站在她的面前她越想越不能耐竟披衣下床輕輕地開了房門下樓而來到了他的房門口只見房門已經緊緊閉起房裏的燭光尚未熄去她從門隙中窺去只見陸曾手裏拿著一本書正在燭光之下在那裏看呢她見了他不知不覺地那一顆芳心不禁又突突地跳了起來呼吸同時也緊張起來便輕輕皓腕在門上輕輕地彈了兩下子陸曾聽見有人敲門便問道誰呀她輕輕答道我呀陸曾又問道你究竟是誰呀她答道我呀我是陸曾聽著好生疑惑便站起來將門開了見是她不禁吃驚不小忙問道小姐現在快到三鼓了你還沒有睡麽她見問先向他瞟了一眼然後嫣然一笑也未答話陸曾見她這樣便知來路不正便問道小姐你此刻到我這裏來有什麽事情嗎她掩口笑道長夜如年寒衾獨擁太無生趣憐君寂寞特來相伴陸曾聽到這話正色答道男女授受不親小姐既爲閨閣名嬡陸某亦非登徒之輩暗室虧心神目如電勸小姐趕緊回去切勿圖片時歡樂損失你我終身名節要緊他說到這裏猛聽得一陣足步聲音從窗前經過霎時到了門口原來是一班守夜的家將正從後面走來瞥見陸曾和她在房裏談話一個個怒從心上起惡向膽邊生一齊圓睜二目向房裏盯著這正是惡風吹散夫妻穗暴雨摧殘並蒂花要知後事如何且看下回分解
