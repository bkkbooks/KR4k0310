body:
  text: 第八十三回軟語訴樽前柔情款款驪歌聞道上行色匆匆話說富平見林英等扛了一隻極大的斑豹吆吆喝喝地走進村來心中大喜忙迎了上去滿口誇讚林將軍是神人誰也想不到竟能將這畜生結果了林英搖頭說道僥倖僥倖險一些兒將性命送掉了說著和衆人進了富平家林英渾身發軟已經不能動彈而且雙膊又擦傷了富平忙吩咐家人將他扶到一間靜室裏息下那些打獵的聽說林胡二人將山豹打死誰也不肯相信一窩蜂擁到富平的家裏一進門瞥見一隻極大斑豹睡在階前嚇得衆人倒退數步胡明帶笑喊道提防著這豹還沒有斷氣呢衆人聽了這話嚇得連忙回身要走富平笑道用不著怕得什麽似的這是死豹呀衆人聽說是死豹大家滿面羞慚重新擁了近來仔細一看只見那豹的項下露出碗口大的一個窟窿忙問了究竟衆人伸舌搖頭你驚我詫有兩個說道我早就知道胡林兩位將軍定是兩位大英雄大豪傑了還有的說道我早已說過人家既然能誇下大口必然是有一種驚人的本領呢大家正在這擾亂的當兒有一個小廝走進來報道外面有個乞丐要見員外他自說能夠去捉毒蛇富平忙道快請進來那個家丁忙出來不一會帶進一個人來滿臉麻子右邊一隻眼已經瞎了頭上紮一塊舊布滿頸的瘰癘上身穿一件破爛不堪的襖子下面穿一條犢鼻褲百孔千洞橫一塊豎一塊的補釘一雙爛冬瓜似的腿上滿發著惡瘡那一股腥臭氣直沖進來衆人嗅著這股異味不約而同地一齊泛了一個噁心睜眼看時只見他一顛一簸的提著一隻大竹籃走了進來富平忙上去恭而有敬地雙手一拱開口問道吾兄下降小弟有失遠望望乞恕罪那異丐略點點首富平又問道敢請教老兄尊姓大名仙鄉何處那個乞丐搖頭說道承你問我自己不知姓什麽叫什麽名字更不知生在何處還記得我在關西的時候人家叫我異丐我想大約就是這個名字罷衆人見他這個樣子誰也要掩口失笑富平向他瞅了一眼又向那異丐說道老兄下降不知道還肯助兄弟一臂之力麽異丐點頭笑道那是自然的我不來便罷既來當然是要動手的富平道不知老兄需用什麽兵器小弟好去預備那異丐搖頭說道需不著我自有東西去克服這孽障富平忙命人擺酒一會子酒席擺下便請異丐入席富平和胡明等接著一齊入了座那異丐毫不客氣拖湯帶水地滿口大嚼甚至還用一雙黑笊篙似的手來做代表吃得不亦樂乎在座的幾個人見他一雙尊手到碗裏來一撈誰也不敢再去動箸了他見衆人不動手索性往凳上一蹲捧著大碗啅啅啯啯地一掃而空忙對富平道快點拿飯來吃飽了好去動手富平連聲答應忙呼家丁去盛飯他接著一碗飯風卷殘雲似地三口兩口就吃完了忙又嚷著添飯那幾個家丁往來不停地替他添飯像煞走馬燈一樣不多時吃得碗空鍋空才放下碗拍著肚皮對富平謝道我還是舊年在關西一家人吃了一個飽一直至今還未曾吃過一個飽肚皮今天多蒙老兄賞賜我吃一頓此刻天已大亮便好去動手了富平問道可需人隨老兄一同去異丐搖手道需不著需不著他們膽小恐怕要嚇殺胡明倒有些不佩服一定要去還有幾個膽大的也要跟去一觀究竟那異丐點頭笑道你們既然一定要去我也不必十分阻止但是既然跟我去看須要聽我吩咐才准你們隨我一同去呢衆人忙答應道那個當然異丐問道一共有幾個隨我同去呢胡明一點答道十個異丐道可以就隨我一同動身吧胡明和衆人各懷利器跟著那異丐出了村口進了山道誰知那個異丐上了山健步如飛輕如禽鳥衆獵戶和胡明暗暗詫異直走了半天那異丐回頭向衆獵戶道此地離嶙剛洞還有多少路衆獵戶齊聲答道大約還有半裏之遙那異丐對他們說道你們卻不能再向前進了再進卻要中毒的衆人忙停住腳步那異丐在竹籃裏取出檳榔般大小的一把紅石頭來每人給了一塊說道你們將這塊石頭含在嘴裏就不會中毒的了你是要看得清楚趕緊爬上樹去如果那孽畜來了切不可聲張我自然有法子去治它衆人點頭應允一齊爬上樹去靜悄悄候著只見那個異丐在竹籃裏搬出一塊大的紅石頭安放在山路當中他就地一連發了幾聲啯啯啯他便穿雲閃電價地爬了上樹不多時一陣腥風撲面而來腥風過去閃出一條錦鱗大蟒那一顆癩花頭足有十鬥來粗細刺刺刺地竄到這紅石頭面前閃著眼睛吐出舌尖便來舐吮舐吮了多時一口便將這塊石頭吞了下去霎時只見它渾身亂戰翻身打滾盤起放開攪了一陣路旁的亂草被它滾得光溜溜的攪到分際一伸腰直條條地僵斃了異丐在樹上拍掌大笑道好孽障我什麽地方都尋遍了不想你竟在這裏害人他說罷縱身落地走到那條大蟒跟前在竹籃裏取出一把牛耳刀來將那大蟒的雙眼挖下來又到肚子旁挖了一個窟窿不知他又取出些什麽東西來放在籃裏向衆人招手說道你們下來吧衆人看到這時一個個驚得呆了見他招手才敢下來都走到異丐的身旁一齊問他道方才那塊紅石頭究竟是什麽東西那樣的厲害他笑道你們哪里知道我爲了這個孽畜不知費了多少心血今天才得成功那塊石頭是從我的師兄那裏借來的名叫石雄膽沒有它永遠除不了這孽畜我在昆侖山已經看見過它一次了不過那時我因爲沒有石雄膽才未去和它爲難我們師兄借了這石雄膽給我我的師父又執意命我來滅這孽畜我又推辭不下所以才來將它殲滅的胡明忙將含在嘴裏一塊小紅石頭取出來對他笑道照你說這個差不多也是石雄膽了他點頭笑說道正是這個可是我需不著了送給你們罷我此刻要去了你們回去取些火種來將它燒化了吧這蟒叫什麽比鱗兒乃是蛇類中最毒的一種只有眼睛和膽有用處別樣沒有什麽用處了你們可取些乾柴來偎著它燒了罷此刻恕我不陪了他說罷便飛步地走了胡明便和衆人忙回到甯白村將以上的事說了一遍富平驚喜交集忙命人扛了些乾柴引火之物前去將毒蟒的屍身燒化不提再說富平家裏有位小姐名叫淑兒年方二九長得花容月貌渾身的武藝馬上馬下十八般兵器運動如飛此番她的兄弟被大豹吃了她又悲又憤三番兩次要去擒大豹給兄弟報仇俱被富平攔住不准她無奈只得暫且隱忍可是雖然二九年華卻未有個如意郎君富平每每見有人來作伐曉得她生性高傲便命她自己去選擇她一選擇了三四年終未有一個合意的人家她就此耽擱下來高不成低不就要想她做女人非要先和她比試三合起初倒有個小後生會幾手拳腳的癩狗想吃天鵝肉來和她比試不上三合俱被她打得一佛出世二佛升天的回去因此富淑兒的威名遠近皆知還有幾個望梅止渴的朋友見她這樣的厲害只得將念頭打斷了所以連說媒的也不見一個上門昨天聽說漢家大將林胡二位要去擒獸捉蛇她的一寸芳心不禁一動暗想道久聞天朝的人物十分英武這林胡二位究竟不知是個什麽樣的一個人她急於要一見無奈自己又是個女孩子家不便擅自出閨門惹得人家瞧不起十分納悶到了晚上夜飯也懶得去吃一個人獨坐香閨手托粉腮不住地出神亂想暗道如果這兩個之內果真有一個才貌雙全武藝卓絕將奴家託付於他豈不是好她想了多時不禁紅暈雙頰芳心突突地亂跳個不住停了一會瞥見一個小丫頭跑了進來向她說道姑娘你可知道現在外面有兩個東方上國來的人他們說是今晚去捉山貓呢這兩句話正打動她的心事忙向她說道你可看見那兩個人的那小丫頭答道怎麽沒有看見呢她又問道是什麽樣子的呢那小丫頭答道他們一共來了三個人一個有鬍子的聽人說他是個文的不會動手一個黑面孔比西村老杜喬還要高一尺說出話來和銅鍾一樣還有一個卻與這個大漢是兩樣生得唇紅齒白眼似明星眉如漆刷生得十分儒雅和小主人一樣比較起來恐怕小主人還要不及他呢她芳心早有了主見便一揮手那個小丫頭退了出去她暗自尋思道原來天朝的人物也是醜俊不齊的但是他的武藝卻不知如何若是有全身武藝奴家便許了他也算不枉了她整整地胡思亂想到三鼓已過還未登床安寢正要收拾去安寢猛聽得外面大聲小怪的人聲嘈雜沸反盈天她大吃一驚只當是出了什麽岔子呢一操兵刃縱身出來迎頭就撞著富平她忙問道爹爹前面什麽事鬧得這個樣子敢是出了什麽岔子麽富平笑道我兒你還不曉得那只害你兄弟的畜生現在被上國林將軍拿住了放在前面天井裏你快點去瞧瞧她聽到這話忙入房放下兵刃和一個小婢婷婷嫋嫋地走了出來到了前面的天井裏閃著秋波一看只見一隻極大的花斑豹睡在地下嗓子下面現出一個透明窟窿鮮血迸流有兩個獵戶架著一個美貌的郎君往後面去了只見衆人點點指指地說道你們看見麽剛才扶到後面去的他就是林將軍這豹就是他打死的還有幾個人問道難道他被這豹咬傷了麽衆人道你哪里知道林將軍捉豹的時候兩隻臂膊在豹的肋下擦傷現在到後面去休息了她聽了衆人的話又喜又悲又敬又愛喜的是大豹已被他奮勇捉住了悲的是兄弟被這畜生吃掉了現在雖然這畜生被他打死可是兄弟卻不能再活了敬的是他能見義勇爲愛的是他武藝超群人品出衆她扶著小丫頭可是一寸芳心早就弄得七顛八倒了她立夠多時才扶著小丫頭徑往後面而來可巧從林英睡的靜室旁邊經過她見許多人擁在這間房裏問長問短的估量八分是林英睡的所在她不由得走到房門口止住蓮步慢展秋波朝他的臉上細細地打量但見他生得伏犀貫頂星眼有神鋒眉似墨掩映著一張俊俏俏的面龐越顯出這英武之氣這時林英也早就在意卻也瞟著眼睛向她打量個不止四目相接互相飽看了一回此時富平正要到林英房裏來慰問瞥見他的女兒癡呆呆地立在房門口朝著林英出神他心中有數連忙退了出來暗道我倒早有此心難得她又是這樣這頭親事倒可以靠得住了他卻轉到他的夫人臥房裏面笑嘻嘻地向她說道夫人你知道麽現在我們小姐看中一個人了他的夫人笑道看中誰呀富平笑道那就是這位打豹的英雄林將軍啊他夫人道就是方才小廝們扶他到上房安息的那個人麽富平笑道不是他還有誰呢夫人笑道你怎麽知道她看中的富平便將方才的情形說了一遍他夫人拍手笑道不想這個癡丫頭眼力果然不錯富平道你且慢慢地誇讚我不過是忖度的意思還不知道她是否看中我女兒的終身除了這個再去找別的像他這樣品藝兼優的恐怕就不容易了你馬上到她的房中先去探探她的口氣如果她果真看中了那是再好沒有設若沒意你可用好言去勸慰她此事務要辦到你我夫婦得著這樣生龍活虎的女婿一輩子也算有靠了他的夫人滿心歡喜一連幾聲不錯忙起來帶了一個侍女徑向淑兒的房中而來走不多時已經進了她的臥房她在上房偷看了一會回到自己的房裏只是發愣暗道我不信天下竟有這樣的奇男子從外面看起來竟像一個軟弱的書生卻不料他竟有這樣的驚人武藝她正自想得出神的當兒瞥見她娘和著一個侍女走進房來忙立起來勉強笑道母親這會你老人家還沒有安息麽夫人笑道我兒爲娘的昨晚聽你爹爹說的上國來了兩條好漢今夜要去捉山貓我聽了這話大爲驚異我想我們這裏幾十個狼虎似的人也沒有將這個畜生捉住他們兩人能有多大本領難道就能將這山貓捉住了麽誰知竟出人意料之外據說被捉住的還不是山貓是一隻大豹而且是那個姓林的一個人動手捉住的這樣大本領的人天下也找不出第二個來了她插口說道這人不但本領好呢就是生得也十分漂亮估量著他總在十八九歲的樣子罷夫人笑道我兒難道你已經看見過了麽這句話說得她兩頰緋紅低垂粉頸自悔失言夫人見她這樣忙用話岔開一會子夫人又向她說道我兒你也年齡不小了我爲你這孽障不知操了多少心如今不是懸著一頭未著實我兒今天我的來意你曉得麽她也不回答夫人又道在我看這位林將軍一則是身膺皇命二來是品藝兼全而且年紀又與你不相上下在我們兩老的意思就此替你了脫一層手續罷夫人說到這裏用眼向她一看但見她垂下粉頸一句也答不出來其實心中早已默許了夫人又道我兒我知道你的脾氣所以特地來求你的意見請你快些兒答復我罷她含羞帶愧地只說了二句道孩兒不能擅自作主一切均隨母親便了夫人聽了這話滿心歡喜便回到房中將方才的話說了一遍富平自是歡喜忙去和蔡諸商議蔡諳也十分贊同當下便到林英那裏將來意說了一遍林英還假意推託了一陣子才答應下來蔡諳因爲急於動身便請富平擇一個最近的吉期替他們完了姻成婚的那一天諸親友全來道賀車水馬龍十分熱鬧附近的村落聽說富淑兒出嫁一齊爭先恐後擁來看新郎究竟是個什麽英雄這看新郎的如潮水一般你來我去川流不息真個是萬頭攢動富平一面命人招待一面叫他們出來交拜天地好讓大家看見一會子由儐相扶著一對璧人出來交拜天地那些看新郎的人無不噴噴稱讚道果然是個美豪傑俏丈夫富平老夫妻兩個見了這對粉捏玉琢的佳兒佳婿自然是喜不自勝可是又惹他想起自己的兒子來不免暗暗地傷感這也不在話下一轉眼大三朝過了蔡諳便連日催促動身可是他們正在打得熱刺刺的情投意合的當兒焉能一旦撒手分開究竟英雄氣短兒女情長暗地不免又說了許多不得已的苦衷林英擇了一個日子便要動身富平也知道他皇命在身不能久擱料知留他不住只得命人擺酒餞行席間富小姐手執銀壺滿斟三杯送到林英的面前低聲問道郎君此去大約有多少日子才回來林英答道多至三月少則兩月就要回來的富小姐哽哽咽咽地也不再問一會子散了席林英進去告辭出來又和富平作辭富小姐依依不捨地一直送到村口只說一句道沿途保重呀這正是人生幾多悲苦事無非死別與生離要知後事如何且看下回分解
