body:
  text: 第八十六回逞雌威數語解郎圍顯絕技單身入虎穴卻說林英見那八個大漢如狼似虎地闖進場各揮兵刃將那兩個人圍住各施兵刃大殺起來林英起初不知道究竟是一回什麽事所以不敢冒昧後來見他們拼命相撲地認真殺了他只見那兩個被他們圍住的人殺得汗流如雨只有招架之功並無還手之能這時林英那一股無名之火直沖三千丈按捺不下一個箭步沖進圈子一腿將那個使鞭的大漢打倒將鞭奪了過來奮起神威一陣鞭將那幾個大漢打得鼻塌嘴歪一哄而散他正要回身瞥見一道白光直向他的太陽穴打來他知道有人暗算趕緊將頭一偏那東西翻翻越越地落在地上他定睛一看原來是塊雪白的手帕他倒很覺奇怪一彎腰將那塊手帕拾了起來這時四面的人一齊攏了近來七張八嘴的嘰咕道亞克亞克立特阿羅那兩個被困的人也湊近身子抱拳念道薩哩哇羅林英一句不懂料著他們一定誇讚和佩服罷了他被衆人纏得急了忙向衆人只是搖手那些人也不解破他的用意向四散分開林英走到胡明跟前笑道可恨那幾個牛子竟敢以多欺人胡明笑道可不是麽不是你去動手我也要去了林英笑道這些牛子真禁不起打只消一頓鞭就打得東逃西散了胡明笑道真的要是我前去定要將那幾個牛子的狗頭揪了下來林英笑著將那一塊拾著的手帕拿出來對胡明笑道我將那幾個牛子打敗了卻不知從何處突然飛來一塊手帕你道奇怪麽胡明跌腳大笑道你還未看見麽林英搖頭說道未曾看見胡明用手朝西南一指道看那樓上不是站著一個女子麽這手帕就是她摔下來的林英擡頭一看只見西南角上有一座樓閣高聳入雲樓窗半啓露出一個人來生得柳眉杏眼梨面櫻唇比花花解語比玉玉生香說不盡千般嫵媚萬種風情把林英看呆了見那個女子手扶雕欄斜凝秋水卻也出神了他兩個四目相接飽看了好久全場的人不期而然地朝著他們注視胡明輕輕地向林英笑道你覺得難爲情麽全場的人誰不朝著你望呢他也未曾聽見胡明用手在他的肩頭一拍大聲笑道林兄弟魂靈兒不要被人家攝去呀這一句才將他飛出魂靈驚了入竅低下頭滿面緋紅一言不發胡明又笑道這真奇了到處有人看中你爲什麽沒一個人看中我老胡呢林英正要回答猛可聽得東北角上喊聲大起擁進一個人來手執刀槍棍棒直撲林英胡明二人而來胡明便對林英笑道你看這些牛子還來討死呢林英道來得正好正要使個厲害給他們瞧瞧呢一轉眼那些人擁到面前爲首一人手執一把鐵槳身高九尺虎頭環眼喊聲如雷林英空著手搶了上去那大漢大吼一聲劈面就是一槳林英往旁邊一跳讓過他一槳他順手又是一槳從下面翻起來林英往後面一縮又讓過他一槳那大漢兩槳落空怒吼如雷舉起鐵槳迎頭打下林英趕緊又往旁邊一躥恰巧那大漢的鐵槳正打中一塊大石頭砰然一聲那一塊石頭竟被他打得粉碎林英暗自吃驚不小這時那些番人一齊擁上前來刀棒齊施林英趁著一個空子奪了一把刀和衆人惡鬥起來胡明急切沒有兵器搶過來一腳踢倒兩個就將這兩個從地上抓起來當著兵器飛也似地打進重圍那些番人被他打得五分四散可是林英卻被那大漢逼得團團亂轉急切跳出圈子那大漢越殺越勇跟見林英要走下風了胡明又被這些番兵纏著不能過來幫助正在這危急之時瞥見一人騎著白馬腰挂雙刀纖手執著馬鞭子唰地打了一下子那馬穿雲價地沖了進來只聽她一聲吆喝那個大漢回頭一看連忙放下兵刃往她馬前一跪嘴裏不知說些什麽那馬上的女子用手一揮從後面跑過來許多的女子一式短衣打紮每人手裏執著一張刀一捆繩走了出來將這大漢緊緊地縛個結實還有那些人一齊抛下兵刃直挺挺地跪下這時林英也不懂是怎麽一回事再朝那馬上的女子定睛一看這女子正是方才在樓上擲手帕的林英倒怔住了但見朱唇一動那些黑衣女子將那些跪下來的人一個個完全縛了起來那女子臨走時候斜飄媚眼向林英嫣然一笑放著轡環緩緩地走出人叢去了林英呆了半晌正要和胡明回去瞥見蘇比喘氣急急地跑來向他們問道剛才這裏有人打架你們動手不曾林英便道不錯因爲氣不過才動手的蘇比頓足說道這卻怎麽得了林英見他這樣的驚慌忙問什麽緣故蘇比道還問什麽你們准是死也林英大吃一驚問道難道這裏人家打不得抱不平麽蘇比搖頭說道不是這樣說你們初到此地哪里知道這裏的內幕那兩個執刀棒的漢子他們本來和我們國裏江湖賣藝的一樣但是他們這裏有一個規矩就是賣藝的專門供給人家試驗的不僅是他們自己耍幾路刀棒就可以向人家開口索錢了只要有本領的誰都可以去比試的要是將賣藝的打敗了馬上就趕賣藝的動身不准在國裏逗留如果打不過賣藝的那末不但給錢與賣藝的還要按月供給他們的糧草呢方才我在館驛裏聽見他們說拉阿場上有兩個野人幫助賣藝的將四蒙利耶王子府裏的八個家將打敗我當時問他們一個情形便知你們闖下大禍了這卻怎麽了林英聽他這番話方才明白忙又問他道最後一個虎頭狷眼的大漢他難道就是四蒙利耶麽蘇比道那個大漢也來和你們動手的麽林英道我將那八個大漢子打敗之後沒有一會他就帶著許多人來和我動手了蘇比將屁股一拍連珠價響地直說道怎了怎了林英見他這樣料知事出非常也覺得費了躊躇胡明大笑道怕什麽這幾個鳥男女已經被那個女子捉去了蘇比聽了這話不禁詫異地問道你這是什麽話林英搶著將以上的事情說了一遍蘇比聽罷說道慚愧你們的運氣真好可巧碰見她但不知她何故幫著你們倒是令人不解呢胡明哈哈大笑道還問什麽林兄弟命帶桃花到處有人憐愛究竟是生得漂亮的好蘇比連聲問道什麽緣故胡明道他將那八個大將打敗之後那個女子在樓上看見突然擲下一塊手帕來後來那大漢帶了許多人前來和我們爲難正殺得萬分危急之際不想她就憑空的來了你道不是看中我們林兄弟了麽蘇比聽了便對林英笑道恭喜你恭喜你三天之內包管你得到一個公主和你成就了百年的眷屬了林英漲紅了臉忙對蘇比說道道引不要盡來開心你不要聽胡大哥撒謊哪里有這些事呢胡明笑道這不是冤枉麽我從來不喜和人家說謊話蘇道引你如不信我立刻給你個見證他說罷一伸手在林英的懷裏摸出一樣東西來向蘇比笑道這個玩意兒是哪里來的呢蘇比接了過來正在展開細看林英一縱身便伸手來搶蘇比忙向懷裏一縮胡明忙過來一把將他抱住口中說道還做什麽趣呢好好地讓人家看看究竟是個什麽東西蘇比展開一看只見裏繡著一尊佛兩個合合神在下角上還留著一個名字蘇比仔細一看原來是瑪麗兩個字他看罷對林英笑道這可無疑是她了恭喜你喜星高照他說罷便將手帳交與林英林英接過來不提防他嗤嗤嗤地一連撕了幾瓣胡明蘇比忙用手來奪卻已被他撕壞了蘇比忙道林將軍動怒敢是我們看得不好麽林英笑道這是什麽話在小弟的意思不過因爲女子的東西斷不能存留我們男子身邊的不獨損失我們的威嚴而且對於她也覺有些不恭之處咧蘇比忙道你可錯極了她莫說是個堂堂國王的妹子就是平常一個女子人家看中你憐愛你你卻不能將人家一番好意拂掉了呢林英笑道蘇道引這話真是奇怪了你怎麽知道她看中我的蘇比道人家有意將手帕擲給你顯見就是撩撥你的林英道怎能這樣說法人家在樓上或許是失手被風飄下來的也未可知蘇比大笑道照你這樣看來越是天緣湊合了試想這場內無數的人皆未落到他們的身上恰巧就碰著了你不是天緣麽林英正色對他說道道引休要取笑罷不要說我林英已經有了妻室縱使沒有我林英堂堂七尺之軀難道就和這番邦的女子配合了麽請你不要講吧我們也好回去了蘇比見他動怒不便再說便和他們回到館驛之內蘇比便將以上的事情告訴與蔡諳蔡諳問道這女子果然是國王的令妹麽蘇比道怎麽不是呢這國王有三個妹子大妹子嫁與白脫司二妹子嫁與馬咸司惟有這三妹子到麗生性高傲而武藝精通刀馬嫺熟有生以來從未遇見過敵手所以她目空一切藐視天下英雄今年已經十九歲了還是待字深宮國王幾次要替她擇婿無奈她執意不從國王不敢十分相強只得由她自主她雖然這樣倨傲卻是一個性如烈火的女子她向來和人家是不苟言笑的我想既然將手帕擲與林將軍我敢斷定是已經看中林將軍了蔡諳笑道如果真的這樣倒是千秋佳話了林英脫口說道中郎你也糊塗了我難道真去和她配合不成蔡諳道這也不算什麽羞恥的事情林英道中郎這是什麽話呢我休說已有前妻即使沒有家室又何能和番婆子不知禮義的東西結合呢不要說千古佳話只怕要遺臭萬年了蔡諳說道林將軍請不要動怒這不過是我們私下裏談論的意思至於那個公主是否看中了你還未知道呢他們正在說話之間國王那邊果然著人來請蘇比和蔡諳他二人連忙上朝那國王對蘇比說道引你知道麽現在我們三公主看中了那個姓林的漢將了蘇比連忙打了一個稽首答道微臣已經知道白爾部達笑嘻嘻對蘇比道孤家今天請你來非爲別事要想請你做個月老呢蘇比忙答道我主的命令怎敢不依無奈那個姓林的已經有了妻子白爾部達大笑道你這是什麽話一個人娶兩個妻子難道多麽蘇比正要回言瞥見一個使臣形色倉皇地跑了進來大聲呼道比保國與兵來犯邊境了請我主定奪白爾部達聽說便命將四蒙利耶放下來叫他趕緊帶兵去抵敵原來這四蒙利耶是衆皇子之中最驍勇的一個他天不怕地不怕見了瑪麗便骨軟筋酥的沒了主意了方才被瑪麗傳進殿來說他在外邊闖禍得罪了漢家的大將所以將他縛來她又爽爽快快地將林英的本領告訴國王言話之中流露一種佩服的口吻國王點頭會意便令將四蒙利耶鎖了起來這時四蒙利耶放了出來聽說是要他帶兵出陣心中大喜忙到國王面前謝了恩點齊十萬精兵前去抵敵未到三天早有探馬飛報道四蒙利耶陣亡十萬兵死亡投降殆盡比保的兵馬已經經闖進邊境了國王聞報大驚失色無計可施蘇比便上殿奏道微臣保舉一人包管旗開得勝馬到成功國王忙問何人蘇比道大師婆哈達摩法力無邊何不請她前去迎敵呢國王大喜道我倒忘了連忙著人去將哈達摩請來命她前去迎敵哈達摩也不敢推辭帶著她的兩個徒弟並一衆沙彌前去破敵未到半日又有探馬來報道大師婆與沙彌完全被比保國的兵殺了國王聽得這句話宛似憑空打了一個炸雷一樣口呆目瞪不知所措這時蔡諳等見這樣的急恐怕城門失火殃及池魚連忙與林胡商議退避之計林英慨然說道到這裏承人家賓禮相待現在人家到了這危急之時焉有坐視之理何不去助他一陣呢胡明也是這樣說法蔡諳忙對他們說道你們可聽見麽那大師婆那樣的法力廣大尚且被他們殺了呢你們爲何要去冒險呢林英冷笑道中郎你也未免忒糊塗了那大師婆不過是個騙人的妖婦罷了她有什麽法力呢蔡諳見他們執意要去也不好過於阻攔二人便對蘇比說明蘇比自是贊同忙去告訴與國王國王當下又派兵十五萬請林英帶兵五萬爲第一隊胡明領兵五萬爲第二隊瑪麗領兵五萬爲第三隊又命蘇比隨著林英去做參贊當日林英等點齊兵馬浩浩蕩蕩直向芥利子城殺來他們還未到芥利於城猛見前面旌旗蔽天矛戈耀日那比保的頭隊已到色生河口林英忙下令紮營埋鍋造飯這時還未安排齊整猛可裏比保的營中金鼓大震一哨兵馬沖殺出來爲首一將面如重棗執鎦金大钂怪叫如雷林英大怒火速持槍上馬帶隊出陣林英一馬當先也不打話兩個人接上手奮勇大殺起來戰了一百餘合可是那賊將來得十分厲害力大無窮林英到了一百合之後力氣不加槍法散亂虛晃一槍便想逃走無奈那個賊將將钂舞得風雨不透緊緊地逼住不肯放鬆一著林英沒法只得勉強打起精神和他又戰了三十多合可是只得招架不能還手了這時胡明的第二隊已到聽說林英已經出陣胡明提出雙錘躍馬出陣只見林英被那番將逼得汗流氣喘漸漸地不支了胡明舞動雙錘拍馬飛到垓心大聲喝道番狗休要逞能看咱老子來取你的首級他雙錘齊下那番將忙將雙钂蕩開雙錘接上手又與胡明大殺了五十餘合林英趁著這個空子兒兜馬跳出圈子休息了片時只見他兩個翻翻滾滾地殺到八十多回胡明雖勇可是那員番將兀自轉戰不衰林英飛身上馬搖槍重行搶到垓心雙戰那員番將這時番兵陣內突然又跳出一個番將來也不騎馬跑到林英的馬前舉起鬼頭刀便來棘林英的馬腿林英趕緊將馬一帶那馬憑空一躍將他這一刀讓過林英便不敢怠慢連忙丟下那個用钂的番將來應付這個步戰的番將一馬一步戰了四十餘合那個番將馬前縱到馬後躍躍如飛捉摸不定林英倒有些應付不了大戰了多時瑪麗的第三隊已經到了蘇比忙令她出陣助戰她倒提大砍刀領了一隊黑衣番女兵闖到垓心此時胡明已殺得錘法散亂支援不住了瑪麗長嘯一聲飛馬前來助戰胡明騰下身子便兜馬回陣瑪麗那口刀舞得神出鬼沒飛花滾雪價地將那番將殺得招架不住未到三十合那員番將丟去一個架子回馬就走瑪麗隨後追去那番將在馬上用手一招登時萬弩齊發瑪麗一毫不怯攪開箭雨穿雲閃電價地追了進去胡明在後面望見忙道啊嘎今番這個女子好道休矣話還未了瞥見林英被那員番將將馬腿搠傷那馬大吼一聲壁立起來將林英掀番在地霎時被那員賊將生擒過去胡明大驚正要上馬去救只見番兵陣裏喊聲四起紛紛大亂霎時瑪麗從陣內重新殺了出來她的嘴裏咬著一顆血淋淋的人頭到了蘇比的面前將那顆人頭往地上一擲蘇比忙對她嘰咕了兩句她連忙掉刀回馬重新殺進陣去這正是碧血渾同三月雨紅顔突入萬軍營要知後事如何且看下回分解
