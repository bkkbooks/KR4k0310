body:
  text: 第八十一回悲月影空房來怪婦奮神威廢院殲花妖話說蔡諳等正苦沒有住處林英用手向前面一指說道看那樹林裏面不是有燈光閃出嗎顯見是有人家的去處啊蔡諳和胡明齊朝前面一望只見前面的樹林裏果然有一絲燈光從樹林中直透出來蔡諳大喜忙對二人說道慚愧今天不是那裏有人家險些兒要沒處息宿哩林英道可不是麽我們就去罷說話時三人馬上加鞭三匹馬穿雲價地直向那燈光的去處而來一轉樹林果然露出一座小小的村落來三人在黑暗裏還能辨認一些只見簷牙屋角參差錯落只能望見大概可是夜深了一切都沈寂了靜悄悄地連雞犬都不聞三人下了馬各自牽著繮繩走到第一家門口向門裏一瞧只見裏面黑黝黝的一點燈光也沒有胡明便要上前敲門蔡諳忙道胡將軍休要亂動這裏人家大約已是睡熟了我們到別家去借宿罷胡明聽他這話忙住了手又走第二家仍然是雙扉緊閉一些聲息也沒有林英嘖嘖地奇怪道我們方才不是看見這裏有燈光的麽怎的走到這裏反而不見了這是什麽緣故呢蔡諳笑道這一點道理你都不明白我們在遠處看來這裏差不多全在眼中現在到了跟前只能一家一家的在我們的眼中那有燈光的人家或許在後面也未可知再則這有燈光的人家現在已經睡了亦未可知林英點首稱是三人順著這個村落一直向西尋去剛走村落的中間瞥見有個黑影子蹲在牆根旁邊把個蔡諳嚇得倒退幾步林英忙問道什麽緣故蔡諳附著他耳朵悄悄地說道看那牆根下面黑黲黲的是個什麽東西你去看看林英拔出佩劍走到前面故意咳嗽一聲只見那黑影子忽然立了起來大聲問道半夜三更的你是什麽人在這裏轉什麽念頭林英才知道他是個人忙走近來低聲說道請問這裏可有宿店沒有那人說道有的有的你們幾個人林英忙答道三個那人道你走這裏一直朝西去前邊就是宿店了說話時靠身邊一家人家忽地將門開了裏面露出燈光來照在那人的臉上只見他已經鬚眉魔白了從裏面走出一個二十多歲的少年人來將老頭子攙扶著說道老爺子你老人家這幾天肚子裏不適意應該請郎中先生來診視診視才好呢夜裏常常到外面解手萬一受了風可不是耍的那老頭子蹺起鬍子說道不打緊不打緊用不著你們來擔心他們說著走進門去砰然一聲將門關起蔡諳等忙向西而來走了數家果然見一家門口懸著一個幌子門內燈光還未熄去門邊還有一塊招牌上面有幾個字因爲天時黑暗辨不出是什麽字來胡明性急便大踏步走上前用手在門上砰砰砰敲得震天價響的裏面有人問道誰敲門呀胡明答道我們是下店的煩你開一開門罷那裏的人答道下店在酉牌以前現在不下了胡明道請你開門罷因爲我們遠途而來一時尋不到下宿的地方所以到這會才到這裏的裏面答道不行不行我們這裏沒有這種規矩的你們到別處去罷胡明按不住心頭火起大聲說道你這裏的人好不講道理咱們下店又不是不給錢的爲什麽偏要推東阻西的難道你們的招牌上標明過了酉時就不下客麽蔡諳忙道胡將軍他不下就罷了何苦與他去口辯作什麽來此處不留人自有留人處自古道東村不下客西有一千家呢說話時門已開了走出一個身高九尺的大漢來上面穿一件藍布短襖露著一隻碗粗的赤膊在外面下面圍著一條虎皮的腰裙雙目陷入印堂高鼻闊口滿面橫肉打量他這個樣子竟像一個屠戶只聽得他揚聲問道哪里來的幾個鳥人在這裏吵鬧什麽咱家不下客難道你一定要強迫我們下客不成胡明把那一股無明的業火高舉三千丈按捺不下搶過來劈面就是一拳那大漢原是個慣家忙將身子一側讓過一拳胡明一拳沒有打中身子往前一傾忙立定腳正要再來第二拳哪知那大漢趁勢一掌向胡明太陽穴打來胡明曉得厲害趕緊將頭一偏誰知大漢早已將掌收回冷不提防他一腿從下面掃來胡明手靈眼快雙腳一縱又讓過了他一腿正要還手瞥見那大漢狂吼一聲撲地倒下不能動彈了胡明莫名其妙立在一旁直是朝那大漢發呆這時林英走到那大漢跟前喝道好雜種你想欺負我們遠來的旅客麽今朝可先給你一個厲害那大漢血流滿面躺在地下只是哀告道爺爺們請高擡貴手小人有眼不識泰山萬望饒命林英冷笑一聲說道你可知道咱們的厲害了那大漢只是央求饒命林英才俯下身子將他一把拉起來用手朝他的右眼一點那大漢怪叫一聲身子一矮右眼中吐出一顆彈子來林英喝道快點去將上好的房間收拾出來讓咱們住這時店裏的小夥子走堂的一齊擁了出來預備幫著大漢動手瞥見那大漢走了下風誰敢還來討死呢齊聲附和道就去辦就去辦胡明還要去動手蔡諳一把扯住道彀了彀了讓人一著不爲癡這時那小廝嚇得手忙腳亂牽馬的牽馬備飯的備飯鳥亂得一天星斗蔡諳倒老大不忍一會子盥面漱口接著吃了晚飯胡明問道哪里是我們的住宿地方那此小廝沒口地答應道有有有請客官們隨我們進來吧蔡諳隨著那個禿頭小廝直向後面一連進了幾重房子到了最後面一宅房子一共是三間靠著一所廢院門朝南他們進了門仔細一看原來是兩暗一明裏面每間裏設著一張楊木榻帳子被褥倒也潔淨一切用具都是灰塵滿布好像許久沒有住過人的樣子蔡諳不禁疑惑起來忙向那禿頭小廝問道你們這裏別處可有房間麽那小廝把頭搖得像撥浪鼓一樣地說道今天的生意真是好極了別處一間空房也沒有了蔡諳又問道我看這房間裏好像許多天沒有住過的樣子那禿頭小廝答道果然果然因爲我們這裏平常沒有什麽客人來下店所以這房子只好空起在這裏預備著如果客人多了就將此地賣錢了胡明忙道那麽這裏既然空著三個房間方才那個漢子爲何又說不下客呢禿頭小廝答道客官們不知道原來有個緣故蔡諳忙問那小廝道什麽緣故呢禿頭小廝突然噎住了翻著雙眼只是發呆林英倒疑惑起來大聲喝道小狗頭又要搗什麽鬼有什麽話趕緊好好的從實說來不要慪得咱老子性起一把將你這小狗頭摔得稀爛那禿頭小廝嚇得屁滾尿流忙跪下來央求道爺爺息怒小的就說蔡諳忙叫他立起來那小廝立起來吞吞吐吐地說道我們這裏有個例子到了酉牌一過就不下客了別的沒有什麽緣故林英道叵耐這小雜種搗鬼說來說去不過這兩句話給我滾出去那個禿頭小廝得到了這一句宛如逢著救星一般一溜煙地出去了蔡諳對林胡二將說道請各自去安息罷明天還要趕路呢林英正色對蔡諳說道我看這店裏的人鬼頭鬼腦的倒不可不防備一些呢蔡諳說道可不是麽出門的人都以小心一點爲是不要大意才好呢胡明大笑道你們也忒過慮了眼見那個牛子已經吃足了苦頭還敢再來捋虎須麽我不相信材英道這倒不要大意明槍易躲暗箭難防胡明哪里在心笑嘻嘻地走進房間去睡覺林英也到西邊一個房間裏去了蔡諳在中間明間裏他一個人坐在床前思前想後又不知何日方可到天竺將經取了了卻大願尋思一陣煩上心來哪里還睡得著背著手在屋於裏踱來踱去踱了半天這時候只有兩邊房間裏的鼾聲和外邊的秋蟲唧唧的聲音互相酬答著破這死僵的空氣其餘也沒有第三種聲音來混雜的蔡諳悶得好不耐煩便開了門朝外面一望只見星移鬥換一輪明月已從東邊升起這時正當深秋的時候涼飆吹來將那院裏的樹木吹得簌簌地作響他信步走出門來對著月亮仰面看了好久才又將頭低下心中暗暗地觸動了無限閑愁思妻想子十分難過信步走到一座破壞的茅亭裏坐了一會那些秋蟲似乎知道他的心思兀地哽哽咽咽叫個不住反覺增加了他的悲傷暗自歎道悔不該當初承認這件事的如今受盡千般辛苦萬種淒涼還不知何時才到天竺靈山呢沿途能安安穩穩的將經求回就不負我一番苦心了萬一發生了什麽亂子那就不堪設想了他自言自語地一會子猛地起了一陣怪風吹得他毛髮直豎坐不住便立起來要走這時星月陡然沒有什麽光彩了周近的樹木只是簌簌地作響蔡諳此時心中害怕起來便大三步小兩步地跑進門來將門關好挑去燭花又坐了一會覺得漸漸地困倦起來便懶洋洋地走到自己的床前面朝外往下一坐用手將頭巾除下放在桌上又將長衣脫下回過身來正要放下瞥見一個國色無雙的佳人坐在他的身子後面他可嚇得一佛出世二佛升天忙要下床無奈兩條腿好像被什麽東西絆著的一樣再也擡不起頭來又要開口喊人可是再也喊不出來真個是心頭撞小鹿面上泛紅光瞪著兩隻眼睛朝著那女子只是發呆只見她梳著墮馬髻上身穿著一件湖縐小襖下身系著宮妝百褶裙一雙金蓮瘦尖尖的不滿三寸桃腮梨面星眼櫻唇端的是傾國傾城天然姿色蔡諳定了一定神仗著膽問道你這位姑娘半夜三更到我的床上做甚男女授受不親趕緊回去不要胡思亂想須知我蔡諳一不是貪花浪子二不是好色登徒人生在世名節爲重不要以一念之差致貽羞于萬世他說了這幾句滿想將這女子勸走誰知她不獨紋絲不動反而輕抒皓腕伸出一雙纖纖玉手將蔡諳的手輕輕握住嚇得蔡諳躲避不叠的已經被她握住了覺得軟滑如脂不禁心中一跳忙按住心神只聽她輕啓朱唇悄悄地向他笑道誰來尋你的這裏本是我的住處今天被你占了你反說我來尋你的真是豈有此理蔡諳忙道既是小姐的臥榻蔡某何人焉敢強佔呢請放手讓我到他們那裏息宿罷那女子哪里肯放手讓他走一雙玉手緊緊地握住斜瞟星眼向他一笑然後嬌聲說道不要做作罷到哪里去息宿去今天難得天緣巧遇就此她說到這裏嫣然向他一笑這一笑真是百媚俱生任你是個無情的鐵漢也要道我見猶憐誰能遣此哩蔡諳定了定心神正色地向她說道小姐千萬不要如此爲人不要貪圖片刻歡樂損失終身的名譽她微露瓢犀說道久聞大名如雷貫耳今日一見果然名不虛傳要知奴家亦非人盡可夫之輩今天見君丰姿英爽遂料定是一位大英雄大豪傑不料果然中了奴家估量良宵甚短佳期不常請勿推辭罷蔡諳此時正是弄得進退兩難想要脫身無奈被她緊緊地握住雙手想要聲張又恐大家知道了難以見人只怕得渾身發軟滿面緋紅她見他這樣不禁嗤的一聲悄悄地笑道君家真是一個未見世面的拙男子了見了這樣的美色當前還不知道消受莫非你怕羞麽你我二人在此地要做什麽便做什麽怕誰來呢她說罷扭股糖似地摟著蔡諳將粉腮偎到他的臉上輕輕親了一個嘴把個蔡諳弄得上天無路入地無門只是躲讓不住她笑道請你不要盡來做作了快點寬衣解帶同上巫山吧蔡諳此時被她纏得神魂不定鼻子裏一陣一陣地觸著粉香脂氣一顆心不禁突突地跳了起來滿面發燒那一般孽火從小肚子下面直泛到丹田上面暗道不好不好今天可要耐不住了想著趕緊按定了心神尋思了一陣子猛地想起這女子來時不是沒有看見嗎而且我親眼看見那禿頭小廝收拾床鋪的怎的我出去一會子她就來了莫非是鬼麽他想到這裏不禁打了一個寒噤忽然又轉過念頭自己對自己說道不是不是如果她是鬼就不會開口說話了他定睛朝這女子的粉面上細細地打量了一會子卻也未曾看出什麽破綻來那一張吹彈得破的粉龐上面除卻滿藏春色別的一點看不出什麽的色彩來蔡諳暗想道無論她是人是鬼能夠在半夜淫奔可見不是好貨他想到這裏將那一片羞愧的心轉化了憎惡不禁厲聲喊道林將軍他一聲還未喊完只見她死力用手將他的嘴掩住一手便來硬扯他的下衣蔡諳死力拽著正在這鬧得不可開交的時候林英正自睡得正濃猛聽得蔡諳喊了一聲他原是個極其精細的人便從夢中驚醒霍了坐了起來側耳細聽不見得有什麽動靜他不禁倒疑惑起來暗道我方才不是清清楚楚地聽見得蔡中郎的聲音麽怎的現在又不聽見動靜呢敢是我疑心罷了他想到這裏便又複行睡下猛可裏聽得蔡諳喘喘吁吁的聲音說道無論如何要想我和你做那些可恥的事情那是做不到的林英聽得大吃一驚忙又坐起取了寶劍輕手輕腳地下了床躡足潛蹤地走取房門口探頭朝外面一望只見明間裏的蠟燭還未熄去又見蔡諳的帳子亂搔亂動似乎有人在裏面做什麽勾當似的林英一腳縱到蔡諳的床前伸手將帳子一揭定睛一看瞥見一個絕色的女子摟著蔡諳正在那裏糾纏不休林英按不住心頭火起蔡諳見了林英前來便仗了膽喊道林將軍快來救我一救林英剔起眼睛大聲喝道好不要臉的東西還不放下手再遲一會休怪咱老子劍下無情誰知那女子嬌嗔滿面一撒手好似穿花粉蝶一般地飛下床來向林英喝道我和他作耍與你何干誰教你這匹夫來破壞我們的好事須知娘也不是好惹的她說話時便在腰間掣出兩口雙峰劍來圓睜杏眼向林英喝道好匹夫快來送死罷林英更是怒不可遏揮劍就砍她舉劍相迎大戰了三十多合未見勝負這時屋裏面只聽得叮叮噹的寶劍聲音把個蔡諳嚇得抖做一團無地可入這時林英一面敵住那女子又恐怕她去害蔡諳一面又到蔡諳床前展開兵刃掩護著又戰了五十多合林英越戰越勇殺得那女子只有招架之功並無還手之能香汗盈盈嬌喘細細林英揮著寶劍一步緊一步地逼住那女子殺到分際虛晃一刃跳出圈子開門就走林英哪里肯舍一縱身趕了出來二人又在天井裏搭了手乒乒乓乓地大殺起來再說胡明睡到半夜的時候被尿漲得醒了一時又尋不著尿壺赤身露體地奔了出來正要撒尿猛地聽得廝殺聲音吃驚不小忙定睛一看只見林英和一個女子正在那裏舍死忘生地惡鬥他可著了急連尿也不撒了跑到自己的房裏將一對臥爪大錘取了出來赤著身子跑了出來大吼一聲耍動雙錘助戰那女子那女子正被林英殺得招架不來還能再加上一個嗎只往後退一直退到一棵老樹的旁邊被胡明覰准一錘只聽得殼禿一聲那女子早巳不知去向將那棵老樹砍了倒下這正是妖姬甘作先生妾寶劍能梟蕩婦頭要知後事如何且看下回分解
