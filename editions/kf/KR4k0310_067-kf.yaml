body:
  text: 第六十七回傾心一笑杏花春解圍祝發三年陀羅春守節卻說金宮蟾迷戀玉喜又苦得沒有銀錢只站在戲園門口發怔心中想不去呢又捨不得丟下這美人兒要去呢又苦得囊中空空後來發了一個狠把身上穿的紗大褂子脫下來到長生庫中去典了幾吊錢換穿了一件夏布大褂子踱到玉喜院子裏去玉喜見了滿面堆笑迎接著她師傅見了這樣一個窮書生連眼角兒也不去看他玉喜見房裏人看他不起便替他說道他是六王爺家裏的師傅很有勢力的你們倘然怠慢了他能叫俺們立刻存不住身他們聽了也害怕停了一會擺上酒來玉喜陪著他在房裏兩人密密切切地一邊談著心一邊喝著酒金宮蟾這時快活得好似登了天一般吃完了酒金宮蟾從袖子裏抖出幾吊錢來放在桌上轉身便要告辭出去玉喜一把抓住他的袖子笑說道你真是一個傻子誰要你的錢來再者你既到了俺這裏也由不得你回去了說著便把他捺在椅子上這原是金宮蟾求之不得的便樂得嘻開了一張嘴再也合不班來他倆人在房中調笑了一陣便雙雙入幃同圓好夢去了第二天清早起來玉喜自己拿出錢來替他開發了房中婢女和師傅們整整花了一千兩銀子那班下人得了銀錢便千謝萬謝從此以後院子裏的人都拿他當貴客看待玉喜每天戲園子裏回來金宮蟾便早已恭候在她房裏了那班王孫公子還睡在鼓裏還在玉喜身上拼命花錢玉喜拿了他們的錢暗暗地去貼給金宮蟾後來玉喜打聽得宮蟾家裏不曾娶過妻子便打定主意要嫁給他拿出歷年的體己銀子悄悄地交給宮蟾在三不管地方買下一所宅子他倆人天天商量著如何打扮這座屋子買了許多木器把個房子鋪設得簇新打算擇一個吉日他們成雙成對地搬進新屋去住宮蟾雇了許多婢仆先一日在新屋子裏住著第二天便雇了一輛車去接玉喜宮蟾走進院子去一看頓覺靜悄悄的不見一個人走到玉喜房裏去一看只見脂粉零落幃帳蕭條有一個老婆婆守著空房宮蟾急問時她模模糊糊地說道進宮去了宮蟾再三問時也問不出一個細情來沒奈何走到戲園子裏去候著直候到曲終人散也不見玉喜的影蹤只聽得一班看客沸沸揚揚地說玉喜昨晚被宮裏拿三萬兩銀子買去做妃子去了宮蟾聽了心中一氣魂靈頓時出了竅原來玉喜果然被崔總管訪到了連夜和她老鴇說明了買進宮去皇帝看她兩朵粉腮兒紅得和海棠花似的便取她一個名字叫海棠春宮蟾在外面打聽得千真萬真便悄悄地回到新屋裏去一條帶子吊死在床上那海棠春進得宮去也因想宮蟾想得厲害一病不起抑鬱而死在四春裏面年紀最小皮膚最白的要算杏花春講到這杏花春原是好人家的女兒只因從小死了父母被叔父賣在一家姓石的大戶人家做陪房丫頭去那石家只有一個小姐杏花春便終日陪伴著這位石小姐石小姐的父親進京做官去把家眷帶在京裏後來石小姐嫁了一位徐尚書的少爺杏花春也跟著到徐家去做陪房丫頭那徐少爺也是一位侍郎見石小姐長得標致便出奇地寵愛起來因寵愛而變成了一個俱內的丈夫這時杏花春年紀已到十五歲懂得人事了長著水靈靈的一對眼珠蘋果似的臉蛋一張櫻桃似的小嘴嘴邊長著兩個酒渦兒笑一笑對人溜一眼真要叫人丟了魂靈她小主人徐侍郎趕著要調戲她只因夫人的醋勁大又不敢放膽下手只得在背地裏動手動腳那丫頭也因主母寵愛她一心想要嫁一個如意郎君任你主人如何調戲她總是不肯後來徐侍郎忍不住了向夫人跪求這個丫頭做姨太太夫人聽了大怒忙把這丫頭藏起來這時有一位宗室福晉和徐侍郎夫人最說得投機硬把這丫頭去寄存在宗室家裏那宗室貝勒原是和崔總管通氣的知道那崔總管正在外面物色江南美人見了這丫頭便讚不絕口忙去和崔總管說知崔總管到宗室家裏去一看連聲說妙貝勒福晉立刻去把侍郎夫人請來說崔總管願拿出二萬銀子來買這丫頭進宮去侍郎夫人聽了滿口答應這魚腥擱在家裏難免被丈夫偷了手如今送她進宮去落學得眼前乾淨徐侍郎夫婦辦了一桌酒請這丫頭上面坐著夫妻倆人雙雙跪下對她拜著求她見了萬歲爺替他說些好話這丫頭也點頭答應一進宮去取名杏花春受皇帝的寵倖杏花春也常常在皇帝跟前替徐侍郎說許多好話後來這徐侍郎果然很快地升了官不到一年工夫直放河南布政使這杏花春生性善笑笑的時候柔情微露星眼乜斜咸豐帝便在盛怒時候見了這杏花春的笑容也立刻轉怒爲喜咸豐帝又愛吃酒酒醉的時候常常發怒每到發怒的時候便有一兩個太監或宮女遭殃輕的吃打重的被皇帝殺死到酒醒的時候又十分悔恨拿出整千整萬的銀子來撫恤那遭殃的只有杏花春陪侍皇帝從沒吃過虧每到盛怒時候只叫杏花春展齒一笑倒在皇帝懷裏皇帝也立刻把怒容收起滿面堆下笑來伸手把杏花春摟在懷裏說道這真是朕的如意珠兒呢因此別的妃嬪遇到皇帝盛怒時候便來求著杏花春去替她討饒皇帝沒有不准的宮裏上上下下的人都稱她歡喜佛又稱她劉海喜杏花春看待那班宮女也是十分和順只有一樣是杏花春最壞的脾氣她別的都不愛只是愛錢財她房裏藏著一個大撲滿有時得了皇上的賞賜她都拿去藏在撲滿裏一任同伴如何哄騙恐嚇她總不肯拿出一個錢皇上知道她的脾氣格外多賞她些因此杏花春的私藏很富她只怕有別的妃嬪向她借貸她見了人便說自己窮得厲害她在宮中終日想著法子弄錢她仗著皇帝的寵愛有時有別的妃嬪求她去皇帝跟前討饒她便伸手向那人要錢一開口便是五百兩一千兩缺分文不可那人爲要保全自己的性命沒奈何只得如數給她任你事體如何急迫銀錢倘不如數照付她總不肯去那人急了真正沒有錢也須寫一張借票她才肯去票子到了期她便百般索取少一文不行的許多妃嬪在背地裏怨恨她牡丹春原是十分奸刁的她見杏花春太不講交情便想出一個法子來捉弄她知道杏花春是愛賭錢的便在暗地裏和同伴說通了哄她入局起初故意給她得些小便宜杏花春看自己贏了錢便十分高興從此她在日長無事的時候便四處拉人下局後來她慢慢地輸了起初小輸她還肯拿出錢來照賠後來輸得大了一輸便是幾千她便不肯拿出現錢來總是推三阻四約定了償還日子到期又抵賴不認有一天咸豐帝一人在園中閑走從尋雲榭繞過貽蘭亭後面只聽得亭前一片鶯嗔燕吒的聲音接著又是嬌聲喝打皇帝悄悄地踅向亭前去只見亭前草地上一群宮女圍著從人叢裏望去只見兩個漢裝妃子揪住了在草地上打架一個瘦小的被一個長大的按在地下只見她擎著兩隻小腳兒亂登那高大的妃子一幅石榴裙兒浸在草地上一汪水裏正扭結不開的時候皇帝看了也發笑忙推開衆人上去親自扶她們起來她兩人還各自低著脖子揪住雲鬢不肯放手皇帝看時認識一個是杏花春一個便是牡丹春兩旁的宮女齊聲喊道萬歲爺來了還不放手嗎她兩人聽得了才放了手看她們雲鬢蓬鬆嬌喘噓噓皇帝問爲什麽事牡丹春一邊喘著氣一邊奏說杏花春賭輸了錢只是抵賴不還皇帝問杏花春輸了多少錢杏花春回奏說一共輸欠六千多兩銀子皇帝聽了不覺一笑說道朕替你還了罷不用鬧了快陪朕吃酒去牡丹春聽了不服氣把粉頸兒一側小嘴兒一撇說道顯見杏花春是佛爺寵愛的佛爺替她賠賭帳一賠便是六千兩俺們是趕不上怪不得一個子也不見賞下來皇帝看牡丹春這種嬌嗔模樣不覺哈哈大笑起來忙說道朕賞你朕賞你也賞你六千兩銀子如何其他妃嬪一聽說皇帝有賞便齊聲鼓噪起來你也要賞我也要賞皇帝統統答應每一位妃嬪賞三千兩每一個宮女賞銀三百兩頓時一片嬌聲說謝萬歲爺賞咸豐帝聽了很快活一手搭住杏花春的肩頭一手搭住牡丹春的肩頭後面跟著一群妃嬪宮女迤邐向雲錦墅正屋走來便在屋中開懷暢飲當夜牡丹春和杏花春兩人同被召幸從此以後杏花春開了例規凡是自己輸了錢總求皇帝代還賭帳那班妃嬪見有皇帝代還帳便索興大家串通了騙她的錢後來杏花春的私房錢越積越多竟積到十萬多銀子卻悄悄叫太監拿出宮去交給她主母布政使太太替她存放生息那銀子利上滾利一天天多起來了杏花春怕她主母起黑心謀吞她的銀子便打發太監去對她主母說要她主母出一張憑據她主母聽了十分生氣立刻要把銀子退回宮去還她杏花春害怕起來情願拿一萬兩銀子孝敬主母主母不肯收杏花春無法可想便在皇帝跟前替侍郎的兒子說了賞他一個小京官才罷後來八國聯軍打進京城來西太后趁忙亂的時候叫太監暗地裏去把杏花春勒死了把她的錢統統拿了去這都是後話如今再說那陀羅春進宮時候悲慘的情形皇帝得了杏花春牡丹春海棠春三個美人以後立意要再去找一個美人來湊成四春有一天皇帝喬裝打扮作客商模樣出宜武門閑玩去走過金鎖橋下遠遠看見對岸一個女孩子在河埠洗衣服那面貌長得十分美的急過橋去看時那女孩兒已走進一座黑漆大門裏面去了皇帝在門外守了一會不見她出來當日回宮去便吩咐崔總管明天多帶幾個侍衛到她家打聽去那總管奉了聖旨第二天趕到金鎖橋先在她四鄰探問才知道這家姓李家中只母女二人母親是個寡婦女兒今年十七歲了崔總管聽說都是女流之輩量來總是容易到手的便去金店裏兌了一千兩銀子分開裝在四隻紅盤裏叫四個侍衛捧著崔總管前面領著打門進去把銀子擱在廳屋裏把來意說明了那寡婦聽了一口拒絕說道俺女兒說了婆家了便是沒有婆家也不願葬送她到深宮裏去誰稀罕你的銀子來快拿出去雖說是皇帝家裏也要講個理怎麽可以強逼良家女子做這下賤事體快回去你若不出去俺便到提督衙門告狀去崔總管聽了不覺大怒說道量你一個婦人怎能跳出俺家萬歲爺的手掌俺如今且去在這十小時內管叫你家破人亡那寡婦聽了正要說話還是女兒走來把母親拉進屋子去直待崔總管去遠了她女兒對母親說道孩子聽說當今皇上是個色中餓鬼那班強徒雖暫回宮去便要再來孩子若不避開便要遭他們的毒手孩子不如暫時避到姨母家中去她母親聽了女兒的話便把女兒送去姨母家中藏著到了傍晚時候那崔總管果然帶了十數個侍衛氣勢洶洶地打進門來原打算搶劫她女兒的後來在四處一搜搜不出她女兒便揪住了這寡婦在大街上走去消息傳到她女兒耳朵裏便要挺身出去救她母親後來被她姨母攔住說道你這一出去便是自投羅網了他們便拿你母親恐嚇著罷了照我的意思不如趁此機會找你女婿去你兩口子立刻成了親拉著你女婿一塊兒求統領老爺那老爺見你是有夫之婦便也無法可想便是當今皇上也不好意思硬拆散你們夫妻的女孩兒到了此時也顧不得了只得托姨母找媒人到婆婆家說去誰知她那女婿已在兩年前到南邊去還不曾回來生列未蔔呢女孩兒聽了這番話認爲自己命苦悲切切地哭了一場到半夜時分解下腰帶向床上上吊尋死被她姨母知道從床上救活過來姨母怕鬧出人命來將來宮裏向她要人脫不了干系便勸女孩兒自己投到尼庵裏去李小姐也依從了她姨母的話她母親原認識一個尼姑名叫月真是這裏西山上白衣庵中主持那月真向她問起才知道她母親被