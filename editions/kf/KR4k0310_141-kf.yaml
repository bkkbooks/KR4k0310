body:
  text: 第一百一回人面獸心竟爲竊玉容忠肝義膽甘作護花人話說童老太太用手向吳古一招嘴裏說道你且走過來我有話與你商量吳古便走到她的跟前躬身問道太太有什麽話只管請講罷童老太太笑道我有件事要奉請不知你們兩位肯與不肯呢吳古道老人家有什麽事情說出來我們只要辦得到沒有不答應的她道我們這裏保家倒不少可是要有十分真正的本領卻很少的在我意思想請兩位不要回去罷就在我們這裏不過是怠慢一些吧每年也奉贈點薄酬她說到這裏吳古忙道你老人家趁早不要講酬贈不酬贈的我們不在府上效勞便罷既在這裏還望太太賞賜麽不過我雖然肯在府上效勞可是我的兄弟未知他的意下如何呢待我先去問問他如果他答應我是無可無不可的他說著轉身向陸曾笑問道兄弟你方才聽見麽太太要留我們在府上效勞這事你看怎麽樣呢陸曾笑道你是個哥哥什麽事情全由你我還能作主麽你答應我就答應壽娥拍手笑道倒是兄弟比較哥哥來得爽快她說著對吳古笑道你也無須盡來推三阻四的了吳古道只要我們兄弟答應我還不答應童太太見他們全答應了不禁滿心歡喜便向吳古說道你可以回去將屋子裏的東西一齊送到這裏罷吳古笑道不瞞太太說我們的家內除卻四面牆壁而外卻再沒有什麽要緊寶貴的東西了我回去將門鎖一鎖就是了他便辭了童老太太回去將門鎖好回到孫府童老太太便命在自己的樓下收拾出一個房間來與吳古居住又在壽娥的樓下收拾出一個房間給陸曾居住她的用意不過因爲他們兩個本領實在不錯所以將他們的房間設在樓下如果有了變動以便呼應陸曾便送到壽娥的樓下居住這一來卻是有人在背地裏埋怨了你道是誰原來是衆保家的中間有一個名叫盛方的他本是一個落草的強盜出身在去歲八月裏的時候聽說孫府要請他保家他暗想自己做這個不正的勾當終非了局便投奔在孫府裏面效力他本來是個無賴之輩見了她家這樣的豪富眼裏早已起了浮雲三番四次的想來施展手腕露出本來的猙獰面目來無奈童太太待人寬厚沒有地方可以尋隙而且還有那一干保家的雖然沒有什麽本領但是比較平常人終有些三腳貓所以他雖然有這樣的野心可是受著種種不能昧良的逼迫只得打消他的壞意但是他見了壽娥這樣的姿色而且舉止風騷沒有一處不使人傾倒試想這樣的匪徒能不轉她的念頭麽成日價遇事都在壽娥面前獻殷獻勤的可是自己的品貌生得不揚憑她怎樣去勾搭壽娥總是淡淡的正眼也不去瞧他一下子看官們試想壽娥雖然是個淫蕩性成的女子但是尚未破瓜對於個中滋味尚未領略而且還有一個喜美惡醜的心呢她就肯毅然和這個言語無味面目可憎的粗貨勾搭了麽但是這盛方見她不理還只當她是個未知事務的女子含羞怕愧呢兀地嘻皮涎臉地和她纏不休她本是一個楊花水性的人有時也報他一笑這一笑倒不打緊那盛方只當有意與他的呢渾身幾乎麻木得不知所云其實她何嘗是實心與他顔色的不過是見他那一副尊容不由得惹人好笑罷了盛方竟得步進步的來勾搭了有時竟將那心裏的說不出的話和她很懇切的求歡她本想要大大給他一個拒絕無奈自己的生命財産完全系在他們一班人手裏所以不敢過於決裂只得若即若離地敷衍著這樣的混下去把個盛方弄得神魂顛倒欲罷不能那一股饞涎幾乎拖到腳後跟可是日子久了她仍是飄飄忽忽不肯有一點真正的顔色露了出來盛方不免有魚兒挂臭貓兒叫瘦之感真個望梅止渴畫餅充饑每每的碰見了她恨不能連水夾泥吞了下去每在背後自己常常地打著主意決定去行個強迫手段可是見了她賽如吃了迷魂藥似的就失了原有的主意消滅到無何有之鄉了再等她走了就後悔不叠的自己埋怨自己這個玩意兒不知弄了多少次數仍然是湯也沒有一湯他可急煞了有一晚上盛方吃了飯正要上夜班去守後門他剛剛走到百客廳的後面三道腰門口瞥見有一個人從樓上下來他在燈下仔細一看不是別人卻原來就是急切不能到手的她他可是先定一定神自己對自己說道盛方你的機會到了今天再不動手恐怕再也沒有這樣的好機會了他正自嘰咕著不防被她句句聽得清楚嚇得連忙回身上樓而去盛方一毫也未知覺低著頭只在那裏打算怎樣動手咧不一會只聽得有個人蹬蹬蹬地由樓梯上走了下來背著燈光一徑向他面前走來他可是一時眼花不管三七二十一上前一把將她往懷中一摟口中說道今天看你可逃到哪里去他剛說了一句猛聽得一聲顫巍巍的聲音向他說道盛方你將老身抱住意欲何爲盛方仔細一看不禁倒抽一口冷氣趕緊將手放下呆若木雞地站在一旁垂手侍立半晌說不出一句話來你道她是誰卻原來就是童老太太停了半晌童老太太開口問道盛方你方才是什麽意思呢他眼珠一轉計上心來便對她撒謊道我剛吃過晚飯預備後面去上班的瞥見一個黑影子從後面出來還當一個竊賊呢所以上前來擒捉不想原來是太太我實在是出於無心萬望太太恕我魯莽之罪他這番話竟將童老太太瞞過去了連道我不怪你這是你們應當遵守的職務她又獎勵盛方一番才到前面去盛方嚇得渾身冷汗不禁暗暗地叫了一聲慚愧不是我撒下這個瞞天大謊今天可不是要出醜了麽真奇怪了我明明地看見她下樓的怎的一轉就不見了莫非是到後面去了麽他疑神見鬼地到後面又尋了一會子哪里有一些蹤迹呢他十分納悶到了第二天的飯後只見她又從樓上走了下來他便涎著臉上去問道小姐你昨晚是不是下樓來的麽她聽說這話心中明白便正色地答道我下樓不下樓與你何關要你問什麽呢她說罷盛方滿臉緋紅停了半天才搭訕著笑道我昨晚似乎看見你從樓上走下來的怎麽一轉眼就不見了我心中疑惑不決所以問你一聲的她也不答話下了樓徑向後面而去盛方萬不承望她竟這樣正顔厲色的心早灰了半截但是停了半天忽然又想起她那一副聲音的笑貌來不禁又將那個念頭從小肚子下面泛了起來暗道大凡女子要和我們男人勾搭萬萬沒有一撮就成功的道理她既然給了我多少顔色或者是有意與我也未可知呢如果說她真正有意與我那麽她今天見了我又爲什麽這樣的冷如冰雪呢他躊躇了半天忽然轉過念頭自己對自己說道盛方你忒也呆極了這一點過門你竟不能瞭解還在風月場中算什麽健將呢我想她一定是用著一種欲擒故縱的手段來對我的心上確然有意可是她終是個女孩子家不好意思向我怎樣的擺出什麽顔色來呢她不是向後面去了麽我且去和她著實地碰一下如果真沒意思那時我自然看得出來的他打定了主意一徑向後面尋蹤而來一直尋到後面的花園裏只見她和兩個丫頭在那園內遊玩兩個丫頭一齊在假山石下坐在那裏猜數作耍她一個人卻在綠晴軒的東邊背著手正在那裏賞玩梅花他躡足潛蹤地溜到她的後面一把將她往懷中一摟笑道你今天可要依從我一件事情如不然我決不放你動身壽娥正在那裏玩賞梅花哪里提防從後面猛地被他一摟大吃一驚轉過粉頸正要開口又是一吻把個壽娥氣得柳眉倒豎杏眼圓睜厲聲問道盛方你作死了越來膽越大了竟來調戲我了還不放手休要慪得我氣起馬上喊人就叫你死無葬身之地他笑嘻嘻地說道小姐請你不要拿大話來嚇我須知我盛方也是個花月場中的老手什麽玩意兒我都瞭解明白無須再來裝腔作勢的了請你快一些答應我吧我也不是一個不知趣的只要小姐可憐我雖然粗魯些斷斷叫你滿意就是了壽娥暗想道我要是不答應他他一定是不肯甘心將我放了如其答應他我就能輕輕地失身與這個不尷不尬的匹夫嗎她柳眉一鎖讓上心來便對他說道你真有心愛我麽他聽說這話真個是喜從天降忙道我怎麽不愛你呢不瞞你說自從見了你差不多沒有一時一刻將你忘掉了她笑道既是這樣你且放手我有兩樁事告訴你隨你自己去斟酌好麽他聽說這話就如奉到聖旨一般地諾諾連聲忙將她放了她道你今天要和我怎麽樣那是做不到的因爲我們爹爹死了還沒有三年呢你果真愛我目下且不要窮兇極惡的等到三年過去了我自願嫁給你如何不獨你我了卻心願就是你也白白地占著一份若大的産業你不從我的話今天一定要強迫我做那些勾當老實對你講一句罷你就是將我殺了莫想我答應的他聽說這話便信以爲真忙答道多蒙小姐的一片好心我盛方也不是畜生不知好歹的小姐的好意難道我就不曉得麽照這樣說就遵小姐的示便了她又對他說道但是還有一句話要交代你你可要遵辦他連忙問道什麽事只要小姐說出來我沒有不遵辦的她道就是你這鬼頭鬼腦的不管人前背後烏眼雞似的都要動手動腳的自此以後不再犯這個毛病他忙道遵示遵示她說罷便喊兩個小丫頭一徑回樓去了他見她去了之後那一副狂喜的樣子可惜我的禿筆再也描不出來他自言自語道我本就料到我那心肝小性命小魂靈一定有意與我了等到三年之後不獨和小魂靈在一起度快活日子呢還有許多屋房田地騾馬牛羊錦衣玉粟我的老天哪還有一庫的金元寶銀元寶一生一世也受用不盡留把兒子兒子留把孫子千年百代我盛家還不是永遠發財麽他夢想了一陣子不禁歡喜得直跳起來他正在這得意的當兒不提防有個人在他的腦袋上拍了一下子然後笑道你發的什麽瘋盡在這裏點頭晃腦的他被他拍了一下於倒是一噤忙回頭看時原來是同伴魯平他不禁笑道我快活我自快活我有我的小鼻子小心肝小肉兒與你有什麽相干呢他數蓮花似地說上一大陣子魯平笑道你看他不是數貧嘴了麽今天究竟爲什麽事情就快活得這樣的厲害啊他將頭搖得好像撥浪鼓一般地說道沒事沒事與你沒有什麽相干魯平笑道不要著了魔啊且隨我去吃老酒他便高高興興地隨他去吃老酒了光陰易過一轉眼到了第二年的臘月了他度日如年的眼巴巴地恨不得三年化作三天過去好早進遂了欲望不料憑空來了一個陸曾起首他還未十分注意後見壽娥步步地去趨奉他將自己理也不理才大吃其醋但是表面上還不敢十分過露神色心裏本已恨之切骨了再等到陸曾的臥房搬到她的樓下那一股酸火從腳心裏一直湧上泥丸宮再也按捺不下暗暗地打定了主意便對同伴說道你們看見麽這姓陸的與姓吳的是現在才來的太太和小姐什麽樣子的恭維他們將我們簡直看得連腳後跟一塊皮還不如呢試想我們在這裏還有什麽趣呢衆人道依你怎麽辦呢他道依我辦太太和小姐恭維他們不過是贊成他們的武藝別的沒有什麽我想今天飯後將姓陸的姓吳的一齊帶到後園明是請他們指教我們的武藝暗裏在他們不提防的當兒把他殺死不是顯我們的本事比他們好麽等他們死了還怕太太不轉過來恭維我們嗎衆人聽他這話一齊道好到了飯後他便去請吳陸到後園去教導武藝陸曾吳古哪里知道他們的用意不良便一口答應下來這時童太太和壽娥聽說陸吳二人今天在後園裏教導大家的武藝便也隨來看熱鬧到了園裏十個家將兩旁侍立陸曾對吳古道大哥你先教他一路刀法罷吳古笑道偏是不巧這兩天膀子上起了一個癤十分疼痛你的武藝卻也不錯就是你去教也是一樣的盛方本來是不注意吳古見推舉他正中心懷忙對他道就請陸將軍來指教也是一樣的陸曾不知是計便走了過來向他們抱拳當胸說道兄弟粗知幾手拳腳幾路刀槍並不是十分精練的承諸位老兄看得起一定叫兄弟出來獻醜兄弟只得應命了可是有多少不到之處還請諸位原諒一些才好呢衆人都道陸將軍請不要客氣你的武藝諒必不錯就請賜教罷陸曾笑道哪一位仁兄請過來與兄弟對手還是兄弟一人動手呢他還未說完盛方手握單刀縱身跳入圈子口中說道我來領教了他說著冷不提防迎面一刀刺去陸曾大吃一驚便知道他們一定是不懷好意了趕緊將頭一偏讓過一刀飛起一腿正中在他的手腕只聽得嗆啷一聲一把刀落在地上陸曾何等的靈快趁勢一把將盛方領頭抓住一手揪著他的腰鞭高高地舉起走了數步將他往地下一放笑道得罪得罪他滿面羞慚開口不得那一班人嚇得將舌頭拖出來半晌縮不進去誰也不敢再來討沒趣了面面相覷陸曾挨次耍刀弄槍的一陣子大家散去童老太太滿口誇讚壽娥更是傾心佩服到了晚上盛方早打定了主意暗想自己今天被陸曾丟盡臉面料想那壽娥愛我的一片心必然是移到他的身上去了此時再不設法眼見這個天仙似的人兒要被別人佔據了他暗自盤算了多時猛地想出一條毒計來暗道今天直接到她的樓上用一個強迫手段她肯已經失身與我木已成舟料想那個姓陸的也沒有辦法了萬一不肯一刀將她結果了大家弄不成他打定了主意背插單刀等到三鼓的時候悄悄地直向她的繡樓而去再說陸曾日間受了他們一個牢籠計幸虧他的手腳快不然就要丟了他的性命他暗自沈吟道照這樣的情形難免有岔子出來他們這樣的來對待我們一定是懷著妒嫉心了萬一深夜前來行刺那才措手不及呢他想到這裏不由得打了一個寒噤坐在床邊又想了一會子越想越怕便將單刀取下擺在枕頭旁邊和衣倒下誰知心中有事一時也不能入夢翻來複去總莫想睡得著到了三鼓以後正要起身小解瞥見一個黑影子從門隙裏一閃他曉得不對連忙從床上輕輕地坐起取了單刀下床輕輕將門一開只見那一條黑影子直向樓上而去他更不敢怠慢握著單刀跟著也徑上樓來到了樓門口只見那條黑影子立在房門口用著刀在那裏撬門從背後看去好像是日裏那個人他暗道如果是他到此地來是想什麽心事呢這正是饒君用盡千般計回首還防背後人要知後事如何且看下回分解
