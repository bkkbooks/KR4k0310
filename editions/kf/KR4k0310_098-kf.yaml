body:
  text: 第九十八回保家聲醇王忍小節斮國脈宣統讓大位卻說那柳筱閣自結識了大福晉一切的舉止上頓時豪放起來凡吃的穿的自異於儕輩就是他妻子頭上插的手上戴的也大半是貴重品物柳筱閣到底是個優伶能有多大的進款卻能備辦這些貴重物來況且有許多東西還是外邦進貢來的無價之寶呢休說是伶人不應有的即使一二品大員家裏也未必拿得出咧至伶人進宮唱戲無論受特等恩賞也決不會有賞這種貴重東西的西太后那樣奢靡賜給伶人至多是金銀綢緞之類沒有聽得賞寶物的柳筱閣和大福晉的勾搭不清人家就形式上已測度到了柳筱閣又不知自斂還時時拿些世上稀有之珍去炫視同輩一班伶人誰不眼熱呢這樣一來豔羨他的一變爲妒忌他的了日子長久了柳筱閣和大福晉的關係漸漸傳入大衆的耳朵裏巷議街談差不多成了一種新聞哩在這當兒恰巧醇王府裏的老九要和柳筱閣爲起難來但第九在王府中本很具有勢力他與柳筱閣做對頭原是吃醋問題所以借著竹杠名目想難倒了柳筱閣令他不敢再渡蘭橋自己好和大福晉重圓舊好柳筱閣如其知機而退也不至弄出事來了偏偏他色心正熾不肯甘心讓步老九便不時向柳筱閣索詐由三百元而五百元多至一千元終難填他的欲壑其實老九何嘗需這點點小數目總而言之要攆走柳筱閣罷咧後來老九差不多天天向著柳筱閣借錢了好在老九是住在王府內的柳筱閣進出日日要碰見的自然避免不了柳筱閣給他纏得慌了便告訴了大福晉將老九逼迫的情形一一說了大福晉怒道咱們因他是多年的當差才到今天的地位倒也很瞧得起他不料這奴才如此無禮咱叫王爺攆他出去就是了過不下幾天醇王果然吩咐老九道你跟俺已多年了也不忍令你他去但福晉很不滿意於你你就隨俺到別墅裏去過幾時罷老九不敢違背只好唯唯退去到醇王的別墅中去了老九走後心上十分忿憤暗想這不是大福晉聽了柳筱閣那廝的鬼計嗎咱現在拼著不在王府裏當差還是要和姓柳的見個高下於是便去糾集了許多當差的同黨大清早來醇王府的後門守候不多一刻已見柳筱閣大搖大擺地來了老九就拿出往日敲竹杠的手段要和柳筱閣借錢柳筱閣已知道他不在府中當差自然不怕他了二人一句吃緊一句不免實行武力解決老九本想痛打柳筱閣一頓的只要柳筱閣動手便一聲暗號當差的一擁上前都望柳筱閣打來誰知柳筱閣是唱武生的膂力很是不小一瞧衆人手多即刻放出本領施展一個解數退到了空地上顯出打慣出手的武技把衆當差的打得落花流水老九的左膊也吃柳筱閣打折了一場武劇做完老九領了衆人四散逃走柳筱閣依然大踏步進王府去了但老九吃了這一場大虧如何肯了結呢自思潛勢力又不及他打又打不過他這樣就不圖報復嗎他想了一會只有把柳筱閣的事去報告給醇王知道可是醇王曉得大福晉和他不對若是直說一定要疑心他有意攛掇倘醇王回邸去一問被大福晉花言巧語輕輕地把這事瞞了過去打虎不著反要喪身哩所以那報仇的計策只有等柳筱閣等不防備突如其來地進去看他們遁到哪里去老九主意打定便靜候著機會一天醇王朝罷正向載振邸中走去老九故意氣急敗壞地趕過醇王的輿前醇王瞧見在輿中問道老九急急的往哪里去老九假做吃驚的樣子很遲疑地答道奴才在別墅中不是王爺來召喚過的麽醇王詫異道咱幾時著人召你的老九說道剛才有一個小內監來說王爺今天請客是專誠款待柳筱閣的此刻命奴才到聚豐樓去喚一席頭等酒席哩原來老九打聽得柳筱閣在醇王府中和大福晉飲酒以是敢捏造出無中生有的事來當下醇王聽了大怒道咱何嘗請什麽客就是請客也決不請一個下流戲皮子你不要胡說罷老九正色說道奴才也在那裏疑惑王爺怎請起戲子來呢真正笑話了但喚酒席是小太監說的奴才聽得是王命的命令不敢怠慢因此急急地跑去聽說立刻等著要吃咧王爺既不曾有這一回事那又是誰說的呢斷不是無事生風的罷醇王給老九一言提醒不覺頓了一頓心裏著實有些狐疑起來因爲平日對於柳筱閣的行爲也有點聽在耳中當西太后在日柳筱閣出入宮禁時有不安分的舉動看在眼裏今天突然觸起他的名兒自覺有些疑心了私下忖道莫非咱們府中也有和柳筱閣這廝糾搭的麽咱聽知這姓柳的戲皮子專門和王公大臣的內眷們不清不楚咱們不要也演這出戲呢醇王想了半晌也不往載振那裏去了只叫轎子往自己邸中來老九見計已行忙在轎前開路一面暗令同黨去把王府後門鎖住自己隨著醇王一路回邸轉眼到了邸門前照例當差的要齊聲吆喝一下因這天預先得著老九的暗示大家便默默無聲故此裏面的人一點也不曾察覺大福晉其時正和柳筱閣歡呼對飲不料醇王會在這個時候回邸就是偶然早歸外面全班喝道府中人早已聽得了王府裏房屋多大柳筱閣一個人何處不好藏躲呢只消避過了風頭由使女悄悄地從後門放了出去可算神不知鬼不覺哩這樣的做過幾轉大福晉和柳筱閣的膽子也一天大似一天了這天照常在後花園亭上放膽飲酒說笑一點不提防別的那個花亭是醇王在炎暑時憩息之所亭的裏面除大小書案之外古董珍玩不計其數又有幾樣值錢的寶物一樣是劍青魚爲鞘上嵌碧玉一經啓視光鑒毛髮據說此劍一名湛盧是從前歐陽子所鑄歐陽子一生只鑄得六劍除了雌雄兩劍一名巨闕一名青虹一名太阿還有一口就是這湛盧了講到這口劍的好處吹氣能夠斷發殺人不見血砍金銀銅鐵石壁好似腐草一般當聖祖收大小金川醇王的高祖也相隨軍中一天夜裏巡營到一個地方見火光燭天醇王的高祖恐有埋伏忙令小卒前去探視回說只有一口枯井那火光是從井裏出來的醇王的高祖識得其中有寶物埋著喝令竭力望井中掘下去就得到這口寶劍醇王府中遺傳下來當它是件傳家之寶此劍風雨之夕自能戛然長鳴佩帶之人如中途逢著暴客也能作響報警倘府中有賊盜凶事發生劍就會跳出鞘外三寸錚錚有聲光緒帝入繼之時劍曾叫過一次所乙太福晉已知凶多吉少不肯放光緒帝進宮就是這個緣故還有一樣是一張瑤琴這琴是周幽王時大戎主所進琴上綴有石玉金紋聲音異常嘹亮當月白風清名手鼓起琴來悠揚之聲可聞數裏真有空山猿嘯天際鶴舞之概醇王把一琴一劍視做第二生命一樣輕易不肯供人玩視的王府之中以前有一個侍姬能操此琴大福晉很愛這琴因請那侍姬指點學琴後來福晉才學得一半那侍姬已然死了以是醇王見物思人益發珍視那張琴了現在除了大福晉能奏幾曲之外無人能彈這琴了這天柳筱閣和大福晉在花亭上對飲柳筱閣忽然指著那張琴笑對大福晉說道福晉能操這琴的麽大福晉笑答道咱曾叫府中的侍姬教過但沒有學得好那侍姬死了直到如今不去弄它咧柳筱閣笑道我知道福晉很好這個今日倒還有興請福晉彈一下子也使我清一清濁耳何如大福晉笑道咱這點拙藝是很見笑的不必彈罷柳筱閣一定不依逼著大福晉彈一曲大福晉不好過於推卻便一頭笑一頭把那口琴取來拍去琴上的塵埃先和一和工商亮了一亮弦子然後端端正正地坐下去輕舒纖指彈起琴來首段彈了一曲平沙落雁二段是劉備歎靈三段是風送松聲四段是景陽開泰福晉彈到這裏把琴聲突然止住笑問柳筱閣道如何不是很見笑吧列位須知琴這樣的東西原有七忌七不彈的規則它規例上第一個就是不遇知音不彈俗諺不是有句對牛彈琴的話說嗎彈琴給牛聽明明說是聽的人不懂什麽簡直和牛差不多一句比較閒話啊柳筱閣是個伶人相處的都是下流社會他懂得什麽琴不琴呢僥倖給他唱戲唱紅了西太后召他進宮也居然出入宮禁的自大福晉和他結識常常在花亭上飲酒才得瞧見這風雅東西不是取笑他在平時柳筱閣全不懂得只覺叮叮咚咚罷了福晉問他他也只有瞎贊了幾句便胡亂說道這琴聲還似乎欠熱鬧一些大福晉笑道要熱鬧嗎咱就彈一段赤壁鏖兵罷說道又和起弦來指彈手挑直彈得刀槍震耳金鼓齊鳴側耳細聽真有金戈鐵馬之聲確實彈得好琴大福晉彈畢對柳筱閣一笑柳筱閣實在苦於不識又瞎稱讚了幾句他忽然想起戲臺上鑼鼓有什麽十面埋伏的敲法不知琴中有這個調子嗎想了一想就開口問大福晉道這琴裏也可以說什麽十面埋伏麽說了一句把兩眼一攢做了一個鬼臉似乎怕福晉笑他外行似的大福晉見問點頭笑道調門是有的只不過很不容易彈得好咱還不曾習得精明哩大福晉說這話是因柳筱閣講得出調名疑他也研究過的恐自己班門弄斧貽笑方家呢其實柳筱閣哪里是懂這工商角徵羽的玩意兒可憐他不過表演九敗章邯中楚霸王出臺趟馬的時候鑼鼓打十面埋伏的調門所以他這時亂猜一下預備猜錯時給福晉一笑而已哪知恰被他猜著大福晉還當他是內家啦但是若沒有這一猜也不至於弄出事來了其時柳筱閣已猜中了自然要充內行到底逼著大福晉再彈一曲十面埋伏大福晉更不推讓就重整弦索再和工商彈起那十面埋伏的亂聲十八拍來柳筱閣雖一竅不通也覺得十分熱鬧只見大福晉手忙得碌亂顧了彈又顧拍撥挑按捺十指齊施悠揚處如泣如訴剛勁如虎嘯龍吟可惜彈給柳筱閣這不識貨的聽冤屈了福晉的好琴了因大福晉的琴技北京很有名望休說是滿族中算是名手就是我們漢人中也未必有勝於她的呢偏偏這木偶式的柳筱閣倒有這樣的耳福倘然把當時琴聲用收音機收著放到如今不是成了絕響嗎大福晉似這般的彈得珠汗盈頭柳筱閣也依然是木不通風全不知道好壞真可算得是鮮花載糞土脂粉饋無鹽了大福晉正彈得起勁卻有一位知音客從外面來了這知音客是誰呢自不消說得便是那位醇王爺了原來醇王聽了老九的一片鬼話心上疑惑起來也不到別處去竟同了老九一直回轉王府來那些王府中的當差預得老九的知照也一聲不吱地接了王爺進去只依例上前請了一個安退去在一邊瞧他們演話劇當下醇王走進邸中平日總是先到內書房看了些各處來的公文請單及外吏內臣送給他的許多禮物單一樣樣的過了目然後到上房和大福晉談些閒話在福晉房裏用了點心才出來再理公事這個時候大約已是下午三時多了因醇王從朝裏回來終在這個時候了那時柳筱閣已去萬萬不會撞見的啦習慣成自然是百無一失的啦豈知今天醇王回來得特別早逾了往時的定例大福晉是做夢也不防的她不曉得還有一個冤家老九在那裏攛掇著是非呢這天醇王有老九領了路也不照例到書房卻一直轉入後堂望著園中來了但此時如無老九作倀醇王就逾了時間早歸他必定先到書房邸中侍女瞧見了忙去通知大福晉打發柳筱閣溜走還正來得及哩現在老九一作梗醇王也忘了所以便一直往前地走到花園裏去咧當醇王踏進後堂已聽得琴聲嘹亮知大福晉彈的因府中無第二人會這玩藝的呀醇王剛待跨入園門老九就止住了步不走了醇王見老九退立一旁心裏愈不安了想其中定有緣故那疑雲更陣陣上來啦這許多地方是老九的奸刁處他似這般一做作明明是提醒醇王叫他注意的意思在這當兒一個侍兒手中提了一把酒壺從花園中出來一見醇王慌得倒縮回去醇王見這侍兒一種鬼鬼祟祟的樣子更令他增添疑惑了於是就喝住那侍兒不許她回轉自己便順著琴聲走來醇王在自己邸中一望已明白了知道大福晉是在花亭上彈琴所以也向花亭而來走到亭畔聽得琴韻悠揚不由得喝一聲采這喝采聲把亭上的琴聲立時打斷大福晉聽見是醇王的聲音早吃了一驚慌忙將琴一推待探首出來望時醇王已走上了花亭瞧見柳筱閣坐在那裏大福晉呆立在窗邊兩眼直望著自己發怔不覺大怒道反了反了真會有這件事的嗎柳筱閣一見是醇王也不免嚇了一跳他一時情急智生待那醇王立在亭門口裏便忽地直立而起沖到醇王面前乘他不曾提防只飛起一腿把醇王直踢下亭去自己就拔步一溜煙地逃出花園去了這也是柳筱閣淫罪未盈不該絕命老九怕做大福晉的冤家中途見大功告成便退出外面去了但一個王府之中難道會沒有一個當差的跟隨嗎因花園是醇王內府遊玩的都是眷屬當差的不奉召喚不能進入後堂的何況是到花園裏來了那老九到園門退下也是這個意思醇王給柳彼閣踢了一個跟頭已然頭暈磕銃哪里還能叫喊呢不然只要他一聲高呼柳筱閣就是生了翅膀也飛不出這個王府啊那管園門的見柳筱閣很急促地跑出來本要攔住他的後想他是大福晉的紅人雖有老九的命令叫他將園門守住卻不曾吩咐他捕人況老九的勢力到底不能和大福晉比較自己做個管門人敢與福晉作對嗎想到這裏便任那柳筱閣出去了醇王跌在地上由大福晉扶他起來一面替他拍著塵埃一頭淚汪汪地跪在地上認罪醇王起初是怒氣勃勃恨不得把劍拔出來拿大福晉一砍兩段繼又想自己是個攝政王這事如聲張出來反於名譽有關滿朝文武得知必看輕了自己且與大福晉多年的夫婦也有些不忍她縱不好現在兒子溥儀做著皇帝說不定存太后希望哩倘一經揭穿出來也須累及兒子醇王想到這裏氣早平了下去只長歎一聲吩咐大福晉下次不准和柳筱閣來往否則須小心腦袋大福晉含淚應允且按下了再說革命黨幾番起事不成倒犧牲許多生命如何肯甘心呢這次卻暗中運動了軍隊在武昌起義了風聲所播各地都回應清廷聽得消息頓時手足無措平時又沒防備萬不能和民軍打仗因此溥儀只好讓位要知後事如何且聽下回分解
