body:
  text: 第四十九回紅燭照處美人死綠樹蔭中帝子來卻說孫太太回去的第二天顧家果然打發一個媒婆來第二次到孫家來說媒那含芳小姐起初聽說顧家來求媒她猜那顧家公子必是一個紈袴子弟不懂得恩情的因此第一次求婚時便一口回絕此番見顧少椿是一個翩翩公子又是美貌又是多情她如何不肯況且他兩人在河底裏粘皮貼骨地摟抱過在含芳小姐心裏這生這世只有嫁給顧家公子的了暗地裏問她妹子時也願意一塊兒嫁去到了夜裏含芳小姐悄悄地把這個意思對她母親說了她母親便打發媒婆來對胡氏說知那胡氏聽孫家允了婚且一允便是兩個她如何不樂便是顧少椿心裏也是喜出望外因此他的病也好得很快胡氏看她兒子全好了便預備揀日子給她兒子定親誰知好事多磨在他們定親的前一天忽然接到他父親從北京寄來的一封信說已替他兒子在北京定下一頭親了女家也是做京官的並說當年要娶過門的少椿看了好似兜頭澆了一勺冷水氣得他話也說不出來整整地哭了一天第二天便病倒在床上胡氏看了十分心疼忙用好話安慰他一面托媒人回絕了那孫家那孫含芳姊妹兩人得了這個消息一不哭二不說話暗地裏說定了一輩子守著不嫁好在她家裏有的是錢又沒有別的兄弟這萬貫家財也夠她二人澆裹的了只是那顧少椿心中十分難受這時已到盛夏天氣十分炎熱少椿便把臥榻移到樓下書房來他也是爲睡在床上可以望著對岸孫家妝樓的意思胡氏卻不知兒子的用意只好順著他的心意罷了看看睡了幾天遠望那對岸的妝樓終日窗戶緊閉少椿心想含芳小姐也病倒了嗎可憐俺兩人一段心事隔著河有誰替俺去說他因想起心上人常常終夜不得入睡有一天半夜時分他在床上正翻騰不安的時候忽然聽得窗子上有輕輕剝啄的聲音少椿霍地跳下床來輕輕地去開了後門見月光下亭亭地站著一個美人兒望去好似那含芳小姐這時少椿情不自禁了一縱身撲上前去拉著她的玉臂兒說道想得我好苦也那小姐忙把少椿推開低低地說道俺不是含芳俺是漱芳姊姊想得你厲害你快去吧少椿看時見河埠下泊著一隻瓜皮小艇子少椿理顧不得病體和漱芳兩人手拉手兒下了艇子輕輕地渡到對岸只見那含芳小姐站在石埠上候著他三人便並肩兒坐在石埠上娓娓地傾談起來好在有一排柳蔭兒做著天然的屏障外面的人也瞧不見他們他三人直談到五更雞唱才悄悄地各自回房去從此以後石埠聚會成了每夜的功課天氣自夏而秋外面的風露漸漸兒有些忍不住了漱芳小姐便想了一個法子叫少椿留心看著每夜覰孫太太睡熟了他們便在樓頭上點一盞紅燈見了紅燈便悄悄地渡過河來她姊姊便把他接進屋子去倘然不見紅燈千萬莫過來少椿得了這暗號悄悄地過去徑進她們的妝樓一箭雙雕享受溫柔滋味這樣暗去明來又過了半年的甜蜜光陰有一天忽然大禍來了當她姊姊點著紅燈正在樓頭懸望時只聽嗖的一聲飛過一支毒箭來一箭穿過她姊妹兩人的太陽穴一齊倒在地上這毒箭是見血封喉的她姊妹兩人悄悄地死在樓上那顧少椿兀是靜悄悄地守在樓下直到天明還不見她姊妹來開門少椿心中越是疑惑越是不肯走開後來她家裏的丫頭走進小姐房裏去見兩位小姐並肩死在地上忙去報與太太知道那太太聽了直跳起來搶到她女兒房裏摟著兩個女兒的屍身嚎啕大哭那少椿在門外聽到哭聲知道事體不妙便不管三七二十一打進門去搶上樓去撲在兩位小姐的身上哭得死去活來那孫太太看著不雅吩咐把少椿拉起來一面報官去江都縣聽說出了這件人命案他關自來相驗見這顧少椿形迹可疑便把他帶回衙門去審問顧少椿見死了他的心上人恨不得跟她們一塊兒死去見縣官審問他便一口招認是自己謀害死的待到那問官問他爲什麽要謀死孫家的小姐和怎麽樣謀害死的他卻說不出話來那胡氏見她兒子被縣官捉去了急得她拿整千銀子到衙門裏去上下打點又寫信到京裏去要顧大椿急趕回揚州來告衙狀這時乾隆帝從杭州回來了正在揚州接了顧禦史的狀子便吩咐揚州知府把顧少椿釋放了那邊孫太太見釋放顧少椿如何肯休她也報著冤單赴水告狀去乾隆帝退還她的狀紙一面推說是可憐孫家的女兒年輕死於非命便派揚州知府禦祭去而追捕兇手的事件絕不提起便是地方官也弄得莫名其妙後來乾隆帝回鑾以後忽然有兩個少婦人打扮得十分鮮豔到孫家去探望孫太太那少婦自己說是姊妹兩人姊姊名倩霞妹妹名絳霞原在勾欄院中曾經得乾隆帝召幸過後來皇帝到杭州去吩咐她姊妹俟回鑾過揚州的時候在樓頭點一盞紅紗燈便當打發人來接她們進京去她家住在狀元橋邊狀樓靠河樓下也有一株楊柳如今孫家後樓也有楊柳樹樓頭也點一盞紅砂燈莫是皇帝錯認了孫家是倩霞家裏原要射死倩霞姊妹兩人的如今射死了孫家的姊妹兩人這句話卻被他們猜著了乾隆帝爲什麽要射死姊妹兩人連倩霞自己也不知道如今待做書的來替她們說吧只因乾隆帝見小梅刺死了汪如龍以後便刻刻留心疑心倩霞姊妹兩人也是來行刺的因此不敢留戀忙把她姊妹兩人送回院去帶她到京裏去只一句話原是說著玩的在乾隆帝心裏原不打算結果她姊妹的性命後來忽然想起不帶她姊妹回京怕她們怨恨從前皇帝寵愛他姊妹兩人的時候在枕席上什麽恩愛秘密的話都說過深恐她姊妹怨恨至極把宮中的秘密都泄露出去因此便起了謀殺她姊妹的心回鑾過揚州的時候便悄悄地打發一個侍衛拿毒箭去射死她姊妹誰知事有湊巧那孫家姊妹在那裏做偷期密約的事體樓頭也點一盞紅燈那侍衛錯認是倩霞姊妹的妝樓恰巧樓頭也有兩個美人兒並肩靠著那侍衛以爲目標是千真萬確的了一箭射去把好好一對姊妹花送到枉死城去了那倩霞姊妹兩人打聽得孫家出了這件命件心知皇帝要結果她二人的性命忙偷偷地把紅燈除去躲在別院姊妹的家裏待皇帝回鑾以後才出頭來到孫家去探望那孫太太聽了姊妹一番話又是傷心又是害怕只得把這案件擱起不提倒是那顧少椿不肯負心把含芳姊妹兩口靈柩接回去葬在自己祖墳上算是他的原配那北京娶來的算是繼配又把孫太太接到自己家裏和父母一般侍奉著可憐他兩家人只因皇帝一個念頭弄得他們家破人亡而乾隆肚子角裏早已把這樁事忘得一乾二淨了乾隆皇帝回到宮裏那和珅承造的圓明園四十景已成功了把天下的名勝都造在這一座園子裏又把天下的珍寶也都陳列在這座園子裏乾隆又去過驕奢淫逸的日子了要知後事且聽下回分解
