body:
  text: 第七十四回招展花枝嬌娃臨大敵掃除草寇虎將立奇功卻說吳漢背著他的母親一馬沖出南門正要投奔劉秀的大營誰知王饒早已得著這個消息點齊衆將將四門圍困得水泄不通專候吳漢到來這時見了吳漢闖出城來王饒勃然大怒厲聲大罵道反賊吳漢王家待你哪樣虧負竟失心反了好禽獸留下頭來免得咱家動手吳漢到了這時也不答話攪動長槍來戰王饒王饒蕩起雙錘蔽天蓋日價地逼住吳漢兩個人捨死忘生地大戰了八十多回合吳漢虛晃一槍思想要走王饒哪里肯放鬆一著雙錘如同雨點一般地逼住吳漢見不得脫身也就下了決心舞起長槍飛花滾雪般地惡鬥不止正在殺得難分難解之際瞥見劉奉倪宏各領一支人馬蜂擁而來將吳漢團團困住各展兵刃來敵吳漢呆漢與王饒正自不分高下憑空又添上兩隻猛虎吳漢雖有萬夫不當之勇到了此時也有些應付不來了戰夠多時吳漢只有招架之力並無還手之能只殺得塵沙蔽日煙霧障天吳漢暗道今番我命休也正在這萬分危急之時猛聽得西南陣角金鼓大振殺進一支兵來爲首一員大將手持龍舌槍閃電般地殺進重圍這時正南喊聲又起又見一員女將耍動梨花槍紡車似地突入重圍來和賊兵廝殺列位知道這兩支人馬是哪里來的原來劉秀昨天聽了吳漢的那一番話今天早就預備又聽得喊聲震地金鼓大鳴料想吳漢已經殺出城來忙與鄧禹商議援救之策鄧禹忙下令問道哪位將軍情願領兵去救吳漢話猶未了只見一將挺身出班躬身說道末將願去鄧禹和劉秀仔細一看不是別人就是岑彭二人心中大喜正要答話衆將中又走出一個人來向鄧禹嬌聲說道先生請發一支令箭奴家願隨岑將軍前去接濟吳將軍劉秀見他的妹妹要出馬忙道妹妹連日廝殺精神有限今天另派別將前去妹妹請養息養息罷伯姬聽得這句話不由得氣得杏眼圓睜柳眉倒豎忙對劉秀說道三哥哪里話來小妹這兩天一些也沒有痛快廝殺一場今天無論如何都要請令前去廝殺的鄧禹笑道既然小姐要去主公也不必過於阻止就請她幫助岑將軍前去就是了劉秀也沒有什麽不贊成當下派兵一萬教二人各領五千前去接應吳漢他二人各領兵馬殺入重圍岑彭接住劉奉伯姬和倪宏搭上手奮勇大殺起來吳漢見援兵已到心中大喜精神陡長和王饒大戰三十餘合仍然不分勝負吳漢此時哪里有心廝殺只想突出重圍無奈王饒的雙錘兀地緊緊逼住不得脫身又怕母親在他的肩上辰光多了吃不了驚嚇滿心焦躁奮起神威恨不得一槍將王饒搠死好闖出重圍王饒到了這時見劉秀有兵來接濟吳漢不由大怒起來耍動雙錘恨不得將吳漢一錘打死方泄胸中之恨哪里還肯放鬆一步這時西北陣腳忽然大亂起來只見王霸舞起雙錘只打得一群賊兵人翻馬仰登時殺到面前王霸大叫道小弟奉了鄧先生的命令前來接應將軍將軍請暫且住手將這狗頭丟下與我結果他就是了王饒見王霸進來心中暗暗吃驚只得舞起雙錘來迎王霸吳漢見此光景再不逃走更待何時大吼一聲殺出一條血路直向劉秀的大營而來還未到營前早見劉秀和衆軍並馬迎接鄧禹首先說道將軍深明大義棄暗投明不獨禹等深自慶慰即是漢家又多一個柱石吳漢喘息答道罪將來遲萬望諸公原諒劉秀忙趕著下馬親手扶吳老太太下馬口中說道累老太太受驚了吳老夫人忙答道主公哪里話來犬子不肖歸附王郎拒抗天師罪無可逭再不早爲依順麾下益發要萬世唾駡了大家你謙我讓的一陣才一起進營再說劉伯姬與倪宏戰了一百二十餘合未分勝敗伯姬長笑一聲兜馬就走倪宏哪知就裏拍馬追上趕到分際劉伯姬霍轉柳腰颼的一箭覰准倪宏的咽喉射來倪宏忙將頭一偏那支箭從頭邊恰恰的飛過倪宏大驚正要帶馬回頭第二支箭已經飛以倪宏趕緊再讓說時遲那時快第三箭已經攢進他的肋下倪宏大叫一聲翻身落馬劉伯姬梟了首級拍馬重新殺入重圍只見岑彭和劉奉正殺得不分上下伯姬更耐不住攜馬搖槍雙戰劉奉那邊王霸和王饒也鋒芒相對惡鬥不衰這時李通銚期的兩隊兵馬已經趕到翻翻滾滾大殺起來那些賊兵東逃西散鬼哭神號王饒見士卒奔散心中焦躁萬分大吼一聲意欲逃走王霸趁此機會舞動雙錘直向他的馬頭打下王饒連將馬頭一帶那馬憑空一跳四足躍起有六尺多高讓過雙錘李通穿雲閃電般地闖到垓心大喝一聲手起刀落王饒措手不及眼睜睜他一員勇將身首異處了劉奉見到王饒已死心中加倍驚慌戰法散亂伯姬岑彭的兩支槍蔽雲遮日一般地將他裹住劉奉到了此時料知事情不妙不如下個死心搠死他們一兩個也算不得白死他想到這裏攪動方天戟神出鬼沒地和二人惡鬥不止劉伯姬一面迎敵一面向李通喊道此時還不去取城等待何時這句話提醒了李通忙和銚期帶兵竟逼城下城上那些賊兵大驚失色手忙腳亂又不知怎樣才好銚期一馬當先闖過吊橋猛可裏城上轟天價的響一聲將千斤閘放下可巧銚期正到城門忙舉右手將閘門托住坐下烏騅馬四足撐開雙耳豎起動也不動李通忙領動人馬像潮水一般直往裏擁進城上那些賊兵慌了手腳真個是軍無主將人情洶洶便各自去尋生路也顧不得許多撒手飛奔李通忙領兵上得城頭先將千斤閘絞起然後和銚期收服殘卒預備出城迎接劉秀再說劉奉和伯姬岑彭又戰了五十多合一心想走無奈插針的工夫也沒有他丟去一個解數預備動身伯姬早已看出情形故意將馬一拍跳出圈子讓他逃走劉奉得了這個空子忙拍馬闖出垓心落荒而走伯姬隨後趕去劉奉扭轉身軀彎弓搭箭颼的一箭向伯姬的右手射來伯姬手明眼快忙用梨花槍一撥那支箭滴溜地直向草地上落下劉奉見一箭未中心中大怒第二箭又飛了過來伯姬長嘯一聲手起箭發將來箭撥開有三丈多遠劉奉驚得目瞪口呆半晌說不出話來急忙帶馬就逃還未扭轉馬頭伯姬的第二箭已經射中他的馬首那馬雙吼一聲霍地一跳將劉奉掀落馬下伯姬正要下馬來殺劉奉瞥見岑彭一馬趕到她深怕岑彭爭功趕著手起一槍忽聽岑彭大叫道姑娘請慢動手我有話講話還未了劉奉的喉嚨早已現出一個透明的窟窿鮮血直噴一縷魂靈早到閻王那裏去交帳了岑彭道姑娘忒也手饞了伯姬笑道岑將軍這話不是奇極了麽如果我們不是他的對手還不是照樣被他結果了麽岑彭笑道並非這樣我看這員賊將的能耐著實不可多得如果用柔軟的手段來將他收服住不是主公的一個大臂膀麽伯姬聽了這話懊悔不叠地答話何不早說何不早說如今有什麽法子挽回呢說罷翻身下馬掣出佩劍將劉奉的首級割下和岑彭收兵入城見城中的百姓安逸如常歡聲載道他二人見過劉秀伯姬在帳前將倪宏劉奉的兩顆首級往地下一擲向劉秀說道三哥請你仔細看看是不是那兩個賊將的狗頭劉秀哈哈大笑道不想賢妹竟有這樣的能耐我還不佩服麽鄧禹介面說道主公哪里知道小姐的本領我早就料到小姐今天一定要馬到成功了帳下諸將同聲贊道姑娘的武藝實在超凡這兩個賊將除了她別一個實在有些棘手呢劉秀笑道今天要算三妹頭功並非是我的私護衆將忙躬身答道那自然主公不要儘管客氣罷鄧禹取出功勞簿首先寫起劉伯姬的戰績第二便是李通其餘諸將也都按功登記次日便要領兵去攻邯鄲耿況彭寵二人進議道南欒鉅鹿俱爲北伐要徑馮將軍去攻南欒未知勝負如何如果南欒一下邯鄲即易如反掌了話猶未了馮異的牙將進帳報道馮異於午牌時候已得南欒劉秀大喜耿況道南欒既得須乘勝進攻邯鄲但是這兩處俱爲重要地方不可疏失才好鄧禹對他們二人笑道依我的愚見請彭將軍鎮守南欒耿將軍留守鉅鹿那就萬無一失了耿況忙要回答劉秀鼓掌附和道先生這話是極了我也是這樣的設想彭寵忙道馮將軍智勇雙全現在南欒還怕有什麽差錯呢鄧禹道彭將軍請不要推辭馮異目下正要用他而且鎮守的職位非要老成持重者不可彭寵再三推託劉秀道彭將軍莫非是見怪麽彭寵忙躬身說道既是這樣末將不才便去效勞是了鄧禹又點五千士卒與彭寵替回馮異一面又留下一萬五千精兵耿況守鉅鹿安排停當第六天是黃道日期便拔寨起身一路秋毫無犯浩浩蕩蕩直向邯鄲進發不到兩日離邯鄲尚有三裏之遙鄧禹便下令紮營王郎早已得知消息先聽說吳漢反了已經急得走投無路後來接二連三的探馬報個不住又說鉅鹿失守南欒被陷王饒等陣亡把個王郎只嚇得一佛出世二佛涅槃搓手頓足竟像熱鍋上螞蟻一般一處搔不著整日價愁眉苦臉短歎長籲劉林趙猛等一班人也是面面相覷無計應付正是淚眼相看的當兒忽見報馬飛來報道劉秀的大兵已到東郊紮寨了王郎聽得這個消息只嚇得屁滾尿流張口結舌半晌說不出一句話來翻著兩隻眼睛朝左右說道如此便怎麽好劉林說道依我的主見不如去投降劉秀或者不失封侯之位呢王郎搖頭說道不行不行這個計策簡直是自己去討死我想我們若去投降那劉秀一定是不旨收納的到那時只消嘴一動我們還想活麽大家正自沒有應對的法子這時高家四將挺身出班說道大王休要高長別人的志氣滅了自己的威風愚兄弟四人願帶三千兵馬出城包將這班毛賊殺得他片甲不存王郎聽他這番話忙閃目一看只見高駿高騮高驊高駒弟兄四個雄赳赳氣昂昂地站在殿前他見此情形心中又沒了主意向劉林問道在卿家意下如何劉林答道依我的話還是投降的好高家四將雖有能耐怎能和劉秀手下的大將廝殺呢不要講別的單說昆陽一戰誰不聞名他們要去豈不是以卵擊石麽他還未說完高騮哇呀呀直嚷起來大叫道偏是你這狗頭貪生怕死的要去投降劉秀便在大王面前信口胡謅我們今天偏要去拼個你死我活高駿颼地一聲拔出寶劍剔起眼睛向劉林說道誰再提投降先結果了他再說劉林到了這時真個是噤若寒蟬一聲也不敢多響王郎見他們都動了火深怕弄翻了臉不是耍的趕忙說道高將軍的主見不錯自古道兵來將擋水來土淹還是煩四位將軍的大駕前去殺退賊兵孤王就萬分感謝了高駿等昂然退出來各操兵器飛馬出城指揮衆兵背城排成陣勢等候廝殺再說劉秀等正是才將大營紮好瞥見城門大開一隊賊兵蜂擁出來排成陣勢忙向帳下問道哪位將軍願去攻打頭陣景丹挺身出來向上打躬答道末將願往鄧禹心中大喜即對景丹說道將軍肯立頭功那就妙極了不過第一陣用不著將軍動手將軍的騎兵最好作爲後應殺得他措手不及才好呢景丹點頭稱是這時馮異伯姬同時出班對鄧禹討令出馬接著王霸蓋延也過來討令鄧禹也不阻止一一發下了令四將領令出帳鄧禹吩咐景丹道久聞將軍部下的騎兵非常厲害今天出陣務須趁他不備衝殺一陣爲上著景丹點頭會意出帳上馬點齊騎兵隨後起身趕到垓心只見高駿立馬垓心手持四竅八環潑風刀正在那裏罵陣劉伯姬哪里能忍耐攪動梨花槍那桃花征駒曉得要廝殺雙耳一豎直沖過去伯姬和高駿接近了各展兵刃奮勇大殺大戰二十餘合高駿漸漸不濟汗如雨下喘不成聲高騮見他大哥要走下風忙拍動征駒耍起雙鞭來助高駿雙戰伯姬伯姬哪里放在心上不慌不忙敵住二人又戰了五十餘合高駿高騮被她那支梨花槍只逼得像走馬燈一樣近身不得高驊高駒各催坐騎趕到垓心將劉伯姬團團圍住槍刀齊舉伯姬毫不怯懼奮起精神和四將大殺這邊早惱動了馮異手執獨腳銅人飛馬趕到垓心厲聲大罵道好狗頭你們以多仗勢麽他飛起銅人直奔高駿打來高駿慌忙敵住高騮撇下伯姬助戰馮異伯姬見去了兩個勁敵登時精神大振舞動梨花槍飛花滾雪價地逼住二人戰到分際猛聽得伯姬長嘯一聲手起槍下刺高驊於馬下高駒大驚兜馬要走李通帶了一隊兵從斜刺裏沖了出來擋住高駒大吼一聲手起刀落高駒的首級竟像西瓜一般登時和身上脫離關係高駿見兩個兄弟齊送性命不由得心中大驚刀法一亂被馮異覰著個破綻一銅人將他打得腦漿進裂翻身落馬高騮魂飛天外一鞭坐騎落荒而走馮異帶馬追來李通喊道馮將軍窮寇莫追由他去罷馮異收馬回來合兵一處景丹正要發出騎兵忽聽伯姬嬌聲向那些賊兵喊道衆賊子聽著要保全首級趕快抛戈丟甲還不失本身的地位那些賊兵聽得這話誰不望風歸附呢霎時倒戈棄甲一齊下跪馮異一一地安慰共收降卒二千餘人大家商量一會子便領兵乘勝攻城一時矢石如雨城上的守城賊兵死力拒住看看不支王郎到了這時真個是上天無路入地無門諫議大夫杜威對他說道高家四將現已陣亡還有什麽依恃呢在我愚見趕緊去投降還能保全原有的位置否則立刻攻破了城玉石俱焚那時悔之晚矣王郎忙道是極是極就請你去說罷杜威出來先命人將城門開放自己乘馬出城到了劉秀的大營將來意說明劉秀勃然大怒道王郎妖言惑衆罪在不赦還想保全原有的位置麽杜威道大王息怒久聞大王以仁信昭著今天邯鄲既降當然要封邯鄲之主爲萬戶侯以安人心劉秀大怒道王郎小丑竟敢冒充漢裔待他不死已是格外施思還想封他萬戶侯麽杜威不敢再說只得告辭出來劉秀督隊攻城一連攻了十數天城內因爲糧食缺乏衆心惶惶遂不由王郎做主一班士卒豎起降旗大開城門劉秀督隊進城再來搜尋王郎一些影子也沒有了連劉林也不知去向劉秀安民已畢便命大排宴席論功行賞諸將領你誇我的本領我贊你的功績吵鬧得一團糟似的劉秀與鄧禹前來一查點獨不見了馮異忙問衆人道馮將軍到哪里去了有個小卒上來稟道馮將軍在營後的大樹之下呢劉秀與鄧禹忙到後營果然見馮異獨立大樹之下異態消閒竟像沒有知道論功的一樣劉秀一把將他拉進營中正要行賞瞥見長安的使臣手執劉玄的封冊徑入帳來劉秀忙起來迎接鄧禹展開封冊只見裏面加封劉秀爲蕭王之職這正是慢道疆場無結果誰知竹帛早標名要知後事如何且看下回分解
