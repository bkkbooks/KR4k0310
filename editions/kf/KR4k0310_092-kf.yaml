body:
  text: 第九十二回植蠶桑農婦辱吏鬧宮苑喇嘛驅魂卻說西太后的鑾輿方出長安時街上忽然來了一個大漢赤膊跣足臉上塗著花彩雙手亂舞地直撲西太后的駕前兩旁侍衛立刻將大漢擒住一刀斬在街旁這時扈從的大臣深怕有刺客犯了禦駕即命追究那大漢的來歷經地方官報告才知道那大漢原是個瘋子當下鑾輿經過民間的婦女都長跪兩邊迎送西太后在輿中瞧婦女中間有一個穿補服的婦人很恭敬地跪在那裏西太后知道是個命婦令賞給銀牌一面這樣的一路進了潼關沿途都有官員長跪迎送護駕的兵丁除了原有馬玉昆的五百之外又有鹿傳麟宋慶和的軍隊過太原時光緒帝命將駐蹕地方的祠廟統賜匾額一方其時南書房供奉只有陸潤庠一個人不到半天功夫把七十多處的匾額都已題就了光緒帝誇獎了陸潤庠幾句還賜了一百匹銀絹但西太后住西安的時候有侍臣榮辛的兒子也常常在太后地方很得太后的歡心因爲榮辛的愛妾是侍候西太后的所以他的兒子得跟隨在左右那個小兒年紀不到四歲卻十分聰明西太后賜他的食物必先行了禮才敢取食因此西太后不時召見他後來等西太后回鑾那小兒忽然死了西太后很覺鬱鬱不歡足有三四天才旋旋忘去車駕到了大同山西撫台恩銘已預備了火車車上設了禦座裏面一齊都用黃緞繡著龍鳳花紋西太后登上火車不覺望著王公大臣微笑道咱們倒還有今天的日子說著便瞧著光緒皇上光緒帝卻低了頭只做不曾聽見一樣火車啓行好似風馳電掣一般直向北京進發既到了京中早有滿漢文武大臣和各國的公使在城邊迎接公使們見太后皇上下車都脫帽致敬西太后只對他們略略點頭便乘了鑾輿進城回宮可是一到了宮中只見什物零亂所有陳設的寶物失的失去毀的毀壞真是繁宮華庭頓成了荒涼世界西主後不由潸然淚下西太后回鑾之後腦子也漸漸地變過來這時淳親王載澧從德國謝罪回來力言外邦的文明西太后知道大勢已變非實地改革一下不行於是先把屈死的大臣一一複了原官入賢良祠受祭將珍妃的屍首打撈了起來以貴妃禮節安葬一面下詔實行新政凡舊日康梁所條陳的廢科舉興學堂等等從前所不贊成的現今卻都一件件地實行了然宮中自經這一次大創後不但實物的損失就是侍候西太后的那些婦女也多半走散了還有繪畫的繆素筠也生病死了李蓮英的妹妹又出嫁了端王的福晉因端王遣戍新疆罪婦不便入值其他所有的不過一個壽昌公主而已因此西太后覺得十分冷清了這個當兒慶王之女珍珠隨著福晉進宮西太后見她伶俐便命留在宮中那珍珠是往東洋留過學的閒談之間講起日本的婦女到中國來學習養蠶學會之後再研究種桑的方法她們準備自己去種桑養蠶了因日本人對於蠶桑也列在農學裏面很是重視的可惜日本氣候不對養蠶終是不發達的西太后聽了頓觸起她的好奇之心便對珍珠說道古來的帝後也有養蠶織布的咱們怕做不到嗎當下傳諭旨出去叫在江南地方挑選清秀的婦女二十人送入大內養蠶又令在民間弄來桑樹的種子叫內監們種植不到幾時鄉間民婦送到了西太后便另辟一室看這些婦女在裏面養蠶蠶既做了繭子隨即取絲買了機軸織起綢來一時在大內的人終夜聞得機聲不絕卻是西太后督導女工在那裏織綢緞但這一批女工大都是有夫之婦西太后准半年回家一次平日在宮中的時候賞賜也很優厚每織成一匹布賞銀四兩織綢一匹賞銀十兩倘逢著時節便得加賞二十兩有時宮中演戲也得賞賜瞧戲鄉中的民婦受這樣的寵遇也要算是難得了所以一班出入宮禁的民婦眼光看得很大的了有一次江南的民婦因蠶事將興預備進京供職但在起身之前照例須地方官員遣發其中一個民婦因不聽縣官的吩咐知縣叫差役把她驅逐出去不料那民婦也大怒道我在太后宮中大大小小的官員真不知見過多少卻來怕你一個縣官咧說罷就要動手來打幸虧同伴將她勸了回去知縣因恨她不過拿這民婦的名兒取消了其他的民婦到了京裏西太后一點卻少了一人問還有一個哪里去了那民婦將知縣留難的話告訴了西太后西太后忙令傳諭到江南指名要這個民婦進京需用知縣沒奈何只得照常遣送當臨行的時候那民婦把知縣大罵一頓知縣連氣也不敢喘一聲呢這且按下不提再說宮中自西太后回鑾後不時發現怪異有時桌椅無故自移或屋中有步履聲音一經往視便寂然無聲了但等人一走那聲音又複響了起來而且一天厲害一天甚至有形迹出現一班宮女常常見珍妃在宮中往來走著近看時又不見了這種謠言漸漸傳到西太后的耳朵裏來西太后很是不相信後來也親自目睹過一次方才和內臣商議祈打的法子侍郎裕昆主張用喇嘛來打醮講到喇嘛本紅黃兩教他的祖師一個叫達賴喇嘛一個是班禪喇嘛其教始興在蒙古當世宗的時候喇嘛勢力很大因爲那時諸王競爭繼統聖祖很相信佛教也極是贊成喇嘛所以世宗也供養著喇嘛以備篡位時做個助手世宗既登了基喇嘛的勢力越發大了只就永雋殿和雍和宮兩處那喇嘛已很不少而且一樣的干預朝政一般地賣官鬻爵無卿的官僚往往無可設法時便去奔走喇嘛之門結果因喇嘛的聲名狼藉幾乎一蹶不振咧但在喇嘛興盛的時光他們手下服侍的人都是滿人原來滿人有一種奴隸籍譬如老子犯了國法子孫得貶入奴隸籍不過一入奴隸之後雖一樣可以做官一遇他舊日的主人卻依然要奴主稱呼的這種奴隸滿人也有服侍漢人的清末的督撫衙門裏此類奴隸最多了至於給喇嘛執役的大都是皇上所遣派也有自己雇用的奴隸稱喇嘛都是喚做師爺其時在雍和宮給大喇嘛驅使的奴隸名兒叫做多達爲人很是勤儉深得大喇嘛的歡心這樣的過了幾年一天那多達向大喇嘛要求道奴才跟隨師爺多年了可否在一班大人面前吹噓一下給奴才一個差使做做大喇嘛點點頭隔不多日大喇嘛果然替他謀了一件事是賑濟局的委員第二年上多達已銷差回來因這賑濟局是不長的缺分卻很肥美多達回來仍到大喇嘛的地上執役這是入了奴隸籍緣故任你做了最大的職分一卸職依然是個奴隸了多達既仍稱奴隸還取出一張六萬元的銀票算是謝大喇嘛的大喇嘛倒吃了一驚忙問道你只任了六個月的差使能賺幾多錢卻送給我這許多那多達說著不瞞師爺講這是最優的美缺所以六個月中共弄到十九萬但像奴才似的還是平日不會弄錢的咧大喇嘛聽了把舌頭伸出來半晌縮不回去從此以後有人央托大喇嘛謀事就要運動若干卸任回來又要酬謝若干這都是多達一人所弄出來的啊可是清代官吏的腐敗專一剝削小民就這個上頭看來已可想而知了閒話少說當下西太后即命傳集喇嘛就在宮中設壇建醮到了那是鐃鈸丁咚禁宮又一變而爲寺院哩到法事將畢由喇嘛奏明太后舉行打鬼這打鬼的活劇雍和宮中素來有的用平常的小喇嘛穿了白衣戴了白冠面上塗了五彩預先在暗處伏著大喇嘛在臺上念經作法忽然燈燭全滅一聲怪叫所扮的活鬼便從暗處直竄出來旁邊那些喇嘛已持著竹片在那裏候著一聽大喇嘛叱吒立刻把竹片向活鬼亂打活鬼往四下奔避末了直打出宮外活鬼前面逃打的後頭追須追得瞧不見了才一齊回來這時算鬼已打走宮中燈火複明謂一切的不祥就此驅逐乾淨但此次宮中的驅鬼是奏明瞭西太后舉行的那些活鬼都由太監們改扮到了打鬼的時候宮裏大小嬪妃宮女皆手拿著竹片等候驅鬼大喇嘛把神咒念完喝令驅逐一班宮女七手八腳地望著扮鬼的內監打來那些太監便穿房走戶地從這宮逃到那宮凡有怪異的地方一處處都要走到宮女們一邊嬉笑一邊打著也有傾跌的也有碰痛手指的霎時光怪陸離醜態百出西太后同著皇上皇後及瑾妃等也來壇下看喇嘛驅鬼見了這般情狀也忍不住笑了起來宮女們追逐太監扮的活鬼一直到了預備著的水池邊那活鬼紛紛跳入了水池中把臉上的顔色洗去算是把鬼趕入水裏去了然宮裏自經這樣混亂了一場果然覺得安靜了許多以是宮中成了一種慣例每以這個時候必須打鬼一次了這且按下一邊再說清廷自拳民之亂外人既蹂躪了北京還要求很大的賠償這個上頭不免大喪了元氣但一波未平一波又起湖南和廣東地方又鬧起革命來了原來這革命党在康梁奏請行新政時已經發動過了那時在廣東組織興中會的首領叫做孫文這孫文字逸仙是廣東香山縣人當初在中西醫學校裏卒業也曾入教做過教士後來卻專門行醫到處演說革命祟信他的人一時很爲不少不期給清廷知道很注意他的行動孫文既辦了興中會因會員十分發達被廣東偵探將孫文獲住說他立會結党便解到兩廣總督署裏恰巧總督是李鴻章他見孫文辯辭流利人品出衆就有了個憐才之心暗想現在的中國要想出這樣一個人才也是不容易並且他謀叛又沒什麽證據何必認真去幹呢當下乘個空兒把孫文釋放了孫文得脫身以後宣傳革命益覺得起勁了又隔了不多時因李鴻章奉調入京同德國去議和了繼任總督的就是譚鍾麟孫文乘譚鍾麟到任未久便締結了鄭弼臣陸皓東黃彬麗朱浩清等想在廣東起事並飛電湖南唐才常等到了那時以便回應不料事機不密給譚鍾麟知道將陸皓東一班人設法擒獲立時斬首這樣一來孫文在廣東站不住腳只好逃往日本孫文走後興中會的党人史堅如用炸彈抛擲廣東督署事體鬧得很大清政府裏已知孫文是革命党首領史堅如的事也歸罪於孫文聽得逃往海外便通電駐各國中國公使留意緝捕孫文逃走到日本時清政府已照會日本拿捕幸虧在橫濱遇見了日本人宮崎寅藏對孫文說道你在日本早晚要不免的還是到英國去的爲上可是孫文此時身無半文行動不得又是那宮崎寅藏助了孫文幾百塊盤費才得勉強成行於是匆匆離了日本渡了太平洋竟往英國來不到幾到已經到倫敦了孫文就去找尋醫師歔立德告訴他是亡命來此歔立德和孫文原是從前的舊友便叮囑孫文道現在清廷緝捕你的風聲很緊就是本國也有中國公使館怕他們已得著清政府的電報了你若要外出時須通知我一聲好派人保護你孫文答應著心裏尋思道我已到海外清廷終拿得厲害也斷不會到英國來捕人因此大著膽子依然照常進出對於留學英國的學生仍舊鼓吹他的革命主義一天忽然有一個廣東鄉人來請孫文出去孫文並不疑惑很爽氣地跟他前去到了那裏邀孫文上了樓那同鄉人已不知去向了孫文這才有些疑心忙推開樓窗向外一望不覺吃了一驚因爲大門外面突然懸起龍旗來了孫文趕緊回到裏面高聲叫了兩聲見走進來一個中年僕人笑著問有什麽事孫文說道這是什麽地方爲什麽請了我來卻把我幽囚著呢那僕人微笑說道你來了半天還不曾知道麽此處是中國龔公使的私宅將你邀來因爲清國的皇帝要尋你去做官有電文來知照公使的啊孫文聽了曉得身入牢籠就是插翼也飛不掉的了思來想去終轉不出脫身的法子只有致書給歔立德叫他設法營救但這書使誰送去呢當下孫文央求那僕人道我既然到了這裏也不想出去了不過我有一位好友須遞個消息與他你肯替我送一封信去麽那僕人起先不肯經孫文說了許多好話才答應了孫文很匆促地寫了幾句命僕人去送給歔立德又恐怕他中途變更便講了些耶酥救人急難的話給他聽那僕人去了要知孫文能逃脫否且聽下回分解
