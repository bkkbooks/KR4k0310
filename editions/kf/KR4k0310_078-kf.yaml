body:
  text: 第七十八回李鴻藻榻前奉詔嘉順後宮中絕食卻說同治帝病到危急的時候慈禧太后便和幾個自己親信的大臣商量立嗣的事體連日在太后宮中開秘密會議一切都已議妥只候皇上大事出來便可依計行事誰知三五天後皇帝的危險其已過那痘瘡也慢慢地結起痂來熱也退了人也清醒了只向著人索飲食皇上一切飲食都是慧妃一個人調理著皇帝是不喜歡慧妃的雖在神氣清醒的時候也不和慧妃說笑一句覰著慧妃不在跟前的時候同治帝便招著手把小太監喚到跟前來解下自己小衣上的金印來叫他悄悄地拿去把皇后請來這時候正是清早慧妃覰空回宮梳洗去了孝哲皇后得趁沒人的時候悄悄地走來看望皇帝他兩人已許久不見了孝哲皇后看看皇帝枯瘦如柴皇帝看看皇后也消瘦得多了大家不覺拉著手哭泣起來了哭了半天孝哲皇后先住了哭又勸皇帝也住了哭兩人說起兩地相思的苦皇帝又說起那慧妃如何可厭說起慧妃便說起從前選後的故事來原來當時慈禧太后頗想選慧妃做皇后慈安太后卻已看中了孝哲皇后兩宮太后爭執不休便請同治帝自己決定那同治帝在兩宮太后跟前又不敢說誰好誰不好這時有一個宮女正送上茶來同治帝忽得一個主意便把茶水潑在地上叫孝哲後和慧妃兩人在濕地上走去那慧妃怕茶水弄髒了衣角忙把那袍幅兒提起來走去獨有孝哲後卻大大方方地走去同治帝說孝哲能不失體統便決定立孝哲後做了皇后因皇帝提起從前選後的事體那孝哲後有意逗著皇帝叫他開心便說道臣妾常在東太后那裏聽得陛下幼時的聰明那時陛下年紀只八歲天天在南書房念書陛下常不愛念書師傅便跪下勸諫陛下只是不聽師傅沒有法子只得對著陛下掉眼淚陛下看師傅哭了便拿論語上君子不器一句把手按住那器字下面的兩個口去問著師傅師傅讀成君子不哭那師傅也撐不住笑起來了孝哲後說到這裏同治帝歎了一口氣說道這都是小時候的淘氣事體說它怎的如今再沒有那種聰明了說著伸出手來撫著皇后的臂膀說道你在宮裏冷清嗎西太后待你怎麽樣孝哲後一聽得提起西太后那兩挂珠淚便忍不住撲簌簌地落下來落在皇帝的手背上皇帝看了十分不忍便伸手把皇后摟在懷裏皇后霍地立起身來說臣妾要回去了皇帝不捨得她去只是喚皇后坐下皇后搖著頭說道只怕阿媽知道了要責罰我呢皇帝說道阿媽還未起身不妨事的此時慧妃回宮去梳洗完事正走向皇帝宮中來聽得屋子裏有人唧唧噥噥說話的聲音問太監時說正宮在裏面慧妃也不敢進去急回身走到慈禧太后宮裏說皇上大病才有轉機見了皇后怕又要糟蹋了身子再發起病來可不是玩的慈禧太后聽了慧妃的話不覺大怒說這妖狐硬是要迷死皇帝嗎說著氣憤憤地趕到乾清官去一腳踏進寢宮那孝哲後正伏在床沿上低低地說著話慈禧太后看了一眼一縷無名火直沖頂門她也顧不得什麽皇后不皇后臉面不臉面便上去一把揪住皇后的頭髮在兩麵粉腮兒上一連打了十幾下嘴巴口口聲聲地罵道騷狐你敢是打聽得皇上的病有些轉機又來迷死他嗎打得皇后雲鬢蓬鬆嬌啼宛轉慈禧太后還氣憤憤地喝令宮女拿大棍來急得同治帝只在枕上磕頭求饒那滿屋子的宮女太監也一齊跪下來磕著頭齊聲喊著老佛爺那孝哲後也跪下地來一面磕著頭一面說道老佛爺姑念俺是大清門進來的賞俺一點面子罷一句話觸動了太后的心病她明知道皇后在那裏譏笑她自己不是從大清門進來的又因清官的祖制皇后從大清門進來的只能廢黜不能辱打這一氣把個太后氣得一言不發一轉身便回宮去了同治帝見勢不妙忙傳旨召軍機大臣侍郎李鴻藻進宮那李鴻藻正在軍機處還不曾退值聽得皇上宜召忙跟著太監進宮去走到寢宮門外便站住不敢進去小太監替他進去通報了同治帝吩咐挂簾把李鴻藻喚進屋子去皇后站在皇帝床前正在那裏抹眼淚見李鴻藻進來急欲避去皇帝拉著皇后的袖子說道你也不用回避李師傅是先帝老臣你是門生媳婦朕如今有緊要話須和師傅說你也可以聽得如今你先去見過師傅罷將來全仗師傅照應呢說著不覺也掉下眼淚來孝哲皇后正要過來拜見李鴻藻慌得李鴻藻忙脫下帽子趴在地下磕頭同治帝說道師傅快起來現在不是講禮節的時候呢說著叫小太監上去把李鴻藻扶起又在皇帝榻前安設一張椅子喚李鴻藻坐下皇帝伸出手來握住李鴻藻的手只說得一句朕的病怕不能好了皇帝皇後和李鴻藻三個人六挂眼淚一齊淌下來尤其是皇后哭得嗚咽難禁皇上接下去說道朕既沒有生得太子那西太后又和皇后不對勁兒朕死後別的沒有什麽不放心獨怕她要吃虧呢這時皇后正哭得和淚人兒一般聽了皇帝的說話越發撐不住悲悲切切地哭起來皇帝一手搭在皇后的肩上說道現在不是哭泣的時候俺們商量大事要緊朕倘有不測第一要緊的便是立嗣皇帝你心裏愛立誰做嗣皇帝快對師傅說定了朕可以和師傅商量寫遺詔的事體孝哲皇后聽皇帝說到這裏忙抹幹了眼淚跪奏道國賴長君臣妾不願居太后的虛名誤國家的大事同治帝聽了微笑著點頭說道皇后很懂得道理朕無憂了便和李鴻藻低低地商量了半天決定立貝勒載澍爲嗣皇帝同治帝嘴裏說著李鴻藻爬在榻前寫著遺詔那遺詔很長上面說的都是預防西太后的話說得十分嚴厲寫完了皇帝拿去細細看過說道很好便在遺詔上用著印交給李鴻藻藏好李鴻藻一時無處可藏孝哲皇后便親自替他拆開袍袖來藏在袍袖的夾層裏又替他密密縫好同治帝說道師傅且回家去休息明天或還要命師傅見一面兒呢李鴻藻磕著頭退出乾清官來正要走過穹門去忽聽得身後有人低低喚師傅的名字李鴻藻是心虛的聽了不覺嚇了一大跳急回頭看時原來不是別人正是惇親王奕諒李鴻藻一見了他心知大事不好了忙上前去請安問好惇親王冷冷地說道師傅在皇宮耽擱多時敢是做顧命大臣來師傅辛苦了俺和師傅到太后宮中去休息休息談談心說著也不由分說上去一把拉住李鴻藻的袖子便走李鴻藻心中嚇得亂跳那兩條腿不得不跟著走到皇太后宮裏一看那恭親王奕訢醇親王奕譞孚郡王奕譓惠郡王奕詳一班王爺都在那裏虧得李鴻藻乖覺當時他見了恭親王便上去請安說道原來六爺也在宮中俺方才得了皇上的密詔正沒得主意打算出宮找六爺商量去恭王聽了問道什麽密詔李鴻藻不慌不忙便拆開袍袖把那同治帝的遺詔拿了出來滿屋子王爺們看時嚇得大家臉上變了顔色這時慈禧太后正從裏屋子裏走出來恭親王不敢隱瞞便把那詔書呈上去慈禧太后一邊看時一邊氣得兩隻手索索地發抖看完了氣憤極了把那詔書扯得粉碎丟在地上怒目看著李鴻藻嚇得李鴻藻忙跪下地去連連磕著頭磕得頭上淌出血來又不住地說臣該死求老佛爺賜臣一死那兩旁的大臣也一齊跪下替他求著情隔了半晌才聽得皇太后罵一聲起去李鴻藻又磕了幾個響頭謝過恩退去隨後私地裏連夜送了五萬兩銀子來給崔總管和李太監求他們兩人在太后跟前替自己說說好話西太后俟李鴻藻出去以後便和諸位王爺開了一個禦前會議索性把慈安太后也請了來慈禧太后第一個開口一邊淌著眼淚說道皇帝的病看來是救不轉的了但是嗣皇帝不曾立定是俺一樁大心事大家幫著俺想想到底立誰做嗣皇帝好慈安太后聽了接著說道國賴長君溥倫和載澍年紀都長成了可以立做嗣皇帝慈禧太后聽了不覺陡地變了顔色厲聲說道你也說立長君他也說立長君立了長君俺們兩個老婆子還過日子嗎幾句話把個慈安太后嚇得忙閉著嘴從此不敢開口停了一會慈禧太后說道俺家溥字輩沒有可以立作嗣君的依我的意思醇王爺的大兒子載湉今年四歲了和皇帝的血統很近俺意思想立他做嗣皇帝載湉的母親原是俺的妹妹如今俺們立他的兒子做了嗣皇帝大家也得個照應當時醇親王站在一旁聽了也不敢說什麽慈禧太后又回過頭去對慈安太后道姊姊的意思怎麽樣慈安太后只得連聲說好慈禧太后便接著對大家說道你們聽得了麽東太后的懿旨要立醇親王奕譞的兒子載湉做嗣皇帝六爺快擬詔書當時恭親王便寫下兩宮太后的懿詔立載湉爲嗣皇帝詔書中大略說道皇上龍馭上賓未有儲貳不得已以醇親王奕譞之子載湉承繼文宗入承大統俟生有皇子即承繼大行皇帝爲嗣當時各王爺都在詔書上簽了字才散出宮來這裏慈禧太后待衆人去了以後便又悄悄地去把慧妃喚進宮來吩咐一番可憐這裏正在召將飛符那邊同治帝還一點不知道誰知那慈禧太后早已傳下諭旨吩咐斷了皇帝的醫藥飲食同治帝躺在床上一天也不見送湯藥送茶粥的來肚子裏又饑又渴忙喚小太監要去那小太監去了半天空著手回來說太后吩咐叫不給俺宮中醫藥飲食同治帝聽了不覺嚇了一大跳再叫小太監去打聽時才知道那遺詔的事體發作了如今權柄都在慧妃手裏皇上爲要得飲食須求慧妃去這時皇帝的身體己健朗了許多也行動得了聽了小太監的話忙叫去請皇后到來待到孝哲皇后到時同治帝求她用印傳下懿旨去孝哲皇后聽說皇帝要到慧妃宮中去她如何肯依只是勸皇帝安心靜養不可勞動無奈同治帝只是求著甚至向皇后長跪不起孝哲後看皇帝求得可憐只得答應了蓋上皇後的鈐記皇帝拿了到慧妃宮中去住了一夜五更時候回乾清官來不到半個時辰宮中太監都嚷著說皇上賓天了慈禧太后第一個進宮來吩咐太監們替皇帝沐浴穿戴把屍身陳設在寢宮裏諸事停妥才悄悄地把恭親王去喚來恭王進宮去天色還是白茫茫的一個太監在前面領著路推開一重一重宮門進去那太監隨手把宮門關上走過幾十重門才到同治帝的寢宮裏只見那皇帝的屍身直挺挺地擱在禦床上慈禧太后手中擎著一個燭臺站在一旁恭親王上去請過安慈禧太后對恭王說道大事已到如此地步六爺怎麽辦恭親王便磕著頭說道臣無有不奉詔慈禧太后聽了點點頭道六爺肯奉詔大事便有辦法了當下便立刻把醇親王孚郡王惠郡王和幾位親信的大臣召進宮來議定後事這時慈安太后雖也在座只因自己手下連一個親信的人也沒有了只得聽慈禧太后做主去慈安太后走到同治帝的屍身邊見他骨瘦如柴頭頂上的辮發也脫盡了不覺流下淚來一眼見死人枕下露出一本書角兒來慈安太后伸手去拿來一看早不覺把個太后羞得滿面通紅忙把這本書兒丟在地上慈禧太後見了連問什麽東西小太監前去拾起來送給慈禧太後一看原來是一本春畫兒書面上還注著一行小楷字臣弘德殿行走翰林院侍講王慶祺進呈禦覽慈禧太后看了便罵一句好個王八蛋把那本春畫兒收去了這時恭親王早到醇王府去把個嗣皇帝抱進宮來慈禧太後上去抱來一看那嗣皇帝早已熟睡在懷裏到天色大明才發出上諭去宣告帝崩又發下懿旨去立醇親王奕譞的兒子載湉爲皇帝改年號稱光緒那醇親王見把自己的親生兒子抱進宮去心中萬分難舍抑鬱不樂便害起病來便上了一本奏疏辭去職分兩宮皇太后看了醇親王的奏本知道因他兒子做了嗣皇帝例應規避准他開去各差以親王世襲罔替這裏光緒帝年紀太小進宮來只有保姆伺侍著所有國家大事一概由兩宮太后垂簾聽斷此番同治帝死後慈禧太后不給他立於卻立了一個同治帝的弟弟雖說詔書上有俟皇帝生有皇子即承繼大行皇帝爲嗣的話但外面卻沸沸揚揚傳出許多謠言來有人說這光緒皇帝原是慈禧太后的私生孑寄養在醇親王家裏的只因爲慈禧太后最愛吃湯臥果每天清早起來便由內務府備銀二十四兩買四個湯臥果吃著這湯臥果是前門外金華飯店承辦的這金華飯店有一個夥計姓史的年紀很輕最愛遊玩他又聽得太監李蓮英說起宮中如何好玩他常常對李蓮英說要跟他到宮裏去遊玩李蓮英見他做人玲瓏知趣也便常常帶他到宮中游玩去有一天正在景和門前隨著李蓮英走著忽然迎面西太後走來一見了那姓史的便問這是什麽人嚇得他兩人忙趴在地下去磕頭奏明自己的來歷那西太后見那姓史的長得白淨可愛便吩咐留他在宮中伺候太后這時候咸豐帝早已死了忽然皇太后懷孕生下孩兒來了一面悄悄地把這孩子送去醇親王府中養著一面又把那姓史的殺死在宮中免得他多嘴但太后常常把這個孩子挂在心頭每總想趁機會弄進宮來恰巧同治帝死了慈禧太后便極主張把光緒立爲嗣皇帝如今果然如了她的心願把個幼帝留在自己身邊如今慈禧太后的權威越發大了慧妃也慢慢地掌起權來卻不把孝哲皇后放在眼裏這孝哲皇后自從同治帝死了雖上尊號稱嘉順皇后但她一人寂寞淒涼住在深宮裏也沒有一個人來看她慈安太后雖偶然來看她一面兩旁都有宮女監視著也不能說一句話宮中的人見慈禧太后不喜歡孝哲皇后也跟著打落水狗漸漸地有些飲食不周起來孝哲後看了這種情形知道自己得罪了皇太后將來總要吃苦她屢次想服毒自盡只怕害了自己的父母原來清官中的規矩凡是後妃在宮服毒死的她母家的人都犯死罪所以做後妃的在宮中無論如何吃苦總不敢自尋短見去害她的娘家人孝哲皇后正在沒法子的時候他父親崇綺尚書忽然打發人送一盤饅頭進宮來孝哲後便在盤子後面底裏寫了這卻怎好四個字打發來人拿出宮去崇綺見了知道女兒的心事便在紙條兒上寫了一句明哲莫如皇后叫人送進宮去孝哲皇后看了頓然明白起來便從此立定主意斷絕飲食到第八天上可憐把一位年紀輕輕的皇后活活地餓死了這消息報到慈禧太後宮中慈禧太后只說得一句知道了倒是慈安太后得了這個消息親自趕到皇后宮中來撫屍痛哭一場自己去見慈禧太后商量好好地發送皇后慈禧太后礙于東太后的面子便下了一道懿旨著內務府料理皇后的喪事欽天監揀定了日期隨同同治帝的靈櫬送往陵寢去安葬這裏李鴻藻想起帝後生前託付密詔的情形便趴在帝後的靈櫬前痛哭了一場欲知後事如何且聽下回分解
