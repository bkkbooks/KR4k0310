body:
  text: 第三十回鬥法術計收血滴子換嬌兒氣死陳閣老卻說康熙皇帝第四次南巡依舊是皇太子胤礽監國那直郡王胤禔雍郡王胤禛心裏實在十分妒嫉他兩人暗地裏派兵遣將去行刺太子已有許多次了都因東宮保護的人多不曾遭他毒手每一次兩邊白送了幾條好漢的性命胤礽心中把胤禛恨入骨髓拿了重禮在外面請了許多有法術的道人來在東宮作起法來要收拾胤禛的性命在胤禛王府中搜羅的法士也不少東宮每一次行法術都被雍王府中的法士破了後來太子從江西地方去請得一位鐵冠道人來這道士有一件法器真正了不得那法器又名血滴子是一頂鐵打成的帽子鐵冠道人念動真言這血滴子便飛起半空飛到仇家去在那仇人頭上一套立刻把頭割下來收在帽子裏向空飛回去那沒了頭的人頸子裏也不淌一滴血出來所以稱做血滴子那血滴子來時任你千軍萬馬之中割取人頭悄悄地來悄悄地去又快又無聲息一霎時頭不見了叫人防不勝防雍王打聽得這個消息心中十分害怕當即和幾位教師喇嘛商議內中一位喇嘛和尚說道那鐵冠道人除非請俺大喇嘛來不能制服雍王聽了便親自到雍和宮去求大喇嘛那大喇嘛起初不肯後來經雍王許他事成以後有種種利益大喇嘛便帶了法器到雍王府中光拿出一片貝葉來囑咐雍王蓋在頭項上上面又拿帽子壓住這貝葉法力無邊可以抵得住血滴子大喇嘛又在雍王臥房外面收拾一間淨室日夜在屋子裏打坐守候雍王原也有四位妃子他元妃是鈕鈷祿氏和雍王十分恩愛如今見丈夫有難便天天在雍王身邊陪伴著這一天夜靜更深鈕鈷祿氏正和雍王並頭睡在一個枕頭上說話忽然見帳門外飛進一團漆黑的東西來在雍王頭上一砸幸而雍王頭上的貝葉早夜不離那法器不能傷得雍王的性命鈕鈷祿氏在一旁看了不禁大聲叫喊起來外面大喇嘛聽得了忙搶出淨室來看時只見那法器正從雍王臥房中飛出來大喇嘛手快忙脫下自己身上的袈裟來向那法器一罩好似網魚一般把那法器網在袈裟裏面這時早已驚動了合府的人大家趕進院子來請雍王的安雍王額上被那法器磕碰受了傷還掙扎著起來大喇嘛送上那血滴子說這是殺人唯一利器王爺留著將來可以制伏天下雍王看時見那血滴子原是一頂鐵帽子黑漆一團寒光四射看了不覺膽寒第二天直郡王胤禔得了這個消息忙趕來看望胤禛把詳細情形說了胤禔看看沒有人在眼前便拉著胤禛的手到一間密室裏悄悄說俺現在從蒙古請到一位喇嘛名巴漢格隆的他道術很高能夠拿咒詛鎮壓人如今我把太子的庚辰八字打聽明白寫著紙條兒藏在草人肚子裏一面請巴漢格隆立起法壇念動咒語七日七夜那太子在東宮便發起瘋癲來從此不省人事到那時他也做不成太子了以後你我二人無論誰做了太子都可以商量胤禛聽了忽然又想起一條計策便和胤禔如此如此說明當時便把大喇嘛請來悄悄地送他二千兩銀子托他如此如此行事過了幾于太子看著鐵冠道人不能成功心中不覺納悶又過了幾天太子覺得昏昏沈沈地害起病來起初還是乍寒乍熱不十分沈重後來索性發起狂熱來滿嘴胡說兩眼如火見人便打東宮裏上上下下的人都慌張起來相國張英便去請了國師來替太子治病那國師早已受了大喇嘛的賄賂便拿兩粒阿肌酥丸給太子吃下睡了一夜那病勢果然減輕只是犯了淫病他終日和一班妃嬪廝纏著還嫌不足見了略平頭整臉些的宮女便用強力姦污胤禔胤禛得了這個消息便個個帶著自己的福晉到東宮去請安誰知那太子見了他兄弟兩人一句話不說只是眼睜睜地向他嫂嫂素倫妃子和弟媳鈕鈷祿氏看著看到出神的時候他伸著兩臂向鈕鈷祿氏撲去鈕鈷祿氏身子靈活躲避得快那素倫妃子卻被太子攔腰緊緊抱住任你如何掙扎休想逃得脫身胤禔看了不覺大怒上去用力一推把太子推倒在地氣憤憤地拉著他妃子走出宮去照胤禔的意思要去奏明父皇後來還是素倫妃子勸住說父皇從江南回來不多幾天且耐著這口氣過幾天待父皇閒暇時候再奏明不遲胤禔聽了他妃子的話暫且把這口氣忍耐著忽然關外接連報到軍情說俄羅斯人帶了大隊兵馬打進蒙古地方來康熙皇帝便下諭派都統公彭春等督兵到璦琿地方會同薩布素兵隊直攻雅克薩打破雅克薩城和俄羅斯人訂約講和日子隔得不久又報到軍情說蒙古噶爾丹部聯合俄羅斯人造反康熙皇帝便封裕親王福全爲撫遠大將軍率同皇子胤禔出古北抵敵封恭親王常甯爲安北大將軍率同簡親王雅布出喜峰口抵敵誰知噶爾丹的兵十分驍勇他攻破了阿拉尼的蒙古兵再攻入烏珠穆泰直衝破恭王的陣腳打進多倫泊東北的烏蘭布通虧得裕親王用炮火攻破了噶爾丹的駝城噶爾丹兵大敗退還伊拉土克三胡土克圖地方清兵正要長驅直入康熙皇帝忽然在博洛城害起病來了只得班師回到北京這時皇太子的病越來越厲害了瘋得好似癲狗一般見人便打見物便毀東宮妃子只是日夜哭泣也毫無方法只因皇帝有病又是在外面辛苦打仗回來是皇后的主意暫時把這個消息瞞起來不給皇帝知道到了第二年那噶爾丹又起了三萬騎兵沿綠連河下來打破喀爾喀打進巴顔烏蘭這時皇帝身體已經復原便決定禦駕親征帶領十萬大兵分東中西路東路大元師爲黑龍江將軍薩布素西路大元帥爲大將軍費楊古帶領陝甘強兵從寧夏渡沙漠沿土拉河打他的後路皇帝獨當中路從獨石口過多倫泊西入沙漠再從科布多沿綠連河右岸過額爾德尼拖羅海山那噶爾丹的兵隊見了皇帝的黃幄龍纛嚇得他從拖諾山逃走皇帝直追到塔米爾兩軍奮戰噶爾丹又大敗這時東路西路兩支總隊也向兩旁包抄過來噶爾丹部主逼得走投無路康熙帝勸他投降他便在營中服毒自盡策妄把他的屍身獻上從此喀爾喀各部地方都投降了清朝康熙皇帝班師回京十分快樂這時想起太子來也召進宮去相見太子的師傅熊賜履內大臣索額圖等知道包瞞不住只得把太子送進宮去這時皇子胤禔胤祉胤禛胤禟胤禩胤祥胤禵十幾個弟兄都站在一旁太子見了父皇也不知道請安行禮一味地狂叫狂跳皇帝看了十分詫異忙問時才知道害病已久無可救藥皇帝立刻坐朝問文武大臣如何處置太子那大學士張英張廷玉貝勒隆科多大將軍年羹堯閣老陳世倌都是和雍王一鼻孔出氣的便紛紛奏請廢去太子皇帝也明白胤礽病到這種地步不能再做太子的了便下旨廢太子爲庶人退出東宮這事傳到各皇子耳朵裏個個歡喜妄想自己補升太子這裏有一個八阿哥胤禩最是陰險便滿心要謀這太子的地位便在暗地裏花了許多銀錢買通內大臣阿靈阿散秩大臣鄂倫岱尚書王鴻緒侍郎揆敘等一班大臣這時候恰巧皇帝有聖旨下來命達爾漢親王額附班等會同滿漢大臣共議繼立太子的事當時內大臣阿靈阿一班人便悄悄地寫了八阿哥三個字送進宮去皇帝在諸位皇子中最不歡喜八阿哥況且八阿哥的品行也最壞面貌也最不漂亮皇帝知道這裏面有弊便在坐朝的時候追問這件事體康熙皇帝聲色俱厲滿朝文武大臣個個害怕大學土張玉書便把阿靈阿一班大臣如何交好八阿哥如何私立黨派一一奏明皇帝聽了十分震怒立刻下旨把這班大臣拿下交康親王椿泰審問定罪同時胤禔府裏請大喇嘛作法鎮壓太子的事體也敗露了原來是一個內監名韋鳳的告發的那韋鳳原是東宮的太監如今調在直郡王府中當差從小太監嘴裏打聽出這個事件來立刻悄悄地到大內去告發皇帝聽了立刻打發內大臣帶同侍衛官人不知鬼不覺地直沖進直郡王府中去在後花園中果然發掘一個草人那草人身上寫著太子的名字生辰八字當胸釘一枚鐵釘上面淋著狗血又有五個紙剪成的鬼怪一塊兒埋在泥裏皇帝看了這些鎮壓的東西氣得頓足大罵吩咐把一干人等捉交宗人府審問又下旨革去大阿哥直郡王的爵位便在王府中幽禁起來合府奴僕人等都賞給十四皇子胤禵那大喇瞬巴漢格隆驅逐他回蒙古這一來胤礽的病勢去得乾乾淨淨依舊是循規蹈矩皇帝仍舊立他做太子仍舊住在東宮裏仍舊把朝政交給他監國自己卻帶了一班親信大臣第六次巡幸江南去那些皇子見胤礽依舊做了太子心中十分妒嫉但一時也無可奈何四皇子胤禛卻依舊在暗地裏結識大臣供養俠客那大臣中要算大將軍年羹堯閣老陳世倌和他交情最好年陳兩位太太常常進王府去那王妃鈕鈷祿氏也和這位太太十分新熱有時王妃也到年陳兩家去遊玩那年家有位姨太太小名小萍長得十分美貌性情也和順王妃看了也十分歡喜回來對雍郡王說了雍王原是好色的聽王妃說起恨不得喚進府來一見他見了年大將軍便問起小萍又說了許多羡慕的話年大將軍卻也十分慷慨第二天一輛車子便把小萍送進府來送給王爺這一來雍王把個年大將軍感激到十二分兩人的交情越發深厚起來了你想好好一個美人兒年大將軍如何肯輕易地送與別人這裏面卻有一個緣故年大將軍最不喜歡的是美人兒說她好看不中吃的只因年羹堯身高長得結實他每天非得有五個粗蠻的女人服侍他不能安睡因此他那班美貌佳人只可以作畫裏真真看的他都不要他府裏養著十個山東村婦輪流侍候他小萍雖說是他的姨太太卻嫌她不中用因此他便慷慷慨慨地送給了雍王那雍郡王得了這位美人真寵得把她眼皮上供養手掌上廝擎起來這時王妃鈕鈷祿氏肚子裏有孕王爺越發有空兒服侍這位美人了雍王年紀也不小了卻沒有一個兒子而鈕鈷祿氏也想生一個兒子恰巧那陳閣老的太太和她同時受孕兩人見面常常說著笑話咱倆倘然各生一個男孩兒便不必說倘然養下一男一女便給他配成夫妻陳太太聽了這個話忙說不敢當咱們是草野賤種如何當得起皇家的天神貴種這也不過是她們女太太們說著玩罷了誰知言者無心聽者有意當日陳太太告辭出府王妃退進內室去便有一個值上房的媽媽見左右無人忙悄悄地對妃子說道俺王爺不是常常埋怨著娘娘不養一個男孩兒嗎娘娘也爲的是自己不曾養得一男半女所以王爺在外面拈花惹草也不便去干預他如今老身倒有一計此番娘娘倘然養下一個男孩子來自然說得嘴響倘然養下一個女孩子只叫如此如此便也不妨事了妃子聽了她的這番說話也連連點頭稱說好計這且不去說她卻說雍郡王因要謀奪太子位外面養了許多英雄好漢在朝內又結識了許多大員高官像張廷玉隆科多年羹堯張英陳世倌都是他的死黨他們每日退朝回來總聚集在雍王府裏商量機密大事後來陳世倌一連三夜不曾到王府去把個雍王急得走投無路原來陳世倌做到閣老手握朝廷大權諸事要和他商量到第四天上陳閣老才來雍王問他家中有什麽要事陳世倌笑著說道不瞞諸位說下官虛度五十歲膝下猶虛前天內人分娩托王爺的福居然養下一個男孩兒來因此在家料理耽擱了此間公事衆人聽了都向閣老賀喜接著又商量大事年羹堯說道昨天接到邊報噶爾丹部兵馬已到烏珠穆泰地方皇上意思要打發裕親王和太子帶兵去抵敵此番太子出關又是我們絕好的機會切不可錯過接著又商定了幾件大事各自退去雍王退進內室那王妃妞鈷祿氏從房裏迎接出來雍王看她捧著一個大肚子便想起日間陳世倌的話便把陳閣老生了一個男孩兒的話對王妃說了王妃聽了不覺心中著急看看自己袋著一個肚子不知養下來是男是女當時王妃聽了王爺的話暗地裏向管事媽媽看了一眼那媽媽點頭微笑誰知隔不上三天這位王妃也分娩了王爺知道了忙著人進去探問是男是女裏面報出來說道恭喜王爺又添了一位小王爺雍王聽了十分歡喜接著文武官員紛紛前來賀喜到了三朝王爺府中擺下筵宴一連熱鬧了七天便是那班官太太也一齊到王妃跟前來賀喜請安王府裏的忌諱小孩子生下地來不滿一月不許和生客見面因此那班官太太都不曾見得那位小王爺的面鈕鈷祿氏又怕別人靠不住諸事都托了這個官事媽媽那管事媽媽是一位精細的過來人只有她和乳母兩人住在一座院子裏照料小孩子的冷暖哺乳等事雖有八個宮女服侍卻只許在房外侍候王妃自有大夫診脈調養天天有一班太太們來和她談話解悶兒王妃原和陳世倌太太最說得投機如今陳太太生産在月中不能到王府來這位王妃每天少不了要念上三遍陳太太好容易望到滿月陳太太又害病不能出門把個王妃急得沒法只好等自己滿月以後便親自坐車到閣老府中去探望陳太太又把小孩兒抱出來給王妃看小孩面貌飽滿皮肉白淨把個王妃樂得抱在懷裏只是喚寶貝王妃又和陳太太商量要把這小孩子抱進王府去給王爺和姬妾們見見陳太太心中雖有不願意但礙著王妃的面子也只得答應下來把小孩子打扮一番又喚自己的乳母抱著坐著車跟著王妃進府去那乳母抱著孩子走到內院裏便有府中媽媽出來抱進正屋去吩咐乳母在下屋子守候屋子裏有許多侍女嬤嬤便趕著這乳母問長問短又拿出酒菜來勸她吃直混到天色靠黑乳母吃得醉醺醺了只見那媽媽把小孩子抱出來臉上罩著一方繡龍的黃綢子乳母上來接在懷裏一手要去揭那方綢子那媽媽忙攔著說小官人已經睡熟了快抱回去吧接著一個侍女又捧出三隻小箱子來另有一封銀子說是賞乳母的那小箱子裏都是王爺和王妃的見面禮兒乳母得了銀子滿心歡喜匆匆上車回去了乳母帶著小孩到得家裏陳太太見小孩睡熟了忙抱去輕輕地放在床上打開那小箱子來一看陳太太不覺吃了一驚裏面有圓眼似大的珍珠十二粒金剛石六粒琥珀貓兒眼白玉戒指珠釧和寶石環都是極貴重大內的寶物最奇怪的有一支玻璃翠的簪子和羊脂白玉簪子珠子翡翠寶石的耳環也有二三十副這封見面禮物少說說也上百萬銀子陳太太看了笑道這王妃把我們哥兒當作姐兒看了怎麽賞起簪子和耳環來了難道叫俺們哥兒梳著旗頭穿著耳朵不成那乳母接著說道虧王妃想得仔細這簪兒環兒大概留著給俺哥兒長大起來娶媳婦用的兩人正說著那小孩在床上哇地哭醒來了乳母忙到床前去抱時只聽得嘴裏啊喲連聲陳太太聽了也走過去看時由不得連聲嚷著奇怪接著又哭著嚷道俺的哥兒到什麽地方去了這一聲喊頓時驚動了閣府的人都到上房來探問這時陳世倌正在廳屋裏會客只見一個童兒慌慌張張地從裏面跑出來也顧不得客人气喘吁吁地說道太太有事請大人進去陳世倌聽了向童兒瞪了一眼那客人也便告辭出去閣老送過了客回進內屋去一邊走一邊問道出了什麽事值得這般慌張要知陳太太的孩子究竟有什麽奇怪之處且聽下回分解
