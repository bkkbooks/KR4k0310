body:
  text: 第九十一回烽火滿城香埋枯井警騎夾道駕幸西安卻說京裏的義和團愈鬧愈凶各國的軍艦紛紛調至大沽口齊向炮臺進擊直隸提督聶士成川軍李秉衡陝軍馬玉昆一時哪里抵擋得住都往後敗退至於那些團衆更不消一陣槍炮早已各自逃命去了聶士成領著軍馬奮勇沖去不期炮彈飛來打得腦漿迸裂死在陣中馬玉昆單騎敗走李秉衡見全軍覆沒便自刎而死大沽炮臺失守英美德法日俄意奧等八國軍軍聯進了天津由德國艦隊司令瓦德西爲聯軍統帥向北京進迫警耗傳來風聲異常緊急總督裕祿服毒自盡榮祿這時真急了忙進頤和園奏知西太后把八國聯軍攻下津沽現已迫近北京的消息報告了一遍西太后聽罷忙叫召端王和剛毅進頤和園問話端王聞得外面風聲不好心上已十分畏懼一聽宣召知道西太后一定要詰問的但又不能不去只得同了剛毅一步懶一步地進園見太后參見既畢西太后很憤怒地問道這一次的主戰都是你們弄出來的現在事已到了這般地步你們待怎麽樣辦好呢端王和剛毅一聲不發地立在一旁在這當兒忽內監入報道外兵已到京城外正要架炮攻打哩西太后聽了大驚失色不覺急得手足無措起來榮祿忙跪奏道事已急迫終不能聽外人進來蹂躪以奴才的愚見還是請禦駕出京暫避風頭爲上西太后垂淚說道匆促的時候往哪里去呢於是大家議了一會決意往熱河再定方針計議既畢即命剛毅出去預備車輛一面到瀛台通知了光緒帝並將宮中嬪妃一齊召集只見珍妃淚盈盈地侍立在側西太后想起舊事今日甚至倉皇出奔更不如甲午之役未免被珍妃見笑便惡狠狠地瞧了珍妃一眼冷笑道現在宮中諸人都準備出走你卻怎樣呢珍妃掩著珠淚答道那聽憑太后處置西太后說道以咱們的主見此刻匆促登程你們青春女子在路既是不便留著恐受人之辱咱們看你還是自決了吧珍妃見說曉得自己不免便垂淚道臣妾已蒙恩賜惟皇上是一國之君萬不可離京遠去否則京中無主亂將不可收拾了西太后喝道國家大事自有咱和皇上作主無須你來饒舌叱令內監賜珍妃全屍當由兩個宮監把珍妃用紅氈包裹了抱持至園西眢井口奮力投下這時瑾妃在旁眼看著妹子如此結果不由得嗚咽起來光緒帝恰巧趕到要待援救已然不及只得付之一哭罷了後人有詩悲珍妃投井道莫問宮庭景寂寞丹楓亭畔衆芳嬌花含醉態迎殘照園外征車過小橋昔日題詩隨水去憑吊眢井暗魂銷朱紅黛碧今何在月貌花容無處描西太后處決了珍妃自己便和皇上更換衣服扮做避難人民匆匆登車榮祿還來請命西太后吩咐道咱們一走京裏的事都由你暫時維持一下至於外兵進城與否終須到議和的地步你可擬道旨意召兩廣總督李鴻章進京與慶王奕劻同爲議和全權大臣待和議告成咱們再行回鑾吧榮祿領諭退去西太后回顧諸臣隨駕的只有王文韶和趙舒翹兩人回憶萬壽時節真有今昔之感了當下西太后和光緒皇上匆促啓行出得德勝門時已有馬玉昆的親兵四五百人是榮祿預令駐紮著保護車駕西行他們君臣坐在一輛大車上徐徐地前進約莫走了二三十裏因倉忙之中不膂帶著食物這時不免有些饑餓起來但一路都是荒野草地茫茫一片望不見一家村店西太后和光緒皇上惟有忍饑兼程而行可是那些車夫卻不住地喊餓停著車不肯前進了經西太后再三地安慰他們始得勉強攢程皇帝和太后到了這個時候反懇請於執鞭的禦者也是他們孽由自作啊於是這樣的牛牽馬繃又走了二三十裏看看到了一座村莊那些跟隨的內侍宮女在風聲緊迫時本已有一天多不進食了這時實在熬不住了也有餓倒在車上的西太后于這種情形的確生平所不曾見的眼看著他們狼狽的狀態不免惻然便命停車向村莊中去覓食當由李蓮英下車前去對莊上的村民說道我們是避難的官眷因爲逃走時匆忙忘帶了糧食和銀錢所以要求你們供給些食品將來回京後自當重重地補報那些村民見西太后一千人馬都愁眉不展卻不失華貴的氣概便爭著把麥飯之類獻上這一班內監宮女們本是饑慌的了一見麥飯就狼吞虎咽地吃得乾乾淨淨光緒帝和皇后瑾妃等也略略吃了些只有西太后一人對於這樣的粗糲怎能下咽呢不由得瞧著光緒皇上潸然下淚道咱們深處宮禁哪里知道民間的疾苦呢你看他們以如此粗糙的東西充饑咱們天天吃著肉食還嫌不好到了今日方知物力維艱了這叫事非經歷不知難啊說著就有些嗚咽起來其時隨扈的有慶王的三個女兒貝子溥倫桂公夫人等見西太后悲傷便一起來慰勸著一面命大軍依然前進到了黃昏已抵貫市又由內監和李蓮英等去尋些食物吃了帝後及西太后也不下車就在車上坐待天明到了次日車子起行時西太后因鴉片癮發更兼兩日不進滴水已然臥倒車中幸虧將近傍午車抵懷來縣境經李蓮英先去通知懷來縣知縣吳永慌忙出城迎接並置備筵席等西太后和皇上皇後等進膳但懷來地方也是很苦的進獻的食品也不見十分精美不過比較村民所獻的麥飯卻已天差地遠了西太后一頭用膳由知縣夫人替太后梳髻又讓出衙中上房備太后皇上安息李蓮英卻去找尋了一付鴉片煙具來是一根破竹筒鑲個煙斗在上面那煙燈也是污穢不堪的西太后也沒法終算過了癮這一夜才得床褥安眠宮女太監們似得了安樂窩一般無不嘻笑快樂西太后歎口氣道人經痛苦方知樂這句話萬萬想不到會應到我身上來呢一宿無話次日起身由吳知縣又雇了幾乘車子恭送太后和帝後起程這樣的走了半日忽然馬玉昆五百護送的兵丁一齊鼓噪起來西太后猶如驚弓之鳥一般嚇得面容失色忙叫人去問什麽事鼓噪只見內監來回奏道馬玉昆的部卒連日護駕西行沿途的糧食都由自己帶來的現在糧已告罄了所以不肯前進在那裏爭鬧西太后聞奏一時也想不出別法只得命宮嬪妃後們把頭上所插的釵鈿拔下來稿賞他們方得前行無阻這樣的一路過去到了太原甘肅巡撫岑春煊率領勤王師趕到其他的大臣如王文韶趙舒翹等也陸續到了這時西太后心神略定垂淚對岑春煊說道咱們此次千里蒙塵這樣的苦痛實生平所未經你看往時忠心耿耿者臨危已逃走一空卿能不辭勞苦患難相從咱若得安然回京決不有負於你說著手撫岑春煊之背痛哭不已岑春煊忙勸道太后保重聖躬要緊且莫過於悲傷路上的安寧有小臣在此諒可無患請太后放心就是了西太后聽了才含淚點頭傳旨在太原暫住然西太后受了一番驚恐未免小有不豫由山西撫台薦縣丞葉承嗣診治進了一劑和胃舒肝湯稍覺痊可一點不過京中的消息還是十分險惡西太后心上很覺不安於是命車駕即日西進光緒帝在出奔時原很不贊成的了現在西太后欲駕幸長安光緒帝便竭力反對母子間口頭上的爭執也鬧過好幾次西太后哪里肯聽光緒帝拗不過太后只好隨從西去既到了長安西太后就下詔罪己那時榮祿已代擬詔書召李鴻章進京開始議和八國中由德國領頭要求很是苛刻經李鴻章費盡心機尋出一條門路來那門路是誰呢就是津沽的名妓賽金花原來賽金花本是殿撰洪鎔的寵姬當洪鎔出使德意志時和德國炮兵上尉瓦德西很有交情賽金花同瓦德西也締做密友照西國的習慣男女交際是應該有的所以賽金花與瓦德西從友誼漸漸入了戀愛程度了洪鎔回國之後便一病不起賽金花因受大婦的欺淩就下堂求去重墮風塵此時聯軍進迫津沽系假戕殺德使克林德之名和中國宣戰的因是各國推德國出面德將瓦德四做了聯軍總帥李鴻章急於議和便委託賽金花去謁見德帥瓦德西令她於中說項瓦德西和賽金花既是舊歡重逢自然十分要好一場和議得著賽金花的助力很爲不少呢但大體方得就緒李鴻章忽然積勞成疾竟至撒手西歸了西太后聞得李鴻章的死耗很是震悼立命賞治喪費萬元著奕劻代表祭奠以慰忠魂並諡號文忠這且不提再說李鴻章議和的條約共計十二條雖經告成但還有許多的手續未曾完備西太后隨即派了王文韶去繼李鴻章的任終算將一樁大禍完全結束等到雙方簽約的時候西太后眼見得辱國喪權自己責備自己時也不覺流下兩行珠淚來卻說光緒帝被囚在瀛台的時候一腔鬱憤本來無可發泄到了聯軍進逼京城太后倉皇出走光緒聽得消息便朝服整齊地要往使館中去西太后大驚道你此時前去豈不是送羊入虎口嗎光緒帝坦然說道他們是文明國人對於鄰邦的君主決不至於加害的而且經此一去如議起和來也容易入手了西太后忙阻攔道你就是要去也不應在這個時候試問你這時就是到了使館算去認罪呢還是去議和呢真是毫無理由何必去冒險呢光緒帝不聽當時認定要去西太后謂皇上受驚神經錯亂命內監等擁著光緒帝強行登車後來到了太原西太后令西進長安光緒很不願意又經一番力爭西太后只說皇上神智不清叫內監們去好生看護依然迫著上車但車駕西發的時候光緒帝尚垂淚不止因爲倘太后西去留皇上居京那京裏有了維持的人何至受外人如此蹂躪呢所以人謂德宗昏庸那話未免冤枉他了不過自車駕到西安後光緒帝終鬱鬱不樂言語之間不時作憤激之詞可是西太后卻不能見諒強說皇上患心疾她要使臣子們見信一天乘慶王長女元大奶奶隨侍在側時暗中示意皇上令取元大奶奶的奩具把它藏過了光緒帝不曉得西太后的用意真個去做了出來等元大奶奶梳洗時尋不見奩具瞧見皇上放在那裏便問他取回光緒帝不許道那是太后所賜怎敢私下相授呢元大奶奶見說也只得罷了及謁見西太後把這事提起西太后笑道堂堂帝皇竊人的奩具他還不是患了瘋病嗎經這一度之後光緒帝患心疾的話說漸漸有人相信了其時光緒帝何嘗有什麽病呢無非西太后要埋沒他罷了這且不提當下那和議告成十二條中有懲辦罪魁一條在回鑾之前自然要實行的於是就在西安下詔載瀾毓賢正法端王遣戍新疆剛毅得了資訊已急死在西安旅中其他凡參與義和團的朝臣多半革職諸事妥當準備回鑾後人有詩嘲西太后蒙塵西安道烽火連天戰鼓驚夷兵夜入燕京城車駕匆匆奔城外喊殺號呼血染塵嗟兮事急如狼犬滿朝無有保駕臣深居宮禁厭肉食倉皇道途飲糜粥頤和園裏多繁華今朝卻來荒郊宿如意館內諸寵臣回憶往事掩袖哭出亡千里入太原君臣惟知避強敵不願長安成帝都百官草草朝班列辛醜年的七月下旬西太后命近臣勘視東路的行宮和鑾輿所經的道路以便回京但傳諭地方官吏凡鑾駕所曆的州縣無須過於供張諸事務求儉約這是西太后蒙塵時受了痛苦也算是一種覺悟啊到了回鑾的那天西安城中的街道一律粉飾成黃色兩邊的房鋪都懸燈結彩十分熱鬧這時比較來的時候情形又是不同了西太后又傳諭把鑾輿的黃緞幔打起任民間的婦女瞻仰聖容當車駕未出城之前由彈壓的兵丁執著藤鞭掃清了街道後面便是前導馬一對對地過去前導馬之後是黃衣黃帽的內監和穿黃馬褂的官員其次又是乘馬的太監那步行的宮監都是手提著香爐香煙縹緲街上寂靜得鴉雀無聲隨駕左右的人多半是繡服黃裳王公大臣之類禁衛軍過去便是光緒皇上和皇后妃嬪的車駕後面黃轎裏坐著大阿哥並許多保駕的親王西太后的鑾輿用三十六人擡著都穿著團龍褂子很整齊地過去不料在這警衛森嚴的當兒忽然街道上沖出一個赤身露體的大漢揚著兩臂直奔西太后的駕前要知後事如何再聽下回分解
