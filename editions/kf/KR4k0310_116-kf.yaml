body:
  text: 第七十六回公主多情隔屏選婿大夫守義當宴拒婚話說劉秀緩步登壇南面坐定受文武百官朝賀已畢改元建武頒詔大赦改鄗城爲高邑是年本爲更始三年四月史家因劉秀登基漢家中興與劉玄失敗不同所以將正統歸于劉秀表明建武爲正朔且劉秀後來廟號叫做光武遂沿稱爲光武皇帝小子依史演述當然人云亦云從此將劉秀文叔四個字高高擱起改名爲光武皇帝諸須要注意以後如說到光武皇帝卻就是劉秀文叔了閑文剪斷敘歸正文如今光武正統已定先暫按一段特將劉玄一面細敘一敘話說劉玄在長安聽說劉秀正了大統不由得滿心歡喜忙將李松趙萌召到殿上說道兩位卿家你們曉得麽如今又出了一個皇帝了李松趙萌聽他這話大吃一驚一齊問道誰做皇帝劉玄笑道就是劉秀啊适才探事官進來說的劉秀現在鄗城自立爲大皇帝頒詔大赦天下了我想他既然要做皇帝不如就讓他去做罷省得我吃辛受苦的麻煩不了李松忙道主公你這是什麽話自古道萬民之主九五之尊豈可輕易讓與他人的如今他既然做了皇帝我們要趕緊想法子將他撲滅才好劉玄翻了一會子白眼才答道你們忒也多事別人要做皇帝與你們有什麽相干呢趙萌急道你曉得什麽目下不想法子去撲滅他們一俟他們勢力養成就要來撲滅我們了劉玄笑道這話便是胡說天下哪有這樣不講理的人他做皇帝我也不去反對他他反要來尋著我嗎恐怕沒有這回事罷李松急道偏是你講得有理到了刀斧臨頭你才後悔呢劉玄把頭搖得像煞撥浪鼓一樣一百二十個不相信二人也無法可施一班文臣武將早有異心張卬申徒建出班奏道蕭王劉秀天下歸心今正大統正是順天應人主公識時何不趁機讓位呢劉玄大喜道二卿之言正合吾意他方才說了兩句尚未說完李松剔起眼睛向張卬申徒建厲聲大喝道賣國求榮的奸賊快少開口張卬被他一罵只氣得三光透頂暴跳如雷亦潑口罵道你這狗頭是什麽東西擅敢潑口傷人朝廷大事自有公論何用你這膳夫干預羞也不羞李松更不可忍耐忙大聲喊道武士何在話猶未了從後面轉出武士十余人各懷利刃直撲二人張卬見勢頭不對忙在腰間掣出寶劍一路砍出殿門無人敢擋竟讓他走了申徒建措手不及被衆武士刀劍齊下登時砍得血肉模糊死於非命這時劉玄嚇得矮了半截渾身發抖地動個不住這時趙萌王匡陳牧三人也不待令下便去點了五千精兵徑紮新豐李松也帶了三千兵馬去紮揶城誰知張卬出來便飛馬趕到華陰投奔赤眉大帥樊崇百般攛掇勸他出兵進襲長安樊崇早有此心可巧軍中劫到劉氏子弟二名崇心中忽生一計便將一個名叫劉盆子的扶爲皇帝招搖惑衆聚衆興師直向長安進發一路上搶劫燒殺無所不爲未滿三日已到了長安城下旌旗蔽天矛戈耀日長安城中雖有些兵士無奈皆是老弱殘卒哪有抵抗的力量只得宮夜保著劉玄逃到新豐趙萌陳牧王匡等聞報大驚星夜聯合揶城李松來複長安八千人馬將長安圍困得水泄不通樊崇張卬帶了三萬赤眉進得長安肆意劫掠未到半日已經劫得十室九空聽說劉玄兵到慌忙收集衆賊開城迎敵各排陣勢大殺一場李松趙萌等抵敵不住引兵敗走衆賊兵領隊追上將李松等殺的殺捉的捉一個未曾逃脫衆賊大勝收集兵士將劉玄帶到殿上劉玄嚇得面無人色劉盆子坐在殿上好像泥塑木雕一般一言不發樊崇大喝道哪個劉玄到了現在還不將玉璽交出等待何時劉玄只得將玉璽卸下張卬大叱道這樣無用的東西留在世上有何用處還不將他結果了呢忽地兩旁邊轟雷價地一聲答應將劉玄趙萌等一干人完全縛起劉玄滿口哀告劉盆子倒心中好大不忍對樊崇說道樊老爺子我看這些人怪可憐的不要殺罷將他們放去就是了樊祟倒也強盜發善心正要傳令放下誰知張卬恨如切骨厲聲說道斬草不除根萌芽依舊生今天將他們放了難保後來不來作對到了那時才後悔不及呢樊崇聽了他這兩句話心中一動忙喝道推出去砍了話猶未了走出幾個武士鷹拿活雀般地抓了出去刀光一亮可憐劉玄趙萌等身首異處了樊祟對張卬說道我看劉玄手下有一個將官名叫成丹端的是個好漢現已被我們捉住囚在後面要是將他收服住了倒是一個大臂膀張卬點首道不是你說我幾乎將他忘了此人與我有一面之交憑我三寸不爛之舌說他來降就是了樊崇大喜道如此就煩神前去罷張卬滿口答應告辭出來到了後面令人將成丹放下來張卬打躬作揖地說道小弟遲來一步致將軍受屈了成丹滿成羞慚低頭無語張卬又道吾兄智勇雙全屈居群姦淫威之下弟實替兄抱屈如今樊將軍扶助劉盆子爲帝何不施一臂之力建功立業將來名垂竹帛永遠不朽呢成丹答道敗軍之將尚有何顔再事別主請從速處決罷張卬忙答道大丈夫棄暗投明方不失英雄本色請將軍不要執一才好呢成丹也不答話默默無言張卬心生一計忙著人將樊崇請來樊崇見了成丹躬身到地口中說道得罪將軍千祈恕罪成丹趕著答禮說道敗將請速處決罷再加以禮節實在無地可容了樊崇笑道將軍哪里話來如今亂世之秋四方無主惟盆子是漢家嫡派所以不才等願效死力扶助主公恢復漢家基業將軍肯以萬民倒懸爲念請助一臂之力崇等感謝不盡矣成丹仍未答話又經張卬軟說細勸成丹才死心塌地地服從他們話休煩屑說光武帝接位之後連日接到各處消息先聽說赤眉造反倒也不十分介意後來聽說劉玄等被赤眉殺了長安失守勃然大怒便與鄧禹商議道如今赤眉猖獗若不早除必爲大患鄧禹笑道赤眉烏合未足爲患臣願請兵五萬一鼓蕩平便了光武帝大喜道卿家肯去孤無憂矣卿家請先出發孤即首取洛陽後來隨機策應如何鄧禹在喜點頭稱是忙下令點齊人馬自己帶了馮異王霸耿弇李通劉伯姬景丹六員大將克日與光武帝分頭出發在路非止一日那日到了長安城外紮下大營埋鍋造飯還未晚餐猛聽金鼓大震一隊賊兵從西南上斜刺殺來原來樊崇等早已得著消息日夜預防這隊賊兵正是成丹領兵在城外巡閱瞥見東南上煙塵大起曉得漢兵已到忙來迎敵鄧禹見賊兵已有準備心中也自吃一驚忙點將帶兵列成陣勢一眼望見成丹躍馬橫槍立在垓心便眉頭一皺計上心來回頭向馮異笑道那不是成丹麽馮異道如何不是鄧禹道點陣要煩將軍出去方不致失了銳氣馮異心中一想今天鄧先生獨要我出馬是什麽意思呢沈吟了一會猛地省悟道是了他一定教我去罵他一番曉諭大義吧他想到這裏更不怠慢倒持獨腳銅人撥馬闖到垓心向成丹招呼道來者莫非成功曹麽成丹雙手當胸一拍答道然也馮功曹別來無恙否馮異點了一點頭開口說道成將軍我們分別以後不覺倒有四年多了聽人家說你扶助劉玄我很替你可惜以爲明珠投暗永無出頭之日了他說到這裏成丹也不答話拍馬搖槍來取馮異馮異暗想道本來鄧先生教我來指陳大義不想這狗頭竟不受教訓只好將他打殺罷他揮動銅人與成丹翻翻滾滾大戰了一百多合成丹深恐馬乏忙用槍逼住馮異喝道等一會我我換馬來和你決一勝負馮異哈哈大笑道今天勝負已分何必再分勝負呢成丹剔起眼睛道你待怎講馮異不慌不忙地說道你也是個功曹我也是個功曹你入赤眉我爲漢將同是一樣出身卻變成兩般結局可歎呀可惜請問你的心肝到哪里去了不願天下萬人唾駡竟爲赤眉強盜不獨貽羞三代且要遺臭萬年我馮異爲漢家名將功垂竹帛你成丹爲落草強徒殺之不足以謝萬民到了勢窮力盡的時候刀斧加頭後悔無及了如今誰勝誰負天下自有定論無須我再曉諭了你且回去細思我言馮異罵到這裏成丹滿面雪白口吐白沫大吼一聲往後便倒馮異見罵倒成丹忙揮軍掩殺衆賊兵拼命價地將成丹搶入城中緊閉城門樊崇見成丹這樣大吃一驚忙問什麽緣故衆賊便將上項事情說了一遍張卬發恨道叵耐馮異這個匹夫信口亂言成將軍是個直性的人竟被他占著上風去了讓我出城和這個匹夫分個高下他說罷點齊三千人呐喊出城一馬闖到垓心厲聲大罵道馮異賊子快來納命馮異得勝正要回營聽他罵陣勃然大怒兜轉馬頭正要動手瞥見耿弇一馬飛出扭住張卬便鬥二人戰了八十多合張卬刀法散亂力氣不勝帶馬要走馮異穿雲閃電般地闖到垓心大吼一聲一銅人如泰山蓋頂地打了下來張卬大吃一驚措手不及登時腦漿進裂翻身落馬耿弇揮動大隊掩殺過來將那些賊失只殺得屍橫遍野血流成渠只恨爺娘少生兩隻腿沒命地四散奔逃馮異與耿弇又領兵追殺了一陣才收兵回營鄧禹大加讚賞一宵無話到第二天正要領兵攻城只見城門大開並無一軍一卒鄧禹心中生疑惑耿弇道想是賊人連夜逃去了馮異道這倒不可料定衆賊的詭計多端倒要小心一點才好他們正自議論忽見探馬進來報道賊人連夜向陽城去了鄧禹問了個實在才領兵進城剛到城門口猛聽得裏面隱隱地有角鼓聲音馮異大驚撥馬帶兵回頭衆三軍見頭隊退下便知有了緣故連忙陸續回頭倒把一個鄧禹弄得莫名其故忙問馮異是什麽緣故馮異道方才正要領兵進去猛聽得裏面鼓角怒號這不是顯系有賊兵埋伏麽鄧禹就沈吟大笑道將軍錯矣豈不聞兵法有雲虛即是實實即是虛是實非虛非虛即實麽我想一定城內沒有一兵一卒了馮異道這倒奇了你說沒有鼓角聲音究竟從哪里來的呢鄧禹笑道你們大膽進去自有道理李通王霸哪里還能忍耐縱馬入城大隊也隨著入城了到了紮營之所進去一看原來是幾隻羊被賊兵吊在牆上頭朝下面在羊頸下懸著一面大鼓那羊吊得難過前面只兩腳不住地在鼓面上亂搔在外面聽起來倒也抑揚頓挫像煞人敲的一樣諸將看到這裏才佩服鄧禹的高見原來樊崇見張卬陣亡成丹又病料知孤堂難鳴點齊衆賊向陽城遁去到了陽城正要行劫有一個頭目上前獻議道此去漢家陵墓不遠何不去掘棺搜抄一下子一定有不少奇珍異寶呢樊崇大喜便棄了陽城轉道向陵寢進發不到半日到了園陵守陵的官吏早已溜之大吉一衆赤眉闖進陵寢揮動兵刃不多時將一百三十二座後妃的塚廓完全撬開將棺材擡出動刀動斧七手八腳將棺木劈開只見那些妃子顔色如生渾身珠寶玉器那些賊兵將珠玉劫下每人按著一個死美人實行工作起來樊崇最注意是呂後的塚廓等到將棺木劈開只見呂後含笑如活人一樣真個是千嬌百媚樊崇淫心大動叱退侍從解甲寬衣竟與呂後做生死交易來了等他方才將事做過那呂氏的屍身突然化成一攤血水和槎樣白骨把個樊崇嚇得魂不附體忙從地上爬起渾沾著許多血水既腥且臭懊惱欲死正要領隊出陵猛可裏四處喊聲大起李通王霸耿弇馮異帶了無數兵馬闖進園陵一班赤眉人不及甲馬不及鞍全被生生地縛住樊崇還要抵抗怎奈來將誰不是猛如虎豹還容他動手嗎衆將奏凱而回到了長安鄧禹領隊出城迎接一一慰勞已畢耿弇道鄧先生妙算如神果然我們馬到成功一些也未出先生意料之外鄧禹笑道不才早已料到這些奴才一定是要做出這一出來的大家進了城互相道賀專等光武帝到來到了第二天辰牌時候早有探馬飛來報道聖駕現在已到新豐了請先生定奪鄧禹聽得便知洛陽已得十分喜悅忙預備接駕大排隊伍長安城中的百姓聽說光武帝到了誰也如見天日一般頂香捧酒將一條長安大道跪得密密層層到了午牌時候才見斧鉞羽葆一隊一隊地擁護著聖駕遠遠而來後面旗纛飄揚追隨著無數的大兵霎時到了城邊衆百姓齊呼萬歲光武帝下龍車一一親自慰問已畢然後才慰勞衆將士一會子領隊進城即日升殿鄧禹出班將掃除赤眉的前後說了一遍光武帝滿心歡喜便傳旨將樊崇成丹等一班渠魁梟首示從劉盆子將玉璽摘下格外施恩封爲滎陽侯賜俸終身發放既定於是大封功臣所有什麽官職的名稱漢書上自有記載無須小子再來饒舌了從此以後萬民樂業國泰年豐雖有一兩處草寇造反一經天兵征剿無不平服這也不要多贅如今單講朝中有一位大臣姓宋名弘官居大中大夫爲人生來剛直不阿清廉如水政聲卓著他是光武帝第一個信服的大臣他本身所得的薪俸完全分散與貧寒九族光武帝體貼入微不時賞賜各種珍寶可是宋弘生性拘謹無故斷不輕受由是光武帝愈加欽敬有一天宋弘薦一個人姓桓名譚到朝中執事光武帝料知他所薦的人諒必不錯便封爲諫議大夫執事數月果然清正無倫光武帝自是歡喜後來聽說他喜彈琴便將他召入宮中命他彈琴桓譚也不好推辭只得彈了一回光武帝龍心大喜賞絹五百匹黃金三十斤不想這個消息傳到宋弘的耳朵裏勃然大怒便將桓潭大大地申斥一番桓譚垂頭喪氣自己認錯罷了光武帝的長姐湖陽公主到了現在還未有夫婿所以光武帝心目中早已屬意宋弘有一天光武帝到了湖陽公主的宮裏探了口氣湖陽公主果然有嫁人的口吻不過嫁雖是嫁她卻來得非常認真須要自己親眼選中才能答應呢光武帝忽然心生一計到了次日便大筵群臣召桓譚鼓琴令湖陽公主立在屏後聽她選擇不一會群臣奉詔先後俱到獨有宋弘未到桓譚前次被宋弘一責心中不禁惴惴不安又礙著帝命不敢不彈便胡亂彈著這時宋弘正色進來對光武帝奏道臣薦譚入朝無非望他忠誠輔主稱職無慚不料他詭道求合反令朝廷耽悅鄭聲這是臣所薦非人應請坐罪光武帝改容令桓譚退下這時跑出一個宮女附著光武帝的耳朵說了幾句光武帝點首稱是宋弘入席鄧禹馮異等無不整容起敬獨宋弘若無其事酒至半酣光武帝親自向宋弘說道孤家聽得俗語有兩句說話是貴易交富易妻這兩句話大約也是人情常有的事吧光武帝還未說完宋弘正色答道主公哪里話來臣聞貧賤交不可忘糟糠妻不下堂怎好見利忘義呢光武聽他這兩句話真個啞口無言暗道這事一定不諧了這正是漫道落花原有意誰知流水本無心要知後事如何且看下回分解
