body:
  text: 第八十七回幸名園太后圖歡娛坐便殿主事陳變政說話那小太監七磕八碰地走進來喘著氣連一句話也說不出德宗忙問他什麽事那小太監指手畫腳的只掙出太后兩個字來德宗知道太后爲什麽變故也不再去問那小太監了便起身去後宮見太后到了那裏只見李蓮英和李大姑娘繆素筠等壽昌公主一班人都排列在榻前太后卻斜倚在榻旁面色同黃蠟似的只是一語不發德宗便上前請了個安太后將頭點點揮手叫皇上退去德宗很莫名其妙惟有退了出來細問那值日的太監方知太后在昨日夜裏忽然腹痛起來直到天明不曾止住李蓮英忙叫禦醫來診治太后決意不許後來忍不住疼痛才去召禦醫進宮診了診太后的脈搏皺著眉頭道這症候很覺奇特下臣不敢直陳因爲以太后的年齡決不會患有這種病症的了李蓮英在旁怕禦醫說出不知忌諱的話來忙喝道不必多言太后這病誰不知道是事繁心勞所以患的血衰之症你身爲禦醫難道不曉得嗎那禦醫連聲說了幾聲是便據李蓮英的話擬了一張補血的方子就辭出來走了以後不知怎樣那太監恰有事走開因此並不得知等到來值班時太后腹痛已經好了方命小太監去召皇上但來了又沒有話說弄得光緒皇帝真有些摸不著頭腦待聽了內監的一席話心裏早有九分明白曉得太後患的是說不出的暗病只有微微歎了幾口氣回到自己宮裏對寇連材講了一番也就罷了光陰迅速轉眼到了十月裏西太后的萬壽之期已在眼前了雖則有停止慶祝的詔書頒發過但這都是遮掩外人的耳目罷了這種掩耳盜鈴之技本是官場的貫技聲明不做壽分明是把壽期告訴別人到了那時依然燈燭輝煌地祝起壽來了何況那腐敗不堪的清政府還在這些事上計較信用嗎於是到了萬壽的前三天把頤和園的前前後後紮得一片如錦總之自離園周圍二十裏起並萬壽山昆明湖都紮著彩遍地鋪著紅緞上頭蓋著漫天帳真是如火如荼異常地華麗到了萬壽的一天老佛爺也極早起身著了錦繡的龍鳳壽服李蓮英繆素筠和諸親王的福晉陪侍著擺起全副鑾駕直往那頤和園裏來一到了園門口早有惇王恭王慶王一班親王率領滿漢大臣在那裏跪迎車駕進了園諸親王又齊齊地隨了進來這時排雲殿上已設著寶座準備太后升座受賀因頤和園裏要算是排雲殿最是廣大了殿上有聯道萬笏晴山朝北極九華仙樂奏南薰只看聯上的語氣已可見一斑了不一會光緒帝同皇后也擺著鑾駕前來拜夀拉著便是瑾珍兩妃原來二妃被禁的日期還不曾滿光緒帝趁太后萬壽替二妃乞哀終算蒙太后特赦所以也來給太后叩頭最後是些福晉格格們都一一叩賀已畢太后傳諭任親王大臣福晉格格們遊園一天並賞賜壽宴宴罷在大院前瞧戲這一天熱鬧可算得未曾有的了後人因這頤和園的華麗作了幾首詩道碧窗簾外影冷如冰簾外月華明春明依舊在昔日池塘何處尋孤鵲聲聲猶然逐雲之行鴛鴦何懶蛺蝶偏輕二十四橋未聞笛兒女傷愴怎醒也未醒多少淪桑恨往事悲何限前朝繁華不重見閑雲散漫天邊看綠楊天遠梨花深深庭院桃花門巷獨得荷花池館一聲羌笛悲咽昔日風流說起不由人腸斷那頤和園大院中的戲臺高低共分五層二層系演神怪戲之用所以佈置的一切和神祠差不多但第一層卻同普通台一樣不過略爲清致一點罷了三層上面是專制佈景所用的四層是台椅一類備伶人的喬裝五層上卻供些神佛戲臺的旁邊是一帶平房以便王公大臣恩賞聽戲所坐台的對面有三間一丈多高的房屋爲孝欽後自己聽戲的時候坐臥之處旁有兩間休息室放置長炕一具太后每到聽戲或坐或臥非常舒適這天凡京津著名伶人如潭叫天汪桂芬等都被邀入大內到了晚上頤和園內燈火照耀猶同白晝一般太后和德宗並坐在大院前聽戲兩邊列著親王福晉格格親信的內監等等不一會兒太監呈上手本請皇太后皇上點戲西太后隨手點了一出小叫天的天雷報德宗點了一出逍遙津太監便領旨退去叫伶人們扮演起來那小叫天的天雷報是他拿手的傑作果然一曲高歌淋漓盡致到了雷擊的時候太后瞧著德宗微笑光緒帝知道太后譏諷自己便低頭默然李蓮英立在太后背後也看看德宗一笑光緒帝心上本已十分憤怒了及至逍遙津出場菊仙的漢獻帝描摹懦弱的孤君受淩逼的狀態真是聲淚俱落恭王在座上忍不住喝采起來慶王笑著道禁宮裏喝采不怕老佛爺叫怪嗎恭王正色說道咱們先王的舊制宮中不准演戲的了說著目視太后太后卻裝著沒有聽見一般回頭對李蓮英說話這時唯有德宗不覺眉飛色彩連叫內監去犒賞那般演戲的伶人西太後明知皇上親點那出逍遙津是有意和自己作對因此很不高興但礙著恭王在座不好發作否則早已叫伶人停演原來恭王奕訢生性素來嚴厲不阿他在軍機處時西太後本來懼怕恭王的當孝貞後在日常同西太后及皇上恭王等往遊三海西太后瞧見三海的亭閣頹圮的地方便用手指著說道咱們須得好好地把它修葺一下哩恭王聽了便很莊重地答應一個是字孝貞後接著說道修是應該修的但俺們此刻不曾有閒錢來幹此種不要緊的事罷了西太后見說就默然不語這是閒話且說這天演戲還不曾完德宗因心裏不快便請了太后的晚安先和瑾珍二妃回宮太后也爲皇上故意叫演逍遙津譏諷自己本滿心不樂巴不得德宗及早離開等到德宗走後西太后吩咐親王等退去令格格們在大院前聽戲侍候著自己卻同李蓮英去遊智慧海去了這智慧海是頤和園中第一個水景大略的情景和瀛台相似不過構造上比瀛台要考究得多海的四邊嵌著珠玉寶石挂著西洋的五彩燈景海中放著一隻龍船船身長一丈八尺高一丈制紮的綢綾五色斑斕龍舟的裏面是用大紅緞子鋪著地一樣有幾案台椅炕榻之類不論坐臥都極安適船頭上擺著旌旗節鉞船尾裏另有一間小室兩個小太監常常侍候在那裏以便隨時進禦點舟的對面陸地上還紮著一座月宮宮中簫鼓之聲終夜未絕一到中秋月宮裏陳列著甘鮮果品雪藉冰桃西太后同著皇上親祭太陰並恩賞親王大臣准乘了龍舟往來遊戲大有城開不夜之概到了半夜又命賜宴歡呼暢飲直至天明君臣始各盡歡而散但這是後話了當下西太后同著李蓮英在智慧海遊玩了一遍又轉到寶蓮航來講起這玉蓮航原是一個船塢卻用玉石琢成異常地精致所以一名又叫石舫裏面制有汽船兩艘那時的汽船和現在完全不同只能行動罷了然當時已視爲精巧絕倫奪天地造化之功了而汽船之中也有電燈通著園外汽舟一行萬盞齊明西太后常獨自駕舟出遊因這船塢離仁壽殿不多路恰和萬壽山相對風景最是佳麗吸引西太后不時臨幸這天晚上西太后和李蓮英玩了一會覺得遊興未衰便又到桐蔭深處而來這桐蔭深處是頤和園裏頭一個秘密所在裏面建築著三間小室室的四周都植著極大的梧桐樹旁邊是一口清泉每到夜深人靜時泉流淙淙之聲如鳴著瑤琴很覺清婉可聽沿清泉一帶雕欄琢玉清潔如畫圖一般那三間小室裏面也是畫棟雕梁十分精致內設床帳一具諸如盥嗽妝具沒一樣不備因爲西太后的性情素喜修飾每至一處必敷鉛華再整雲鬢數十年如一日雖已年逾花甲而猶不離脂粉人家看去不過是三十多歲的半老徐娘哪里曉得她已五六十歲了呢怕以美國的立特博士稱西太后做世界第一美人真是非過譽之談啊這且不在話下再說西太后和李蓮英自這天起終在桐蔭深處秘密遊覽頤和園中的宮監也常常聽得桐蔭深處有男女嘻笑之聲正是李蓮英和西太后遊樂之時內監等非經傳呼不敢近前只遠遠地侍候著從此以後西太后起居在頤和園裏對於一切的朝政也不來干預了悉聽德宗去裁判正應了翁同和所說的樂不思蜀了這不是德宗親政的好機會嗎德宗自那日瞧了戲回去心裏很覺惱怒一直和瑾珍兩妃講著當時的情形德宗越說越氣雖有兩妃慰勸著但德宗只是悶悶不樂差不多一夜不曾合眼到了翌日清晨退朝後便在禦書房裏台翁同和商議改革朝政的計劃翁同和奏道照現在的情形看去先皇的內制已不能通用的了愚臣老邁無能恐籌不出良法反而弄巧成拙所以只有讓給一班後進的能人去建立功業吧光緒帝慨然說道師傅既不肯擔這個職責俺現今決意重用康有爲等一班新人了師傅可代俺傳諭出去令康有爲明日在便殿召見就是翁同和領旨退出自去知照康有爲不提單表光緒帝因甲午一役吃日本殺得大敗虧輸後因備戰的諭旨完全是自己所主張很受太后的埋怨又割臺灣遼東給日本之外還賠償了軍費兩百萬兩假使當時日本人不遣刺客行刺李鴻章別國不出來干涉恐怕割地和賠償決不至這點點哩後來雖經俄國人的抗議和德法兩國的幫忙將遼東索回來但各國的幫忙豈真是好意也無非爲著各自的利益罷了猶如俄國人的抗議何嘗是一心爲中國設謀呢多半是若日本取了遼東於俄人大大的不利因此不得不出頭來助中國一臂至於德法兩國表面上是援助中國實際上也是爲著私利而已但看等到事體一了俄國和李鴻章私下定了密約租借了旅順大連德國也來占了膠州灣法國也租了廣州灣同時英國要求租借九龍威海各國紛紛蠶食起來把中國當做一塊肥肉大家儘量地宰割著這光緒帝究非昏庸之主目睹這種現象心上如何不惱愈是惱怒變政的心也益急那天和翁師傅議定之後準備在便殿召見康有爲諮詢一切原來這康有爲素有大志他在甲午之前也曾上書條陳政見什麽停科舉興學堂之類那些滿洲大臣只當他是狂言囈語將他的條陳壓住不許上呈但翁同和做主試官時讀了康有爲的文章驚爲奇才便給他中了進士這樣一來翁康有了師生之誼所以翁同和在德宗面前竭力地保薦光緒帝有心要召見康有爲面詢一番終以格於規例不便越禮從事只下諭著康有爲暫在總理衙門學習行走過不上幾時擢康有爲做了翰林院侍講這時又下諭召見到了那天康有爲便翎頂輝煌地到便殿見駕光緒皇上等他禮畢就問他自強之策康有爲便陳述三大策一是大聚群才以謀變政二爲採取西法以定國是三是聽憑疆吏各自變法改良政治此外如請詳定憲法廢去科舉謀興學校開制度局命親王遊歷各國以偵察西國之良政譯西書以灌輸知識發行紙幣設立銀行爲經濟流通之計天下各省各府辦文藝及武備學堂練民兵以修武事種種陳述滔滔不絕真是口若懸河頭頭是道光緒帝聽罷不覺大喜又讚歎了一會諭康有爲退去並令保薦新政人才以便實行變法這時李鴻章與俄國訂約後往各國遊歷初歸光緒帝惡他甲午之戰不肯盡力著令退出軍機閒居後因兩廣總督出缺命李鴻章外調出督兩廣去了恭親王奕訢雖然剛直但自甲午後起復原官以來對於政事不似從前的嚴厲了不料老成凋謝恭親王忽然一病不起耗音傳來太后和皇上都十分震悼立命內務府賜給治喪費一萬元諡號忠王這且不提再說光緒帝自召見康有爲之後一心要行新政恰巧侍郎徐致靜侍讀學士徐仁鏡徐仁鑄禦史楊深秀等上書請定國是光緒皇上至雌變法的主意越發堅定了便於四月二十七日下了一道詔書道頻年以來戰事紛興外患堪虞朕甚憂之於是內外臣工多主變法自強乃決意先行裁汰冗員立大小學堂改武科制度等已審定試辦施行無如舊日臣工堅以墨守舊制擯除新法爲目標衆口呶呶莫衷一是遂有新舊制度之紛爭然時今日內而政治不修外則虎視鷹瞵俟隙輒進苟不謀自強將何以立國且自強之道首以強民富國爲前提但士無良師奚能實學惰兵不練何以禦侮長是以往國何能強徒見大好河山供強鄰蠶食而已經審之再三以國是不定則號令不行他日之流弊必至互起紛爭于國政尤無所補查中國歷朝各行其法各事其所是戰國之世其國雖統於周而列國之制度各行其善無有相同者矧新陳代謝自古已然既采新制則舊制自不能存在擇善而從國之大道也嗣後內外大小臣工王公以及士庶務宜備力向上發憤圖強習聖賢禮義之學采西學之適於制度者借補不足維求精進以期有用京師爲全國首區學堂自宜創辦所有內外臣工王公以下至於各部司員子八旗世職乃文武後裔其願入學堂者准其入學肄業俾養成人才爲國家出力共維時艱凡爾臣工等不得徇私援引因循敷衍致上負朝廷諄諄告誡之意下亦自誤誤人後患莫大焉特諭內外臣工一體知之欽此自這上諭一下光緒皇上銳意變法的話自然喧騰人口了那康有爲也不時召見諮詢一時聖遇之隆滿朝文武大吏無與倫比康有爲保薦了幾個新人物幫同辦理新政他所保薦的哪幾個人呢就是徐致靜父子仁鑄仁鏡三人他的兄弟康廣仁弟子梁啓超本來是廣東新會縣舉子這時得他老師康有爲的保薦賞六品銜發在譯書局裏辦理譯書的事務湖南巡撫陳寶箴也保薦了劉光第楊銳侍郎徐致靜保薦了譚嗣同林旭戶部左侍郎張蔭桓保薦了王錫蕃禦史楊深秀保薦了丁維魯以上幾個人都是飽學之士可算是人才濟濟了還有張之洞一班人也幫著辦理改變科舉的章程王鳳文請設立賑施蕭文吉請整頓絲茶以興實業禦史曾宗彥奏請開辦農務王錫蕃請辦商業李端棻請整則例袁永昶奏請籌辦八旗生計滿人禦史瑞詢連字也不識半個的卻居然也上章請辦報館以靈通消息光緒帝見奏牘紛紜大都是有益於新政的便也一概容納把獻策的人還得嘉獎一番因此那些無聊的滿人也挖空心思競陳政見了也有似懂非通的光怪陸離笑話百出竟有請皇上入耶穌教重習西書的奏本出現光緒皇上看了只付之一笑而已但皇上對於諸臣關於新政的條陳因爲來者不拒都給他們一個容納所以弄出一場禍來了是什麽禍呢要知後事如何且聽下回分解
