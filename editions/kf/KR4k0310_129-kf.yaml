body:
  text: 第八十九回金蓮瓣瓣佛座作陽臺玉筍纖纖魚書與楚獄卻說富淑兒和她的父親出了大門就見蔡諳等三人另外還有一個年輕貌美的女子她不禁疑惑道這莫非是天竺國隨來的法婆麽看她這樣的打扮煞是奇怪究竟是個什麽人呢不說她在那裏狐疑不決再說林英一進了村口遠遠地就望見淑兒在門口倚在她的父親身邊在那裏遙遙地盼望他不禁勾起了一層心事暗道她的本領品貌論起來還不在瑪麗之下如果她要責問我重娶我卻拿什麽話去應付她呢她如果是個溫柔和藹的女子還不會發生什麽笑話萬一她是個嫉妒成性免不得各生意見爭寵奪夕那就要糟糕了他越想越愁不禁臉上現出一種不可思議的面容來胡明對瑪麗說道妹妹你可知道這裏就到林兄弟第一個夫人的府上了瑪麗忙道果然到了麽胡明點頭笑道到了到了瑪麗聽說心裏也起了一種感想暗道還不知他的前妻究竟是個什麽樣子的人物醜的美的都休去問但是她的性格與我相合固然是不出問題萬一性格不合小覰了我卻怎生應付呢到了那時她一定笑我是個番女不知禮義我倒沒有話好去和她抵抗呢不說她暗自打算這時已經到了門口蔡諳等翻身下馬過來和富平見禮胡明忙對瑪麗道妹妹站在西邊的那個女子就是林兄弟的夫人瑪麗輕移蓮步走到淑兒的面前操著漢邦的言語說道姐姐在上小妹這裏施禮了她說罷便折花枝地拜了下去淑兒倒莫名其所以急忙地也拜了下去二人互相謙虛了一會子胡明大笑道不是一家人不進一家門你看她們第一次見面就這樣的親熱起來林兄弟你站在這裏發什麽愣還不快一點來替她們介紹一介紹麽富平聽見他的話倒有幾分明白便向林英問道位小姐是誰林英見他一問不禁滿面緋紅半晌答不出一句話來胡明大笑道富老丈還問什麽這位是林兄弟的第個夫人蔡諳又和淑兒見過了禮富平忙將他們請進大廳一面令家人擺酒侍候淑兒聽見瑪麗是林英的第二個夫人猛的心中灰了半截暗道不想這個薄幸郎竟做下這樣的負心事來好好好現在暫且耐著一刻等你到後面再和你講話她想到這裏不禁星眼向林英一瞅一張粉臉上不由得現出一種含嗔帶怒的情形來林英見她這樣暗道不好不好果然中了我的話了不要講別樣一見面就這樣的鬧醋勁了可見日後永無安寧之日了他想到這裏不由得愁上眉梢癡呆呆地望著杯中的酒默默地一聲不作富平還未解透其中的情形舉起杯子向林英說道今天老夫特備一桌酒替你們洗塵將軍何故這樣的怏怏不樂呢莫非老夫有什麽不到之處嗎林英忙立起來答道泰山哪裏話來小婿因爲沿途受了一點風寒所以到現在身上還有些不大適意承你老人家這樣厚待小婿感激還沒有感激處哪裏還敢見怪呢胡明插口笑道林兄弟的毛病我曉得就是因爲他說到這裏蔡諳忙向胡明使了一個眼色胡明便不開口富平忙道既是賢婿身體不適一路上鞍馬勞頓先到後面歇一會去林英忙道用不著用不著淑兒也不言語倒是瑪麗問長問短的十分親熱淑兒懶懶的和她去敷衍後來富平問起林英如何與瑪麗結婚的話來蔡諳便一五一十地將林英如何陷入番營瑪麗如何冒死救他出來的一番話說了清楚富平這才明白淑兒聽了蔡諳的這番話便將那一片妒疑的念頭登時打消粉臉上現出笑容來向瑪麗離席謝道拙夫身陷番營多承姐姐大力救了出來愚妹妹感謝不盡了瑪麗趕緊答禮道姐姐哪里話來自家的姐妹何須客氣呢她說罷連忙一把將她扯了坐下來二人談到武藝一層說刀論棒十分投契只恨相見太晚林英到了這時才將那顆突突不寧的心放了下來不多一會子大家散了席林英便到後面去拜望岳母到了晚間富平命人收拾幾間空房間來讓蔡諳等去休憩又在淑兒的臥房對面收拾出了一間空房來請瑪麗安息再說林英到了這時當然是先到淑兒的房間裏去一則是久別重逢急於要敘一敍舊情再則自己娶了瑪麗本是一樁虧理的事情趁此去籠絡籠絡她他走到淑兒的房中一看卻不知她到哪里去了只見一個丫頭名叫小碧的坐在梳粧檯旁邊在那裏打盹林英便咳嗽一聲那個丫頭驚醒了揉著睡眼見他進來忙站起來說道姑老爺請坐林英道你們家小姐到哪里去了那個小丫頭忙道小姐在對過那位番小姐那裏談著呢林英聽了就回轉身忙向對過的房裏而來走到房門口偷眼往裏一望只見她兩個正在談得高興林英一腳跨入她們的房間才將她們的話頭打斷林英笑道你們談得倒好將我都不理了她們見他進來忙著一齊立起叫他坐下來淑兒笑道人家正在談得高興誰讓你撞了進來林英對淑兒笑道現在天不早了也好回去睡了淑兒笑道我睡與不睡與你有什麽相干要你在這裏嚕蘇什麽呢林英笑道你不著急我倒有些著急了她聽說這話不禁滿面通紅用星眼向他一瞅道啐誰和你說混話林英笑道我倒是實在的話良宵苦短有話明天也好談的瑪麗也跟著勸道姐姐天不早了請回去安息罷她玉體橫陳的往瑪麗的床上一躺笑道誰和你去胡纏呢快點走罷讓我與妹妹在一起睡一夜安穩覺罷林英又說了半天她響也不響林英沒法突然想出一個主意來忙向瑪麗丟了一個眼色她便會意托故出了房門徑到淑兒的房中去睡覺了林英將房門一關走到床前便替她寬衣解帶同入羅幃一度春風沾盡人間豔福俗語有一句話說新婚不如久別個中滋味又非筆墨所能形容于萬一的到第二天林英帶了淑兒瑪麗一齊到後面去告別免不得又是一番叮嚀難舍說也不盡蔡諳等辭了富平出了甯白村竟往東方而來一路無話一直到七月十三日才抵長安的西門早見受經台築得高入雲霄彩畫得十分莊嚴富麗蔡諳等還未到台前早有十裏亭亭長飛馬進城報告蔡諳回來的消息明帝聞得黃門官奏道蔡中郎現已將真經取了回來了現在已經到了城外的受經台了明帝聞奏大喜忙命侍臣大排鑾駕帶了衆文武一齊出城迎接蔡諳遠遠地望見羽葆儀仗曉得聖駕出城慌得滾鞍下馬伏在路旁林英等也就跟著下馬俯伏蔡諳的後面不一會明帝的鑾駕到了蔡諳等三呼萬歲明帝連忙下輦將蔡諳攙了起來口中說道卿家們一路上車馬勞頓無須拘禮了說著便命林胡等一律平身蔡諳等舞蹈謝恩這時內侍臣捧出金壺玉漿明帝親手挨次敬了三杯蔡諳等又謝龍恩一會子各種儀式俱已做過那禦駕前面的校尉一隊一隊的向受經臺上開發早有內侍臣將白馬背上馱的真經搬了下來恭恭敬敬地捧上臺去明帝領著衆臣上了台當有司儀官喝著禮典明帝昭告四方擎著香對四方拜了四拜緩步正位蔡諳將真經一袱一袱地捧到案前衆大臣從未見真經是個什麽樣子所以大家一齊聚攏來觀看只見明帝慢慢地將黃袱放開一一查點與蔡諳所報之數實相符合便先將大乘經第一卷展開與諸大臣一併觀看只見裏面奇字滿紙怪言充幅一點也不能瞭解不禁十分納悶有幾個明達的大臣見了這經滿紙荒唐不禁互相暗笑蔡諳曉得衆人不懂忙俯伏奏道我主容奏佛經旨意玄深一時不易懂得請靜心研習當不難徹悟也明帝聞奏稱是便命守台官將真經藏好擺駕回殿加封蔡諳爲大司空胡明爲甯遠侯林英爲白度侯兩個夫人也有極品的官誥按下不表明帝自從得了真經之後便下詔大赦天下死囚俱釋放出獄到處建築庵觀寺院容納僧道之流一面又命將取來的真經命人刻版重印以期普及不到三月果然風聞全國家家吃素戶戶念經這時單表一人姓劉名英這人本與明帝是介兄弟乃是光武帝第十一個殿下他乃是許美人所生的當明帝即位時便封他爲楚王地土極小而且又窮弱不堪明帝本來是個寬宏大量的主子見他的範圍又小又窮倒也可憐他常常有些賞賜不想這個楚王劉英卻是一個豺狼面子上倒還不敢出明帝的範圍暗地裏卻反對得極其厲害他在漁陽上穀一帶真是爲所欲爲收吸民財怨聲載道家裏藏著無數的美妻嬌妾常常有謀爲不軌的念頭無奈兵力又少不敢公然起事他聽說明帝取來真經他不禁生了歹心一面著人到長安去請僧道一面在漁陽城內建築一座極大的元雲寺命一群百姓俱來燒香祈福自己也鎮日價的在寺裏混著這元雲寺裏的主持僧名叫道慧年紀差不多還沒有二十歲生得滑頭滑腦的極其刁鑽他曉得劉英的心思便造了許多無稽的瞎話把個劉英弄得天花亂墜言聽計從將這道慧便像菩薩一般的看待常常將這道慧帶到府中請齋陪席的百樣殷勤這道慧到他的府中看見滿眼都是些美婢嬌妾不禁食指大動無奈侯門深似海無從下手倒是一件憾事他每每借著一個名目常要到劉英的府中指東畫西的一陣子有一天他正在寺中發悶瞥見楚王府中的一個家將跑進來向他道大和尚我家王爺請你有一件要事相商他聽說這話如同得聖旨一樣的連聲答應道是是是就去就去說著走入禪房換了件新鮮觸目的袈裟隨著那個家將出得門來徑到了楚王的府內到了會客廳上往椅子上一坐閃開那一對賊眼四下一望不見有一個人在這裏心中好不疑惑只聽那家將對他說道大和尚煩你在這裏稍坐一會等我進去通報王爺一聲他連聲稱是那家將便進去不一會出來一個十七八歲的小丫頭來塗脂抹粉的倒有幾分動人之處走到道慧的面前先拿眼將他上下一打量然後笑道你這位師父敢就是大和尚麽道慧見她問話不禁滿臉堆下笑容來答道承姐姐的下問小僧便是那丫頭掩著嘴向他嗤地一笑說道我家王爺現在曹貴人的房裏請你去談心呢道慧聽了諾諾連聲地答應著站起身來跟著那丫頭一同向後面轉了多少遊廊進了一個極富麗的房間裏面他進了門就見劉英懷裏擁著一個千嬌百媚的妙人兒他估量著這個人一定是曹貴人了劉英見他走進來連忙將她推開迎上來笑道不知師父的駕到有失遠迎望乞恕罪他連忙答道王爺哪里話來小僧伺候不周還要請王爺原諒才是他嘴裏說眼睛早和曹貴人打了一個招呼但見她對著道慧斜飄秋水嫣然一笑這一笑倒不打緊可是將一個道慧身子酥了半截劉英只是謙讓著道豈敢豈敢師父請坐下來再談罷他便一屁股送到劉英對過的一張椅子上往下一坐劉英對他笑道孤家今天請師父非爲別事因爲各處的兵馬皆已調好預備克日起兵未知尊意如何道慧聽得暗自歡喜機會到了便隨口答道小僧今天清晨在佛前祈禱過了老佛爺曾發下一個簽詞楚王劉英忙道是什麽簽詞他道漢家天下惟英爲王欲祈大福須在閨房我想這四句的意思無非說是王爺一定是九五之尊不過還有一點過失須要閨房中人到寺裏去祈禱七日七夜再求發兵的日期那就萬無一失了劉英大喜說道是極是極師父對於孤家真是無一處不用心事成之後一定封你做個大國師掌管天下的佛教如何道慧忙假意謝恩劉英又問道閨房中孤家的夫人貴人極多哪一個最好呢他道最好是王爺心愛的一個她去祈禱起來能夠真心實意的劉英聽得這話便回頭向曹貴人笑道心肝你可要吃點辛苦了她聽說這話正中心懷故意說道那可不能羞人答答誰情願去呢劉英正色說道這是一件光明正大的事情別人我全不叫她去獨要你去足見還是我疼愛你的好人你現在吃點辛苦將來正宮娘娘不是你還有誰呢她不禁乜斜著眼睛笑道王爺不要將我折殺罷我哪裏有這樣大的福氣呢劉英笑道你沒有福孤家有福就將你帶了福來了她向道慧問道師父我幾時去祈禱呢道慧笑道這個我卻不能作主要隨王爺自便了劉英忙道事不宜遲遲則生變愈早愈妙最好今天晚上就去罷道慧道既是這樣我便回去命人安排了劉英點頭笑道那就煩師父的精神了道慧又向劉英說道不過還有一件事我要對王爺說明劉英忙道你說你說他道老佛爺既判明要女子祈禱千萬不要遣那些五葷六雜的男人跟去以致泄露天機要緊劉英忙道是極是極就這樣的辦道慧便告辭出來到了元雲寺像煞熱鍋上的螞蟻一樣一頭無著處好容易耐著性子等到天晚到了亥牌的時候她才帶著四個丫頭前來道慧將她請進大殿一面吩咐一切的人等不准亂走今天是王爺的貴人降香只命他的四個小徒弟進來念佛另外的和尚因爲佛事太忙成日價地沒有睡過一回足覺聽得這話巴不得的各去尋他們的好夢了他將大殿前面的錦幔緊緊地拉起念到三更時分他便命四個小和尚四個丫頭一齊退出去揚言娘娘求籤閒人不能在此他們退出去之後道慧便對她笑道娘娘請去求籤罷曹貴人隨著他一徑走到大佛像後面的軟墊子上一把將她往懷中一摟就接了一個吻她也不聲張道慧悄悄地說道娘娘可憐小僧罷她嗤地一笑也沒答話他大膽將她一抱往墊子上面一按解了下衣上面做了一個呂字下面便狂浪起來他兩個各遂心願如魚得水一直弄到東方既白才算雲收雨散道慧緊緊地將她抱住說道心肝我爲你費盡了心思今天方才到手但不知你究竟對我同情嗎她笑道不知怎樣我自從看見你之後就像魂靈不在身上的一樣鎮日價的就將你橫在心裏這也許是天緣巧合吧道慧下死勁在她的粉臉上吻了又吻說道你在這裏一轉眼七天過去下次恐怕沒有機會再來圖樂了她笑道那個糊塗蟲懂得什麽我要來就來了二人一直到紅日已升才從裏面出來便將丫頭們喊了進來道慧說道娘娘的簽已經求過了現在身體困倦你們服侍娘娘到東邊的靜室裏去安息罷丫頭連忙答應扶著她竟向東邊靜室裏去休息了暫按不表此番劉英謀爲不軌早被一個人看破情形你道是誰就是行城縣令燕廣他知道劉英就要發兵鎮日價長嗟短歎無計可施他的夫人谷琦向他問道你這兩天爲著什麽事這樣的悶悶不樂他便將劉英謀反的情形對她說了一遍她不禁勃然大怒便對燕廣道我去修書與你詣闕告變去這正是只爲藩王謀不軌卻教巾幗壓鬚眉要知後事如何且看下回分解
