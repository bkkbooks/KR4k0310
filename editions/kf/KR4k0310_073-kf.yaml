body:
  text: 第七十三回泣脂啼粉夢驚三更畫棟雕梁園付一炬卻說葉名琛在廣東鬧了亂子惹得各國聯軍打破廣州城又調動海軍進逼京津朝延派了桂花兩大臣與各國講話賠了七八百萬兩銀子總算把這件事體暫時緩下來在條款上原寫明賠款付清後聯軍才把廣州城交還中國如今聯軍在廣州城裏一住兩年半看看絕無交還的意思便有一個佛山鎮團練兵的頭目忍不住一肚子的氣憤他想想廣東這件禍事都是英國領事巴夏禮鬧出來的害得中國賠款割地喪師辱國他便出了一張告示說願出一千兩銀子的賞格買那英國領事巴夏禮的腦袋那巴夏禮聽了不覺嚇了一跳這時英國公使還在上海巴夏禮便打了一個電報到上海去告訴這件事體英國公使聽了大怒便動公文給桂良要他奏革兩廣總督黃宗漢的職還要逼著他立刻去解散團練兵桂良無可奈何只得一面答應他一面仍舊簽定條約一時暫不掉換外國人見桂良不換條約說他沒有講和的誠意那英國船便開到長江一帶去遊弋直到漢口地方法國兵也到內地去亂闖又到處設立天主教堂地方官都嚇得不敢出來說話這時有一位滿親王名僧格林沁的見外國人這樣肆無忌憚忍不住大怒起來拉起一本摺子奏參直隸總督譚廷襄說他疏於海防便親自派人在大沽口修築炮臺在海口打一道木樁再拿鐵鏈鎖住港口待到換約這一天各國的兵船都開到天津來會齊中國官廳送過照會去叫他們兵船改道在北塘口下碇不許他們在大沽口行動那英國兵船如何肯依便一定要開進大沽口來他們見大沽口已有鐵鏈鎖住便拿炮轟斷一面開進十三隻小兵輪來船頭上插著紅旗和炮臺挑戰逼向炮臺開炮拿炮轟打中國步兵看看打勝了便一擁上岸搶上炮臺來炮臺上開炮還擊打沈了幾隻小兵船那上岸來的外國兵也被中國兵殺死了幾百名又活捉得一個英國將軍英國兵船只剩下一隻逃出攔江河外面那大兵船上見自己的兵吃了敗仗便退出大咕口到旅順威海衛測量海勢慢慢地向南退去廣東人民聽得英國人吃了敗仗便急急修造船隻怕他再來報仇由富商捐銀三百萬兩暗地裏去送給英國人求他不要打仗英法兩國公使照會通商大臣何桂清情願遵守咸豐八年的條約那桂清只求平安無事無奈這時咸豐帝信任僧王的話不答應外國人的要求只答應他照道光年間的事體通融辦理又吩咐他仍在上海議和不得率行北來如有外國兵船再敢駛入攔江河的必痛加剿辦一面由僧格林沁動用內幣一百余萬經營北塘口後來忽然有人主張在北塘口引敵上岸咸豐帝卻也說不錯便又吩咐把北塘口的軍備盡行拆去那時翰林院編修郭嵩燾上疏竭力說不可北塘紳士禦史陳鴻翌也奏說不可撤去北塘兵備咸豐帝不聽他們的話不到幾天工夫英國法國的小兵船開進北塘拔去港口的木樁打頭陣是英國將軍額爾金法國將軍噶羅帶了一百多隻兵船打進來外國兵拖著炮車上岸中國兵卻不敢動手只送照會叫他到北京去交換議和條約外國兵到了這時候騎虎難下如何肯依便催動各國聯軍一萬八千人從北塘打進內港這時適值潮退外國兵船一齊擱在淺灘上他們只怕中國兵在兩岸夾攻便挂起白旗假做求和的樣子中國兵見了白旗果然不敢攻打待到潮漲水大那兵船上便出其不意直撲上岸來炮火連天把中國兵打得四散奔逃一萬八千聯軍直打到新河地方僧王帶領三千勁旅上去抵敵無奈外國兵營裏炮火厲害槍彈如雨一陣子打可憐三千個騎兵打得只剩七個人新河陷落以後看看大沽危急皇上便命大學士瑞麟帶領京中的八旗兵到通州去防守那聯軍果然進逼大沽拿開花彈攻打北岸炮臺開花彈落在火藥庫裏一聲轟天價響烈焰飛騰把巍巍一座炮臺打倒提督樂善死在炮火裏這時僧王正駐兵在南岸見了這個樣子忙退兵到通州的張家灣地方看看天津也保守不住了告急的文書雪片似到得京裏咸豐帝看了心中一急舊病復發一面命桂良到天津去議和那桂良送照會到英國公使衙門裏去那公使回了一個公文說要增加賠款開天津爲商埠還要每國酌量帶領兵隊進京去換約皇帝在病中性子十分暴躁聽說外國人要帶兵進京來又聽說英國派的議和大臣便是巴夏禮心中越發生氣便下旨一律拒絕英法各國兵隊見中國皇帝無意講和便又進兵攻打河西進逼通州那北京地方的人心便頓時慌亂起來咸豐帝聽孝貞後的話連夜從河南把勝保召進京來命他帶領一萬禁兵到通州去抵擋外國兵一面由怡親王載恒邀集英法各國公使開一個宴會吃酒中間載恒提起議和的事體那巴夏禮大聲答道如欲講和非面見中國皇帝並須每國帶兵二千名進京去才可開議這樣兇橫的條件叫載恒如何答應得下來只得回答說這事須請旨才能答復巴夏禮見怡親王做不得主便也閉著嘴不說話了任你載恒如何去和他敷衍說笑他總是閉著眼假睡在榻上給你個不理不睬載恒無奈只得不歡而散第二天接連的報馬報進軍情來說通州勝保的軍隊大敗僧瑞的兵也敗退下來英將額爾金帶領大隊外國兵快要打進京來整個京城頓時鬧得沸反盈天那大學士端華和尚書肅順看看時勢危急便在半夜時候到圓明園去請見皇上咸豐帝這時病勢很重孝貞後早晚在一旁伺候著懿貴妃在房中料理湯藥忽傳說端華和肅順請見皇帝知道大事不好把他嚇得臉色慘白渾身索索地打顫孝貞後一面傳禦醫進來請脈下藥一面把這兩位大臣傳到禦榻前來問話肅順把外面的軍情一一奏聞又奏稱如今外國兵來勢倡狂皇上萬乘之軀自宜從早出狩住在萬安的地方咸豐皇帝說現在昏夜朕身體又十分疲乏到什麽地方去好呢當時大家商量了一會還是孝貞後有決斷說俺們不如到熱河去走一趟罷皇上聽了也點頭稱是當時那禦醫還不曾走便奏說快把鹿血拿來請皇上服下便立刻可以增長精神加添氣力早有太監去殺翻兩頭花鹿取得血來還是熱騰騰的咸豐帝吃下一碗去果然立刻身體旺壯起來精神也有了便傳諭恭親王留守京師著肅順統率禦林軍隨往行宮端華照料園裏的事體這個消息一傳出去好好一座圓明園頓時鬧得人仰馬翻鶯啼燕吒咸豐帝也顧不得這許多了自己坐了一輛園中的黃蓋車肅順在半夜裏去打開車行的門來雇得四輛敞車車上面略略遮蓋些蘆席一輛請孝貞後抱著皇子載淳坐了其餘三輛便有許多妃嬪宮女們搶著坐可憐一輛車子擠著五六個妃嬪擠得她們腰酸骨痛內中一位懿貴妃她平日席豐履厚何等嬌養如今從半夜裏逃出園來吃盡苦楚早見她嬌喘細細珠淚紛紛此外還有許多妃嬪宮女坐不著車子的只得互幫牽引跟著皇上的車子哭哭啼啼地走去內中有幾個平日和太監要好的便有太監們來背著她走了一程沿途雇得騾馬扶她爬在騾馬背上走去懿貴妃在車子裏簸蕩了半夜早把她的頭髮也撞散了額角也撞腫了她傷心到極點便在車裏嗚嗚咽咽地痛哭起來看看到了天明一瞥眼見那肅順趕著一群騾馬從她車旁走過懿貴妃這時也顧不得了便一手掀開了車簾提高了嬌滴滴的喉嚨喚道六爺六爺俺的車子破了求你六爺做做好事替俺換一輛好的車子罷說著不覺柳眉緊鎖雙淚齊抛那肅順正要趲程趕上皇上的車子去聽了懿貴妃的話便答道在這半道兒上哪里來的好車子俺們等趕到前站再說罷說完便馬上加鞭急急跑向前面去了停一會兒到了一個鎮上一行車馬一齊停下來打尖懿貴妃四處留心看時不見有肅順便向身旁的太監打聽時知道他正在皇上跟前奏事那太監替他跑去候肅順奏完了事下來便上去對他說懿貴妃要換一輛車子那肅順聽了把頭搖了一搖說道現在是什麽時候我還有空工夫辦關防差使嗎第二天懿貴妃又在路上遇到肅順瞄貴妃實在支撐不住了便哭著喚著六爺要求肅順替她換一輛車子肅順聽了陡地放下臉來冷冷地說道如今在逃難的時候哪比得上太平日子在這荒山野地裏到什麽地方去雇新車子呢不是我說一句不中聽的話俺勸貴妃還是安分些罷在這個時候有得一輛破車子坐已是萬幸了貴妃不看見路旁還有許多貴人宮女哭哭啼啼走著的嗎貴妃可曾看見那中宮坐的也是一輛破車子和貴妃坐的一模一樣的嗎中宮不叫換新車子貴妃卻要換新車子貴妃是何等樣人怎麽可以越過中宮去呢肅順說完幾句話又把鞭子打著馬飛也似地跑上前去了懿貴妃這時無可奈何只得咬牙切齒地罵道好大膽的奸賊過幾天看俺的手段罷不多幾天帝後和妃嬪皇子一班人到了熱河在行宮裏住下一面下諭給恭親王著他去和聯軍主帥早日議和一面仍著僧瑞兩軍調兵把守海澱那僧王把個巴夏禮恨入切骨他想了一條計策把巴夏禮誘進營來伏兵齊起把巴夏禮擒住送進京去監禁起來英國公使見捉了巴夏禮十分惱怒向恭親王索還巴夏禮甚急勝保也傳檄江南叫各軍勤王一時裏僧王部下的鮑超袁將軍部下的張得勝安徽團練苗沛霖帶了軍隊陸續都到了京裏外國兵見中國調來了許多兵士便也不敢十分胡鬧只有照會恭親王限他三天把巴夏禮交出來恭親王不肯要他把兵隊退到天津去才肯開議和局英國公使也不答應恭親王無法可想便邀同周祖培陳孚恩聯名上奏行在說外人十分強悍咸豐帝身體本來是掏空了的再加上那天半夜出奔一路上受了些風寒到了熱河病勢越發厲害孝貞皇后爲保全皇帝性命起見所有一切外間事體都一起捺住大事叫恭親王在京中便宜行事小事便沒奈何自己每天看著奏章時時和端華肅順兩人商量取決又因懿貴妃辦事敏捷料事很明口才也好筆下也快便也叫她幫著辦理朝政每逢到疑難不決的時候懿貴妃便一言立斷因此咸豐帝反得逍遙事外靜心調養禦醫也跟來每日替皇上診脈下藥圓明園中養著的幾百頭鹿這時也送到行宮來每天吃著鹿血看看那皇帝的身體一天一天地健朗起來總管太監安得海每天服侍著皇上又領著皇上在行宮內苑裏遊玩這熱河行宮雖在北地荒涼的地方但是經過從前乾隆嘉慶幾朝極意經營便一樣的花明柳媚鶯歌燕唱咸豐帝看了這情景不覺起了無限感慨他想從前在圓明園中何等風流何等快樂如今空落落的一座園子雖說一般的花嬌柳媚但是那些六宮粉黛都不在眼前春色撩人不覺動了無限相思是皇后的主意一切朝廷大事都不叫皇帝知道總叫安得海帶領太監們伺候著皇上自己也避開不常和皇上見面怕的是皇帝多動情欲傷害身體又禁止懿貴妃和別的妃嬪親近皇帝皇上見了她們想起從前園中的情形多麽傷心因此也不願去召幸她們但是看看皇上的身體一天比一天強健終日在行宮園中養病閑得無事可做只是長籲短歎安得海知道皇上的心事便悄悄地在行宮外面找了幾個粉頭來陪伴著皇帝這一來皇帝卻歡喜起來從來做皇帝的睡女人總是堂堂皇皇的惟到如今卻是偷偷摸摸地玩著女人越是偷偷摸摸越覺得有味咸豐帝因在行宮裏玩得不舒暢索性由安得海領著悄悄地到宮外嫖院子去這熱河地方本來不是個小去處來往關外的客商很多平日也有幾家娟寮如今皇上出幸那文武百官都隨從在行宮裏使熱河的市場頓時熱鬧起來那百官們都是不曾帶得家室的大家都找窯姐兒玩耍去因此竟有幾家上等的窯姐兒從天津北京趕來做買賣皇上便也悄悄地在這幾家上等窯子裏玩耍咸豐帝是久病之後身體不曾復原如今在窯子裏日夜縱樂早把個身體更掏虛了到了秋初時候竟狂吐起血來把個孝貞後和滿朝文武急得走投無路傳了三四個禦醫進去日夜診脈處方雖說把吐血止住了但是那身體看看一天瘦弱一天咸豐帝知道自己是不中用了便把孝貞後和懿貴妃傳進來日夜陪伴著又常常問起孝貞後那聯軍的事體孝貞後起初勸他不必勞心且管養病無奈咸豐帝一定要看奏章孝貞後拗他不過便把外間送進來的奏摺每日由懿貴妃在床前朗聲誦讀給皇帝聽才知道恭親王和各國公使商量改在通州會議外國人也不答應皇上嚴諭恭親王須不失朝庭體面那恭親王便不敢輕言講和兩面相持不下英法聯軍便惱怒起來要立刻攻入海澱所有皇宮左右的禁衛軍隊見外國兵來了便一齊潰散恭親王站腳不住便逃到廣安門外長辛店去躲避由瑞麟出面和步軍統領文祥商量把巴夏禮釋放出來誰知這巴夏禮因爲被中國皇家監禁心中又慚愧又憤怒他出來的時候忿無可泄便悄悄地走到圓明園裏去放一把火這時禦林軍已逃得一個不留園裏的太監們見皇上走了他們也散了桃園個個回家去了所剩幾個老弱婦女在園裏有誰能救得這火這時西風又大園裏的亭樓造得密密層層一霎時滿園都燃燒著了只見天上起了一片紅雲可憐這畫棟雕梁金迷紙醉的一座圓明園足足燒了三日三夜燒成了一片瓦礫場這時做書的急要交代的是住在園中的四春那牡丹春原生得最是聰明她見宮中漢女有被蘭貴妃捉去活活打死的有私自逃出園去後被侍衛們捉回來活活吊死的她知道都是漢女的打扮與旗女不同在宮中容易辨識一旦有事也不容易逃走她便刻意模仿旗女的打扮平日跟一班宮女十分要好跟著宮女學得梳頭擦粉以及旗女種種的禮節她到高興的時候一般的梳著大頭穿著旗袍腳下登著粉底鞋臉上擦著濃濃的胭脂嘴裏說著一口十分流利的京片子望去活似一個極漂亮的旗下宮妃只因她待太監宮女們好那天皇上倉皇出走的時候早有太監報信給她牡丹春原是旗下女人打扮得了這個消息便也慌慌張張夾在宮女隊裏逃出園去她身邊原積蓄下幾個錢便動身到天津搭輪船到蘇州回到自己家裏她母親還在後來由她母親做主嫁給一個讀書人一雙兩好地過著日子要知其餘三春如何下落且聽下回分解
