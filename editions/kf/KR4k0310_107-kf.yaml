body:
  text: 第六十七回慰嬌娃老嫗烹野雉見仙婆醫士想天鵝那一輪皎潔的明月從東方含羞帶愧慢慢地現了出來她的可愛的光華照遍大千世界她最能助人清興而且又能引人的愁思和動人的感觸那一群小鳥見她出來似乎受了感觸的樣子反舌歙翼閉著眼睛一聲也不響那園裏的花兒似乎動了清興展開笑靨靜悄悄地度它的甜蜜生活亭右的她似乎引動愁思拂袖拈香仰起粉臉朝著月亮微籲了兩口氣玉手纖纖地將香插到爐中展起羅裙盈盈地拜了下去深深地做了四個萬福櫻唇微微地剪了幾剪便退到牡丹亭裏懶洋洋地往椅子上一坐斜首望著天空可是她的一顆芳心早就沈醉了那個善伺人意的明兒走到香案跟前端端正正地拜了幾拜跪在地上口中說道我們小姐隨便什麽心事全要和我說的今天她不告訴我我已經明白了我要替小姐禱祝過往神祗但願姑老爺封王爲帝掃平暴亂四海清寧的時候用香車寶馬將我們小姐接了去做一品夫人我也沾光得多了她說到這裏麗華嗤地笑了一聲也不言語明兒便站起來跑到麗華的身邊笑道姑娘我說的話錯麽她也不答應明兒笑道我曉得了我剛才禱祝還少兩句因爲小姐和他已經分別好久了姑老爺現在得志就來將小姐接去早成佳偶吧麗華笑道好不要臉的蹄子任何沒臉的話你都嚼得出誰要你在這裏搗鬼明兒笑道嘴裏說不要我在這裏可是心裏不知怎樣的歡喜呢麗華笑道這蹄子越來膽越大了明兒笑道罷呀姑娘你不要這樣裝腔作勢的像我明兒這樣的體貼你恐怕沒有第二個了麗華笑駡道嘴不怕爛了麽只管嚕嗦不了少要嚼舌頭跟我到園中去閑步一回罷明兒點首答應便喊小才將香案收去小才高高興興地起來只當明兒喊他去做那個勾當的呢後來被明兒一拒絕又加上一個迎頭二十五只弄得垂頭喪氣見明兒喊他搬香案回去礙著麗華在這裏不敢多講只得將香案搬起臨走的時候向明兒下死勁盯了一眼口中嘰咕道你不記得那天百般在哄我和你他剛剛說到這裏明兒羞得無地可容麗華早已明白忙向小才喝道蠢才她叫你將香案搬去難道還不依從麽怎的嘴裏嘰咕什麽還不給我快點搬去遲一些我回去告訴太太馬上就將你趕了出去看你倔強不倔強咧小才嘰咕道姑娘不要怪我原是她惹我的麗華喝道她惹你做什麽男女大了難道還不知回避嗎明兒還恐他再說忙向麗華道這東西出口不知一些輕重還是讓我去告訴太太請他立刻動身的好她說罷故意要走嚇得小才連忙跪下哭道好姐姐我下次可不敢了你如去告訴太太我就沒有性命了麗華見他這樣禁不住笑將起來忙道還不快些搬了去小才從地上爬起來搬起香案飛也似地去了麗華向明兒笑道這真奇了我講的話倒沒有你的話有用可不是反了天了嗎明兒羞容滿面低著頭半晌答不出一句話來搭訕地說道小姐不要笑我罷只怪我一著之錯麗華忙道你不用見疑我本來和你說的一句玩話一個人誰沒有錯處呢不過錯了以後千萬不能再錯就好了我們主婢也不比得別人你就得有一點錯兒現在已經改過自新我難道還來追究你嗎我們去散步罷她說罷和明兒手攜手到各處去閒逛一回這時正是新秋天氣池內的荷花已經半萎亭旁木樨早結蓓蕾野蟲唧唧地叫個不住她徘徊了一回究竟乏味便欲和明兒回去明兒笑道今天的月亮真是難得我們停一會子回去吧她說道還是早一些兒回去的好免得太太盼望明兒點頭道是便和她順著花徑走了出來還未到園門驀地起了一陣微風習習吹來麗華不禁打了一個寒噤當時倒也沒有介意便和明兒出得園來回到樓上只見雪兒笑道你們到哪里去的太太一連著人來問過幾次了明兒笑道你怎麽回的雪兒笑道我說小姐到後花園裏去散步了明兒笑道看不出你倒有些會隔壁算呢真的我和小姐方才從花園裏來的她們倆正在談話碧兒跑進來說道太太不放心打發我來望望小姐回樓不曾明兒笑道這蹄子想是眼睛跑花了小姐坐在這裏難道沒有看見嗎碧兒一掉頭見了麗華忙笑道原來小姐回來我還沒看見呢你到太太那裏去嗎明兒見她懶懶的只當她疲倦已極忙向碧兒道你去到太太那邊就說小姐在後園裏逛了一會現已回來因爲身體疲倦已經睡了碧兒答應去了明兒向雪兒道你還在這裏發什麽呆天不早了也該去睡了雪兒道不等小姐睡了我就好去睡的嗎明兒道這裏用不著你小姐自有我來服侍你早點去挺屍罷省得到明天早上教人喊得舌枯喉幹的還是不肯起來雪兒果然瞌睡巴不得明兒這兩句呢忙起身下樓睡覺去了明兒走近來向麗華問道姑娘還吃點東西麽如果要吃我就去辦她搖頭說道不需不需我此刻不知怎的好端端的頭暈起來你快來扶我到床上去躺一下子明兒忙扶她立起誰知她剛才站起哇的一口接著一連哎了十幾口複又坐下只是呻吟不止明兒忙去倒了一杯開水與她漱口然後扶她上床用被子替她蓋好自己又不敢離開先用掃帚將樓板上掃得清潔過來低聲問道小姐你現在覺得怎樣她呻吟著答道別的倒不要緊只是頭昏得十分厲害像煞用刀劈開的一樣明兒哪也怠慢腳不點地地飛奔下樓告訴邢老安人她聽了這話滾蘿蔔似地扶著碧兒趕到麗華的樓上進了房門就發出顫巍巍的聲音問道我的兒你覺怎樣說著已到她的床前邢老安人坐在床沿上又問了一遍麗華見母親到了忙勉強答道請母親放心我只不過有些頭暈別的倒不覺得怎樣邢老安人伸出手來在她的身邊一摸竟像火炭一樣的滾熱不禁慌了手腳大罵明兒不當心服侍姑娘明兒一聲也不敢響滿肚子委屈麗華忙對邢老安人說道娘呀你老人家不要去亂怪她們一個人頭疼傷風原是當有的事呢邢老安人說道假若她們服侍周到你又何能感受寒涼呢說話時陰識陰興聽說妹妹生病忙著一齊趕來慰問陰識向邢老安人說道母親你老人家放心妹妹差不多是受了一些寒涼了所以才這樣發熱頭暈買一些蘇散的方子來疏化疏化自然就會好了邢老安人道可不是麽這都是些丫頭不當心弄出來的說著便問陰識道買些什麽蘇散方子你快些兒用筆寫好就叫小廝去配罷陰識答應著退了出來蘸墨鋪紙寫首荊芥防風白芷蘇葉麻黃五樣便叫一個小廝配去小廝拿著單子飛也似地向宛城去了沒多時小廝將藥買好回來送到樓上明兒忙接過來一樣一樣地放在藥爐裏對勻了水一會子將藥煎好將渣滓剔下盛在碗裏明兒捧著便進房來邢老安人見了罵道癡貨那藥剛剛煎好就忙不了捧來怪燙的教她怎樣吃法還不先擺在茶几稍爲冷冷麗華忙道燙點好就給我吃罷邢老太太說道乖乖你不用忙那藥剛才從爐子裏倒出來滾開的怎樣吃法等得稍減一點熱氣再吃罷麗華也不言語明兒此時真個是啼笑不得進退不可停了一會邢老安人喝道你那小蹄子難道聽我說了兩句就動氣了麽癡呆呆地站在那裏藥也不捧過來還等我去捧不成明兒忙將藥捧了過來麗華就向明兒的手中將藥吃完明兒放下藥碗用被子替她重重蓋好陰識對她說道妹妹你好生睡一會子等到出了些汗馬上就要好了麗華一面答應著一面向她母親說道母親你老人家請回去安息我沒有什麽大要緊出了汗就好了邢老安人忙道是的我就睡覺去夜間千萬自己留神出汗的時候不要再受風要緊她滿口答應邢老安人又叫雪兒起來幫著明兒服侍小姐雪兒一骨碌爬起來沒口的答應邢老安人又叮囑一番才扶著碧兒下樓去了接著陰識陰興也自下樓去安寢了雪兒揉揉睡眼悄悄地向明兒笑道姐姐你今朝可碰著釘子了明兒笑著悄悄地答道還不要問呢蹄子蹄子直罵了一大堆兒也是我合當倒楣晦氣罷了她二人見麗華已經睡著便對面趕圍棋兒弄了一會子不覺疲倦起來伏著桌子只是打瞌盹一會子兩個人都睡著了再等她們醒來已是天色大亮二人忙到麗華的床前見她已醒了粉面燒得胭脂似的緊鎖柳眉呻吟不住明兒低聲問道小姐今天好些麽她呻吟著答道汗可是夜來出得倒不少只是熱怎的不肯退明兒伸手進被一探不覺大吃一驚周身亢熱到二十分火候忙又問道小姐你還覺得怎樣她勉強答道頭暈倒好一些可是身子恍恍惚惚的像在雲端裏一樣明兒正要再問時邢老安人扶著碧兒後面跟著一個七十多歲的婆子徑進房來明兒雪兒忙去搬兩張椅子靠著床前擺下邢老安人和那個老婆子一齊坐下邢老安人靠著麗華的耳邊悄悄地問道乖乖你今朝可好些麽她呻吟著答道頭覺得不大暈了只是精神恍惚得厲害身子輕飄像煞在雲霧裏一樣邢老安人用手在她的頭上摸了一把不覺皺眉說道熱倒像反增加了許多那個婆子問道小姐的病是幾進覺得的邢老安人道啊也張太太我竟忘了忙向麗華道兒呀東鄰張太太特地來望你的她忙說道煩老人家的駕罪過罪過邢老安人對張太太說道她的病就是昨天晚上到後園裏去散步覺得的張太太道哦我曉得了這不是病一定碰見什麽捉狹鬼了大凡人家的兒女越是嬌著這些促狹鬼前後就跟著她一得個空子馬上就揪她一把或是推她一交都要將她弄出病來才放手呢邢老安人忙問道照這樣說來還有解救麽張太太道怎麽沒有呢我回去請個人來替她解救解救邢老安人問道你老人家去請什麽人張太太道就是馬奶奶啊她專門醫治這些怨鬼纏身的毛病邢老安人喜道那就好極了就煩你老人家去將她請來吧張太太滿口答應起身下樓一刻兒帶來了一個老太婆身穿黃布襖腰系八卦裙手執擎香蟠龍棒見邢老安人打個大喏便走近床邊向麗華臉上熟視了一會便命人擺設香案馬太婆將頭髮打散坐在椅子上巍巍不動闔宅的人都立在旁邊肅靜無聲一齊望著她做作陰識焚過香磕過了頭剛剛站起但見馬太婆狂叫一聲連椅子往後一倒嚇得衆人一跳陰興忙要過來扶她張太太連忙搖手止住道不用不用她這時入陰曹促狹鬼去談話了陰識心中有些不大相信但是老安人的命令又不好去反對只是含笑不語一刻兒只見馬太婆微微地蘇回了一口氣張太太忙對衆人說道趕快焚香叩頭她回來了陰識只得又去焚香叩頭馬太婆慢慢地從地上爬起來對老安人說道恭喜太太小孩碰見的黃鼠狼的神我方才下去和他爭論了半天他兀地要追小姐的性命他說小姐是狗投胎的在前世曾將他咬死他要報仇我又向他勸解一會子准他豬頭三牲香燭紙馬一隻野雉他才答應太太可快點預備罷老安人道豬頭三牲是敬他的但要野雉做什麽用呢馬太婆道買一只來須你老人家親自動手烹調先敬神後與小姐吃不上三天就會好了老安人滿心歡喜忙差人去買野雉一面又取出五十兩銀子賞給馬太婆馬太婆還謙辭了一陣子才收下銀子告別走了張太太對邢老安人說道你可照辦罷我也要回去她說罷告辭也走了一會子買野雉的小廝回來說道宛城舂陵都跑到了買不著雉邢老安人勃然大怒罵道叫你們這些狗頭辦這一點事都辦不到可見就是吃飯罷陰識見邢老安人動怒忙前來說道請你老人家暫息雷霆讓別個再去買一趟看如果買著了將這些狗頭一個個重打一頓趕出去便了說著向那幾個小廝喝道還不給我滾出去站在這裏發什麽呆那幾個小廝抱頭鼠竄地下樓去了陰識明知野雉買不到下了樓帶了十幾個家丁到郊外去打獵也是他的孝心感動上蒼果然打到一隻野雉忙回來對邢老安人說道到四處的鄉鎮上尋了好久果然沒有野雉孩兒沒法只得帶了幾個家丁到郊外去打獵才打到一隻邢老安人大喜忙教拿進來親自動手將野雉殺了竟弄了半天才將雉毛撏去陰識聽得馬太婆說過不准別人動手只得望著邢老安人一個人弄著也不敢去喊別人來幫助邢老安人將毛撏得乾淨又用刀將雞肉一塊一塊地切開方才放下禍和著油鹽醬醋之類將雉肉烹好用碗盛起來衆人七手八腳的早將豬頭三牲預備停當邢老安人將野雉恭恭敬敬捧到桌上嘴裏又禱祝了一會親自點燭焚香叩了頭將雉肉捧到麗華面前說道兒呀你將這碗裏的雉肉吃了下去毛病馬上就會好了麗華也不敢重違母意只得勉強喝了一口湯吃了一塊肉放頭倒下老安人還教她吃她呻吟著笑道母親請老人家不要煩神了孩兒實在不能再吃噁心得好不難受陰識插口說道母親不必儘管教她吃只要吃過了就算了老安人便命人將碗拿下去滿望她就此好了誰知到了第二天再來瞧看俗語有一句道外甥打燈籠照舅舊老安人可是沒了主意整日價愁眉苦臉的陰識道母親你老人家做的事論理本不應我們多嘴但是人生了毛病當然要去請醫生來診視才好沒的聽著風就是雨妖魔鬼怪鳥亂得一天星斗你老人家想想到如今妹妹的病不獨沒有好一些反而加重了邢老安人歎一聲片晌無語陰興道我聽得人家說宛城東門外有個醫生很好名字叫什麽萬病除不論百樣的病只要經他的手一診馬上就好我看妹妹的病現在愈來愈重何不將他請來看看呢邢老太太罵道你這個畜生明知有個好醫生爲什麽不早些說出呢一定要挨到這會才告訴人陰識忙差人飛馬去請萬病除不一刻萬病除到了陰識陰興忙將他接到大廳上獻茶問了名姓陰識便將萬病除請到麗華的繡樓上明兒忙將帳子放下邢老安人坐在旁邊問道這就是萬先生麽陰識道正是萬病除斯斯文文地走到麗華的床前往椅子上一坐明兒將麗華的玉手慢慢地拉出來他見這只玉手早已野心大動急切要一見帳裏的人他握著麗華的手腕覺得軟如棉絮滑如凝脂停了一會子他陡然心生一計向陰識道請將帳子揭開讓我看一看虛實寒熱陰識忙叫明兒將帳子揭開他伸頭一看不覺神魄失據大了膽在麗華粉腮上摩了一會才縮手離位把手拍著胸脯拍得震天價響地對陰識說道大世兄請太太放心小姐的病不過重受寒涼沒什麽要緊這正是狼子野心真可恨佳人病勢入危途要知後事如何且看下回分解
