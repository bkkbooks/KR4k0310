body:
  text: 第七十九回除蕩婦血染芙蓉帳掃蠻囚煙迷翡翠峰卻說征貳將巴邱一刀殺了總算除去心頭之恨拔去眼中之釘登時怒氣全消嚇得那些侍女跌跌爬爬地便要逃走她圓睜杏眼掣刀在手嬌聲喝道誰敢走就教和巴邱一樣那些侍女聽見這話嚇得連忙止住腳步渾身發抖一齊跪下央求道萬望小姐開恩饒恕我們罷征貳問道你們可願意隨我歸漢衆侍女沒口地答應她結束戎裝飛身上馬正要出城瞥見征側蓬著一頭紅發躍馬而來口中喊道妹妹何故將巴將軍殺去莫非生了異心麽看官你們看了這一段不要奇怪嗎這裏剛才將巴邱殺去征側哪里就知道呢原來有個原因當巴邱回來他有個馬夫是寸步不離的他進了臥房那馬夫就在外面伺候等到征貳將巴邱殺了他可嚇煞拼命價地奔向大帳報信去了征側正在晚餐瞥見巴邱的馬夫飛也似地跑進來忙放下杯箸問道什麽事這樣驚慌馬夫本來有些口吃直喊不不不不不不不一連喊出六七個不字來臉急得和豬血一樣一句話還未說出來征側見他這樣情形料知事非小可忙向他說道你且慢慢地講出來不要心急那馬夫又停了一會子哇的一聲哭道女大王爺不好了二王爺將我們家巴巴巴老爺殺了征側大吃一驚不暇細問飛身上馬手執兵刃來到下貳的門口瞥見她戎裝齊整預備以哪里去的樣子征側心中早料著八分了便開口問她她圓睜杏眼向征側喝道我殺巴邱與你有什麽相干要你來查問什麽難道我還怕你不成征側勃然大怒向她喝道你做下這種逆倫的事情難道還不准我問嗎好賤人你究竟爲了什麽緣故將巴將軍殺死莫非今日在沙場上看中漢將了麽好賤人你如果是這樣的念頭我勸你不要夢想罷征貳大怒喝道你是我姐姐又不是我的媽媽我就是看中漢將難道你還敢來阻止我不成識風頭趁早走開不要惱得我性起任憑你是誰馬上教你死無葬身之地了征側聽她這番話便知她認真地反了氣得一佛出世二佛升天那一副可怕的面孔登時變了顔色和豬肝差不多張開大嘴露出兩排金黃色的牙齒哇呀呀地直嚷起來舞動兩口截頭刀來取征貳征貳哪里懼怯耍起雙刀來鬥征側一媸一妍相映成趣她兩個大殺了一百多合征貳一心要走哪里還有心和她廝殺虛晃一刀兜轉馬頭直向東門而來一路上誰也不敢前來討死只好望著她沖出城去了征側趕了一程知道難以追上只得回城征貳一馬放到漢營之前對守營的士卒說道煩你進去通報一聲就說征貳要見那守營連忙進去通報馬援聽說征貳心中明白忙教請進來守卒連忙出來對她說道請進去罷征貳下了馬在馬項下取下巴邱的首級走進大帳雙膝跪下雙手將首級奉上說道罪女殺了巴邱決志歸依漢家萬望大將軍收錄馬援笑道小姐深明大義棄邪歸正乃漢之福某等亦不勝榮幸但是劉將軍也不可失約當此軍事倥傯的時候不如就在今晚先成大事以便明日進兵他說罷向劉隆說道小姐誠心歸漢爲何你連迎接都不去迎接未免太覺無情這兩句話說得劉隆面紅過耳俯首難言吳漢王霸兩人又走過去對劉隆說道小姐絕義歸來將軍自然要遵守前約才是劉隆也不回答話走到征貳身旁躬身施禮口中說道小姐駕到劉某有失遠迎望乞恕罪征貳慌忙答禮馬援忙命軍需官替劉隆去預備婚事一面令劉隆將征貳帶到他自己的帳篷裏去劉隆也不置可否便與征貳到了自己的帳篷裏征貳向他問道那坐在帳上的那位將軍姓甚名誰劉隆答遭就是我們行軍的主將伏波將軍馬援她微微頷首可是心中另又看上馬援了她心中暗想道怪不道人家常說北方帝國之邦多出郎才女貌今日才知端底可恨我征貳生長蠻邦與一幫禽獸般的人物終日廝混還算老天見憐今日與劉將軍得成大事也算終身之幸了這且不表再說劉隆見她追問馬援心中暗想道這個賤貨眼中卻又看上馬援了真輕薄桃花隨波逐浪呢她既然能將她的親夫殺去難保後來不看上別人一看上別人我還怕不和巴邱一般麽他想到這裏不禁怒從心上起惡向膽邊生但是他不露一分神色和她有說有笑的眼看著日落西山劉隆便對征貳說道小姐請暫坐一會我去去就來她忙答道將軍有事請便罷劉隆出了自己的帳篷徑向大帳而來剛走到大營門口瞥見一個小卒手裏捧著一顆人頭往外面去他連忙問道所捧首級是哪里來的那個小卒見他問話忙立定答道這是蠻婆子的男人首級馬將軍令我去掩埋的原來劉隆將征貳帶走之後吳漢便與王霸議論道主帥這事未免陷人於不義了王霸悄悄地說道可不是麽這種亂倫無恥的蠻婆娘不要說劉隆是大丈夫任憑是誰也不要的你看主帥硬做下了主令他兩個成婚這事真正做得太無道德了馬援本已聽見他佯作不知便令人將巴邱的首級拿去示衆吳漢忍不住勸道馬將軍巴邱雖是蠻人念他死的可慘將他首級掩埋了罷馬援便准了他的所請王霸便對馬援說道主帥今天令劉隆與這逆倫偷淫奔的蠻婆結婚不是硬陷劉隆於不義麽馬援笑道王將軍哪裏知道我看劉隆今天面帶殺氣不要談結婚只怕這征貳還有些不利呢王霸哪里肯信吳漢道主帥既不願劉隆與她結婚就該將這女子當下斬了不是免得許多周折麽馬援笑道談何容易你們不知她的厲害麽而且她又未曾將兵刃卸下一旦翻起臉來恐怕大家還要受累呢吳漢道寧可和她廝殺拼個她死我活倒不致失了劉隆的德行如今洞房花燭我想劉隆不是個魯男子柳下惠吧萬一和她真的成起夫婦來不是將一個好端端的劉隆陷得身敗名裂麽馬援連連搖首說道將軍們且請放心斷不會有此一出戲的不信今天三更時自有分解了他們哪里肯信仍是爭論不休再說劉隆聽那小卒說是巴邱的首級不禁心中暗暗傷感道巴邱我和你今日無冤往日無仇你喪了性命可不要在陰間埋怨我劉隆霸佔你的妻子在戰場上我不過以此話來難她不想她認真就將你殺了你可放心我劉隆堂堂的奇男子那些禽獸的行爲我斷不做的請你放心罷他暗暗禱祝了半天才進了大帳馬援與吳漢王霸正在那裏議論不休見劉隆來了連忙將話頭擱起馬援首先向劉隆笑道將軍命賦桃花不想在這裏巧遇這段天賜良緣我們今天可要吃杯喜酒呢劉隆冷笑一聲道主帥哪里話來不是主帥極力作成我又焉能白白的得到一位如花似玉的美人呢喜酒當然要吃不獨主帥就連諸位將軍我也要一一請過去吃喜酒的馬援大笑道好哇俗語說得好人饞做媒狗饞吃蛇可見還是媒人的口福不淺咧大家談談說說已是戌牌的時候當由吳漢代作儐相引新郎新娘同入洞房共飲交杯鼓樂喧天十分熱鬧衆將領俟婚禮告成後一齊擁進新房鬧了一陣子劉隆忙命人在外帳擺酒他們出來依次入席狼吞虎咽大吃在喝猜拳行令三元八馬喊得震天價的響一直吃到二更將盡大家都有了酒意便出席告辭劉隆便出帳相送王霸回頭向劉隆笑道劉將軍今天可要仔細些不要過於孟浪才好呢劉隆冷笑不言接著諸將又和他嘲笑一陣子他任憑人嘲笑也不去爭論一味含笑敷衍吳漢笑道人生最快活的一天就是今朝了我想劉將軍于異地突然遇到此良緣心中不知怎樣的快樂呢但是現在別的不要去說他就是等到明天送玉麟珠胎暗結十月之後生出一個小劉將軍來不知還是像爺像娘呢如其像娘那就有趣極了鎮日價蠻言蠻語的倒是一個變種的國民呢這句話說得衆人大笑起來王霸大笑道我可保定像爺吳漢問道怎見得呢王霸道男子爲天女人爲地如果生下一個小弟弟來便是劉將軍替身怎好像娘呢大家又笑了一陣子才紛紛地告辭回去劉隆一人進了洞房只見她低垂粉頸默默含羞早有喜娘喜姑等前來迎接劉隆口中說道現在二更敲過了意思要請劉隆入帳共效於飛了劉隆一擺手低聲說道我還沒有吃酒呢向後天長地久的何在乎今天忙呢喜娘喜姑叠叠稱是連忙去斟酒劉隆忙擺手道這裏用不著你們了你們退出去罷喜娘等睡眼婆娑巴不得這一句話連忙狗顛屁股似地走了劉隆走到她身邊並肩坐下手執銀壺自己面前先斟三杯然後又在她的面前滿斟三杯口中說道娘子請飲三杯算鄙人一些兒敬意她連忙將三杯酒一仰粉脖喝了劉隆又斟滿三杯口中說道娘子不才承你垂愛感謝無已請飲此三杯好待不才聊伸兼仄她也不推辭又將三杯喝了以後劉隆甜言蜜語說得天花亂墜哄得她心花怒放試想她生長蠻方哪里碰到這樣風流如意的郎君又喜又愛不知不覺的一連喝下二十餘杯她本來是個杯酒不近的人哪里禁得起喝了這許多的酒呢不禁面泛桃花眼含秋水嬌軀無力輕舒玉腕搭著劉隆的肩頭微微地笑道將軍奴家實在不能再喝了劉隆偎著她笑道卿卿我也知道你不能喝了我就和你入帳安息罷她閃著星眼向劉隆一瞟含笑不語劉隆便將她抱起來放到床上替她寬衣解帶用被衾蓋好自己將燭花挑去關起房門掃手著燭臺走到床前但見她香息微呼已經入夢真個如雨後海棠嬌眠正穩鼻似瓊瑤眉如春黛說不盡千般旖旎萬種風流劉隆看得眼花繚亂魄蕩魂飛那一股孽火直湧到丹田之上情不自禁的放下燭臺便去寬衣解帶要同入巫山之夢了剛剛將頭盔除下猛地省悟道唉劉隆呀劉隆呀你怎麽這樣的見色忘義他又將頭盔戴上拿起燭臺走到窗前坐下暗自尋思道我好糊塗這種不倫不類的女子我當真就和她配偶了麽不要說別的就是巴邱的陰靈也要來尋我的我劉隆本是個頂天立地的奇男子將來的前程正是不可限量呢怎好爲此等賤貨敗裂我的身名被天下萬世唾駡呢唉實在不值得但是我既然不願和她配偶將她又怎樣發放呢他沈吟了一會自己對自己笑道劉隆你好糊塗你將她勸醉了做什麽的不是預備將她他把話連忙噎住輕手輕腳地走到床前細細一聽得裏面鼾聲大作方才放心他又走到窗前猛地想起了一件事情便又執著燭臺躡足潛蹤地走到外帳將自己的防身佩劍挂在腰間重進房來將房門緊緊地閉好自己對自己說道劉隆你這時還不下手等何時再遲一會等她的酒醒了那可要棘手了他想到這裏惡狠狠地執著燭臺拔出寶劍大踏步走到床前正要動手只見她那一副嬌而且豔的面孔任憑你鐵石心腸也要道我見猶憐誰能遣此哩他可是心軟了連忙又將佩劍入鞘坐在床邊呆呆地望著她一會子那顆心由怒生憐由憐生愛的不覺又突突地跳了起來他暗道不好不好我今天莫非著了魔嗎硬著心腸離開床邊又到窗前坐下對著燭光浩然長歎道我劉隆血戰沙場殺人如草從未有一分懼怯卻不料今天對這弱小女子反而不能將她殺去昔日的勇氣卻向何處去了正自猶豫之間忽聽得軍中刁鬥已敲四次不禁暗自吃驚道眼見馬上天要亮了如何是好他此番下了決心鼓足勇氣走到帳前颼地拔出佩劍一眼望見她那副芙蓉面孔不禁手腕一軟他那支佩劍嗆啷一聲落在地下他大吃一驚連忙從地上將劍拾起送到她的粉頸旁邊可是奇怪極了任你用盡生平之力他手腕像棉花一樣一分勁都沒有正在這萬般無奈的當兒瞥見她輕轉嬌軀口中說道劉將軍你可來吧她說罷用手將寶劍一抱這時帳子裏突起一陣冷風將燭光吹暗劉隆在驚忙將燭臺移過來仔細一看只見白羅帳裏一片鮮紅那一個如花似玉的美人兒不知何故首級早離了肩膀了劉隆好奇怪仗著膽將她的首級提起徑往大帳而來這時已到卯牌時候了他大步進了大帳只見馬援已經升帳他大聲說道哪不倫不義的賤人已被我殺了請令定奪馬援正在與吳漢議論他的事情只見劉隆手提一顆血淋淋的人頭走進帳來心中已經料著八九分了又聽他這兩句便齊聲稱讚道劉將軍見色不迷端的是大英雄大豪傑我們怎能不佩服呢馬援又道劉將軍休要見怪昨天本是權宜之計其實我早就料到你的心理了但是能夠這樣的決裂我們怎能不佩服呢如今不獨爲國家除一大害就是將軍也得名揚海內了劉隆一面謙遜著一面著人將征貳的首級高吊杆頭示衆大家便議攻城之策正議論間只見守卒進帳報道外邊有個蠻婦帶了一隊蠻兵在營外罵戰請令定奪馬援便吩咐劉隆帶兵一萬繞道襲城自己和王霸帶著衆將一齊出營迎敵到了戰場兩面排成陣勢只見征側躍馬橫刀大聲喊道送死的囚徒趕快將我家妹子送出萬事全休如不然使得我性起殺得你片甲不回那時悔之晚矣王霸揮動雙錘一馬飛到垓心大聲喝道賊婆娘你難道眼睛都沒有生麽看那杆頭是誰的首級呢征側擡頭一看不禁氣得三屍神暴跳七竅內生煙潑炸了喉嚨直喊道氣死我也先將你這狗頭殺了好替我妹子償命說罷拍馬舞刀來取王霸王霸舉錘相迎二人半斤八兩正自不分高下詩索看得眼熱揮動蛇矛前來助戰馬援更不怠慢飛馬接住大戰了八十余合馬援奮起神威大喝一聲刀光到處詩索翻身落馬死於非命征側看見她的丈夫被殺了咬緊牙關拼命價來取馬援馬援掄刀相迎他兩人翻翻滾滾地大戰了五十多合猛聽得城上一片鳴金聲音征側不敢戀戰丟了一個架子收兵回城誰知到了城下一看只見城上滿插著漢家的旗幟劉隆站在城頭向她笑道賊婆娘可惜你來遲了城被咱老子得了請你到別處去罷征側這才知道漢兵厲害帶著一隊蠻兵沒命地向翡翠峰逃去馬援也不回城帶著大兵一路追了下去直追到獅頸山翡翠峰卻不見一個蠻兵的蹤迹忙與王霸吳漢領後在翡翠峰下尋了半天果然尋到一個大窟窿上面鐫著金豁穴三個大字馬援對衆將笑道我想那賊婆娘一定和那些蠻兵在這穴裏呢吳漢點頭獻計道末將倒有一計用樹木堆在穴口燒起來現在正刮著北風那股煙吹進去還怕不將他們熏出來麽馬援道正是這樣辦法忙令兵士就去伐木堆在穴前放起火來北風怒吼那股濃煙直向洞裏鑽進去不到一會那些蠻兵果然在裏邊被煙熏得十分難過一齊都往外跑馬援指揮兵將來一個殺一個這正是慢道一身無勁敵管教今夕了殘生要知後事如何且看下回分解
