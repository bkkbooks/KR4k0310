body:
  text: 第六十四回皇恩浩蕩冰花失志儂情旖旎四春承歡卻說咸豐皇帝爲看冰花幾乎惹出一場禍來虧得進城禦史走過把皇帝送上自己的轎子擡著回宮去一面向崔總管打聽情由崔總管便把皇帝如何聞冰花美貌的名氣親自來賞鑒說了幾句戲話觸惱了那位美人街坊上幫著冰花大鬧起來這位巡城禦史十年不曾升官如今聽了崔總管的話心想俺升官的機會到了他一面安慰著崔總管一面拍著胸脯說大爺放心這件事在下官身上包你三日之內讓皇上如意不過大爺進宮去在皇上跟前須替下官好言一二崔總管聽了點點頭拱一拱手去了這裏禦史官便裝腔作勢地喝叫把那爿鋪子的夫妻二人抓回衙門去審問這時冰花的丈夫恰恰從外面回店來聽說禦史官要抓他到衙門裏去嚇得他只是索索地發抖哭著求著不肯去還是那冰花一點也不害怕說道去便去俺們又不犯什麽王法他夫妻兩人把店堂托給街坊代爲照料便跟著差役到禦史衙門裏去那禦史官照例問過一堂也不定罪也不釋放把他夫妻二人分別監禁起來監禁到第三日上忽然來了兩個婆婆把冰花領到一間密室裏給她香湯淋浴拿出一套錦繡衣裳來給冰花換上冰花詫異起來問什麽事那婆婆說皇上知道你是一個貞節的女人吩咐賞你一套衣服給你洗澡穿上便要送你回店去冰花聽了歡喜便重新梳妝起來居然容光煥發旖旎動人兩個婆子在一旁讚歎說道這樣一個美人兒老身是女人身見了也要動心莫怪聖天子見了要動手動腳了冰花聽了不覺臉上起了一陣紅暈說道休得取笑過了一會轎子擡進院子來婆子扶她上轎放下簾子四周遮著綢幔坐在轎子裏黑漆漆的一絲也看不見外面的情形轎子走了半天才停下來依舊兩個婆婆上來打起轎簾扶她出轎來冰花擡眼看時只見眼前圍著一班旗裝女人滿身打扮得花花綠綠個個把兩隻眼注定在自己臉上打量著又看那院子時十分闊大一帶黃牆接著抄手遊廊正北一座金碧輝煌的宮殿冰花滿腹狐疑忙問道這是什麽所在你說送俺回店去怎麽送俺到這個地方來那婆子哄著她說道娘子莫慌這裏是宮裏皇后聽說娘子長得美貌特把娘子接進宮來見一見立刻送娘子回店去呢冰花聽了她便沒得話說婆婆扶著她從甬道走進屋子去只見裏面繡幕垂垂落地花窗上糊著粉紅色茜紗屋子裏一色朱紅桌椅床上挂著葵花色幔帳床裏疊著五色繡花錦被鋪著狐皮褥子一面瓶花鏡台一面仕女畫屏裝飾得豪華富麗兩個婆婆扶她在床前椅子上坐下接著許多宮女上來送茶送水冰花到了此時忽然覺得自己是被騙進宮來做妃子了霍地站起身來說俺回去了左右宮女忙上前攔住接著那皇帝已踱進屋子來搶上去握住她的手嘴裏連聲喚著美人美人耐心些那冰花知道自己落入了他們的圈套便覰衆人不防的時候猛向床檻上撞去一溜鮮血直從眉心裏流出皇帝看了連說可憐忙退出屋子去吩咐管事媽媽好生看護著養著傷朕過幾天再來看她冰花這一撞早已暈倒大家把她扶到床上去睡包紮傷口許多宮女在床前伺候著一會兒冰花從床上清醒過來管事媽媽在一旁勸著說娘子天生一副美貌須得嫁一個富貴兒郎享一世榮華受一世富貴才不辱沒了如今難得聖天子多情把娘子接進宮來百般地疼愛著又怕娘子生氣還不敢和娘子親近這正是娘子受富貴享榮華的時候又得這位多情的萬歲寵愛著豈不強似那在店鋪裏挨凍受餓辛苦一生呢這幾句話管家婆婆天天勸著起初冰花不去理她後來日子久了冰花的心也一天一天懶下去了覺得管家婆的話也很有道理便和管家婆說定須得把丈夫喚進宮來見一面兒丈夫許她轉嫁便轉嫁丈夫不許她轉嫁她便抵死也不肯失節的管家婆把她的話去奏明皇上皇上准她把丈夫喚進宮來見面那時冰花的丈夫早已在宮裏補了鑾儀衛的侍衛官進宮的時候衣帽整潔翎頂輝煌冰花見了丈夫只是哭泣他丈夫卻不哭對冰花說道俺夫妻緣盡於此了你在宮裏好生伺候著皇上罷冰花聽了歎一口氣說道你也好生做你的官罷便在這一天夜裏皇帝到冰花宮中來臨幸了第二天封她做貴人從此皇帝被冰花一人迷住了一連十多天不理朝政話說此時外面軍情十分緊急太平天國已在南京定都掌握了八省地方朝中文武大臣個個提心吊膽沒了主意孝貞皇后沒法只得親自跑到皇帝寢宮門外去背祖訓皇帝看看實在延挨不過了只得出去坐一回朝辦幾件公事繚繚草草一轉眼又溜進冰花宮中去了任你那班大臣如何勸諫他總當作耳邊風不去理睬使得太平天國的事業尋得了發展機會一天比一天興旺話說洪天皇又花了六百萬銀兩在南京造起一座極高大的宮殿來忠王李秀成和洪天皇自己在殿上題著對聯他正殿上有幾副對聯寫得十分堂皇第一副對聯寫道惟皇天德日生用夏變夷待驅歐美非澳四洲人歸我版圖一乃統于文止戈爲武撥亂反正盡設藍白紅黃八旗籍列諸藩服千斯年第二副對聯寫道先主本仁慈恨茲汙吏貪官斷送六七王統緒藐躬實慚德仗爾謀臣戰將重興十八省江山第三副對聯寫道獨手擎天重整大明新氣象丹心報國掃除異族舊衣冠第四副對聯寫道虎賁三千直掃幽燕之地龍飛九五重開堯舜之天天皇的宮門大門上挂著榮光門匾額二門挂著聖天門匾額兩旁有朱紅木柵木柵裏面還有許多匾額都是臣下讚頌天皇的話左右用玻璃瓦蓋著兩座亭子走進二門兩旁排列著幾十間朝房房子西面有一口五色石欄的禦井那石上雕刻著雙龍十分精致當殿矗著一座牌坊金柱紅梁龍飛鳳舞十分華麗殿的四壁上畫著龍虎獅象正殿的東面有一帶圍牆牆裏一座方池青石砌房十分清潔池上一座石船長十余丈天皇常常在石船中開宴賜酒天皇十分寵愛小天皇特意替他在鍾山腳下蓋一座小天皇府裏面大樹清泉樓臺曲折十分幽勝那小天皇一般也是個好色之徒他府中用的全是女官那女官個個都長得雪膚花貌小天皇終日和這些女官廝混著什麽風流事體都做出來且說太平軍裏有位樊將軍在蘇州地方得了一個美貌姑娘那姑娘名叫明姑原是蘇州世家小姐知書識字又懂得刀劍太平軍到蘇州的時候明姑跟著她父母逃到鄉下又被兵士們捉住兵士們要殺她父母明姑便上前去攔住那兵士們見了這美貌的姑娘便也放去了她父母把明姑捉到營裏去兵士便要行非禮之事明姑說道你們若要姦污我我只有一死不如把我獻與你們將軍那將軍愛我美貌你們便大大地可得到一筆錢那兵士們聽她話說得有理真的把她獻與樊將軍樊將軍見了明姑便賞兵士五百兩銀子把明姑留在後帳到了夜間樊將軍進來要犯她明姑便拿勸兵士的那番話勸樊將軍勸他把自己去獻與天皇便可得高官厚祿這時洪秀全正下旨著各將領物色美人明姑一句話提醒了他便親自送明姑到天京去天皇見了明姑十分歡喜便傳諭賞樊將軍銀十萬兩明姑長得白淨苗條第一夜洪天皇臨幸過知道還是處女便格外寵愛封她做明妃洪天皇一連在明妃宮中住了一個月真是同起同臥十分恩愛明妃趁此機會求著洪天皇把她父母傳進宮來見一面兒天皇便依她明姑見了父母禁不住大哭一場見沒有人在跟前便悄悄地把自己的心事對父母說了父母知道她要行刺天皇性命終是不保母女兩人摟抱著哭了一陣明妃向天皇要了一面小黃旗交給她父母她父母身旁藏著這一面旗在太平天國隨處可以去得明妃悄悄叮囑她父母逃到北方去將來自己鬧出大事來不致延害明妃送走了父母諸事停當便在臥房裏擺下一桌酒請天皇來吃酒自己也在一旁吃酒陪伴著吃酒的當兒有說有笑又做出許多媚態來洪天皇吃酒吃不多幾杯早已被明妃的美色醉倒一手搭在明妃肩上要她扶上床睡去那明妃看看是時候了便吩咐宮女收拾筵席親自扶天皇上床自己也卸了盛裝看宮女收拾過桌面出去了明妃便起身去關上房門聽得床上天皇睡得靜悄悄的忙去牆上拿下一柄寶劍來捏在手中輕輕地掩在床前一看那床上空空的沒有人天皇不知到什麽地方去了明妃正詫異的時候一回頭見天皇滿面怒容站在她身後原來今夜明妃請天皇吃酒已是犯了天皇的疑明妃從不吃酒的今夜忽然吃起酒來豈不可疑因此洪天皇假裝酒醉先去睡在床上暗暗地覰著明妃的動靜他見明妃關上房門轉身向牆上拿劍便知她居心不良便悄悄從床後面溜下地來跟在明妃身後待明妃拿著劍趕到床前去時天皇已把佩刀抽出來心中一腔怒氣按捺不住趁明妃回過頭來的時候便吃嚓一刀砍下腦袋來一面打著小鍾傳喚宮女吩咐把明妃的頭挂在宮門外去號令頓時明妃謀刺天皇的消息傳遍宮中許多妃嬪和皇后都趕來叩請聖安天皇見殺了明妃自己不曾遭她暗算心中十分快樂傳諭宮中連夜擺起慶祝筵宴來自己連喝了幾大觥這時三宮六院的妃嬪都陪坐在左右一時脂香粉膩鶯嗔燕吒天皇左擁右抱調情打趣高興異常要知後事如何且聽下回分解
