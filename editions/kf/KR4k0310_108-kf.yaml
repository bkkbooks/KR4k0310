body:
  text: 第六十八回癩犬登門屠戶吃糞癡貓守窟小子受笞卻說萬病除滿口擔保道不是我萬某誇口照小姐這點細些小病不消三劑藥管教她好就是了邢老安人聽他這話自然歡喜說道只要先生肯替我們小姐將病看好要謝什麽有什麽萬病除笑道太太老人家不須客氣晚生用心就是了說著陰識將他送到外邊的明間裏小廝早就將硯臺筆紙預備停當萬病除靠著桌子坐下搖首擺尾地想了一會子便拿起筆來裝腔作勢的又停了半天嘴裏嘰咕道太陽少於少陽有火傷心太陽入于少陽無火傷腸七搭八搭地哼個不了陰興悄悄地向陰識道這先生如何不要說別樣你看他開一張單子何等鄭重陰識點頭暗暗地佩服他聽見有人贊成他愈是牽絲不了一張單子直開了半天才算開好老安人忙拿出五兩紋銀教家丁送他回去萬病除哪里肯收口中說道請太太無須客氣等我將小姐的病看好之後再說老安人再也不准無奈他一百二十個不受老安人卻也無法只得命人送他回去他在馬上一路胡思亂想地說道這也是天緣巧遇了你看她的那副模樣兒可不是天下獨一嗎她一定是有心於我如果沒心於我我用手去摸她的粉龐兒難道一聲不做嗎只要我將她的毛病看好怕她不給我嗎憑我這個樣兒在宛陵的四鄉不是我說句麻木話誰有我這樣的威風呢他想到這裏不禁點頭晃腦險些顛下馬來那個跟馬的小廝見他這樣也不覺好笑暗道這位先生有些神經病嗎他自己哪里覺得一味的嘻皮癩臉的一會子到他的家門口小廝忙將馬頭一帶那霍馬立住不動等他下馬誰知他正自想得出神見馬不走舉起鞭子在馬屁股上著力打了一下子那馬霍的向前一跳將他往下一掀一個倒栽蔥只跌得個發昏章第十一可巧剛剛天雨才晴路上的泥濘完全被他沾去渾身斑斑點點好像泥牛一般他又羞又氣忙從地上爬起來指著馬罵道你這個王八蛋豈不是有意和我尋開心麽他痛駡了一陣便對小廝說道煩你回去罷我現在也不要騎馬了就是步行回去咧他說罷低著頭一徑向西走去那個小廝不禁詫異地說道先生你不是已經到家了嗎又向西到哪里他聽得這話忙立住腳步回頭一看不禁自己也好笑忙道幾時到這裏的怎麽我一些也沒有介意既如此更好了你趕快回去罷小廝笑著跳上馬一徑回去不提再說陰識見他走後忙攏近來朝他的單子上仔細看了一會子只見脈案上開的是大受寒涼身體不安火熱厲害頭又暈眼又花用一方以治下面寫著附片五錢肉桂三錢羌活三錢白芍三錢茯苓三錢細辛五分防風三錢前胡三錢桔梗一錢冬瓜皮一錢燈薪五錢做引子陰識對醫藥一道原有些三腳貓見他這張單子只嚇得目瞪口呆半晌說不出話來陰興問道如何陰識抿嘴道萬先生這方子未免膽太大了陰興聽他這話很不以爲然地說道怎見得膽大陰識道什麽病可以用五錢附片三錢肉桂呢陰興道你曉得什麽人家既然能用這兩味想必別有用意的陰識忙教小才拿著這個單子到宛城藥材鋪子裏去配小才哪敢怠慢就出得門上了大騾一騾放到宛城一家藥店門口停下將騾子拴好進了店將單子往櫃檯上一放說道替我配一帖藥裏面走出一個老相公將單子接到手中撐起老花眼鏡仔細看了一遍撓起鬍子說道這單子上面的藥我們這裏不全請到別人家去配罷小才拿起單子便到東面一家藥鋪子裏去配一個小學徒的正站在櫃檯旁邊打盹小才將櫃檯一拍喝道夥計你夜裏沒有困覺嗎生意來了那個小學徒的被他冒冒失失的一嚷嚇得一怔忙將睡眼揉開沒住口地答應道來了來了說著伸手將他的單子接過往戒尺底下一壓拿起藥盤便去配藥這時裏面老闆聽得小才的呼喚他正在小便褲子也來不及束就趕到外邊見學徒已經動手配了他便先將褲腰束好走進來朝藥單子仔細一看不禁倒抽了一口冷氣忙伸手將學徒打了一個耳光罵道你這個混蛋連眼睛都瞎了這樣的單子你就配了嗎你說罷將單子還與小才說道這單子上的藥我們小店裏配不全請換一家罷小才聽他這話心中十分詫異地問道你這是什麽話藥不全難道就開藥店了嗎那店老闆說道委實不全請換一家罷小才深怕耽擱辰光回去又要挨打急急向店老闆大聲說道呔你說沒有怎麽你家相公又配呢想必是有的沒有他就配了嗎那店老闆說道這倒不要說他是才來的一個學徒曉得什麽你不看我方才打他嗎小才說道我曉得了莫非怕我不給你錢嗎店老闆笑道你這是什麽話我們既然開一爿藥鋪子你不給錢他不給錢難道我們吃西北風嗎小才道既然這樣爲什麽又見生意不做呢那店老闆對他說道老實對你說一句你這單子不論拿到誰家去總不見得配給你的小才聽了這話更是驚異問道照你說我這單子竟沒有地方配了店老闆搖頭說道沒有沒有小才道難道配這單子就犯法了麽店老闆道不是犯法恐怕要招人命小才益發不放心地問道難道我們這單子上有殺人刀麽那店老闆被他逼得不得已的問道你這單子究竟是人吃的還是牛吃的小才聽他問得蹊蹺忙轉問道人吃怎麽牛吃怎麽呢他道牛吃還可以如果是人吃的包管今天吃下明日送終小才說道什麽藥這樣的厲害呢他道什麽病能用三錢肉桂五錢附片呢小才道你不用管好歹這單子又不是你開的怕什麽呢他道這是不可以的人命關天豈能亂動小才道那麽你將這兩樣厲害的藥少配些罷他答道如果這樣辦還可以他便動手一味一味地配了半天才將這一付藥配好小才付了錢跳上騾子連打幾鞭那騾子兩耳一豎騰雲價地回來了跑到半路上小才方想起藥沒有攜取忙兜轉騾子重到這家藥鋪子裏取藥便回待得到家時已是申牌時候他跳下騾子將藥送進去陰識問道爲什麽到這會才來小才便將以上的話說了一遍陰識也不答話就將藥送到樓上邢老安人正是守得心焦見藥配來忙叫明兒去煎明兒一會子將藥煎好與麗華吃下大家全坐在她的房裏靜悄悄地候著但見她吃下藥沒一會子汗出如雨額上直是滾個不住陰識對邢老安人說道你老人家快些到被窩裏探探看汗出什麽樣子了邢老安人便伸手入被一摸那被褥上完全被汗濕透了忙叫明兒將上面的被子揭去但見她面色慘白嬌喘微微一句話也不能說了陰識走到她面前用手在她的額上一按跌足歎道這便怎生是好狂熱一分也沒有退去陰興道再去請萬先生來看看究竟出汗不退熱是什麽道理陰識忙著人去請萬先生一刻兒萬病除腳打屁股的進來陰識忙迎上去首先問道舍妹服先生的藥汗是出得不少但是狂熱有增無減究竟是個什麽緣故呢他之乎者也地答道夫狂熱不肯退者定是大汗未出也若夫再以出汗之劑服之大汗一出周身無病矣陰識便領他到麗華的房中邢老安人忙問道小姐汗是出得和洗沐的一樣怎的狂熱簡直一分不退呢萬病除笑道請太太放心在我手裏看的病不會不好的小姐出汗不解熱一定還是汗沒有出透的緣故吧再將藥煎與她吃等汁出透了自然就會好了邢老安人忙叫明兒將藥再煎明兒忙又去煎藥給小姐吃了萬病除又問道現在她怎麽樣了邢老安人忙將帳子揭開說道請先生來看看他巴不得這一聲忙走到她的床前睜開那一雙賊眼向她望了一會猛地伸出那一雙又粗又大的黑手來摸她的頰額可是把個麗華羞得欲避不能欲喊無力任他摸了半天可恨這萬病除野心勃發竟由她的粉頸下面一直探到她的胸前只覺得雙峰高聳宛如新剝雞頭他可心花大放把手縮了出來對邢老安人笑道別的醫生看病他奉旨不肯替人家摸胸口的他們這些裝腔作勢的派子我可學不來我看病無論何人總要探一探虛實寒熱的老安人哪里知道他的念頭滿口稱是他又笑吟吟地向麗華問道小姐的月經是幾時當期麗華此刻又羞又愧又氣又惱哪里還去答他的話兒強將身子一掉面孔朝裏呻吟不住邢老安人忙道先生你不要去問她我曉得的出了房細細的告訴你她們女孩子家將這些光明正大的事都是怪難爲情的不肯說出來萬病除笑道原是原是我看了無數的小姑娘毛病問她們的月經總是吞吞吐吐地難說出來最後還是她的母親或是嫂子代說出來她們還羞得無地可容哩他說罷起身出來邢老安人也就跟了出來將麗華的經期一五一十地告訴他他點頭笑道我曉得了太太請放心罷這一齊藥將二次吃下去馬上就轉機了我現在還有許多事無暇再耽擱了他說罷起身下樓陰識忙叫人拉出一匹馬送他回去不提再說麗華見萬病除走了之後只氣得淚流滿面嚶嚶地哭道哪里請來的這個混帳醫生我寧可死也不要他看了邢老安人忙道兒呀你不要誤會醫生有割股之心他問你都是他留神之處她不回答只是哭個不住邢老安人也無法勸慰這時明兒已經將藥捧了過來她哪里肯吃慌得邢老安人哄道乖乖這藥是你哥哥開的單子那個王八已經打走了她哭道媽媽不要哄我不過吃了他的藥心中像火燒的一樣所以不願再吃了媽媽既然教我吃我還能違抗麽她說罷一口氣將藥吃下去這一來可不對了沒一會只見她從床上劈頭跳起來青絲撩亂一雙星眼滿暴紅筋大聲說道好好好你們想害劉文叔麽恭喜你們我跟他一同死了誰能留住我十萬赤眉強盜已經被你捉住了麽衆人嚇得手忙腳亂大家全搶過來將她按住怎奈她力大無窮一揮手將明兒雪兒推得跌到三尺以外邢老安人更是心肝肉兒哭個不住這時陰識陰興正在樓下議論萬病除的方子忽聽得樓上沸反盈天大鬧起來二人一驚不小一齊飛奔上樓只見麗華披頭散髮滿口胡言陰識搶過來一把將她按住麗華還要掙扎陰識死力將她壓住陰興也過來幫忙才將她扳倒睡下陰識一面按著一面埋怨陰興道這都是你招來的我早就說過了姓萬的方子萬不可吃你偏要替他扯順風旗昨天小才將單子拿去配藥鋪裏沒有一家肯配後來將肉桂附片減去三分之二才將藥配來如今妹妹這個樣子還想活麽老安人聽見這話一頭撞在陰興的懷裏大哭大罵道好孽障你究竟和你妹妹有多少深仇大怨三番兩次地盤算她現在她要死了你總算安心了畜生你不如將我的命也算去吧省得見我的心肝死得可憐邢老安人說了一陣忽的往下一倒雙目直視竟昏厥過去明兒雪兒嚇得走投無路陰識忙向她們喝道還不過去將太太扶起來發什麽呆呀陰興一面哭一面和衆人將邢老安人扶起來在背上輕輕地用手撫個不住一會子邢老安人才舒過一口氣來陰識到此時也不由得別人做主忙差人到舂陵去請李雪梅醫生沒多時李雪梅到了陰識命明兒等將小姐按住自己下樓將李雪梅請上樓來到床前略一診視李雪梅捋著胡子沈吟了一會退出房來陰識躬身問道敢問老先生舍妹可有回生之望麽李雪梅搖頭咋舌道不容易不容易只好盡我的力量如其再不中用那也無法可想小姐的貴恙可曾請先生看過嗎陰識道請過萬病除看過了李雪梅道可有單子陰識忙去將單子拿與李雪梅他仔細一看拍案大驚道該死該死這分明是傷寒化火還能任意用這些附片肉桂嗎真是奇談陰識道晚生也是這樣的設想無奈家母等一廂情願的脾氣不喜別人多嘴的弄到現在才後悔遲呢李雪梅歎道這等醫生不知白送了多少人命了他拿起筆來酌量半天開了一張單子上面寫著羚羊角三分金釵石斛五錢他對陰識道叫人去配估量這羚羊角要磨半天呢快點就去罷陰識忙差小才拿著單子指名到保和堂去配了這時樓下有個小廝上來稟道萬先生來了陰識聽了把那無名的業火高舉三千丈按捺不下忙辭了李老先生匆匆地下得樓來劈面就看見萬病除笑嘻嘻向他問道大世兄小姐的病勢如何陰識也不和他客氣冷笑一聲道先生的妙藥真是手到回春舍妹現已好了到後園裏去玩耍了請先生到後邊去看看也了教先生喜歡喜歡萬病除聽得他這話真是樂不可支地笑道非是萬某空誇大口吧陰識道果然果然說著便將他一徑帶向後面而來走到腰門旁邊陰識喊道走出幾個來話猶未了裏面廂房裏跑出四五個家丁來陰識喊道將這個狗頭先捆起再說那幾個家丁不由分說虎撲羊羔似地將他捆起陰識掣出皮鞭上下抽個不住口中罵道你這個雜種登門來尋死可不要怪我今天將你生生的打死好替我妹妹償命萬病除打得怪叫如梟滿口哀告陰識哪里肯息打了半天忽然心生一計便叫人將他擡到後門口用溺器盛了滿滿的一下子臭糞硬將他的嘴撬開灌了一個暢快才將他放下來他抱頭鼠竄一蹣一跚地走了一會子到了自己家裏渾身全是糞汗臭不可當許多人掩著鼻子來問他他只得說是行路不慎失足落下毛廁的他將衣服一換帶了家小連夜搬家逃得不知去向了再說陰識將萬病除擺佈了一陣才算稍稍地出口惡氣帶了衆人回來他便上樓對陰興說了究竟陰興也很快活陰識忙問陰興道小才去配藥回來沒有陰興道不曾回來呢陰識詫異道怎的去了好久還不回來呢他便喊了一個小廝前去催他這小廝就跳上大騾一口氣跑到保和堂門口停下小廝跳下騾子但見小才倚著櫃檯外邊閉著眼睛只管在那裏打盹小廝也不去喊他竟向店夥問道陰府上的藥配好沒有夥計答道早已配好喊他數次這個傢夥睜開眼睛開口就要罵人我們氣得也不去喊他了這個小廝素來和他不睦他眉頭一皺計上心來忙對店夥說道請你將藥先交給我帶回去讓他在這裏打一會瞳睡罷店夥也不知就理忙將一個羊脂玉的杯子取出來裏面盛著羚羊角磨的汁又將金釵石斛用紅綠絨繩系好一起交與小廝那小廝上了騾子飛也似地回來了將兩樣藥送到樓上陰識忙問道小才呢那小廝撒謊道我去人家早以將藥配好了擺在那裏我問他到哪里去了那店裏的先生都不肯說後來被我再三追問才告訴我說他去看把戲了我想小姐這樣危險還能再耽擱麽就將藥拿回來陰識聽得氣得一佛出世二佛升天這正是無名業火三千丈可怖皮鞭五尺長要知後事如何且看下回分解
