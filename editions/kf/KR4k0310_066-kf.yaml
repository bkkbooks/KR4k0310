body:
  text: 第六十六回目成心許載澂淫族姑歌場舞榭玉喜識書生卻說咸豐帝見兩個心愛的妃子都中毒死了心中又悲傷又憤怒便吩咐太監們在宮中搜查先從紫瑛手下的宮女查起又在各妃子的房裏搜查了一遍都沒有什麽形迹可疑的地方那冰花做事體十分秘密她手下的宮女太監都得了她的好處誰敢多嘴皇帝看看查不出憑據也只得罷了只是想起那瓊兒和紫瑛兩個美兒和小鳥依人一般如今死了眼前頓覺寂寞起來想到傷心的地方不禁掉下淚來這時他也不召幸別的妃子只是一個人在涵碧山房住宿左右自有宮女太監伺候著那冰花謀死了紫瑛以後天天望著皇帝召幸她終不見聖旨下來氣得她一般也是在房裏唉聲歎氣那皇帝因想美人想得厲害便昏昏沈沈地病了咸豐帝性子原是急躁的如今害了病越是嚴厲了那班伺候的宮女常常遭打他在病中喜怒無常有時把宮女摟在懷裏有時推下床去有時揪著頭髮摔到門外去有時候甚至拔下佩刀來砍去宮女的腦袋那班宮女真是有苦沒處訴禦醫天天請脈下藥也沒有效驗消息慢慢傳到坤甯宮裏給孝貞後知道了忙擺動鳳駕親自到園裏去把皇帝接回宮來又親自服侍著皇帝咸豐帝原是很敬重孝貞皇后的他見了孝貞皇后殷勤侍奉便也感動了夫妻的情分那病勢也一天一天地減輕了那恭親王奕訢是咸豐帝的弟弟兄弟兩人平日十分親愛的孝貞後便去把恭親王請進宮來那奕訢見了皇帝便勸諫說如今國家多故正賴皇上振作有爲皇上宜保重身體恢復精神勤勞國事上保列祖列宗之偉業下救百姓萬民之大難咸豐帝聽了皇弟的一番勸也慢慢明白過來看看病體已大好了便傳諭坐朝那時滿朝文武許久沒有上朝了聽說皇上坐朝大家都歡呼萬歲皇上不問國事多日到此時才知道南京失守杭州不保各路的駐防兵隊不戰自退接著又是兩廣總督耆英奏報說英國兵打進了廣州城咸豐帝聽了連問怎麽辦怎麽辦那在朝的官員大家都像封了口的葫蘆一般一言不出後來還是戶部尚書肅順奏道俺們旗人都是混蛋只知道吃糧不知道打仗請陛下降旨諭在籍侍郎曾國藩速率鄉團助戰這個聖旨一下那班滿洲統兵大員都覺得丟臉便有向榮從湖北打下來屯兵在孝陵衛稱做江南大營琦善也帶著直隸陝西黑龍江馬步諸軍去攻打揚州稱做江北大營這兩路兵馬和太平軍大戰太平軍東王楊秀清帶領神兵迎戰什麽是神兵原來他兵隊前面先把十二三歲的男孩子身披五彩打扮得和天神模樣綁在竹竿尖上一手放著煙火一手舞弄刀槍弄得隊前煙霧蔽天稱做天魔陣天魔陣後面跟著一隊女兵打扮著十分妖嬈由廣東女人蕭三娘統帶著女兵寶髻珍冠蠻靴紫禱那三娘長得實在美麗她走在陣前只叫把寶劍一揮那些兵士便拼命殺去琦善也統領馬軍死力殺來他要洗去旗人都是混蛋一句話的羞恥便打得十分勇猛殺了五陣得了五次勝仗洪天王看看清兵來勢甚勇便不用力敵而用智取打發細作到孝陵衛去放一把火燒得江南大兵棄甲而逃這裏太平軍中林鳳祥帶兵殺出江北大營聽得江南大營吃了敗仗便也立刻潰散琦善一時走投無路心中又十分氣憤便在馬上拔下佩刀自刎而死從此太平軍勢焰大盛林鳳祥一支兵馬轉戰江北楊秀清也帶了二萬兵馬直攻河南歸德鳳祥又擄了煤船渡過黃河打進山西省去戰報不斷飛到京城咸豐帝立刻召集各部大臣開禦前會議下旨派直隸總督訥爾經爲欽差大臣專辦河南軍務一面催曾國藩招募湘勇在湖北剿辦曾國藩和張亮基創辦長江水師才把太平軍制住咸豐帝自從聽了恭親王的勸諫以後便十分親信他咸豐帝只因平日好色過甚身體也淘虛了這時軍務正忙皇帝也沒有精神辦理所以一切軍國大事都由恭親王在宮中幫同辦理皇帝怕他進出勞苦便留恭親王在宮中住宿恭親王一連在宮裏住宿了十多天誰知他大兒子在家裏卻鬧出一件風流案子來原來恭親王有一個大兒子名叫載澂宮裏的人都稱呼他澂貝勒這位貝勒爺是嫖賭全才終日和一班京城地面上的混混攪在一起聲色犬馬沒有一樣不好尤其是好色北京地面止的窯姐兒私窩子沒有一個不認識他的大家都稱他大爺這澂大爺還生成一種下流脾氣他家裏雖有錢他玩女人不愛光明正大拿錢出去娶姨太太也不愛到窯子裏去花錢做大爺他最愛偷偷摸摸他玩窯姐兒最愛跟別人去吃鑲邊酒趁主人不防備的時候便和窯姐兒偷情去待偷上了手便肯把銀子整千整萬地花著他逛私窩子也是一般的脾氣他又最愛奸占人家的寡婦處女打聽得某家有年輕的寡婦或是處女他不問面貌好壞便出奇地想法子偷去待到上了手那女人向他要銀子五百便是五百一千便是一千因此有許多窮苦人家的少婦都把丈夫藏起來冒充著寡婦去引誘他澂貝勒終年在外面無法無天地玩著花的銀子也不少了家裏只有一位福晉卻沒有姨太太那位福晉也因和貝勒不合終年住在娘家的時候多澂貝勒天天在外面胡混慢慢地染了一身惡瘡給他父親恭親王知道了便抓去關在王府裏一面請醫生替他服藥調理在王府裏關了半年惡瘡已治好了恭親王放他出來他依舊在外面胡作妄爲這時正在六月火熱天氣北京地方愛遊玩的男女都到什刹海去遊玩這什刹海地方十分空曠四面荷蕩滿海開著紅白蓮花沿海都設著茶店子又搭著茶棚有許多姑娘在茶棚裏打鼓唱書許多遊客也有看花的也有聽書的也有喝茶乘涼的也有一班男女在這熱鬧地方做出許多傷風敗俗的事體出來的這一天澂貝勒也帶著一班浪蕩少年在那海邊揀一處僻靜地方喝茶一眼見那欄杆邊有一個年輕的旗裝少婦坐著也在那裏喝茶再看那時那少婦身旁並沒有第二個男子看那少婦長得眉清目秀鵝蛋臉兒嘴唇上點著鮮紅的胭脂穿著一身白羅衫兒越顯出細細的腰肢高高的乳頭來那粉腮兒上配著漆黑的眼珠澂貝勒見了這樣一位美人兒禁不住勾起他的舊病來便接二連三地飛過眼風去那婦人見了不覺微微一笑也暗地裏遞過眼色來澂貝勒見了喜極欲狂恰巧有一個孩子背著竹筐走來聲聲叫賣蓮藕那婦人伸出手來向那孩子招手兒澂勒見這婦人的手長得白淨越發動了心趁她在那裏買蓮蓬的時候便打發一個小廝過來替她給了錢說道這蓮蓬是俺們大爺買著送給你的俺大爺想得你厲害要和你見一面談談心不知你可願意那婦人聽了笑駡道想扁了你家大爺的腦袋誰有空兒會你家大爺去這婦人一邊罵著一邊剝著蓮心吃著那澂貝勒如何肯肯幹休再三叫那小廝說去又解下一方漢玉飄來送過去給那婦人那婦人看他求得至誠便答應了說道俺家裏人多眼多不便領你家大爺進門去請你家大爺揀一個清靜的地方俺們會一面罷激貝勒聽了這話歡喜得心花怒放便站起來把這婦人領出了什刹海又領到一家酒樓上這酒樓名叫長春館澂貝勒常在他家喝酒的店小二認得他是貝勒爺見他帶了一個婦人忙把他倆人一領領進一間密室裏一邊吃著酒一邊調笑起來那婦人原是十分風騷的三杯酒下肚越發妖媚動人澂貝勒實在忍不得了便把店裏掌櫃的喚來這掌櫃原帶著家眷的澂貝勒給他一張一千兩的銀栗要他把掌櫃奶奶的床鋪讓出來那掌櫃的見有銀子又知道這位大爺是當今皇上的嫡親的侄兒勢力很大他哪敢不依事刻答應下來當夜澂貝勒和這婦人便在長春酒樓中成其好事第二天兩人直睡到日上三竿才懶洋洋地起床來澂貝勒下床那婦人還盤著腿兒坐在床沿上雲鬢半墮星眼微潤露著十分春意澂貝勒怔怔地望著越看越愛那婦人禁不住嗤地一笑說道看什麽和你睡了一夜難道還不認識你姑母嗎澂貝勒被她這一說不覺又詫異又疑心起來心想這婦人怪面熟卻在什麽地方見過的怎麽自稱姑母呢便連連地追問那婦人只是抿著嘴笑不肯說後來澂貝勒問急了那婦人說道你先跪下來見過禮兒俺們再攀親眷那澂貝勒被她風騷樣兒迷住了真的對她跪下那婦人伸手去把澂貝勒拉起來說道我的乖乖好侄兒待俺告訴你聽罷你可記得你娶福晉的那年俺曾到你府上吃過喜酒你還趕著俺喊小蘭姑媽呢澂貝勒聽到這裏才恍然大悟說道你的丈夫可是蘭大爺嗎那婦人點點頭澂貝勒一拍手說道這可了不得了你真是俺家的姑太太呢俺們五年不見怎麽老記不起來昨天見面的時候你又不說那婦人聽了伸手在澂貝勒的臉上一擰說道俺擰下你這張小嘴來俺昨天看你急得厲害一刻也等不得俺說出來豈不掃你的興再者你那姑丈做了一個窮京官一個月幾個子兒的官俸夠俺什麽用俺也要到外邊找幾個錢活動活動如今既遇到了你俺們便宜不出自家門說著便哈哈大笑起來澂貝勒雖明知姑母侄子有關名分但看看那婦人實在迷人得厲害又哪管一切他倆人依舊戀戀不捨天天到這酒樓中來幽會後來日子久了澂貝勒和那婦人商量要接她回家去住著那婦人說著俺家中有婆婆有丈夫如何使得大爺倘真要俺快在冷靜地方買下房子買通幾個混混兒在路上搶俺去住在那房子裏俺和你一雙倆好地住著豈不甚妙澂貝勒聽了她的話便在南下窪子地方買下一所宅院看看又到了夏天他姑媽依舊一個人到什刹海去喝茶乘涼正熱鬧的時候忽然人叢中搶出六七個無賴光棍來攔腰抱住那婦人搶著便走那婦人假裝做叫喊著便有人要上去幫著奪回來旁邊有人認識那班光榻是澂貝勒養著的也便嚇得縮在一邊不敢下手眼看著婦人被他們搶去從此以後京城地面上沸沸揚揚地傳說澂貝勒搶良家婦女好在這種事體在那時地方上常常有的大家聽了也不以爲奇那澂貝勒和他姑母真的在那新宅子裏甜甜蜜蜜地做起人家來且說被那婦人丟下的丈夫卻是孤孤淒淒的他也不做官了終日哭哭啼啼的滿京城裏找尋他的妻子找來找去不見妻子的蹤迹蘭大爺想妻子想瘋了終日披散了頭髮敞開了胸膛哭哭啼啼在大街小巷裏逢人遍告妻子被澂貝勒搶示了後來這風聲慢慢地傳到都老爺耳爺裏便一面派人把蘭大爺送到醫院去醫治一面上奏章參了澂貝勒一本這時澂貝勒的父親恭親王訢訪正在宮裏幫著皇上辦軍務重事皇帝見了這本奏章也不說話遞給恭親王自己看去恭親王見奏章參他兒子奸占族姑一款嚇得他忙跪下地來向皇帝磕頭皇帝說道你也該回家去照看照看了那恭親王帶了奏摺出宮來趕到澂貝勒家裏一問知道澂貝勒多日不回府了恭親王一聽這事體是真的了便傳齊府中奴僕一一拷問有幾個家人熬刑不過便供出說貝勒爺新近在南窪子買一所宅子住著爺有沒有荒唐的事體奴才卻不敢說恭親王聽了便帶人趕到南窪子地方打門進去果然雙雙捉住恭親王一看認得那婦人是同族中的妹子這一氣把個王爺氣得鬍子根根倒豎一揚手在澂貝勒臉上打了無數的耳光又親自扭著送到宗人府裏一面進宮去先自己認罪把澂貝勒奸占族姑的情形一一奏明瞭咸豐帝聽了也不禁大怒下諭革去載澂貝勒功名打落在宗人府高牆裏永遠圈禁那婦人也由宗人府鞭背三百禁三年限滿交丈夫嚴加管束後來恭親王的福晉死了澂貝勒托人去求孝貞皇后放他回家奔母喪去誰知載澂一出宗人府便又橫行不法起來他府中的丫頭老媽子都被他姦污到他有的是錢那丫頭老媽子得了他的錢便也願意府裏有一個趕車的名叫趙三喜他娶了一個媳婦人人喚她喜大嫂一個爛汙不過的女人府中上上下下的人都和她有交情給澂貝勒露了眼忽然看中了她把這媳婦喚進書房去睡幾夜誰知這喜大嫂是有毒的不上一個月澂貝勒渾身惡瘡大發暗地裏請醫生醫治終是無效這時候到了夏天惡瘡潰爛滿屋子臭味薰蒸澂貝勒躺在床上不能行動終日大喊大叫著痛看看到了秋天那病勢愈重醫生說不中用了澂貝勒自己也知道不中用了求人去把他父親請來要見一面恭親王聽說兒子害病反十分喜歡天天望他快死後來澂貝勒打發人去請恭親王不願去見他兒子連請幾次他總不去不知怎麽給孝貞皇后知道了便勸他姑念父子一場去送一送終也是應該的恭親王看在皇后面上便到他兒子家裏去看望澂貝勒這時漼貝勒直挺挺地睡在床上只剩一口氣恭親王掩著鼻子走進屋子去看一看見載澂穿著一身黑綢衫褲用白絲線遍身繡著百蝶圖恭親王見了連罵該死該死一轉身走出屋子去那澂貝勒不久便死了那班爺們知道了都說他自作孽話休煩敘且說這時英法聯軍在廣東鬧得十分厲害太平軍趁此機會沿長江佔領太平蕪湖安慶一帶地方南京的李秀成又帶兵打進杭州一帶咸豐帝起初原打起精神管理軍國大事後來看大局一天糟似一天便又心灰意懶起來慢慢兒又不高興坐朝了在宮中只和那些妃嬪宮女們玩笑解悶咸豐帝是最愛南方女子的便暗暗地囑託崔總管在外面物色江南女子圓明圓裏雖也有一個冰花也因日久生厭了不多幾天崔總管果然弄了四個江南美人到園子裏去住著皇帝特賜她四個人的名字分別叫杏花春陀羅春海棠春牡丹春這四春在園中分住四處杏花春住杏花村館陀羅春住武林春色海棠春住天然圖畫樓牡丹春住夾鏡鳴琴室她們住的地方都十分清幽咸豐帝在四處輪流臨幸著十分快樂越發把國事丟在腦後了這四春裏面要算牡丹春的面貌最爲濃豔這牡丹春是蘇州山塘上小戶人家的女兒她家門口是來往虎丘的要道凡是豪商富紳每天車馬在她家門口走過的很多那牡丹春閑著無事又愛站門口一天一個姓郭的揚州鹽商跟了許多朋友到虎丘來遊玩見了這女孩兒便十分喜歡立刻到她家裏去願意拿出一千兩銀子來買她回家去做姨太太這時牡丹春有一個老母聽說有一千兩銀子十分願意只有牡丹春不願意後來那姓郭的再三托人來勸說牡丹春硬是要揀日子和那姓郭的拜過天地才肯嫁他後來那姓郭的想牡丹春實在想得厲害便也答應她揀日子揀在八月十二誰知到了七月中太平軍打破揚州城那姓郭的逃到蘇州來趁便把牡丹春母女二人帶著逃進京去沿路牡丹春避著姓郭的不肯和他同房他們到了京裏正值崔總管在訪求江南來的美人知道了牡丹春很美便和姓郭的去商量願意拿六千兩銀子把牡丹春買進宮去又答應給姓郭的五品京堂功名那牡丹春聽說進宮去她十分不願意無奈鬥不過這姓郭的牡丹春被哄進園去只見裏面池館清幽水木明瑟曲曲折折到了一座大院子裏有兩個旗裝女人上來挽扶她走進屋子去見一個男子方盤大臉坐在榻上那男子身後也站著許多旗裝女人那男子的衣服渾身黃色許多男人穿著袍褂大家都稱坐在榻上的男子叫佛爺牡丹春進了屋子便有老媽媽上來領她到榻前跪下見禮對她說這位便是當今的萬歲爺牡丹春到了這時也便無可奈何只得暫時依順著與她同時進院來的還有五六個漢女內中有一個揚州女子年紀只有十五歲卻十分活潑她進宮來不多幾天覺得煩悶常常嚷著要出去牡丹春勸她耐心守著她不聽有一天夜裏她覰宮女不防備的時候溜出園去被園外的侍衛捉住送進園來皇帝知道了大怒立刻發給管事媽媽拿白羅帶絞死從此江南來的美人見了都害怕不敢離園一步講到那海棠春原是大同地方的女戲子小名玉喜常常到天津戲園子裏來唱戲唱青衣面貌又標致嗓子也清亮又能彈琵琶吹羌笛那班王孫公子天天替她捧場在她身上花的錢也整千整萬的了玉喜卻一個也看不上內中有一個窮讀書人名叫金宮蟾的也迷戀著玉喜的美色天天到她戲園子裏去聽戲每去總是坐在台口仰著脖子目不轉睛地看著聽著不論亂風下雨的天氣從不間斷這金宮蟾原長得眉清目秀白淨臉兒玉喜在臺上唱戲也看見台下有這麽一個人在那裏癡癡地看著她起初還不覺得後來日子久了玉喜也不覺詫異起來這時候正是大熱天氣平日那班捧場的王孫公子都怕熱不來聽戲池子裏賣座很少獨有這個金宮蟾依舊端端正正地坐在台口臉上淌下汗來他連扁子也不帶玉喜在臺上一邊唱戲心中不覺感動起來因此她唱得越發有精神但別人難以領會這意思一天玉喜唱完了戲卸了裝便悄悄地走下池子來在金宮蟾身旁陪坐著這金宮蟾幾年來一片至誠心如今竟得美人屈駕真是喜出望外但是他雖是思玉喜想得厲害到底他是一個書呆子在這人衆之下見了這位美人兒不覺怕起羞來一時裏找不出話來和她攀談後來還是玉喜先開口問他尊姓大名那池子裏的看客也不看臺上了大家把眼光定在他倆人身上嘴裏嘖噴稱羨說這客人豔福不淺金宮蟾被衆人的眼光逼住了越發說不出話來除告訴了他名姓以後脹得滿臉通紅也找不出第二句話來問她玉喜看他怕羞怕得厲害心中越發愛他悄悄地告訴她家住在某街某某胡同然後對他嫣然一笑轉身去了這金宮蟾待玉喜去了半晌才把飛去的魂靈收回腔子裏來正要站起身來出園去忽然想到自己原是一個窮讀書人進京來趕考銀錢原帶得不多偶然到園子裏來聽戲被她的美貌迷住了每天買戲票的錢還是典當得來的如今連皮袍也當了錢在這客地裏借無可借當無可當兩手空空如何去見得那美人要知這金宮蟾後來能見得玉喜的面否且聽下回分解清代宮廷豔史第三部民國許嘯天著
