body:
  text: 第七十五回帳中一度阿父喜封侯壇下三呼蕭王初即位卻說文叔正要犒賞衆將忽然接到劉玄的封冊賜爲蕭王自是欣喜忙擺酒席款待來使那來使對劉秀說道還有旨意一通在此請王爺細閱卑職公務匆忙不敢耽閣就此告辭那來使將旨意取出告辭而去劉秀和衆人將旨意拆開觀看只見裏面並無別話只寫著掃滅王郎功績隆厚加晉蕭王仰即班師西下欽此劉秀看罷驚疑不止便對鄧禹說道我們方將王郎掃滅河北一帶的地方還不收復何能即刻退兵我倒不懂他是什麽用意鄧禹笑道主公哪里知道他們主見主公軍威日盛所向無敵百姓歸心群雄依附深恐我們一朝翻臉去報大將軍劉縯的舊恨哪別的還有什麽用意呢劉秀沈思一會答道恐怕不是這樣的用意罷話還未了朱祐馮異齊聲說道當此亂世之秋劉玄何人怎能爲萬民之主惟大王有日角相天命所歸不宜自誤劉秀聽罷便對二人笑道兩位將軍莫非今朝慶功宴上多吃了幾杯酒麽怎的這樣亂說須知刺奸將軍鐵面無私劍下從未留過情面還勸兩位將軍少說爲佳馮異朱祐果然不敢再說鄧禹早知就裏忙對諸將說道今天主公加封晉爵諸位將軍且請痛飲一場不才自有定論耿弇這時向鄧禹一笑鄧禹也沒答話大家從容入席酣呼暢飲席間鄧禹對文叔說道諸將之內我最佩服是馮異你看他不邀功不求賞端的是個大量大器的英雄我看真正不可多得哩劉秀點頭笑道果然果然方才諸將誰也爭強論勝惟有他一個人反到營後的大樹底下可見他的心思與衆不同了李通大笑道那麽主公不要封他我倒有個頂好的封號鄧禹笑問道李將軍有什麽封號呢李通笑道何不就叫他爲大樹將軍呢大家鼓掌附和道妙極了好一個大樹將軍從此以後我們就叫他爲大樹將軍了劉秀含笑不語一會子日落西山不覺已到酉牌時候了大家撤退殘席重新入座又議了一回軍事才各自去安寢不提在下說到這裏卻要岔到劉玄那裏去說了因爲一支筆不能寫兩面事劉玄那面的消息至今未有提起一字恐怕讀者納悶所以趁他們睡覺的空子特地抽暇來報告一下子罷閑話少說言歸正傳且說劉玄在洛陽住了四個月申徒建李松等一班人極力攛掇遷都長安這時已到更始二年的九月了劉玄入長樂宮升坐前殿郎吏兩旁站立肅穆一堂把個劉玄羞得頭也不敢擡起垂頭播弄衣帶一言不發霎時衆臣朝賀已畢劉玄羞答答地一聲也不敢響李松趙萌勸他封功臣爲王勸了半天劉玄吞吞吐吐地說道教我怎樣封法話未說畢朱魚肖大聲抗議道從前高祖有約非劉氏不王今宗室且未加封何能先封他人呢李松趙萌又請劉玄先封宗室劉玄只是眼管鼻子鼻管腳後跟地坐在那裏縮作一團滿臉緋紅再也說不出一句話來李松催道請陛下不要遲疑就論功加爵罷劉玄急地漲紫了臉向李松帶怒含嗔地說道封他娘的什麽勞什子儘管來嚕嗦不了這個倒頭皇帝我也不要做了倒也落得清淨些李松急得走投無路忙走到他的跟前附著他的耳朵正要說話誰知劉玄見他跑來將頭移到自己耳邊他不禁嚇得一大跳雙手掩著耳朵大聲哭道我不做皇帝與你有什麽相干你想來咬我麽我偏不做看你們怎樣對待我他說罷撩起袍服便要下殿朱魚肖見此光景又好氣又好笑忙來將他拉住哄道你不用害怕他不是咬你的是來教你主意的他聽了這話登時露出一嘴黃牙向朱魚肖笑道真的麽朱魚肖正色說道誰騙你呢他才重新坐下用袖子將眼淚拭去向李松道你來你來有什麽話你就說罷李松悄悄地說道你不是不會封嗎劉玄連連點頭道不會封不會封李松道你就照封劉秀那樣封法就對劉玄大喜道曉得了共封幾個人李松道宗室內共有八個我來報名與你我報一個你封一個好麽劉玄點頭稱是李松便向殿下喊道定樂侯劉嘉聽封劉嘉越班出來到階跪下三呼萬歲劉玄卻又弄著莫名其妙兩眼不住向李松翻看李松暗暗著急道從來沒有看見過這個木瓜他連連用嘴向他一努劉玄便大聲說道大司馬蕭王劉秀他沒頭沒尾地說了一句便不言語階下衆郎吏一個個弄得不知所以面面相覷李松朱魚肖趙萌等一干人只急得一佛出世二佛升天朱魚肖忙向李松說道誰教你叫他這樣封法的李松急道我又何曾這樣說法的劉玄翻起眼睛向李松道你還賴呢不是你方才對我說的嗎李松聽得這話方才會意過來忙向他啐了一口道不要說罷五頃田裏長的一隻大傻瓜誰叫你這樣封的他說罷向朱魚肖說道不如我們替他封一下子罷朱魚肖沒法只得和李松假傳聖旨將宗室以及功臣一一的封贈封畢劉玄才退殿到了長樂宮將金冠往桌上一擲唉聲歎聲地說道我又不知幾時作下什麽孽弄到如此不知從哪里說起好端端多麽自在定要壓住我做這晦氣皇帝我真倒楣極了他一個人正在這怨天尤人的當兒瞥見趙萌走進來向他說道主公他一句還未說完劉玄剔起眼睛向他說道誰是你家祖宗你不要將我折殺了罷趙萌見他怒容滿面知道他的宿氣未消忙滿臉堆下笑來向他說道小臣今天了辦了些狗肉用沙鍋煨得粉爛請你去吃一頓如何劉玄本來酷嗜狗肉聽他這話不禁口角流涎忙笑嘻嘻地對趙萌道真的有麽趙萌道一大沙鍋子全是關西狗肉又香又肥請你就去罷劉玄只笑得一張嘴合不攏來忙取了金冠一拉趙萌便要動身趙萌慌忙地對他說道如今你是皇帝了要出去是很不容易要去非要先將衣服換好才能動身劉玄急道誰是皇帝你孫子才是皇帝呢你兒子才是皇帝呢趙萌道你不換衣服我也不帶你去劉玄無奈只得草草地將衣服換好帶了兩個宮侍一溜煙跟到趙萌的府內趙萌親自到後面將一沙鍋子狗肉捧到前面劉玄嗅著狗肉的香味嘴角上的饞涎像那雨過的簷溜點點滴滴的險些兒將前襟濕透偏是那趙萌的話多和他談了許多閒話他可再也耐不住了向趙萌道你這人忒也小氣既請我來吃狗肉爲什麽儘管說廢話不吃狗肉呢我難道來和你談話的麽趙萌跌足笑道我真糊塗了忙命侍者去取一壺好酒來兩個人對面坐下吃著狗肉喝著酒十分高興劉玄一面狼吞虎咽地吃著一面向趙萌說道你真是我的恩人自從做了這個倒頭皇帝之後鎮日價地吃那些威雞辣鵝一點情趣也沒有可憐我生來就歡喜這狗肉我有了狗肉什麽都不要了今天可讓我吃他一個暢快趙萌笑道主公實在喜歡我每日親自動手辦一沙鍋子著人擡進宮去如何劉玄聽他這話忙停下筷子答道那就好極了兩個人一飲一呷不覺都有些酒意在趙萌的用意想借此籠絡劉玄自己好肆無忌憚不想劉玄果然中了他的圈套他便眉頭一皺計上心來向劉玄說道主公請暫坐一會我還有點事情去劉玄忙道你有事儘管請便罷我也不陪了趙萌起身出去停了好久還未回來劉玄一個人丟下酒杯弄筷子的吃個不住真個是滿桌淋漓渾身斑點這時突然一陣香風吹了進來那一股蘭麝之氣使人欲醉接著又聽得環珮聲音零零丁丁地由遠而近劉玄放下杯箸閃著醉眼一看只見一位如花似玉的美人兒站在門旁手裏拿著幾枝菊花生得柳眉杏眼雲鬢堆鴉他眼睛便定了神再加吃了許多酒便自持不住不由地笑問道美人姐姐請進來吃杯暖酒罷那女子嬌羞答答地走了進來在趙萌的位子上坐下去劉玄真個是喜從天降忙倒了一杯暖酒雙手捧了過來那女子忙站起來接了過去劉玄笑嘻嘻地問道美人姐姐你姓什麽你叫什麽名字請你告訴我她先用眼睛向劉玄瞟了一下子然後又嫣然一笑說道你問我嗎劉玄點頭道正是正是她道我姓趙剛才和你吃酒的就是我的爸爸他現在出去有事了臨走的時候他關照我說你一個人在這裏吃酒怪冷清的特地教我來陪伴陪伴你的劉玄大喜道原來如此我還不曉得咧姐姐你今年十幾歲了你叫什麽名字告訴我好照名字喊你那女子微微一笑然後慢慢地說道我今天十七歲了名叫媚熙劉玄又笑道媚熙妹妹你有婆家沒有呢媚熙啐道誰和你來纏不清呢劉玄忙道妹妹請你不要動氣原是我說錯了我還有一句話不知你肯麽媚熙笑道什麽話他道我聽人家說我們男人和美人兒在一起睡覺極有趣的我看你今天不如和我睡一會子究竟有趣沒有她聽他這話兜頭向他啐了一口道誰和你混說不清呢我也要去了她故意站起要走慌得劉玄自己用手打了幾個嘴巴說道好妹妹請你不要動氣我再說隨你打好麽媚熙心中又好氣又好笑忙過來將他的右手拉住笑道又要亂說又怕得罪人何苦這樣劉玄一陣酒湧上來一張嘴吐了一大堆媚熙掩著鼻子笑道黃湯少灌些也不致這樣嘔了啊劉玄站不住一歪身往媚熙的懷中一倒慌得媚熙一把將他扶住忙教人將地上的齷齪掃去自己扶著劉玄到一所小廂房裏面的床上睡下自己奉了她的父親的命令和衣在劉玄身旁睡下劉玄睡到夜半子牌時候酒也醒了伸手一摸覺得有人睡在他的身旁他用手在這人頭上一摸摸到她的雲髻再往下摸只覺得雙峰高聳好似新剝雞頭他不禁中暗喜道那美人姐姐果然來和我睡覺了他摟著她親了一個嘴問道你可是媚熙姐姐嗎連問幾聲她總沒有答應一聲他可急了忙用手將她一搖輕輕地說道美人姐姐你爲什麽不睬我呢她才微微地伸開玉臂悄聲笑道你儘管問我怎的他笑道人家說的男女睡在一起有一種不可思議的快樂我和你一直睡到這時也不見得有什麽快樂他還未說完她嗤地笑了一聲悄悄地說道傻子你曉得什麽我來教你她說罷輕抒皓腕寬衣解帶做了一個薦枕的巫娥約莫有兩個時辰把個劉玄只樂得心花大放不可收拾真個是春風一度恍若登仙忙道好極好極我們再做一回看她笑道這事是逢著高興萬不可當爲兒戲的他得著甜頭哪里肯依不由她分說硬來上馬翻雲覆雨了一回只弄得精竭神疲方才住手二人並頭而睡直到五更外面有人敲門媚熙在床上醒了曉得他和父親來探聽究竟了她披衣下床將門開了趙萌低聲問道所事如何趙媚熙答道你老人家去問他罷趙萌心中早已明白了走到床前劉玄慌忙坐起說道趙老爺子這時來做什麽的趙萌道微臣萬死將主公留在此地直到一夜還沒回去現在請駕回宮罷劉玄大驚道那如何使得我和你女兒正自睡得有趣誰願意去呢趙萌聽了便知已與女兒有了事情了格外催道主公請駕回罷如果他們尋問起來微臣吃罪不起劉玄道那便如何使得要想我走須要叫你家女兒隨我一同進宮去我才走呢趙萌巴不得他說出這一句呢忙道主公既然看中小女請先回宮我即著人送去就是了劉玄道那可不行非要隨我一同去才行呢趙萌忙令人擡著他們二人繞道進宮一連幾天劉玄也不上朝鎮日價地宣淫縱樂不理朝政將趙萌封爲右大司馬秉理朝政趙萌這時真是大權在手爲所欲爲一班狐朋狗黨都來極意逢迎趙萌一一賞給他們官職小小膳夫俱是錦衣大帽出車入馬威風凜凜長安城中充滿了傀儡的官員軟敲硬詐只弄得怨聲載道一班百姓編出歌謠來一傳十十傳百在街頭巷尾唱道竈下養中郎將爛羊胃騎都尉爛羊頭關內侯唱個不住趙萌等一干人哪里知道是諷刺自己收吸民膏無微不至一班百姓敢怒而不敢言這也不去多說再說劉文叔進得帳來正要安息瞥見帳外走進一個人來往他的床前一跪說道望主公容納微臣數語微臣雖肝腦塗地亦所情願劉秀大驚忙用手將來人拉起仔細一看不是別人正是耿弇劉秀忙伸手將他拉起問道卿家深夜前來有什麽指教耿弇道海內萬民誰不苦恨王莽於今莽賊已除複思劉氏聞漢兵起義莫不歡騰如脫虎口複歸慈母今更始爲天子昏弱無才貴戚縱橫都內政治紊亂比莽更甚大王功名已著天下歸心若不決計自取轉眼之間將此大好山河歸諸別姓了日間諸將之陳言未爲不是奈何大王不察耶劉秀聽他這番話點首無言忽然又有一人進帳跪下劉秀展目一看原來是虎牙將銚期只聽他說道河北地近邊寨人人習戰號爲精勇今更始失政大統垂危明公據有山河擁集精銳如果順從衆心斷然自主天下誰敢不從請主公勿疑劉秀聽得便點首對二人說道二卿高見正與孤暗相吻合日間諸將陳詞也非不是孤爲慎重起見故作一頓殊不知事未成機失露爲辦大事者第一忌既然衆卿一心擁戴秀非草木豈得無心准從衆議便了二人見他答應真是喜不自勝忙退出來尋鄧禹二人剛剛出得帳來忽然有一個人將二人的肩頭一拍悄悄地笑你們好大膽竟敢瞞住衆人在這裏議論這些事情二人大吃一驚回頭一看不是別人正是鄧禹二人大喜忙對鄧禹道先生來得正好主公現在被我們諫准了就請你佈置大計罷鄧禹笑道還到這會呢我早就安排停當了二人驚問道你這話不是奇極了麽你不等主公答應就好去安排了麽鄧禹笑道我早就料定了目下多說無益到了後天自有分解二人聽了只是納悶耿弇笑道鄧先生無論做什麽事老是不肯說明全叫人打悶葫蘆鄧禹附著二人的耳朵如此這般說了一番二人方才明白便和鄧禹告辭出來一夜無話到了第二天鄧禹下令班師諸將英明其妙紛紛入帳詢問鄧禹何故班師鄧禹笑道請諸位將軍不要細問我自有道理一時撥動大隊浩浩蕩蕩直向鄗城進發正是鞭敲金鉦人唱凱旋軍威齊整旗幟鮮明在路不止一日那天到了鄗城守城的將卒大排隊伍開城迎接劉秀等率隊進城過了數日劉秀鄧禹仍然沒有提及一字諸將領好不氣悶一天劉秀點齊衆將自己升帳對衆將說道孤家夜間夢見一條赤龍飛騰上天不知主吉主凶到了現在我的心裏兀地跳個不住呢馮異鄧禹出班賀道天命所歸神靈相感請主公不必遲疑克日先正大統以安萬民之心諸將聽得這話齊呼萬歲鄧禹便請劉秀登壇受命劉秀到了此時知道推辭不了只得緩步登壇祝官宜讀祝文祝文讀畢祭禮告祖南面就坐受文武百官朝賀改元建武頒詔大赦這正是慢道鯨鯢舌海甸好看龍虎會風雲要知後事如何且看下回分解
