body:
  text: 第一百十回墮勾欄佳人嗟命薄當縣尉豪傑歎途窮話說異丐隨著流兒轉過一個大玫瑰花簇子瞥見一個絕代的佳人亭亭地立在一株梧桐樹下手裏拿著一枝銀紅色菡萏花真個比花花解語比玉玉生香雪貌冰肌柳眉杏眼描不出千般旖旎說不盡萬種風流把個異丐看得眼花繚亂口難言身子兒酥了半截但見她穿一件月白湖縐的小衣下垂八幅湘裙一雙瘦尖尖的蓮瓣只多不過三寸吧她見了異丐便也出了神暗道不料這乞丐裏面竟有這樣的人材果然名不虛傳她偷眼細細地打量他生得猿臂熊腰伏犀貫頂面如傅粉唇若丹朱身上著一件土織的衣褂下面穿著一條犢鼻褲赤著腳雖然衣破衫歪那一股英俊的氣概兀地埋掩不了她暗暗地自己對自己說道葛巧蘇葛巧蘇你年已二八還待字深閨雖經多少人來說合至今何曾有一個如意郎君的要是能托身於他真不枉爲人一世了她想到這裏不由得紅暈雙頰嬌羞欲絕異丐見了她卻也在一邊暗暗地喝采道怪不道人家成日價地說著美女生在葛家今日一見果然世間無二若能將她娶爲妻室這豔福倒不淺哩他想到這裏忽然又自己暗笑道我可呆極了人家是金枝玉葉我是個怎麽樣子的一個人就妄生這個念頭豈不是癩狗想吃天鵝肉麽他正自胡思亂想的當兒猛可聽得鼓角震天喊聲動地他大吃一驚急忙順著大喊的聲音望去只見東邊煙塵大起不多會只見無數的黃巾賊漫天蓋地地奔來這異丐分毫不怯勃然大怒道不料這班害民賊竟撞到這裏來了他正要回身去喊那女子叫她回去誰知再等他轉過身來哪里還見那女子一些蹤迹呢他此刻也不暇去追究便拔步飛也似地直向村東而來這時高頭村的一班居民扶老攜幼哭聲震野四處覓路逃生葛時正在府中查點完稅瞥見一個家丁飛也似地跑進來神色倉皇氣急敗壞見了葛時大聲喊道員外爺不好了不好了黃巾賊現在已經打到東村了再不多時馬上就要進我們的村口了葛時忙到後面對他的母親說道太太你老人家曉得麽現在黃巾賊已經打到東村了再不逃走就有性命之憂了葛母聽說這話勃然大怒開口罵道你這畜生無風三尺浪又是從哪里聽得來這些鬼話便馬上就來烏亂得一天星斗了趕快給我滾出去休要惹得我性起一頓拐杖打得你個走投無路原來這荀時是葛巧蘇的父親平時對於他的老娘十分孝順隨便什麽事情都要先來稟告她一聲經她許可然後才敢實行今天不料碰了一個大釘子站在旁邊一聲也不敢多響滿口只是唯唯稱是葛母又道我一個人活了六十多歲托天保佑從來未曾經過什麽刀兵的災難我平日但誦這高王經不知誦了多少了佛祖爺說讀了十遍高王經能免一家災難星讀了百遍高王經可免一村災難星我們的老太爺在世的時候他老人家一生就敬重高王經那時赤馬強盜差不多各州各縣都被他們擾遍了獨有我們高頭村紋風未動要不是菩薩保佑就能這樣了嗎我數著我讀的高王經差不多有三千遍了任他是黃巾賊黑巾賊斷不會來的他剛剛說到這裏又見一個家丁一路滾瓜似地跑了進來大聲說道禍事到了禍事到了賊兵已進東村口將李大戶的房屋全點火燒了我眼見殺得十幾個人了葛母聽得吃驚不小忙起身問道你這話當真麽那家丁忙答道誰敢在太太面前撒謊呢葛時這會子也由不得葛母做主了連呼備馬衆家將一齊備馬伺候葛時又命收拾出幾輛土車來給葛母與內眷等坐大家正在忙亂之際瞥見流兒飛也似地奔進來氣喘汗急放聲哭道不好了不好了小姐被衆賊兵搶去了葛時夫婦陡聽這話好似半天裏起了一個焦雷連忙問道你和小姐到什麽地方去的流兒哭道小姐吃過飯因爲在樓上悶得慌她教我和她一同到後園裏去乘風涼不想就被那起頭紮黃巾的強盜硬搶了去了葛夫人聽得便兒天兒地的哭將起來葛時忙道你可昏了這會是什麽時候還有閒工夫哭麽趕緊先去逃命要緊葛夫人無可奈何只得拭著眼淚上了車子葛母閉目合掌念道南無佛南無僧南無大慈大悲觀世音菩薩她顛來倒去地不住口念著葛時和衆家將四面圍護著車仗出得門來瞥見村東火光燭天哭聲震地吵得一團糟似的葛時忙命人轉道直向許昌而去再表那個異丐跑到東村口自己對自己說道我在這裏承人家何等的厚待我現在人家眼看著要遭劫難了我非草木豈得無心難道就袖手旁觀不成嗎他自言自語的一會子便打定了主意無論如何拼著我一條性命去和這班賊子拼一下子罷他在四下裏一打量見沒有什麽東西可以當兵器用只有一根新橋樁豎在濠河裏半截露出水面他便蹲下身子伸手一拔用力往上一提不料他用力過猛那根樁被他拔起他身子向後一傾險些兒跌下橋去他趕緊立定了腳將橋樁拿起來仔細一看足數有一丈二尺多長碗來粗細原是一根棗樹的直幹他笑道這家夥又重又結實倒很合手呢這時候那頭隊的黃巾賊已經離吊橋只有一箭之路了那異丐橫著橋樁在橋頭立定等候霎時那頭隊賊兵闖到濠河邊剛要過橋瞥見一個人握著碗來粗細的一條大木杠子雄赳赳的站在橋頭預備尋人廝鬥的樣子衆賊兵哪里將他放在心上有兩個先上橋來大聲喝道該死的囚徒膽敢擋住咱們的去路可不怕咱們的厲害麽他冷笑一聲道好狗頭膽敢在老子面前誇口識風頭趁早給我滾去不要慪得你老子性起教你們這班狗頭一個個做了無頭之鬼那兩個賊兵聽他這話勃然大怒飛身過橋就要來和他廝殺了他見他們上了橋便舞動木杠迎了上來未得還手就將那兩個賊兵打下水去冒了兩冒做了淹死的鬼了後面大隊賊兵見了一齊大怒擁來他卻分毫不怯舞起木杠只聽得撲通撲通的聲音霎時將賊兵足數打落有數十個下水還有些賊兵見他這樣的厲害誰也不敢再來送死了只得紮在濠河外大喊鼓噪不敢再送死停了一會賊兵愈聚愈多只是沒一個敢來送死後隊賊將見前隊不行便知出了什麽阻礙便飛馬趕來向賊兵問道爲什麽停著不走呢衆賊一齊答道橋上那個牛子十分厲害前隊的兄弟們被他打落數十個下水了那員賊將聽得這話不由得哇呀呀直嚷起來催動坐騎舞動四竅八環牛耳潑風刀直沖上橋乞丐立了一個勢子等候等他的馬到橋中間他飛身搶上來劈頭一杠那賊將揮刀將迎猛聽得啷的一聲那賊將手中的刀早被他打下水去了他趁勢橫杠一箍早將那賊將連人帶馬全打下水去衆賊兵嚇得撥頭向南就跑說也奇怪頭隊不利後隊再也沒有一個賊兵來羅嗦了他仍舊守著不肯動身一直等到酉牌時候賊隊去遠聽不見呐喊聲音才將杠子丟下入村而來到了村裏靜悄悄的雞犬不聞他暗自疑惑道難道村上的人全走了嗎他此刻肚中已經餓了便挨次到各家門口去探聽不獨人影子不見連鬼影子也沒有了他餓得肚皮裏面轆轆地亂響個不住他暗道這些人家准是去逃難了但是人家去逃難我卻怎能到人家去尋飯吃的萬一被人家曉得了還說我趁火打劫呢寧可我挨餓不做這些非禮舉動他想罷複行走出村來迎著月光只見五穀場旁邊種著許多香瓜已經成熟他便蹲下身子摘了幾個又大又熟的香瓜放在身邊張口便咬連吃了六隻香瓜饑火頓消涼沁心脾他不禁說了一聲快活他便走到那日裏睡的所在去尋好夢了到了第二天衆村民打聽著衆賊兵已經去得遠了便扶老攜幼地複又轉回村來大家進了村口只見屋舍儼然分毫未動個個好生歡喜及到了自己家裏一查檢不禁說了一聲慚愧連一粒芝麻也不少葛時也跟著衆人回來了到自己家裏見一草一木未曾動過他半悲半喜喜的是未遭橫劫悲的是女兒不知下落葛母對衆人說道巧兒命該如此她是一個討債鬼你們趁早不要去想她她在我身邊我不知道教她多少次數高王經她只顧頑皮一些兒也不理我一個女孩子家除了孝經這高王經一定是要讀的如今差不多菩薩嗔怒她也未可知她說著合掌對著佛像說道阿彌陀佛要不是老身替衆人念佛消災這次的橫劫怕免得了麽葛時夫婦命人到四處察訪她的蹤迹訪了多時連一些影子都沒有訪到葛時無可奈何只好自歎命苦罷了再表那個異丐聽得衆人說起葛大戶的女兒被賊兵劫去他將那一腔無名忿火高舉三千丈按捺不下遂不辭而別地走了在他的意思預備追蹤下去將她尋了回來這暫且不表單講葛巧蘇究竟是被誰劫去的呢原來這高頭村有兩個無賴一個名字叫芩祿一個名字叫羅古他兩個本是黃巾賊的黨羽久已垂涎于巧蘇了只苦一些空子也撈不著而且葛家門深似海無隙可乘他兩個使盡了千方百計結果的效力等於零年深日久他兩個不免有魚兒挂臭貓兒叫瘦之感卻巧黃巾賊下了一個密令教他兩個在六月十三這天候著他們接到這個密令便暗暗地商量道如今我們的機會到了明日大隊一到還不是我們的天下麽那時直接到她家帶了就走還怕誰呢他兩個打定了主意到了第二天午牌時候裹紮停當頭帶黃巾腰懸利刀預先埋伏在葛家的花園裏等了多時瞥見她一個人出來婷婷嫋嫋地走到梧桐樹下岑祿便要上前動手羅古忙攔住他道你且不要急死鬼似的現在大隊還未到萬一驚動了人便怎麽了呢岑祿道難得有這樣的好機會這時再不下手等待何時呢羅古頓足道你又來亂動了你心急你一個人去罷我卻不管岑祿只得耐著性子守候了多時瞥見流兒和異丐有說有笑的一路徑向這裏走來兩個人不由的暗自納罕道難道她和這異丐有什麽噯昧的事麽正在疑慮間只見東北上煙塵大起喊殺連天他兩個料定大隊已到便要出去無奈又懼異丐來干涉只得耐著性子看他們的動靜只見巧蘇嚇得玉容失色粉黛無光拉著流兒一頭走進一個薔薇架子的下面動也不動那異丐卻飛也似地向村東去了他們倆從芍藥叢中躍了出來把巧蘇從薔薇架下拖了出去巧蘇見他們凶神似的正待要喊岑祿用刀在她的粉頰上面晃了一晃悄悄地道你喊出一聲來馬上就請你到外婆家裏去巧蘇嚇得噤口難言只緊閉星眸任他們背走流兒卻早已嚇得僵了軟癱在地半晌不敢動彈一下子等他們走了之後才從地上爬了起來飛奔回去報信了他們一面走一面商量道如今我們得了手萬不能入大隊了如果一入大隊這心肝兒一定要被首領奪去的岑祿道可不是麽我們費了多少心血好容易才將這寶貝弄到手與其替他們做一回開路神不如我們自己去受用吧他兩個說的話巧蘇句句聽見料知也難活她卻一點不怕心中也在那裏盤算著怎樣的應付他們他兩個足不點地的一直跑到日落西山差不多離開高頭村五十多裏了看著天色已晚岑祿便對羅古道現在天色漸漸的晚了我們也該去尋個住處先爲住下再作計較罷羅古點頭稱是正是說話間只見前面燈光明亮他們走近一看恰巧就是一個野店他們便下了店便喊堂倌教他收拾一個房間出來讓他們住下一面又叫了許多牛脯雞鴨之類買了十幾斤好酒二人對面坐下一齊向巧蘇說道你也一同來吧既然跟了我們就要老實些我們向來不相信裝腔作勢的巧蘇聽了這些話真個似萬箭鑽心但又不敢露於表面可惜眼淚往肚裏淌恨不得立刻尋死死了倒覺得乾淨她見了他們招呼自己又不敢不應只得含羞帶愧地走近來坐下岑祿便倒了一大杯酒雙手捧到她的面前笑道親人你卻不要拂了我的好意快些兒將這杯酒吃了她見了酒柳眉一橫計上心來頓時換出輕顰淺笑的顔色來將酒杯接了過來一仰粉脖吃了便對岑祿說道奴家久聞兩位將軍的英名無緣相見深爲憾事妾身家教極嚴平日不能越雷池半步今日有幸與兩位將軍得圖良晤賤妾不勝榮幸但是良宵不再我們今天須要痛飲一場以酬素悃她說罷捋起紗袖伸出一雙纖纖玉手便替他們滿斟了兩大觥笑吟吟地說道這一杯是賤妾的微敬蒙二位垂愛妾感激不勝請用了罷羅古岑祿聽她這一番又香又軟的話不禁魂飛魄散身子早酥了半截各人將杯中的酒直著嗓子喝了她又斟上兩觥說道這兩觥酒是妾身還敬的他們不等她說完便搶到手中吃了她又斟上兩觥說了兩句他們又吃了兩杯複兩杯一直吃到夜闌人靜將兩個人灌得爛醉如泥即時從桌上倒了下去人事不知她便在羅古的腰中將刀拔出照定他咽喉就是一送哧的一聲早已了帳順手又是一刀將岑祿結果了她放了刀將身上血迹揩抹乾淨悄悄地出了後門也不知東西南北撒開金蓮拼命價地亂走一直走了一夜到了第二天早上實在不能再走坐在道旁呻吟著足痛列位憑她這樣的姿首又是獨身單影坐在這大道之旁豈有不動人歹意的道理停了一會果然碰上一位魔頭你道是誰卻就是洛陽城有名的大騙潘同他見了她一個人坐在道旁便起了歹意攏近來搭訕著問長問短了一回便滿口應承送她回去她本是一個未經世路的人哪知就裏滿口感激不盡潘同忙雇了一乘小轎與她坐自己雇了一頭牲口在路行了好幾天那日到了洛陽她見三街六市十分熱鬧不禁問道這是什麽所在潘同謊言道這是許昌離你們家不遠了她滿心歡喜隨他走進一個人家這潘同一去杳不復來這時鴇母龜頭才將賣與他們的一番話告訴於她她方知身墮火坑了但是尋死不得求生未能只得暫行挨著不提如今再表劉備領著關張二人到了安喜縣誰知這安喜縣令是個百姓的魔頭強敲硬索無所不用其極這安喜縣的面積又小衆百姓的出產又甚少哪里經得起他來搜刮呢真是欲哭無淚天怨人愁劉備見他的行爲不正屢屢想去告誡於他奈因自己是個縣尉未便去駁斥上司未到三月朝中就有聖旨下來凡有軍功得爲長吏的人一律撤銷不上二天督郵到了安喜縣令一路滾去迎接了劉備當下帶著關張也去謁見誰知這督郵本是勢利之徒見他是個小小的縣尉哪里有眼看得起他便回絕不見惱得張飛性起霍地跳起來要去和他廝拼這正是人情冷暖原非假世態炎涼實可嗟要知後事如何且看下回分解
