body:
  text: 第一百回封閉清宮溥儀走天津暢談風月全書結總目卻說這年的陽歷十二月一日是舊曆的十月十三日上午十時爲遜帝溥儀的大婚吉期到了這一天上一班忠心耿耿的舊臣自然是十二分地忙碌了當時在那天的三更時分即內監傳命以鑾輿往迎新人去的時候從東華門出去走北池子景山東街過地安門沿途都有軍警保護著那觀看的人當然是人山人海不消說的了鸞輿出發之前有馬巡保安隊遊緝隊是開路的先鋒後面是一大隊京師的憲兵都騎著高頭大馬一嶄齊地行走著憲兵過去便是步兵一大隊皆全體武裝一個軍官率領著也徐徐地過去步兵的後頭是武裝警察是京師警察總監處派來的又有一大隊警察廳的軍樂隊繼之以總統府的軍樂隊一切的服裝都很鮮豔華麗軍樂的後面就是清室的宗人都翎頂輝煌蟒服朝珠隨著軍樂隊步行在這個時候就有一乘十六人擡著的彩輿輿夫一律繡服輿後是黃緞金頂馬車車上綴纓絡無數光明耀眼真是美麗極了車過又是幾十個內監分乘駿馬慢慢地走著算是儀仗前的頂馬了這馬隊之後是一面繡金龍的大旗足有三丈大小旗後是金瓜銀鉞一對對地排列著這就是古天子鑾駕中的儀仗了後面是大黃羅傘一頂方傘一對雉尾扇一對絳幡兩對五色金龍麾翠華幢黃龍繡旗黃緞蓋曲柄五色翠蓋大紅龍鳳蓋華蓋繡金曲柄銀龍旗五色曲柄龍鳳傘大黃緞金秀蓋曲柄鳳麾諸般儀仗一對翎的走過便是滿族親王朝衣三眼翎冠寶石頂騎馬執金節內監數十人護衛著親王後面又是宮監列成雁行的樣兒第一對是八角明燈第二對是金龍燈共是八十一對也排著過去燈過是提爐的宮監金爐裏面香煙縹緲很顯出嚴肅的氣象來提爐內監之後是宮中細樂如笙簫管笛沒有一樣不全的細樂後是大樂凡鑼饒鼓鈸也無一不有這樣之後是步行的王公大臣專代表迎親的責任也穿著朝衣翎帽排班在鸞輿前引導這時鸞輿來啦但見那鸞輿高可一丈餘上面的頂是一隻很大的金鳳四圍珠絡丁東繡幔四垂角上都含流蘇擡鸞輿的共三十二人一例穿紅綢繡衣紅纓帽上拖黃翎很齊地擡著走過鸞輿後是執長纓槍的侍衛騎著駿馬蟒袍金冠更見得威武了侍衛之後是一班忠清的大臣也朝靴朝帽有穿以前欽賜的黃馬褂的大臣都跟在鸞輿的後頭此外是衛戍司令王懷慶警察總監薛大可也穿著制服在後壓隊這樣的迎著新人從皇城沿走安定門過十字街進東安門再入東華門軍警前導到東華門止住軍樂依然隨著鹵簿直到了乾清門外也停止了鸞輿直進乾清宮方才停下來這時自乾清門到大殿都用紅緞毯鋪地殿上燈燭煌燦自有說不盡的華美宮門外面侍衛十六人都執長纓槍和指揮刀站立門前殿旁列著大鍾巨鼓以及古時帝王祭太廟的樂器器上盡紮彩綢樂工數人也穿著繡衣侍立奏樂鐘鼓的上一排就是笙簫管笛等細樂殿階之下二人著黃緞衣服手裏各拿著金編戲鞭一根樂工的奏樂止樂悉瞧戲鞭的動作對鞭交叉時就樂聲大作戲鞭分開時樂聲便立刻停止還有戲鞭上合作大樂下垂鳴細樂的分別又有黃衣黃帽的內監兩人各執靜鞭一支靜鞭這個東西是古時天子上朝或升殿所用的舊小說上不說過靜鞭三下響文武兩邊排嗎就是這意思啊因天子升殿一經靜鞭鳴過無論什麽人都得肅靜無嘩連咳嗽也不敢咳一下哩中正殿上又放著黃緞的華蓋這華蓋的起落是表示天子出殿之意這個當兒那黃蓋便張了起來靜鞭三鳴內外肅然其時贊引官徐喝禮節階下戲鞭下垂細樂悠揚齊奏大禮官引溥儀就位行敬迎禮樂聲三奏戲鞭上合大樂齊作溥儀退入於是由載洵載振兩王的福晉鞠躬而前贊引官唱新人隆輿大小樂並奏靜鞭又鳴樂聲都止兩福晉引新人就位大禮官贊禮謝敬迎禮禮畢樂聲隨行禮而作樂止贊禮官曼唱禮節贊引官同了八個內監都提了明燈和金爐引新人就位那面也由大禮官用明燈金爐引溥儀就位在禮官唱禮溥儀夫婦並立行天地禮奏樂樂止行祖宗禮仍奏樂樂止又由大禮官曼唱行皇婚禮加冠大小樂奏三次冠加畢大禮官又唱贊引官引溥儀夫婦就位行君臣禮到了君臣禮行定才行夫婦交拜禮禮畢溥儀夫婦正位受大臣親王們的朝賀禮這時滿族親王在第一起依著三跪九叩首的舊規朝拜過了就是那些親王福晉等也均由贊引官引導大禮官贊著禮一一行禮畢才令滿漢大臣列班一一朝拜大臣之後便是些太監宮女也都齊齊地叩拜朝禮既畢由大禮官喝退班禮四班宮監六十四人各掌著明燈送溥儀夫婦進宮一路香燈氤氳氣象嚴肅似神佛講座似的踏著緩步望宮中去了第二天是溥儀接見外人的日期這天的上午禮節也和昨日差不多靜鞭響處戲鞭再合曲蓋傘既舉溥儀夫婦同升大殿這時溥儀衣黃緞的繡服嵌金大褂雀頂金翎神采栩栩溥儀夫人也衣黃緞繡袍頭上戴著緞髻鳳釵銀鈿益顯出她的龍鳳之姿來夫人的後面是洵振兩王的福晉侍立在側當樂聲齊奏時外賓分排入賀溥儀一面微笑著並操起很純熟的英語說道咱們今天和諸位同在一堂非常地榮幸又承諸位相賀咱也是很感激願諸位今後共亨安寧的樂趣說著便手把酒盞微微地飲了一口又和外賓一一握手各國公使始告辭而出外賓既去又是些清室忠臣如陳玉琛梁敦彥聯芳世續等也列著隊就殿階下叩拜辜鴻銘因來得遲了乾清宮侍衛不放他進去辜鴻銘沒法便跪在乾清宮門口叩頭大哭了一物方才自去他這舉動似乎自己一片忠忱不獲知於故主所以一腔悲憤無可發泄只得叩頭大哭了溥儀這場婚禮事前雖不曾通知各處的但事後卻哄傳遠近而且有詫爲奇觀的民國的時代能再睹這君主結婚盛典也是曆史上一種紀念啊光陰荏苒轉眼是民國十四年了在十三年的冬天因爲曹錕做著賄選總統吳佩孚和張作霖在那年戰過一次張作霖大敗出關從此便養精蓄銳一心要報前仇到了去年的秋間盧永祥在浙江發難和江蘇齊燮元苦戰了兩個多月張作霖就調兵進關回應盧氏吳佩孚也傾全國之兵同張氏決戰這個當兒國民軍首領馮玉祥他受了吳佩孚的密令出兵熱河不料馮玉祥面上答應了暗中卻和奉天張作霖通了聲氣就與國民軍師長胡景翼嶽維峻孫岳等一班人私下結合好了但等吳佩孚出京進兵督戰的時候馮玉祥便由熱河回軍圍住北京囚了曹錕截斷了吳佩孚的後路這樣的一來吳氏不得不敗退天津甚至隻身走岳陽度他兵艦上的生活去了馮玉祥既倒戈進京在這當兒卻實行起封閉清宮來他的意思以爲民國成立將十四年了清宮依然存著而閉門做他的小皇帝仍舊亂贈誥命濫加封典那不是笑話嗎況現已五族共和溥儀雖是滿人也同是中華民國的人民帝位既除就是平民一樣有選舉之權是漢民同等的待遇怎麽任他妄作妄爲在那裏做小皇帝呢這是應該剷除的了加之清宮裏的器物都屬人民公有之品如今專制已沒有了這些公有物應得還我們人民至於清室的私物自然檢出來任他們取去可是清宮裏的什麽珍寶雜物何止幾十萬件既要分出公物私物勢所必然要大大的檢查一番這一場舉動把清室的一班族人嚇得手足無措了如世續耆善等紛紛四面運動要想取消封閉清宮的成議哪知馮玉祥以迅雷不及掩耳的手段派旅長鹿鍾麟率領衛隊迫令把清宮封閉限日組織清室善後委員會檢查清宮物件一面限令清宮嬪妃內監即日遷出於是清宮大起恐慌別的不講單說二千余的太監宮人一時也沒處安插哩倘別處去賃房屋也沒這般寬敞宏大啊然因國民軍催逼緊急只得由世續先把外府的太監五百人給資遣散可於倉忙之中有些內監不及於收拾物事的空身走了出宮遣散費每人不滿十元這班太監既成了殘廢之人平日是坐吃不工作慣了的一沒地依身叫他們去幹什麽呢因此有百多個太監立在宮門前掩面痛哭形狀很是淒慘那些宮女倒出去可以配夫成家不比太監們無可容身的困苦咧其時溥儀見國民軍要封閉宮廷慌得不得了當由他的英文教習莊士敦雇了一輛汽車令溥儀扮做日本裝束在汽車裏如飛地望德國公使館來恰德國公使不在館裏莊士敦又令汽車馳往法國領事館去法公使卻拒絕不收莊士敦不得已只好到日本領事館裏又逢著日本領事公出溥儀見幾個不討巧心上著急了起來莊士敦又替他設法再到日本兵營裏當由書記官打電話給芳澤公使芳澤公使便乘車到日本兵營親自接了溥儀到使館裏並收拾一個房間與溥儀居住芳澤公使答應保護溥儀的安全第二天上又把溥儀夫人也接了來同居那時世續等一班舊臣到日本領事館裏叩頭給溥儀請安過不上幾天適逢溥儀的生辰聯芳梁敦彥耆善等一齊乘了汽車去給他們的故主拜夀溥儀雖爲遜帝但他若很安分地就在北京城裏也不至於惹人注目偏偏那些故日的臣子上奏疏哩求封典哩叩賀哩弄得烏煙瘴氣溥儀不安起來一有些風吹草動就要逃走躲避其實他也不過一個平民誰去害他有甚危險呢但給這一班舊臣痛哭流涕地一來轉把溥儀身價擡高依然放出皇帝的場面來啦當溥儀到日本使館時國民政府質問他爲什麽要逃走呢清室回答恐怕有危險但溥儀遷居由國民軍衛兵在門外保護他覺得很不自由而且起了疑心所以逃往使館不過北京的謠言一天盛似一天都是不利溥儀的謠言溥儀身居日本使館心裏兀是不安於是和日本領事商量請他保護出北京芳澤公使允許了即命日本書記護衛著溥儀乘了火車出京一聲汽笛長鳴故國幼主也隨著汽笛聲音風馳電掣般地多往天津去了這裏國民軍迫著清宮遷出那清室的瑾瑜兩太妃死也不肯出去瑾太妃大哭道咱們國亡家破連一點宮室都不留住嗎咱願死在宮中不出去的了清室族人王公大臣等一齊來勸著道這是民國政府的命令現在暫爲遷出去將來仍要進來的瑾太妃怒道無論以後怎樣如今要咱出宮是萬萬不成功的瑜太妃也是這樣的說法好容易給皇族們再三的勸慰終算把瑜太妃勸轉了但不願單身出去必得和瑾太妃同走這時大家又去勸瑾太妃百般地解釋連騙帶哄才把瑾太妃也說醒了當下就擇了一個吉期準備遷移出宮清室至此就算根本剷除了漢代宮廷豔史第二部民國徐哲身著
