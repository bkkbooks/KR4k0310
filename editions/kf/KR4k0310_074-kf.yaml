body:
  text: 第七十四回防懿妃文宗草遺詔立怡王肅順奪國璽卻說圓明園偌大一個花木勝地被巴夏禮付之一炬之後頓時煙消霧滅那四春之中要算牡丹春的結果最好那海棠春進得園來因想念金宮蟾想得厲害不到一年工夫在咸豐帝最寵愛的頭裏她便鬱鬱而死只有杏花春得到皇上寵愛的日子最多她手頭積蓄的錢也最富她在宮中和誰都沒有交情無論什麽人托她在皇帝跟前說一句話她總非錢不行因此宮裏的人沒有一個不恨她的但是杏花春手頭的錢一天多似一天她有二十萬兩銀子托她主母放在外面生息此外零零星星三萬五萬的都由總管太監替她拿出去存放在錢莊裏她自己的屋子裏還存著二三千兩黃金此外金珠首飾不計其數只因她平日待人不好到了出事體的這一天那班宮女太監們各自逃命也沒人去通報她待到天明杏花春從枕上醒來皇上已去了園裏已是天翻地覆似地鬧成一片杏花春正要起來打聽時早有一班年老的太監宮女們惡狠狠地打進房來便在床上大家齊動手把杏花春活活勒死把她所有的金銀珠寶搶掠一空可憐一個脂粉嬌娃她屍首挺在床上直到渾身腐爛也沒人來收拾再說那陀羅春自從她進得園來每日在一座小庵裏長齋禮佛宮中人人見她可憐到皇上臨走的一天便有管宮太監悄悄地去告訴她陀羅春自進園來早把死生置之度外聽了太監的報告她也不驚惶依舊念她的經卷直到園中的宮女太監們俱已走盡便有一個小太監來勸她出園去又說如今園裏沒有人查問盡可以放膽出園回家去陀羅春聽說可以回家不覺心中一動便也略略收拾些細軟物件跟著小太監走出庵來看看滿園荒涼到處塵封她心中起了無限感慨回心一想如今家裏母親爲她死在宮裏了便是要回去也沒有家了生成一個薄命人便是出得園去也沒有好日過的她便起了一個決心這時正走到萬方安和的字橋上看看那小太監在前面走著她便出其不意地一縱身向池心裏一跳只聽得噗通一聲那池面很大陀羅春一個嬌小身軀早不知蕩到什麽地方去了這時候園中靜悄悄的四面不見一人也無處可求救倒累得這小太監對著池子大哭一場這陀羅春溺水以後的第七天上那圓明園便遭了火災寂寂一座園林一任那狂風烈焰把它卷得寸草全無圓明園被毀的消息傳到行宮裏把個咸豐帝氣得病勢越發加重厲害的時候還暈絕過去幾回那英法聯軍又聲稱要攻打紫禁城孝貞後得了這個消息忙傳諭給恭親王叫他從速議和這時有一個俄國海軍少將名叫普查欽的他見有機會可乘便去鼓動俄國公使名伊格葉替耶夫的出來排解勸英法兩國和中國議和照道光年間的和約增加九條法國也增加十條和約把天津開做商埠賠償英國兵費銀一千二百萬輛賠償法國兵費銀六百萬兩這和約奉到行宮裏咸豐帝把端華肅順兩人召進宮去商議那端華肅順兩人和恭親王是素來不對的當下看了這和約便說道大爺辦事如此不中用照此下去將來俺們還有好日子過嗎咸豐帝也拿不定主意因爲孝貞後和懿貴妃是素日預聞朝政的便也把這一後一妃喚來和她們商議這孝貞後是忠厚人見如此大事卻一時不敢下斷語獨有那懿貴妃她卻大著膽侃侃而談說如今兵臨城下外國人不滿所欲決不甘休的這件事錯在當初那班耆英牛鑒桂良花沙納混蛋手裏當初事尚可爲便一味地媚外誤國示弱乞和以致鑄成今天的大錯如今天子蒙塵在外京師危在旦夕南有發匪之禍北有撚匪之亂內訌未清怎當得再有此外患不如請佛爺乾機獨斷就此准了他們的和約一來外兵可以早日退去二來佛爺也可以早日回鑾在宮中養病總比在這行宮裏諸事不便的強得多一席話打中了咸豐帝的心窩咸豐帝抱病在外原天天想回宮去當下便依懿貴妃的主意批准了和約一面諭令恭親王收拾宮殿繕修城郭直到秋末冬初才把宮禁收拾停妥聯軍也退出京了仍由恭親王領銜籲請皇上皇后返蹕誰知這時候鹹豐帝大發起哮喘病來住在行宮裏一步也動不得只得暫把回鑾的事體擱起懿貴妃帶了皇子載淳早晚在皇上榻前侍奉湯藥咸豐帝經此亂離之後見了懿貴妃想起從前的一番恩愛便把從前的宿恨一齊忘去漸漸地依舊寵愛她起來懿貴妃見自己又得了勢豈肯錯過這個機會她便拿出體己銀子來在宮裏聯絡安崔兩個總管又托崔總管暗地裏去聯絡他的侄兒榮祿卻說懿貴妃的母家原有一個弟弟名叫桂祥懿貴妃住在天地一家春最得皇上寵愛的時候真是言聽計從懿貴妃滿意要把她弟弟提拔起來做一個京官在外面也可以和她通通聲氣誰知這桂祥卻是一個傻子雖做了京官卻還是呆頭呆腦的一點事體也不懂懿貴妃看看自己的兄弟不中用便改變方針一意提拔她的侄兒榮祿榮祿是一個聰明刁滑的人他得了功名便在滿朝中拉攏別人看他是寵妃的家裏人自然另眼相看不多幾年工夫竟被他爬上滿尚書的地位在朝中也頗有權勢他見恭親王是皇上親信的人便也和恭親王好這恭親王也不知不覺落在他彀中兩人十分莫逆起來如今見他姑母打發崔總管來聯絡他姑侄一家人沒有不幫忙的彼此心照不宣由榮祿去聯絡恭親王從此恭親王也做了懿貴妃一黨的人懿貴妃看看裏外都已打點停妥在皇上跟前便慢慢地掌起權來那孝貞後原是不會說話的人凡在外來奏章都由懿貴妃讀給皇上聽皇上這時精神十分衰弱凡事都叫送孝貞後決斷去這孝貞後又看懿貴妃生得比自己聰明有才情便諸事和她商量後來懿貴妃索性獨斷獨行自己在奏摺上批定了再給孝貞後看孝貞後心中不以爲然但她也無意爭權便一任她做去自有一班朝中大臣打聽得懿貴妃預聞朝事便大家拿著整萬的銀子走安崔兩總管的路子去孝敬懿貴妃懿貴妃得人錢財與人消災便也替他們在皇上跟前說說好話偶然說幾次皇上卻也不覺得後來見懿貴妃盡替外面大臣們說好話咸豐帝便覺得這妃了有些靠不住心中便有些厭惡她起來這時咸豐帝病勢一天重似一天懿貴妃知道皇上是不中用了的便想到將來自己的地位緊拉著皇子天天在皇帝榻前絮聒說佛爺只有這一個皇子將來百年之後總是這載淳繼承大統了如今外面大臣頗有主張立長君之說佛爺何不趁現在立定了太了免得日後俺們娘兒吃虧咸豐帝聽了心知這是懿貴妃有意造謠但是如今只有這一個皇子將來這個皇位總是逃不了是她兒子的了便也樂得答應她又安慰她不必多心將來總傳位給你兒子總給你升做太后懿貴妃聽了皇上這幾句話心才放下皇帝害的是癆損病那身體一天瘦似一天精神一天委頓似一天他心地卻十分明白他在病中暗暗地留心懿貴妃的舉動覺得貴妃仗著自己將來可以做太后便漸漸有些跋扈起來有時甚至和孝貞後對口不肯相讓有時外面有奏章送進來貴妃便不和孝貞後商量竟自獨斷獨行批交出去咸豐帝心知這貴妃將來是不得了的人心中十分憤怒覰著懿貴妃不在跟前的時候皇帝便把肅順召到床前來這時孝貞後也陪在床前咸豐帝氣憤憤地對肅順說道懿貴妃十分跋扈留此人在世將來必是皇家的大害朕打算趁朕未死之前賜她一死除了宮中的大禍那肅順聽皇帝說出這個話嚇得他只是趴在地下磕頭不說一句話停了一會皇上又說道不然朕留下遺旨朕死以後便將懿貴妃殉葬孝貞後到底是忠厚人聽了皇上的話覺得懿貴妃甚是可憐便替貴妃再三求恩說懿貴妃生有皇子母以子貴萬歲便格外開恩饒她一二萬歲若賜她一死將來皇子繼位追念生母叫他何以爲人孝貞後說得聲淚俱下咸豐帝也感動了便說道朕如今看在皇后面上饒她一死但是這懿貴妃是陰險刁刻的人朕死以後無人可制得住她朕如今須寫下遺詔使他不敢放肆說著便竭力支撐著從床上坐起來命肅順端過筆硯來就床上寫下遺詔道咨孝貞太后懿貴妃援母以子貴之義不得不尊爲太后然其人絕非可倚信者即不有事汝亦當專決彼果安分無過當始終曲予恩禮若其失行彰著汝可召集廷臣將朕此旨宣示立即誅死以杜後患欽此寫畢叫皇后在詔書上寫下名字又叫肅順也寫下名字便交給孝貞後收下那孝貞後正要收藏忽然又交還皇上奏稱這詔書也得傳示外臣請恭親王來此寫上名字將來萬一有事也得內外相應皇上聽了皇后的話也說不錯便一面下諭傳恭親王奕訪火速趕赴行在一面暫把這遺詔收藏在枕邊這時懿貴妃在皇帝左右早已布下耳目她見皇上情形對她一天冷淡似一天心知有些不妙便在背地裏囑咐安崔兩個總管留心察看動靜這一天皇上和皇后肅順兩人密議的事體崔總管在窗外也略聽得一二只是不敢久站在窗下怕被人看見因此皇上說的話他也不曾聽得完全心知是不利懿貴妃的便忙去通報與懿貴妃知道懿貴妃聽了心中十分害怕一時也估料不出什麽事體來滿心焦躁害得她幾夜不曾闔眼恰巧有一個機會到了皇上病了多日身體睡在床上骨瘦如柴覺得十分酸痛頗想人在身上捶捶那時有一個姓陸的禦醫他是懂得推拿的便按著穴道替皇上推著皇上依舊是個不舒服後來總管喚來一個太監名叫李蓮英的進來替皇上按摩著這李蓮英原懂得這按摩法子的當下替皇上按摩著經過他按摩的地方筋骨都十分舒適按摩到胸口皇上便沈沈睡去從此皇上十分喜歡這個李蓮英每日非把他傳進宮去按摩一次不可李蓮英也發乖覺他趁皇上閉上眼睡去的時候便擡起頭來留心看這屋子裏的情形他一眼見皇帝枕頭邊露出一隻紙角兒來只見得其人絕非可倚信者一句他知道這一張紙總與一個人有利害關係的他一轉念便想到懿貴妃莫非這上面說的是懿貴妃麽也便大著膽兒伸過手去把紙角兒拉出來一看把遺詔上面的話統統看在肚子裏這時李蓮英身後站著一個人便是崔總管他們原是同通一氣的李蓮英便不在意正想把這遺詔偷下來忽然孝貞後走進房來了崔總管拿靴尖兒輕輕地踢著他李蓮英忙縮住手拿一方手巾遮住那遺詔退出來急急去告訴懿貴妃原來這李蓮英是懿貴妃極親信的人進宮的年數雖不多卻深得懿貴妃的寵用他本是河間地方人在一家硝皮鋪子裏當學徒人家都喚他皮硝李家裏十分窮苦常常不得溫飽那河間地方有許多人是在宮裏做太監的崔總管恰巧住在他鄰近有時見崔總管告假回家拿著許多金銀回來又說宮裏如何好玩如何有勢力這時李蓮英年紀只有十六歲卻十分勇敢聽說宮中如此好玩便瞞住了父母把自己下身東西割去了痛得暈絕過去他父母請醫生用藥擦抹止住了血他在床上睡了三四個月便平復了他趕進京去找到崔總管求他帶他進宮去當一名小太監崔總管留他住在自己下處守候機會過了幾天怡巧懿貴妃要雇一個年輕的太監當梳頭房裏的差使崔總管便把李蓮英領進宮去懿貴妃見他面目清秀語言伶俐便也歡喜了又叫他試試梳頭這李蓮英原是專門在女人身上用功夫慣的他服侍起女人來溫存體貼嫵媚玲瓏如今第一次替懿貴妃梳頭便格外小心懿貴妃十分愛惜自己的頭髮又是怕頭皮痛的因此李蓮英便放出輕靈的手段來替懿貴妃梳成一個頭非但頭皮一點不痛頭髮一絲不脫且那頭樣子梳得玲瓏剔透最叫懿貴妃歡喜的他能每天換一個頭樣子而且他換的樣子越換越好看每一個樣子總有一個吉利的名字什麽富貴不斷頭天下太平頭一團和氣頭龍鳳雙喜頭懿貴妃的脾氣最是愛吉利的如今聽見這許多吉利名字不由得她不喜歡李蓮英還生成一張利嘴到沒事的時候搬些鄉下故事村莊野話出來說說又對上了懿貴妃的勁懿貴妃最愛聽故事到氣悶的時候便傳李蓮英進房去講故事李蓮英肚子裏的故事真多天天說著也沒有說完的時候他人又生得聰明無論什麽笑話故事都能隨嘴編排得出來說到發笑的時候引得懿貴妃笑得前仰後合伸手打他罵他小鬼頭李蓮英又天生成一副媚骨任你如何打他罵他他總是花眉笑眼的懿貴妃到憤怒愁苦的時候全靠著他解悶兒李蓮英還有一件絕技惹人喜歡的是他自幼學得一副好嗓子無論南北小調京陝戲曲他都能唱而且唱來抑揚宛轉十分動聽這一件又對上了懿貴妃的胃口懿貴妃原是愛唱的自從有了這李蓮英有時跟著學幾句詞兒有時靜靜地聽他唱幾折京調聽到高興的時候便也夾在裏邊對唱著滿間屋子只聽得他兩人咿咿呀呀地唱聲李蓮英又最能體貼女人的心理凡是女人的苦處女人的性格他都體會得出來和那班宮女們談起天來句句說在女孩兒們的心窩裏因此上上下下的宮女們都和他好李蓮英又懂得按摩的法子懿貴妃每到骨節酸痛的時候便傳李蓮英來替她按摩說也奇怪他按摩的時候叫人渾身舒服口眼都閉因此種種懿貴妃十分寵愛他每晚留他睡在榻旁到清醒的時候和他談些家常事體李蓮英也能迎合意思屈意對答懿貴妃如此寵愛李蓮英倒把崔總管疏淡下來李蓮英心中感激貴妃的恩德便處處幫著貴妃如今在皇上枕邊見了這張遺詔便急急地來告訴貴妃知道貴妃聽了一時無法可想打聽得皇上病勢十分沈重她便天天帶了皇子去坐在皇上榻前借此可以監督著皇后的舉動這時恭親王奕訢也到行在來過也在遺詔上寫了名字實在恭親王暗地裏已入了懿貴妃的党便暗暗地把這消息去告訴榮祿這時大學士肅順鄭親王端華禦前大臣額駙景壽軍機大臣兵部尚書穆蔭吏部左侍郎匡源署禮部左侍郎杜翰太仆寺少卿焦佑瀛等一班大臣天天秘密商議只怕將來懿貴妃仗著幼子的勢力竊弄大權便打算俟咸豐帝死後公勸怡親王載垣爲嗣皇帝載垣知道懿貴妃生有皇子自己強奪皇位只怕群臣不服便說皇子年幼借托當今皇上有遺詔命他爲監國攝政王無奈肅順等一班人不答應這件事體還不曾議定那咸豐帝便死在煙波致爽殿上了皇上一死肅順一班人一不做二不休索性自稱爲贊襄政務大臣說大行皇帝遺詔立怡親王載垣爲嗣皇帝改年號稱棋祥元年又傳諭留京王公大臣恭王榮祿等不必奔喪不日當奉梓宮返京這時懿貴妃早料到肅順的計謀皇上一死她便把那顆傳國璽收藏起來肅順進宮去向孝貞後索取國璽孝貞後這時見肅順來勢洶洶深怕出了什麽變故便也幫著懿貴妃哄著肅師道那傳國璽早被六王爺帶進京去了那肅順聽說玉璽不在行宮裏便急於要進京去這裏懿貴妃看看事體緊急便抱著皇子載淳跪在孝貞皇后面前求她幫助那孝貞後看懿貴妃說得可憐又想她生有皇子這大統總應該皇子繼承下去便把懿貴妃扶起來答應幫助她懿貴妃便寫了一道詔書蓋上國璽暗地裏打發膳房總管喜劉星夜趲程進京去送給醇王恭王榮祿三人叫他們按計行事這裏肅順要把後妃兩宮留在熱河自己先奉梓宮進京去無奈孝貞後不答應肅順沒法只得請孝貞後奉著梓宮一塊兒進京去要知後事如何且聽下回分解
