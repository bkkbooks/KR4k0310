body:
  text: 第七十六回安得海好貨取禍鄭親王貪色遭殃卻說恭王接了丁寶禎一道密折知道安總管私自出京在山東地方十分騷擾他看了這奏章不覺又憤怒又歡喜憤怒的是安得海膽大妄爲歡喜的是安得海惡貫滿盈如今趁此機會可以殺了安得海重振朝綱恭王進宮去的時候已把殺安得海的諭旨擬就連丁寶禎的奏摺一齊上呈慈安太后觀看慈安太后看了大駭說道這奴才如此妄爲還當了得他如今連俺家的祖訓也不顧俺也顧不得西太后的情面了總是國法家法要緊說道立刻在那諭旨上用了印恭親王拿著就走這時西太后正由太監李蓮英傳了一班戲子來在長春宮裏聽戲西太后于戲曲一道是很有心得的如今傳的又是內城的著名角兒早把個西太后聽出了神所以恭親王在暗地裏進行殺安得海的事體西太后那邊一點風聲也沒有那丁寶禎上了密折以後不多幾天便接到內廷密旨了丁寶禎看時見那諭旨上寫道據丁寶楨奏太監在外招搖煽惑一折德州知州趙新稟稱七月間有安姓太監乘坐太平船二隻聲勢炫赫自稱奉旨差遣置辦龍衣船上有日形三足鳥旗一面船旁有龍風旗幟帶有男女多人並有女樂品竹調絲兩岸觀者如堵又稱本月二十一日系該太監生辰中設龍衣男女羅拜該州正在訪拿間船巳揚帆南下該撫已飭東昌濟寧各府州飭屬跟蹤追捕等語覽奏深堪駭異該太監擅自遠出並有種種不法情事再不從嚴懲辦何以肅官禁而儆效尤著馬新貼張之萬丁日昌丁寶禎迅速遴派幹員於所屬地方將六品藍翎安姓太監嚴密查拿令隨從人等指證確實毋庸審訊即行就地正法不准任其狡飾如該太監聞風折回直境即著曾國藩一體嚴拿正法倘有疏縱惟該督撫是問其隨從人等有迹近匪類者並著嚴拿分別懲辦毋庸再行請旨將此由六百里各密諭知之欽此安得海伏法以後十天工夫慈安太后又命恭親王擬第二道諭旨上面寫道本月初三日丁寶禎奏據德州知州趙新稟稱有安姓太監乘坐大船捏稱欽差置辦龍衣船旁插有龍鳳旗幟攜帶男女多人沿途招搖煽惑居民驚駭等情當經諭令直隸山東江蘇各督撫派員查拿即行正法茲據丁寶禎奏已於泰安縣地方將該犯安得海拿獲遵旨正法其隨從人等本日巳諭令丁寶禎分別嚴行懲辦我朝家法相承整飭宦寺有犯必懲綱紀至嚴每遇有在外招搖生事者無不立治其罪乃該太監安得海竟敢如此膽大妄爲種種不法實屬罪有應得經此次嚴懲後各太監自當益加儆懼仍著總管內務大臣嚴飭總管太監等嗣後務將所管太監嚴加約束俾各勤慎當差如有不安本分出外滋事者除將本犯照例治罪外定將該管太監一併懲辦並通諭直省各督撫嚴飭所屬遇有太監冒稱奉差等事無論已未犯法立即鎖拿奏明懲治毋稍寬縱西太后見了這兩道諭旨以後才知道那安得海已經正法她不覺又傷心又憤怒又慚愧便也不顧太后的體面氣憤憤地直趕東宮去那慈安太后正在宮中午睡聽說西太后來了還不知什麽事體忙起來迎接那慈禧太后進來的時候身後跟著許多宮女太監聲勢洶洶慈禧太后待到走進慈安太后的寢室也不向慈安行禮氣憤憤地在椅子上一坐那臉兒氣得鐵也似青只是不做聲倒是慈安太后笑吟吟地上去問道怎麽氣得這個樣子那慈禧太后見問便放聲大哭又撞著頭又頓著腳多少宮女上去拉勸都勸不住把個慈安太后嚇怔了一句話也說不出來慈禧太后哭到傷心的時候便搶到慈安跟前仆地跪倒一頭撞在慈安太后的懷裏揉搓著一面哭喊著道太后原是正宮出身俺是婢子出身如今婢子犯了法求正宮太后賜我死了罷弄得慈安太后好似丈二金身摸不著自己的頭腦只得忍著氣拿好話勸她起來慈禧太后止住了哭才正顔厲色地質問慈安太后說殺安得海的事體爲什麽不和俺商量先帝在日俺還不曾封後還常常叫俺商議朝政來如今做了皇太后這殺安得海的事體爲什麽不和俺商量卻和六爺去商量這不但六爺眼中沒有俺這個皇太后且在太后眼中也明明是瞧俺不起如今我不求別的只求太后賜俺一死免得俺在皇上跟前丟臉老實說一句話那安得海是俺打發他到山東去的如今殺了安得海明明是剝俺的臉皮叫俺在宮中如何做得人呢說著又大哭起來慈安太后是一個幽嫻貞靜的女子如何見過這陣仗兒早氣得手腳索索地抖說不出一句話來掙扎了半天才掙扎出一句俺從此以後不問朝政了諸事聽憑聖母太后管理去本來皇上是聖母皇太后的皇上俺只求老死在宮中吃一口太平飯兒便也心滿意足了慈安太后說著擔不覺流下眼淚來兩宮正鬧得不得開交的時候忽然說萬歲爺來了這時同治皇帝也有十二歲了身材長得很高大穿著輕衣小帽十分清秀他走進屋子來向兩宮行過禮便問皇太后爲什麽生氣慈安太后便告訴他殺安得海的事體原來同治皇帝年幼素來不問朝政終日裏在皇宮裏遊玩著一切事體都由兩位太后主政所以殺安得海的事體同治皇帝並不知道如今聽慈安太後說了才哈哈大笑道這個王八羔子狗奴才殺得好慈禧太后聽皇帝罵人把臉也變了顔色忙站起身來回宮去這同治皇帝也不理會帶了諳達太監們到內苑遊玩去了你道這同治皇帝爲什麽這樣切齒痛恨安得海原來安得海在宮中掌權日久那三四千太監趨附他的也有怨恨他的也有安得海人又長得漂亮專在西太后跟前伺候西太后這時年紀也只二十七八歲正在盛年的時候又愛和太監說笑便有許多人說安得海並不是真太監是外邊人混進宮來行從前呂不韋和嫪毒的計策同治皇帝年紀雖小人卻十分乖覺聽了旁人的言語心中本已十分恨這安得海了後來安得海得了慈禧太后的歡心越發不把別人放在眼裏他連皇帝也侮辱起來了有一天安得海正和一班太監們站在太后寢宮的廊下說閒話遠遠地見皇帝走來那太監們個個垂下手上去請過安惟有那安得海不獨不上去請安他連手也不垂下那皇帝便大怒便喝叫拉去用家法那安得海才害怕起來忙跪下來磕響頭求饒慈禧太后在屋裏聽得了便把皇帝喚去了反狠狠地將皇帝訓斥了一場說安得海是先皇手裏得用的奴才便有小過失也須先請太后的示才能動家法幾句話把個小皇帝氣得在背地裏拿小刀砍著他玩弄的泥人的腦袋伺候皇上的太監問皇上是什麽意思那皇上惡狠狠地說道是殺小安子如今聽說安得海被慈安太后傳旨正法皇上心中如何不喜講到這位同治皇帝因自小生長在圓明園和熱河行宮的那兩處地方的宮禁卻沒有大內一般森嚴離街市又近自幼兒便有太監們抱他到市上去遊玩後來長大起來那市井一切遊玩和街道上熱鬧的情形他都看在眼裏如今進得京來自己又做了皇帝殿陛森嚴宮庭寂寞把個活潑的小皇帝關得心中十分煩悶便有一班小太監伴著皇上想出種種遊玩的法子來哄著皇上什麽踢氣球踢毽子游水跑冰弄船唱戲各種遊戲都玩著玩到高興的時候皇上也夾在裏面玩那恭親王的兒子載澄也和同治皇帝同年伴歲同治皇帝在圓明園在熱河都是載澄和他做伴玩耍的如今兩人多年不見了同治皇帝把他傳進宮去兩人依舊在一塊兒玩耍那載澄又是一個淘氣的小孩子在京城各處地方遊玩又學得許多淘氣的遊玩法兒他兩人都拿小太監做玩物後來同治皇帝又想出一個摜交的法子來那摜交的玩法兒要身材瘦小腰肢靈活先拿一張板凳叫小太監站在板凳上面那上身向後彎轉去手尖兒接著自己的腳後跟肚子挺起一個身體好似一個蔑圈兒再把兩條腿摔過去接著手尖兒這樣子摜著愈摜得快愈好摜到七八十個那板凳面上的地位一絲也不許移動那班小太監初練的時候不免腰肢生硬被皇上用兩手在他肚子上硬按下去立時吐出血來死的也有把腰骨按斷的也有從板凳上摔下來磕破腦袋立刻死去的也有一天裏面總要弄死幾個小太監來任你太后如何勸說他總是不聽後來這摜交的事體宮裏的小太監人人會了一時把這法子流傳到外面去頓時京城裏面各戲園裏都學習起來同治皇帝年紀到了十四歲智識漸漸地開了再加上載澄在一旁提調著便慢慢地找宮女玩兒去了一時被他糟蹋的宮女也不知道有多少後來還是慈安太后暗地裏留心看出來便對慈禧太后說要給皇帝提親事了這時慈禧太后自從和慈安爭鬧以後便老實不客氣凡事獨斷獨行每天垂簾聽政的時候遇有大臣們奏對慈禧也不和慈安商量也不待慈安開口便自管自下諭旨慈安看看沒趣從此著著退讓連臨朝也不臨了恭親王雖是忠心于慈安的但見慈安沒有膽量自己又要保全性命只得轉過方向來竭力去聯絡崔總管李太監托崔李兩人替他在慈禧太后前說好話那慈禧太后初時知道殺安得海的事體是恭親王主謀的便把恭親王恨入骨髓常常想借別的事體革去他的職後來還是榮祿勸住說六爺不但是皇家近支且是先朝顧命之臣再者先皇有密詔在他們手裏怕逼他們狠了他們索性拿出密詔來于太后臉上不大好看慈禧聽榮祿的話果然不錯便只得暫時罷手那榮祿卻在暗地裏拉攏恭親王他知道恭親王是一朝顧命無論如何總是排擠不開的還不如籠絡他叫他幫西太后的忙這時恭親王正在勢孤的時候見有人來招呼他他樂得順水推船倒在慈禧太后的這一面處處謹慎小心聽慈禧太後的命令這慈禧太后添了一個大臣幫助卻也把她從前的仇恨一筆勾銷只可憐把慈安太后撇在宮裏冷冷清清地也沒有一個心腹可以商量得的但是在慈禧太后心中還認做咸豐帝的密詔在慈安手中還懼憚三分不敢立刻下毒手實則那張咸豐帝的密詔早已不在慈安太后手中了也不在恭王手中卻在醇王福晉的手中當李蓮英見了遺詔去告訴西太后西太后忙托人去求著醇王福晉醇王福晉聽了立刻套車趕進宮去走進屋子恰巧咸豐帝斷了氣醇王福晉趁衆人不曾到來的時候忙在皇帝身邊搜得密詔藏在衣袋裏她滿擬拿去給慈禧太后看的又怕從此多事便拿去藏在自己家裏哄著慈禧太后只說不曾拿到這一來免得兩宮多生意見二來也叫慈禧太后心裏有幾分恐懼不敢過於欺侮慈安這原是很好的法子到同治皇帝成年的時候慈安和慈禧爲了皇帝大婚的事體雙方又各起爭執原來同治帝年紀漸漸長大起來於男女之間的事體也有些一知半解再加上同治帝在宮中隨處亂闖宮女們也不避忌那太監們閒空下來攢三聚五地也歡喜講些風流故事這一天正是大熱天午後太后正息著宴那班太監圍坐在穹門口納涼各人信口開河地說些閒話內中有一個太監便說起肅順殺頭的事體說肅順臨到砍頭的時候還拿十分齷齪的話罵著西太后劊子手拿刀口擱在他嘴裏舌頭也割破牙齒也磕落他滿嘴流著血還是罵不絕口呢另一個太監接著講了肅順父親的一樁風流案件肅順的父親便是鄭親王烏爾棍布肅順是姨太太生的那姨太太是回族家裏的女兒原是個好人家有一天鄭親王下朝來車子過裱背胡同口見一個絕色的女孩兒心裏不覺大動回到王府裏時時刻刻想著女孩兒便喚一個心腹包衣姓趙的去打聽打算買她來做小老婆那姓趙的去了一打聽知道那女孩兒的父親是回族家裏雖很窮苦但那女孩兒已說了婆家了姓趙的也無法可想照直地去回復鄭王爺誰知這鄭王爺和那女孩兒前世宛似有一劫的他卻非把這女孩兒娶來做小老婆不可限那姓趙的三個月時間務必要把那女孩兒弄到便是花十萬八萬銀子也是願意的那姓趙的在急切中想出一條計策來恰巧那裱背胡同裏有一座空屋子那姓趙的去租下來住著和那女孩兒的父親做朋友做得十分知己常常拿銀錢去幫助他那女孩兒的父母十分感激姓趙的看看期限快到了一時卻也想不出下手的方法這時候鄭王忽然接到管步軍統衙門的差使到任第三天解到了一批盜犯那姓趙的忽然想得了計策拿錢去打通強盜叫他咬定那女孩兒的父親說是他們的窩家又故意埋贓在她父親家裏把那女孩兒的父親捉來和強盜一塊兒殺了頭姓趙的又出面拿出銀子來替她家埋葬又拿錢去周恤她母女兩人另外又叫人假造了他父親在日的借票到這女孩兒家裏去逼討得十分緊急姓趙的又替他還債把她母女兩人感激得什麽似的那姓趙的又在暗地裏指使他地方上的青皮闖到那女孩兒家裏去調戲那女孩兒故意鬧得給她婆婆家知道說他那未過門的媳婦是不貞節的她婆婆家知道了大怒便退了那女孩兒的婚事那母女又是怨苦又是窮困便來和這姓趙的商議姓趙的替他想法子把她女孩兒去說給鄭親王做姨太太又賞了她母親三千銀子她母女兩人到了這山窮水盡的時候也無可奈何只得把這絕世美人斷送在王府裏誰知這女孩兒一進了王府第二年養出一個男孩兒來便是肅順不多幾年那鄭王便害惡瘡死了那瘡名叫落頭疽在頸子四周爛成一圈直到頭落下來才死京城裏的劊子手能把砍下來的腦袋依舊縫在頸子上的那鄭親王的屍身也喚那鄶子手縫上了頭才收殮最奇怪的那姓趙的同時也害落頭疽死了那太監講完了這樁故事忽然穹門背後轉出一個同治皇上來把那班太監嚇了一大跳忙上去請安皇上倒也一不理會便找著那講故事的太監問他道那鄭親王千方百計地要了那女孩兒來何用什麽叫做小老婆那班太監聽皇上問這個話他們要笑又不敢笑要說又不好說得內中有幾個壞的便在背地裏指導皇上如何如何玩弄女人那皇帝聽了覺得十分新奇從此他見了宮女便拉住了試驗一時裏被皇帝糟蹋的宮女不計其數那宮女吃了虧也無從告訴消息慢慢地傳到慈安太后耳中便去和慈禧太后商量要給同治帝大婚慈禧太后卻也有這個意思便立刻傳諭禮部工部及內務府預備一切皇宮裏的規矩皇帝在大婚以前先要選八個年紀稍長的宮女進禦名叫伺帳司寢司儀司門同治帝便選八個平日自己所心愛的宮女去一一進禦又請皇上選定答應幾人常在幾人貴人幾人嬪幾人妃幾人貴妃幾人皇貴妃幾人一一都挑選停妥然後再挑選皇后當時慈禧的意思要選侍良鳳秀的女兒做皇后慈安太后的意思卻喜歡承恩公崇綺的女兒做皇后兩宮爲了這選後的事體又大大地爭執起來了在慈安的意思說崇綺的女兒面貌又美麗舉動又端莊今年恰好十九歲雖比皇上年紀大幾歲但也很懂得規矩正可以做得皇后像鳳秀的女兒年紀只十四歲怕不能十分懂得人情事體面貌既不十分美舉動又是十分輕佻怕不能母儀天下這幾句話觸惱了慈禧太后說慈安有意削她的臉便大鬧起來慈安太后這時早已被慈禧的威力壓倒了見慈禧太后對她咆哮氣得她一句話也說不出來到後來慈安太后想出一個主意來說俺兩人也不用爭執這是皇上的事體俺們不如請皇上來聽皇上自己挑選罷慈禧太后心想皇上是自己的兒子沒有不聽俺的說話的當下便把皇上去請進來說出這兩位格格來請皇上自己挑選這兩位格格平日進宮來遊玩皇上也曾見過當下他便選中了崇綺的女兒稱爲孝哲皇后又封鳳秀的女兒做慧妃這是皇上的主意慈禧太后便也不好說什麽一時裏皇宮裏面便十分熱鬧起來了大婚的這一天開了大清門把個皇后從這門裏擡了進來那慧妃卻於早一日進宮伺候著皇后皇帝皇后告過天地行過大禮拜過宗廟見過兩位太后以後同治帝便坐大殿受百官的朝賀那座大殿蓋造得十分氣概殿下面鋪著白石階級共有二十層兩旁白石圍欄階的盡頭四壁長廊廊下支著朱漆柱子窗槅雕刻得極其精細這時廊下站立了許多文武百官都候著分班朝賀望去殿上開著二十四扇長門門上木槅都雕出壽字來殿裏面都拿金磚鋪地磚上塗著黑漆十分光滑大臣們都上來趴在地下磕頭皇帝坐在寶座上那寶座是黑色的是拿橡木做成的座上嵌著各色的玉石這大殿後面便是皇帝的寢宮共有二十四間留著三間是給慧妃住的皇帝和皇后的宮雖十分接近但前後不相連的皇宮和後宮都有一條長廊通著慈禧太后的寢宮爲便於帝後往太后處請安起見這原是慈禧太后的主意吩咐這樣造的同治帝自從娶了孝哲後以後見皇后眉目明媚舉動端莊見了皇帝溫婉而不輕佻心中便十分寵愛他夫妻兩人常在宮中廝守著皇后又是熟讀唐詩的皇帝隨口讀出一句來皇后便都接下去背誦如流皇帝越發喜歡她皇后在宮中和皇帝說笑著廊下守候的宮女太監們從不曾聽得皇后的笑聲的只有那慧妃卻是十分輕佻有時皇帝到慧妃房裏去慧妃接著便做出百般妖媚來在廊下守候的宮女太監們只聽得屋子裏一陣一陣不斷的笑聲後來給皇后知道了便傳諭吩咐慧妃叫她放穩重些那慧妃仗著是西太后挑中的人也不把皇后放在心裏依舊是謔浪嘯嗷調笑無忌背地還在西太后跟前說皇后的壞話那孝哲皇后原是西太后不中意的聽了慧妃的話越發沒有好嘴臉待皇后了每日皇后到西太后宮中去請安西太後總是正顔厲色對她說道皇上年紀輕國家大事要緊莫常留他在宮裏玩耍孝哲後聽了西太后的排擅真是一肚皮冤氣沒處訴虧得東太后卻十分喜歡她常常把她傳進宮去安慰她幾句給慈禧太后知道了心中越發忿怒常常對皇帝說慧妃十分賢明便該常常親近她皇后年紀輕不懂得什麽規矩皇帝不該迷戀宮中致荒了朝廷的正事這幾句話常常對皇帝說著說得皇帝心煩起來便也不敢常到皇后宮裏去了西太后又派了人在暗地裏偵探著皇帝的行動見同治帝到孝哲後宮裏去了第二天慈禧太后見了必要嘮叨一大套把個同治帝氣得從此不到皇后宮裏去了也不到慧妃宮裏去便終年獨宿在乾清官裏每到無聊的時候便傳從前摔跤的小太監來做著各種遊玩事體來消遣同治帝自從大婚以後便換了一種性格從前的玩耍他看了一概沒有意味任你小太監如何哄著玩兒皇上終是悶悶不樂後來由崔總管弄了一班小戲子進宮來演唱起初皇上看了十分歡喜後來看了一出遊龍戲鳳把皇上的一片春心又勾起來便悄悄地問小太監京城裏可有玩耍女人的地方那小太監都要討皇上的好便說這裏宜武門外某家姑娘如何美貌某家少奶奶又如何乾淨皇上聽了便賞了小太監許多瓜子金叫他們瞞著人悄悄地陪著皇上到各處去玩耍這皇帝玩出味來了便終日在外面不肯回宮去崔總管便是知道也不敢多說皇上每日請過太后的安坐過朝以後便溜出宮門遊玩去了皇帝在外面自稱江西陳拔貢皇帝除玩姑娘以外凡是茶坊酒肆他都要去軋熱鬧有一天左都禦史毛文達和滿堂官昶熙在宣武門外春燕樓酒店裏吃酒談笑忽然一眼見東壁廂一個漂亮少年坐著身後站著一個小書僮再細看時那少年不是別人正是當今皇上他打扮做公子哥兒模樣自由自在地一手擎著酒杯在那裏飲酒皇帝也瞧見他兩人了便向他們點頭微笑慌得毛文達昶熙兩人總也不自在酒也不敢喝急急跑下樓去悄悄地去告訴了步軍統領那統領聽了嚇了一大跳忙調齊兵馬親自帶著要去保護皇上被毛文達攔住了說統領這一去鬧得人人知道聖駕倘有不測你我如何擔得起這個干系再者統領這一聲張弄得皇上不能自由自在地遊玩反叫皇上著惱你我得不到保駕功勞反要受聖上的申斥這又何苦來那統領聽了毛文達的話卻也有些躊躇起來便問道依大人的意思怎麽才能兩全呢毛文達思索了半天才得了一個主意便吩咐統領在衙門裏挑選了二十個勇健兵丁穿了平常人衣服到春燕樓去暗地裏保護著皇帝倘然皇上到別處去遊玩也只須在前後暗暗地跟著保護著卻不可令皇上知道那統領官聽了便依了他的意思點派了二十名勇士出去要知後事如何且聽下回分解
