body:
  text: 第七十九回爭大統吳可讀屍諫露春色慈安後滅奸卻說當初同治帝才死下來的時候兩宮太后召集王大臣商議立嗣的事體孝哲皇后也在座她見慈禧太后不肯立載澍爲嗣皇帝急得她坐立不安一眼看見李鴻藻正從外面走來孝哲後滿臉淌著眼淚對李鴻藻說道今天這件事體別人可以勿問李大臣是先帝的師傅應當幫俺一個忙我如今爲了這件大事給師傅磕頭罷說著真個磕下頭去嚇得李鴻藻急急退避宮女上前去把皇后扶起在皇后心想李師傅受了先帝的密詔總應該說一句公道話誰知李鴻藻早已爲那密詔的事體敗露了被慈禧太后的威嚴壓住到底也不敢說一句話如今李鴻藻拜著帝後的陵寢想起從前的情形來忍不住放聲痛哭這一哭便有人去報與慈禧太后知道第二天懿旨下來開去李鴻藻弘德殿行走的差使那徐桐翁同和廣壽一班大臣平日都是和李鴻藻十分知己的到這時也便自己知趣下折乞休懿旨下來許他們各開去差使禦史陳彜借別的事體上書參劾翰林院侍講王慶祺和總管太監張得喜說他們心術卑鄙朋比爲奸慈禧太后看了奏摺想起那同治帝枕下的春畫便立刻下諭把王慶祺革職又把張得喜充軍到黑龍江這時還有兩個忠臣爲同治帝立後的事體和皇太后爭執的因從前太后懿旨上有俟嗣皇帝生有皇子即承繼大行皇帝爲嗣一句話只怕太后失信便又上奏摺那內閣侍讀學士廣安要求太后把立嗣的話頒立鐵券他奏摺上說道大行皇帝沖齡禦極蒙兩宮太后垂簾勵治十有三載天下底定海內臣民方將享太平之福詎意大行皇帝皇嗣未舉一旦龍馭上賓凡食毛踐土者莫不籲天呼地幸賴兩宮皇太后坤維正位擇繼鹹宜以我皇上承繼文宗顯皇帝爲子並欽奉懿旨侯嗣皇帝生有皇子即承繼大行皇帝爲嗣仰見兩宮皇太后宸衷經營承家原爲承國聖算悠遠立子即是立孫不惟大行皇帝得有皇子即大行皇帝統緒亦得相承勿替計之萬全無過於此請飭下王公大學士六部九卿會議頒立鐵券用作奕世良謀慈禧太后看了這個奏章知道那廣安不相信自己便不覺大怒非但不肯依他的話頒立鐵券還把他傳旨申斥了一番接著一個吏部主事吳可讀他見皇太后不准廣安的奏摺深怕那同治帝斷了後代也想接著上一個奏摺只怕人微言輕皇太后不見得肯依他的意思便立意拼了一死用屍諫的法子請皇太后立刻下詔爲同治帝立後這時候帝後的靈櫬正送到惠陵去安葬吳可讀便向吏部長官討得一個襄禮的差使隨至陵寢待陵工已畢他回京來的時候路過薊州城住在馬神橋三義廟裏便下遺疏服毒自盡這時正是閏三月初五的半夜時候第二天吏部長官得了這個消息便派了去收拾他的屍首一面又把他的遺疏代奏上去他奏摺裏自稱罪臣說得懇切動人皇太后看了他的奏折便發交王大臣大學士六部九卿詹科道會同議奏他們會議的結果說他未能深知朝廷家法毋庸置議吳可讀白白地送去一條性命他所得的只有照五品官議恤的一道諭旨從此也沒有人再敢提起爲同治帝立嗣的事體了慈禧太后自從立了光緒帝以後明欺著皇帝年幼東太后懦弱便把大權獨攬好在滿朝大臣都是慈禧太后的私黨每日垂簾坐朝只有慈禧太后的說話卻不容慈安太后說一句話的便是慈安太后說話也沒有人去聽她的慈安太后一肚子氣憤從此常常推說身體不快不坐朝了只讓慈禧太后一個人坐朝那班大臣們要討皇太后的好在朝堂上公然送起孝敬來有孝敬珠寶的有孝敬古董的也有孝敬脂粉的慈禧太後都一一笑受有幾個乖巧的便打通了崔李兩個總管直接送銀錢到宮裏去太后得了越發歡喜這時李蓮英越發得了西太后的信用便升他做了總管李蓮英知道太后是愛聽戲的便和同伴的太監們學了幾出戲在宮裏瞞著東太后扮唱給西太后看西太后看了果然十分歡喜但那班太監所學的戲不多且太監的嗓子終是不十分圓潤唱了幾天看看西太后有些厭倦起來了又是李蓮英想出主意來奏明西太后去把京城裏一班有名的戲子請進宮來一一演唱慈禧太后說道宮中唱戲不符祖宗的家法怕給東太后知道了多說閒話怎麽是好李蓮英聽了把肩膀聳一聳說道這怕什麽老佛爺便是祖宗祖宗的家法別人改不得獨有老佛爺改得俺們大清朝的天下全靠老佛爺一人撐住列祖列宗在天上也感激老佛爺的如今老佛爺要聽幾出戲還怕有誰說閒話西太后聽了他的話不覺笑起來說道小猴崽子好一張利嘴你既這樣說俺們便去喚幾個進來不用大鑼大鼓的悄悄地唱幾句聽聽解解悶兒也好李蓮英又奏道奴才的意思俺們也不用瞞人索性去把東太后和諸位皇爺請來大鑼大鼓地唱一天慈禧太后起初還怕不好意思經不得李蓮英在一旁一再慫恿慈禧太后便答應了當下分派各太監一面去請東太后和各位王爺一面到京城名茶園裏去挑選幾個有名的戲子進內廷供奉去慈安太后聽說慈禧要傳戲子進宮來唱戲不覺歎了一口氣又聽說請自己一塊兒聽戲去她便一口謝絕卻怕招怪只得推說身體不爽那邊惇郡王恭親王醇親王孚郡王惠郡王等一班親貴大臣聽說皇太后傳喚又不敢不去到了宮裏直挺挺地站著陪著西太后看戲這一天什麽程長庚趕三兒楊月樓俞菊一班在京城裏鼎鼎有名的戲子都到了都拿出他的拿手好戲來竭力搬演著正演得十分熱鬧台下的人屏息靜氣地聽著這時臺上正演著翠屏山講的是海屠黎和尚私通潘氏的故事忽然見醇親王高擎著兩臂大聲喝起好來把台下聽戲的人都嚇了一跳慈禧太后雖不好說什麽便也向五王爺臉上看著醇親王好似不覺得一般依舊喝他的好恭親王在旁忍不住了忙上去悄悄地拉著他的袖子在他耳旁低低地說道這裏是內廷不可如此放肆醇親王聽了故意大聲說道這裏真是宮裏嗎我還認做是戲園裏呢俺先皇的家法宮中不許唱戲況且像翠屏山這種戲更不是在宮裏可以唱的俺看了認做自己是在前門外的戲園子裏聽戲所以一時忘了形說著忙到慈禧太后跟前去磕頭謝罪慈禧太后心知醇親王明明在那裏諷諫自己只得傳命把翠屏山這出戲停演從此以後形成習慣皇太后每到空閒下來便傳戲子進宮去唱戲那班戲子裏面慈禧太后最賞識的是唱須生的程長庚和那小花臉趕三兒西太后每聽戲必要召諸位王爺陪聽內中醇親王是一個極方正的人他雖常常陪著西太后聽戲但心中卻十分不願意這一天卻巧趕三唱思志誠一出戲趕三是扮著窯子裏的鴇母的有嫖客來了他便提高了嗓子喊道老五老六老七出來見客呀北京地方二等窯子妓女都拿排行代名字喊著這時適值醇王恭王惇王三人在台下陪著看戲醇王排行第五恭王第六惇王第七趕三故意喊著這三人的名字逗著玩兒的那恭王惇王卻不敢說什麽獨有醇王怒不可忍喝聲狂奴敢如此無禮便喚侍衛們去把趕三從臺上揪下來當著皇太后的面重重地打了四十板從此以後醇親王常常推說身體不好不肯陪太后看戲了那太后也不去宣召他們作陪樂得自由自在一個人看著戲後來慢慢地揀那中意的戲子喚下臺來親自問話自己飲酒的時候又賞戲子在一旁陪飲說說笑笑十分脫略日子久了兩面慢慢地親近起來太后索性把自己歡喜的幾個戲子留在宮裏不放出去這件事體宮裏的太監們都知道只瞞著東太後一個人過了幾天慈禧太后忽然害起病來了每天連坐朝也沒有精神打發太監來通報慈安太后請東太后垂簾聽政東太后原不願意聽政但看看西太后又病了朝廷的事體實是沒有人管慈安太后只得暫時坐幾天朝東太后是一位忠厚人她雖坐著朝諸事卻聽恭王等議決看看慈禧太后的病過了一個多月還不曾好天天傳禦醫診脈下藥又說不出個什麽病症來這時朝堂上很出了幾件大事主要一件便是法國人謀吞越南的事體那時雲貴總督劉長佑上了一本奏章他大略說越南爲滇蜀之唇齒國外之藩籬法國垂涎越南已久開市西貢據其要害同治十一年複通賊將黃崇英窺取越南東京思渡洪江以侵諒山又欲割越南廣西邊界地六百里爲駐兵之所臣前任廣西巡撫招用劉永福以挫法將沙酋之鋒故法人寢謀不敢遽吞越南者將逾一紀然法人終在必得越南入秋以來增加越南水師越南四境均有法人行迹柬埔人感法恩德願以六百萬口獻地歸附越南危如累卵熱必不支同治十三年法軍僅鳴炮示威西三省已入於法今複奪其東京即不圖滅富春已無能自立法人志吞全越既得之後必請立領事于蒙自等處以攫礦山金錫之利系法覆越南回衆必導之南寇逞其反噬之志慈安太后看了這一備說話心中甚是焦急一時也沒有可以商量的人便下諭北洋大臣李鴻章籌商辦法又命沿海沿江沿邊各督撫密爲防備但看那慈禧太後的病依舊是不好慈安太后便用皇帝的名義下詔至各省宣召名醫進京去這時只有無錫一個名醫名叫薛福辰的暗暗打聽出西太后的病情來便進宮去請脈只下了一劑藥便痊愈了據他出來說皇太后犯的不是什麽病意是血崩失調的病聽了他說話的卻十分詫異後來慈安太后打聽得慈禧太后大安了有一天在午睡起來以後也不帶一個宮女悄悄地走到慈禧太后宮裏意思想去探望探望西太后順便和她商量商量國事的直走到寢宮廊下也不見一個人待走到外套間只有一個宮女盤腿兒坐在門簾底下那宮女見了慈安太后臉上不覺露出驚慌的神色來正要聲張時慈安太后播著手叫她莫作聲自己掀開門簾進去見室中的鄉帷一齊放下帷子裏面露出低低的笑聲來慈安太后輕輕咳嗽了一聲只聽得西太后在裏面喘著聲兒問是誰慈安太后應道是我接著上去揭起繡帷來一看只見慈禧太后正從被裏坐起來兩面腮兒紅紅的慈安太后忙走上去按住她說妹妹臉兒燒得紅紅的快莫起來說著只見床後面一個人影子一晃露出一條辮子來慈安太后看了也禁不住臉上羞得通紅低下頭去半響說不出話來停了一會慈安太后改了滿面怒容喝一聲滾出來床背後那個男子藏身不住了只得出來爬在地下不住地向慈安太后磕頭慈安太后問他是什麽人那男子自己供說是姓金一向在京城裏唱戲的自從六日前蒙西太后宜召進宮來供奉著不叫放出去那姓金的說到這裏慈安太后便喝聲住嘴不許他說下去了一面傳侍衛官進宮來把這姓金的拉出去砍下頭來慈禧太后見事已敗露心中又是忿恨又是羞慚眼見那姓金的生生被侍衛官拉出去取了首級又是說不出的傷心只因礙著慈安太后的面前一肚子的氣惱無處發泄得只是坐在一旁落淚慈安太后知道慈禧太后一時下不得台便自己先下臺上去裝著笑容拉住慈禧太后的手說道妹妹不用把這事放在心土俺決不把這件事聲張出去妹子年紀輕原也難怪你守不住這個寂寞的只是這班唱戲的是下流小人現在得寵的時候仗著太后的勢力在外面妄作妄爲稍不如意便要心懷怨恨在背地裏造作謠言破壞你我的名氣你我如今做了太后如何經得起他們的糟踢因此俺勸妹妹這班無知小人還是少招惹些說著便命宮女端上酒菜來兩人對酌慈安太后又半自替慈禧太后把盞慈禧太后不料慈安太后如此溫存體貼心下也不好意思再擺嘴臉了便也回敬了慈安太后一杯酒兩人說說笑笑的慈安太后又說先帝在日待妹妹何等恩愛便是和俺也相敬如賓的俺如今年紀老了在世的日子也不多了妹妹年事正盛也須好好保養留得乾淨身體將來魂歸天上仍得侍奉先帝便是俺和妹妹相處了二十多年幸得同心協力處理朝政內主宮庭後來也不曾有一句半句話衝突過便是先帝臨死的時候曾留下詔吩咐俺和恭親王防備妹妹專政弄權敗壞國事俺如今看妹妹也很好處理國事聰明勝過俺十倍從此妹妹小心謹慎將來俺死去見了先王也可以交代得過了說著不覺掉下眼淚來慈禧太后被慈安太后一句冷一句熱地說著心中萬分難受那臉上止不住起了一陣陣紅暈到未了不由得向慈安太后下了一個跪口稱姊姊的教訓真是肺腑之言做妹妹的感激萬分以後便當格外謹慎是了慈安太后忙把慈禧太后扶起嘴裏但說得吾妹如此真是大清之幸說著也告別回宮去了在慈安的意思以爲慈禧經過這一番勸戒以後總可以革面洗心同心一德了她卻不知道慈禧因爲慈安敗露了她的隱私越發把個慈安恨入骨髓慈安轉身以後慈禧一肚子氣無可發泄便把那管門宮女打得半死半活又把寢宮裏的古董瓷器打得粉碎虧得李蓮英上來勸解一陣子說笑解了西太後的怒氣從此以後慈禧太后便天天和李蓮英商量擺佈東太的法子那東太后卻睡在鼓裏恰巧光緒六年七年這兩年之間有兩年事體大觸西太后的怒因此東太后的勢力愈孤危險也愈甚第一件是光緒六年東陵致祭的事體慈安太后自從勸戒慈禧太后以後便和恭親王商量想趁此殺殺慈禧的威風從此也可以收服慈禧的野心這一年春天兩宮同赴東陵主祭待到跪拜的時候慈禧要將拜墊和慈安並設著慈安卻不肯命人把慈禧的拜墊稍移下一步慈禧也不肯一定要和慈安並肩拜著兩位太后各不相讓當著許多大臣面前爭論起來慈安太后自從那天把慈禧的隱私敗露以後從此便瞧不起慈禧當時便大聲對恭王說道西太后在咸豐皇上的時候只封了一個懿妃她得升太后還是在先帝賓天以後今日祭先帝在先帝跟前只知有一位太後卻不知有兩位太后既是一後一妃在祭祀的時候照例妃子的位置應當在旁邊稍稍下去一步中央卻擺著兩幅拜墊右面一座拜墊是自己的左面一座拜墊還須留下給已死的中宮娘娘那已死的中宮娘娘雖比先帝先死但她終是先帝的正後俺們到如今也不能抹殺她的慈禧太后聽了慈安太后的一番說話十分羞慚又十分生氣她拿定主意不肯退讓她說俺和東太后並坐垂簾母儀天下也不是今朝第一天從來也不見東太后有個爭執如今爲祭祀先帝陵寢重復叫我做起妃嬪來東宮太后說的話實實不在情理之中如東太后一定要爭這個過節兒那俺便情願今天死在先帝陵前到地下當著先帝跟前和東太后對質去說罷慈禧太后便嚎啕大哭起來這原是慈禧太后的潑辣話慈安太后到底是一個忠厚人見了慈禧太后這副形狀早弄得沒有生意了要知後事如何且聽下回分解
