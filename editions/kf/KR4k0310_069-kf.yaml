body:
  text: 第六十九回美人落魄遭橫暴天子風流選下陳卻說周老伯帶了蘭兒到各處同仁家裏去告幫從來說的兔死狐悲物傷其類那班同仁聽說惠征死得如此可憐豈有個不動心的回想到自己浮沈宦海將來不知如何下場因起了同情心便你也十塊他也二十塊大家拿出錢來幫助他尤其是旗籍的官員出的格外關切些那送的喪禮格外豐厚些再加這蘭兒花容月貌帶著孝越發俊俏了蘭兒原是一個聰明女孩子她跟著周老伯到各家人家去見了宅眷便是帶哭帶說說得淒惻動人那班老爺公子又被她的美貌迷住了越發肯多幫幾個錢因此她這一趟告幫收下來的錢卻也可觀回到家裏點一點數兒足足有三百多塊錢佟佳氏做主拿二百塊錢辦理喪事留著一百多塊錢打算盤著丈夫的靈柩回北京去惠征這一家平日原是東賒西欠過日子如今聽說他們要扶柩回京了那債主便四面八方跑來把個佟佳氏團團圍住其勢洶洶向她要債五塊的十塊的什麽柴店米鋪醬園布莊統共一算也要二百塊錢光景佟佳氏無可奈何揀那要緊的債一還整整出還了一百塊錢又對大衆說一時裏不回京去求大家寬限幾天你想佟佳氏總共只留下了一百二十塊錢除去還債一百塊錢還有什麽錢做回家去的盤纏佟佳氏無可奈何只得再在安慶地方暫住幾天再說但是眼看著冷棺客寄一家孤寡此中日月惟淚洗面況且手中只剩有少數銀錢度日一天艱難似一天從前借著丈夫客死還可以告幫如今無名無目卻到什麽地方去借貸佟佳氏心中的焦急那桂祥兄妹如何知道惠征死的時候佟佳氏和兒女三人原做幾件素服的如今看看手頭拮据那素衣從身上一件一件剝下來低舊送到長生庫中去了那時候慢慢地到了深秋天氣十分寒冷西風刮在身上又尖又痛佟佳氏因貧而愁因愁而病病倒在床那桂祥和蓉兒兩人原懂不得人事只有蘭兒在一旁侍奉這時佟佳氏口渴得厲害只嚷著要吃玫瑰花茶兒蘭兒便在母親枕箱邊掏了十幾個錢囑咐桂祥兄妹兩人好生看著母親她自己略整一整頭面出門買茶葉去誰知出得門來西北風刮在她身上凍得她玉容失色兩肩雙聳她低著頭咬緊了牙關向街上走去虧得那茶葉鋪子離她家不很遠穿過兩條街繞過一個彎兒便到了這茶葉鋪子是她常去的她母親只愛吃好茶葉所以蘭兒常去買茶葉的這時她一腳踏進店堂心中便是一跳見只有一個傻子夥計站在櫃身裏面那傻子夥計姓牛名裕生平日原有些傻頭傻腦的最愛看娘兒們平日站在櫃身裏遠遠見了一個娘們在街上走過他便張大了嘴伸長了脖子墊起了腳跟睜大了眼睛望著要是有一個女人踏進店堂裏來買茶葉他總搶在前面喜眉笑眼地上去招呼一面一句天一句地和那女人兜搭著一面卻多抓些茶葉給她討她的好兒但是他雖對女人萬分地殷勤那女人卻個個厭惡他叫他傻子而且他平日見的女子卻沒有一個好的大半都是窮家小戶的女人或是大戶人家的老媽子粗丫頭他見了已經當她是天仙了何況見了這千嬌百媚的蘭兒怎不叫他見了不要魂靈兒飛上半天呢那蘭兒也曾遭他幾次輕薄什麽好人兒美人兒滿嘴的肉麻話兒蘭兒總不去理他拿了茶葉便走如今走進店來見只有牛裕生一人在店堂裏且見了自己早已笑得把眼睛擠成兩條縫迎將上來蘭兒心想不買茶葉了回心又想母親正等著茶葉吃呢空著手回去卻去要叫母親生氣這樣一想便硬一硬頭皮上去買茶葉牛裕生伸手來接她的錢她拿錢向櫃上一擲說了一句玫瑰花茶兒便繃起了臉兒不說話了牛裕生一邊包著茶葉一邊涎著臉和她七搭八搭又說真可憐這樣一個美人胎子卻沒有衣服穿凍得鼻子通紅叫我怎不心痛死呢嘴裏嘰嘰嘻嘻地說著蘭兒聽了總給他一個不理不睬那牛裕生包好了一大包茶葉放在櫃檯上蘭兒伸手去拿時冷不防那人隔著櫃身伸過手來抓住蘭兒的手臂用力一拉蘭兒立不住腳撲進櫃身去那人騰出右手來摸著蘭兒的面龐嘴裏說道我的寶貝這粉也似的臉凍得冰冷怎麽叫我不心痛呢待我替你捂著罷說著竟把那又黑又糙的手伸向蘭兒粉頸子裏去急得蘭兒只是哭罵今天湊巧他店裏人都有事出去了這街道又是很冷僻的所以牛裕生放膽調戲著卻沒有人來解圍那牛裕生欺侮蘭兒生得嬌小一手拉住她肩膀一手在櫃檯上一按托地跳出櫃檯來牛裕生正要伸手上前摟蘭兒的腰時正是事有湊巧這時外面闖進一個人來大喝一聲道好大膽的囚囊竟敢青天白日裏調戲女孩子那牛裕生見有人進來忙放了手連說不敢那人氣憤憤地要上前去抓住他要送他去保甲局裏去慌得牛裕生跪下地來不住地磕頭求饒這時那店裏掌櫃的也回店來了見了這情形也幫著求情一面又喝罵那牛裕生這時店門外也擠了許多人看熱鬧大家說送局去辦倒是這蘭兒因爲自己抛頭露面給衆人看著怪不好意思的便悄悄地對那人說饒了他也罷我要回家去了那牛裕生聽蘭兒說肯饒恕他便急忙向蘭兒磕下頭去蘭兒也不理他拿了茶葉轉身走出店去了走不上幾步只見那人趕上前來低低地向蘭兒問道你是誰家的小姐我看你長得這副標致的臉兒也不像是平常人家看你身上又怎麽這般寒苦蘭兒聽他問得殷勤便也向他臉上打量著看他眉清目秀竟是一位公子哥兒知道他是熱心人便也把自己的家境和父死母病流落在客地的情形原原本本地告訴他那人聽了連說可憐他又說自己也是旗人父親在本城做兵備道他自己名叫福成說著他兩人已經走到蘭兒的家門口了那福成從衣袋裏掏出四塊錢來向蘭兒手裏一塞說這個你先拿回去用著罷我是沒有財産權的不能多多幫助你但是我回去想法子總要幫助你回京去蘭兒見他給錢不好意思拿他的忙推讓著那福成再三不肯收回蘭兒心想一男一女站在門口推來讓去的給旁人看了不雅又想自己家裏連整個兒的銀錢也沒有一個了如今我收了他四塊錢也可以度得幾天可憐窮苦逼人任你一等的好漢到這時也不得不變了節呢蘭兒這時雖收了福成的銀錢卻把粉腮兒羞得通紅低下脖子再也擡不起頭來虧得那福成卻是一個少年老成的公子見蘭兒接了銀錢便一轉身走去了蘭兒定了一定心走進屋子裏去她母親睡在床上問怎麽去了這半天蘭兒便把茶葉店夥計調戲的事瞞了只說外面有一個送禮的送了四塊錢來孩兒收下了打發那人去了她母親聽說有人送禮來正因這幾天沒有錢用憂愁她聽了心裏暫時放下也不去查問細情了這裏她母子四人又苦守了幾天有一天忽然大門外有人把大門打得震天價響桂祥出去開門看時見一個體面家人手裏捧著一個包裹問此地可是已故的惠征老爺家裏桂祥點頭說是那家人便把包兒送上說這是俺老爺送給府上的奠儀桂祥把包兒接在手裏覺得重沈沈的拿進去打開來一看裏面整整封著二百塊銀錢可憐把個佟佳氏看怔了忙問那家人時說是道台衙門裏送來的蘭兒聽了心下明白便對她母親道想來那位道台和俺父親生前是好朋友如今知道我父親死了卻故意多送幾個錢是幫助我們盤費的意思現在我們的光景也沒有什麽客氣的便收下了叫兄弟寫一張謝帖封十塊錢敬使打發那家人去了再說可憐他兄弟桂祥雖讀了幾年書卻全不讀在肚子裏這時要他寫一張謝帖真是千難萬難寫了半天還寫不成一個格局後來還是蘭兒聰明她平日都看在眼裏當下便寫了一張謝帖打發那家人去了佟佳氏見有了錢病也好了便和蘭兒商量著打算盤柩回京去蘭兒便去把那周老伯請來托他雇船盤柩等事周老伯也看他孤兒寡婦可憐便熱情幫忙去雇了一隻大船買了許多路上應用的東西又雇了十二個擡柩的人一算銀錢已用去了六七十到了第三日佟佳氏把行李都已收拾停妥正要預備動身忽然從前來送禮的那個家人又來了一見佟佳氏便惡狠狠地向她要回那二百塊錢說這錢是送那西城鍾家的不是送你們的快快拿出來還我若有半個不字立刻送你們到衙門裏去佟佳氏聽了那家人的話沒頭沒腦的又是詫異又是害怕這時周老伯也在一旁聽了這個話知道事體有些蹊蹺便和佟佳氏說明拉著桂祥跟著那家人一塊兒到兵備道衙門裏去見了那位道台把惠征家裏的光景細細訴說了一番又說現在錢已花去一半大人要也要不回來的了可憐他家孤兒寡婦四口子專靠著大人這一宗銀錢回家去的大人不如做了好事看在同旗面上舍了這筆錢賞了他們罷那道台聽了卻也無可奈何他也是一個慷慨的人便也依了周老伯的話看在同旗的面上把那二百塊錢佈施了這孤兒寡婦那桂樣聽了便千恩萬謝周老伯也幫著他說了許多好話去了這裏道台又吩咐帳房裏再支二百塊錢補送到西城鍾家去一面把他大公子喚來向他爲什麽瞞著父親打發家人送銀錢到惠征家裏你敢是和那惠征的女兒有了私情嗎那大公子聽了只是搖頭原來他大公子自從那天送蘭兒回家以後便時時刻刻把她擱在心上這也因蘭兒的面貌長得嫵媚叫人看了越發覺得可憐這位大公子又是天性慈善的他只苦於手頭拿不著銀錢但是既答應了蘭兒幫助她這個心願總是不能忘記的也是事有湊巧這安慶地方有一個姓鍾的鄉紳這位道台從前也得到過他的好處的前幾天那位鄉紳死了打聽得他身後蕭條這道台也曾說過須得要重重地送一封禮去報答他這句話聽在大公子耳朵裏心想這機會不可錯過我須得要借這一筆錢救救那可憐的美人兒呢他便時時留心第二天父親果然吩咐帳房裏封二百塊錢打發家人送去那大公子守在帳房門口見家人拿一封銀錢出來他便趕上去推說是大人打發他來叮囑的改送到已故候補道惠征家裏去那家人見公子傳著大人的話出來總不得錯便把那銀錢改送到蘭兒家裏去拿著謝帖回衙門來那大公子便把謝帖接去藏著帳房問時家人說那謝帖是大少爺拿進去給大人瞧了帳房聽了便也不起疑心到了第三天那帳房到上房裏來回話順便又問起那張謝帖這道台說不曾見帳房聽了十分詫異忙傳那家人問時家人說確實是大少爺拿去了又傳那大公子那大公子見無可躲避便把那張謝帖拿了出來他父親接過去一看見上面寫著不孝孤子那拉桂祥不覺大大詫異起來急迫問時這家人推說是大少爺吩咐叫改送到已故候補道惠征家裏去道台聽了不覺咆哮起來一面喝叫家人快去把那封禮要回來一面盤問他大公子爲何要私地裏改送到惠征家去他大公子便老老實實把那天在茶葉鋪子裏遇到那蘭兒的情形說了出來他父親聽了不信喝著叫他把實情說出來正在盤問的時候那家人便帶周老伯和桂祥到來經周老伯拿桂祥家裏的事實情形說了一遍道台聽了便也不覺起了兔死狐悲的念頭把二百塊錢做了好事放桂祥去了但是他總疑心大公子在蘭兒身上有什麽私情便又盤問他那大公於指天誓日說不敢做那無恥的行爲那帳房和道台太太也在一旁解說大少爺心腸軟是真的講到那種下流事體卻從來不曾有過道台聽了也放了心反稱讚了幾句又說下次不可獨斷獨行凡事須稟明父親大公子諾諾連聲地退去到了第二天他未免有情便悄悄地跑到蘭兒家去看望誰知她全家人都動身去了大公子又打聽得停船的地方急急趕去可惜只差了一步那蘭兒的船已漾在河心只剩一個空落落的埠頭這公子站在埠頭上對著那船只是出神忽然船窗裏露出一個女人的臉來大公子看時認識是蘭兒的臉只見那蘭兒微微地在那裏點頭大公子在岸上癡癡地望著那船身愈離愈遠直到看不見了大公子還是直挺挺地站著不動直到另一隻船靠近埠頭來遮住他的眼光他才歎了一口氣回去這裏蘭兒在船裏心中不斷地感念著那公子想到他親自趕到埠頭來送行這是何等深情我家在這落魄的時候有這樣一個多情多義的公子今生今世須是忘他不得不說蘭兒的心事再說佟佳氏帶了丈夫的棺木和兩女一子坐著船在路早行夜宿向北京趕著路程一船孤寡看在佟佳氏眼裏倍覺傷心她想丈夫在日攜眷赴任在這路上何等高興到了蕪湖地方那文武官員在碼頭迎接又連日擺酒接風又是何等風光如今觸目淒涼還有誰來可憐我們呢想著不覺掉下眼淚來一路上孤孤淒淒昏昏沈沈不覺已到了天津從天津過紫竹林到北京不過一日多的路程轉眼到了家裏她家原是世襲承恩公還有一座賜宅在西池子胡同裏佟佳氏帶著子女住下這光景不比從前丈夫在日門庭冷落簾幕蕭條說不盡的淒涼況味蘭兒原有舊日作伴的鄰舍姊妹多年不見彼此都長成了又見蘭兒出落得嫋娜風流大家都愛她今天李家明天王家終日姊姊妹妹說說笑笑做著伴倒也不覺得寂寞她們見她光景爲難姊妹們有贈脂粉的有贈衣衫的還有暗地裏贈她母親銀錢的佟佳氏靠著鄰舍幫忙勉強度著日子看看到了春天正是桃紅柳綠良辰美景北京地方終年寒冷難得到了暮春時候天氣和暖便有許多紅男綠女出來逛廟的逛廟遊春的遊春十分熱鬧便是蘭兒在家裏也常有女伴來約她出去遊玩什麽琉璃廠陶然亭她們也曾去過後來那班女伴忽然有許多日子不來了蘭兒想念她們想得厲害便也忍不住親自上門去看望誰知一打聽嚇得她急急跑回來躲在家裏再也不出門去了佟佳氏看了詫異忙問時才知道今年皇宮裏挑選秀女宮裏出來的太監正搜查得緊見八旗人家有年輕貌美的女孩子便也不問情由硬拉進宮去候選因此住在京城裏有女兒的八旗人家都把女兒深藏起來已經說有婆家的便急急催著婆家來娶去便是沒有婆家的也替她說了婆家連晚送了過去正鬧得家翻宅亂蘭兒認識的這幾家姊妹差不多都是在旗的因此她們也深深地在家裏躲起來了蘭兒還睡在鼓裏呢她母親佟佳氏聽了這個消息心下也願意她心想女兒選進宮去當一名秀女也勝似在家裏挨凍受餓說不定得了皇帝的寵倖封貴人封妃子都在意中當下便把這意思勸著女兒誰知蘭兒一聽便嚎啕大哭起來從此飯也不吃頭也不梳終日躲在房裏不出來要知後事如何且聽下回分解
