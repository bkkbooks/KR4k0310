body:
  text: 第九十八回赴幽會女郎逢厲鬼搜宮闈男妾變妖魔卻說章帝與竇娘娘交頸而眠一直睡到四鼓以後竇娘娘怕再嘔下去討個沒趣便平了氣就著枕邊說道還虧你是一個一朝之主呢這樣的輕聽浮言就要做那種不顧面子事試問你自己可覺得慚愧麽章帝笑道那些事都不要去提起了總是我錯就是了還有什麽話說呢他剛說了就聽得景陽鍾響章帝便要起身竇娘娘加意服侍他起身將他送出宮門便一徑轉道向小竇這裏而來到了小竇的宮中只見繡幕沈沈書堂人靜只聽見一些鼻息的聲音她走到小竇的臥榻之前用手將帳子一揭只見化兒將能兒緊緊地抱住且在一頭睡小竇在西邊睡著她輕輕地將化兒弄醒化兒一翻身將他們兩個也就驚醒了一齊坐起來大竇笑道你們好啊三個人竟來車輪大戰了化兒揉揉睡眼打了一個呵欠笑道來得怎樣這般的早法大竇笑道還要問呢一夜都沒有睡覺倒是你們這些小鬼頭快活死了害得我跟著你們受了一夜的罪化兒笑道娘娘又來騙人了誰相信你這些鬼話呢我走了後估量著萬歲爺不知賠多少不是呢小竇笑道她方才講話倒是的確的話我想萬歲爺見她動怒還敢再和她去碰釘子量他也沒有這樣的膽氣罷上了床還不極力地報效麽大約昨天的夜裏一定是未息旗鼓罷大竇笑道仔細舌頭當心不要連根子嚼去啊化兒笑道娘娘請你不要再來遮掩罷不是你親嘴供出來的一夜沒有睡覺不做那個調兒是做什麽呢大竇道好話莫詳疑一經詳疑什麽都是壞話我倒是老老實實將真情話告訴你們不想這些沒臉的丫頭竟扯張拉李的疑我到那勾當上去豈不好笑麽化兒笑道娘娘請你不要多講廢話了做也好不做也好與我們有什麽相干呢我且問你我昨天動身之後究竟是什麽辦法呢大竇笑道你休問我你們的膽也太大了赤條條的三個睡在一起萬一萬歲爺一頭撞了進來便怎麽了呢昨天你走了之後他就到我的身邊千不是萬得罪地招賠不住那時我卻格外拿出十二分決裂的手段來應付兩個人一直纏到晚我連催他到別處宮裏去住宿他再也不敢走我便嚴詞來責問他究竟爲著什麽事情要搜宮他先前一口咬定沒有這回事後來被我逼得沒法才說他是聽著別人傳說的那時我又追問他這話究竟是誰說的宮中出些什麽事了他咬緊牙關再也不肯吐一字結果被我一番連嚇帶勸的將他說得五體投地他才說不搜宮了你們想這事要不是我想這個法子來今天還想他不下令搜宮麽還有個笑話就是你們三個人一絲不挂地睡在這裏還不是首先露出春色來麽這一番話說得他們三個人不約而同地將舌頭伸了一伸化兒笑道果然果然要不是娘娘替我們打了一個頭陣我們一定是要出馬招駕的了大竇笑道你這個爛了嘴的人家和你規規矩矩地講些話你總要想出兩句話來挖苦人能兒笑道如果娘娘夜裏沒有過癮趁這時何不來過一過呢大竇聽見這話便乜斜著眼向他一瞟一探身子往他懷中一坐輕舒皓腕將他往自己的懷中一摟笑道我的寶貝這兩個能征慣戰的大將與你鏖戰了一夜還沒有疲倦麽他笑道這個勾當不過是當時覺得困倦只要過了一刻馬上就會復原了他說著偎著她的粉頰吻了幾吻化兒笑向小竇說道你看見麽這個樣子還成什麽呢小竇笑道你還說什麽呢我們此時還兀自橫在他的眼前做什麽呢我們應該識相些早點離了他們好讓他們過一回癮罷化兒點頭笑道是的是的我倒忘記了快些走開能兒笑道千萬不要走你們在這裏參觀參觀她的藝術要緊他說著便將她往身下一按正要拉馬擡槍猛可裏聽見一陣腳步聲音大竇與能兒嚇得霍地分開能兒趕緊滾入床底化兒小竇一齊迎了出去只見來者不是別人卻是淑德宮裏一個總監名字叫黑時他走到小竇的面前行了一個常禮含笑問道娘娘在這裏麽小竇見是他來當然是不去隱瞞便隨口答道在這裏呢你尋娘娘有什麽事情嗎他滿臉堆下笑容道沒有什麽要緊的事情不過前天娘娘托我一樁事現在我要來回她的資訊小竇笑問道什麽事情他笑道這個事情沒有什麽要緊無須娘娘問小竇喝道你這黑賊又來弄鬼了究竟是什麽事情快些告訴我遲一些兒仔細你的狗腿黑總監滿面賠笑道娘娘休要動怒這事我們娘娘曾關照過我的教我不要亂來泄漏的所以我不敢亂說只好請娘娘等一會子讓我先告訴娘娘然後你老人家再去問我們的娘娘自然就會知道了小竇故意怒氣衝衝地向他說道別扯你娘的淡快點說出來不要慪起我的氣來馬上就給個厲害你看看她說罷便回頭向化兒說道給我將皮鞭拿來黑總監聽說這話嚇得矮了半截忙跪下來說道娘娘請暫且息怒聽奴才一言她道什麽話快講他道這事我要是說出來被娘娘知道了我就要送命了她怒道放你娘的屁你可知道我是娘娘的什麽人她隨便有什麽秘密的事情我都可以預聞的他道娘娘這話固然不錯但是奴才受了我們娘娘的命令怎能因爲娘娘的私親就破娘娘的秘密呢她道照你這樣的話准是不肯說了黑時尚未回話早見大竇從裏面婷婷嫋嫋地走了出來黑時見她走出來就如得著一方金子似的連忙搶上前來向她行禮大竇微微地一點首便帶他一同進了房化兒與小竇也跟進來小竇向她笑道好事不瞞人瞞人非好事有這樣的主子就有這樣的奴才我真佩服守口如瓶一些風聲不會走漏出來我們這裏數十個大小內監像這樣只知有主子的奴才一個也找不出來的黑時向大竇丟了一個眼色意思是叫她回去化兒對小竇笑道你看見麽又在那裏做鬼臉了偏生不准她回去但看是一件什麽事情這樣的藏頭露尾大竇笑道天下人都可瞞你們我還能瞞麽她說罷朝黑時笑道你說罷她們不是外人黑時道前天我奉了娘娘的旨意暗地裏托人到城外牛家集去暗暗尋訪未上三天托娘娘的福果然尋著兩個十分俊俏的一個十九歲一個十八歲他們卻是無根無絆的乞丐賞了老乞丐五百兩紋銀現在買成功了已經將他們帶在城內石家弄裏聽候娘娘發落大竇聽見便向小竇化兒說道好了現在又買兩個來了大家不要再成日家爭風吃醋的罷以後將這兩個帶進來每人一個不偏不倚的小竇笑道虧你想得出化兒說道且慢歡喜著這兩個帶進宮來連能兒三個了這裏人多眼雜不會不露出馬腳來的大家都要想出一個好法子來圖長久的快樂才好呢大竇道用不著你來多慮我昨天不是對我說過了嗎如今三個完全送到綠室裏大家輪流去尋樂你看如何呢小竇笑道這個法子好極了就是這樣的辦吧這時能兒聽見他們的話料想不是章帝便在床底下一頭鑽了出來一把將小竇摟住笑道你們做的好事我這樣極力報效你們還不知足一定要外面去拉了兩個來可不怕我動氣麽小竇笑道我的兒子你不要疑心那兩個隨他是什麽美男子我總不去亂搭就是了能兒笑道好哇這才是從一而終的好情人咧大竇便吩咐黑時派人在晚上將兩個帶到濯龍園裏的綠室裏去同時也命能兒搬了進去原來這買來的兩個乞丐一個叫作梅其一個叫作顔固兩副面孔生得倒也十分不錯可是生在一個貧苦人家不幸因爲生計的逼迫竟陷入如此的害人之窟你道可歎不可歎呢他們進了綠室之後化兒便來替他們打掃乾淨夜間悄悄地命人搬了許多擺設東西進去不到數日居然將一個綠室收拾得和繡房一樣每日按時命心腹太監送酒送飯進去給他們吃過了三四個月後在宮裏的太監和宮女誰也知道有這回事的了但是大家見魏老兒那個榜樣誰也不肯去尋死的只好睜著一隻眼閉著一隻眼明知故昧的不敢去多事可是大小竇因爲自己有了隱事便不得不籠絡宮中的人遇事賣情賞識將一班宮中太監顛倒得五體投地再也不敢生心上下一氣只瞞著章帝一個人小竇的迷人手段更加厲害她對於太監揮金如土的結納對於一班宮女見裏面有幾個稍露頭角的即用一個調虎離山的計策來也教她們去得著一些雨露呆笨的卻也比從前寬待十倍所以上下沒有一個不死心塌地地供她驅使有一天章帝在大竇那裏住宿化兒便與小竇商議道今天萬歲爺在娘娘那裏幸宿我們也好尋一夜樂去了小竇點頭答應道你先去我因爲腹中痛要吃一杯姜桂露然後我再去就是了小竇說罷便命宮女到坤甯宮裏去取姜桂露順便探探萬歲睡了不曾那宮女答應去了不多時那個宮女手提一個羊指玉的瓶子走進來笑道我方才走到淑德宮門口經過站在遊廊下細細一聽只聽得娘娘好像有什麽地方不自在的樣子只是呻吟個不住同時又聽得萬歲爺也是又喘又哼不知道是什麽緣故呢敢是他們得病了不成小竇聽說這話向化兒一笑化兒會意也掩口笑個不住小竇向她笑道癡貨他們這病是天天發的你不曉得她道這真奇怪了她們有病第二天還能那樣的精神抖擻麽小竇道住嘴不知世務的丫頭還不給我滾出去那宮女嚇得趔趄著腳走了她便對化兒笑道他們已經在那裏交鋒了你也該上馬了她笑道去是想去可是他們那裏三個人叫我怎樣應付得來呢小竇笑道你不用怕我吃了姜桂露便來助你一陣就是了她笑著說道你可要快一點兒來呀千萬不要臨陣脫逃呀小竇笑道你放心罷我絕不會的她點頭笑道我也知道你熬不住的她說罷輕移蓮步徑向濯龍園而來這時正當八月裏的時候一陣陣的涼風迎面吹了來好不爽快她遮遮掩掩地進了園一天月色皎潔如水那望荷亭左面一簇桂樹正放著金黃色的嫩蕊微風擺動送過了許多香氣她何等快活暗道良宵美景不可虛度天上月圓人間佳會天下再有稱心的事恐怕也及不上我們的快樂了她何等滿意一轉眼走過望荷亭離開假山不過有一箭多路之遙瞥見一塊大石頭後面轉出一個東西來渾身毛毿毿的黑而發亮雙眼和銅鈴一樣大約全身有水牛這樣的粗細一條舌頭拖出下頦足數有二尺多長她嚇得倒退數步忙要聲張無奈喉嚨裏就被人捏著一樣再也喊不出閃著星眼朝那東西只是發呆那時心裏好像小鹿亂撞一般那東西煞是可怪見了她霍的壁立起來拱著兩爪動也不動她嚇得三魂落地七魄升天回轉身子拔步就走那東西一路滾來追著她可是心膽俱碎慌不擇路的四下裏亂奔那黑東西亦步亦趨地跟著她可急了冷不提防腳下絆著一縷荼蘼藤立身不穩折花枝撲地倒下那東西吱吱地滾上她的身邊她只哇的一聲便昏厥過去了再說小竇吃了一杯姜桂露那肚子裏不住的呼呼亂響停了一會果然輕鬆得許多了她便走到梳粧檯前用梳子將頭發攏了一攏又將臉上的粉勻了一勻慢條斯理地整了半天才慢慢向濯龍園裏而來不一時到了綠室的門口輕輕地用手在門上彈了兩下子馬上裏面就有人將門開了她走進去只見他們正在那裏猜數遊戲呢能兒見了她跑過來一把將她攔腰抱住口中說道我的娘你怎的到這會才來呢她笑道誰能像你們成日價的一點事情也沒有呢她說罷便向他們笑道化丫頭見我來了藏頭露尾地到哪里去了他們聽說不禁詫異問道她幾時來的她笑道還瞞我呢你們當我不曉得麽她早就來了你們搗的什麽鬼快點告訴我能兒急道誰哄你呢她果真沒有來啊小竇聽得這話好不驚異忙道她在我前面來的到哪里去了能兒道也許是碰見哪位姐妹拖她去談話也未可知小竇忙道胡說此刻誰不困覺呢她莫是走錯了路不曾我想決不會的又不知出了什麽岔子了我們可去尋尋她此刻更深夜靜的你們不妨也隨我一同出去大家仗仗膽他們一齊答應著隨她走了出來此刻畫閣上已敲到三鼓了四個人在月光下面一路尋出園來可是未曾看見她一些影子小竇和他們一齊噴噴稱怪正要回到園中瞥見長樂宮的後面有一個黑影子一閃小竇悄悄地問道誰呀那黑影子便閃了出來她定睛一看不是別人就是黑時小竇問道你這會子還在這裏做什麽呢他道娘娘吩咐我在這裏把守的恐怕有生人進去看出破綻來的小竇忙問道你看見化兒沒有他道怎麽沒有看見呢我方才在黑地裏見她一個人偷偷摸摸地溜進園去我也沒有去喊她小竇說道這可奇了一個人究竟到哪里去了她說著又領他們重新進園各處尋找了半天剛剛過瞭望荷亭能兒忽然說道兀的那玫瑰花的右邊不是一個人躺在地上麽他們聽說這話不由得一齊去望只見玫瑰花架西邊果然有一個人睡在草地上他們一齊走到跟前一望不是化兒還有誰呢但見星眸緊合玉體橫陳仰在地上動也不動小竇見此情形吃驚不小忙探身蹲下用手在她的唇邊一摸只有一絲遊氣小竇忙教他們三人將她扶起來能兒將她背進綠室放在床上按摩了半天才見她微微地蘇醒過來她口中輕輕說了一聲嚇死我也小竇忙附著她的耳朵邊問道你碰到什麽了她聽見有人問話才將杏眼睜開一看不禁十分詫異地說道我幾時到這裏來的小竇便將方才尋她不著的一套話告訴她又問她究竟是碰到什麽了她便將遇怪的情形說了一遍衆人無不稱奇大家又說了多時才配對兒同入羅帳暫且不表再說章帝到了第二天的早朝已畢先到坤甯宮有個宮女對他說道小竇娘娘身體不安萬歲曉得麽章帝忙問道你怎麽知道的那個宮女說道昨天晚上有一個宮女到這裏來取姜桂露的章帝聽說她有了病便放心不下忙不叠地轉到小竇的宮裏只見裏面一個人也沒有章帝好生奇怪便又轉道到留風院裏也不見化兒心中愈加疑惑便又到小竇的宮中耐著性子一直等到辰牌的時候才見她們雲鬢蓬鬆地走了進來章帝見此光景不覺十分疑惑她們見他坐在這裏不禁也就著了忙粉龐上面未免露出一種羞愧的情形章帝便問她到哪里去的小竇突然被他這一問不禁啞口無言化兒雖然是伶俐過人但是到了這時也就失卻尋常的態度了章帝也不去和她們講話隨即下了一道聖旨命人大舉搜宮這正是君王窺得宮中隱妃子將爲階下囚要知後事如何且看下回分解
