body:
  text: 第六十五回觸目煙塵鴉飛雀亂驚心聲鼓鰈散鶼離卻說劉文叔講過這一番話以後她慌忙還禮答道願君早酬大志恢復漢家基業掃除惡暴爲萬民造福麗華一弱女子又以禮教束身不能爲君盡一寸力殊深自恨惟望勿以麗華爲念努力前途則幸甚矣劉文叔躬身答道多蒙教誨何敢忘懷此番起義倘不能得志願以馬革裹屍了我畢身志願如蒙上天垂佑得伸素志雖赴湯蹈火斷不負卿的雅望也現已四更將盡不能再稍留戀仆去矣他說罷忙放步下樓麗華和明兒也跟著送他出了後園門麗華執著他的手嗚咽問道你們幾時起義劉文叔道差不多就在這數天之內了她嗚咽道願君一戰成功麗華坐候好音便了劉文叔道但願有如卿言後會有期務希珍重他說罷大踏步走了麗華佇望了半天等看不見他才怏怏地回樓明兒笑道姑娘真好眼力我看這人後來一定要發達的將來姑娘可要做夫人了她低著頭也不答話停了一會天色大亮明兒對著穿衣鏡正自梳洗麗華瞥見她穿的妃色羅裙後面一大段青汁和泥汙她不禁心中大疑忙問道明兒你羅裙後面哪里來的那一段肮髒東西明兒聽了這話忙回頭一看不禁滿臉緋紅半晌答不出話來麗華愈加疑惑加倍問個不住明兒勉強笑道還是昨天晚上在園子裏滑了一跤跌在青草上面弄了一大段青汁她笑道你這話恐怕不對吧這青汁汙呢既然是昨天弄上的爲什麽昨天晚上我一些兒也沒看見呢明兒張口結舌答不出一句話來放下梳子只是播弄裙帶麗華到了這時心中反而懊悔起來暗道己不正就能正人了嗎這種情形推測起來准是做了什麽不正當的事情了但是她也十六七歲了人非草木孰能無情呢今天如果執意逼她說她一定是不肯說反要激起她的怨恨來一定要來反噬我那不是糟了嗎她暗想了一會子只見明兒坐在那裏低著頭一聲不響她又暗自說道同是一樣的女兒家她不過生長在貧窮人家到我家來當一個奴婢其實我自己不是也做下了錯事嗎在人家說起主子原是占著面子她們奴婢難道不是人嗎她想到這裏倒反而可憐明兒了芳心一軟不覺掉下淚來明兒見她這樣自己也覺得傷感便伏著桌子也嗚咽起來兩個人默默的一會子還是麗華先開口向明兒道現在不用說了你做的不正當的事就是我不好我如果不爲惜才起見又何能教你如此她說到這裏便咽住哭將起來明兒聽了這些話心中更是動了感觸淚如雨下站起來走到麗華身邊雙膝跪下叩頭如搗蒜地說道奴才知罪奴才該死千萬求小姐恕我的罪我才說呢麗華忙用手將明兒拉起說道你只管說罷難道我還能怪你嗎無論如何總怪我先不正的了明兒含羞帶泣地將夜來一回事細細地說個究竟麗華跌足歎道可憐可憐一個女孩子家豈能輕易失身與人的何況這苟且的事情呢明兒我雖然做下這件違背人倫的事情但是我既然看中劉文叔我向後就誓死無他了太太她不曉得我也是要去告訴她老人家的但是我現在替你設想十分可憐可歎以後千萬不要再蹈前轍才好呢明兒哭道這也是我們不知禮節的苦楚蒙姑娘寬恕我已是感恩不盡了我又不是禽獸當真還要去做那些沒臉的事麽她說道能夠這樣還好只怕知過不改那就沒有辦法她們談了一會子明兒梳好了頭又將裙子換了跟著麗華下樓去定省了這也不在話下再說劉文叔回到白水村見了劉縯劉仲以及劉良等劉縯問道兄弟昨夜敢是又到田上去料理什麽事情的劉文叔笑道原是爲兩個朋友留著不准走在那裏飲酒彈琴直鬧了一夜到此時才回來他剛剛說到這裏瞥見外面有一匹報馬飛也似地跑進村來馬上那人直跑得氣急到了門口滾鞍下馬大叫禍事了禍事了劉縯等大吃一驚大家攏近來齊聲問道何事這樣的驚慌那人大叫道宛城李通因爲設謀不密全家被斬李氏弟兄現已不知去向宛城的賊兵現在已向這裏出發趕快預備馬上就要到眼前了劉仲大叫一聲氣死我也叵耐這些不盡的狗頭膽敢來捋虎須不把這班賊豬殺盡了誓不爲人劉縯劉文叔等忙去披挂接著鄧辰帶了一隊鄉勇擁護著兩輛車子上面坐著女眷蜂擁而來劉縯等裹紮停當提著兵器上馬劉文叔渾身鎧甲腰懸兩口雙股劍外披大紅兜風頭戴百勝盔騎在馬上雄赳赳氣揚揚地準備廝殺把一班平素笑他沒用的人嚇得人人咋舌個個搖頭都道看不出他竟有這樣的膽量連劉縯等也都暗暗稱奇不置霎時西南方煙塵大起金鼓震天劉績知道賊兵已經逼近忙指揮鄉勇排隊以待不一刻賊兵的頭隊已到村前劉縯劉仲劉文叔各自領兵接戰屆時喊殺連天那一班百姓攜幼扶老哭聲震天漫地向東北逃難劉縯等混戰多時只見賊兵愈來仍多勢如潮湧自知寡不敵衆便向劉鍾道二弟此刻萬萬不能再戀戰了再停一刻就要全軍覆沒了趕緊收隊向小長安去再圖計議罷劉仲道我也是這樣的主意無奈三弟和妹妹姐姐現在不知死活存亡我進去尋一趟看說罷舞動蛇矛翻身突入重圍東沖西突如入無人之境尋了半天竟沒有尋著一些影子他滿心焦躁大吼一聲複從西北角上殺了出來瞥見劉文叔在柏樹林子旁邊和一隊賊兵正在那裏混戰見他又要兼顧女眷十分危急他不禁心中大喜大聲喊道三弟休慌我來救你劉文叔正在危急之時忽見劉仲到來精神陡添百倍劉仲催馬前來和那個賊將搭上手不到三合手起一矛那員賊將仰鞍落馬奔到閻王那裏去交帳了一隊賊兵見主將已死無心戀戰霎時東奔西竄散得精光劉仲向文叔道你保著車輛在此休要亂走我去將大哥尋來大家一同到小長安去再圖計議罷劉文叔點首答應劉仲略憩一憩提矛上馬殺入重圍只見劉縯殺得渾身血污獨將四將劉仲眼中冒火拍馬前來迎敵劉縯見劉仲殺進來滿心歡喜忙問道三弟尋著了嗎劉仲一面迎敵一面答道尋著了劉縯精神百倍奮勇大殺滿想將這兩個賊將結果了好領兵奪路誰知那兩個賊將兀自轉戰不衰正在殺得難解難分之時瞥見東北角上喊聲大起賊兵紛紛逃散轉眼看見一員女將坐下桃花征駒手持梨花槍身上也無披挂只穿一件銀紅緊身小襖露出半截粉藕似的膀子飛花滾雪價地殺了進來把一群賊兵殺得人翻馬仰鼠竄狼奔霎時沖到面前劉縯仔細一看不是別人正是他自己妹子伯姬心中大喜但見她嬌聲喚道哥哥請住手將這兩個賊小子交給我她攪動梨花槍便和兩個賊將相搏劉仲在那邊與兩個賊將殺得目眩心駭難分高下劉縯更忍不住拍馬上前幫著劉仲廝殺殺到分際劉仲大吼一聲手起矛落將那員賊將刺死于馬下還有一個賊將連忙兜馬落荒而逃劉仲便縱馬追趕劉縯忙搖手道二弟窮寇莫追收兵要緊劉仲便兜住馬正要和劉縯來助伯姬只見伯姬馬首挂著兩個人頭從那面殺了過來劉縯便和他們二人一齊衝殺出來到了柏樹林下收集殘兵幸喜還有兩千餘人劉文叔道爲今之計先到小長安大家再爲聚議罷這裏萬不能再耽擱的話猶未了但見那班賊兵自被他們沖散後便四處搶劫焚燒無所不爲立時火光沖天哭聲遍野劉縯心中好大不忍仰天長歎道本欲掃除莽賊拯救百姓這樣一來反而害了百姓了劉文叔勸道兄長徒自悲傷于事何益先自保重要緊天長地久恢復有時目下急切先要預備再圖報復要緊勿以小挫即欲灰心劉縯含淚點首指揮兵隊直向小長安進發還未到半路猛聽得四處的喊聲又起一隊賊兵斜次裏沖了出來爲首賊將甄阜梁邱賜雙馬沖出擺開兵器攔住去路大叫劉家賊子留下頭來劉仲大怒大吼一聲放馬直沖過去和甄阜對手廝殺起來這裏劉縯心頭火起舞起雙鞭接著梁邱賜大殺劉文叔哪里還能忍耐舞著雙股劍飛馬前來助戰這時賊將隊裏沖進一個人來手持大砍刀也不答話接著劉文叔廝殺劉伯姬耍動梨花槍便要出來助戰劉元忙搖手道你萬萬不能前去你一去我們這班人豈不要束手待斃麽劉伯姬只得暫耐著性子勒住馬閃著秋波觀陣只見垓心裏十二隻臂膊撩亂二十四個馬蹄掀翻好個厲害只殺得塵沙蔽天目眩心駭足足殺了八十多個回合未見勝敗劉伯姬催動桃花征駒沖入垓心替回劉文叔和那員賊將接上手奮勇大殺起來戰了二十多回合劉伯姬拍馬落荒而走賊將不知死活躍馬追來梁邱賜忙大叫道曾將軍休中了這婆娘暗計話猶未了只得弓弦響處賊將翻身落馬說時遲那時快弓弦又響好厲害的梁邱賜忽地將頭一低那一支箭恰恰從他頭上飛過梁邱賜大怒撇下劉縯拍馬舞刀直奔劉伯姬伯姬毫不畏怕拍馬相迎各展本領大殺起來劉縯深恐伯姬有失忙催馬追上雙戰梁邱賜好個梁邱賜雙戰他兄妹二人展開大刀翻翻覆覆地舞了起來不慌不忙敵住二人甄阜和劉仲又戰五十餘回合仍是未分勝負甄阜騰了一個空子把手中的槍向後一招只見大隊的賊兵一齊衝殺上來劉文叔死力護住陣線無奈來勢如潮水一般四處難以兼顧眼見陣線立刻被沖散了劉文叔心如刀絞拼命價的衝殺不了這時劉縯見大隊賊兵掩殺過去知情不妙忙撇下梁邱賜突圍來尋餉械可憐突了半天哪里還見餉械一些影子他此刻已下了死心舞著雙鞭逢人便打遇將就擊再說劉伯姬和梁邱賜大戰了半天究竟她是個深閨弱質力氣有限哪里是梁邱賜的對手呢先前和劉縯二人戰著還不覺得怎樣吃力後來單身抵敵眼見的不濟了槍法散亂她何等的乖覺拍馬就走梁邱賜曉得她的弓箭厲害也不敢追趕放她走了梁邱賜便催馬來助甄阜雙戰劉仲劉仲和甄阜正是半斤八兩憑空又添上一個勁敵卻漸漸地應付不來再加上見陣線被賊兵沖散愈加心慌腳亂矛法散亂這時梁邱賜泰山蓋頂的一刀斬了下來劉仲忙用矛頭一撥架開大刀接著甄阜的雙錘從左右雙擊過來劉仲把矛杆一轉將雙錘掃開趁勢一矛向甄阜的馬首刺來甄阜忙將馬一帶憑空跳出垓心這時梁邱賜的大刀已逼近到他的頸旁劉仲曉得不好趕著將頭一低早將頭盔被刀削去劉仲大驚忙躍馬欲走甄阜放馬攔住去路劉仲此時知道逃走不了只得下了死心決力奮鬥又戰了五十多回合梁邱賜一擺大刀攔腰斬來劉仲橫矛一隔正要還手瞥見甄阜雙錘天旋地轉地打了過來劉仲將肩一偏讓過上一錘又將馬頭一帶讓過下一錘舉起蛇矛認定甄阜的腕際刺去甄阜兩錘不著正自動怒不防他這一矛刺來將左手腕劃斷大叫一聲右手擎錘正要打了過來瞥見梁邱賜大刀從劉仲的後面飛了過來他急用錘向劉仲的馬首打去劉仲只顧帶馬卻不提防後面有人暗算馬頭還未帶起可憐刀光飛處把一員熱血的勇將登時死於非命翻身落馬梁邱賜甄阜便領兵來戰劉縯和文叔指揮衆卒將他兄弟兩個一重重地圍困起來這時劉縯與劉文叔劉伯姬兄弟姊妹全已分開各個不能兼顧劉縯見大家現都沖散真個是心如火灼也無心戀戰大吼一聲殺出重圍直向棘陽而去劉文叔這時殺得渾身血汙看不見一個哥哥妹妹也沒有心腸廝殺催馬突出重圍在樹林下人疲馬乏不能動彈只得下馬坐在樹根旁邊仰天長歎停了一會猛聽得喊聲逼近慌忙拉馬要走那馬軟癱在地再也不肯起來他可急煞掣出馬鞭一連打了數十下子那馬仍是不肯起來他無法可想放下馬鞭鑽進樹林再說劉伯姬在亂軍中衝突了半天卻不見幾個哥哥的蹤迹她的芳心焦躁得莫可名狀舞動梨花槍旋風也似地殺了出來迎面又撞見梁邱賜甄阜二人又大殺一陣她明知不是對手長嘯一聲撇下二人沖出重圍劉文叔正在樹林裏盼望瞥見賊兵隊裏殺出一員女將來將那些賊兵殺得東逃西散魂落膽飛只恨爺娘生短腿兔子是他們的小灰孫沒命的讓出一條路來殺到面前仔細一看正是他的妹妹伯姬他忙喊道妹妹快來救我伯姬聞聲住馬見是文叔忙下馬慰問文叔便道妹妹你可看見大哥和二哥到哪里去了伯姬忙道我哪知道他們的去處我正要來問你呢文叔滿眼垂淚道他們到這時不見准是凶多吉少了伯姬也粉腮落淚文叔道妹妹你可知道伯父到哪里去了伯姬道他老人家已經到棘陽去了他二人正自談話只見西邊有一群婦女披頭赤足地奔來伯姬一眼看見她的姐姐劉元亦雜在其內忙出林喚道姐姐我們在這裏劉元見她和劉文叔抱頭大哭嗚嗚咽咽地說道你的姐夫已經和外公一道到棘陽去了你們趕緊去罷不要再在這裏留戀了伯姬道姐姐先請上馬劉元哪里肯聽她只是催他們快走猛聽見金鼓大震向東邊直掩了過來伯姬大驚道姐姐兄弟快請上馬我來步行奪路文叔忙道那如何使得說話時那大隊已到眼前劉元哭道你們趕緊逃命去罷不要大家全將性命送掉我此刻還能騎馬麽伯姬見賊兵已到面前不得已飛身上馬劉文叔也跟著坐在馬後這時賊兵像斬瓜切菜的一樣將那一群逃難的婦女立刻殺得精光那一位劉元小姐當然也不免殉難了伯姬和文叔眼見他們的姐姐被賊兵殺死也沒法去救只好各顧性命劉伯姬攪動長槍殺出一條血路只向東南而去再說到這劉縯單騎奔至棘陽城外早見鄧辰劉良等開城迎接大家都來問他究竟劉縯仰天長歎兩淚交流大家便知不妙鄧辰前來解勸不已無奈劉縯心中傷感過度一時只是呆呆地坐在馬上出神一會子瞥見劉伯姬和文叔二人騎著一匹禿馬來到他心中稍爲安慰一點忙問文叔道二弟呢文叔答道我沒有看見鄧振插口問道你姐姐呢二人聽問不禁四目流淚伯姬嗚咽著將劉元臨死的情形說了一遍鄧辰捶胸頓足大放悲聲劉縯也禁不住淚落如珠大家正在悲傷的當兒瞥見一人飛馬而來近前一看不是別人正是李通但見他渾身血迹氣喘喘地走近來見了他們連忙滾鞍下馬放聲大哭道實在只望扶助明公掃除強暴誰知事機不密不獨舍間九族全誅累得明公如此狼狽于心何安劉縯見李通趕來滿心歡喜忙下馬安慰道此事只怪劉某無能不能奮力去援救將軍全家致罹此難心中慚愧將軍何必這樣的引咎呢李通忙道二將軍陣亡了不知明公知道否這正是千古難消今日恨一身誰識雁行冤要知劉縯答出什麽話來且看下回分解
