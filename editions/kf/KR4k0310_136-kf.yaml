body:
  text: 第九十六回占地施威不分黑白瞞天巧計顛倒陰陽卻說章帝正在和竇娘娘談話的當兒瞥見外面跑進一個宮女來氣急面灰到了章帝的病榻之前倒身跪下口中說道沁水公主要見萬歲章帝忙教請進來宮女忙起身出去不多時簇著一位淚眼惺忪花容惟悴的美人來年紀大約不過在二十多歲的光景婷婷嫋嫋地走到章帝的面前盈盈地折花枝拜了下去章帝連呼免禮平身她從容地站起來章帝又命賜座見她這個樣子不由得暗暗納罕忙開口問道禦妹無事不到宮裏來今天突然進宮莫非有什麽事情麽她慢展秋波四下一打量瞥見竇娘娘也在這裏便哽哽咽咽地答道請萬歲屏退左右臣妹有一言奉上章帝聽說這話便將龍袍袖子一層一班宮女立刻退去只有竇娘娘侍立在章帝的榻邊沁水公主默默的半晌章帝向她說道禦妹有什麽事情只管說罷她又停了半天勉強答道沒有什麽大事不過臣妹聞說萬歲龍體欠安今天特地入宮來探望的章帝聽她這話不禁心中大爲疑惑暗道她從來是個爽直而且靜淑的人今天察她的行動著實大有緣故章帝回頭一看只見竇娘娘還立在身後並未退去但見沁水公主星眼中的傷心淚落得像斷線珍珠一般的站了起來便向章帝告辭動身章帝忙命人送她出宮自己的心中十分詫異地忖度道她今天這個樣子斷不是來探病的分明是受了誰的氣似的但是見了我爲何又兀地不肯說出來呢他沈吟了半晌猛地省悟道莫非她和駙馬對了氣麽莫非是礙著竇娘娘在此地不便告訴我麽他想來想去究竟有些不對她與駙馬一向是相敬相愛從來沒有過一回口角他盤算了半天終於未曾弄得明白列位這沁水公主她是誰今天究竟是爲著什麽事情來的小子也好交代明白了原來這沁水公主就是明帝的女兒在十六歲的辰光明帝見她出落得花容月貌而且又是滿腹經綸諸子百家無一不覺明帝愛之不啻掌上的珍珠一般雖欲替她選擇一個東床快婿無奈她的生性古癖所有在明帝的眼中看得上的都被她一概拒絕後來她別出心裁出了三個題目都明帝懸榜徵求應選的才子如果三個題目都做得合式不論貧富老幼都情願嫁給他此榜一出不上十天通國皆知誰都懷著一種願望哪個不想入選呢於是老的白髮皤然的老翁少的年未及冠的幼童均來應選搜腸刮肚嘔心瀝血各展才能交卷後一班應選的共有三萬五千八百餘名一個個將頭頸伸得一丈二尺長但望榜上有名那時不獨憑空得著一個絕色的美人而且平地一聲雷的做一位堂堂的駙馬公了夢中幻想真個是奇奇怪怪不一而足好容易度日如年似地等了三天到了第四天的早上一齊擁到敬陽門前看榜誰知大家你一班我一班的全來看了一個仔細不禁不約而同地一齊歎了一口氣互相稱奇不止你道是什麽緣故呢原來那榜上完全是一張白紙一個字也沒有衆人心還未死來責問守榜官道你們公主既然選試駙馬難道這三四萬人就沒有一個中試麽這事不是分明的拿我們來尋開心麽還有些不遠千里而來的都因爲有一種希望人家才高高興興地來的早知這樣人家又何必徒勞往返耗費金錢呢還有的說道無論如何只要選中一個方不致大家議論呢守榜官答道請諸位原諒一些實在因所有的卷子內中的確沒有一個中試的所以只好割愛請諸位空勞白來一趟了衆人聽說這話誰也不肯服氣有的說道堂堂的公主竟做出這些有頭無尾的事來豈不怕天下萬人笑駡麽有的說道我們一定要請面試有的說道我就將這三個題目拿去和她辯論且看究竟是對不對七張八嘴聲勢洶洶守榜官見勢頭不好連忙著人飛報與明帝明帝深怕衆人糾纏滋變只得下一道旨意各賜紋銀十兩送與衆人作回去的川資衆人哪里肯受一齊說道我本來是希望做個駙馬公的誰爲著這區區的十兩銀子來呢今天一定要請面試守榜官百般勸告毫不中用正在這擾攘不休的當兒從人叢中跑進一個人來身穿月色布的直擺頭帶方巾面如冠玉目若曉星走到守榜官的面前躬身一揖口中說道敝人早就到敬陽驛裏報過名了本擬如期應選不意家嚴突于選試之前日竟逝世了所以敝人未得如期而來但是公主所出的三個題目敝人早就做好了今天雖然是考過了但是榜上無名想是還沒有擇定所以不揣簡陋特將三篇拙作送了過來僥倖一試明知襪線之才斷無乘龍之福但是敝人企慕情殷合式與否均非所計請一轉呈爲感他說罷便在懷中取出他做的三篇來交與他守榜官不敢怠慢趕著命人送去這裏衆人不由得互相譏笑都道憑我們這樣的錦心鏽口還未曾取中他是何人也來癩狗想吃天鵝肉豈不令人好笑麽那衆人仍在這裏紛紛的烏亂不多一會瞥見馬上馱來一個官員背著黃袱後面跟著許多的儀仗軍士他到了敬陽門口翻身下馬將懸在那裏的一張白紙揭了下來慢慢將黃包袱放開露出一張大紅絹榜來他便將這大紅絹懸了起來這時萬目睽睽一齊注視牆上大家仔細一看只見上面寫著名字這時衆人便你問我我問他的誰是宗仙問了半天竟沒有人答應衆人十分詫異這時那個背榜的官員響著喉嚨喊道哪一位是宗仙先生語猶未了那個最後交卷的少年從人叢中擠了出來不慌不忙的口中說了一聲慚愧不料我竟中了他走到背榜官的面前說道在下便是他朝他上下一打量複又問道閣下就是宗先生麽他點頭應道然也他滿臉堆下笑來向他拱手賀道恭喜閣下中選了今天的白衣明天就是駙馬了宗仙只是自謙不已那背榜官員請他上轎進朝宗仙便上了嬌吆吆喝喝地擡了就走這裏衆人沒有一個不豔羨他的福分都說是後來居上出人意外了不說衆人談論再說宗仙隨了背榜官進了午朝門上殿拜覲天子明帝見他一表非凡自是十分欣喜又口試一番果然應答如流滔滔不絕沁水公主在屏後已聽得大概那一顆芳心中說不出的快慰明帝便命次日結婚衆人因爲沒有中選都要求一見公主的芳容沁水公主卻也不忍十分拒絕便在敬陽驛中顯出全身給大家一看衆人見她這樣的天姿國色自是嗟呀而散明帝將宗仙留在朝中任事詎知宗仙之志清高不肯任事沁水公主也是淡泊成性淡雅不願爲富貴兩個一齊要入山修行明帝不准便在長安東門外面賜他們沃田十頃新居一宅他二人住在那裏以便自己不時去望望嬌兒佳婿誰知他們自從到了那裏成日價栽花種竹飼鳥養魚從不干預政事就連回來都不回來明帝駕崩之後他們格外裝聾作啞連禁城內都不到了及至竇氏弄權竇憲造了一座府第離開他們這裏不過半裏之遙不時有人到他們那裏去纏擾摘花探果的沁水公主倒不肯和他們一般見識而且宗仙的爲人默靜而又和藹的絕不去和他們較量誰想竇憲手下一班爪牙狗仗人勢得步進步還只當沁水公主懼怕他們的威勢呢越發擾攘不休有一天竇憲騎了匹馬帶了些獐犬和豪奴惡仆出去行獵沒走多遠瞥見道旁的草地裏有一隻香獐斜刺裏奔了出來竇憲手起一箭正中那獐的後股那只獐又驚又痛沒命地向前跑去他哪里肯舍縱馬追來那只獐慌不擇路地亂竄一頭鑽到一個大院裏去竇憲便也追了進去忙命衆人將院子後門關好預備來捉獐那只獐東穿西跳那些豪奴惡仆竟像捉迷藏似的一樣東邊跑到西邊不多時那只獐跪得乏了只流鮮血撲地倒下被他們捉住了獐可是捉住了但是園內的花草差不多也就蹂躪殆盡了他洋洋得意地帶了豪奴惡仆走到一所茅亭裏憩了下來這時有個小童手裏提著一隻噴水壺走進園一眼望見院裏那些怒放值時的好花踐踏得一塌糊塗東倒西欹那一種狼狽情形真個是不堪入目了那小童見他們凶神似的一個個地都蹲在茅停裏便嚇得魂不附體的飛奔前去報告他的主人了原來這就是沁水公主的後院那小童進去說了一遍沁水公主大吃一驚便與宗仙一齊到後面的賞花樓上推開門窗一望只見園裏百花零落殘紅滿地將一座好好的花園被他們踐踏得和打麥場一樣沁水公主見了好不心痛便對宗仙說道我們費了多少工夫才將這些花草扶持到這個樣子萬料不到被這些匹夫一朝踐踏了乾淨花神有知還要怪我們多事呢她說到這裏不禁歎了一口氣說道人遭塗炭姑且勿論花亦何辜竟遭這樣的摧殘她哽哽咽咽地不禁滴下淚來宗仙爽然笑道夫人你可癡極了天地間沒有不散的宴席物之成敗有數何必作此無謂的傷感呢花草被他們踐踏想也是天數罷我更進一層說無論什麽東西皆是身外之物永不會長久可以保留終究都有破壞的一日她含淚點頭不表他們在這裏談話單說竇憲休息了片晌便與衆人出園回去走出園來只見道旁的禾苗長得十分茂盛不禁滿口誇讚道好田好田這樣的旺發莊稼要是買個十頃八頃一年收的五穀倒不錯的呢手下豪奴爭先答道大人如果看中等田裏的莊稼成熟便派人來收取怕什麽他道如何使得人家的田産我怎好去收莊稼呢又有一個說道這田本是十頃一塊聽說一年常常收到八千多石糧食呢我想大人的府中人丁不計其數一年的糧食開支著實不輕咧要是將這十頃田買了下來每年收的糧食供府中口糧綽綽有餘他聽罷笑道你這話倒不錯但不知十頃田要賣多少錢呢他道大人如果要買不拘多少皆可成功誰不想來奉承你老人家呢或者還可以不要錢奉送呢他聽了這些話不禁眉開眼笑地說道那麽就是這樣的辦去吧你們替我就去打聽打聽是誰家的衆人齊聲答應到了晚間衆人回復他道那十頃田原是沁水公主的大人意下如何呢他冷笑一聲道我已經說過了憑他是誰我總是要買的你們明天就送五千兩銀子過去就是了衆人答應著到了次日清晨衆豪奴帶了五千兩紋銀徑赴沁水公主的私茅中與她說個明白把個沁水公主氣得咬啐銀牙潑開櫻口將那班豪奴罵得狗血噴頭臨動身的時候沁水公主道你們這班狗才回去對那竇憲說明白了這田莫說他出五千兩銀子隨便他出多少我總不賣叫他將眼睛睜開認認我是個甚麽樣子的人休要蔑人過甚現在我正要和他去理論理論呢昨天他爲什麽無緣無故地闖進我後院將花草完全被他踐踏了那幾個豪奴雖然態度是十分強硬但是在她的面前還不敢十分放肆只得垂頭喪氣地回來見了竇憲少不得將她這一番話又變本加厲地說了一遍把個竇憲氣得三屍神暴跳七竅內生煙口中忿忿地說道好好好教她認得我就是了她依仗她是個公主麽我偏要去和她見個高低再加上那班狐群狗黨在旁邊撮死鬼似的攛掇了一陣子竇憲摩拳擦掌一定要和她見個高下便吩咐手下人等到田裏的稼穡一成熟就去動手如有人來阻止將他拘到我這裏來自有辦法衆豪奴齊聲答應不上幾天那田裏的禾苗不覺漸漸地成熟了這班豪奴果然帶了許多人前去硬自動手割得精光沁水公主見了這樣情形知道非見萬歲不可了自己究竟是個金枝玉葉不便去和他們據理力爭而宗仙一塵不染什麽事他都不問只得硬起頭來走到禁城裏去正要去奏聞章帝不料在半路上又碰見了竇憲那竇憲見了她不禁怒從心上起惡向膽邊生便借張罵李地謾辱了一陣子沁水公主終究是個女流之輩氣得渾身發軟連了內宮正想將這番情形奏與章帝不意又碰見了竇後在旁不便啓奏只得忍著冤屈重行回到自己的家中是日到了晚間大司空第五倫忽然到她的家中來拜望宗仙他原與宗仙一向就是個莫逆之交他與宗仙暢談了多時宗仙將竇憲欺負他的一番情形好像沒有這回事的樣子倒是沁水公主忍不住便將竇憲怎樣欺侮的一番話告訴了他第五倫勃然大怒當下也不露聲色當晚回府在燈光之下修了一道奏章次日五鼓上殿徑進內宮呈奏章帝章帝看罷氣得手顫足搖地說道好匹夫膽敢來欺侮公主了怪不得公主昨日入宮欲說又止的幾次原來還是這樣呢他傳下一道旨意立刻將竇憲傳到宮中他見了竇憲跪在地下不由氣衝衝地向他說道竇憲孤王哪樣薄待於你你不想替國家效力反而依勢淩人去占人土地踐人花園你還知道一點國法麽竇憲嚇得俯伏地下不敢作聲章帝將牙關一咬正要預備推出去以正國法這時環瑉聲響蓮步悠揚從屏風後面轉出一個麗人來你知道是誰卻原來就是竇娘娘但見她雙眉緊鎖杏眼含著兩泡熱淚走到章帝的榻前折花枝跪了下去章帝瞥見她來倒又沒了主意停了半晌想想還是姐妹的情重遂毅然將竇憲的官職削去發爲平民竇娘娘舌長三尺無奈此時竟失卻效力了章帝又將竇家的家產一半充公從此就漸漸地憎惡竇氏了接著又將竇篤竇誠等官職逐一削去不復任用可是對於大小兩竇的感情尚未完全失寵不過不像從前的言聽計從那時她們姐妹見了這樣的情形料知萬歲對於她們不見得十分信用了隔了一月以後章帝的病也好了逐日忙著政事無暇兼顧到她們大竇有一天趁章帝上朝的時候便到小竇的宮中互相商議固寵的方法大竇首先說道我們失敗的原由第一就是因那魏老兒的一番泄漏第二就是那老匹夫第五倫不知我們幾世裏和賊子結下了冤家這樣三番四覆地來和我們作對所以層層次次的萬歲就漸漸不肯信任我們了我們再不想出一個妙法子來將原有的寵固住只怕我們也要有些不對哩小竇道可不是麽我今天聽見她們宮女說的萬歲爺現在急急就要搜宮萬一真的實行起來怎生是好那個冤家卻將他放在什麽地方呢大竇道都是你的不好事到如此如果真要搜宮只好叫他先到濯龍園裏綠室內去住幾天再講吧小竇連連稱是大竇又道此刻我倒有好法子能夠將萬歲的心重行移轉來呢小竇忙問她道是個什麽法子她道現在萬歲薄待我們第一個目標就是恐怕我們有些不端的行爲只消如此如此還怕他不入我們的圈套麽小竇大喜這正是安排幽室藏情侶預備奇謀惑帝王要知後事如何且看下回分解
