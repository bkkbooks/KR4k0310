body:
  text: 第七十回瓊珠翠玉聘兒去婉轉歌吟引鳳來卻說女孩兒家到了摽梅年紀總未免有幾分心事便是這蘭兒她受了那道台兒子的保護恩惠心中豈有個不感激的那公子又長得白淨俊美從來說的自古嫦娥愛少年蘭兒看了他那一表人才也不由得不動心只因他兩人遇合得遲分離得快這一段情慷也無可寄託只是兩地想念著罷了在蘭兒的意思那公子是同旗的終須有進京的一天到那時他若有心天緣湊合了卻兩人的心願也是說不定的但是女孩兒的心事藏在心眼兒裏面輕易不肯告訴人知道的如今聽母親說要把她送進宮去急得她嚎啕大哭起來嘴裏連說俺不願去佟佳氏看她哭得厲害便也死了這條心誰知母親雖不曾把她送進宮去她自己卻好似把自己送進宮去了事情真也湊巧前幾天蘭兒出門去看望她鄰舍姊妹她那副俏臉兒俊身材便已落在人眼裏了那天有一個宮內太監正走在西池子胡同迎面見了這蘭兒不覺把他看怔了心想天下有這樣美貌的女孩兒嗎看她穿著長衫垂著大辮額上鬋發齊眉腳下光趺六寸這分明是八旗女兒了他看了忙回宮去報與崔總管知道那崔總管這幾天因挑不出美貌的女孩來正在那裏發悶聽了那太監的報告便急忙趕到西池子胡同來在蘭兒左右人家打聽蘭兒的家世知道她父親做過蕪湖關道又是世襲承恩公蘭兒很夠得上做秀女的資格原來清官裏點秀女也有一定的品級必得那女孩兒的父親做官做到四品以上才可以入選如今蘭兒父親是從二品銜恰恰可以當選秀女的年紀原限定十四歲到二十歲的如今蘭兒已是十九歲正在妙年那總管打聽明白了便去報內務府那內務府此番奉了孝貞皇后的密旨務要選幾個絕色的女子叫這位風流天子收收心因此那班太監和內務府人員都十分起勁在外面到處如狼似虎地搜尋著如今聽這總管報來立刻派了人員和這總管太監們到蘭兒家裏來蘭兒在家裏躲了幾天沒見有動靜便也到庭心裏走走她已不比從前了一切洗衣煮飯的事體都要自己動手這一天她正在庭心裏洗衣服那太監們如狼似虎地闖了進來見了蘭兒指著她說道這不是一個很好的秀女嗎慌得蘭兒忙丟下衣服逃到屋裏去佟佳氏見了忙出來招呼問你們幹什麽來了那總管說道你老太還不曾知道嗎宮裏選秀女呢俺們連日東跑西跑也找不到一個好的如今知道你家藏著一個美貌姑娘怎麽不報名上去呢你家姑娘叫什麽名兒快報出來咱們替你送進去包你萬歲爺見了立刻升做貴人再升做妃子那時多麽榮耀你老太感激我們也來不及呢這番花言巧語說得佟佳氏心裏活動了她想我家如今苦到如此地步這桂祥又是一個傻孩子沒有出息的只得望著這兩個女孩兒了如今宮裏挑選秀女這個機會卻不可錯過蘭兒既不願去我把蓉兒送進去罷想著便進去把蓉兒拉了出來說道我把她報進去罷那總管看著蓉兒只是搖頭那內務人員便勸著佟佳氏道你家把女兒送進宮去原圖得個萬歲寵倖光輝門戶的那非得女孩兒長得俊美不可倘然女孩兒面貌長得差些莫說得不到萬歲的寵倖且白白把一個女孩兒斷送在宮裏這又何苦來我看方才進去的那位大姑娘便好佟佳氏聽了他的話不住地點頭便說道你們既說我的大女兒好且容我三天的限期我那大女兒有些任性須得我要慢慢地把她勸說過來你們三天以後再來討信罷那總管聽了連說可以可以轉身出去了佟佳氏到她女兒房裏橫勸豎勸總說我家衰敗到這個樣子你想想你父親死的時候何等苦惱你弟弟又是一個傻孩子不爭氣的我也不望他了如今只望你的了好孩子你看在母親的面上去了罷仗著你的聰明美貌還怕不得意嗎只求你得意了以後莫忘記你孤苦的母親便了佟佳氏說到這裏止不住汩汩地掉下眼淚來蘭兒也禁不住哭了這一場哭把個蘭兒的心腸也哭軟了便答應她母親拼著斷送了終身進宮當秀女去她母親見女兒肯了樂得她捧著蘭兒只是喚寶貝心肝過了三天那總管又來了另外捧了一包鮮豔衣服給蘭兒替換了佟佳氏和桂祥蓉兒送她上車母女姊妹哭著看車子去遠了才回進屋子去說起此番宮裏挑選秀女並不是咸豐皇帝的意思卻是孝貞皇后的意思這孝貞皇后是一個賢惠不過的人又是一個貞靜不過的人她見皇帝終年住在圓明園裏和那班漢女廝混著荒淫無度不但荒廢了朝政且也糟蹋了身體自己又是六宮之主不能輕易去看管著皇帝況且皇帝登位以來雖有三宮六院也不曾生得一個皇子將來大位無人繼承豈不是一樁極大的心事後來她想了一個計策皇帝既愛好女色不如索性下一道諭旨著內務府挑選秀女也許挑得幾個美貌的女孩子進來得了皇帝的寵倖生下一人皇子來一來也延了國家的血脈二來借著那寵妃的愛情管住了皇帝孝貞後主意已定候著皇帝回宮來的時候便和皇帝說知這咸豐帝和孝貞後夫妻雖然很淡但也很敬重皇后的皇后說的話他在面子上總是依從的一道聖旨下去居然挑選了六十四個秀女皇帝這時的心天正在漢女身上這班旗下女孩兒卻不在他心上只因皇后的好意便胡亂挑選了幾個其餘不中選的吩咐送回家去中選的六十四個秀女一齊送進圓明園去安插皇帝選過了秀女依舊進園去找著四春尋歡作樂去了看官要聽明白這時蘭兒卻在六十四個秀女之內一樣的被他們送進園去安插在桐蔭深處那桐蔭深處是一個避暑的所在那地方原有四個宮女在那裏看守屋子打掃門戶如今又新添了兩個秀女一個便是蘭兒一個名叫燕兒她兩人是同時被選進來的這燕兒原是好人家女兒在家裏吃得好穿得好弟兄姊妹又多十分熱鬧如今送她到園裏來冷清地住著心中想念父母因此朝晚哭泣倒是蘭兒進得園來十分快活可憐她在家中苦的日子久了如今在園裏好吃好穿又有宮女服侍她又生成小孩子脾氣愛遊玩的偌大一座園林天天玩耍著嘻嘻哈哈東走走西闖闖早樂得把家裏的父母也忘記了她是何等聰明的女子她見這桐蔭深處十分幽雅滿院子罩著梧桐葉兒照得屋子裏四壁翠綠她便拿了許多字帖畫譜沒日沒夜學起書畫來真是天生成的聰明女子況且她在家裏也曾學習過幾時不到幾天居然寫得一手好趙體草字畫得一手好惲派蘭竹她便畫了許多窗心兒上面題著恭楷的詩句把屋子裏的窗心一齊換過又在院子裏種下四季蘭花凡是到她院子裏去的一踏進門便覺芬芳觸鼻清雅怡神蘭兒指揮著宮女天天打掃庭院廊房她看待宮女和自己姊妹一般十分親熱因此那宮女都聽她的差遣便是燕兒看她如此高興也暫時把愁懷丟開幫著她佈置房屋看看這桐蔭深處收拾得清潔幽靜真是紅塵飛不到世外小桃源你道這蘭兒真是沒有心肝的只圖玩耍罷了嗎原來她如此辛辛苦苦收拾著屋子卻有她有深心在裏面她看看這地方是一個極好避暑的所在現在雖在暮春時候還不及時但是到了夏天終有一天聖駕臨幸到此那時萬歲見了這個清潔地方不由他不留戀再者看了那窗心上的字畫兒也不由他不注意到自己身上來最可怕的倘然萬歲不到此地來那真沒有法兒了蘭兒一進園來便存了這一條心她們做秀女的原每月由內務府發給月規銀子那蘭兒拿了銀子住在園裏毫無用處便把這筆銀子積蓄起來湊滿了二三百兩便賞給那太監們那太監們常常受了她的賞心中十分感激在太監們的意思蘭兒賞了銀錢總有事體委託他們誰知問時卻沒有什麽事體因此那班太監個個和她好凡是萬歲爺的一舉一動都來報告給蘭兒聽那蘭兒聽了也若無其事看看春去夏來這時正是盛夏時候咸豐帝每日飯後便坐著由八個太監擡的小椅轎到水木清華閣裏去午睡避暑從皇帝寢宮到水木清華閣去卻有兩條道路一條是經過接秀山房的一條是經過桐蔭深處的比較起來經過接秀山房的路又平坦又近便因此太監們擡著皇帝總走接秀山房一條路蘭兒打聽得明白便悄悄地拿銀錢打通總管太監叫他以後擡著皇帝從桐蔭深處圍牆外走過那太監都曾得過她的好處便依她的話如法炮製那桐蔭深處外面圍著一條矮牆東面是靠近路口從外面望進去只見桐蔭密布清風吹樹這一天午後咸豐帝坐著椅轎正從桐蔭深處的外牆走過一陣風吹來夾著嬌脆的歌聲在這炎暑時候看見這一片樹蔭已覺心曠神怡了如何又經得這鈎魂攝魄的歌聲鑽進耳來早已打動了這風流天子的心只見他把手向矮牆內一指那班太監便唵唵幾聲喝著道擡著聖駕向桐蔭深處走來一走進門濃蔭夾道花氣迎人眼前頓覺清涼皇帝連聲說好一個幽雅的所在那班宮女和燕兒見萬歲駕到慌得她們忙趕出屋子來跪在庭心裏迎接這時咸豐帝一心在那唱曲子的秀女身上走進院子來那歌聲越發地聽得清晰當時便吩咐衆宮女站著不許聲張自己跨下轎來向屋子裏走去只見四面紙窗上貼著字畫屋子裏卻靜悄悄的一個人也沒有再看那畫幅兒上具的款是小蘭兩個字字卻寫得十分清秀咸豐帝正看著書畫忽聽得後院子裏歌聲又起清脆嫋娜動人心魄皇帝跟著歌聲繞出後院去只見一座假山隱著一叢翠竹一個旗裝秀女穿一件小紅衫兒手裏拿著一柄白鵝毛扇兒慢慢地搖著風背著臉兒坐在湖山石上唱著曲子真是珠喉婉轉嬌脆入耳再看她一搦柳腰兒斜嚲著雙肩兩片烏黑的蟬翼鬢兒垂在腦脖子後面襯著白玉似的脖子上面橫梳著一個旗頭髻子下面壓著一朵大紅花兒一縷排須挂在簪子上她唱著曲子把個粉臉兒側來側去那排須也不住地擺動著她下身穿著蔥綠褲子散著腳管白襪花鞋窄窄的粉底兒咸豐帝終日和那班漢女廝混著也有些膩了今見了這豔裝的旗女覺得鮮麗奪目嫵媚之中帶著英挺另有一種風味只可惜那秀女只是側著臉兒唱著曲子老不回過臉兒來咸豐帝原想假咳嗽一聲驚動她的又聽她正唱得好聽的時候便也不忍去打斷她的歌聲只是靜悄悄地站在臺階上倚定了欄杆聽蘭兒接下去唱道秋月橫空奏笛聲月橫空奏笛聲清橫空奏笛聲清怨空奏笛聲清怨生唱到結末一個字真是千回百轉餘音嫋嫋只聽她略停了一停低低地嬌咳了一聲又接下去唱道冬閣寒呼客賞梅閣寒呼客賞梅開寒呼客賞梅開雪呼客賞梅開雪醅唱到末一字咸豐帝忍不住喝道好曲子那蘭兒冷不防背後頭有人說起話來急轉過臉兒來看時原來不是別人正是她在心眼兒上每日想著的萬歲爺慌得她忙趴下地來跪著口稱小婢蘭兒叩見聖駕願佛爺萬歲萬萬歲鹹豐帝聽她這幾聲說話真好似鸞鳴鳳唱便吩咐她擡起頭來這才細細地看時只見她眉彎目秀桃腮籠豔櫻唇含笑鹹豐帝看了不覺心中詫異想朕在外面遊玩見過美貌的女子也是不少的再沒有似她這般鮮豔動人的朕一向說八旗女子沒有一個美貌的如今卻不能說這個話了他想著把手向蘭兒一招轉身走進屋子去便在西面涼床上盤腿兒坐了又指點蘭兒在踏凳上坐下便問道你适才唱的是什麽曲兒蘭兒便奏稱是古人做的四景連環曲兒咸豐帝說你說四景朕卻只聽得秋冬兩景還有那春夏兩景快快唱來朕聽那蘭兒聲稱遵旨便跪在皇帝跟前倚定炕沿提著嬌喉唱道春雨晴來訪友家雨晴來訪友家花晴來訪友家花徑來訪友家花徑斜夏沼風荷翠葉長沼風荷翠葉長香風荷翠葉長香滿荷翠葉長香滿塘咸豐帝聽了笑說道這詞兒做也做得巧極了也虧你記在肚子裏蘭兒便起身去斟了一杯薄荷甜露來獻在榻前那皇帝一面喝著一面打量著蘭兒的面貌只見她豐容盛鬋白潔如玉她因聖駕來得突兀也來不及更換衣服依舊穿著小紅衫兒半開著懷兒裏面露出一抹悴綠色的抹胸來那一條黃澄澄的金鏈兒繞在粉頸上倍覺撩人咸豐帝喝完了杯中甜露把空杯兒遞給她蘭兒伸手來接一眼見她玉指玲瓏又白淨又豐潤又纖細那指甲上還染著紅紅的鳳仙花汁掌心裏一抹胭脂鮮紅得可愛蘭兒正要接過茶杯去猛覺得那皇帝伸過手來把她的手捏住了接著哐啷一聲一隻翠玉茶杯跌在地下打得粉碎蘭兒這時又驚又喜只是低著脖子羞得擡不起頭來皇帝趁勢把她一提提上炕沿去坐著騰出右手來摸著她的掌心兒一邊問她的姓名年紀幾時進宮來的又問她家住什麽地方父親居何官職蘭兒聽了一一奏對明白咸豐帝一笑把她拉近身來湊在她耳朵邊低低地說了幾句話蘭兒不由得噗哧一笑只說得一句小婢遵旨把她兩面粉腮兒羞得通紅一面忙走出前院去把那總管崔長禮安得海兩人傳喚進後院去皇帝對兩個總管說道快傳諭水木清華去說朕今天定在桐蔭深處息宴了叫他們散了自便去罷那總管聽了心下明白便口稱遵旨把院門兒掩上悄悄地退出去了這裏蘭兒服侍皇帝息宴直息到夕陽西下才見皇上一手搭在蘭兒肩上走出院子來納涼蘭兒陪在一旁有說有笑看皇上臉上也十分快樂過了一會太監擡過椅轎來皇上坐著蘭兒跪送出院皇上一轉背那院子裏的宮女和太監們都向她道喜蘭兒雖害羞肚子裏卻十分得意她知道皇上這一去今夜一定舍她不下必要來宣召的忙回進房去細心梳妝起來在夏天時候最容易淌汗午後蘭兒原洗過浴的只因伺候聖駕又不覺香汗濕透小紅衣她又重新用花露洗了一個澡輕勻脂粉宮女替她帶上一朵夜合花兒打扮得通體芬芳專候皇上寵召要知後事如何且聽下回分解
