body:
  text: 第一百十九回禁內鬧瘟神佞臣得計幃邊來俠女淫婦伏誅卻說諸葛亮受先生的遺囑鞠躬盡瘁夙夜辛勤南征北伐十二年如一日奔走沙場矢志無二漢祚將衰任他有通天的本領也不能吞吳並魏了甲寅十二年八月二十三日他老人家與世長辭了臨終的時候後主撣在榻前受囑他囑後主宜重用蔣琬費禕薑維等後主泣不成聲宛喪考妣一樣以丞相儀節葬之諸葛亮死後後主遂重用蔣琬起爲尚書令總統國事這時魏國的曹丕早已到鬼門關去篡閻王的位了此刻繼立的是曹睿比較曹丕還要貪暴不仁惟對於司馬懿則不敢輕視司馬懿此刻已由兵馬總督升到太傅了出入宮廷毫無顧忌曹丕所幸的郭貴人年紀在二十五六歲不慣獨宿屢次想私奔他去無奈宮禁森嚴不能讓她逃走司馬懿有兩個兒子大兒子師二兒子昭俱是狠視鷹顧的傢夥倚仗他父親的勢力出入宮門無人敢阻止一下子這時朝堂上的氣象宛然是曹賊對獻帝的那種樣兒出來了諸凡百事沒有曹家說的一句話了司馬師每日到宮闈裏尋察一回一則是監視曹家的行動再則是獵色尋歡有一天從九福宮前走過剛到五雲軒的左邊忽聽得裏面有歎息的聲音司馬師不由得立定腳步側耳凝神地聽了一會子好像是女子在裏面哭泣的樣子他便輕手輕腳地走進五雲軒進了房間只見一個女子面孔朝著牆壁似乎在那裏哭泣的樣子再看她的身上裝束卻是個貴人的打扮只聽她唉聲歎道你死了倒也罷了但是撇下了我年紀未過三十叫我怎生度法過一天比過一年還要難過咳我真苦命司馬師溜到她的身邊一把將她摟到懷中唼喋一聲親了一個嘴說道我的兒你不要怨天怨地的有我呢她回頭一望不禁嚇得一大跳只見司馬師那一副黑煞神似的面孔險一些將魂靈嚇得離竅忙要聲張司馬師忙將寶劍拔出來在她的臉上一晃說道你要不要命要命趕緊給我不要聲張她嚇得手顫足搖忙央告道瘟神爺爺我又沒有什麽去處得罪你老人家望你老人家饒恕我罷列位這瘟神的兩個字來得突兀麽原來有一種原因司馬師常常昏夜進宮強姦宮女那班太監誰聲張誰先送命所以他們見司馬師來誰也不敢去撒一個屁而且司馬師還諄諄地囑咐他們不要聲揚誰敢露一句風聲明裏不殺暗裏也要差人來將他殺了所以他們一個個守口如瓶斷沒有一個人敢去討死的他進宮了見了中意的宮女便硬行個三七二十一並且自稱爲瘟神下界的他那一張面孔的確和寺裏的瘟神一樣那班宮女可憐給他奸宿了還不敢告訴人起首一兩個宮女後來漸漸地普遍了大家不免互相駭告有兩個神經過敏的還說瘟神菩薩看中你們將來一定娶你們去做瘟神娘娘了嚇得那班宮女提心吊膽一到晚上忙不叠地就躲避起來了曹睿到了晚上每每的使喚宮女連鬼影子也喊不到一個不免要生氣便將禁宮的太監喊去問他是什麽緣故太監還敢說是司馬師作怪的麽只好說是瘟神菩薩在宮中顯聖的一番話來搪塞最可笑的曹睿聽說這話忙去請了多少大法師大喇嘛來驅瘟逐疫亂了一個多月司馬師因爲那些道士和尚在宮裏廝鬧著不好進去獵色好生焦躁又等了幾天那些和尚道士仍然是不肯走他可急了暗中派人和內外的太監說通自己的臉上用紅黑白塗起來赤膊光頭下身著了一條紅揮褲手執四竅八環牛耳潑風刀怪叫如雷沖進宮去那班道士和尚正在舞陽正殿上香花頂禮在那裏裝模作樣的猛地跳進一個猛惡的猙獰的怪物嚇得那班大法師大和尚跌跌爬爬爭先恐後地逃命去了早有人飛命似地去報知曹睿了把個曹睿嚇得鑽進床肚裏連大氣也不敢喘一下子到了第二天那班和尚道士散得無蹤無形再也不敢來了曹睿無可奈何只得在富德宮右面特地起造一所瘟神祠每日親自焚香頂禮滿望瘟神爺爺給他這一敬就不來光顧的呢誰知還是外甥打燈籠照舅不是某宮女失蹤便是某宮女懷孕鬧得滿城風雨人人皆知皇宮裏面出了魔了曹睿被他說得沒法只得召集群臣商量辦法一班武將誰也不信便想出一個輪流值夜的方法來去保守宮門說也奇怪自從這一來瘟神菩薩竟不來了曹睿大喜但是諸將積久生厭不像從前那樣的徹夜不眠了有時到的還有時不到的便馬馬虎虎的不認真了加之司馬師又和他們說明了他們更不認真了過了一年多宮裏仍舊又鬧鬼了不過有時來有時去不像從前那樣了曹睿見瘟神爺爺只和宮女們結緣未曾看中皇后還算幸事於是只好由他去罷閒話少說再說郭氏見了司馬師只當他是瘟神來光顧的呢嚇得三魂落地七魄升天沒口地央求道瘟神爺爺請你老人家放了我罷我明天豬頭三牲香花供奉你老人家司馬師將她面孔捧著細細地一看覺得十分嫵媚動人雖然徐娘半老丰韻猶覺存在眼角眉梢露出許多騷氣來司馬師看得眼花繚亂就地將她抱起按到床上去幹了一回她只知道這位瘟神菩薩殺伐的怎樣厲害呢原來和平常人沒有什麽分別反而比較他人來得著實一些郭氏這時又羞又喜在枕邊觀顔問道你既是菩薩這些事兒還能做麽不怕穢了你的道行麽司馬師不禁嗤的一聲笑苴你知道我是瘟神麽實對你講罷我是大將軍司馬師我羡慕你娘娘的姿色不是一日了從前那些玩意兒皆是我幹的今天蒙娘娘准了我我才敢告訴你的如果娘娘不棄我天天前來侍候如何她聽這番話又驚又喜地說道果真你是司馬師麽他道誰敢在娘娘面前撒謊呢她笑嘻嘻地說道你也忒刁鑽了誰也想不出這些換日偷天的妙法來啊我且問你你進出宮門難道太監們一個都不知道嗎司馬師笑道便是曉得誰又敢來和我爲難呢她道太監爲何不到魏王那裏報告呢司馬師說道這更不要提了不是我說一句海話現在朝中除卻我家父子更有何人替曹家出力呢他們便是到萬歲那裏去報告萬歲還能怎樣我麽郭氏道既是這樣你不妨常常來替我解解悶兒司馬師道好極了娘娘不負我我還敢辜負娘娘麽他倆談了多時司馬師才告辭走了從此黑來暗去從無一日間斷的天下事要得人不知除非己莫爲滿則招損快心事過必不討好司馬師生平只有兩怕一怕他的父親司馬懿第二便怕他的老婆東方氏這東方大娘生得十分醜陋兩臂有千斤氣力生性又慣拈酸司馬師聽見她那副劈毛竹的喉嚨馬上就得渾身發軟了東方大娘天不怕地不怕就怕她的公公司馬懿司馬懿不在家裏那麽便是她的天下了司馬師和婢女說一句話那個婢女一定給她打個半死的司馬師平日不得出門一步如有要事必須要在她的面前通過一聲得她的准許方可動身呢否則不能擅自出門的司馬師受到這種無窮的拘束痛苦十分怨恨大凡物極必反他忽然想出一個法子暗中托人在曹睿面前保他爲五城軍馬司一職曹睿准如所請他得了這個頭銜便借著閱操巡察捉盜等等的名目哄騙他的夫人其實是到娼家去閱操宮中去巡察的起首還小試其端隔了三天五日在外面住宿一次後來得著溫柔鄉的風味膽量漸漸的大了隔了一天便要到外面去打一天野食東方大娘雖然強悍但是對於正直的事情卻也不去反對她見夫主這樣的爲國辛勤斷不和他爲難反而比從前待他好司馬師見她不疑當然是自安自慰什麽事都有癮的煙酒嫖賭差不多全有癮的癮當然越來越大的司馬師在外面的野食吃得上癮了每天不出去好像屁股上生著疔瘡一般在家裏一刻時候也不能停留至多日間在家裏敷衍敷衍他那位夜叉夫人到了西山日落燈光一放的時候他便動身了加之現在和郭氏打得火熱的一天不去就如過了一年有時外面狂風暴雨的昏夜他照例是要出去的東方大娘見丈夫這樣的爲國操勞屢次勸他休養休養他都是正顔厲色地向她說你那這些婦女之流哪里知道忠孝兩字爲臣的吃了皇家的俸祿身子就賣給皇家了雖然是粉身碎屍也在不辭之例呢東方大娘聽他振振有辭的這篇神聖不可侵犯的大道理當然是無言可答了有一天在二更的時候司馬師在房中對東方大娘說道夫人我要到玄武門去巡察了東方大娘道你連日操勞面上瘦削得多了今天就在家裏休養一宿罷他正色說道這巡察一職豈可輕忽的萬一有了變動其罪不是在我一個人身上麽東方大娘道現今四處升平你也太過慮了他道你那些婦人家知道些什麽朝朝防火夜夜防賊寧可防患于未來不教臨時措手不及他說著挺腰凸肚地出門去了停了一會守門的走過來報道玄武門的值日軍官伍秋方要見大人東方大娘聽說這話將三角棱的眼睛一翻放開雄鴨嗓子喝道放你媽的屁大人早就去了難道你的兩隻狗眼生到腦袋後面去了不成嚇得那個守門的一疊連聲的回答道小人看見的小人看見大人出去的她哼了一聲又說道什麽小人大人你既看見爲什麽不去回他那個守門的忙道小人方才對他說過了他說大人有三天沒有去了她聽說這話將黃眼珠一翻道哦有三天沒有去了嗎守門的道他說的三天沒有去了東方大娘將一張豬肝臉往下一沈說道快給我將那個軍官帶進來我有話問他守門的答應一聲飛也似地出去了不多會走進一個全身披挂的軍官來走到她的面前行了一個禮嘴裏說伍秋方參見夫人她說道姓伍的你今天到我們這裏來幹什麽的伍秋方道請大人去巡察的她冷冷地說道大人沒有去麽伍秋方老實答道大人三天沒有去過了今天因爲五城的夜防軍在大操場會操所以要請大人去檢閱她道我知道了大人此刻沒有工夫去就請你帶檢一下子罷伍秋方道謝夫人他說著匆匆地告辭走了東方大娘此刻心頭倒翻了五味瓶說不出是甜是鹹是辣是酸將那一嘴黃金的牙齒咬得咯吱咯吱地作響停了半天又將那雙橫量三寸的金蓮在地板上撲通一蹬罵道好賊崽子竟敢在老娘面前來搗鬼了怪不得成日成夜的不肯在家裏原來還是這個玩意兒呢好好好管教你認得老娘的手段就是了她自言自語的一會子忽然喊道鶼兒在哪里話還未了從後轉了一個面如鍋底首似飛蓬的女郎來渾身上下純黑色的裹紮背插單刀大踏步走到她的面前躬身問道主母喚我有什麽差遣東方大娘道你替我去探一探你的主人的蹤迹現在什麽地方快快回來報我要緊鶼兒答應一聲一個箭步縱到庭心身一晃早巳不知去向原來這鶼兒是東方大娘的雁棲河口收著的教她武藝這鶼兒十分嬌健靈慧未到三年竟能飛檐走壁來去無蹤了東方大娘本來是銅馬頭領東方大年的玄孫女兒累世在陝潼一帶打家劫舍司馬懿和他們打仗幾次無奈這班銅馬的遺種十分強悍竟不能一時克服司馬懿爲息事寧人起見願與銅馬首領東方雄連姻東方雄見司馬懿這樣的聲勢當然是很願意的便將女兒嫁給司馬師了過門之後東方雄也就改邪歸正了統率一班亡命追隨司馬懿爲官家效力了閑文休提再說鶼兒上得屋頂自己一沈吟暗道這京城裏的地方很大的漫漫地教我到哪里去找呢如今不到別處且先到皇宮中去刺探一下子再說罷她打定主意施展一種陸地飛騰法身輕似燕直向皇宮而來不多一會到了前禁宮的天井裏她騖行鷺伏地在屋上察聽消息猛聽得下面有兩個太監在廊下談話她直著耳朵悄悄地聽他們說些什麽此刻有個太監歎了一口氣道淩公公你看現在這禁宮裏還有一些規矩嗎司馬師出入無阻要奸宿誰便奸宿誰眼睛裏哪里還有主上呢那年老的聽得這話很驚怕連連向他搖手道低聲低聲方才他剛剛進去不要給他聽見連我都送掉了性命呢那一個將腦袋往腔子裏一縮舌頭伸了兩伸悄悄地道好險好險他是幾時來的呢那個年老的道萬歲的晚膳還沒有用他就到了那個道他現在又看中誰了那個年老的道那不是和郭夫人勾搭上手了麽你看他哪一天不來真要算風雨無阻了鶼兒在屋上聽得清清楚楚便不再留掉轉身子好像秋風飄落葉似的不多時到了府中將方才聽見的話一句不瞞的完全告訴于東方大娘把個東方大娘氣得哇呀呀直嚷了一陣子將黃牙錯得格格地發響霍地站了起來在兵器架上取下朴刀向鶼兒一招手一同上屋不一刻到了皇宮的屋上她們兩個尋察了半天只見這皇宮裏面樓臺疊疊殿角重重不知道司馬師藏身在什麽地方東方大娘向鶼兒悄悄地說道你看這裏這樣大的地方到哪裏去尋他們呢鶼兒笑道那要知虎去處先問采樵人東方大娘點頭會意不暇答話一個鷂子翻身從屋上直躥下來立在空庭心裏四下裏一打量猛見東面有一間房子裏有燈光衆門縫中透出東方大娘躡足潛蹤地走進來從門隙中往裏一瞧只見兩個樵房值夜的太監面對面在那裏一遞一口地飲酒嚼肉東方大娘用刀在門上一撬誰知裏面沒有下鍵豁地開了那兩個值夜的見了東方大娘那種夜叉的面孔早嚇得矮了半截正待聲張東方大娘不待他們開口霍地從背上取下樸刀在他們的臉上一晃低聲說道動一動馬上就請你們到外婆家去他兩個嚇得撲地跪下央告道奶奶饒命東方大娘用手一指道我且問你可知道司馬師和郭氏住在哪一個宮裏他兩個齊聲答道就在這椒房的後面輔德宮的上房那裏東方大娘聽得走過來將他兩個兩手倒剪嘴裏塞上一塊棉花做作停常便和鶼兒直向後面而來這正是無名醋火三千丈可憐雌威莫敢攖要知後中如何且看下回分解
