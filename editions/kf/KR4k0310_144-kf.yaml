body:
  text: 第一百四回施詭計羽士藏春雲雨室慕芳容村兒拜倒石榴裙話說衆醫士聽得童老太太這兩句話便一齊向那道土指著道他不是太太請來的回天手麽小姐的病就請他診視還怕不好麽童老太太展目朝那道士一看不禁暗暗納罕道這真奇極了這個道士是誰請他來的忙對衆人說道這位道師爺我們沒有請啊還只當是諸位請來的呢衆醫士忙道啊我們沒有請誰認得他呢童老太太聽說更加詫異那一班家將聽說這話便一齊搶著說道太太還猶豫什麽這個道士一定是來騙吃的如今既被我們察破也好給他一個警戒大家說了便一齊伸拳捋袖的預備過來動手童老太太忙喝道你們休要亂動我自有道理衆人聽這句話便將那一股火只得耐著看他的動靜童老太太走到那個道士面前深深的一個萬福可怪那個道士正眼也不去瞧一下子坐在那裏紋風不動這時衆人沒有一個不暗暗生氣的童老太太低頭打一個問訊口中說道敢問道師爺的法號寶觀何處呢那道士把眼睛一翻便道你問我麽我叫松月散人我們的觀名叫煉石觀離開洛陽的西城門外大約不過三裏多路罷童老太太又問道道師今天下降寒舍想必肯施慈悲賜我家小女的全身妙藥的他笑呵呵地說道那是自然的不過我看病與衆不同卻無須三個成群五個結黨的我是歡喜一個人獨斷獨行的好童老太太忙道那個自然只請道師爺肯施慈悲也不須多人了他笑道要貧道看病須要將請來的先生完全請回去貧道自有妙法能將小姐在三天之內起床童老太太聽說這話真是喜從天降忙命人送出許多銀兩與那些醫士請他們回去衆醫士誰也不相信他這些鬼話一個個領著銀子嘻笑而去看官這道士來得沒頭沒尾的而且又形迹可疑他究竟是個什麽人呢小子趁諸醫士走的當兒也好來交代明白免得諸位在那裏裏胡猜瞎測打悶葫蘆這洛陽城西自從和帝以下就有這煉石觀了那起初建造這煉石觀的時候究竟又爲著什麽事呢原來自從明帝信崇佛教後道教極大的勢力不知不覺地被佛教壓下去了在十年之內百個之中沒有十個相信道教呢誰知到了章帝的手裏百中只有一兩個人了人人都以佛教爲第一個無上的大教反說道教是旁門左道了誰信道教馬上大家就乘機笑他迷信唾駡他腐舊誰教不肯去親近真個是一入道教萬人無緣了在和帝時代的永元四年的時候天時乾旱八月不雨民收無望赤地千里萬民饑饉看看有不了之局而洛陽的周近又鬧著蝗蟲一般饑民將樹皮草根吃完了便來吃衣服書籍苦不勝言和帝見這樣的天災不禁憂慮得日夜不安如坐針氈尤其那長安城內的饑民餓得嚎啕震地和帝親出東郊昭告天只求甘露連求三天一滴雨也沒有求下來便出榜召集天下的高僧作法求雨衆和尚誦經念佛烏亂得一天星斗一連求了好幾天結果一點效力也沒有依然赤日當空毫無雨意和帝大爲震怒便將這班吃俸祿的和尚一齊召來大加責罰一面又出皇榜召求天下有道之士來求雨未上半天來了一個仙風道骨的羽士自稱是喜馬拉雅山紫荊觀裏的道祖今見天下大災所以來大發慈悲普救萬民的和帝本來重佛輕道到了這時卻也無計可施只得恭恭敬地請他作法那道士卻要求和帝他求下雨來之後要將道教原有勢力和信仰完全要恢復起來和帝只望他求下雨來什麽事情都一口承認那道士擇了吉地搭台作法未上兩時果然是烏雲滿布大雨滂沱一共下了有一尺二寸有奇滿河滿港萬民歡悅和帝更是十分歡喜便恭請他做國師那道士再也不肯和帝便在洛陽城西造了一座煉石觀把那道士做下院那道士便收了許多徒弟在觀裏修煉到了永元八年的三月裏那道士將觀內所有的道士完全帶著走了一去不知去向只留下兩個服侍香火的道人這兩個道人見他們走後便將一座煉石觀和一百頃禦賜的田完全視爲己有也收羅弟子自己大模大樣地居然做起道祖來了成日價和一起挂名的弟子大吃大喝私賣婦女任意尋樂有什麽官員經過煉石觀拜訪那個求雨的老道祖他便說回到喜馬拉雅山去證道了衆官員二次三次都碰不著後來也不來了日子既久便沒有人提起了倒是那一班山野孤禪的倒得著實惠不少不料被一班無賴之流窺破內中私情便來要挾那兩個假道祖分點潤他們見這班凶神似的流氓早已矮了半截滿口答應那班流氓聽見答應便邀了許多的羽士在觀內吃喝嫖賭爲所欲爲一種放浪的範圍簡直沒有限制勢將喧賓奪主了衆道士見形勢漸漸的不對卻也無法可想只怪當初一著之錯悔不該開門揖盜的鬼混了四十多年竟沒有一個人知道他們的內幕不料有一天忽然來了兩個道士自稱是喜馬拉雅山紫荊觀的嫡派特地來傳道的他們便到洛陽城內去報告官府請官府將觀收回與他們修煉官府當然是准他們的請求立即收回將一班流氓假道士趕得一乾二淨的這兩個道士進了觀又召集十幾個徒弟鎮日價地燒丹煉汞倒也十分起勁可是這兩個道士又何嘗是喜馬拉雅山的嫡派原來是兩個妖術迷人的蟊賊他們早就知道煉石觀的內容了便來使一個空穀傳聲的法子果然不費一些口舌竟將一座煉石觀攫爲己有鳩占鵲巢趁此好慢慢地施法迷人這兩個道士一個名叫水雲居士一個名叫松月散人水雲的妖法多端能料知百里之內的酒色財氣然後使松月去按地址尋訪得實在便使妖法去攫財攝人有一天他卻算到孫壽娥的身上了便差松月去打探壽娥的年庚八字這松月刁鑽異常眼珠一轉主意上來便請一個老婆子到孫府上去假裝一個算命的道婆在無意之中將壽娥的生辰八字完全哄騙了去告訴松月松月忙又告訴與水雲水雲便用紙剪成一個女人的模樣將她的年庚八字寫在上面施動妖法將一個如花似玉的壽娥立刻弄病了停了一月之後他打聽孫府裏差不多周近的醫士全請到了心灰了他才打發松月前去的再說童老太太打發衆先生去後便向松月散人問道道師小女的病還有什麽法子想呢他道須我先去望望才能作法醫治呢童老太太聽說這話忙將他領到壽娥繡樓內揭開帳子松月一看不禁魂飄魄蕩暗道怪不道水雲費了這一番苦心這貨色果然是生得十分漂亮他便伸手在她的頭額上抹了兩把對童老太太道正是正是四十多天了他故將眉頭一皺說道我只能醫三十天以內的病過了三十天我卻沒有法子可以挽救了童老太太聽了這話不禁將一塊石頭依舊壓在心頭不由得哭道道師無論如何都要望你大發慈悲救一救小女的命老身就感謝不盡了他道那麽這樣罷我們師父他的法力高強太太可捨得將她送到我們觀裏去請他醫治不消半月包管你家小姐一複如初童老太太聽說這話忙道有何不可有何不可只要我家小姐病好莫說半個月便是一個月老身也就感謝不盡了他道事不宜遲我先回去求我師父你家趕緊用暖轎送去萬勿延誤要緊要緊童老太太滿口答應他便告辭回到觀裏見了水雲便將以上的一番情形說了一遍水雲便將眼珠一轉計上心來頭點了點說道只要貨色進門不愁她不賣的不多時童老太太和她乘著兩頂暖轎帶領了許多的家丁從仆前呼後擁地到了煉石觀裏松月忙將她們接入東廂童老太太便命人將她從轎裏扶了下來但見她雙頰緋紅星眼微餳弱不禁風地扶在兩個婢女身上走下轎來童老太太便向松月道你們老神仙現在哪里可能引老身前去參拜麽松月忙道我們的師父一向是不肯與凡人接近的只因爲你家小姐不是凡人乃是天上雌鸞星下凡的現在不能不替她救災救難的你卻千萬不要去童老太太諾諾連聲地答應忙著又道老神仙說的我家小姐的病能在幾天才好呢他道十天之內吧他說罷便教兩個婢女扶著壽娥跟他進去走過第二道殿他便將那兩個婢女打發她們回到前面去這時來了兩個小道士將她彎彎曲曲地扶到一個極其秘密的室裏松月趕緊回到前面對童老太太道你老人家是住在我們觀內還是回府呢童老太太道如果在十天之內老神仙將小女救活老身在這裏有許多不便不如先且回去好在離這沒有多遠的路有什麽事情一呼就到松月便道太太回去倒也不錯不過七八天的當兒小姐的病就好了到那時再請過來也不爲遲哩童老太太又道我的小女現在什麽地方呢松月道現在練功室裏師父替她醫治和懺悔呢太太請放心罷在我們這裏什麽事都要比府上來的周到呢童老太太深信不疑告辭登轎留下兩個僕婦預備叫喚其餘都帶了回去再說水雲見了壽娥早已魂不附體忙去將紙人子燒了不多時壽娥如夢方醒微開星眼只見自己坐在一張虎皮的軟墊子上面再朝四下裏一打量不禁大爲詫異只見房內的擺設倒也十分精致可是不是她平日所居的繡樓了她暗暗地納罕道我現在到一個什麽地方了我倒不解這時靜悄悄的一點聲音也沒有她好生疑惑便站起來走到門邊意欲去將門放開看個究竟不料用盡平生之力莫想得動分毫好像外面鎖了一般她萬般無奈只得又重行回到那沈香榻上坐了下來偶一擡頭猛見帳子裏懸著一個錦緞的荷包她取下來放開一看一陣香味直噴出來她嗅著這股香味不由得信手取了一粒紅色的丸子出來大約有豆子大小她暗道這丸藥是做什麽用的放在嘴內一嘗不嘗猶可這一嘗卻大不對了那丸子卻也古怪到了她的嘴裏一經津唾便化了她覺得又香又甜便咽了下去停了一會口幹舌燥春心搖蕩周身火熱得十二分厲害這時突然聽得外面有人啓鎖不多時門呀的一聲開了走進一個二十多歲的公子來她正在這渴不能待的時候瞥見有個男子進來她也顧不得什麽羞恥便站起來將那男子往懷中一抱說道你可肯與我那男子微笑點頭霎時寬衣解帶同入羅幃容容易易地將一個完璧女郎成爲破瓜了一度春風之後把個壽娥樂得心花大放料不到世上還有這種真趣便要求那少年重演第二次那少年欣然不辭騰身上去重行鏖戰了多時真個是雲迷巫峽雨潤高唐枕席流膏被翻紅浪陽臺縹緲恍登仙境一會兒雲收雨散她抱著那少年問道你叫個什麽名字他笑道我名字叫水雲她又笑問道我們不是天緣巧遇麽我記得在家裏的怎的就會到這裏來呢他忙低聲說道此地並非凡地乃是仙府你休高聲浪語的要一班仙人知道了你我就樂不成了她連忙噤住半天才悄悄地對他說道照這樣說來你也是個仙人了他微笑點首道我不是仙人怎能將你攝得來呢她聽說這話心中十分榮幸暗自說道我的運氣真正不壞竟邀仙人寵眷將來還怕不成仙麽她想到這裏不禁眉飛色舞起來摟著水雲又吻了幾吻水雲笑問道你餓了不曾她忙道不餓不餓先前倒覺得有一點兒現在一些兒也不覺得餓了難道這個玩意兒還能當飽麽他笑了一笑也不答話便起身坐起她忙問他到哪里他道此刻仙府裏要點卯了要是不到便要受罪的她忙又問道你去幾時來呢他笑道馬上就來了他說著將衣服穿好開門出去他又將門鎖起她在榻上此刻十分疲倦不知不覺地沈沈睡去到了天晚水雲命人送些酒菜和飯進來自己將門關起走到榻前將她輕輕地推醒她睜眼看時只見房裏擺著一桌酒席他坐在她的身邊她笑問道你幾時來的我怎麽不曉得他笑道你這樣的熟睡哪里能知道呢她也不客氣竟和他手攜手並肩坐下低斟淺酌的起來吃的那些小菜也不過是些雞魚肉鴨之類她不禁疑惑地問道久聞仙人茹素怎麽你們也動起葷來呢他笑道你哪里知道天上何異人間呢不過對於葷的一道不常有罷了不瞞你說我怕你仙府裏的東西吃不來特地差人到下界去辦的她聽他這話足見他愛己的心切了那一股熱烈的愛情陡增了百倍便覺除了水雲再也沒有第二個親人了一會子兩個人都有了些酒意忙攜手入幃重整旗鼓大戰一番不能細述就這樣朝朝尋樂夜夜貪歡一轉眼三四天飛似地過去了這時卻氣壞了一個人你道是誰卻原來就是松月他們的常規在外面騙到錢財同用弄到婦女同樂松月見壽娥生得十分嬌嬈出色早已垂涎萬丈了滿心期望輪流消受不料被水雲視爲己有一些兒也不分潤與他於是將那一股醋火直沖至泥丸宮之上忍耐到第四天還指望水雲給他解解渴呢誰知水雲連房門都不出了他可氣壞了等到未牌的時候還未見他出來正想打門進去和他廝拼瞥見他滿臉春風從後面走了出來匆匆地走進房去松月忍無可忍便跳起來向他說道水雲你可記得當初的盟約麽水雲聽他這句話明知他要分自己的肥他怎肯甘心將一位天仙玉美人送給他受用呢自然是不肯退讓忙道什麽盟約不盟約只憑自己的本領老實對你說一句這個貨色你休要想了讓給我罷他大怒道好管教你快活就是了他說罷便到壁上去取刀水雲忙搶著也取了一把刀向他說道松月你想拿刀來嚇我麽須知你愈是這樣愈不答應咱也不是個省油燈今天死活隨你他也不答話迎面就是一刀水雲舉刀相迎兩個人大戰了十餘合猛地跳出圈子水雲照定松月的頭上砍去松月也打定了主意掄刀往他的左脅刺來這時水雲的刀先到早將松月的頭顱劈了兩爿松月的刀也跟著刺進他的右脅水雲嗚的一聲霎時也隨他一同到閻王那裏去交賬了不說這兩個萬惡的道士一齊結果再說壽娥在房中悶得慌便想出去逛逛幸喜門沒有鎖開了門走出來剛剛轉過偏殿瞥見兩個屍首倒在西邊的耳房裏她大吃一驚忙近前來一看卻正是水雲和一個不認得的人她魂不附體便知道身陷匪徒的窟裏了她摸出後門只見外邊夕陽西下和風陣陣的一片田禾萬頃青青她慌不擇路地邁著金蓮沒命地亂走大約走了二裏多路的光景耳朵裏突然沖著一片笑聲她展開秋波一望只見一群十五六歲的小孩子正在草地上玩耍這正是紅顔脫險方離窟白髮思兒尚依門要知後事如何且看下回分解
