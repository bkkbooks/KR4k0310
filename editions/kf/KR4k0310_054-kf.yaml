body:
  text: 第二天嘉慶帝從圓明園回來親自在豐澤園升座審問林清那林清又供出了許多同謀的太監一齊腰斬其餘匪徒一律正法一時血淋淋地殺下三百多個頭在京城裏大街小巷號令嘉慶帝回宮去看望妃嬪安慰了一番又傳二皇子和貝勒綿志進宮去當面稱讚了一番賞他每人一件貂褂一個碧玉斑指第二天上諭下來封二皇子爲智親王貝勒綿志進封郡王大學士寶興奏稱煤黑子保衛有功這時才把煤黑子的屍身從教徒屍身裏掘出來替他洗刷送回煤鋪子去皇帝又下旨賞煤黑子六品武功照武官陣亡例賜祭又賞治喪銀子一萬兩煤黑子的妻了誥封夫人那煤黑子實在是沒有妻子的如今那些煤店裏的掌櫃見有許多好處便用自己一個大女兒冒認做了煤黑子的老婆一般的也披麻帶孝替他守起寡來這且不去說他話說那李文成占住了滑縣聽說林清已死他便號召了一萬多徒黨聲稱替林清報仇在山東河南一帶地方擾騷起來他仗著有運河輸運糧食往來便利便在運河一帶紮起營盤和官軍對壘直隸總督溫承惠河南巡撫高杞和他抵敵都打了敗仗嘉慶帝便下旨調陝甘總督那彥成帶山東河南的兵隊前去剿辦那彥成有一位副將名楊遇春卻十分驍勇東蕩西殺徒黨見了他都害怕因楊遇春頷下有三綹長須教兵都稱他髯將軍一聽說髯將軍到了便嚇得他們不戰而逃後來又有一個楊芳從陝西帶兵前來助戰這兩位楊將軍克服了許多城池殺死了上萬的教徒李文成逃到白土岡上伏兵四起知道中了計性命不保了便在岡上放一把火把自己燒死了從此直隸山東河南三省地方都太平了嘉慶帝想起教患的可怕便下詔查禁說道以後不論何種宗教一律嚴禁這時有一個萊陽縣知縣打聽得有一個英國教士在他境內傳教他便不問三七二十一去把那洋教士捉來活活絞死英國皇帝著了惱立刻派十三隻兵船來佔據澳門兩廣總督熊光發了急飛報到北京嘉慶帝下旨叫他封禁水路斷絕糧食那英國兵果然支撐不住回到印度去這時江浙兩廣海面上常有一些海盜出沒皇帝又下旨命沿海各省添練海軍造成許多兵船在海面上游曳又嚴禁外國船隻裝鴉片煙進口命各處關口嚴密搜查能查出在二百斤以上的便賞他官做這個旨意一下那班關隘人員查煙自然查得格外起勁那外國船只也不敢進口來了嘉慶帝看看內外太平便又想出京巡狩便在三月時候啓蹕到五臺山去五月從五臺山回來又到熱河避暑去熱河地方原有一座避暑山莊一面靠山三面近水蓋造得十分曲折嘉慶帝住在裏面想起前朝皇帝的風流韻事便也十分羨慕嘉慶帝自從抄沒了和珅的家產以後手頭十分寬裕這位皇帝在歷史上是有名節儉的他到了暮年忽然想到人生幾何怎不及時行樂便悄悄地傳進內務大臣去吩咐他到江南去採辦物料要在避暑山莊裏面大興土木這時皇帝又添立了幾個妃子終日在園中尋樂不多幾天那採辦大臣回來又帶了一座鏡湖亭的模型來這鏡湖亭是浙江巡撫打的圖樣叫巧匠王森夫妻兩個製造的如今浙江巡撫聽說皇上要大興土木便把這亭子的模型和王森夫妻兩人一齊送到熱河來一面上了一本奏摺說王森夫妻兩人工作如何巧妙皇上如今建造園亭正可以隨時垂詢嘉慶帝叫先拿亭子模型來看內監捧上一個盒子盒子裏藏著一座小亭子皇帝看了那亭子時果然建造得十分精巧瓦是用玻璃制的柱子是用水晶的四面牆壁上嵌著幾萬塊小鏡子望去閃閃地射出光來亭中間安著一架象牙床四面都嵌著大塊的鏡子皇帝看了果然在那裏讚歎又吩咐快把王森夫妻兩人傳進來太監回奏稱他夫妻兩人因沒有功名不敢進見嘉慶帝立刻賞他七品衣帽他夫妻兩人穿戴齊全走進屋子來爬在地下那王森見了皇帝嚇得他渾身抖動倒是他老婆大大方方地低著頭跪在一旁皇帝看時那女人長得腰肢婀娜肌膚白淨早不覺動了心後來又喚她擡起頭來只見眉彎入鬢粉臉凝脂望去十分秀美皇帝心想俺宮中枉有許多妃嬪誰人趕得她這模樣兒嘉慶帝不覺滿面堆下笑來問她姓什麽那女人便低聲悄氣地奏道奴姓董氏又問她嫁丈夫幾年了董氏回答說四年了又問到鏡湖亭模型董氏回稱亭子的瓦簷壁柱是俺丈夫造的裏面的雕刻鑲嵌是奴造的皇帝稱讚好一雙巧手便吩咐把王森送進巧藝院去聽候差遣又把董氏收入內庭去做供奉女官皇宮裏原有一班供奉女官專司書畫刺繡雕刻各種精巧女工做女官的大半都是漢人董氏一進內苑也不叫她工作也不叫她做事只叫她終日伴著皇上在瓊島春陰遊玩董氏原不肯陪伴皇帝的無奈深入宮禁知道倔強也是沒用後來看著皇帝性情也十分溫柔董氏向皇帝哭求要放她出去見丈夫一面皇帝笑著安慰她道你好好住在這裏待一年以後朕打發人送你回家去又問她見過西湖沒有董氏回說西湖是奴的家鄉如何不見皇帝便吩咐她造一個西湖十景的模型從此董氏在宮裏搏士弄泥細細地工作起來皇帝在一旁看著他有時也替她調顔色烘泥土十分忙碌兩人靜悄悄地在屋子裏宛似民間恩愛夫妻有時皇帝情不自禁了便拉著董氏要尋歡董氏忍不住挂下淚來苦苦哀求說皇上三千粉黛何必定要破奴的貞節皇帝見了她的顰態十分可憐便也把心腸軟下來幾次都是董氏求免的皇帝常對太監說道古時吳降仙秀色可餐如今這董氏的媚眼卻叫人忘了眠食這句話傳到宮裏去那許多妃嬪心裏都妒忌又見皇帝終日伴著董氏在瓊島裏不見臨幸到別的宮院裏來便說那董氏是個狐狸精把皇帝迷住了把這話告訴皇后那皇後是賢慧出名的聽了妃嬪的話反勸她們不可吃醋其實皇帝和董氏卻絲毫沒有淫穢的行爲只因董氏美得和天仙一般性情又十分貞靜皇帝看著反把他的淫心鎮壓住了到了極親熱的時候只是握一握手罷了這時那王森被丟到了巧藝院裏淒涼寂寞十分想念他的妻子常常求著總管太監要和他妻子見一面那太監說皇上留著的人俺怎麽敢去喚出來從此王森便半瘋半癲的終日忽啼忽笑巧藝院裏的同事們也不去理會他有一天皇上恰巧從宮裏出來王森見了忙上去趴在地下連連磕頭求皇上放他妻子出來見一面兒皇帝笑說道你妻子手工精巧皇后留在院中不肯放出來你如嫌寂寞朕賞你一個宮女吧說著便進去了到了夜裏果然內庭送出一個宮女來太監替他打掃出一間院子送他兩人進去住著誰知連住了三夜他兩人還是各不相犯的那王森越鬧得凶了見人便哭嚷著要見他的妻子皇帝知道了便傳旨出來把王森官銜升到五品又賞他二萬兩銀子派兩個侍衛把他送回南邊去賞他的那個宮女原是南邊人便也跟著他一同到南邊去那宮女原是要嫁王森的王森說道我和妻子情愛很深如今她雖關在宮裏我也不忍負心他到底給了那宮女三千兩銀子送她回娘家去嫁了別個男子王森又帶了一萬兩銀子悄悄地再趕到熱河去拼命花錢買通了宮裏的太監打聽他妻子的消息那太監見他癡得可憐便替他到宮裏去通一個信隔了幾天那太監傳出一封董氏的信來信上說到天子十分多情在宮中十個月並未失節現在求著天子已允准滿一年後放我回家夫妻團圓即在目前王森看了信心中十分快活從此他在外面靜靜候著空下來和那班太監在茶坊酒肆吃喝閒談那太監也看王森做人和氣常常把宮中的秘密事體告訴他今天皇帝召幸第幾妃明天皇帝在第幾妃宮中遊玩天天有人來報與王森知道後來又有一個太監來告訴他說昨天晚上宮中的瑩嬪大鬧醋勁只因皇上寵愛董氏常常到瓊島春陰裏去看望她那瑩嬪忍不住氣趕到瓊島春陰揪住董氏要撕打後來還是皇帝喝住了那瑩嬪把皇帝拉到自己院子裏去了王森聽了說道堂堂一位天子怎的反怕那妃嬪那太監低低地說道不是這般說的俺萬歲爺是多情不過的聽說那瑩嬪還是萬歲爺未曾大婚以前私地裏結識下的想起舊日的交情不免寵讓她三分王森聽了流下淚來說道有這個雌老虎在宮裏只苦了俺妻氏那太監又再三勸慰他說你妻子快要放出宮來了你也不用悲傷又隔幾天看看一年的日期快滿王森在外面越發好似熱鍋上的螞蟻一天等不得一天了有一天他原和宮內的總管太監約定在湖樓上相候那湖樓後面靠一座大湖樓上賣酒王森到時還早便獨自一人打著一角酒喝著候著停了一會見那太監慌慌張張地來了看他臉色不定王森見了一陣心跳知道出了亂子忙問我的妻子怎麽樣了那太監不曾說話先安慰他道俺告訴你你莫氣苦要知那太監說出什麽話來且聽下回分解
