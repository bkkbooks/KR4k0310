body:
  text: 第二十四回酬大勳太后下嫁報宿恨天子重婚話說禮部接了聖旨便議定太后下嫁的禮節派定和碩親王充欽爲大婚正使饒餘郡王充大婚副使先揀定下聘吉日正副使引導攝政王到午門外行納采禮那禮單寫著文馬二十匹甲胄二十副緞二百匹布四百匹黃金四百兩銀二萬兩金茶具兩副銀茶具四副銀盆四隻間馬四十匹駝甲四十副禮物陳列在太和殿在乾清宮賜攝政王筵宴宴畢到壽甯宮行三跪九叩首謝禮到了大婚這一天五更時候攝政王排齊全副執事一隊白象領隊後面寶乘樂隊紅燈冠軍使整儀尉引仗柳仗吾仗立瓜臥瓜星鉞五色金龍小旗翠華金鼓門日月五雲五雷八風甘雨列宿五星五嶽四賣神武朱雀白虎青龍天馬天麓犀牛赤熊黃熊白澤角端遊麟彩獅振鷺鳴鳶赤鳥華蟲黃鵠白雉雲鶴孔雀儀鳳翔鸞等旗五色龍纛前鋒纛護軍纛驍騎黃麾儀鏜氅金節進善納言旌敷文振文旌褒功懷遠旌行慶施惠旌明刑弼教旌教孝表節旌龍頭幡豹尾幡繹引幡信幡鸞鳳赤方扇雉尾扇孔雀扇單龍赤團扇雙龍赤團扇雙龍黃團扇壽字扇赤方傘紫方傘五色花傘五色九龍傘黃九龍傘紫芝蓋翠華蓋九龍黃蓋戟殳豹尾槍弓矢儀刀仗馬金機金交椅金水瓶金盥盤金唾壺金香盒金爐拂塵一隊一隊地過去共用內監一千二百四十六人拿著從大清門直接往壽甯宮門沿路鋪著黃沙站滿了執事攝政王多爾袞端坐在金輦裏後面六百名禦林軍各個掮著豹尾槍儀刀弓矢騎在馬上耀武揚威最後面豎著一面黃龍大纛慢慢地走進宮門去宮裏面早有一班親王福晉貝勒貝子夫人內務大臣命婦內管領命婦都是按品大裝在內院伺候到了吉時皇太后穿著吉服皇帝率領一班王公大臣到內宮行三跪九叩首禮跪請皇太后升輦十六位女官領導太后下輦三十二名內監負輦出宮陪送的福晉夫人命婦各個坐著彤輿跟在後面攝政王的金輦在右面護行到了王邸門口儀仗站住到儀門口大小官員站住到了正院金輦停下女官上去把太后從金輦中扶出來進西院暫息到了合巹吉時把太后請出來女官跪獻合巹酒攝政王和皇太后行合巹禮送進洞房第二天順治皇帝登太和殿百官上表慶賀皇帝降諭在東西兩偏殿賜群臣喜慶筵宴從此以後皇帝下旨稱睿王爲皇父攝政王每日早朝皇父攝政王坐在皇帝右面同受百官跪拜太后自從嫁了攝政王以後終日在新房裏尋歡作樂忘了自己是快四十歲的人了卻還是和二八新娘一般朝朝連理夜夜並頭只因太后生成嬌嫩皮膚妖媚容貌望去好似二十許少婦況且如今和多爾袞定了名分越發沒有顧忌了終日把叔叔霸佔在房裏那二十位侍妾和那侄兒媳婦休想沾些微雨露這位攝政王終日伴著嫂嫂新歡舊愛這恩情自然覺得格外濃厚待到滿月以後他反覺得淡淡的起來這是什麽緣故從來有一句俗話說得好家花不及野花香他叔嫂兩人未定名分以前暗地裏幽期密合倍覺恩愛如今定了名分毫無顧及反覺得平淡無奇再加一個半老徐娘一個正在壯年便漸漸地有點不對勁了他常常溜到侄兒媳婦房中去尋樂給太后知道了未免掀起醋海風波這時有一位大學士洪承疇原是太后的舊相識太后常常把他召進府去攝政王不在跟前的時候和他談談解解悶兒後來給攝政王知道了心裏十分不快這時候多鐸在江南打平了南邊各省享用繁華他手下軍官擄得美貌婦女便來獻與豫王那江南女子細膩柔媚另有一種風味多鐸府中粉白黛綠養著四五十個絕色佳人內中有一位寡婦劉三秀年已半老卻長得玉肌花貌嫵媚動人豫王最是愛憐封她做王妃天天和她在一處遊玩這時正是端陽佳節豫王帶著劉三秀在江邊看龍舟之戲想起太后在宮中雖享盡榮華卻不曾見過這水上的玩藝兒便定造了十隻龍船選了二十個美貌女孩兒連同船戶樂隊一齊獻進京去孝敬太后太后便吩咐在三海裏開龍船大會邀集了許多福晉夫人命婦在水閣中看龍船順治皇帝坐在正中攝政王陪在一旁那十條龍船打起十番鑼鼓在水面上掠來掠去做出許多花樣來只見那十條龍船一齊駛進閣前來二十個女孩子討皇太后皇上的賞皇太后看那班女孩子長得有趣便吩咐一聲賞那太監便把預備下的二十籮碎銀子衣服玩具果品送上船去大家正看女孩兒的時候忽然一個大漢從船頭上跳進閣來手擎鋼刀直向攝政王殺來攝政王眼快忙走避時鋼刀也下去得快斬死了一個小太監閣下裏頓時大亂起來禦林軍一擁上前把這刺客捉住發下刑部去審問那刺客直認是有一位天下第一個大人叫他來行刺的又問他這位大人叫什麽名字他又不肯說第二天再從牢裏提出來審問時那刺客早已自刎死了攝政王知道十分動怒吩咐把刑部尚書和許多承審官員一齊革職拿問又想那刺客是從江南來的豫王原和自己有宿怨的說不定那刺客也是他指使來的想到這裏又十分生氣便立刻和太后說明下一道聖旨把江南總督革職派洪承疇去做江南總督暗暗地吩咐他多立兵隊慢慢地收伏豫王的兵權這一來把洪承疇調開在攝政王又拔去一個眼中釘這都是阿洛會的計策但是攝政王和皇太后正式做了夫妻以後恩情反不如從前如今洪承疇雖不在眼前攝政王心中醋意未消再加有這個刺客的事體心中不免有幾分害怕皇太后雖說下嫁在攝政王府中只住了一個月滿月以後仍回進慈甯宮去住著攝政王宮中府中跑來跑去怕遭人暗算便也不常進宮去只在府中和侄兒媳婦尋歡作樂日子多了便覺得膩煩起來這時朝鮮派大臣金玉聲來進貢住在客館裏說起他國王兩位公主長得如何美麗嬌嫩這句話聽在阿洛會耳朵裏便悄悄地去告訴攝政王知道攝政王在府中正住得乏了味聽了這個消息忙吩咐阿洛會如此如此去行事阿洛會得了命令忙悄悄地去和朝鮮大臣商量那大臣聽是攝政王的意思如何敢違背忙回國去和國王李溟說知那李溟聽說攝政王要娶他兩位公主做妃子他正要仰攀上國如何不願意便一口答應一面和女兒說知還是這兩位公主有主意他姊妹二人說到大清國去做妃子原是願意的但是聽說如今大清國皇太后下嫁攝政王寵擅專房我姊妹二人嫁過去沒得吃她欺侮倘然那攝政王必要娶我姊妹二人便請攝政王到我國中來成親替俺姊妹造一座高大的王儲俺姊妹永遠在府中住著決不肯離開親生父母的朝鮮王便打發人把姊妹的意思去對攝政王說了攝政王也很願意避開皇太后的耳目但是堂堂一位攝政王到屬國時去做親未免太不成體統後來阿洛會出了一個主意在朝鮮相近地方喀喇城裏造一座行宮把兩位朝鮮公主悄悄地接到行宮裏候著這裏攝政王便推說出關巡邊去便帶領八旗固山額真官兵揀定吉日在北京起程皇太後雖不捨得離開攝政王但國家大事又不好攔阻得看著自己兒子順治皇帝年紀慢慢地長大起來他終身事體也十分要緊從前攝政王做主說定科爾沁部主吳克善的女兒做皇后爲今攝政王要出京去皇太后便和攝政王說定了要給皇帝揀個吉日成親攝政王這時一心只在那兩個朝鮮公主身上宮裏的事體悉聽皇太后做主自己急急趕出關來到行宮裏和兩位公主成親這時攝政王一箭雙雕自有許多樂處誰知天下的事往往樂極生悲攝政王住在喀喇城地方天天和兩位公主尋樂這喀喇城原是一個荒僻去處兩位公主空閑下來無可消遣便哄著攝政王出去打獵有一天攝政王帶了兩位公主正在城外打獵一班官兵正保護著公主追鹿兒到樹林深處那林下忽然跳出一隻野豬來見林子裏有人急向林外逃去攝政王一個人騎著馬站在林子外面那馬見野豬兒直沖過來嚇得它拱著前蹄和人一般地站了起來攝政王騎在馬上一個措手不及直撞下鞍鞽來那野豬恰巧從攝政王身上跳過可憐多爾袞一霎時跌斷了左腿被豬蹄踏傷了面部一時鮮血直迸痛徹心脾隨從武官急上來救息忙回出林子來看哭著喚著總不見他醒來再細看時那腦漿也進裂了人已經不中用了急把攝政王的屍身擡回行宮一面發喪成服一面通報朝廷這時攝政王年紀只有三十九歲消息傳到宮裏第一個哭壞了皇太后順治皇帝也十分傷心一面特派大臣出關去盤柩一面下諭臣民人等帶孝那朝鮮公主不肯進關待攝政王靈柩動身便也動身回朝鮮國去皇父柩車到北京這一天順治皇帝穿了孝衣帶同親王貝勒文武百官出東直門五裏處迎接皇帝親自奠爵行禮百官跪在路旁舉哀從東直門直到玉河橋四品以上各官都在路旁跪哭直到王邸公主福晉文武命婦都穿著孝衣在大門內跪哭靈柩停在王府大堂諸王貝勒通夜守喪另有六十四個喇嘛和尚誦經超薦這一場喪事直鬧了四十九天皇太后雖不便入府守孝但寡鵠離鸞閫闈冷落是十分傷心的順治皇帝和太后到底是母子關乎天性見母親孤苦可憐便把太後迎進宮去母子兩人朝夜見面十分親熱這時順治皇帝也有十四歲了便下詔親政每天五更坐朝查問國政十分精細文武大臣都見了他害怕到了十六歲以上皇太后做主揀定吉日皇帝大婚那吳克善把女兒送進京來這時豫王也回京了便借住在豫王府在順治皇帝心裏原不願意要吳克善的格格博爾濟錦氏做皇后只因是皇太后做主不好意思反抗只得勉強成親皇后住在坤甯宮裏新婚才五天皇帝便和皇后口角從此夫妻之間越發生疏了話說那蘇克薩哈詹穆濟倫和鄭親王端重郡王敬謹親王巽親王一班親貴原都是和攝政王有宿怨的如今攝政王已死他們趁此機會報仇天天在皇帝跟前說攝政王的壞話又說攝政王的事本都是那阿洛會一人鬧的鬼順治皇帝原不樂意攝政王的如今聽了行多大臣的話便把舊案重翻立刻下一道聖旨把阿洛會正法追奪多爾袞生前一切封典爵位多爾袞母子的封典也一併奪去到第三年皇帝心中因爲皇后是多爾袞做主給他娶的便下詔把皇后廢了另立科爾沁國鎮國公綽爾濟的格格爲皇后這位新皇后雖是皇帝自己做主娶來的但是皇帝不曾見過誰知娶進宮去一看卻是又蠢又笨皇帝心中又加了一層煩惱那皇太后見皇帝獨斷獨行又因自己下嫁的事體心裏總覺得有幾分慚愧母子之間便生出嫌隙再加那班宮女太監們從旁煽弄皇太后心中意十分怨恨皇帝皇帝在宮庭之間越發乏味虧得不多幾在那江南總督洪承疇回京來叫他母子兩人心中都得了安慰皇太后和洪承疇原是有舊情的今日久別重逢自然可以彼此安慰那皇帝又是得了什麽安慰呢原來此番洪承疇從江南地方帶了一位絕色美人進京來獻與皇帝那皇帝看了滿心歡喜便十分寵愛起來天天和美人宴飲說笑寸步不熟真好似唐明皇和楊貴妃一般這位美人名叫董小宛她原是如臯才子冒巢民的寵姬那時江南有四位公子都是有財有勢有學問朋友又多誰也不敢去驚動他洪承疇到了江南地方打聽江南一班美人什麽冠白門馬湘蘭李香君顧橫波一個個都是嫩柳嬌花驚才絕豔洪承疇滿心想拼著花去千金買他一個回來誰知江南地方那班美人都一個個有了主人這洪承疇心裏十分懊喪過了幾天又打聽得有一個董小宛是金粉魁首士女班頭如今嫁與冒巢民爲妾跟著丈夫住在邗溝西城綠楊村地方這地方山清水秀花木繁茂冒氏住的屋子名叫水繪園風景又是絕勝洪總督自從知道了這位美人兒越發想得廢寢忘食長籲短歎他有一個心腹二爺姓佟原是一個壞蛋終日趨奉主人很得主人青眼如今見他主人好似有什麽心事便在閑言閑語裏套出主人的口氣來知道主人是想董小宛想得厲害他便自告奮勇說道大人放心這件事都在小人身上十天以內總可以回大人的話佟二爺說了這句話便不見了隔了八天到第九天上洪承疇正在書房裏看公文忽然佟二爺笑嘻嘻地從外面進來搶到洪承疇總督身旁去請了一個安說道恭喜大人來了承疇問什麽來了那佟二爺說到董小宛來了洪總督聽了從椅子上直跳起來說道敢是你去搶來的嗎這還了得那冒公子是江南才子京城裏很通聲氣被他去告一狀把我的前程也丟了這還了得那佟二爺說道大人莫慌聽小人慢慢地稟告原來小人早已打聽得冒公子手下養著許多無賴那無賴都和私鹽販子來往小人便帶了本衙門全班馬快連夜趕到綠楊樹去聲稱到冒公子家裏去捉強盜有人告密說冒巢民家裏窩藏私販又強搶良家婦女那鄰舍聽了小人的話怕惹禍水誰敢來管閒事那冒公子也嚇得溜出後門逃走了小人便打進門去見董小宛扶著一個丫頭正在要逃走便不問情由上去拉著便走又故意張揚著說這女人便是冒巢民強搶來的良家婦女爲今送還她家去洪承疇聽到這裏才急著問那女人呢佟二爺回說連她丫頭都帶進衙門來了洪承疇說快送來我看停了一會果然見一個丫頭扶著一個美人兒進來看她一雙媚眼哭得紅紅的蹙緊了眉心低垂著粉頸站在一旁好似帶雨梨花又好似捧心西子洪總督看了又憐又愛一時裏不知怎麽是好便問她叫什麽名字那丫頭答道婢子名叫扣扣俺主人冒巢民是如臯地方第一才子誰人不知道這位是俺主人第一位得寵的如夫人董氏爲今被大人的手下錯捉了來快放我主仆兩人回去京城裏自王爺起直到禦史官都是俺主人的親戚朋友倘然惱了俺主人他進京去告狀怕連大人的功名也保不住了呢洪承疇聽了扣扣的話心下害怕想要放她們回去看看這董小宛心中又實在舍她不下便將錯就錯用好話安慰著說道你們不用憂愁只因有人告你主人窩藏匪類強搶民女我和你主人原也是朋友所以吩咐他們暗地裏把你主人放走了又怕地方上壞人到你家裏來騷擾嚇壞了這位美人兒又吩咐他們把這位美人兒接進衙門來暫避幾天等風波過去再放你主婢二人回去洪總督說著挨近身去臉上做出一副尷尬神氣來董小宛看了知道洪承疇不懷好意便直跳起來搶到柱子邊去把頭向柱子上亂撞頓時鮮血直流雲鬢散亂扣扣忙搶上前去抱住要知董小宛性命如何且聽下回分解
