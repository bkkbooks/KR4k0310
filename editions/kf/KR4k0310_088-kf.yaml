body:
  text: 第八十八回三月維新孤臣走海上半夜密議皇帝囚瀛台卻說光緒帝寵用著康有爲等一班人實行新政那些舊臣如許應騤徐會澧懷塔布剛毅等等都非常地氣憤天天在那裏尋新人物的嫌隙好在西太后面前攛掇因爲這時的西太後自進頤和園後把朝中的政事一齊丟在腦後非有萬分緊急的事一概不見有時皇上遇正事前去請命也只叫李蓮英傳語而已皇帝母子之間還見不著面何況是臣子了可是這時孝貞後在日被革職的榮祿已做了步軍領領了正值直錄總督出缺榮祿便向太后要求西太后于皇上朔望去問安的時候算親自召見把榮祿補直督的話再三地囑咐著但西太后獨于這點小事怎這般地鄭重呢一則榮祿是她的內侄二則榮祿是個統領職銜平空擢了總督可算得是橫跳照先皇的舊規講起來斷斷乎做不到的所以西太后不得不鄭重一下了閒話不提再說那許應騤懷塔布等一班人時時在那裏搜尋破綻不期事有湊巧一天禮部主事王照上的一個奏本給懷塔布在軍機處瞧見便塞在袖子管內以便進呈太后這個消息被禦史楊深秀得知立時奏聞皇上光緒帝聽了大怒便命追究王照的奏摺懷塔布不得已只好將奏摺呈出光緒帝即將懷塔布褫職擬了個永不敘用的罪名但王照的本中奏的是什麽呢卻是勸皇上剪發易服光緒帝看了微笑點頭賞了王照三品頂戴那一班內外滿漢臣工聽得皇上於本朝最犯忌的剪髮辮之議也嘉納起來因此大家似發狂一樣怪戾乖謬的議論也都自喻新奇爭相上本啓奏這樣一來舊黨免不了竊竊私語一傳十十傳百漸漸吹入西太后的耳朵裏去了西太后一聽了剪發易服四個字不由得觸目驚心勃然大怒道孺子這樣的胡鬧祖宗的基業不是要斷送了嗎西太后這句話一出口便有許多守舊派的若許應騤剛毅輩紛紛入奏說皇上的悖謬聽信了康有爲的狂言把很好的先皇制度改變得不成一個樣兒了西太后聽罷益發大怒即傳懿旨召見皇上光緒帝聽得西太后召他進見知道一定有什麽岔子發生了所以懷著鬼胎來見西太后行禮畢還不曾開言西太后早把案桌一拍大聲喝道我以爲你年紀比前長大知識也較前增進了所以把朝政托給你誰知你一味胡幹你可知祖宗創業的艱難麽像你這般發狂怕不將咱們的天下送掉嗎光緒帝忙請了個安說道聖母莫聽旁人唆弄錯怪了人兒雖不肖決不至任意胡爲就是現在的種種設施也無非希望國家強盛起來共用太平之福哪有反願意把江山送掉的道理這還望聖母明察西太后不待德宗說畢便劈頭喝道你還強辯嗎那王照的奏摺教你的是什麽你當我沒有耳朵的麽說著就把一大卷的彈章向地上一擲道你自己仔細去瞧瞧裏面是什麽話說這時早有內監將那奏本拾了起來光緒帝便接過來翻閱了一遍見奏摺上都是彈劾康有爲一班新人的過處和說自己的荒謬於是一語不發地把奏章收起西太后便指著德宗冷笑道現在你明白了麽今日姑且退去咱們告訴了你以後還要好好地留意一下子呢光緒帝見說連連道了幾個是字便退了出來回到乾清官裏把彈劾自己的奏牘重行取出來檢視了一遍統計不下二十餘人不覺發憤將許多奏本撕得粉碎頓足恨道這一班守舊的逆黨不除終究不能安枕光緒帝心上愈想愈恨到了次日朝罷恰逢袁世凱受直督保薦任爲小站練兵總辦來請訓出京光緒帝便勉勵他幾句袁世凱退出之後德宗猛然想起自己正缺少一個有兵權的人現今袁世凱做了練兵總辦不是握著兵權麽於是忙叫傳諭出去命袁世凱暫緩出京著令乾清宮見駕袁世凱領了這道諭旨正摸不著頭腦只得到乾清宮來由內監導引進去見了光緒帝禮畢光緒帝問道你此番出京練兵可忠民爲國麽袁世凱突然聽了這話嚇得一身冷汗直淋當做有劾他不能忠心任事所以有這個變卦因此忙免冠叩頭道小臣怎敢不忠民爲國呢想小臣世受皇家厚恩雖碎身尚不足報何敢再有異心光緒帝聽了微笑道很好很好你既忠心爲國現有密劄一道你須慎重行事倘然事成自然重重賞你袁世凱聽到這裏才知道皇上別有作用並不是爲著自己的事這顆心便放了下來於是叩頭謝恩出來走出乾清宮時合該天意難回因袁世凱出來走得匆忙了些正和一個內監撞了個滿懷那內監深怕獲罪慌忙三腳兩步走了待袁世凱定眼看時那內監早已不見了不覺心上十分孤疑及至到了私邸將密劄拆開一看原來是皇上令自己領兵殺了直督榮祿再率部進京掃除太后舊党袁世凱看罷心裏便躊躇起來道這事可不是兒戲的萬一事機不密就有滅族的罪名他心上盤算了一夜回憶出乾清宮時和一個人相撞那人不要是太后的偵探倘若追究起來可就糟了他思來想去覺得現在皇上的勢力萬萬及不上太后這事看來一定要弄糟的倒不如先去出首的爲妙主意打定便連夜出京去了原來這袁世凱曾做過朝鮮委員如今榮祿做了直督便何他做了練兵總辦他有三個幫手就是段祺瑞馮國璋王士珍時人號爲陸軍三傑這且不在話下單講袁世凱匆匆地出京到了天津把光緒帝的密旨呈給了榮祿榮祿一看大驚道這還了得忙叫袁世凱暫護直督的印信自己便星夜進京來見西太后內監通報進去回說老佛爺有旨明日見駕榮祿著急道這事還等得明天麽內監又進去了半天西太后見榮祿從天津來夤夜叩閽知道定有緊急之事所以也即時傳見榮祿一見太后便伏地大哭西太后大驚道你有什麽事這般悲傷榮祿一面哭一面奏道險些兒奴才的性命不保恐怕老佛爺也有妨礙呢說著將德示的密劄呈上西太后就在燈下讀了一遍道朕自稚年登基政權皆操之母后致一班逆黨鹹得橫行無忌二十餘年來受盡困苦偶有政見不合輒爲彼逆奴所揶揄是朕雖有天下而實徒擁虛名長此以往不但爲天下笑抑亦無顔以對先皇即後世亦必以朕爲一懦弱之庸主耳言之尤覺痛心今著袁世凱星夜出京領其所部刻日舉事襲殺直督榮祿其缺即著袁世凱補授並隨時率領勁卒進京掃清逆党共衛皇室而肅朝政勿負朕意欽此西太后讀畢不覺大怒道虎不傷人人倒有傷虎意了說著對榮祿說道你快出去召舊日大臣連夜來園中議事榮祿領了懿旨便一步一顛地出來因榮祿一隻左足本來有風疾的所以走起路來一蹺一拐很是不便況且這時又在昏夜事關秘密不敢大張小諭惟有步行著出去一處處地去宣召去了這也是康有爲和梁啓超師生二人命不該絕榮祿走路既這樣地遲緩頤和園裏又兼走漏了消息這消息怎樣會走漏的呢因榮祿匆匆地進頤和園來恰巧和侍候光緒帝的內監寇連材撞見了榮祿急於見西太后並未留心別的哪知寇連材是光緒皇上第一個心腹人他一眼瞧見榮祿慌慌忙忙地進來心裏已先疑惑起來暗想榮祿這廝現做著直隸總督爲何輕易擅離職守呢料想一定有什麽重要變故一面想著卻躡手躡腳地跟在後面起初聽得太后不見後來榮祿頓足發起急來寇連材已料著了八分知道這事定和皇上有關但不曉得是什麽一出鬼戲便去俯伏在殿角裏竊聽只見榮祿見了太后痛哭隨後把一張東西呈上去因路離得太遠了一些實在聽不見什麽未了只聽得西太后大聲說道你給我快召他們去便瞧見榮祿一拐一蹺地出園去了寇連材目睹了這種情形便趕緊來報知皇上其時光緒帝正和珍妃瑾妃在宮中閒話只見寇連材喘著氣進來光緒帝問道你怎麽這副樣兒寇連材忙跪在地上奏道奴才剛從太后那邊來瞧見榮祿那廝匆匆進園要見太后於是把榮祿痛哭太后大怒種種形狀細細講了一遍又說榮祿現在出園去不知去召什麽人去了奴才怕這事涉及皇上因此忙來報告光緒帝聽了榮祿連夜進京來叩見太后曉得袁世凱定然把機關露破了料來必無好果但自己還屬無妨那一班保皇行新政的臣子諒來不免的眼睜睜地瞧著他們一個個的授首心上未免不忍當下便叫寇連材去報知康有爲一時不及草詔只叫寇連材伸過掌來光緒帝就在他掌上寫了事急速走四個字命寇連材速去寇連材領了旨意如飛一般地跑到康有爲下處正值康有爲草著奏牘還沒安睡寇連材叩門進去已走得氣急敗壞一時說不出話來只伸手給康有爲瞧看康有爲見這個形狀又讀了寇連材掌中的字曉得大事不妙連行李也不及收拾便隻身逃走出京連夜乘輪出天津到上海去了這裏寇連材自去複旨不提再說那梁啓超這時晚上恰巧有事來和康有爲商量一到他的館中只見書籍雜亂物事狼藉一問館童說康大人在三更天來一個人也不說什麽康大人便手忙腳亂地走了梁啓超是何等機靈一聽這話就連跌帶爬地躲到日本領事館去了後來聽到消息果然不好便同了日本副領事扮做洋裝逃到日本去避禍去了且說榮祿奉了西太后的命去召剛毅懷塔布許應騤曾廣漢徐會澧等一班大臣同進頤和園裏叩見西太后畢太後便怒氣衝衝地將密劄給請臣看了籌議對待的法子剛毅首先跪奏以奴才看今日不誅康梁這一班人日後奴才要被他們誅戮的倒不如先下手爲強了太后大聲說道俺不但將這幾個逆賊除去連那昏君也要廢掉他哩榮祿忙奏道這卻使不得的皇上臨政中外皆知現在無故廢去外人一定有所藉口依奴才的愚見請老佛爺重臨朝政將權柄不給皇上掌握也已經夠了西太后聽了微微地點了點頭即命剛毅率領侍衛一等天明便去搜捕康有爲等莫被他們漏網這裏太后和榮祿諸臣坐待天曉去處置皇上計議已畢但待天明光緒帝變法行新政至此告終後人有詩歎這新政道南海書生平地起居然萬言上天子公卿交章薦奇才下詔求言自此始聖恩召入光明殿名臣同日登樞府大開朝堂受章奏小臣維新大臣舊感時流涕報聖明憂勞惟覺龍顔瘦一紙綸音下九州四海歡呼帝萬壽帝萬壽可憐中原土空有遺恨留留得後人興嗟歎當時怎不邀天佑當下到了次日清晨光緒帝卻一夜不曾安眠盥漱既畢也不上朝靜坐著待變不多一刻果見內監來宣召了光緒帝便很安閒地隨著內監到頤樂殿來見太后只見太后怒顔滿面地坐在那裏光緒帝照常行禮畢太后便厲聲問道你曾叫外臣領兵謀我麽皇上徐徐說道並沒這回事太后益發大怒從袖裏取出那道密劄往地上一摔道這是誰寫的光緒帝見證據已實現諒來也隱瞞不過便隨口答道子臣給袁世凱的意欲掃清舊黨罷了並不敢驚動聖母西太后冷笑道不敢驚動麽若不是榮祿報信的早此刻俺也做了階下囚了說著把嘴一努早有李蓮英等及一班人不由皇上分說便簇擁著往瀛台去了要知後事如何再聽下回分解
