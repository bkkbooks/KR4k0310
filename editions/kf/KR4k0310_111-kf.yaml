body:
  text: 第七十一回驍騎將軍權充蛺蝶媒聖明天子喜結鴛鴦偶卻說劉文叔奉了聖旨往定河北怎敢怠慢即日啓程和陰氏分手帶著王常李通陰識先到定陵方到了館驛還未落座瞥見劉伯姬渾身縞素大哭而來把個劉文叔驚得呆了忙向她詢問李通也莫名其妙她還未開口瞥見鄧辰淚容滿面神色倉皇地走了進來劉文叔見鄧胡這樣料知事非小可只聽劉伯姬嬌啼宛轉地說道三哥你曉得麽大哥被新市平林那班賊子竄攝劉玄將他殺了劉文叔大驚垂淚絕無言語鄧辰向李通說道這事料想起來恐是你們令兄主使莫說是自家親眷就是朋友萬萬做不到這層事的而且劉伯升在日究竟和你們令兄有多少深仇大怨呢劉伯姬一把扯住李通圓睜杏眼罵道天殺的你將我和文叔索性殺了罷李通氣得大叫如雷向伯姬道你不用和我們纏我先去殺那個負心的賊子隨後就將新市林平的一班鳥男女殺個乾淨最後將昏君剜心割膽替大哥報仇他霍地站起身來拔出佩劍就走劉文叔死力攔住哭道聖上既然將家兄伏法一定是犯了什麽罪的如不然豈有妄殺大臣的道理大哥已死只怪他身前粗莽你卻不能再來亂動了伯姬哭道三哥你怎麽說出這樣的話來難道大哥的爲人你還不知道麽劉文叔拭淚答道妹妹你哪里知道自古道君教臣死不死便是叛臣父教子死不死便是逆子而且大哥剛愎自用一些不聽別人的諫勸每每要出人頭地獨排衆議這就是他取死的原因看官你們看到這一段不要說劉文叔毫無兄弟之情嗎同胞哥哥被人殺了不獨不忿怒報仇反說哥哥不好豈不是天下絕無這樣的狠心殘忍的人麽這原有一個緣故在下趁此將這一段說出來看官們才知道劉文叔另有用意呢閒話少說再表新市平林諸將見劉縯威名日盛各懷嫉妒每每在劉玄面前疊進讒言劉玄是個庸弱之輩曉得什麽便照他們詭謀設法來害劉縯了恰巧王鳳李軼等運輸糧械接濟宛城諸首領以爲時機已到便暗中向劉玄進計便借犒賞爲名相機行事即日大排宴席劉縯當然也在其列劉玄見劉縯腰懸佩劍故意要借過來賞識賞識劉縯生性豪爽哪知是計忙除下來雙手奉上劉玄按赤來玩弄半天不忍釋手諸將目視劉玄意思教他傳令以便動手誰知劉玄只是不發一言新市平林的諸首領不覺暗暗著急申徒建忙獻上玉玦意思教他速決無奈劉玄呆若木雞兀地不敢下令新市平林的諸將只急得一佛出世二佛升天深怨劉玄太無決裂的手段一會子席散劉玄仍將佩劍交與劉縯佩上劉縯的二舅樊宏早看破情形私下對劉縯說道今天的大禍你曉得嗎劉縯道不知道什麽大禍呀樊宏道我聞鴻門宴範增三舉玉玦陰示項羽今日申徒建複獻玉玦居心叵測不可不防劉縯搖頭笑道休要胡猜亂測料想這班賊子不敢來惹我的樊宏見他不信也無可如何但是新市平林的首領見一計未成焉肯就此罷手又聯絡李軼繼續設計那李軼本來是劉縯的私人不想他竟喪心病狂趨炎附勢與諸首領狼狽爲奸劉縯有個部將名叫李稷真個是勇冠三軍當劉玄稱帝的時候李稷即出忿言他說此次出兵俱是劉縯兄弟的功績劉玄是個什麽東西竟稱王稱帝起來真是誰也不能心服的這話誰知又傳到劉玄的耳朵裏便大起恐慌忙下旨封他爲抗威將軍李稷不受劉玄便領兵數千人來到宛城將李稷傳進帳來不待他開口便傳令將他拿下喝令推出去斬首惱動了劉縯一人挺身出來替李稷辯白極力固爭劉玄又沒了主意俯首躊躇不意座旁朱鮪李軼左牽右扯暗中示意逼出劉玄說一個拿字道聲未絕已有武士十余人蜂擁入帳不由分說將劉縯綁了起來劉縯極口呼冤你想到了這時還有什麽用呢生生的將一位首先起義的豪傑枉送了生命落得個三魂緲緲馳入鬼門關去了再表劉文叔聽說他的哥哥被害心中好似萬箭攢穿的一樣又礙著王常在這裏不敢亂說只好拿反面的話來敷衍衆人此刻只有鄧辰心中明白劉文叔收淚對衆人說道於今聖旨下來命我克日即往河北國事要緊鄧辰知道他的用意忙道那是自然之理我們去就是了王常即到劉文叔面前請假一月回到洛陽將劉文叔的情形一一告訴劉玄劉玄反覺自己太不留情面竟將劉縯殺了不禁暗暗地自慚自愧隨令成丹王常帶一隊兵馬送多少糧械去幫助劉文叔北伐這時劉文叔已過河北據鄴城王常成丹隨後趕到將劉玄犒賞的糧械一齊獻上劉文叔望著旨意舞蹈謝恩已畢忽然守門的士卒進來報道有個人求見將軍劉秀便命帶進來一看不是別人卻是劉文叔心中久已渴慕的南陽鄧禹久別重逢當然欣喜不置鄧辰又出來與他寒暄一陣子劉文叔笑問道先生下顧莫非有什麽指教嗎鄧禹笑道沒有什麽指教劉文叔笑道既不願指教何苦僕僕風塵到這裏做什麽呢鄧禹笑道願明公威加四海禹得效寸遲之功垂名竹帛於願已足了劉文叔鼓掌大笑道仲華既肯助我我還愁什麽呢原來仲華就是鄧禹的表字當下劉文叔十分喜悅又聽鄧禹進言道莽賊雖然被申徒建輩滅去但山東未安赤眉等到處擾亂劉玄庸弱不足稱萬民之主如公盛德大功天下稱服何不延攬英雄收服人心立高祖大業救萬民生命一反掌間天下可定勝似俯首依人事事受制哩劉文叔聽了他這番話正中己懷忙用眼向左右一瞟幸喜王常成丹不在這裏忙道先生高見秀敢不佩服他說罷附著鄧禹的耳朵說道劉玄的耳目衆多言語間務望留神爲要鄧禹點頭會意當下馮異銚期均有所聞俱來勸文叔自立文叔一一納進他們的議論依計施行克日到邯鄲騎都尉耿純出城迎謁劉文叔溫顔接見耿純見劉文叔謙虛下士部下官屬各有法度益發敬服不置自己預備良馬三百匹兼帛五百丈入獻劉文叔文叔稱謝收下這時忽有探馬報道王郎佔據山東北隅聚衆作亂劉文叔聽得吃驚不小忙與諸將轉赴盧奴商議剿滅之策不數日又聽得探馬報道王郎擁兵數萬近據邯鄲假稱劉子輿招搖嚇詐無所不爲劉文叔聽得這個消息心中頗爲納悶又怕幽薊一帶爲王郎所得所以先定幽薊遠擊王郎恰巧耿弇亦到劉文叔便留他爲長史同往薊州又令功曹王霸募集市鄉的新兵預備去攻邯鄲偏偏無一人來應募市鄉百姓沸沸揚揚傳說劉秀不是真主劉子輿方是紫微星一傳十十傳百說得震天響王霸萬分無奈只得回報劉文叔文叔曉得人心未附便欲南歸諸將皆有歸意獨有耿弇不主張南行他對劉文叔說道明公方到此地恩信未立便欲南行豈不失策依我的愚見現在漁陽太守與明公有同鄉之誼我家世居茂陵家父現爲上谷太守若聯合兩處人馬直搗邯鄲還怕什麽假子輿呢劉文叔撫掌稱善惟一班官屑歸心已決大家嘩噪起來都道無論如何總要回南誰情願向北去將一條生命白白地送掉呢劉秀笑指著耿弇對衆人道這是我的北道主人諸位怕的什麽呢李通掣劍在手怒目喝道誰敢再說出一個回字來先將他的狗頭砍下諸人還敢響麽只得隨聲附和劉文叔遂致書漁陽上穀兩處乞救這時已到更始二年春月了劉文叔留在薊城專等兩處人馬到此就調兵往剿王郎不料王郎反懸賞百萬購買劉文叔的頭顱百姓哪里知道端底沸沸揚揚訛言百出紛紛說是邯鄲兵至將中劉秀劉文叔見人心如此惶惶不如早離薊城再作計議主意一定便領了將士出南門想走不料南門已被百姓封閉得水泄不通銚期奮動神威斬關奪路方得走脫一連走了幾日方到了下曲陽文叔已凍得面無人色又聽得探馬報道王郎的兵已到後面大家驚慌得不敢停留急趨滹沱河前驅的探馬報道河水長流毫無一舟一楫劉文叔吃驚不小不由得嗟歎起來王霸飛馬到河邊一看果然靜悄悄的無有一舟一楫只見寒風獵獵流水潺潺暗想道無船渡去如何是好他正在遲疑劉文叔帶了衆將已到了河邊劉文叔對王霸說道怪不得沒有船隻你看這河裏完全凍起來了哪里來的船隻呢王霸聽他這話頗爲奇怪再一回頭只見河裏凍得像一面大鏡子一樣不禁暗暗稱奇馮異道這幾天這樣的冷法我想河裏的冰一定是來得很厚的讓我去試試看如果能走著冰上過去那就好極了劉文叔搖頭擺手的不准他下去馮異哪里肯聽他話翻身下馬到了河邊俯首一望只見那河凍得突兀不知多厚那邊王霸也下馬來走到河邊馮異向他說道你用錘試試看王霸真個舉起鬥大的銅錘盡力打了一下只聽得震天價響的撲通一聲王霸雙手震得麻木忙低頭一看只見冰上露出鬥大的一個痕迹一點水沒有出來馮異大喜道可以可以王霸便大踏步一直走到河心卻一點動靜沒有忙跑回來笑道快些過去快些過去大家好生歡喜鄧禹道不要慌人雖然可以過去但是馬怎麽辦呢劉文叔聽他這話不禁笑道先生你這不是過慮了嗎人既然可以過去難道馬就不能過去了嗎鄧禹笑道明公哪里知道人過去當然是容易的但是馬究竟是個畜生曉得什麽走得不好滑了一跤在這冰上爬也爬不起來呢劉文叔聽了這話反倒躊躇起來半晌向鄧禹笑道我倒有一個法子不知好不好鄧禹問道主公想出什麽法子來呢劉文叔笑道如果就是這樣過去馬當然是不能走因爲馬蹄是硬的不小心就要滑倒最好用稻草包好那就萬無一失了鄧禹笑道好極了我也是這樣想說著大家就到田裏尋了些稻草將馬蹄包好正待渡河忽聽得後邊煙塵大起喊殺連天馮異大呼道不能再延了追兵就要到了耿異不由得扶著劉文叔首先下河走著冰上過去接著衆人也牽馬過來大家上了岸後面的追兵已經趕到對岸大家再回頭一看只見一點兒冰也沒有仍舊是流水淙淙漫無舟楫又見那邊追來的賊兵立在岸邊望望洋興歎刹時收兵走了鄧禹舉手向天道聖明天子到處有百靈相助這話真正不錯話進不了瞥見有一個白髮老人攔住劉文叔的馬頭說道此去南行八十裏就是信都前程無限努力努力說罷劉文叔正要回答怎的一岔眼光那老者就不知去向大家不勝驚異於是同心合力一齊向信都而來不到一日已到信都信都太守任光聞說劉文叔到來連忙開城迎接劉文叔到了城中肚中饑餓已極便向任光說道三日諸將皆未進食煩太守趕緊預備酒飯任光滿口答應忙去命人大排宴席款待諸將以及劉文叔一個個饑腸轆轆誰願吃酒都要吃飯任光忙命人用大碗盛飯大家虎咽狼吞飽餐一頓精神百倍散了席縣令萬修都尉李忠入內謁見劉文叔文叔均用好言撫慰任光自思王郎的軍威極盛信都又沒有多少兵馬滿望劉文叔有些人馬誰知單是數十個謀士戰將並無一兵一卒不覺大費躊躇暗道保劉文叔西行尚可支援如其去征討王郎豈不是以卵擊石麽正是進退不決的當兒忽然有人報道和戎太守邳彤來會劉文叔心中大喜忙出來接見一見如故彤聽文叔現欲西行便來諫止道海內萬民望明公如望父母豈可失萬民之望何不召集二郡兵馬前往征伐還愁不克麽劉文叔贊成其議忙下令帶領兩郡的人馬浩浩蕩蕩直向河北進行一路上任光又造了許多檄文將王郎的罪惡一一宣佈出來並雲大司馬劉公領兵百萬前來征討嚇得那一班無知的百姓驚慌萬狀不知如何是好劉文叔的大軍到了堂陽縣嚇得那些守城的官吏望風而降第二天又將貰縣克復當晚昌城劉植帶了一萬兵馬前來投降如是進行不到十日又到盧奴義旗到處萬衆歸降惟劉揚聚衆十余萬附助王郎不肯歸降劉文叔頗爲憂慮當下驍騎將軍劉植獻議道劉揚與我有一面之交憑著三寸不爛之舌說他來歸降明公如何文叔大喜劉植當下辭了諸將匹馬而去不到幾天劉植回來報道劉揚是說下了但是有一樁事情要請主公承認方可遵令來降呢劉文叔忙問道什麽事劉植道劉揚現欲與主公聯姻不知主公可能答應麽劉文叔驚疑道這又奇了我雖然娶過陰氏目下尚無子女怎樣好聯姻呢劉植笑道劉揚有個甥女欲嫁與主公他聽了這話忙道那如何使得呢我早與陰氏結過婚了鄧禹道天子一娶九女諸侯一娶三女主公難道兩妻就算多了麽劉文叔沈吟了半晌只得答應忙命劉植帶了許多金帛前去作爲聘禮不到幾天劉揚已將他的甥女郭聖通軟車細細送到劉文叔的賓館裏當晚便與文叔成其好事文叔見郭氏的態度雖不及麗華倒也舉止大方纖穠合度這時劉秀便令人大排宴席招待衆將席間共有李通鄧禹馮異王霸任光萬傷李忠劉伯姬耿純耿弇銚期陰識劉植邳彤岑彭馬武等一十七員大將惟有王常成丹自從上次失敗早就回到洛陽去了諸將軍酣呼暢飲菜上三道劉文叔親自到各將領面前敬酒鄧禹首先向劉秀笑道主公今天吉期理應陪著我們痛飲一場才是劉秀笑道那是自然的一來承諸公的大力血戰疆場才得有今日二來以後還望諸公繼續努力殲平海內妖氛秀不才今天每位挨次恭敬三杯他說罷使取壺來首先在鄧禹面前先斟三杯依次各將面前都斟三杯李通笑道論理我與鄧大兄今天要吃個雙倍才是個道理他說了鄧辰插口道可不是麽上次我們替他跑得不亦樂乎喜酒沒有吃到一些第二天就奉命北伐了劉文叔忙笑道不是你們提起我幾乎忘了他又在二人面前敬了三杯李通笑道媒人不可分厚薄劉大哥他是今朝的正媒當然也要和我們一樣才是個道理劉文叔忙又到劉植面前斟酒劉植站起來讓道請明公不要煩神罷末將素不喜飲酒李通笑道劉在哥不要如此客氣今天不必分高分下的爽性幹三杯罷劉植推辭不了只得站起來將三杯酒一氣飲了李通拍手笑道著呀我生平最怕人家裝腔作勢的鄧禹笑對衆將道我有四句話不知諸公能贊成麽岑彭笑道請講罷你的主意我們沒有不贊成的道理鄧禹笑道主人方才敬我們三杯我們也該每人回敬三杯才是個道理衆人都拍手道好鄧禹便斟了三杯劉文叔含笑飲了以後挨次到每人面前各飲三杯共吃了五十一大杯把個劉文叔吃得頹然大醉鄧禹忙教人將他扶進新房劉文叔睡眼模糊踉踉蹌蹌地走到床前與郭聖通攜手入幃這正是嫩蕊初經三月雨柔蕾不慣五更風要知後事如何且看下回分解
