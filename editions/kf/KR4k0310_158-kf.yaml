body:
  text: 第一百十八回不倫不類阿侄戀姑姑無法無天胞兄奸妹妹卻說張遼和許褚爭執美人正在性命相拼的時候曹操在臺上望見連聲喝住他們哪里肯聽仍劍來刀去惡鬥不止操賊只得親自下臺大聲說道誰不住手便先將誰斬了他們聽說這話才一齊住手操賊笑道你們的器量忒也小了孤家哪里是叫你們比試奪標的無非是要看看衆卿的武藝的來來來孤家自有一個公平辦法他說著命衆將隨他一齊登臺每人賜他們一個宮女十匹蜀錦誰知許褚腰裏挾的那個宮女被他用力過猛七孔流血早已不活了操賊重又賜他一個宮女衆將一齊舞蹈謝恩那一群文官一個個又上頌詞贊章將操賊直擡上九霄雲外操賊大喜也照著賞給衆將士的例子賞給衆文官一直到日已含山才散了宴一衆文官武士每人領著一個美人歡歡喜喜地回去了到了第二天操賊在愛妾玉的房中還未起身只見華歆匆匆地進得房來對他說道主公可知道伏皇后現在要謀害你了麽曹操聽得吃驚不小忙問道怎見得的華歆走過來附著他的耳嘰咕了兩句曹操霍地起身說道好先命將在宮門口查著她如果來便給我搜查帶來華歆領命而去不多時曹操起身進都領著三千甲士在宮門口候著不多時只見穆順面色倉皇地進來操賊一聲令下那班武士虎撲羊羔地將他抓住不費絲毫的力氣就將伏完寫給伏皇后的密書被他們搜出操賊便將穆順帶到府中嚴鞫了一番可是穆順矢口不招操賊無奈只得下令將伏完一家三百餘口一齊拿下斬首市曹又將伏皇后用白綾絞死二皇子鴆殺把個漢獻帝哭得淚竭腸枯也沒有庇護的力量操賊殺了伏後隨又將他的大女兒扶入正宮漢獻帝到了此際真個蚊龍失水虎落阱陷唯唯諾諾還敢說出半個不字來嗎只好是望承顔色罷了操賊殺了伏皇后之後有一個多月不到銅雀台裏尋樂了有一天他被獸欲衝動駕著輕車只向銅雀台而去到了銅雀台邊下了車侍從扶他登樓走到第五層第四個房間門口那些侍從不待他令下便各自退下去了他正要進去猛聽得裏面有人嘻笑著他倒是一怔暗想道玉的房間裏哪個敢逗留嬉笑呀他正在這裏尋思的當兒耳朵裏突然又聽著一聲嬌滴滴的聲音說道你也不用說了我自從見了你我的魂靈好像被你攝了去的一樣後來我又常常聽見那個老厭物在我面前誇讚你的才學怎樣的好我越覺傾慕你得厲害說到這裏又有一副男人的喉嚨悄悄地說道我的學問好與你有什麽關係難道你也識字麽她又說道識字雖然不多但是我平素最拜服的就是有學問的人只悔我命裏遭逢不好應該碰到那個老死鬼纏著我罷了她說罷便哽哽咽咽地哭泣起來這時又聽那個男子安慰她道卿卿你不用儘是煩惱我們正在這青春時候料想那個老不死的前面沒有多少路了等他一死這一統江山還不是我的麽到那時你的正宮娘娘的位置還愁沒有麽操賊聽到這裏不禁氣得手足冰冷一腳將門踢開只見他的三子曹植摟著玉正在那裏低聲軟語的談心呢把個操賊氣得一佛出世二佛涅槃直著雙目喘吁吁地向他們說道你們好好好竟幹出這樣的事來他說到這裏用手指著曹植罵道你這畜生枉把你滿腹經綸這件事就像你幹的麽便是禽獸也幹不出來的好不要臉的東西我且問你玉是我的什麽人又是你的什麽人你可要我的老命了曹植聽他這一番話非但不懼反而是嘻嘻地笑道玉是你老人家的玩具是孩兒的知音玩具當然不及知音來得契合你老人家這銅雀台本來是供給我們玩耍的又有什麽限制呢大凡做上人的歡喜兒女什麽東西皆可以賜給的何況一個玩具呢曹操聽他振振有詞的這一番話只氣得他鬍子倒豎險一些兒昏死過去忙道倒是你這畜生講得有理我要請教你什麽叫做五倫曹植隨口答道這個自然知道的君臣父子兄弟夫婦朋友操賊冷笑一聲道你既然知道五倫玉是我寵倖的便是你的母親你就能和她勾搭了麽曹植笑道你老人家這些話越發不通玉是你老人家的愛姬卻不是我的母親我又何妨子頂父職替你老人家做一回全權代表呢還有一層你老人家已有我的母親伴著現在又在納妾尋樂正所謂不在五倫之內孩兒和玉是知己的好朋友確在五倫之內我又有什麽不合情理之處呢請你老人家講罷操賊氣滿胸膛坐在椅子上只是發喘一句話也答不出來曹植又笑道你老人家現在也不用氣得發昏章第十一了我的行爲尚未有什麽荒謬呢大哥四弟的玩意兒我說出來頓時還要將你老人家氣死了呢操忙道他們有什麽不是的去處你索性說出來曹植笑道他們能做我不能說只好請你老人家親自去看看罷你老人家既然不肯割愛我們爲人子的當然不敢強求的我下次絕對不再到這裏來了他說著怒衝衝地起身出去了操賊瞪著眼望著他走了此刻玉垂首流淚沒有話講操賊圓睜兩眼向她盯了一會子歎了一口氣道咳這也是我生平作孽過多才有今朝的報應了玉拭淚說道曹植無禮三番兩次地來糾纏我我早就要告訴你了操賊冷笑一聲道罷了罷了不要盡在我面前來做狐媚子了你們在這裏講的話我連一個字都沒有忘掉玉聽得便撒嬌撒癡的一頭撞在操賊的懷裏哭道他來強迫我做那些禽獸的事情我卻替你掙面子沒有答應他不想你竟說出這樣沒良心的話來冤枉我我這一條狗命也不要了省得在世上丟盡面子給人家瞧不起她說罷扯起裙角遮著粉面就要向牆上撞去慌得操賊一把將她抱住說道方才這話你竟誤會了我的意思了我說的並非是你不好乃是我那犬子不知好歹你何必多心呢尋死尋活的作什麽來她也不回答伏在他的懷裏只有哽咽的份兒一面哭一面說道我在你面前死了好表明我的心迹她說罷又哭得梨花帶雨似的操賊本來是滿腔醋火恨不得將她一劍揮爲兩段見了她嬌啼不勝的那種可憐的樣子不由得將那股不可遏止的醋火消滅到無何有之鄉了摟著她千寶貝萬心肝地哄了一陣子才將兒的珠淚哄得止住列位這曹操本是個毒比豺狼的家夥今天見了這個玩意兒不要說他便是尋常人也要火拼了他爲何不動作呢原來操賊四個兒子的當中最心愛的就是曹植而且他是個最要假面子的老奸雄深怕吵出風聲去給別人嗤笑加上兒又是他第一個心頭上的人物有種種不忍發作的原因牽制著只好放在肚皮裏面悶氣那曹植對操賊說曹丕曹熊有亂倫的事情不好說出來究竟是回什麽玩意兒呢在下也要交待明白了原來曹丕面子上極其忠厚居心卻和操賊一般無二陰險狠毒什麽不見人的事情皆可以幹得出來曹賊卻當他長厚無用其實是衣缽真傳操賊見曹植聰明伶俐早有將基業傳與曹植的心了曹丕在暗中托人在操賊面前讚揚他的美德曹操置之不理曹丕和曹植在暗中競爭激烈曹操有個妹子名叫曹妍比曹丕長一歲生得花容月貌落雁沈魚小時候就和曹丕在一起廝混了等到他們漸漸地成人了還是在一起耳鬢廝磨地纏著她在十七歲的時候情竇初開急切想一個人來給她試驗一次性的工作無奈府中規則森嚴除卻家裏骨肉至親外面的三尺小童也不能亂入堂中一步的所以沒有機會出來和人勾搭呢她鎮日價沒有別事看著稗史小說度生活看到情濃的去處那一顆芳心不禁突突地跳躍起來滿面發燒十分難受有一天她又在看稗史了曹丕笑嘻嘻地走進來手裏拿著一朵玫瑰花兒向她笑道姑姑我給你插到鬢上去她見曹丕那種天真活潑的樣兒不禁起了一種罪孽的思想情不自禁的玉手一伸拉著曹丕的手兒笑道好孩子你替我簪上了曹丕便往她身邊一坐慢條斯理地替她把花簪上了笑道好啊姑姑簪上了花越發美麗了她聽說這話不禁將臉兒一紅微微地一笑星眸向他一瞟說道小促狹鬼你竟和我來沒大沒小的了曹丕聽她這話不禁一怔忙道姑姑我原是一句老實話不想你竟認真了既是這樣我們就此分手罷你下次只當我死了的不要兀地來惹我了她忙用手堵著他的嘴笑道你這孩子真是直性子兒一句玩話都不能聽出來馬上就暴起滿頭青筋來賭咒發誓的何苦來呢曹丕道你自己認真還說我不好這不是冤枉人麽她伸手過來將他往懷中一抱低聲說道好孩子我最歡喜你的曹丕笑道姑姑你歡喜我我也歡喜你的她附著他的耳朵不知道說些什麽只是曹丕滿面緋紅只是搖頭道那可不成被爹爹曉得了真要打殺了呢她急道傻瓜這事是秘密的怎能給人知道呢曹丕道便是人不知道你是我的姑姑怎好幹那個事呢她忙低聲道呆種不要扯你娘的騷你不看見你的爺和你的姑祖母常常在一床上睡覺麽曹丕聽說這話很高興地問道這事作興麽她掩口笑道呆瓜真是纏不清要是不作興他們還在那裏幹嗎曹丕道那麽我們就來做一回看他說罷跳下床來嚓的一聲將門閉起在下那時也被關在外面裏面事兒卻不知道了停了好久呀的一聲房門開了只見曹丕春風滿面地向曹妍說道姑姑這個玩意兒的確有趣我們沒有事的時候不妨多弄幾回玩玩她一面理著雲鬢一面悄悄地笑道冤家這事兒豈能常幹的萬一走漏風聲你我都休想活命了曹丕聽說這話將舌頭伸了一伸笑道這事難道不能給別人知道麽她忙說道放你娘的屁這事能給人知道的嗎世間最難爲情的就是這事他說道我曉得了我總不去告訴人就是了她笑道你早點去罷你娘等得心急了曹丕點頭走了從此以後他們倆明修棧道暗渡陳倉已非一次了有一天曹植背著手從中堂裏走向後邊而來轉了幾處遊廊進了一座花園這時正當五月裏的時候驕陽似火百合亭幾棵石榴已到怒放的當兒了噴火蒸霞的十分燦爛他走到一塊青石的旁邊探身坐下默默的尋他的詩料猛聽得假山背後有一種呻吟的聲音他吃驚不小忙站起來躡足潛蹤地溜過來一望不禁倒退數步你道是什麽緣故原來是曹熊按著一個女子在草地上幹著那女子的面孔用一塊手帕遮著看不清楚是誰他們聽見人聲慌得從地上爬起來曹植再定睛一看那婦女不是別人卻是妹子曹綺他不禁連連頓足道該死該死誰教你們在這裏幹這件不知好歹的事呢曹熊羞得滿面通紅飛也似地奔了只落得曹綺一個人坐在地下羞得將粉臉低到胸口一聲不作曹植歎了一口氣道家門不幸就要出這些不倫不類的畜生了曹綺坐在草地上哽咽著答道你也不用怪我了這事原不是我要做的都有人教我們的曹植忙問道誰教你們的她道我們昨天到大哥那裏去玩耍看見他和姑姑也幹這個事兒他們倆教我們倆也做這個事我倒不肯四哥定將我拖來幹的曹植聽得這話大吃一驚仰面搖頭半晌無語曹綺站起來也自去了曹植想道這可該死了料不到他們竟也幹出這種禽獸行爲來了他思量了一會暗道他本來和我不睦我又何必去挖苦他萬一他惱羞變怒不承認反而在無形中又結了一層惡感麽罷罷罷只掃自家門前雪休管他人瓦上霜隨他們去幹什麽罷曹植打定了主意抱著不多事的宗旨所以他們日夜尋歡也沒有一個人去干涉一下子曹熊和曹綺也是打得火熱的分拆不開曹熊才十六歲因爲晝夜宜淫不上兩月瘦得和人柴仿佛此刻曹操三天有兩天在銅雀台裏尋歡取樂他們得著空子還不盡開心麽曹植和兒這段豔史由於曹植常常到銅雀台去獵色他有一天爲著一件事情到兒這裏來尋他的父親可巧曹操又不在這裏他兩個一見傾心良緣早種兒趁勢用話將他兜住談了一會由此以後愛情日增一日竟發生肉體上的愛情了閑文少講再表操賊這一氣非同小可頓時吐了幾口鮮血便一病奄奄地睡倒了再加上平素常發的頭風也來趁火打劫了他的病勢日見沈重百藥罔效不上三四個月一命嗚呼了臨死的時候囑咐諸大臣扶曹丕承他的基業這班文武將當然照他的遺囑上做去將曹丕立爲魏王不上一年即實行篡位廢漢獻帝爲山陽公此刻劉備已經定鼎西蜀爲漢中王諸葛亮等聽說曹丕實行篡位便勸漢中王早即帝位以定民心漢中王始尚遊疑後來經衆大臣疏請受禪不得已登壇受禪昭告天地是爲昭烈帝曹丕聽說漢中王即位便欲起兵爲難司馬懿上疏諫止此刻魏王唯一拜服的就是司馬懿由主簿一躍而爲軍馬總督這司馬懿老謀深算居心叵測生平最怕的就是諸葛亮除卻孔明的妙算的確沒有第二個是他的對手了曹丕接了帝位之後將髮妻甄氏冊爲正宮瞞著衆人又將曹妍立爲貴人藏在內宮朝朝取樂夜夜尋歡好在外邊一切的軍事政治全仗司馬懿曹洪等一班走狗維持他日居深宮宜淫縱樂無所事事光陰如流水般的快略眨眨眼七八年飛也似地過去了在這七八年之內不過是我爭你打紛紛逐鹿也未見什麽消長也沒有什麽香豔的事實可錄惟有昭烈帝即位三年即行崩駕了臨死的時候托孤於諸葛亮輔太子禪繼位封諸葛亮爲武鄉侯領益州牧凡有一切的政治皆委之與他太子禪天性敦厚遠不及照烈帝雄才大略幸有孔明等忠心輔佐終年南征北伐辛苦備嘗南征交趾功勳不亞于馬援六出祁山均未能如願這差不多是天命不可挽回罷了但是諸葛亮雄心未灰不以不得志而氣餒仍舊繼續征伐他的忠勇可在出師表上見得了這正是一自功蓋三分國江上猶存八陣圖要知後事如何且看下回分解
