body:
  text: 第七十七回十年富貴奴淩主一曲昆簧帝識臣卻說步軍統領密派著二十個勇健軍人暗暗地保護著皇上那皇上一到外面大街小巷沒有一處不要去遊玩後來他走到琉璃廠一家紙鋪子裏去買玉版箋看成了貨物共要十二兩銀子同治帝從懷中掏出一把瓜子金來付給店夥誰知那店夥是不認識瓜子金的他卻不要那小太監不問他要不要拿著紙便走店夥見他要白拿貨發起急來托地從櫃檯裏面跳出身體來伸手一把在小太監衣襟上扭住另有一夥計從裏面走出來把皇上當胸扭住口口聲聲嚷說逛騙貨物的賊送他到衙門裏去那時店裏掌櫃的也走出來問著皇帝道你是什麽人那皇帝說道俺是江西的拔貢姓陳的便是正在不得開交的時候忽然走進十多個雄糾糾的武士來把兩個夥計的辮子揪住說隨俺到衙門裏去那店夥計便大嚷起來說道世界反了你不抓白撞賊倒要抓俺做買賣的人那武士聽夥計罵皇帝白撞賊便揚起手來正要打下去還是皇上來解勸說叫夥計拿了紙跟隨俺到家裏去拿錢去進了城又走了不少路一擡頭忽然見高高的午朝門矗在面前店夥計看那主仆兩人搖搖擺擺地走進午門去頓時害怕起來忙把手中的紙丟在地上慌慌張張地逃去同治帝看了不覺大笑吩咐小太監去把紙拾起來拿進宮去第二天依舊命小太監拿了銀子到紙鋪子裏去如數給錢慌得那紙鋪子裏的掌櫃不住地向小太監作揖打躬小太監也不去睬他徑自回宮來過了幾天同治帝獨召毛文達進宮去提起春燕樓吃酒的事皇帝還說他多事有許多武士跟隨著行動反多不便文達又磕頭勸諫說皇上萬乘之軀不可冒此大險同治帝如何肯聽依舊偷偷地在外面遊玩有一天出了後宰門走過湖南會館忽然對小太監說道曾國藩住在裏面待朕看他去走進會館找到曾國藩院子裏一問曾國藩出外去了見對面有一間屋子房門開著同治帝便也直闖進去屋子裏是一個湖南舉人姓郁的這時正趴在炕上吃飯見一個少年昂頭直入也不招呼人便在書桌前坐下見書案上攤著一本文章稿子那少年便提起筆來隨手亂塗到末後寫著不妙兩字那郁舉人正要上去攔住這少年丟下筆哈哈大笑著去了郁舉人看了十分詫異問自己的僕人時說這是來拜望曾大人的客人因爲曾大人出外未回所以他信步到老爺屋子裏來的郁舉人聽了也猜不出是什麽樣人待到晚上曾國藩回來了郁舉人跑去問他又拿塗改過的文章給曾國藩看曾國藩也猜想不出是什麽人第二天曾國藩被召進宮去奏對完了同治帝笑問昨天怎麽不在會館裏曾國藩聽了十分詫異忙磕著頭說臣昨天應恭王爺的召在王爺府中陪飲同治帝又笑說你那對門住著的湖南舉人好大模大樣的曾國藩聽了知道皇上昨天又私自出宮來過了便嚇得一句話也不敢對答回到會館裏把這情形告訴了郁舉人才知道昨天來塗改文章的便是當今皇上嚇得那郁舉人會試也不會收拾行李一溜煙地逃出京去了從此京裏大小官員都不敢在外面行走只怕遇到了當今皇上得了什麽罪名但是同治帝越發遊玩得得了意依舊每日裏帶了小太監在外面亂闖又有一天崇文門外土地寺裏有一個廟祝正在打掃佛堂外面下著大雨忽然有一個少年抱著頭匆匆地進來後面跟著一個僮兒看他主仆兩人身上都被雨淋濕了這廟祝是熱心人忙把他主仆兩人邀到後面屋子裏去特意生著火盆替他們拿衣服烤幹煎著茶給他們吃那少年一面喝著茶一面問道這廟裏沒有和尚嗎那廟祝說道這裏只有師徒兩個和尚如今出外打齋飯去了少年又問廟祝今年多少年紀在這廟中幾年了從前在什麽地方那廟祝見問便把手中的掃帚撐著說道我如今三十六歲了來到這廟裏已有四個年頭了當初原在西關頭陳大人家裏做奴才的俺是陳大人家自幼兒買去做書僮的足足服侍了陳大人二十個年頭四年前偶不小心打破了一個古瓶陳大人把奴才打了一頓攆出門來是俺無處可奔因一向認識土地廟裏的大師父便投奔他來當一個廟祝廟裏香火十分冷清俺在這裏也十分窮苦那少年又問在陳家當了二十年書僮陳大人可曾替你娶你娶過媳婦又可曾給你幾個工錢廟祝說俺在他家二十年工夫也不曾看見過一個大錢娶媳發的事更不必說起這少年聽了臉上有些動怒的樣子便問如今你那陳大人在什麽地方廟祝說道早在三年前到廣東當海關道去了少年又問俺全國的海關缺分什麽地方最好那廟祝說道這自然要數廣東的海關是第一個好缺了少年問他你也想去做一做海關道嗎那廟祝笑說道大爺敢是和俺開玩笑呢想俺不過做一個廟祝罷了飯萊也不得飽布衣也不得暖哪里敢存這個妄想少年聽了接著說道你既這樣說俺便送你一個菜飯飽布衣暖的去處去說道叫拿紙筆來這少年便一揮而就從懷中掏出一個小印來蓋上印把字條兒交給廟祝說你明天拿去見步軍統領自有好處廟祝接了字條兒心中將信將疑這時天上雨也住了他主仆兩人的衣衫也烤幹了少年便告辭出去那廟祝把宇條兒藏著到了第二天果然拿著去見步軍統領這時做步軍統領的便是醇親王他打開字條兒一看認識是皇上的手諭忙得他連忙擺設香案開著正門出來把這廟祝接了進去三跪九叩首行過全禮把個廟祝弄得摸不著頭腦只得聽他擺佈去過了幾天那統領便替他更換衣衫打發兩個差官帶著一角文書送他到廣東見他那舊主人陳大人去陳大人見了公文忙把海關道的印信交與廟祝自己退出衙門從此那廟祝做了海關道他感激皇上的恩典把歷任的積弊都查了出來叫衙門裏的師爺替他上了一本吏部派人查複把從前做過粵海關道的官員都一齊革了職這廟祝在任上四年也不貪贓也不舞弊但也多了十六七萬家財便做起富翁來了後來同治帝知道了便點頭稱讚道朕識拔的人到底不錯同治帝在外面遊蕩慣了一天不出宮門心中便悶悶不樂皇上最挂念的是後門外的一個涼粉擔兒皇上每帶著小太監在後門外走過總要就擔頭去吃一碗但吃了總不給錢的在同治帝心中也永不知有吃了零碎食兒要給錢的一回事那賣涼粉的見他品貌英秀舉動豪華認做王家的公子哥兒也不敢向他要錢這樣一天一天地吃著差不多吃了四五十碗了有一天皇上又站在擔兒邊吃涼粉恰巧旁邊也有三五個人站著吃涼粉他們吃完了便個個掏出錢來給那賣涼粉的皇帝看了十分詫異便問賣涼粉的你要錢幹什麽那賣涼粉的聽了大笑說道真是公子哥兒俺不要錢家裏三五口人哪能活呢皇帝又說道你既這樣爲什麽不要銀子卻要錢呢那賣涼粉的又笑道這涼粉是賤東西哪裏說得上銀子一兩銀子要買幾擔呢怎麽可以賣得人家的銀子呢皇帝又問道你既要賣錢爲什麽不向俺要錢那賣涼粉的知道他是貴家公子便有意說著好聽的話兒道爺們肯賞光已是榮耀了哪里還敢向爺們要錢呢皇帝聽了十分歡喜說道俺吃你的涼粉也多了今天俺想賞你可是袋子要沒有錢俺便寫一張銀帖給你你明天拿帖子去取錢可以嗎賣涼粉的聽說有銀子到手如何不願便去一家小酒鋪子裏借過一副紙筆來皇帝在紙上寫道廣儲司付銀五百兩又打上小印寫畢把筆一擲走了賣涼粉的是不認識字的拿著這銀帖去給酒店掌櫃的看那掌櫃的看了嚇了一跳說道你今天遇到的是當今萬歲爺了那賣涼粉的不信說哪有這個事那掌櫃的說道這上面明明寫著廣儲司這廣儲司在皇上宮裏是皇家的庫房看你怎麽收去那賣涼粉的聽了才害怕起來把那張銀帖拿去藏在枕箱下面壓著終是不敢到宮裏去拿銀子他打算倘然再遇見萬歲爺便把這張銀帖還他後來他老婆知道了日日夜夜在耳邊絮聒逼他去領取銀子那賣涼粉的沒奈何只得硬著頭皮闖進宮門去手裏拿著銀帖東碰西撞地問人好不容易果然給他找到了廣儲司把這張銀帖呈上去那司官問他這張帖子打哪里來的那賣涼粉的只得老老實實地說道有一位爺欠了小的涼粉錢拿這帖子賞小的小的原不敢要那爺說不妨事的吩咐小的來領銀子老爺們說給領便領說不給領時小的也不要了司官聽他說得有來歷又看他是一個老實人便吩咐他候著一面拿著銀帖去轉稟堂官堂官不敢怠慢進宮去奏明慈禧太后慈禧太后便吩咐把皇上請來停了一會那同治帝進來慈禧太后便拿這銀帖給他看同治帝便說這是朕賞給後門外賣涼粉的慈禧太後見皇帝認了便吩咐堂官叫照數給那賣涼粉的俺們不要失信于小百姓那堂官領了旨便退出去拿了五百兩銀子付給賣涼粉的那賣涼粉的捧著銀子歡天喜地地去了銀帖的事已了慈禧太后便對同治帝說道皇帝天天在外邊胡鬧也失了皇家的體統以後須格外自己檢點若給禦史家知道了又要在咱們跟前多說話這時恭親王恰巧有事進宮來慈禧太后便對恭親王說道六爺是皇叔了皇上天天在外面胡鬧六爺也得勸諫勸諫才是同治帝聽太后嘮叨了半天心中十分不自在了便退出來回到乾清官去誰知接著又是恭親王進宮來請見這時皇帝十分困倦躺在東便殿的安樂椅上恭親王進來便跪下向皇帝磕頭說道方才太後的懿旨皇上總該也聽得了皇上天天出宮去遊玩太后總說是俺們做臣子的不好不知道在皇上跟前勸諫皇上快改過了罷一來也免得叫皇太后在深宮挂念二采也免得臣受著太後的訓責皇上是萬乘之軀是當格外保重不可輕易出宮從前白龍餘且行刺先皇的事體皇上也該有些知道皇上私行出宮又沒人在左右保護一旦出了什麽亂子不但叫兩宮太後擔著驚恐且也使臣等負罪終身便算是太平無事這祖訓也須遵守歷來皇上從沒有私自出宮的說起祖訓同治帝不覺有些惱怒起來便從安樂椅上坐起來說六爺是熟讀祖訓的如今朕身上還有什麽事是違背祖訓的嗎這時皇上身上穿著黑色繡白蝴蝶的袍褂恭親王便指著皇上的身上道皇上穿這身衣服也是違背了祖宗的遺制了同治帝聽了微笑著說道朕這件衣服和載澄哥兒穿的是一樣格式的那載澄哥兒是六爺的親生兒子如今六爺怎麽不管教兒子去反來勸諫朕躬六爺且起去朕還有後命恭王見皇上臉上露著怒容便又磕了幾個頭起來退出宮去這恭王才轉背那同治帝便氣衝衝地走進書房去寫了一道諭旨用黃封套封住又傳諭出去喚大學士文祥進宮來那文祥和恭王的交情很好的他進宮門的時候正值恭王出宮門兩人見了面便談起方才勸諫皇上的事體恭王還說皇上聽了不十分樂意相國進去見了皇上也須幫助著勸諫勸諫文祥聽了便點點頭進去了同治帝坐在書房裏傳見文祥進去磕過頭站了起來同治帝遞給他一個黃紙封兒說道朕有一道旨意在裏面不許私自拆看快拿到軍機處給各大臣王公看了看過了快快照辦文祥把聖旨接在手裏偷眼看皇上滿面怒容文祥心知有些不妙忙跪下來求皇上明諭同治帝看文祥求得厲害便說道對你說了也不妨這裏面有一道諭旨是殺恭親王的文祥聽了磕頭越發磕得厲害口口聲聲說看在六王爺是顧命大臣又是皇叔份上饒他一死罷同治帝見文祥纏繞不休便一甩手站起身來踱進寢宮去了文祥無可奈何只得捧著諭旨去見慈禧太后哭訴皇帝要殺恭親王的事體求皇太後快救六王爺一條性命文祥說著連連磕著頭太后便吩咐把諭旨留下咱自能向皇上說話的文祥退出宮去把這件事告訴給同僚知道大家聽了都替恭王捏著一把汗隔了幾天果然不見這道諭旨下來原來這時慈禧太后權柄很大便是皇上見了也有幾分忌憚但從此心中便厭惡恭王恭王卻不怕死依舊是剛正立朝見皇上有不守祖訓的地方還是苦口勸諫誰知勸諫的由他勸諫皇上遊玩的依舊要遊玩北京地方有一家著名的飯莊招牌名叫宜德樓有一天王景崎太史和戶部侍郎于德耀兩人正在樓上對酌那兩人都愛唱的王太史愛唱二簧于待郎又善唱昆曲飯莊又有現成的琴索他們酒吃到高興時候便輪流著高唱起來起初于侍郎拉著胡琴王太史唱了一折京調後來王太史吹著笛子于侍郎唱了一闋昆曲唱了一出又是一出他兩人越唱越高興了引得那班吃酒的人都擠在門簾外靜聽正聽得出神的時候忽然見一個少年掀簾直入也不打招呼一坐便坐在王太史對面呆呆地聽著王太史了正唱得起勁不曾去問得他的名姓聽王太史唱完一出那少年便向于侍郎兜頭一揖說求大爺再賞一出昆曲聽聽于侍郎見這少年英姿颯爽說話又十分客氣便不好意思推卻便爲他再唱了一折舟會正唱得動聽的時候忽然樓下一陣車馬聲十分熱鬧一齊到宜德樓下停住四五十個騎兵擁著一輛紅色輪子的車子車子裏面走出一個老人來大家認得是恭親王那班吃酒的人見王爺來了一齊避開那恭親王走上了樓一直走進王太史的房裏見了那少年便低低地在他耳邊說了許多話起初那少年搖著頭不依後來恭王再三說了這少年只得垂頭喪氣地下樓去恭王把那少年扶上車子自己跨著轅兒一簇雲似地擁著去了到這時王太史才知道那少年便是當今萬歲爺那于侍郎受過皇上一揖的把個于侍郎嚇得只是怔怔的只防有什麽禍水他們也無心吃酒了便各個回家去第二天忽然朝旨下來把王景崎於德耀兩人都升了官於德耀心想爲唱曲子升了官說出去名氣不好聽便告老回家去了獨有這王景崎年紀還輕當時他官直升到吏部侍郎在弘德殿行走天天和皇帝見面這王景崎是北京地方有名的嫖客凡是北京地面上的小班茶室下處以及私門子他無不熟悉皇帝得了他的教導便越發在外面胡行亂走他們又最愛闖私門子只因私門子地方幽秘不容易爲人發覺王景崎認識的有一個章三奶奶年紀又輕相貌又好她住在西城的餑餑房皇上和王景崎兩人常常光臨那章三奶奶是姑娘而兼炕主的她手下養著許多姑娘皇上輪流玩著十分快樂但是皇上因太后在宮中常常要查問不便在外面久留匆匆上炕總是唱一出的多看天明的少可憐皇帝來往西城既是十分辛苦在路上冒著風寒雨露身體不免受損又因貪多縱欲兼收並蓄不免染了血毒不多幾天皇帝病了病得十分厲害慈禧太后看了萬分焦急一面傳禦醫診脈下藥一面傳慧妃在皇上身旁早夜伺候這時皇上渾身發燒熱得人事不知一任太后和慧妃兩人擺佈去後來看看病勢日漸清減身上的熱也慢慢地退了誰知皇帝又渾身發出一身痘來只因同治帝在外面眠花宿柳不免染有血毒那痘的來勢甚猛滿身都是皇帝又昏沈過去皇帝床前只有慧妃一個人看守著孝哲後已許久不和皇帝見面了如今皇帝害病宮裏的宮女太監們都是慈禧太后和慧妃的心腹把這消息瞞得鐵桶相似慈安太后和孝哲皇后宮裏卻一無所聞慈禧太后看看皇帝的病狀不妙便日夜和恭親王一班大臣商量立嗣的事體要知後事如何且聽下回分解
