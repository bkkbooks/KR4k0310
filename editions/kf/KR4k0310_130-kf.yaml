body:
  text: 第九十回借劍殺人宮中施毒計含沙射影枕上進讒言卻說燕廣聽得他的夫人的話滿心歡喜道賢妻能助我一臂之力那就好極了穀琦忙道亂臣賊子人人得而誅之何況此等謀爲不軌的逆臣呢她說罷磨墨拂幾鋪下雪浪箋不一刻洋洋灑灑立成千言她用外套封好對燕廣說道我們既去告發他們料想他和我們必不甘休的此地也難住了不如妾身和你一同長安去罷燕廣大喜道是極是極我也是這樣的想事不宜遲今晚就走穀琦道我們就是晚上動身也不能明顯形迹的他兩個打定了主意等到天晚收拾細軟騰雲價地直向長安而來一路無話到了長安即行詣闕告變彈劾楚王劉英說他與王平顔忠等造作圖書謀爲不軌等語明帝得書發交有司查複有司派員查明當即複奏上去略稱楚王劉英招集奸猾捏造圖識擅置諸侯王公二千石大逆不道應處死刑明帝總算格外施恩只將劉英的王爵奪去徙居丹陽涇縣又賜湯沐邑五百戶遣大鴻臚持節護送使樂人奴婢妓士鼓吹送行劉英仍得高車怒馬帶領衛士遷到丹陽涇縣不過那個心愛的人兒卻隨道慧逃得不知去向了至於那一班同謀的王平顔忠等均先後入獄且待慢表再說劉英到涇縣之後那一種野心仍然一分沒有改去還是聚衆造謠妄想吞奪漢室的江山不料事機不密早有人去報與大司徒虞延誰知虞延以爲劉英系天潢宮戚未敢遽爾上疏隔了數日仍是燕廣上奏明帝大怒便召遽延上朝切實申斥遽延惶恐無地深怕明帝誅及九族不如自盡了罷他回到府中吞金自盡這事傳到劉英的耳朵裏驚懼萬分暗想大司徒尚且這樣我還想活麽他也服毒而亡明帝聞報一面命將劉英按禮葬祭一面抄查錦衣尉奉命前往隔了一月回來交旨獻上劉英親筆寫的一本冊子明帝細細一看不禁天顔震怒忙交與軍馬司命昭冊拘拿原來那本冊子是劉英在時親自寫的上面俱有名人巨卿的名字但是他寫這本冊子究竟是什麽用意呢小子的鄙見他不過欽慕衆人巨卿想他們扶助成其大事罷了可是這班名人巨卿是否認得劉英與劉英究竟有往來沒有我可說一句連認得還不認得呢軍馬司得了聖旨便按著冊子去挨次拘拿下獄未到三天竟拘禁有五千餘人三台嚴加詢問可憐他們名人巨卿無辜的陡然蒙此不白之冤誰也不肯承認和劉英通同作弊的淹留日久審問得毫無頭緒三台官也未免著了忙慘毒的五刑只好拿來施用了這樣的一來將那些無辜的貴卿害得皮膚潰爛大半致死有些未曾死的奄奄一息終無異詞日又一日仍然毫無頭緒將京都內外的大小官員弄得人人自危如坐針氈上一樣這事馬皇后知道了便勸明帝從寬發落明帝說道梓童你只知其一不知其二須知這些俱是劉英的黨羽若不趁此將他們剷除將來爲害定然不小呢馬皇后對明帝又勸道妾幼閱經史殊未見有五千餘人同時入獄的縱有一二不肖之徒與劉英謀爲不軌也是意中事但是如有許名人貴卿萬歲久知肝膽難道他們一個個俱變了心麽依妾的愚見請萬歲親幸洛陽理直一趟方可令無辜的得見天日便是死了也就瞑目了明帝聽馬娘娘這番話不禁大動惻隱之心便於次日親幸洛陽開獄大審理出未死者一千八百餘人那時正當天旱誰知連夜即遍降甘霖明帝大爲動容便越發從寬發落於是多半赦免複職只有王平顔忠二人鐵案已定而且爲謀叛的渠魁罪無可逭命斬首示衆明帝將獄事理查清楚便轉駕回京這一來萬民的信仰登時又增加幾倍了從此風調雨順國泰民康略眨眨眼已到永平十八年的八月間了有一日上朝以後明帝忽然患病不起未到十天竟在東宮前殿禦駕告崩群臣以馬娘娘沒有生育只得將賈貴人所生的劉炟扶登正位是爲章帝奉葬先帝於節陵廟名顯宗諡曰孝明皇帝尊馬娘娘爲太后遷太尉趙熹爲太傅司空牟融爲太尉調蜀郡太守第五倫升補司空到了建初二年將泚陽公主所生二女選入宮中冊封爲貴人原來這泚陽公主乃東海王劉疆的女兒嫁與安豐侯竇勳所以小子向後就要稱爲大竇小竇了但是她們姐妹兩個生得本來是傾國傾城風鬟霧鬢又兼那一雙攝魂的秋水舉動可人不要說章帝是個風流天子見了愛得不可形容即是隨便何人見了這種的天生尤物都要說一句我見猶憐呢但是自從她們姐妹入宮以後真個是品冠群芳百花無色誰知她們雖然得寵專夕可是秀而不實卻未宜男倒是宋貴人反得一子取名爲慶章帝急欲立儲遂將慶立爲太子這事大竇小竇心中大不滿意暗自商議道如今萬歲已經將那宋貴人的兒子立爲太子眼見這正宮的一把交椅還不是那個賤人穩坐了去麽小竇說可不是麽如今急急要想出一條妙計來籠絡萬歲的心將這皇后的位置先奪了過來以後再慢慢地施展手段將這條孽根剷除你道如何大竇點頭稱是至此她們各展媚惑手腕來迷溺章帝尤其是大竇極意逢迎百般溫存將一個章帝顛倒得神昏志迷百依百順到了第二年的三月間不幸馬太后也駕崩了章帝越發放蕩無忌鎮日與大小二竇胡纏瞎混一些兒也不問政事大竇見機會已到便在章帝面前撒嬌撒癡的一回章帝哪知就裏便毅然冊立大竇爲萬民之母了小竇留在靜穆宮同樣的受寵不過名目上稍欠一點罷這時六宮專寵的竇娘娘大權到手真是如虎添翼爲所欲爲了有一天趁章帝早朝的時候便將小竇召進宮來共同商議剷除宋貴人母子的方法小竇首先說道現在你的大權已經到手要怎麽便怎麽還愁什麽呢竇娘娘搖手說道賢妹這句話太沒有見地須知萬歲既然冊立她的兒子爲太子可見與她的感情諒非淺鮮了如今我忽然在他的面前說她的壞話萬歲一定是不肯相信的不獨不能剷除她恐怕與自己也有些不利呢小竇聽得這番話沈吟了片晌然後說道我想要剷除就要剷除千萬不能再緩了萬一那賤人在萬歲的面前進了我們的讒言那就不對了我們失了寵你這皇后的位置恐怕也要發生變化了竇娘娘聽罷蛾眉緊蹙一籌莫展停了一會開口說道你的話何曾不是無奈那個賤人無疵可尋這倒是第一層不容易下手之處小竇笑道只要將良心昧起來欲加之罪何患無辭呢竇娘娘點頭道是小竇又道要想去尋她的短處非要先派一個人在她那裏刺探究竟一得憑證便好下手了竇娘娘答道現在的人心難測除了你我姐妹更有誰人是我們的心腹呢若是派錯了人走漏風聲如何是好小竇聽了也費躊躇又停了半天猛地跳起來對竇娘娘笑道有了有了我這條計包管百發百中叫她死無葬身之地竇娘娘忙問道是什麽妙計她不慌不忙地對她說道現在那賤人不是病了嗎竇娘娘點頭笑道是的她道京裏不是有許多太醫麽明天假傳一道旨意將那吳化召來教兩個小宮女將他引到她的宮中一面教萬歲去探探她的病勢那時碰了頭豈不是要起疑惑麽只要萬歲起了疑心這事便好著手辦了竇娘娘拍手道絕好就是這樣的辦法但是召太醫還是在晚上的好容易惹起萬歲疑心小竇道當然是晚上她兩個正自商議忽然有個宮女來報道萬歲回來了竇娘娘帶著小竇一齊出來迎接章帝見她們一對姐妹雙雙出來接駕不禁滿面春風忙一彎腰伸出兩手將她們姐妹兩個從地下攙了起來笑道下次見孤用不著這些俗禮了一概可以從免竇娘娘謝恩答道這雖是萬歲的天恩但是宮闈之內如果不按禮施行何能壓服衆人呢章帝笑道娘娘這話十分有理但是孤家的意思並不是要一律免禮的說著她們忙將章帝扶進宮中分位就坐章帝笑嘻嘻地向小竇說道愛卿今天什麽風吹到這裏來的你的姐姐常常要到你那邊去怎奈宮內的閒事太多所以總未能得一些空子孤家前天已經對你說過了這幾天孤家身體不大好所以也沒有到你那裏心中很是抱歉正要過去向你告罪不想你竟來了孤王順便對你說明省得你又要誤會小竇聽得這番話雙頰緋紅斜乜著星眼向章帝一瞟展開宮袖掩口笑道萬歲爺不用這樣的客氣罷我們這些人哪里能當得你去告罪不要折殺賤妾了我今天聽說萬歲的龍體欠安特地前來拜望的章帝聽了便情不自禁地將她摟到懷中捧著粉頰吻了幾吻笑道想不到愛妃竟有這樣的好心無怪孤王將你當著心肝兒看待了她微微地笑道萬歲爺請尊重一些被宮女們看見像個什麽樣子呢章帝笑道夫婦恩愛人之大倫誰敢來說孤家的不是呢這時竇娘娘早將宮袖一展一班宮女早就退出去了她對章帝笑道萬歲你用不著去聽她花言巧語的了你知道她今天來做什麽呢章帝笑道還問怎的她方才不是說過了嗎她今天來拜望孤家的她笑道不是不是她見萬歲這幾天沒有到她那裏她今天是來尋萬歲責問的請萬歲就去罷不然她的性子慪起大興問罪之師那樣一來連我還不得過身呢小竇倒在章帝懷中仰起粉脖對章帝笑道萬歲聽見麽還虧她是一位皇皇的國母呢這兩句話就像她說的麽你不問我卻要和她交涉了章帝笑道好在你們是姐妹她拿你開心取笑也不要緊你拿她開心取笑也沒有關係自古道清官難斷家裏事我雖然是個九五之尊但是你們的事情我卻不敢干預的小竇笑道我曉得了用不著萬歲爺再說了這無非是萬歲爺怕她說到這裏掩著嘴眼看著大竇只是吃吃地笑個不止竇娘娘笑著問道怕什麽快些說出來她笑道用不著說了萬歲爺是個明白人說出來反覺不大好聽不如不說罷竇後一疊疊地催道他明白我不明白務要你說出來如果不說光向萬歲爺說我可將我的威風擺出來了章帝笑道那可使不得孤王替她說了罷千怕萬怕大不過怕老婆罷了大家戲謔了一陣子小竇便告辭走了到了第二天的晚上小竇便命兩個心腹的內監去請吳化不一會果然請到宮中小竇便命兩個小宮女將他送到宋貴人的宮中宋貴人的病已經好了正坐在窗前觀看經史瞥見外面一個宮女進來報道吳太醫來了宋貴人只當是萬歲的旨意教他來的呢忙命宮女請他進來宋貴人便向他說道太醫今天來有什麽事的吳化被她這一問倒弄得不知其所以訕訕地答道萬歲的旨意著微臣來替娘娘診視的宋貴人不覺詫異地說道我不過前天偶然感著一點風寒原沒有什麽要緊昨天就好了現在用不著診視了吳化聽了答道這是萬歲的旨意教微臣來的但是娘娘貴恙之後也要加些調理才是宋貴人接著說道好好的一個人又何苦去尋藥石來吃做什麽呢不表他們在這裏談話再說小竇將吳化送去之後又著人去到竇娘娘那裏報信她得著這個消息趕緊對章帝說道萬歲前天臣妾聽說宋妹妹的身體欠安現在不知好一些麽章帝忙問道她難道生病了麽竇娘娘答道正是呀我請萬歲還是去望望她究竟是什麽病也該去請一個太醫來診視診視才好呢章帝忙道是極是極還是娘娘想得到我倒將她忘記了前天有一個宮女曾對我說起不料孤家竟未留心今天難得你提起我便望望她罷他說罷便起身徑向淑德宮而來他一個人走進去瞥見宋貴人的對面坐著一個男子不禁一怔忙走進來仔細一看原來是吳化不禁頓起疑雲宋貴人見他進來慌忙站起接駕吳化隨後俯伏地下奏道微臣奉旨前來娘娘的玉體已經大安了不須再用藥石了請旨定奪章帝聽了這話不禁十分詫異暗道這話從何說起我幾時有旨意傳他呢章帝想到這裏猛地省悟了暗道這個賤人竟做出這樣的事來好好好他想到這裏也不答話忙喚道武士何在話猶未了早擁進許多武士章帝忙命將吳化拿下一群武士如虎撲羊羔般地就地將吳化抓起來慌得吳化滿口呼冤向章帝呼道萬歲爺臣有何罪請示明白微臣就是死也瞑目了章帝忙命掌嘴不由分說他的兩頰上劈劈拍拍地早打了幾下章帝又命將宋貴人囚入冷宮聽候發落衆內監不敢怠慢登時將宋貴人禁入冷宮可憐一位極賢德的宋貴人到了現在還不知道究竟是爲著怎麽一回事將她囚入冷宮呢但是一點也不怨恨章帝昏暴自歎自己命苦罷了目下暫且將她擱起再說吳化囚入天牢約在明日午時三刻就要處以極刑了這個消息傳到衆大臣的耳朵裏沒有一個不大爲駭異均衆口異詞莫衷一是到了第二天的早朝衆大臣挨次上本保奏章帝一概不准這時卻惱動了大司空第五倫越班出來俯伏金階奏道臣聞盜賊處以極刑當亦有證據今天太醫吳化身犯何罪陛下未曾宣佈便欲施以極刑豈不令天下之士有異議麽微臣冒死上瀆天顔無論如何總請萬歲將吳化的罪狀先行露布然後殺之未晚章帝忙道這事孤家自有道理請卿家不要多問第五倫又俯伏奏道這並非是微臣多事不過先帝曾有遺言賞罰務明功罪必布現在萬歲這樣的做法豈不令朝中人人自危而且失萬民的崇仰麽章帝也沒話可說停了半天才開口說道他未得孤家的旨意擅自進宮這罪還可赦麽第五倫奏道吳化乃是先帝的遺臣一舉一動未曾稍失禮儀難道他未曾奉旨竟敢擅自闖入內宮了麽我想這事定有冤情還請陛下詳察究竟然後再治罪不遲章帝聽得便覺這話也很有理便將賜死的旨意收回不想竇娘娘在簾後聽第五倫這番辯論竟將吳化的死罪赦掉她不禁暗暗地懷恨道頗耐這個匹夫他竟來和我作對了好好管教你認得我的手段便了不說她暗自發恨再說章帝龍袖一拂卷簾退朝和竇娘娘一同向坤儀宮而來半路上有人報道宋貴人服毒身亡章帝聽說這話一點也不悲感氣衝衝說道她死了便死了要你們這班狗頭來大驚小怪的做什麽呢那些內侍臣嚇得俯伏地上頭也不敢擡等聖駕走過去才從地上爬起來抱頭鼠竄地走了可是竇娘娘聽說宋貴人已死真個是化子拾黃金說不出來的歡喜到了晚上章帝自然是在她的宮裏晚膳已畢章帝因爲多吃了幾杯酒又因爲病後那個老調兒許多時未弄了便來不及地和她同入羅帳一場鏖戰等到雲收雨散之後她便偎著粉臉對章帝勸啓朱唇說了一番話來這正是蕩婦陰謀信可畏遇姬長舌實非虛要知後事如何且看下回分解
