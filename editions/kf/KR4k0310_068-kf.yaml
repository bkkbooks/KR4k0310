body:
  text: 第六十八回金蓮點點帝子銷魂珠喉嚦嚦阿父同調卻說李家小姐自從進了圓明園以後咸豐帝吩咐把她安頓在西山佛寺裏又挑選了八個年輕宮女住在寺裏侍奉她那李小姐到了佛寺裏真的謝卻鉛華長齋禮佛咸豐帝雖有杏花春牡丹春一班絕色女子陪侍著但一班濃脂俗粉皇帝也看厭了宮中六千粉黛總趕不上李小姐這種清麗美妙的神韻皇帝想起她來便親自到佛寺裏去看望那李小姐把皇帝迎進寺去便自顧自跪倒在佛座前誦讀經卷一任那班宮女伺候著皇上待到皇上傳喚她她走到跟前匍匐在地下再也不肯擡起頭來皇帝忍不住了自己伸手去攙她她便哭得十分淒涼口口聲聲說萬歲許賤妾進宮來修行皇上聖旨想來總可以算得數了皇帝被她一句話塞住了嘴一時裏卻也反悔不得只得聽她去但是眼看著這樣一個絕色美人不得到手心中說不出的煩悶後來皇帝賞了她一個陀羅春的名字常常到寺裏來和她談談陀羅春見皇上沒有逼迫她的意思便也不和從前一般的冷淡了只是有時說起她母親被官府裏用刑拷打死得苦要求皇上辦那官府的罪咸豐便依她下諭給吏部著把那官府革了職充軍到甯古塔去陀羅春見報了仇才把悲傷減輕了些便是皇帝幾次來召幸她她總是抵死不去逼得她緊些她便尋死覓活拿刀動剪咸豐帝也沒奈何她只得暫時把這條心擱起這時只因皇帝歡迎小腳漢女那班大臣要討皇帝的好到蘇杭揚州一帶去搜羅了許多小腳姑娘來有的尖如束筍有的小如紅菱各把裙幅兒高高吊起露出一雙纖瘦玲瓏的小腳來一霎時圓明園裏花前廊下都留著纖纖足印講到那弓鞋樣兒越發的鬥奇竟巧有的用紅綠緞子繡鮮豔的花朵兒的有的鞋口兒上挂著小金鈴兒的有的把腳底兒挖空了裏面灌著香屑走起路來步步生香的咸豐帝看在眼裏真是銷魂動魄只苦的宮裏規矩小腳女子一進宮門便要殺頭後來還是崔總管想出一個法子來推說是宮裏太監不夠差遣時雇用民間婦女在宮中打更這個消息一傳出去便有許多小戶人家的婦女進宮來受雇宮裏定出兩個條件來第一要年輕第二要腳小又揀那皮膚白淨面貌標致的送去在皇帝寢宮前後打更那班女人到夜靜更深的時候都被皇上傳喚進去一一臨幸每夜臨幸三人臨幸過的都有珍寶賞賜那格外標致的便留在宮裏封做官嬪不上半年那封宮嬪的漢女差不多把個圓明園住滿了皇帝住在園裏有許多美人陪伴著再也不想回宮去了照宮裏的規矩皇帝每年三四月到圓明園避暑到八月時候到木蘭去打過圍獵回來便回皇宮咸豐這時候每年一過了新年便要搬到園裏去住直到十月裏還不回宮非得孝貞後再三上疏請聖駕回宮他才不得已回宮去過年在這三五十日裏他想著園裏一班美人險些要害起相思病來只因皇帝喜歡漢女那班小腳女子便頓時威風起來裏面最得寵的要算杏花春和牡丹春這兩人在園裏作威作福那班滿洲妃嬪個個都去奉承她可憐她們都是皇上挑選秀女的時候選進宮來的實指望一朝得寵門戶生光誰知這時皇上迷戀江南美人把她們一班滿洲少女一起丟在腦後門庭冷落簾幕消沈大家沒有法兒想只得來拍四春的馬屁內中有一個新進宮來的秀女名叫蘭兒的卻是滿洲婦女中出類拔萃的人才講她的年紀正是豆蔻年華講她的風姿真是洛神風韻輕顰淺笑嫋娜動人一進園來指派在桐蔭深處從此長門寂寞冷落紅顔早晚只聽得笙歌歡笑從隔院傳來問時原來天子正和一班漢女在那裏歌舞作樂蘭兒聽了只得歎一口氣從此深閉院門潛心書畫不多幾天居然寫得一手好草書又畫得好蘭竹你們不要看她小小蘭兒她是一個極聰明的女了也是一個極有作爲的女子她一生的事迹很多掀波作浪清朝三四百年天下也斷送在這宮女手裏下文要敍述她的事體很多做書的一支筆忙不過來如今趁她在不得意的時候先把蘭兒的出身敘一敘蘭兒原是滿洲正黃旗人姓那拉氏查起她的祖上來是葉赫部的子孫太宗的孝莊皇后也姓那拉講到她的門第卻也不壞蘭兒是她的小名她父親名喚惠征那拉氏到了惠征手裏已是十分貧苦虧得他祖上傳下一個世襲承恩公的爵位每年拿些口糧拿來養家小惠征從筆帖式出身六年工夫才爬到一個司員他太太佟佳氏卻是大官府人家的小姐惠征靠他丈人的腳力從司員放了安徽蕪湖海關道在前清時候那道班裏要算關道最闊了惠征得了這個美缺一跤跌在青雲裏心中說不出地快活便帶了家眷走馬上任到了蕪湖惠征的家眷卻不只妻子佟佳氏女兒蘭兒兩人還有兒子桂祥和小女兒蓉兒一家五口在女兒中要算蘭兒年紀最大這時也有十二歲了據佟佳氏說蘭兒出世的時候曾得到一個奇怪的夢她見一個明晃晃的月亮掉下來落在佟佳氏肚子上一嚇醒來覺得肚子痛到天明時候便生下這個蘭兒來他們滿洲人看女孩兒原比男孩兒重因爲女孩兒長大有做皇后的希望所以滿洲人家十分尊敬女孩兒平常在家裏起坐總讓女兒坐上首的何況如今佟佳氏得了這個夢越發把蘭兒當寶貝一般看待了偏生這蘭兒的面貌比妹子蓉兒格外出落得嬌豔身材又苗條性格又溫順人又聰明又會打扮同伴十多個女孩兒只有蘭兒家境最苦別人穿綢著緞戴金插翠獨有蘭兒沒有這個但是她一般穿一件藍竹布大衫戴一朵草花總是十分清潔也是十分俏麗任你如何富家的女兒沒有一個人比得過她的只是有兩樣壞處便是到老也改不過來你道兩樣什麽壞處第一樣是舉止太輕佻她掩唇一笑掠鬢一睞真是迷煞千萬人第二樣是愛唱小曲兒她幼小的時候惠征也指教她讀書識字她在書本兒上的聰明卻也還有限獨有這唱小曲兒卻是前世帶來的聰明無論是京調昆曲南北小調給她聽過一遍她便能一字不遺照樣地唱出來她天生的一串珠喉又能自出心裁減字移腔唱出來抑揚宛轉格外動人她起初還不過是清唱罷了後來她索性拉著親戚中的旗下姊妹來弄起笙簫拉起弦索來合上她的嬌脆歌喉煞是動聽母親佟佳氏看看一個女孩兒如此放浪終不是事體也曾禁阻她幾回誰知那惠征卻很愛聽女兒的歌唱旗下人的習氣原是愛哼幾句皮黃的他見女兒愛唱索性把自己一肚子的京調詞兒統統教給她父女兩人早也哼晚也哼家裏無柴無米他也不管他父女常常配戲有時唱三娘教子蘭兒扮三娘惠征扮老薛保有時唱汾河灣有時唱二進宮把客堂當戲臺拉著佟佳氏做看客佟佳氏看看勸說也無用索興氣出肚皮外也不去勸她了這時惠征未做蕪湖關道以前的話後來惠征一到任蘭兒隨在任上那蕪湖地方原是一個熱鬧所在西門外正在大江口岸沿江茶坊酒肆開得密密層層茶園戲館裏人頭濟濟蘭兒到底是女孩兒心性她父親又有錢便帶了一個丫頭一個小廝天天到戲館裏聽戲去那戲院子掌櫃的知道是關道的小姐便出奇地奉承那蘭兒聽戲又有一種古怪脾氣不喜歡坐在廂樓裏規規矩矩地聽卻愛坐在戲臺上出場的門口看著聽著天天聽戲那班子裏的幾個戲子她都熟識院子裏的人都稱她蘭小姐那蘭小姐天天在戲院子裏聽戲還覺不夠每到她父親母親或是弟弟妹妹的小生日便要把那戲班子傳進衙門來唱著聽著這蘭兒在蕪湖地方除聽戲以外又愛上館子她父親衙門裏原有親兵的惠征便撥兩名親兵天天保護著小姐在外面吃喝遊玩合個蕪湖地方上的人誰不知道這是關道的女兒蘭小姐講到那位關道只因在北京城裏當差清苦了多年如今得了這個優缺便拼命地搜刮貪贓納賄無所不爲一年裏面被人告發了多次皆由他丈人在京城裏替他打招呼把那狀紙按捺下來到了第二年他丈人死了也是惠征的晦氣星照到了他在關上扣住了一隻江禦史的坐船說他夾帶私貨生生地敲了他三千兩銀子的竹杠這位江禦史在京裏是很有手面的許多王爺跟他好他到了京裏便狠狠地參了惠征一本這時惠征的丈人死了京裏也沒有人替他張羅一道上諭下來把惠征撤任調省惠征得了這處分只得偃旗息鼓垂頭喪氣地帶了家眷回到安徽省城安慶地方去住著照那江禦史的意思還要參他一本把他押在按察使衙門裏清理關道任上的公款後來虧得那安徽巡撫也是同旗的還彼此關點親戚惠征又拿出整萬銀子去裏外打點總算把這個風潮平了下來但是他做過官的人如今閑住在安慶地方也毫無意味他夫人佟佳氏也勸他在巡撫跟前獻些殷勤謀點差使當當安徽巡撫鶴山看他上衙門上得勤人也精明說話也漂亮還能常常出出主意巡撫也慢慢地看重他這時安徽北面鬧著水災佟佳氏勸丈夫趁此機會拿出萬把銀子來辦理賑濟的事體又在巡撫做生日的時候暗地裏孝敬了兩萬銀子這一來並並刮刮把他太太的金珠首飾也並在裏面了鶴山巡撫得人錢財與人消災便替惠征上了一個奏摺說他精明強幹勇於爲善便保舉他辦全皖賑務的差使誰知惠征運氣真正不佳鶴山這個摺子一上去不到三天疝氣大發活活地痛死了遺缺交按察使署理那按察使恰巧是惠征的對頭人上諭下來把山東布政使顔希陶升任安徽巡撫那顔希陶一到任按察使便把惠征如何貪贓如何巴結上司徹底地告訴了一番這顔希陶是著名的清官他生平痛恨的是貪官污吏如今聽了按察使的話從來說的先入爲主從此他厭惡了惠征那惠征一連上了三次衙門顔巡撫總給他一個不見惠征心裏發起急來一打聽知道按察使和他擡杠子這時惠征所有幾個錢都已孝敬了前任巡撫眼前度日已經是慢慢地爲難起來要想打點幾個錢去孝敬上司再也沒有這個力量了沒有法想只得老著面皮天天去上院那巡撫心裏厭惡了他老不給他傳見他也曾備了少數的銀錢托幾位走紅的司道替他在巡撫跟前說好話誰知那巡撫實在把個惠征恨得厲害一聽得提起他的名字便搖頭那替他說話的人見了這個樣子便是要說話也說不出了惠征住在安慶地方一年沒有差使兩年沒有差使三年沒有差使你想他在關道任上把手勢鬧闊了吃得好穿得好住得好一個道台班子進出轎馬這一點體面又是不可少的再加這位蘭小姐又是愛漂亮愛遊玩的人在安慶地方雖然沒有蕪湖一般好玩但是一個省城地方也有幾條大街幾座茶館戲館這蘭小姐也常常出去遊玩免不了每天要多花幾個錢況且這惠征又吃上了一口煙不但多費銀錢那新撫台又是痛恨抽大煙的一打聽惠征有這個嗜好越發不拿他放在眼裏只因他是一位旗籍司員不好意思去奏參他惠征三年坐守下來真是坐吃山空早把幾個錢花完了起初還是供貸度日後來索興典質度日再到後來借無可借典無可典真是吃盡當光連一口飯也顧不周全了蘭兒母子四人常常挨凍受餓那蘭兒是愛好奢華的人如何受得這淒涼天天和她父母吵嚷說要穿好的要吃好的又要出去玩耍這也怪她不得女孩兒在十五六歲年紀正是顧影自憐愛好天然的時候蘭兒一年大一年卻長得一年俊一年她這樣花模樣玉精神的美人兒每日叫她蓬頭垢面襤褸衣裳一把水一把泥地操作著叫她如何不怨她每到傷心的時候便躲在竈下悲悲切切地痛哭一場佟佳氏看看自己花朵也似的女兒被糟蹋著如何不心痛到傷心的時候便找她丈夫大鬧一場那惠征眼看著兒女受苦何嘗不心痛只因窮苦逼人也是無可奈何的事體他到了這時候外面衆人交謫內而饑寒交迫只因沒有錢去買大煙鴉片常常失癮再加憂愁悲苦四面逼迫著那身體也便倒了下來從秋天得病直到第二年夏天足足一年那病勢一天重似一天佟佳氏起初因家裏沒有錢便還俟著不去料理他到後來看看他的病勢不對才著起忙來從箱底裏掏出一支從前自己做新娘時候插戴的包金銀花兒來叫他兒子桂祥拿去典錢那桂祥比蘭兒年紀卻小一歲今年十八歲了不知怎的卻生得癡癡癲癲如今見母親叫他去上當鋪去把他急得滿臉通紅說俺不會幹這個平日他家裏上當鋪都是佟佳氏自己去上的如今因她丈夫病勢十分厲害不便離開便打發桂祥去誰知桂祥卻一口回絕說不去佟佳氏不覺歎了一口氣說道蠢孩子這一點事也做不來卻叫我將來靠誰呢說著不覺掉下眼淚來蘭兒在一旁見她母親哭得淒涼便站起身來過去把包金銀花兒接在手裏出門自己上當鋪去了那當鋪裏的朝奉見了這美貌的女孩兒早把他的魂靈兒吸出腔子去只是嘻開了嘴張著兩隻桂圓似大的黃眼珠從那老花眼鏡框子上面斜乜著眼睛望著蘭兒的粉臉連連地問道大姐姐你要當多少錢那蘭兒看了這個樣子早羞得滿臉通紅一肚子沒好氣說道你看值多少便當多少那朝奉說道十塊錢夠嗎蘭兒聽了不覺好笑心想一支銀花兒買它只值得一兩塊錢如何拿它質當卻值得十塊錢呢當下她也不和他多說只把頭點了點可憐那朝奉只因貪著蘭兒的姿色眼光昏亂把一朵包金花兒看做是真金的白白賠了十塊錢蘭兒捧著十塊錢趕回家裏又出來延請醫生那醫生到她家去診了脈只是搖頭說癆病到了末期不中用了你們快快給他料理後一事罷佟佳氏聽了這話那魂靈兒早已嗡嗡地飛出了頂門心想如今一家老小流落他鄉莫說別的只是丈夫死下來那衣衾棺槨的錢也沒有地方去張羅誰知這個念頭才轉到那惠征睡在床上已經在那裏裝鬼臉了佟佳氏忙拉著她兒子桂祥女兒蘭兒蓉兒趕到床前去叫喊已是來不及了看他只有出來的氣息沒有進去的氣息不到一刻工夫兩眼一翻雙腳一蹬死了那佟佳氏捧著丈夫的臉嚎啕大哭想到身後蕭條便越哭越淒涼那桂祥蘭兒蓉兒也跟著哭這一場哭哭得天愁地慘那佟佳氏直哭到天晚還不曾停止左右鄰居聽了也個個替她掉眼淚內中有幾個熱心的便過來勸住了佟佳氏說起身後蕭條大家也替她發愁可憐惠征死去連身上的小衫褲子也是不周全的鄰舍中有一個周老伯看他可憐便領頭兒在前街後巷抄化了十多塊錢連那當鋪裏拿來的十塊錢拼湊起來買了幾件粗布衣衾但是那棺槨依舊是沒有著落後來又是那周老伯想出法子來帶了蘭兒到那班同仁家裏去告幫有幾個現任的官員有幾位闊綽的候補道內中還有幾位旗籍的官員要知同僚肯不肯援助且聽下回分解
