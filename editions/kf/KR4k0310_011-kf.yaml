body:
  text: 第十一回羨繁華觀光上國賴婚姻得罪鄰邦話說努爾哈齊弟兄兩人帶了許多貢物跟著李成梁進京朝見明朝皇帝去他兩人從不曾進過北京見了那地方的繁華人物的清秀心裏說不出羡慕一霎時那高大的宮殿已現在他眼前不由他心裏害怕起來進了內城到了一座客館前住下當夜便有幾個公公來教導上朝的禮節努爾哈齊又送公公許多禮物另外還有分送各衙門的在館裏住了三天到了上朝的一天半夜時分坐著驢車慢慢地到了朝門外下了車跟著引導的走進內街去這時夜色深沈禦街寂靜只見兩旁高高的圍牆站在黑地裏牆裏面露出高高低低的殿角來彎彎曲曲地走了許多時候才到朝房有許多官員上來和他打招呼有翻譯官替他們傳話停了一回忽聽景陽宮的鐘聲響了大家便整一整衣帽挨著班一串兒走進殿去在玉墀下面兩旁分班站著這時天上放下微微的光明來照在各人臉上還不十分明白滿院子靜悄悄的只聽得衣裳磨擦著悉悉索索的響聲站了許久許久忽聽得殿上奏起樂來這時天光已是大明殿廊上發出五色的光彩來照在人眼裏不能看得十分清楚只見那一班禦前侍衛在殿裏面左右交換著跑來跑去接著又有兩個太監手裏拿著一盞紅紗宮燈在禦座前跳來跳去舞了好半天便大家分著兩班向兩旁直挺挺地站著那音樂的聲音也立刻停住了再看時這位神宗皇帝已是端端正正地坐在上面這時殿下越發寂靜了只聽得靜鞭打著階石三下便有贊禮官高聲贊禮那文武官員分班兒一起一起地上去磕頭跪拜接著那位甯遠伯李成梁也上去爬在地下說了幾句話上面又傳下話來李成梁退下來便有引導的領著努爾哈齊弟兄兩人上去只當地橫鋪著一條棕毯好似一個一字弟兄兩人爬下地去行著三跪九叩首的禮兒贊禮官喝一聲退便退下殿來這時他弟兄兩人嚇得昏昏沈沈皇帝的臉兒也不曾看見停了一會散朝下來便有許多官員和翻譯官陪著他到保和殿吃禦賜的酒席吃完了向殿下謝過恩退出朝門上車回客館去到了第二天聖旨下來叫內務大臣和理藩大臣陪著他遊瀛台去這時正是夏天第二天一早起來跟著兩衙門的官員們進了西苑門只見高大的柳樹一絲一絲地垂著柳絲那槐樹的蔭兒罩住了地面人在下面走著心裏覺得十分清涼一帶宮牆沿著水堤開眼一望只見沿岸長著一叢一叢的蒲草那紫色的燕子和綠色的翠鳥在水草裏面飛來飛去一啼一聲地叫著風景十分幽靜慢慢地渡過一座板橋去一陣一陣的荷花香吹進鼻子來橋面上蓋著水閣四面玲瓏風吹著窗簾那流蘇掃到人的臉上來努爾哈齊心中不覺一動想這樣神仙也似的地方那神宗皇帝真好大福氣呢想著走進一座小紅門去忽然眼界一寬迎面一汪大水有一條紅板長橋曲曲折折地橫在水面兩邊朱閣圍繞舒爾哈齊走在橋面上不住口地贊好努爾哈齊回過臉去對他瞪了一眼嚇得他捂住嘴再也不敢說話了半晌走完了長橋迎面一座高大的朱漆牌樓上面寫著瀛台門三個大字走進牌樓去兩旁古木參天中間露出一條寬大的白石甬道甬道盡頭是一座大敞廳裏面走出幾個太監來招呼進去吃茶點吃完茶點從廳後繞出去穿過一座松樹林子林子外面一帶白石船埠停著一隻大官船官員們招呼努爾哈齊弟兄兩人上了船蕩到湖中回頭看那岸邊真是瓊樓玉宇一片金碧隱約在樹林深處努爾哈齊靠在船舷上心中又不覺一動他想到這樣神仙也似的地方怎麽得給我住一年便是死也甘心他兩眼望著水正想得出神時那船已到了岸邊大家離船出門上車回到客館裏接著李成梁也到了便在客館裏大開筵宴吃酒中間又來了幾個粉頭彈唱歌舞那玉雪也似的皮膚黃鶯也似的喉音早把他弟兄兩人看怔聽怔了半晌他們才回過氣來一轉念又想到他們明朝的美人真美啊不知怎麽長成這模樣的呢第二天聖旨下來封努爾哈齊做龍虎將軍他弟弟舒爾哈齊也得了許多賞賜他弟兄兩人謝過恩收拾行李動身回家去出得關來一路耀武揚威各處部落打聽得努爾哈齊果然得了好處便個個道賀人人敬服他兄弟兩人見了人便讚歎明朝京城裏的繁華又是婦女如何美麗那聽的人也說不出的心中羡慕努爾哈齊便在興京地方造起高大宮殿來又定出召見弟兄貝勒的禮節慢慢地他自己將自己尊貴起來
