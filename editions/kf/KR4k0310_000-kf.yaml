body:
  text: 清代宮廷豔史第一部民國許嘯天著目錄第一回杏花村裏鶯鳴燕唱布林湖邊月證山盟第二回洞房天半神仙眷氈幕地中龍虎兒第三回三尺粉牆重溫舊夢六十處女老作新娘第四回燈前偷眼識英傑林下逐鹿遇美人第五回割發要盟英雄氣短裂袍勸駕兒女情長第六回腰間短刀斬伏莽枕邊長舌走英雄第七回依佟氏東床妙選救阿太西遼鏖兵第八回古埒城覺昌死難撫順關尼堪斷頭第九回脂香粉陣靡雄主睡眼朦朧退敵兵第十回奸外母蒙格枉死避內訌努爾求屍第十一回羨繁華觀光上國賴婚姻得罪鄰邦第十二回殺親子禍起骨肉投明主初試經綸第十三回被底紅顔迷降將腔中熱血贈知人第十四回蘇子河邊淹戰將薩滸山下困雄師第十五回兄逼弟當筵結恨甥殺舅登臺焚身第十六回翠華園神宗醉玉膚慈慶宮妃子進紅丸第十七回依翠偎紅將軍短氣嬌妻雛兒天子托孤第十八回逼宮廷納喇氏殉節立文後皇太極鍾情第十九回朱唇接處嫂爲叔媒黃旗展來臣尊帝號第二十回傳疑案宸妃逝世驚豔遇洪帥投誠第二十一回多爾袞計殲情敵吉特後巧償宿緣第二十二回露姦情太宗暴殂見美色豫王調情第二十三回救愛妾三桂借兵殺宮眷崇禎殉國第二十四回酬大勳太后下嫁報宿恨天子重婚第二十五回悲離鸞小宛入宮誓比翼世祖遊園第二十六回入空門順治遜國陷情網康熙亂倫第二十七回劫民婦暗移國祚逋國師計害儲君第二十八回小二哥暫充欽差皇四子大戰俠客第二十九回甘鳳池座上獻技白泰官山中訪盜第三十回鬥法術計收血滴子換嬌兒氣死陳閣老第三十一回康熙帝揮淚廢太子汪紳士接駕失弱女第三十二回改遺詔雍正登位好美色胤礻我喪命第三十三回紅燈熱酒皇子遺愛煮豆燃萁兄弟化灰第三十四回牛鬼蛇神雍和宮鶯燕叱吒將軍帳第三十五回鳥盡弓藏將軍滅族妻離子散國舅遭殃第三十六回破好事大興文字獄報親仇硬拆鸞鳳儔第三十七回破腹挖腦和尚造孽褰簾入幃親王銷魂第三十八回弓鞋到處天子被刺手帕傳來郎君入彀第三十九回寶親王私通舅嫂乾隆帝寵愛香妃第四十回獄中回婦深夜被寵宮裏天子靜晝竊聽第四十一回念父母乾隆下江南爭聲色雪如登龍舟第四十二回東征西討福康安立功依翠偎紅皇太子偷香第四十三回證前盟和珅弄權結深歡高宗宿娼第四十四回鶯鶯燕燕龍須纖葉葉花花雲雨樓第四十五回脫簪苦諫皇后落發奮拳狠鬥天子被擒第四十六回涿州府皇孫出現同樂園宦女失身第四十七回鶯啼燕唱江南去匣劍帷燈刺客來第四十八回文字奇冤塚中戮屍姊妹絕豔水底定情第四十九回紅燭照處美人死綠樹蔭中帝子來第五十回死寶妃高宗傷往事游離宮嘉王窺秘像第五十一回燕瘦環肥國外選色偷寒送暖宮內納姬第五十二回老頭子紀昀妙解女孩兒福公祝壽第五十三回奇珍異寶和珅抄家擎石蹋樹成得獻技第五十四回遇宮變煤黑子效死獻巧藝王董氏傷生第五十五回崇節儉滿朝成乞丐慶功勞一室做餓夫第五十六回棄舊憐新宮中殺眷鶯啼獅吼床上戕妃第五十七回敬事房馱妃進禦豫王府奸婢殺生第五十八回皇兒仁慈不殺禽獸天子義俠挽救窮酸第五十九回姑謀婦皇后中毒妾救夫烈婦偷屍第六十回創異教洪氏起義知死期穆相辭行第六十一回昏燈哀語慈後逝世香鈎情眼蕩子銷魂第六十二回美人計宣嬌救阿兄烈女行文宗罷選秀第六十三回宣武門外名嬡倚閭釘鞋鋪中貞婦投梭第六十四回皇恩浩蕩冰花失志依情旖旎四春承歡第六十五回金蓮貼地瓊兒被寵粉龐失色紫瑛喪生第六十六回目成心許載澂淫族姑歌場舞榭玉喜識書生第六十七回傾心一笑杏花春解圍祝發三年陀羅春守節第六十八回金蓮點點帝子銷魂珠喉嚦嚦阿父同調第六十九回美人落魄遭橫暴天子風流選下陳第七十回瓊珠翠玉聘兒去婉轉歌吟引鳳來第七十一回殺漢女胭脂狼藉攻粵城炮火縱橫第七十二回蘭貴妃寄腹産載淳咸豐帝避難走熱河第七十三回泣脂啼粉夢驚三更畫棟雕梁園付一炬第七十四回防懿妃文宗草遺詔立怡王肅順奪國璽第七十五回除異己慈禧有急智燭奸謀安後運獨斷第七十六回安得海好貨取禍鄭親王貪色遭殃第七十七回十年富貴奴淩主一曲昆簧帝識臣第七十八回李鴻藻榻前奉詔嘉順後宮中絕食第七十九回爭大統吳可讀屍諫露春色慈安後滅奸第八十回李蓮英擅寵專權慈安後遭妒惹禍第八十一回榮祿初入宮禁地懿妃死償恩情債第八十二回慈安太后爲嘴喪命峒元道士望氣得意第八十三回白雲觀太后拈香神仙會郁氏納贄第八十四回花明柳暗頤和園彈雨硝煙高麗宮第八十五回西苑內皇帝聽豔歌坤甯宮美人受擄掠第八十六回勸親政翁師傅薦賢興醋波瑾珍妃被謫第八十七回幸名園太后圖歡娛坐便殿主事陳變政第八十八回三月維新孤臣走海上半夜密議皇帝囚瀛台第八十九回寇太監殿前盡忠節遊浪子書館驚寵遇第九十回接木移花種因孽果劍光血痕禍起蕭牆第九十一回烽火滿城香埋枯井警騎夾道駕幸西安第九十二回植蠶桑農婦辱吏鬧宮苑喇嘛驅魂第九十三回舒鬱憤無聊踏春冰憶舊恨有心擲簪珥第九十四回碧血濺衣寡君自晦青衣入侍稚子蒙恩第九十五回開賄賂奕劻鬻爵興賭博小德擺莊第九十六回恨綿綿瀛台晏駕陰慘慘廣殿停屍第九十七回亂禁闕再建晶園爭封典兩哭寢陵第九十八回保家聲醇王忍小節斮國脈宣統讓大位第九十九回喪心病狂大辮兒復辟衣香鬢影小皇帝完婚第一百回封閉清宮溥儀走天津暢談風月全書結總目
