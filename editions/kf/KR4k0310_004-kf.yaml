body:
  text: 第四回燈前偷眼識英傑林下逐鹿遇美人話說百里福晉雖是做新娘娘但她是十分關心國家大事的她站在屏門後面聽貝勒和衆人商量築城的事體她便一掀門簾娉娉婷婷走了出來大家見她脂光粉氣儀態萬分不由得心中十分敬愛一字兒站了起來向她請安貝勒也站起來讓她並肩坐下福晉便開言道貝勒不是要找一個山水險要的所在築我們的城池嗎俺自幼兒便聽得俺父親常說離此地西面三裏路穿過俄漠惠的大樹林子原有一座鄂爾多裏城這座城池原是俺祖宗造著的只因俺祖宗自吃明太祖打出關來以後便退守著這座鄂爾多裏城後來又吃蒙古人打進城來殺的殺燒的燒可憐一座好好錦繡城池到如今弄得敗井頹垣那時候俺們元朝的子孫東流西散後來蒙古人去了才慢慢地又回到舊時地方來成了這十四座村落如今貝勒不做大事則罷倘要建功立業依俺的愚見不如把俺全村的人搬到鄂爾多裏城去那地方三面靠山一面臨水地勢十分險要原有舊時建築的城牆如今我們修理起來比重新建築一座城池總要省事得多福晉說到這裏貝勒十分高興便接著說百聞莫如一見福晉既然這樣說俺們何妨親自去察看一遭大家聽了都說不錯立刻走出屋子個個跳上馬背三四十匹馬著地卷起一縷塵土穿過樹林越過俄漠惠平原眼前便露出一帶城垣來那牆根高高低低依著山腳繞一個大圈子貝勒定睛看時不覺微微一笑過去在福晉耳朵邊低低地說了幾句福晉聽了不覺臉上起了一朵紅雲原來這地方便是前日他兩人並肩兒坐在石上接吻的地方前日他們坐的一方大石便是鄂爾多裏城腳這也是他夫妻二人合該重興滿族所以在這三生石上結下良緣當時他夫妻兩人騎在馬上四面一望只見一帶山岡從東北角上直走下來三面環繞著好似一把交椅一般把鄂爾多裏城緊緊抱在懷裏一股牡丹江水勢如騰馬從西北流來原是一個進可以戰退可以守的所在貝勒看了不覺大喜一面出榜召集人工一面和管事人天天在貝勒府裏籌劃遷居的事體好個貝勒真是公而忘私國而忘家他整整地忙了三年工夫居然把這座舊時的鄂爾多裏城重新建造起來望去蜿蜒曲折好一座雄壯的城池城裏街道房屋也粗粗齊備十四座村坊的百姓一齊搬了進去頓時人馬喧騰雞鳴犬呔成了一座熱鬧市場城中央造一座貝勒府貝勒夫妻兩人住在裏面到了第二年上福晉居然生了一個兒子這時福晉已是六十四歲了生下來的男孩卻是聰明結實合城的人誰不歡喜頓時家家供神替他祝福這時貝勒天天帶了兵馬出城四處征伐那時忽刺溫野人沿著黑龍江岸向西南面下來十分兇惡見人便殺見牲口便搶連明朝的奴兒幹政廳也被他燒毀了海西一帶的居民逃得十室九空看忽刺溫野人直殺到長白山腳下布庫裏雍順貝勒聽了不覺大怒便親自帶了兵隊埋伏在長白山腳下見野人來了便迎頭痛擊打得他們棄甲抛盔不敢正眼看鄂爾多裏城從此鄂爾多裏的名氣一天大似一天四處來投降的部落一天多似一天貝勒便一一收撫他們教導他們如何練兵如何守地這裏十多年工夫吃得一口安樂茶飯百裏福晉直到八十八歲死了鄂爾多裏地方死了這個老美人不但全城的人痛哭流涕便是那雍順貝勒也朝思暮想神思昏昏想一回哭一回好似小孩子離了媽媽一般弄得他茶飯無心啼笑無常慢慢地成了一個病症跟著他千恩萬愛的妻子死去了這裏合城的管事人公舉他兒子做了鄂爾多裏貝勒這鄂爾多裏貝勒倒也勤儉愛民太平過去這樣子又傳孫孫又傳子那國事興旺一天勝似一天歷代的貝勒都遵著雍順貝勒的遺訓教練著許多勇猛強悍的兵士貝勒帶著到處攻城掠地看看那鄰近的城池都被他收服下來了東北一帶地方本是海西女真忽刺溫野人的地界講到忽刺溫野人尤其兇悍他們自從在雍順貝勒手裏吃了一個敗仗以後雖不敢再來侵犯鄂爾多裏城但鄂爾多裏人也不敢來侵犯他鄂爾多裏西南面有一座古埒城又有一座圖倫城這兩座城池地方又肥美天氣也溫暖鄂爾多裏人早已看得眼熱時刻想去併吞他後來到了春天的時候馬肥草長鄂爾多裏貝勒帶了大隊兵士到古埒城去威逼他投降這時古埒城外滿望都是營帳刀戟如林兵士如蟻古埒一個小小的城池平日全靠明朝保護如今突然被鄂爾多裏兵圍住了便是要喚救兵也是來不及他西面的圖倫城緊接遼西遼西城裏有一個明朝的總兵鎮守著圖倫城主看看事機危急便悄悄地派人到遼西去告急遼西總兵立刻派了大隊人馬前去救應只差得一步那古埒城早已被鄂爾多裏人收服去了那總兵官十分生氣派了差官去見鄂爾多裏貝勒埋怨他不該併吞天朝的屬地鄂爾多裏貝勒見明朝的總兵出來說話十分害怕他只推說是手下的遊牧百姓不好誤入古埒城如今既蒙天朝責問情願自己也做明朝的屬國年年進貢歲歲來朝那遼西總兵聽了他一派花言巧語當既轉奏朝廷鄂爾多裏貝勒便派了十二個管事人帶著許多野鳥異獸人參貂皮跟著到北京城去進貢明朝皇帝見鄂爾多裏人來進貢便用十分好意看待他傳旨在西偏殿賜宴管事人出京的時候又賞他許多金銀綢緞鄂爾多裏貝勒得了明朝的賞賜覺得萬分榮耀拿著賞賜的物件四處去誇耀著這時海西人和忽刺溫野人見鄂爾多裏如此榮耀心中便萬分嫉妒兩個貝勒商量著也派人到明朝進貢去進貢的是馬貂鼠皮舍利孫皮青海兔鶻黃鷹阿膠海牙等許多東西這個風聲傳到鄂爾多裏貝勒耳朵裏怕海西人和忽刺溫得了好處便又派人到中國去第二回進貢明朝皇帝看了這情形知道這三處地方人各存嫉妒之念便來一個給平交易把鄂爾多裏改稱建州衛忽刺溫改稱女真衛海西改稱海西衛貝勒都加封做指揮使鄂爾多裏貝勒從此改稱建州衛指揮使那建州衛自從有了指揮使以後越發兵強馬壯到處擄掠他又怒恨明朝是他第一個進貢不應和女真衛海西衛一樣看待他第三回派人到明朝去進貢要求皇帝加封這時宣德皇帝看看建州衛人一天強似一天便想了一個以毒攻毒的計策要借建州兵力去壓服海西女真人便又加封他做建州衛的都督給他一印一信叫他世世代代守著另外又賞彩緞四表裏折紗絹兩匹封管事人做都指揮賞他彩緞二表裏絹四匹折紗絹一匹做都督滿了三年的又賞他大帽金帶從此以後建州衛都督目中無人他在鄂爾多裏城裏便大興土木仿北京的樣子造了許多宮殿又從百姓家裏挑選十多個美貌女孩兒送進宮去做他的妃子都督天天摟著妃子吃酒夜夜抱著妃子睡覺兵也不練事也不管派了都指揮到四處百姓家裏搜刮銀錢供他一人使用弄得天怨人怒民窮財盡再加田地連年荒旱即歷任的都督只知道享福行樂百姓天天在野地裏凍死餓死他也毫不過問這時女真衛指揮使見建州衛都督官級在他之上心中很不甘服趁他都督在昏迷的時候便悄悄地派了兵隊到建州衛城外四處村落地方強搶土地姦淫婦女那都指揮官趕到都督府裏去告急可笑那都督左手抱著美人右手擎著酒杯聽了都指揮的話迷迷糊糊地說道我們尋快活要緊百姓的事由他們去那都指揮官求發兵去保護百姓都督笑笑說道明天我要帶兵士們出城打獵去誰有空工夫去保護百姓呢那都指揮聽都督說得不像話便氣憤憤地走出府來這時府外面聚集了許多百姓打聽府裏的消息都指揮一長二短地對大衆說了氣得人人咬牙切齒只聽得轟天雷似地發一聲喊說道我們去殺了這昏都督再說話一窩蜂似地擁進府去這時府裏的衛兵要攔也攔不住外面人越來越多擠七八百人在刀架上奪了刀槍打進後院都督正抱著兩個妃子在那裏說笑才一回頭頭便落地可憐一班脂粉嬌娃都被他們一個個拖出院來奸死的奸死殺死的殺死剝得赤條條的七橫八豎抛在院子裏都督的母親妻子也被亂民殺死最可憐的一個十六歲的女孩兒被許多人綁在柱子上拿火燒死這一陣亂從午牌時分亂起直亂到申牌時分都督府裏殺得屍積如山血流成河真是殺得半個不留事過以後查點人數獨獨少了都督的兒子范察這範察是都督最小的兒子年紀才得十二歲這一天正跟著一班兵士們在城外打獵一頭兔子從他馬前走過他便把馬肚子一拍獨自一人向山坳裏追去看著越追越遠那頭兔子也便去得影迹無蹤範察無精打彩放寬了繮繩慢慢地踱著回來才走出山坳忽聽得一株大樹背後有人唧唧噥噥說話的聲音範察雖說年小卻是機警過人當時他便停了馬蹄側耳靜聽只聽得一個人說道如今我們把都督一家人殺得乾乾淨淨只溜了這小賊範察從來說的斬草除根如今新都督派我來把範察哄進城去那時連你也有重賞範察聽到這裏也不候他說完撥轉馬頭便跑後面兵士見走了範察便也拍馬趕來二三十匹快馬一陣風似地向前趕去范察一人一馬在前面捨命奔逃看看被追上他急扯住轡頭向樹林裏一繞繞到岔道上去范察心生一計看看天色漸晚樹林中白蕩蕩一片暮色他便跳下馬來把馬趕到小道兒上去自己忙脫下衣服來罩住馬臉又折一支樹枝來頂在自己頭上下身埋在長草堆裏直挺挺地站著動也不敢動這時夕照銜山鴉鵲噪樹說也奇怪便有一群鵲兒從遠處飛來聚集在範察頭上的樹枝上咶噪著那一隊追兵一陣風似地在他面前跑過嚇得范察連氣也不敢喘一喘直到那追兵去遠了才低低地說了一聲慚愧正要丟下樹枝走時誰知那追兵又回來了到樹林外面一齊跳下馬到林子裏面來找尋這時直把個範察急得魂靈兒出了泥丸宮癡癡呆呆的半晌清醒過來一看林子裏早已靜悄悄的不知什麽時候那追兵已經去了範察急急丟下樹枝向長草堆裏奔去一會兒眼前已是漆黑伸手不見五指他在黑漫漫的荒地裏跑著正是慌不擇路不分東西南北地亂跑了一陣眼前忽然露出微微的燈光來他便努力向燈光跑去跑到一個所在一帶矮牆裏面紙窗射出燈光來範察忙上去打門裏面走出一個老頭兒來問什麽地方的小孩兒深夜裏打人門戶範察上去只說得一句俺爸爸媽媽便嚎啕大哭起來原來這時范察想起他父母被殺死不由得痛入心肝回心一想我如今逃難出來不能讓人知道我的真實情形忙打著謊話對老頭兒說道俺跟著父母出來打獵走到淺山裏遇到狼群父母雙雙都被狼子拖了去所有行李馬匹都丟得乾乾淨淨只逃出一個光身人兒可憐我人生路不熟在山裏轉了一天一夜才轉到這地方求你老人家搭救我吧老頭兒見他面貌清秀說話可憐便收留了他拉他走進屋裏去只見炕上一個老婆婆和一個姑娘盤腿兒坐著湊著燈光在那裏做活計那個姑娘和范察年紀不相上下她一邊聽他父親說話一邊溜過眼來看著範察從頭到腳打量著臉上露出微微的笑容來原來這人家姓孟格老頭兒名圖洛是世代務農傳到圖洛手裏老夫妻一對膝下只有一個女兒他們正盼望來一個男孩兒也可以幫著照看田裏的事體如今果然來了一個男孩兒相貌又十分清秀他兩老如何不樂當時便把範察留了每天叫他幫著看牛看羊范察是一個富貴嬌兒如何懂得這些營生虧得圖洛的女兒蕎芳和他說得上在一旁細細地教導他光陰如箭一轉眼又是六年功夫範察十八歲了他和養芳姑娘情投意合你憐我惜從早到晚真是寸步不離圖洛夫妻倆也看出他們的心事來了便揀個好日子給他兩人交拜了天地成了夫婦範察到這時才把自己的真實情形說了出來蕎芳姑娘聽說他丈夫是都督的兒子不禁嚇了一跳但是那建州衛這時正在強盛的時候也奈何他不得一轉眼圖洛老夫妻倆一齊死了再過幾年范察夫妻倆也跟著死了這一所田莊傳給范察的兒子兒子又傳給孫子一代一代地傳下去傳到他孫子孟特穆手裏便成了一座大莊院一望八百畝田地都是他家的還有十座山地種著棉花果樹院子裏養著二三百個壯健的大漢空下來的時候也講究些耍刀舞棍練得一身好武藝原來盂特穆也是一位天生的英雄他知道自己是富貴種子不甘心老死在荒山野地裏做一個莊稼人因此他天天教練這班大漢刻刻不忘報他祖宗的仇恨直到孟特穆四十二歲上他報仇的機會到了建州衛都督帶了一班軍士們在蘇克蘭滸河呼蘭哈達山下赫圖阿哈地方打獵那呼蘭哈達山和圍屏一般三面環抱兩峽對峙中間露出一線走路只容一人一騎進出孟特穆打聽到這個消息先帶了三百名壯丁去埋伏在山坳裏這時建州衛都督正在赫圖阿哈平原上往來馳聘忽聽得一陣狼嗥的聲音從山峽裏發出來都督忙一揮手向山峽口跑來後面跑著四十個親兵直跑到山峽裏面四面靜悄悄的只見一片叢莽並沒有狼的影迹都督正懷疑時只聽得一聲呐喊四下裏伏兵齊起齊向都督馬前奔來都督正撥轉馬頭走時那山峽口早被亂石抵住兩面混戰一場這四十名親兵和都督一齊被他們困住孟特穆吩咐一聲殺莊丁們一齊動手和切菜頭似的手起刀落落地滾的都是人頭看看殺了二十多個人那都督嚇得在地上磕頭求饒情願把建州城池和都督印信一齊獻還孟特穆看他說得可憐便點頭答應一面派一百名壯丁押著都督在後面走著自己帶著二百名壯丁先走出峽口去把如何祖宗被害如何今天報仇對兵士們說了那些兵士們見都督被擒大家便爬在地下磕頭願意投降新都督孟特穆便帶了這班兵士耀武揚威地走到建州城裏取了都督的印信一面派人到明朝去請封一面把舊時的仇人一齊捉住揀那有名的殺了其餘的統統趕出城去這時候明朝把孟特穆封做建州衛都督孟特穆爲不忘報仇起見把都城搬到赫圖阿哈住著娶了一房妻子生下兩個兒子來大兒子名叫充善第二個兒子名叫褚宴充善又生了三個兒子大兒子名叫妥羅第二個兒子名叫妥義謨第三個兒子名叫錫寶齊篇古錫寶齊篇古又生了一個兒子名叫福滿福滿卻生了六個兒子第一個德世庫第二個劉闡第三個索長阿第四個覺昌安第五個色郎阿第六個寶實福滿做了都督後又把位置傳給覺昌安又造著五座城池分給兒子們居住德世庫住在覺爾察地方劉闡住在阿哈阿洛地方索長阿住在河洛噶善地方色郎阿住在尼麻喇地方寶實住在章甲地方這五座城池離赫圖阿喇地方近的五裏遠的二十裏統稱甯古塔貝勒這六位貝勒出落得個個英雄威武有力遠近的部落都見了他害怕只有西面碩色納部落生了九個兒子自小歡喜搬弄武器閑著無事四處打家劫舍鄰近部落吃了他的虧也是無可如何東面又有一個加虎部落生了七個兒子也和狼虎一般到處殺人放火有一天碩色納部落九個兒子趕到加虎部落裏去比武兩家說定誰打敗了便投降誰他兩家弟兄從上午直打到下午只得一個平手後來加虎部落裏有一個人能夠連跳過九頭牛身碩色納九個弟兄看了十分佩服兩家便結爲兄弟說定有福同享有禍同當正說話時忽見人堆裏擠出一個少年來生得面如撲粉唇若塗脂他也不招呼人大腳闊步走到那九頭牛身旁兩手攀住牛角使勁一扭那牛啊的一聲叫喊早已扭斷頸子倒在地下死了那第二頭牛第三頭牛如法炮製一霎時那九頭牛都給他結果了性命他一揮手來後面來了二十個大漢一齊動手扛著牛便走這時碩色納部落的人和加虎部落的人再也耐不住了便齊上前去攔住和他講理那少年也不多說話拔出拳頭便打人不知他哪里來的神力凡是近他身的都被他摔出三五丈遠倒在地下爬不起身來這兩個部落的人看了十分惱怒齊聲說道這不是反了麽一聲喊一齊撲上前去把那個少年和二十多個大漢團團圍住圍在核心那少年不慌不忙指揮那二十多個大漢各人背著背四面抵敵著從下午打起直打到黃昏人靜那少年卻不曾傷動一絲一發倒是這兩個部落的人叫他們打倒了許多正不得脫身的時候忽聽得正南角上發一聲喊接著卷起狂風似的來了一隊兵馬這兩部的人看看不是路忙丟下這少年轉身逃去一個前面跑一個後面追看看追到一個大村落裏村落前面攔著一帶木柵這兩部人逃進了村落把柵門緊緊閉住那少年領著這隊人馬在柵前討戰兵士們百般辱駡停了一會柵門開外裏面也出來一隊人馬兩隊人馬接住便在村前大戰起來那少年的兵馬是久經戰陣的也不把這班村人放在眼裏不多時早已和秋風掃落葉似的把村裏的人馬打得落花流水少年一拍馬後面兵士們也跟進去見人便殺見物便擄可憐碩色納部九個弟兄卻死了四個加虎部七個弟兄卻死了三個其餘的一齊捆綁起來押在馬後被這少年帶進城去這少年不是別人正是那福滿的孫子寶實的兒子名叫阿哈那渥濟格他跟著父親住在章甲城裏長得好一副俊秀的面貌又是一副銅筋鐵骨他也聽得人說碩色納和加虎兩個部落的人如何難惹他卻偏要去惹一惹這一天果然大獲全勝回來把擄得的牲口婦女獻與父親寶實不敢自私便去轉獻給都督覺昌安覺昌安一面賞了渥濟格的功一面檢點人馬重復到碩色納加虎兩部落去查看一回把左近二三十個村坊都收服了從此凡五嶺以東蘇克蘭滸河以西二百里地方都歸入建州衛部下這渥濟格建了這次大功以後覺昌安便留他住在自己城裏和他一起同起同坐十分親愛渥濟格面貌又長得可人意兒裏面福晉格格沒有一個不和他好覺昌安的福晉很想給他做一個媒勸渥濟格娶一房妻室渥濟格說倘沒有天下第一等美人我願終身不娶這一天他跟著叔父出東城去打獵那座山離城很遠便帶了篷帳住在山下第二天渥濟格清早起來獨自一人跨著馬向樹林深處跑去見一群花鹿在林子外面跑著他便摸了一摸弓箭一拍馬向前跑去誰知那群花鹿聽得馬蹄聲響早已去得無影無蹤看看對面也有一座林子渥濟格便又趕進林子去睜眼看時卻見一個花枝招展的美人兒低鬟含羞騎在馬上把個目空一切的英雄早看得眼花繚亂口難言魂靈兒飛去半邊天了要知這美人是誰家的女兒且聽下回分解
