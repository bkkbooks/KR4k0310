body:
  text: 第二十二回露姦情太宗暴殂見美色豫王調情卻說太宗皇帝因爲憤恨明朝和議不成也等不得固倫公主出閣便親自帶兵打進關去臨走的時候依舊把朝廷的事體託付了睿親王自己帶著左右兩翼八萬人馬晝夜趕程從界山腳下打破了邊牆進去左翼兵馬從雁門關黃崖口打進去兩支兵馬在薊州地方會齊合在一塊兒直打到兗州地方沿路打破三座府城十八座州城六十七座縣城捉住明朝的魯王便在軍前斬首擄得明朝男女百姓三十六萬人牲口五十五萬頭那先鋒阿巴泰從南路打來大兵駐紮在山東莒州住了一個多月也不曾見一個明朝的兵馬阿巴泰便把沿路擄得的錦繡金銀捆裝在騾車上從天津到涿鹿一帶三十多裏地面車輪接著不斷過蘆溝橋十多天還不曾過完那明朝崇禎皇帝下詔令各省起勤王兵那勤王兵隊到通州地方見清兵強盛大家嚇得躲起來不敢去攔阻他眼看著滿洲兵馬一隊一隊地退出關去太宗皇帝不費一兵一卒的兵力白白得了許多金銀珠寶心下如何不快活便在營裏辦起慶功筵宴來揀定吉日班師誰知這裏太宗正在得意的時候他宮裏卻鬧出極大的風波來太宗皇帝的性命也被斷送這一朝原來此番睿親王多爾袞受了太宗的託付天天住在宮裏和皇后成雙成對毫無顧忌好在宮裏上上下下的人都是多爾袞的心腹誰敢走露消息這其間卻有兩個人恨得咬牙切骨一個是太宗長子豪格一個是多爾袞的妃子小玉兒那豪格雖奉命辦理固倫公主的婚事卻事事不得自由都要聽他叔叔的命令他叔叔多爾袞正和皇后伴得火熱深宮密院便是要找他說一句話也不是容易的事體這時豪格督造駙馬府工程已是完成要找他叔叔商量布置府內的事體便特地跑進宮去求見多爾袞平常總在永福宮西書房裏起坐他便一徑向西書房走去看看書房裏靜悄悄的只有三五個太監守著並沒有多爾袞這個人問時大家都推說不知道豪格急退出宮來折到睿親王府中去一問回答說王爺有四天不曾回府了這時事有湊巧那小玉妃正因多爾袞進宮去一連四天不回府心中醋勁正無處發泄忽聽說豪格到來便傳話出去請郡王進內院去那豪格一見了他嬸母便問叔叔連日不回府來不知到什麽地方去了那小玉妃正悶著一肚子怨氣也不及檢點便冷笑一聲說道你叔叔麽他不住在宮裏還有什麽地方住得他們正樂呢哪里還想到回府啊多爾袞的事豪格早已十分清楚只因沒有機會不好發作出來如今不防他嬸嬸卻直說出來他禁不住臉漲得通紅勉強耐住了性子問道叔叔不回家嬸嬸怎麽不到宮裏找去小玉妃說道我也曾去找宮裏的人得了你叔叔的好處都回說不在我要闖進去卻被宮女們攔住說萬歲留下旨意非奉皇后呼喚不准擅自進宮我這幾天正無處拉把侄兒你既來了須要替我想一個主意也得替你自己想一個主意盡這樣鬧下去我和你兩人的臉面擱到什麽地方去呢一句話說惱了肅郡王當下他把胸脯一拍說道嬸嬸放心此番父皇回來我便把這番情形面奏請父皇下旨禁止叔叔進宮現在嬸嬸卻須耐著性兒千萬不可聲張倘然給叔叔知道嬸嬸和侄兒的性命都是不保說完告辭出來又去料理固倫公主婚事去了看看快到公主下嫁的吉日忽然一對人馬飛也似地跑進宮來說皇帝駕到滿朝文武聽了這個消息忙亂著披挂出城去接駕自然是睿親王多爾袞領班他騎著一頭栗色駿馬走在前頭出城九裏地方遇到太宗大隊人馬文武百官都俯伏在地下口稱萬歲太宗見多爾袞也爬在路旁忙跳下馬來親自扶起兄弟兩人並肩兒騎在馬上走進宮去到崇政殿前下馬皇帝上殿百官依次朝賀皇帝傳旨便在西偏殿賜宴一時傳杯遞盞直吃到日落西山才各個謝宴回家皇帝這一晚暫不回宮在東偏殿裏息宿自有宮娥伺候第二天便是固倫公主下嫁的正日整個盛京城裏車馬擠擁大街小巷塞滿了那看熱鬧的百姓那駙馬弼爾塔噶爾全身披挂進宮去迎親固倫公主拜過太殿辭別父皇母后跟著駙馬出宮下嫁到駙馬府去那班親王郡正貝勒貝子奉國將軍和碩親王福晉格格等一班皇親國戚一隊一隊地進宮去道賀依豪格的意思立刻要把多爾袞的事奏明父皇後來還是他福晉勸住說父皇連日辛苦又接著辦慶功筵宴下嫁喜筵心中十分快樂不如待事過以後慢慢奏明豪格聽了福晉的話暫時忍耐看看喜事一過皇帝便下諭夜間進宮日間又在西偏殿上設慶功筵宴大小臣子個個吃得酒醉飯飽大家站在崇政殿下預備送皇帝進宮誰知直守到天色昏暗還不見有動靜那文武官員個個站得腿酸腰痛散又不敢散問又不敢問正彷徨的時候忽然殿上傳下諭旨來說今夜不進宮了改在明早進宮百官們退出多爾袞領著百官退出朝門來忽見一個太監飛也似地趕上來在多爾袞的耳邊低低地說了幾句話把個睿親王嚇得臉色大變忙吩咐百官各自散去自己跨上馬箭也似地向永福宮跑去直到宮門口下馬走進宮去見了皇后兩人對拉著手兒只是發怔文皇後連連問他什麽事多爾袞喘過一口氣來便說道豪格這個小子已把你我的事奏明皇上如今皇上大怒眼見有大禍到來我們要趕快想一個法子避了這場禍水才是接著他叔嫂兩人唧唧噥噥地說了許多話多爾袞想了一個主意出來叮囑皇后照辦皇后起初還不肯後來想不肯也沒有別的好法子便點頭答應了接著他兩人又說笑了一陣多爾袞退出宮去第二天五更時分大小臣子又齊集在崇政殿伺候皇帝進宮到平明時候皇帝走出殿來看他一臉怒氣嚇得大臣們忙爬下地去磕頭只有肅郡王豪格跟在父皇身後皇帝上了暖轎三十二個人擡著一班親王們在兩旁護擁著到永福宮門口一齊退出大家才走出大清門忽見一個太監搶上前來拉住衆官們的衣袖喘噓噓地說道皇上升天了一句話把百官們嚇怔了呆呆地站著你看著我我看著你也說不出一句話來後來還是睿親王說道站在這裏也不中用俺們還是回到朝房裏候遺旨去說著帶著百官們回到朝房裏來還不曾坐定宮裏傳出皇后懿旨來傳睿親王進宮去商量大事多爾袞聽了忙趕進宮去這時候皇上的屍身安放在永福宮正院裏多爾袞進去行過禮宮女才領著到寢宮裏皇后低垂粉頸坐在床沿上多爾袞上去請了安皇后好似不看見一般那班宮女見了這樣子一齊退出屋子來裏面有一個貼身宮女便站在廊上伺候皇后呼喚她悄悄地在窗眼兒望進去只見睿親王在安樂椅上坐著皇后站起身來慢慢地走上前去拉著多爾袞的手低低地說了許多話那睿親王只是搖著頭那皇后翠眉緊鎖粉臉含愁一隻玉也似的手按在睿親王肩頭連連搖著睿親王的身體睿親王只自搖著頭不說話皇后急了撲地拜倒在地求著睿親王急轉個身子去擡著臉望著別處依舊不說話皇后又湊在他耳邊輕輕地說了許多話睿親王聽了才慢慢地臉上露著笑容連連點著頭站起身來扶皇后坐下自己退出宮去多爾袞回到崇政殿文武官員都圍著問消息多爾袞高聲說道如今皇上賓天皇后痛楚萬分心神昏亂沒有主意特喚小王進宮商議國家大事皇后的懿旨已決定立皇九子福臨爲皇帝諸位大臣可遵旨麽睿親王的話誰敢不依只聽得哄地一聲齊說遵旨多爾袞便帶著百官進宮去哭拜拜過以後把皇帝的屍身搬到崇政殿收殮一面抱著皇子升坐篤恭殿受百官的朝賀那福臨年紀只有六歲一切禮節都聽睿親王指導皇后傳旨出來封多爾袞濟爾哈朗兩人爲輔政王幫著皇帝辦理朝政多爾袞接過懿旨便對大臣們說道我們今天同心共事幼主便當對天立誓永無二心當下衆大臣齊聲答應多爾袞便請大學士範文程當殿寫下誓書當天立下香案親王大臣們拜過了贊禮官捧過誓書來大聲讀道代善濟爾哈朗多爾袞豪格阿濟格多鐸阿達禮阿巴泰羅洛尼堪博洛索托艾度禮滿達海屯濟費揚古博和托屯濟喀和紮等不幸值先帝升遐國不可無主會議奉先帝子纘承大位嗣後有不遵先帝定制弗殫忠誠藐視皇上沖幼明知欺君懷奸之人互徇情面不行舉發及修舊怨傾害無辜兄弟讒構私結黨羽者天地譴之令短折而死福臨即位以後世稱世祖皇帝改年號稱順治元年從此一切朝政大權都落多爾袞一人手中那鄭親王濟爾哈朗也明知道這睿親王不是好纏的便也樂得做個人情諸事不管一任聽多爾袞在宮時獨斷獨行這時文皇后升做皇太后正在盛年如何守得空房虧得睿親王知趣早晚陪伴著說笑解悶皇太后又怕別人說閒話便封睿親王做攝政王朝廷大事由攝政王一人管理從此攝政王便住在宮裏借著辦理朝政的名義時時和皇太后見而越發把家裏的小玉妃丟在腦後了獨有肅郡王豪格心中十分難受他便與豫王多鐸商量借著訪問朝政爲名進宮去見攝政王這時多爾袞正和皇太后說得情濃聽說豪格求見心中老大一個不樂意便在上書房傳見豪格見了多爾袞臉上止不住露出怒容來多爾袞問他什麽事豪格說道如今皇上年幼朝廷事又繁攝政王一人怕有精神不濟的地方小王和豫王意思要每天進宮來幫著攝政王辦事一句話不曾說完多爾袞早明白了他們的來意便冷笑一聲說道多謝兩位王爺的好意如今俺既當了這個職分萬事都由俺擔當辦得好是俺的功辦得不好是俺的罪不用兩位王爺費心人多主意雜反會把國家的大事耽誤了一頓話說得他們兩人啞口無言只得諾諾連聲討了沒趣退了出來從此攝政王和豫王肅王的仇恨愈深派人四下裏偵探他們的動靜大學士範文程是多爾袞的心腹他又是歸在豫王部下的多爾袞便把範文程傳進宮來悄悄地囑咐他留心豫王的動靜知道範文程正斷了弦便把一個鶯姑娘賞給他繼配說起這位鶯姑娘原是明朝顔參將的女兒那時多爾袞在松山打杖把她擄來養在自己府裏這時鶯姑娘年紀還小已出落得皓齒明眸輕盈嬌小多爾滾原打算待她長大起來自己受用的如今爲籠絡人心起見便把她賞給了範文程范學士見了這樣一個絕色美人早把個攝政王感激得深入肺腑他天天伴著這鶯姑娘在房裏親熱調笑說起偵探豫王的事體鶯姑娘便替他想法子備下上好的酒萊請豫王到家裏來吃酒說笑又打扮四個齊整丫頭輪流在豫王身旁侍奉有時也把豪格請來他兩人背地裏說許多怨恨多爾袞的話豫王覺得範文程家裏有趣便也常常來走動說起酒萊滋味很美豫王問是誰做這酒萊範文程便老實說是內人料理的豫王久聽得範文程的繼配是一位美人兒苦於沒有機會如今聽得範文程說起便介面說道既勞動了夫人便請出來待小王當面謝過範文程不敢違拗便吩咐丫頭到內院去請夫人他夫人顔氏聽說豫王請見忙梳妝了一會四個丫頭圍隨著走出客廳來多鐸見了不覺眼前一亮看那顔氏打扮得好似一枝花朵兒那一陣陣脂粉香味送進鼻管來豫王原是一個好色之徒當時引得他目瞪口呆的做出許多醜相來顔氏遠遠地站著行個禮一轉身進去了隔了許多時候豫王才回過氣來對範文程冷笑一聲說道范老先生你年紀已經六十歲鬢髮都全白了家裏藏著這位嬌滴滴的夫人不怕說閒話麽如今限你一夜快快和那美人兒商量去明天到府中來回話豫王說完了話一甩袖子大腳步踱出去了豫王去了多時範文程才領會他的意思來知道他不懷好意忙到內院去和顔氏商量顔氏說道這事只有睿王爺救得俺夫妻的性命你快求睿親王去這日天色已晚到了第二天一清早範文程穿戴起來趕進宮去誰知學士府中範文程一轉背便有豫王府的一隊親兵到來不問情由擁進內院搶著顔氏便走把顔氏推進暖車簇擁著進了豫王府多鐸正在府中盼望見顔氏到來把他喜得心花怒放忙上前去拉著顔氏的手勸她莫要驚慌他說只因俺福晉知道夫人又聰明又美貌特把你接進府來做一個伴兒顔氏原是一個貞節的婦人聽了豫王的話便亂嚷亂哭又指著豫王大罵豫王被罵得惱羞成怒便喝令侍女拉下這賤人的小衣來原來豫王生成有一個下流脾氣他專喜歡看女人的身體兩旁的丫頭便一齊動手把顔氏按在榻上先把羅裙拉下只見顔氏兩隻小腳兒亂登又上來兩個丫頭把小腳捏住正待要動手忽見兩個內監慌慌張張地跑進來說道王王王爺不不不好了宮裏來了三百禦林軍把府門前後看住他一句話不曾說完只見一個太監帶著十多名兵士踱進屋子來口稱皇太后有旨豫王到了這時候也頓時矮了半截忙撲地跪倒在地接旨太監讀過了懿旨便吩咐把王爺押進宮去待豫王到得宮裏那肅郡王豪格也被禦林軍押進宮來多爾袞坐在上面審明豫王強搶命婦圖奸未成的罪名罰金一千兩奪去十五牛錄肅親王豪格知情不發的罪罰銀三百兩那豫王受了罰出宮來滿肚子怨恨便索性放肆天天帶著府中的兵丁到百姓人家去見有年輕的女人便拉來看她嚇得八旗的女人個個躲在屋裏不敢到外面來探頭後來給都察院承政公滿達海知道了上了一本攝政王大怒又把豫王拉進宮去罰了許多銀子因此豫王把多爾袞越發恨入骨髓去並和豪格商量豪格平空裏罰去銀子心中原也十分怨恨他便悄悄地拉了固山額真阿洛會議政大臣揚善甲喇章京伊成格羅碩和他一班私黨在府中商量行刺多爾袞的事體豫王說道多爾袞死後小王便做攝政王到那時諸位還怕不富貴嗎誰知說話的時候那阿洛會早已一溜煙逃出府去他原是攝政王的心腹當時便趕進宮去請見這時多爾袞正在內宮看皇太后梳頭豪格的福晉這時恰巧也進宮來請太后的安見她婆婆正梳頭這位福晉原梳得一手玲瓏的髻兒當時皇太后見了便喚她幫著梳頭肅王福晉不敢違命便把袍袖高高卷起露出雪也似的臂兒來多爾袞在一旁看了這樣潔白的皮膚早已看出了神再看這福晉的臉時正是一副宜喜宜嗔的春風面多爾袞心想豪格這小子倒有這樣的豔福幾時俺報了仇把這美人兒留在府裏自己享用要知這位福晉如何結局且看下回分解
