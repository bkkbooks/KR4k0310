body:
  text: 第七十五回除異己慈禧有急智燭奸謀安後運獨斷卻說肅順原打算先奉梓宮進京向恭王要了國璽立怡親王載垣做皇帝誰知孝貞皇后看出了肅順的計策便不許他先進京去又說要和懿貴妃一塊兒奉梓宮進京肅順無可奈何只得遵了孝貞後懿旨一同進京他和端華在暗地派了怡親王的侍衛兵名說是保護後妃兩宮的實在是打算在半路動起手來把懿貴妃母子兩人殺死只奉孝貞後進京去誰知懿貴妃也早早料到有這一著那喜劉送詔書進京的時候便又諭令榮祿帶了四千禁兵到熱河來保護幼帝這裏梓宮正出得城那面榮祿的人馬也動了兩面碰個正著肅順見有一支禁兵保護著懿貴妃母子二人榮祿跟隨著懿貴妃又是寸步不離一路上行來苦沒有下手的機會把個肅順急得只是在馬上歎氣但是還想著自己帶領侍衛兵先一日進京還可以假託先帝的遺詔把懿貴妃廢了名號又把幼帝載淳拒絕在城外自己在城裏奉載垣做皇帝那時生米煮成熟飯也不怕懿貴妃不奉詔只因此時行宮裏出來一行人馬是在梓宮前面肅順帶領侍衛兵馬算是保護梓宮緊跟在後面孝貞後和懿貴妃的車仗又在肅順一班人後面榮祿帶領禁軍保護兩宮又在後面大隊人馬在路上走得很慢走了許多日子看看快到京城了懿貴妃也料定肅順有這麽一著便趁打尖的時候在行宮裏和孝貞後商量停妥卻叫兩個宮女假扮著後妃兩人坐在後妃的車子裏自己卻雇了幾輛輕快的車子坐著叫榮祿撥一小支人馬暗暗地保護著從小路抄在梓宮前面飛也似地趕進宮去孝貞後和懿貴妃到得京裏肅順等還在路上懿貴妃便把恭王醇王大學士周祖培桂良戶部尚書沈兆麟戶部左侍郎文祥右侍郎寶鴻臚寺少卿曹毓英等一班心腹大臣召進宮去連夜密議又把傳國璽給大臣們看過議定奉幼主載淳爲皇帝改年號稱同治元年諸事停妥第二天恭親王派大隊人馬去駐紮在大清門一帶以備迎接梓宮一面又在太和殿上預備彩燈作爲奉安梓宮百官行禮的地方直到第三天上那怡親王載垣和端華先進城來孝貞後便吩咐把詔書向兩人宣讀端華大聲說道我輩未曾入城詔書從何而來恭王說現在傳國玉璽在此怡親王也說道小王承先帝遺旨監國攝政如今皇子年幼非我允許無論太后貴妃都無權召見臣王正說著榮祿從裏面出來說太后懿旨將兩人拿下便有兵士上前來擒住又有侍衛上前來脫去兩人的衣帽擁用隆宗門打人宗人府監禁起來這時肅順正護送梓走到密雲地方打尖醇王便秘密宜詔神機營大祥子大文子星夜趕到密雲去捉拿這時肅順正在臥室裏擁抱著兩位如夫人睡在床上聽說醇王派人來捉拿他他便咆哮如雷在臥室中大罵兵士打破房門一擁上去把肅順捉住帶上腳鐐手銬暫送宗人府去監禁這裏兩宮皇太后和同治皇帝都是全身孝服素車白馬出皇城大門把梓宮迎接進城奉安在太和殿上都行過禮然後同治帝升殿受百官朝賀畢便下諭旨定肅順端華載坦一班人的罪諭旨上說道載垣端華肅順朋比爲奸專權跋扈種種情形均經明降諭旨宣示中外至載垣端華肅順於七月十七日皇考升遐即以贊襄王大臣自居實則我皇考彌留之際但面諭載垣等立朕爲皇太子並無令其贊襄政事之諭載垣乃造作贊襄名目諸事並不請旨擅自主持兩宮皇太后面諭之事亦敢違阻不行禦史董元醇條奏皇太后垂簾事宜載垣等非獨擅改諭旨並于召對時有伊等系襄贊朕躬不能聽命於皇太後伊等請皇太后看折亦屬多餘之語當面咆哮目無君上情形不一而足且屢言親王等不可召見意在離間此載垣肅順端華之罪狀也肅順擅坐禦位子進內廷當差時出入自由目無法紀擅用行宮內禦用器物于傳取應用物件抗違不遵旨並自請分見兩宮皇太后于召對時辭氣之間互相抑揚意在構釁此又肅順之罪狀也一切罪狀均經母后皇太后聖母皇太后面諭議政王軍機大臣逐條開列傳知會議王大臣等知悉茲據該王大臣等按律擬罪將載垣等淩遲處死當即召見議政王奕訢軍機大臣戶部左侍郎文祥右侍郎寶鋆鴻臚寺少卿曹毓英惠親王綿愉惇親王奕誴醇郡王奕譞鍾郡王奕詥孚郡王奕譓睿親王仁壽大學士賈楨周祖培刑部尚書綿森面諭以載垣等罪不無有一線可原茲據該大臣等僉稱載垣端華肅順跋扈不臣均屬罪大惡極國法無可寬宥並無異辭朕念載垣等均屬宗支以身罹重罪應悉棄市能無淚下惟載垣等前後一切專權跋扈情形謀危社稷是皆列祖列宗之罪人非獨欺淩朕躬爲有罪也在載垣未嘗不自恃爲顧命大臣縱使作惡多端定邀寬典豈知襄贊政務皇考實無此諭若不重治其罪何以仰副皇考付託之重亦何以飭法紀而示萬世即照該王大臣等所擬均即淩遲處死實屬怙罪相當惟國家本有議親議貴之條尚可量從未減姑于萬無可寬貸之中免其肆市載垣端華均著加恩賜令自盡即派肅親王華封刑部尚書綿森迅即前往宗人府空室傳旨令其自盡此爲國體起見並非朕之私於載垣端華也至肅順之悖逆狂謬較載垣等尤甚亟應淩遲處死以伸國法而快人心惟朕心究有所不忍著加恩改爲斬立決即派睿親王仁壽刑部右侍郎載齡前往監視行刑以爲大逆不道者戒至景壽身爲國戚緘默不言穆蔭匡源杜翰焦佑瀛於載垣等竊奪政柄不能力爭均屬事恩溺職穆蔭在軍機大臣上行走已久班次在前情節尤重該王大臣等擬請將景壽穆蔭匡源杜翰焦佑瀛革職發往新疆效力均屬罪有應得惟以載垣等兇焰囂張受彼箝制實有難與爭衡之勢其不能振作尚有可原禦前大臣景壽著即革職仍留公爵並額駙品級免其嚴遣兵部尚書穆蔭即革職改爲發往軍台效力贖罪吏部左侍郎匡源署禮部右侍郎杜翰太仆寺少卿焦佑瀛均著即行革職加恩免其發遣欽此煌煌一篇上諭全是懿貴妃的主意這時載淳做了皇帝懿貴妃也升做了太后孝貞後住東面宮裏人稱爲東太后懿貴妃住在西面宮裏人稱爲西太后當時肅順在宗人府裏接了聖旨便十分憤怒大聲對載垣端華兩人說道你們當初不聽我的話把事體弄糟到這個樣子原來咸豐帝臨危的時候肅順便勸怡親王先把國璽偷了出來再行調動兵隊看住兩位太后和幼主不放他們進京去一面下諭革去恭王榮祿一班人的職奪去他們的兵權然後回京行事那時怡親王膽小不敢下手那傳國玉璽又落在西太後手裏大勢已經去了又放兩宮先回京去和恭王榮祿從容部署自己又守著笨重的梓宮直比太后遲三日才到密雲坐失絕好機會生生地敗在怡親王一人手上當時肅順口口聲聲怨恨怡親王怡親王也無話可說只得聽憑華封綿森兩人把他押到宗人府空屋子裏去自盡且說肅順由睿親王仁壽刑部右侍郎載齡押著出宗人府來直押到西市去行刑那沿路看熱鬧的人人山人海見肅順身肥面白因在國喪期內穿著白袍布靴反綁著坐在牛車上那犯人過騾馬市大街的時候道旁的小孩都歡呼著道肅順這奸賊你倒也有今天這一日嗎還有許多讀書人聽說肅順殺頭了便大家呼朋引類地坐著車子帶著酒菜到西市去看熱鬧一面歡呼暢飲一面抓些泥土向肅順臉上擲去一霎時肅順一張白白胖胖的臉堆滿了泥土劊子手舉刀吃嚓一聲把肅順的腦袋砍下來便見人叢裏走出一個少年來撲地在睿親王馬前跪倒滿臉淌著眼淚睿親王問是什麽人那少年自認說是已故大學士柏葰的兒子他願出一千兩銀子把肅順的頭買去祭他冤屈死的父親睿親王也知道柏葰死得冤枉又看那少年哭得厲害便答應了他少年便拿出一千兩銀子來賞了劊子手捧著肅順的頭回家去請了許多親友看他祭人頭說起那柏葰在咸豐八年的時候做大學士他雖是滿人卻也常常放出去做主考這一年恰恰點柏葰做了北闈的主考便有人告發說他勾通關節將一個戲子名平齡的取中了他們旗下的公子哥兒原愛唱戲高興的時候串著班兒算不得一回事體況且捐了監生進考場原講不得出身只看文章便了無奈那肅順正在專權的時候他有意要興大獄在文宗跟前說了把那時北闈的同考官一網打盡從同考官起直到舉人殺頭的有五六十人只有那時一個副考官名朱鳳標的因害眼病請假不曾入場只革了職逃了性命刑部會審下來把柏葰的罪定了斬立決那班滿大臣都替他在文宗跟前跪求無奈文宗聽信了肅順的話再也挽不回來當時對大臣們說道朕不是殺宰相朕是殺考官到行刑的這一天柏葰照規矩戴著沒有纓子的帽子穿玄色外套步行到菜市口去謝恩以後靜候聖旨又叮囑了兒子在夕照寺守候他兒子正要走時忽見刑部尚書趙光嚎啕大哭著跑來這時時辰已到劊子手不容他說話便跪請柏大人升天柏葰臨死的時候便囑咐他兒子不要忘了殺父之仇只聽得吃嚓一刀人頭落地當時有人挽柏葰道其生也榮其死也哀雨露雷霆皆聖德臣門如市臣心如水皇天後土鑒孤忠如今柏葰的兒子居然也守到肅順殺頭的這一天不但是柏葰的兒子快活便是全個京城裏的讀書人都人人快活肅順等人的如意算盤被粉碎了天大一件事體全仗西太后一人的智謀把同治皇帝的天下打了下來同治皇帝便上母后皇太后尊號稱爲慈安皇太后上聖母皇太后稱號稱爲慈禧皇太后由恭王領銜奏請兩宮垂簾聽政殿上挂著簾子慈安太後坐在東面慈禧太後坐在西面同受百官朝拜同理朝政慈安太后原是一個忠厚人又是不善於辭令的凡有王公大臣奏對事項總由慈禧太后問話慈禧太后的說話有魄力又有殺氣大臣們聽了個個害怕但是每到了緊要關頭慈禧太後卻不要自己做主總要和慈安太后商量了才肯傳諭這慈安太后見慈禧的才具聰明都高出自己以上便凡事盡讓她些但是每遇慈禧說話有錯的地方慈安卻正顔厲色地規勸她從不肯附和的在慈禧的意思早想把這聽政的大權攬在自己掌握中了只怕因爲慈安辦事嚴正沒有機會可以下得手但她在暗地裏外面聯絡著侄兒榮祿內裏買服了安崔兩總管和李蓮英叫他們隨時偵探東太后的舉動預備抵制的手段慈安太后辦理朝政一秉至公她凡事托恭親王做主說俺們娘兒原不懂什麽事體只請六爺忠心爲國替皇上辦事不錯遇事奏明一聲便了恭親王領了慈安太后的諭旨便常常進宮奏事商議朝政慈安太后知道曾國藩是一個好官便把他從兩江總督升做大學士後來何桂清失陷了城池刑部議定斬罪何桂清卻暗暗地托同鄉同年同官在京城裏的十七人上奏摺替他求情又拿了整萬的銀子去買通榮祿求他在慈禧太后跟前說好話他們認定慈安太后是不管事的便不把慈安擱在心上誰知這一回慈安太后獨依了太常寺卿李棠階的奏本下諭斬了何桂清諭旨上說何桂清臨陣脫逃罪無可貸這樣辦了一辦把全國的將士嚇得人人膽寒慈安太后又把李棠階調入軍機一年之中官升尚書將軍勝保打了幾次勝仗便十分驕傲橫暴又十分貪淫李棠階知道了痛痛地參了他一本慈安太后赫然震怒下諭把勝保捉來關在刑部大牢裏審問明白了又下諭賜死這時曾國藩李鴻章左宗棠一班漢大臣屢立戰功慈安的主意便下旨封他們侯爵伯爵慈禧太后一向認爲慈安太后是懦弱的如今見她殺殺辣辣地辦了幾樁事不覺有些膽寒起來她回宮的時候便召安得海來和他商量那安得海是慈禧太后寵用的人莫說是宮裏便是滿朝中他的權柄最大常常仗著西太后的勢力壓迫一班王公大臣這時恭親王的權柄也不小那恭親王又是慈安太后親信的大臣他見安得海如此跋扈早在心中懷著憤怒遇到慈安召見的時候便奏稱安得海如何貪贓枉法越分專權那安得海卻睡在鼓裏依舊是橫行不法他在外面便處處替慈禧太后拉攏有許多大臣都入了慈禧的黨慈禧的同黨一天多一天那安得海的權柄也一天大一天風向不對慈禧太后便把安得海傳進宮裏告訴他說如今慈安太后漸漸地擅權了動不動殺大臣辦將軍你須小心些在外面不要招搖得太厲害當心犯在東太後手裏不是玩的誰知那安得海聽了非但不害怕還氣憤憤地說道害怕她怎的皇上是俺們太后的皇上東太后的權威無論怎的大總蓋不住俺們太后的上面去皇太后原是和東太后客氣凡事盡讓她些奴才看來如今皇太后再不能講客氣了俺太後讓一步東太后便進一步照著這樣下去莫說俺們做奴才的將來沒有飯吃便是俺太后將來也沒有立足的地方了這幾句話正說在慈禧太后的心眼兒上便點點頭說不錯從此以後安得海便常常在慈禧太后跟前獻計如何專權如何結黨又常常出宮到榮祿家裏去商量事體那恭親王也在背地裏隨處偵探安總管的行爲他們的事體恭親王統統知道常常去奏明慈安太后要下安得海的手那慈安太后總礙著慈禧太后的臉面不好意思動手有一天恭親王爲江南的軍務進宮去見慈安太后慈安太后叫他去請慈禧的旨意那恭親王走到西宮門口只見安得海在前面走著也走進西宮去安得海明明瞧見恭親王的他也不上前去招呼竟大模大樣地走進宮去恭親王心中不覺大怒但他在宮門外卻被太監們擋住了說太后有事恭親王沒奈何只得忍著氣在宮門外候著誰知直候到天色快晚還不見傳見把個恭親王氣得不住地頓足氣憤憤地走出宮去見了醇親王便說道安得海這奴才如此無禮俺非殺他不可原來這一天慈禧太后在宮中盡和安得海商量到山東去采辦龍衣的事體卻不曾知道恭親王在宮門外請見那安得海原是看見恭親王進宮來的卻故意不叫太監們通報有意捉弄恭親王的安得海得了慈禧太后的密旨便悄悄地出京動身到山東預備下江南替慈禧太后置辦龍衣錦緞去照清官的祖宗成法做太監的不許出京城一步如查得有太監出京的便立刻就地正法如今這安得海出得京來非但不知道隱瞞反沿途招搖借著慈禧太后的威勢自稱欽差大臣一路上騷擾地方逼勒官府那山東地方官被他敲詐得叫苦連天他坐著大號太平船兩隻船上插著日形三足鳥旗一面船旁又插了許多龍鳳旗幟帶著許多美貌的童男童女又沿途傳喚官妓到船上供差品竹調絲船在水中央走著兩岸閑著的人站得密密層層好似打著兩重城牆船過德州正是七月二十一日是安太監的生日安得海便在船中大做起生日在中艙裏陳放著龍衣有許多男女上船去對他拜著這消息傳到德州知州趙新耳朵裏知道太監私自出京是犯法的事體便親自帶了衙役趕上去查拿那安太監的船已去遠了趙知州不敢怠慢便親自進省去稟報山東巡撫丁寶禎知道接著又有各府縣的文書寄到衆口一詞說安太監如何騷擾地方逼勒官府那丁寶禎聽了大怒一面動公文給東昌濟寧各府縣跟蹤追拿一面寫了一本密奏八百里文書送進京去專奏與慈安太后知道那天恭親王正在軍機處接到了這一本奏章一看也不覺大怒便袖著這本奏章匆匆趕進宮去請見慈安太后要知後事如何且聽下回分解
