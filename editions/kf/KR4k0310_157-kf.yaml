body:
  text: 第一百十七回出虎穴雌威能解厄奪美人壯士起爭端話說劉備聽得趙雲這番話嚇得心慌意亂忙轉入後堂只見孫夫人獨坐窗前向鸚鵡調弄他便往孫夫人旁邊一坐也不說話月是低頭垂淚孫夫人見他垂淚吃驚不小忙問道夫主什麽事情這樣傷感劉備忙道我一身飄流異地既不能侍奉雙親又不能祭祀祖宗眼看到年終臘盡了想到這裏不由得怏快不樂孫夫人聽他這話微微地一笑道你不要盡在那裏瞞我了哪里是爲祖宗堂上而傷感的不過是爲著荊州危急的緣故罷了劉備聽她一口道破吃驚不小忙道你怎麽能夠知道的她道方才你和子龍在外邊講的話全被我聽見了劉備趁勢撲地往孫夫人面前一跪口中說道這事危急了務要請夫人替我設法放我回去方好萬一荊州失了不獨被天下恥笑而且我向後就沒有立足的地步了無論如何都要望夫人體貼我才好呢我本想一個人回去無奈又捨不得你所以現在處在兩難的地步孫夫人忙道君家放心我不嫁你則已既然嫁給你當然是你的人了你到哪里我也到哪里就是了劉備忙道願意隨我走當然感謝不盡但是國太怎准你隨我同走呢她聽說這話柳眉一鎖計上心來忙道君家不須多慮我用好言對國太懇求諒無不允的道理劉備又道縱然國太准允吳侯恐怕也要來爲難的孫夫人沈吟了一會子才向他說道我們此番去千萬不能彰明較著的動身最好在元旦日等我家哥哥宴會的時候你假託到江邊去祭祖我隨你一同去就是了劉備大喜到了元旦日的清晨劉備暗中囑咐趙雲叫他帶領五百名親兵到城外去候著趙雲受計去了孫夫人進了內宮對國太說道夫主思念祖宗晝夜煩惱要到江邊去祭祖請國太的示下吳太忙道這是他的孝心可感我的兒你如今也是劉家的人了他去祭祖你應當也要隨他一同去才是個道理她聽這話正中心懷卻不即應便吞吞吐吐地故意說道他去便罷了又何必要我去作什麽國太慌得說道我兒這是個禮數哪能不去呢她微笑著答應國太又叮嚀她早一些兒回來她唯唯地答應出來和劉備指揮著貼身的侍女收拾細軟一會子收拾停當孫夫人上車劉備上馬悄悄地出城會同趙雲向南徐趲程而去再說孫權元旦日大宴百官開懷暢飲飲得酩酊大醉由侍者將他扶入內宮沈沈睡去再是衆臣探得劉備走了天色已晚孫權酣呼如雷還未興醒衆官急煞虞翻不能再待直入後宮著力將孫權推醒對他說道主公你可知道劉備和郡主私自逃走了麽孫權聽說這話將酒嚇醒了一半揉開睡眼忙問道這話果然麽虞翻道誰敢騙君侯呢孫權霍地起身下床召集衆謀士商量辦法張昭道事已如此只好著人去追回別無他法了孫權忙命陳武潘璋選了五百精兵不分晝夜務要將劉備和孫夫人追回要緊二將領令飛也似地前去追趕了虞翻忙道二將此行恐怕不一定能達到追回的希望孫權聽得這話怒氣填胸將禦案上的玉硯摔得粉碎氣沖牛斗地說道難道他們還敢不聽我的命令麽虞翻道並非是他們違令郡主平日好觀武事剛毅嚴正諸將沒有一個不懼怕她的她既肯順從劉備必然同心而去所去之將若見郡主豈敢下手的孫權大怒忙在身邊拔下寶劍呼周泰蔣欽聽令他將寶劍交給二人務將吾妹和劉備的頭取來違令者立斬周泰蔣欽得了令哪敢怠慢旋風似地來追趕劉備了再表劉備和孫夫人走了一天息在路側二更將近猛聽得後面喊聲大起火光燭天劉備大驚忙道追兵到了如何是好趙雲忙道主公且請先行後面的來兵自有我去抵擋他們方才走到小芹山下一聲鼓響一彪軍從山腳下轉了出來火光中見丁奉徐盛躍馬橫槍厲聲大叫道劉備快快下馬受縛免得我們動手劉備忙向趙雲說道我們活該要送命了你看前有攔截後有追兵我們便生出翅膀來也難飛掉了趙雲忙道主公休慌我臨走的時候先生曾囑咐我的第三個錦囊須到急難時方可開拆如今到這生死的關頭且將錦囊拆開自行有退敵的妙法他說著在懷中取出錦囊拆開和劉備一看劉備忙不叠地趕到孫夫人的車前翻身下馬撲地跪下對她哽哽咽咽的地說道敝人有幾句實話到現在不得不說了孫夫人忙道夫主有什麽話只管講罷劉備道我此番來得夫人和國太的垂愛真是萬幸了原來吳侯不肯將夫人真心嫁給我的不過想借夫人爲香餌釣我上鈎的如今國太不准將婚事弄假成真他和周瑜已經恨我入骨你看前有攔截後有迫兵夫人要是不肯助我出險我便自刎了她聽得這番話勃然大怒忙道夫主且請上馬凡事都有我來就是了說著叱車直出到了丁徐二將的面前卷簾大喝道你這兩個狗頭意欲何爲丁奉徐盛見了她慌忙滾鞍下馬曲背彎腰不敢仰視連聲說道郡主且請息怒我們奉著周都督的命令前來專候劉備的孫夫人大怒喝道劉將軍是大漢皇叔我的丈夫你們要想殺他我就殺不得周瑜麽哦我曉得了你們這班喪心病狂的賊子莫非知道我們要回去你們來搶劫我們夫婦的財物麽丁奉徐盛聽得這話嚇得將腦袋縮到腔子裏連稱不敢忙喝開一條大道放他們過去才行了五六裏的時候陳武潘璋也就趕到見了丁徐二將忙問他們爲何將劉備等放走丁徐備言前事陳潘二將說道現在吳侯有令在此怕得誰來我們且並在一起去追著他們回來四將商議一會便又合兵趕來劉備聽後面喊聲又起對夫人說道追兵又至爲之奈何呢孫夫人道夫主且請先行我與子龍斷後劉備引著十數個親兵只向江邊趕去不多時四將領兵趕到孫夫人嬌聲喝道陳武潘璋向哪里去四將見了她像煞老鼠見著貓似的一齊下馬叉手侍立陳武答道奉吳侯的命令特來請郡主和玄德回去她聽說這話不由得柳眉倒豎杏眼睜圓大怒說道這分明是你這班匹夫有意離間我兄妹使不睦罷了我現在已嫁他人今天歸去堂堂正正地稟明過國太也不是隨人私奔的便是我的哥哥前來也須照禮而行的你二人意欲依仗兵威將我殺害了呢她這番話罵得四將啞口無言各自尋思道一萬年他家還是兄妹便是和她較量起來我們到底是個將土哪里及得來他們兄妹之間的感情厚呢而且孫權是個大孝的人萬一國太翻起臉來還不是我們的不是麽他們想到這裏便諾諾連聲地退下去了孫夫人才又動身而去這裏四將垂頭喪氣地計議一會子瞥見一彪軍旋風也似地趕到他們定睛一望不是別人卻是周泰蔣欽他兩個見了他們忙問道劉備到哪里去了四將答道早已過了周泰急道你們既然碰見了還和他客氣什麽呢簡直就拿下去便得了四將同聲答道你們風涼話卻會說就不想想郡主的厲害了周泰忙道什麽厲害不厲害吳侯現在封劍在此先殺郡主後殺劉備誰違令先斬誰他兩個說罷不暇多計較便領兵往江口趕來劉備等此時已到江口聽得喊聲又起劉備仰天歎道奔走疲乏追兵又至亡五日矣正在歎息之間蘆葦裏的小船數十隻一字兒排開泊近岸旁第一隻船上立著一人綸巾道服手搖羽扇大笑道主公休慌諸葛亮在此恭候好久了劉備大喜忙與孫夫人趙雲等先後登船揚帆離岸說時遲那時快一聲呼哨從上流駛來無數戰船帥字旗下立著周瑜兩旁站著丁奉徐盛甘甯淩統船如箭發直向他們的後面追來看看追上諸葛亮等棄船上岸周瑜忙也領兵上岸追來剛剛追到二黃山左右猛聽得金鼓震天一彪軍雁翅排開關雲長躍馬橫刀一聲狂笑道周瑜孺子意欲何爲快將首級納下免得某家動手周瑜見了大驚失色撥轉馬頭便走一聲梆子響左有魏延右有黃忠各領一彪軍殺出甘甯淩統慌忙接住兩家混殺一場三面夾敗只殺得周瑜大大失敗十死八九引著殘兵狼狽逃去諸葛亮等得勝回荊按著慢表再表曹操自從赤壁一敗後日夜思想復仇無奈沒有機會可乘也只好擱起此刻曹操已經自封魏公並加九錫入朝不趨出入羽葆簡直和天子仿佛他在鄴郡對著漳水建立一所銅雀台這台共有五層每層高一丈八尺每層分五進每進二十五個房間每間裏藏著一個絕色女子這房間裏的陳設俱是窮極珍貴銅雀台的兩邊還有兩座台一名玉龍台一名金風台上面淩空用沈檀香木造成兩座橋和銅雀台裏的陳設也是金碧交輝十分華麗那邊金風台也和玉龍台的陳設是一樣列位你們知道這銅雀台裏面情形麽我可說一句十個之中有九個不知道的這也難怪大家都知道有這樣一座銅雀台造得巧奪天工的萬不料裏面還包藏著無數的出奇過異的事情呢曹操造的這座銅雀台形式上和秦始皇的阿房宮董卓的郡塢仿佛考其性質來卻和他們不同了一個是專制一個是公開曹操何等的奸滑他曉得一班文臣武將很不容易收買他們的真心的他造了這座銅雀台原不是爲著個人娛樂而設的他將銅雀台造好了的時候就有許多文官武將念他的歪嘴經說他耗費民膏縱自己的私欲曹操何等的機警忙命匠人又在銅雀台兩邊造了兩座金鳳玉龍裏面也是錦屏繡幕每房間裏有一個絕色的麗姝每逢朔日他將朝中所有文官不論大小一齊邀到玉龍臺上去宴會一天叫那些絕代的麗姝一齊出來陪酒誰看中誰馬上就去了願什麽叫做了願原來之個名詞本是曹操親自出的了願者了償其心願也隨便哪一個只要有到銅雀台的資格便有享受溫柔鄉的權利不過他們是有限制的自尚書以上每月得進玉龍台七次尚書以下的每月只能進玉龍台兩次金鳳台卻是一班赳赳武夫尋樂的場所曹操深怕他們貪戀女色破壞身體每月不分高下的將土只即留宿兩宵但是日間的歡聚卻要比文官來得多了操賊以爲日間歡聚萬沒有攜手入悵幹那不見天的事的道理所以每月日間歡聚倒有八次有時曹操自己也到的他們便眼管鼻子鼻管心斯斯文文的不敢亂動操賊有時不在這裏那麽誰也不肯文縐縐地坐在那裏吃酒談心等不及的每人拉了一個到房間裏練習武功了這中間的銅雀台只有姓曹的和姓夏侯的可以進去任意胡行其他的人物不得亂越雷池一步的這班女子都是搶來或是買來的不是處於還不要買來的時候還要經過醫生驗明處女膜的確是整個的那麽才得選進銅雀台呢金鳳玉龍裏面的美女卻不是這樣的認真了管她破瓜沒有破瓜只要面孔生得漂亮便有入選的資格了銅雀台裏面的美女的確是來路貨誰不是水蔥管似的一個玉人兒供給那些蠢如牛豕的東西蹂躪在下做書做到這裏也要替這些女子抱屈了誰無姐妹誰無父母皆是迫於操賊的威勢敢怒而不敢言操賊本來有四個兒子大兒子曹丕二兒子曹彰三兒子曹植四兒子曹熊成日沒有別事專門在銅雀台廝混著操賊別出心裁又在宮中劫出大批的宮女來在銅雀臺上大宴群臣命武將比武文官作文比較成績賞以宮女這一來爭執便開端了先是裨將牙將比試了一回然後一般大將一齊登場見裨牙將中成績高的便得著一個天仙似的美人兒他們不禁垂涎三尺一個個立馬垓心等候令下便奪錦標美人一會子有一位軍官捧著大令飛馬前來大聲喊道魏王令下令諸位將軍比箭這時各大將分爲兩隊曹家和夏侯氏俱著紅袍外姓諸將俱著綠袍這一聲令下綠袍隊裏早有一人飛馬到垓心挽弓搭箭颼的一聲不偏不斜正中紅心衆人忙仔細一看卻是李典這時鼓聲大震李典十分得意按弓入隊紅袍隊裏此刻穿雲閃電價地竄出一將馬到垓心翻身一箭也中紅心曹操在臺上一望卻是曹休他十分得意地對衆人笑道這真是吾家千里駒衆官交口稱讚綠袍隊又耀出一將大叫道你二人的射法何足爲奇且看我來給你們分開他說著颼的一箭亦中紅心三角式插在紅心裏衆人忙看射箭的是誰卻是文聘曹操笑道仲鄴的射法也妙話由未了紅袍隊裏曹洪看得火起拍馬上前弓弦響處一支箭早到紅心鼓聲大震曹洪勒馬垓心挽弓大叫道如此還可以奪著錦標麽夏侯淵一馬沖到垓心大聲喝道此等箭法何足爲奇且看我來獨射紅心他說罷揚弓搭箭鼓聲一息那支箭颼地飛去不偏不倚正插在那四支箭的當中衆人一齊喝彩鼓聲又起夏侯淵立馬垓心十分得意這時綠袍隊裏張遼看得眼熱飛馬出來對夏侯淵說道你這射法也不算高且看我的射法他放馬在場內往來馳聘三次霍地扭轉身軀一箭飛去將夏侯淵那支箭簇出紅心衆人驚呆了齊聲喝彩道好箭法好箭法操賊在臺上望見忙叫將張遼喊上臺來賜他宮女二名金珠十粒蜀錦十匹張遼謝恩退下剛剛下了台許褚厲聲喊道張文遠你休想獨得錦標快將那兩個美人分一個與我大家玩玩你道好不好呢張遼冷笑一聲說道今天奪錦標原是憑本領奪來的你有本領何不早些出來比較現在錦標已給我奪了你有什麽本領要分我的錦標呢許褚也不答話飛身下馬搶過來在香車裏將那個穿紅裳的宮女抱出來上馬就走張遼大怒拔出寶劍攔住去路圓睜二目厲聲罵道錦標是魏王賜的誰敢來搶識風頭快放下來牙縫裏蹦出半個不字來立刻叫你死無葬身之地許褚大怒一手挾著那紅裳宮女一手掣出佩刀厲聲罵道張遼小賊你可識得我的厲害麽張遼到了此時將那股無名業火高舉三千丈按捺不下揮劍縱馬來鬥許褚許褚慌忙敵住他兩個認真大殺起來慌得曹賊連喊住手這正是二虎相爭爲一女且看奸賊怎調停要知後事如何且看下回分解
