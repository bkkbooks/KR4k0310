body:
  text: 第八十二回崆峒山雙雄擒惡獸嶙峋洞一丐捉妖蛇卻說胡明手起一錘看見中了那女子的首級接著殼禿一聲那女子早已不知去向原來這一錘正中了一棵老樹的中段呀的一聲連根倒下二人好生奇怪借著月光四處找尋了多時哪里有一些影子這時將店中各人均已驚醒那店裏的夥計早知就裏一個個曉得他們和妖精對仗了只嚇得東藏西躲不敢出頭倒是一班下店的朋友一骨碌爬了起來只當是何處失了火呢有的光著頭有的赤著腳還有的連下衣都來不及穿赤條條地沖了出來登時秩序大亂一齊擁到後面追問根底才知道他們正自在那裏捉拿花妖呢都嚇得倒退不叠林英忙對衆人說道不用怕有我們在此那些旅客才仗著膽立定腳探頭探腦地朝著他們只是發怔其中有一個瞥見胡明一絲不挂赤身露體的雙手執著臥爬大錘虎頭環眼十分可怕他嚇得魂不附體大聲喊道不好了妖精來了快逃快逃衆人聽他陡然一聲嚇得魂落膽飛各自爭先逃命林胡二人忙擎兵刃張目四下亂望未見有一點蹤迹不覺好笑林英一轉身只見胡明渾身上下一絲衣服也沒有惡形怪狀的不禁哈哈大笑道原來如此胡明被他笑得倒莫名其妙林英向他笑道怪不得那些人見神見鬼的沒命地跑了果然有個妖怪在此胡明伸頭四下望了一會忙道在哪里在哪里林英笑得腰彎答道你不是妖怪麽胡明還不知道他是什麽用意翻著一雙白眼朝林英說道林兄休要取笑妖怪在什麽地方趕緊說出來讓我去捉它林英道誰和你取笑你自己朝自己細看看究竟可像一個妖怪胡明朝自己身上一望不禁也好笑起來對林英道我見了你們動手連衣服都沒空子去穿就來助戰了怪不得那些狗頭嚇得屁滾尿流地逃了林英笑道廢話少說了快點去將衣服穿起來吧萬一走進一兩個婦人來像個什麽樣子呢胡明點頭晃腦地走到自己的房間裏將衣服穿好走了出來蔡諳縮在帳子裏連氣也不敢出提心吊膽見了胡明連忙在帳子裏喊道胡將軍那個女子可曾打死了嗎胡明答道不曉得打死了沒有蔡諳忙又問道林將軍呢胡明道在外邊呢蔡諳道既是妖精不見就罷了趕緊回來不要遭了她的暗算胡明也不答話一手提著兩隻大錘一手執著燭臺走了出來林英迎上來笑道胡將軍你拿燭臺出來做什麽的胡明道用燭臺四處去找一找看這個妖怪究竟躲到哪里去了林英道法子是不錯但是要提防她從暗地裏跳了出來胡明道你防著我來尋就是了二人商議已定便向各處去尋了一會不見有什麽蹤迹再尋到原處林英猛的一聲道哎喲妖精打殺了胡明忙問道在哪里在哪里林英道這棵老樹根上不是滴著鮮血麽我想那女子一定是這棵老樹的精靈胡明忙低頭一看只見那棵老樹的根上果然鮮血迸流胡明笑道咦我倒是頭一次碰著呢不想這老樹竟成精作怪可不是絕無僅有的事麽林英笑道那倒不要說天地間無論什麽飛禽走獸動物植物只要年深日久受天地的靈氣日月的精華皆能成爲精怪的他說著蹲下身子細細地辨認了一回立起來對胡明笑道那個女子卻是這棵老桂樹化身的估量它也不知迷了多少人了胡明道可不是麽但是它能夠吃人麽林英笑道吃人卻不能只能迷人胡明搖頭說道你這話未免也太荒唐了它既然成了精怪怎會不吃人呢林英笑道你只知其一不知其二大凡動物成了精怪卻要吃人植物質體呆笨其性極甚馴良所以它只能迷人胡明大笑道難道這桂花樹不是動物嗎林英笑道你又來纏不清了花草樹木均爲植物飛禽走獸鱗介昆蟲才是動物呢胡明點頭笑道原來這樣但是植物與動物一樣的成了精怪怎麽它就不會吃人呢林英道你真纏不清我不是說過植物的性子馴良不要說別樣單講一個很淺近的比喻給你聽聽那些毒蛇猛獸還未成爲精怪就想來吃人了可見動物的心理與植物大不相同了二人討論了半天才進了臥房一進了門就見蔡諳驚得面無人色蹲在床角只是亂戰林英忙道妖怪已經被我們打死了請中郎放心罷蔡諳忙問道果真打殺了麽林英便將以上的事情說了一遍把個蔡諳嚇得搖頭咋舌地說道今天要不是二位將軍我可要把性命丟了林英咬牙發恨道這事那外狗頭的店主一定曉得明明的送我們來給妖怪害的如今妖怪既被我們打死那個狗頭的店主可也請他吃我一劍說到這裏胡明哇呀呀直嚷起來大叫道不將這狗頭打殺誓不爲人他提起雙錘就要動身林英一把將他扯住說道你又來亂動了現在等我們將各事完畢先去問他一個道理那時他如果知罪便可以饒他一條狗命如其不認便再結果他也不爲遲呢胡明氣衝衝複行坐下蔡諳又勸他一陣子胡明兀是怒氣不息地向林英問道我們此時有什麽事情沒有做呢林英道自然是有的此時需不著你問說話之間天色大亮林英便與胡明一齊到了前面剛剛走過中堂只見那個昨天被打的大漢扶著兩個小廝一跛一瘸地走到林英的前面跪下叩頭無算口中說道感蒙大德夜來將怪除了小人萬分感激林英笑道你倒好多少地方不要我們去住獨將我們送到後面去給妖精傷害虧我們有些本領否則不是要丟了性命麽那大漢叩頭謝道這孽障小的受它的害著實不淺了至今沒有人敢去和它對手昨天我曉得二位不是凡人故借尊手殺了妖怪小的知道有罪萬望二位饒恕我罷林英聽他這些話不禁心腸倒軟了好多又見他眼睛瞎了一隻所以不願再去追究了忙對他道如今事已過了我們也不是雞肚猴腸之輩你且去將早膳備好我們吃過還要去趕路呢那大漢連忙著人去辦了一桌上等的筵席將蔡諳等三人請來上坐納頭又拜了下去林英忙道無須這樣的客氣了他們將酒吃過蔡諳便給他十兩紋銀那大漢啊呀連聲地再也不肯收忙對林英道恩公等遠去小的正該奉上盤纏呢說罷忙命人捧了二百兩一大盤的銀子來蔡諳再也不肯收他的胡明笑道不想昨晚一打倒打出交情來了老大你也不要盡來客氣罷我們兩免就是了那大漢無奈只得將銀子重行收下忙命人預備坐馬三人告辭上馬向西而行這時一傳十十傳百的沸沸揚揚傳說近來客店裏捉住一個妖怪這個消息傳了出去大家都作爲一種談料有多少好事之徒親自跑來觀看的烏亂得滿城風雨盡人皆知究竟是否有無小子也未曾親眼看見只好人云亦云罷了閒話丟開再說蔡諳等策馬西行在路又非一日餐風沐雨向前趕路一轉眼殘秋已盡北風凜凜大雪紛飛蔡諳在馬上禁不住渾身寒戰對林胡二將說道天氣非常之冷如何是好林英道我們且再走一程到了有人家的去處再爲設法罷蔡諳點頭道好三人又攢了一程只見前面一座高山直聳入雲那山腳下面有不少村落他們便向這村落而來不多時已經到一個村落這個村落十分齊整四面濠河三人下了馬挽著繮繩走進村口尋了一家酒店三人進了店將馬拴入後槽胡明便擇了一個位置招呼他們二人坐下林英便四下一打量見這店裏的生意十分熱鬧一班吃客擠擠擁擁的坐無隙地那些堂倌送茶添水的忙個不了他們空坐了半天不見有一杯一箸送來胡明等得不耐厲聲喝道酒保快點拿酒來那些堂倌只是答應著他們又等了半天仍然沒有一個人前來招待他們胡明按不住心頭火起將桌子一拍厲聲罵道好狗頭難道我們不是客麽等到這會還未見一杯水來他正在發作走近來一個堂倌向他躬身笑道請問爺子們要些什麽小的就去辦林英忙道你去將竹葉青帶上十斤烤牛脯切三斤先送來那個堂倌滿口答應腳不點地地走去將酒和牛脯捧來滿臉陪笑道今天是莊主請客捉山貓的所以我們這裏忙得厲害累得爺子們久等實在對不起他說著放下酒和牛肉林英忙問道你們莊主是誰請這些人捉什麽貓呢那堂倌答道客官們有所不知我們這裏叫做甯白村莊主姓富名平他有個兒子常常到村前的崆峒山上去打獵不想這山上忽然來了兩樣歹蟲一隻山貓一條毒蛇將莊主的兒子和一干打獵的人吃得一個不剩我們莊主又悲又憤便出去請了許多打獵的老手來捉這兩個畜生前天造好一隻大鐵籠子每根柱子都有碗來粗細內面放著雞鴨之類用牛拉到那畜生出沒之所到了第二天再去望望可是籠子四分一裂雞鴨都不見了估量著那畜生一定是進了籠子被它崩壞了的一連去了好幾次不獨沒有捉著倒被它吃了二個你想厲害不厲害林英點頭又問道那蛇是什麽樣子堂倌咋舌說道啊呀不要提起那畜生的身段有二十圍粗十五丈長眼如燈籠口似血池有兩個采樵的看見幾乎嚇死可是那畜生日間不大出來完全藏身在嶙剛洞裏到了夜裏就出來尋食了那畜生與山貓分開地段各不相擾一個在山的東邊一個在山的西面所以我們這裏還沒有受它什麽害蔡諳忙問道我到天竺國可是從這山上走過那堂倌驚訝地問道爺子們是到天竺國嗎林英道正是那堂倌將頭搖得撥浪鼓似地說道趕緊回去罷去不得去不得不要枉丟了性命中蔡諳聽了這話雙眉緊鎖放下酒杯將一塊石頭放在心上半晌無語胡明狂笑一聲道你們這裏的人忒也無用料想這畜生有多大伎倆合群聚衆還不能將它捉住要是碰到咱老子的手裏馬上請他到閻王老爺那裏去交帳那個堂倌聽他這話登時矮了半截地說道老爺子你沒有看見呢那兩個孽障委實十分厲害近它不得啊胡明道嗄我倒不信讓我今朝去看看究竟這兩個孽畜什麽樣的厲害蔡諳忙搖頭道動不得千萬不要去送死林英道我想這山貓倒不足爲害倒是那一條蛇據他說倒有些棘手如今別的不說人家去驅除不驅除究竟還沒有什麽關係倒是我們不將這兩個孽障剷除怎好到天竺去呢蔡諳忙道寧可設法從別的地方走也犯不著去碰險啊那堂倌笑道你這位爺子可錯了要到天竺國須從此山經過要是轉到別處去走三年也走不到的蔡諳聽他這話十分煩悶也不回答低頭長歎他們在這裏說話早被那班捉山貓的獵戶聽見了一個個冷笑道話倒說得一些不費力氣如果前去逞雄管教你送了性命不表衆獵戶在那裏譏笑且說富平聽見他們在這裏說話忙過來問了名姓便對林英說道林兄兄弟方才聽得二位的高見不勝欣幸可肯一層身手將這兩個孽障除去好替我們這裏衆民除害再則也好便利行人了林英忙站起來答道富大兄我想我們是到天竺國的橫豎是要先將這兩孽畜除了才好過去呢不過山貓容易就是那條毒蛇倒很棘手呢富平忙道只要先將這山貓辦了那條毒蛇就好設法驅除了林英道怕不很容易吧富平忙道三位既然下降小弟想請到捨下去再議如何林英也不推辭便與胡蔡二人隨著富平一直到他的家裏富平叫家丁到酒店那裏將馬匹行李取來又去請了十三名強勇的獵戶來富平命人重行擺酒席間胡明對富平道我們今天晚上先去探一探虛實如何富平大喜道既是胡將軍肯去那就好極了林英便對富平說道今天我們去不過是探一探形勢萬一在無意之中遇到那畜生倒要措手不及呢我想請幾位熟悉路的隨我們一同去如果碰見了也用不著他們動手他們盡可躲開就是了富平忙道那個自然我早巳預備了不一會散了席胡明林英渾身包紮各執兵刃預備動身蔡諳見他們兩個執意要去又因爲自己的障礙所以不便阻攔了胡明和林英帶了衆獵戶乘著酒興出了村走不多時衆獵戶便向他們說道二位當心現在已到了它的範圍之內了二人答應著又攀藤附葛地走了半天只見有一座小廟立在山崖上衆獵戶走到那座破廟門口便不敢向前走了就對林英說道這廟的後面一條路大約就是那畜生出入的要道了林英見大家都露出害怕的情形便開口說道既是這樣你們先在這裏躲著我去探聽一回虛實胡明道我和你一同去罷林英搖手道用不著人多岔事你和衆位在這裏候著如有動靜我就吹起畫角你們就來接應我吧胡明點頭稱是那些獵戶都是些驚弓之鳥誰也不敢隨他去爬上樹的爬上廟的四下裏分頭散開惟獨胡明抱著一對臥爪錘坐在廟前一塊大石頭上面靜候著林英別了衆人一手提著寶劍一手挽著彈弓向廟後又走了半裏之遙幸喜雪霽天晴一輪明月挂在天空還認得路徑他本是個打獵的出身焉有不知野獸蹤迹的道理他見路旁的細草好像被人踐踏的樣子光溜溜閃出一條六尺寬的大道他暗自吃驚道這畜生恐怕不是山貓呢我想山貓沒有這樣寬的身段他揀了一塊大石往下一坐靜悄悄地等了多時不見有什麽動靜他暗道難道這畜生出去了麽又等了多時還未見有一些動靜他暗想山有猛獸獐貓鹿兔全無這話果然不錯他等得不耐煩正要立起來回去瞥見正南山凹裏現出兩盞碧綠的燈來林英識得是獸睛暗道那畜生來了忙立起來往一塊大石後面一躲沒一刻那大獸慢慢的一步一步地走了上來噓著氣後面豎起一根桅杆似的尾巴林英偷眼看去哪里是山貓原來是一隻極大的花斑豹心中暗自吃驚道有生以來還未看見過這樣的笨獸呢他輕輕地取出彈弓讓它走過林英拽開弓閃了出來那豹好像屁股上生了眼睛似的大吼一聲好似半天裏起了一個霹靂翻轉身子直豎起前面兩爪來撲林英林英連發三彈少在向何處飛去曉得不能再慢了忙將彈弓摔去揮劍來迎這時豹已撲下右邊一爪正撲在劍口上已經劃破爪腕林英禁不起它這一撲便將寶劍嗆啷啷的摜去那豹兩爪搭著林英的肩頭張開大口林英趕緊將它一摟把頭往那豹項下一埋雙腿往它後肋一夾那豹往下一倒他兩個在草裏掙扎了一會林英便想出一個主意來用力在那豹氣管下亂咬不一刻將氣管咬斷那豹狂吼一聲登時不能動彈這時胡明聽得狂吼的聲音接著又是摔劍的聲音曉得不好便與衆獵戶打著燈籠火把一路尋來胡明當先喊道林兄我來助你一直尋到他們相搏的所在才見他和大豹滾在一堆胡明舉起大錘一連在那豹肋下著力打了十幾下那豹眼見得不活了林英才站起來滿嘴毛血胡明吩咐衆獵戶扛了回去富平見這樣大的斑豹不禁也倒退數步滿口贊道林將軍真是神人話才說完瞥見一個小廝跑進來報道外面有個討飯的他說能捉毒蛇要見員外富平忙道請進來這正是踏破鐵鞋無覓處得來全不費功夫要知後事如何且看下回分解
