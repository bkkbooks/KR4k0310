body:
  text: 第九十九回喪心病狂大辮兒復辟衣香鬢影小皇帝完婚卻說那革命黨幾次鬧事幾乎把清政府鬧翻終算有的覺察得早乘他們勢焰未成的時候興兵撲滅但內中的潛勢力依然不住地膨脹開來不多幾年已漸漸成熟了到了宣統的三年上攝政王載澧要想把鐵路收歸國有在這個上頭很引起了人民的反對革命党首領孫文黃興等趁舉國沸騰之時便在武昌起義協統黎元洪聽得軍心已變槍炮不絕於耳嚇得鑽在床下一句話也說不出來外面兵丁將衙署圍住逼著黎元洪承認都督黎越發恐慌了這時黎元洪的二夫人危氏倒很有見識她見大勢已在急迫若不承認即刻有性命之危當下代傳命令出去道都督已承認哩你們快去分頭進行這令一出衆人齊呼萬歲就去攻打鄂撫的衙門去了那鄂州革命成功的消息紛傳開去各省都回應起來這一下子把個清政府慌了手腳平時本勉強支援殘局一旦有事簡直無法措置了其時清廷的大臣如世續瞿鴻機盛杏蓀輩都是奉命謹兢而不能做事的人清廷萬分不得已把去職的袁世凱重行起用著他帶兵去拒民軍講到袁世凱的爲人足智多謀胸負大志他原是項城人是個監生出身仗他老師李鴻章的引挈也做過朝鮮委員當袁世凱幼年的時候他的老子袁甲三本在李鴻章的幕府袁世凱謁見鴻章還在髫齡時期李鴻章見他一舉一動便歎謂幕友們道此子功名富貴將來遠在老夫之上你們不要輕視他所以袁世凱在李鴻章的幕下足足守了十二個年頭一天有一個僕人和廚役吃醋爭風二人便私鬥起來廚役持刀追殺僕人那僕人無處躲避跑到李鴻章的書房裏來廚役也緊緊地追趕著李鴻章正在看書袁世凱侍立在一旁這僕人逃進來時李鴻章只做不曾看見一般廚役追到了書房竟把僕人拖了出去用刀將他砍死事後有人問袁世凱道李老師的不管閒事是他平素的脾氣你在旁邊爲什麽也見死不救呢袁世凱笑答道你們見廚役持刀殺人麽那麽僕人一樣有兩隻手的何不拿刀對抗的呢他卻聽人砍死連手也不回一下顯見那僕人是個極無膽量和毅力的人這種沒用東西留在世上做贅疣不如任他去死了的好李老師不去喝止救援他也是這個意思我何必去保護這無用人呢袁世凱這段話有人傳與李鴻章聽了李鴻章拈髯笑道孺子真知我心也因此把袁世凱漸漸地重用起來不上幾年做了駐朝鮮的委員了原來李鴻章的遇人好獎勇摒弱對於部下的私鬥誰人膽小吃虧來訴苦時反受責斥說他沒用咧而勝了的人轉得蒙賞因此李氏部屬每逢到戰鬥無不勇往直前沒有退後的就是這個道理至於袁世凱呢也是清代歷史上的重要人物故此不得不細述一遍啦袁氏自朝鮮卸職回來便受知于榮祿令他爲小站練兵督辦袁世凱在這時乘間培植他自己的勢力收了些有本領的將領那陸軍四傑如馮國璋段祺瑞王世珍張惠芝等一時是很有名的戊戌政變拳民起事袁世凱已做了山東巡撫辛醜回鑾薦任直隸總督光緒末年兩宮賓天溥儀入繼醇王載澧攝政把袁世凱免職閒居但袁世凱雖然在家閒散著他常常對家人說清廷不識人現將我去職我知他們不久就要起用我的哩及至革命在武昌起義時在宣統的辛亥年袁世凱在家聽得這個消息便跳了起來道我的出山時期到了你們快把我應用的衣物一齊收拾好了罷家人還都笑他是空想咧不料到了第三天上清廷果然下旨召袁世凱進見訓勉了幾句加上他的官爵把全國的兵權都歸袁世凱指揮袁世凱是何等角色一見時機已至故意搭起架子遲遲不肯進兵又經清廷下了特命將袁世凱當作洪楊時的曾左看待滿望他支住殘局把失地恢復過來袁世凱一得大權一面暗中佈置局面一頭派馮國璋出兵和軍民開戰馮氏在當時他手下的鎮兵也很有善戰之名他和民軍交鋒民軍究屬未經訓練的多因是給馮國璋殺得大敗可是這時的民軍勢力已成各地紛紛回應只仗馮氏一族之師也休想成功不過令民兵多流些血而已況且孫文已在金陵被選爲臨時大總統了天下民意均歸向共和單靠袁世凱一人也是獨木難支袁世凱察風觀色也知自己用強是不行的了於是就按兵不動等待時機民党一方面呢以袁氏擁有重兵也不能不有所顧忌這樣的兩下一併你礙著我我畏著你不是成了僵局嗎結果終至於雙方講和了這時清廷的攝政王載澧當夜進宮去見隆裕太后即由宮中召集瑾太妃和滿族親王大臣載振載洵世續陸潤庠大傅等開了一個禦前大會議以爲袁世凱擁兵不進各省皆舉白旗端午橋輩且以身殉張彪夜遁徐州張勳退出南京清朝的大勢已去就是強做也得不到什麽便宜各地旗人又遭民兵殺戮報復進關的仇恨一朝兵敗將亡滿族很是危險所以決定和民軍講和由清廷下詔遜位當下就規定了清室優待條件一例不加殺戮並由民國政府正式成立每年賜給清室優待費三百萬元這樣一來清代役使漢民至此告終自吳三桂迎清兵入關多爾袞定都燕京以攝政王開基入主中國到現在也以攝政王終共傳十三主所以稱滿清十三朝就是這個緣故這且按下再說清朝既已遜位孫文見大事成功便引身而退把個總統的大位讓給了袁世凱做了講到袁世凱他在第二任國會選舉中連任了總統黎元洪任了副總統民國開始到如今直亂到現在正副總統齊齊産生政府裏一點也不皆殘缺真是整整齊齊民國在這時很有些太平的氣概袁氏之後並大總統也幾次非法産的休說是副産的了至今依然是不曾有哩當袁世凱掌權的辰光於清代的舊將也都引用如張惠芝張勳倪嗣沖輩一般授著要職張勳坐督徐州野心勃勃時時轉著復辟的念頭只是懼怕袁世凱不敢發動罷了所以人家說袁世凱倒有用人之量能壓制部下不敢遽明異志這就是他的才能咧可惜他一時也鬼迷心竅也想恢復帝制做起皇帝來了於是仗著他的威權便籌備起帝制來致民國爲洪憲元年自己備了冕冠龍服以便祭天其時蔡鍔和唐繼堯口上贊成帝制暗中劇力反對蔡鍔被袁世凱監視著就改裝出京到了雲南立時宣佈獨立各省的督軍見民氣傾向共和也紛紛獨立起來了袁世凱得到這個消息這一氣非同小可幾乎昏了過去又兼他老病再發如何吃得住呢因之不多幾天便一命嗚呼了一個人到袁世凱那種地步也非容易的誰知弄到身敗名裂一念之差失足已成千古恨了袁世凱既死自然由副總統黎元洪扶正做了民國的大總統推翻了袁氏的帝制再建起共和旗幟來但黎氏的爲人是樸誠少謀臨危無斷的人那些野心家張勳等輩如何把他放在眼裏呢袁世凱死後這班人去了一個壓制的人登時如釋重負就在徐州密議實行他們復辟的陰謀這時那自號保皇派的康有爲梁啓超輩也開始活動暗裏和張勳結合準備推倒共和請溥儀出臺重復清朝的舊制一時贊成這個議論的督軍以及在野名流如徐世昌金梁世續耆善李梅庵瞿鴻機等倒也很不乏人清室在此時受著民國的優待猶心不知足欲萌違天之行可算是自不量力然一半也被群小包圍不由自主一半是民國人民當初談和之際大覺疏忽不曾將帝號廢去把帝孽趕走出宮仍讓他們關門做小皇帝才弄出這種活把戲來在這當兒清廷隆裕太后已死她臨死的時候世續在病榻待命隆裕太后垂淚道咱們如今好算得是寡母孤兒了先帝早薨留此孑餘之身目睹國亡家破能心不慘傷嗎祖宗創業維艱卻不道輕送在咱們孤兒寡母之手不是千古憾事嗎咱們不自修改貽誤大事坐失江山何顔去對祖宗先帝哩但事到如今說也無益說畢命召小德張內監回報已在兩日前不知去向了隆裕後聽了不由得一聲長歎道小人無良一至於此咱自己盲目差用了人夫複何說世續在旁奏道請太后下諭令警廳緝捕就是了隆裕後搖手答道今日不比從前國亡勢失誰來聽你們的使喚即國民官吏能額外盡力也徒遺口舌於人這又何苦來呢罷罷造化了這奴才吧世續在側一語不發因爲自溥儀遜位元後瑾妃乙太妃資格大權獨攬一味地收拾人心宮中嬪妃宮人內監們都服從瑾太妃而攻訐隆裕太后正應了光緒帝臨終之言說瑾妃不至受苦別人反要受制於她這語言猶在耳昔日隆裕後在西太后面前攛掇瑾妃的壞處吃盡痛苦不料今日隆裕後轉爲瑾妃所制天理報應可謂不爽而人的厄運也有變泰之時所謂說不到底做人看不煞咧隆裕後因人心背向宮中大半和她不睦背後更多怨謗之言以是鬱鬱不歡終至一病奄奄垂危之頃除世續耆善兩人外只有宮人一名內監兩名侍候在側而已一種淒涼慘澹的情形比光緒皇上死時愈覺得可憐當溥儀來視疾時隆裕後尚能說話便顧著溥儀說道咱們國已亡了回想昔日繁華今日如夢現宮庭荒涼淒清咱的魂靈不知到什麽地方去是安頓之所呢你生在帝王之家稚年繼統一點事也不曾有爲已經是國亡家破母死這樣可悲可痛的境地你雖過著了卻是不懂得什麽苦處將來你自有知曉的一日咱現今要和你分別了咱死之後無論把咱抛在深溝孤井悉聽你的處置咱也顧不了許多啦隆裕後說完淚隨聲落一班內監宮人也都痛哭起來世續大泣不可抑這樣的過了一刻只聽得隆裕後大聲道早知今日悔不當初說了這兩句身子望裏一翻雙足一挺就追隨光緒帝和西太后去了這且不在話下再說張勳和康有爲等主張復辟已不是一天兩天的事密議得已不知幾次了講到張勳他在清末不過是一個總鎮光複之前擢他做了提督他的爲人是好色貪淫是個極不安分之徒起初弄了個小毛子做妾後來在天津看上了女優王克琴就一半強奪一半價買把她弄了過來小毛子自王克琴進門便失寵了於是過不幾時就跟了一個當差的卷包逃走張大辮因有了王克琴也不去追究她了這張勳行爲雖如此卻死忠於清室身爲民國督軍他那腦後的豚尾依然不肯割去是表示不忘故國之意所以人家都叫他張大辮兒他在民國握了兵權幾次要想復辟只爲畏懼著袁世凱不敢耀武揚威他那些大辮兵在光復時被浙江台州兵在南京打得落花流水此時做了督軍坐鎮徐州想把以前的勢力慢慢地恢復轉來以便乘機而興恰巧袁世凱死了黎元洪繼任張大辮見黎氏懦弱可欺就百般地要挾黎元洪怕他專橫真是百依百順張大辮以時機不可失一面私下調兵進京一頭和康有爲等定計借著三頭會議的名目自己便乘專車進京黎元洪不防他會複辟還派人歡迎他咧張勳進京後連夜同康有爲等在六國飯店密議次日即進謁遜帝溥儀述明復辟之舉金梁等便上本勸進這件事被瑾太妃聽得大驚說道那不是玩的啊咱們受民國的優待在國亡之日不損一物不死一人就這樣的年年拿一筆優待費大家吃一口安穩飯也是心滿意足了還去想什麽復辟不復辟呢況且天下人民共和已久民心傾向民國於我們清室早已置之腦後了如今一旦舉事全國駭怪不安必至弄巧成拙而後已倘若再失敗下來不但優待費無著怕有滅族之禍哩瑾太妃說首瑜太妃也說溥儀年輕不知世故你們應當教之入那正軌才是道哩瑾太妃對太傅世續說道溥儀孺子不識利害他們雖然愛之但這樣一來反是害他了請你們三思而行這時兩太妃終竭力地反對怎禁得世續等復辟的念頭正熾想外援有張勳及各督軍內有康有爲金梁等大事在舉手之間就可以成功何必多所疑惑以至坐失時機呢於是由世續聯芳梁敦彥陳寶琛辜鴻銘輩一班舊臣預擬草詔布告天下准漢民辮去不究留辮與否悉聽自便授徐世昌爲弼德院正院長康有爲副之張勳授大將軍陳寶琛辜鴻銘瞿鴻機均加三級爲北洋大臣載洵貝勒都以王入值軍機諸事定妥由張勳率領大辮兵佩槍搶入迫黎元洪下命令讓位與清室自願上疏稱臣奏牘手本一概擬就只要黎元洪署名就是了這樣迅雷不及掩耳的手段弄成復辟的怪像也是民國人民放棄應有監督之權兼之黎氏柔而無剛才被宵小所乘當舉事的一天瑾太妃堅執不從她說與其看清室滅族不如自己先死免得無顔去見先帝後給衆臣和內監勸阻張勳力保無他瑾太妃終是不聽大罵康有爲逆賊誤了先帝如今又要來弄溥儀入圈套了他害得清廷內部骨肉離異心還不足必要弄得滅族才肯放棄呢瑜太妃也再三地解釋不應復辟的利害關係然那些喪心病狂的張大辮等早已把木造成真楫了其時北京城內重復龍旗招飄立時呈現滿清舊時的氣象來這消息傳到各省一班督軍也有事前已贊成的有口裏附和的有不出口而默許的也有看風頭做事的騎著牆看誰勝就望誰那邊倒也有幾個反對的其時倒惱了一位在野的人此人是誰就是清代陸軍三傑之一的段祺瑞了他在袁氏總統上任也做過內閣總理因不給輿情被人哄走他身雖在野威望尚在於是便在馬廠誓師聲討復辟党張勳通電全國馮國璋首先回應李純等和之聲勢浩大當下段祺瑞率兵進京把張勳的辮兵打得四散奔逃張勳也躲入荷蘭使館溥儀由英文教習莊士敦保護入德國使館一場好事又複付之流水了這樣的又過了幾年已是民國十一年了人民把復辟的事也逐漸忘懷清室也向民國政府聲明前次的復辟完全出於臣下的主張的確非出清室主意民國政府也大度寬容不加深究溥儀因得恢復自由並在這年的冬季實行大婚但一個廢帝結婚又有什麽輕重呢不知當此文明日進去古日遠這種皇帝大婚的禮節可不復再見了所以倒也是一種古禮上的紀念很有記它的價值然在溥儀婚時很有一班人在輿論上極力反對說民國時代不該有這樣舉動其實他們婚姻禮節於政治有何關礙呢要知怎樣大婚且聽下回分解
