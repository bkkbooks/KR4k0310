body:
  text: 第五十回死寶妃高宗傷往事游離宮嘉王窺秘像卻說圓明園原是在中國歷史上有名的大建築這時和珅承造園中四十景每一景或靠山或傍水或闊大或精小真是各抱地勢勾心鬥角講到全國風景最幽雅的地方要算那安瀾園一帶了什麽采芳洲飛睇亭綠帷舫無邊風月閣煙月清真樓染霞樓方壺勝境瓊華樓蕊珠官三潭印月天宇空明清曠樓華照樓澡身浴得池都是清秀高華四時鹹宜的地方乾隆帝當日進園來見了這去處便讚不絕口流連不肯去和珅迎合上意便奏請聖上駕蹕皇帝依奏他是一時三刻離不開春阿妃和郭佳氏蔣氏三位美人的當時也把三人搬進園裏春阿妃住蕊珠宮郭佳氏住方壺勝境蔣氏住華照樓乾隆帝每天在正大光明殿坐朝朝罷回園便和這三個人調笑每到春天在瓊華樓一帶遊玩到夏天在采芳洲飛睇亭綠帷舫一帶遊玩到秋天在煙月清真樓染霞樓三潭印月清曠樓一帶遊玩到冬天在無邊風月閣遊玩有時想別的妃嬪便回大內去帶著許多宮眷進園來滿個園中遊玩著有時奉著皇太后來遊園每逢四時佳節又把文武大臣召進園來各處遊玩賜宴吟詩皇帝自己做四十景圖詠命文學大臣和詩刻一本詩集子頒賜王公大臣圓明園地方闊大乾隆帝在裏面四時遊玩毫不厭倦還有那和珅終日陪伴著常常想出新玩意來博得皇帝的歡心和珅在皇帝身邊寸步不離皇上和宮眷嬉笑調情他也不忌避的內中一個郭佳氏因長得白淨秀美皇帝格外寵愛她郭佳氏格外愛惜自己她最愛洗浴又愛那玉器她住的屋子裏帷帳屏幛都挂著碎玉微風吹動一陣陣叮噹響聲十分悅耳此外鏡臺牙床都嵌著白玉便是郭佳氏衣襟裙帶上都綴著玉片兒眉心帽沿上也綴著一方羊脂白玉襯著粉腮上紅紅的胭脂真是嬌滴滴越顯紅白乾隆帝因她愛玉凡是四方進貢來的玉器都搬來陳設在郭佳氏屋子裏屋子裏有玉樹一株高和人齊那樹枝上挂著各種珠寶玩具乾隆帝寵愛之極便把郭佳氏進封寶妃這時福康安收服和闐那和闐地方是出玉的乾隆帝因寶妃愛玉便秘密下一道聖旨叫他多搜玉器不多幾天那和闐的玉器送進京來陳設在圓明園裏那玉有各種顔色有白如雪一般的有黃如蠟一般的有紅如霞一般有綠如翠一般的寶妃看了拍著手笑得她一張櫻桃嘴合不攏其中有一樣最貴重的東西是大塊白玉雕成一匹玉馬長鬣高蹄方眼紫鼻露出幾絲血斑紋那顔色都是天然生就的全身潔白光潤長約三尺余高約二尺餘乾隆帝看了笑說道這玉馬和寶妃可稱得雙美了和珅聽了便去在華照樓下造一座寶馬亭把玉馬供在亭子中間亭子四面用白石欄杆圍繞著寶妃每天要洗澡的有時拉著春阿妃和蔣氏同在浴池裏洗澡這時雖在夏天和珅怕她們嬌嫩皮膚受了風寒便在華照樓後面造起一座大鍋臺來把水燒熱了用鐵管曲曲折折地通到池底灌進熱水去稱做溫泉三位美人在溫泉裏洗浴大家嬉弄一陣皇帝靠在池邊看著她們和珅也陪在一旁看著那班妃子有的在水面上搶著球的有的爬在石狻背上唱著曲子的獨有那寶妃從浴池裏出來用兩個宮女交著臂兒擡著她到寶馬亭中裸著身體坐在那玉馬背上四五個宮女忙著拿軟巾替她揩幹身上的水珠又替她渾身撲著粉拿一匹輕紗裹住她的身子打開雲鬟來宮女替她梳一個墮馬髻兒又有一個宮女送上琵琶來寶妃彈著琵琶唱著曲兒皇帝在椅子上坐著看著直看到穿上衣裙才和她手拉手兒地到天宇空明納涼去那和珅陪著皇帝看在眼裏回家去也和他的姬妾照樣嬉弄著他姬妾有一個名叫雲兒的原是乾隆帝下江南的時候替他帶回京來賞給他的那雲兒皮膚長得十分白淨長身玉立轉盼動人乾隆帝曾經臨幸過她一次那雲兒也仗著自己曾伺候過皇上瞧不起同輩的姬妾們和珅也因也是禦賜的格外寵愛她當雲貴將軍進獻和闐玉器的時候先請和珅過目和珅也拿了幾樣到家裏去給雲兒玩弄內中有一個白玉墩雲兒每浴罷便裸坐墩子上揩抹水珠又渾身撲著香粉也命丫環替她重整雲鬢和珅也坐在一旁忽然想起圓明園和玉馬和珅笑對雲兒說道像你這樣白馬也似的肌膚也配得騎在馬上後來不多幾天那寶妃因常常洗浴和皇上在風裏調笑著風寒入骨一病身亡寶妃一死把個乾隆帝傷心得茶飯無心神魂顛倒雖說一般也有春阿妃和蔣氏伺候著那皇帝總是鬱鬱不樂每見了那玉馬便想起了寶紀掉下淚來後來春阿紀怕皇上傷心過甚便悄悄地把那匹馬偷出園去交給和珅拿去藏在內庫裏誰知那和珅也要謀吞那匹玉馬便悄悄地拿回家去給那雲兒騎坐取樂去乾隆帝見死了寶紀連圓明園也不願住了後來和珅想出法兒來哄著皇帝到熱河去這時已到八月清官舊例每年秋天必行秋彌禮在熱河地方的木蘭圍場乾隆帝雖然常到江南去每年並不忘這個禮節木蘭左近熱河城裏原有康熙帝造著的行宮這地方風景是古樸天然雄偉後來乾隆帝嫌地方太蕭索便在行宮四面添造禦苑共在三十六景此番皇帝帶了春阿紀和蔣氏到熱河打圍獵臣下許多武將各逞英雄追飛逐走一連打了十天捉獲了許多野獸回到行宮裏又大排筵宴召集了許多蒙古王公在別殿中賜酒賜肉那王公把眷屬一齊帶進宮裏皇帝見裏面有幾個長得英挺撫媚的留下了充做官娥內中有一位哈刺沁親王的女兒還有一位塔固牛錄的妹妹都是長得俊眉秀眼顧盼動人乾隆帝封她做妃子如今有了新歡便忘了舊恨那兩個妃子都是信奉喇嘛的乾隆帝便在行宮裏造起高大的喇嘛廟來和北京的雍和宮相似裏面養著許多喇嘛和尚皇帝常常帶著兩個妃子進廟去禮佛那喇嘛知道皇帝的性格也在廟裏塑起歡喜佛來比北京的還要塑得精巧那歡喜佛共分三種供奉在三座秘殿裏第一座殿都是精銅鑄成的佛像外面鍍著金葉那佛像有男佛女佛每一對都是相對著或坐或立或臥奇形怪狀蕩人心魄殿裏還一座小閣羅帳繡幃牙床寶座望去暗吞吞的四面用雕欄圍住裏面塑著兩尊佛像一個是男身的貂帽東珠辮發袍褂坐在寶座上好似滿清帝王的佛像垂下眼皮看著腳下一個女身的佛像那女佛斜靠著身體睡在地毯上擡起眼望著那男像星眼斜溜朱唇含笑露出十分的春意這小閣上只有皇帝和妃嬪可以進去第二座殿是滿挂著畫像第三殿滿挂著繡像當時有一個郎世寧是好畫手她畫了十六幅懸挂在第二座殿裏畫上的男子都畫著皇帝的面貌那女子畫得卻個個是美人兒皇帝看了心中十分歡喜又有一個漢畫工也畫了十六幅畫上的女子卻都是畫著某妃的面貌那男子的面貌個個不同乾隆帝看了大怒立刻傳諭把那漢畫工捉來正法獨有那喇嘛作畫十分奇怪他先靜悄悄地去盤腿坐在床上閉目靜氣坐在第七天上他床對面的白牆壁上忽然慢慢地露出影子來了那影子越露越濃竟成了一幅極好的畫兒再叫畫工進屋子去依著牆上的格局畫下來畫上的相貌也有極醜的也有極美的但總是縱橫顛倒十分動人的那繡像都是蒙古男人繡的也繡得十分出神乾隆帝帶著幾個喜歡的妃嬪天天在秘殿裏遊玩調戲玩厭了又在各處風景優美的地方去遊玩行宮有三十六景乾隆帝還嫌狹小傳諭下去又添造二十六景依舊交給和珅承辦那和珅打樣采料日夜趕造看看已到殘冬太后幾次傳旨出來喚皇帝回宮去這時已在十二月裏乾隆帝也無可延挨了只得擺駕回京去臨走的時候吩咐和珅趕快建造到了第二年二月底聖駕又幸熱河乾隆帝此番出來把一個幼女和孝固倫公主和十五王子顒琰帶在身邊和珅見了這兩位皇子皇女又出奇地巴結他們常常買些新奇的玩意兒孝敬公主又陪著十五王子到關外各處去打獵玩耍這時新造的二十六景又已完工了和珅知道皇上歡喜江南風景的又在這窮荒寒冷的地方裝點出許多明媚豔麗的風景來宮中有一座磬錘山在半山岡上造著許多亭館四周種著合抱不交的大松樹一陣陣風聲夾著樹葉擺動聲像江心怒潮屋子裏樹蔭四合涼意侵入是皇帝避暑的地方正屋裏一方匾額是皇上的禦筆寫著萬壑松濤四字東間沿山坡下去彎彎曲曲如長蛇一般山麓一叢雜樹隱著一座高樓名叫雲山勝地山下一汪湖水湖面平得好似鏡子一般遠望湖對面環山如帶塔宇高低一一倒映入水湖中有一洲地與水平一頭接著一條長堤堤旁夾種著桃柳洲上樓閣綿直洞房曲折名叫煙雨墩是帝王藏嬌的地方入晚燈火掩映笙歌徹耳望去好似海上仙山洲盡頭一塔高聳名叫點鏊塔湖西麵粉垣一曲花枝出牆名叫文園園中小池曲橋幽館危閣前後都有長廊連接賞雨看雪不必披氅擁蓋一樹一石都仿著河南景孝王的遺址自然幽雅園東一閣高跨牆外閣下一河荷田萬頃每到夏時皇帝憑欄賞荷田田翠蓋風動香來迎面一座峭壁一縷瀑布倒瀉入湖琤縱澎湃好似白雨跳珠湖岸一片平荒花鹿鳴走乾隆帶著嬪妃在這人間仙境裏消夏每到午倦醒來內監便送上一杯冰浸鹿乳乾隆帝和妃嬪分嘗並說道這便是西天極樂國了那邊峭壁絕頂紅牆一折老樹倒懸便是碧霞無君廟妃嬪進園來先要廟中進香才得菩薩保佑乾隆帝有時在山上住夜第二天絕早起來看東方日出那梁詩正紀曉嵐和珅一班親信大臣常得陪奉山下一座大屋上下九間名文津閣是分藏四庫全書的地方閣前老樹槎枒烏鴉成群閣西平臺一座高與簷齊四周叢桂成蔭是皇帝中秋賞月的地方宮中景色四時不盡乾隆帝住在裏面正好似身在江南皇帝每與妃嬪玩笑到厭倦的時候便把公主和十五皇子喚來父子說笑著又把大臣的子女召進宮來陪伴他兄妹二人這時常常被皇帝召喚的便是和珅的兒子名叫豐紳敬德的紀曉嵐的女兒韻秋他四人年幼無猜倒也十分要好有一年夏天時候十五皇子陪著父王在束閣裏避暑見閣下花地上花鹿成群皇帝便想考考皇子騎射的本領便喚顒琰拿著弓箭下樓去須一箭射中鹿頭便賞他金鞍一副那皇子奉命趕下樓去皇帝倚在樓窗口看他只見他彎弓抽矢颼的一聲過去只聽得哇的一聲鹿叫侍衛過去把射死的鹿獻上樓來皇帝看時果然一箭射中在鹿頭上乾隆帝十分歡喜忙吩咐賞他金鞍和珅的兒子豐紳敬德站在一旁看了十分羨慕他立刻跪下也求皇上試他的弓箭皇帝笑問道你也能射中鹿頭麽豐紳敬德回奉道小子不但能射中鹿頭且能射中鹿眼乾隆帝原是很寵信和珅的如今見和珅的兒子有如此的本領又看他面貌俊美便越發歡喜他說道你果能射中鹿眼朕不但賞你金鞍還要招你做駙馬呢和珅站在一旁只怕兒子疏失得罪正要攔住他後來聽說皇帝招他做駙馬便不好攔得忙替兒子跪下來謝過恩侍衛官送上弓箭來豐紳敬德接著走下樓去正有一群長鹿從樹林裏出來只見他弓張滿月颼一聲響一枝箭直飛出去那面一頭牡鹿眼上著了一箭應聲而倒這時樓上有許多妃嬪宮女看著只聽得一陣嬌聲喝好侍衛把射倒的鹿獻上樓去皇帝看時果然不偏不倚一支箭正正地插在鹿的右眼眶裏乾隆帝說一聲好吩咐賞他金鞍一副叫他陪著十五皇子到柳堤上騎馬玩耍去這時十五皇子得父皇的賞賜心中正高興忽見豐紳敬德勝過了他衆人喝彩心中便覺得不高興因不高興便恨和珅父子二人這時父皇的命令他不敢不依便懶洋洋地和豐紳敬德走下樓去了便把和孝固倫公主喚出來吩咐她拜見和珅慌得和珅還禮不叠那乾隆帝便把公主的親事當面說定了和珅也不好推辭便又跪下來謝過恩從此滿朝文武知道和珅和皇帝做了親家誰不趨奉他但是這時和孝固倫公主年紀只有十四歲還不曾到下嫁的年紀那十五皇子卻已有十六歲了和珅見乾隆帝十分愛憐十五皇子他也常常在皇帝跟前稱讚皇子如何英武如何賢德便有左右內監們悄悄地去告訴十五皇子那顒琰聽了心中非但不歡喜他還恨著和珅說和珅是下賤出身只知道討好皇上固自己的祿位這時顒琰除學習騎射以外還拜兵部侍郎奉寬做師傅學習經史十三歲讀完了五經又跟著侍講學士朱珪學古文和古詩跟著工部侍郎謝墉學今體詩讀得滿肚子詩書卻也很明白事理他和漢學士劉統勳最好這劉相國是正直君子最恨和珅他常常和顒琰說起和珅如何貪黷如何奸險因此眼中越發瞧不起和珅如今見豐紳敬德因比箭勝過他心中越發把他父子兩人痛恨著顒琰是胸中有城府的人他見了和珅臉上依舊十分和氣因此和珅不曾覺察還一昧捧著這位皇子這時恰巧快到了乾隆萬壽的日期那滿漢百官很多已先期趕到熱河來還有那些內外蒙古的部主朝鮮西藏廓爾喀安南緬甸暹羅等國的國王個個帶了家眷侍衛到行宮裏來準備拜夀此外還有俄國法國英國荷蘭各外國使臣也來代表他本國的國王道賀一時裏熱河地方人擠馬碰十分熱鬧乾隆帝便派和珅做領班大臣在外面替皇帝照料一切那和珅終日和這班外臣周旋著那班外臣誰不要討他的好暗地裏金銀珠寶不知道送了多少內中有一個內蒙古小部主喜塔臘和和珅最是知己和珅知道喜塔臘有一個格格長得十分美貌他便做媒去奏明乾隆帝說那位格格如何賢淑美麗請皇上選配給十五皇子做妃子皇帝原很聽信和珅說話的一面照例打發兩個保姆去驗看喜塔臘的女兒那保姆把這位格格領到密室裏卸去衣服從頸子面部看起直看到下身果然是骨肉停勻肌膚白嫩便回宮複旨皇帝下諭行聘把喜塔臘氏聘作爲十五皇子的妃子又把十五皇子加封爲嘉郡王乾隆帝又怕嘉郡王年幼不懂得人的生理便領他到喇嘛廟的秘閣裏去把那塑著的美人解開衣襟來上身下身看過又領他去看殿裏的歡喜佛從此以後便成了清宮的例規凡是皇子大婚的前幾天必要領他到熱河行宮裏去看歡喜佛這都是後話要知當時那嘉郡王看了歡喜佛以後如何情形且聽下回分解
