body:
  text: 第六回腰間短刀斬伏莽枕邊長舌走英雄話說這位大孫女原是她祖母十分疼愛的人又長得乘巧討人歡喜合府上下的人沒有一個不稱讚她遠近部落的貝勒打聽她長得標致都來求婚都是她祖母作主要把孫女婿一齊招贅在家裏因此耽擱下來直到嫁了阿太章京大孫女爲丈夫的前程起見再三催著丈夫到古埒城去阿太意思要帶了妻子一塊兒到任去無奈他祖母不肯大孫女心中也是捨不得丈夫因此兩人在房中哭得十分淒慘侍女見了忙去報與喜塔喇氏喜塔喇氏報與婆婆知道妃子聽得了說道這可不得了可不要哭壞我那寶貝啊說著忙站起身來要自己看去納喇氏和喜塔喇氏在兩旁扶著後面四個媳婦還有許多侍女圍隨著走到大孫女房裏去大孫女聽說祖母來了忙抹幹了眼淚迎接出去妃子一見孫女雲鬢蓬鬆衣襟破碎便嚷道這可了不得你們小兩口才幾個月的新夫妻便打起架來了嗎說著擎起旱煙杆兒沒頭沒臉地向她的孫女婿打去說道我這樣嬌滴滴的孫女兒怎禁得你這莽漢子磋折大孫女見了忙搶過去抱住了煙杆把自己毀裝勸駕的話說出來妃子聽了點點頭說道這才像俺們做都督人家的女孩兒說著又回過頭去對阿太說道你祖岳父好意給你一個官做做你怎麽這樣沒志氣迷戀著老婆不肯去我的好孩子你快快前去我替你養著老婆你放心她是我最疼愛的孫女兒你去了我格外疼愛她些包在我身上把她養得白白胖胖的她的這番話引得一屋子的人大笑起來獨有阿太一個人還哭喪著臉妃子再三追問他你怎麽了阿太忍不住哇的一聲哭了跪下地來把願帶著妻子一塊兒上任去的話說了出來大孫女趁這個機會也並著肩跪下地去妃子一看歎了一口氣說道好好女心外向你也要丟了我去嗎說著禁不住兩行眼淚挂下腮邊來衆人忙上前勸住喜塔喇氏忙把婆婆扶回房去這裏禮敦巴圖魯的福晉和他女兒在房裏商量了半天他小夫妻兩人口口聲聲求著要一塊兒到古埒城去禮敦的福晉也無可如何只得替女兒求著公公到底他公公明白道理說女孩兒嫁雞隨雞嫁犬隨犬如何禁得她住便選了一個日子打發了他夫妻兩人上路到了那日內堂上擺下酒席替阿太夫妻兩人餞行大孫女的親生父母卻不敢哭倒是覺昌安的妃子和塔克世的福晉喜塔喇氏哭得眼眶腫得和胡桃一般便是覺昌安到了這時也不覺黯然魂銷禮敦和塔克世界堪弟兄們怕父母傷心過份壞了身體便催促著阿太夫妻二人趕速起程福晉們一齊送到內宅門分別貝勒們送到城外分別獨有覺昌安和塔克世父子兩人直送到古埒城分別覺昌安回到建州城那王杲又新得了明朝的封號建州右衛都督指揮使那建州地方各貝勒章京又都來向王杲道賀擺下酒席熱鬧了三天覺昌安這時年老多病又常常記念孫女兒身體十分虧損便把都督的位置傳給了他第四個兒子塔克世自己告老在家不問公事好在王杲做了指揮使很能鎮壓地方便也十分放心說到王杲這個人性格原是十分暴躁到處歡喜拿武力去壓服人自從得了明朝的封號以後越發飛揚跋扈便是建州都督也有些駕馭他不住了這時他收伏的地方很大明朝的總兵也見了他害怕他年年進貢的時候也不把明朝的長官放在眼裏明朝進貢的規矩是每年在撫順地方開馬市各處部落都拿土産去進貢長官坐在撫夷廳上驗收上上馬一匹賞米五石絹五匹布五匹中馬賞米三石絹三匹布三匹下馬賞米二石絹二匹布二匹駒賞米一石布二匹王杲進貢偏要拿下馬去充上上馬硬要討賞那長官爲懷柔遠人起見便也將錯就錯地收下了誰知道這王杲越發得了意照進貢的規矩那各部落貝勒一律站在撫夷廳階下等候長官驗貢完了便賞各貝勒飲酒食肉獨有這王杲不服法令他等不得長官分賞便搶上廳去搶著貢菜便吃左右的人見他來得兇惡便也不敢和他爲難他單是搶奪酒肉倒也罷了誰知他酒醉飯館便撒酒瘋對著長官拍桌大罵明朝的官吏看看他鬧得不成樣子便吩咐左右把他扶下階去一面通告建州都督下次不該再差王杲來進貢那塔克世知道王杲大膽敢當廳辱駡明朝長官以爲十分得意第二年仍舊打發王杲去進貢那王杲越發鬧得不成樣子別的貝勒看看王杲可以無禮我們爲什麽這樣呆便也個個跋扈起來明朝隆慶年間有一位長官十分有膽量他預先派了許多兵士駐紮在撫夷廳兩廂自己當廳坐著看看王杲大搖大擺地走來他是走慣了的一腳便跨上廳來只聽得兩旁兵士一聲吆喝那廳上的侍衛擎起長槍把王杲趕下廳去後來驗到王杲的馬匹又是十分瘦弱長官便把他傳上廳去呵斥了一陣退回他的馬匹也不賞米絹和酒肉王杲覺得臉上沒有光彩怏怏而回一肚子怨氣無可發泄便沿路殺人放火關外的百姓被他殺得叫苦連天明朝的總兵知道了反說長官不好奏明皇帝把長官革了職王杲知道了越發長了威氣他每到進貢的時候便帶了許多兵馬在撫順左近的地方胡鬧到了馬市散了他也不退兵常常引誘明朝的百姓到他營裏去捆綁起來要他家裏人拿十頭牛馬去贖回倘然遲了一步便要把那人殺了這時有一個撫順在客商趁著馬市的時候到清河靉陽寬甸一帶去做些買賣經過王杲的營盤被王杲拖進宮去捆綁起來他外甥裴承祖是撫順的遊擊官得了這個消息便親自到王杲營裏去求情王杲便冒他舅舅的筆迹把他哄進營去一齊捆綁起來破他的肚子挖他的心肝裴承祖帶來幾個兵士也一齊被他殺死這個消息報到總兵衙門裏總兵大怒一面奏報皇帝一麵點起兵馬準備廝殺王杲不知進退依舊是姦淫擄掠無所不爲到十月裏的時候在半夜裏忽然被明朝兵將四面圍住一支鐵甲軍直沖進營來這許多韃子兵都人不及甲馬不及鞍被他殺得屍橫遍野血流滿地王杲赤著一雙腳逃出後營爬過山頭息住腳一看足足丟了一千四百多兵士王杲知道敵不住了回家的路也被明兵攔住便打算投到蒙古去走到撫順關外見關樓上挂著榜文又畫著自己的相貌榜文上寫著捉得王杲賞銀一千兩王杲看了不由得倒抽一口冷氣只得退回舊路在深山裏躲著過了幾天王杲看看躲不住便想起那哈達萬汗王台一向是認識的如今何不找他去呢當下帶了他殘餘兵馬到哈達地方見了王台把以上情形細說一遍王台聽了便擺上酒席替他壓驚王杲見王台如此看待他心中說不出的感激當夜安睡在客帳裏正好睡的時候忽然驚醒過來見屋子裏燈火照得雪亮自己身上被十七八道麻繩綁住了動也不能動王杲大聲叫喊起來只見王台踱進帳來手裏捧著令旗口中大聲說道奉明總兵李成梁將令捉拿王杲反賊說著也不容王杲分辯上來八個大漢把王杲打入囚籠連夜送到撫順關去那總兵李成梁坐堂審問王杲也不抵賴一一招認了李成梁吩咐擺酒一面和王台在廳上吃酒一面叫劊子手動手在院子裏把王杲殺了第二天李成梁申報朝廷聖旨下來封王台爲龍虎將軍李成梁趁此把鳳凰城東面的寬甸一帶地方收服下來這王台得了明朝封號便一路上耀武揚威地回去自有許多部將前來賀喜王台在將軍府裏大擺筵宴三天各部將吃得酒醉飯飽王台在席上面吩咐部將回去整頓兵馬預備去爭城奪地這個消息傳到建州都督耳朵裏那塔克世正因明朝殺死了他右衛都督指揮使心中老大個不快活又聽到王台帶著兵馬到處攻城略地那許多小部落見王台得了明朝的封號便紛紛地投降他看看王台軍隊侵犯疆界快到甯古塔一帶地方了那甯古塔許多貝勒便一齊趕到建州地方在都督府中議起事來這六位貝勒年紀已老覺昌安又是多病一切公事都由他兒子塔克世料理會議的時候聽說王台如何強盛大家面面相視一籌莫展塔克世看了這樣子不覺歎了一口氣說道我們堂堂愛新覺羅氏的子孫空擁有這許多城池難道去抵敵一個區區的王台都抵敵不住麽正在議論的時候只聽得身後有一個人大聲喊道王台是我們世代的仇人我祖我父不可忘了大家回頭看時只見一個大漢面目黎黑衣服破碎站在屋角裏圓睜兩眼嘴裏不住地哼著原來這時候是十月天氣在關外地方雪已經下得很大這大漢身上只穿一件破碎的薄棉衣怎麽不要冷得發哼說也奇怪這塔克世一見了這大漢便拔下刀來上前去要殺他他大哥禮敦巴圖魯看見了忙上去攔住那塔克世嘴裏還是賊人畜生地罵不絕口你道這大漢是誰便是塔克世的大兒子努爾哈齊塔克世一共有五個兒子第二個兒子舒爾哈齊第三個兒子雅爾哈齊和這個努爾哈齊都是大福晉喜塔喇氏生的第四個兒子巴雅哈齊是次妻納喇氏生的第五個兒子穆爾哈齊是他小老婆生的講到納喇氏的姿色又勝過喜塔喇氏喜塔喇氏在日因爲她是大福晉自然不敢輕慢她誰知到了努爾哈齊十歲上喜塔喇氏一病病死了那納喇氏便把大福晉生的三個兒子看做眼中釘一般常常在丈夫跟前挑眼說他弟兄三人有滅她母子的心思塔克世聽了納喇氏的話自然十分火怒擎著大刀趕著努爾哈齊要殺他努爾哈齊忙去躲在他祖父覺昌安懷裏他祖父原是很愛這個大孫子的如今塔克世發怒自己又年老無力去阻止他只得含著一眶眼淚對努爾哈齊說道我的好孩子父親今天要取你的性命你快離了此地罷說著祖孫兩人摟抱著大哭一場哭夠多時覺昌安悄悄地給他些銀錢陪著他去辭別父親誰知他父親聽了納喇氏的話心中早已厭惡他弟兄三人說道你既要去便帶了你二弟三弟去走得越遠越好從此以後不要見我的面努爾哈齊無法可想只得帶了舒爾哈齊雅爾哈哈齊二人啼啼哭哭走出建州城去走到半路上弟兄三人坐下地來努爾哈齊把祖父給他的銀錢拿出來三人平均分了說道我們三人各奔前程罷倘然有一天有出山之日總不要忘記我們弟兄今天的苦處說著三人揮淚而別努爾哈齊寄住在一家獵戶家裏每天上山去采些松子掘些人參來在就近村市中叫賣後來他采的松子掘的人參一天多似一天堆積起來打聽得撫順市上這兩樣東西能賣得好價錢便向獵戶問明瞭路徑向撫順市奔去這時是初夏天氣在滿洲地方正是大雨之期傾盆似的雨點向努爾哈齊身上打來四處山水大發平地頓成澤國可憐他一個富貴子弟只因父親有了偏心弄得他有家難奔有國難投他在狂風大雨中走著早淋得似落湯雞一般好不容易走過千山萬水到了撫順市上打開布包來一看那人參松子早已腐爛得不成模樣他錢也花完了身體也走乏了真是到了山窮水盡英雄落魄之時努爾哈齊想到傷心之處不禁嚎啕大哭起來他嗓子十分洪亮只聽得四處山鳴應答這時早驚動了一個老獵戶姓關原是山東地方人十二歲時跟他父親渡海來到此處以打獵爲生他也學得一手好本領又懂得幾下拳腳今年六十四歲了追飛逐走還是十分輕健因天雨日久他便在家休息忽聽得曠野之中有人哭聲聲音又十分洪亮他知道不是一個平常人忙過去一看果然好一條大漢燕領虎頷螂腰猿臂確是位英雄他忙勸住了哭意欲邀他到自己家裏去不知努爾哈齊肯去不肯去且聽下回分解
