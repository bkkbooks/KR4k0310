body:
  text: 第七回依佟氏東床妙選救阿太西遼鏖兵卻說努爾哈齊正哭到悲傷之處忽見有人來問他他英雄末路正望人來搭救既有人問他他豈有不回答之理回心一想自己乃堂堂都督的兒子倘若老老實實說出來豈不叫父親丟臉當下他便胡謅了幾句只說自己死了父母流落他鄉那關老頭子見他可憐便拉他回家去好茶好飯看待他關老頭子家裏既沒有老小有時他上山打獵去便囑咐努爾哈齊在家好好看守門戶空下來時候就門前空地上指導他幾下拳腳努爾哈齊又生得聰明不到一年工夫所有武藝他都學會了空下來便一個人在空地上練習一回解解悶這關老頭子每天打得獐鹿狼兔也是不少他把獸肉吃了把獸皮用藤幹支繃起來趕到撫順市上去招賣努爾哈齊有時也跟著他到市上去因此也認識了許多買賣中人大家見他脾氣爽直都和他好那班買賣人大概漢人居多他們有時還邀努爾哈齊到家裏去作客因此他也知道漢人的風俗有一天一個姓佟的老頭子上市來他坐著大車在街心走一個不小心車輪子脫了軸車篷子翻過來把這個佟老頭兒罩住在車板下面他竭力掙扎著也不得脫身努爾哈齊看見了忙搶上前來拿他的寬肩膀用力向上一擡車板居然扳了過來佟老頭子也從車子底下爬出來齊聲說好這佟老頭子忙上前去拉住他的手問他的名姓關老頭子忙上去替他答了佟老頭子再三要拉他到家裏去努爾哈齊起初不好意思只拿兩隻眼睛望著關老頭子關老頭子笑笑說道這是撫順有名的佟大爺他老人家家裏有的是錢你如今跟了他老人家去落了好地方說話時候佟老頭兒已經把他拉上車去鞭子一揚車輪子滴溜溜地轉著去了原來佟姓是關外的大族便是這位佟大爺家裏也蓋很大的莊院四面圍著高梁田屋子後面一帶高山都是他的産業講到牲口單說牛馬也有四五百頭家裏雇著五七十個長工一天到晚也忙不過來努爾哈齊到了他家裏佟大爺專派他看管長工那些長工都是粗蠢如牛的一言不合便打起架來他們起初見了努爾哈齊也不把他擱在眼裏還編著歌兒嘲笑他說什麽努爾哈齊只見他來不見他去有一天有一個綽號叫做牛魔王的他坐在田旁山石子上擎著他又黑又粗的臂膀唱著這歌兒唱完了拍手大笑在田裏做活的人也和著他笑恰巧努爾哈齊從那邊走過來聽得了悄悄地走上前去舉手向牛魔王脖子上一叉又把他的粗臂膀反折過來牛魔王痛得直著嗓子只是嚷我的爹爹饒了我罷這牛魔王是他長工裏面算氣力最大的了如今也被努爾哈齊收服了這五七十個人一齊拜倒在他跟前情願拜他做師傅要他指教拳腳莊門外面原有一大片圍場努爾哈齊便天天帶著他們在田工完畢的時候在圍場上指導他們練習各種武藝打拳舞棍耍槍弄刀這工夫足足練了一個年頭大家都已領會得了努爾哈齊又常常和他們放對總沒有一個敵得過他的有一天是盛夏的時候關外風景好樹木十分茂盛許多長工在樹影下面納涼努爾哈齊遠遠地走過來有十七八個人手裏各個拿了木棍跳起來搶上前去把努爾哈齊團團圍在核心動起手來努爾哈齊不慌不忙擎著兩個空拳左右招架說也奇怪這班人想盡法子打他足足打了半個時辰也休想近得他身正打得熱鬧時候忽聽得嬌滴滴的聲音喝一聲好直鑽進努爾哈齊的耳朵裏去努爾哈齊急回頭看時只見那佟大爺笑眯眯地站在莊門外看著他身後又站著一個十七八歲的大姑娘梳著高高的髻兒擦著紅紅的粉兒從佟大爺肩頭露出半張臉兒來喝了一聲好見努爾哈齊看她她也對努爾哈齊莞爾一笑這一笑把個鐵錚錚的漢子酥了半邊他拳頭也握不緊了臂膀也擎不起來了大家見了他這個樣子都哈哈大笑上去拿著他的手拉到樹蔭下面乘涼去這時努爾哈齊好似失落了魂靈似的任你和他說什麽話他總是怔怔的不回答你大家見他不高興便也不去和他胡纏各個散去了說也好笑這努爾哈齊在樹蔭下面坐著發怔直坐到日落西山也不移動他的位子後來佟大爺出來把他們拉進屋子去吃晚飯的時候一任你和他如何說笑他總是所問非所答後來佟大爺也慢慢地有些覺得了講到這裏努爾哈齊的人才他心裏是千中萬中但是他卻有他的一番隱衷原來這撫順地方佟家雖說是大族只有這佟大爺門下人丁卻極是單簿他生了五個女兒一個兒子五個女兒早已出嫁大女兒年紀已有五十多歲最小的女兒也在三十以外一個兒子活到三十六歲上死了他媳婦只養下一個女兒今年十八歲了雖說北地胭脂卻也長得珠圓玉潤這位佟大爺卻十分寵愛這個孫女兒他在家裏性情十分暴躁便是他老夫妻的話也是要駁回的獨有這孫女兒的話卻是千依百順怎麽說怎麽好這佟大爺也懂得些漢字閒空的時候也教給孫女兒讀書寫字這孫女兒名叫春秀合家上下的人都稱呼她秀姑娘這秀姑娘不但長相齊整文墨精通而且事理又十分明白到十六歲上佟大爺便把全家的家政都交給她她外面料理由地上的出入裏面料理衣穿酒飯等閒一個漢子也是趕她不上佟大爺也竟拿她當一個孫男看待這秀姑娘脾氣生得爽直該說的地方她便不客氣當面排揎因此那五七十個長工都見了她害怕講到她的終身大事這樣一個大姑娘豈有自己不留意的她是打定主意要嫁一個英雄因爲她認識了許多漢字常常讀那些三國演義水滸傳這幾部小說這些書是她祖父從撫順市買來的她看看書上的人物何等英雄她便決心要嫁一個像孫權或是像林沖那般的英雄無奈她住在這窮鄉僻壤眼睛所看見的都是些蠢男笨漢哪里去找英雄真是千里姻緣一線牽努爾哈齊遠遠地從建州城走來了流落在撫順關外那一天他倆的見面決不是平常的自從一見以後你心中有我我心中有你便是佟大爺的心中也是有了他們兩個只是佟大爺心中有一個主意他雖說沒有兒孫卻不願承繼別房的子弟他早打算給秀姑娘招贅一個孫女婿在家裏頂他老人家的香火但是別家男孩兒都好好有父母的誰肯丟開自己家裏到這裏來呢如今看看這努爾哈齊人才出衆恰巧又是一個無家可歸的何不把他留做孫女婿豈不是一雙兩好如今看看這孩子癡得厲害這件事當然是千肯萬肯的了但不知我那孫女的意思怎麽樣我還不如趁此給他兩人見見面兒聽他們自己打交道去佟大爺的主意已定便把努爾哈齊領到內院裏和他老妻寡媳孫女兒一個個相見從此以後佟大爺留心看著秀姑娘常常找著努爾哈齊說笑去他老人家心頭一塊石子總算落地了說也奇怪努爾哈齊未曾認識秀姑娘以前原和那班長工要好大家在一塊兒有說有笑自從他認識了秀姑娘以後常常找不到他的影兒一有空閒便找秀姑娘說話去大家也不敢去驚吵他光陰如箭地過去又是一個年頭這年春末夏初關外春色到得很遲四月裏正是千紅萬紫繁花如錦的時候佟家屋子後面有一座桃樹林子桃花開得正盛有一天那牛魔王正從林子外面經過忽聽得林子裏有嬌細吃吃的笑聲定睛看時原來不是別人正是努爾哈齊在桃花樹下指導秀姑娘耍槍呢秀姑娘挺著楊柳似的腰肢擎著一支丈八長槍休想轉動分毫她丟下槍笑得喘不過氣來努爾哈齊忙上去扶住她的柳腰兒兩人對拉著手對望著臉兒呆笑牛魔王看在眼裏低低地說了一聲不好飛也似地跑到前面院子裏去把佟大爺拉了出來佟大爺不知道什麽大事來了忙跟著他匆匆跑去直跑到桃樹林子外面才站住腳牛魔王拿手指給他看佟大爺跟著手指望去不禁哈哈大笑原來這時努爾哈齊正和秀姑娘肩並肩兒坐在桃花樹下面攜著手兒說話呢牛魔王心想這佟大爺脾氣是不好惹的如今給他看見這個樣兒不知要怎麽發怒呢誰知佟大爺非但不生氣看他嘴唇一張胡髭一蹺哈哈一笑笑得眼睛成了一條縫真出於牛魔王意料之外忙一轉身一溜煙逃去了這裏佟大爺慢慢地踱進林子去他倆人見了不由得一齊低下頭去臉上羞得通紅好似脖子上壓著一副千斤擔再也擡不起頭來佟大爺走上前去一手挽著一個笑著問道你兩人已說定終身了嗎秀姑娘和努爾哈齊一齊搖搖頭佟大爺伸著簸箕一般的手在兩人肩膀上使勁拍了一下哈哈一陣子大笑說道好糊塗的孩子你們還不趕快說定了呆守著什麽一句話說得他們兩人一齊笑了起來佟大爺說道你們含羞嗎快跟我來他不由分說將他們兩人拉進內院也不問他兩人怕羞不怕羞把這情形一長二短地對母親和祖母說了又逼著他母親把這女孩兒的一頭親事答應下來拍著胸脯說倘然你答應下來我便把全份家當傳給這孫女婿把這孫女婿入贅在家裏奉養我們病老歸天這大概你也可以放心了吧他媳婦原不肯把掌上明珠嫁給一個天涯浪子聽他公公說得這樣懇切便也答應下來佟大爺便到市上去找到薩滿選了一個吉日給他兩人辦起婚事來這一天院子裏立著堂子祭天屋子裏跳著神那遠近來賀喜的不下五七百人前廳後院擠得滿滿的大家盤腿兒坐在席上吃酒割肉整整熱鬧了一天努爾哈齊和秀姑娘便在這熱鬧的時候拜了天地結了夫妻從此二人竭心盡力幫著佟大爺料理家務空下來的時候努爾哈齊教授秀姑娘幾下拳棒秀姑娘也教他認得幾個漢字又天天講三國演義水滸傳給他聽努爾哈齊聽得有味便依著書上大弄起來後來佟大爺過世了一切家裏事體由他做主他便散了家財結識許多好漢又有許多少年聽說努爾哈齊懂得拳腳的便從遠路趕來拜他做師傅後來他在撫順市上名氣愈鬧愈大那四方來的人愈多這時他入贅在佟家便改姓了佟人人叫他佟努爾哈齊他家裏竟好似一個小梁山聚集了許多英雄好漢撫順市上人人稱他佟大爺誰知道他是堂堂建州都督的兒子呢但是努爾哈齊卻時時記念他的家鄉和他的父親他結識了許多朋友原打算有一天自己承襲了父親的官爵靠這班朋友在關外地方做一番大大的事業因此他常常到撫順市上去打聽官中消息這撫順關上是有明朝總兵遊擊各衙門駐紮著努爾哈齊也和各衙門的兵士要好凡是衙門裏的情形他都打聽得仔仔細細這時候撫順關東三十裏每兩月開馬市一次馬市分官市私市兩種官市是由部落都督貝勒等派人到撫順來進貢又帶了許多馬匹來賣給明朝官廳私市是滿洲百姓和明朝百姓私自做的買賣滿人賣給漢人的大半是牛馬獸皮和人參松子等貨物漢人賣給滿人的大半是綢緞布匹鍋子行竈和種田人用的東西兩面百姓公平交易都十分和氣努爾哈齊也扮做商人帶些雜糧去賣給漢人因此便結識了許多漢人這時建州都督派來進貢的人便是王杲努爾哈爾早打聽得王杲那種跋扈情形後來果然鬧出亂子來終於給王台捉住送去給明朝殺了頭從此王台得大明朝的幫助便十分強盛起來甯古塔地方常常吃他的虧努爾哈齊雖說被父親趕出家園但是他家裏的事體仍是時刻關心的他在撫順市上打聽得一個緊要消息他便想連夜跑回建州去通報他父親知道又怕他妻子不放他去到了夜裏他夫妻兩人睡在炕上努爾哈齊便把自己家裏的情形和打聽得的消息仔仔細細地對他妻子說了春秀聽說丈夫原是建州衛都督的兒子不由得快活起來又聽說要離開她到建州去又不由得傷心起來努爾哈齊再三勸慰又說自己到了建州大事一定立刻來迎接她到建州去同享榮華共用富貴春秀心想這原是丈夫的前程大事也無可奈何夫妻兩人一早起來啼啼哭哭地分別了努爾哈齊又怕在路上有人盤詰露了破綻便穿了一身破衣服拿煤灰擦著臉扮做乞丐模樣沿路曉行夜宿千辛萬苦到了建州城裏一時又不敢去見他父親只得悄悄地在府外等候虧得那班侍衛和他好便暗暗地藏他在府裏這時各處貝勒都到府裏來了一來是請覺昌安的安二來爲王台的事大家商量了一個對付法子努爾哈齊十歲死了母親受納喇氏的虐待只那大伯母禮敦的福晉和他好不周不備的時候常在暗地裏照看他些自從努爾哈齊十九歲上被他父親趕出去以後心裏常常記挂著努爾哈齊進府以後便悄悄地看她去他伯母一見侄兒回來了快活得什麽似的又見他衣服襤樓面目黎黑便詫異起來努爾哈齊說不曾見過父親不敢改換衣服說話時候他大伯父禮敦巴圖魯也走進房來努爾哈齊便把打聽得到的消息告訴他禮敦聽了不禁嚇了一大跳原來那王台明修棧道暗渡陳倉的計策他這裏虛張聲勢要來攻打甯古塔一帶城池那邊卻暗暗地指使圖倫城主尼堪外蘭聯合明朝的甯遠伯李成梁協力攻打古埒城那古埒城主阿太意京原是覺昌安的孫女婿禮敦巴圖魯的女婿只因阿太章京是王杲的兒子王台既綁送了王杲甯遠伯又殺了王杲深怕他兒子報仇雪恨所以爲斬草除根之計非滅了這古埒城不可誰知那邊才動兵馬這邊努爾哈齊早已得了消息他想姊姊嫁了阿太章京住在古埒城裏豈不要嚇壞了他那大伯母又和他好這事又關礙著愛新覺羅的前途不淺是萬不能隱瞞的了他爲了此事便晝夜兼程跑回家來禮敦得了這個消息第一個忍耐不住他便一面叫他福晉去告訴婆婆一面帶了他侄兒出去到大廳上正是許多貝勒紛紛議論的時候塔克世一回頭見了他兒子不由得怒從心上起搶上前去恨不得一刀殺死禮敦一邊攔住了一邊把這消息一五一十地說了出來大家聽了目瞪口呆沒有一個計較處正無可奈何的時候忽聽得一片婦女的哭聲從屏後傳出來當先一個便是覺昌安的正妃嘴裏嚷道我那心肝的大孫女兒要是你們不肯去救她時待我拼著老命救她去後面塔克世的福晉納喇氏和他的庶妃還有禮敦的福晉都滿眼抹淚悲悲切切地哭著還有德世庫福晉劉闡福晉索長阿福晉色朗阿福晉寶實福晉下一輩的額爾袞福晉界堪福晉塔察篇古福晉還有許多姑娘侍女伺候著一間屋子紅紅綠綠地擠滿了女人大家想起大孫女的好來都是長籲短歎婉轉悲啼正不可分解的時候忽然府門外一匹快馬傳報龍虎將軍王台指使蘇克蘇滸河部圖倫城主尼堪外蘭爲報從前建州人殺圖倫人的仇暗暗去勾結明朝將軍甯遠伯李成梁聯合在一塊兒起了一萬兵馬去攻打古埒城和沙濟城那李成梁給尼堪外蘭令旗一面調動遼陽廣甯兩路的兵四邊包圍遼陽副將打破了沙濟城殺死了沙濟城主阿亥章京如今便和李成梁的兵合在一塊兒攻打古埒城那古埒城危在旦夕因此阿太章京打發小的到此求救說著又從身邊掏出一封大孫女求救的信來大家看了這封信急得抓耳摸腮這時可急壞老都督覺昌安他連聲大嚷備馬待我出去點齊兵馬親自去和那廝大戰一場他們道我年老不中用便這樣欺侮我的孫女我如今帶兵前去不砍下那廝的腦袋來便誓不回城說著他也不聽子弟們的勸說便大腳闊步地走出院子去了這裏他兒子塔克世見父親年老還決意要出兵打仗他知道父親的脾氣勸是勸不過來的沒奈何他只得陪了父親也親自去走一遭當下他把這意思說了家裏事暫交給大哥禮敦巴圖魯照看自己對他母親妻子說了一聲去了便追出門去找到他父親一塊兒出了城到校場點齊兵馬浩浩蕩蕩殺奔古埒城來這時古埒城外大兵雲集正北上是李成梁的部隊正西上是遼陽副將的部隊正北上是龍虎將軍王台的部隊正東上是尼堪外蘭的部隊四面圍得鐵桶相似覺昌安的兵隊一時裏也插不進腳去但是覺昌安救孫女兒的性命要緊不住地督促兵馬前進看看敵人已在眼前一聲號令兩面齊動起手來一面以多敵少以逸待勞戰不到一個時辰覺昌安早已大敗下去退回三十裏才得紮住營盤覺昌安獨坐在中軍帳中心中悶悶不樂忽見那塔克世走進帳來坐下說道論起今天的一仗原是我父親太冒失了些覺昌安問道怎麽見得是我冒失呢塔克世說道我們帶了四千多人馬從遠路跑來腳也不曾停一停便和他們開仗他們四路兵馬共有一萬多人又是得勝之軍養息了多時兵強馬壯我們怎的不吃虧如今依孩兒的愚見倒有一條計策在此覺昌安忙問什麽計策塔克世說道講到那尼堪外蘭原是我們遠邊的人只因從前我們殺圖倫地方的人殺得太厲害如今他們要報這個仇想來尼堪外蘭也無非貪圖多得幾座城池如今我們打發人到圖倫營裏去下一封書把尼堪外蘭請來和他進一個交情說把古埒城讓給他以求他們饒了阿太章京夫妻兩人的性命一面暗地裏買通阿太手下的兵士俟尼堪外蘭進城來便捉住了殺死他明朝的兵見沒了引路的人自然也不敢進兵那時我們再裏應外合打退王台的兵隊再請明朝加我們的封號豈不大妙覺昌安聽了也連聲說妙父子正在商議的時候忽然外面報說圖倫城主尼堪外蘭親自到來求見現在營門外守候著不知覺昌安肯不肯見他且聽下回分解
