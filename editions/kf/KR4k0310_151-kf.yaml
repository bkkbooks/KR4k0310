body:
  text: 第一百十一回王司徒樽前收義女呂奉先馬上拜幹爺話說張飛見督郵藐視他們不禁將一股無名業火高舉三千丈按捺不下大聲說道什麽臭賊敢來藐視老爺們俺且去將他一顆狗頭揪下來再作道理他說罷霍地站起來就要行動劉備忙來一把拉住說道你又來亂動了他沒有道理他是個朝廷的命官我們怎好去和他尋隙呢張飛答道兄長你無論遇到什麽事情一味軟弱將來還能幹大事麽這個狗頭讓我且去打殺他看誰敢來和我要人劉備道兄弟凡事都要三思而後行萬不可粗魯從事任我們的性子直要去將他打殺無奈我們究竟寄人籬下他是上司看不起他賽過看不起朝廷張飛大聲說道這個區區的縣尉誰希罕呢我們就是不做也不致使這班賊子小視了雲長說道兄弟你不要性急大哥自有道理也用不著你去亂動好做也不做不好做也不做誰也不敢來強迫我們如果依你這樣暴力豈不要鬧出亂子來麽張飛被他們兩個勸著只得將一股火暫按在小腹下面事又湊巧不一會劉備到校場裏閱兵雲長又在後面閱史張飛見得著這個空子一溜煙跑到館驛門口守門的兩個士卒認得是縣尉的義弟便問他道張爺爺到這裏有什麽事的他道那督郵在這裏麽那守門的答道在後面你尋他敢是有什麽事嗎他道有一些兒小事他道煩你等一會讓我進去通報一聲張飛道無須通報我就進去罷他忙道不可不可你難道不曉得規矩麽他大怒放開霹靂喉嚨說道我不曉得什麽鳥規矩俺今天偏不要你通報那兩個守門的見他動了怒早就嚇得矮了半截忙道好極好極張爺爺自己不要我們通報也省得我們少跑一趟腿子張飛也不答話翻起環眼朝他瞅了一下子那兩個守門的忙嚇得將頭低下好似泥塑木雕的一樣連大氣也不敢喘一下子他大踏步走到大廳面前的天井裏只見那督郵正擁著兩個美人在那裏飲酒縱樂張飛見了不禁怒氣衝天走進大廳仔細一瞧那兩個美人兒不是別人卻就是安喜縣令的兩個寵妾他見了格外火上加油一聲大喝道呔你這齷齪害民的賊今天落到爺爺的手裏要想活命除非再世那個督郵偎著兩個天仙似的美人兒正在那裏消受溫柔滋味不料憑空跳進一隻沒毛的大蟲來他如何不怕還仗著膽大聲喝道何處的野人膽敢闖了進來手下人快快給我捆起來他說罷滿指望有人給他動手呢誰知那些親兵見了張飛那一種可怕的樣子好似黑煞神似的早已軟了誰也不敢出來和他響一句這時督郵見勢頭不對忙將兩個美人推開要走張飛哪肯容情大三步小兩步地趕到他的身邊伸手將他揪住好像摔小雞似的不費吹灰之力將他按在地上揮拳罵道你這雜種狗眼看人低居然自高自大目無下士今天落到爺爺的手裏直打殺你看你這個雜種的臭架子搭不搭了他一面打一面罵打得那個督郵怪叫如豬這時劉備已經從操場裏回來到了自己館驛裏不見了張飛忙問雲長道三弟到哪里去了雲長道未曾看見劉備頓足道准是去闖禍了他說罷忙與雲長到了督郵的館驛門口就聽得裏面吵成一片鬧成一團只聽張飛的聲音直嚷著害民賊狗頭劉備忙與雲長趕到裏面只見那個督郵被其按在地下揮著拳頭如雨點一樣直打得那督郵一佛世出二佛升天發昏章第十一劉備大聲喊道三弟快快住手休要亂動那督郵見他來了在地下說道好好好劉縣尉你膽敢目無王法派人毆打朝廷的命官劉備起首見他打得可憐倒喝住張飛及至聽他這兩句話不禁又氣又忿又好笑便冷冷地答道不錯人是我派的督郵有什麽威風只管擺出來橫豎我們已經無禮了自古道除死無大病討飯再不窮大不過督郵去啓奏萬歲將我斬首罷了其餘大約再沒有厲害來嚇我了那督郵聽他這些話便道只要你們不怕死就是了張飛聽見劉備講出這番話來愈加起勁便霍地將他從地上抓起直向後面而來出了後門就是一座大空場他將督郵往柳樹上一縛舉起皮鞭著力痛打這時早有人去報與安喜縣令他聽得這個消息吃驚不小忙趕到館驛裏面只見大廳桌椅掀翻碗破杯碎一塌糊塗一個也不見了他忙向後邊尋來走到腰門口瞥見一個小廝蹲在樓梯的肚裏正自在那裏探頭探腦地張望他忙向他問道你可看見他們到哪里去了那小廝忙道到後面去了他連忙向後尋來還未曾走到後門口就聽見吵鬧的聲音他出了後門只見督郵被張飛綁在樹上正在用鞭著力痛打打得那督郵皮開肉破滿口求饒不止安喜縣令曉得他的厲害不敢去碰釘子瞥見劉備與關羽也站在旁邊卻袖手不動任他去毒打他不由暗暗地疑惑道張飛素來是個暴戾的人劉關兩個待人彬彬有禮今天不知何故任他去呢他便走到劉備的身邊滿臉堆下笑來說道劉縣尉你今天何故隨你們三弟去亂闖禍呢他是朝廷的命官豈可任意辱打萬一被朝廷知道豈不要誅夷九族麽劉備微微地笑道這事一人能做一人能當用不著貴縣來擔憂這時候卻巧張飛一轉身見安喜縣令來了不禁用鞭梢向他一指罵道我把你這個不知羞恥的狗官忍心害理將自己的妻妾送給別人去開心不怕被後世萬人唾駡麽他這兩句罵得安喜縣令滿面慚愧得無地可入劉備對他冷笑一聲說道貴縣真會孝敬上司竟捨得將尊夫人如夫人送給別人我們不可不佩服呢安喜縣令聽得張口結舌一句話也說不出來面如血潑這時那督郵被張飛打得滿口哀告劉備道玄德公千萬要望救我一條狗命下次革面自新永遠不忘你老的教訓了劉備見他被打得體無完膚滿口軟話不禁將心軟了便在懷中取出自己的印綬走到督郵的身邊將張飛止住對督郵笑道煩你將這個勞什子帶與官家罷俺弟兄也不願幹了他說著便與關張奔回館驛收拾上馬出城而去這一去真個龍歸大海虎入深山到後來收了五虎將請出臥龍十年沙場爭得三分天下有其一定鼎西川名爲蜀漢這些事史家自有交代不在小於這部書的範圍之內只好從略了再表葛巧蘇被歹人騙入火坑起首鴇母強迫她出來應酬客人她抵死不從鴇母龜頭肆意毒打慘無人道的酷刑差不多都用遍了無奈她心如鐵石任你如何去壓逼她只是不從鴇母無法只得用哄騙的手段來哄騙她教她只做一個歌妓不賣皮肉她究竟是一個弱小的女子怎禁得起這萬惡的老鴇來嚇詐哄騙呢而且那些毒刑委實又難熬萬般無法只得順從了鴇母見她答應了不勝歡喜便問她的名姓她只說我是個無依無靠的孤鬼兒一出世就沒有父母了鴇母便替她起了一個芳名叫做貂蟬一時長安城中的一班輕薄子弟涎著她的顔色不惜千金召來侑酒未上一年她的芳名大震在京都的一班官僚子弟差不多沒有一個不知道她的豔名都爭先恐後地召來她的侑酒一個貂蟬哪里能夠來應酬這許多主顧呢這鴇母見她的芳名日盛一日顧客逐日增加看著有應接不暇之勢便想出一個金蟬脫殼的計來如果是遠道慕名來的狎客便在衆妓女中挑選出一個面貌與貂蟬相仿的出來做冒牌生意行了半年果然人不知鬼不見的被她們瞞過去了鴇母好不歡喜將她幾乎當著活觀音侍奉一切飲食起居都是窮極珍貴但是她的芳名愈噪愈遠許昌長安各大都會的豪家子弟都聞風趕到洛陽以冀與玉人一晤鴇母見遠來的狎客有增無減從前一個假貂蟬還可以敷衍誰知到了現在竟又忙得不夠應酬了便索性又選出兩個來一個假貂蟬給她們一個房間都是簾幕深沈來一個狎客都由娘姨引到她們的房間那遠來的瘟生用了許多的冤枉錢還不曉得回去逢人便道我與貂蟬吃過酒的我與貂蟬住過夜的誇得震天價響聽的人也十分妒羨其實何嘗見過貂蟬一面呢還記得長安城裏有兩個書呆子一個名字叫李桑一個叫做郭靜他們每每在街頭巷尾宴前席上茶餘酒後隨時隨地都聽見人家說起貂蟬如何美麗如何俊俏說得他們心中好似十五個吊桶打水七上八下決意要到洛陽城裏去觀光觀光有一天李桑便對郭靜道老兄我們聽得人家隨地隨時地談著洛陽城裏有一個歌妓名喚貂蟬生得花容月貌品若天仙兄弟佩慕已久現在值此春光明媚我們何不到洛陽城裏去玩上一兩天一則是去領略貂蟬的顔色二則也好先去見識見識帝王的京都未知你的意下如何郭靜聽他這話不禁將屁股一拍笑道老兄你真知道我的心事我這兩天不瞞你說聽人家說得天花亂墜連飯都吃不下急要到洛陽去一走你既要去那卻再好沒有我們就動身罷李桑道人說你呆你卻真有些二百五到洛陽去一個盤纏不帶就急得什麽似的要動身了豈不知貂蟬的身價麽她與人接談一會紋銀五十兩有一席酒紋銀百兩住一夜紋銀三百兩赤手空拳的就想去了麽你也未免太孟浪了他聽說這話才恍然大悟道不是你說我幾乎忘了既如此我們去一趟不知需多少銀子呢李桑道如其住宿八百兩或是一千兩差不多夠了他翻了一回白眼忙道容易好在我們家裏有的是銀子讓我回去偷就是了他說罷匆匆地走了不多會只見他跟著一個推車的漢子遠遠而來李桑也命家人裝了八百兩和郭靜一齊動身到了京城之內四處尋訪好容易才訪到貂蟬的住址他們便到貂蟬住的一所含香院門口停下車子這裏面的人見他兩個犬頭犬腦的在門口探望便出來問道兀的那個漢子在這裏探望什麽李桑忙答道我們是來訪你家的貂蟬小姐的他們見主顧上門當然竭誠招待將他請進去不消三天將他們所帶的一千六百兩銀子一齊鑽到老鴇的腰裏去了床頭金盡壯士無顔只得出了含香院幸喜遇見了一個熟人將他們兩個帶了回去他們到了家還不勝榮幸的逢人便道我們去和貂蟬開過心了說也冤枉真貂蟬一根汗毛都沒有撈得著他們過了幾天李桑忽然觸起疑來便向郭靜問道老兄你到京城裏去和誰尋開心的郭靜笑道這個還問什麽呢自然是貂蟬了你呢李桑詫異道這真奇了你是貂蟬我不是貂蟬麽這貂蟬還有分身法麽你那貂蟬是個什麽樣子呢他道我那貂蟬長容臉兒小鼻子你呢李桑拍著屁股直嚷晦氣郭靜道得與貂蟬共枕席還不是幸事麽這又有什麽晦氣呢他道不要說吧我們上了人家的當了不說他們在這裏懊悔再表京都中有一位大臣姓王名允官居大司徒之職爲人精明強幹剛毅正直這天他正逢五十大慶滿朝的文武都來賀壽真個是賓客盈門笙曲聒耳衆大臣有的送金牌有的送萬名傘有的送匾額獨有諫議大夫盧植別出心裁當席飛箋將洛陽城裏所有的名花一齊征來與諸大臣清歌侑酒一時箏琶激越笙管嗷嘈粉黛門嬌裙屐相錯十分熱鬧衆大臣又請壽星出來坐在首席王允推辭不了只得到一席上坐下盧植便命貂蟬來侑酒王允一見貂蟬就生出一種憐惜之意便向她問道你這女孩子姓什麽哪里的人氏爲著什麽緣故要入娼門呢貂蟬見上席滿臉慈祥的老頭兒向她問話她便知這人一定是朝中的大臣但是她卻不肯將自己的真姓字說了出來含糊著應酬兩句一陣心酸止不住粉腮落淚王允對人說道這個女孩子怪可憐的在娼門中不知受了多少苦楚呢貂蟬趁勢將自己如何受鴇母龜頭的虐待細細地說了一番王允不禁勃然大怒道這些東西簡直是慘無人道了誰家沒有兒女呢竟能這樣地虐待人家麽衆大臣聽得便一齊說道何不將這含香院的老鴇捉來問罪呢王允忙搖手道那倒不必把他們趕出京都不准他再在京城裏營業就是了他說罷早有人去將含香院的龜頭鴇母趕出京都這龜頭鴇母腰纏壘壘也落得趁勢就走還肯停留麽騰雲價地不知去向了這裏王允將含香院其餘的妓女完全遣發回籍只留下貂蟬一飲一食均皆極其優渥所行所爲儼同義父貂蟬感遇知恩亦默認他爲義父了再說那異丐離了高頭村追蹤尋迹一直尋了二年多的日腳才到河內哪里見有她的一些影子呢他到了河內之後人生地疏連討飯都沒處去討只得忍饑受餓而且黃巾賊日夕數驚將一班居民嚇得家家閉戶人人膽寒連出來探頭都不敢探一下子這異丐見此情形料知此地難以久留便想別處去廝混他又怕葛巧蘇在未來的這一隊黃巾裏面所以他進退的計劃尚在猶疑之間過了幾天那黃賊到河內的消息越發來緊張了他心中打著主意道這班賊子來時必走東門外阜邱崗經過的我何不到阜邱崗去候著呢他打定了主意徑到阜邱崗下到幾家居民門口討了些殘肴面飯吃得一個飽便到崗上尋了一個睡覺的去處一探身睡下不一會鼾聲如雷地睡著了隔了多時一陣鼓角呐喊的聲音將他從夢中驚醒霍地一頭跳起揉開睡眼一望只見殘月在天星光慘澹將近三更的時分了那一片呐喊的聲卻在崗的右面他趁著月光尋路下崗才轉過了兩個峰頭瞥見西邊火光燭天呐喊廝殺的聲音攪成一片他逆料著一定是黃巾賊到了他便不怠慢飛奔下關跑到戰場附近只見那些黃巾賊正和著無數的官兵在那裏舍死忘生地惡鬥不止他見了這班黃巾賊不由得眼中冒火空著雙手搶了上去那班黃巾賊連忙各揮兵刃過來將他團團圍住他卻分毫不怯覰准那個使刀的飛起一腿將他打倒他順手就抓起他的雙腿飛舞起來當著傢夥使用只打得那一班鳥男女走投無路紛紛四散各自逃命這時忽然有一個賊將持著方天戟躍馬來取異丐異丐對著黃巾賊相迎未上三合那員賊將竟被他打下馬來他奪了賊將的馬戟越發如虎添翼東沖西突如入無人之境原來領兵和賊兵鏖戰的首領卻是前將軍董卓派來的猛武都尉丁原他和賊兵鏖戰多時看看不支瞥見一將躍馬持戟在陣裏橫衝直撞真有萬夫不當之勇不禁暗暗納罕但見他馬到處肉血橫飛肢骸亂舞將一班鳥男女直殺得叫苦連天躲避不叠到了四鼓的時候黃巾賊死傷大半只得引衆竄去丁原好不歡喜忙拍馬到異丐跟前拱手問道將軍尊姓大名寶鄉何處望乞示知下官好按功上奏朝廷不敢埋沒大勳那異丐便說出一番話來這正是慢道風塵無豪傑須知草莽有英雄要知後事如何且看下回分解
