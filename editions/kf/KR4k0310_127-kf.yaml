body:
  text: 第八十七回過名山狹途逢勁敵宿古寺隔院聽奇聲卻說瑪麗重新殺入陣去但見她在番兵陣裏東沖西突如入無人之境馬到處屍血橫飛刀來時肢骸重疊將那些番兵殺得膽裂魂飛只恨爹娘將腿生得短一節沒命地四散奔逃她在馬上一面殺一面留神向四下裏觀察瞥見一個賊將手執鬼頭刀押著林英吆吆喝喝地直向大營而去她把馬一拍趕了過來大喝一聲那番將措手不及被她一刀砍死在地下她趕散了番兵正要來替林英解縛猛聽得金鼓大震一隊番兵從斜次裏沖了出來她恐將林英傷了趕快飛身下馬將林英就地抓起也不及解捆帶上了馬這時一聲呼哨萬箭如雨她連忙將刀舉起來隔箭說時遲那時快粉臂上早已著了三箭她咬一咬銀牙飛馬來取那爲首的番將那番將嚇得回頭飛也似地逃走了她也不去追趕回到自己的營中將林英放下來親手替他解去捆縛林英這時又是羞愧又是感激偷眼見她咬著牙關將粉臂上的三枝箭拔了下來那一股鮮血殷殷地淌個不止林英到這時也顧不得什麽羞恥了情不自禁地拔出寶劍來將自己的袍襟割下一塊走到她的身邊替她重重地裹起這時胡明蘇比見她沖入番陣隨後揮動大兵掩殺過來這一陣殺得番兵屍橫遍野血流成渠大吃敗仗胡明等殺到分際才收兵回營見林英好好地回來好不歡喜她從後帳裏出來因爲血淌得太多了臉上雪白星眼少神蘇比等問了個究竟才知道臂中三箭大家不勝歎服再說那比保的營中兩個首領均被瑪麗一陣殺了不禁人人膽戰個個心寒不由得四散逃竄有兩個小酋長料知也約束不住無法可施只得引兵來歸降蘇比便將他們發放了回來將失去的土地收了轉來這才奏凱而還國王見他們得勝回國喜不自禁忙命人擺駕迎出波斯城外蔡諳見胡林二將安安穩穩地回來真個是舉手向天深自慶慰蘇比便將戰事大概情形告訴與白爾部達白爾部達滿口誇讚瑪麗便對國王嘰咕兩句國王哈哈大笑道好好好就是這樣辦法他說罷掉過頭來又朝蘇比說道道引前天孤家托你的那件事可曾替我轉達到麽蘇比道前天因爲軍事匆忙未曾有空來提起這事微臣極力撮合便了國王大喜又賞了胡林二將兩尊金佛一串菩提子三百斤白金林胡忙將佛收下其餘一概不收蘇比和他們回到館驛之內便對蔡諳說道如今公主瑪麗非要嫁給林將軍不可你看這事怎樣呢蔡諳皺眉道這事委實太難一來他已有了妻子二來他的性子和霹靂一樣別人不能多一句話我卻不好再去開口了胡明笑道此番你們一說就得成功的蔡諳不解他是什麽用意蘇比聽得他這話猛的省悟道不錯不錯他此番不虧她將他從萬軍陣中救出來恐怕早就送了性命咧我們就去說他們便一齊走到林英的房裏蘇比首先開口向林英說道林將軍我此番卻認真來討媒做了方才國王令我和將軍說起將瑪麗公主許于將軍未知將軍究竟是允許與否呢林英此番因爲她冒險將他救了出來情意實在令人佩服所愁的言語不通縱然她貌美如仙結合之後鎮日價不能交通一語有什麽樂趣呢他躊躇不決的只是發愣蘇比見他默默的一聲不作倒不像前番那樣的一百二十個不要了便料到已經有八分認可了蘇比連珠似地催道將軍你素來不是一個最爽直的麽今天爲何竟自這樣吞吞吐吐的呢答應與否請快點回我們一聲是是否否我們也好就去複命了催了半天林英才說道公主的盛情我林英也不是個不解事的焉能不知呢但是我生長東土她偏生西域言語不通這是一個難題再則我已早有妻室公主此番定要和我配合還算是嫡還算是庶呢蘇比哈哈大笑道我當是什麽難解的事呢原來是這兩樁啊容易容易請不要猶豫她既然和你成了夫婦之後食同桌寢同床不消兩個月言語包管懂了至於她是第二個嫁給你的名目上當不能僭居嫡位不過應付敷衍完全在你的手段罷了只要她們兩個能安安逸逸地隨你度日子就得了管她娘什麽嫡的庶的蔡諳也插口勸解他一回他也就承認了蘇比忙去告訴國王國王不勝欣喜忙命人安排結婚的儀節擇了一個吉日便行結婚禮屆時一番熱鬧自不必說可是這瑪麗自從和他結婚之後百依百順的而且她天生的聰明不上半月漢家的言語不獨完全懂得並且能朗朗地脫口說出來沒一些番音林英好不歡喜光陰似箭轉眼又過了一個月蔡諳日日盼望潛于大師一直等了兩個多月一些音耗也沒有心中好不焦急那一天正在館驛中發愁只見蘇比跑進來對他笑道恭喜恭喜潛于大師已經到了蔡諳聽了喜出望外忙和蘇比一同迎了出來只見門外兩匹白馬背上完全馱著真經潛于大師見了蔡諳打了一個問詢蔡諳連忙答禮蘇比又與他握手道苦潛于大師父便對蘇比說道我此番卻不能隨諸位到上國去觀光了蘇比忙問怎的他道我的師父現在正著作迦楞真經要我參劾故沒有機會去了蘇比點頭稱是便命人淨手齋戒將真經搬了進來潛于與蘇比蔡諳等上殿參拜國王白爾部達又向他頂禮問勞潛于大師便對國王說道貧僧師命在身不敢久於逗留有緣再會吧他說罷打了一個稽首飄然而去蔡諳慌忙頂禮相送潛于走後蔡諳便對蘇比說道我們出國已稽延有八月之久萬不能再爲耽擱了難得潛于大師發慈悲替不才等將真經取來現在也好回去了蘇比忙道是極是極我就替你翻譯他說著便回過頭來對著國王將他的一番話翻譯明白國王稱是蘇比忙去到館驛裏替他點查真經放開黃包袱一看只見裏面放著大乘經五千部小乘經八千部金剛經三千部觀音經五千部彌陀經五千部嚴楞經三千部寶藏真經三千部八佛像百楨共打了八個黃包袱蘇比又將他們的馬匹行李收拾停當林英便向瑪麗道公主還是隨某回漢還是留在本國一切均由公主自行裁奪某不敢擅自作主瑪麗忙答道郎君哪里話來奴家不嫁給你便罷既然嫁給了你當然是你的人了焉有留在本國的道理林英道公主既然情願隨小子一同回漢那是再好沒有了他說罷便對蔡諳說個明白蔡諳聽說她隨林英歸漢自是歡喜忙用胡明等一齊上朝告別國王見他的妹子也跟隨他們歸漢也不好阻攔免不得又多一番叮囑臨走的時候不無生離死別都有些傷感的瑪麗卻一毫沒有惜別的樣子歡歡喜喜地到各處去告辭最後國王向她問道賢妹此番歸漢幾時才能回國來敘敘呢瑪麗很爽地忙答道多在三年少則二載總要回來探望的國王領著衆大臣一直將他們送出東門蔡諳屢次請他轉駕國王才轉道回宮惟有蘇比又將他們送了一程蔡諳再三阻止向他問道蘇兄仁義過天小弟此番到這裏多蒙照拂銘感難忘不知何時才能酬報大德哩但是久客異鄉終非長策未卜幾時倦遊而返呢蘇比聽了他這番話不禁觸動思鄉之感眼眶一紅流下淚來默默的半晌才答道回鄉這層不過隨遇機緣罷了豈能注定呢而且千山萬水實非易事蔡諳聽他這番話便知道他不願回去了卻也不便再說只得請他回去蘇比才放馬怏怏地回去蔡諳等馬上加鞭歸心似箭在路行程已非一日韶光逝水不知不覺地又到一個多月了那天蔡諳用鞭梢向前一指問道林將軍那前邊黑暗暗的不是一座山頭麽林英擡頭一望忙道是的我看這座山好像昆侖山的樣子蔡諳驚喜著說道照這樣說來馬上就進了中原的境界了林英道如果的確是昆侖山山腳下自然是中原的境界了他們一面談著一面策馬飛也似地趕了過來不多一時已離昆侖山只有半裏之遙了只見道旁有許多人在那裏驅逐駱駝林英笑道有八成是昆侖山了我常聽人家說昆侖山下産生野駝專吃田間的五穀那邊不是許多人在那裏趕逐駱駝麽蔡諳擡頭一看不禁大喜說道可不是麽不要講別的你看那些人誰不是穿著中原的衣服呢大家說著已到山根腳下只見那些牛皮的帳篷搭得一個靠住一個胡明嚷道自從上路以來晦他娘的一氣一頓飽飯也沒有吃過林英笑道用不著埋怨了瞎子磨刀望見亮了快要到家了頂多再挨一個月餓罷了他說著下了馬尋了一家酒店大家吃了一個飽安息一宵次日清晨用了些點心便又登程這時正當五月裏的時候只見這昆侖山上樹木連雲蟬聲雜噪野花含笑怪石點頭蔡諳在馬上不禁心暢神怡回頭說道究竟還是我們中原的景致來得美麗不似那國外的景致黑水白山到處現出一種可怖的形象來林英道怎麽不是我們在波斯國裏足足住了兩個多月絕不高興出去閒逛因爲見了異鄉的風景反而觸起思鄉之念不如不見爲佳他們在馬背上談談說說不覺已經進了山麓蔡諳見兩邊的山崖峻險忙對他們說道此地非常孤險大家千萬要小心防備這句話還未說完猛可裏一陣鑼聲從深林裏擁出一隊強徒一式的紅巾抹額各執刀槍攔住去路把個蔡諳嚇得面如土色險些兒撞下馬來林英忙拔寶劍對蔡諳道中郎休要驚怕諒這幾個小毛賊何足爲患話聲未了胡明早已拍馬懸錘飛也似地沖到那一隊強徒的面前揚聲問道你們這幾個牛子在這裏攔住老子的去路意欲何爲那些強徒一齊高聲大叫道怕死的趕緊丟下買路錢來胡明聽得這話不由得哈哈大笑道好賊崽子你們要向老子討買路錢麽我倒肯就是有兩個夥計不肯那些強盜聽他這話連忙問道你的夥計在什麽地方叫他出來和我們較量較量胡林將大錘一揮向他們笑道你看這就是我的夥計你們如果不服氣先送個榜樣與你們看看他說罷蕩起在錘向右邊一塊磕頭石上就是一下子這時猛聽得砰然一聲那塊石頭被他擊得火星四射登時粉碎那幾個強盜見了只嚇得倒抽了一口冷氣抱著頭沒命地逃去了胡明也不來追趕帶轉馬頭徑向蔡諳這裏而來走到蔡諳的面前笑道方才那幾個牛子只消一錘就嚇得膽裂魂飛地逃了這樣的膿包還要來做劫路的豈不笑倒人麽林英道你不要這樣說還防他們有大批的羽黨呢胡明笑道用不著你們過慮了我說他們不敢再來尋死的了林英搖頭答道不見得不見得說著又走了一程漸漸地到了山崖之上一片平坡一眼望去足有數十裏之遙林英笑道到了這裏可用不著再來顧慮了憑他是千軍萬馬也好突進去殺個暢快蔡諳定了一定神對林英道還是小心一點爲佳不要碰見了在批強盜人衆我寡倒不能就說沒有顧慮呢他剛剛將這句話說完了猛聽得後面喊聲大起蔡諳好像驚弓之鳥一樣的無處可藏身體林英回頭一看只見一大隊紅頭巾的強盜爲首兩個騎著高頭大馬頭抹紅巾一個操槍一個提著獨腳銅人穿雲閃電般追了近來林英忙向胡明說道你保著中郎先自前行這裏有我和她呢瑪麗勒馬橫刀等候廝殺胡明保住蔡諳先向東而去霎時那一大隊強盜趕到面前那個虯髯大眼的強盜一舉獨腳銅人闖了過來厲聲罵道不怕死的牛子膽敢從我們山上經過還敢口出浪言可知道咱家的厲害麽識時務的趕緊留下買路錢來如有半字不肯咱老子銅人一動管教你立刻到閻王那裏去交賬瑪麗把馬一夾飛入垓心也不打話揮刀就砍那強盜舉起銅人接住他兩個一沖一撞大戰了八十多回合那個使槍的長嘯一聲搶到垓心擺動長槍正要助戰林英見此情形更不能耐將馬一拍那馬雙耳一豎直沖過來接住那使槍的賊將四個翻翻滾滾地大戰了一百餘合不見勝負瑪麗殺得性起將刀一橫霍地平砍過來那使銅人的大漢趕緊將頭一低讓過她一刀說時遲那時快頭上的紅巾已經被她削去了半截那個賊將嚇得魂落膽飛一轉馬頭就想逃走她哪里肯舍拍馬追上長嘯一聲刀光飛處那賊將的首級骨碌骨碌地向草地上滾去一衆的強盜嚇得回頭就走那個使槍的賊將見那個使銅人的被她斬去心中一慌被林英一槍刺下馬來瑪麗還要去趕殺賊兵林英忙喊道賢妻窮寇莫追由他們去罷瑪麗才收馬回來二人並馬來趕胡蔡二人不多時已經趕上只見蔡諳面無人色在馬身上只是亂戰林英忙對他喊道中郎請不要怕了那兩個賊崽子已經被我們結果了蔡諳見他們好好地趕來心中才將一塊石頭推去滿臉堆下笑容來問道那兩個凶神似的強盜果然被你們殺了麽林英笑道不將他們殺了我們就能好好地來麽四人又攆了一程看看天色已晚林英道這可失算了在這山上到何處去尋息宿之處呢蔡諳道我們且走去看如有人家更好實在沒有我們就行了一夜也不妨事的林英點頭道好正是說話之時猛聽鐘聲當當鼓聲咚咚胡明道好了這不是鐘鼓的聲音麽一定有什麽寺院在此我們且去尋尋看四人趁著這鐘聲一路尋來不多時到了一座古廟的門口蔡諳迎著月光細細地一看只見上面有三個大金宇亮灼灼的乃是停雲寺三個字胡明便下馬上前敲門不多時門開了走出一個小喇嘛來向他們一看縮頭就要關門被胡明一把將他扯住那小喇嘛嚇得撲通往下一跪滿口哀告道大王爺爺你們請到別處去發財罷我們這裏是座窮廟收入幾個錢還不夠吃飯的呢胡明聽他這話不禁嗤地笑道扯你娘的什麽淡咱老子又不是劫路的大王是來向你們這裏借宿的那個小喇嘛聽說這話一骨碌從地上爬起來沒口地答應道有有有請爹爹放手讓我進去問一問我家師父胡明便將他放了小喇嘛狗顛屁股地跑了進去不多一刻他又從裏面跳了出來忙道不行不行我家師父說的我們這裏是清靜的佛地不能供往來過客住宿的蔡諳道小和尚煩你再進去與你家師父說我們是漢帝駕下的大臣從天竺國剛剛將真經求回來的走到這裏向他借宿一夜那小喇嘛趕著又跑了進去沒多時從裏面對他們說道請你們進來罷我們師父已經答應了蔡諳等稱謝不盡隨著那個小和尚進了中殿那小和尚用手向東邊的耳房一指道我家師父吩咐的請你們就到耳房去安息罷蔡諳等進了耳房只見裏面陳設著不少的床鋪他四人各尋一個床鋪安身睡下林英睡的一張床貼著北邊的牆他正要入夢猛聽得一陣陣奇怪的聲音傳到他的耳朵裏這正是隔牆原有耳窗外豈無人要知後事如何且看下回分解
