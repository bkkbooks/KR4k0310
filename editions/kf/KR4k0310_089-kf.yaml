body:
  text: 第八十九回寇太監殿前盡忠節遊浪子書館驚寵遇卻說光緒帝被李蓮英等一班內監蜂擁著到了瀛台李蓮英說道請陛下在這裏稍待片刻奴才還要侍候太后去哩說著便和內監等一哄地去了當下光緒帝獨自坐在瀛台聽候太后的旨意且說這天清晨太后傳旨臨朝殿上鐘鼓齊鳴滿漢大臣紛紛入朝猛見上面坐的不是德宗皇上卻換了西太后了不覺齊齊地吃了一驚正在摸不著頭腦只見西太后滿臉怒氣厲聲問道皇上寵用康有爲等私下詔書叫袁世凱秘密謀俺你們衆臣可曾知道沒有這一問嚇得滿漢大臣各低著頭一句也不敢回奏西太后便冷笑了一聲道虧你們食君之祿忠君之事卻都是這般屍位其職連如此的大事也沒有得知真是枉受爵祿之榮將來怕咱們的江山給人占去了你們也不曾覺察呢衆臣聽了西太后的責詰都默默不語的十分慚愧正在這當兒恰巧剛毅入奏搜捕康黨事已了主腦康有爲梁啓超二人已聞風逃脫只有譚嗣同楊深秀林旭楊銳劉光第康廣仁等六人就獲西太后見奏傳旨將六人綁赴西市斬首剛毅領旨即傳侍衛等擁著六人望西市去了可憐這六人便是世傳的六君子這真是功名未遂身先死長使英雄淚滿襟後人有詞歎那六君子道滿清至斯國運剝牝雞司晨家之索曩昔武後是前車婦人當國亡此祚窮奢極欲世所稀一朝平地風波起車馬連夜馳入宮警騎傳呼出禁中昨夜猶草討賊檄今朝成就冤臣獄可憐刑曹頒懿旨血染朝衣戳西市忠魂夜夜泣黃沙但願稚兒蒙恩赦誰知君王尚不免終身留得瀛台恨嗟嗟受戮六卿皆丈夫甘爲孤君擲頭顱西太后既斬了六君子又命警騎追捕康梁並頒詔通緝內外將滿朝諸臣大大地偵查了一番凡平素和康黨往來或曾上折贊襄新政的一概懲辦當時被累及的大臣革職的有陳寶箴李岳瑞宋伯魯吳懋鼎張百熙端方徐建寅徐仁鑄徐仁鏡等遣戍的有李端棻張蔭桓等監禁的有徐致靜陳立三江標熊希齡等逮捕抄家的有文廷式王照黃遵憲等一時滿漢大臣紛紛降調有差又把懷塔布剛毅許應騤曾廣漢徐會澧等重新起復原職各加三級趙舒翹擢入軍機處授榮祿爲軍機大臣袁世凱擢山東巡撫裕祿調署直隸總督翁同和削去官爵種種佈置既畢西太后余怒未息便到瀛台來處治皇上這時光緒帝已和木偶一般呆呆地坐在那裏見西太后進來忙起立行禮低著頭站立在一邊西太后坐下含怒問道你所爲的事咱都已知道了現在你自己願怎樣光緒帝只是不則聲西太后又道咱的意思煩你在這裏住幾時罷一言未了只見太監寇連材俯伏著叩頭奏道老佛爺在上不是奴才大膽亂陳老佛爺的聖意是否把皇上永遠禁在這裏西太后還不曾開口李蓮英早在旁喝道滿朝大臣沒一人敢說你是何人在老佛爺前面放肆寇連材忙叩頭道老佛爺的恩典恕奴才這個因皇上親政中外皆知倘一旦變更怕外人或有煩言這是要求老佛爺聖明詳察西太後聽了看著光緒皇上冷笑道一個親信的太監也這樣胡說大政怪不得一班逆臣的橫行了說著喝叫李蓮英將寇連材拖下去到慈安殿中侍候等俺親來拷問他李蓮英領旨帶著寇連材去了當時西太后便吩咐內監把瀛台的石橋拆去非有懿命不准放船隻過去瀛台的交通因此斷絕皇上除瑾珍兩妃在側其他宮女內監都是太后的親信人了西太后這時離了瀛台到慈安殿來及至殿門李蓮英已出來跪接西太后呼帶寇連材上來喝問道俺久知你攛掇皇上妄行新政還私通外臣做些不正的勾當俺那時沒有空閑聽你這班人去胡爲今天卻饒不了快把皇上和康梁的事從實招來或者能赦宥你的罪名否則同譚嗣同等一樣處決寇連材這時面不改色朗朗地奏道奴才侍候皇上只知盡職餘下的一概不知道如老佛爺必要強逼供詞奴才就請一死西太后怒道你本來難免一死倒還強嘴麽喝令李蓮英用刑寇連材知是不免的了便大叫道且慢著待奴才直說罷於是指天畫地地拿太后的過去如數家珍般滔滔不絕地說了一大遍什麽寵納戲子私産小孩等等都講出來了只氣得西太後面皮紫脹連連拍案命推出去寇連材不等他們動手奮身往殿柱上一撞已腦漿迸裂一命嗚呼了西太后見了這種情形恨恨地指著寇連材屍體說道真是反了在咱們面前竟敢如此無禮那是誰縱容到這樣的呢說罷兀是怒氣勃勃地叫把屍體移去戮了以儆後來的效尤李蓮英聞命即督率著小監將寇連材的屍體擡下殿去立傳侍衛進來令拿寇連材實行戮屍一面侍奉著西太后幸如意館去了原來這如意館在頤和園內農樂軒的右側同景福閣相去無幾館裏所有的都是名人書畫本來是一個圖書館但館中侍候太后的並不是宮女太監卻是向四處招來的美男子當設這如意館的時候曾出示招考凡青年子弟面貌清秀而能夠畫些各種花卉的便可當選了因此各省各府的青年子弟都紛紛應考第一次考取的共有一面七十多名再由內監一一甄別過只取得五十五人了這時那內監將五十五人送到招留處又經李蓮英挑選一番只選中十一人這選中的十一人又須西太后親自過目十一人中卻選了最好的兩人在如意館裏當差餘下的九人發在招留處算是備選然這太后選中的兩人姓甚名誰呢一個是直隸人名柳如眉一個是江蘇陽湖人名管劬安二人皆少年美貌又精繪事所以獲得這個佳缺因西太后命兩人在如意館中供職每年還賞紋銀二千兩和錦緞十匹哩這且不在話下再講講柳如眉和管劬安雖一般的美貌但趨奉的本領如眉遠不若劬安以是不上半年劬安大得西太后的信任差不多是第二個李蓮英咧皆爲柳如眉是官家子弟出身大剌剌地不甚得西太后的歡心那管劬安的爲人原是個遊浪子弟在家的時候什麽三教九流沒有一樣不精學得一手好畫又能唱種種小曲子他在十七歲上跑到昆曲班裏拜了一個師傅唱了兩年多的昆劇後來賭輸了錢把他師傅的東西席捲逃走這樣地在江湖上混了半年回到家中他老子恨他無賴邀了些族人把劬安驅逐出族劬安經這一來無可棲止就乘夜潛至家裏將他老子所有的積蓄一古腦兒偷了連夜逃到北京去了劬安到了京師終日在妓館裏度他的快樂生活可是有限的金錢能有多少時候可以支援呢所以三個月之後早已床頭金盡弄得衣衫檻樓被妓館中趕了出來劬安無處謀生便仗著他天賦歌喉沿途唱歌乞錢或到茶樓酒館裏去高歌一曲那些北地的客人初次聞到南歌倒也很覺動聽解囊的一時很是不少這一天上合該劬安的運氣來了那時都中前門外有一座春色樓的茶館來喝茶的多半是宮裏的太監茶樓的後面卻設著一個歌場專一招留四方的歌童在場裏歌唱供一班內監的遊樂倘得他們讚賞一聲身價便立時十倍這管劬安也在場中唱歌已一個多月了那天劬安上場場內有一位內監叫李六六的正在那裏啜茗他聽了劬安的曲子不住地擊節稱歎等到歌罷便叫劬安近前問了姓名籍貫就賞了劬安三兩銀子走了李六六走後場上的人忙對劬安說道剛才的是內府李六爺啊他既然垂青於你分明是個好機會來了你只要巴結他老人家一下不愁沒有飯吃了劬安是何等乖覺的人他聽了點點頭便牢牢地記在心上第二天午後那六爺又來喝茶劬安趕緊過去給他請安還六爺長六爺短的叫得個李六六好不歡喜劬安乘勢呈上曲本子請他點戲李六六隨手點了一出掃雪劬安便放出平生的手段唱得額外討好果然玉潤珠圓無疵可擊李六爺聽了大喜道這孩子唱得真不差咱們老佛爺很喜歡聽唱戲咱就指你一條路吧劬安這時不敢怠慢慌忙過來求教李六六說道咱們的老佛爺現在設著如意館要招幾個能唱曲子和會繪畫的人去裏面侍候著但你只會唱曲子必要咱們給你引見倘你會畫時包你一試就當選好省去多少手續哩劬安忙答道不瞞六爺說別的技藝或者不會至於繪畫一門不論山水花卉小人都能夠塗幾筆的不信可以畫給六爺看咧李六六見說拍手贊道這是最好沒有了那麽咱就在明天送你到招考處吧於是二人約定了時間李六六自回內府去這裏管劬安便收拾了什物準備赴考到了第二天劬安一早就在坐等將至停午時只見一個小太監提了一包東西來茶樓上問道此地有姓管的麽劬安上前應道在下便是那小太監對他望了一眼把包遞給他道裏面是一身衣服六爺叫你更換了停一會好同去應考劬安連連道了幾個是小太監便自去了劬安慢慢地換了衣服又剃了一個面他的面貌本來很好經過這樣一打扮又更上新衣服益覺容光煥發了過了一刻李六六來了一眼瞥見劬安好似換了一個人了便忍不住笑道似這般的標臉兒咱看了也覺可愛哩你此去應考咱們能擔保你中選的了劬安也笑了一笑說道全仗六爺的洪福周旋小人了六爺點頭微笑便領著劬安到了招留處卻見應考的人已擾擾嚷嚷擠滿了一室李六六同劬安進去早有內監前來招呼道六爺也送人來趁趁熱鬧麽李六六笑道正是呢這孩子倒很好還要列位照拂他一下哩那些內監都齊聲應道六爺的事自當格外盡力請放心就是了說著大家打了個作別的招呼李六六便走出招留處竟自去了劬安當由裏面的太監領他到了待選室中算是初選入選了這樣的一處處地進去劬安竟得當選因爲凡應考的人都得有舉薦和擔保的劬安是李六六所保送的當然不用別的手續了哪知管劬安從此日高一日居然飛黃騰達哩原來劬安自進如意館後蒙西太后不時召見命他繪些花卉進呈大獲西太后的讚賞即令做了如意館的主任劬安正在和幾個小太監在那裏做葉子戲忽見一個宮女提了一隻食盒笑嘻嘻地走進來見了劬安說道你倒好說咧太后正惱著呢劬安聽了嚇得面如土色一句話也說不出來那宮女笑了笑將食盒打開遞給劬安道老佛爺命賜與你的等一會怕要來宣召哩你須小心了劬安這才放了心一瞧那些食物都是禦用的珍品便慌忙叩頭謝過了恩立起身來那宮女早已走了這時劬安心上很覺不安想太后這般的寵遇不知有什麽事要用著自己萬一關係生命的差使不去又是逆旨去了於性命有礙胡思亂想一時委決不下來又揣念道自己本是個賣歌的乞丐倘遇不著李六爺今天依舊是鶉衣百結還不是在街上討錢麽現有今日的快樂都從哪里來的就是立時死了也值得的了他想到這裏不覺又打起精神高興起來了在這當兒卻見那先前來的宮女又走來高聲說道太後有懿旨傳管劬安到智慧海見駕劬安便整了整冠裳同了宮女曲曲折折地向智慧海而來一路但見燈光輝煌景致幽雅所經之處都有內監侍候在那裏盤詰由宮女說了暗號始得從容無阻劬安一頭走著一面留心瞧看見亭臺樓閣果然精美如畫圖一般旋經轉輪藏旁邊有白石日晷可以知午夜的時刻從此處到聽鸝殿殿的東首蓋著一座極精巧的亭子有題道畫中游三個鬥大的字又有聯道境自遠塵皆入詠物含妙理總堪尋閑雲歸岫連峰暗飛瀑垂空漱口涼劬安跟著宮女一重重地進去又走過一處石洞望一個小亭子裏上去方瞧見層樓高聳題著智慧海劬安走到樓下便欲止步那宮女笑道還差得遠哩你只管隨著咱走就是了劬安聽了點點頭重又跟了宮女前進約摸轉了八九個彎到了一處好似砌成的石室一樣但有兩重門在外面門上面著龍鳳花紋這時宮女望著劬安說道你就在這裏等一會待咱去複了旨來說罷便走進那石室去了劬安呆呆地立著過了幾分鐘才見宮女出來囑咐道太后就在裏面你需要小心了劬安微微答應了一聲和宮女進了石室過了四重門門裏面頓覺豁然開朗疑是別有天地了再瞧那裏正中似一個大廳上題著倫樂堂三字轉過了廳堂側邊一帶排列著十幾間平屋屋中的陳設異常華麗正中一室尤其是光輝奪目劬安眼快早望見西太后獨坐在室中看書於是也不叫宮女去先行奏聞竟自入室叩見了西太后慢慢地放下書本命宮女賜劬安坐了便含笑著問了劬安的年歲家況劬安一一奏對了西太后又問道你既能繪畫可能辨別宋人的筆法麽劬安忙奏道小臣肉眼怕一時分不清楚但若非贋鼎或者能判別一二西太后點點頭道那麽俺給你看一幅東西去說著起身望內室走去劬安戰戰兢兢在隨在後面連氣都不敢喘一下呢可是劬安這一進去直到次日午前方回到如意館來他隨太后去瞧什麽古畫做書的可不知道了然從此以後劬安不時被召入內還娶了宮女做妻子前門外禦賜很大的宅第不是浪子的幸運嗎要知後事如何且聽下回分解
