body:
  text: 第七十一回殺漢女胭脂狼藉攻粵城炮火縱橫卻說蘭兒見皇上回宮以後明知道皇上舍她不下夜間必要來宣召便急急忙忙梳洗一番打扮得格外嬌豔到了用過夜膳以後那敬事房的總管太監果然高高地舉著一方綠頭牌來口稱蘭貴人接旨那蘭兒聽說稱她貴人知道皇帝已加了她的封號心中說不出地快活忙跪下來領過旨意宮女扶她到臥房裏去照例脫去了衣服又渾身灑上些香水一切停妥了由宮女高聲喚一聲領旨那總管太監便拿著一件大氅進來向蘭兒身上一裹自己身子往下一蹲蘭兒便坐在他肩頭總管太監抱住蘭兒的腿站起來直送進皇上的寢宮裏去約隔了兩個時辰仍由總管太監送她回桐蔭深處說也奇怪這咸豐帝每夜臨幸各院妃嬪從不叫留的只有這一夜召幸了蘭兒卻吩咐總管太監留下蘭貴人院子裏的宮女太監們見皇上在蘭貴人身上留了種知道皇上的寵愛正深將來說不上生下一個皇子來莫說三宮六院的妃嬪們便是那正宮皇后見了她也要另眼看待的因此合院子的人誰不趨奉她那燕兒原也住在桐蔭深處的自從蘭貴人得了寵之後便讓到香遠益清樓去住著咸豐帝自從召幸了蘭貴人以後便時時舍她不下每天到桐蔭深處去聽蘭貴人唱曲子那蘭貴人肚子裏的曲子正多今天唱小調明天唱昆曲後天又唱皮黃把個風流天子的心鎖住了天天住在蘭貴人房裏連夜裏也睡在桐蔭深處不回寢宮去了把什麽牡丹春杏花春都一齊丟在腦後了蘭貴人又能夠知大體常常勸著皇上須留意朝政皇上也聽她的話傳諭軍機處把奏章送來閱看這時長江一帶正被洪秀全的太平軍鬧得天翻地覆曾國藩向榮彭玉麟左宗棠一班將帥拼命抵擋著還是天天吃敗仗失城池皇上看了奏章也常常和蘭貴人談及蘭貴人卻很有見識說國家承平日久俺們滿洲將帥都不中用了陛下不如重用漢人那曾國藩一班人自小生長在長江一帶人情地勢十分熟悉的陛下便當拿爵位籠絡他他們都是窮書呆子一曰得了富貴便肯替國家拼命去殺自己人了皇上聽蘭貴人的話有理便照她的主意去行一天一天把那班曾左彭胡的官階往上升咸豐帝又見蘭貴人寫得一手好字便叫她幫著批閱奏章從此蘭貴人也漸漸地干預朝政議論國事咸豐帝看她又有色又有才便越發寵愛她起來轉眼到了深秋皇上嫌桐蔭深處太蕭條了便把蘭貴人搬到天地一家春去住著那天地一家春地方很大蘭兒雖是貴人品級不高但她排場卻很大手下養著百數十個宮女太監蘭貴人進園來的時候便聽人說皇上寵愛著四春又在園中容留了許多小腳女人勾引著皇上荒淫無度她早已把那班漢女恨如切骨她常常想替滿洲妃嬪報仇苦於那時未得皇上的寵倖手中無權也無可奈何到這時候皇上的寵愛都在她一人身上她說的話皇上句句聽從她的權一天一天大起來她的膽子也一天一天大起來了這時牡丹春杏花春住在園裏長久不見聖駕臨幸心中十分詫異後來打聽得皇上新寵上了一個什麽蘭兒卻是旗下女子但也不十分清楚園裏的一班宮女太監何等勢利見她們失了勢便走得影迹全無大家都去趨奉著蘭貴人又把從前皇亡如何寵倖四春的情形細細地告訴出來蘭貴人聽了心中的醋勁發作得厲害這時恰巧有一個漢女到天地一家春裏去打聽皇上的消息躲在樹蔭裏和一個小太監說著話蘭貴人正坐在樓窗口望下來一瞥眼給她看見了不覺把無名火冒高了十丈這時皇上正在涵德書屋傳大學士杜受田蘭貴人心想趁皇上不在這裏我便下一番毒手警戒警戒她們她一面在肚子裏打主意一面悄悄地調兵遣將吩咐太監們去把那漢女和小太監捉來拷問時原來便是住在煙月清真樓的漢女也曾承皇帝召幸過如今多日不見皇帝的面了心中想得厲害便到這裏來打聽皇上的消息看那人時生得皮膚白淨眉目清秀裙下三寸金蓮套著紅幫花鞋好似一隻水紅菱兒蘭貴人看了心中越發妒恨便罵一句賤人裝這狐騷樣兒哪里是探聽皇上的消息來的竟是和小太監私會來的如今經我親眼看見了你還敢抵賴麽喝一聲剝下她的衣服來便有四五個宮女上前來把那漢女按倒在地解她的衣裙一霎時剝得上下一絲不留聳著高高的乳頭露著白白的腿兒又叫綁起來便有四五個太監上來把這漢女和那小太監面貼面綁成一對喝一聲打幾支藤條從那雪白的腰背頭腿上狠狠地抽下去一抽一條血一任那漢女嬌聲哭喊那藤條總是不住手看看抽有二三百下可憐抽得她渾身淌著血這樣一個嬌嫩女人叫她如何受得住早已痛得暈絕過去宮女提一桶井水來向她身上潑那漢女又醒過來蘭貴人吩咐松了綁又把她小腳鞋子羅襪腳帶一齊脫下露出十趾拳屈的兩隻小腳來三四個宮女手裏拿著藤鞭打著逼著叫她赤著小腳走路可憐她如何走得站在那石板地上已是痛徹心脾經不得那藤鞭從頭臉上接接連連打下來她移一步便啊唷地連聲嚷著痛蘭貴人還嫌她走得慢叫兩個宮女拖著她兩條臂兒在那甬道碎石子上跑來跑去那漢女痛得殺豬也似地叫喊起來後來她實在走不來了只拿膝蓋在石子上磨擦那一條甬道上滿塗著血那流女又痛得暈絕過去了蘭貴人吩咐拖去沈在萬方安和的池底裏從此以後蘭貴人天天拿漢女做消遣品覰著皇上出去了便叫太監滿園子去捉著漢女來痛打一場淩辱一場去沈在河底裏有的漢女怕吃苦的得了這個風聲便預先上吊死的也有投井死的也有買通太監悄悄地逃出園去的把好好的一座花明水秀的圓明園鬧得天愁地慘鬼哭神嚎只瞞住皇上一個人的耳目那四春住的屋子裏卻不曾去騷擾過只因四春是從前皇上十分寵愛的難保皇上不再去臨幸因此也不敢去驚動她便有許多漢女跑到四春屋子裏去躲著也算躲過了一場災難這時蘭貴人又得了一個好消息原來她伺候了皇上不上一年肚子裏已懷著龍胎了咸豐帝聽了蘭貴人的話心想朕玩了多年女人日夜盼望生一個皇子也接了大清的後代那孝貞皇后又是貞靜不過朕和她親近的機會很少看來要那正宮生養太子這事是不成功的了如今難得這蘭貴人腹中有了孕只望她養下一個皇子來也不枉朕的一番寵愛從此越發把個蘭貴人寵上天去真是要風得風要雨得雨蘭貴人說一句話皇上沒有不聽的這蘭貴人得了身孕以後常常害喜頭暈嘔吐這是孕婦常有的事但是這蘭貴人因自己多殺了漢女便疑心生暗鬼在夜靜更深的時候她偶然從夢中醒來便覺得那天地一家春的屋子四周隱隱有鬼哭的聲音再加她肚子裏的東西作怪終日情思昏昏她認作是鬼附在身上頗想和皇上說明搬回宮去又想到自己肚子一天大似一天總有幾月淨身呢那時候皇上久曠了難保不再去找那四春續舊時的歡愛我還不如趁早勸諫皇上搬回宮去離了這圓明圓她們這一班妖精也無法可使了蘭貴人主意已定便在枕上奏明皇上說要搬回宮去皇上也許久沒有回宮去也得回宮去看望正宮娘娘再者皇上也許久沒有臨朝了也得上殿去和群臣見見面兒問問國家的事體不能給文武百官在背地裏說皇上迷住了女色忘記了國政這位皇上是散漫慣了他最怕的是坐朝如今聽蘭貴人說了這個話只因是他寵愛的不好意思不答應無奈這蘭貴人今天也說明天也說又說陛下倘真疼婢子也得爲婢子留一個地步沒得給娘娘說都是婢子迷住了皇上叫皇上忘記了宮裏這個名氣一傳出去叫婢子如何做人她說著不覺兩行淚珠挂了下來這時咸豐帝正在寵愛頭裏見蘭貴人哭了心中異常肉痛便忙依了她在三天以內搬進宮裏去住這圓明園離北京城遠在四十裏外那滿朝文武聽說皇上要回宮了不覺個個心中感激這位蘭貴人你道他們爲什麽要感激原來北京城離圓明園四十裏路那班臣子上朝須得每天半夜起身坐車的坐車騎馬的騎馬趕出城去到園門口還不曾聽得雞叫到天明上朝各部大臣把事體奏明瞭聖旨下來趕回京城去還不曾到午膳的時候每天這樣跑著遇到大雪大雨大寒大暑的天氣那百官走在路上真是狼狽不堪叫苦連天幸得今天蘭貴人一句話把皇上勸回宮去他們心中如何不感激那蘭貴人一到了宮裏皇上便把她安頓在熙春宮裏卻吩咐宮女太監們暫時瞞著正宮俟貴人生下皇子再去報與娘娘知道因此皇上依舊每天宿在蘭貴人這邊蘭貴人自從有了喜便常常害病也曾傳禦醫診脈處方無奈這是胎氣三日好二日歹地纏綿不休皇上又寵愛得蘭貴人厲害凡是貴人服的湯藥都要皇上親眼看過那蘭貴人也撤癡撒嬌地自己睡在床上卻拉著皇上在床前陪伴著皇上便和她說笑著解悶兒因此皇上天天晏起懋勤殿上雖設了朝位卻十有八九是不上朝的卻累得那班文武官員天天在直廬裏候著這裏面卻觸惱了兩個人一個是大學士杜受田一個是宗室肅順那杜受田覰著皇上禦殿的時候便切切實實地勸諫了一番說如今外患內訌迫於眉睫天子一日萬機正當宵旰憂勤以期不墮祖宗之大業咸豐帝原是敬重杜受田的又聽他擡出老祖宗來也便不好說什麽那肅順卻很有鋒芒因爲他是宗室現掌管著宗人府宮裏的事體他都知道他知道近來皇上寵上了一個蘭貴人心中很不以爲然原來他本認識蘭貴人的父親惠征的惠征在日爲一點點小過節和他不相容又打聽得蘭兒原在桐蔭深處當灑掃時便也瞧她不起他如今直走內線放了一個風聲給正宮裏那孝貞後平日最恨的是妖冶的女子如今聽說皇上迷戀著一個貴人把坐朝的事體也荒廢了心中如何不恨她便不動聲色起了一個早坐著宮裏的小黃轎悄悄地跑到熙春宮來在寢門外跪倒拿出祖訓來頂在頭上便朗朗地背誦起來嚇得皇上忙把蘭貴人推開從被窩裏直跳起來跪著聽一面傳諭勸住皇后停止背誦一面起來急急穿了衣帽到懋勤殿坐朝去退朝下來才走到熙春宮門前見一個太監慌慌張張跑出來跪倒皇上喝問他什麽事體值得這樣慌張那太監奏稱方才皇后傳下懿旨來把蘭貴人宣召到坤甯宮裏去了皇上一聽把靴腳兒一頓連說糟了糟了原來這坤甯宮是皇后正殿凡是審問妃嬪用刑的事體都在坤寧宮裏舉行咸豐帝聽了太監的話也不及更換朝衣便親自趕到坤甯宮采踏進正屋去一眼看見皇后滿面怒容坐在上面那蘭貴人哭哭啼啼跪在當地外面的大衣已剝去了只穿了一件蔥綠的小棉襖兒皇后喝一聲打只見那左右宮女各人手裏拿著朱紅棍兒向蘭貴人肩背上打將下去皇上急搶步遮去一面攔住棍子一面對皇后說道打不得打不得她身上已有五個月的身孕了一句話嚇得孝貞後面容失色忙走下座來親自把蘭貴人扶起那蘭貴人也十分乖覺又跪下去先謝皇上的恩又謝皇后的恩皇后對皇上說道怎麽不早對妾身說知陛下春秋雖盛卻不曾生得一個皇子這貴人既有了身孕也說不定將來生下一個皇子繼續了宗祧妾身用杖打這貴人原是遵守祖訓倘然因受了杖責傷了胎兒豈不是妾身也負罪於祖宗了嗎說著也忍不住淌下眼淚來咸豐帝原是十分敬愛孝貞後的她杖責蘭貴人卻也不恨她如今見她哭了便拿好言勸慰她孝貞後又趁此勸諫皇上須留心朝事如今外面長毛鬧得不成樣子十八省已去了一半如何還不憂勤惕勵思可以保全祖宗基業的法子那女色萬萬再迷戀不得了咸豐帝聽了孝貞後的一番勸誡不覺肅然起敬這時孝貞後也只有二十三歲雖說打扮得十分樸素但究竟是一個少年美婦人那眉目之間隱隱露出秀美的神色來他們夫妻之間也是久闊了皇上這時不覺動了愛慕之念當夜便在坤甯宮裏宿下這皇帝和皇后好合在皇宮裏算是一件大事那敬事房太監須把年份月份日子時辰仔仔細細地寫在冊子上皇上住一天那冊子上寫一天誰知這時皇帝和皇后夫妻久闊竟一天一天地住著那敬事房太監一天一天地寫著足足寫了半年光陰在這時候孝貞後便勸皇上調養身體知道鹿血是補陰的便在宮裏養著幾百頭鹿天天取著鹿血給皇帝吃又每天清早催皇上起來坐朝這時皇帝也慢慢地預聞國家大事才知道外面鬧得一塌糊塗那洪秀全得了南京漸漸地逼近京師來急得咸豐帝毫無主意有時退朝回宮把這政事和孝貞後商量商量那孝貞後說妾身是一婦人懂得什麽朝政況且中宮幹政祖宗懸爲厲禁望陛下不要謀及婦人還是去找那大臣商量的好這一番話說得又婉轉又堂皇咸豐帝越發敬愛她了後來皇上下了一道上諭派直隸總督訥爾經額爲欽差大臣專辦河南軍務抵敵那向北來的太平軍這時洪秀全在南京建國開科取士勸農務工那外國人見他聲勢浩大軍隊衆多他又口口聲聲說種族革命爲民除暴外國人越發相信他第一個便是美國派了一隻兵船直放南京洪秀全的弟弟洪仁玕是懂得外國規矩說得外國話的便去招待美國船主那船主遞上國書居然稱他太平天國天王洪秀全允許外國人通商外國人也允許幫助洪秀全美國公使回到上海通報英法各國領事大家對於太平天國都十分滿意洪秀全也派洪仁軒做欽差到美國遞國書去從此外國人處處幫助洪秀全與清朝作難廣東的各國領事和那總督耆英作對步步逼著他後來耆英內調做了學士徐廣縉做了兩廣總督葉名琛做了廣東巡撫英國兵船闖進廣東廣縉帶了團勇敵住英兵英兵悄悄退去朝旨下來賞廣縉一等子爵名琛一等男爵後來名琛升做了總督誰知這葉名琛升了總督以後便自恃有功十分驕傲起來他這時十分看輕那團勇廣東的團勇是從前立過功的如何肯服便有團勇的頭目關巨梁楫兩人悄悄地上了英國兵輪投降去了並與英領事巴夏禮約定願替他做向導那巴領事一向銜恨這葉總督苦得無隙可尋這時恰巧有私販鴉片煙的冒挂著英國商旗把船駛進關河來那巡河水師千總見了上去把船扣住把船上十三個中國人捉去關在監裏這事體傳在巴領事耳朵裏如何肯錯過機會便寫信去責問葉名琛說那條船是英國人的葉名琛見小小的交涉便吩咐把十三個中國人放出來送還巴領事誰知巴領事卻不依定要水師提督來往領事衙門去謝罪又要捉那千總去葉名琛說外國人無禮便也置之不理卻也不去防備他英國領事卻去要求香港總督帶兵船來直攻黃埔炮臺名琛也不理他後來那兵船直開到十三洋行地面又支攻打鳳凰山炮臺奪下海珠炮臺快要到廣州城下了城裏的司道大員慌張起來大家都跑到總督衙門去請示那名琛手執書卷若無其事忽然霹靂般的一聲響亮大炮轟進城來把城牆打得粉碎名琛才害怕起來打發人去講和那英國領事和香港總督只要葉名琛一個人出來講話萬事全休那葉名琛聽了越發害怕只縮著頸子躲在廣州城裏不敢出來起初還有美國領事從中調停後來看看葉總督搭架子搭得厲害也不覺動了氣便去聯合了法國公使噶羅英國公使額爾金俄國公使布恬庭美國公使利特一齊帶了兵船開進廣州軍情十分緊急這才把個葉名琛慌得手忙腳亂起來他一面傳令瓊州總兵黃開廣帶了一百幾十隻釣船紅單船出去抵敵一面在淨室裏擺設乩壇扶起乩來葉總督跪拜過以後叩求神仙降壇慢慢地果然見那乩筆動起來了在沙盤上寫道吾乃呂洞賓是也葉總督看了忙又跪下去默默禱告道弟子葉名琛忝領封圻職守重大夷氣甚惡城危如卵請祖師速顯威靈明示機宜禱告已畢那乩手又扶出四句道十五日聽消息事已定無著急葉總督見上面有十五日三字他認做外國兵船過了十五這一天便能退去便大大地放心不去理他要知後事如何且聽下回分解
