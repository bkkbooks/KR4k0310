body:
  text: 第二十一回多爾袞計殲情敵吉特後巧償宿緣卻説洪經略才止住了哭歎一口氣説道事已如此也顧不得這許多了只是這毒藥吃下肚去怎麼還不死呢一句話只引得那女子一頭躲進洪經略懷裏只是嗤嗤地笑個不休洪經略問他什麼好笑那女子拿手帕按住朱唇笑説道什麼毒藥不毒藥那是上好的參湯呢俺看你餓得難受求生不得求死不得便哄著你喝下去一碗參湯接接力是俺家從吉林進貢來的上好人參這一碗吃下去少説也有五六天可以活命看經略如今死也不死説著又忍不住吃吃地笑洪經略給他這一番話説得臉上紅一塊白一塊果然覺得神氣越清醒了又聽那女子在他耳邊低低地説道經略大人我看你還是投降的好一來也保全了大人的性命二來也不失封侯之位三來也免得家裏幾位姨太太守世孤單四來也不辜負了俺相勸的好意他説到這裏霍地坐起身來一手掠著鬢兒斜過眼珠來向經略溜了一眼接著粉腮上飛起了兩朵紅雲低著脖子只是弄那圍巾上的流蘇一種嫵媚的姿態把洪經略看得個眼花繚亂他忙一收神跳下地來大聲喝道你是哪里來的淫婢敢來誘惑老夫那女子聽了卻不慌不忙盤腿向炕沿上一坐從懷裏掏出一方小字的金印來向洪經略懷裏一丟洪經略接在手中看時不覺把他嚇得魂靈兒直透出泥丸兩條腿兒軟軟地跪倒在地連連磕著頭説道外臣該死外臣蒙娘娘天恩高厚情願投降一輩子伺侯娘娘鳳駕原來那方金印上刻著兩行字一行是滿洲字一行是漢字有永福宮之寶璽六個字洪經略到這時才知道坐在炕上的便是赫赫有名的關外第一美人滿洲第一貴婦人孝莊文皇后直嚇得他不住地磕頭只求娘娘饒命那娘娘伸出玉也似的臂膀來把洪經略拉上炕去洪經略看時見皇后穿一件棗紅嵌金的旗袍那大襟上揩著自己的眼淚鼻涕濕了一大塊他越發地不好意思爬在炕上還是不住地磕頭此後卻不聽得他兩人的聲息良宵易度第二天一清早洪經略從夢中醒來枕上早已不見了那昨日勸駕的女子停了一會四個宮女捧著洗臉水和燕窩粥進來洪經略胡亂洗過臉吃了粥接著外面遞進許多手本來睿親王多爾袞鄭親王濟爾哈朗肅郡王豪格貝勒嶽托貝子羅托大學士希福剛林梅勒章京冷僧機等滿洲一班權貴都親自來拜望多爾袞説皇上十分記念經略務必請經略進宮去一見停了一會內面傳話出來宣待詔進宮洪承疇剃去了四面頭髮頭頂上結一條小辮穿著皇帝給的紅頂頭翎黃馬褂大搖大擺地踱出棺來跨上馬後面跟著一班貝勒大臣直走到大清門外下馬那裏祖大壽童協祖大樂祖大弼夏承德高勳祖澤遠等一班明朝的降將都候在朝門外見洪承疇來了大家上前去迎接跟著一塊兒上殿去從大清門走到篤恭殿從篤恭殿走到崇政殿兩旁滿站著禦林軍士洪承疇跪在殿下三跪九叩首稱皇帝陛下禮畢太宗皇帝宣洪承疇上殿在寶座左面安設金漆椅一隻金唾盂一金壺一貯水金瓶一香爐二香盒二後面站著穿緑衣黃帶青衫褂戴涼帽的侍衛四人皇帝賞洪承疇坐下問他明朝的政教禮制風俗軍制十分詳細足足談了兩三個時辰皇帝退朝聖旨下來拜洪承疇為內院大學士在崇政殿賜宴從此以後太宗常常為國家大事召洪學士進宮去文皇後也坐在一旁洪學士見了文皇后爬下地去多磕幾個頭口稱罪臣文皇后見了總微微一笑太宗也因為皇后有勸降的功勞便另眼看待他有時指著洪學士對文皇后説道他是投降皇后的大家笑著雖説如此卻不知怎麼自從洪承疇投降以後太宗對皇後卻慢慢地冷漠起來了皇后肚子裏了有幾分明白心中有説不出的怨恨悶起來便帶著王臯鄧誇子兩人出外打獵去有一天在圍場上遇到睿親王多爾袞皇后把他喚到馬前狠狠地瞪了他一眼説道老九你好怎麼這幾天不進宮來多爾袞故意裝出詫異的樣子説道阿呀宮裏是什麼地方臣子不受宣召怎麼進來得皇后聽了把他小嘴兒一撇笑罵道小崽子你裝傻嗎你是俺的妹夫又是叔叔還鬧這些過節嗎説著把手裏的馬鞭子撩過去在睿親王頭上叭地打了一下説道滾你媽的蛋睿親王磕個頭轉身走去又聽得皇后在背後説道明天再不進宮來仔細你的腿多爾袞這時已騎上了馬聽了皇后説話便調轉馬頭正要回去只見皇后已經轉個馬頭走去左邊王臯右邊鄧誇子三人並著馬頭把臉湊在一處做出十分親密的樣子來多爾袞在後面看了不覺一縷酸氣從腳跟直沖頂門心裏罵到你們這兩個王八蛋俺明天好好地收拾你們到了第二天多爾袞真的進宮去見他哥哥悄悄地把昨天在圍場上見王臯如何如何無禮的情形説了出來誰知太宗對於這兩人心中本來就有一個疑團那是前幾天太宗走進永福宮去遠遠地看見皇后正和鄧誇子在那裏調笑當時太宗還認做自己眼花忍耐在肚子裏不曾發作如今聽了多爾袞的説話回想到從前的情形愈想愈懷疑不覺勃然大怒心想這兩個光棍留在宮裏終究不是事體便不如趁今天發復了他想罷立刻打發侍衛傳諭出去把王臯和鄧誇子兩人一齊喚出宮來皇后正和兩人説笑著聽説有諭旨皇后急問為什麼事體宮女回説不知道王臯兩人只得跟著侍衛先走見了太宗皇帝跪下磕頭太宗一句話也不説只把令箭遞給多爾袞把這兩個人押出朝門外去砍下腦袋來待到皇後知道這個消息已經遲了明知道多爾袞為愛自己所以殺了這兩個人但是皇后眼前少了這兩個人湊趣便覺鬱鬱寡歡太宗皇帝近日又因為有朝鮮的事體天天和貝勒大臣商議出兵的事體也沒有功夫進宮來陪伴他只把個皇后弄得冷清清的那太宗為何要出兵朝鮮只因朝鮮王仁祖反對太宗的尊號恰巧仁祖的妃子韓氏死了太宗打發英俄爾岱馬福太兩人到朝鮮去吊孝趁便勸他投降稱臣那仁祖非但不肯投降反埋伏下兵士在客館裏要刺殺這兩個使臣這兩個使臣逃回國來把這情形一長二短奏明瞭太宗太宗大怒便立刻調齊了十萬人馬一面和諸位貝勒大臣在朝堂上商量禦駕親征的事體文皇后打聽得皇帝又要親征便又想起一件事來趁太宗朝罷回宮的時候便親自去見皇帝皇帝因為殺了王臯的事也多日不見皇后了當下夫妻兩人見了面十分客氣皇帝提起不久要親征朝鮮的事體皇后便問皇上此番親征命何人監國太宗道朕已將朝裏的事託付了洪學士他雖説是新近歸順的卻是十分可靠的人宮裏的事自有皇后主持照那上回出兵撫順一樣辦理皇后聽了忙奏這一回可不能照上回的辦法了因為妾身近來多病不能多受辛苦求皇上留下一個親信的人監國才好皇帝聽了倒躊躇起來説道留什麼人監國呢偏偏那阿敏和莽古爾泰又病了皇後聽了冷笑一聲説道皇上以為他們可靠嗎妾身害怕的就是他們兩個人太宗聽了詫異起來忙問這兩個人怎麼樣皇后忙攔著説道皇上出兵在即這兩個人怎麼樣且不去問他總之請皇上留下人監國妾身可以保得無事太宗因心中有事便也不追問下去隨説道只是留誰呢皇后忽然説道有了多爾袞這人皇上不是常常稱讚他忠心嗎況且又是臣妾的妹夫倘然留在朝裏監國一定沒有亂子他也可以管得宮裏的事體臣妾也不用避什麼嫌疑太宗聽了拍著手説道著阿怎麼我一時把老九忘了呢快傳他進來宮女聽了飛也似地傳話出來不多時候多爾袞進宮來太宗把留京監國和提防阿敏莽古爾泰的話再三叮囑了一回自己便站起身來出宮上馬帶著大兵一直向朝鮮進發去了這裏多爾袞見皇帝去了正要送出宮去走到門簾下面忽聽得皇后在裏面喚道老九回來我還有話説呢多爾袞聽了忙回進去直挺挺地站在皇后面前候旨言半晌皇后也不開口也不叫去多爾袞忙請了一個安説道多爾袞伺候著呢皇后微微一笑説道我有要緊話和你商量這裏不是説話的地方快隨我到寢宮去説著自己站起身來向寢宮走去多爾滾跟在後面看看到了寢宮裏面只見宮裏裝飾得金碧輝煌皇后便在逍遙椅上坐下向宮女們望了一眼宮女們知道皇后的意思急爭退出只剩他叔嫂二人在內唧唧噥噥不知商量些什麼直到天色已晚掌上燈來多爾袞要告辭回去皇后向他溜了一眼接著笑了一笑説道用了晚膳回去自己便轉進套居去重勻了脂粉換了晚裝宮人擺上晚膳皇后居中坐下多爾袞在一旁陪坐宮女斟上了酒兩人便淺斟低酌起來一面説笑著一面吃喝著這時廊下的宮女只聽得屋子裏皇后吃吃的笑聲停了一會那貼身服侍的兩個宮女也退了出來大家在外面守著只覺得燈影昏沈語言纏綿唧唧噥噥的直到半夜時分多爾袞才告辭出來宮女們掌著宮燈送他出去臨走的時候多爾袞還是依依不舍地説了許多話皇后膩煩起來嗤地一笑把手在多爾袞肩上一推説道得啦時候不早了快去罷當心涼著俺那小玉兒不知怎麼挂念你呢多爾袞聽了也笑著出去了説起那阿敏和莽古爾泰兩人確實有謀反的心腸只因他兩人和太宗是異母弟兄莽古爾泰又仗著自己是富察後的長子如今褚英代善已死這皇帝的寶位便應轉到自己坐誰知在先皇賓天的時候太宗卻用武力劫奪了去自從皇太極做了皇帝又替他南征北討東蕩西殺也不曾有安間的日子因此心中十分怨恨便是阿敏也自己仗著是舒爾哈齊的長子努爾哈齊的長子既已死了這帝位便該輪到自己身上來如今被太宗占了心中也十分怨恨兩人肚子裏的心事沒人的時候常常説起兄弟兩人便聯絡起來暗中結交黨羽四下布置心腹在太宗出征撫順的時候原打算發作不料太宗回來得很快措手不及大家只好按兵不動此番太宗又親自帶兵出去原是他們的好機會誰知這個大事卻敗壞在一個女子手裏這個女子是什麼人呢便是那莽古濟格格平日仗著自己有幾分姿色到處搔首弄姿勾引男子好心目中第一個歡喜的便是太宗的大兒子豪格他打算把豪格勾引上來自己便是穩穩的一位將來的皇后了誰知天不做美後來那豪格娶了博爾濟錦氏做了妃子那個莽古濟格格氣得一佛出世二佛升天他從此把豪格恨入切骨他掉過來便入了莽古爾泰的黨那時和莽古爾泰同黨的還有德格類鎖諾本杜稜一班人天天祕密會議預備起事莽古濟格格看看這班人又沒有一個中他的意的不知怎麼他又勾引上了一個冷僧機從此他兩人暗去明來十分恩愛莽古濟格格認做冷僧機是自己的心腹把他們的陰謀統統告訴了他誰知冷僧機是睿親王的心腹早把這件事悄悄地對睿親王説了睿親王便打發他妃子小玉兒進宮去告訴他姊姊這時正是太宗出兵撫順未回後來太宗回來皇后也因沒有真實憑據不敢告發此番皇帝又要出征因此皇后便請皇帝留下監國的人卻巧留下一個多爾袞真是公私兩便從此多爾袞便以監國為名天天進宮去皇后卻反莽古爾泰謀反的事體挂在心裏常常催著多爾袞叫他趁早下手多爾袞這時已經是假意入莽古爾泰的黨他們天天會議多爾袞也在座假意説些怨恨皇帝的話又説到起事的那天他在宮裏做內應又如何調動兵馬如何切斷太宗的歸路説得天花亂墜把個莽古爾泰哄得心悅誠服第二天多爾袞請這班反叛在府中吃酒趁他們酒醉的時候一齊拿下又在各處貝勒府中搜出許多造反的告示來多爾袞一面吩咐把這班人監禁起來一面自己進宮去報告皇后皇后聽了大喜伸手在多爾袞的肩上一拍笑説道我的好妹夫到底俺的眼力不錯保舉準人了説著忙傳洪學士和冷僧機進宮來吩咐把這班反賊好好地看守起來待皇帝回宮再行發付這裏皇后把多爾袞留在宮裏夜夜取樂正在快活的時候只聽得一聲傳説皇上回宮了多爾袞也無可奈何只得垂頭喪氣退出宮來帶領一班文武大臣出城迎接去太宗此番打勝了朝鮮受了朝鮮王李驚倧的投降心中十分快活回得國來大宴功臣多爾袞看看皇帝正在快活的時候不好把阿敏謀反的事體説出來到了第二天才把這件事體原原本本地説明了太宗聽了十分動怒立刻要升殿親自審問後來還是洪學士奏請發交九親王審問誰知那莽古爾泰在監牢裏聽得皇帝回京的消息把他一嚇一時裏嚇破了膽死了多爾袞得皇帝的旨意便把阿敏德格類鎖諾木杜稜還有莽古濟格格一班反叛從牢裏提出宮審問多爾袞是和他們假意做同黨的他們的陰謀多爾袞統統知道他們也無可抵賴只得一一招隊多爾袞取了口供奏明皇帝一一定了死罪發交刑部大臣執行太宗想起皇后的功勞便站起來踱進永福宮去一眼瞥見皇后陪著一個美貌少年在那裏吃酒那少年見皇帝來了他忙搶上前去請安皇帝看看這少年十分面善問時原來是皇後的內侄科爾沁卓禮克圖親王吳克善的兒子名喚弼爾塔噶爾自從皇帝上尊號的那年他跟著父親進京來道賀皇后便把他留下了只因太宗連年帶兵在外只和他見一個面所以不十分認識當時經皇后説明了皇帝便把他拉進身來仔細打量著果然長得清秀漂亮問他多大年紀他回説十八歲了又問他拉得弓騎得馬嗎他回説勉強學會皇后接著説道講起他的弓馬來真了得他還救過俺公主的性命呢皇帝便問怎麼一回事皇后説道我們阿頓生性歡喜打獵那天是皇上出兵去的第三天阿頓帶了這女們到東山打獵去忽然一頭白兔在公主馬前跑過公主拍馬直追進林了裏去忽然林子裏跳出一頭老虎來那老虎直撲公主馬頭這時宮女們在林子外站得很遠的只有喊救的分兒即沒有人敢上前去打老虎看著那頭虎已抓住馬蹄兒了那馬大吼一聲和人一般地站立起來公主一個翻身被摔下馬來正在萬分危急的時候忽然林子裏那面搶進一個少年來提著短刀一下跳上了虎背揪住了它的頸骨那老虎仰起頭來那少年一刀下去直刺進老虎的眼眶裏那頭老虎大叫一聲屁股一撅把那少年掀下背來壓在老虎的肚子底下這時俺們公主自己得了性命見這少年正在虎口之下便急急彎弓搭箭要射過去又怕誤中了少年正慌張的時候那少年不慌不忙拔出短刀在老虎肚子下面狠命一切只見那老虎倒在地下翻了幾翻死了那少年卻笑吟吟地站在公主跟前公主看時那少年不是別人原來是他皇后説到這裏把一個手指指著弼爾塔噶爾又説道那頭大蟲原來是他趕進林子裏來的那一天他也在東山上打獵呢皇帝聽了笑説道這一頭老虎卻也抵得那年我和你的一頭鹿呢説著不禁又哈哈大笑皇后聽了皇帝的話想起從前的情形粉腮兒上不覺得起了一層紅雲微微一笑正在這時只聽得宮女説一聲公主來了便見四個宮女簇擁著一位花枝招展的固倫公主皇后便喚道阿頓快去見了你父王固倫公主上去行個禮回頭過來見了弼爾塔噶爾不禁吟吟一笑那一笑兩麵粉腮兒上露出兩個酒窩兒來接著低低地喚了一聲哥哥太宗看了十分歡喜笑説道好一對兒便回過頭來問皇后阿頓今年幾歲了皇后笑了一聲説道陛下怎麼連阿頓的年紀也忘了他是陛下滅科爾沁部那年生的太宗聽了拍著手説道記得記得阿頓今年十七歲了原來皇后説這句話是有意思的這位固倫公主雖説是太宗的大女兒實在還是那皇后的前夫德爾格勒的種子那文皇后是天命四年八月裏嫁給太宗皇帝的第二年正月裏便生下這個固倫公主來這時太宗看看弼爾塔噶爾人才出衆便和皇后説明把公主下嫁當時把皇后的哥哥吳克善喚來當面説定親事一面吩咐豪格在京城裏造起一座高大的駙馬府來一面派人到四處去替公主採辦嫁妝這事整整忙了一年還不曾完備皇后這時又生了一個太子滿月以後太宗進永福宮去看望皇后見他調養得面寵兒越發豐潤了再看那太子時又長得潔白清秀啼聲洪大太宗笑説道這樣的母親才生得出這樣的好兒子皇后聽了也微微一笑説道請陛下賞一個名兒太宗略略思索了一回説道便取名福臨罷宮裏因太子滿月連日吃著筵宴把公主下嫁的事體反閣起了皇后再三催著皇帝太宗便吩咐豪格到薩滿那裏請好日子去豪格回來説薩滿説今年沒有好日子姊姊的好日子揀定在明年六月初一日皇后聽了也沒有法只得耐性候著這裏多爾袞自從太宗回京來便沒有機會進宮和皇后見面去把他急得在家裏只拿小玉妃出氣夫妻兩口兒常常吵嘴小玉妃也知道皇后的私事心裏想起便酸溜溜的只因是同胞姊妹不好意思發作因此也常常借著事端和多爾袞爭吵那皇后在宮裏也想這位九叔叔想得厲害到第二年的正月裏皇帝忽然又要出兵去了原來明朝自從洪承疇投降松山失守以後便派兵部尚書陳新甲前來和太宗議和太宗皇帝開了六條和約那明朝因為條約十分苛刻便置之不理直到如今七八個年頭太宗也忍耐不住便點起兵馬命貝勒阿巴泰充先鋒打進關去自己帶領大兵隨後進攻要知太宗此番出兵利與不利且聽下回分解
