body:
  text: 第二十五回悲離鸞小宛入宮誓比翼世祖遊園卻説董小宛聽了洪承疇的話一時氣急要在柱子上一頭撞死虧得他丫頭扣扣在身旁搶救得快上前抱住董小宛也痛得暈倒在扣扣懷裏隔了不知多少時候清醒過來一看見自己睡在繡床上丫頭扣扣陪在身旁問時原來是在洪承疇的私第裏董小宛想起丈夫不禁嗚嗚咽咽地痛哭起來扣扣在一旁再三勸慰説為今俺們在這洪賊勢力之下只得耐心守候主人在外面總可以想法救俺們出去的董小宛也無可奈何只得耐心住下看看那頭上的傷口也慢慢地好了有一天洪承疇吃醉了酒想起董小宛來便把他主婢二人喚來對董小宛説道冒公子如今已關進監牢裏過三五天便要解進京去殺頭只因為我看你可憐暗地裏給你一個信你倘然肯轉嫁給我我便拼卻丟了這前程把冒公子暗地裏放走和你丟官逃走洪總督話不曾説完董小宛坐在地下指著洪總督亂罵亂哭洪總督笑嘻嘻地上前去親自攙扶被董小宛一伸手打了一個嘴巴去打得又脆又響洪承疇大怒拍著桌子混帳王八蛋地罵了一陳吩咐拖去關起來便有兩個笨女人上來把他主婢兩人橫拖豎拽地拉進一間小樓去緊緊關住董小宛幾番要尋死都被扣扣勸住並説主人萬分寵愛主母主母倘然死了給主人知道了怕主人的性命也不保呢小宛聽了這話怕丈夫為他傷心便也不敢死了那冒巢民逃出家門以後外面風聲鶴唳説冒巢民窩藏匪類皇帝下旨查拿滿門抄斬有的説江南總督四處畫影圖形單抓冒巢民一個人冒公子聽了嚇得他走投無路虧得他四處都有朋友逃在歙縣一個朋友家裏那朋友替他四處張羅冒巢民自己也打發人到金陵總督衙門裏去打聽消息才知道是洪承疇因為要奪他的董小宛所以造出許多罪名來冒巢民氣憤極了要親自趕到金陵去和洪承疇拼命這時有一侍妾名蔡女蘿的跟著冒巢民一塊兒逃在外面勸冒公子説為今洪賊的勢力大主人倘然到金陵去正是自投羅網給宛姊知道了又叫他加添憂愁如今妾身有一計在此不知主公生平可有心腹的僕人冒巢民聽了略略思索一會説道有了有一個馮小五他母親死了是董小宛替他買棺成殮的自從董小宛嫁到我家這馮小五便在我家當一名僕人他常常説起小宛的恩德便是送了性命報德也是願意的蔡女蘿便對冒巢民説如此如此一定可以把宛姊救回來冒巢民聽了女蘿的話便連夜回水繪園去那班舊時的奴僕和江湖好漢知道了都悄悄地到水繪園來看望冒巢民對著大衆把蔡女蘿的計策説了果然那馮小五跳起來搶著拍著胸口説道水裏火裏小的願意去當下又有幾個願跟馮小五一塊兒去行事的又有幾個願幫貼盤纏的冒巢民拿出一千兩銀子來交給馮小五説衙門要使用多少我都肯總要想法把你主母救回來才是這班人一齊答應了一聲一溜煙去了冒巢民仍回到歙縣去守候消息這馮小五原是江湖上人那總督衙門裏的差役他原都認識的當時他到了金陵擺了豐盛的酒席把衙門裏弟兄一齊請到酒吃到一半馮小五給衆人磕了一個頭説起他主人被洪總督虛構罪名強搶寵姬的事又説如今主人願出千金求請各位弟兄幫忙設法把俺主母救回家去衆差役聽了馮小五的話正低著頭想法子時忽然有一個公人慌慌張張從外面進來説道諸位哥哥快回去小人接到京城上諭立刻收拾行李今夜九時便要動身哥兒們快回去吧衆人聽了這話你看著我我看著你發了一會怔匆匆忙忙地散去內中有一個名叫李山的也是一個熱心的朋友他和馮小五交情又最深他臨走的時候對小五説道老弟不用憂愁今夜三更時分請在秣陵關下守候著我去打聽你主母坐的是第幾輛車子通一個消息給你你須多約幾個弟兄上去奪回來小五依了他的話到秣陵關下去候著直候到天色微明才聽得車聲隆隆前面大隊人馬過去洪總督的車子在前後面跟著五六十輛大廠車兩旁都有清兵保護著眼看他出關去車子後面又跟著一隊騎兵那李三也夾在兵隊裏見了小五他忙把手掌擎了三回又伸著二個指兒小五看了知道董小宛在第十七輛車子上他便遠遠地在後面跟著他們是騎馬的小五只有兩條腿氣喘噓噓地跑著幸而他們押著許多女眷們的車輛常常要打尖停息小五也不致落後看看過了一站又是一站那兵士們防備很嚴小五終不能得手車子走過邗溝地方這裏離緑楊村很近小五悄悄地去招呼幾個舊日冒巢民的奴僕直追到清江浦地面卻不見了李三再打聽時原來洪總督因要趕路自己帶了李三一班親兵晝夜兼程前進丟下這許多女眷的車輛吩咐兵隊押著隨後慢慢地進京這也是洪承疇要避入耳目的意思馮小五聽了十分歡喜説是機會到了當夜打聽得第十七輛車子和別的車子都寄住在悅來客店時那女眷們依舊睡在車裏到了四更時分小五約了幾個同伴悄悄地爬上屋頂那兵士們因總督不在多貪了幾杯這時正好睡小五跳進內院認得第十七輛車子是粉紅色的車簾便急忙跳上車去掀開車簾一看在月光下果然見那董小宛的丫頭扣扣睡在車門口上小王到這時也不及細看搶著兩個被窩打開店門拔腳飛奔被窩裏的女人從夢中驚醒哭喊起來小五一邊跑著一邊拍著被窩説道莫嚷莫嚷俺是來救你回家去的這時店小二和一班兵士們都從夢中驚醒追出門去小五已去遠了看看第十七輛車子裏的一位女眷和丫頭都被劫去了那兵士們一面報官訪拿一面押著車子晝夜趕路過了山東地界不多幾天到了京裏且説那小五搶得他主母和扣扣回到他夥伴家裏打開被窩一看那丫頭扣扣原是不錯只有那主母卻換了一個女眷小五十分詫異問時扣扣説主母在路上感冒風寒前幾天已換到後面蒲草輪子的病號車裏去了小五又問這位女眷是什麼人那女人自己説是姓金原也是好人家的女兒遭洪總督手下的兵士搶進衙門去逼著做一個侍妾如今你既拿我錯認做你家主母搶了出來是救了我的性命我也無家可歸願跟著到你主人家裏去服侍你主人一世小五見不是主母也無心和這金氏説話便托他同伴把金氏和扣扣帶回家去自己轉身又趕進京去打聽董小宛雖住在洪承疇府裏卻還不曾遭洪氏的毒手但是府中院落重疊兵衛森嚴叫小五如何下手隔了幾天接到他主人的來信説京裏有一位曹禦史是多年的至交可以去求他幫忙小五依了信上的話去求見曹禦史把他主人的話説了曹禦史聽了十分動怒説這洪老賊不上奏章參他一本也不顯得我老曹的手段便吩咐小五趕快去補一份狀子來小五回去找了三天才找到一個寫狀子的人誰知這寫狀子的人見他告大學士洪承疇心下不覺一跳表面不動聲色地勉強替他寫好狀子暗地裏卻跑到大學士府去通報這個消息洪承疇聽得了一面吩咐拿一錠大元寶賞了這寫狀子的人一面和他手下的門客商量門客裏面有一個名叫徐九如的便替他想了一條計策用迅雷不及掩耳的手段把董小宛連夜送進宮去順治皇帝一見果然十分寵愛只因董小宛心中念念不忘冒巢民他見了皇帝宮女叫他跪下他只是低著頭抹眼淚皇帝看他哭得可憐便吩咐宮女帶他到別宮去好好看養董小宛住在宮裏享用十分優厚皇帝也常常來看望他用好言安慰他董小宛任憑皇帝千言萬語他總是不答話皇帝卻不動怒坐了一會去了這樣子過了幾天董小宛心想這位皇上好性兒日子久了把自己的悲愁也慢慢地減輕下來宮女看他肯説話了便私地裏問他的來歷董小宛告訴了他那宮女説道這樣説來這洪承疇是你的仇人呢你還想報仇嗎董小宛咬著牙恨恨地説道俺過一百世也要報這個仇宮女又説你若想報仇第一步要順從皇帝得了皇帝的寵愛便可以借皇帝的勢力報你的私仇一句話説得董小宛恍然大悟心想身子既已進宮休想再出宮去我不如將計就計替冒公子報了這個仇吧不多幾天順治皇帝果然封小宛做淑妃又怕外人説他娶漢女做妃子便把小宛改姓董鄂氏稱董鄂妃皇帝得了董鄂妃以後卿卿我我一雙兩好把從前的愁悶都已銷去便是這董鄂妃也一心一意地伺候皇上好似把冒公子忘了暗地裏卻買通太后宮裏的宮女太監打聽太后和洪學士的事體原來太后雖説紅顔已老卻仍是顧影自憐他自從多爾袞死去以後春花秋月宮闈獨宿想起從前的伴侶一個個都已過去只有這洪承疇遠隔在江南便暗暗地下一道懿旨把這位老朋友喚回京來每到煩悶的時候把洪學士傳進宮去談笑解悶這個消息被董鄂妃打聽得了心想我何妨趁此在皇帝跟前挑撥一下送去這洪賊的性命也出了我心頭的怨恨他主意已定隔了幾天天氣十分蒸悶董鄂妃正在涼床上睡午覺忽然皇帝悄悄地到來宮女們忙要去喚醒妃子前來接駕皇帝搖著手吩咐莫驚醒他説著自己掀起軟簾躡進房裏去只見妃子側著腰兒睡在榻上那半邊粉腮兒越覺得紅潤可愛皇帝走上去看他雙眼低合香息微微正好睡呢又看他裙下弓鞋卻瘦得和春筍一般皇帝忍不住伸手過去輕輕一握再看他鞋底裏繡著周延儒進呈五個楷字皇帝點點頭微微一笑這時紗窗外吹進一陳風來掀起了妃子身上的羅衣露出紅紅的襯衣角兒那衣角上繡著一對小小的鴛鴦顔色十分鮮豔皇帝看了不覺發起怔來正靜悄悄的時候董鄂妃清醒過來睜眼看時見皇帝笑吟吟地站在榻前慌得董鄂妃忙下榻來跪在地下接駕皇帝親扶他起來笑説到這樣熱的天氣悶在房裏做什麼朕和你到什剎海采荷花去董鄂妃笑著稱遵旨又説臣妾還不曾洗澡呢萬歲暫請外屋子坐一會罷皇帝聽了把頸子一側説道朕正要看卿洗澡呢董鄂妃忙跪奏道臣妾不敢褻瀆萬歲再者給外臣們知道了成什麼體統皇帝搖著頭説道這怕什麼外臣們也管不著這許多你若害羞吩咐他們放下湘簾朕在簾子外望著就是了董鄂妃沒法只得吩咐宮女們預備香湯放下湘簾伺候洗浴皇帝在簾外望著四個宮女替他洗擦著另外四個宮女站著手裏捧著鏡子胰子浴衣許多東西不一會妃子浴罷重新梳妝卷起湘簾皇帝跳進來笑説道長著這一身潔白的皮膚真可稱得玉人兒了把個董鄂妃羞得粉腮兒上起了兩朵紅雲皇帝坐在一旁靜悄悄地看妃子梳妝成了便握著妃子的手走出宮去上了涼轎太監擡著來到什剎海地方只見萬頃蓮田風吹著荷葉兒翻來覆去頓時覺得涼爽起來荷花深處蕩出一隻畫舫來宮女們伺候皇帝和妃子上了畫肪搖到水中央妃子親采一朵白荷花獻與皇帝皇帝接在手中一手攙著妃子的手並肩靠在船窗裏看許多宮女們坐著采蓮船在荷花堆裏鑽來鑽去齊聲唱著采蓮曲一陳陳嬌脆的歌聲傳在皇帝耳朵裏皇帝連連稱妙停了一會宮女們采了許多荷花獻上畫舫來皇帝吩咐堆在妃子腳下董鄂妃坐在艙中四面荷花圍繞人面花光一般嬌豔皇帝歎道愛卿真可以做得蓮花仙子從此以後董鄂妃經皇帝讚歎以後宮女們都稱他蓮花仙子當時皇帝吩咐擺上酒來和妃子對坐兩人傳遞杯盞宮女們盤腿坐在艙板上皇帝吩咐唱曲子只聽得一陳嬌聲夾著弦子聲唱道望平康鳳城東千門緑柳一路絲韁引遊郎誰家乳燕雙雙隔春波晴煙染窗紫晴天紅杏窺牆一帶板橋長間指點茶寮酒舫聽聲聲賣花忙穿過了條條深巷插一支帶露柳嬌黃一會到了西岸見岸上萬緑