body:
  text: 第一百回妙手侍茶湯落花有意冰心明禮義流水無情卻説衆人在月光之下只見那一隻已死的大蟲左邊還有一個人臥在地下有個家丁用手一指道兀的那地上不是一只寶劍麼這人一定是與這畜生奮勇惡鬥的如今是受了重傷倒在那裏不知死了不曾衆人道管他死不死我們且去看看説著大家一齊攏近來七手八腳先將一隻死大蟲拖在一邊然後有一個人走過來在陸曾的心口一探忙道人沒有死呢心口還不住地跳哩他説罷又在陸曾的嘴上一摸果然還有一些遊氣大家便分開來一面擡著大蟲一面擡著陸曾一徑向前面而來不多會走到百客廳後面的一間小書房門口就有一個人説道你們可將這人先擡到書房裏的榻上放下來先去到太太那裏請示辦法衆人稱是便將他送到書房裏的榻上安置下來那大蟲就擺在書房門口的階沿下面有兩個家丁飛也似地上樓去報告了不多時童老夫人帶著壽娥和一群婢女慢慢地走了近來見了那只死大蟲不禁倒退數步那群僕婦嚇得忙不疊地就要回身躲避有個家丁喊道老虎死了請你們不要害怕罷衆婢女才止住腳步一齊説道天哪出身出世從未看見過這樣大的老虎呢童老太太攜著壽娥的手向衆人問道你們將那打虎的漢子放在哪里去了衆人一齊答應道放在書房裏面呢童老太太聽説不覺勃然大怒道你們這些奴才真不知高下憑空地將那個漢子放到小姐的書房裏去做什麼呢隨便將他放到什麼地方就是了衆人嚇得互相埋怨著不應將他擡了進來的倒是壽娥開口説道娘阿你老人家這話未免忒也冤枉人了女兒的書房又不是繡房人家命在呼吸別的地方也沒有床放在這裏也沒有什麼不是之處難得人家有這樣的好心肯出力為衆人除害難道我們這一點功德反而不能做嗎他説罷這番話童老太太連連説道我的小姐這話果然有見識而且又有良心倒是我錯怪了他們了他聽罷取出手帕將櫻口一掩向衆家將嫣然一笑隨著童老太太走進書房只見臥榻上睡著一個二十內外的男子頭戴六楞英雄帽上身穿著一件豹皮密扣的緊身的小襖下面穿著一件繡花褌褲足上登一雙薄底的快鞋腰裏懸著一隻空劍鞘一張英俊秀麗的臉著實惹人憐愛可是緊閉雙目半聲不響他打量了半天不禁將一股純潔的戀愛從足上一直湧到頭頂的上面他不由地開口問道這人究竟死與未死衆人一齊答道心頭尚跳嘴裏還有一絲熱氣呢他便向童老太太説道如今既然將人家擡到這裏當然救人救徹須要趕快想出一個法子來將人家弄活了才行呢童老太太道那個何消你説得我自有道理童老太太便對一個家將説道你快些去到西村去將白郎中請來他這句話還未説完壽娥忙道我的太太你老人家又亂來了童老太太道他這個樣兒不請先生來替他診視診視難道就會回生麼他急道我們太太遇事真會胡纏人家又不是生病需不著郎中先生來診視眼見這人是與大蟲鬥了多時受了重傷或是有別有原因也未可知童老太太笑道我真老糊塗了還是小姐這話説得是我看如真受了重傷我樓上還有參三七這東西能夠舒筋活血的要是拿出來給一點他吃吃倒也很好的他點頭笑道這法子倒不錯但是人家命在頃刻就請老人家去拿罷童老太太連忙答應走出了門徑上樓去取參三七了這裏壽娥忙指點衆人將他扶了坐起來自己便走到榻前一歪身子坐了下來捏著一對粉拳在他的背上輕輕地敲個不住不多一時陸曾才微微地舒了一口回氣將眼睜了一睜復又閉起又停了一刻才算將那股飛出去的魂靈收了轉來睜眼仔細一看只見自己坐在一張極其精致的繡榻上那屋裏擺設得金光燦爛華貴非常還有多少人挺腰凸肚地站在榻前自己好不詫異暗道這算奇了我方才不是倒在那家花圃裏的草地上麼怎的一昏迷就會到這裏來呢不是碰見了鬼麼他正要開口問話猛地覺得後面有人替他捶背不由得回頭一望只見一位千般嫋娜萬種豔麗的女郎坐在他的身後正捏著粉似的拳頭給他背上輕輕地敲著呢他不禁大吃一驚心中不住地突突亂跳忙問道小姐何人救我性命他見他問話便住了手立起來婷婷嫋嫋地走在臥榻對面一張椅子上坐下先用那一副水瑩瑩的眼睛向他一飄然後説道你休問我請將你的名姓説與我聽聽看他忙説道小子姓陸名曾只因昨晚村上鬧著捉虎我也就出來幫助了不想那一班捉虎的人都是些衣架飯囊一點用處都沒有只是在一起呐喊示威卻沒有一個膽大出來和那畜生見個高下當時小子見那畜生已經傷害二人若不上去奮勇擒捉恐怕那畜生得步進步那麼全村的人都要受它的影響呢所以將生死置之度外上前和那畜生廝拼滿想一劍將那個畜生結果了也好替大家除害不料那畜生竟厲害非凡和它一沖一撞足足鬥了八十余合莫想近它的跟前它以後便奔到了一家花圃裏我也跟著它趕到花圃裏那時我也就下了決心非要將那個畜生結果了才回去呢在花圃裏鬥到分際被我一劍將它的下頜削去可是那畜生受了痛沒命地向我一撲我避讓不及竟被它撲倒在地下那時我也不指望有性命了昏昏地不知何時到這裏請問小姐尊姓大名衆家丁便搶著將上面的事情説了一遍又將他家姓名告訴與他他十分感激正要下床拜謝剛一擡身子那兩肋下面奇痛異常禁不住復又坐了下來他坐在他的對面見他這樣已猜到要拜謝見他方要下床眉頭一皺卻又坐了下去便料定是身上哪一部分受了重傷忙道將軍奮威將這畜生除掉村上受惠非淺奴家也感激無地了不要拘那些無謂的禮節反使奴家心中難受請靜養身體罷他説罷香腮帶笑杏眼含情不知不覺地又向他打過了一個照面陸曾抱拳當胸口中説道垂死蒙救再生大德不知何時才能報答于萬一呢他忙答道將軍哪里話來請不要如此客氣他剛剛説到這裏童老太太扶著一個丫頭走了進來見他已經蘇醒過來自是歡喜忙向壽娥説道參三七我記得樓上有一大包的不知道被他們拖拉到什麼地方去了我尋了半天竟沒有得著這裏帶來三錢老山西參我想這東西他也可以吃的壽娥道是陸曾正在與他説話的當兒瞥見走進一個六十多歲滿面慈祥的老太太來他便料瞧著一定是童夫人了他便説道太太駕到小子身受重傷不能為禮萬望太太恕罪童夫人忙道不須客氣不須客氣你是個病人趕緊睡下去躺著養養精神我決不怪你的陸曾又千恩萬謝地告了罪才躺了下來童太太忙命丫頭將老山西參拿去煎湯自己將椅子拉到榻前坐下問道你姓什麼陸曾道承太太問賤姓陸他又問道你叫什麼名字家裏共有什麼人他道小子名曾家嚴家慈在小子三歲的時候棄世了他道可憐可憐你們的父母棄世得早可是誰將你撫育成人的他流淚道自從家父母歸西之後小子那時人事還未知終日地嗷嗷啼哭要飯要茶的那一班鄰居因為年歲荒歉俗語説得好只添一鬥不添一口誰也不肯將人家的子孫拉到自己家裏去撫養後來連餵養的奶姆都走了小子在赤地上啼哭了幾天一粒米珠都沒有下肚忽然來了一個老和尚將我抱去抱到他們的廟中朝茶暮水的一直將我撫養到十三歲他説到這裏童老太太合掌念道阿彌陀佛天下竟有這樣的好和尚還怕他不成佛麼陸曾見他念著便住口不説他忙道以後怎樣的你再説下去陸曾繼續説道那和尚法名叫修月生成一身好武藝他在沒事的時候便教我各種武藝我到了十四歲以後便漸漸地知道人事了以為修月老和尚待我這樣的恩情還能忘卻麼便三番兩次的和他説我是一個沒爹沒娘的苦鬼承師父將我撫育到這樣大天高地厚的恩情真是無法報答的了但願削髮入山隨師父做一個供應驅使的徒弟聊報洪恩于萬一誰知他道你不要如此我看你這個樣兒並非是空門中人將來富貴場中不難得著一個相當的位置我們出家人慈悲為本方便為門施恩於人還望報答麼下次千萬不要如此才好呢那時我再也不去相信他這些話仍然請他收我做門下的生徒他再也不肯並且對我説道你這孩子太也不自省悔了我幾曾和你説過一句空話我的徒弟也不計多少了難道單獨就不肯收你麼因為這入空門的一流人物都有些道理的你本是名利場中的客怎能夠自入空門呢我就強自將你收録下來不獨滅你的壽算而且又違及天意雙方均蒙不利呢我聽他這些話料想他是一定不肯收我了只得將入空門的一層事情高高擱起到了十七歲的當兒修月老和尚便向昆侖山去修道了那時我又要隨他一同去他再也不準我去只得留在他的廟中整日沒事可做便到各處山裏去打獵打了些野色便到洛陽城裏去換些米和酒苦度日月在去年八月裏遇著一個姓吳的他也是個打獵的端的十分好武藝而且待人又十分和藹可親也和我一樣的無爹無娘一個人兒他的性情和我卻合得來二人便結拜了他便教我搬到他的家裏和他居住我們兩個人差不多在一起有一年多了雖然是異性兄弟比較同胞的確還要親近十分呢他將這些説完了童老太太光是點頭歎息不止這時有個丫頭手裏托著一個金漆的茶盤裏面放著一隻羊脂玉的杯子捧進來向童老太太説道西參已經煎好了童老太太忙道捧與這位陸哥兒叫他吃了罷他説罷便回過頭來向他説道哥兒這西參茶最補人的你可吃了罷陸曾忙謙謝著要坐起來壽娥忙道不要坐了現在不能動彈還經得起坐睡下去麼他説罷便起身將杯子輕輕地接了過來走到榻前將杯子送到他的唇邊陸曾慌忙用手來接他笑嘻嘻地説道你可不要客氣了就在我手裏吃了罷陸曾見他這樣倒不覺十分慚愧起來被他這一説又不好伸手來接滿臉緋紅只得就在他的手裏三口兩口地吃完便向他謝道罪過罪過他乜斜著眼向他一瞄笑道用不著客氣了他説著退到原位上坐下大家又談説了一會子不覺天色大亮這時卻忙壞了吳古了見陸曾出去打野獸一夜沒有回來他在夜裏因為酒吃得太多了倒還未十分在意再等他一覺睡醒已是東方日出了他見陸曾未有回來不禁大吃一驚一骨碌跳起來出門去尋找他出了門由東村尋到西村哪里見陸曾一些影子他真著忙那村上的人家差不多還未有一家開門都是關門大吉估量著還只當大蟲未死的呢吳古尋了半天仍然未見他一些蹤迹心中焦躁到十二分不禁大聲喊道誰看見我的兄弟陸曾的請你們告訴我誰知他喊得舌枯喉幹再也沒有一個人出來答應他一聲的他可急壞了又兜了一個圈子轉到西邊的樹林子裏瞥見一個半截尸首倒在那裏頭和肩膀都不知去向了他不禁嚇得一大跳料想這尸身一定是陸曾無疑了他不管三七二十一蹲下來抱著下半截尸首大哭如雷不多時猛地有一個人在他的肩頭上一拍説道你這漢子發什麼瘋病這尸首是我家兄弟昨晚被大蟲咬死的要你在這裏哭什麼他聽説這話便仔細一看果然不對不禁站起來説道晦他娘的鳥氣別人家的死人我來嗥啕恐怕除了我再也沒有第二個了他説罷垂頭喪氣地走了再到村裏只見家家已經開門三個成群五個作伴的在那裏交頭接耳地談個不住這衆人的裏頭有一個癩痢頭晃著腦袋向大家笑道誰不知大蟲的厲害偏生那個牛子滿口大話他要去充大頭蝦如今大蟲也不見了那牛子也不見了我想一定到閻王那裏去吃喜酒了又有一個説道那個家夥未免忒也不自量我們還勸他不要去的呢偏是他要去送死卻也怪不得別人了又有一個道話不可以這樣的説法他如其果真沒有本領還敢這樣的大膽麼死沒死還沒有一定那個癩痢頭將禿腦袋一拍説道你還在做夢呢那只大蟲何等的厲害十個去包管十一個送終那人道送終不送終也要算人家一片熱心萬不能説人家自己討死的吳古聽衆人議論紛紛一頭無著處他正要向衆人詢問昨晚的情形瞥見有兩個人從西邊飛也似地奔了過來對他們大聲説道好了好了昨夜大蟲被那個小英雄在孫家花圃裏打殺了現在孫府裏面呢衆人聽説一齊搶著問道這話的確麼他道誰來哄騙你們呢如果不信孫府又不是離這裏有一百里地你們何妨就去看個究竟呢大家聽了也無暇多問一齊蜂擁向孫府而來更有那吳古跑得一佛出世二佛涅槃不多時進了孫府見大蟲果然打死衆人七舌八嘴地説個不住誇讚的佩服的不一而足吳古聽孫府的家丁説陸曾未死受了重傷現在書房裏面不禁滿心歡喜大三步小兩步地走進書房見陸曾躺在榻上好像陡得一方金子似的搶過來一把扯著他口中説道我的兄弟尋得我好苦阿陸曾見他來心中也甚歡喜便將以上的事情告訴與他他便問道童老太太現在什麼地方讓為兄的先替你去謝謝人家要緊陸曾用手一指道坐在對過炕上的就是他老人家他聽了便轉過身子朝著童老太太撲通跪下磕了一陳子頭口中説道承太太的盛情將我的兄弟救活我在這裏給太太磕頭童老太太忙教他起來對他笑道你也不用客氣你們兄弟有這樣的好心為衆人除害我們難道連這一點兒都不能效勞嗎吳古又千恩萬謝地一回子便轉過身子對陸曾説道兄弟你在人家這裏終有許多不便倒不如背你回家去養息罷童老太太正要開口壽娥搶著答道吳大哥你這話未免忒沒有見地了他是個身受重傷的人怎能給你背回去呢而且你們家裏除了你還有第二個人來服伺他麼在我家雖然伺候不周些比較你家我敢説一句總要稍好一些的如果陸大哥見疑或是我們這裏蝸仄那麼我們也不敢過於強人所難即請回府罷陸曾忙道小姐哪里話來感蒙大德報答有時小子一向不喜裝模作樣的辜負人家一片好心小子就老實在府上叨擾幾天罷他聽説這話不禁滿臉笑容説道對呀要這樣才好呢童老太太便對吳古道吳大哥你請過來我要與你商議一件事情這正是佳人情熱殷勤甚壯士冰心喚奈何要知後事如何且看下回分解
