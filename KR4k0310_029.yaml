body:
  text: 第二十八回小二哥暫充欽差皇四子大戰俠客卻説那老頭見竇爾墩一拳打過來也不回手也不躲閃竇爾墩連打三拳那老頭兒紋絲不動竇爾墩身後原站立一班弟兄看了也個個酥呆竇爾墩這時滿面羞慚帶著弟兄們垂頭喪氣地回去那老頭兒也收拾圍場回到客店裏安息去直到半夜時分那老頭兒正在好睡只見窗外跳進一個人來擎起鋼刀對著老頭的脖子上砍下去誰知這老頭兒依舊鼾聲如雷動也不動直把那刺客嚇呆了停了一會老頭兒慢慢地醒來睜眼看時站在榻前的便是竇爾墩老頭兒説道什麼地方的小孩子擾人清夢竇爾墩這時不由雙膝一軟跪下地來求他收做徒弟老頭兒起初不答應竇爾墩再三懇求老頭兒才帶他去從此濟南地方不見竇爾墩的蹤迹隔了五年竇爾墩又來了且娶得一個絶色的妻子濟南地方人都認識這女子便是那老頭兒的原來那老頭兒姓石原是明將張蒼水的部將那個女子是他的外孫女張將軍敗走了以後他便帶著這兩個女子借著賣解的名兒物色英雄為明朝報仇如今遇著這竇爾墩便把全身武藝傳授給他又把一個外孫女給他做妻子勸他從此要做一個好人回去招呼弟兄們遇有機會便替明朝報仇此次康熙南巡路過濟南地方他想機會到了預先把妻子藏在深山裏連夜闖進行宮去打算行刺皇帝後來看見後院裏養著一匹赤騏竇爾墩原是愛馬如命的他識得是一匹好馬便先偷了馬再説那馬見有人來偷它便長嘶起來侍衛們聽得了急來看時這馬跑路很快早已去遠了竇爾墩去把馬藏在深山裏回轉身來趕到城裏那皇帝已經起程到蘇州去了禦舟過丹陽常州無錫都不曾停泊十月二十六日到蘇州滸墅關江蘇巡撫湯斌帶領合境官員接駕皇帝騎著馬走進閶門那百姓們在大街兩旁站著間看皇帝吩咐百姓莫跪見有年老年幼的便親自下馬來問話步行到接駕橋在瑞光寺裏略坐一會巡撫走在前面領路送進織造局裏住下這時有一個宋牧仲也做過江蘇撫台這時告老住在蘇州地方皇帝忽然想起他便把他喚進行宮間談解悶第二天又打發內監送活羊四隻糟雞八隻糟麓尾八個鹿肉幹二十四包魚幹四包給宋牧仲又傳旨傳他煮豆腐的法子準宋牧仲照法煮吃給有年紀人後半世的享用第二天巡撫去請安裏面傳諭出來説聖躬不適一切臣工免見這原是推脫的説話其實皇帝早已帶了侍衛們悄悄地雇了一條船到各處鄉鎮上遊玩去了有一天船劃到華亭縣城裏在七裏橋下停泊皇帝走上岸來見橋邊一家酒肆一個小二官站在匱檯旁皇帝踱進店去店小二上來招呼皇帝打了三角酒獨自飲著看看酒堂內十分清靜皇帝便把小二喚來和他間談起來皇帝問道你辛苦一天有多少工錢那小二説道我們工錢是很微的全靠賣酒下來分幾個小帳講到每天的小帳原也不少無奈自從金大老爺到任以來到各家店鋪收捐把我們這一份小帳也捐去了我們靠幾個呆工錢如何度日説著不禁歎了一口氣皇帝聽了低著頭半晌不説話忽然問道你們這縣城可有別個比縣官大的官員那小二道這幾天因聽説萬歲爺要到這裏來省城裏派了一位提督大人帶兵在這裏保護皇帝聽了便向小二要過紙筆來寫上幾個字蓋上一顆小印外面加上封套把小二喚進來説把這信送進提督衙門去提督是我的好朋友這封信送去準把他們的鋪捐免了小二聽了如何敢去後來還是掌匱的替他送去的掌匱的走到提督衙門口有許多差役見是平常信便向門房裏一丟掌匱説那客人吩咐要立候回信差役們不去理睬他後來那掌匱的再三懇求恰巧裏面有一個二爺出來差役便把這封信託他帶進去給大人停了一會忽然裏面三聲炮響開著正門提督大人親自出來把掌匱的迎接進去把兩旁的差役看呆了只見那提督在大堂上點起香燭把那一封信供在上面對它行過三跪九叩首禮轉身來又向那掌匱的作了三個輯慌得那掌匱的跪下來還禮不疊停了一會提督打發人把華亭縣喚來那華亭縣不知什麼事體連忙穿著頂帽坐著轎子趕來那提督一見了金知縣立刻把臉色沈下來喝一聲跪下聽旨慌得那知縣爬在下地動也不敢動提督上去把那封信打開來念道華亭令金雨民掊克瀆貨民不堪命著提臣鎖拿候旨嚴辦那縣官聽了嚇得臉如土色便有差役上去替他除去頂戴套上鎖鏈推進牢監去關著一面吩咐打轎自己坐著官轎那掌匱的也坐著轎子飛也似地趕到七裏轎地方走進酒店去一看那皇帝早已下船去得無影無蹤了提督忙傳令各處炮船趕上前去保護但是皇帝坐的是小划船那炮船在水面上找來找去也不見皇帝的禦舟空擾亂一陳罷了這裏皇帝回到蘇州那蘇州官員才知道皇帝私行在外面紛紛到行宮裏請安住了幾天皇帝起蹕回京去路過江寧地方皇帝忽然想起江寧織造官曹寅傳諭曹寅接駕曹寅把禦駕接到織造衙門裏去住著曹寅是世代辦理皇差的皇帝拿他當親臣世臣一般看待他母親孫氏年輕時候也進宮去過的這時皇帝和曹寅説説笑笑好似一家人一般又召孫氏覲見他媳婦孫媳婦都出來見駕皇帝賞賜很多又寫萱瑞堂三字賞給曹寅曹寅家裏花園很大皇帝在花園裏盤桓了幾天便起駕回北京去這時京裏太子胤礽監國倒也十分安靜胤礽是一個書呆子終日埋頭在書堆裏朝廷的事體聽那班大臣親王貝勒們料理唯有四皇子胤禛見父皇不在京裏越是無法無天這一日太子偶然到南苑去打獵忽見遠遠的一隊騎馬的侍衛從南面跑來簇擁著一輛車兒車子前面儀仗很多還有許多喇嘛拿著法器在前面領路太子錯認是皇帝回來了忙搶上去迎接時原來車裏坐的是四皇子胤禛胤礽是心下大不舒服只因礙于弟兄情面便避在一旁讓他車馬過去待到皇帝回來太子見了父皇第一件事便秦稱四皇子冒用皇帝的儀仗實是不法康熙聽了十分生氣派人把他的儀仗沒收又把胤禛喚進宮來當面訓斥了一場因此胤禛心中越發憤恨他回家去收拾行李帶了幾個拳師步行走出京城向西南走去他和手下人説定沿路只許步行不許坐車騎馬一來借此熬煉筋骨二來沿路也可以找尋英雄好漢話説胤禛走到嵩山腳下住在客店裏天色已晚手下一班待衛拳師都趁著月色在廊下坐著説間話胤禛一個人悶得慌便悄悄地溜也客店去店東面有一座松林月光照著分外陰沈胤禛負著手踱到林子裏面去耳中只聽得呼呼的響再繞過去看時只見林子東面一方空地上有一個和尚手裏拿著禪杖對著月光上下舞動著胤禛看得手癢便拔出腰刀三腳兩步搶進圈子去和他對舞起來那和尚看有人和他對舞手中的禪杖便舞得和靈蛇一般胤禛打了半天休想近得他身看了自己的刀法慢慢地慌亂起來那根禪杖逼著自己一步緊一步胤禛心知這和尚不是等間之輩正想著只見那根禪杖好似泰山壓項一般直劈下來胤禛忙跪在地下嘴裏喊著師父求饒那和尚收住禪杖哈哈大笑轉身去松樹腳下拿了被包拔步便走胤禛看了如何肯放忙追上前去攀住他胳膊求他帶回廟去願拜他為師父求他傳授本領那和尚聽了向胤禛臉上看了一看便點頭答應胤禛轉身回進客店去如此如此對衆人説了吩咐他們回京城去候著自己卻出來跟著那和尚走去在路上曉行露宿爬山過嶺走了許多路程胤禛生平從來沒有吃過這種苦楚為要學本領起見只得忍受著走了多日忽然迎面一座高山他兩人爬上山去走到山項上把個胤禛纍得汗下如雨看那和尚卻大腳闊步地走著走到一座山岡上便見一座大廟廟門上豎著一方匾額上面寫著少林寺三個大字胤禛這才明白過來從此他在少林寺裏跟著師父師弟們天天練習本領同伴們也十分和氣大家問他什麼地方人他推説是保定府人從來不把皇宮裏的話露出半個字來只因他食量甚大大家取笑説他和當年師父一般原來他師父名叫正覺初來少林寺的時候原是一個燒火和尚食量極大每跟著衆和尚受齋總嫌吃不飽多吃又不好意思他便把廚房裏每日剩下的殘羹冷飯悄悄地偷來去藏在後院廊下的一架古鍾下面覷空便去吃著那架古鍾和人一般高擱在廊下多年足有一千斤重也沒有人能動得它正覺和尚有天生的奇力提著鍾放上放下好似弄小缸兒一般後來那管香積廚的和尚見天天缺少飯食便留心察看知道是正覺和尚偷的悄悄地跟著他到後園去看時只見他正提著那口大鍾把飯食藏到裏面去這個消息頓時傳遍寺裏人人詫異主持僧把他喚去勸他不可偷糧食許他每餐飯儘量吃飽又問他既然有這樣的神力為什麼不去投軍效力正覺便答到我打聽到峨嵋山上有一位太師父精通拳術他的百八神拳天下無敵他專一傳授佛門子弟但是沒有佛門名剎主持的推薦他是不肯收留的如今只求師父給我一封薦信到峨嵋山去學成本領回來當不忘師父的大德那主持僧聽了他的話便給了他一封薦信正覺和尚到峨嵋山去了八年回山來那主持僧已死了大家便奉正覺和尚做主持僧這正覺和尚拳法高明天下聞名常常有江湖上的好漢到山上來領教不論在家人出家人到寺裏來學本領的有一千多人正覺和尚便細心一一傳授胤禛也跟著大家用心習練看看過了一年多那百八神拳俱已領會胤禛便和師父説明要下山回家去他師父點點頭便喚一百零八個和尚來圍定他和他比拳胤禛一點也不害怕一個一個比過去那和尚越來越凶胤禛竭力支架著把這一百零八個和尚都已打退但是這少林寺裏進出都有迎送的禮節凡來寺學藝的當門擺一石鍾能夠把石鍾提開走進門去的便收留他倘然提不起石鍾的便不肯收留他藝成出寺去的必須經過三重門第一重門有八個和尚手裏拿著刀候著殺出了這一重門便到第二重門門外也有八個和尚手裏拿著棍子候著打出了這重門便到第三重門門外也有八人和尚空著手候著這八個和尚個個本領高強拳法精熟最不容易對付那出去的人須從門檻下面爬出去胤禛既要下山去不得不依寺裏的規矩他便從第一重門爬出去逃脫了衆人的刀下趕到第二重門來正要向門檻下爬時忽然山門外來了許多侍衛和內監們是去年胤禛臨分別時候約定他們來迎接的到這時候合寺僧人才知道胤禛是皇子那主持僧方喝退衆人親自送他出山門照胤禛的意思仍舊要照寺的規矩一重一重門打出去那正覺和尚不許説堂堂一位皇子不能太褻瀆了臨分別的時候正覺和尚給他一根鐵禪杖説是留作他日的紀念又説皇子的本領可以橫行於下但是若遇到女子須得格外小心胤禛一一領命告別下山回去走到山西地界住在一家悅來客店裏忽然聽得外面一片吵嚷的聲音胤禛打發人出去問時原來有一個大漢在外面打人那人快要被打死了許多人在一旁勸著那人大聲説道俺是當今殿下的教師鬧出人命來自當有俺殿下擔當這句話惱了這位胤禛便提著鐵杖走出來看時見一個人直挺挺地躺在地下打得頭破血流早已死去當地站著一個大漢一手叉著腰一手指著那死人還在惡狠狠地叫罵四下裏圍著許多人看熱鬧胤禛推開衆人上去向那大漢問話誰知那大漢昂著頭説道老爺愛打死誰便打死誰誰敢來問俺你敢是長著三頭六臂嗎胤禛聽了不覺無名火冒起了三丈舉起手中鐵杖向那大漢腦殼打去一聲響亮那大漢腦殼子破了倒在地上一樣的也死去了慌得那店裏的掌匱和地保拉住了胤禛不肯放胤禛便打發他手下一個待衛跟著那地保到縣衙門裏去了案回到北京城裏便有許多劍客和喇嘛僧在府中替他接風席間説起在山西路上打死太子的教師內中有一位喇嘛僧聽了便説道這卻不得了了這位教師是太子的心腹如今聽説他家裏有事才請假回山西去現在吃主子打死了那太子如何肯幹休胤禛聽了卻毫不在意連連喝著酒不覺大醉侍衛們把他扶進內院去睡在榻上直睡到半夜時分胤禛醒來連呼口渴侍衛送上一杯參湯去胤禛正把杯子接在手中忽見窗外一道白光飛來在窗櫺上一碰又碰回去了胤禛忙丟杯子從侍衛身上奪下寶劍來正要搶出院去忽然一個喇嘛僧走進屋子來向胤禛搖著手低低地説道主子快別出去外面正殺得厲害呢胤禛問是什麼地方來的刺客那喇嘛和尚説得太子兩字只聽得嗚嗚的聲音夾著一道白光從窗外直飛進來噹的一聲胤禛看時一柄寶劍插在床檻上那柄劍兒兀自晃著射出萬道寒光來喇嘛和尚急上去把胤禛一把拉開又把屋子裏的燈吹熄了只聽得院子裏叮叮噹噹劍柄兒磕碰的聲音打了半天那聲音才慢慢地遠了這時候天色也明瞭胤禛酒也嚇醒了走出院子去一看見院子裏的樹木被劍削去枝葉好似一株一株旗杆滿地倒著尸身胤禛認得是太子劍客外屋子也有幾個自己的劍客被外來的刺客殺死胤禛看了這情形心中十分憤恨立刻召集自己的劍客和教師來商量報仇當下那班武士個個自告奮勇説道主子放俺們今夜到東宮去一定取太子的頭來獻與主子胤禛吩咐擺設筵席給他們飽吃一頓個個帶著兵器出門去了這一夜住在皇城附近的百姓們都聽得空中有劍戟撞擊的聲音夾著風聲雨勢連那屋子也搖晃起來到了第二天只見那東宮的內監便紛紛出來向大街上買十多具棺木那雍王胤禛府裏也打發侍衛們出來買了許多棺木擡進府去原來那夜一場廝殺太子早巳探得消息藏躲起來東宮四下裏都有劍客埋伏著兩面一場惡殺各送了十多條性命從此以後雍王和太子的仇恨愈結愈深那太子也知道胤禛早晚必要來尋仇便打發人帶了金銀出京去在山西河南山東一帶又請了幾位拳術高手來保護東宮胤禛打聽到這個消息便和他手下的劍客商量也要去多請幾位本領高強的武士來和東宮比個高低有一位喇嘛勸胤禛親自出京去尋訪一來也避免了東宮的耳目二來也在江湖上多結識幾個朋友胤禛聽他説話有理便帶了幾個侍衛和教師又悄悄地溜出京去沿途留心英雄好漢卻也被他尋得幾個內中有一個叫白龍道人的他的飛刀十分厲害能在百步外取人首級雍王要求他傳授這飛刀的本領白龍道人説貧道這本領只能自用不能傳人主子倘然要學這本領須問俺師父江南大俠甘鳳池不可雍王原也久慕甘鳳池的名氣如今聽了白龍道人的話便跟著他到江南尋訪去在金陵地方打聽得甘鳳池在一家姓金的紳士家裏雍王跟著那道人到金家去會見他要知甘鳳池見與不見且聽下回分解
