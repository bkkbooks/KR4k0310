body:
  text: 第九十三回留風院中借花獻佛濯龍園裏召將飛符卻説江貴走了之後小竇對他掩口一笑説道我今天勤謹地替你做一回守門的校尉你卻拿什麼來謝我呢他紅暈兩頰勉強笑罵道誰和你這蹄子來混説呢小竇笑道無論什麼事情皆有回圈不料現在的報應來得非常之快就如別人家嘴伸八丈長教我小心一點的不料我的餑餑包得十分緊倒一些沒有漏菜那伸嘴説人的人反而露出馬腳來了可不是笑話麼大竇笑罵頗耐這小蹄子越來越沒臉了他説罷一轉身往房裏便走小竇也隨後跟他進去口中説道你拿一把鏡子照照看那頭上蓬鬆得成一個什麼樣子呢還不過來讓我替你擾一擾萬一被媽媽看見了成一個什麼樣子呢大竇便靠著穿衣鏡旁邊坐下來小竇到妝臺上取了一把梳子走過來替他將頭髮攏起來大竇面朝鏡子裏只見小竇頭上發如飛蓬那墜馬髻旁邊還粘著雞子大小一聲青苔大竇禁不住笑道小蹄子你只顧伸嘴來挖苦別人你自己可仔細望望又成什麼樣子呢小竇聽説這話忙朝鏡子裏一望不禁漲紅了臉忙伸出手來先將青苔拈去然後又用梳子在頭上慢條斯理地梳了一陳子放下梳子朝大竇身旁一坐兩個人朝鏡子照了一會子四目相對連鏡子裏八道目光相視而笑大竇笑道自己還虧是個貴人呢就是叫化子要敦夫婦之倫還有一個破廟阿斷不能就在光天化日之下赤條條就做了起來的小竇辨白道人家説到你的心坎上的事兒沒有話來抵抗拿這些無憑無證的話誣人可不是顯見得理屈詞窮了麼大竇笑道罷了不要嘴強罷眼見那一塊青苔就是個鐵證小竇笑道那是不經心在園裏跌了一跤頭上沒有覺得粘上了一大塊青苔你沒有別的話只好捉風捕影的血口噴人罷了大竇笑道阿彌陀佛頭上有青天如果沒有做這些事情你當我面跪下來朝天發了一個誓我就相信他笑得腰彎道這不是天外的奇談麼好好的一個人為什麼事不得過身要發誓呢大竇笑道你不承認你做此等事情我自然不敢相信所以教你發誓的小竇笑道發誓不發誓和你有什麼關係誰要你在這裏橫著枝兒緊呢大竇笑得花枝招展地説道用不著你再來辨白了馬腳已經露出了我最相信你説是今朝沒有這回事的小竇還未會過他的意思來忙道當然我沒有做什麼不端的事啁大竇笑道自己方才倒老老實實地招出來了還在這裏嘴強呢用不著再説了小竇忙道我説什麼的你提出來罷大竇道你做事不做事賭咒不賭咒與我有什麼相干我當真是一個呆子不懂事還要囉嗦什麼呢小竇聽了細細地一想果然不錯自悔失言不禁將那一張方才轉白的粉龐不知不覺地又泛起一層桃花顔色來大竇笑道賊子足見膽虛聽見人家道著短處馬上臉上就挂出招牌來了小竇笑道你也不要説我我亦不必説你大家就此收束起來罷大竇拍著手掌笑道好哇這樣老老實實地承認下來也省得你嘲我謔的了他二人戲謔了一陳子瞥見他的母親和竇憲夫人一同進得房來大小二竇連忙起身迎接泚陽公主慌忙説道娘娘和貴人不要這樣的拘禮在家裏又何必這樣的呢小竇道媽媽慣説回頭話你老人家不是叫我們不要客氣的嗎那麼你老人家為何又稱呼我們娘娘貴人呢你老人家先自拘起禮來反要説我們客氣這不是笑話麼這話説得大家全笑起來連泚陽公主自己也覺得好笑他便對大竇説道還是杏兒渾厚些什麼事都不大來挖苦人惟有這豐兒一張嘴頂尖不過別人只要説錯了一句話馬上就將人頂得舌頭打了結一句話答不出來小竇笑道媽媽真是偏心我不過就是嘴上説話笑笑卻一點沒有計較心你老人家不曉得他呢他是冬瓜爛瓤子從肚裏頭往外壞面善心惡只蜜腹劍再壞沒有了大竇微笑不語竇憲的夫人胡氏插口笑道你用不著説了媽媽説了兩句你劈劈拍拍數蓮花落似地足足説了二十多句你看大妹妹他紋風不響的一句都沒有如果他要是個壞人他還讓你這樣貧嘴薄舌的嗎恐怕未必吧就是一個啞子也要呀兩聲呢他説罷小竇正要回話從外面走進一個僕婦來對泚陽公主説道老太太奴婢等四處尋找遍了兀的不知道他到哪里去了胡氏連忙問道果真沒有找到麼那婦人答道誰敢在太太奶奶面前説一句謊話呢胡氏柳眉一鎖對泚陽公主説道媽媽你老人家聽見麼我相信賤人犯了天狗星一定逃走了也未可知泚陽公主沈吟著答道我想他決沒有這樣的膽氣而且在這裏吃的是山珍海味穿的是綾緞綺羅住的是高廳大廈有什麼不如意處再則你們老爺待他還不算天字第一號麼胡氏説道你老人家這話差矣這些無恥的蕩婦知道什麼福成日沒有別的念就將些淫欲兩個字橫在心裏他只要生了心憑你是神仙府也不要住的泚陽公主道還不知道你們的老爺曉得不曉得呢胡氏道可不是麼他要是曉得他逃走了一定要來和我蠻纏了泚陽公主道你不要怕他如果真的來尋你你可來告訴我一頓拐杖打得他個爛羊頭話言未了竇憲帶了幾個侍尉走了進來泚陽公主便開口向他説道兒呀我們府裏在這兩天忙亂之中出了一件不幸的事情你可知道麼竇憲吃了一驚忙問道你老人家這是什麼話呢泚陽公主説道你那個最心愛的驪兒卻不知去向了杜清插口便道太太還要提呢竇憲趕著將他瞅了一眼開口罵道你這小雜種多嘴多舌的毛病永遠改不掉杜清碰了一個釘子努著嘴不敢再説泚陽公主見了這樣的情形便知另有別故忙向竇憲喝道該死的畜生你見他和誰談話的遮天蓋日一塌糊塗地罵了下來不是分明看不起為娘的麼嚇得竇憲垂頭喪氣地賠罪道孩兒知罪衝撞了太太務請太太饒恕我一次下次再不敢放肆了泚陽公主便對杜清道你快些説下去他究竟是怎樣不見的杜清見竇憲站在旁邊氣衝衝的他嚇得再也不敢開口泚陽公主一疊疊地催道快説快説那杜清竟像泥塑木雕的一樣悶屁都不敢放一個泚陽公主大怒喝道這小畜生倒不怕我了不給你一個厲害你還不肯説呢來人給我將這個小畜生綁起來重打四十大棍杜清聽説嚇得屁滾尿流也顧不得許多了雙膝一屈撲通往下一跪口中央告道太太請暫且息怒我説就是了泚陽公主忙道你快點説杜清便將驪兒怎樣和小法師私通怎樣被自己看見後來怎樣被竇憲殺了的一番話一五一十完全説了出來把個泚陽公主氣得一佛出世二佛遝架厲聲罵道我竇家三代祖宗的光榮全被你這畜生敗盡了成日家鹹的臭的全往家裏收納做下這些沒臉的事來何嘗聽過我一句話你自己也該想想皇恩浩蕩憑你這些的蠢材還配得做一個大司馬麼一天到晚沒有別的事丟得酒便是色你這畜生就是立刻死了也算我竇家之福你不怕遺臭萬世我難道就能讓你無所不為的了嗎好好好我今天的一條老命也不要了和你這畜生拼了罷他説罷取下杖就奔他身邊而來大小竇連忙拉住大竇説道太太動氣了還不跪下麼竇憲連忙往下一跪泚陽公主仍未息怒將他罵得狗血噴頭開口不得一直鬧了一夜到了卯牌時候才算停止泚陽公主也罵得倦了正要去安息瞥見有個家丁進來報道接駕的已到請娘娘們趕緊收拾回宮吧大竇便和他母親説道太太孩兒要去了又不知何日才能會面呢泚陽公主勉強安慰道我兒天長地久後會的期限正多著哩但望你善侍君王為娘的就放下一條愁腸了不説他們在這裏談著單表小竇聽説要動身了不禁著了忙也無暇和他們去談話移身徑向西邊百花亭後面的廂房而來走到廂房裏面只見化兒已經替潘能改扮好了果然是一個很俊俏而又嬌豔的宮女那化兒正在那裏扭扭捏捏地教他學走路呢見了他忙出來迎接小竇便説改扮停當了麼化兒點頭笑道改扮好了但是有些不像之處他道有什麼不像之處呢他笑道別的不打緊可是走起路來終有些直來直闖的沒有一些女子的姿勢卻怎麼辦他道你用心教他走兩回他自然就會得了化兒便又婷婷嫋嫋地走了起來潘能便經心著意地跟他學了兩趟説也奇怪竟和他一般無二了小竇笑道可以了我們就走吧化兒與潘能剛要動身他偶然一低頭不禁説道阿唷還有一處終覺不妥而且又最容易露出破綻來便怎生是好呢化兒忙道是什麼地方呢他用手朝他的腳上一指笑道那一雙金蓮橫量三寸竟像蓮船一樣誰一個宮女有這樣的一對尊足呢化兒見了果然費了躊躇停了半晌猛地想出一個法子來對小竇笑道娘娘不要躊躇罷我想起一個最好的法子來了他忙問道是什麼法子化兒笑道只要將宮裙多放下三寸來將腳蓋起來行動只要留心一點不要將腳露出來再也不會露出破綻的了小竇連聲説道妙極就是這樣辦罷還要快一些馬上就要走了化兒便又來替他將宮裙放下三寸將那一雙驚人出色的金蓮蓋起來化兒便去將那些帶來的宮女一個個都喊了近來將他夾在當中化兒又叫他不要亂望只管頭低著走方不會露出馬腳來他一一地答應著隨著衆人竟向大竇這裏而來到了門口只見大竇已經預備就動身了見了小竇不禁埋怨道什麼事這樣牽絲扳藤的呢儘管慢騰騰的回宮去倘使萬歲見罪便怎生是好呢小竇笑道你只知就要走他們來的那些宮女不招呼他們一同走難道還將他們留在府中不成大竇道偏是你説得有理要招呼他們老實些家裏哪個僕婦用不起呢偏要親自去請不怕跌落自己的身分麼小竇道已經招呼來還只管嘰咕什麼呢二人説著便扶著宮女徑出了大廳到了孝帳裏在遺容面前又舉哀告別做了半天的儀式才和他的母親與嫂嫂告辭上輦泚陽公主領著兒媳一直送到儀門外外才回來這且慢表岔轉來再説大小竇回了宮先到坤寧宮裏章帝的面前謝恩章帝離了他們姐妹兩個一天竟像分別有了一年之久的樣子連呼免禮一把將竇娘娘往懷中一拉口中説道孤的梓童我離你一天一夜實在不能再挨了好像有一年的光景説罷又將小竇拉到懷中笑道愛妃你今天可不要回宮去了就在這裏飲酒取樂吧小竇斜飄星眼向他一瞅嘴裏説道萬歲爺真不知足難道有分身法麼應酬他還能應酬別人麼真是餓狗貪惡食吃著碗裏想著鍋裏的我今天卻不能遵命寧可萬歲爺明天到我那裏去罷章帝聽罷哈哈大笑道愛妃這話是極倒是孤王不好了就這樣説吧我明天定到你宮去小竇聽了不住地微笑不多時用了午膳小竇便起身告辭回到宮中宮女們叩拜後都到他的房中服侍一會子天色已晚了小竇向化兒使了個眼色那些服侍小竇的宮女被化兒一齊喝退下去小竇笑向化兒道這事不虧你怎能這樣的周全呢化兒笑道罷了娘娘不要贊我若不是娘娘想出這條妙計來我又到何處去顯本領呢小竇笑向潘能道你向後可要報答報答你的姐姐才是個道理化兒跪下説道娘娘不要和奴才來尋趣罷奴才不敢他正色對化兒説道你快點起來我和你説話化兒便站了起來他説道你卻不要誤會我方才這句話卻是從心裏頭説出來的斷不是和你尋趣的化兒聽了這話反而不好意思起來羞得漲紅了臉一言不發小竇笑道足見你們女孩子家沒有見過什麼世面這裏除卻你我他三人也沒有第四個曉得何必儘是羞人答答地做什麼呢化兒也不答話小竇便使了一個眼色給潘能能兒會意忙拿起銀壺滿斟三杯佳釀恭恭敬敬地送到他的面前口中説道姐姐今天得進宮來全仗大力小生感激無地請姐姐滿飲三杯也算小生一點微敬了他舉起杯子仰起粉脖吃了下去對小竇笑道娘娘聽見麼這會子還是小生大生的不改口吻幸虧是和我説的如其遇著別人怕不走露風聲麼小竇嗤地笑道可不是呢能兒笑著插口説道我這一點難道還不會麼不過在什麼人面前講什麼話罷了小竇笑道你不用舌難口辨的向後還是小心一點為佳能兒諾諾連聲地答應著一會子大家都有些酒意便散了席化兒起身對小竇説道娘娘我要去了他忙道你倒又來了你這會子還到哪里去的他道我今天的酒吃得太多了還是到留風院去安安逸逸地睡一夜罷小竇道你酒吃得不少怎能回去呢還是教能兒送你吧化兒口説不要可站起來花枝亂擺四肢無力心裏還想爭一口氣要走無奈天已黑下來小竇見此光景暗想何不如此如此教他沾染了向後死心塌地的聽我擺布想到這裏便向能兒丟了個眼色又做了一個手勢能兒會意趕緊來到化兒身邊將他扶住問道留風院在什麼地方小竇道你順著遊廊向北去便是他答應著雙手架著他的玉臂來到留風院他的房裏他也不客氣竟動手替他寬衣解帶他到了此際也就半推半就的隨他動手不一會二人鑽進被窩幹起那件風流事來停了一會子雲收雨散能兒不敢久留便附他的耳朵悄悄地説道姐姐你明天早點過來替我妝扮要緊他醉眼惺忪似笑非笑地點頭答應他又摟著他吻了一吻才撒手下床到了小竇的房裏只見燈光未熄他進了房只見他外面的衣裳已卸盡上身披了一件湖色的輕紗小襖下面穿一條銀紅細綃的混褲玉體橫陳已躺在榻上睡著了好個能兒他竟不去驚他轉過身子先將簾子放下然後走到床前替他寬去衣裳他一點也不知道及至動作起來才將他驚醒微睜醉眼悄悄地罵了一聲促狹鬼他喘吁吁地笑道你這人真是睡死覺了小和尚進了皮羅庵還不知道呢他也不答話鏖戰了多時才緊緊地抱著睡去從此能兒左擁右抱受盡人間豔福了停了十幾天章帝忽然得了一個風寒症延綿床笫一連一個多月不見起色大竇熬煎得十分厲害又不好去想別法只得出來間逛間逛藉此稍解胸中的積悶便約小竇一同到濯龍園裏望荷亭上去納涼也未帶宮女二人談了一陳子大竇滿口怨詞似乎白天好過黑夜難挨小竇猜透他的心理便向他笑道姐姐我有一個人可以替你消愁解悶這正是嫩萼嗟無三月雨孤衾不耐五更寒要知後事如何且看下回分解
