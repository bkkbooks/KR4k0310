body:
  text: 第七十二回纖手解紅羅柔情似水禿頭膏白刃軍法如山卻説劉文叔大醉入房與郭氏攜手入幃共效于飛之樂良宵苦短曾幾何時又是紗窗曙色郭氏正要起身梳洗猛可裏聽得劉文叔哽哽咽咽地哭道兄長你放心我今身不替你報仇誓不為人不過我面上卻萬萬不能露出顔色須知劉玄的耳目衆多萬一走漏風聲不獨我沒有性命就是仇也報不成了他説罷哽哽咽咽哭個不住把個郭聖通大吃一驚也顧不得什麼羞恥伸出一雙纖纖玉手將劉文叔推醒只見他淚痕滿面聖通低聲問道你方才夢著什麼噩夢便這樣大驚小怪的劉文叔忙坐了起來雙手揉揉睡眼只是發呆聖通又低聲問道君家為著什麼緣故這樣的糊塗劉文叔到這時才聽見他問話忙答道沒事沒事不過心中事每每形於夢寐罷了郭聖通也坐了起來一面先替文叔將衣披好一面笑道你用不著瞞我了我方才聽得清清楚楚了劉文叔料想也瞞他不住便將劉玄怎樣將他的哥哥殺了自己預備怎樣報仇的心事完全告訴聖通他聽了這番也是獻欷欲泣似的兩個人默默的半晌聖通才開口向文叔勸道君的玉體務望保重要緊不要常常傷感天長地久終有報仇的一天劉文叔拭淚答道卿的勸我原是正理怎奈手足之情片刻不能忘卻聖通又勸道君家現在勢力直欲蓋劉玄而上強將如雲謀士如雨要想報復前仇還有什麼阻礙麼依我想目下王郎未滅天下未安宜先從事征討清靜那時推翻劉玄一反掌間耳劉文叔聽他這番話真是喜不自勝情不自禁地用手將他懷中一摟揾著香腮低聲説道卿乃真知我心兩個人喁喁地又談了一會子他説出來的話無句不中聽把個劉文叔喜得心花大放比陰氏還要寵愛三分不多時已到辰牌時候劉文叔才起身升帳與衆將商議進攻的方法鄧禹對文叔道如今我們的軍威正盛萬不可稽延時日須即日繼續出伐直搗邯鄲王郎小丑不難一鼓蕩平了劉文叔投袂而起對衆將説道鄧先生的高見正與我同望衆將軍指示可否帳前的衆將一個個伸拳虜袖齊聲説道鄭先生的高見我們誰不贊成呢劉文叔見衆將如此同心協力心中暗喜忙下令進兵留下劉植守昌城陰識守貰縣餘下的衆將完全隨征揮動大隊人馬浩浩蕩蕩直向元氏縣進發還未到城下元氏縣的官長只嚇得屁滾尿流忙請都尉重黑商議迎敵之計重黑聽得劉文叔領兵百萬強將千員前來討伐早就嚇得渾身發軟四肢好像得了寒熱病一樣抖抖地動個不住又想逃走又想求救真是和熱鍋上螞蟻一樣團團亂轉一無著處猛聽得縣令請他商議忙對來人説道請你回去對縣太爺説罷我這兩天身上有些不好兀的惡寒怕熱的那人只得回去照他這番話告訴縣令把個縣令急得走投無路暗道當著這生死的關頭偏偏他又生病這不是活該要送命麼他萬分無奈親自到都尉重黑的家裏來重黑聽説他來只得裝著病哼聲不絶地出來故意問道縣令今天到這裏有什麼貴幹嗎縣爺跌足大聲道你還不曉得麼現在劉秀帶兵百萬強將千員前來討伐我們了大約就在兩天之內就要到了重黑哼道那麼怎樣辦呢偏生我又病著如果好好的不是我重某誇一句海口憑那幾個毛鬼不消我一陳斧頭包管殺得他片甲不存但是我這兩天病勢漸漸凶惡得十分厲害還要回去請醫服藥縣爺聽他這話慌了手腳道將軍一走我是個手無縛雞之力的人怎生應付呢重黑翻起眼睛説道咦這真奇怪極了人家病這樣的重難道不要回去診視嗎縣爺哭喪著臉説道將軍一個人回去也不要緊不回去也沒有要緊可是下官還有三個小兒四個小女假若劉秀到此豈不是全要做無頭之鬼嗎重黑呻吟了半晌向縣令道我倒有個主意明天劉秀到了你豎起降旗跪倒他的馬前多説幾句好話就完了事此刻恕我不陪了縣令見他向後面前進去只得回來預備投降差不多申牌的時候劉秀的大軍已到金鼓震天喊聲動地把個元氏縣令嚇得手顫足搖拼命價地喊人豎起降旗自己硬著頭皮開了城門走到劉文叔的馬前撲通往下一跪口中説道元氏縣縣太爺迎接劉秀大老爺進城這兩句話説得劉文叔不禁嗤地一聲笑將出來見他那種神氣活現的樣子又可憐又可笑忙教人將他扶起一同進城留下李忠守城便星夜向房子縣進發直走一夜到東方發白才到房子縣的城外扎下大營正要預備攻城早見城裏豎起降旗城門大開劉秀忙領兵入城那守城的縣令早逃得不知去向劉文叔安民已畢便與諸將商議進攻辦法銚期道軍如荼火萬不可稍稍延頓致挫鋭氣依我的愚見趁此再向鄙城進攻等鄙城一下再教士卒們稍留憩幾日再行進發劉秀大喜忙下動身令只留下萬修守房子縣不到半日果然又將鄙城攻克正待出示安民猛聽城外喊聲震地金鼓大鳴鄧禹忙命人撤起吊橋閉起城門大家上城頭觀看只見一隊賊兵從西北上蜂擁而來為首一員賊將生得虎頭燕額十分威武手持四竅八環刀到了城下厲聲喊道不怕死的草寇快來納命岑彭按不住心頭火起便來請令文叔見他要出馬自然歡喜忙道將軍肯去好極了岑彭飛馬出城到了垓心大聲喝道來將通名那個賊將大聲説道你站穩了我乃大漢皇帝部下大將軍李惲是也岑彭也不答話舞動龍蛇槍扭住便鬥槍來刀去大殺了一百多回合未見勝負劉文叔見李惲委實厲害恐岑彭有失忙鳴金收兵岑彭虛晃一槍兜馬入城李惲立馬垓心等候多時不見有人出來勃然大怒下令功城城上的灰瓶石子飛蝗一般地拋擲下來賊兵倒被打得頭破血飛李惲無奈只得領兵轉道向東門而來到了東門附近厲聲大罵不多時馮異手持獨腳銅人打出城來二人見面也不答話大殺起來大戰了八十多合城上一片鳴金聲音馮異便拋下李惲飛馬進城去了李惲再來罵陳誰知一直罵到未牌的時候竟沒有一個人出來答應他李惲可氣壞了可是他雖然厲害不敢攻城便撥馬向城南便走未到南門銚期躍馬橫刀早已在那裏等候見了他狂笑一聲道反賊休慌你老爺在此等候已久了李惲大怒也不答話拍馬舞刀來戰銚期銚期慌忙接著二人奮力大殺了四十多合不分勝負這時城內忽然飛馬跑出一員女將來攪動梨花槍沖到垓心張開櫻桃小口嬌聲喝道毛賊休慌快此納下頭顱免得姑娘動手李惲大怒正要來戰銚期虛閃一個架子縱馬回城劉伯姬便和李惲大戰起來殺到分際劉伯姬拍馬落荒而走李惲哪知是計一味的不顧死活催馬追來劉伯姬霍地扭轉柳腰正待取弓説時遲那時快這時耿純不知從何處來的騰雲價地飛到李惲的馬前大喝一聲李惲措手不及被耿純一刀斬于馬下一隊賊兵嚇得狼奔鼠竄地逃了劉伯姬梟了首級正待回馬瞥見有兩員賊將從賊兵中放馬沖到伯姬的面前刀矛並舉劉伯姬也不怯懼耍動梨花槍敵住二人未到十合不料從北邊又沖來兩個一個手執雙錘一個手執開山斧來戰伯姬伯姬不慌不忙展開梨花槍敵住四人劉文叔深恐他妹妹有失忙叫人鳴金這時城頭上鳴金的聲音嗆嗆嗆敲得震天價響誰知伯姬安心要在衆將面前大展才能亂翻玉臂大戰四人兀地不肯回來李通在城上看心慌飛奔下來一馬沖到垓心舞動大刀戰住兩個賊將伯姬雖然稱雄究竟是個女流之輩廝殺了一陳便吃徑得了不得見李通分去二將自己登時輕爽得多了奮起精神和二人惡鬥不止王霸耿弇更是看得眼熱二人也不待命令並馬出來各揮兵刃來幫助李通劉伯姬那幾個賊將見有人來幫助忙分頭迎敵伯姬深恐馬乏虛晃一槍跳出圈子讓王霸去獨戰兩將伯姬見王霸的雙錘耍得風雨不透將那兩員賊將殺得只有招架之功並無還手之能伯姬更不怠慢霍地扭轉柳腰彎弓搭箭颼的一箭那個使刀的早已翻身落馬説時遲那時快伯姬的第二箭又到不偏不斜正中那個使戟的手腕一放手被王霸手起一錘將那賊的馬頭打得粉碎那賊將被馬掀落在地王霸飛身下馬將那兩員賊將生擒活捉了忙與伯姬正要來幫助李通耿弇只見他們各捉一個正在那裏捆縛呢四人各擒一員賊將高高興興地回城劉文叔一一慰勞已畢便命將那捉來的四個賊將帶了上來那四個賊將立而不跪十分強悍劉文叔倒有一種憐才之意便來用柔軟的手段收服他們正要下令松綁鄗城的縣令上前攔道明公休要亂動這四個死囚非殺不可萬無赦放之禮劉文叔忙問什麼緣故鄗城縣令咬牙説道這四個死囚原姓蘇是鄗城第一個財主此番明公起義到此下官本已預備歸附明公不想這四個死囚堅要和我作對一面淆惑百姓還不算數還要去勾結王郎的部下李惲來和明公作對這人如果將他留下必為後患求明公還是殺去的好劉文叔聽了這番話不禁怒從心上起惡向膽邊生忙教人推出去斬了一面又命祭遵帶了一隊人馬前去抄拿家屬軍司令祭遵帶了人馬直撲蘇宅而來這且慢表如今單説有一個人姓王名明他本是劉秀家中的一老家人的義子此番起義他也跟劉文叔到東到西這王明生性狡猾異常事事趨承劉文叔倒也十分歡喜他王明便仗著文叔的勢力居然出車入馬威風凜凜的衆人都以為他是劉文叔的私人不去惹他誰想他見衆人不去理他竟疑衆人怕他越加肆無忌憚諸將誰不是寬宏大量的誰也不去和他較量長短劉文叔見他辦事精勤也肯信用他因此把這個舍中小兒一天一天地捧出頭了今天他在帳後聽説要去抄查蘇家他不禁動了念頭暗想道我跟了小主人至今還沒有一點餘積聽説這蘇家是個大財主何不去撈幾文來用用呢他主意打定卻不走前面躡足潛蹤地出了後門上馬加鞭直向蘇家而去誰知他初到此地的路徑不熟竟摸錯了一路上問人好容易摸到姓蘇的府前只見裏面已經鬧得沸反盈天捉的捉綁的綁哭的哭喊的喊烏亂得一天星斗他下了馬挺腰凸肚地走了進去守門的兵士都認識他是劉秀的家人所以讓他進去王明得意洋洋地直往後闖到了百客廳迎頭撞見祭遵祭遵只當是劉秀差他來勘察的呢連忙向他恭而有敬地行了一個禮王明正眼也不去看他一下子稍稍地一頷首便與祭遵擦肩而過他一徑直向後面住宅裏走來登樓上閣真個勘察史一般到一處有一處珍寶珊瑚鏡翡翠瓶五光十色目不暇接他恨不得連屋子都帶走撞來撞去一頭撞到庫房裏面只見那些金錠銀錠堆積如山他可沒了主意又不知怎樣才好拼命價地往懷裏亂揣霎時懷裏揣得滿了又將褲腰鬆開放了兩褲腳管的金銀錠子袖子裏又籠了好些正要出去猛可裏後面呀的一聲他大吃一驚回頭一看只見那北邊靠牆的那一面書櫥動了起來他不禁暗暗地納罕道這真奇怪極了怎麼這個書櫥竟會動呢莫非年深日久成了精怪不成麼他正自一個人在那裏遲疑不決瞥見書櫥開處後面現出一個門來他不禁暗喜道這裏一定是蘇家藏寶貝的機關倒要來看看他説著輕手輕腳走到門旁邊正要進去瞥見裏面走出一個千嬌百媚的妙人來但見他雲髻蓬鬆星眼流電那一副整齊面龐兒真是個令人神飛魂落王明見了大喜欲狂急忙撲上前去那美人被他一嚇連忙縮身躲了進去他隨後跟了進去不知不覺地砰的一聲外面的書櫥仍舊關上他進祕室仔細一看只見裏面錦屏繡幕裝設得富麗堂皇但是那個美人卻不知去向他一顛一簸地四處尋找不料將雙手無意往下一放袖子裏的金銀錠子一起造了反骨碌碌地滾了下地他連忙要去拾錠子猛聽得帳子裏有人吃吃地發笑他這時錠子也無心去拾了忙走到帳子前揭開一看只見那個美人坐在床前只是向他發笑他可是如同得著一方金子似的不管三七二十一搶過那個美人往懷中一摟説道我的心肝那美人連忙伸出纖纖玉手含羞帶愧地將他往旁邊一推低垂粉頸梨面通紅王明哪里肯就此罷手又過來將他摟住説道美人你不要倔強現在你們一家子全被我下令拿去斬了那個美人聽了他這話只嚇得玉容失色梨面無光便哽哽咽咽地哭將起來他連忙問道你是他家的什麼人趕緊告訴我或者可以放你那美人嬌羞欲絶哪里還肯答他的話呢列位要知道美人的來歷在下就此交代明白省得諸位在那裏打悶胡蘆原來這個美人名叫金楚楚是蘇大戶用二千銀子買來的這楚楚是蘇大戶第一個寵妾整日價的將他藏在庫房後面的一間祕密室裏自從這蘇大戶帶了三個兄弟到王郎那裏去求救金楚楚在這祕密室裏無一日不擔驚受怕的今天一早上就有丫頭進來送信説大戶弟兄四個全被劉秀捉住殺了快些預備出去逃命罷這金楚楚還有幾分不大相信這時見王明進來才知大戶真個被殺了他可憐哪里還敢回話低著頭只是啜泣不止王明又向他説道美人我看你依了我一件事我馬上命人將你接到我的家中去做太太那楚楚見他這樣心中十分不願無奈性命要緊也不敢説不答應只得低首無言王明一面摟住他那一種蘭麝的香氣直沖到他的鼻子裏心裏本就把那一股無明欲火高舉三千丈捺按不下不由分説將楚楚往床上一按正要開始工作那褲了裏的錠子纍墜得動彈不得他可是顧不得許多了胡亂的將腳管一放那些錠子一個個地滾落到地上他爬上床來楚楚又不敢動彈將玉體橫陳在床上閃著一雙星眼只是望著王明做作這時王明伏到他身上説道美人你可將羅裙解去好與你他不敢不依含羞帶愧地用手將羅裙解去霎時動作起來正在這入彀的時候猛地有人將門一推闖進十幾個人來楚楚忙道有人進來你快些起來那王明哪里肯放手只顧緊抱住楚楚務求完事説時遲那時快有人將帳子一揭王明回頭一看不禁倒抽一口冷氣你道是誰卻原來就是祭遵他連忙爬下床來祭遵見此情形不覺勃然大怒手起一劍竟將王明的一顆癩痢頭早和肩上宣告脫離一縷魂靈直向巫山十二峰去了這時楚楚嚇得渾身亂戰祭遵命人一併捆起這時忽然有一個人對祭遵説道軍司令這岔子你可惹得不小你方才殺的這人你知道是誰祭遵搖頭道管他是誰犯了法終要斬的這正是有味殘膏猶在指無情利刃已臨頭要知後事如何且看下回分解
