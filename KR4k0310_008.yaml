body:
  text: 第八回古埒城覺昌死難撫順關尼堪斷頭卻説覺昌安父子兩人正商議尼堪外蘭那尼堪外蘭忽然親自走上門來求見當下他進得帳來見了覺昌安口稱奴才行了一個全禮覺昌安劈頭一句便問道你們蘇克蘇滸河部久已投降在我屬下如今反叛了本都督卻幫著明朝來打自己人還有什麼話説尼堪外蘭聽了連聲地嚷著冤枉接著説道奴才承蒙都督提拔給我做了一個圖倫城主這顆心豈有不想著都督之理無奈此番王杲得罪了明朝明朝為斬草除根之計要抓拿王杲的兒子阿太章京逼著奴才替他引路奴才要不答應時一則怕他兵多將廣他一翻了臉奴才如何抵擋得住都督又遠在建州一時也沒地方喊救兵二則又怕他叫別人引路這座古埒城越發破得快些因此我一面假意投降明朝幫著他攻打城池一面卻等侯都督到來商量一個退兵的妙策覺昌安聽了便説道這卻不知道塔克世接著説道那阿太章京便是我的侄女壻也是我父親的孫女壻這大孫女是我父親最鍾愛的尼堪外蘭聽了忙伏在地下磕頭説道奴才該死奴才卻不曾知道如今既然是都督的孫女壻奴才便對寧遠伯説去只説都督願意親自去説阿太章京看親戚面上讓了這座古埒城那時叫各處兵馬退扎五裏地方讓都督進城去見了阿太章京那時裏應外合都督和古埒城兵從城裏殺將出來奴才帶領兵馬從城外殺將進去出其不意怕不把明朝的兵馬殺得七零八落那時再和明朝講和要他加我們的封號豈不是好嗎這時覺昌安要見孫女兒的心十分急迫聽尼堪外蘭説到這裏連聲説好當時尼堪外蘭退去臨走的時候説定覺昌安帶了兵馬從正東上殺進城去看看到了日落西山滿眼蒼茫覺昌安便下令拔寨起行走到古埒城邊看看那四面圍城的兵士果然一齊退去正東上是尼堪外蘭的兵隊見建州兵到來便讓出一條路來尼堪外蘭騎在馬上看看覺昌安和塔克世走進身來悄悄地上去説道都督留心明天一清早城外炮響便殺出城來接應覺昌安點點頭過去看看到得城壕邊城上認得是建州的旗號忙開出城來迎接進去到了章京府中大孫女見了親呢地倒在祖父懷裏嗚嗚咽咽地哭泣起來覺昌安一面撫慰著一面把尼堪外蘭的計策詳詳細細地對他孫女壻説了阿太章京聽了也不由得十分歡喜當夜章京府中大開筵宴又拿了許多酒肉去犒賞兵士傳令下去今夜早早安息五更造飯準備廝殺合府中人個個吃得酒醉飯飽各自安眠獨有阿太夫妻兩人覺昌安父子兩人骨肉之親久別重逢自然有許多話説直到半夜雞鳴才告過安止各歸臥室覺昌安年老體衰一路鞍馬勞頓十分疲倦爬上舒適的炕榻頭一落枕早已昏昏沈沈不知所云正好睡的時候忽聽得後面發一聲喊塔克世先從夢中驚醒過來只見眼前一片雪亮院子裏火把熏天一大隊強人正打破了門蜂擁進來塔克世心知不妙忙從炕上背著父親拔腳向後院子逃去轉身便把後院門塞住覺昌安這時心裏只記念他孫女兒一面吩咐塔克世在前面抵敵強人自己忙搶進後屋去只見他孫女兒和三五個侍女慌得縮在一堆打顫個個從夢中驚醒過來雲鬢蓬鬆衣襟散亂大孫女見了覺昌安忙搶上前去摟著脖子嘴裏一面嗚咽著嚷著爺爺救我覺昌安問他丈夫時説已帶了幾個衛兵到前面院子裏和強人廝打正説話時耳中只聽得震天價一聲響亮接著外面發了一聲喊沖天起了一陳火焰一個小侍衛氣喘噓噓地進來説外面大門倒了許多強人四下裏正放著火都督快逃罷再遲一步怕保不住性命了覺昌安聽了叫了一聲我的天忙拿起一床錦被來給他孫女裹著身子奪門出去只見他兒子塔克世獨自一人抵敵著強徒且戰且退那強徒被他殺死倒在地下的也不少塔克世自己也渾身負了傷嘴裏淌出血來他一面罵人一面還是拼死命地抵敵著一回頭見他父親扶著他的侄女出來他便精神陡振大聲喊道父親快走他奮力向前殺開一條血路那邊露出一扇側門來覺昌安這時也顧不得他兒子了一手拖著孫女兒搶出側門去回過頭來見一個強徒手裏拿著一柄快刀向塔克世腰眼裏搠進去塔克世冷不防有人暗算大喊一聲倒在血泊裏死了覺昌安説一聲可憐忙拿袖子遮住臉一兀頭向前逃去誰知才走出大門只見他孫女壻的尸首倒在當地身上已經被刀槍搠得七洞八穿那血不住地往外淌他孫女兒一眼看見了忙摔脫手大叫一聲一聳身撲在丈夫的尸身上昏絶過去了接著便有五七個強徒上來和群狼捕羊一般把孫女兒的身體捧起來覺昌安見了急拔下佩刀來搶上去奪時冷不防腦脖子後面飛過一刀來一陳冷風過領似的把這位老都督的腦袋搬了下來這一場好殺直殺到天色大明才慢慢地平靜下來尼堪外蘭一匹馬先到章京府門前下馬吩咐手下兵士們把尸首搬開打掃庭院一面出示安民一面準備接駕原來這完全是尼堪外蘭的妙計可憐覺昌安父子兩人只為救大孫女的心切一時失算中了毒計枉送了父子夫妻四條性命到了午後寧遠伯擺隊進城左有尼堪外蘭右有王台坐在大堂上犒賞軍民好不威風事畢以後便在府中大擺筵宴這一場慶功酒直吃到夜靜更深方才各自歸寢第二天起來尼堪外蘭和王台兩人進去見了李成梁李成梁早已把報捷奏章寫好當下給兩人看過便立刻打發專差送往北京城去不提這裏李成梁和王台計較如今覺昌安父子雖死那建州地方還有許多貝勒和塔克世的兒子在著便是建州部下有許多城池都還不曾歸附須得勞頓你們兩位各帶本部人馬前去招安當下尼堪外蘭自告奮勇願率領本部人馬直驅建州王台也答應去收服各處城池當時也不耽擱各位雄主各個告別離古埒城向東而去不多幾天尼堪外蘭早已到了建州城下那建州城裏早鬧得人心惶惶草木皆兵古埒城被打破覺昌安父子倆和阿太章京夫妻的死耗傳到建州城裏第一個要哭死了老妃子第二個便急壞了禮敦貝勒他聽説父親弟弟女兒女壻一齊被殺便哇的一聲口中鮮血直噴倒在地下不省人事那位大福晉在一旁哭著喊著也沒有一個人去幫助他説也好笑這時那許多貝勒聽説大兵快到便各個帶了妻兒溜之大吉到底還是努爾哈齊的心熱忙上去幫著他伯母把伯父扶起來躺在炕上停了一會禮敦清醒過來問時那叔伯弟兄輩逃得一個不留只有他二弟額爾袞還在府中便去喚來禮敦便把府中的公事託付二弟説道這是父親和四弟託付給我的我如今託付給你你須要拼著性命保全我們愛新覺羅氏一家的事業回過頭來又對努爾哈齊説道好孩子你也要爭氣跟著你二伯父做事體須不要忘了殺祖殺父之仇他説著接著又吐了一陳狂血昏絶過去了這裏額爾袞拉著努爾哈齊到外面悄悄地説道你伯祖叔祖和伯父叔父都逃去了你大伯父看看也不濟事了偌大一座城池靠我一個人怕不能抵敵得住天朝大兵依我的意思還不如早早投降了罷努爾哈齊聽他二伯父的話不由得勃然大怒正要説話忽聽得遠遠的一陳吹角聲外面侍衛飛也似地跑進來報説尼堪外蘭帶了大兵離城不遠了額爾袞接著説道快投降去這時院子裏擠著許多部下的兵將努爾哈齊聽了他二伯父的話忙即在當地跪下對著兵將們連連磕頭一邊淌著眼淚一邊説道諸位將軍也須看在我祖父和父親面上不要忘了不共戴天之仇幫著我些罷努爾哈齊的話未曾説完忽見侍女出來説道大貝勒不好了快看去罷努爾哈齊和額爾袞聽了忙跟著進去只見禮敦貝勒睜大了眼眶一手指著外面院子裏咽氣去了那大福晉哭得死去活來努爾哈齊了淒涼萬分大家哭了一陳額爾袞吩咐努爾哈齊在裏面照料喪事自己到外面照料軍國大事去了努爾哈齊身雖在裏面心卻在外面耳中只聽得一聲聲吹角的聲音止不住他心頭亂跳看看到了第三天裏面喪事粗粗就緒他便悄悄地溜出府外去只見街上百姓東奔西跑那兵士們三個一簇五個一堆在那裏搗鬼努爾哈齊上去問他們為什麼不去打仗那兵士們回説如今尼堪外蘭的兵隊已經把建州城圍得鐵桶相似二貝勒吩咐不叫打仗大家正商量著開城納降呢努爾哈齊不聽這話還可聽了時不由得怒氣上沖他也不多問轉過身去找了兵器跳上馬背飛也似地出西門去直趕到敵人營門下大聲喝著尼堪外蘭出來講話把門兵士傳話進去尼堪外蘭果然踱出營門來努爾哈齊見了咬牙切齒也不説話一兀頭舉著槍向前直刺過去被左右衛士舉刀攔住了那尼堪外蘭卻不惱怒笑盈盈地説道你祖父父親都已死了你部下的城池都已投降了你還不早早投降等待什麼努爾哈齊咬著牙罵道你這忘因負義賣主求榮的畜生建州都督並不虧待于你你如何私通明兵害我祖父你是我父親部下的人恨不能死挖你的心生啖汝肉替我祖父報仇還説什麼投降的話説著又是一槍過去那邊閃一員戰將出來兩人便在營門前左盤右旋廝殺起來看看他們兵士越來越多努爾哈齊一個人如何抵敵得住他便勒轉馬頭跑進城去後面也沒有人追趕努爾哈齊一人進得府來胸中氣憤不過也不去見他二伯父直跑到他大伯父的靈座前大哭一場回房去昏昏沈沈地睡倒正朦朧的時候忽覺得有人伸手過來輕輕攀他的肩頭他睜眼一看不是別人正是大伯母禮敦福晉那禮敦福晉慌慌張張的神色在他耳邊悄悄地説道好孩子快走罷他們要謀你的命呢説著捧過一大包銀錢揣在他懷裏也不容他多説話開著後院的窗子推他出去窗外有一個侍衛候著見努爾哈齊出來忙領著他從後門出去門外有兩匹馬他主仆兩人悄悄地上了馬連打幾鞭和風馳電掣似地在街上跑著這時候在半夜裏沿城根荒野地方走著一路也無人查問看看到了城門口那侍衛上前去説了幾句話便開著城放他二人出去一路上過了幾重關山都是建州衛的地界看看離撫順關近了努爾哈齊便想起他妻子佟氏便改換路程向撫順關東面奔去正轉過一個山岡忽見前面一簇人馬鬼鬼祟祟地躲至大樹林中探頭兒努爾哈齊認是響馬來了但也不害怕拍馬上前看看到了跟前林中閃出一個人來攔路跪倒口中高聲喊道來者可是小主人努爾哈齊努爾哈齊聽了十分詫異忙問道你是什麼人那人忽然大哭起來接著林中二三十人一齊趕出來跪在馬前説道我們都是跟著老都督到古埒城去的敗殘軍士努爾哈齊聽了他們的話不由得落下淚來忙翻身下馬扶他們起來問起當時的情形大家説得傷心慘目聲淚俱下裏面有一個是侍衛長名叫依爾古也從林子裏去捧出十三副盔甲來説這是兩位都督的遺物努爾哈齊看了不由得捧著那盔甲大哭一場看看這班兵士個個面容枯瘦衣服破碎問起來都是三天不曾吃飯了努爾哈齊忙帶他們到左近飯館裏去飽吃了一頓然後一塊兒趕到佟氏家裏那佟氏看見丈夫回家來了歡喜得什麼似的問起情由努爾哈齊一五一十地説了出來佟氏便道官人如今回來不想報仇了嗎努爾哈齊聽了不由得握著拳頭咬著牙説這仇恨刻刻在我心中只求娘子幫我一臂之力到那時成功了不忘娘子的大德佟氏接著説道官人説哪裏話來如今我家便是官人家裏我家所有的都是官人的官人要怎麼行便怎麼行努爾哈齊聽了便向佟氏兜頭一揖説道多謝娘子從此以後努爾哈齊住在鄉村裏變賣田産招軍買馬訓練士卒準備報仇平日和他交往的朋友都暗暗地幫助他還有許多平日跟著他練習武藝的朋友都來投軍效力不多幾天他手下兵士已發展到五六百人努爾哈齊選了一個好日子祭堂子又把父親遺留下來的十三副盔甲陳列在大家面前哭奠一番一聲號炮拔營齊起努爾哈齊沿路打聽得建州城池都已降了尼堪外蘭尼堪外蘭這時駐扎在撫順關外的圖倫城中明朝以為殺死了覺昌安父子兩人建州地方便沒有人作梗了便也收拾兵馬回去那尼堪外蘭得了許多城池也便高枕無憂努爾哈齊打聽得圖倫城東面有一座山峽名叫九口峪是通建州的要道真有一夫當關萬夫莫開之勢他便悄悄地派二百名兵士去把守九口峪斷他救兵之路自己帶了三百名兵士含枚疾走到了圖倫城下已是三更時分這夜天氣月黑風高對面不相見努爾哈齊吩咐去南門放一把火城中兵士從睡夢中驚醒過來去救南門的火那東門早被努爾哈齊手下的兵打開發一聲喊一擁進去在黑地裏互相廝殺起來那城中的兵士不知道城外來了多少兵人人害怕早開著西門逃去尼堪外蘭也站腳不住帶了一小隊人馬在人叢中逃命逃到甲板地方這裏努爾哈齊一口氣便收服了圖倫古埒沙濟三座城池從此兵雄馬壯將廣兵多到八月時候又帶兵去打甲板尼堪外蘭又逃出了甲板忽然有兆佳城主李岱聯合著哈達兵來攻努爾哈齊努爾哈齊和他對壘直到第二年春天捉住李岱在營前斬首六月時候又打破馬兒墩九月時候帶了五百名兵士去打董鄂部十三年上又帶了五百名騎兵去打哲陳部到十四年七月裏打聽得尼堪外蘭逃在鵝爾渾城裏便帶兵去打鵝爾渾城尼堪走投無路只得向撫順關逃去誰知逃到關下那明朝把關的將軍不肯開關尼堪待回身走去早被努爾哈齊的兵馬團團圍住仇人相見分外眼明努爾哈齊也不和他打話挺槍直取尼堪尼堪盤馬逃避向荒僻小路而走努爾哈齊趕上前去隨手拋過套馬索去攔腰套住把尼堪拖離雕鞍兵士上前去捆綁起來送回營去努爾哈齊早坐在帳上見了尼堪便不問話拔下佩刀來一下割去腦袋便在營中設了覺昌安和塔克世的靈位供上人頭哭拜祭奠兵士們一齊挂孝那左近城池聽説努爾哈齊殺了經堪外蘭都紛紛歸降舊時建州屬下的部落都上表稱臣努爾哈齊得勝回去走到呼蘭哈達地方看它地勢雄險便打定主意不回建州去了在嘉哈河和碩裏口兩界中的平岡造著城池把建州和撫順兩處地方的家室都搬到一塊兒住著努爾哈齊這時雖殺了尼堪外蘭卻時時切齒痛恨李成梁恨不得打進撫順關去殺了李成梁才泄心頭之恨但是看看自己兵力有限一時也不敢動這年夏天又有蘇完部主索爾果帶領他兒子蜚英前來歸順努爾哈齊在自己府中擺酒款待飲酒中間努爾哈齊禁不住時時歎氣索爾果問他為何不樂他便把李成梁殺死他祖父父親兩人至今尸首未得大仇未報因此痛恨索爾果聽了這話低頭思索了半天説道貝勒若要報仇非得此人幫助不可努爾哈齊忙問什麼人索爾果便説出董鄂部部長何和裏的名氏來接著又説了許多計策努爾哈齊聽了不覺拍掌稱善到了第二天努爾哈齊便備下牛羊禮物親自到董鄂部去拜見何和裏這時何和裏封董鄂溫順公駐扎在琿春地方兵強馬壯稱霸一方當下見努爾哈齊前來拜他他也佩服努爾哈齊是少年英雄如今又是新立事業便另眼相看兩人相見十分投機努爾哈齊看何和裏年紀並不老大只在三十歲左右便心生一計當夜在他府中住宿一宵到了第二天努爾哈齊再三邀請何和裏到興京去何和裏見他十分誠意便也答應只帶了隨身侍衛跟著努爾哈齊走進興京城兩人並馬而行到了府前下馬去裏面大吹大擂起來早有哲陳部主蘇完部主渾河部主以及各貝勒下階相迎走上廳去分賓主坐下一面傳杯遞盞看著許多妖豔婦女在階下跳神吹唱何和裏到這時不覺開懷暢飲飲到中間忽聽得一聲細樂從屏後轉出來後面一群侍女擁著一個千嬌百媚的姑娘走近何和裏身前一蹲身行下禮去忙得他還禮不疊接著旁邊一個贊禮的大聲唱拜索爾果上來扶著何和裏竟和那姑娘拜著天地行起夫婦禮來一陳陳脂香粉膩送進鼻管去簫管嗷嘈送進耳管去把個何和裏撮弄得好似丈二和尚摸不著自己的頭腦他正要回頭去找努爾哈齊問話去那許多人早已不由分説推推擠擠推他進洞房去了不知何和裏肯也不肯再聽下回分解
