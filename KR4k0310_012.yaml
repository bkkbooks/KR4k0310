body:
  text: 第二年他帶著兵推説出去圍獵常常幾個月不回來即暗暗地占了別人的城池奪了別人的田地他又分遣自己手下的將官和弟兄子侄們各處去攻城掠地他在萬曆二十六年打發大兒子褚英弟弟巴雅齊和噶介費英東帶兵一千去打安褚拉庫路取屯寨二十多座虜百姓一萬多人第二年派額亦都費英東扈爾漢帶一千精兵去打東海渥集部裏的赫策黑路俄漠野蘇噌路和佛內赫托克索路活擒二千人回來萬曆三十七年打發侍衛扈爾漢帶兵一千人去攻打滹野路虜著二千多人口回來萬曆三十八年打發額亦都帶一千兵士去打那木都魯綏芬寧古塔尼馬察四路押著四個路長帶著他的家眷回來路過雅蘭地方又打破城池虜著一萬多人回來萬曆三十九年打發第七個兒子阿巴泰和費英東安費揚古帶著一千個兵來攻烏爾古辰木倫兩路活捉著一千多人回來同一年又打發何和裏額亦都扈爾漢帶兵二千人去攻打虎爾哈路圍扎庫塔城三天破城後又殺死一千多人活捉二千多人他左近各路的路長見了害怕都來投降連年用兵那建州地方比從前要大得幾倍努爾哈齊心中還不滿意他切齒痛恨的便是他的女壻哈達部主吾兒忽答當時外面被明朝的威力逼著裏面又被富察氏挾制住了不得已把女兒嫁給吾兒忽答他夫妻兩人從此鬧了意見直到他進貢回來神宗皇帝許他統治女真人種旁人無可奈何他便自稱為哈達部的保護人親自帶兵到哈達城去向吾兒忽答要哈達部主世代相傳明朝給的璽書當時在哈達部下的有七百道地方努爾哈齊把吾兒忽答的城池圍得鐵桶相似要他交出璽書來吾兒忽答執意不肯便開城出來親自帶兵士和他丈人對敵努爾哈齊看了十分惱恨便叫他手下大將扈爾漢費英東兩人輪流攻城一面又打發人到興京去調二千生力軍來助戰吾兒忽答困守孤城二十日之久糧盡援絶在半夜時分建州兵打進城來把吾兒忽答全家人捉住努爾哈齊進城去一面把吾兒忽答夫妻兩人先押回興京去一面派遣戰將到四處去收服失地吾兒忽答手下有一個部將名察台什的聽説哈達部給建州滅去了他便帶了二百道地方去投降葉赫部求布揚古保護他布揚古貪他的地方便親自帶了大隊人馬嚴陳以待努爾哈齊得了這個消息不覺大怒心想我和葉赫部新訂婚姻布揚古的妹妹我聘而未娶他膽敢和我作對嗎他一面吩咐兒子代善帶兵駐扎在哈達一面親自調動大兵到葉赫部那布揚古見了努爾哈齊便責備他不該背棄盟好滅了哈達努爾哈齊笑説這是我家裏的事體與你什麼相干如今你收了哈達二百道地方難道説不是背棄盟好嗎再者你妹妹現許做我的妻子如今我還不曾娶了你妹妹你便和我兵戎相見這不是明明有悔婚之意嗎布揚古聽了氣得在馬上發跳咬著牙説道你説話竟好似放屁難道只許你橫行不法不許我仗義直言嗎我如今決計悔了婚姻不願把妹妹嫁給你了努爾哈齊聽説不把妹妹嫁給他了這是他第一件犯忌的當下便把手中槍一招那手下的兵將一齊殺上前去兩下裏戰鼓齊鳴喊聲動地大戰一場直殺到日落西山不分勝負便各個鳴金收軍到了第二天又殺了一天這樣子殺到第六天上看看葉赫部的兵支援不住了便退進城去緊緊關上城門一面星夜打發人送救急文書到撫順關去這時明朝廣寧總兵張承蔭巡邊到撫順地方得了這個消息便立刻調動三千人馬前去幫著葉赫這時努爾哈齊正督著人馬竭力攻城忽然後面金鼓大震當頭一面大旗寫著大明字樣努爾哈齊心想自己新得了明朝的官爵這明朝人馬大概是幫我來的便把自己人馬分在兩邊親自上前迎接去誰知那來將到了跟前也不答話把令旗招動那人馬和潮水似地攻打上來努爾哈齊一個措手不及忙轉身退去陳腳便大亂起來努爾哈齊忙壓住陳腳督著兵士上去對敵正鏖戰的時候忽然後面戰鼓一響一支人馬從城裏殺出來建州兵腹背受敵殺一陳敗一陳直敗下四十多裏路看看人馬死了二千多人再也不能支援只得逃回興京去了從此以後努爾哈齊把布揚古恨入骨髓在家裏天天操練兵馬要報這個大仇獨有烏拉貝勒布占泰常常來贈送禮物努爾哈齊也另眼看待他布占泰見葉赫悔了婚姻約便又替努爾哈齊做媒把他哥哥貝勒滿泰的女兒許給他第二年努爾哈齊親自到烏拉去迎娶回來便是烏拉納喇氏努爾哈齊見這位新夫人十分美貌便也十分寵愛他封他做繼大妃這位繼大妃性情十分和順家裏這幾位妃子都和他好這時舒爾哈齊有一個女兒長得十分標致烏拉納喇氏和他十分親密到第二年上布占泰到興京去看望他侄女努爾哈齊留他住在府中他叔侄二人常常見面談話談話的時候舒爾哈齊的女兒總在一旁陪伴著布占泰這時正因蒙古科爾沁貝勒明安受了他的聘禮不拿女兒嫁給他心中十分懊惱如今見了這樣一位美人心中不覺大動見沒人在眼前的時候悄悄地把這意思對他侄女説了烏拉氏覷空又把這意思對努爾哈齊説了努爾哈齊這時正和布占泰好便做主把侄女嫁給布占泰第二年烏拉氏生了一個兒子名阿濟格接著又生了兩個兒子一個名叫多爾袞一個名叫多鐸這是後話話説布揚古的妹妹滿洲各部落的人都知道他長得美貌滿州人家裏堂子上供看三位神像一位是釋迦牟尼一位是觀世音一位是關公傳説觀世音是一位相貌最美的女菩薩因此大家便把布揚古的妹妹叫做活觀音這位活觀音仗著自己美貌父母又十分寵愛便打扮得異常動人他哥哥出去打獵或是到各部落去遊玩他就跟著一塊兒去因此那哈達部輝發部烏拉部哲陳部的各貝勒他都認識且常常和各貝勒在一塊打圍追飛逐走玲瓏活潑那班貝勒見了這位美人個個都被他引誘得饞涎欲滴恨不得一口將他吞下肚去這許多貝勒中他和蒙古喀爾喀部貝勒巴哈德爾漢的兒子莽古勒岱最好那莽古勒岱也長得少年英俊他因為愛上了布揚古的妹妹便常常到葉赫部來遊玩他兩人每到圍獵的時候常常並著馬頭找一個樹林深密的所在密密談心去了後來他哥哥因為要聯絡建州衛起見把他許給了努爾哈齊他知道了要和哥哥拼命狠狠地吵鬧過幾回每一回建州人打發人來迎親他總是死挨著不肯去每回總得布揚古對那來迎親的人打一個謊推説妹妹有病這樣挨過了幾年恰巧葉赫部和建州人打起仗來了布揚古仗著有明朝幫助便趁此退了妹妹的婚姻那莽古勒岱知道了忙打發人拿了許多聘禮來求婚布揚古順了他妹妹的心意便也答應了他這個消息一傳到各部主耳朵裏都頓足歎息説好好一朵鮮花如今插在牛糞上了第二年巴哈德爾漢帶了他兒子莽古勒岱到葉赫部來迎親那喀爾喀部離葉赫部十分路遠莽古勒貸帶著新娘在路上走著常常有別部的兵隊出來攔劫虧得莽古勒岱十分英雄巴哈德爾漢帶的兵馬又多沿途保護過去千辛萬苦地到了喀爾喀城裏莽古勒岱又特意為他妻子蓋一座大院子誰知不到一年那院子不曾蓋成這位美人卻一病死了把個莽古勒岱哭得死去活來他從此立誓不再娶妻子了算是替他妻子守義這個消息傳到滿洲各部落去人人歎息那烏拉貝勒聽了連連歎息説道好一個美人可惜死了像我那個覺羅氏面貌長得十分醜陋性情又十分凶惡怎麼不肯死去阿誰知這時候覺羅氏正在屏門後偷聽他仗著是努爾哈齊的侄女看待丈夫原十分潑辣如今聽丈夫咒他快死他如何不氣便搶出去拿手指在布占泰臉上責問他那布占泰一向是怕老婆的如今見他來勢洶洶嚇得他瞪著眼開不得口那位公主跳罵了一陳轉身走去嘴裏説道我回娘家告訴叔叔去布占泰聽了心裏害怕起來忙上前去嗑頭求饒誰知那覺羅氏卻也不睬掉頭走去布占泰心中不覺大怒覷他走遠了便在壺裏撥下一支箭來搭上弓覷得真切颼的一箭直透酥胸只聽得阿喲一聲覺羅氏倒在地下死了那覺羅氏帶來的幾個侍衛見公主死了便悄悄地溜回興京去了見了努爾哈齊把上項情形説了努爾哈齊和舒爾哈齊弟兄兩人聽了又傷心又憤怒便立刻調動人馬趕到烏拉去那布占泰原是吃過建州兵虧的如今聽説建州兵又來了便丟下城池一溜煙逃到葉赫部去了這裏努爾哈齊現現成成得了烏拉部的許多城池聲勢越發浩大起來他當時把二弟留在烏拉自己帶著大兵又趕到葉赫部去修下一道書信送進城去那書信上寫道昔我陳擒布占泰宥其死而豢養之又妻以三女布占泰負恩悖亂吾是以問罪往征削平其國今投汝汝當執之以獻一共送三回信去那葉赫部貝勒布揚古置之不理努爾哈齊十分生氣又到本部去調動四萬人馬來準備和他大大地廝殺一場努爾哈齊和兒子代善商量了破城的計策誰知給帳下兩個兵士聽得了這兩個兵士原是烏拉國人當下他們悄悄地跑去告訴了布揚古布揚古立刻傳下令去把張吉當阿兩路的百姓收進城去把村坊上的屋子放一把火一齊燒了努爾哈齊便催動兵士打進城去城長山談扈石本便投降了努爾哈齊把軍隊安插在城裏誰知城中痘疫大發建州兵住在城裏的死了大半努爾哈齊看看不好忙丟下兀蘇城一肚子怒氣沒有發泄的地方便放一把火把雅哈城黑兒蘇城何敦城喀布齊賚城俄吉岱城還有十九處屯寨一齊燒了布揚古見建州兵如此猖獗忙到明朝去告急明朝打發遊擊馬時楠周大岐帶著炮兵一千來人幫著把守葉赫城建州兵見炮火來得厲害便退兵回去努爾哈齊自從得了哈達部那哈達部的南面有柴河堡撫安堡三岔堡白家沖堡松山堡六處地方土地十分肥厚建州百姓都到那地方去耕種那地方又連接明朝鐵嶺開源的疆界常常發生越界耕種的事明朝總兵張承蔭打發一個通事官名董國蔭的來對努爾哈齊説道你們建州百姓在柴河三岔開原耕種的田都是我的你必須把那六堡住著的百姓搬回去在那地方立下界石從此不許越界耕種努爾哈齊回答道這是你明朝故意來和我尋事所以説出這個無理的話來便把董國蔭送出城去張承蔭見建州如此蠻橫心想我如今初來做總兵官不給他們一點下馬威卻不能叫人怕我了當下他便下令自己兵士一齊動手把六堡的百姓趕回建州去又在那地方樹著石碑派兵看守從此不許建州人越界耕種努爾哈齊知道了十分惱恨説道明朝常常幫助葉赫拿兵力欺我我因他是天朝大國便也忍著氣惱如今他們竟有意尋事欺我太甚我此番定要出兵去和他決一雌雄他説著一面吩咐大將扈爾古出城去點齊兵馬自己回進內院去一疊連聲喊拿我軍裝出來烏拉氏忙上前來服侍他丈夫全身披挂一邊問他如今出兵打誰去可要妾身陪著一塊去呢那努爾哈齊氣憤憤地説道我如今打明朝去他們欺我太甚我此去要和他見一個高低打仗十分厲害你去不得烏拉氏是努爾哈齊最得寵的妃子當下聽説又要離開他出兵去了便一頭倒在努爾哈齊懷裏嘴裏説我跟都督一塊兒去不好嗎努爾哈齊一手摸著他的粉腮兒説道我的好人兒你好好地在家裏正説話的時候忽見第七個兒子阿巴泰急匆匆地跑進房來湊著他父親耳邊悄悄地不知説了些什麼努爾哈齊聽了頓時臉上變了色要知他們得了什麼消息且聽下回分解
