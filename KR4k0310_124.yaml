body:
  text: 第八十四回慰鰥魚佛婆行好事揮利刃俠士警淫心卻説蔡諳等離了寧白村策馬西行又行了一月有餘不覺漸漸地到了西域的境界了異鄉風景自是不同到處皆聽著佛聲呐呐鐘聲當當果然有修羅世界與各處不同蔡諳在馬上對林英道我們東方的人民只知爭貪搶殺利欲熏心斷不知懺悔修行可見連年內亂外患大約也是上天見罪罷了林英點頭稱是三人趲了一程不覺肚中飢餓胡明便對林英説道我們也好去找一家酒店吃飽了再走罷林英道正是這樣我也要用中膳了肚子裏餓得轆轆地亂響再不用些飯恐怕要餓壞了説著見前面樓臺隱隱殿閣重重約摸著是一個城池的樣子他們馬上加鞭不多時進了城門只見裏面三街六市買賣得十分熱鬧那市中的買賣大半以香火為最盛他們三人尋了半天竟未尋到一家飯店他們好不奇異互相説道這真奇怪了怎的找了半天為什麼一家也沒有呢難道此地沒有酒館飯店麼説話之間只見四處的人一齊攏近來合掌當胸一齊念著阿彌陀佛霎時將三人團團圍住蔡諳大吃一驚忙對林英説道你看這些人困住我們算什麼用意呢林英也茫然不解他們什麼用意胡明揚聲問道你們將我們三人困住做什麼的那些人也不回答合掌一齊念著是無量佛無量功德佛慈悲佛慈悲功德佛哆羅哆羅胡明一句也不懂而且肚子裏又餓得慌不得脫身不禁勃然大怒剔起眼睛大吼一聲在腰間取出雙錘大聲罵道哪里來的這些牛子哼你娘的什麼晦氣趕緊給我滾開去不要惹得老子氣起一個個將你們打殺了那些人見他這樣只嚇得跌跌爬爬一齊喊道快去請大師婆來捉這野人那些人東奔西散霎時走得精光蔡諳忙埋怨胡明道你也忒魯莽了也不問青紅皂白就發起脾氣來了萬一觸動他們首領的怒領兵來捉我們豈不是束手待斃麼胡明大笑道中郎也忒過慮我們也沒有做什麼違法的事情怕他什麼不來便罷如果真來尋我們只消一頓錘請他一個個送命蔡諳搖頭説道休要嘴強人衆我寡出外人豈能生事你不要執性須知強中還有強中手天外有天人外有人自古道謙虛天下去得剛強寸步難行阿胡明哪里肯説服氣只是冷笑不言這時瞥見兩旁有一隊人蜂擁而來前面兩個一排的童子共有十數排手裏執著幢幡寶蓋後面隨著許多沙彌頭上披著袈裟鐃鉢叮噹的向他們這裏而來蔡諳吃驚不小忙對林英説道這些人一定是方才逃走的人去告訴的他們來了怎生回對呢林英道事到如此也沒有別的辦法來者如講情理最好否則只有動手廝殺別無他法可想了蔡諳搖頭説道動不得縱使我們在這裏可以逃出去他們的人多終於不是他們的對手凡事易和平為妙正議論間那隊人已到面前蔡諳翻身下馬步行來到那最後蓮花寶輦的面前躬身施禮在這蓮花的旁邊有一個人頭戴卷邊帽身穿灰黑色的外氅忙對他還了一禮操著漢邦的口音問道尊駕莫非由東土來的麼蔡諳躬身答道正是那人笑道怪不得他們竟誤會了蔡諳道適才我們手下衝撞了貴邦的人望乞恕罪那人道豈敢豈敢蔡諳又問道還未請教老兄尊姓大名呢那人連稱不敢的答應小弟姓蘇名比在這波斯國裏當了一名翻譯方才一衆百姓到大師婆那裏報告説保聖市口有幾個野人騎馬入市他們禱祝了一會竟沒有用處特請大師婆前來捉拿你們那時兄弟就曉得一定是邦的人物才有這騎馬入市的規矩呢敢問尊駕可是漢邦來麼蔡諳答道正是他説道又通了名姓蘇比笑道談起來還與兄弟同鄉呢蔡諳問道老兄這樣説來想也是敝處的了蘇比笑道小弟十七歲的時候即遊歷西歐了到了二十二歲的那一年回到東土去沒有住到一個月見國內亂得不可收拾小弟便又出來在這裏差不多已有二十五六年了他説罷又問蔡諳道敢問蔡兄下顧敝處有什麼事呢蔡諳答道我主刻思政治復興萬民樂業極欲想出一種法子來感化萬民勸善規過久聞西方有佛佛有真經據雲傳留天竺所以特著小弟和林胡二將不辭辛苦到天竺求取真經的蘇比聽他這話不禁喜形於色道我倒早有此心想將真經傳入漢邦以期感化愚民不意我主竟有這樣的高見真是福至心靈阿彌陀佛他説罷便走到蓮花寶座之前打著番話嘰嘰咕咕説了一陳子只見繡幕開處那寶座上現出一個人來穿著半截緇衣赤條條地露出一對粉藕似的膀子下面也是一雙赤腳頭上滿垂纓絡柳眉杏眼梨面櫻唇卻原來是個十七八歲的女子蔡諳嚇得連忙將頭低下敬了一個禮口中説道女菩提敝人這廂有禮了蘇比忙對那個女子嘰咕了兩句那女子微開杏眼朝蔡諳瞟了一下子便合掌念道羅羅哩哩蘇比便對蔡諳説道蔡兄我們大師婆剛才吩咐請你們到信林驛暫留數日蔡諳忙道小弟們在路上已有四個多月了千萬不能再耽擱了蘇比笑道蔡兄恭喜你用不著你煩神了請你在這裏暫住幾日真經自然有人替你去取蔡諳聽了這話驚疑不定地問道蘇兄你這是什麼話子蘇比笑道目下且不要問到了館驛之後我自然會告訴你的但是你先去請胡林二位下馬步行我們這裏沒有人在市上騎馬的説話時那女子嘴裏又嘰咕了兩句只見那執幢幡的童兒齊念著羅羅哩哩哩哩嗹羅念了幾聲便拔步回頭走了那幾個扛蓮花寶座的人一齊念著大力王菩薩摩訶薩念罷扛起蓮花寶座一徑向西而去蘇比便和蔡諳走到胡林二人面前蔡諳便將方才的話告訴他們二人胡林正自弄得莫名其所以聽了他的話方才明白連忙下了馬隨著蘇比轉街過市到了一所房子面前只見門口有兩個人在那裏談話見了蘇比連忙合掌低眉口中念道阿彌陀佛蘇比嘴裏嘰咕了幾句他兩個忙跑了進去不多一會走出十幾個人來牽馬的搬行李的一窩蜂地弄進館驛蘇比便請蔡諳胡林等一同進了館驛蔡請進了裏面擡頭一看只見另是一種陳設一間大廳中間供著許多佛像香煙繚繞兩旁站著許多的小沙彌見了他們進來一齊過來打個問訊蔡諳和他們敷衍了一會子胡明便向蘇比説道我們早已餓了煩你先去辦飯給我們吃罷蘇比連連答應忙喚人去辦飯林英向蘇比笑道你們這裏怎麼一家酒館也沒有呢蘇比笑道要尋酒館這裏是沒有的了蔡諳道假使人家遠路來的過客吃些什麼呢蘇比笑道這個也難怪你們在漢邦弄慣了的卻不知我們這裏的規矩呢我們這裏從前沒有佛教卻和漢邦一樣自從有了佛教我們主公就步步修行不肯殺生害命了因為酒館飯店裏他們殺生最厲害的所以一概禁止了蔡諳道你這話我又不明白了人家遠來的過客一沒有親眷二沒有朋友難道人家活活地餓死了不成蘇比笑道你哪里知道我們國王他禁止了旅館飯店之後便設立許多常覺林便是供應過客設立的裏面有吃有喝還有安歇的地方蔡諳道原來如此那麼你們全國的人全要吃素了蘇比合掌念道阿彌陀佛誰敢開葷呢蔡諳又道方才出來的那個女子大約就是國王吧蘇比道不是不是蔡諳道不是王他究竟是誰呢蘇比道他是大師婆就如漢家的一個大將軍一樣的林英笑道他是一個弱小的女子怎能當得這樣的責任呢萬一發生什麼關係難道他還有什麼法力去克服麼蘇比道你倒不要將他看輕他的本領真不小咧這波斯國裏的民人無一個不曉得他這哈達摩的憑他發生了什麼事情只要哈達摩一到馬上就得瓦解冰消了他還有一種絶技能起死回生醫人百病因此我們國王很器重他的林英笑著問道他醫人怎樣醫法呢蘇比道人生了病先到他的府中去祈禱三府然後他自然有一種藥來醫治如果你的毛病不能回生他也看得出來不過進了他的府至少也要到半月以後才能出來如果是在府裏死了他大發慈悲自己拿出葬費來給人家蔡諳又問道你們國王叫做什麼名字呢他道叫做白爾部達林英道此地離開天竺國還有多少路了他道不遠不遠只隔著一條苦海過了苦海便是天竺國的境界了蔡諳又問他道蘇兄你方才對我説的何人肯替我們到天竺去求經呢蘇比道大師婆方才對我説過他説你們都是五葷雜混的人真經好取苦海難過他可憐你們遠道而來不忍叫你們白白地送了性命他願發慈悲打發大沙裏邱二沙裏邱到天竺國替你們去求經但是你們在這裏還須到他的府中懺悔七周天方可將真經領了回去否則就有天神魔鬼從半路上來搶奪你們的真經了蔡諳聽他這番話毛骨悚然忙問道照你這樣説來我們這些人真經萬不能取回東土了蘇比道有什麼不能不過要將一身的罪惡先要懺悔次了然後自然能將真經安安穩穩地保送歸國的他們正在談話的當兒有一小沙彌進來報道齋已齊備請進去用罷蘇比忙對蔡諳説道現在巳時過午請到裏面去用齋吧蔡諳等隨著他進了一間靜室只見裏面已經擺好一席大家入了座蔡諳見席上有酒不禁十分詫異地問道蘇兄你剛才説的你們這裏不是沒有人吃酒的麼怎麼這裏又有酒呢蘇比笑道這是葡萄釀完全淨素你且吃一口恐怕比較漢家的酒來得還要有味咧蔡諳舉起杯子呷了一口果然芬香冽齒甜美無倫不禁極口稱讚這時敲鍾上館他們吃了半天簡直連一樣都不認得蘇比對他們笑道這裏的小菜還吃得來麼蔡諳點頭笑道吃倒吃得來只苦是認不得叫什麼名字蘇比便用箸一樣一樣地點著對他們説道這是蜜勒茄子那是海威白蘇説了半天他們只是誇讚不已林英笑道這差不多全是素菜了蘇比笑道自然是素菜我們這裏可算屏絶五葷了林英咂嘴説道這素菜倒比較我們家葷菜來得好呢不説他們在這裏用飯再説那個大師婆自從見了蔡諳後真是個神魂失據便想出一個法子來叫蘇比留著他們好慢慢地來勾引他們看官你們看了我以上的兩句話不是要罵我胡言嚼舌麼原來有個極大的祕事小子趁此替他揭出罷間話丟開單講這裏的國王白爾部達在十年前本是殺人不眨眼的魔王有一天他抓了數十個囚犯解到法場瞥見有一隊沙彌擁護著一個千姣百媚的女子走了過來對他説道主公為萬民之首領豈可輕害人命上天有好生之德這樣的亂殺豈不怕鬼神震怒麼我有佛經可以感化愚氓能使天下一般不肖之徒棄邪歸正白爾部達見了他這樣的美貌身子早就酥了半邊又聽他這些妙語綸音忙教將那幾十個引頸待殺的囚待放了下來他教那些囚犯一齊望空跪下口中念了一百聲阿彌陀佛那些囚徒正自在那裏頸項伸長預備送命誰也不希望憑空來了一位天仙似的玉人兒將他們救活了性命忙著不住嘴地念著阿彌陀佛五百聲念過之後他又吩咐小沙彌朝空頂禮一齊敲起鐘鼓念了一回他做作了一會便走到那些賊盜的前面一個一個打量了半天走到白爾部達的面前説道這衆人裏面有兩個有善骨的他們能夠傳我的大道呢白爾部達連忙問道是哪兩個他便指了兩個年輕貌美的白爾部達便對他説道敬請女菩薩就在敝國住下好麼他滿口答應白爾部達滿心歡喜便封他為大師婆特地替他在金殿右面造了一所房子請他在裏面居住他沒事的時候就到白爾部達的宮裏去傳道聽説他傳道很為奇怪有三不傳女子不傳二人在一起不傳白日裏不傳但是這傳道的方法固然是很奇怪而又祕密的可是究竟怎樣傳法讀者們誰不是過來人還須小子饒舌嗎白爾部達自從受了他的傳教之後真是百依百順他便四處張羅招搖撞騙用了一班人在外面信口雌黃説他是菩薩化身來救濟衆生的他有大法力能定人生死無論什麼人做下什麼不正當的事情他能知道一切並且能醫治百病起死回生試想波斯國裏一班從未受過教化的頑民怎能不上他的圈套呢於是一傳十十傳百不上半月通國皆知誰也不敢錯做一件壞事倒被他弄得道不拾遺夜不閉戶了他又命國王禁止殺生絶葷茹素家家念佛戶戶誦經城裏從沒有什麼糾纏事情如其發生了只要他一到場衆人馬上就死心塌地地不敢再鬧了所以白爾部達十分信仰他崇拜他總而言之將他當作活菩薩一樣地看待可是一班愚民東也來求醫西也來乞福他十分冗忙求醫的乞福的日多一日簡直有應按不暇之勢他也乖覺便命他的兩個徒弟大沙裏邱二沙裏邱分頭敷衍如果一個死了他便説是這人功成圓滿登上極樂了那死人的家屬聽他這話便以為十分的榮耀所以一班求醫的人但願死了成仙成佛這樣一來他越發肆無忌憚每日至少有十個八個小後生隨他去傳道他胃口越來越大每日沒有十幾個來傳道簡直是不能挨忍有一天突然來了一個白麵郎君十分俊俏到他府中求福他端坐在蓮台之上見了這樣的漂亮人物食指大動忙對來人説道你這人倒有些善相可惜少懺悔你肯懺悔那人道怎樣懺悔法他杏眼斜瞟向他一笑説道你如懺悔自然帶你到一個去處去懺悔他點頭冷笑也不答話他下了蓮台輕舒玉手將他拉起那人便隨著他轉樓過閣地走了半天到了一間小靜室裏只見裏面陳設得非常精致錦屏繡幕四面壁上挂著無數的裸體美人畫片有的睡在床上有的仰在椅子上各處浪人的姿勢不一而足不怪那些小後生一到這裏便要成仙成佛了他慢慢地將衣服一件一件地脫下最後脫得精光便向那人笑道你可來吧我替你來懺悔那人走到床前將帳子一揭只見裏面挂著四軸畫卻是赤條條的男女合演玩意兒那人用手朝畫上指著問道這算什麼意思呢他微微一笑然後對他説道你哪裏知道這是和平之神你要懺悔須先和我照這個樣子先做了一回那時我佛歡喜自然就會赦除你的罪惡賞賜你的無量福了他説到這裏便用手來替他寬衣解帶了那人陡然變了顔色嗖地在腰間拔出一把利刃來向他臉上一晃大聲説道狗賊婆你可認得我哈特麼我早就曉得你的玩意兒了今天且饒你一條狗命快些改過自新不許再做這些無恥害人的事業還可留下你這顆狗頭否則一刀兩段為萬民除害他説罷將刀往床邊一插飛身出去這正是饒君掬盡西江水難洗今朝滿面羞要知後事如何且看下回分解
