body:
  text: 第十八回逼宮廷納喇氏殉節立文後皇太極鍾情卻説殿外兵士喊過萬歲以後四貝勒又接著對大貝勒説道父皇臨死的時候只有俺和哥哥兩人送終俺父皇對哥哥説些什麼來大貝勒聽了四貝勒的話才明白他的意思心想自己原不想做什麼太子樂得順水推船解了這個仇恨當下便説道父皇臨死的時候曾對俺説來四貝勒年少有識應立為太子這句話一出口殿下又齊聲喊著萬歲便有二貝勒阿敏三貝勒莽古爾泰搶上殿來扶著四貝勒的寶位在上坐定回頭過來對大衆説道如今大行皇帝龍馭上賓也無所謂立太子不立太子國不可一日無君如今俺們便奉四貝勒為君有不依的看我寶刀説著自己先爬下地去對四貝勒行了大禮那滿殿的文武百官也不由得一齊上去磕頭朝賀口稱皇帝萬歲萬萬歲這四貝勒到了這時候倒又不好意思起來忙拉著大貝勒二貝勒三貝勒並肩兒坐下同受百官的朝賀一時朝賀已畢喇嘛僧前來請皇上送殮皇太極坐在上面動也不動大貝勒認做他沒有聽得便重説了一遍皇太極忽然説道大行皇帝還有心願未了且慢收殮接著便傳承宣官請繼大妃出殿大貝勒聽了知道皇帝不懷好意忙上去奏道不可一來是如今繼大妃已是太后的地位皇上倘有諭旨只宜屈尊到太後宮中去傳諭二來如今大行皇帝新喪繼大妃正萬分傷感的時候皇上不宜有所宣召皇太極聽了笑笑説道大貝勒的話雖是不錯但是如今的事不是朕敢宣召斷大妃仍是大行皇帝的遺旨宣召大妃朕如何敢違抗父皇遺旨大貝勒聽他名正言順也不好再去攔阻不一刻那納喇氏滿面淚痕走出殿來文武百官上去請安皇太極也請過安喝一聲聽遺旨皇太極先自己朝上跪倒文武百官也跟著跪倒只聽得皇太極爬在地上説道大行皇帝有口詔付朕道我死後必以納喇氏殉葬這句話説罷便站了起來納喇氏聽了這句話嗡的一聲一縷柔魂飛出了泥丸宮身軀一歪倒在宮女懷裏停了一會悠悠醒來他親生子多爾袞多鐸兩人上去拉住他母親的衣袖大哭起來納喇氏也哭著説道我自十二歲得侍奉先帝至今二十六年海樣深情原不忍相離只是我兩兒多爾袞多鐸年紀都小我死以後總求皇上看先帝面上好好看待他説著便對皇太極拜下地去皇太極也慌忙回拜納喇氏站起身來回宮去了過了一會宮女出來報説太妃已殉節了接著又報説庶妃阿濟根氏德因澤氏也自縊死了這裏正殿上才大吹大擂地把英明皇帝的尸首收殮起來從此改年號稱天聰元年皇帝稱做太宗這太宗皇帝又因大貝勒二貝勒三貝勒有功於他便也另眼相看每日設朝便和三位哥哥並肩坐在上面受百官的拜跪後來太宗又和大貝勒商量立皇后的事體大貝勒便問意欲册立何人太宗説道父皇在日雖已給朕娶了元妃此外後宮得寵為妃嬪卻也很多但是朕心目中只有那博爾濟吉特氏朕意欲立他為後又怕人知道他是再醮之女給人恥笑因此遲疑不決大貝勒便回奏道陛下也忒煞過慮了從來夫婦以愛情為重吉特氏既是合陛下的心意便不妨册立為後若然怕人恥笑臣今有一策陛下可與吉特氏重行婚禮告過宗廟還有誰敢恥笑陛下太宗聽了連説不錯又説這禮節卻須十分隆重如今卻叫誰去籌備這個大典呢大貝勒思索了會説道有了陛下宮裏不是有一個范先生麼他肚子裏有的是禮數不妨叫他去擬來太宗聽了點頭稱是這日退朝回宮便把那範文程傳了進去一夜工夫擬定了一張大婚的禮節單兒太宗下旨發交禮部籌備一霎時滿城傳遍都嚷道皇帝要娶皇后了到了大婚的那日皇宮裏燈彩輝煌果然熱鬧非常皇后坐著鳳輦一隊一隊細樂迎進宮去見了太宗先行君臣之禮後行夫婦之禮皇帝和皇后並肩坐在寶座上受過百官的朝賀然後起駕往太廟行廟見禮回進宮來受過妃嬪的朝賀又行家候禮那弟兄叔伯妯娌姊妹都一一見過禮接著又受命婦的朝賀行禮已畢夫妻雙雙回寢宮去行合巹禮太宗放眼看時見吉特氏穿著皇后的服式便覺得儀態萬方容顔絶代後面跟隨的一群妃嬪雖也華服鮮衣卻都被吉特後的顔色壓下去了好似鴉鵲隨著鳳凰野花傍著牡丹都是黯然失色太宗這時心中止不住癢癢的忙命衆妃嬪退去自己拉著吉特後的纖手並肩坐下淺斟低酌起來原來這位吉特後與太宗的一段姻緣真是説來話長如今趁他們吃酒的空當兒抽空約略地補敘幾句講起這段姻緣還是在英明皇帝出兵撫順這一年結成的皇太極的生母便是葉赫納喇氏這時英明皇帝和葉赫氏十分恩愛皇太極也長得俊秀聰明越發能夠得他父親的寵愛皇太極年紀雖輕辦事體卻極有決斷因此英明皇帝把他留在城裏代理部務又叫阿拜湯古岱塔拜阿巴泰幾個哥哥也幫著他照料照料皇太極奉了父親之命不敢怠慢日日夜夜辦著事連吃飯睡覺也沒有工夫葉赫氏見他兒了這樣辛苦不由他不心痛起來又知道他歡喜打獵的父親在家的時候他終日在外面追飛逐走快樂逍遙如今拿他拘束得寸步不移豈不要把他悶壞了葉赫氏想到這裏便和皇太極的幾位哥哥商量弟兄五人輪流管理部務皇太極空下來也給他出外去舒散舒散幾位哥哥都答應了便放他三天假聽他遊玩去皇太極得了空依舊帶了他一班侍衛到西山打獵去他們打得高興愈走愈遠足足走了四五十裏路了便在深山裏支起篷帳胡亂宿了一宵到了第二天又向前進打得的野獸越發多了看看走到一座松林裏遠望林外空地上有一群梅花大鹿正在那裏吃是皇太極見了開心得了不得忙發下號令一百多名騎馬的侍衛向西面趕去這裏只留下皇太極一個人站在林子裏忽然一頭母鹿被人追趕得慌慌張張鑽進林子裏來皇太級見了急急跳上馬搶上前去那母鹿見林子裏有人便向東一繞繞出林子外箭也似地逃去皇太極哪里肯舍在後緊緊跟住在一片平原上流星似地趕著皇太極的一匹馬是有名的大宛馬騎在馬背上又穩又快真是瞬息千里看看趕上皇太極左手彎弓右手抽箭吱吱吱地連飛三箭有一箭射中在母鹿的背脊上那母鹿忍著痛便發了瘋似地帶跑帶跳竄過山頭去這匹大宛馬也有幾分左性見這頭鹿逃得快也便追得快看看追過山頭前面漆黑一座林子高高的兩座山岡對峙著倒挂在林子上面皇太極這時覺得有些疲倦意欲到林子裏去休息休息那頭鹿也不知跑到什麼地方去了他便放鬆了手中的韁繩慢慢地踱到林子裏面皇太極正要下馬忽然腦脖子後面呼的一聲一支箭從頭上飛過接著呼呼兩支箭一支從皇太極的臂下鑽過一支插在肩頭的軟甲上皇太極知道有人謀害他忙一低頭把手中韁繩緊一緊那頭馬潑刺刺直向林子裏跑去只聽得後面一聲呐喊一陳馬蹄聲緊緊跟住那飛蝗似的箭在他馬尾肩頭落下來一支箭射中馬的後腿一支箭射在皇太極的大腿上幸而路隔得遠箭力不強皇太極急把箭頭拔去那馬中了箭發起怒來大叫一聲四腳騰空穿岡越嶺地過去皇太極騎在馬上緊緊抱住馬頸子耳中只聽得風聲嗚嗚地響著昏昏沈沈地跑了許多時候那馬才慢慢地放緩來皇太極在馬上喘過一口氣來擡頭看時四周一帶山岡草長鶯飛另是一種風景遠遠聽得山泉潺潺地響皇太極嘴裏覺得萬分枯渴又想這匹馬也乏了須得給它吃一口水養息養息精神再想法覓路回去回過頭來看看後面並沒有人追趕他便跳下馬來一手拉著韁繩在長草堆裏慢慢走著那腳上的箭創原不十分疼痛走著路也沒妨礙聽聽泉聲近在耳邊左找右找卻是找不著慢慢地走過一座山峽只見那一股瀑布從山峽裏直沖下來曲曲折折向平地上流去流成一道小溪皇太極蹲下身去拿手掬著泉水吃了幾口頓覺神清氣爽又拉著馬走下溪去吃水他自己坐在溪邊養一會神正靜悄悄的時候忽聽得一聲呐喊接著馬蹄聲風馳電掣一般地過來皇太極此時已成了驚弓之鳥聽了這個聲音不由得心中一陳亂跳心想莫非那仇人又追上來了嗎幸而他坐在溪邊身子卻被溪岸遮住來的人還看他不到皇太極這時悄悄地把馬拉近身來伸長脖子向岸上一望只見一片平原有三四十個騎馬的正在那裏追一頭大狼那頭狼被他們趕到平地上來東奔西竄四面都有騎馬的圍定再看馬上的人不由皇太極怔了一怔原來那騎在馬上的並不是男子卻個個都是粉裝玉琢的女孩兒他們一面追著野獸一面呐喊著這頭狼給他們逼得無路可走了便向溪邊奔走五六個女孩兒拍馬追來看看快到溪邊皇太極地忍不住了便彎弓搭箭覷定那野獸的腦門颼的一箭中個正著同時有一個姑娘馬跑得快趕上前來一箭也射中在那野獸的腦殼上和皇太極那支箭恰恰對面這頭狼長嗥一聲倒在地下死了那姑娘趕上前來一看見有兩支箭十分詫異正出神的時候後面一大群女孩兒都跑到溪邊來圍定那只死狼就中一個女孩兒眼尖一瞥眼見溪邊有一個男子站著忙聲張起來大家都跑到溪邊來皇太極這時也躲不過了只好拉著馬走上岸來許多女孩兒領他到一位姑娘跟前去皇太極擡頭一看不覺眼花繚亂起來這姑娘真長得俊呢你看他苗條的身材嫋娜的腰肢短袖蠻靴扎縛得俊俏動人再看他臉上時一張鵝蛋樣的臉兒不施脂粉又白淨又滋潤好似一塊羊脂白玉彎彎的眉兒剪水似的瞳兒瓊瑤似的鼻子血點也似的朱唇兩邊粉腮上露出兩點笑渦來這時他見了陌生男子不覺有點含羞便回過頭去對身旁的侍女説道你問他是什麼人怎麼這樣沒規矩闖進俺們的圍場來了那侍女聽了便過來對皇太極説道俺姑娘的話你聽得了麼連問了幾句皇太極總是不開口原來這時皇太極眼中見了這絶色的女孩兒早把他的魂靈兒吸去了只是眼睜睜地望著任你再三追問他好似不曾聽得一般他前後圍著的許多女孩兒見了他這種失魂落魄的樣子大家笑説道這人怕是聾子阿又説道怕是啞子哩又説道怕是傻子哩內中有一個女孩子冷笑了一聲什麼傻子他正是一個壞蛋呢一句話引得姑娘也嗤的一聲笑了皇太極聽得有人罵他壞蛋才明白過來禁不住哈哈大笑説道我做了一輩子貝勒誰也不敢罵我壞蛋今天吃你這黃毛丫頭罵得好凶他們聽他説是貝勒便又吃吃地笑起來説道再沒有看見這樣的窮貝勒出來連侍衛也沒有一個卻自拉著馬我家塞桑貝勒出門來前呼後擁地帶著一百多人那才正是威風呢皇太極到此時才把自己的名姓家世和出門打獵獨自射一隻母鹿不覺走遠了路又在半路上遇見仇人一陳子亂跑不覺跑到這個地主來的前前後後一五一十地説了出來那位姑娘聽皇太極吐露真情他也聽得父親常常説起如今建州部落如何強盛那位四貝勒又是如何英雄如今看他果然是一表人材説話嘹亮從來佳人愛才子他不覺心頭有一種説不出的情意便開口説道既是建州四貝勒俺們都是鄰部這地方離貴部已有兩百里路想來貝勒一時也不得回去俺棚帳便在前面請貝勒過去坐著喝一口水再談吧説著自己攀鞍上馬在前面走著領路這時皇太極早已被他這嚦嚦鶯聲迷住了也不由得上馬跟去後面一群女孩子説説笑笑跟著轉過樹林便露出一座大帳篷來皇太極跟著走進帳去分賓主坐下侍女拿上酥酪饃饃來他肚子裏正飢餓了便也老實不客氣一邊吃著一邊動問姑娘的家世那姑娘笑説道這地方已是科爾沁部邊界俺父親便是部主博爾濟吉特塞桑貝勒皇太極聽他説是塞桑貝勒的女兒早不禁心中一喜忙上前去請了一個安説道原來是一位格格真是冒犯冒犯他説是偷偷看他肌膚白淨細膩心想這玉人兒果然名不虛傳原來這滿洲一帶地方人人知道塞桑貝勒的兩位格格是兩個尤物因他們皮膚潔白如玉那大格格便名大玉兒二格格便名小玉兒這時皇太極故意弄個狡獪接著問道請問格格的芳名是什麼那大玉兒聽了便把脖子一低拿手帕掩著朱唇微微一笑不肯答他誰知旁邊站著的侍女卻接著答道俺格格名叫大玉兒這大玉兒聽了霎時把臉兒放了下來慌得那班侍女倒退不疊大玉兒把手一揮説道快出去莫在此多嘴不奉呼喚不許進帳那班侍女見格格發怒忙一齊退出找女伴們説話去了這帳裏只留下大玉兒和皇太極二人唧唧噥噥地直到天晚也不喚張燈也不傳晚飯侍女們又不敢進帳去問只在帳外侍候著只聽得裏面説一陳笑一陳直到天明才喚侍女預備酒飯大玉兒和皇太極並肩兒坐著淺斟低酌起來這一席酒直吃了兩個時辰皇太極因記念家裏再三告辭大玉兒沒奈何只得打發人到自己部落裏去調一隊兵士來護送皇太極回家去侍女們留心看時只見他格格兩個眼皮哭得紅腫騎在馬上直送到邊界上還不肯回去皇太極再三勸慰兩人並著馬頭説了許多話才依依不捨地分離大玉兒也無心打獵了便卷旗息鼓回自己部落裏去話説葉赫納喇氏自從皇太極出去打獵心中常常挂念著第一天夜裏不見兒子回來原不十分盼望因為皇太極打獵常常在外面過夜的到了第二天看著天晚還不見他回來心下便著急起來直到上燈時候只見跟去的一班侍衛慌慌張張地跑來説四貝勒走失了葉赫氏便詫異起來仔仔細細地盤問那班侍衛他們也説不出個原因也只説大家趕一群鹿去只有四貝勒留在林子裏待回到林子裏找時已是影蹤全無後來又在山前山後各處找去直找到天黑也不見四貝勒的影蹤奴才們沒有法想只得先回來稟告大福晉請大福晉想個主意葉赫氏只生有這個兒子如今聽説走失了不由他不掉下淚來便立刻傳集一千兵士同著侍衛再到西山上找去對他們説道倘然不把四貝勒找回來休想活命可憐那班兵士門翻山過嶺地找尋直找到第四天上只見四貝勒洋洋得意地回來了葉赫氏見了一把摟住心肝肉兒喚著問著四貝勒不説別的只嚷著快打發人到科爾沁説媒去那班福晉格格聽了他的話認做他是瘋了葉赫氏再三追問四貝勒才把遇見仇人和見了大玉兒的情形説了出來又説我這一遭兒才看見真正美人呢又立逼著他母親打發人説親去葉赫氏聽了皺一皺眉頭説道父親不是早已給你説下親事了嗎怎麼又到別家説謀去四貝勒再三纏繞不休他母親便推説父親早晚要回來了這事體也得待你父親回來做主四貝勒無可奈何只得天天望著父親回來不多幾天那英明皇帝果然回來了此番出兵又打了勝仗正是十分高興四貝勒把説媒的事體説了英明皇帝一口答應吃過了慶功筵宴以後便打發大臣帶了許多聘禮到科爾沁説親去四貝勒自從大臣去了以後天天伸長了脖子盼望著望了許多日子好不容易盼到這大臣回來只見他拿去的聘禮又原封不動地帶了回來英明皇帝問時那大臣説道可惜去遲了臣到科爾泌部見塞桑貝勒把來意説了塞桑貝勒一口回絶説小女卻巧於昨天説定了配給葉赫國貝勒金台石的世子德爾格勒了臣當時不信那桑塞貝勒説媒人現在便喚出一個人來原來是葉赫國的臣子名叫阿爾塔石的當時臣也無話可説只得告辭回來英明皇帝聽了這話便也沒得説只是皇太極聽説這樣一個美人被舅舅家的表哥搶了去他如何肯依便逼著他母親去對他舅舅説要把那美人讓給他葉赫氏關礙著自己娘家人的面子自然不肯去説皇太極惱恨起來便打算帶了人馬打他舅舅去英明皇帝攔住了一面給他成親四貝勒在新婚的時候倒也忘了那大玉兒了誰知後來因為葉赫部暗助明朝英明皇帝在薩爾滸山打敗了明兵便移師去征伐葉赫部皇太極第一個自告奮勇充著先鋒隊去打東城這東城正是金台石父子兩人住著皇太極心中記挂著大玉兒便督率兵士不分晝夜地攻打那座東城居然被他打開了金台石帶了他的福晉和小兒子逃往高臺上四貝勒認定那大玉兒也在高臺上便帶了兵士把高臺緊緊地圍定大叫舅舅快降免得舅母表嫂受驚後來聽説大玉兒還在宮裏恰巧大貝勒代善也帶兵到來他便把人馬交與哥哥自己帶了一二百親兵飛也似地趕向宮裏去那大玉兒自從嫁了德爾格勒倒也一雙兩好夫妻兩人常常並馬出獵追鹿逐犬十分快活有時想起未嫁時候和皇太極在帳篷裏一夜的情愛便又忍不住芳心搖動起來只因德爾格勒待他萬分恩愛便也慢慢地把想皇太極的心淡了下去到了這時國破家亡他丈夫又被滿洲兵捉了去生死未蔔獨自一人躲在宮裏心中不由得害怕起來轉心一想我家和愛新覺羅氏是甥舅之親想來他們也決不難為我丈夫的正想時只見那班宮女倉皇失色地跑進來説道滿洲兵已闖進宮裏來了接著又聽得外面許多腳步聲大玉兒到了此時也只得大著膽帶著宮女出去正顔厲色地對那班兵士説道你們帶著兵士向宮裏亂闖是何道理你家皇帝和我家是郎舅至親便一時失和也不該來騷擾宮禁你家皇帝知道了怕不砍下你的腦袋來看他的容貌真是豔如桃李聽他的説話又是冷如冰霜把那班兵士倒弄得進退兩難和足無措起來士兵們正在尷尬的時候忽見一個少年將軍騎著馬飛也似地趕來到宮門口下馬那班兵士見了忙上去打一個簽嘴裏叫著四貝勒垂手站在一旁大玉兒認得是皇太極偷眼看時見他面龐兒越長得俊俏了止不住粉腮兒上飛起一朵紅雲來那四貝勒搶上前去請了一個安問一聲表嫂好偷看他粉臉兒又比前豐滿得多了一時想起從前的情愛忍不住挨近身去要拉他的手回心一想給兵士們看見不好意思便回過頭來把手城的馬鞭子一揮説一聲退去那班兵士便和潮水一般地退出宮去了皇太極這才挨身上去向大玉兒兜頭一揖説道俺來遲一步驚動了嫂嫂請嫂嫂恕罪俺在這裏賠禮了大玉兒嬌羞滿面低頭斂袖含笑説道貴部兵士闖進宮來不由俺不害怕幸得貝勒到來免受驚恐但是俺如今變了亡國的宮嬪便受些驚嚇也是份內又怎麼敢怨恨貝勒呢他説著由不得眼圈一紅向皇太極臉上看了一眼露出無限怨恨來皇太極看了恨不得上去撫慰他一番又礙著宮女的眼一時不敢放肆便挨近身去低低地説道我站了半天腿也酸了可否求嫂嫂帶我進宮去略坐一會我還有緊要的話奉告大玉兒卻坦然説道彼此原是至親坐坐何妨説著自己扶著宮女在前面領路皇太極在後面跟著曲曲折折走過許多院子到了一所綿繡的所在皇太極知是大玉兒的臥房了卻站住了不好意思進去大玉兒回過頭來嫣然一笑説道這地方可坐得嗎皇太極接著説道坐得坐得忙走進房去揀一個座兒坐下大玉兒打發宮女出去皇太極看看左右沒人便站起來上去拉住大玉兒的手説道嫂嫂想得我好苦呀大玉兒一摔手轉過背去拿一方大紅手帕抹著眼淚抽抽泣泣地説道好一個薄幸郎只説得一句便悲悲切切地痛哭起來皇太極這時打疊起千百溫存把從前一番經過和自己的苦心委委婉婉地説了出來接著又説了無數的勸慰話自己再三賠著罪好不容易把這位美人的眼淚止住了皇太極伸手過來輕輕地把他拉近身來一面替他揩著眼淚説道你不用過於傷心我若不真心愛你便也不拼著性命來打仗了如今既見了你俺們從前的交情還在你還愁什麼國亡家破呢他兩個墜歡再拾破鏡重圓有説不出的許多悲歡啼笑要知這大玉兒後來到底怎樣做了皇后且聽下回分解
