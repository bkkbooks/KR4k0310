body:
  text: 第八十五回留客殷勤頭巾飛去可人邂逅手帕傳來話説那個自稱哈特的一個人將哈達摩當面奚落了一番便將刀往床邊一插飛身出屋早已不知去向把個哈達摩嚇得面如土色將那一縷芳魂直飛了出去一直等他走了之後方才將飛出去的驚魂收了轉來又羞又怕慢慢地重行將衣服穿好下得床來將利刃拔下藏在一邊從此以後他卻不敢再做那些無恥的事情了列位這哈特來無迹去無蹤究竟是個什麼人呢小於趁此也要交待明白了那哈特本是波斯國裏一個頂有名望的俠客他鎮日價的沒有別的事情專門剷除惡暴扶濟良善但是他有個怪癬無論做下什麼事情從來不肯露出真各真姓所以波斯國裏常常發生什麼離奇的案子大家不曉得內容便疑神疑鬼疑到大師婆身上去了因此人人膽戰個個心寒不敢做一件不好的事情這哈特早就曉得白爾部達請了一個女子為大師婆了不過這女子的行為究竟好與不好他尚未知道呢有一天他因為聽了一個朋友告訴他就是阿司地方的官長貪婪無比殘殺人民敲詐財物他聽了這些話不禁怒從心上起惡向膽邊生他一個人也不帶夥伴單身直往阿司城而來到了阿司城裏四處一探聽果然這阿司郡守殘暴非常怨聲載道他便存在心裏一轉眼天色已晚他懷著利刃一躍上屋身輕似燕毫無半點聲息瞬間到了阿司郡守的俯中他鶩行鷺伏地直向後邊而來不一會子到了那個郡守的臥房屋上了他使了一個倒挂金鈎的勢子從屋簷口直挂下來只見裏面燈光未熄他用舌尖將紙窗上面舐破了一些閃目朝裏一望又見裏面有一個漢子坐在床前床上有一個十七八歲的美貌的女子兩個中年的婦人在他的身邊那一個年輕的女子哭得和淚人一樣閃著黑眼向兩個中年的婦人説道你們不要盡來勸我須知無論什麼事情都要人家願意呢老爺雖然愛我我卻不愛他難道就因他看中我就來強迫我麼那兩個中年的婦人一齊勸道薇娘你不要這樣的固執罷你順了我們老爺一生的吃穿都比人家好的請你答應了吧不要慪得他性起將你殺了你還有什麼本領來反對麼他哽哽咽咽地説道用不著你們來花言巧語的我既然不答應他難道因為他要殺我我就答應了麼他不怕大師婆在暗中監察他就將我殺了吧那兩個中年的婦人聽他説出這句話來不由面上現出一種驚慌的色彩來便走到那個郡守的身邊不知他們説些什麼只見那個郡守哈哈大笑了一陳子然後對那個年輕的女子説道薇娘你可呆極了別人不曉得那個大師婆便疑神疑鬼地説他有多大的法力了唯有我卻去領教過了老實對你説罷他是一個萬惡不顧廉恥的貨色難得你還將他擡了出來不瞞你説他已經和我做過了這一回玩意兒了他説著伸出手來做了一個手勢將那個女子羞得面紅過耳他又發出鸕鷂似地聲音咯咯地笑了一陳子那兩個中年婦人合掌當胸口中念道阿彌陀佛你不要這樣的信口胡言不要被哈達摩大師婆知道大家皆沒有性命阿那郡守笑道用不著你們擔心怕他什麼橫直不過一個招搖撞騙的女人他説罷剔起眼睛對那個年輕的女子説道你不肯依從我還是真還是假呢那個年輕的女子説道憑你怎麼樣我是不從你的他哼了一聲便用手在身旁那一口鍾上一擊鐺的一聲霎時跑出四個大漢來不由分説走過來將那個女子就像抓小雞似地扯了過來往一張睡椅上一按可憐那個女子無力撑持只得滿口匹靈匹靈地罵個不住霎時身上的衣服被那幾個虎狼似的大漢脫得精光那個郡守笑眯眯將身上的衣服卸下正欲過來做那個不能説的玩意兒這時哈特在窗外不能再耐了大吼一聲一刀將窗子挑去從窗子口飛身進去手起一刀將那個郡守送到極樂國裏去了那四個大漢吃驚不小一齊放了手正要去取兵器來抵敵説時遲那時快刀光飛處頸血亂噴那四個大漢早已變成無頭之鬼了還有兩個中年的婦人見此情形嚇得張口結舌忙合掌只是念著修羅修羅哩連哩羅哈特爽性轉過身子一刀一個將兩個中年的婦人也結果了才到這年輕的女子身邊問個究竟原來這女子是郡守的親眷被他強索來做義女的不想他竟要做這樣禽獸的事情殺了真真不枉了哈特問明瞭他的住址便連夜送他回去了到了第二天滿耳朵裏只聽人家沸沸揚揚地説個不住齊道這郡守惡貫滿盈不料大師婆知道了一定差了什麼神將來將他們全殺了可見大家還是要歸心的好哈特聽見這些話不禁暗笑這些人好愚騃但是他心中急切要來一探這大師婆的究竟便不辭勞苦遠道而來在波斯國城裏暗暗地刺探了三天果然察出許多荒謬不倫的馬腳來他便決意假裝著香客去試探一下子果然合了那郡守的話了他暗想道我將他一刀殺了真個和殺雞的一樣毫不費事但是將他殺去不免將國內人民信仰他的心使之一旦灰了的以罷罷罷不如且指斥他一番如其能革面自新就隨他去如果怙惡不悛再來結果了他也不為遲咧他想到這裏因此就放了他一條性命他便走了這是哈特的一番來歷小子原原本本地已經説過了現在也好言歸正傳了且説那個善於迷惑人的哈達摩自從經他這一番驚嚇之後果然不敢再任意妄為了一直過了五六年寧可死挨活耐地忍著卻不敢有一些非分的行為其實哈特哪里真去監察他呢不過借著這番恐嚇恐嚇他罷他今天在保聖市口見了蔡諳那一種品概真個是冰清玉潔更有那個林英面如冠玉唇若丹朱他不禁起了一片的戀慕心他便命蘇比先將他們留住以便慢慢的來施展媚惑的手段再説蔡諳等在驛館裏將飯用畢蘇比立起來正要説什麼話似的瞥見有一個人穿著黃色緇衣頭戴毗盧帽腰束絲縧手裏執著一根錫杖走了進來蘇比連忙站得直挺挺地合掌念道阿彌陀佛那要將頭微微地一點口中説道羅多嗹哈哈哈羅畦羅騃嗹哩咖他説了兩句便向蔡諳合掌唱個大喏蔡諸等見他這樣正弄得丈二尺高的金剛摸不著頭腦蘇比忙過來對他們翻譯道這是我們這裏的大國師潛于大和尚他奉了國王的命令特地前來拜訪諸位的蔡諳等聽得這話忙一齊立起來還禮蘇比又對潛于翻譯了他們的意思潛於合掌又今了一聲阿彌陀佛蘇比便對潛於將蔡諳的來意説了一遍潛于大師合掌説道蘇道引你可知道西方有一重苦海麼蘇比道怎麼不知呢潛於大師道既然知道西方有苦海須知惡蛇怪獸不可勝數他們能有多大法力能夠超過苦海呢蘇比道我並非不知原來大師婆發廣大慈悲預備差大沙裏邱二沙裏邱替他們到天竺去求經我想既是這樣卻能將真經取來了潛於聽了這話對蘇比冷笑一聲説蘇道引你不要一味糊塗難道他們的伎倆你還不曉得麼他們就能去將真經取來了嗎這不是欺人之談麼這番話説得蘇比滿面緋紅低頭無語蔡諳等見他們這樣的情形便估量著一定是談的他們的話了不過苦的是不懂他們究竟是談些什麼大家默默的半響潛于大師又向蘇比道據你方才説的他們不是你的同鄉麼蘇比點頭道是的潛于大師道既然是你的同鄉難得他們有這樣的善行你就該發廣大慈悲助他設法才是蘇比連忙雙膝往下一彎撲地往潛于大師面前一跪口中念道阿彌陀佛求大師發廣大慈悲佛駕高升替東土萬民造福吧潛于大師忙將他從地上拉起來説道我們出家人須不著這些圈套只知道慈悲為本方便為門我到這裏來無非就是這個意思但是我還有一句話要對你説我去將真經取來我還要隨他們一同到東土參觀參觀蘇比忙道只要大師肯去那是再好沒有了潛于便向蔡請等打了一個稽首便動身走了蘇比和蔡諳一直將他送到大門以外潛于便對蘇比説道我動身之後你須叮嚀他們千萬不要到他那裏去蘇比連連答應潛於正要動身忽然又向蘇比笑道我真糊塗了險一些兒白跑一趟蘇比聽他這話倒不知什麼緣故忙問他道大師這是什麼話他笑道他們來求真經可有法牒沒有蘇比連忙對蔡諳道你們來求經漢帝可曾下旨意與你們不曾蔡諳道有的有的蘇比便將潛于大師的來意對他説明蔡諳十分感激忙到自己的房裏在箱子裏將聖旨取了出來交于蘇比蘇比便送給潛於潛於反復看了幾遍點頭微笑辭別他們飄然而去蔡諳暗道怪不道人説西方佛地人盡慈悲今天才應驗了他們回到中廳蔡諳便向蘇比道敢問這位潛於大師是這波斯國裏什麼人蘇比道問他的根底可是深固到十二分了他就是普賢菩薩的大弟子他卻不是常到這裏來的這也是我主的洪福齊天不期而然地遇著他真是巧得極了他們正在談話之間那國王已經派人來請蔡諳了蘇比便陪著蔡林胡三人一齊到了貝普殿前蘇比先朝國王打個稽首蔡諳等也跟著打了一個稽首白爾部達便命賜坐蔡諳等一齊坐下白爾部達向著蘇比嘰咕了一會子蘇比便將蔡諳等的來意和潛於替他們去求經的一番話翻譯上去白爾部達喜形於色連連合掌念道阿薩羅多蜜羅阿陀蔡諳偷眼見那國王生得赤眉暴眼闊口獠牙十分可怕他右面的功花寶座上端坐著一個千姣百媚的女子在那裏低眉垂目他仔細一看卻正是昨天在街上碰見的那個女子又見國王身後繪著三尊大佛兩旁的侍臣大半是不僧不俗的打扮停了片晌只見那個女子朝國王嘰咕了兩句國王便向蘇比説道薩克薩克阿嗹哩羅蘇比便對蔡諳説道大師婆現在要請你到他那裏用晚齋不知你的意下如何蔡諳一想暗道我們生長東土這裏的形式一些兒也未曾看見過何不趁此機會去看看呢他想到這裏也不推辭竟一口地答應下來了不一時鐘鼓亂鳴國王退殿蘇比便領著蔡諳等徑向哈達摩的府中而來不一會到了哈達摩的府中只見那大廳裏梵貝聲繁異香撲鼻果然又是一番景象蘇比對他們悄悄地説道馬上你們到佛前拜佛須先將帽子除下等到用過晚齋才能將帽子重行戴上呢胡林二將齊聲問道這是什麼規矩呢蘇比笑道這裏在佛前朝禮和用齋皆要先除下頭盔才算不失儀節呢説話間那右邊的大鍾當當當地敲了三下子蘇比便向三人悄悄地説道朝禮了他們聽説這話趕緊除下頭盔隨著蘇比走到佛像面前躬身下拜行禮已畢哈達摩輕移足步走到蔡諳面前打了一個問詢蔡諳也不知道他是什麼意思只管翻著兩隻白眼蘇比看見他窘住了連忙替他向哈達摩翻譯道他姓蔡他名字叫諳是大漢皇帝的駕前使臣差往西天拜佛求經的他伸出玉手向林胡二將指著問道他們二人姓甚名誰蘇比答道那個白臉少年姓林名英那個黑面大漢姓胡名明他們是保護蔡中郎的官將他聽罷滿面春風對蘇比笑道道引我看這幾個人卻有仙姿道骨如果肯懺悔一周天便可以入門了蘇比聽他這話明知他不懷好意卻因位置的關係不便和他去作對只得答道這原是大師婆慈悲之念無奈他們初到此地一切尚未十分瞭解懺悔一層恐怕他們不見得就肯領教吧他含嗔帶怒地向蘇比説道你倒先替他們頭門口回掉了蘇比忙道大師婆請不要見怪方才這兩句話原是我忖度之言是否他們是這樣的心理尚未可知待我來問他們看他説罷便向蔡諳説道大師婆要請你在這懺悔七天不知你肯麼蔡諳連忙搖頭説道這卻不能一來我們是五葷雜亂慣的人二來對於經懺一門毫無研究只好請收回成命罷蘇比便對他將蔡諳的一番話説了一遍只見他緊蹙蛾眉十分不悅他不答話便叫人擺席大家一齊入座他也在末座相陪可巧末座與首座恰在對面蔡諳見他也入座可巧朱座與首座恰在對面蔡諳見他也入座不免倒局促不安可是他倒落落大方毫無羞澀的態度一刻兒菜上兩道蔡諳便要起身告辭了蘇比猜到他是因為哈達摩在桌上的緣故便悄悄地笑道中郎休要這樣的羞縮難堪須知大道不分男女蔡諳道無論如何男女怎好在一起入座呢蘇比笑道你這人也未免太拘執了自古道舉一體行一事到什麼地方説什麼話才好呢這裏素來有這樣的規矩難道為著你就減去了麼快快的不要被他們笑話蔡諳無奈只得耐著性子將頭垂到胸前一直等散才擡起頭便起身告辭再尋頭巾卻早已不知去向了哈達摩見他們要走粉面上突然不悅也不挽留癡呆呆地坐在椅子上一言不發蘇比忙叫小沙彌去尋頭盔找了半天哪里有一些影子胡明等得不耐正要發作蔡諳向他一搗胡明卻誤會他的意思只當是蔡請教他發作的呢他便大聲喝道我們的頭盔難道被佛老爺偷去不成真是豈有此理那些小沙彌見他這樣惡聲怪像的嚇得跌跌爬爬地走了哈達摩見胡明發作心中也覺害怕忙叫三沙裏邱跑進去將他們的帽子取了出來又對蘇比嘰咕了一陳子蘇比點點頭便領著蔡諳等回到驛館之內蔡諳向蘇比問道我們出門的時候那個大師婆向你説些什麼呢蘇比笑道他説潛於替他們去取真經他是最歡喜的也省得再叫他的徒弟去了胡林二人同聲問道他將我們的頭盔藏起來做什麼用呢蘇比笑道你們三位大師婆的用意他想將你們留在他的府中懺悔七天所以設法子挽留你們才將頭盔藏起來的林英大笑道這不是奇談麼修行也要人家情願呢豈能來強迫的大家談了一會便各自去安寢停了數日林英胡明在館驛裏沒有事可做悶得心慌兩個人私下裏商議道如今一點事情也沒有何不動員間逛間逛他二人打定了主意順館驛的這條街一直向北走去不到半裏之遙瞥見有一大空地方有多少人聚集在一處拍手歡呼二人不知道是什麼玩意兒便挨著身子擠了進去只見有兩個人在那裏舞刀弄槍的林英便對胡明笑道不料這裏也有人喜歡耍也槍的呢胡明正要回話瞥見人叢中有四個大漢跳了出來手執兵刃直撲那兩個站在場內的人那兩個見他們進來面上現出怒容揮著兵刃便來迎敵這時又跳進四個大漢幫著方才那四個大漢圍著那二人拼命相撲林英勃然大怒一個箭步縱身到場心一腿將那個使鞭的大漢打倒奪過鞭子耍動如飛將那幾個大漢打得落花流水的東逃西散他正要轉身瞥見白光一道直奔他的太陽穴而來他一讓仔細一看原來是一方手帕這正是白絹飛來渾不覺紅絲牽定早留情要知後事如何且看下回分解
