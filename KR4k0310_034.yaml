body:
  text: 第三十三回紅燈熱酒皇子遺愛煮豆燃萁兄弟化灰卻説那姓梁的店主人看那客人住在客邊寂寞無聊便替他想出一個解悶的法子來了原來這時正月初上廣州地方珠江邊的花艇正十分熱鬧真是脂粉如雲管弦震耳那些娼家也竟有幾個好的姓梁的便邀集了許多同行朋友陪著這位客人激紫洞艇子去艇中緑窗紅氈十分精雅那客人坐定姓梁的一面吩咐設席一面寫著紅箋把八埠名花一齊召集了來這客人坐在上首五七十個女娃子都陪坐在他左右一時脂香粉膩鶯嗔燕叱幾乎把一座艇子擠翻了那客人雖是左擁右抱卻一個也看不上他的眼一會兒他推説小解溜到後艙去這時只聽得一陳陳嬌聲啼哭他循著哭聲尋去只見後艙一個嬌弱女孩兒被鴇母渾身上下剝得精赤的打倒在地那鴇母手中的藤條兒還不住地向那女孩兒嫩皮肉上抽去頓時露出一條一條血痕來那客人看了説一聲可憐急搶步過攔住鴇母手中的藤條一面忙把自己身上穿的袍褂脫下來在那女孩兒身上一裹抱在懷裏走出前艙來這時前艙有許多妓女和客人他也不管只是拿手帕替他試著眼淚問他名字那女孩兒躲在這客人的懷裏一邊嗚咽著一邊説自己的名叫小燕自從被父母賣到這花艇子裏來早晚吃老鴇打罵説他脾氣冷僻接不得客那客人一面聽他説話一面看他臉面雖説他蓬首垢面卻是長得秀美白膩便把衣服打開露出雪也似的身體來上面襯著一縷一縷的血痕越發覺得鮮豔這客人忍不住伸手去撫摩他小燕急把衣幅兒遮住那粉腮兒羞得通紅嫣然一笑低低地説道給別人看見像什麼樣兒再舉眼看時那滿艙的妓女和客人都去得乾乾淨淨只留下他兩人從此這客人便迷戀著小燕雙宿雙飛一連一個多月不走出艙門來這時的小燕卻迥不是從前的小燕他打扮得花朵似的終日陪伴著這無名的客人兩口子十分恩愛有時只有這姓梁的走上船去談幾句話別的客人他一概不見光陰迅速轉眼春去夏來那客人忽然説要回去了問他回到什麼地方去他也不肯説只吩咐那姓梁的把存在廣州的三百萬兩銀子拿一百萬在珠江邊買一所大屋子裏面花木陳設都要十分考究一百萬銀子給小燕平時使用替小燕出了箱住在那屋裏剩下的一百萬銀子便送給了姓梁的姓梁的問他何日歸來他聽了由不得眼圈兒一紅説道此去行蹤無定倘吾事不敗明年此時便是我歸來之日過此今生怕不能再和你們相見了他又悄悄地對小燕説道你我交好一場連我的名字你也不知道如今我對你説了我的名字叫做胤禵你若記念我時在沒人的時候喚著我的名字我便知道了那小燕聽了他的話哭得死去活來在小燕十分悽楚的時候他便一甩袖子走了小燕住在那座大屋子裏癡癡地候了三年不見那客人回來後來他把這客人的名字去告訴姓梁的才知道這胤禵是當今皇帝的弟弟嚇得那姓梁的從此不敢提起這個話便是小燕也因為感恩知已長齋拜佛去了以後那胤祀胤禟這班皇子雖不知下落但也還有一點點消息可尋這個消息卻出在河南彰德府一個落拓秀才身上這秀才姓莊名洵講到他的祖上也做過幾任教諭他父親莊士獻也是一位舉人便是莊洵自己也早年中了秀才實指望功名富貴飛黃騰達誰知他一中之後截然而止到二十歲上父母一齊去世莊洵不事生産坐吃山空眼見得這區區家業保守不住了他便索性抱了破釜沈舟的志願把家中幾畝薄田一齊賣去拿賣田的錢去捐了一名監生趕到京裏去下北闈誰知文章憎命連考三場依舊是個不中從此流落京華吹簫吳市虧得他住的客店主人指導他在客店門口擺一個測字攤兒替過往行人胡亂測幾個字倒也可以過活這客店在地安門外原是十分熱鬧且宮內的太監在這條路上來來往往的很多那太監的生性又是多疑因此他們有什麼疑難事體便來問莊洵那做太監的又是河南彰德府人居多因此莊洵和他們廝混熟了攀起鄉誼來了不知怎的這個消息一傳十十傳百傳到了尚衣監的太監劉永忠的耳朵裏那劉永忠和莊洵不但是從小的鄉鄰還關著一門親威聽他同伴常常説起莊洵他便覷空溜出地安門去遠遠見莊洵在客店門外擺著一個測字桌子劉太監搶上前喊了一聲莊大哥那莊洵聽得有人叫喚忙擡頭看時見一位公公走來莊洵和他多年不見一進認不出來怔怔地對他看了半天才恍然大悟笑説道你不是俺劉家莊的劉二哥嗎那劉太監呵呵大笑莊洵忙收拾測字攤兒兩人手拉手地走進客店去細談別後的光陰劉太監誇説自己做了尚衣監的總管天天見著太子的面多承太子十分信任又誇説宮中如何繁華同伴如何衆多出息如何豐厚把個莊洵聽得心癢癢的十分羡慕第二天劉永忠又把莊洵邀到大柵欄樓裏去吃酒吃酒當兒莊洵便問宮中同伴究有多少那劉總管略一思索便説道約略算來也有二千多人他便輪著指數著乾清宮多少昭仁殿多少坤寧宮多少永壽宮多少等等直數了一長串劉總管説得天花亂墜莊洵聽得神魂顛倒待他説完了以後莊洵便求著劉總管道宮內既用這許多太監諒來也不多我一個求二哥幫我的忙把我也攜帶進宮去當一名太監省得在外面挨凍受餓這劉總管聽了他的話不禁怕案大笑起來説道俺的莊大哥你怎麼這樣糊塗這割雞巴不是玩兒事體呢你這樣年紀怕不要送掉性命你既要謀事咱這裏每年備辦龍衣袍褂和江南織造衙門來往的信劄很多大哥不嫌委屈便屈就了這個差使罷莊洵聽了他的話急忙稱謝從此以後莊洵便當了劉總管的書記凡是和各省官府來往的私信都是莊洵代寫莊洵得了劉總管的照應他光景慢慢地舒齊起來只是常常聽劉總管説起宮中如何華麗如何好玩便要求劉總管帶他進宮去遊玩劉總管也答應他有機會也順便帶他進去隔了幾天那江面織造的龍衣已經送到劉總管帶領十八個太監出去向內務府衙門去領龍衣把莊洵也改扮做太監模樣挂上腰牌混在十八個太監裏面手中捧著黃鍛衣包一串兒走進乾清門去一走進門只見宮牆巍峨殿角森嚴一色黃瓦畫棟飛簷把個莊洵看得頭昏眼耀走進乾清門便是乾清官走進宮門東向有一座門樓上面挂著弘德殿匾額西向一座門樓上面挂著昭仁匾額北向大門兩旁東面的上面寫著東書房西面的上面寫著西書房裏面隱隱有戴大帽穿朝靴的人踱來踱去三五個太監在門外站著見劉總管走來都向他笑笑點點頭兒繞過西書房牆後有一溜精室上面著南書房裏面有説話的聲音他們沿著西廊走去望著那北廊也有幾間屋子上面挂著翻書房的匾額劉太監領著穿進月洞門見有三間下屋劉總管叫人把莊洵手中的衣包接過來叮囑他在下屋裏靜悄悄地候著莊洵走進屋子去靠窗坐下隔著窗縫兒望出來只見那太監三五成群的都向他屋後走過也有急匆匆走去的也有兩三人拉著手兒慢慢地踱著低低地説著話的也有手中拿著小盒兒的來來去去十分熱鬧但是大家靜悄悄的卻沒有一個敢高聲説笑的莊洵正看得出神忽覺身後有人伸手在他肩頭輕輕地拍了一下莊洵急回頭看時原來是劉總管只見他空著手知道他事體已了便跟著他走出下屋走過月華門進入一座大殿上寫著懋勤殿殿中設著寶座圍屏十分莊嚴又繞出乾清官對面也有一座大宮殿挂著繡簾上面挂著坤寧宮匾額東廓有一座東暖殿西廓有一座西暖殿坤寧宮直北有一座欽安殿繞過欽安殿便是禦花園神武門他們暫不進門向東繞出去先走過鍾粹宮接著穿過長春宮景仁宮景陽宮承乾宮延禧宮依次到了昭仁殿劉總管領著莊洵又從弘德殿繞進去先走過翊坤宮接著永和宮鹹福宮永壽宮啓祥宮儲秀宮一座一座宮殿玩過去只覺得金碧輝煌莊嚴華貴莊洵嘴裏不住地噴嘖稱羡劉總管忙搖著手叫他不要聲張這時正是午後休息的時候沿路遇到的太監宮女也不多宮殿遊玩過了便走進精武門到了禦花園裏只見亭台掩映花木扶疏一聲聲鳥鳴傳入耳中十分清脆真是五步一樓十步一閣正走到萬花深處只聽得後面一個小太監一面追著一邊喚著劉總管張總管找你老説句話呢劉總管聽了忙站住腳又指點著莊洵向前走去穿過林子前面一座四面廳你在廳裏坐著候我我去去便來説著丟下莊洵去了莊洵慢慢地向前走著走出花叢果然見一座大廳屋四面落地琉璃窗圍欄內析走廊下供著許多花盆走進屋去四壁字畫十分幽雅莊洵到底是一個讀書人見了字畫便十分心愛一幅一幅地看過去正看得出神的時候忽然聽得遠遠的唵唵幾聲喝道莊洵在屋內隔窗望去見一肩暖轎幾個內監擡著轎中坐著一位十分威武的男子從花間過來莊洵知道皇上駕到慌得他兩條腿索索地抖動要藏躲也無藏躲處一眼見屋中擺著一架炕榻莊洵也顧不得了便一蹲身爬進炕榻下去躲著側著耳央往外聽時只聽得一陳橐橐的靴腳聲邁進屋來一個人向炕榻上一座滿屋子靜悄悄的只聽得衣裳悉索的聲音停了一會忽聽得炕上那人開口道把他帶上來那説話的聲音十分洪亮接著便有幾個人出去只聽得一陳鐵索聲帶進三個人來當地跪倒內中有一個人十分倔強左右侍衛喝他跪下他也不肯跪大聲罵道胤禛你好狠心俺和你一般的骨肉弟兄你如今硬霸占了皇帝的位置且不去説他便是俺弟兄的性命你也不肯放過苦苦的要謀害我們我問你那胤祀和胤禟兩位哥哥有什麼罪你卻喚他豬狗又把他監禁起來便是俺胤禵自從父皇在世便帶著兵馬南征北討替國家立了許多功勞到如今雖有想論功行賞也不到得犯這監禁的罪名老實説你現在這皇位原是俺的如今被你奪了去俺也不希罕你要通了國舅隆科多悄悄地把遺詔上傳位十四皇子一句改做傳位於四皇子打量你這鬼鬼崇祟的行為俺不知道嗎哼哼胤禛照你這種狼心狗肺將來也不得好死呢炕上坐著那人被他罵得火星直冒喝一聲不必多説趕快給他們化了灰只聽得左右答應一聲好似拿席子一般東西鋪在地下卷過又放放過又卷隔了半天只聽得侍衛們報道三位元親王都化灰了那炕上的人冷笑幾聲站起身來接著那內監們又是唵唵幾聲喝著道一擁去了把個莊洵嚇得躲在榻下只是發怔後來那劉總管走來悄悄地從炕床下面拖他出來見他瞪著兩眼嘴裏不住地説嚇死我也劉總管送他回到客店裏他依舊不住嘴地説嚇死我也從此以後這莊洵便害了瘋病見了人便説嚇死我也劉總管也來看望他幾次也他請大夫診脈服藥宛似石上澆水病依舊是個不好劉總管無法可想只得打發一個人送他回家去可憐莊洵這一病直病到第十五年上才略略清醒過來那時雍正皇帝已死他才敢把當時這番情形告訴給外人知道這位雍正爺只因康熙皇帝過於寬大才放出這番狠心辣手來收拾諸皇子和各親貴他手下的同黨又多耳目又遠便是雍正皇帝自己也常常改扮劍客模樣親自出來私行察訪任憑你在深房密室裏倘然你有半句誹謗皇帝的話立刻叫你腦袋搬家他自從收得血滴子以後又得了國師傳授他的喇嘛咒語他要殺人也不用親自動手只要念動咒語那血滴子自能飛去取人首級講到這血滴子的模樣是精鐵造成的一個圓球裏面藏著十數枘快刀排列著和鳥翅膀一般機括一開那快刀如輪子般飛也似地轉著這鐵球飛近人頭便能分作兩半張開把人頭罩在裏面一合人頭也不見了這鐵球也不見真是殺人不見血來去無蹤迹雍正皇帝仗著這樣東西祕密殺死的人也不知道多少講到他偵探的本領説出來真叫人佩服在雍正六年的時候這日正是正月十五京中大小衙門都清剛無事大小官員也個個回家吃團圓酒鬧元宵去了那內閣衙門本來沒有住宿的官員只留著四十多個供事人員承辦文書這一晚連那班供事也去得乾乾淨淨只留下一個姓藍的在衙門裏照料燈火這姓藍的家鄉遠在浙江富陽地方這時他獨坐無聊一擡頭見天上一輪皓月頓時想起家來便去買了三斤紹興酒切了一盤牛肉在大院子裏對月獨酌想起自己離家八年在內閣衙門謹慎辦事依舊是一個窮供事便大覺發了三聲長歎正氣悶的時候忽然他身後悄悄地走過一個大漢來身材十分高大面貌十分威武穿著一身黑袍褂腳登快靴這姓藍的認做是本衙門的守衛當下便邀他在對面坐下又送過一杯酒去那大漢也不客氣舉起杯來一飲而盡便問這姓藍的姓名官銜這姓藍的笑説道哪里説得上一個官字問同事有多少回答有四十六人問他們到什各地方去了答出去看熱鬧去了問你為什麼不去答當今皇上對於公事十分嚴謹倘都玩去誰擔這干系呢大漢聽了説了一聲好接著又喝了一杯酒又問道你在這裏幾年了回説已有八年了問薪水多少回説二百兩銀子一年又問你可想做官麼回説怎麼不想只是沒有這個福分罷了問你想做什麼官那姓藍的聽到這裏不覺捋一捋袖子伸手在桌上一拍説道大官俺也不想俺只想做一個廣東的河泊所官問河泊所官有何好處姓藍的説道做河泊所官單講俸祿每年也有五百兩銀子便是平日那進出口船隻的孝敬也不少呢那大漢了也不説什麼站起來告辭去了第二天聖旨下來著調內閣供事藍立忠任廣東河泊所官這樣一個芝麻般大小的官員也要勞動皇上特降聖旨滿朝文武都覺得十分詫異這件事只有藍立忠一個人肚子裏明白他是特奉聖旨到任的河泊所官自然便有許多同寅來趨奉他要知後事如何且聽下回分解清代宮廷豔史第二部民國許嘯天著
