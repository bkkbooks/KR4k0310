body:
  text: 第四十八回文字奇冤冢中戮尸姊妹絶豔水底定情卻説那小廝刺死汪如龍後正打算逃走吃那班侍衛四面攔住脫身不得只見他回手擎著尖刀向自己胸口去刺低低地喚了一聲父親便也瞪著眼死去了侍衛們忙上去拔去那尖刀解開衣襟忽然露出那一抹酥胸和兩個高聳白嫩的乳頭來大家看了詫異揭去他的帽子便露出一頭雲髻來脫去他的靴子露出兩隻紅菱似的小腳來刺客並非小廝卻是一個絶色的少女侍衛們不敢怠慢一面去稟報侍衛長一面去通報汪如龍家裏汪如龍的夫人趕來一看認識這女刺客便是那小梅他身上穿著小廝的衣服那小廝卻不知到什麼地方去了又在小梅衣袋裏搜出一張冤單來上面寫著和珅如何誣害亢家他父親余大海又如何替亢家報仇汪如龍又如何強姦他自己如何賣去他父親的性命他如今刺死汪如龍一來為父親報仇二來為自己雪恨一張紙上原原本本寫著蠅頭楷又説和珅貪贓枉法是一個誤國姦臣求皇上立刻拿他正法那班侍衛都是和珅的心腹見了這張冤單早給他銷毀了卻謊奏皇上説這刺客手拿尖刀闖到禦樓下面東張西望原想行刺皇上給汪如龍眼快看見了上去攔捉那刺客便將汪如龍刺死乾隆帝聽了臣下這一番謊奏信以為真便下旨追贈汪如龍頭品頂戴派梁詩正代皇上到他家去禦祭又給他治喪費一萬兩皇帝自從出了這樁案件以後便處處留心並且懷疑那倩霞絳霞和那十個妓女都不懷好意便連夜打發他們出園去一面調集扈從人馬日夜在園外巡邏那倩霞和絳霞姊妹兩人正得皇上的寵幸忽然見要打發他們出園去不知皇上是什麼意思還和皇上撒癡撒嬌地依戀著不肯出去後來皇上哄他説回鑾的時候帶你們進京去又問他們家住在什麼地方倩霞回奏説我姊姊的妝閣在河樓上樓下種著一株高大柳樹的便是皇帝吩咐他你兩人打聽得朕回鑾過揚州的時候快在樓上點一盞紅燈朕便打發人來取你姊妹兩人進京他姊妹兩人聽了皇上的回話十分歡喜便真的去住在河樓上天天守著乾隆帝因常常遇到刺客疑心人民還存滿漢的意見要刺死滿清皇帝替漢人報仇他想這報仇的思想都是讀書人鼓吹出來的如今朕欲查驗民心的向背須先從讀書人身上下手便下詔凡禦駕經過的地方許沿途讀書的士子把他的詩文著作獻上來由皇上過目做得好的賞他銀錢十分好的又賞他官銜這個旨意下去那班士子妄想名利便大家搶著獻詩獻文皇帝分派給幾個文字侍從大臣察看雖説沒有文章卻也沒有悖逆的句子這時江陰地方有一個姓繆的老名士他因功名失意在家中著了一部小説名叫野叟曝言他自仗多才書上天文地理兵農禮樂歷數音律沒有一種學問不講書中的主人便是他自己的化身説那西湖殺龍的一段頗有自命不凡的氣概説到那李又全春娘一段又是十分的淫穢姓繆的有一個女兒名叫蘅娘知書識字十分聰明他見父親著的書裏面有許多犯忌的地方又描寫淫穢必遭毀禁常常勸著他父親無奈這姓繆的高自期許他逼著女兒把這部野叟曝言用恭楷抄寫裝璜成一百本藏在一隻小箱子裏打算候乾隆駕過路的時候把這部書獻上去平日見了親友也拿出這書本給親友觀看誇耀他自己的博學他親友中有一個金蘭甫原也是一個讀書少年家中富有錢財見蘅娘面貌美麗幾次托媒人到繆家去求婚這姓繆的嫌蘭甫舉動輕佻便一口回絶他蘭甫含恨在心蘭甫的叔叔金藕舫也因田地糾葛的事體和姓繆的打過官司因此他兩家互不相容如今打聽得姓繆的有這一部書蘭甫也曾到繆家去讀過一遍見上面有許多觸犯忌諱的話便悄悄地去到江陰府衙門裏去告密那知府原得到內廷的密旨專搜查這種叛逆的著作如今見蘭甫來告密便親自去拜望那姓繆的這姓繆的不知他們是計又拿出那部野叟曝言來給知府看知府見上面有許多誇大的説話那殺龍一段顯系是殺皇帝的意思當下假作稱讚幾句又慫恿他定要獻與皇上定可得皇上的獎賞姓繆的聽了便十分得意到了聖駕過江陰的這一天他便穿著袍褂手中捧著書匣子恭恭敬敬地跪在岸帝獻稿那江陰知府早已預備下了只須禦舟上説一聲拿下他便動手誰知待這部野叟曝言送上禦舟上看時打開書箱裏面藏著一百本白紙本兒上面一個字也沒有皇帝看了詫異傳話出去問他什麼意思那姓繆的見他的書忽然變了白紙也嚇得一句話也説不出來皇帝認做他是個呆子便傳旨申斥了幾句也便放他回去了那金蘭甫和江陰知府枉費了一場心計依舊是抓不著姓繆的把柄這姓繆的也因為一生心血都在這部書上如今一個字也不留叫他如何不傷心他在家中便長籲短歎卻不知道他那部書早已被他女兒偷出裝在小缸裏悄悄地拿去後園埋在地下了卻拿白紙照樣地裝釘成一部假的書藏在書箱裏這也是使他父親免罪的法子後來直到姓繆的死過以後蘅娘嫁了丈夫才悄悄地又把這部野叟曝言掘出來藏在家裏直到現在這都是後話如今再説乾隆帝因防漢人反叛有意興文字之獄當時到底被他找出兩樁案件來一樁是黑牡丹詩一樁是一柱樓詩稿那黑牡丹詩原是大學士沈德潛著的那沈德潛名歸愚做得一手好詩乾隆帝自命是文學士常常和臣下和詩作文只因他詩文根底很淺做出來總不十分討巧只怕給臣下見笑便請兩位大臣在他身旁常常叫他們捉刀一個是紀曉嵐專代皇上做文章的一個便是沈歸愚專代皇上做詩詞的後來沈歸愚死了便由梁詩正代作那沈歸愚因皇帝看重他他在皇帝跟前常常露出驕傲的樣子來皇帝因為諸事要仰仗他便不和他計較反格外敬重他沈歸愚六十歲時還是一個秀才到七十歲時便拜作宰相到八十歲時豫告還鄉皇帝還常常打發官員到他家中去問好這是何等榮耀的事體後來乾隆帝作了十二本禦制詩集特送到沈歸愚家裏去請他改削那沈歸愚卻老實不客氣在禦制詩上批了許多壞話又刪去了許多詩詞送回京中乾隆帝看了心中雖説不高興但看在老臣面上便也不説什麼隔了一年沈歸愚便死了乾隆帝此番南巡過蘇州地方想起老臣沈歸愚來便擺駕到他墳前去吊莫又傳他的子孫到跟前來問了幾句話忽然想起沈德潛是一代詩人家中必有遺著便向他子孫查問他子孫享著祖父的家産文墨卻一竅不通的終日裏鬧著嫖賭吃喝的事體也鬧不清楚這時皇帝忽然查問起沈德潛的遺著他們平日既不留心先人的手澤知道什麼是犯諱不犯諱便把沈歸愚的原稿一古腦兒獻出去乾隆帝看時上面有許多詩是詩集上不曾刻入的又有許多代皇帝作的詩他也一齊收入詩稿下面注明代帝作三字乾隆帝看了不覺惱羞成怒他想禦制詩已經刻出去了這詩稿裏又有代作的字樣豈不壞了朕的名聲但心中雖不樂卻也無法處置後來又看到他的未定稿裏面有一首黑牡丹詩劈頭一聯便是奪朱非正色異種亦稱王兩句乾隆帝看了勃然大怒説到好一個大逆不到道的沈歸愚他明説是朕奪了朱家的天下又罵朕是異種這如何忍得便立即下旨沈歸愚生前受朝廷厚恩今觀其遺著有意誹謗本朝迹近叛亂著即掘墓撲碑又把沈歸愚的尸首從棺材裏拖出來砍下頭來沈氏子孫一律充軍到黑龍江只留下一個五歲的孫兒這一樁文字獄把那班讀書人嚇得縮著脖子躲在家裏從此以後也不敢獻什麼詩文了這時揚州東台地方有一個紳士名叫傅永佳的忽然獻出一部一柱樓詩稿向江蘇巡撫衙門告密説這作一柱樓詩的徐述夔是個叛逆他在詩中有許多叛逆的話如詠正德杯詩裏有兩句大明天子重相見且把壺兒擱半邊這個壺兒便是説胡兒他説當今天子是胡兒胡兒擱半邊是説要推翻大清天子重立明朝天子的意思這時乾隆帝正四處搜尋叛逆的文字那地方官也想討皇帝好因此特別注意如今江蘇巡撫見了這本詩集便知道有了升官的路當即把詩集獻與皇上聖旨下來果然發掘徐家的墳墓又斬徐述夔的腦袋徐家子孫一律正法徐家田産賞給傅永佳揚州知府謝啓昆江蘇藩台陶易説他是同黨庇護隱匿不報一齊發充新疆效力那江蘇撫台果在升了兩江總督可憐徐述夔一家性命都送在這兩句詩上你道淒慘不淒慘説到傅永佳的告密原和徐家有私怨的傅永佳的父親做過一任禦史告老回家他卻極愛風流的那時東台地方有一個土娼名叫小五子的長得清豔淡雅傅紳士在他身上已經花了整萬銀子了頗想娶他回去做一個金屋姬人誰知那小五子卻暗地裏愛上了那徐述夔這徐述夔當時在揚州府衙門裏當幕友年紀又輕才學又好後來調到江蘇藩司裏去勢力越發大了便把小五子娶回家去寵擅專房此事給傅紳士知道了氣得他發昏章第十一後來揚州府鬧漕案件傅紳士也在裏面徐述夔告密説傅紳士主使抗漕公文下來捉拿傅紳士傅紳士上下行賄才免了這場災禍但是家財也花盡了人也氣成病了傅紳士臨死的時候叮囑他兒子傅永佳務必要報了這個私仇傅永佳留心多年才得到這部一柱樓詩稿害得徐家家破人亡傅永佳又得了徐家的田産他是何等快樂這時皇上禦駕已從杭州回來船過揚州地方又出了一樁離奇案件原來揚州有一個富紳人家姓孫那孫紳士已在五年前死了那孫太太管教著兩個女兒大女兒名叫孫含芳二女兒名叫孫漱芳調理得好似月裏嫦娥流水仙子一般知書識字又做得一手好針線含芳年紀十七歲漱芳年紀十六歲揚州全城的人都知道孫家有這兩個美人兒誰不願去娶他做媳婦今天張家明天李家那説媒的人幾乎把他家的門檻要踏斷了那孫太太是寵愛女兒的諸事去問他女兒誰知他女兒一口回絶説到二十歲再提婚事須得要揀一個才貌雙全的郎君才肯嫁他他姊妹兩人還有一個心願只因姊妹兩人感情十分濃厚今生今世不願分離要兩人同嫁一個丈夫倘不如他的心願情願終身不嫁他姊妹兩人立了這個誓願叫他母親如何知道姊妹倆同住在一間河樓上樓下一簇楊柳遮著一個石埠姊妹倆倦繡下樓常常並肩兒坐在石埠上垂釣這河面上十分清靜來往船隻很少因此他姊妹也不怕給人看了姿色去誰知這時早有一個少年郎君在河對面飽看了美人了那少年名顧少椿也是紳宦人家他父親顧大椿在京中做禦史母親胡氏在家裏督率兒子讀書少椿的書房在樓下臨河的恰恰和孫家的妝樓相對每逢含芳姊妹在石埠上垂釣那少椿從窗櫺裏望去好一副緑蔭垂釣的仕女畫兒少椿到底害羞天天看著卻不敢去驚動他又因生性溫柔也不肯做這煞風景的事體後來實在忍不住了對他母親説知托人去説媒他姊妹兩人依舊是一句老話要到二十才嫁少椿無可奈何只得每天在窗櫺中望望罷了從此以後書也無心讀飲食都無味終日坐在書房中長籲短歎母親以為他在書房裏用功便也不去留心察看他講到那含芳姊妹兩人越發不知道有人在隔河望他為他腸斷天下事有湊巧這時候是初夏天氣那臨河一帶花明水秀越發叫人看了迷戀含芳姊妹兩人常常到埠頭上來間坐納涼有一天午後正是晝長人靜含芳一個人悄悄地走出河埠來垂釣不知怎麼一個失足倒栽蔥跌入河中去了這時兩岸靜悄悄的竟沒有一個人知道那顧少椿卻是處處留心著的見了岸上人跌入河中去了把他嚇了一大跳他也顧不得了忙脫下長衣開了後門一縱身也向河心裏跳下去在少椿心中原是想去救那孫家小姐的誰知他兩人都是不識水性的一個頭暈早已昏昏沈沈隨水氽去了在少椿心裏一心要去救他孫小姐他在水中奮力掙扎著見孫小姐在河心裏頭顛來倒去那一縷去鬟早已被水沖散了少椿奮力向前撲去給他攔住了孫小姐的衣襟那孫小姐見有人救他也拼命掙扎顧不得含羞了一伸手把那少椿緊緊地拖住少椿也攔住他的頸子他兩人在水中胸腰緊貼香腮廝溫誰知在水中的人越是用力越往下沈他兩人漸漸地沈到河底去了顧少椿在河底裏還是竭力地把孫小姐的身子往上擎著正在危急的時候妹妹漱芳也到河埠來尋他姐姐一看水面靜悄悄的只見河中心的水勢打著漩渦兒又見一隻小腳兒伸出水面來漱芳認得是他姊姊的腳發一聲喊撲通一聲也跳下河去這一喊卻把兩岸的人家喊出來一齊推出窗來一看見一個姑娘氽在水面上便有許多人七手八腳地拿著長篙把漱芳小姐救上來這漱芳小姐指著河心裏哭著説姊姊掉在河裏了大家聽了再去把他姊姊救上來那含芳這時也已被水灌飽了救上岸來昏昏沈沈開不得口可憐那顧少椿沈在河裏也沒有人去救他孫太太把大女兒摟在懷裏一聲兒一聲肉地喊著大家又幫著施救還有誰去顧著河心裏的顧少椿顧少椿的母親胡氏在隔岸看熱鬧回進屋子來到書房裏去看他兒子時見屋子裏靜悄悄的地下丟著少椿的一件長衣胡氏看了知道事體不妙忙回身出來到河埠頭喊時一眼見那石條上擱著他兒子的一雙鞋兒那胡氏大哭起來指著河心裏求著大家救他兒子有幾個識水性的一齊跳下水去再救他的兒子去直從河底裏把少椿拖上岸來胡氏看時早已兩眼泛白氣息全無這一急把個胡氏急得雙足亂蹬也是一聲兒一聲肉地大哭了起來這時那邊的含芳小姐慢慢地清醒過來孫太太把他擡進屋子去這班人丟了孫小姐都來救顧少椿胡氏又去請了醫生來從傍晚時分直救到半夜裏才慢慢地轉過氣來他第一聲便喊道快救孫家小姐他母親告訴他説孫家小姐已被救活了他便閉上眼不説話了從此顧少椿抱病在床直病了一個多月才慢慢地能坐起身來那含芳小姐經過養息早已能夠走動了但從此以後便把個顧少椿深深地藏在心裏聽人説顧少椿害病很重他姊妹兩個便在閨房裏對天點著香燭替少椿禱告著求皇天保佑他病體早早痊愈後來又聽説他能起身了便對他母親説顧家少爺為俺幾乎送去了性命如今他害病在床俺們也得去看望他一回免得叫人背後批評俺不懂得禮節那孫太太聽女兒話説得有理便也帶著他到顧家來胡氏接著説了許多話他母女兩人又到少椿床前去問候了一番那少椿見含芳越發出落得俊俏了心中不由得歡喜只因礙著他兩位老太太面上只是四隻眼睛癡癡地望了一會一句話也説不出來那含芳小姐見少椿兩粒眼珠在他臉上亂滾只羞得他底下脖子去站在他母親背後這裏孫太太和胡氏兩人退出屋來背著含芳小姐提起他兩人的親事來胡氏説我們這個早已求過你家了如今只請孫太太回去背地裏問一聲你家小姐倘若小姐願意俺們便好做事了那孫太太便告辭回去要知他們的婚姻成功與否且聽下回分解
