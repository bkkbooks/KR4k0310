body:
  text: 第八十八回漏泄春光淫髡授首望穿秋水淑女懷人卻説林英剛要上床睡覺突然有一縷尖而且鋭的聲音從隔壁傳來細聽起來真個是如怨如訴他不禁暗暗地納罕道這可奇怪了這裏是個清淨的佛地哪里來的這種悲傷的啼哭聲音呢他回轉來一想自己對自己説道這也許是小和尚讀經不用心被大和尚打了在暗地裏啼哭的也未可知管他娘的咱且去尋好夢去他説罷和衣倒下可是那奇怪的聲音總是在他耳鼓裏纏個不住他三番兩次地要想去入夢但是那一種疑惑的心理只是不肯除掉耳邊似乎有人對他説道你去看看究竟是一回什麼事情他身不由己地重又坐了起來便要下床看看究竟猛地忽又轉過念頭自家只掃門前雪休問他人瓦上霜睡休睡休他又倒下停了一會子滿想安魂定魄地睡去誰知任他怎樣想睡總是睡不著那一對眼睛兀地不肯合起來白灼灼地四下亂望不多時將心血攪了上來渾身煩躁好不難過他無奈只得重新坐起來側著耳朵貼牆細細地聽了一會他可是狐疑滿腹暗道這聲音斷不是哭聲而且又不是歎息聲音簡直説不出是一種什麼聲音他到了此時耳朵邊喊他的聲音比較從前又厲害些似乎有人在那裏催他道為什麼兀的遲疑著不肯去呢他被這狐疑的心理驅使得太厲害了便下了床輕手輕腳地從房裏走了出來只見外面的燭燈俱已熄盡了黑黝黝的只聽見衆人鼻息的聲音他躡足潛蹤地走出耳房門外那天上的殘月只有一線挂在屋角幾十個星在旁邊擁聚著放出絲絲的慘淡光芒那天井裏一個大黑影子足有一丈多高似乎張開一副可怕的面孔在那裏向他獰笑的樣子他定一定心神蹲下身子仔細一看原來是一個七級的寶塔式的鐵香爐他放開步慢慢地走到天井裏四下裏一打量我奈月色迷糊一切都不能辨別明白他向這中間的大殿走來進了大殿只見神台前還有一枝半明半暗的殘燭在那裏點著他借著燭光四下裏一看那兩旁的泥像有的坐著有的站著緑眉花臉牛頭馬面赤發獠牙的不一而足他猛地一看不禁倒退數步自己對自己笑道你可太癡呆了這都是些泥塑木雕的偶像他們的體質都是死僵的怕他怎的想到這裏膽子漸漸地也隨著壯了起來他鼓足了勇氣到各號的神像面前仔細望了一個暢快但是他們真是溫存著臉一任他在那裏窺看也不出聲他在四周走了一轉覺得陰風颯颯鬼氣森森耐不住打了一個寒噤他便想回去正從那東邊轉了出來猛可裏只聽得呀的一聲他一愣連忙朝著發出聲音的地方望去瞥見那東北角上一個木偶像移了離出原位三尺多遠他不禁大吃一驚暗道不好了敢是這木像成了精了麼再來仔細對著木像跳開的地方一望只見現出一個門來他不禁暗暗納罕道這真奇了我倒要來看他一個究竟呢正自疑念間又聽得吱呀一聲他定睛一瞧那門裏走出一個女子渾身縞素手裏拖著一條一丈多長的白綃從門裏面慢慢地走了出來他趕緊往一個泥判官身後面一掩屏著氣只見那個女子輕移蓮步婷婷嫋嫋地走到神前向一個大蒲團上往下一跪深深地拜了四拜坐在蒲團上他迎著燭光望去但見這女子生得十分嬌俏真個是秋水為神玉為骨芙蓉如面柳如眉一雙杏眼睡得紅光灼灼的那裙子下面一雙小足瘦削得不滿三寸他坐在蒲團上微微地籲了一口氣伸出右邊一隻玉手到頭上整一整鬢這時林英暗道怪不得我在耳房裏聽見有人哭泣阿原來還是他呢我想這寺裏一定藏著不少歹人今天碰著我管教他皆作無頭之鬼了他想到這裏便想立起來去問那個女子的究竟轉身一想暗道不對不對我冒冒失失地出來去問他他一定是很驚疑的不肯告訴我不如在這裏再耐一會子且看他在這裏做些什麼他正在那裏打算瞥見神龕後面又現出一個中年的婦人來兩隻眼睛突出眼眶舌頭也拖在唇外披著一頭的黃發一瘸一跛地走到神前往下一跪只是磕頭不止最可怪的就是那蠟臺上的半枝殘燭自從這散發的婦人走出忽然變了顔色從前是白灼灼的光彩現在卻改了一種碧緑的顔色了林英不禁大吃一驚暗自説道不好了這個婦人莫非是鬼麼他想到這裏渾身的汗毛一根一根的都直豎起來那個散發的婦人在神前磕了一陳頭便轉過來又朝著那個坐在蒲團上的女子不住地叩頭那個女子似乎沒有看見的樣子微睜杏眼歎了一口氣道天哪不想我方緑睛竟在這陷人的坑裏老鷹拴在腿上飛也飛不起爬也爬不走娘阿你老人家可知你的女兒在這裏受罪麼他説罷淚如雨下玉容憔悴可愛可憐可是那個散發的婦人仍在地下叩個不住停了半天他才立了起來咬一咬銀牙潑開櫻口悄悄地哭著罵道惡和尚奴家被你玷污了你不要逞著淫威我就是死了也要變著厲鬼來追你的魂靈的他説罷重復坐下癡呆呆地對著那慘緑的燈光直是流淚那散發的婦人在地下頭越叩越緊隱隱地聽見得得得的有了聲音那女子便再也坐不住了重新站了起來理一理手中的白綃將尖尖的小腳在地上一蹬嚶嚶地哭道娘呀女兒和你今天永別了你的女兒死了可憐你不知道在什麼地方死的呢娘呀你的女兒死了之後你老人家不要常常牽腸挂肚的只當少生一個女兒罷他説了一會子恨恨地便走到神龕之前將白綃往上面一拴在下面做了一個扣子這時那個散發的婦人叩得竟像敲木魚的一樣得得得的不住林英看到此時再也不能忍耐忙向腰間來拔寶劍誰知伸手在腰間一摸奇怪極了寶劍早已不知去向他發急忙道不好不好眼見這個女子也不能去救他了我的寶劍也不見了難道被鬼攝了去麼他猛地想出一個主意來便輕輕地伸手將這判官手裏捧著的泥元寶約摸有碗來粗細他取到手中閃了出來照定那個散發的婦人頭著力擲去猛聽得殼禿一聲那個婦人不知去向猛見那神前陡然現出無數磷火緑陰陰地閃著霎時漸漸地連了起來共成一個極大的火球一炸之後就沒有一些影迹了那神前的殘燭依舊復了光明林英這時更不怠慢飛步便來救那個上吊的女子他還未走到他的身邊叭達一聲那白綃忽然斷了那女子落在地下林英好不奇異走到他的跟前低頭一看那頭上的白綃扣子早已不知去向但見他星眸緊閉粉臉無光林英到了這時也顧不得什麼男女授受不親了蹲下身子慢慢地將他從地上扶到自己的腿上用手在他的櫻口上一摸不禁説了一聲慚愧幸喜還有些氣連忙替他在柳腰上摩弄了幾摩他才爽爽快快地蘇了一口出氣微睜杏眼朝林英一望不禁詫異連忙掙出他的懷中向他問道你是什麼人為什麼要來救我的性命呢林英道隨便什麼人難道人家見死不救麼恐怕天下也沒有這樣的人吧你這女子究竟有什麼冤枉不妨對我説明我可設法救你那女子聽他這話又朝他上下打量了一回只見他滿臉英雄氣概便知是個非常的人物連忙深深地拜了下去林英忙道你有什麼委屈的事儘管説來不用客氣罷那女子悄悄地説道客官此地不是談話處所恐怕被惡人聽見林英忙道既如此找一個僻靜的地方去他説罷便對那個女子招招手自己先走出了大殿他也隨後跟了出來不多時到了東邊的耳房裏林英在身邊取出火種將蠟燭點起順手將門緊緊地閉起便對那女子説道你且坐下有什麼冤情慢慢地告訴我罷他羞羞答答地坐了下來哽哽咽咽地問道你這個客官尊姓大名林英見他問話便答應道我姓林名英乃是大漢皇帝駕下明顯大將軍是也他連忙改口説道將軍今天蒙你將奴家救了活過來承你問我怎能不訴真情呢奴家本是山北面合子岡的人氏奴家姓方名喚緑睛上月十二日我的父親死了我家到這裏來請僧超度不想這裏的和尚起下不良之心半夜將奴家盜了出來囚在他們的一個幽房裏有個主持和尚生得十分凶惡三番兩次來到幽室裏要行非禮奴家抵死不從他想了一個方法來吩咐另外兩個賊婆娘有意用酒將奴家勸醉可憐我吃醉了之後就不曉得什麼了那個天殺的惡和尚就來硬行他説到這裏嗚嗚咽咽地哭個不住林英忙問道你豈不可逃了出去呢那女子道將軍你只知其一不知其二這裏牆高門緊奴家又是個弱小的女子怎樣逃法而且他們又一步一防林英問道他們用什麼東西將你盜出來他道還記得我家父親死了將他們請來念經超誦那時我在孝帳裏守孝到了三更之後不知不覺地昏昏睡去一夢醒來卻不知怎樣就到這裏來了林英又問道這裏共有多少和尚呢他道大大小小差不多有五十多個林英便對他説道馬上我們去尋他們卻不知道路要煩你帶一帶路他點頭答應林英便走到胡明的房中將燈點起用手將他一推口中喊道胡大哥快快醒來只聽他酣沈沈鼻息如雷再也不會醒的並且説起夢話道快點拿飯來咱老子吃飽了好走路林英不禁好笑忙又用手將他極力地一推他冒冒失失地一骨碌坐了起來一伸手將林英揪住閉著眼睛罵道賊崽子你可逃不了林英忙悄悄地喊道是我我是林英他聽見他的聲音才放下了手揉開睡眼笑道原來是你我還當是一個竊賊呢林英笑道你這樣的睡法只怕連人被人家竊去還不曉得呢他笑道林兄弟你半夜三更的不睡覺到我這裏做什麼的林英便將以上的事情細細地對他説了他翻身下了床提起大錘往外就走林英忙扯住他問道你現在哪里去他翻起白眼朝林英説道事不宜遲就去動手林英跌腳道你又來亂動了打草驚蛇頂不好他道依你怎麼樣子幹呢林英道你不用心急我自有道理胡明只得止住腳步林英又去將瑪麗喊醒教他保住蔡諳不要聲張瑪麗連連地答應林英便教那個女子前面帶路一直走到大殿東北角上那女子對林英説道將軍們從這個角門進去每一個房裏都有一個關捩子設在門後面的牆上你將那關捩子一按馬上就會現出來了林英點頭會意正要進去胡明對他笑道你空著一雙手就想去捉盜了麼林英才曉得自己沒有帶兵器忙對那女子説道這裏用不著你了你可隨我去罷他説罷將他帶到耳房之內自己到房間裏取出弓彈寶劍走到大殿裏面到了胡明的跟前説道胡大哥你就在這裏守著我進去如果有人從裏面逃了出來你切不要放他過去胡明點頭答應擎著大錘目不轉腈地向門裏候著林英進了角門便到門後面的牆上用火種一照果然有一個關捩子嵌在上面他用手一按瞥見帳子後面露出一個門來他屏著氣走進門去只見裏面一點聲息也沒有他復用火種一耀只見這房間裏一個人也沒有他又走去尋著關捩子一按有一面經櫥忽然移了過去也現出一個門來只見裏面有燈光從門隙中露了出來林英便知裏面一定是他們的藏春之所在了他拔出寶劍來輕輕地將門一撬那門不用推自然開了林英伸頭一瞧只見裏面擺著三張床帳子一齊放下他走到床前一手將帳子一揭只見一個和尚摟著一個女子正自睡著他一劍兩個不一刻三張床上六道魂靈一齊到巫山十二峰去了林英正要去尋關捩子猛聽得隔壁有呻吟的聲音他回頭一看那屏風後面又是一個暗門他走到門口側耳聽著裏面有人説道超凡你還未足性麼由晚上一直弄到這會人家怎生吃得住這時又有一個人聲音喘吁吁地答道心肝這個玩意兒只有我們男子弄疲倦的卻不曾聽見個女子回嘴不幹的我這樣的用力不是正合你的胃口麼他説罷便大動起來那張木架床只是咯吱咯吱去和那女人呻吟的聲音列位林英在定更的時候聽見是哪里的聲音呢卻原來就是這裏的聲浪他這暗房卻緊貼林英睡的耳房所以一切動靜林英都能聽見的林英聽罷一腿將門打開一個箭步跳到床前舉起寶劍正待發作瞥見一樣東西從帳裏飛了出來林英曉得是暗器趕緊將頭一偏那東西到對面的牆上撞個來回原來是一塊飛蝗石林英一手將帳子一揭冷不提防那第二塊石子又從帳子裏發出來躲讓不及右手腕著了一下幸虧他的刀握得緊否則連刀都被震掉他咬一咬牙齒一劍劈去那和尚將身往床裏邊一滾一劍正著那個下面的女子林英趕著又是一劍照定那個和尚的肚皮刺去那和尚何等的厲害趁勢往床下一滾林英正要再來尋他不提防他從帳子西頭鑽了出來在壁上取下一把截頭刀霍的一聲向林英面上劈下林英將劍往上一迎只聽得嗆唧一聲早將他的刀削去了半截那和尚不敢戀戰回頭出門就走林英隨後追來一連過了三道暗門林英從後面吆吆喝喝地趕了出來胡明聽得裏面喊殺聲音心裏早已癢癢得要去動手了無奈又恐有人從這門裏逃出他只得耐著性子守候著猛聽得有腳步聲音從裏面奔了出來胡明擎著大錘身子往旁邊一掩霎時那和尚赤身露體地從裏面奔了出來胡明手起一錘正中那個禿頭殼禿一聲腦漿迸裂那一個萬惡淫僧早登極樂了林英聽見連忙在裏喊道胡大哥不要將這禿頭放走要緊胡明笑道用不著你關照了這禿頭早送他到老娘家去了林英走出來一看只見那和尚倒在地上頭打得和稀爛西瓜一樣忙喚胡明重復進去尋了一遍另外也沒有暗室了胡林二人才回到耳房這時蔡諳已經醒了提心吊膽地等了半天見他們來了連忙問個究竟他二人將方才的事情説了一遍那方緑睛感謝不盡不多時天色大亮林英便將寺內所有的和尚一齊趕了出去點起一把火來燒得煙焰障天林英正想打算將方緑睛送回家去不意他家裏的人已經尋來聽説這樣的原因千恩萬謝地將他帶了回去林英等上馬就走又走了三四天那天到了寧白村口早有人進去報于富平富平喜不自勝忙到後面對他的女兒説道孩兒用不著再在這裏愁眉淚眼的了林將軍已由天竺國回來了他聽説這話趕緊站起來問道果真嗎富平道誰騙你呢他連忙出來富平也跟著出來父女二人剛出大門瞥見蔡諳等三人另外又多一個美麗的女子渾身上下式俱是番邦的打扮這正是洞房七日悲長別妝閣今朝又畫眉要知後事如何且看下回分解
