body:
  text: 第六十一回春色撩人茜窗驚豔影秋波流慧白屋動相思歷史小説是根據事實而做的不可杜撰正史根據事實分了前漢後漢這部漢宮不能不也有個分際自從本回起就是後漢的開始了為便於讀者醒目起見先行表明一下卻説九十春光緑肥紅瘦風翻麥浪日映桃霞楊柳依依頻作可憐之舞黃鶯恰恰慣為警夢之啼梅子欲黃荼蘼乍放在這困人天氣的時候誰也説是杜宇聲嘶殘春欲盡是人生最無可奈何的境界了那一片緑蔭連雲的桃杏林子裏面不免令人想起杜牧之尋春較遲之歎那些初結蓓蕾的嫩蕊卻還迎著和風搖擺個不住裏面曲曲彎彎露出一條羊腸小路好像一條帶子環屈在地上一樣這時只有一群不知名的小鳥在樹上互相叫罵似乎怪老天忒煞無情美滿的春天匆匆地便收拾去了此時忽然又夾著一種得得得的步履聲音從林裏面發將出來那一群小鳥怪害怕的登時下了動員令撲撲翅膀便飛去了停了半晌才見一個十六七歲的少年從裏面蹙了出來他一面走一面仰起頭來四處張望不時地發出一種歎息的聲音料想著一定是觸景生情中懷有感當下他懶洋洋地走出樹林面前便是一條小溪右面架著一座磚砌的小橋他走到橋上俯視溪水澄清一陳微風將那溪邊的柳絮吹得似下雪般飛入水中水裏魚兒便爭先恐後地浮上來唼喋他蹲下身子熟視了好久直等那魚兒將楊花唼喋盡了搖搖擺擺地一哄而散他才悵悵地站了起來背著手仍是向橋那邊慢慢踱去沒幾步路前面一道卻是薔薇障在面前橫著他繞著薔薇障一直走了過去到了盡頭之處便是一簇一簇的荼蘼花架前面在那衆緑叢中隱隱地露出紅牆一角他立定腳步自言自語道我也太糊塗了怎的好端端地跑到人家的花園裏來做什麼呢他説罷便回過身來想走了出去誰知花園裏甬道很多走了半天不獨沒有鑽出來反而鑽到院牆的跟前去了他便立定腳向四面認一認方向可是他一連認了好幾次終於沒有認出方向來他暗暗地納悶道這真奇了明明是從那面一條甬道走進來的怎麼這會兒就迷了方向轉不出去呢假使被人家看見了問我做什麼的那麼怎樣回答呢豈不要使人家叫我是個偷花賊嗎不好不好趕緊想法子鑽了出去才是正經遲一些兒今天就要丟臉他想到這裏心中十分害怕三腳兩步地向外面轉出來説也不信轉了半天仍然是外甥打燈籠照舅還是在方才站的那個地方他可萬分焦躁額上的汗珠黃豆似地落個不住霎時將那一件鵝黃的直擺滴得完全濕了他立在一棵楊柳樹的下面呆呆地停了半晌説道可不碰見鬼了麼明明的看見一座小橋在那邊怎麼轉過這兩個荼蘼架子就不見那小橋呢他沒法可想兩隻眼睛不住地向四邊閃動滿想找一條出路好回去誰知越望眼越花覺得面前不曉得有多少路的樣子千頭萬岔紆曲回環亂如麻縷他氣壞了轉過頭來正想從南邊尋路瞥見一帶短牆婉蜒橫著牆上砌著鹿眼的透空格子那短牆的平面上挨次放著吉祥草萬年青的盆子隱隱地望見裏面萬花如錦姹紫嫣紅亭台疊疊殿角重重他不知不覺地移步近來靠著短牆向裏面瞧了一會兒瞥見西南角上有幾個十五六歲的丫頭在那裏尋花折柳地遊玩他心中一想我轉了半天終沒有轉了出去倒不如去問問他們教他們指點指點或者可以出去他想到這裏壯著膽循著短牆一直往那幾個丫頭的所在繞來一刻兒到了那幾個丫頭玩耍的所在不過只隔著一層牆所以一切都能看得清楚他屏著氣先靠著牆上面的籬眼向裏面瞧去只見一個穿紅綃襖子的丫頭和一個穿月白色衣裳的丫頭坐在草地上數瓦子還有一個穿醬紫色小襖的丫頭大約不過十二三歲的光景頭上梳著分心雙髻手裏拿一把宮扇在那裏趕著玉色蝴蝶那一隻蝴蝶被他趕得忽起忽落穿花渡柳地飛著他可是趕得香汗淋淋嬌喘細細再也不肯放手一手執著扇子一手拿出一條蛇緑的絹帕來一面拭汗一面趕著這時坐在地上的穿紅綃的丫頭對穿白月色的丫頭笑道你看那個蹄子是不是發瘋了為著一隻蝴蝶兒趕得渾身是汗兀的不肯放手一心要想撲住這不是癩蛤蟆想吃天鵝肉麼那穿月白色的也笑道他發瘋與你有什麼相干你儘管去説他做什麼今天讓他去趕夠了但看他撲著撲不著他兩個有説有笑的那個撲蝶的丫頭一句也沒有聽見仍舊輕揮羅扇踏著芳塵去趕那蝴蝶又兜了好幾個圈子好容易見那只蝴蝶落到一枝芍藥花上豎起翅膀一扇一合的正在那裏采花粉他嘻嘻地笑道好孽障這可逃不了我的手了他躡足潛蹤地溜到那蝶兒的後面舉起扇子要想撲過去那一隻蝶兒竟像屁股生了眼睛一樣霎時又翩翩地飛去了他一急連連頓足道可惜可惜又將它放走了他仍然不舍復又跟著那一隻蝶兒向西趕來走未數步他被一件東西一絆站不住一個跟鬥栽了下去正倒在一個人的肩上他睜眼一看不是別人正是那個穿紅綃的丫頭他連忙爬了起來對著那個穿紅綃的丫頭嗤嗤憨笑那個穿紅綃的正坐在地上弄瓦子弄得高興冷不提防憑空往他身上一栽他可是嚇得一大跳仔細一看便氣得罵道瞎了眼睛的小蹄子沒事兀的在這裏闖的是什麼魂難道我們坐在這裏你沒有看見嗎那個撲蝶兒的笑道好姐姐我因為那只蝶兒實在可愛想將它撲來描個花模子可是我費盡力氣終於沒有撲到剛才委實沒有看見絆了一個跟鬥不想就摜在你的身上他聽了便用手指著罵道扯你娘的淡呢誰和你囉嗦馬上告訴小姐去可是仔細你的皮那個撲蝶的丫頭聽了這話登時露出一種驚惶的神氣來忙著央告道好姐姐千萬不要告訴小姐你若是一告訴我可又要挨一頓好打了他答道你既然這樣的害怕為什麼偏要這樣的呢他慌忙哀求道我下次再也不敢了那個穿月白的丫頭笑道癡貨你放心吧他是和你開玩笑的決不會回去把你告訴的他聽得這句話歡喜得什麼似的跳跳跑跑地走開一直向西邊牆根跑來他一擡頭猛地看見一個人在牆外向著籬眼望個仔細他倒是一驚忙立定腳朝著牆外這個人問道你是哪里來的野男子跑到我們家園裏面來做什麼呢可是不是想來偷我們的花草的坐在地上的兩個丫頭聽他這話連忙一齊站起來向他一望同聲問道你這野漢子站在牆外做什麼勾當快快地説了出來如果延挨馬上就喊人來將你捆起來問問你究竟是幹什麼的他站在牆外看見他們遊戲正自看得出神猛地看見他們一個個都是怒目相向厲聲責問著六隻星眼的視線不約而同地一齊向他的臉注視著他可是又羞又怕停了半晌答道對不住我因為迷失路途想來請姐姐們指點我出去內一個丫頭笑道迷路只有陌上山裏可以迷路從沒聽過迷到人家園裏來的他急道我要是在山裏陌上反倒沒有迷過路可是你們園裏我進來的時候倒不曉得是個家園後來看見有了許多的荼蘼架子才知道是家園我原曉得家園裏外人不能任意遊玩的所以我忙要回去誰知轉了好久竟轉不出去了千萬請姐姐們方便指個路那撲蝶的小丫頭笑問道那個高鼻子的漢子你姓什麼叫什麼名字告訴我們馬上將你送出去他連忙道我姓劉名秀字文叔我家就住在這北邊舂陵白水村話還未了那個穿紅綃的笑道這個癡丫頭真好老臉好端端的問人的名姓做什麼敢是要和他做親不成那個撲蝶的小丫頭聽了這話登時羞得滿面通紅低著粉頸只是吃吃地憨笑那穿月白的向他説道明姐你去問問那個漢子他連忙答道他方才不是説過迷路的嗎又去問他做什麼呢你出園引他出去吧那穿月白的笑道你既然會説你何不去引他出去呢明兒笑道我又不認得他怪難為情的教我怎樣送法呢雪妹還是你送他出去吧雪兒笑道誰願意去你自己不去又何苦來派別人呢依我説不如叫碧兒送他出去吧明兒笑道正是正是我倒忘記了他了叫他去一定是肯去的忙向撲蝶的笑道碧妹你送那高鼻子出去吧碧兒笑道怎麼送法明兒道你個癡丫頭真個死纏不清年紀長得這麼大了難道送人都不會送嗎碧兒急道你們又不説明白教我將他送到哪里去呢雪兒道啐誰和你纏不清你不送就是了扯你娘的什麼淡馬上回去明姐把你告訴小姐少不得又要打得個爛羊頭碧兒急得滿臉緋紅幾乎要哭了出來停了一會子説道你們只是擺在自己的肚皮裏又不來告訴我教我怎樣送法還説我不肯呢他説著便向劉文叔問道那個高鼻子你是到哪里去的劉文叔忙道我是要回到白水村去你如肯送我出去我就感激不盡了碧兒聽了這話便對他們哭道好姐姐請你們送他去罷我實在不知什麼白水村黑水村在哪里雪兒笑道呸不送就不送哭的什麼誰又教你送他到白水村去呢不過叫你將他引出花園就完事了碧兒聽了這話忙拭淚笑道我曉得了去送去送他便動身向北面走來剛走了幾步猛可裏聽得嬌滴滴的一聲呼喚道碧兒他連忙止住腳步回轉身來對他們説道姐姐們聽見麼這可不能再怪我不送那個高鼻子了現在我要到小姐那裏去了他説著便順著花徑彎彎曲曲的向東南角一座兩間的小書齋裏走去劉文叔在牆外聽見碧兒肯送他出去心中自是歡喜猛聽得有人將他喚去他卻將一塊石頭依舊壓在心上料想這雪兒明兒一定是不肯送他出去的沒奈何打起精神等碧兒再來好送出去他想到這裏那兩隻眼睛不知不覺地將碧兒一直送到書齋裏他進去了一會子北邊一扇窗子忽然有人推開他便留神望去只見窗口立著一個十五六歲的女子打扮得和天仙一樣更有那整齊的龐兒淡淡的蛾眉掩覆著一雙星眼鼻倚瓊瑤齒排貝玉説不盡千般嬌豔萬種風流把個劉文叔只看得眼花繚亂嘌口難言禁不住暗自喝采道好一個絶色的女子有生以來還是第一遭兒看見這樣的美人只可恨近在咫尺不能夠前去和他談敘談敘一見芳澤不知哪一位有福的朋友能夠消受如此仙姿他正自胡思亂想的時候瞥見他的身旁又現出一個人來他仔細一看卻就是剛才的碧兒但見他和那個女子向自己指指點的説個不停劉文叔也曉得是説自己的無奈只是一句不能聽見只好癡呆呆地望著他們只見碧兒説了一陳他閃著星眼向自己望了一眼這時窗門突然閉起他怔怔的如有所失片晌只見那碧兒跑了出來對他們説道明姐小姐教你送那個高鼻子出去呢明兒笑道這可不是該應偏偏就教著我倒便宜了這癡貨了他説罷立起來向劉文叔道你那漢子你先轉到後門口等我劉文叔聽罷連忙稱謝不置順著短牆向北走去不一會果然走到後門口但見明兒已經立在那裏等他劉文叔便伸手一揖明兒躲讓不遑地問道你這是什麼意思劉文叔笑道一者謝謝你引我出去二者我有兩句話要問你明兒道有什麼話可問劉文叔笑道請問這裏叫什麼地方你們主人姓甚名誰明兒笑道我當是什麼要緊的事呢這樣的打拱作揖做鬼臉子我對你説罷我們這裏名叫楊花塢我們家老主人去世了只有老太太兩個小主人一個小姐大主人叫陰識二主人叫陰興他説到這裏便住口不説了劉文叔正想他説出他們小姐的芳名來不想他不説了連忙問道姐姐我還要請問你你家小姐芳名叫做什麼明兒聽了這話似乎有些不大情願的樣子扭過頭向他狠狠地瞅了一眼冷冷地答道你問他做甚麼閨閣裏面的名字又不應該你們男子問的劉文叔被他當面搶白了幾句直羞得面紅過耳片晌無言那心裏仍舊盤算個不住陡然想出一個法子來便笑著對明兒道姐姐你原不曉得我問你家小姐芳名卻有一個原因我有個表妹昨天到我們家裏他沒事的時候談起一個陰家女子來説是住在楊花塢的他請我帶一封信給他我想你們楊花塢大約也不是你們主人一家姓陰的而且陰家的姑娘又不是一個我恐怕將信交錯了所以問問你的明兒凝著星眼沈思了一會子道你這話又奇了這楊花塢只有我們主人一家姓陰的更沒有第二家的我家也只有一個小姐名叫陰麗華劉文叔還恐他不肯吐實忙故意的失驚道果真叫陰麗華嗎明兒笑道誰騙你呢劉文叔道那就對了故意伸手向懷裏摸信明兒道你先將信給我看看可對不對他摸了一會忙笑道我可急昏了怎的連一封信都忘記了沒有帶來可不是笑話呢他便對明兒笑道煩你回去對你們小姐説一聲就説有個人姓君名字叫做子求他有信給你呢明兒笑道信呢劉文叔笑道我明天準定送來好嗎明兒點頭笑道好是好的但是不要再學今天這個樣兒又要纍得我們送你出去了劉文叔搖頭笑道不會的不會的一回生二回熟哪里能回回像今朝這個樣子呢他便領劉文叔繞著荼蘼架子轉了好幾個圈子一面走一面向劉文叔説道你原不曉得這荼蘼架子擺得十分奧妙我常常聽他們説當日老太太在日時候最歡喜栽花許多的好花栽到園裏不上幾天就要給強盜偷去了後來沒有法子想就造出這些荼蘼花的架子來捉強盜説也奇怪沒有來過的生人撞到裏面再也摸不出去的劉文叔問道究竟是個什麼玩意兒明兒笑道你不要急我細細地告訴你我們這個荼蘼花架立起來之後一個月裏一連捉到三個偷花的強盜那些偷花的強盜撞進來每每轉了一夜轉得力盡精疲不能動彈到了早上不費一些氣力手到擒來打得個皮開肉綻的才放了後來這個消息傳出去之後一班偷花的強盜奉旨再也不敢來了都説我們主人有法術將他們罩住不能逃去其實説破了一點稀奇也沒有聽説這荼蘼架子擺的位置是按著什麼八卦的方向要出來只需看這架子上記號就能出去了劉文叔又問道看什麼記號呢明兒笑指那旁邊的架子説道那可不是一個生字嗎你出去就尋那個有生字的架子就出得去了劉文叔點頭稱是一會子走到小橋口明兒便轉身回去劉文叔折回原路心中只是顛倒著陰麗華他暗想道我不信天下竟有這樣的美人敢是今朝遇見神仙了嗎沒一刻進了白水村早見他的大哥劉繽二哥劉仲迎上來同聲問道你到哪里去了整整的半天到這時才回來他正自出神一句也沒有聽見走進自己的書房一歪身子坐下這正是野苑今朝逢豔侶瑤台何日傍神仙要知後事如何且看下回分解
