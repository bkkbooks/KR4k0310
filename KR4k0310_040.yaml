body:
  text: 第四十一回念父母乾隆下江南爭聲色雪如登龍舟卻説乾隆皇帝到了揚州第一天聽江紳士家集慶班的歌舞十分讚歎在江紳士和那兩江總督的心中意謂聖上一快活總少不了一二百萬的賞賜因此大家替江紳士高興誰想到了第二天大家到埠頭去伺候那太監把許多官員一齊擋駕在岸上不豫通報只見禦舟上繡幕沈沈笙歌細細江紳士急打聽是誰家戲班在裏面獻技那太監不肯説總督去打聽他也不肯説這班官員從辰時直站到午時站得腰酸腿軟那禦舟上的歌聲才息接著一陳嬌軟的笑聲兩江總督求內監替他上船通報那內監一開口便要一萬後來再三懇請才算讓到六千塊錢那太監得了銀錢才告訴他在船上歌唱的是汪紳士家的四喜班那領班姑娘雪如長得翩若驚鴻矯如遊龍聖上已看中了如今歌舞才罷已傳命雪姑娘侍宴各位大人如要朝見有如暫退俟皇上宴罷再替你們奏報不遲那班官員聽了也無可奈何只得暫時退回接駕廳中匆匆用過了午飯再到埠頭去候旨那太監替他們奏報忽然傳出一道聖旨來獨傳汪紳士進艙去朝見那汪紳士早在船頭伺候聽得一聲傳喚忙整一整衣帽彎著腰低著頭戰戰兢兢地走進艙去半晌又見他笑嘻嘻喜洋洋地踱出船來停了一會聖旨下來賞汪如龍二品頂戴白銀八十萬兩準他在禦前當差那汪如龍接了聖旨走上岸來自有許多官員前去趨奉他汪如龍臉上不覺有了驕傲神色見了那江鶴亭越發是瞧他不起江鶴亭和他去攀談他愛理不理江鶴亭滿面羞慚那汪如龍只向總督拱了一拱手上轎去了這裏看汪紳士去過以後太監才傳出聖旨來説著諸官紳退出禦門皇上午倦欲眠毋庸伺候裏面只拿出一萬兩銀子來賞江紳士那江紳士空盼望了一場只盼望到這一點銀子單是謝太監們也不夠只得垂頭喪氣地回去他暗地裏打聽原來那四喜班是汪如龍家的皇上生長深宮所見的都是北地胭脂如何見過這江南嬌娃況且這雪如是揚州地方第一美人嬌喉宛轉玉肌溫柔一度承恩落紅滿茵皇帝見他還是一個處女便格外地寵愛起來一連三天不傳見臣民把那班官紳弄得倣徨莫定到船邊悄悄地問時那太監總説聖上和新進的美人在船中歌舞取樂直到第四天才召見兩江總監這時皇上十分歡樂當面褒獎那總督説他設備周到存心忠實便賞他內帑十萬兩那總督急忙磕頭謝恩第二天龍舟起錨沿途過鎮江南京供應十分繁盛這時皇帝有雪如陪侍在身邊早夜取樂便也無心遊玩只是那江紳士吃了這個大虧以後心中念念不忘他回得家去和那惠風晝夜計議總要想法撿回這個面子來才不愧為揚州的首富那惠風也因為自己遭了這場沒趣急欲挽回盛名來便日夜思量甚至廢寢忘餐連想了幾天忽然被他想出一個妙法來了這法子名叫水戲臺是把戲臺造在船亡戲臺上鋪得十分華麗這戲臺照樣造成兩隻又編了許多王母宴封神榜金山寺等熱鬧的戲文花了十萬銀錢買通了總管太監這時禦舟已到了金山腳下在半夜時分汪紳士悄悄督率著伕役把這座水戲臺駛近禦舟兩邊用鐵鏈和禦舟緊緊扣定到了第二天皇帝和雪如睡在榻上忽然聽得細樂悠揚皇帝問時那總管太監奏稱有揚州紳士獻一班童伶在艙外演唱皇帝命把窗幃揭起只見船身左右造著兩座華麗的戲臺左面臺上正演著群仙舞一群嬌嫩的孩兒個個打扮得嬌花弱柳似的一邊唱著一邊舞著那歌聲嫋嫋動人舞態宛轉欲絶合著笙簫悠揚真好似在廣寒宮裏看天女的歌舞一般左面才罷右面又起只見繡幕初啓接著一個散花天女唱著舞著出來歌喉嬌脆容光嬌媚皇帝説道這般美貌正合天仙的身份問是誰家的女兒那總管太監早得了江紳士的好處便奏説是揚州紳士江鶴亭家的集慶班這扮天仙的是領班的名叫惠風皇帝聽了點頭歎賞説道也難為他一片忠心這孩子也怪可憐的皇帝睡在榻上懷中撫著那雪如一邊吃酒一邊看戲那戲臺上演過歌唱的戲以後便大鑼大鼓地演起天門陳來接著又演法門寺第二天依舊是兩面戲臺輪流演著熱鬧的戲文這樣一天一天地演著皇帝如何見過這有趣熱鬧的戲文早把皇帝看出了神夜裏又演目蓮救母觀音遊地府的燈火戲忽而神出鬼沒忽而煙火漫天皇帝看到高興的時候便去後面船上把太后請來那太后看了也十分讚歎這樣不知過了幾天忽然太監報稱已到蘇州那蘇州巡撫帶領合境官紳在外面接駕那皇帝聽了十分詫異説禦舟並不曾搖動如何已到了蘇州到這時候總管太監才稱這都是江鶴亭的一片巧妙心思只怕皇上沿路寂寞便造這兩座水戲臺練這班小戲子孝敬皇上乾隆皇帝聽了説難得江鶴亭一片忠心傳旨也賞他個二晶銜又賞銀八十萬兩那江鶴亭得了賞賜便走上禦舟去謝恩皇上當面獎勵了幾句又吩咐那惠風每演完戲許他進船來伺候從此皇帝聲有惠風色有雪如心下十分快樂那江鶴亭得了賞賜回去故意穿了二品的頂戴去拜見汪如龍那汪紳士見他得了好處心中十分嫉妒看他那副驕傲的神氣心中又十分氣憤從此以後江汪兩家便暗暗結下冤仇那汪紳士日夜想法總要壓倒那姓江的話説乾隆皇帝從蘇州到了杭州便把那水戲場搬到西湖中央賞衆官員們看戲又見西湖景色優勝便坐著輕暖小轎奉著太后天天遊玩去在乾隆皇帝未到杭州的時候省城裏那班官紳早已忙亂著籌備接駕的事體起初大家會議的時候心想挑選一班絶色的船娘在西湖采蓮蕩槳以悅聖心後來打聽到揚州有一個雪如國色天香被他拔了頭籌如今杭州再用這條老法子未免落他人之窠臼給揚州人見笑又辱沒省城地方的場面倘然蓋造園林匆促之間決不能成偉大的工程況且西湖有天然的圖畫這人造的園林也決不能勝過天然風景大家正想不出法子的時候忽然就中有一個韓紳士説道如今我有一個妙法了俺西湖上淨慈寺海湖寺昭慶寺廣化寺風林寺清漣寺上至靈隱天竺盡多名山古剎高僧大佛當今皇上天生聰慧自幼便喜經典禪機那五臺山清涼寺聖駕時時去巡幸寺中設有寶座皇上常命衆僧高坐參禪寺中方丈法名慧安原是世祖剃度時伺候過的後經聖祖封為智慧正覺佛皇上和他最好便拜他做師父這種情形都是俺托京中官員從親近內監那裏打聽得來的那揚州蘇州的官紳還不知道呢如今俺們正可以趁此機會搜尋天下高僧安插在西湖上各大叢林裏待皇上駕到各廟中高搭彩棚大大做法事另築講臺請各高僧上臺講法皇上見了一定歡喜又可以見得我們省中官紳的清高當時浙江巡撫聽了便問他老兄如何知道皇上必定歡喜那姓韓的説道皇上從揚州蘇州一路行來享受的儘是聲色繁華忽然見這清靜佛地好似服了一劑清涼散皇上又有佛根的如何不喜一席話説得在座諸人個個稱妙那巡撫又説俺們要求聖心愈悅非得去請五臺山法師來主持各寺不可當下由巡撫修了一封密書派人晝夜趲程趕到五臺山去請名僧這時清涼主持僧慧安已告老退休由大徒弟曼如當家那曼如雖説參禪聰明卻是一個貪財好色之徒見杭州巡撫派人來請高僧知道這是發財的好機會便冷笑著對那人説到你們杭州人也知道急時抱佛腳嗎如今俺山中正要修造銅殿鐵塔最少也得一百萬銀元才得造成師兄弟都下山四處募化去了誰有空兒去踏江南的齷齪地方那人見曼如口氣決絶杭州接駕的日子一天近似一天心中焦急得不得了便再三和曼如商量師兄弟既不出山便求大和尚派幾位兄弟去也是好的那曼如只是搖頭不應那人急得沒法便答應捐二十萬兩銀子修造鐵塔後來慢慢加到四十萬塊錢那曼如才答應下來立刻在耳房裏喚出四個和尚來吩咐他們跟著來人到杭州説法去那班杭州官紳聽説請到五臺山高僧便興高采烈預備清潔禪堂莊嚴的講座這四個和尚到杭州的時候合城官紳都前去迎接誰知見面之下談論起來卻是一竅不通舉動惡俗不覺大失所望只因他們是五臺山來的便也照常敬重他們那知這四個和尚住在寺裏漸漸地不守清規起來起初還不過是偷葷吃素那寺院後門外常常見許多雞毛鴨骨後來索興偷起女人來蘇杭女人本來是信佛的多這時聽説杭州地方設廣大道場那蘇杭一帶的名媛閨秀趁駕未到以前都搶著到西湖上來朝見名山瞻禮佛像那和尚便在寺中造著密室見有略平頭整臉的婦女便拉過藏在密室裏不上一個月工夫被他騙去的婦女已有三十六個那鄰舍人家和遠路香客見走失自己的妻女便吵嚷起來四處找尋那和尚雇著工匠天天在廟裏建造深房曲室沒日沒夜和那班婦女在裏面宣淫作樂又擅自把廟中産業押的押賣的賣他仗著是皇上師弟兄的勢力有誰敢攔阻他便是走失了那班婦女也明知道是這幾個和尚鬧的鬼雖有那班婦女的父兄丈夫告到官裏來也只好裝聾作啞不去理他那和尚膽子越來越大後來索興連官家眷屬也被拐騙去了這時塘棲地方有一個紳士姓楊曾經做關外總兵養病在家他有一位姨太太名叫琳娘原是窯姐兒出身只因他面貌長得十分標致這楊總兵十分寵愛他琳娘一向信佛聽説杭州地方迎接高僧建設道場便和總兵説知要到杭州燒香去總兵官也依他親自陪他到杭州來誰知只到了三天那琳娘便不見丁四處找尋毫無影蹤這總兵急了告到將軍衙門裏那將軍派了幾個親兵幫他找尋後來這總兵偶然從琳娘貼身丫頭口風裏聽出來才知道他的姨太太是被五臺山來的和尚騙去的他原是一個武夫聽了這個話如何忍得便立時帶了自己的跟隨打進廟去果然在地窯裏找到了這地窯打扮得錦帳繡帷鋪著長枕大被點著不夜天燈那琳娘和別家十多個婦女都關在窯子裏總兵急找那和尚時已逃得無影無蹤氣得那總兵咆哮如雷帶著琳娘要趕上蘇州去叩閽上告慌得那杭州一班官紳一齊來勸阻又由大家湊了十萬銀錢算是遮羞錢送他回鄉去那走失的三十六個婦女一時都找得由地方備了船隻個個送他們回家去這一場大鬧把個莊嚴的佛場打得七零八落看看接駕的日期一天近似一天那道場必須重新修建且不去説他最為難的在這短促日期到什麼地方去請名僧來主持講壇後來還是那韓紳士想出一個救急的法子來説杭州是文人薈萃之區深通佛典的讀書人一定不少我們何妨把他們請來暫時剃度分主講壇韓紳士這個主意一出那一班寒土略通佛典的都來應募韓紳士自己也懂些大乘小乘的法門便一個個當面試過揀幾個文理通順聰明有口才的便給他們剃度了分住各山寺院和他們約定倘能奏對稱旨的便永遠做和尚送他二萬兩銀錢沒有接過駕的待皇上回鑾以後任聽回俗另送他四千兩銀錢酬勞內中有一個程的一個姓方的一個姓餘的一個姓顧的四個人都是深通佛典辨才無礙韓紳士給他們都改了名字姓程的改名法磐住持昭慶寺姓方的改名惠林住持淨慈寺姓餘的改名拾得住持天竺寺姓顧的改名寶相住持靈隱寺內中要演算法磬最是機警便在昭慶寺前建設大法場設七七四十九日水陸道場夜間請法磬大師登壇説法那法場在平地上搭蓋百丈彩棚四面挂滿了旗幡寶蓋莊嚴佛像做起道場來鐃鼓殷地梵吹振天燭光徹宵火城列矩香煙繚繞熏聞數裏善男信女憧憧往來南無之聲響徹雲霄講壇上更是莊嚴彩結樓閣高矗半天蓮座上端坐著法磬大師合掌閉目金光滿面台上燈燭輝煌香煙氤氳老僧入定望去好似金裝佛像台下甬道兩旁站立著五千僧人整齊肅靜地上鋪著尺許厚的花毯人在上面走著寂靜無譁那四方來瞻禮的男女萬頭擁擠如海潮生走進門來個個都合掌低頭屏息侍立大門外用金底黃宇繡成奉旨建設道場六個大字兩邊豎起下馬牌上寫文武官員軍民人等至此下馬下車字樣那和尚打坐一日到夜裏説起法來真是聲如洪鐘舌粲蓮花説得個個點頭人人皈依説到第十四日上聖駕已到接駕官紳把各寺住持的名單進呈禦覽皇帝見設廣大道場心中第一個歡喜那皇太后是信佛的説起當初聖祖在日如何與佛有緣這杭州西湖又是一個佛地是宜優禮僧人廣闡佛法那乾隆皇帝便奉著太后親監道場皇帝吩咐在場的都是佛門弟子一列平等許人民瞻禮聖顔不用回避法磬和尚高座講臺見禦駕降監他也若無其事自在説法那皇帝和皇太后帶了全城官員便在壇下恭聽直到講完了那法磐才下臺來恭接禦駕皇帝笑問道和尚從何處來法磬答道從來處來皇帝這時手中正拿著一柄折忘扇猛向法磬頭上打了一下而在兩旁侍從的官員見此大驚失色意謂天子震怒看看皇帝臉上卻笑容滿面大家正在詫異的時候忽聽得法磐喉中大喊一聲哄哄地響著好似打磬子一般那聲音漸長漸遠皇帝聽了大笑道和尚錯了他磬等不得你磬你磐乃不應比我磬什麼道理法磬大聲答道磬亦知守法非法不敢出聲皇帝説道和尚又錯了你聲非聲你法亦非法那末你磬也非磬有什麼敢不敢又有什麼守不守又為什麼要出聲你要出聲便聲更何法容得你守法磬也笑著答道和尚沒有扇子所以和尚是磬和尚是磬不是磬聲所以和尚是法如今是和尚錯了扇子來了磬聲若出和尚圓寂和尚還是守的法皇帝聽了把扇子拋給法磬説道朕便把扇子給你那法磬接了皇帝的扇子便連連打著光頭一邊打著一邊嘴裏便哄哄地響著輕重快慢跟著扇子好似在那裏打磬子一般皇帝看了又忍不住笑起來向著他道和尚自己有了扇子便不守法這是和尚的錯呢還是扇子的錯法磐説道不是和尚錯也不是扇子錯是法磬錯是給扇子與法磐的錯皇帝莊容道原是扇子錯卻不料纍了和尚還不如撇去扇子的乾淨説著便伸手去奪法磐手中的扇子摔在地下那法磬不慌不忙拾起扇子來説道罪過罪過扇子不錯原來是法磐錯了皇帝略略思索一回説道罷罷和尚便留著這柄扇子傳給世人叫他們不要再錯了法磐合掌閉目念著佛號道西天自在光明大善覺悟圓滿佛南無聰明智慧無牽無礙佛皇帝也合掌答禮道什麼佛什麼佛竟是幹矢橛説著便轉身到各殿隨喜去遊畢走出門來法磬帶領五千僧人男女信徒恭送禦駕皇帝走出了大門回過頭來笑著對法磐説道破工夫明日早些來法磬躬身答道和尚是沒有吞針的皇帝説道管他則甚你破工夫明日早些來法磬又把扇子在自己頭上打一下卻不作聲皇帝笑問他為什麼這磐於不響了法磐説道竟是幹矢橛什麼佛什麼佛皇帝聽了又不禁大笑便吩咐法磐坐轎也跟著到淨慈寺去淨慈寺住持僧人惠林早在寺門口接駕皇帝進寺去瞻禮佛像以後便帶著兩個和尚上吳山去站在最高峰上見錢塘江中來往船隻甚多乾隆皇帝忽然問惠林道和尚看江中有多少船隻往來惠林略一思索便答道只有兩隻皇帝一時解不過來惠林替他解道這兩隻船一隻名爭名一隻名奪利皇帝又問道和尚怎麼也見得名利惠林道和尚不見得名利所以見得這兩隻船中人是名利倘然兩船中人見得是名利所以不見得兩船以外是見得兩船中人是名利皇帝聽了點著頭説道法磬便是惠林惠林便是法磐第二天皇帝又帶著法磬惠林到天竺寺去那天竺寺住持僧名叫拾得這時八月天氣雖還熱天竺寺院子裏木樨花都開得甚是熱鬧皇帝劈頭問道聞木樨香否拾得答道此是香此不是木樨此是木樨此不是香木樨與香原是兩橛的乾隆帝笑道和尚又錯了此是木樨即是香此是香即是木樨香與木樨原是一鼻孔出氣的拾得合十説道那末還他是無有木樨無有香並何有聞並何有問聞木樨香著乾隆皇帝聽了又點頭稱妙這天竺地方原是三面環山的層巒疊嶂隨處有茂林清泉乾隆皇帝一時捨不得離開天天帶著幾個高僧覓勝尋幽參禪悟道他這時另有山林之樂便把那雪如惠風聲色脂粉都丟在腦後了乾隆在天竺山上玩了天便下山來到靈隱寺去一進山門便見危峰撲人高樹障日便讚歎道好一個清奇的所在靈隱寺原有一個高僧名叫法華年紀已八十八歲另在一間密室裏告老靜養皇帝也頗知道他是道德高深的和尚這時靈隱寺的住持僧名叫寶相在寺門外接駕乾隆定要見法華寶相奏稱法華初次滅度皇上讓他去罷皇帝生氣説道朕要法華他敢滅度此是何法寶相道此不是法此是初次滅度皇上定要見他他便滅度了便不是初次此是色相的滅度皇帝道你言色相你是什麼色相你敢是寶相你便敢是法華的寶相寶相回奏道和尚是無色色即是空空即是色和尚是無相無我相無人相無衆生相無壽者相皇帝聽到這裏拿一個指兒一豎説道和尚敢是有寶寶相接著説道和尚是幹矢橛和尚是金剛不壞身所以和尚是寶皇帝説道法華不是金剛不壞身所以滅度便不是寶寶相指著山門口的飛來峰答道説它也不是寶人皆不信他卻不是滅度它卻是飛來所以稱它是寶皇帝便問道他是否寶相答道是飛處飛來也不是寶相不是飛處飛來也是寶相皇帝聽了點頭道法華便是寶相寶相便是法華寶相便陪著禦駕進大雄寶殿去瞻禮佛像又到羅漢堂去遊玩見塑著五百尊羅漢個個都現著金身寶相乾隆帝歎道這才是金剛不壞身呢這句話被隨扈的太監聽得了知道皇帝的意思便悄悄地去告訴了浙江撫台那撫台便連夜傳集工匠在漢堂中間塑一個皇上的金身要知後事如何且聽下回分解
