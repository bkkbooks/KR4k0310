body:
  text: 第十九回朱唇接處嫂為叔媒黃旗展來臣尊帝號話説大玉兒原是天生尤物他在七歲的時候跟著奴僕到牧場上去遊玩有一人喇嘛見了他便説道這位格格有大貴之相奴僕在一旁笑説道俺科爾沁貝勒的格格不貴也是貴了何用你多説那喇嘛搖著頭説道我説的貴是貴為天子的貴那班奴僕又笑説道你這和尚説話越説越離經了俺這滿洲地方和內外蒙古哪里找個天子去難道叫我們格格嫁給那明朝皇帝去這幾句話大玉兒的母親常常拿他説笑大玉兒也聽在耳朵裏如今見了皇太極又想起他父親現在已經做了皇帝保不定他將來也是一個太子再加他兩人原有一番舊日的恩情如今他又在患難之中心中早有了一段私意他兩人在宮中唧唧咕咕地談著心宮女們在房門外站著又不敢闖進房去隔了半晌裏面傳出話來給福晉備馬只見皇太極和大玉兒兩人手拉手兒走出宮來大玉兒又招呼貼身服待的四個宮女一齊上馬由皇太極帶領著到自己營裏去藏起來從此大玉兒做了皇太極的妃子宮中都稱他吉特妃子皇太極又看在吉特氏面上求著父親饒了德爾格勒的一條命這都是過去的事實如今皇太極趁自己即位的時候便把他心愛的吉特氏册立為皇后稱為孝莊文皇后他的原配只封為關雎宮宸妃文後住的宮稱作永福宮太宗皇帝天天在永福宮裏住宿別的妃嬪休想得到一夜的臨幸皇太極雖做了皇帝只因常常要陪伴皇后所有國家大事都由大貝勒二貝勒三貝勒分管這時十四親王多爾袞年紀只有十五歲十五親王多鐸年紀只有十三歲因為文皇后喜歡他弟兄兩人便留在宮中常常和皇后做伴太宗也因他們母親死得慘這時良心發現便格外好意看待他們多爾袞生得乖巧面貌也漂亮文皇后格外多喜歡他些文皇后有一個妹妹名叫小玉兒這時也跟著他姊姊住在宮裏卻和多爾袞同年伴月他兩人朝朝見面自然容易親熱再加那小玉兒的面貌和他姊姊真是長得一模一樣他姊妹兩人的皮膚都長得潔白無瑕因此他父母便拿個玉字做他的名字這時正是長夏無事文皇后午睡醒來不見了小玉兒和多爾袞兩人知道他們又往園子裏玩耍去了便也帶著幾個宮女向園裏走來走到一帶高槐下面樹蔭罩地遠遠地只見小玉兒坐在樹根下一方湖石上不知什麼事惱了小玉兒慌得多爾袞左一揖右一揖向他拜著小玉兒只是轉過臉去不理他文皇后看見了不禁覺得好笑起來説道小丫頭總是這副執拗脾氣老不肯改的説著自己在一方湖石上坐下吩咐宮女過去把他兩人喚來多爾袞走到皇后跟前皇后伸過手去把他攬在懷裏多爾袞跪在地下仰著臉皇后兩手按在他肩上低著脖子看他真是長得眉清目秀唇紅齒白忍不住低下頭去在他唇上親了一個嘴説好叔叔你愛上了他嗎我便拿他給你好嗎多爾袞倒也乖巧聽了忙磕頭謝恩這時小玉兒站在一旁心裏雖也愛多爾袞但是見他姊姊和他親嘴心裏不覺起了一陳醋意後來聽他姊姊又把自己的終身許給了多爾袞他臉上一陳臊便一轉身飛也似地逃去了到了晚上皇后把這個意思對皇帝説了皇帝也十分歡喜立刻傳了內務大臣來吩咐給十四親王造一座高大的王邸便在衍慶宮後面到了第二年多爾袞和小玉兒都是十六歲了便行了大禮這一場喜事做得十分熱鬧更是他小夫妻兩口過和十分恩愛可是這一來卻撇得文皇后十分冷清了雖説有太宗皇帝天天陪伴著但是從來説的日久生厭任你是第一等的恩愛夫妻倘然是朝夜不離行監坐守甜蜜到十分親熱到十分便也要覺得厭倦起來何況赫赫一位皇帝有的是三宮六院縵立遠視而望幸的隨處都是皇帝到了厭倦的時候豈有不想異味的嗎因此太宗空間下來也常到別的宮院裏去走走越發撇得皇后冷清清的皇后在十分冷靜的時候便帶了一班宮女臂鷹跨馬依舊到外面打獵去滿洲人不論男女都拿打獵當一件消遣事體皇帝知道了也不去阻攔他誰知皇后今天打獵明天打獵卻打出意外奇緣來了這一天皇后在花岡子打獵正追著一頭野豬皇后馬快趕在前面追進林子去那頭豬也乖巧盡在林子裏左繞右繞皇后盤馬彎弓東趕到西西趕到東兀身射它不著把個皇后弄得嬌喘細細香汗涔涔正忙亂的時候那頭豬忽然惱怒起來大叫一聲掉轉身體直向皇后撲來張著血盆似的大口露著鋼牙似的齒牙把個皇后嚇得魂不附體嬌聲叫喚起來正危急的時候忽聽得嗖嗖兩聲左右林中飛出兩支箭來不偏不斜齊插入那頭野豬的兩隻耳朵裏去只聽大嗥一聲這頭野豬倒在地下死了接著後面的宮女也趕到了皇后略定了一定神便吩咐到左右林子裏搜人去誰知也不用搜那林子裏鑽出兩個大漢來一齊跪倒在皇后馬前皇后吩咐宮女問他什麼地方人姓什麼叫什麼為什麼躲在這林子裏那兩個大漢見問便有一個磕著頭説道奴才名叫王臯他叫鄧誇子都是山東人氏祖上在關外做買賣折了本錢流落在遼陽地方不得回家因為家貧不能度日幸喜習得一手弓箭便以打獵為生弟兄兩個常在撫順捉幾頭野豬度日這幾天因為那地方野獸稀少所以趕到這瀋陽地方來尋些野獸只因人地生疏不知道這裏是禁地誤犯了娘娘的聖駕求娘娘饒恕了奴才一條狗命皇后聽他説話伶俐狀貌魁梧心裏不覺一動又想起方才那種慌張的樣子虧得他兩人救了危急心裏又有幾分感激他心想在宮裏終日和宮女纏得怪膩的這兩人説話又伶俐又爽快倒不如把他兩人帶進宮去空間下來也好找他説話解解悶兒皇后想到這裏便自己撥轉馬頭繞到林子外面去把個貼身的宮女喚近身來悄悄地對他説了自己卻等在林子外面等了一會宮女把王臯鄧誇子兩人領出來皇后看時不覺好笑起來原來他們把這兩個漢子也打扮成宮女模樣趁皇后回宮的時候混進宮去從此這兩個獵戶一交跌在青雲裏轉流著侍候皇后空間下來搬出許多鄉間的故事來説説文皇后生長宮鬧這些事體真是他聞所未聞他越發覺得這兩個人可愛因此文皇后便安安靜靜地住在宮裏也不出去打獵了太宗皇帝終究是英雄性格他在宮裏和皇后妃嬪廝守得膩煩起來便天天上朝和貝勒大臣們商量國家大事天聰五年十一月的時候忽然有探子報稱內蒙古林丹汗私受明朝賄賂白銀四萬兩現今出兵在西剌木倫上源地方窺探我國邊地太宗皇帝聽了十分動怒説我國和林丹汗結盟在先共拒明國如今他貪利忘義罪由自取朕誓必討之一面把國事托給和碩睿親王多爾袞一麵點齊大隊人馬親自帶領著直攻察哈爾太宗皇帝多年不打仗了如今帶兵出來卻十分高興到第二年又召集了許多蒙古歸附來的部主到西剌木倫河上過興安嶺到達裏泊地方打敗了林丹軍隊那林丹汗帶了他的人民逃過歸化城渡過黃河口到大草灘地方忽然害病死了太宗皇帝便收兵回去路過明朝邊地他便越過萬里長城到大同宣府一帶地方耀武揚威地走著明朝人也奈何他不得天聰九年時候打聽得林丹汗的兒子額哲逃在托裏圖地方另立一個部落小玉兒雖説是一個女流他卻勸多爾滾帶兵去收服額哲借此也立此功勞多爾袞也聽小玉兒的話便奏明太宗皇帝出兵到托裏圖地方收服了林丹的部衆又得了林丹的傳國玉璽回來從此內蒙古各部落完全歸併在太宗部下太宗見多爾袞有功便又格外和他親熱常常傳他夫妻兩人進宮去姊妹弟兄四人在一塊兒吃酒説笑那皇后從小看多爾袞長大自然格外親熱些皇后長得一個美人西子似的任你鐵石人見了也要動心這時皇后親手遞一個果子去給多爾袞多爾袞忙上前接著在皇后的臂膀上一擦覺得滑膩如酥不覺心中一動他想小玉兒的肌膚白淨滑膩和他姊姊不相上下這皇后身上不知怎麼個有趣我今生若得和皇后真個銷魂便死也心甘的他只是怔怔地想著皇后向他説話也不聽得了皇后看他這癡呆的樣子知道他心中不轉好念頭又看他臉兒依舊是眉清目秀唇紅齒白他陡然想起那年在槐樹蔭下和他親嘴的情形不覺心中一動急回過臉去不覺一陳臊熱紅上臉來幸而這時皇帝正和小玉兒説著話不曾留意到他們但是他兩人自從這一回種下愛根到底忍耐不住後來鬧出一段風流佳話來這也是前生注定的緣分這都是後話且不提第二天太宗坐朝只見武英郡王阿濟格出班奏道今有明將總提兵大元帥孔有德總督糧餉總兵官耿仲明帶領他兵士一萬三千八百七十四名前來投降我朝如今他兵隊駐扎在安東現有降書在此請陛下的旨意説著把那降書捧上禦案去太宗看時上面大略寫道昨奉部調西援錢糧缺乏兼沿途閉門罷市日不得食夜不得宿忍氣吞聲行去吳橋又因惡官把持以致衆兵奮激起義遂破新城破登州隨收服務州縣繼因援兵四集圍困半載我兵糧少只得棄登州而駕舟師飄至廣鹿島本師即乘機收服廣鹿長山石城等島久仰可汗網羅海內英豪有堯舜湯武之胸襟是願率衆投誠特差副將劉承祖曹紹中為先容汗速乘此機會成其大事即天賜汗之福亦本帥之幸也太宗看了降書不覺心中大喜立刻傳見劉承祖曹紹中兩人當面褒獎了幾句又打發二貝勒三貝勒貝子博洛內大臣圖爾格帶了大隊人馬到安東迎接去那明朝和朝鮮聽説孔有德耿仲明兩人在安東上岸便也調動兵隊前去攔擊只因滿洲兵十分厲害孔耿兩將的兵也出死力抵抗便得安全上岸太宗傳諭賜他田地房屋在遼陽地方孔耿兩人心十分感激要親自進京去朝見太宗當面謝恩當下便寫了一道謝恩表文道皇上萬福萬安德所部先來官兵現已安插均蒙給糧恩同於天德等欲赴都門謝恩聽候皇上的鈞旨赴闕叩首不勝戰栗之至太宗聽説孔耿二將將要進京來便親自帶了許多貝勒大臣迎接上去走到渾河石岸遇見了太宗他住在一座黃緞的篷帳裏孔有德和耿仲明走進帳去爬在地下磕頭嘴裏説謝皇帝天恩太宗忙上去親自扶他起來又伸著兩手在他腰上一抱兩邊站著的大臣臉上都不覺露出詫異的神色來原來這抱見的禮是滿洲人十分看重的如今太宗和孔耿兩人行抱見禮那班大臣心中十分詫異行過了禮太宗又在帳中賜宴並封孔有德做都元帥耿仲明做總兵官第二天太宗回京耿孔兩人也跟著進京去連日許貝勒大臣輪流替他二人接風孔有德每天朝罷回來住在客館裏和耿仲明談論太宗的恩德沒有報答的法子後來孔有德想出一個尊號的法子來立刻邀集了許多滿洲蒙古的貝勒大臣在客館裏商議皇帝的尊號那班貝勒大臣一齊説願意便請範文程擬表文又把表文寫成滿蒙漢三國的文字趁明天大朝的時候吏部和碩墨勒根青貝勒多爾袞捧著滿洲表文科爾沁國土謝圖濟農捧著蒙古表文孔有德捧著漢字表文一齊跪在殿下由侍衛官把表文送上龍案去太宗看時上面寫道諸貝勒大臣文武各官及外藩諸貝勒恭惟皇上承天眷佑應運而興當天下昏亂之時修德體大逆者威之以兵順者撫之以德寬溫之譽施及萬方征服朝鮮統一蒙古更獲玉璽內外化成上合天意下協輿情以是臣等仰體天心敬上尊號一切儀物俱已完備伏願府賜諭允勿虛衆望太宗看了説道現在時局未定正在用兵的時候也無暇及此諸貝勒大臣一齊勸駕説道從來説的名正言順皇上功蓋寰宇如今要用兵明國須上尊號才能和明朝皇帝下個敵體的戰書太宗聽他們説話有理便也答應了揀了個吉日祭告天地受寬溫仁聖皇帝的稱號改國號為大清改元稱崇德元年第二天太宗帶領諸貝勒去祭太廟尊始祖稱澤王高祖稱慶王曾祖稱昌王祖稱福王奠太祖努爾哈齊稱武皇帝廟稱太廟陵稱福陵封孔有德做恭順王耿仲明做懷順王此外貝勒大臣都加封進爵一面拜和碩睿親王多爾袞為統帥進兵到大淩河猛戰三天三夜打破了大淩河捉住明將祖大壽又放他回國去替清朝做著偵探多爾袞又進兵圍住錦州消息報到明朝熹宗便拜洪承疇做經略使就帶王朴曹燮蛟馬科吳三桂李輔明唐通白廣恩王廷臣八個總兵官參將遊擊守備二百多名馬步兵十三萬人去救錦州把營頭扎在松山城北乳峰山的山岡上多爾袞打聽得明朝兵勢浩大怕自己抵敵不住便打發旗牌官回盛京求救兵去太宗得了消息便立刻調動大隊人馬親自統帶著到錦州來京城裏的事體自有鄭親王濟爾哈朗照管不多幾天太宗兵馬到了遼河西岸多爾袞前來接駕便説起洪承疇兵來攻我右翼和土謝圖親王營盤被我們兵士打退太宗聽了也不説話騎著馬帶著許多親王大臣到松山腳下去看敵兵的形勢回到自己營裏便吩咐把大兵散開包圍住松山到杏山這一段路又從烏欣河扎營直扎到海邊攔斷了一條大路那明朝兵將見自己被清兵包圍住了心裏個個驚慌起來都打算偷偷地逃去到第二天一清早明朝八個總兵官都帶領本部兵馬擂鼓吹角直沖進噶布希賢的陳地裏來誰知那噶布希賢已早得了太宗授的機宜只是把守營門掩旗息鼓地不動聲色待明兵走進營門只看見紅旗一動營裏面萬弩齊發一箭一個明兵的先鋒隊被射倒了四五百人明兵嚇了一跳急轉身逃命後面的人馬被前面的人馬衝動一齊和潮水一般倒退下去只聽得呐喊聲叫嗥聲自己踏死自己的兵馬也不知有多少清國兵馬乘勢追殺鑲藍旗擺牙喇武英郡王阿濟格貝子博洛內大臣圖爾格等四路夾攻直追到塔山地方明兵有糧米十二堆在筆架山地方統被清兵奪去明朝將官吃了這一回敗仗都打算逃回國去撤退了七營步兵靠著松山城駐扎那清朝鑲紅旗兵攔住了明兵的去路第二天洪承疇傳令猛撲鑲紅旗兵兩軍各出死力對敵正殺得起徑明兵一見前面一簇人馬張著黃傘傘下面一個人威風凜凜地騎在馬上早嚇得心驚膽戰撇下敵兵紛紛逃回營去太宗一面鳴金收兵立刻傳集諸將到帳下議事太宗説道我看明兵營中旌旗不整今夜敵兵必逃當即傳令著左翼四旗擺牙喇合著阿禮哈蒙古兵噶布希賢兵連接著擺一個長蛇陳直到海邊攔住明兵的去路要知明兵勝敗如何且聽下回分解
