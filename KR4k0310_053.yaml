body:
  text: 第五十四回遇宮變煤黑子效死獻巧藝王董氏傷生卻説林清謀反的前一年有臺灣淡水同知在淡水地方捉得個妖言惑衆的教徒名叫高媽達他自認説是八封教的小頭目另有大頭目林清在京裏買通太監約定明年中秋起事那同知官得了這個消息急急修下文書送進京去那京中大臣見了文書認他有意張皇便按下了不去奏明到了起事的前一天又有盧溝橋的巡檢得了消息悄悄地去通報順天府尹説林清約在明天打進宮去謀反那府尹得了消息反把這巡檢申斥了一頓説此如何事豈可冒昧聲張他自己也一點不去預備到了這一天果然大亂起來忽見滿街的教徒拿著刀槍橫沖直撞看他們打進東華門西華門去便有太監劉德才楊進忠一班人在裏面接應又有那總管太監閻進喜在宮內接應這時東華門的護兵見教徒來勢洶湧急閉門時已來不及了五七百個教徒殺進東華門直殺到弘德殿又有太監從宮裏殺出來那班宮娥秀女嚇得嬌聲啼哭宮內頓時大亂那西華門也有五七百個教徒殺進去禦林兵士忙把宮門緊閉死力抵禦這時嘉慶帝恰巧不在宮中前幾天已到圓明園去了宮裏留下的侍衛不多兩面抵敵了多時西華門已打破了教徒一擁而進殺過尚衣監文穎館直到隆宗門侍衛們且戰且退忽然太監們自己也殺起來一時喊殺連天血流遍地一班妃嬪住在翊坤宮永和宮咸福宮的聽了這喊殺的聲音慌作一團有幾個膽小的宮嬪早已投井死了這時二皇子旻寧和諸王貝勒正在上書房讀書聽説宮中有變便不慌不忙喚太監們拿我的鳥槍和腰刀來太監們送上鳥槍腰刀他便召集了二十幾個太監説道跟著俺跑他領著太監走到養心殿門口只見一群匪徒正喊殺奔來二皇子吩咐快關上養心殿又命太監爬上牆去探望見有賊爬上牆來便出其不意地拿棍子打下去有許多教徒被太監們打得腦漿進裂死在牆下有幾個頭目看了便鼓著勇氣一手拿著白旗搶先爬上牆來牆東面便是大內那賊人在牆上喊著向東奔去二皇子站在養心殿階下拿起鳥槍覷得親切一連打死了兩個頭目貝勒綿志站在皇子左首也放槍打死了兩個頭目其余教徒見死了頭目也不敢過牆向別處散去了講到那二皇子自幼便是本領高強的人乾隆五十四年旻寧只有八歲那時乾隆帝駕幸張家灣行宮率領諸子皇孫在校場上比射旻寧站在一旁候諸王貝勒射過了他便上去跪在乾隆帝跟前也要求皇祖爺賜他比射乾隆帝看了十分歡喜便吩咐諸皇孫和旻寧年紀相同的也在校場比射同時比箭的有八個孩子都沒有氣力射箭獨有這旻寧拿著小弓小箭連發三箭有兩箭中了紅心乾隆帝看了呵呵大笑把這位皇孫喚上殿來伸手摸著他的頭頂説道孫兒本領不小俺如今要賞你你願意得什麼旻寧碰著頭説道孫兒願祖父賞穿黃馬褂乾隆帝便依他傳旨快拿黃馬褂來一時卻沒有小馬褂左右侍衛拿一件大人穿的黃馬褂來給旻寧披在身上由太監抱著下去從此宮中人人都喚他小將軍旻寧也日日跟著師傅操練他又愛打鳥所以一支鳥槍他打來卻是百發百中的如今在宮中解了大內的圍那班教徒看看養心門有人把守便趕向東華門去和別股會合這時東華門的教徒已打進宮門正要搶進呵期哈門去忽見一個大漢上身赤著膊渾身皮膚黑得和漆一般手中拿一支粗重扁擔大喝一聲道你們反麼掄著扁擔橫掃過來那班教徒見他來勢凶惡便大家圍上去和他抵敵那大漢一條扁擔指東打西指南打北打得車輪似地轉被他打著的不是打得斷腰折臂便是打得頭破血流二三百人被他打死一半如今做書的趁這空兒把大漢的來歷略表一表原來這大漢並不是什麼宮中的侍衛原是東華門外一家煤鋪裏的挑夫他每天挑著煤擔送進東華門去給修書館裏用的他天天在煤堆裏鑽進鑽出那臉面手臂和肩膀胸背都染得漆黑的宮裏的太監們取他綽號叫他煤黑子那煤黑子生性憨直愛打抱不平他仗著自己氣力大見有不平事體便擎著鐵扁擔上去廝打他那條扁擔足有一百斤重打在人身上管叫你骨斷筋麻這一天他見許多人闖進東華門來知道他們造反便奮力和他們廝殺他一個人抵敵著二三百人打了一個時辰卻不曾放過一個人闖進呵期哈門去呵期哈門便是熙和門當他在門外喊殺的時候聲音直達到宮裏這時恰巧有一個大學士寶興在上書房教授諸王讀書從景運門出來望見門外有一個黑大漢在那裏抵敵一群匪徒急急回進門去召集許多太監來急把呵期哈門閉上一面調集實録館國史館功臣三館的吏役個個拿著棍子爬上牆頭把守一面四處調齊虎賁軍士從側門出去與教徒們廝殺這時另有一隊教徒從西華門繞過來幫著去打煤黑子那教徒愈來愈衆足有一千人任你如何大力也抵擋不住了那三館的吏役爬在牆頭眼看著煤黑子被許多匪徒一擁上前亂刀斬死那煤黑子臨死的時候一邊嘴裏罵著人一邊還拿拳頭打死幾個人才倒地死了那班教徒見打死了煤黑子便要搶上宮牆來這時後面的虎賁軍士也到了那班留守京中的諸王大臣也率領禁衛兵從神武門進來兩面軍隊圍住了一陳廝殺把那班教徒直殺出中正殿門外這時天色已傍晚那宮中的路教徒是不熟悉的看看逃到死路上去被官兵追殺一陳沿途被殺死的也不少教徒被他們逼到一個牆角一個個都拿繩子綁住送到九門提督衙門裏去審問他們還供出大頭目林清在黃村地方守候消息提督官派了一大隊兵士星夜到黃村去把林清捉住解進來
