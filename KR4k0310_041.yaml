body:
  text: 第四十二回東征西討福康安立功依翠偎紅皇太子偷香卻説乾隆皇帝見浙江撫台替他塑了一個金身在靈隱寺的羅漢堂裏心中十分得意笑説道朕從此也是龍華會上人了這時大學土梁詩正隨從左右這梁詩正是一代的詩人皇帝帶他在身旁隨時叫他捉刀乾隆帝見杭州山水明秀寺院崇宏便喚梁詩正做詩裏面有兩句有山有古寺無寺無名僧乾隆帝看了説道好一個無寺無名僧朕家自有佛法自有名僧今朕足迹所到便當布此真理管事太監聽了這個話又悄悄地告訴浙江巡撫那巡撫又偷偷地問太監道皇家有什麼佛法有什麼名僧那太監笑笑説道大人不聽得俺宮中有雍和宮喇嘛僧嗎那巡撫聽了恍然大悟知道皇帝也要在西湖上造一座雍和宮供養幾個喇嘛便暗地裏托人進京去探問知道皇上和國師無遮十分有交情便把無遮請來請他主持一切那無遮到了杭州先見過皇上説明要在靈隱寺左近建造喇嘛廟開一個無遮大會皇帝十分歡喜便吩咐內務府發銀十萬又示意浙江官紳捐銀共得到五十多萬兩銀子無遮便籌劃一切動工建造這時聖駕巡幸到海寧去了先由浙江文武官員陪奉巡視海寧石塘並看江湖看過了潮乾隆帝把一班文武官員都留在城外自己帶著幾個侍衛和太監進城到陳閣老家裏去了這陳閣老便是陳世倌他自從兒子被鈕鈷祿妃換去以後便告終養帶著家眷回海寧去後因雍正皇帝和他情分很厚再三下聖旨喚他進京去做官他實在推卻不過又怕推卻太過了要起皇帝的疑心便只得進京應召雍正皇帝十分敬重他他一家人陳説陳元龍父子叔侄都做了頭晶大官位極人臣陳世倌做到首相封文勤公直到乾隆年間告老還家皇帝賞銀五千兩在家食祿乾隆帝又制禦詩賜他詩裏面有兩句道老臣歸告能無惜皇祖朝臣有幾人到這時乾隆帝下江南陳世倌已死乾隆帝自從知道自己是陳閣老的兒子以後便格外優禮陳家凡是墳上有碑碣隧道命一律參用王禮陳家子孫怕觸犯忌諱求別的禦史一再奏請始許他墓道中用王禮外面碑碣仍用閣老常禮乾隆帝又吩咐查明陳氏後代子孫有若干人統統賞給大小官銜進京去供職這時乾隆帝禦駕忽然親監陳家陳家的子孫一個也不在家中一聲聽説天子駕到嚇得家中一班婦女孩童慌了手腳後來還是陳老太太有主意把族長去請了來那族長雖也做過幾任知縣但這接駕的事體他一生也沒有經歷過再加年紀已有八十歲了耳聾眼花嚇得他渾身索索地抖只怕有得罪的地方誰知乾隆帝見了那族長卻和顔悅色問他陳家有多少家産陳老太太還康健嗎那族長謹慎小心地回對了幾句乾隆帝便吩咐他領路到閣老墓前去那族長領著聖駕走到墓堂皇帝回過頭來一看見身後進有幾十個王公內監跟著看看走到碑亭前皇帝吩咐大家在亭中站著只帶著兩個太監直走到墳前先在墳圈前後視察一周忽然吩咐兩個太監把黃幕遮起來外面的王公太監們被黃幕遮住了看不見皇帝在裏面做什麼只有那兩個扶著黃幕的太監看得清清楚楚後來回京去內中有一個太監露出口風來説皇上在黃幕裏面實在是對陳閣老的墳幕在那裏行跪拜禮聽的人十分詫異知道這件事關係重大便從此不敢告訴第三個人知道皇帝行過禮出來立刻下一道上諭頒發庫銀二十萬兩給陳老太太為養贍之費又添買祭田十頃添種墳樹四百株在墓道前蓋造禦碑亭三座亭上蓋著黃琉璃瓦亭外面有皇帝親手種的皮松兩株古柏兩株吩咐地方官員立專祠兼管著陳墓春秋兩季祭掃的事體諸事停當以後皇帝還在陳墓前後徘徊不忍去後來經王公大臣們一再催請才退出來走過中門回過頭來吩咐陳家族長把這中門封閉了以後非有天子監幸此門不得再開那族長喏喏連聲皇帝回到行宮只見案上擱著京中兵部的奏報打開來看那奏報上説閩浙總督報稱臺灣逆賊林爽文舉兵反叛圍嘉義除派兵兜剿外盼望京中救兵甚急乾隆帝見了這奏章便立刻下旨回京到了京中自有許多官員接駕第一個蒙召見的便是福康安這時福康安已賞嘉勇巴圖魯賜禦用鞍轡又畫像在紫光閣上十分榮耀第二日聖旨下來授福康安為鎮遠將軍會同京中各武將帶領勇健軍奔赴臺灣剿滅賊寇這個聖旨一下那班武將都要討福康安的好人人奮勇個個爭先一陳斬殺殺得那林爽文大敗奔逃逃到台東深山中終被福康安手下的牙將活捉過來獻上大營福康安凱旋到北京把林爽文獻上朝廷乾隆帝心中格外歡喜聖旨下來封一等嘉義公賜寶石頂四團龍服金黃帶紫韁金黃辮珊瑚朝珠命於臺灣郡城及嘉義縣各建嘉義公生祠再畫像在紫光閣皇帝親制像贊在這個時候福康安忽然死了夫人京中文武官員都去吊孝福康安夫妻恩情很厚那夫人又長得十分美貌如今斷了弦叫他如何不悲傷乾隆帝也特意下詔勸慰他又賞治喪費三萬兩特派大臣禦祭這種恩典沒有第二個人比得上了但是福康安心中總是念念不忘他夫人恰巧乾隆帝的六公主已到了下嫁的年紀便有大學士阿文成出來做媒替福康安求婚一面又由乾隆帝的嶽母進宮去求富察後不料乾隆帝一口回絶不準那富察後也對他母親笑笑説道這件事體是萬萬使不得的福康安的母親董額氏也不願他的兒子去做駙馬這時福康安兩個哥哥做駙馬的乾隆帝卻不十分寵愛他們如今這福康安是乾隆帝極寵愛的卻不肯招他做駙馬這裏面的深意卻只有皇帝皇后和董額氏三個知道後來那傅恆的母親實在求得厲害皇后便答應把六公主下嫁給福康安的兄弟卻把和碩親王的格格指婚給福康安這時福康安年紀只有二十六歲當時奉旨完婚以後接著又有廓爾喀賊匪侵犯後藏聖旨下來仍叫福康安親統六路兵馬會同大學士阿文成前去征剿説也奇怪那賊匪一聽得嘉義公的名氣便嚇得他魂膽飄搖連打敗仗不到一個月便平服下來接著又是甲爾古拉集寨酋長反叛皇上便命福康安統領得勝兵馬轉戰前去那酋長聽説福康安人馬趕到便嚇得跪在帳前求降得勝文書送到京中聖旨下來許他班師福康安官升大學士加封忠鋭嘉勇公兵馬走在路上乾隆帝又賞他禦制志喜詩親筆寫在扇子上又賞禦用佩囊六枚又加賞一等輕車都尉照王公親軍校例賞他僕從六品藍翎頂戴皇帝這樣看重福康安那沿路的地方官誰不趨奉他兩湖總督濮六年為了討福康安的好便和他幕友商量沿長江一帶都扎著燈彩吹打迎送湖南巡撫又到杭州去借得水戲台來跟著福康安的坐船日夜演戲那福康安在船中吃酒看戲十分快樂船到洞庭湖中那湖裏原有一種洞庭艇子四面湘簾明窗收拾得十分清潔艇子頭尾上挂著五色琉璃燈兩邊遮著繡帷船梢頭都用船娘搖櫓打扮得十分妖豔一共有百十隻艇子那船娘齊聲唱著皇上的志喜詩歌聲十分嬌脆福康安座船在中央那許多洞庭艇子都圍繞著大船慢慢地蕩著槳緩緩地唱著歌福康安看了讚歎道他們真好似洛水神仙便吩咐艇子靠近大船福康安跳過艇子去見裏面明窗淨几便吩咐設席請過幾個幕友來陪他吃酒席散以後福康安偶然踱到後艙來間望只見船尾一個女孩兒赤著一雙白足身上披一件腥紅斗篷豐容盛鬋桃腮櫻唇十分俊俏手中搖著櫓那一搦柳腰臨風擺動真是小巧輕盈把個福康安看怔了忽聽得那女孩兒輕展珠喉唱起曲子來嫋嫋動人微風起處掀開了斗篷的下幅露出紅裳緑襖來那女孩兒回過頭來見了福康安不禁眼波一溜嫣然一笑露出十分蕩意福康安不禁心旌搖蕩拍著手説道江南地方有這樣的妙人俺在京中如何見得過忙回進艙來吩咐侍從把那船梢上的女孩兒喚來那侍從去喚時這女孩兒説道青天白日羞答答的叫人怎生見去福康安聽了笑了一笑説道吩咐他晚上來見俺罷到了昏夜只見那女孩兒打份得異樣風流走進艙來笑吟吟拜下地去福康安在燈下看時見他容光煥發和日間又是不同忙把他扶起來拉在懷裏問他名字那女孩兒説名喚寶珍福康安從此寵愛寶珍一路南下俱是寶珍伺候看看到了揚州地方福康安替寶珍買一座別墅給他住下所有沿路官員的供獻和皇帝的賞賜約有五六十萬銀錢福康安統統交給寶珍自己帶兵凱旋進京去乾隆帝見了他自然有一番獎勵稱讚傳旨下去賞戴三眼花翎晉封貝子銜仍帶四字佳號照宗室貝子例給護衛這一天福康安進宮去謝恩由內監領他直走進古董房只見皇上身旁有一個年輕大員手中拿著一個古瓶和皇帝説笑著那舉動十分輕佻皇帝非但不生氣反拉著他的手笑嘻嘻地説道你歡喜這瓶嗎便賞給你拿回家去罷那大員謝也不謝便拿著瓶去了福康安在一旁看了心中十分狐疑問又不好問得退出宮來悄悄地去問劉統勳劉統勳説道這便是皇上新近識拔的總管儀仗大臣和珅便是福康安在京外時也聽説皇上十分寵信和珅但他也不曾見過和珅是怎麼樣的人如今見他舉動輕佻心中便厭惡他暗暗地叮囑劉相國須要好好地防著他列位你知道和珅是什麼人何以乾隆帝忽然寵信他到這地步説起來這裏面也有一段豔史原來當初乾隆做太子的時候只因雍正皇帝和鈕鈷祿後十分寵愛常常把他留在宮裏乾隆皇帝這時候還是寶親王到底少年心性見宮中十分好玩便東溜西逛什麼把戲都玩出來雍正皇帝有十六個妃嬪內中最得寵的有四人一是舒穆祿氏一是伊爾根覺羅氏一是馬佳氏一是陳佳氏那馬佳氏和陳佳氏原是漢女冒充旗人入宮的雍正皇帝因他兩人長得比別人格外白淨細膩便格外寵愛太子這時年紀已有十七歲男女之愛正濃厚的時候便終日和那班妃嬪宮女調笑無忌那妃嬪也因他是皇帝和皇后寵愛的太子誰敢不依順他再則因那太子也長得英俊風流那班宮女也愛和他逗笑內中只有一個馬佳氏他自己仗著美貌脾氣也冷僻不肯和太子胡纏這太子偏看中了他時時覷他不防備的時候便闖進宮去摟著馬佳氏或是要吃他嘴上的胭脂弄得那馬佳氏惱了他才放手這種事體也不只一次了這一天合該有事馬佳氏在宮中間著無事見自己的雲髻有些鬆散下來便喚宮女替他重理梳妝青絲委地正在梳理的時候這寶親王忽然悄悄地走進屋子來宮女見了正要聲張那寶親王站在馬佳氏身後忙搖著手叫不要聲張一定要躡手躡腳地走上去從馬佳氏身後伸過手去俺住馬佳氏的兩眼那馬佳氏猛不防有人來調戲他顫著聲兒問是誰寶親王忍著笑不做聲那宮女也掩著嘴暗笑馬佳氏認做是歹人他這時手中正握著一柄牙梳猛力向身後打去只聽得哎唷一聲不偏不倚地打在寶親王的眉心裏那血便直淌出來寶親王忙放了手捧著臉轉身逃出宮去這裏馬佳氏知道是打壞了太子心中又害怕又羞憤暗地裏哭了一場誰知大禍來了因為恰巧第二天是初一日宮中規矩皇子皇女都要進宮去朝拜父皇母后寶親王眉心裏受了傷給鈕鑽祿後看了十分心痛便把寶親王拉近身來細細地一看知是被人打破的便十分詫異連連追問和誰打過架來那寶親王見問又是心慌又是羞愧便期期艾艾地説不出話來鈕鈷祿後看了越發起了疑心便大聲喝問寶親王被母后逼問不過一時也無可推託便説曾和馬佳妃玩兒妃子失手打傷的這馬佳氏性情冷僻又因皇帝寵愛他鈕鈷祿後也因此厭惡他如今聽了這個話便十分動怒一口咬定説馬佳妃調戲他兒子立刻傳命把馬佳妃喚來一頓棍子亂打喝著太監拉出月華門去勒死寶親王見母后生了氣又不敢勸又不敢走站在一旁眼看著太監把馬佳妃橫拖豎拽地拉出宮去他心中好似刺著十八把鋼刀一般地痛好不容易伺候母后進去了他一轉身急急趕到月華門去看時那妃子粉頸上被繩子勒住只剩得一絲氣息寶親王哭著我害了你也忙把自己指頭咬破滴一點血在妃子頸上説道今生我無法救你了但願和你來生有緣認取頸子上的紅痣我便拿我的性命報答你也是願意的這一句話説完妃子挂下兩點眼淚來死了寶親王又花了一千塊錢買通了宮女把馬佳氏的襯衣脫下來拿去天天伴著他睡直到寶親王登了皇位才把這件事體漸漸地忘記了後來乾隆皇帝在大廟中拈香回宮那班禦前侍衛和鑾儀人員都散去了忽然宮裏太監傳話出來皇上又要出宮去探望協辦大學士陳大受的病慌得那班鑾儀衛的人員七手八腳地把禦用儀仗拿來伺候不知怎麼一時裏把那頂黃蓋不知丟到什麼地方去了那皇上卻已踱出宮來升了鑾輿那儀仗人員越發心慌了東奔西跑地找那頂黃蓋兀是找它不到乾隆帝坐在鑾輿中十分惱怒頓著腳説道這是什麼人做的事體如此荒唐這時有一個擡龍輿的官學生聽了忙跪下來回奏道這事典守者不得辭其責乾隆帝看他年紀很輕命他擡起頭來一看不覺把個皇帝看怔了只聽得乾隆帝嘴裏只説得一個咦字要知後事如何且聽下回分解
