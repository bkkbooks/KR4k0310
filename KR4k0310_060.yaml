body:
  text: 第六十回創異教洪氏起義知死期穆相辭行卻説鴉片戰爭使中國吃了英國的大虧以後全國上下越發把這穆相國恨入切骨説他姦臣誤國又説他仗著自己是滿人欺侮漢人把漢人的疆土亂送給外人因此觸惱了廣西花縣地方一位村學究他姓洪名秀全他見天下紛紛人心思亂便造出一個上帝教來這上帝教的名目原是學著西洋來的耶穌教所以他也説教主是天父名耶和華生下四個兒子一個女兒都落在人世救人救難長子便是耶穌因救人被釘死在十字架上第二個兒子便是他自己一個女兒便是他的妹妹洪宣嬌如今他兄妹兩人知道天下將要大亂特立這上帝教度人苦厄洪秀全自稱天弟洪宣嬌自稱天妹他兄妹兩人到處勸人入教入教的人每年納銀五兩便可免一生災難當時百姓被那些貪官強盜鬧得寢不安枕終日擔驚受怕啼飢號寒天天祈福消災如今聽洪秀全説可以保他一生平安便紛紛去入上帝教不多幾天便有教徒幾萬洪秀全打聽得金田村有個楊秀清是個足智多謀的人在地方上有點名氣他便假説秀清是天父第三個兒子特意跑去拜訪他那兩人見了面談了一夜十分投機便約了他朋友馮雲山朱九濤在各村傳授説人欲升天須迎天弟那時信教的人越來越多楊秀清是有口才的他便假辦團練為名邀集了各村的紳董演説一番投入他教裏的居然有六十二村他們便在金田村立一個總部大做起來秀清有兩個朋友也是十分有才幹的一個是桂平的韋昌輝一個是貴縣的石達開楊秀清也去説他倆入了夥勢力越發強大起來洪秀全看時機已到便想就此起事他有一個同學名王綸幹的善於蔔卦他便悄悄地去請他蔔一卦那卦上有定有九王之尊六個字洪秀全不覺大喜綸幹又自己蔔了一卦有定我為君師五個字兩人相對大笑從此洪秀全便聘請綸幹充當軍師那綸幹扮了一個算命先生到四處去遊説勸人歸順洪秀全那邊洪秀全和楊秀清已在金田起事沿著西江打下去得了貴縣又得潯州聲勢一天盛似一天洪秀全在大黃江自號太平王分兵去占住紫荊山一帶又攻得永安州建立了太平天國洪秀全加封天王封楊秀清為東王蕭朝貴為西王馮雲山為南王韋昌輝為北王石達開為翼王洪大全為天德王此外封了秦日綱羅亞旺范連德胡以晃等四十八個夥伴的各種官職有做丞相的有做軍師的有做參謀的又把有功的大小將官八百人都加封了官職便發出上諭去説道天王詔令凡軍中大小將兵各宜認真奉行大道吾等宜知你父上主皇上帝乃是真神真神以外皆非神天父上主皇上帝無所不知無所不能無所不在又無一人非其所生所養故天父上主皇上帝以外皆不得僭稱上僭稱帝自今衆兵將可呼朕為主不可稱上以冒天父天父稱天聖父天兄稱救世聖主天父天兄得稱聖自今衆兵將呼朕為主不可稱聖以冒天父天兄天父神爺也又魂爺也從前左輔右弼前導後護之軍師朕命為王爺此乃姑從不正之例若據真道論之有冒犯之嫌今特封左輔正軍師為東王管治東方各國封右弼又右正軍師為西王管治西方各國封前導副軍師為南王管治南方各國封後護又副軍師為北王管治北方各國又封石達開為翼王使羽翼天朝以上所封各王俱受東王節制別詔稱後宮為娘娘貴妃為王娘欽此天王發下上諭以後便把各王爺邀集在宮中開了一個大宴會吃酒中間天王敘述了歷史如何得到神靈的啓示和幫助以資證明他不是凡人如今俺們能夠旗開得勝馬到成功都是朕依著天父天兄的教訓俺們大家都該感激這兩位救世聖主説著便吩咐天妹宣嬌畫一幅老人的像供在當殿大家學著老人的樣子一齊把頭髮留起來當時有人背地裏都喚他長毛國外有英國的侵略國內有廣大農民跟著洪秀全造反皇宮外面已經造得一塌糊塗了裏面穆相國還瞞著消息道光帝這時常常害病精神也不濟事這時知道自己不久于人世了便立刻宣召宗人府字令載銓禦前大臣載垣端華僧格林沁軍機大臣穆彰阿賽尚阿等一班親信官員進宮來囑託了一番後事這時奕詝奕欣奕誴奕譞一班皇子都站在禦榻兩旁聽父皇的話一齊掉下眼淚來道光帝把後事吩咐過了便令穆彰阿和文慶兩人到正大光明殿去把金盒拿下來當著衆大臣宣讀詔書把皇位傳給四皇子奕譞這奕詝奉了詔書身父皇謝過了恩道光帝便在這時候兩眼一翻長辭人世了衆大臣一面把奕譞擁上太和殿去鳴鍾擊鼓受了百官朝賀做了咸豐皇帝一面由內務府行文各省為道光帝發喪這咸豐帝一登上皇帝寶座便放出手段來整理朝綱他第一道諭旨便把軍機大臣穆彰阿革了職把兩廣總督耆英降做五品員外郎候補這穆彰阿原是三朝元老威權煊赫一時但到這時年紀也老了家財也富足了見皇上格外開恩不抄他的家他樂得做個乖人兒趁此收場回家享福去了他在家裏十分信奉喇嘛教他自己説修行的工夫已到了可以成佛成仙的地步他又愛喝酒常常請了許多客人在家裏大開筵席有許多禦史官見他是革職人員還不知罪一味行樂氣他不過又上了一本參折請皇上從嚴查辦穆彰阿的一個親戚得了信便悄悄地去報信那穆彰阿聽了大笑説道我明天便要回去了還怕他怎樣他説俺不該行樂俺明天還要大開筵宴呢到了第二天穆彰阿真的備下盛筵到各處親戚朋友門生故吏家裏去下帖子帖子上寫明某日某時辭世望屈駕一別那班人看了這帖子十分詫異到了時候便一齊趕到穆彰阿家裏去那穆彰阿見了客人照樣的迎接談笑也一點看不出死樣兒這一天客人來得很多在大廳上擺下四十桌酒擠滿了一屋子穆彰阿一一和他們把盞吃到一半他看了日影説道是時候了請諸位稍待説著便進去淋浴更衣穿上朝衣蟒袍先到內院和妻妾兒女話別又走出外院來向衆人一拱手説了一句少陪少陪便盤腿兒坐在炕上閉上眼睛一會兒便斷氣死了穆彰阿死了以後接著便有禦史參奏戶部尚書覺麟偷盜庫銀一案朝旨下來把覺麟革職發往新疆效力講到偷盜庫銀這件事體是歷任官員所不能免的只因覺麟是穆彰阿的親戚他偷銀子竟偷到二十萬兩也太多了那時戶部銀庫郎中原是一個美缺補這個缺大都是滿族三年一任任滿以後貪心的可以得到二十多萬兩銀子的好處不貪心的也可以得到十多萬兩銀子不説別的只説那庫兵每一位也可賺到幾萬兩銀子庫兵也是三年一任都是滿人充當漢人必須冒滿人名字才能進去庫兵出衙門去必須有鏢師保護京城裏有許多無賴常常邀集黨羽到戶部衙門外去候著見要有庫兵出來便綁去做肉票鎖禁在祕密屋子裏一面打發人到庫兵家裏去報信勒令他拿一二千兩銀子出來贖回倘不去贖回他便把庫兵關過卯期才放出來那庫兵誤了卯期衙門裏便除去名字另行點派那庫兵非但誤了他三年發財的機會且又白丟了這六七千兩孝敬銀子因此那庫兵家裏總願拿出銀子贖回的庫兵每三年點派一次每次點庫兵四十名每月開庫堂期九次又有加班開庫堂期五六次開庫的時候有把銀子搬出來的也有搬進去的庫兵便是專為搬銀子用的勞力每搬一次進出總在一千萬以上每一庫兵不能每期都輪到大約每月輪四五期每期進出庫門多則七八次少也三四次每一次夾偷的銀子最少五十兩銀庫為了防止庫兵偷銀所以每逢開庫不論冬夏庫兵卻脫得赤條條的由堂官一一點名在公案前過去走進庫房再穿上官制衣褲庫房裏沒有桌椅倘到乏力的時候便可以出來息力但依舊脫得精赤走到公案前擺開腿兒向地下一蹲兩條臂兒向上一擡張著嘴喊一聲才許出去但庫兵偷銀每次便在這出來的時候那銀子是塞在肛門裏的每一次那有本領的便能塞十隻江西圓錠每一隻圓錠便是十兩銀子離庫門一箭之地有小屋一間門戶緊閉窗外圍著木柵便是庫兵脫衣禦贓的地方北京地方遍地灰沙每逢開庫的時候便有清道夫挑著木桶到庫裏來灑水庫兵便和清道夫打通一氣那水桶都有底的庫兵悄悄地把銀子藏在水桶夾底裏候銀子搬完庫門封鎖堂官散去以後才慢慢地把水桶挑出去後來有一位祁世長做戶部尚書的時候他是一位清官有一次開庫他親自去督看著見一個清道夫挑著水桶走過他跟前那桶底忽然脫落滾出許多銀錠來祁世長大怒立命把清道夫拿下打算第二天提奏查辦後來他有一個貼心的師爺勸他把清道夫釋放把這事隱瞞下來莫興大獄倘然皇上知道了徹底查辦起來那歷來的滿尚書都該砍腦袋大人的腦袋怕也要被仇家割去了祁世長聽了害怕便也把這樁大案隱去不提了如今再説那班做庫兵的都是世代傳下來的專門職業他們在年輕的時候便要找尋那有大雞巴的人常常雞姦再用雞蛋塗著油麻塞進肛門去打練再慢慢換用鴨蛋鵝蛋又換用鐵彈練到肛門中能塞十兩重的鐵彈十顆便算成功了那平常庫兵的本領只能塞到六七粒因此那班庫兵到年老時候都害脫肛痔漏等病的他們辛辛苦苦做著這偷盜的事體那做戶部尚書的卻安享著他們的孝敬那時他們參去了一個覺麟接著又參去一個滿人大學士譽德因他是穆彰阿的親家這時牆倒衆人推凡是穆彰阿的親戚故舊便是沒罪的也是有罪何況那譽德原是個貪官禦史便參他某年盤查六庫的時候犯了偷盜庫寶的罪什麼叫六庫那六庫便在大和門的左面原是明朝遺留下來的有金庫銀庫古玩庫皮張庫衣服庫藥庫裏面藏的也有十分珍貴的東西不説別樣單説衣服庫裏有一頂明朝皇后用的珍珠帳寬長有八尺全是用珍珠穿成的四圍用紅緑寶石鑲邊那珍珠小的和緑豆一般大的竟和桂圓一般只因年月太久了那線索都枯斷了每一次盤查便有許多珍珠落下來那班司員假裝做拾起來用紙裹著封著加上印貼著簽條實在那紙裹裏面都換成假的了那真的早落入司員們的腰包了裏面還有明朝妃嬪穿的繡鞋十多箱弓鞋瘦小鞋尖兒上嵌著明珠那珠子都是十分名貴的早已換上假的了還有皮張庫都換上沒有毛的皮板好的皮毛也早被司員們偷去這都是歷來盤查大臣和司員們作弊的結果如今便統統把罪名推在譽德一人身上鬧得譽德因此丟了官抄了家還充軍到黑龍江去那時凡是穆彰阿的同黨都被參的參革的革趕得乾乾淨淨咸豐帝初登大寶十分注意整頓朝綱宮裏一位孝貞皇后也十分勤儉端正管教著許多妃嬪咸豐帝的皇后原是穆彰阿的女兒在正宮不多幾年便死了孝貞後姓鈕鈷祿原是貴妃因他容貌美麗舉動端莊咸豐帝十分寵愛那穆後死了以後便把鈕鈷祿妃升做皇后宮中都稱他東後這位東後十分儉朴平日在宮裏總穿布衣那簾幕幃帳都不繡花的他生平最恨用洋貨説它好看不中用自己穿的繡鞋和妃嬪穿的都督率著宮女們做自己每年必親自做一雙皇帝的鞋子外面有進貢來的衣服首飾他都叫宮女拿出去退還常對一班妃嬪説道臣子多一分貢獻便是百姓多費一分錢財倘然收了他們的貢獻便是暗暗地教他們做貪官去因此萬萬收不得孝貞後一舉一動都識禮節他在大熱天氣從不肯赤身露體便是洗澡也不要人伺候他每一次見皇上總是穿著禮服他最恨的是輕狂的樣兒有一個榮妃身材嬌小十分俊俏他穿著空心靴底刻著梅花瓣兒裏面裝著香粉走一步那梅花粉印兒便印在地上孝貞後見了大怒説他有意勾引皇帝立刻把榮妃傳來打了一頓去關在冷宮裏咸豐帝原也是愛風流的見這皇后如此嚴正卻也十分敬重便取他一個綽號喚他女聖人要知後事如何且聽下回分解
