body:
  text: 第四十七回鶯啼燕唱江南去匣劍帷燈刺客來卻説賽昭君和秋官母女兩人終年在京城遊玩也玩厭了忽然異想天開打聽得那圓明園每年開同樂園一次準官民婦女進去遊玩他母女兩人打扮得萬分妖嬈到燈節時候也進園去遊玩每日在街上招搖過市太監們打聽得他母女兩人的來曆便也大著膽和賽昭君兜搭去後來那班侍衛和店家夥計都來和他戲嬲他母女兩人不但不惱反以為得意賽昭君最愛打聽宮中的事體那太監侍衛們都趕著告訴他説皇上如何風流妃嬪如何美貌説到動神的地方大家捉搦玩弄一陳那秋官嬌憨跳擲最是有趣大家和他調笑他從沒有惱恨的大家背後取他綽號稱他小玩意兒有一天賽昭君和太監們在酒樓中間談説道皇上的面俺雖見過幾次但總在街心裏不曾看得親切且不能和皇上對面講話兒倘得和皇上對面講一句話兒或是同坐著吃一杯酒兒便是一生榮幸的事體了那秋官也接著説道皇上長得好一部三綹鬍子俺倘能摸一摸也是十分榮耀的了那太監們聽了説道這也不難待皇上來時我們替你報告上去奏明你母女二人如何美貌皇上必當召見內中又有一個太監説道説雖如此那皇上到園中來是沒有一定的時候也許一日來過幾次也許三五天來一次你母女既要見皇上須住在園中候駕但是園中每天房飯吃用很要費錢的如何是好那賽昭君又有一種脾氣他仗著丈夫有錢有誰説他拿不出錢他便生氣如今聽太監説了這句話他便不生氣了立刻從懷裏掏出一扣錢莊摺子來向桌子上一擲説道花幾個錢算得什麼這扣摺子你們拿著俺兩人在園中住上十天怎麼樣太監見了錢折早眉花眼笑忙收拾錦繡的床鋪精美的食物供養他母女兩人賽昭君住在園子裏和那班侍衛謔浪戲嬲什麼醜樣兒都做出來那秋官到底是女孩兒還不敢怎樣放蕩賽昭君住在園裏一天又一天不覺得到了第五天上這時早已是上燈時候忽然那班太監慌慌張張地進來説道萬歲爺來了快接駕去賽昭君忙拉著秋官出去只見一個高大男子臉上長著三溜鬍子大模大樣地走進屋子來後面跟著許多侍衛們那男子坐下一回頭叫大家出去侍衛們一齊退出去了店小二送上酒菜來那男子吃了幾杯酒才向那母女兩人招手兒賽昭君和秋官走近身去坐下男子問你倆是什麼人賽昭君回説是姊妹兩人為姦人所賣誤落窯子裏這幾句話是太監教導他的那男人慢慢地酒醉了便拉著他母女兩人百般猥弄秋官被這男人破了身賽昭君認做他是皇上便放出迷人的本領來出奇地媚惑他直到深夜才去這樣接連三夜到第四夜賞出許多大內的珍寶玩器來那男子也就不來了母女二人正打算回家去了看了那錢折上已支去了八萬多兩銀子不覺嚇了一大跳急問時太監説這裏面的食物住宿原是很貴的他也無可奈何滿想把皇帝賞他的珍寶拿出去賣錢補滿摺子上的虧空誰知把那珠寶拿出去一估價原來都是假的後來那侍郎發覺了這筆錢查問時賽昭君推説是替老爺謀缺分花去的曾去求了某福晉去轉求某王爺在王爺家親自見到萬歲爺萬歲爺又如何親口答應他給老爺好缺分叫老爺耐心守著一派花言巧語説得個侍郎無可奈何從此這莊侍郎常露出窮相來侍郎有一個兄弟家中人稱他四爺見哥哥娶了一個窯姐兒在家裏心裏已經不舒服了後來不知怎麼他嫂子和侄女兒在同樂園裏的事體被他們打聽出來了便寫了狀紙告到京兆尹衙門裏那京兆尹見告的是皇帝嚇得他不敢受理這事件卻傳到都老爺的耳朵裏有一個姓江的禦史聽得了也不問他三七二十一拉起來就是一本奏明皇上説太監不該炫色攫金罪在不赦皇帝看了這奏本十分詫異便悄悄把和珅傳進宮來著他承審這樁案件和珅領了旨意立時把那謊騙的太監捉來一面又所賽昭君母女兩人傳到案下邀集滿漢軍機大臣和京兆尹當堂會審那賽昭君一一招認出來説皇上如何姦污他如何把假珠寶哄騙他那聽審的大臣聽他供出皇上來嚇得他們臉上一齊變了顔色和珅急忙把賽昭君拉下堂去那賽昭軍還是滿嘴的嚷著皇上姦淫命婦那秋官卻也哭得和淚人兒一般和珅和衆大臣商量要定賽昭君一個反坐的罪一面卻把那太監殺了滅口又定那莊侍郎一個教唆的罪獨有劉統勳説這事不可孟浪俺們先入奏去看皇上神色如何倘這案件是真的便當償還這侍郎的銀兩定太監一個充軍的罪倘這案件沒有皇上的事便該拿太監正法把太監的家産抵給侍郎另由禦史彈劾這侍郎治家不嚴的罪和珅一時打不定主意劉統勳便獨自進宮去奏聞皇上聽説有人告他姦淫命婦便傳諭説朕之不德十數年來固多物議但亦未敢為傷風敗俗之行今莊氏母女一案著滿漢軍機秉公審理務期水落石出切勿有所顧忌劉統勳得了這個聖旨便把那太監用刑審問這太監熬刑不過便招認説只因貪圖他母女多財便拿一個假皇帝去哄他又問假皇帝是什麼人供説是外城西大街驢馬坊的掌匱當堂出簽把那掌匱提來一審便服劉統勳判定那太監和掌匱一併正法把他兩人的家産判償莊侍郎又把賽昭君母女兩人發配功臣為奴這案件出了以後從此同樂園中便不許民間婦女出入一過正月皇帝又間著無事可做每天和春阿妃郭佳氏蔣氏三人在宮裏調笑無間後來郭佳氏奏説陛下從江南回來原搜羅了許多珍寶又陛下常常記念江南的風景何不在這圓明園中照江南名勝的模樣蓋造起來把那些珍寶都陳列在園中賤妄們終日得陪奉陛下在裏面遊玩著一來也免得陛下牽挂江南二來賤妄們在裏面遊著也好似回到江南一般皇帝聽了也便高興起來會傳諭內務府和西清館中的供奉人員把江南各處名勝地方的風景細細地畫在紙上進呈禦覽這個聖旨一下那班供事人員天天一幅一幅地畫著什麼西湖風景金山風景揚州風景大明湖風景蘇州風景一處一處地細細畫成圖樣共有三百六十幅皇帝和三位妃子挑選了四十個景子發交和珅叫他監督工程從速建造那和珅得了這個聖旨便打發許多人員到山陝江南一帶去採辦木料在山東河南山西幾省地方捉拿人伕又假説是皇上的旨意著各省地方官紳捐助銀錢打聽得有錢人家便派人去勒索稍不如意便説他違背聖旨辦他的罪因此和珅又得了許多錢財弄得地方怨聲載道內中有一個湖北太守名亢雨蒼的死得最苦那亢雨蒼家裏原是有錢的只因他沒有官做常常受官府的敲詐他便發狠獨立捐助海塘工程洋三萬元山東巡府替他奏明皇上聖旨下來賞他四品頂戴分發在湖北做武昌知府那家財越發富厚在揚州一帶置了許多鹽田和那鹽商汪如龍又十分要好誰知他有錢的名氣一天大似一天居然傳到和珅耳朵裏這和珅正當著監造圓明園四十景的差使四處搜刮銀錢便派一個人到湖北去向亢知府要錢一開口便是一百萬那亢雨蒼原是個守財奴聽了這樣大的數目豈不要把嚇倒況且他實在也拿不出這許多錢勉強報效送了三萬兩銀子去和珅見他不肯出力報效便心生一計這時山東正捉住一大群海盜和珅便叫人暗暗買通那些強盜頭目教他誣供説亢雨蒼是他們的窩家這個口供一報上去皇上十分震怒立刻下諭把亢雨蒼革職滿門抄斬亢雨蒼家裏有一個五個月的小孩兒也不免一刀之罪這樁案件和珅辦得痛快那亢雨蒼的家産老實不客氣被和珅一人獨吞了誰知亢雨蒼家裏還留下一個禍種這人姓余名大海原是亢雨蒼朋友的兒子那朋友和亢雨蒼有八拜之交朋友臨死的時候把他兒子托給亢雨蒼的亢雨蒼把大海留在家裏教讀成人替他娶了媳婦這余大海又生成一幅神力任你一千斤的鐵石他都一手擎得起來後來亢家查抄了亢雨蒼卻給大海一萬塊錢悄悄地打發他走開這時大海新死了妻子只有一個女兒一時無可投奔便投在汪如龍家裏他得了亢雨蒼的好處卻時時不忘替亢家報仇汪如龍卻不知道他心中的事體見他氣力強大便請在家中做一個鏢師乾隆皇帝第三次下江南吃了總兵官的虧便暗地裏搜尋有氣力的人編一隊神機營保護聖駕汪如龍便把余大海保舉上去皇帝當面試過見余大海氣力過人便十分重用他待到兩宮回鑾大海也隨駕進京他臨走的時候把自己的一個女兒交托給汪如龍余大海的女兒名叫小梅長得姿色嬌豔風韻翩翩汪如龍原是個好色之徒早已看中了他待到大海進京汪如龍便仗著自己的勢力逼淫了小梅把他收做詩妄那梅念在父親面上便含垢忍辱地廝守著他父親余大海也因為要替亢雨蒼報仇在宮中竭力和和珅拉攏常常送他禮物又打聽得宮中機密的事體便悄悄地通報和珅和珅也在皇帝跟前常常贊著大海的好處皇帝聽了和珅的話把大海升做神機營長終日在宮中保駕大海初進京來原想刺死和珅替亢家報仇後來天天近著皇帝看看皇帝那種荒淫無道的樣子心想俺中國的百姓都吃著他一個人的苦俺不如連皇帝也殺了也替千千萬萬的百姓出這口氣他便想了一個一舉兩得的計策原來宮中規矩無論親信大臣王公貝勒進宮來都不許帶刀便是那神機營侍衛們也只許帶長刀不許帶短刀只怕臣下行刺長刀容易看見短刀不容易搜檢只有和珅皇上賞他一把金柄的短刀柄上刻著和坤的名字終日挂在身旁不知怎的這柄短刀忽然落在大海手裏有一天夜裏皇帝懷中擁著春阿妃朦朧欲睡忽然眼前一晃一個大漢跳進屋來皇帝眼快一聲喊那柄短刀已向皇帝臉上飛來虧得春阿妃子手快忙拿拂塵的柄打去那柄兒削斷短刀落在床上皇上拾起刀來看時見那金柄上端端正正地刻著和珅兩個字這時那刺客已去得無影無蹤那班侍聽得喊聲也都趕到屋子裏來皇帝因那凶器上有和珅的名字只怕和珅受人的指摘便把那短刀藏過了只説有一刺客闖進屋子來謀刺聯躬如今這刺客逃出院子去了那班侍聽了便搶出院子去四下裏搜尋直鬧到天明也不見那刺客的影子第二天一查點獨不見神機營長余大海立刻把內外城門關閉起來大索三日也杳無消息這時滿朝文武都齊集武英殿恭叩聖安衆官員齊奏説那余大海既是汪如龍推薦的便該星夜派人去把汪如龍提進京來嚴加審問一句話提醒了乾隆帝便立刻下諭給兩江總督著他把汪如龍拿解進京這汪如龍家裏有千萬家財平日常常把財物孝敬和珅的如今和珅見要拿解汪如龍他便一面把聖旨按住一面進宮去替他求情説陛下莫問暫把這案件交臣辦理臣總可以把餘大海這人著落在汪如龍身上叫他把余大海交出由臣審問那時臣的嫌疑也洗清了汪如龍的罪也沒有了皇帝聽了他的話把這大案交給和珅去辦和珅得了旨意暗地裏打發一個親信人員趕到揚州去會同揚州的鹽大使去見汪如龍這時余大海一擊不中便立刻逃出京城連夜到汪如龍家裏躲著余大海的意思雖不能刺死皇帝丟下那柄短刀刀柄上有和珅的名字那和珅的性命總也不保的了誰知那乾隆帝實在把個和珅寵得厲害不但不辦他的罪還要他來辦餘大海的罪余大海躲在汪如龍家裏風聲一天緊似一天他知道自己存身不住了便和汪如龍説要躲到別處去汪如龍這時已得到北京的消息如何肯放他脫身他原有一座別墅造在江心裏那地方是一個小洲四面都是江水汪如龍便把大海藏在別墅裏一面暗暗地告到官裏那揚州知府會同守備官帶了五百人馬悄悄地去把別墅圍住那大海好似甕中捉鱉手到擒來解到京城裏也不問口供立即綁出法場砍頭示衆大海的女兒小梅得了消息大哭一場埋怨汪如龍説他不該見死不救那汪如龍一派花言把自己的罪惡瞞過了誰知和珅殺了大海以後又在皇帝面前保舉汪如龍説他擒盜有功聖旨下來賞汪如龍雙眼孔雀翎以道員用汪如龍賣去了大海強占了小梅又得了功名他常常戴著欽賜的翎毛到親戚朋友家裏去吃酒誇説自己如何得和珅的重用又如何用計擒大海如何得皇上的恩典洋洋得意早有他手下的小廝悄悄地去對小梅説知小梅才明白汪如龍非但是姦污自己的仇人且是賣去父親性命的仇人他索性糟踏自己的身子結識那小廝從此以後汪如龍在外面的一言一動小梅統統知道這時乾隆帝因為要造圓明園的四十景又下旨南巡到江南去參觀風景那沿路的大臣自有一番忙碌在揚州接駕的依舊是那汪如龍江鶴亭那一班富紳那時聖上還未到揚州汪如龍預備接駕的事體日夜忙碌得連飯也沒有空兒因此不常小梅房中來小梅覷空便把那小廝喚進房去悄悄地和他商量大事這小廝原是汪如龍最親信的無論到什麼地方總把小廝帶在身旁這時汪如龍仍把個樗園收拾起來為皇上駐蹕之所園中頓時收拾得花枝招展燈彩輝煌不多幾天果然皇帝到了一走進園內便想起從前風流的事體便傳汪如龍進去問起從前的煙花女子如今可還在嗎汪如龍回奏説昔日美人今日已退歸房老不堪再侍奉聖上了臣如今有十二金叉獻與皇上皇帝聽了便十分歡喜忙喚他把十二金叉送上來汪如龍早已預備下來了出來把十二個揚州名妓打扮著獻上去這十二妓女裏面有兩個長著絶世容貌可稱得脂粉魁首一個名叫倩霞年紀十八歲一個名叫絳霞年紀十七歲原是一對姊妹花如今見了皇帝皇帝出奇地寵愛他們日間命十二叉輪流歌舞勸酒夜間卻只喚他姊妹兩人進去侍寢裏面皇帝飲酒調笑著外面汪如龍卻奔走照料十分辛苦第四天夜晚汪如龍在樗園裏照料正書記亂的時候忽然內急起來他便走到一個靜冷的牆角裏小解去正在這個當兒見他那小廝悄悄地從身後走來汪如龍見是親信便也不去防備他不料那小廝走到汪如龍身旁舉起尖刀向他主人頸上狠命地一刺只聽得阿喲一聲汪如龍倒在地上死了那小廝正要轉身逃時早巳驚動了園中一班侍衛四面趕來抓住這個凶手要知那小廝為什麼要刺死他的主人且聽下回分解
