body:
  text: 第六十六回捕影捉風深閨驚噩耗焚香對月弱質感沈屙劉縯聽説劉仲陳亡驀地狂叫一聲向後便倒慌得衆人忙走近來將他扶起但見他口流白沫人事不省劉文叔伯姬鄧辰俱是泣不成聲見劉縯這樣更加傷心衆人手忙腳亂一陳子只見劉縯半晌才蘇過一口氣來説道天喪我也説了一聲才放聲大哭衆人一齊勸解道將軍悲傷過度何人復仇目下且請保重要緊何況二將軍已經歸天豈能復生呢劉縯哭得死去活來半晌坐在地上歎道二弟我和你實指望同心協力共除莽逆恢復我家基業誰知大志未伸竟和你永訣了言罷淚落如雨鄧辰也在旁邊拭淚勸道縯兄現在仲弟已經棄世你徒悲何益為今之計火上眉梢的時候還不想指揮應付嗎劉縯含淚上馬便和衆人進城商量大事去了在下一支筆不能敘兩邊事到了這個時候只好將他們這裏高高擱起專説陰麗華的情形了我要是直接敘下去列位要説小子抄襲後漢了間話少説再表陰麗華和明兒下得樓來見過他的母親邢老安人因為前幾天感了一點風寒這兩天也就好了見麗華來定省自然是歡喜將他摟入懷裏笑道我的兒為娘病了幾天纍得你日夜不安我心中老大不忍明兒笑道太太你還不曉得呢小姐夜夜都要來伴你卻被我們勸住了因為你老人家面前一者用人本來不少一者大主人二主人俱在這裏什麼事還怕不周到嗎所以我們勸小姐不要煩神而且小姐的貴體又薄弱假若勞纍出什麼來豈不教你老人家加倍不安麼邢老安人笑道好孩子你的話極有見識果然一些兒也不錯但是你們小姐他這樣的孝心我可不是修得出來麼麗華在他母親的懷裏仰起粉臉笑道你老人家有了貴恙理應我們親自服侍才是個道理那些不曉得道理的丫頭他們偏要説起他們的歪理來兀自不肯放我前來服侍你老人家邢老安人忙道我兒明兒這話你倒不要看錯他實在合我的心理明兒笑道罷呀你老人家不要説罷我們為著不準他來不知道被他罵了多少不知禮的丫頭了邢老安人笑道明兒你這孩子深明大義我素昔最歡喜你的你可要原諒你們小姐的孝心才好明兒笑道我們是奴才小姐是主人小姐縱有千樁錯難道我們還敢去和小姐反駁麼休要説小姐是一片的孝心愈是我們留得不是論理我今天要請太太責罰我呢麗華笑著對邢老安人道你老人家聽見嗎這蹄子的嘴愈説愈刁刻得厲害了邢老安人笑道這個你倒不要怪他他原是一片好意不料你反來説他不知禮可不是白白的冤枉他了嗎麗華微笑點首道太太不要講這事原是錯我回樓去給這蹄子賠罪如何邢老安人笑道那倒不必你也不算錯明兒笑道太太還不曉得呢小姐賠罪不是嘴裏賠罪邢老安人插口笑道不是嘴裏賠罪是什麼賠罪呢明兒做起手勢向邢老安人笑道原來他用竹板子來賠罪阿邢老安人搖頭笑道明兒你不要亂説你們小姐他從來沒有過動手動腳的拿出做主子的派子來麗華笑道這蹄子越發來慪我了好好我今天就拿一回做主子的派頭出來給個厲害你嘗嘗明兒笑道我不怕有太太呢麗華笑對邢老安人道你老人家聽見嗎都是你老人家將這些蹄子庇護上頭了他剛剛説罷瞥見陰興神色倉皇地走進來對邢老安人説道不好了不好了邢老安人見他這樣嚇得一跳忙問道什麼事這樣大驚小怪的陰興説道你老人家還不知道嗎後面白水村劉家昆仲起兵復漢聯合宛城李軼李通教他們做內應不料事機不密李通李軼的全家四十餘口全被殺了只逃去他們弟兄兩個現在宛城王莽的賊兵正向白水村開進來剿滅劉氏兄弟我想滔天大禍就在眼前了他説到這裏麗華搶著問道你這話果真麼他急道這事非尋常可比難道還來騙你們不成他登時嚇得玉容失色星眼無光邢老安人也嚇得抖做一團口中説道劉家兄弟也太不自量力他們有多大本領就存這樣的妄想豈不是自己討死麼麗華道太太哪里話來莽賊暴虐萬民側目敢怒而不敢言劉氏昆仲乃漢家嫡派此番起義名正言順誰不附和呢説不定將來可成其大事的邢老安人道你這話原屬不錯但是他們這一來卻又不知殺了多少無辜的百姓呢陰識此時也走了進來但見他急急地説道兄弟賊兵馬上就要殺到眼前了要想法子來預備才好陰興道我們這裏又不去幫助誰料他們不會來的至多我們出去躲避躲避罷麗華道你這是什麼話呢賊兵如果到了白水村難保不來擾攪的還不是去預備的好好免得後悔莫及呀老邢老安人也插口説道兒呀你們千萬不可大意他們這班賊兵還講什麼道理呢管你幫助不幫助他們只曉得搶掠燒殺趕緊去預備才好呢陰識陰興兄弟兩個滿口答應道太太不須憂慮我們就去預備就是了他們就出了門點齊鄉勇將四周的吊橋撤了四處的屯口埋伏著強弓硬弩陰識帶了五百名鄉勇在東半邊巡閲陰興帶了五百名鄉勇在西半邊巡閲不到巳牌的時候就聽得北邊喊殺連天旌旗蔽野陰家兄弟加倍留神在四周的壕河邊像走馬燈一樣不住腳地團團巡閲此時只見一班逃難的百姓扶老攜幼哭聲震地十分淒慘白水村四周一帶的村落被那些賊兵搶劫一空放起火來登時紅光直沖霄漢隱隱地聽得兵器響聲叮噹不絶沒多時果然見了一隊賊兵向他們的壕邊蜂擁而來為首一個賊將手執方天戟躍馬到了壕邊用劍一指向陰興説道那個漢子快將吊橋放下讓我們進去搜查賊人陰興答道我們這裏沒有賊人請你們到別處去搜查罷那賊將剔起眼睛説道你是什麼話憑你説沒有難道就算了嗎我們奉了命令來的你越是這樣我們偏要查的識風頭快些將吊橋放下要惹得咱家動火沖進莊去殺你個玉石俱焚那時就悔之晚矣陰興正要答話只見陰識躍馬趕到問他究竟陰興便將以上的事告訴陰識陰識陡然心生一計對賊將説道你們不要在此亂動你們的主將是誰那個賊將喝道我們的主將難道你不曉得嗎你站穩了洗耳聽清乃甄阜梁邱賜兩個大將軍便是陰識聽了呵呵大笑道我道是誰原來是他們兩個他們現在哪里那個賊將説道他們帶著後隊兵還沒到呢陰識笑道既如此放下吊橋讓我們去會會他們多年不見的老朋友今朝恰巧碰著了大家也好敘敘他説罷便令鄉勇放下吊橋緩轡出來笑容可掬地對那賊將説道煩尊駕帶我一同去瞧瞧老朋友那個賊將聽他是甄阜梁邱賜的好朋友只嚇得張口結舌半晌才答道那那那倒不必他他他們還未到呢我我我去替你老人家轉達就是了他説著便領著士卒離開楊花塢臨走的時候還向陰識道歉一陳子陰識見自己的計策已奏效還不樂於敷衍嗎便放馬過了吊橋隨即令人撤起陰興笑道你這法子好倒好但是甄阜梁邱賜如果真個來那便怎樣應付呢陰識笑道兄弟你只知其一不知其二這班狗頭你估量他回去還敢和甄阜梁邱賜去提起這件事麼真個過慮了你細細地想想看難道甄阜梁邱賜不教他們打仗教他們出來掠劫燒殺無辜的百姓嗎恐怕沒有這種道理吧我雖然撒下這個彌天大謊料瞧他們一定不敢回去提起的陰興沈吟了片晌拍手笑道你這條計真是好極了馬上如果再有賊兵來滋擾簡直就用這話去對付他豈不大妙陰識搖手道動不得這條計萬不可再用適才那個賊將我見他呆頭呆腦的故想出這樣的計來去嚇騙他凡事須隨機應便才好要是一味地抱著死題做去豈不僨事麼話猶未了只見南面又是一隊賊兵沖到濠河邊為首一員賊將手執鷹嘴斧怪叫如雷連喊放下吊橋讓咱家進去搜查不止陰識陰興慌忙帶著鄉勇飛也似地趕過來説道我們這裏沒有敵人請向別處去搜查罷那個賊將大怒喊道好賊崽子膽敢抗拒王命手下人與我沖進去説時遲那時快一隊賊兵一齊發喊起來便要衝了過來陰識見了這種情形曉得這個賊將的來勢不講道理只得大聲説道好賊子誰教你們出來搜查的這分明是你們這班狗頭妄作妄為罷了識風頭趁早走不要惹得老爺們生氣將你們這些狗頭的腦袋一個個揪下來那時才知楊花塢的老爺厲害呢那個賊將只氣得三光透頂暴跳如雷忙令一衆賊兵下水過濠那些賊兵撲通撲通地跳了十幾下水誰知水裏早就埋藏著鐵蒺藜三面胸等那跳下去的賊兵沒有一個活命都是皮開肉綻腹破如流一齊從水裏浮了起來那時村裏的鄉勇一齊大笑那個賊將又驚又怒仍不服氣又叫賊兵運土填濠陰識右手一揮登時萬弩齊發沖在前面的賊兵早被射倒數十個賊將才知道厲害揮著賊兵沒命地逃去了陰興道這岔子可不小這個賊將回去一定要説我們抗拒王兵假使大隊的賊兵全來那便怎麼辦呢陰識也躊躇半晌道事到如此只好硬頭做下去別無辦法如果讓這班鳥男女進來試問還堪設想麼這時忽然衆鄉中走出一個人來對陰識説道為今之計最好將這班賊兵的尸首先埋了如果沒有人來便罷假若有人來責問我們一口不認他們沒有見證也無奈何我了陰興拍手道妙忙令鄉勇將吊橋放下擁出去七手八腳將那些賊兵的尸首掩埋了趕著進來撤起吊橋仍然向四處去巡閲誰知一直等到天晚竟沒有一個賊兵前來北面喊殺的聲音漸漸也沒有了大家方才放心又巡守了一夜到了第二天早上見那一班逃難的陸續不斷的回來知道賊兵已去陰識陰興才卸甲進莊到了家裏先到邢老安人面前請安只見房裏空洞洞的一個人也沒有忙問僕婦誰知一個僕婦也沒有弟兄兩個一直尋到後花園的書房裏才見邢老安人和麗華及明兒碧兒等一班人都在裏面一個個愁眉苦臉的陰識忙請了安接著陰興也過去請安邢老安人見他們弟兄兩個好好的回來心中自然歡喜忙問道現在你們回來大約賊兵已經退去了陰識道母親不要驚慌吧現在賊兵確已退去了麗華插口問道兩家的勝負如何陰興道還要問呢方才聽見一班逃難的百姓説的劉家兄弟大敗虧輸全軍覆沒了聽説弟兄三個之中還被賊兵殺了一個呢麗華聽得芳心一跳忙問道死的是第幾個陰興道大約是個最小的吧他聽得這話陡然覺得心中似乎戳了一刀眼前一黑撲地向前栽去慌得衆人連忙將他扶起只見他星眼定神櫻口無氣嚇得邢老安人大哭起來陰識陰興也莫名其妙誰也不知他和劉文叔有了這重公案一個個面面相覷手慌腳亂邢老安人更是兒天兒地的哭個不住過了半晌才見他微微地舒了一口氣哇地哭出聲來大家方才放心這時只有明兒一個人肚裏明白到了這時邢老安人只是追問明兒明兒曉得安人溺愛小姐説出來料也無妨便將以前的公案一五一十地説個究竟邢老安人方才明白正要開口陰識是個孝子曉得母親一定要怪兄弟出言不遜的忙道這是兄弟聽錯了昨天被賊兵殺的原是劉仲不是劉文叔邢老安人卻並不怪麗華做出這樣不端的事來反而怪陰識有意妒嫉他妹子便將陰興罵得狗血噴頭可憐陰興有冤難訴只得滿臉賠笑道安人請不要動氣只怪我沒有聽真得罪了妹子邢老安人罵道不孝的畜生還在這裏嚕嗦什麼還不給我滾出去陰興被他母親罵得垂頭喪氣張口不得連忙退了出來陰識也隨後出來向陰興笑道兄弟你今天可是冤枉死了陰興笑道説來真奇怪極了想不到妹妹竟有這樣見識往日東家來説親他也不要西家來作伐他也不準料不到他竟看上了這個劉文叔我倒不解陰識正色説道妹妹的眼力果然不錯劉文叔這人你會過面沒有陰興道沒有陰識道阿這個劉文叔我在十村會操的時候見過他一次不獨氣宇軒昂而且恢廓大度將來一定可以出人頭地的而且他又是漢室的嫡派他此番起義一定能夠恢復漢家基業陰興道如果他果真死了那麼漢家豈不是同歸於盡麼陰識道道路之言不可輕聽話猶未了外邊探事的兒郎走進一個來稟道現在賊兵已經退守宛城劉縯領兵到棘陽了陰識忙問道劉家兄弟聽説陳亡一個不知是誰那探事的説道陳亡的差不多就是劉仲我聽説劉仲是員勇將當他們失敗時候他一個人獨戰四將臨死還將一個賊將的手腕戳傷你道厲害麼陰識一擺手那探事的退出他忙與陰興兄弟兩個一同進來對邢老安人説道請母親放心罷現在劉文叔果然未死和他的哥哥到棘陽去了邢老安人聽了這話忙去告訴麗華麗華才稍展愁容大家便到前面樓上邢老安人一面又差人出去打探究竟數日後得了回音説劉文叔果然未死麗華自然歡喜光陰似箭年復一年麗華深閨獨處倍覺無聊常聞人言沸沸説劉文叔現已封為漢大將軍現在洛陽但言人人殊他的芳心轉難自信有一天晚上他晚妝初罷只見一輪明月從東方高高升起他寸心有感便命明兒捧香伺候明兒便捧著寶鴨香爐內盛著沈香用火引起明兒便對他説道姑娘要爇香有何用處麗華微頜螓首答道此刻無須你問我自有用處明兒早巳料著八九分也不便再問只得捧著香盤靜悄悄地立在旁邊聽他吩咐他將羅裙一整粉臉一勻婷婷嫋嫋地走下樓來明兒也捧香盤跟他下了樓轉樓過閣不多時進得園來他走到牡丹亭的左邊亭亭立定便命明兒去取香案明兒忙將手中的香盤安放在牡丹亭裏他一徑向書房而來到了書房門口只見裏面燈火已熄鼾聲大作他敲門喊道小才小才快點將門開放我有事呢喊了半天小才聽得有人叫門冒冒失失地爬起問道誰敲門呀明兒答道我小才聽見是明兒的聲音心中大喜沒口地答應道來了來了好姐姐勞你等一等説著他一骨碌爬了起來將門開了劈面將明兒往懷中一摟説道好姐姐你今天可是和我幹那勾當麼明兒被他一摟不禁心中一動後來又想麗華教訓他的一番話不覺用手將小才往旁邊一推怒道誰和你來混説小姐現在這裏仔細著你的皮小才聽説小姐在此嚇得倒抽一口冷氣忙放了手説道不肯就罷了何必要這樣的大驚小怪呢明兒道趕快搬一張香案到牡丹亭旁邊去休要再講廢話了小才見他這樣與往日大不相同當然不敢再去嬉皮笑臉的了忙搬了一張湘妃竹的香案跟著明兒徑向牡丹亭而來這正是神女無心出雲岫襄王乏術到陽臺要知後事如何且看下回分解
