body:
  text: 第二十三回救愛妾三桂借兵殺宮眷崇禎殉國卻説多爾袞正在那裏想他的侄兒媳婦忽然宮女進來説外面有阿洛會求見多爾袞知道有機密事忙出去在西房中傳見阿洛會一見了攝政王把豪格等人如何如何謀刺攝政王的話和盤托出多爾袞聽了又驚又恨立刻打發阿洛會便帶宮中兵士悄悄地趕到肅王府中去把在場的幾位親王貝勒大臣統統捉住押解進宮裏來內中只有多鐸早已走脫攝政王見了豪格想起從前他在太宗皇帝跟前説自己的壞話恨不得把他一口咬死當時便會同鄭親王升坐篤恭殿審問阿洛會做見證豪格見無可抵賴便把惡言頂撞攝政王大怒便吩咐把肅王廢為庶人永遠監禁在高牆裏把王府抄沒卻悄悄地把侄兒媳婦取進自己府去偷空回府去便和侄兒媳婦尋樂當時又把阿達禮碩托和吳丹等大臣定了死罪大學土剛林也監禁起來同時犯罪殺頭大臣也不知有多少抄沒的家産女眷統統送進睿王府去自從豪格監禁以後多爾袞便拔去了眼中之釘天天和太后放膽取樂便也毫無顧忌世祖皇帝年小又住于別宮如何能知道他們的事體倒是範文程打聽得外面人心不服這時明朝李自成張獻忠造反帶領陝西的飢民裁去的卒驛共有二十萬人馬占據陝西河南湖北四川各省起義軍中頭目有老回回曹操華里眼左金王改世王射塌天橫天王混十萬過天星九條龍順天王分十三家七十二營到處橫衝直撞明朝官兵投降他的也很多這十三家七十二營原是李自成的舅父高迎祥為頭的那高迎祥原是馬賊出身後來和飢民頭目稱大梁王的延安府張獻忠聯合到一塊兒自稱闖王張獻忠自稱八大王高迎祥被官兵殺死以後李自成便襲了闖王的名號向西安進發張獻忠向四川進發明朝萬曆皇帝的兒子福王常洵被李自成殺死把他的血和酒吃名叫福祿王王世子田松赤身露體逃在荒山裏後來李自成打進西安占據了明朝親王秦王的王宮殺死秦王自己便立大順國改年號稱永昌他一面帶兵又打破太原大名真定各處城池明朝崇禎皇帝得了這個消息十分害怕忙下詔征各處勤王兵保護京城無奈這時姦臣專權皇帝萬分窮苦滿朝不見一個忠臣這個消息傳到範文程耳朵裏便對多爾袞説道機會不可失王爺趁此去收服明朝立了大功誰敢不服攝政王聽了説這主意不錯忙去對太后説明太后心中雖捨不得離開叔叔但為國家大事又為多爾袞前程起見便也答應一面吩咐他兒子世祖皇帝選個吉日升坐篤恭殿拜多爾袞為大將軍統領滿洲蒙古兵三分之二和漢軍恭順等二王和續順公的兵隊不下十萬人馬皇帝又賞多爾袞黃傘一柄大纛二面黑狐帽貂袍貂襪貂坐褥涼帽蟒袍蟒褂蟒坐褥雕鞍駿馬等許多東西多爾袞進宮去辭別了太后奏明倘然奪得中原接太后進關去共享中國的繁華午時三刻城外炮聲震天大將軍跨鞍上馬前面豎起八面大旗浩浩蕩蕩殺奔山海關來出了邊境多爾袞分派多鐸阿濟格孔有德耿種明尚可喜和朝鮮王子李澄各帶大兵向前進行自己統領牙兵在廣寧附近翁後地方駐扎候前軍消息正在遣兵調將時忽然由前軍阿濟格送進一個明朝的差官來見了多爾袞趕忙跪倒口稱明朝平西伯吳三桂有公文特差副將葉禹鍾送上大將軍親看當即有侍衛官接過公文多爾袞看時見公文上面説崇禎帝吊死煤山李自成打破北京城求大將軍發兵救中國大難多爾袞看了上面的話不覺發怔説道好厲害的李自成不多幾天就鬧出這樣的大事來又問葉禹鍾崇禎皇帝怎麼吊死的那葉副將不曾説話先淌下眼淚説道崇禎皇帝枉送了一條性命説話李自成兵臨城下北京百姓還不曾知道直到三月十七早朝皇帝問外間賊勢如何文武百官聽了只有掉眼淚的本領停了一會午門外報進來説李自成兵隊環打九門大臣們聽了也顧不得皇帝一個個溜出殿去崇祉皇帝看了只歎了一口氣退朝回宮對皇后痛哭一場這時有一個總管衛太監見皇帝哭得淒涼便不覺動了忠義之氣當下招呼了宮裏的太監共六百多人各個拿了兵器出去把守皇城到了十八日這一天外面攻打得十分危急便有一個太監名叫杜勳的偷偷逃出城去降李自成把宮裏的情形統統告訴給賊人知道李自成便打發杜勳連夜用繩子挂進宮裏去見崇禎皇帝請皇帝讓位給李自成皇帝大怒把杜勳監禁起來直到十八日傍晚時候太監曹化淳偷偷地去開了彰儀門那賊兵一闖進城逢人便殺逢屋便燒京城裏一片火光人聲鼎沸崇禎皇帝忙吩咐把內城緊閉可憐皇帝一個人走出宮門來到萬壽山上望見烽火連天歎一口氣説道這白白害了一班好百姓呀説著掉了幾滴眼淚來回到乾清宮裏他拿起朱筆來寫一道上諭著成國公朱純臣提督內外諸軍事輔助東宮寫完上諭便吩咐請皇后出來一霎時皇帝跟前站著許多宮女皇后和袁貴妃也坐在一旁皇帝吩咐擺上酒席連喝了三大杯便覺得醉醺醺的隨即回過頭來對皇后説道大事去矣皇帝才説得一句只聽得那班宮女們嗚嗚咽咽地痛哭起來皇后也抹著眼淚説道臣妾侍奉陛下十八年工夫每有勸諫總不肯聽致有今日皇帝也不和他多説便把太子永王安王喚來拉住兩人的手只説得一句逃性命去吧便吩咐太監把兩位太子送出宮去寄養在外戚周家田家不一會宮女報説皇后吊死了皇帝急急進去看時已是斷了氣皇帝只説得一個好字那公主在一旁哭著這位公主年紀十五歲長得沈魚落雁的容貌皇帝覷他不防備的時候便拔下佩刀來把袍袖遮住臉兒一刀殺過去斬斷了公主右面的臂膀公主倒在血泊裏輾轉呼號皇帝一面抹淚一面説道誰叫你生在我們帝王家裏呢袁貴妃聽了便對皇帝拜了又拜解下腰帶來便在皇帝跟前上吊才把身子吊上那帶子忽然斷了袁貴妃又醒過來皇帝便擎起刀來在貴妃肩上狠命地砍了幾刀才死去皇帝收了佩刀慌慌張張地夾在幾個皇宮太監裏面擠到東華門口被兵士們攔阻住又折到齊化門朱純臣家裏又被看門的攔住不放進去急轉身走到安定門那城門關得鐵桶相似也不得出去皇帝歎了一口氣又折回宮來這時皇帝身上穿著藍袍在街道上走來走去也沒有人認識他到十九日一清早內城也被賊兵打破了皇帝悄悄地一個人走上煤山去在壽皇亭裏坐下一陳陳喊殺聲音傳到皇帝耳朵裏皇帝連連歎了幾口氣便拿起案頭朱筆在衣襟上寫了幾個字解下袍帶吊死在亭子裏待到李自成打進宮來有一個太監名叫王承恩的在宮裏四處找尋皇帝找到壽皇亭裏見皇帝高高吊死在窗檻上散著頭髮赤著左腳右腳穿著朱履再看那衣襟上寫的字道朕自登極十有七年逆賊直逼京師朕雖薄德匪躬上幹天咎然皆諸臣之誤朕也朕死無面目見祖宗於地下可去朕之冠冕以發覆面任賊分裂朕尸勿傷百姓一人那王承恩讀過皇帝衣襟上的遺詔不禁嗥啕大哭對皇帝的尸身拜了八拜説道萬歲在陰間慢走奴才來了説著也在腰間解下一條帶子來吊死在皇帝腳邊破城的時候崇禎皇帝獨自一人升殿眼前一個太監也不見皇帝便下殿來自己打鍾打了關天也不見一個大臣到來後來李自成進宮坐在金鑾殿上打起鐘鼓來便有成國公朱純臣領了合朝文武大臣上殿來拜倒在地口稱新皇萬歲李自成查問時只有范景文倪元璐幾個大臣盡忠的又查問崇禎皇帝的下落大臣們都不知道後來在煤山上尋得皇帝的尸身問那看管壽皇亭的小太監時那小太監把皇帝臨死時的情形和王承恩殉難的情形一一説出來李自成吩咐卸下一扇宮門去把皇帝的尸身擡來用柳木棺草草收殮丟在東華門外的篷廠裏每天只有三四個老太監看守著李自成住在宮裏每天自有文武百官去上朝卻沒有一個人去拜皇帝棺木的那時陳演魏藻德張若麒梁兆陽楊觀光周奎一班明朝的姦臣都因趨奉李自成得了大官還有吳三桂的父親都指揮吳襄也投降了李自成吳三桂有一個愛妾名陳園園的原是外戚田畹家的歌姬長得和出水芙蓉一般吳三桂在田畹家吃酒一見傾心向田畹取來十分寵愛天天摟在懷裏噙在嘴裏因受了皇上的旨意帶兵往山海關駐扎怕陳園園嬌嫩皮膚受不住關外風沙便把他寄在京城父親家裏待到李自成攻北京吳三桂封平西伯帶兵回京才走到豐潤地方便得到京城陷落的消息打聽得他父親吳襄也投降了賊人連他愛妾陳園園也被賊將劉宗敏虜去轉獻給李自成享受這怎麼叫吳三桂不惱他便一面率領兵士晝夜兼程殺進京去一面又打發副將葉禹鍾到關外來討救兵當下多爾袞問明白了來蹤去迹深中下懷便立刻催動人馬軍前豎一面大旗上寫著仁義之師四個大字耀武揚威地殺進北京城來平西伯的兵隊領路走在前面李自成聽説滿清兵到慌得他逃出武英殿虜著明朝的太子和兩位王爺向西逃去吳三桂追上前去殺死他父親吳襄問陳園園時已被闖王李自成虜出城去吳三桂又向前追趕在驛亭裏遇到陳園園獨自一人坐著吳三桂見了真是悲喜交集吳三桂既得了他心上的人兒便也無心去追趕回進京城去那多爾袞已是老實不客氣地高坐在武英殿上受百官的朝賀了睿親王一面收拾宮殿一面親自寫了一封奏摺打發輔國公屯濟克和托固山額真阿洛會到盛京去迎接兩宮進京一面又派明朝降臣金之俊修理從山海關直到北京的官道沿路蓋造行宮睿親王在盛京的時候和皇太后是天天見面親熱慣的如今兩處離開不由得他天天盼望夜夜思量直盼到九月二十日順治皇帝陪皇太后進北京城多爾袞傳集了滿漢文武大臣全身披挂出城九裏恭接聖駕只聽得九聲炮響前面金鼓儀仗龍旗鑾輿一隊隊的藍翎侍從夾護著龍車車子裏一個豐頤盛鬋的太后懷中坐著一個七歲的天子龍車由永定門進大清門沿路家家擺設香案人人在窗戶內偷看禦駕進了紫禁城文武大臣一齊退出只有攝政王一人隨駕進宮順治太后進了慈寧宮略略休息一會便傳多爾袞進去兩人久別重逢自然有一番情意直談到傍晚才退出來回到私邸裏去這時小玉妃和豪格的福晉也跟著進京來多爾袞回府去和小玉妃説笑了一會又和二十個侍妾周旋一會便溜進侄兒媳婦房裏去了這小玉妃自從嫁了攝政王以後因為王爺心中念念不忘他姊姊和他豪無恩情小玉妃心中的怨恨自不消説得他幾次想趕到宮裏去和他姊姊大鬧一場又想他姊姊如今做了太后自己勢力敵他不過便也忍耐下去那多爾袞因這幾天宮裏有事便日夜在宮中伺候順治皇帝揀定十月初一日登基從九月二十六日起下諭朝內大小臣工替崇楨皇帝挂孝三日到了初一這一天大家都換了吉服皇帝升座武英殿文武百官一齊拜倒在地三呼萬歲當下皇帝傳下三道上諭第一道是把明朝改稱大清大赦天下蠲免全國賦稅一年第二道是令天下臣民限定在十日內一律剃發第三道是封阿濟格為靖遠大將軍會同吳三桂尚可喜等由大同邊外會合蒙古兵士入榆林延安攻陝西背後去剿滅李自成一班賊寇又封多鐸為定國大將軍會同孔有德一班降將直下江南去征服明朝天下單説這剃發一道上諭當時也不知死了多少忠臣義士這且不去説它如今再説多爾袞分發各路兵馬已定便天天在宮裏和太后飲酒取樂那各親王的福晉也天天輪著進宮去賀喜只有那小玉妃因把他姊姊恨入骨髓便也不進宮去但是看看他丈夫一連幾天不出宮來這口酸氣心頭實在按捺不住又挨過幾天看看多爾袞還不回家來他可再也耐不住了頭也不梳衣服也不換坐著府裏的車子直闖進慈寧宮去那把守宮門的太監和宮女們見他來勢凶惡便上前來把他攔住小玉妃一肚子怒氣無處發泄見被衆人攔住他便在外院裏指天劃地地大罵起來口口聲聲要喚多爾袞出來我和他評評理他罵到十分氣憤的時候把皇太后和多爾袞兩人的私情事體統統喊了出來嚇得那班宮女太監們掩著耳朵不敢聽他的話便有幾個宮女上來説了好多好話拉他到西書房去坐一面又打發人到裏面去通報攝政王停了一會宮女傳出話來説請福晉先回王爺今夜一定回府小玉妃聽了也無可奈何只得上車回去了到了傍晚時候多爾袞果然回家來了小玉妃見了王爺把日間的氣惱一齊拋在九霄雲外眉開眼笑地把王爺接進房去多爾袞也並不提起日間的事體用過了晚膳便宿在小玉妃房裏侍妾們看了這情形十分詫異到了第二天一清早大家到小玉妃房裏去伺候只見那小玉妃直挺挺地躺在床上七孔流血早已死了這明明是被多爾袞謀害死的大家也不敢吱聲了多爾袞只把差官傳來吩咐他買辦衣衾棺槨草草收殮外面只知道睿王福晉是害急病死的照常開吊出喪事過以後多爾袞依舊向宮裏一溜十天八天不見他出來他叔嫂兩人的事體自從給小玉妃吵嚷過以後鬧得宮裏宮外人人知道這個風聲傳到皇帝耳朵裏去雖説皇帝年小卻也覺得十分難受肚子裏又羞又氣誰知那時有一位禮部尚書名叫錢謙益的早已看出攝政王和皇帝的心病便大膽上了一個奏章説皇太后正在盛年獨處深宮必多傷感攝政王功高位尊又值續弦不如請太后下嫁攝政王既足以解太后之孤寂又藉以酬皇叔之大功這個奏章先是多爾袞看他看了不由得心花怒放當即帶了奏章進宮去和太后商量太后到這時候卻害起羞來溜了多爾袞一眼笑説道俺不知道你和他們商量去多爾袞回到府上把錢謙益傳進府去兩人商量了一夜第二天錢謙益上朝把這個意思奏明皇上又説從此皇太後和攝政王定了名分免得外人多説間話順治皇帝當即準奏第二天發下一道下諭來家家傳誦那上諭説道朕以沖齡踐祚定鼎燕京表正萬方廓清四海藐躬涼德曷克臻斯幸內稟聖母皇太后訓迪之賢外仗皇叔攝政王匡扶之力一心一德斯能奠此丕基顧念皇太后自皇考賓天之後攀龍髯而望帝未免傷心和熊膽以教兒難開笑口幸以攝政王托股肱之任寄心腹之司寵沐慈恩優承懿眷功成逐鹿抒赤膽以推誠望重揚鷹掬丹心而輔翼金縢靖亂立姬公負扆之勳鐵券酬庸令邱嫂轑羹之怨借此觀臚萱室用紓別鵠之悲從教喜溢椒宮免唱離鸞之曲與使守經執禮如何通變行權既全夫夫婦婦之倫益慰長長親親之念嗚呼禮經具在不廢再醮之文家法相沿詎有重婚之律聖人何妨達節大孝尤貴順親朕之苦衷當為天下臣民所共諒其大婚儀典著禮部核議奏聞候朕施行欽此要知皇太后如何下嫁且聽下回分解
