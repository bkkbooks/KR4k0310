body:
  text: 第十二回殺親子禍起骨肉投明主初試經綸卻説舒爾哈齊自從跟努爾哈齊到明朝去進貢回來眼見明朝那種繁華情形心中説不出地十分羡慕那時他得了神宗皇帝的賞賜自己覺得十分榮耀回家來便不把努爾哈齊放在眼裏又見努爾哈齊大建宮室他便想起做皇帝的快樂又想自己和他哥哥一般是塔克世的兒子他怎麼可以享福我怎麼替他做牛馬努爾哈齊幾次帶著他出兵去他又立了許多戰功越發膽大起來見了努爾哈齊漸漸地沒有規矩努爾哈齊看在從小患難弟兄面上便不和他計較誰知舒爾哈齊竟暗暗地在那裏調兵遣將他有兩個兒子大兒子名阿敏第二個兒子名濟爾哈朗他們手下都有一二千兵士養著還有那努爾哈齊的大兒子褚英只因父親寵愛代善和皇太極心中十分怨恨也暗暗地養著兵士和舒爾哈齊父子三人打成一氣他們原都住在興京城裏的只因鬧起事來十分不便便悄悄地打發人到黑扯木地方去大興土木蓋起宮殿來和努爾哈齊的屋子一模一樣他們和褚英約定俟他父子三人搬到黑扯木去以後便帶領人馬打到興京城來這裏褚英也在城中埋伏兵士只聽得一聲炮響便裏應外合地大鬧起來這個消息傳到阿巴泰耳阿裏忙去告訴他母親伊爾根覺羅氏正因努爾哈齊新娶了烏拉氏自己失了寵如今得了這個消息他要討好丈夫便叫兒子悄悄地去告訴他父親當下努爾哈齊聽了阿巴泰的話立刻發作起來這時扈爾古把兵馬點齊進來復命努爾哈齊吩咐他快調四千兵進城來把城門關了再把二貝勒父子三人和那大公子褚英一齊捉來見我努爾哈齊説話的時候滿臉殺氣扈爾古見了十分害怕當下也不敢多説話只是是地答應著扈爾古正要轉身出去努爾哈齊又把他喚回來説道要是他們拒不奉命你便砍下他們的腦袋來見我扈爾古應著跳上馬趕出城去點齊了四千人馬飛也似地跑進城來立刻把城門閉上分二千兵士看守四門一千兵士看守都督府自己去帶著一千兵士趕到舒爾哈齊府中把前後門圍得鐵桶相似帶著三百親兵闖進門去把全府的人嚇得個個兩隻腳好似釘住在地面上一般動也不敢動扈爾古喝一聲綁起來那兵士們一擁上前把全家老少都推在院子裏一片號哭的聲音好不悲慘只有那舒爾哈齊他仗著自己有功便不肯奉命他手裏擎著大刀見人便砍那兵士們被他砍倒的不少扈爾古十分惱怒忙從腰間扯出一張令旗來喝一聲殺便有三五十兵士割下舒爾哈齊的腦袋來一面趕著老小出門去走過褚英的家門口時扈爾古進去把褚英傳出來綁上了一塊兒送進府去到了努爾哈齊跟前褚英仗著自己是一個大兒子想來總有父子之情便搶上前去撲地跪在地下大聲哭嚷道父親饒了孩子罷誰知努爾哈齊一見了褚英不覺無名火冒十丈他想別人計算我倒也罷了你是我親生的兒子也打著夥兒計算起我來便不由分説找出馬刀來只一刀可憐褚英立刻殺死在他父親腳下了那邊阿敏濟爾哈朗見了嚇得魂不附體忙也上去跪倒努爾哈齊見了氣得兩眼冒火擎起那口刀正要砍下去忽然想起舒爾哈齊來忙問時那扈爾古忙送上首級來看時只見他雙眼緊閉血肉模糊努爾哈齊不覺心中一動想起從前他們弟兄三人被父親趕出家門在路上吃苦的情形如今落得這樣下場又想起自己一時之憤殺死了親生的兒子因想起褚英便又想起他母親那時和他恩愛的情形不覺落下眼淚來忙上去扶起兩個侄兒勸他們好好地改過為善從此饒了他們以前的罪惡當下阿敏兄弟兩人給他伯父磕過頭謝了恩哭著回去了努爾哈齊因連殺了子弟兩人心中鬱鬱不樂便也無心和明朝去打仗了他住在府中天天和幾位大臣戰將商量改變兵制商量了許多日子便定出一個八旗的制度來他的軍隊是拿旗色來分別的滿州兵制原有黃色白色藍色紅色四旗如今又拿別的顔色鑲在旗邊上稱做鑲黃旗鑲白旗鑲藍旗鑲紅旗共是八旗那武官分牛録額真甲喇額真固山額真梅勒額真四等每一牛録手下領三百名兵丁每一甲喇又領著五個牛録每一固山又領五個甲喇每個固山手下又管著兩個梅勒出兵的時候地面闊寬便把八旗的兵排成一條橫線地面狹窄便排成一條直線不能亂走的到打仗的時候便把穿堅甲拿長槍快刀的兵充前鋒穿輕甲拿弓箭的兵走在後面另外又有一隊騎兵在步兵前後照看著堅甲便是鐵甲拿緞子或是木棉做成衣服裏面縫著二寸或一寸四分厚的鐵板輕甲便是棉甲是拿緞子或是木棉做成卻沒有鐵板的兵制編定了便分給各大將日日操演著又叫額爾德尼巴克什和噶蓋劄爾克齊兩人仿著蒙古字音造出滿洲文字來這時建州占據的地方除去開原附近以南遼河內邊由連山關附近通鳳凰城一帶外凡是廣寬的南北滿洲平原肥地都在努爾哈齊一人掌握之中便是那朝鮮的北部也被建州占了去講努爾哈齊的兵力單是蘇子河谷一帶已有精兵八萬那時明朝人有一句俗話道女真不滿萬滿萬不可敵看看努爾哈齊的行為卻是一個有大志的人這個消息傳到明朝宰相葉向高耳朵裏不覺嚇了一跳説道我們得趕快防備著當下提起筆來向皇帝寫上一本説道竊念今日邊疆之事惟以建州夷最為可患其事勢必至叛亂而今曰九邊空虛惟遼左為最甚李化龍為臣曰此酉一動勢必不支遼陽一鎮將拱手而授之虜即發兵救援亦非所及且該鎮糧食罄竭救援之兵何所仰給若非反戈內向必相率而投於虜天下之事將大壞而不可收拾臣聞其言寢不安席食不下咽伏希講備禦之方為要神宗皇帝看了奏章也不禁嚇了一跳忙把兵部尚書宣進宮去吩咐他趕速多添兵馬把守關隘那兵部尚書領旨出來便打發顧廷相去充遼陽副將蒲世芳去當海州參將帶兵一萬駐扎在撫順遼陽兩處這時廣寧總兵張承蔭和廣寧巡撫李維翰也接到兵部尚書的加急文書叫他們隨時察看建州情形報告消息誰知明朝上下正忙亂的時候那努爾哈齊自己稱金國登上了汗位了這時候是明朝萬曆四十四年興京大殿造成由大貝勒代善二貝勒阿敏三貝勒莽古爾泰四貝勒皇太極和八旗許多貝勒帶領各大巨站在殿前按著八旗的前後立在兩旁努爾哈齊全身披挂坐上殿來禮官喝聲行禮那些貝勒大臣帶著文武官員一齊跪倒黑壓壓地跪滿在殿下靜悄悄地一起一起地跪倒行著三跪九叩首的禮滿院子只聽得袍褂靴腳悉索的響聲帶著那朝珠微微磕碰的聲音大家磕下頭去的時候努爾哈齊在寶座上望下去只見滿地的翎毛根根倒豎著好似一座菜園他心中便有説不出的一陳快樂行禮已畢那領著八旗的八位大臣出班來跪在當地兩手高捧著表章當有侍衛阿敦巴克什額爾德尼下來接過表去搶上幾步在寶座前跪倒高聲朗讀表文稱努爾哈齊為復育列國英明皇帝英明皇帝聽罷了表文便走下寶座來當天燒著三炷香告過天又帶著全殿官員行過三跪九叩首的禮禮畢皇帝又升寶座許多貝勒和大臣都分著班兒上去行禮道賀當殿傳下聖旨來改年號稱天命元年退朝下來便在東西兩偏殿賞文武官員領吃酒英明皇帝也退入後殿去自有那繼大妃繼妃和庶妃等帶各公主各福晉上來道賀行過家禮在內殿上擺著酒席大家陪著皇帝吃酒努爾哈齊到了此時便開懷暢飲不覺酩酊大醉那宮女上來扶著皇帝到烏拉納喇氏宮裏去睡這一夜他和納喇氏不用説得自然是顛鸞倒鳳百事都有了第二天五更時分英明皇帝便起來坐朝從此他在宮殿各處都仿著明朝的格式又時時召各貝勒大臣進宮來遊玩又和文武官員商量國家大事英明皇帝這時深恨明朝欺他常常和大臣提起便切齒痛恨這時有把守邊關的來報説明朝沿邊的百姓每年越界來偷采人參東木英明皇帝便立刻下聖旨著達爾漢侍衛扈爾漢帶領兵隊到邊界地方去巡查見了明朝人抓住便殺那侍衛奉了聖旨趕到邊地上去殺死明朝五十個人英明皇帝又打發綱古裏方吉納兩人去見廣寧巡撫李維翰責問明朝人越界采參的事體李維翰聽説殺了自己的百姓便大怒喝叫把金國來的兩個使臣和九個侍衛一齊捆綁起來一面修書信給努爾哈齊要他償命努爾哈齊心下雖然憤恨但自己的使臣被明朝捉住了也無法可想只得把自己以前從葉赫部捉來的十個犯人送到撫順關去一齊殺死算是抵了明朝的人命那綱古裏方吉納兩人才得逃著性命回來英明皇帝雖説一時忍辱含垢但他報仇的念頭越是深一層了天命三年正月有一天黎明努爾哈齊起來準備坐朝推窗一望只見那邊挂著一個淡淡的明月有一道黃氣橫遮著月光有二尺多寬四丈多長英明皇帝見了不禁哈哈大笑説道這是明朝的氣數完了我金國氣數旺盛的預兆呢那繼大妃也站在他身後一同看著聽英明皇帝説了這句話便接著説道陛下這話可有什麼憑據英明皇帝説道你不看見嗎那一輪明月不是明朝嗎這光淡淡的不是衰亡的預兆嗎你再看看那道黃光不是我們金國嗎那金子不是黃色的嗎這黃光如此發旺不是我國應該興盛的預兆嗎再者這黃光罩住在明月上面不是金國滅去明國的預兆嗎繼大妃聽了這番話心下恍然大悟爬在地下連呼萬歲英明皇帝笑著把妃子扶著一面催宮女快快幫著披挂踱出殿去那文武百官朝賀已畢英明皇帝便慢慢地把天象説出來又説道天意已定諸卿忽疑朕計已定今歲必伐明矣當時殿下許多武將聽説皇帝要去伐明快活得也個個磨拳擦掌有三位固山額真出班奏請皇帝調遣皇帝諭諸卿且退待朕與法師計議妥善自有調遣諸卿之處到了第二日果然宮裏傳出旨意來宣老法師幹祿打兒罕襄素進宮去商議軍國大事這位法師自從西藏步行到滿州地方道行高深説法玄妙英明皇帝十分敬重他特為他建造一座極大的刺嘛寺遇有疑惑難決的事都去請教老法師當時英明皇帝和老法師談了許多時候便越發有了主意老法師擇定二月十四日這天英明皇帝親自擺駕出城調齊八旗人馬在大教場聽點英明皇帝周身戎裝騎著一匹高大的黑馬揀了二萬精兵帶到祖廟裏行禮那班隨征貝勒和文武大臣都行過禮轉身出去整頓隊伍頓時旌旗蔽日槍戟如林浩浩蕩蕩殺奔撫順關來大軍過界凡山忽然先鋒軍士捉住一個漢人押解到大營裏來英明皇帝親自審問那軍土把漢人推進帳來英明皇帝向他上下一打量見那人蓄著一部短須面貌十分清秀望去便知道是一個讀書種子英明皇帝是最愛讀書的人當下便吩咐解綁又賞他坐下細細地盤問著漢人説道下臣姓範名文程字憲鬥原是宋朝文正公仲淹之後自幼博覽群書上解天文下知地理深明韜略只因屢次上書明皇明皇不用落拓一生飄落到此又見黃光貫月知道滿州出了真主因此不避斧鋮來見陛下陛下倘有知人之明下臣便當竭盡畢生之能上輔明主英明皇帝聽了這一番話心中大樂忙吩咐侍衛敬他酒肉又對範文程説道朕與明朝有七大恨事其餘小怒且不用説先生既有意來此總該明白朕的心事範文程聽了請過紙筆便在當筵寫成七恨道我之祖父未曾損明邊一草寸土明無端起釁邊陲害我祖父恨一也明雖起釁我尚修好設碑勒誓凡滿漢人等毋越疆圍敢有越者見即誅之見而故縱殃及縱者詎明復渝誓言逞兵越界衛助葉赫恨二也明人於明河以南江岸以北每歲竊逾疆場肆其攘奪我遵誓行誅明負前盟責我擅殺拘我廣寧使臣綱古裏方吉納脅取十人殺之邊境恨三也明越境以兵助葉赫伴我已聘之女改適蒙古恨四也柴河三岔撫安三路我纍世分守疆士之衆耕田藝穀明不容刈獲遣兵驅逐恨五也邊外葉赫獲罪於天明乃偏信其言特遣使臣遣書詬詈肆行淩侮恨六也昔哈達助葉赫二次來侵我自報之天既授我哈達之人矣明又黨之脅我還其國已而哈達之人數被葉赫侵略夫列國之相征伐也順天心者勝而存逆天意者敗而亡豈能使死于兵者更生得其人者更還乎天建大國之君即為天下共主何獨構怨於我國也初扈倫諸國合兵侵我天厭扈倫起釁惟我是眷今明助天譴之葉赫抗天意倒置是非妄為判斷恨七也欺淩實甚情所難堪因此七大恨之故是以征之範文程寫成由阿敦巴克什額爾德尼譯成滿文朗聲誦讀一遍英明皇帝連連讚歎道范先生真是朕心腹之臣從此拜文程做軍師隨營參贊英明皇帝稱他范先生各貝勒大臣都稱他先生滿朝文武都十分敬重他這時大隊人馬已到古勒英明皇帝吩咐扎營當晚在曠場上擺下香案馬步八旗兵丁四面密密層層地圍定英明皇帝帶著貝勒大臣文武百官踱出帳來向空中一齊跪倒行過三跪九叩首的禮兒範文程捧著七恨告文高聲朗讀一遍便在當地豎起一杆龍旗四面樂器齊起皇帝退進營去第二天皇帝登上將台發下號令大軍分做兩路左翼四旗兵取東州馬報單兩地皇帝和諸貝勒帶著右翼四旗兵八旗護軍取撫順關一聲號炮拔寨都起右翼四旗到了幹渾鄂謨一片曠野地方安營範文程進帳去見了皇帝奏道臣仰察天象不久便有大雨大軍駐在平原怕有困水之慮此去西南有一座高山名叫福金嶺頗可以安插人馬望陛下立刻下令移軍山上去英明皇帝聽了他的話立刻拔營前進那兵隊走至半路雨點已連珠似地下來了待到得上山扎住營盤外面雨勢和移山倒海一般皇帝在帳中歎道范先生真神人也誰知這一陳雨一連下了十多天兀自不肯住點從山上望去那平原上頓成了一片大湖把這一座山四面圍住好似大海中的一座孤島英明皇帝悶坐在軍帳裏心中十分焦急有一天夜裏許多貝勒大臣陪著皇帝皇帝説道天下大雨怕不能進兵朕意欲回軍好嗎當時大貝勒代善奏道不可我們這一回去還是再和明朝講和呢還是結怨呢況且大軍已到明朝疆界不戰而退何以服衆範文程也説臣察天象三日以內便當睛朗請陛下再忍耐幾時皇帝便問道范先生你看我們大軍幾時可以行動範文程説後天亥刻進兵諸將聽了他的話十分詫異聽聽外面狂風大雨正來得猛烈皇帝卻信範文程的話傳下令去後天亥時進兵向撫順關進發到了這一天傍晚時候還是傾盆似的大雨到了亥時果然風停雨止濕雲四散天上推出一輪皓月來照在人臉上好似白晝一般皇帝在馬上打著鞍子説道范先生真神人也大軍迤邐行去到第三天微明時候前面隱隱露出一帶城池來便是撫順城了皇帝下令把人馬散開在撫順關前橫著有一百里長這時撫順城裏有一個農人出城來砍柴被巡邏兵捉住送來見皇帝皇帝好言撫慰他問他城內有多少人馬那農人説只有遊擊李永芳帶著一千人馬皇帝便命范先生寫一封招降書交給這個農人叫他送進城去要知李永芳降降與不降且聽下回分解
