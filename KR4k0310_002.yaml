俺爹爹做了村長俺妹妹索性生出天神來了這句話一傳十十傳百一霎時傳遍了全村那班村民從這一天起不斷地送禮物有送雞鵝的在送棗栗的也有送一腔羊一頭豬的也有幾戶人家合送一頭牛的幹木兒的倉庫裏都堆滿了佛庫倫的肚子一天大似一天他母親每天殺雞宰豬地調理他到了第九個月上果然生下一個又白又胖的男孩兒來眉眼又清秀哭聲又洪亮合家人歡喜得和得了寶貝似的遠近村坊上都來看看這個小英雄佛庫倫想起烏拉特那種英雄氣慨又看看懷中的乳兒便説不出的又是歡喜又是傷感一年容易又春風這愛新覺羅布庫裏雍順出生已是一周歲了幹木兒揀了一個好日子祭堂子謝天前三天便在院子裏下一對石樁樁上樹一支旗杆旗杆上裝著一個圓鬥鬥裏裝滿了豬牛羊肉高升在杆頂上算是祭天的意思過了三天便是正日一早起來便有許多村民進來道喜院子裏一字兒排列著三頭牛三頭豬三頭羊還有雞鴨鵝鴿許多小牲口中央神壇上供著釋迦牟尼觀世音關公三位神道燒上大爐的香神壇四面又燒著蠟油堆兒那火光煙氣直沖到半天布林胡裏村上的家長都盤腿兒坐神壇兩旁兩面圍牆腳下都擠滿了人頭個個伸長脖子候那跳神的停了一會四個跳神的女人連串兒走進院子來看他們個個打扮得妖妖嬈嬈頭上插著花朵臉上擦著脂粉小蠻腰兒粉底鞋兒腰帶上又挂著一串鈴兒一扭一捏地走著走一步那鈴兒叮叮響著他們一手握著一柄鑾刀一手擎著一根樺木棍兒杆上也挂著七個金鈴兒四個人走到神座前一齊蹲下行過禮站起來各占一方呼啷啷搖著樺木杆兒嘴裏唱著腳下跳著身後有八個老婆婆各個手裏拿著樂器也有彈月琴的也有攔弦索的也有吹箏的抑揚宛轉跟著跳神的腳步來來去去看得大家眼花繚亂神魂飄蕩跳夠多時便有四個大漢擡著一隻活豬一人捉一條腿兒飛也似地走到神壇跟前放下那位薩滿便慢慢地走過來捧著酒瓶向豬耳朵裏直倒那豬連扇著耳朵大家看了拍手歡呼説菩薩來享受了兩個大漢拿起快刀割下兩個豬耳供在神壇上那班跳神的女人又圍著豬跳了一陳把豬擡去洗剝這裏把神壇撤去許多客人圍著幹木兒向他道喜諾因阿拉便招呼人在院子裏安設座位只見院子裏滿地鋪著蘆席席上滿鋪著褥子中間安設炕桌每十個人圍著一個炕桌坐下諾因阿拉和他妹妹恩庫倫招呼客人看看客人已坐齊大約得六七十席幹木兒便吩咐上肉便見屋子裏連串走出六七十人來各個頭上頂著大銅盤盤裏盛著一塊正方一尺來闊的白煮豬肉接著又捧出六七十隻大銅碗來裏面滿滿地盛著肉湯湯裏浸著一個大銅勺每一個客人面前擱著一個小銅盤每一席上擱著一個小磁缸滿滿地盛著一缸酒幹木兒站在上面説一聲請大家動手把酒缸捧來呷一口酒一個一個遞過去都喝過了便各個向懷裏拿出解手刀來割著肉片兒吃著這肉和湯都是淡的客人都從衣袋裏拿出一疊醬紙本這紙是拿高麗紙浸透了醬油曬幹的看他們都拿紙泡在肉湯裏吃著滿院子只聽得喊添肉添湯的聲音把這許多侍候的人忙得穿梭似地跑來跑去幹木兒站在當地四面看著他快活地掀著鬍子笑得閉不攏嘴來這一場吃直到夕照含山才各個罷手大家滿嘴塗著油膩笑嘻嘻地上來向主人道謝正熱鬧的時候忽見一個孩兒斜刺裏從人堆裏擠進來對著幹木兒耳邊低低地説了幾句把個幹木兒氣得兩眼和銅鈴似的鬍鬚和刺猥似的大喝一聲箭也似地直向大門外跑去要知幹木兒聽了什麼消息且聽下回分解
