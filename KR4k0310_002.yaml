body:
  text: 第二回洞房天半神仙眷氈幕地中龍虎兒卻説佛庫倫離了他兩個姊姊搶上山岡子去四下裏看時靜悄悄的也不見獐兒的蹤迹正出神的時候忽覺得頸子後面鼻息咻咻急回過脖子去看時不覺呵喲一聲驚出一身冷汗來急拔腳走時可憐他兩條腿兒軟得和棉花做成的一般休想擡得動身體原來他身後緊靠一簇松樹林子林子裏奔出一隻斑斕猛虎來那虎爪兒踏在雪上靜悄悄的聽不到聲息待到佛庫倫回頭看時那只虎已是在他背後拱爪兒了佛庫倫到底是一個女孩兒有多大膽量有多大氣力那只虎把它屁骨一擺尾巴一剪呼的一聲吼和人一般站了起來擎著它兩隻蒲扇似的大爪兒在佛庫倫肩頭一按可憐他一縷小靈魂兒出了竅倒在地下一任那大蟲如何擺布去他總是昏昏沈沈的醒不回來隔了多時他只覺得耳根子邊有人低低的叫喚聲音佛庫倫微微睜眼看時他一肚子的驚慌變了一肚子詫異原來那老虎説起人話來只聽他低低地説道姑娘莫怕我便是烏拉特看他把頭上的老虎腦袋向腦脖子後面一掀露出一張俊俏的臉兒來站起來把身體一抖那包在他身上的一層老虎皮全個兒脫下來渾身緊軟皮衣越顯得猿臂熊腰精神抖擻他身後站著五七個雄糾糾的大漢烏拉特吩咐把繩椅搬過來自己去扶著佛庫倫坐在上面低低地説道姑娘莫害怕這繩子是結實的他一舉手只見那山壁子上繩子一動把個佛庫倫挂在空中嚇得他只把眼睛緊緊閉住那身體好似騰雲駕霧的直向山峰上飛去忽然繩子頓住了睜眼看時原來這地方是駝嘴峰頂真真廟前什麼是真真廟原來是山峰上一大塊紅色岩石好似屋簷一般露出一個黑魆魆的山洞來從山下望上去好似一座紅牆的小廟這時烏拉特也上了山頂洞裏面走出兩個女娃子來上前扶住了佛庫倫向洞門走去洞口遮著一幅大紅氈簾揭起簾子裏面燈光點得通明只見四壁挂著皮幔地下也鋪著厚毯子炕上錦衾繡枕鋪陳得十分華麗佛庫倫在炕上坐下只是低著頭説不出話來那烏拉特上前來作了三個揖又爬下地去磕頭羞得佛庫倫站起身來轉過脖子去再也回不過臉兒來只聽烏拉特爬在地下説道我烏拉特生平是一個鐵錚錚的漢子我們梨皮峪地方美貌的娘兒們也不知道有多少俺從不曾向他們低過頭自從那天月下見了姑娘又蒙姑娘許我在真真廟裏相見俺的靈魂兒便交給姑娘了行也不是坐也不是吃也沒味睡也不安俺便費盡心計上這山尖兒來鋪設這間洞房又怕明火執仗地來打劫惱了姑娘又害怕姑娘得了不好的名兒便天天在暗地裏打聽如今打聽得姑娘要上山來打獵便假裝一隻猛虎在山岡子下守候天可憐見姑娘果然來了姑娘現在既到了此地可也沒得説了是姑娘自己答應在真真廟裏見面兒的俺拼了一輩子的前程在這山洞子裏陪伴姑娘一個何等要強的佛庫倫被他一席話説得心腸軟下來從此跟著烏拉特在山洞子裏暮暮朝朝地度那甜蜜光陰眼看著一個英雄氣概的男子低頭在石榴裙下便説不出的千恩萬愛他倆在洞子裏促膝圍爐淺斟低酌倒也消磨了一冬的歲月到得春天佛庫倫偶爾在洞口門一望只見千里積雪四望皎然又看看自己住的地方真好似瓊樓玉宇高出天外又向西一望見山坳裏一簇矮屋認得是自己的家裏他想起自己的父母這時候不知怎的悲傷便不由得兩行淚珠兒落下粉腮來急忙回進洞去坐在炕沿上只是掉眼淚烏拉特見了忙上前來抱住低低地慰問這時佛庫倫心中又是想念父母又是捨不得眼前的人兒經不得烏拉特再三追問他便把自己的心事説出來烏拉特聽了低著頭想了一會説道拼著俺一條性命送姑娘回家去吧佛庫倫聽了連連搖頭説道這是萬萬使不得的我家恨你深入骨髓如今你又搶劫了我我爹爹如何肯和你幹休你此去一定性命難保你不如放我一個人回去我見了父母自有話説烏拉特聽説要離開他忍不住落下幾點英雄淚來説道姑娘去了怎的發付我呢這句話説得佛庫倫柔腸百折他心想我們布林胡裏地方男子都是負心的難得有這樣一個多情人兒可惜我和他兩家是世代冤仇眼見這個姻緣是不能成的了罷罷罷拼了我一世孤單我總想法子和他做一對白頭偕老的夫妻當時他便對烏拉特説明此番回家去探望一回父母算是永遠訣別早則半載遲則一年總要想法子來找你和你做一對偕老的夫妻只是怕到那時你變了心呢烏拉特聽了便向腰裏拔出一柄刀來在臂膀上搠一個透明的窟窿那血便和潮水般湧出來忙拿酒杯接住送到佛庫倫嘴邊去佛庫倫喝了半杯剩下半杯烏拉特自己吃了這是他們長白山地方上人最重的立誓法意思是説誰背了誓盟便吃誰殺死了喝他的血當時烏拉特臂上吃了一刀佛庫倫一時不忍離開他忙替他包扎好了傷口服侍他睡下兩人又廝守了十多天一天晚上天上一輪皓月照著山上山下和水洗的一般佛庫倫和烏拉特肩並肩兒站在洞口望月忽然又勾起了思念父母的心事烏拉特便吩咐挂下繩椅兩人握著手説了一句前途珍重那繩椅沿著山壁飛也似地下去烏拉特站在山頂上怔怔地望著直到望不見了才又歎了一口氣回進洞去這裏幹木兒自從丟了女兒佛庫倫以後天天帶人到山前山後去找尋一連尋了一個月兀自影蹤全無把個幹木兒急得抓耳摸腮長籲短歎他母親也因想念女兒啼啼哭哭病倒在床他兩個姊姊親眼看妹子被老虎拖去越發覺得淒慘想起他妹子來便哭一回説一回一家人都被慘霧愁雲罩住了再加門外冰雪連天越發弄得門庭冷落毫無興趣看看過了冬天又到春天恩庫倫回到丈夫家裏了丟下正庫倫一人淒淒慘慘的每天晚上爬在炕上陪伴母親手裏拈著一片鞋幫兒就著燈光做活計心裏想起妹妹死得苦一汪眼淚包住眼珠子忽見門簾一動踅進一個人來擡頭看時那來的不是別人正是合家人日夜想念著的三姑娘佛庫倫正庫倫見了一縱身向前撲去喊了一聲我的好妹子他母親從夢中驚醒過來歡喜得將三女兒摟在懷裏喚心肝寶貝時驚動了合家老小都跑進屋子來看望幹木兒拉住了他女兒問長問短佛庫倫扯著謊説道我當時昏昏沈沈的被老虎咬住了奔過幾個山頭恰巧遇到一群獵戶捉住老虎把我從老虎嘴裏奪下來看看腰上已是受了傷便送到他家去養傷他家有一個老媽媽照看我十分周到過了兩個月我的傷才好接著又害了寒熱病他家住的是帳篷我病得昏昏沈沈的時候跟著他搬來搬去誰知越搬越遠到我病好時一打聽原來他們搬到靉陽堡去了幹木兒聽了説道哎喲靉陽堡離這裏有八百里地呢我的孩兒你怎麼得回來呢佛庫倫接下去説道幸虧在路上遇到他們的同夥説到東北長白山射雕去孩兒便求著他們把孩兒帶回家來了一席話説得兩位老人家千信萬信這一夜佛庫倫依舊跟著正庫倫一被窩睡到了第二天恩庫倫也知道了忙趕回來姊妹三人唧唧噥噥説了許多分別以後的話佛庫倫拉住了他大姊不放他回家去從此以後他姊妹三人依舊在一起吃喝説笑布林胡裏全村的人也不覺人人臉上有了喜色寒食過了春來遲暮看看四月天氣在長白山下兀自桃李爭妍杏花醉眼花事正盛呢布庫裏山前後村坊上一班居民久蟄思動春風入戶輕衫不冷各個要到山邊水涯去遊玩遊玩這時駱駝嘴上一股瀑布便挾冰雪直泄而下自夏而秋奔騰澎湃沒日沒夜地奔流著在山下的居民便是睡在枕上也聽得一片水聲這水聲聽在別人耳朵裏卻沒有什麼難受獨有聽在佛庫倫耳朵裏便覺得柔腸寸斷情淚為珠因此村中紅男緑女人人出外去遊玩獨有佛庫倫悶坐在家裏不輕出房門一步他想起了在駱駝峰頂上和烏拉特的一番恩愛早已遲遲迷迷的魂靈兒飛上山頂去了他母親認做他是害病急得四處求神拜佛獨有恩庫倫暗暗地留神早有幾分瞧料這一天幹木兒因三女兒害病便去請了一個跳神的來院子裏做法事合家男女和鄰舍都擠在一塊看熱鬧恩庫倫趁這空兒溜進房去見他妹妹獨自一人盤腿坐在炕上發怔便上去摟住他脖子悄悄地説道小鬼頭在外面幹的好事打量你姊姊看不出來嗎佛庫倫吃他頂頭一句罩住了答不出話來只是兩眼怔怔地向他大姊臉上瞧著恩庫倫看了越發瞧透了七八分便説道你且慢和我分辨聽你姊姊細細説來你説給老虎拖去咬傷了腰後來雖説把傷養好了怎麼現在腰眼上沒有一點傷疤又説接著害傷寒病我們關外人凡是害傷寒病的一二十天不得便好便是好了那臉上的氣色一時也不能復原況且據你説跟著他們住在帳篷裏搬來搬去這遊牧的生涯何等辛苦你又是受傷大病之後如何沒有一點病容如何沒有一點風塵氣色你才回家的時候我細細看你不但沒有一點憔悴氣色反覺得你的面龐兒比從前圓潤了些你告訴我在外面受苦我看你説話的時候不但沒有愁容反卻有喜色這是你故意嘴裏説得苦惱肚子裏自然有你快活的事體再説到你跟著那班獵戶東裏走到西裏你和一班陌生男人住在一處萬萬保不住你的身子的你想我們關外地方的男子誰不是見了娘兒們和餓鬼一般似的何況妹妹又在落難的時候他們又是一班粗蠻獵戶妹妹又長得這樣一副標致的面龐兒又跟著他們住在帳篷許多日子妹妹你有什麼本領保得住你的身子呢那時妹妹倘然保不住身子回家來不知要怎樣地苦惱傷心如今妹妹回來卻一點沒有悲苦的樣子這獵戶一節便是妹妹扯的謊可是做姊姊的有一句放肆話妹妹不要生氣我如今看定妹妹決不是女孩兒且肚子裏已有孩兒了佛庫倫聽到這裏不由他粉臉漲得通紅阿地叫了一聲卻接不下話去恩庫倫不由他分説便接下去説道妹妹這幾天病了爹媽為了妹妹的病急得六神無主其實妹妹哪里是病簡直是小孽障在肚子裏作怪妹妹不用抵賴妹妹雖不肯告訴我妹妹那種懶洋洋的神氣早已告訴我了妹妹不是常常嘔吐嗎不是嚷著腰酸嗎不是愛吃那酸味兒嗎這樣樣都是小孩作怪的憑據爹媽只因一心可憐你被你一時瞞住了我做姊姊的你怎麼瞞得呢再者你自己拿鏡子照照看你的眉心兒也散了還和我混稱什麼小姑娘呢好妹妹你還是和我老實説罷你在外面怎麼鬧的這一席話説得迅雷不及掩耳佛庫倫這幾天正因離開他那心上人兒很不自在又因肚子裏種下禍根抱著一肚的羞愧悲愁找不到一個可以商量的人聽了他姊姊一番又尖刻又親熱的話不由得他心頭一擠眉頭一鎖小嘴一噘賣起瓢兒來了一扭頭倒在他姊姊懷裏抽抽咽咽哭得柔腸婉轉雲鬢蓬鬆恩庫倫上去摟著他勸著他佛庫倫這才把自己委屈情形一五一十地説了出來恩庫倫聽了怔怔地半晌説著這才是飢荒呢你想俺爹爹也算是布林胡裏村上的一位村長這村坊上的人又多麼看重妹妹去年窩家集牛録的兒子打發人來説媒俺爹爹也不肯給如今給他知道他寶貝的女兒給俺村裏的仇人糟踏叫他老人家這一副老臉擱到什麼地方去這個風聲傳出去不但是俺爹爹村長的位置站不住便是妹妹也要給合村的人瞧不起妹妹肚子裏的孩子俺村裏人決不容他活在世上的恩庫倫説到這裏佛庫倫從炕上跳下地來直挺挺地跪在地上嘴裏不住地説姊姊救我恩庫倫一面把佛庫倫扶起拿手帕替他拭去眼淚正無法可想的時候忽見正庫倫