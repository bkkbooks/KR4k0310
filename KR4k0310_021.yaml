body:
  text: 第二十回傳疑案宸妃逝世驚豔遇洪帥投誠卻説這一夜初更向盡只聽得北風獵獵刁鬥聲聲清兵禦營中列炬如晝太宗坐在豹皮椅上許多猛將分左右站立禦案上攤著一張地圖太宗手指著地圖對衆將講著敵兵的形勢正説著忽然有一個將軍進帳來説道明軍人馬在暗地裏移動今夜怕要來偷營請萬歲保重太宗聽了冷笑一聲説道鼠輩決沒有這樣的膽量一句話沒有説完忽然探馬來報説明兵逃了那吳三桂王朴唐通馬科白廣恩李輔明幾個總兵帶了馬步兵向噶布希賢陳地上逃去太宗聽了只説得一個追字那左右猛將一齊走出營門各帶本部兵馬著地卷起一陳狂風向海邊追去這裏太宗又打發蒙古固山額真阿賴庫魯克爾漢察哈爾各帶本部兵馬埋伏在杏山一路如見有敵兵立刻攔頭痛打不得遠追也不得擅自回軍又下令睿親王多爾袞貝子羅托公屯濟一班主將帶領四旗擺牙喇兵和土謝圖親王兵前往錦州城外塔山大路上攔腰截斷敵兵又傳令達賢堪辛達裏納林率領槍炮手前往筆架山保守糧米又傳令正黃旗阿禮哈超哈鎮國將軍宗室巴布海纛章京圖辣帶兵去攔截塔山路敵兵又傳令武英郡王阿濟格也去攔截塔山路敵兵倘然敵兵要偷過塔山可率領巴布海圖賴從寧遠直向連山路上追去又令貝子博洛帶兵從桑噶爾塞堡攔切敵兵又打聽得明朝郎中張若麒從小淩河口坐船逃去便令鑲黃旗蒙古固山梅勒章京賴虎察哈爾部下巴特耙帶兵往前追趕各路兵馬奉令四出趕的趕殺的殺可憐那班明朝兵丁被清兵殺得尸橫遍野血流成河東奔西逃只恨爺娘不給他多長兩條腿太宗皇帝看著軍事順手便命多爾袞阿濟格調勸主要軍隊進圍塔山又調紅衣大炮十尊幫著攻打打破了塔山城活捉明副將王希賢參將崔定國都司楊重鎮明總兵吳三桂王朴逃向杏山城一帶去太宗兵進逼松山四面掘壕緊緊圍定當夜明總兵曹燮蛟撤退乳峰山的兵隊棄營偷逃沖進太宗的禦營來太宗上馬提刀親自督戰曹燮蛟受傷逃回松山城去卻説噶布希賢帶兵在杏山埋伏守候到第三天果見前面塵頭起處一隊明兵到來打聽得是總兵吳三桂王朴帶領他部人馬要逃向寧遠去噶布希賢按兵不動待明兵過去一半一聲炮響伏兵齊起好似餓狼撲羊一陳掩殺明兵死了三四千剩下來的也是四散逃去吳三桂帶領敗殘人馬逃到高橋地方一聲吹角清國伏兵又起前面一員大將正是多鐸攔住去路大聲喊殺聲震天地慌得明兵手忙腳亂反撞進清朝營盤裏去被清兵關起營門來殺得一個不留吳三桂和王仆兩人單身獨馬落荒而走這一場好殺先後斬殺明兵五萬三千七百八十多人得到馬七千四百四十匹駝六十六匹盔甲九千三百四十六副當夜太宗在營裏犒賞兵士大開筵宴正吃得熱鬧時候貝勒嶽托站起來對太宗説道臣請陛下下令領一旅兵隊趁今夜月色皎潔前去攻取松山城太宗搖著頭説道不可我國將士連日血戰趁今夜無事便該休養再者你也莫小覷了這座松山城我打聽得城裏明朝將士很多有洪承疇邱民仰張鬥姚恭王士禎這班大將又有總兵王廷臣曹燮蛟祖大樂帶領三萬人馬把守城池就中那位洪經略是朕心愛的聽説他是中原才子又熟悉中國政治風俗朕欲並吞中原先要説降這位經略大臣才能成功太宗説著只見帳下走出一員大臣來説道這事容易臣和松山副將夏承德頗有幾分交情如今臣親自送勸降書走進松山城去先説降了夏承德再請他幫著臣説降洪經略豈不是好太宗看時原來是貝勒多鐸不覺大喜説道吾弟肯親自去説降是大清之幸也當下修下勸降書帶了五百名兵士走進松山城去這裏太宗伸長了脖子望他直望到日落西山才見多鐸回來説夏承德頗有投降之意洪承疇卻抵死不從他説城可破頭可斷大明經略卻不可降太宗聽了皺一皺眉頭便把範文程傳來再寫一封勸降書著範文程自己送去洪經略總是個不肯降太宗一連送了六回勸降書後來洪承疇索性關上城門拒絶來使太宗無法可想只得把勸降的告示綁在箭頭上射進城去那告示上大略説道余率師至此知汝援兵必逃預遣兵出圍守松山使不得入自塔山南至於海北至於山去路俱斷又分兵各路截守被斬者尸積遍野投海者海水為紅今汝援兵已絶此乃天佑我也汝等早降決不殺死並保全汝等祿位爾等可自思之到了九月初一這一天太宗看著洪承疇沒有降意便帶領內外諸王貝勒貝子大臣們拈香拜天一面打發睿親王多爾袞肅郡王豪格回守盛京一面拔寨齊起向松山進兵傳令倘然遇見洪承疇須要活捉不可殺死還親自押著紅衣炮隊直攻松山洪承疇在城裏出死力抵敵兩軍相持不下忽見一匹馬飛也似地向禦營跑來守營兵士上前扣住馬上一位將軍跳下馬來手裏捧著文書直跑進帳去將文書送上禦案太宗看文書時不覺嚇了一大跳原來這人是來報喪的太宗的原配關雎宮宸妃已死了太宗雖寵愛莊後但宸妃和他是結髮夫婦自有一番恩愛太宗不覺大哭便立刻把兵事交給諸位貝勒星夜趕回盛京去説起這位宸妃卻也有十分姿色只是趕不上莊後那種風流體態太宗念夫妻分上也時時臨幸這莊妃看了心中不免起一點醋意此番太宗出兵的時候宸妃還是好好的不曾有一點疾病誰知太宗出兵不多幾天宸妃忽然死了當時大學士希福剛林梅勒章京冷僧機得了宸妃薨逝的消息急急進宮察看見宸妃面貌很美豐容盛鬋也不像是害病的希福剛林看了十分詫異説道皇上遠去宮裏大變倘然皇上回來問俺叫我拿什麼話回奏呢冷僧機在一旁説道這個容易我們只叫把關睢宮裏的宮女捉來審問他宸妃死的時候有什麼人在身旁我們便把那人抓來一問便可以知道了這幾句話傳到永福宮莊後耳朵裏不禁慌張起來忙打發一個小宮女出去把大學士傳進宮去一面又把睿親王多爾袞傳進宮去幾句話把一件大事化為烏有第二天多爾袞打發冷僧機出城去迎接聖駕冷僧機是多爾袞的心腹見了太宗自然有一番掩飾這裏希福剛林聽了皇后的吩咐便潦潦草草將宸妃的尸身收斂了太宗到來只看見一口棺木便也沒有什麼説的那莊皇后又怕太宗悲傷便打疊起全副精神趨奉太宗太宗有這麼一個美人陪在身旁有説有笑早把一肚子悲傷消滅得無影無蹤皇后知道太宗喜歡打獵的便哄著皇帝到葉赫部打獵去兩人談起舊情便越發覺得恩愛當夜便在篷帳裏雙雙宿下從此皇后把整個兒皇帝全霸占著卻沒有第二個人可以分寵了看看打獵到第四天下忽然見他大兒子肅郡豪格笑吟吟地走進來見了太宗便請下安去説道父皇大喜松山城已經被孩兒打下來了太宗這一喜直喜得心花怒放拉住他兒子的手坐下來問個仔細説道原是松山守城副將夏承德預先打發人來説他把守城南今夜豎起雲梯向南面爬進城來他在裏面接應到了夜裏孩兒帶了大隊人馬果然從城南打了進去當地捉住明朝經略洪承疇巡撫邱民仰總兵王廷臣曹燮蛟祖大樂遊擊祖大名祖大成等一班官員又殺死明兵三千零六十三人活捉住婦女孩童一千二百四十九口獲得盔甲弓箭一萬五千多副大小紅衣炮鳥槍三千二百七十三件請父皇快快回京安插去太宗聽了不禁哈哈大笑趕快收拾圍場回盛京去到了宮裏便有一起一起的大臣前來報告軍情太宗都拿好言安慰又吩咐不許虐待漢人準了貝勒嶽托的奏章一品的漢宮便把諸貝功的格格賞他做妻子二品官把國裏大臣的女兒賞他做妻子又特下上諭把洪承疇送到客館去好好地看待每天送筵席去請他吃又挑選四個宮女去伺侯呼喚那洪承疇原是明朝的忠臣也是一位名將如今被清兵捉來願拼一死誰知送他到盛京來太宗既不傳見也不殺他看看那班總兵官殺的殺降的降早已一個不在他身旁又看看自己住在客館裏吃的是山珍海味住的是錦被繡榻便知道清明還有勸他投降的意思他便立定主意從這一天起一粒飯也不上嘴一天到晚只是向西呆坐著太宗皇帝派人來勸他吃他也不吃勸他降他也不降後來惱了他索興把房子門關鎖起來所有一切侍從宮女都不得進去看看過了兩天洪承疇卻粒米不進這消息傳到太宗耳朵裏太宗十分憂愁對諸大臣説道倘然洪承疇不肯投降眼見這中原取不成了便下聖旨有誰能出奇謀説得洪承疇投降的便賞黃金萬兩這個聖旨一下誰不想得黃金便有許多大臣想盡方法去勸説無奈洪承疇給你個老不見面看看又到了第四天上洪承疇已餓得不像個模樣了那多鐸便把洪承疇一個貼身的童名叫金升的捉來百般恐嚇他洪經略生平最愛什麼那金升起初不敢説後來多鐸吩咐自己府裏的侍女把金升領去大家哄著他勸他吃酒又和他胡纏內中有一個侍女面貌卻長得白淨金升起初不敢説但金升看上了他那侍女便陪他睡去在被窩裏偶爾才説他主人是獨愛女色的這個消息一傳出去金鐸便奏明皇帝挑選了四個絶色的宮女又在掠來的婦女裏面挑選了四個美貌的漢女一齊送至客館裏去誰知洪承疇連正眼也不看一眼把個太宗皇帝急得在宮裏只是搔耳摸腮長籲短歎文皇后在一旁看了卻莫名其妙問時太宗皇帝才把洪經略不肯投降的事説了出來文皇后聽了微微一笑説道想來那洪承疇雖説好色決不愛那種下等女人這件事陛下放心託付在賤妾身上在這三天裏管教説得洪經略投降太宗説道這如何使得卿是朕心愛的又是一位堂堂國母倘然傳説出去卻教朕這張臉擱到什麼地方去文皇后聽了又説道陛下為國家大事何惜一皇后再者賤妾此去為皇上辦事我們夫妻的情愛仍在陛下若慮泄漏春光有礙陛下的顔面這件事做得祕密些就是了文皇后説到這裏太宗看看皇后的面龐實在長得標致心想任你鐵石人見了也要動心的便歎了一口氣説道做得祕密些莫叫他們笑我文皇后得了聖旨便回宮去換了一身豔服梳著高高的髻兒擦著紅紅的胭脂鬢影叉光真是行一步也可人意兒文皇后打扮停當便雇一輛小車帶著一個貼身宮女從宮後夾道上偷偷地溜出去到了客館裏那輛車兒直拉進內院裏裏面忽然傳出皇帝的手諭來貼在客館門外上面寫著不論官民人等不許進館那文皇后到了館裏看著那洪承疇倒也長得清秀他盤腿兒坐在椅子上已是五日不吃飯了早把他餓得眼花頭暈神志昏沈文皇后指揮宮女把他扶下椅子來放倒在炕上宮女一齊退出去文皇后爬上炕去盤腿坐著把洪經略的身體輕輕扶起斜倚在炕邊上那洪承疇昏昏沈沈起初由他的擺弄去他總是閉著眼到了這時覺得自己的身體落入溫柔鄉一陳一陳脂粉香吹進鼻管來洪經略是天生一位多情人別的事體都打不動他的心只有這女色上勾當便是在他臨死的時候也多少要動一動心況且那陳香味原是文皇后所獨有的覺得異樣蝕鼻不由他心中怦怦地跳動起來便忍不住開眼一看只見一個絶色女子明眸皓齒翠黛朱唇看著他嫣然一笑那種輕盈嫵媚的姿態真可以勾魂攝魄洪經略忍不住問了聲你是什麼人接著聽得那女子櫻唇中嗤地一笑説道好一個殉國的忠臣你死你的快莫問我什麼人洪經略聽他鶯鶯嚦嚦不覺精神一振便坐起身來説道我殉我的國與你什麼相干那女子説道妾身心腸十分慈悲見經略在此受苦特意要來救經略早日脫離苦海洪經略聽了冷笑一聲説道你敢是也來勸我投降的麼但是我的主意已定再過一兩天便可以如我的心願了你雖然長得美貌你倘然説別的話我是願意聽的你若是説勸降的話我是不願聽的快去罷那女子聽了又微微一笑把身子格外挨近些説道我雖説是一個女子卻也很敬重經略的氣節現在經力既然打這了主意我怎麼敢破壞經略的志氣呢但是我看經略也十分可憐洪經略問道你可憐我什麼呢那女子説道我看經略好好的一個男子在家的時候三妻四妾呼奴喚婢席豐履厚錦衣玉食何等尊貴如今孤淒淒一個人舉目無親求死不得雖説是只有一兩天便可以成事但是我想這一兩天的難受比前五天要勝過幾倍好好一個人吃著這樣的苦豈不是可憐那女子説著話一陳陳的口脂香射進他鼻管來洪承疇心中不覺又是一動急急閉上眼要把這女子推開哪知手臂又是軟綿綿的沒有氣力接著又聽那女子悲切切的聲音説道經略降又不肯降死又不快死如今我有一碗毒酒在此經略快快吃下去可以立刻送命也免得在這裏受苦我可憐經略這一點便是我來救經略早離苦海的慈悲心腸洪承疇這時正餓得難受聽説有毒酒便睜開眼來一看見那女子玉也似的一隻手捧著一隻碗碗裏盛著黃澄澄的一碗酒洪承疇硬一硬心腸劈手去奪過來仰著脖子往嘴裏一倒咕嘟咕嘟地一陳響把這碗毒酒呼得個點滴不留那女子便拿回碗去轉過身來扶他睡倒自己卻也和他倒在一個枕上那一陳陳的脂粉香和頭上的花香又送進鼻管來洪承疇卻只是仰天躺著閉著眼睛等死那女子也靜悄悄的不作一聲兒誰知這時他越睡越睡不熟越想死越不肯死那一陳一陳的香氣越來越濃厚洪經略每聞著這香味不覺心中一動每心一動便忙自己止住這樣子挨了許多時候洪經略覺得越發地清醒了翻來覆去地只是睡不熟那女子看他不得安睡便有一搭沒一搭地和他説些間話洪經略起初也不去睬他後來那女子問起經略府上有幾位姨太太哪位姨太太年紀最輕面貌最美洪經略聽了這幾句話便勾起了他無限心事心中一陳翻騰好似熱油煎熬一般難受又聽那女子接著説道經略此番離家千裏盡忠在客館裏倒也罷了只是府上那一位美人兒從此春花秋月深閨夢裏想來不知要怎麼難受呢洪經略聽到這裏早已撑不住了哇的一聲轉過身來對著那女子抽抽咽咽地哭個不住那女子打疊起溫言軟語再三勸慰著要知洪經略性命如何且聽下回分解
