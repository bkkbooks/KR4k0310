body:
  text: 第十三回被底紅顔迷降將腔中熱血贈知人卻説英明皇帝待招降書送去以後便要準備攻城範文程悄悄地奏道這撫順城池高深一時不易攻克況且招降李遊擊的書信送去一時不得他的回信我們也不能便下攻擊之令依下臣愚見暫退兵至十裏以外在深山樹林中藏著城中百姓見我兵馬退去自然照常開門做買賣我們派五十名細作混進城去於中取事豈不輕便英明皇帝聽了他的話便下令兵退十裏悄悄地去深山樹林中藏躲著撫順遊擊官見敵兵去遠了便吩咐開城依舊開市做買賣那時有一位千總名王命印的見開了城門怕建州兵馬再來便去對李遊擊説還是關上城門罷李永芳説我們撫順百姓全靠開市度活倘然閉城停市那人心越發慌亂了王命印又説開了市場怕姦細容易混入李永芳不聽他的話依舊天天開著市場從此滿漢人民在城門口進進出出也沒有人查問過了七八天大家也忘了建州兵馬忽然一聲呐喊建州的兵馬著地和狂風似地卷來那把守城門的慌慌張張把城門關鎖起來便有許多滿人鎖在城裏一霎時外面駕起雲梯箭如飛蝗地射進城來李永芳在城樓上督促兵士放箭又把許多木塊石塊打下城去正忙亂的時候忽見西面火起他爭跳上馬向西門跑去才到西城那東城又火起了急轉過馬頭向東城跑去看看快到東城那南城北城又同時起火了他知道城中有了姦細悔不聽王命印之言致有此失李永芳急向自己衙門跑去到了衙門口只見裏面人聲雜亂火光燭天他仗著一柄大撲刀搶進門去才跨一步腳下一根繩子一絆一個倒栽蔥倒在地下門角裏跳出十多個大漢來上去按住拿繩子綁上了擡去關在一間暗室裏耳中只聽得人聲鼎沸喊殺連天直到半夜裏才安靜下來李永芳也便昏昏沈沈地睡去到天明時候外面走進四個滿州兵來把他拖出屋子去李永芳擡頭一看那英明皇帝坐在上面兩旁站著文武官員皇帝傳旨下來叫他投降李永芳開口大罵不肯投降停了一會外面把許多尸首擡了進來李永芳看時認得是千總王命印和一班將辨的尸首內中還有李永芳妻子的尸首李永芳看了不禁號啕大哭皇帝又傳諭下來勸他不必悲傷你妻子是遭城中亂兵殺死的並不是滿洲兵殺死的如今皇帝看你妻子死得可憐便著人預備上等棺木收殮一面吩咐把陳氏尸身停放在大堂不一時果然有許多人拿了上等的衣服棺木來收殮他妻子收殮停當皇帝又吩咐文武官員上去祭奠這一來把個李永芳的心軟化了一半兩個兵士上來替李永芳松了綁又設下酒肉請他吃李永芳這時肚子十分飢餓見了酒肉不由不吃他一邊吃著一邊想到我吃便吃投降卻不投降看他們拿我如何處治他放量吃了一個飽誰知吃完了便兩眼朦朧昏昏沈沈地睡熟了第二天早晨李永芳醒過來一看見自己睡在炕上眼前燈燭輝煌床頭錦衾香軟一個美人兒和他並頭睡下他是滿州打扮髻兒高高的鬢兒低低的壓在那粉脖子上面越顯得黑白分明兩道彎彎的蛾眉眉梢斜浸在雲鬢裏兩腮胭脂紅得可憐一點朱唇鮮豔動人那美人兒看他呆呆地向自己打量著便嗤地一笑把被角兒遮住自己的粉臉兒看他身上穿著一件銀紅小襖越顯得腰肢婀娜李永芳心中一動正要用手前去推開他忽然阿喲一聲伸手向自己頭上一摸那頭髮剃得光光的只頭頂上挂著一條大辮子李永芳不由得歎了一大口氣淌下眼淚來只見那美人又從被窩裏坐起身來低聲軟語地勸慰他李永芳問他你是什麼人怎麼和我一被窩睡著那美人撲嗤一笑説道你看這大呆子俺倆既做了夫妻怎麼不睡在一個被窩裏你問我是誰我説出來時怕不要嚇破你的膽我不是別人便是那當今皇上七太子阿巴泰的大公主呢李永芳聽了果然嚇了一跳從被窩裏跳起來直挺挺地跪在炕下公主笑著忙拉他起來一面喚著侍女來服侍附馬穿戴起來看他居然穿著袍褂靴帽紅頂花翎一會兒那公主也打扮齊整雙雙出去謝過皇上皇上聖旨下來拜李永芳做撫順總兵官專管撫順一帶的漢人這時左翼人馬也在撫順會合一連打破了撫安花豹三岔各處又派兵進鴉鶻關圍清河城五日五夜打破了大軍回來又過撫順城把城牆拆毀了出關來人馬齊集甲板地方大小將士齊來獻功這時虜掠了許多金銀人畜皇帝一齊賞了兵士們又捉得關上做買賣的山東山西江南蘇州杭州各地生意人皇帝吩咐多多地給他們盤纏放他們回家去英明皇帝親自押陳各貝勒大臣隨駕隨從看看走到謝裏甸的地方傳令駐營忽然探馬報説後面明廣寧總兵張承蔭遼陽副將顧廷相海州參將蒲世芳領兵一萬追趕前來英明皇帝聽了微微一笑説道這班貪生怕死的奴才俺大軍到時他們躲到哪里去了如今候俺出了關卻又來追趕這明明是裝幌子哄他主子的我量他來也沒有勇氣的孩子們快快去殺他一陳一個號令傳下去大貝勒和四貝勒各帶本部人馬直殺上去那巴克什額爾德尼令另外兩貝勒也帶了兵馬前去策應張承蔭見滿洲兵來勢洶湧便靠山分扎中左右三營開掘壕溝排列大炮那八旗兵個個奮勇攻上山來火炮下去山下兵馬死了不少正相持時候忽然西南角起一陳狂風飛沙走石直向明朝兵營打去大貝勒呐一聲喊搶上前去見人便砍見馬便射四貝勒也向山南奮力地攻打上去正在血戰的時候忽然山後金鼓大震巴克什額爾德尼令另外兩貝勒的人馬又從明兵的後營殺來把張承蔭的兵隊擠在半山裏進退兩難四百滿兵把包圍在核心可憐張承蔭顧廷相蒲世芳和遊擊梁汝貴等五十員戰將都死在亂箭下那殘兵敗將向四面山下逃去滿兵追殺四十多裏才止住這一場殺四位貝勒獲得戰以九千匹盔甲七十副兵仗器械不可勝數他們一路唱著凱歌回到大營英明皇帝給他們在營裏大開慶功筵宴這且不去説他話説明朝神宗皇帝看著國弱民貧百官偷情心下十分憂慮忽然接到建州入寇撫順失守李永芳投降鄒儲賢死節的消息不由得驚慌起來立刻傳諭升勤政殿召見六部臣工那兵部侍郎楊鎬出班奏稱建州夷人努爾哈齊久有反意臣前任遼東巡撫時一再奏陳無奈那時李成梁一味敷衍我朝又因軍餉缺乏遇事因循到如今鬧成這不可收拾的局面依臣愚見現在建夷自稱可汗屢次寇邊他目中久無天朝可想而知為今之道我朝非大發兵馬痛痛地剿伐他一下不可但出軍關外非尋常戰事可比必然要選熟悉關外人情地理的才可以去得據臣所知有老將李如柏罷職多年求皇上下旨徵召他起來授他遼東統兵之職又有杜松劉綎劉遇節馬林麻崖賀世賢等都是深明關外情形的請陛下調進京來一一委任他大小各職跟著李如柏帶兵二十四萬出關去實力征剿至於出軍之路愚臣也早有計劃約分大軍為四路可令杜松及劉遇節等統兵三萬從瀋陽出撫順關沿渾河左岸入蘇子河之河谷可令馬林和麻崖等會合葉赫部的援軍一萬五千人從開原鐵嶺方面出三岔兒入蘇子河一帶可令李如柏和賀世賢等統兵二萬五千沿太子河出清河城從鴉鶻關入興京老城可令劉綎帶兵一萬會合朝鮮援軍一萬從寬甸出佟家江一帶入興京老城的南面另委統兵大員帶領大軍駐扎瀋陽遙為策應這是進退兩利一網打盡之策望陛下採納楊鎬奏罷退回原班兩旁官員見他洋洋灑灑説了一大篇他們也沒得別的説了皇帝便傳旨退朝楊鎬回到家裏自有一班同僚前來探望第二天果然宮裏傳下聖旨來拜楊鎬以兵部侍朗兼遼東經略使駐扎瀋陽為四路總指揮官其餘李如柏等都依了楊鎬的原奏各個加上這銜跟著大軍出關去征伐建州夷人那兵士和糧餉都從福建浙江四川甘肅各省四處搜刮來的可憐自從萬曆四十六年四月下了這道征奴的上諭直到第二年二月才得雜湊成軍大軍開拔的這一天楊鎬傳集人馬在大校場聽點劉綎是先鋒官早在將台伺候楊鎬騎馬到了大校場一看那四處八方來的人馬號令不一服式也不一樣零亂散雜他心裏老大不高興回想到國家府庫艱難也是沒有法子的事件當下他略略檢點一過傳令祭旗劉綎走到帥旗腳下一頭牛捆綁在地他手下兵士見先鋒官到來便拔刀斫牛連砍三刀那牛頭才落下來劉綎心想如此笨拙的兵器如何出關去與建州夷人廝殺當下勉強把旗祭起楊鎬便把大軍分作四路分派停當暫回府中住宿楊鎬的夫人聽説丈夫要帶兵遠征心下有説不出的悽惶當日便備了一桌酒席在內堂替丈夫餞行説起建州夷人萬分強悍此去不知勝敗如何那夫人和如夫人公子小姐都淌下淚來楊鎬忙喝住了説些間話舉家正憂悶的時候忽然二門上的家人跑來回説外有劉將軍請見楊鎬問明是劉綎心想我們才在校場上見過面如今他又有什麼緊要公事呢一面想著一面走出去那劉綎見了楊鎬劈頭第一句便問道大帥看我們的軍隊可用得嗎楊鎬聽了不覺歎了一口氣説道這也是沒法的事體劉綎説道大帥要知道此番出師不是兒戲的事體像這樣雜湊的軍隊末將怕是靠不住依末將的意思求大帥奏明皇上另練新軍二三萬人歸末將統領教練一年便在徑旅那時不用勞師動從便是末將一人也可以抵住那建夷十萬人馬楊鎬聽了又歎了一口氣舉起一隻手來在劉將軍肩上一拍説道老弟你還怕不知道吧如今國庫如此空虛滿朝站的又大半是姦臣便是這雜湊的軍隊也是經過八九個月才得召集成功哪里又經得起將軍去另練新軍不用説國庫裏拿不出這一宗軍餉便是這一年的耽擱那建州人怕不打進關來麼事到如今也是沒得説的了老弟你看在下官面上出去辛苦一趟吧劉綎原是一個血性男子聽了楊鎬這一番話便站起來拍著胸脯説道元帥既這樣説末將拼著一條性命結交皇上和元帥罷了但是劉綎説到這裏覺得又是礙嘴不好意思説下去楊鎬聽了便追著他問道但是什麼一看那劉綎已是掉下眼淚來了楊鎬心裏明白便拍著胸脯説道老弟放心怕此番出軍不利老弟身後的事有下官替你料理劉綎忙上前跪下來説道這樣請元帥受末將一拜楊鎬也跪下去答拜説道俺二人拜做兄弟罷站起來兩人拉著手淌著淚劉綎説道末將益發連家小的事也託付大哥了楊鎬心下萬分難受回心一想大軍未發先為此痛哭起來它不是不祥之兆嗎忙止住了哭索性拉他到內堂去拜見夫人留他坐下喝酒第二天楊鎬先把劉綎的家小取進府來一塊兒住著一面催促大軍浩浩蕩蕩殺奔關外去了看看到了瀋陽楊鎬傳集大小將領商議軍事探馬報來説金國皇帝親帶八旗兵丁每旗七千五百人約有六萬大軍已離我軍不遠楊鎬聽了便拔下一支令箭令馬林等帶領本部人馬會合葉赫援軍約一萬五千人從開原鐵嶺方面出三岔兒入蘇子河一帶擾他南面只許混戰不許對壘引他深入南方便立了第一功馬林得令去了第二支令箭傳劉綎上帳説道你帶領一萬人馬會合朝鮮一萬援軍從寬甸出佟家江一帶入興京老城南面你打聽得西路兵開仗便從東路猛攻斷其歸路劉綎得令去了第三支令箭傳李如柏上帳來説你帶領二萬五千人馬沿太子河出清河城從鴉鶻關直搗興京巢穴三路兵中你這一路道途崎嶇最不易走你卻須晝夜趕程路上不得停留早到興京便是你的第一功第四支令箭喚杜松和劉遇節上帳説道你二人帶領三萬人馬從瀋陽出撫順沿渾河左岸入蘇子河河谷抵當敵軍正面須穩扎穩打打聽得南面軍隊開戰才許你動身猛力攻打不得有誤杜松諾諾連忙領了將令去了這裏楊鎬修下戰書打發人速到興京去一面派遊擊使安仁沿路催督糧草偵探敵情卻説四路兵馬馬林一路行得最快英明皇帝大軍正向界凡山進發忽然探馬報説南面蘇子河一帶隱約見明軍旗幟此外西北東三面卻不見敵軍諸貝勒大臣聽了齊對皇帝説道我軍向西直進如今敵軍卻從南面橫沖過來以我中軍擋敵人前鋒怕為兵家的忌請陛下下令大軍速速改向南方進行為是英明皇帝聽了衆人的話遲疑了一會説道請軍師上帳那範文程聽皇帝傳喚忙走進中軍營去皇帝見了軍師便把上項情形説了一遍範文程略略思索了一會説道依臣愚見我軍且莫向西也莫向南暫時扎營在此再聽後報皇帝聽了點點頭傳令下去大軍立刻扎住營頭休得行動一面多派探馬四處去偵察敵情速速回報六萬大軍正走得急迫忽然下令停住把個先鋒官扈爾漢急得搔耳摸腮説敵人已在前面俺們趕快趕上去迎頭痛痛地打他一仗豈不是好俺們既不斷了腿又不害什麼病好好的怎忽然在這裏前不巴村後不挨店地站住了養起力來了呢諸貝勒聽了哈哈大笑起來看看大軍駐扎著今天不走明天也不走後天又不走急得那大小將辨背地裏都罵鳥軍師到了第四天上四處探馬都報到説道北路上有一文明朝人馬沿太子河正向清河城進發東路上也有一支人馬從寬甸進發西路上有一支明朝人馬從渾河一帶荒僻小徑而來獨有南路上一支人馬從開原鐵嶺方面晝夜兼程搖旗呐喊而來英明皇帝聽了便問軍師這四路人馬來得何意範文程微微笑著説道清河城一路兵馬直攻興京雖是十分緊要但是那路途崎嶇行軍十分遲緩目前興京決不有礙那東路上的兵馬原是打算攻我軍的背後但是我們前鋒倘然能夠得勝那東路的兵也不戰自退了至於西南兩路的兵馬驟然聽去覺得南路的敵兵來得急迫但是臣料定他南路的兵馬決不是主要軍隊這是他們伏下的疑兵引誘我們向南走去越走越深他卻用全力從西路直撲我的後陳那時我們腹背受敵那東北兩路兵馬便直搗興京叫我們顧此失彼如今我們偏不中他的計請陛下傳令只用五百名兵士在南路上險要所在拉住敵人的疑兵在樹林深處多插旗幟他自然不敢前進了陛下自統八旗大軍直攻撫順這一路是明朝的主力軍隊西路一破那三路人馬不戰自降矣範文程説話時候許多貝勒大臣圍著他靜靜地聽聽到這裏那扈爾漢跳出班來舉手伸著一個大拇指説道先生好妙計回頭一看見英明皇帝坐在上面他忙爬下地去磕頭謝罪要知範文程的計算錯也不錯再看下回分解
