body:
  text: 第四十回獄中回婦深夜被寵宮裏天子靜晝竊聽卻説皇太后見乾隆皇帝為了想念香妃弄出一身病痛來他心中十分不忍只因沒有機會不好下手把香妃弄死他和宮中太監早已預備下計策這一天趁皇帝住宿在齋宮裏便派一個總管太監到西內去把香妃和服侍香妃的宮女太監們一齊傳喚了來先盤問宮女香妃如何進宮皇上如何看待他香妃進宮時帶了多少奴婢器物皇上又賞過他多少珍寶衣物皇上和香妃見過幾回面見面的時候皇上説些什麼香妃説些什麼香妃平日在宮裏做些什麼事説些什麼話皇上可曾親近過香妃的身體香妃可有感激皇帝的話或是惱恨的話細細地問過一番那宮女也一一照實地奏明瞭太后太后吩咐宮女女站過一邊又把香妃傳進宮來那香妃一走進屋子滿屋子的人見了他的容顔都吃了一驚皇太后回過頭去對富察皇后笑著説道長得妖精似的怪不得俺們皇帝被他迷住了那香妃見了皇太后和皇后也不下跪只低著頭站在一旁皇太后第一個開口問道你到俺們宮中來皇上用萬分恩情看待你你知道感激麼那香妃聽了冷冷地説道俺不知道感激皇上俺只知道痛恨皇上皇后説道你為什麼要痛恨皇上那香妃説道俺夫妻好好的在回部皇上為什麼要派兵來奪俺土地殺俺酋長殺俺酋長也罷了為什麼要弄俺進京來弄俺進京來照俘虜定罪一刀殺了也便罷了為什麼獨不殺俺又把俺弄進宮來把俺弄進宮來也罷了那皇上為什麼要時時來調戲俺香妃説到這裏不覺氣憤填膺只見他柳眉倒豎杏眼圓睜粉腮上顯出兩朵紅雲來那容貌越發美麗了皇太后聽他説到皇上調戲一句話不覺微微一笑説道依你現在的意思打算怎麼樣那香妃説道太后若肯開恩放俺回家鄉待俺召集丈夫的舊部殺進京來報了俺丈夫的仇恨太后聽了忙搖著手道這是做不到的你休妄想香妃接道説道不然仍舊放俺回宮去待有機會刺死了皇帝也出了俺胸中的怨氣皇后聽了忍不住惱恨起來喝道賤婢皇上什麼虧待了你你卻要下這樣的毒手太后忙攔住皇后道俺們且聽他再説些什麼那香妃又説道再不阿只求太后開恩賞俺一個全尸保全俺的貞節罷他説著淌下淚珠來撲地跪下地去連連磕著頭求著太后看了心下也有些不忍便點著頭説道看這孩子可憐俺們便依了他的心願罷皇后也説太后説的是太后一面吩咐把香妃扶起一面傳進管事太監來命他把香妃帶出去吩咐侍衛拉出去在月華門西廂房裏勒死賜他一個全尸罷好香妃聽了太后的諭旨忙爬下地去磕了三個頭謝過恩轉身跟著太監出去了那兩旁站著的宮女內監們個個忍不住掉下淚來第二天等到皇帝回宮得到這個消息趕快搶到坤寧宮去救時已經來不及了太后見了皇帝便拉著他的手把好話勸説一番又説那回回女子存心狠毒倘然不勒死他早晚便要闖出大禍來到那時叫我如何對得住你的列祖列宗呢如今那回回女子也死了你也可以丟開手了你看你自己這幾天為了他消瘦得不成樣兒了我的好孩子快回宮去養息養息罷皇帝被太後説了幾句倒也不好説什麼只得退出宮來悄悄地拉著一個太監問他香妃的尸首停在什麼地方那太監悄悄地把皇帝領到月華宮西廂房裏皇帝一見了香妃的尸身忙搶過去抱住了只説得一句朕害了你也那眼淚和潮水一般地湧了出來香妃的衣襟上被濕了一大塊慌得那太監跪下來再三求皇上回宮那皇上哭夠多時又仔細端詳了一會香妃的臉面又親手替他捺上了眼皮説道香妃香妃我和你真是別離生死兩悠悠乾隆皇帝還怔怔地站地尸身旁邊不肯走經不得那太監一再催請便從尸首上勒下一個戒指來縮在袖子裏走出屋子來把月華門管事的太監傳喚過來吩咐他用上好棺木收殮須揀那風景山勝的地方埋葬下那太監連稱遵旨悄悄地和內務府商量買了一口上好的棺木把香妃生前的衣服替他穿戴了偷偷地擡出宮去在南下窪陶然亭東北角上堆了一個大冢冢前豎一方石碑上面刻著香冢兩個大字碑的陰面又刻著一首詞道浩浩愁茫茫劫短歌終明月缺鬱鬱佳城中有碧血碧亦有時盡血亦有時滅一縷香魂無斷絶是耶非耶化為蝴蝶這首詞兒是乾隆皇帝托一拉翰林院編修做的刻在碑陰表明他終古遺恨的意思這座香冢直到如今還巍然獨存凡遊陶然亭的見了這座孤墳人人都要替當年的香妃灑幾點熱淚這都是間話如今且不去説它且説乾隆皇帝自從香妃死了以後心中十分煩悶看看那香妃留下來的戒指物在人亡由不得他要掉下淚來他住在宮中任你那班妃嬪宮女如何哄著他玩他總是難開笑口幸得福康安常常進宮來乾隆皇帝見了他任你有萬千擔愁恨也便丟開了福康安陪著皇帝在宮裏有時下一盤棋有時吃一杯酒説説笑笑倒也消遣了歲月看看過了殘冬已到新春乾隆皇帝慢慢地把憂愁忘了有一天睡到半夜忽然又想起香妃來了因想起香妃猛記得還有去年那個回酋霍集占夫妻兩人到如今還關在刑部監獄裏那霍集占的妻子卻也長得俊俏動人那時只因一心在香妃身上便把他忘了如今我何不把那女子喚進宮來玩耍一番也解了我心中之悶當時乾隆皇帝立刻吩咐管事太監到刑部大牢裏把霍集占的妻子須在五更以前提進宮來太監奉了聖旨也不知皇上是什麼意思便飛馬趕到刑部大堂裏一疊連聲催提人這時已夜靜更深所有值堂的侍郎郎中早巳回家去了那值夜的提牢司員正在好睡忽聽得外面一疊連聲地嚷著接旨把那司員嚇得跳下床來披著衣服趿著鞋子一面發顫一面説道吾輩官小職微向來夠不上接旨的身份這但如何是好那太監大聲説道沒有旁的事你只把牢門開了把那回回女人交給俺帶去便完了那司員聽了越發嚇得他把雙手亂搖説道堂官不在衙門裏在這半夜三更開放牢門倘有疏忽叫俺這芝麻緑豆似的小官如何擔當得起那太監急了連連跺著腳説道好大膽的司員有聖旨到來你還敢不奉旨俺問你有幾個腦袋那司員越聽越害怕嚇得也哭了後來方得一個提牢小吏想出一個主意來説道俺們不開牢門又扭不起抗旨的罪在這半夜三更開了牢門卻又擔不起這風火此時沒有別法只得請公公暫等一等俺們把滿尚書請來接旨得他一句話俺們便沒事了太監到了此時也沒有法想只叫他們快去把滿尚書請來這司員答應了一聲飛馬跑去打開了滿尚書的門把這情形説了滿尚書聽了一時也摸不著頭腦只得慌慌張張跟著司員到衙門裏來接了聖旨驗看了朱印並無錯誤立刻打開牢門把那回回女子從睡夢中提出來當堂驗過交給內監那內監早已把車輛備好悄悄地送進宮去皇帝這時正擁著被窩等著那回回女子在大牢裏昏天黑地地關了大半年自問總是一死的了忽然在這半夜三更把他提進宮去他也糊塗了宮女推他跪在皇帝榻前嚇得他低著脖子跪在地下只是索索地發顫皇帝喚他擡起頭來雖説他蓬首垢面卻也俊俏嫵媚皇帝命宮女傳敬事房太監來那太監專伺候皇帝房事的得了聖旨便來把回婦拉進浴室去替他上下洗擦宮女替他梳妝一番赤條條地扶他盤腿兒坐在一方黃緞褥上幾個太監把褥子的四角一提送進皇帝的臥室去皇帝看時見他容光煥發妖豔冶蕩也不在香妃之下但把他扶上榻去臨幸了
