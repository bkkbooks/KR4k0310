body:
  text: 第二十七回劫民婦暗移國祚逋國師計害儲君卻説小如意奉了皇帝的旨意盯在這家門口候著打聽得那婦人的丈夫姓衛原在驢馬大街開一爿布莊今天這婦人回娘家來探望母親他丈夫原是十分愛妻子的叮囑當晚須回家去的小如意便買通了那趕車的答應派他到宮裏當一個小差官那趕車的十分歡喜到了時候那婦人辭別母親出門上車小如意也雇了一輛車偷偷地跟在後面兩輛車子一前一後直趕宮門去在禦苑後門下車那婦人下車來看這樣闊大的地方不覺嚇了一跳小如意上去説明原故又説倘得皇帝寵幸你丈夫也同享富貴這婦人原也十分貞節坐在車廂裏的時候看見皇帝人物軒昂便有幾分意思了如今説是萬歲爺他如何不願意當時跟著小如意走進禦苑去在絳雪齋拜見萬歲皇帝見了這婦人歡喜得忙上去伸手拉了起來小如意忙避去當夜便在絳雪齋留幸一連十天不出齋門聖旨下來把這婦人封做衛妃他丈夫衛光輝也召進宮來賞做禦前侍衛官他夫妻兩人瞞著皇帝常常在暗地裏見面這位衛妃身上有一種甜膩的香味人聞了這香味不覺心動起來衛妃走過的地方那香味常常留著不散他人不曾到跟前便遠遠地聞得這一股香味他穿過的裏衣香味十分濃厚便是洗也洗不去的洗浴剩下來的水一陳一陳發出香氣來宮女們也不捨得倒去因此皇帝格外寵愛稱他做香美人誰知衛妃進宮來不上七個月便生下一個孩子來長得肥頭胖耳哭聲十分洪亮皇帝十分喜愛因和衛妃交情深厚便有立他做太子的心取名胤禛便是後來的雍正皇帝這時宮女們得皇帝臨幸的很多生的兒子也很多康熙皇帝一共生了三十五個兒子衛妃怕將來弟兄爭位自己的兒子當不上太子因此常常在皇帝跟前懇求皇帝嘴裏雖然答應只因胤禛年小打算過幾年再説康熙皇帝盡幹些風浪事體這幾年便把朝廷大事盡托給幾個顧命大臣諸位大臣中有一個叫鼇拜的最是姦惡他仗著是先皇的老臣便當面吆喝著皇帝皇帝倘然稍稍辨論他便氣憤憤地説要辭職不幹了私地卻招權納賄結黨營私有一天鼇拜強逼著皇帝要封他為祖宗做鎮國公皇帝不肯鼇拜便氣憤憤地説道臣受了顧命的重托求一個封誥也做不到還做什麼大臣呢説著一摔手要出殿了這時候有一個老臣名叫瑪尼哈特的在一旁冷笑説道貴大臣開口顧命閉口順命請問可有先帝的手詔來鼇拜聽了便反問他道貴大臣敢是得到先帝的手詔來那瑪尼哈特點點頭不慌不忙地從袖管裏拿出一張手詔來皇帝看時果然是先帝的手筆下面還蓋著禦印上面寫著顧命大臣只有瑪尼哈特一個人的名字皇帝大怒喝令禦前侍衛把鼇拜拿下吩咐發交刑部審問他冒充顧命欺君罔上的罪接著便有許多禦史上奏章説鼇拜犯有二十大罪皇帝聖旨下來立刻綁到菜市口去正法皇帝殺了鼇拜便想起自己應該早立太子免得日後受大臣欺弄想起太子的事體便也想起衛妃的説話又想起自己有三十五個皇子倘然立皇子胤禛又怕衆皇子不服依理胤禛年紀最大自然該立為太子只因自己寵愛衛妃不忍心違背他的意思皇帝一路著想不覺已到了翠華宮衛妃出來接駕走進內院去見架子上有兩支雕籠籠裏面關著許多白色老鼠一籠約有二百隻皇帝問時衛妃奏稱是暹羅國進貢來的皇帝見了這兩籠鼠子便想起方才的心事便吩咐把二皇子和四皇子喚進宮來停了一會二皇子胤礽四皇子胤禛奉召進宮皇帝要看看他二人的心術便把這兩籠鼠子賞給他二人兩位皇子捧了籠子謝恩出宮第二天皇帝打發自己親信的內監悄悄地到兩位皇子宮裏去打聽那內監來回奏説二皇子回宮後把一籠鼠十一齊放了説是關在籠子裏多麼不自由看著怪可憐的不如放了它的生命吧四皇子回宮後把二百隻鼠子分作三隊教它們仗有不聽號令的便殺死玩了一天那二百隻鼠子被皇子殺得一個不留皇帝聽了心下十分厭惡胤禛便有立胤礽為太子的心暗地裏把大學士明珠喚來和他商量那明珠原是胤礽的黨當時竭力慫恿立二皇子為太子康熙皇帝心裏便打定主意隔了幾天一道上諭下去説立二皇子胤礽為皇太子一面把胤礽搬進東宮去住滿朝文武各個上奏章來祝賀皇帝便在崇政殿中賜宴這邊東宮裏正十分熱鬧那邊翠華宮裏衛妃母子兩人卻十分淒涼暗暗地把侍衛官喚進宮來商量姓衛的説道俺夫妻倆好好的過著的日子自從你讓那昏君搶進宮來我原想行刺的因你肚子裏已有五個月的胎兒生下兒子來倘然傳位給他那時我的兒子做了皇帝我便暗暗地做了皇父如今我兒子既做不成皇帝我便另打主意總叫他做到皇帝才罷接著又商量了半天衛妃便把胤禛喚出來哄著他跟姓衛的出宮去玩耍這姓衛的把胤禛帶出宮去住在自己家裏暗暗地把宮裏的喇嘛和尚請來傳授他練氣符咒的本領又請了許多教師在院子裏搬弄刀槍比演弓箭還有什麼外五行內五行種種拳法胤禛到底是孩子氣覺得好玩便天天偷出宮來練習又因胤礽做了太子心不甘服預備練成了本領將來和哥哥搶奪皇位他在宮裏暗暗地把這個意思對他弟兄胤禔等八個人説了他們也滿肚子懷著怒恨聽了胤禛的話便個個摩拳擦掌跟著胤禛練武藝去準備將來廝殺這個風聲傳到胤禔胤示我胤禟耳朵裏便也另立了一個機關背地裏請著鏢局裏的鏢師傳授武功這個風氣一開那江湖上的好漢便一齊投奔了來胤禛仗著母親衛妃的照應從大內裏拿出銀錢來所以胤禛門下請的好漢獨多有什麼獨臂金剛鐵腿李攪海蛟瘋和尚種種奇怪的名氏外面鬧得天翻地覆那宮裏的康熙皇帝和胤礽太子正睡在鼓裏康熙這時從五臺山請來一位妙算和尚他經通經典善於説法康熙帝請他住在瀛台淨室裏天天説妙法蓮花經心中頗有領悟這時太子胤礽也跟著大學士明珠講究文學那明珠相國雖是皇室內親卻不通文墨的只因生性狡黠從部曹微職直升到大學士官知道皇帝和太子都注重文學便暗地裏招納了許多文人供養在家做了許多文章冒充是自己做的獻進宮去皇帝和太子十分稱讚明珠便勸皇帝趁此做幾件文學上的事業為萬世留名當時便有文武大臣張英魏裔介一班人奏請開設修書館明珠和這班文臣原是通同一氣的在皇帝跟前慫恿著皇帝便下旨設修書館詔請四方文人編撰康熙字典子史精華佩文韻府這一類書明珠的兒子納蘭容若常到修書館裏去見有才學並茂的讀書人便多送金錢請進府去替他父親做著槍手有一天明珠陪著康熙帝在西書房間説説起莊子南華經裏一段故事皇帝便喚內監取南華經來那內監錯拿了道德經皇帝跺著腳罵道蠢蟲又對明珠説道這班蠢物真是討厭從來説的紅袖添香夜讀書多麼有趣朕想那添香的女孩兒決不是這樣粗魯的朕很想選幾個良家閨女懂得詩書的進宮來做女官專管朕書房裏的事務豈不很好明珠聽了這個話回家去立刻打發家人到蘇杭一帶去揀那小家女孩兒面貌清秀不曾纏足的用重價買來養在自己別墅裏請一位老先生教會詩書那班女孩兒都是十三四歲原很聰明的不上三五年詩詞歌曲吹彈歌舞樣樣都會那班女孩兒也有十七八歲了一個個出落得體態苗條舉止輕盈內中有嬌杏新梅菁桃麗鳳四人長得越發清秀嬌豔好似四支水蔥兒明珠看在眼中打算把這四個女孩兒先送進宮去不知什麼人討好把這個消息傳進相國夫人耳裏説主人娶了三十六房侍妾在西城外別墅中日夜取樂那位相國夫人原是得寵的姨太太扶正的醋徑最大聽了這個消息如何耐得便也不問仔細立刻套車趕到別墅裏去明珠不在別墅中只有一位老先生帶領三十六個女孩出來拜見相國夫人看時個個都長得如嬌花弱柳便也不動聲色吩咐老先生退去喚著那班女孩兒一個一個到跟前來問話相國夫人留心看時有十二個女孩兒長得最是惹眼便吩咐把這十二個女孩兒留下立刻擺上一桌庭席來請他們喝酒那女孩兒都是天真爛漫的知道些什麼見夫人賞酒便也説説笑笑地吃個飽夫人看他們吃完了酒便上車回府去大家見夫人忽來忽去也不怒罵也就説笑十分詫異誰知到了第二天一早那十二個吃酒的女孩兒一個個直挺挺地躺在床上死了新梅麗鳳嬌杏菁桃四個人也不能逃這個劫數明珠相國知道了也只得歎了一口氣悄悄去埋葬了事把剩下的二十四個女孩兒一齊放回家鄉去從此相國和他的夫人情分愈惡相國終日和門客們吃酒做詩也不進內宅去有時東宮召他進宮去談論文學那時明珠和一班文人做伴也懂得些風雅的家數太子和他十分要好常常把他留在宮裏那時有一位雲貴總督范承勳進京來陛見見皇帝和太子都成了兩個書呆子便上了一本奏章説本朝以馬上得天下子孫不宜棄置武功康熙帝原來很敬重範承勳的當下看了他的奏章便立刻傳旨在暢春苑柳堤練習騎射那時太子和胤禛胤轑胤禵胤禟胤示我一班皇子都站在父皇跟前候旨皇帝下旨命太子和皇子一一比射又比各項兵器內中要算胤禛本領最強那太子胤礽卻十分文弱刀槍固然不高明連那三箭也是一箭射不中後來許多皇子在柳堤上賽馬太子依然落後皇帝看了十分生氣把教太子武藝的師傅傳喚過來當面訓責了一番那師傅十分羞漸便是太子也覺得臉上沒有光彩回到東宮同許多師傅商議有一個內監將打聽得胤禛胤示我在外面私立機關練習拳棒的事體告訴太子太子十分驚慌便有一個師傅説不如把西山喇嘛請來太子學著符咒祕法又請天下勇士來傳授十八般武藝太子聽了十分合意立刻在東宮裏收拾密室和圍場來天天跟著喇嘛僧和拳教師在裏面練習著一面又打發人到江湖上去探訪俠客武士願多送金銀把他請進宮來因此北京地方那好漢愈聚愈多常常在大街上吃酒鬧事地方官知道了也不敢去管他正在這個當兒忽然衛妃死了康熙帝固然十分悲傷便是那姓衛的也覺得淒涼他便退出宮來和胤禛早晚謀劃陷害太子的計策康熙皇帝死了衛妃住在宮裏十分乏味雖一般有三宮六院的妃嬪陪伴著但他們怎及那衛妃的萬一便終日長籲短歎寢食不安他因想念衛妃便又想起了父皇這時衛妃的棺木運到關外去埋葬皇帝不忘舊情便借進謁福陵的名義送著衛妃的棺木到山海關去埋葬親自督看墳土葬事既了皇帝也不願回宮便下旨南巡聲稱問民疾苦又下旨命太子胤礽監國自己帶領文武大臣和王公貝勒揀定康熙二十三年九月初一日起程出京當時有大學士張英內大臣覺羅武默訥率領滿朝文武恭送禦駕此次巡遊皇帝下旨所過各處州縣照常辦事勿辦供差不遵旨的便革職問罪因此皇帝坐了幾隻平常民船悄悄地一直開到五臺山腳下坐轎上山到清涼寺停下把個清涼寺的主持嚇得屁滾尿流忙接駕進去在方丈室坐下內監預備香燭請皇帝拈香皇帝拜過了佛便問久聽得寺裏有一位高僧現在何處那主持回説在最高峰茅舍裏打坐所有往來檀越他都不見皇帝説道朕必要去見一見康熙便吩咐侍衛內監一概留在寺中獨自一人帶著一個小沙彌領路山路左盤右旋腳下七高八低好不容易爬到山頂上把個皇帝纍得氣急汗流在大樹下略站一會見危崖上一座茅舍皇帝便慢慢地踱進屋去有一個僮兒出來問話皇帝也不答他問小沙彌高僧住在哪間屋裏小沙彌指著右邊一間耳屋皇帝走進房去只見一個鬚眉皓白的和尚垂著眼盤著腿坐在禪床上皇帝對他怔怔地看了半天忍不住心中一動搶上前去喚了一聲父皇雙膝跪倒那和尚睜開眼來一看隨即閉上眼皮不做一聲兒接著皇帝低低説了幾句話便告別了出來在半路上皇帝再三叮囑小沙彌不許傳揚出去又吩咐他好好地看待那位高僧將來自有好處那小沙彌也十分聰明當即連聲説遵旨皇帝離開了五臺山便向濟南地方進發只因皇帝有旨禁止地方官供張侍候所以到了濟南行宮那山東巡撫錢鈺率領全省大小文武官員照例來請過聖安以後便各自回衙辦事皇帝見官員也都去了便改換衣帽帶一個親信侍衛悄悄地溜出後門去在趵突泉旁一家小茶館裏吃茶打聽些民情風俗官吏政績看看天晚便又悄悄地溜回行宮到了晚膳後便和相國張玉書在燈下下圍棋兩人棋逢敵手興味甚濃直到夜半還不罷休皇帝為搶一個犄角兒手裏拈著一粒子正出神的時候忽聽得圍牆外馬嘶人喊的聲音那內監侍衛們臉上齊變了色皇帝一面下子一面吩咐內監出去查問一刻兒工夫內監進來回奏説後院萬歲乘的赤騏馬被賊人盜走了皇帝聽了不覺大怒對張玉書説道這赤騏是那年喀爾喀部進貢的朕七八年來未嘗一日離它不想到這裏來被人偷去那賊人也太大膽了不知老錢在那裏管什麼事這幾句話傳在錢巡撫耳朵裏慌得他第二天一早自己摘去頂戴在宮外跪著候旨一面托內監去轉求張相國替他在皇帝跟前求情誰知皇帝起來已把昨夜的事體忘了錢鈺花了千兩銀子買得一匹栗色馬也是十分俊美獻給皇帝又花了三萬兩銀子買囑內監侍衛們求替他在皇帝跟前説好話第二天皇帝起蹕向江蘇省進發錢鈺送皇帝出城以後回到衙門裏見大堂正中高高地寫著一行字道盜禦馬者山東竇爾墩也錢巡撫看了不覺嚇了一跳忙下令關起城門來搜捉了十天也不見竇爾墩的影蹤這個竇爾墩原是山東有名的大盜他起初在山東直隸河南一帶地方橫行不法專愛強姦良家婦女那女人睡到半夜裏見竇爾墩從屋面上跳下來便喚道竇爺爺來了你若好好地依順他他便把那女人連被窩裹著挾在脅下跳出院子去回到自己家裏給姦污過以後便依舊好好地送你回家去第二天那女人的房門好好地關著女人也好好地睡在床上真是人不知鬼不覺的遇以貞烈的女人倘然當時和他倔強便立刻被他殺死不然也被他搶回家去永遠不得回來因此那班乖巧的女人吃了他的虧也只好忍氣吞聲地受著有時那些良家小戶還暗暗給他許多銀錢他在濟南地方黨羽甚多倘然有江湖賣藝的人路過省城必要先去和他打個招呼恭敬些見面錢他才許你在地界上做買賣倘有半個不字他便帶領弟兄打得你落花流水叫你站不往腳那一年濟南城裏忽然來了一個白髮老頭兒帶了兩個絶色的女孩兒在泰嶽廟前賣解那兩個女孩兒長著兩寸長的小腳穿著紅裙緑襖一來一往地搬弄武藝把路上人看得魂靈兒也丟了到要錢的時候説也奇怪那班看客不約而同地搖搖頭擺擺手四面散去了那老頭兒討了一個沒趣正低頭納悶的時候忽然來了一個大漢搶到老頭兒跟前伸著蒲扇一般的手掌在老頭肩上一拍大聲喝道老賤奴你可認出山東竇爾墩嗎那老頭兒聽了慢騰騰地擡起頭來在他身上上上下下地打量一番看他敞著胸一手叉著腰一手捏著兩粒鐵彈子忒楞楞地轉著半晌老頭兒冷冷地説道誰認識你竇二墩竇三墩況且俺賣俺的藝也不一定要認識你幾句話説得竇爾墩怪眼圓睜青筋脹滿也不待老頭兒説完一拳劈胸打過去要知這老頭兒性命如何且聽下回分解
