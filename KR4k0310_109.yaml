body:
  text: 第六十九回出奇制勝智勇冠三軍觸景生情纏綿書一紙卻説陰識聽得那小廝的話勃然大怒也不言語忙將羚羊汁和金叉石斛送進去關照明兒怎生弄法明兒一面答應一面將藥接了過去陰識退了出來沒多時小才在藥店裏打盹打得醒了再問藥方已經被人拿去只嚇得倒抽一口冷氣沒奈何騎上騾子沒精打采地回來才下騾子劈面就和陰識撞個滿懷嚇得倒退數步忙想要走陰識喝道叫你去配藥藥配到哪里去了小才抿著嘴也不敢回嘴陰識氣衝衝地罵道好狗頭越來越不像個模樣了是我教你去辦事都不在心上了你們給我將這畜生捆起來重打一頓給我趕出去有幾個家丁忙走過來將他按住著實地打了數十下子只打得小才像蛇遊的一樣滿地亂滾只是央告不止陰識到底是個面噁心善的人見他這樣不由得心軟起來忙道放下來那些家丁連忙住手將他放下小才直挺挺地跪在地上央告道求大主人開恩我下次無論做什麼事情不敢再怠慢了如果再犯這個毛病盡你老人家打死了也是情願的陰識道果然改過麼小才叩頭道再不改過隨大主人怎麼辦我就是了陰識見他説得可憐而且平日又不是個刁鑽的便説道如能改過且饒你個下次小才聽了這話忙叩了幾個響頭爬起來一溜煙向後面去了陰識便回到麗華的樓上李雪梅站起來問道大世兄令妹服藥的情形怎樣請你帶我進去看看陰識忙領著李老先生進得房來但見邢老安人只是向他們擺手示意教他們不要吵鬧悄悄地説道他吃下了藥停了一會便不吵了現在已經睡著李老先生忙退出來對陰識笑道恭喜恭喜小姐的病有幾分希望了陰識謝道全仗先生妙手能夠將舍妹看好闔家就感恩不盡了李雪梅又謙遜了一陳子提起筆來仔細仔細地開了一張轉手的方子湯頭是用的竹葉石膏湯陰識忙又差人去配了來煎好了等候著一直到天晚他才慢展秋波醒了邢老安人真個是喜從天降靜悄悄地問道我兒你現在覺得怎樣呢他呻吟著説道清爽得多了明兒忙捧了藥過來給他吃他又將第二劑藥吃下去一直酣睡到第二天巳牌的時候翻身叫餓邢老安人便出來問李雪梅道請問你老人家小女現在餓了要吃可能吃一些薄粥嗎李雪梅點首説道可以可以明兒順手隨便盛了一碗薄粥捧到床前他吃下去沒一刻兒又酣呼睡去李雪梅道小姐的貴恙料可無妨了老漢要回去了他又留下一張單子給陰識道這單子是善後的你教他多吃幾劑就可大好了陰識連連稱是忙教四個家丁擡一乘小轎送他回去臨走的時候又恭恭敬敬地送上五百兩紋銀兄弟兩個一直送出大門外方才回來由此向後麗華的病勢日見輕減不到三月已經大好了按住不表卻説劉縯等自從失敗之後東奔西走四處活動不上數月已將新市平林的兩路賊兵收伏了又數日又將下江的兵馬聯合停當一個個摩拳擦掌預備廝殺劉縯令兵馬共分六部以備調用休息了幾天大排筵席上至諸首領下至士卒俱歡呼暢飲酒後劉縯和各將領申立盟約到了第二天北風怒吼大雪紛飛正是殘冬的時候諸將領紛紛請令出兵劉縯也是躍躍欲動正要發兵劉文叔急忙止住道此刻天寒地凍出兵征伐十九不利時機未到不可亂動王常聽他這話很不以為然忙道趁他不備的當兒猛地發兵殺得他個片甲不回豈不大妙三將軍何故反而違抗衆議呢劉文叔笑道諸君的高見並非不佳但是如此冷天一旦發令動兵他們士卒一定是畏寒怕冷容易氣餒而且藍鄉宛城各處未見沒有防備的依我的拙見不如等到除夕那一天他們準沒有預備的何妨潛師進襲諒這小小的藍鄉和宛城兩處還怕不到手麼諸將領聽他這番話一個個毫無言語都是暗暗地佩服不止好容易等到大年除夕那一天所喜天氣晴和微風不動這天早上劉縯升帳就要出兵劉文叔忙再止住道凡事豈可性急急則岔事今天發兵以夜裏為最好現在出兵你想有什麼益處呢劉繽沈吟了一會道果然不錯只得又忍耐等到晚約在二更相近才調動全隊劉文叔和劉伯姬李通成丹四人帶領一隊兵徑向泚水出發劉縯王常李軼鄧辰等帶了全部的兵直搗藍鄉差不多到三鼓的時候大家偃旗息鼓直等將藍鄉周近完全圍起一聲令下登時金鼓震天燈球火把照耀得和白日一樣原來這藍鄉是莽賊的手下將士屯糧之所並非沒有守兵怎奈那些守兵因為到了歲末的一天誰也不肯去防範你吃酒我猜拳十分熱鬧到了這時差不多大半都到睡鄉中度生活去了猛地一陳大亂把那些賊兵從夢中驚醒揉開睡眼只見燈光火亮照耀得和白日一樣只嚇得三魂落地七魄升天連褲子也來不及穿赤身霹體地逃走霎時東奔西散跑個精光劉縯和諸將不費一些氣力竟將無數的糧草奪到手士氣大振諸首領俱有進兵泚水的念頭劉縯也不加阻止便令鄧辰李軼帶一隊兵在這裏守住自己和諸首領帶兵星夜向泚水進發再説劉文叔等帶兵到了泚水城下東方已經發白忙令李通搦戰城內守將甄阜梁邱賜聞報大怒趕緊披挂出城接戰忽見探事的進來報説藍鄉失守二人聽得這話真個是半天裏打了一個霹靂面面相覷半晌無語梁邱賜大叫道事已如此不如開城和這班鳥男女決一死戰我們若是打勝了趁勢去將藍鄉奪回豈不大妙甄阜聽他這話拍手道是二人全身披挂帶兵出城兩邊列成陳勢梁邱賜躍馬橫刀用手指著劉文叔罵道殺不盡的草寇快來納命劉文叔大怒正要遣將迎敵瞥見李通一馬闖到垓心搖動豹尾槍也不答話便奮勇大殺起來戰了五十多個回合不見勝負劉伯姬仇人相見分外眼紅拍動桃花駒便來夾攻梁邱賜甄阜正在後面壓陳見對方雙將出馬深恐梁邱賜有失忙教杜生出馬這杜生在甄阜的部下原是一員勇將只見他將雙綢舞起飛馬出陳成丹更不怠慢催馬搖槍出陳接住這時劉縯的大隊已到合在一處劉縯一眼望見梁邱賜不禁將那無名的業火高舉三千丈按捺不下一拍烏騅揮動雙鞭三戰梁邱賜好個梁邱賜大戰三人毫無怯懼的情形展開全身的本領兀自轉戰不衰可是甄阜見對面來了三個戰梁邱賜一個不禁暗暗地替梁邱賜吃驚由不得飛馬出來王常見對面有人出馬大吼一聲揮動龍舌槍闖到垓心擋住甄阜大戰起來一時金鼓大震喊殺連天只覺得目眩心駭劉文叔看了多時猛然見賊兵的陳腳紛紛擾動才想起賊陳無人壓陳用馬鞭一揮從左右兩邊抄出兩支兵直向賊陳包抄過去賊兵登時大亂紛紛亂竄甄阜見自己的陳勢已動大驚失色忙棄了王常飛馬回來彈壓誰知軍心一亂任你怎樣來彈壓終歸沒有用處王常見甄阜回陳哪里肯舍緊緊地趕來甄阜見兵心已亂料想不能彈壓只得回身又和王常大戰了數十合虛晃一錘便想逃走王常早知就裏展開龍舌槍將他緊緊地逼住甄阜見沒有空子可逃也下了決心擺動雙錘耍起來足可應付王常南面杜生和成丹已戰了八十多回合杜生雖然猛勇哪里是成丹的對手劍法散亂成丹覷個破綻手起一槍刺杜生於馬下這時陳裏早跑出兩個小卒梟下首級跑回陳去成丹卻不回陳拍馬來助王常雙戰甄阜這裏梁邱賜又和三人戰了多時仍然毫不在意劉伯姬見兀地戰不倒他他柳眉一鎖計上心來虛晃一槍拍馬回陳梁邱賜見去了一個徑敵心中稍放下一點劉伯姬向文叔道我們將這兩個賊將困住你還不趁此襲城等待何時這句話提醒了劉文叔忙領了一隊兵抄過賊兵的背後向泚水而去劉伯姬霍地翻轉柳腰攀弓搭箭颼的一箭直向梁邱賜的咽喉射來梁邱賜正在酣戰的當兒猛地聽得弓弦聲響曉得厲害忙將頭一偏説時遲那時快右耳已穿去半邊血流如注正要撥馬逃去聽得弦聲又響他連忙用刀尖一撥將第二枝箭撥落不敢戀戰大吼一聲撥馬直向泚水而逃劉縯李通並馬追來一直追到城邊只見吊橋已經撤起城頭上站著一員大將梁邱賜擡頭一看不是別人正是劉文叔他不禁倒抽一口冷氣忙回馬欲向宛城逃走劈面劉縯李通一齊攔住他只得下個死心和二人又惡鬥起來再説甄阜和成王二將大戰了八十多回合見手下的兵卒逃散一空杜生陳亡梁邱賜也逃走了自己不敢再戰丟了一個架子撥馬落荒而走劉伯姬閃著星眼見他逃走的提轡環彎弓一箭射去甄阜心慌意亂哪里還顧後面的暗算一剎那間翻身落馬被王成兩將生擒過來劉伯姬和二人領著大隊直向泚水而來剛到城下見梁邱賜正與劉縯李通戰得難分難解之際王常成丹哪里肯休雙馬飛來加入戰渦梁邱賜戰了半天精神已經不濟哪里再能加上兩個呢走又走不掉逃又逃不了只得死力地應付劉伯姬看得仔細颼的一箭梁邱賜聽得弓弦聲響忙將馬頭一帶讓過一箭劉伯姬見一箭未中接著又是第二箭上弦這時劉縯的雙鞭已逼近他的脅下王常的龍舌槍也逼到他的頸際梁邱賜忙用大刀來攔架這時第二箭恰巧中在他的手腕梁邱賜大吼一聲連刀拋去劉縯手起一鞭正打中他的馬頭那馬忽痛一躍將梁邱賜掀落地上李能連忙下馬雙手鎖住他的盤膝冷不提防梁邱賜飛起一腳正中李通的肩頭李通一放手險些將他放走王常躍馬前來手起一槍將梁邱賜的右手刺斷成丹飛身下馬幫助王常李通才將梁邱賜擒住大家見大事已定便合兵一處大唱凱歌劉文叔忙令人大開城門讓大隊進城安民已畢大家互相道賀劉文叔對衆將言道目下可慢道賀宛城未破是吾等第一徑敵我看我們的士氣正盛何不一鼓而下呢諸首領一齊稱是忙傳令下去關照不要卸甲飽飯一頓便下令直向宛城進攻單留王常守著泚水劉縯帶了兵馬到了宛城城外劉縯正要出馬挑戰忽見探事官飛馬報道賊將嚴尤陳茂現在清陽擺陳以待劉縯料想宛城非智取不可急忙領兵來到清陽早見賊兵擺好陳勢嚴尤陳茂並馬立在陳門之下耀武揚威劉縯舞動雙鞭身先士卒沖到垓心陳茂搖槍拍馬來敵劉縯大戰了三十回合劉伯姬飛馬出陳替回劉縯攪動梨花槍和陳茂大戰起來陳茂瞥見對陳飛出一個如花似玉的女將軍來不禁邪心大動暗想道若能將他擒住帶回去做一房妻室不枉為人一世他正在胡思亂想的當兒瞥見他的梨花槍已到面前忙用矛一架順手一矛向他的馬首刺來他手靈眼快急將馬一帶那馬憑空一跳陳茂的矛刺了一個空身子往前一傾二馬相近他一伸玉手揪住陳茂的腰縧用力一拖竟將他拖離馬鞍陳茂心中一慌一放手將矛丟在地上劉伯姬將他往腰裏一夾陳茂還不知死活伸手去摸伯姬的下頜伯姬大怒掣出寶劍颼的一劍將陳茂的手腕斫去陳茂大喊一聲不能動彈嚴尤見陳茂被擒只嚇得魂飛天外忙驅兵逃去劉縯指揮兵士趕上去大殺一陳把那些賊兵殺得十死八九尸橫遍野血流成渠劉縯忙收兵來攻宛城哪知到了城下瞥見劉文叔立在城頭大笑道兄長來遲小弟卻早經奪得也劉縯大喜諸首領無一個不暗暗驚奇都道他的妙計出人意料之外原來劉文叔見他們和賊將交兵的當兒即帶了一隊人馬到了宛城詭稱是陳茂派來守城的城裏的賊兵哪知就裏連忙下城大開城門劉文叔帶著士卒一擁而進將城內的賊兵完全殺盡間話少説劉縯見宛城已得真是喜不自勝帶隊進城點查降兵不下四萬合自己的部下二萬再連新市平林三大部已足有十五萬人此外尚有陸續投附今日數十明日數百真是多多益善如火如荼劉縯下令命各軍分扎城外把一座宛城保守得鐵桶一般各首領紛紛議論都道軍中無主不便統一南陽諸首領一個個出席議論要保舉劉縯為帝獨王常成丹諸將懼縯威明不敢附和意欲立劉玄為帝原來這劉玄是個庸弱無能之輩一旦將他立起以便自己任所欲為了這劉玄本與劉縯同宗兄弟王常又買通李軼大家俱選劉玄為帝停了幾天諸首領對劉縯將來意説明劉縯慨然對衆將説道諸君欲推立漢裔盛情原屬可感惟愚見略與諸君微有不同目下赤眉數十萬衆嘯聚青徐要害聽説南陽選立新主必然一樣施行彼一漢帝我一漢帝兩帝不能並立怎能不爭況王莽未滅宗室先自相攻坐失威權何能再破莽賊呢自古以來首先為尊往往不能成事陳勝項羽的行為諸君也好明瞭今舂陵去宛三百里尚未攻克便想尊立是使後人得乘吾敝寧非失策麼愚意不如暫立為王號令三軍若赤眉所立果賢不妨去投他不至奪我爵位否則西破王莽東掃赤眉豈非萬全之策嗎南陽諸將聽了劉縯這番話當然十分贊成可是新市平林的首領一定要立劉玄為帝尤其有一個黨徒張印拔劍擊地非立劉玄不可劉縯只好隨聲附和讓他們將劉玄立起這時南陽諸將領一個個怒目咬牙躍然欲動劉縯多方勸解總算將諸將敷衍過去劉文叔另有定見點了三萬人馬到劉玄面前請令功紗川劉玄準如所請又令王常李通隨往協助不到三日已將潁川攻下乘勝長驅直搗昆陽説也奇怪未上半日又將昆陽攻下勢如破竹未上三天進克郾縣來窺定陵一路上秋毫無犯一班百姓莫不歌仁頌德歡騰四野劉文叔屯兵定陵城外正欲發令進攻瞥見一個守門的兵卒進來報道帳外有一個人自稱姓陰要見將軍劉文叔心中一動暗道莫非麗華麼忙問道是個什麼樣子的人那守門士卒道是個二十多歲的漢子劉秀忙道帶進來那守門的士卒打了一個千走出去不多時帶進一個人來手裏執著一封信恭恭敬敬地呈到劉文叔的面前口中説道別來已久明公無恙否劉文叔仔細一看見這人有些面善無奈一時想不起來那人道明公尚記得舂陵十五村會操的陰識嗎劉文叔忙道阿阿我竟忘了請坐請坐他一面招待一面將信拿到手中一看但見上面寫著面呈漢大將軍文叔麾下下面寫著名內詳他從容將信拆開但見裏面寫著妾麗襝衽於大漢將軍文叔麾下別後冀莢屢更謄念之忱無時去諸懷抱近聞旌旗指處小丑全消逖聽之餘不勝雀躍家兄識有志從戎妾特申函座右析録用麾下天下興亡匹夫有責惟將軍圖之妾陰氏麗華手啓他將書信看罷不勝欣慰這正是龍潭虎穴驚前夕情話芳箋慰此時要知後事如何且看下回分解
