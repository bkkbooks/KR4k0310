body:
  text: 第五十一回燕瘦環肥國外選色偷寒送暖宮內納姬卻説嘉郡王平日和那班文學大臣親近頗懂得詩書舉動也文雅性情也方正自從這一次遊過喇嘛廟以後頓時把他一點孩兒的心腸引邪了這時大家忙著慶祝萬壽的典禮也沒有人去留意他不知怎麼的他和一個漢章京姓侯的小姐好上了兩人常常背著人幽期密約暗去明來後來章京知道了索興把女兒悄悄送進郡王府去嘉郡王把他藏在府裏朝夜尋歡合府的人都稱他侯佳氏後來郡王娶了喜塔臘氏以後把侯佳氏封作瑩嬪那時還有一個漢女選去宮中的劉佳氏封誠妃一個鈕鈷祿氏封貴妃這都是後話如今且説乾隆帝到了萬壽的這一天在萬樹園裏受內外臣工的覲賀這時熱河行宮裏樹頭屋角都扎成壽字燈彩萬樹園辟出五條寬大的甬道來正中一條是宗室王公左首第一條是滿蒙親王貝勒第二條是西藏廓爾喀回準兩部的藩臣右首第一條是英法俄荷各西洋使臣第二條是日本朝鮮越南緬甸各國王各分著班次左右侍立好似天平山上的石筍一般靜悄悄直挺挺的偌大一座園林站得沒有一方空地那外國使臣革靴高帽站在翎頂輝煌的許多大臣中間煞是好看英法各國使臣原不肯跪拜的只因要求和中國通商也勉強隨班跪拜皇帝看了十分歡喜便在園內賜宴看戲熱鬧了三天才個個告辭回去這時乾隆帝忽然又想出一個新鮮玩意兒來原來乾隆皇帝是很好色的他到了熱河雖然收了許多妃子內中要算喀刺沁妃和塔固妃最受寵愛的了後來他見各部藩王帶來的女眷都打扮得異樣風流尤其是那西洋女子長得天然白淨風度翩翩皇帝不知不覺厭棄自己的妃嬪了便暗地裏授意給和珅説中國皇帝受萬方子女玉帛的供養如今玉帛有了獨少那女子如今朕須選幾個外藩的女子進來養在行宮裏朕早晚和他們盤桓著也可以采風問俗和珅受了這個旨意格外高興回相府去便和他的親信幕友計議著那幕友便獻計先派人到四處來選外藩秀女一面在行宮裏趕造起一座列豔館來不到半年工夫那房屋也造好了美女也送到了皇帝在如意洲裏召見各美女如意洲原是乾隆帝和妃嬪尋歡作樂的地方裏面有一座鏡廳四面嵌著落地的大玻璃鏡人走在裏面照在鏡上立刻化成十多個影兒皇帝就在這裏面看美女那班美女有的從蒙古選來的有的從滿洲選來的有的是從朝鮮選來的有的從準噶爾選來的有的從回部選來的有的從西藏選來的有的從日本選來的有的是從琉球選來的有的是從安南選來的有的是從緬甸選來的有的是從暹羅選來的有的是從南洋群島選來的也有從印度選來的一共是十三處地方每處兩位美人一正一副皇帝一一傳到禦座前去細細賞識一番每喚進一個美人來由宮中的管事媽媽上去解開他的衣襟搜檢一番才許他近禦座去又有領班的保姆教導他跪拜的禮節那班美人也有濃脂豔粉的也有淡妝素抹的他們初近天顔都有些羞怯的樣子皇上卻和顔悅色地問他們的話有不懂話的由通事女官在一旁傳話皇帝看到適合自己心意的女人便伸手去扶他起來拉近身去看他的手臉內中有一位日本美女名叫千代子長得柔媚肥豔一個印度美女長得俊俏活潑一個西洋美女長得白膩苗條最叫人看了動心當夜皇帝便把三位美人留下來了在如意洲中一連七天不放出來聖旨下來封西洋美女為列豔館第一妃千代子是第二妃印度美人是第三妃後來皇帝獨幸西洋美女三天才到列豔館去遍幸諸美女講到那列豔館又稱魚台行宮裏面造著十幾座院子每一座院子住著一處的美女中央造著賞豔行宮皇帝每天住在賞豔行宮裏把各處的美女一個一個輪流著傳喚進去臨幸每臨幸一個美女仍照著宮中舊例先把美女上下衣裙脫下那管事太監拿一件大氅把美女的身體一裹背到禦榻前揭去大氅那美女再投身炕上從皇帝腳邊爬上去並頭睡下內中有幾個美女不慣的只因害羞便悄悄地去吊死在院子裏管事太監奏明瞭皇帝把尸身背出去便在園後面葬了有時皇帝高興便親自到院子裏看望美人那院子裏的裝璜完全依著美人在家鄉的格局有時美人想起家鄉的食品器物和珅便打發驛卒千里萬里去採買回來皇上最愛到第二妃院子裏去那院子紙窗木屋纖潔無塵進門便是炕一走進屋子便脫下靴子倒在炕上拉著那千代子什麼花樣都玩得出來後來第一妃知道了心懷怨恨他覷著皇上不在院中的時候趕過去揪住千代子的頭髮兩人在炕席上廝打起來宮女們急報與皇上皇上親自來喝住又拉著第一妃的手到他院子裏住宿那第一妃的院子一色西洋打扮第一妃親自做菜孝敬皇上吃著別有風味皇帝在他院子裏又住了三夜到第三夜上皇帝正好睡的時候忽然那千代子手裏拿著洋刺刀跳進屋子來行刺那西洋妃子舉手攔時那東洋刀是有名鋒利的早把那西洋妃子的右臂削去了皇帝大驚失色內侍們趕來把千代子擒住皇帝大怒喝叫著推出宮門腰斬那春阿妃知道了便連夜來見皇上勸著皇上那班美人來自四夷野性未馴皇上萬乘之軀當自己保重不可過於留戀免遭非常之禍這一番話説得有情有義皇上見了春阿妃不覺想起舊情便又臨幸到春阿妃宮中去從此皇上對於豔館的興趣也淡了些這時候又到殘冬明年春天有兩件大事要辦不得不回京去兩件什麼事呢一件是嘉郡王大婚一件是四庫全書抄寫完工須得乾隆親自去察看一回當時便帶了幾個寵愛的妃子從熱河回鑾進京第二年便是嘉郡王大婚之年嘉郡王娶的幾個妃嬪前面已經説過只因他是皇上最寵愛的皇子乾隆帝特賞一座郡王府府中房屋寬大陳設精美到大婚這一天自有一番熱鬧那喜塔臘氏長得美豔豐潤夫妻兩人十分恩愛這一年因郡王大婚宮中的買賣街特意延長到三月乾隆帝每天帶著新媳婦和幾個得寵的妃嬪在街中遊玩這時和孝固倫公主已是十六歲了皇上格外寵愛他也帶他在宮裏天天逛著買賣街那公主舉動活潑語言伶俐皇上常常逗著他玩笑這時和珅也陪著一旁起初公主見了不免有害羞的樣子乾隆帝吩咐他去拜見丈人從此以後公主見了和珅便喚丈人和珅也常常逗著他説笑有一天皇帝一手拉著公主逛買賣街去和珅也陪在一旁那公主一瞥見估衣店門口挂著一件大紅呢氅心中十分愛它悄悄地對皇帝説要買它皇帝笑説道可向你丈人要去那和珅聽了忙進店去花了二十六兩銀子買來親自替公主披上身去這時公主還是男孩子打扮披著氅越顯得面如滿月唇若塗脂皇帝笑説道你駙馬俊得好似女孩兒你卻越發像男孩了公主聽了羞得把頭低下去不説話皇帝又説道今天怎的鸚哥兒封了嘴了公主聽了把頭一扭一轉身溜到別處逛去了買賣街停了市以後皇帝便忙著編四庫全書目録這時總纂大臣是紀曉嵐皇帝因要他代做序文又怕給人知道便把紀曉嵐留在宮中禦書房裏兩人常常商量著如何編制如何措詞誰知這紀曉嵐年紀雖有六十歲了但他天生的陽體一天不見女人那身上就不舒服好似害大病一般紀曉嵐宿在宮中已有四天每夜孤淒淒一人睡著骨節脹痛肌肉抽動到了第四天上忽然眼珠直暴紅筋滿臉終日彎著腰不敢直立起來乾隆帝看了十分詫異問他害什麼病紀曉嵐慌得忙爬在地下連連磕著頭把自己一天也不能沒有女人的話説出來乾隆帝聽了哈哈大笑隨手把他扶起吩咐他在書房裏養息一天到了天晚平日是太監來替他疊被鋪床的這時忽然進來了兩個絶色的宮女見了紀曉嵐行了禮去把個紀曉嵐慌得手足無措那宮女行過了禮笑吟吟地上去替他疊被鋪床紀曉嵐連説不敢勞動這兩個宮女好似不曾聽得一般疊好了被一個宮女上來扶他上床去一個宮女替他松著鈕扣紀曉嵐急得退縮不疊連説不可不可給皇上知道了説我在宮中調戲你們那時不但你們的性命不保連我這條老命也要保不住了那兩個宮女一邊拉他上床一邊嗤嗤地笑著紀曉嵐這時既無處躲避又不敢聲張只得聽這兩個宮女擺布去那兩個宮女一邊説笑著一邊替他脫去衣帽鞋襪扶他上床去睡下看看那兩個宮女依舊不想出去竟卸下簪環脫下衣衫來並肩兒坐在床沿上要鑽進被窩來了到這時紀曉嵐不能不説話了倒坐在床頭連連向兩個宮女打躬作揖説道求你們兩位出去罷這件事萬萬使不得的可憐我一個窮讀書人已到大學士的位份也不是容易事體如今這一來明天傳出宮去豈不是全毀了不但我一生功名性命都毀了便是你們兩位小妞妞的名節也毀了再俺們今天一來明天可還想活命嗎求兩位小妞妞饒我一條老命罷趁早沒人知道悄悄出去罷倘然給公公們知道便不妙了這兩個宮女説也奇怪任這紀老頭再三哀求著他們總是自己做自己的慢慢地脫去外衣露出裏面的銀紅小襖兒下面的蔥緑褲子骨篤一鑽鑽進被窩來了紀曉嵐到了此時也是無可奈何只得學老僧入定的法子閉上雙眼眼對鼻鼻對心直挺挺地睡了無奈這兩個在被窩裏兀是悉悉索索地亂動一會兒替他捶著腿兒一會兒替他捺著胸口最可惱的便是那一陳陳的脂粉香氣送進鼻管來叫人欲睡不得正在萬分窘急的時候忽聽得窗外一聲喊道萬歲爺有旨念紀曉嵐年老非人不暖特賞宮女兩名在禦書房伴宿以示朕體貼老臣之至意欽此那紀老頭兒顫顫巍巍地爬在地下聽過聖旨謝過恩來心才放下當夜一宿無話第二天起來精神十分清爽乾隆帝出來紀曉嵐又跪下來謝恩皇帝笑問道怎麼樣兩個宮女還不覺得討厭麼紀曉嵐又連連碰著頭從此以後這兩個宮女終日伴著紀曉嵐在禦書房裏添香拂紙疊被鋪床直到他編書完成退出宮來乾隆帝便命他把這兩個宮女帶回家去算是姨太太北京的人都説紀曉嵐奉旨納妾紀太太看了也無可奈何接著又是和孝固倫公主下嫁京城裏又是十分熱鬧起來先在東大街造一座駙馬府十分高大是皇上賞賜的屋裏陳設十分精美和珅有的是錢暗地裏又添了三十萬銀子在駙馬府裏造一座大花園因為清宮定例公主雖嫁了駙馬夫妻兩人不常有得見面公主住在內院駙馬住在外院和珅怕他兒子住在外院氣悶便造了這一座花園極盡樓臺之勝到了大喜這一天公主辭別皇上皇后又辭別生母魏佳氏出宮來到駙馬府中那和珅夫妻兩人對著媳婦朝拜過行過大禮府中大熱鬧了三天公主左右自有保姆侍女伺候著這位公主性情十分活潑的他見駙馬新婚的第一天和他同過房以後便去住了外院子裏一連幾十天不得見面兒他便吩咐侍女去宣召駙馬誰知卻被保姆攔住了説是本朝規矩公主不得輕易宣召駙馬公主聽了也無可奈何只得耐著性子守著看看過了三個月公主又去宣召駙馬又被保姆攔住説公主不識羞公主氣得哭了要進宮去奏明父皇自己又是出嫁的公主不能輕易進宮去況且夫妻倆的事體如何可以對父母説得後來到底由駙馬花了五千塊錢保姆才放他進內院去夫妻團圓了一回從此以後他夫妻兩人要見一面保姆總是百般刁難總得給錢才能通過這是清宮從來做公主的都嘔這個氣的這且不去説它如今再説乾隆帝這時年紀已在六十以外對於女色的事自然差了一層只是喜歡微行他沒有事的時候常常離開宮女內監們穿著便衣私自出宮來四處間玩這時有一個叫楊瑞蓮的是梁詩正的親戚他仗著梁詩正是皇帝親信大臣常常到京裏來求差使梁詩正嫌他人太鄙塞又沒有學問只寫得一手好字真草隸篆都寫得不差便給他説到西清穀鑒館裏去充一名寫官那楊瑞蓮到了館中辦事卻十分勤謹往往別人不做事體的時候他總是埋頭寫字這一天正是八月十三館裏的人跑得一個也不剩只有楊瑞蓮一個人間坐著忽然一個很威嚴的老頭兒踱進屋來向楊瑞蓮點頭微笑楊瑞蓮不知他是什麼人只因自己的位卑職小便站起來迎接他那老人靠窗坐下見屋子裏沒有一人便問道這些人到什麼地方去了楊瑞蓮回説今兒是十三他們都趕考去了那老人問你為什麼不去趕考答道人都走完了倘然有內廷寫件傳出來叫誰來承辦呢因此俺願意丟了功名不要在這裏守著那老頭點頭又説道你這樣認真辦公怕將來不一樣得了功名又問他名姓籍貫那楊瑞蓮一一説了正説話時只見十個太監慌慌張張地走來爬在地下説請萬歲爺回宮楊瑞蓮到這時才知道這老人便是當今乾隆帝慌得他忙跪下去叩頭直到皇帝去遠了他才敢爬起身來到了第二天他跑到梁詩正那裏去梁詩正在朝裏還不曾回來停了一會梁詩正回來了見了楊瑞蓮笑吟吟地對他説道老兄好運氣今天皇上對我提起你來説你辦事勤慎字又寫得好已有聖旨欽賜你舉人選你做湘潭縣官去呢這一樂把個楊瑞蓮快活得忙向梁詩正打躬做揖説多謝大人栽培隔了幾天果然聖旨下來放湘潭縣知縣誰知楊瑞蓮一到了任便出奇地貪起贓來名氣十分壞連京裏的禦史也知道了便參他一本接著湖南巡撫也因為不肯替他寫字心中懷恨便也上一本奏摺説他貪佞不法誰知乾隆帝看了他們的奏章卻笑著説道楊瑞蓮是老實人朕所深知他們所奏的朕一概不準後來還是梁詩正只怕拖纍了自己便暗地寫信去勸楊瑞蓮自己告退要知後事如何且聽下回分解
