body:
  text: 第一百十三回虎牢關威風占八面鳳儀事軟語訂三生話説王允要使呂布迷惑於貂蟬他便使貂蟬歌舞侑酒貂蟬本早就受了王允的密囑當然毫不推辭婷婷嫋嫋走到紅氈之上這時樂聲大作笙管嗽嘈他慢擺柳腰輕疏皓腕姿態動人歌喉蕩魄把個呂布樂得心花怒放直著兩眼盯住他轉也不轉一會子舞罷王允便對他説道我兒且在這裏陪著溫侯為父的因為後面還有多少屑事要去料理呢呂布見他要走正中心懷忙道司徒有事儘管請便罷王允笑道恕我少陪了他道無須客氣了王允便起身向後面走了他羞羞答答地到王允的位置上坐下呂布見王允去了他便膽大起來笑眯眯對著貂蟬直是發呆心中好似小鹿亂撞的一樣不知和他説一句什麼才好呢貂蟬故意裝嬌賣俏地閃著星眼向他一瞟微微一笑百媚俱生這一笑倒不打緊將一個呂布笑得骨軟筋酥見他那一副可憎可喜的面龐兒恨不得連水將他夾生吞了下肚去真個是見色魂飛身子早酥了半截他瞧著王允在這裏又不敢過於放肆只好眉目送情他也時時發出回電將他浪得驚喜欲狂他捋起紅紗袖子露出半截粉藕似的膀子十指纖纖地執著銀壺輕移蓮步走到他的身邊滿滿地斟了一杯笑道奴家不會敬客務望將軍恕罪才好呢呂布忙笑道哪里話來我太貪杯勞得妹妹常來斟酒我實在生受得十分不過意了還是讓我自己來動手罷他説著用手將他的玉腕抓住笑眯眯地盯著他的芙蓉粉頰只是飽看不休他羞得忙將手往懷裏一縮不覺將手中的銀壺往下一落叮噹一聲將桌上的酒杯打壞這一聲將呂布飛出去的魂靈才驚得收了回來忙笑道妹妹受驚了他含羞帶笑地用帕將口掩著倒退自己的位置上坐下呂布見他那副面孔像煞數年前的葛巧蘇越看越對竟沒有分毫的錯誤可是貂蟬見了呂布卻也暗暗吃驚道這人不是我們高頭村上的一個異丐麼不知他在什麼時候得到這步田地的呂布便向他笑道妹妹我在什麼地方好像見過你的樣子他卻答道將軍這話未免太唐突了奴家自幼未曾出得閨門半步今天因為家父的命令才出來見過一回生客的從來也未曾看見過第二個生人他説罷便冷冷地坐著呂布見他不悅忙用別話岔開去但是他的心中兀地疑惑不解道天下同樣的人本來是有的卻未見過他和葛巧蘇的面貌不爽分毫的列位貂蟬聽得呂布的問話從前的舊相識而且又是知己當然就該直接將自己的遭際告訴與他為何反而一口瞞得緊緊的不認呢原來貂蟬見呂布現已封侯當然要目空一切要是將自己的一番事實説出來豈不使呂布看不起麼自己無論怎樣的美貌終於是個歌妓還有什麼身價呢不若回他一個摸不著免得教他瞧不起這時呂布見他柳眉微蹙似乎帶著一些嬌嗔的樣子曉得自己方才的兩句話説得太唐突了他便搭訕著笑道我酒後亂言得罪妹妹萬望妹妹恕我失口之罪他聽他這話便又展開笑靨答道不知者不怪罪將軍切勿見疑奴家究竟是有些孩子氣都要請你原諒呢呂布見他回嗔作喜不禁將方才那一股狂放的魂魄卻又飛到他的身上去不知不覺地將銀壺執著走了過來一手搭著他的香肩替他滿斟一杯口中説道妹妹剛剛承情替我斟酒為兄的也該過來回敬了他卻故意板起面孔對他説道將軍請放尊重一點不要使他們看見成了什麼樣子呢呂布忙答應著回到自己的位上見他似怒非怒似喜非喜的一種情形不禁心癢難熬將一隻腳從桌肚裏伸了過來正碰著他的金蓮他不禁嫣然一笑忙將小足縮到椅子裏面呂布見他一笑膽大得愈厲害便問道妹妹今年貴庚多大了他道十九歲了呂布哈哈大笑道那麼我癡長一歲做你的哥哥還不算賴呢敢問妹妹是幾月裏生辰他笑道你又不是星相我又不來算命排八字何人要你問年問歲呢呂布笑道妹妹你卻不要誤會我的用意我問你的生辰正有一樁要緊事情他卻假癡假呆地答道四月十八呂布又問道妹妹的門當戶對有與未呢他聽得不禁嗤地笑道這人敢是發酒瘋了人家這些事情誰要你來問呢呂布忙央告道好妹妹請你告訴我吧他故意將粉面背了過去説道今天真是該死我們爺真是想得出好端端地教我來和這個醉漢子纏不清可不是晦氣麼呂布情不自禁站起來走到他的椅子後面彎腰曲背地打恭作揖這時候猛聽得屏風後面咳嗽一聲把個呂布嚇得倒退兩步忙擡頭一望不是別人正是王允從屏風後面慢慢地走了出來呂布滿面緋紅慌忙退到自己的原位上斯斯文文地紋風不動眼管鼻頭鼻管腳後跟王允見此情形料知他已入圈套他卻對貂蟬説道我兒有客在此為何兀地板起臉來算是什麼樣子呢他忙將粉面掉了過來呂布深恐他將方才的情形説了出來便向他直是做鬼臉子他佯作不知冷冷地對王允説道孩兒因為多吃了兩杯心上作泛故掉過臉來王允哈哈大笑道癡丫頭今天又不知吃下多少酒去了侍女們快將他扶到後面去安息一會子話猶未了屏風後面走出一群侍女來將他扶起他輕移蓮步走到呂布的面前深深的一個萬福口中説道奴家酒後失陪萬望將軍原諒他説罷才婷婷嫋嫋地走進去王允哈哈大笑道癡丫頭酒越醉禮數越多他説罷便轉過身來對呂布笑道小女嬌憨酒後不知説些什麼呢萬一有得罪將軍之處老夫便來陪罪了他説罷只見呂布兩眼出神只是在那裏發愣原來被他這一陳子忽喜忽怒的嬌態將他迷溺得不知所云了這時王允問話他何嘗聽見一字直著雙目在那裏追尋方才的情景呢王允走到他的身邊用手在他的肩上輕輕地一拍笑道溫侯老漢方才問話溫侯未答敢是動怒未曾呂布被他一拍才驚得醒了冒冒失失地答道我原是好意你卻不要誤會王允見他這樣答法不禁失聲笑道溫侯敢是今天酒吃得醉了麼呂布忙答道不曾不曾王允道既未吃醉方才下官問話為何兀地一聲不響呢呂布忙離席謝過王允又將他拉入席笑道知己朋友何必盡來客氣做什麼呢呂布道適才我問令嬡的生辰不知可有親事與未王允笑道這個癡丫頭今年已是十九歲了作伐的人卻也不少可是他兀地揀好嫌歹的不由我作主所以到現下還未有呢他鎮日價的羡慕將軍的為人勇貌雙全時常叫我請將軍來和他廝見廝見呂布聽到這裏不禁大喜道小將年已弱冠中饋無人若不棄粗愚便為司徒東床如何王允笑道那如何使得溫侯蓋世英雄小女蒲柳之姿怎好妄自攀龍附鳳呢呂布忙道司徒你也無須推託彼此義氣相投何必盡來做那些無謂的假圈套呢王允道既是將軍不棄微賤怎敢不遵呢呂布聽他答應頓時如同平地登天的一樣説不出的一種快活忙離開席面走到王允的面前納頭便拜口中説道泰山在上小壻這廂有禮了王允哈哈大笑忙將他從地上扶了起來説道這如何使得倒叫老漢生受了呂布道你老人家這是什麼話令嬡不許與我便罷既許與我當然我是你的真真實實的子壻了他説罷便在腰中解下一塊五龍珮來遞與王允道小壻來得倉忙未曾預備就將這塊區區的珮兒作為聘禮罷王允笑著收了下去正要答話瞥見外面走進一個人來到呂布的面前雙膝跪下口中説道太師請溫侯回府刻有要事相商請即動身呂布聽得便與王允告辭回府董卓正在廳上與李儒在那裏商議見他進來董卓忙道吾兒你可知道只為放走了袁紹如今為害不小他和曹操勾結了十七鎮諸侯齊來入寇了現在已經到虎牢關了你道這事如何辦呢呂布冷笑一聲道父王請放寬心什麼關外諸侯在孩兒看起來連草莽還不如呢孩兒願領一軍前去包將這班狐群狗黨一個個梟下首級來獻與父王董卓大喜道奉先肯去吾無憂矣這時背後有一人狂笑一聲道殺雞焉用牛刀此等烏合之衆何勞溫侯親自出馬末將願帶精兵一萬包將他殺得片甲不留董卓一望不是別人乃是關西華雄董卓大喜忙加封為驍騎校尉又命李儒隨他一同前去參贊撥兵五萬他兩個領兵到了虎牢關這時十七鎮諸侯的兵馬已經將關外圍困得水泄不通華雄領兵出關列成陳勢厲聲罵戰這時會盟討賊的衆首領一齊出陳濟北相鮑信忙教他的兄弟鮑忠出馬迎敵未上三合被華雄大喝一聲斬于馬下趁著勝仗斬了許多的首級回關著人送到董卓那邊去報捷董卓大喜便封為都督這時長沙太守孫堅見頭陳敗北不禁勃然大怒引著四將出陳去遙指關上厲聲罵道助賊匹夫快來納命華雄便命胡軫出馬孫堅正待上前迎敵程普一馬沖出接著胡軫大戰了三十餘合手起一矛刺胡軫于馬下華雄望見飛身下關領兵出來和孫堅對了陳混戰了一天一夜因為糧草缺乏只得引兵退去華雄收兵入關到了第二天華雄又引兵出關搦戰衆諸侯一齊出陳華雄連斬三將衆諸侯大驚失色面面相覷沒有一個敢去迎敵這時北平太守公孫瓚背後閃出一將赤面長髯跨下大宛馬手執青龍刀丹鳳眼臥蠶眉聲若洪鐘一馬飛出垓心大喝華雄鼠子焉敢猖獗華雄大吃一驚措手不及青龍刀起他的首級骨碌碌早滾向草地裏去了他領兵大殺了一陳只殺得衆賊兵抱頭鼠竄逃入關去李儒大驚連忙著人到董卓那裏告急去了那將乘勝回來衆諸侯沒有一個不佩服盟主袁紹便問公孫瓚他是何人公孫瓚答道他就是平原令劉備的兄弟關羽曹操驚問道莫非就是破黃巾的三雄麼公孫瓚點頭稱是曹操十分起敬忙命擺酒慶功再説董卓得到這個急報十分害怕呂布大怒領兵三萬星夜趕到虎牢關李儒見他到了好不歡喜次日清早出馬他連戰勝十七陳將衆諸侯殺得個個膽寒人人害怕這時卻惱動了劉關張兄弟三人張飛大喝一聲挺矛出陳來戰呂布呂布見他出陳料知是個徑敵卻也十分留神他兩個搭上手大戰了一百合不見勝負關雲長長嘯一聲飛馬出陳掄刀雙戰呂布這時金鼓震天喊聲動地垓心裏只見刀光戟影將衆諸侯看得目眩心駭他兩個和呂布大戰八十餘合仍是未分勝負劉備看得火起舞動雙鋒劍拍馬助戰他三個丁字兒困著呂布大呼廝殺又戰了一百餘合兀地敗不了呂布由午牌一直殺到紅日含山呂布到底有些遮攔不定了他也乖覺向劉備虛晃一戟掃開陳角飛馬入關劉關張忙領兵趁勝搶關李儒忙命守關賊兵一齊將灰瓶石子拋了下來劉備等不能前進只得收兵回營一連攻了幾天呂布也出了幾陳只是莫想戰倒了他衆諸侯見孫堅已去一個個慢慢地散到原籍去了把個曹操和袁紹氣得不可開交他們倆見勢孤力薄也只好回到河內去了呂布見衆盟主不戰自散也就領兵入都到了董卓的府中將戰事説了一遍董卓大加賞識過了數日董卓見洛陽究竟不及長安來得緊要便與百官會議遷都衆大臣誰也不敢來反對只是唯唯道好董卓下令命一班文武先遷入長安自己劫了後妃皇帝迤邐到長安沿途燒殺劫掠無所不為共撈到良馬八千匹金帛不計其數臨行時將洛陽原有的宮殿點起一把火來燒得一乾二淨到了長安之後新建太師府窮極華麗所費不下數千萬這時單講呂布鎮日價心中只是記念著貂蟬無奈又因董卓新遷長安百務猥集不得分身所以耐著性子在董卓的府中幫同著李儒照料各事一直忙了一月有餘各事粗定呂布急欲一見貂蟬方要到王允那邊去不料董卓又教他到後園裏去監造貽和宮他無可奈何只得轉身向後面而來此刻他心中已是十分不悅了他懶洋洋地走進後園只見裏面花草樹木修葺得十分齊整那園後便是貽和宮正造得半零不落的大架子已經支起高聳入雲他一步一步地走到一座亭子前面擡起頭來一望只見這亭子原來是六角式的每角懸著金鍾微風吹來叮噹作響迎面便是一塊匾上面亮晶晶的三個大金字乃是鳳儀亭他正要轉身向後走去猛聽得亭裏有歎息的聲音他卻是一愣忙止住腳步用目朝裏面一打量原來這亭子是內外兩進的外邊一轉花廊裏面卻是四周沈香木的屏門他見當中竹簾垂著瞧不見裏面他便走進來用手將門簾一揭朝裏面一望不禁大吃一驚你道是什麼緣故卻原來在裏面歎息的並非別人卻就是呂布時刻記念的貂蟬他忙走了進去一把握住他的玉手問道卿卿何由到我們這裏來的貂蟬見他進來問話不由得眼眶一紅那一股眼淚像斷線珍珠一般簌簌地落個不住哽哽咽咽地説道將軍奴家只道今生不能和你見面的了不想還有碰見的一天他説罷便往呂布懷中一倒只有嗚咽的分兒呂布摟著他低聲問道卿卿你有什麼話儘管説出來我好替你消氣貂蟬哭道事已如此還説什麼只怪奴家無情辜負了將軍不如當著將軍一死好表明奴家的心迹他説罷便想照亭柱碰去呂布死力抱住忙問他究竟是為著什麼事情他又哭了半天終未有答出一句話來把個呂布弄得丈二的金剛一時摸不著頭腦好生著急看官貂蟬究竟是什麼時候到董卓的府裏的小子也好交待明白了原來董卓遷都之後王允料到呂布一定是要奔走忙碌的他暗想此時再不下手恐怕沒有機會了他便推著做壽將卓賊請到府中赴宴酒至中巡將貂蟬喚了出來董卓見了貂蟬身子早就酥了半截及至聽到他的珠喉妙曲不禁魄蕩魂飛了他忙問王允這是何人王允乘機答道這是歌妓貂蟬董卓聽説是歌妓不禁大喜説道司徒可能割愛送給我麼王允忙道太師不嫌粗陋奉上就是了董卓聽説這話只樂得心花怒放隨即將貂蟬扯到自己的懷中笑問道你今年多大了貂蟬答道今年十九歲了董卓哈哈大笑道自古美人多半不減顔色你道是十九歲我實在不信差不多只有十六七歲的光景罷貂蟬含笑不語這時王允走到董卓身邊説道蟬兒你的福分真正不淺居然蒙得貴人的恩寵將來太師爺如果居了九五之尊怕你不是貴人麼董卓聽得更是樂得一頭無著處忙道我如果能有這樣的福分將來一定封你為太師如何王允答道太師爺言重了我哪里有那樣的偌大福分呢他們扯談了一陳子卓賊起身告辭帶著貂蟬回府而去這正是預備牢籠擒惡獸安排鐵網捉蛟龍要知後事如何且看下回分解
