body:
  text: 第一百九回兩粒明珠疑雲興起一雙繡履橫禍飛來話説梁冀聽得外邊呐喊聲音好生疑惑正要出去查個究竟瞥見一個侍尉神色倉皇地跑進來大叫道禍事來了禍事來了梁冀知情不妙忙問什麼事情他道外邊滿圍著禦林軍足數有幾萬人口口聲聲是捉拿將軍的請令定奪梁冀聽説只嚇得魂不附體半晌答不出一句話來朝著壽娥光翻白眼壽娥此刻也嚇得僵了蛾眉緊蹙粉黛無光梁冀道如今事機已經泄漏你我活不成了不如一死倒比被他們捉住明正典刑的好一些兒壽娥忙道你也忒糊塗了放著現成的計劃在此不去想法子抵抗只知道一死了事可見你這個人膽小如豆了他忙道現在禦林軍已到府外真如火上眉梢了哪里還有什麼法子可想呢他道你何不派人從後門出去到各處去求援呢一面命家兵家將趕緊分頭迎敵事機既然泄漏不若就此大動干戈將這班鳥男女殺去然後將昏君在結果了便是你來做萬民之主兩全其美何樂而不為呢梁冀道談何容易他們既然來捉拿我們前後門還不是把守得水泄不通麼他話還未了猛聽得一陳腳步聲音從外面進來他大吃一驚料想一定是禦林軍已進府了忙在腰間拔出寶劍向頸上一拖鮮血直噴撲通一聲往後便倒頓時死於非命了壽娥見他自刎嚇得心膽俱碎正要去尋死瞥見房門一動走進兩個人來他仔細一看原來不是禦林軍卻是府中的侍尉他們一腳跨進房門瞥見地下橫著一個尸首不禁大吃一驚忙俯身一看不是別人正是梁冀不由得一齊慌了手腳便一齊向壽娥説道現在禦林軍已經打進府中現在正在前面搜查呢將軍又死了教小人們怎生辦呢壽娥忙道你們可以各自去尋生路罷有一個侍尉聽説這話真個似罪犯逢赦的一樣一溜煙出門逃命了還有一個他見梁冀死了不覺動了野念他本來是久已垂涎于壽娥的一來是懼怕梁冀二來壽娥有了慶雪兩兒誰也不肯亂去勾搭了他雖然每每在他跟前獻了不少殷勤無奈壽娥正眼也不去看他一下子只好害了一個單相思罷了如今見他這個樣子便對他説道夫人此刻還不趕緊逃難麼馬上禦林軍打進來玉石俱碎了他忙向他問道你可知道慶雪兩兒現在逃到哪里去了他聽這話便撒謊答道太太還問呢我躲在大廳後面看得清清楚楚的他兩個被那一班禦林軍一刀兩段兩刀四段早已了帳我倒很替他們可惜呢他聽説這話止不住傷心落淚那個侍尉卻假意安慰道夫人人死不得復生哭也無益如今火燒眉毛顧眼前罷趕緊去逃命要緊他聽説雪慶兩兒死了心早冷了再也不願去逃命了便對那個侍尉説道多謝你的好心可是奴家心已灰了決定一死了事如今家破人亡我一個人活著也沒趣味了你卻快去逃命吧不要因為我連纍你的性命都送掉了那侍尉還不識他的心事仍然勸他動身他也不答話順手將領口上兩個金鈕子摘了下來便往嘴裏一送那侍尉見他吞金連忙過來抱住他的臂膊説道夫人你也太不明世理了我在這裏這樣的勸你你還不省悟一定要尋死豈不是可惜麼他有一搭沒一搭地在那裏説著壽娥也不去答他只將星眼緊閉低頭等死他此刻什麼大事都不管了偎著壽娥還要勸他隨自己逃走呢這時房門簾一揭闖進四個禦林軍他聽腳步聲音忙回頭一看不禁失口叫道阿呀話還沒出口刀光一亮他的頭早和頸上脫離了關係了壽娥的金鈕子也在肚裏同時作起怪來不等他們來動手就一命嗚呼到九泉下陪伴梁冀去了衆禦林軍在梁冀的府中一直搜殺到天亮才算肅清事後調查共得男尸二百五十四口女尸一百三十七口活捉八十四人共抄得黃金三千斤白銀一萬二千七百余斤金章玉印八十四件大將軍印綬一顆刀槍三千四百三十一件馬八百匹牛一千四百頭田五百八十六頃絹三千匹糧食一萬二千八百余合尚有奇珍異寶五十匣零星物件八十箱當由張惲按件呈報桓帝次日下旨將河南尹梁胤屯騎校尉梁讓親從侍尉梁淑越騎校尉梁忠長水校尉梁志等一齊拘到斬首市曹還有壽娥內外宗親及現有官爵者一併誅于市曹就連壽娥的母親童老夫人也未能免復又將太尉胡廣司徒韓繽司空孫朗等一班阿附梁冀之徒一併梟首示衆四府故吏賓客黜免至三百餘人可是這層事起得忒倉猝了不獨滿朝文武人人自危就是長安的衆百姓見了這樣的大變動免不得也個個惴惴不安街頭巷尾沸沸揚揚不可終日邴尊恐鬧出別樣的事故來忙上表請下詔安民桓帝準奏忙下詔曉諭天下詔曰梁冀姦暴濁亂王室孝質皇帝聰明早茂冀心懷忌畏私行弒毒永樂太后即匽皇后親尊莫二冀又遏絶禁還京師使朕永離母子之愛永隔顧復之恩禍深害大罪孽日滋賴宗廟之靈及中常侍貝璦徐璜左琯唐衡尚書令尹勳動軍馬司張惲等激憤建策內外協同漏刻之間桀逆梟夷斯誠社稷祐臣下之力宜班慶賞以酬忠勳其封超等六人為縣侯惲另加一階並賜黃金三十斤良馬五匹其有餘功足録尚未邀賞者令有司核實以聞這詔下後天下人心始為安定單超復奏小黃門劉普趙忠等亦拼力誅姦應加封賞桓帝準奏即封劉趙以下八閹人為卿侯從此宦官權力日盛一日了梁皇后見乃兄九族全誅不由得又悲又恨加之桓帝因為梁冀謀為不軌對於梁皇后便不十分寵幸連足迹也罕至淑德宮了梁皇后氣郁傷肝一病奄奄竟無起色了未上兩月一命嗚呼桓帝本來是個見新忘舊的人見他死毫不傷悼只得照後妃葬禮將他草草地入殯之後急將鄧貴人册立為六宮之主鄧貴人格外逢迎桓帝自然是恩寵有加不必細説再表一班權閹將梁冀誅了之後頓時癩狗得了一身毛狂放到十二分賣官鬻爵任所欲為桓帝向來是個懦弱成性的人再加上耳朵又軟經不起他們的花言巧語將他哄得團團亂轉要怎麼便怎麼百依百順滿朝文武見桓帝和他們親密得厲害誰不會趨炎附勢呢你也奉承我也逢迎沒有一個敢去和他們走頂風的這一來這班權閹格外自高自大目無法紀了這時卻惱動了一位大臣你道是誰卻原來就是大司馬吳欣他本是個不肯阿私的人見他們這樣的擾亂治安害民誤國不由得怒從心上起惡向膽邊生便切切實實地修了一道本章奏與桓帝桓帝看罷倒也觸目驚心便要治他們的應得之罪他正在遲疑的當兒徐璜唐衡俯伏金階奏道我主萬歲臣等訪得洛陽有女名田聖年才及笄德言工容四者俱備臣等思我主禦內不過鄧娘娘竇貴人為陛下所契重然而宮闈廣大究屬乏才料理臣等籌思再四敢請陛下選入掖庭補助坤政桓帝正在要究辦他們聽説這番話不禁滿心歡喜忙道此女卿家可曾帶上朝沒有二人忙奏道現在午門以外候旨定奪桓帝忙道宜進來黃門官忙出去不多一會引進一個絶色的美人來婷婷嫋嫋地走到殿下折柳腰便拜櫻口一張吐出一種嬌嬌滴滴的聲音來説道賤妾願我主萬壽無疆桓帝仔細一看那女子從容舉止果然比花花解語比玉玉生香不禁龍顔大悅忙道免禮平身隨在殿上封為貴人他三呼謝恩這時擁出許多宮女將他擁簇著進宮去了桓帝向二人笑道兩位愛卿薦賢之功真正不小孤王也沒有什麼酬謝只送黃金五十斤絹彩八十匹聊作謝媒之儀罷二人俯伏謝恩這時可不將一個吳欣氣倒正要復奏哪知桓帝得了田聖急不能待龍袖一展百官退朝吳欣忍氣回府坐在百客廳上唉聲歎氣地道權閹擾亂政治萬歲昏庸國將危亡恐無多日了他正在這裏憤慨的當兒僕從進廳報道太尉黃世英來了他忙命請了進來不多時走進一個白髮皤皤的老者來進了廳吳欣趕著讓坐説道黃老丈今天是什麼風兒吹到這裏來的黃世英將鬍鬚一抹説道這兩天賤體微有不爽所以連朝都沒有上今天覺得稍好一點了可是在家悶得厲害所以特地來和你談敘談敘的吳欣道下官連日碌碌未曾到府去問安反纍老丈的玉趾惶恐惶恐黃世英見他雙眉緊蹙面帶愁容不由問道司馬怏怏不樂有什麼事這樣的呢他歎氣答道老丈還問什麼我們這班人不久就要做無頭之鬼了他聽這話不禁吃驚不小忙問道你這是什麼話呢他道佞臣弄權天怒人怨國亡恐無久日了試想覆巢之下豈有完卵黃世英忙道這真奇了那粱冀不是除掉了麼現在又是誰人弄權呢吳欣冷笑道老丈還在夢裏呢如今的一班賊子其凶暴行為比梁冀恐怕還要狠十分呢他忙問是何人吳欣便將徐璜唐衡等一班人的行為細細地説了一遍將一個黃世英只氣得鬍子倒豎怒不可遏便向他道你既然曉得他們這樣的胡行為何一道本竟不上呢他歎了一口氣道老丈休提起奏本説來傷心下官今天上了一道奏章萬歲起首倒有幾分怒容後來那班賊子進了一個洛陽的美女名叫田聖生得妖嬈出色萬歲見了連魂都險些兒被他攝去將我的本章不知丟到哪里去了連提也不提了他説罷黃世英氣沖牛斗便道好好好萬不承望我朝又出了這班佞賊呢老夫此番和他們總要見個高下的他説罷便告辭回去了在燈下修一封奏章將一班權閹的厲害切切實實地寫上一大篇次日五鼓上朝呈於桓帝桓帝見他的本章料想定是彈劾權閹他也好連看都不看往龍案下面一隻金簍裏一塞黃世英還當他見過本章呢退朝之後一班權閹將他的本章從金簍裏內查了出來大家仔細一看互相怒道頗耐這個老賊竟和我們作起對來好好好包管將這老賊結果了才見我們的本領呢徐璜對衆人説道他固然是我們的對頭了你們還不知道還有一個仇人呢衆人忙問是誰他道便是大司馬吳欣昨天我們進田聖之前他也有本章彈劾我們的不過萬歲見我們進了田聖才把這事不提的否則萬歲要尋根究底了衆人一齊發恨道怪不道那賊子平時看見我們總是烏眼雞似的我們以為河水不犯井水不與他去較量不想他竟不知死活竟敢到太歲頭上來動土豈不是自己討死麼唐衡便向衆人説道這兩個狗頭在萬歲的面前早就有些威信我們如果在名義上去和他們作對料想萬歲一定不會就將他們治罪的不如在暗地想出一個方法來將兩個狗頭結果那才是一干二淨的呢衆人卻道你這話未嘗不是我們要出什麼法子來結果他們呢唐衡道這裏不是談話之所諸位請到我的家裏再議罷衆人道好便一齊到了唐衡的府內賓主坐下唐衡便向衆人説道如今萬歲不是待鄧後漸漸地寵衰了嗎衆人都道不錯他道我這條計真是三面俱到十全十美衆人便問他是個什麼計劃他便向衆人附耳説道只消如此如此還怕他們不送命麼衆人聽了一開讚美道虧你想得出這條計果然是風雨不透左琯道我明天就進宮去安排一切就是了他們暢談了一會才各自散去到了第二天左琯便托故進宮暗中與田聖商議教他見機行事未到三天桓帝早朝突然對衆大臣説道內宮遭了竊失去夜明珠兩粒這珠乃是無價之寶哪位卿家可能替孤搜查回來加官三階左琯徐璜一齊出班奏道我主萬歲微臣等願去但是有一層依臣等的愚見如今珠子既然失去料想不是禁城外的人偷的這一定是禁城裏的人偷的臣等搜查起來當然是不分尊卑一概都要搜查的萬一有一兩位大臣抗旨不受檢查微臣等官卑職小難以執行桓帝不等他們説完道無論何人不得抗旨如有抗旨的孤家先賜你們一支上方寶劍先斬後奏左琯徐璜領旨謝恩這時滿朝文官驚異非常自漢家有天下以來宮闈以內從來沒有差少一些東西的誰不知道是他們的詭謀呢再説徐璜左琯得著聖旨手到擒來將黃世英抓上他們獻上明珠又獻上一雙宮鞋聲稱是在大司馬吳欣的府中查出來的他兩個奏罷把個桓帝氣得一佛出世二佛涅槃連聲喊道快將吳欣抓來一併處死左琯等不待下旨便飛也似地走去將吳欣拿到不由分説和黃世英推出午門斬首滿朝文武噤若寒蟬誰也不敢出來保奏獨有邴尊怒氣填胸越班出衆前來保奏剛剛俯伏下去還未開口説時遲那時快兩顆血淋淋的人頭已經捧上來邴尊見了不由得一陳心酸退身下來暗自道黃老伯不承望今天和你永訣了他也無心去辨白了桓帝將他兩個殺了才稍稍的泄怒從此任用姦佞政治紊亂得不可收拾苛征重稅民不聊生桓帝成日價和田聖等尋歡取樂不理朝政這田聖為顧全自己的寵幸起見又托人到外邊去買了十個絶色的女子進宮桓帝得了這十個絶世的玉人越發縱淫無度不到三月竟染了癆瘵骨瘦似柴無藥可救了好端端的一個三十六歲的皇帝竟在德陽前殿奄臥不起瞑目歸天了桓帝崩後竇娘娘便差劉倏持節到河間將解瀆亭侯劉宏迎入京都繼承大統統國號建寧稱為靈帝尊竇娘娘為太后竇太后大權在手先將田聖等一班尤物處死除去夙怨授竇武為大將軍並徵用司隸李贋太守荀昱等輔政事起初倒還十分勤謹誰知到後來漸漸地不對了任用趙嬈王甫曹節一班佞臣了這趙嬈尤為群姦中最刁惡的一個舌劍唇槍哄得竇太后百依百順他們又聯絡內閹互通一氣賣官鬻爵為所欲為擾亂得不分皂白天怒人怨渾渾噩噩的數年政治愈來愈亂盜賊蜂起巨鹿張角等紛紛起事自號為天公將軍又號張寶為地公將軍張梁為人公將軍嘯聚四方民衆群起謀叛所到之處搶劫燒殺無所不為靈帝派兵遣將前去征戰無奈賊勢浩大此方剿滅彼方又起絶不能務絶根株的在這黃巾攪亂的當兒憑空跳出三個出色驚人的大英雄來便是涿縣中山靖王的後裔劉備和同縣的張翼德河東解縣的關雲長他三個領著義兵輔助天師將一班黃巾賊殺得五零四落餘黨逃向關外而去朝廷下旨便封劉備等三人為安喜縣他們奉旨上任不提再表許昌城外高頭村有一個異丐生得面如傅粉唇若丹朱相貌魁偉膂力過人慷慨好義每每遇到什麼不平的事情馬上就得排難解紛扶弱除暴所以一村的人沒有一個不佩服他的尤其是那葛大戶家的大小姐葛巧蘇對於他十分心折自古道佳人豪傑本是一連這話的確不錯他由慕生愛便暗中派他的一個心腹小丫頭名字叫流兒的前去喊他到後圃裏一晤流兒得著他的命令狗顛屁股似地去到異丐平日常住的那個土地廟裏面向他説道我們家小姐慕你的英名特地叫我來請你去和他去會面呢異丐好不驚訝身不由主地隨他走了這正是潦到風塵人不識誰知竟得麗姝憐要知後事如何且看下回分解
