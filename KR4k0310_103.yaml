body:
  text: 第六十三回協力同心誓扶漢室翻雲覆雨初入柔鄉卻説劉文叔見他問話低聲答道久慕芳名昨于無意中得瞻仙姿私懷幸慰故以寄信為題借此與玉人一親芳澤雖死亦願矣但素昧平生幸勿責我孟浪則銜感無限陰麗華聽了這番話只羞得粉面緋紅低垂螓首半晌答不出一句話來他也不便再説倆人默默的一會子劉文叔偷眼看他那種態度愈是怕羞愈覺可憐可愛他情不自禁地逼近一步低聲問道小姐不答莫非嗔怪我劉某唐突嗎陰麗華仍是含羞不語他恐怕馬上要有人來坐失此大好的機會大膽伸手將麗華的玉手一握他也不退避劉文叔見了這種光景加倍狂浪起來一把將他往懷中一摟接了一個吻説道親親你怎麼這樣的怕羞呢此地也沒有第三個人在這裏是否敢請從速一決他躲避不疊不覺羞得一雙星眼含著兩包熱淚直要滾了下來他見他這樣情形忙放了手説道小姐既不願與某可以早為戒告某非強暴者流就此請絶罷他撒開手便要出來陰麗華忙伸出玉腕將他拉住哭道我曾聽古人有雲女子之體價值千金斷不能讓男子廝混的我雖然是個小家女子頗能知些禮義家兄為我物色至今完全碌碌之輩不是滿身銅臭便是紈袴氣習俗氣逼人終未成議昨日在此地見君早知非凡人可比但今朝君來我非故意作態一則老母生病未愈二則家兄等俱在母側倘有錯失飛短流長既非我所能甘受與君恐亦不宜他聽了這番話知道他已誤會忙答道小姐你可錯疑我了鄙人方才的來意不過完全是徵求尊意是否能夠下顧垂愛別無其他的用意的我非是那一種輕薄之輩專以肉欲用事的他回悲作喜道這倒是我錯怪你了不知你還肯原諒我嗎劉文叔笑道小姐哪里話來小姐肯憐惜我我就感激不盡了何敢説個怪字呢他道我們坐下來談罷劉文叔唯唯地答應便走向左邊的椅子上坐下他便將明兒喊來附耳談了幾句明兒點頭會意又將劉文叔瞟了一眼方才出動他從容地坐下方展開笑靨問道劉先生胸懷大志將來定能做一番轟轟烈烈的大事業的眼見中原逐鹿生靈塗炭莽賊窺竊神器轉眼六年蕓蕓衆生急待拯救不知先生將用何種方針去恢復漢家的基業呢他説罷凝著秋波等他回答劉文叔聽他説出這番話不禁十分敬愛不由得脫口答道吾家基業現不必論終有恢復之一日丈夫處事貴於行而不貴乎言言過其實非英雄也敝人的志願仕宦當作執金吾娶妻當娶陰他説到這裏忙噎住不響知道自己失言登時面泛紅肖他聽他剛説到一個陰字便噎住了自己還不明白嗎也羞得面泛桃花低首無語劉文叔忙用了話岔開去二人又談了一會劉文叔雖然是個年未弱冠的少年但是他的知識卻過於常人一舉一動都深有含蓄比較他的兩個哥哥真有天淵之別今日見了麗華覺得他沒有一處不可愛看官這個愛字與情當然是個搭檔的情與肉欲又差到多少路程呢看官一定能夠瞭解的我再進一步説這愛與情情與肉欲至多間隔著一毫一發吧任他是什麼人一發生了愛自然就會有情了有了情那必從肉欲這條道路上走一下子才算是真情呢誰説我這話説得不對他就是個大騙子為什麼呢肉欲也是情之一種也就是情的收束間話少説言歸正文劉文叔和他談了一陳子只見陰麗華朱唇輕啓口若懸河句句動容矢矢中的他可是把那愛河的浪花直鼓三千尺按捺不定低聲問道我能夠常常到此地來聆教聆教嗎他微笑不答伸出纖纖玉腕拿起筆來就在桌上寫了四個字他靠近來一看乃是關防嚴密他也提起筆來在手心裏寫了六個字何時方可真個伸出手來向他示意他閃著星眼一看不覺紅暈桃腮嬌羞不勝復提起筆來在玉掌上面寫了一行字向劉秀示意他仔細一看原來是明酉仍在此候駕他看罷心中大喜便向他説道蒙允感甚但是現在因為還有許多事情要回去料理明日屆時過來候駕今天恕我不陪了他含羞微笑道你今天出去可要不要著人送你他忙道不需不需他將明兒喚了進來説道你將劉先生送出園快點回來我在這裏等候你呢明兒諾諾連聲地送著劉文叔走出書房一直將他送到園門口劉文叔依依不捨回頭一望只見他倚著花欄還在那裏朝自己望呢他可是站住不走了明兒道先生你今天和我們小姐談些什麼話他笑道不過談些平常的話罷了明兒搖頭笑道你不要騙我我不信他説著斜瞟星眼盯著劉文叔文叔笑道好姐姐你不要告訴人家我就説了明兒忙答道我不去告訴人你説吧他笑道好丫頭你們小姐許給我了明兒詫異問道這話從何説起怎的我們一些也不知道呢他笑道要你們知道還好嗎明兒笑道呸不要我們知道難道你們還想偷嘴嗎劉文叔禁不住笑道好個伶俐的丫頭果然被你猜著了明兒又問道敢是你們已經他説了半句下半句説不下去了羞得低著頭只是發笑劉文叔見他這樣子不由得説道不瞞你説雖然沒有到手可是到手的期限也不遠了明天還要煩你神呢明兒道明天煩我做什麼劉文叔笑道你和我走出園去告訴你二人便出了園文叔便將方才的一番話完全告訴了他把個明兒只是低頭笑個不住道怪不得兩個人在書房裏咕咕嘰嘰談了半天原來還是這個勾當呢好好好我明天再也不替你們做奴婢了劉文叔忙道好姐姐那可害了我了千萬不能這樣總之我都有數事後定然重重地報答你好嗎明兒笑問道你拿什麼來謝我呢劉文叔笑道你愛我什麼便是什麼明兒指著他羞道虧你説得出好個老臉他説罷翻身進去將門閉起劉文叔高高興興地認明了方向順著有生字的荼蘼花架走了出去到小橋邊又看了一回風景才尋著原路回來肚中已覺得餓了忙叫童兒去拿飯來胡亂吃了些才放下飯碗就有兩個老佃長進來稟話見了劉文叔兩個老頭子一齊跪下劉文叔慌忙下來將他們扶起來説道罪過罪過這算什麼你們有話簡直就坐下來説就是了何必拘這些禮節呢一個老頭子捋著鬍子歎道我們今天到這裏來原來有一樁要緊事情要討示下劉文叔道什麼事情你們先坐下來慢慢地説罷兩個老頭子同聲嚷道阿也我們佃戶到這裏來斷沒有坐的道理還是站著説罷劉文叔忙道二位老丈這是什麼話趕緊坐下來我不信拘那些禮節而且我們又不是皇帝家何必呢兩個老頭子又告了罪方才坐下劉文叔問道二位老丈今天難道有什麼見教嗎東邊花白鬍子的先答道小主人你還不曉得現在新皇帝又要恢復井田制了聽説北一路現在都已實行了馬上就要行到我們這裏來了我想我們一共有六百多頃田要是分成井田可不要完全歸別人所有了嗎劉文叔聽了這話吃驚不小忙問道這話當真麼那兩個老頭子同聲説道誰敢來欺騙主人呢劉文叔呆了半晌跺足歎道莽賊一日不除百姓一日不安那老頭子又説道聽説有多少人現在正在反對這事不知可能成功劉文叔歎道這個殘暴不仁的王莽還能容得人民反對嗎不消説這反對兩個字又不知殺了多少無辜的百姓了正説話時劉仲走了進來聽他們説了個究竟氣得三光透頂暴跳如雷大聲説道怕什麼不行到我們這裏便罷如果實行到我們這裏憑他是天神也要將他的腦袋揪下來看他要分不要分了再不然好在我們的大勢已成趁此機會就此起兵與莽賊分個高下若不將吾家的基業恢復過來誓不為人劉文叔勸道兄長你何必這樣的大發雷霆呢現在還沒有行到這裏呢凡事不能言過於行的事未成機先露這是做大事的人最忌的劉仲被文叔這番話説得啞口無言轉身出去那老頭子又向文叔説道昨天大主人到我們那裏去教我們讓出一個大空場來給他們操兵我想要是在冬天空場盡多現在正當青黃不接的時候哪里能一些間空地方呢我當時沒有回答今天請示究竟騰出哪一段地方做操場劉文叔沈思了一會對兩個老頭子説道那日升穀旁邊一段地方現在不是空著呢兩個老頭子同聲説道阿也真的老糊塗了放著現成的一段極大的空地不是忘記了劉文叔笑道那一段空地就是有十萬人馬也不見得怎麼擁擠的你們今天回去就命人前去安排打掃以備明日要用兩個老頭子唯唯地答應告辭退出一宵無話到了第二天一早上那四處的鄉勇由首領帶領一隊一隊地向白水村聚集不到多時只見白水村旗幟職揚刀槍耀日劉蘼劉仲忙得不亦樂乎一面招待衆首領一面預備午飯直鬧到未牌時候大家用飽茶飯各處的首領紛紛出來領著自己的人馬浩浩蕩蕩直向日升穀出發劉蘼劉仲騎馬在後面緩緩地行走他的叔父劉良也是老興勃發令人扶他上馬跟去看操到了地頭一聲呼號一隊隊的鄉勇排開雁陳聽候發令那一班首領騎在馬上奔走指揮一時秩序齊整便一齊放馬走到劉縯劉仲的面前等侯示下劉仲首先問道秩序齊整了嗎衆首領轟天價的一聲答應道停當了劉縯便向司令官一招手只見那個司令官捧著五彩的令旗飛馬走來就在馬上招呼道盔甲在身不能為禮望明公恕罪劉縯一點首那司令官便取出紅旗在陳場馳騁往來三次然後立定了馬將手中的紅旗一層那諸首領當中有三個人並馬飛出陳場司令官揚聲問道來者敢是火字隊的首領嗎三人同聲答道正是司令官便唱道第一隊先出陳訓練那個背插第一隊令旗的首領答應一聲飛也似地放馬前去將口中的畫角一鳴那東南角上一隊長槍鄉勇風馳電掣地卷出來剎那間只見萬道金蛇千條閃電般地舞著司令官口中又喊道火字第二隊出陳對手試驗那第二隊的首領也不及答應就飛馬前來將手中的銅琶一敲霎時金鼓大震一隊短刀鄉勇從正東方卷了出來和長槍隊碰了頭捉對兒各顯本領槍來刀去刀去槍迎只殺得目眩心駭這時司令官又大聲喊道火字第三隊出陳合擊第一隊第三隊的首領早就放馬過去聽司令官一聲招呼便將令旗一招那一隊鐵尺兵疾如風雨般地擁了出來幫著短刀隊夾攻長槍隊只殺得塵沙蔽日煙霧障天司令官將黃旗一層霎時金鼓不鳴那火字第三隊的人馬風捲殘雲般退歸本位露出一段大空場來靜悄悄的鴉雀無聲這時候忽見西邊一人飛馬而來劉縯劉仲回首看時不是別人是劉文叔前來看操的他首先一句問道現在操過第幾陳了劉縯答道操過第一陳了劉文叔道成績如何劉縯點頭微笑道還可以話還未了只見司令官口中喊道土字第一隊出陳那個首領背著一把開山斧用手一招東北上跑出一隊斧頭兵來每人腰裏插著兩把板斧一個個雄赳赳地挺立垓心那首領一擊掌那些斧頭兵連忙取斧頭耍了起來光閃閃的像雪球一樣司令官又喊道第二隊出陳對手第二隊的首領忙將坐下的黃驃馬一拍那馬嘶吼一聲只見正北上一隊銅錘兵蜂擁前來和第一隊的板斧相搏起來此時只聽得叮叮噹噹響聲不絶於耳戰夠多時司令官取出黑旗迎風一層那兩隊土字兵慢慢地退回本位司令官口中喊道水字第一隊出陳話還未了只見正南的兵馬忽地分開這時金鼓大震那水字隊的首領用手一招登時萬弩齊發射到分際司令官將旗一擺復又一招瞥見第二隊從後面翻了出來每人都是腰懸豹皮袋竄到垓心一字兒立定取出流星石子只向日升穀那邊擲去霎時渾如飛蝗蔽空一般司令官將白旗一豎那流星一隊兵就地一滾早已不知去向正西的盾牌手翻翻覆覆地卷了出來司令官又將藍旗一招那正南方霍地竄出一隊長矛手和盾牌手對了面各展才能藤牌一耍花圈鐵簇長矛一動閃電驚蛇殺了多時司令官將手中五色彩旗一齊舉起臨風一揚四處的隊伍騰雲價地一齊聚到垓心互相排列著就聽金鼓一鳴那五色的兵隊慢慢延長開去足有二裏之遙司令官兜馬上了日升穀將紅旗一招三隊的火字兵立刻飛集一起司令官將五色旗挨次一招展那五隊兵霍地一閃各歸本位胡笳一鳴各隊兵卒都紛紛散隊各首領和司令官一齊到劉縯面前打躬請示劉縯點頭回禮向衆首領説道諸公辛苦了今天會操的成績我實在不望到有這個樣子只要諸公同心努力何愁大事不成呢劉文步忙問道誰是流星隊的首領只見一個小矮子近來躬身説道承問在下便是劉文叔滿口誇讚道今天各隊的訓練成績都是不差惟看你們這一隊的成績要算最好了那個矮子只稱不敢劉良笑道文叔你平素不是不大歡喜練有武功嗎今天為何也這樣的高興呢文叔笑道願為儒將不為驍將儒將可以安邦定國驍將不過匹夫之勇耳劉良驚喜道我的兒看不出你竟有這樣的才幹漢家可算又出一個英雄了大家又議論了一會只見日已含山劉縯便令收兵回去一聽令下登時一隊隊地排立齊整緩緩地回去劉良等回到白水村劉縯便請諸首領到他家赴宴談心大家剛入了座劉文叔猛地想起昨日的話來酒也不吃起身出席走後門出去幸喜劉縯等因為招待賓客未曾介意他趁著月光出了白水村一徑向楊花塢而來一路上夜色蒼茫野犬相吠真是個碧茵露冷花徑風寒一轉眼又到陰家的後園門口他展目一看只見雙扉緊閉雞犬無聲他不覺心中疑惑道難道此刻還沒人來敢是陰小姐騙我不成我想絶不會的或者他的家中事牽住也未可知再則有其他緣故也説不定他等了多時仍未見有一些動靜自言自語地道一定是出了岔頭了不然到這晚明兒還不來呢他等得心焦正要轉身回去猛聽得呀的一聲門兒開了他可是滿肚子冰冷登時轉了熱忙定睛一看不是別人正是明兒他向他一招手他進了園明兒輕輕地將門關好領著他一徑向前而來轉亭過角霎時到了麗華的繡樓輕輕地上了樓走進房內但見裏面陳設富麗堂皇錦屏繡幕那一股甜絲絲的香氣撞到他的鼻子裏登時眼迷手軟渾身愈快那梳粧檯上安放著寶鴨鼎內燒沈香右邊靠壁擺著四隻高腳書廚裏面安放牙籤玉軸琳琅滿目他走進幾步瞥見麗華倦眼惺忪地倚著薰籠含有睡意明兒向他丟下一個眼色便退了出去他輕輕地往他身旁一坐這正是最喜今朝兼四美風花雪月一齊收要知後事如何且看下回分解
