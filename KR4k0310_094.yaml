body:
  text: 第九十四回碧血濺衣寡君自晦青衣入詩稚子蒙恩卻説光緒帝因在醉後與隆裕皇后爭吵一個不小心把皇後頭上的一支玉白簪碰落地上頓時跌做兩段因為這支簪是高宗所傳長約四寸晶瑩光潔沒有一些斑點的確是件寶物光緒帝締婚的時候西太后就賜給皇后了也算是清室傳家之寶今天墜地跌斷了皇后早已著慌便垂著淚説道這支簪原是祖宗的遺物又是老祖宗賜給的現在被皇上跌斷了我怎好去見老佛爺呢隆裕皇后説著便抽抽噎噎地哭了起來瑾妃知道這事鬧大了一邊慰勸皇后一邊又替皇帝擔憂皇后哭了一會忍著淚説道別的不用講了簪也斷了這責任須皇上擔負就一塊兒去見老佛爺聽候處分吧光緒帝初時見玉簪跌碎倒也有些懊悔連酒也醒了這時聽得皇后説要一道去見西太后不覺又把氣提了上來大怒道區區一支簪兒即便是朕弄斷了也不見得會拿朕怎麼樣你開口閉口用太后來嚇人朕便害怕了嗎説完對著地上的斷簪再奮力地一踏接著又憤不可遏地説道你快去告訴太后説朕有意這樣做的看拿朕怎麼辦吧隆裕後見皇上發怒也不敢再説只得含一泡眼淚叫小太監打槳渡到對岸見太后去了皇后走了皇帝兀是余怒不息瑾妃忍淚勸慰道皇后此去向老佛爺哭訴不知又要出什麼花樣呢光緒帝仍然憤怒地説道管他們去怎樣呢當下一宿無話第二天西太后召見光緒皇帝瑾妃曉得是昨天跌碎玉簪的事情發作便悄悄地對皇上説太后來宣皇上諒沒有好事定是為了那簪的事到了那裏只得聽其自然不要像昨日那樣言語頂撞不僅你受皇太后的責難還會連纍臣妾呢光緒帝點點頭他想起昨天的事著實有些膽寒這位皇上平素本懼怕西太后的酒後忘乎所以等到酒醒悔已遲了聽到西太后宣召不免畏首畏尾只得硬著頭皮見太后西太后等光緒帝行禮畢才發話道虧你也是一國的君主有些行為還不及一個尋常的百姓昨天甚至乘著酒興像瘋癲一樣打起皇后來了這不是和我作對嗎我把自己的侄女同你聯成婚姻原想會和和睦睦的不料適得其反但只要説出皇后的種種過失説得明白不妨布告天下可以把他廢掉何必這麼做作呢若你不願意做就由我替你實行準把皇后廢掉就是不過你得將他的罪名老實説出來光緒帝連忙叩頭並分辨道兒臣並沒説他有什麼不好昨天一時醉後糊塗下次改過了決不再有這樣的行為還求老佛爺免怒西太后冷笑道酒醉糊塗麼國家大事也這麼糊塗怕不將天下送掉嗎但我知道你素性忠厚斷不至如此無賴準是那狐媚子記恨在心攛掇你才這樣的我如今且來懲治他一回以警將來就是了西太后説話完畢回頭叫宣瑾妃過了一會瑾妃已淚盈盈地隨著太監來到太后面前跪下叩了個頭西太后喝道昨日皇上和皇后爭鬧你可在那裏麼瑾妃重又跪下道婢子也在一旁相勸的西太后怒道到了那個時候用你勸解哩你既知相勸也不必唆弄出來了瑾妃忙叩頭道婢子怎敢西太后不等他説完便把案桌一拍道由不得你強辨給我攆下去重責四十光緒帝慌忙代求道老佛爺慈鑒那都是兒臣的不好不幹妃子的事乞賜恩饒恕了他吧西太后説道每次是你袒護著求情所以弄得他們的膽放大了不僅沒把皇后放在眼裏再下次連我也不在心上了今天我偏不饒他內監們領了旨意牽著瑾妃走了可憐光緒帝眼看著瑾妃去受刑自己無法挽救真同尖刀剜心一樣又兼昨日飲酒太過腦中受了強烈的刺激眼前一黑幾乎昏了過去終算勉強支援了這時西太后又問道從前內外臣工都説穆宗毅皇帝不可無後咱們就定了端王之子溥俊入繼册立為大阿哥但如今那端王已成了罪人朝臣紛紛議論就是諸親王等也很多責難這溥俊自然不能照常膺受重爵大阿哥的名目只好準了衆議把來廢黜的了但我是這樣想不知你的意見怎樣光緒帝説道老佛爺以為怎樣就怎樣為是了西太后微笑道你既已同意當初册立之時也是你出面布告天下的現欲廢立依舊要你頒詔才是光緒帝道那個是臣兒理會得即經施行就是西太后説道你打算還是過上幾時嗎這事刻不容緩的你不見那些外臣的奏牘麼説著把一個黃袱裹著的奏疏夾令內監遞給光緒皇上一面説道那麼你就起草罷明日就可頒布哩光緒帝不敢違拗只得要了朱筆慢慢地打起草稿來這個當兒內監來請進禦膳西太后便同了皇上到湖山在望處去午餐皇上和西太后共食本是千年難得的但是光緒帝因心裏不舒又記挂著瑾妃無論是山珍海味哪里吃得下呢西太后又在這時講些西狩時的苦處越發令光緒帝受了感觸因此胡亂吃了一點膳畢仍然去擬他的詔書不過草就了一半光緒帝陡覺得頭昏眼花身不由主地望後倒了下去慌得一班內監趕緊過來扶持了西太后也著了忙急急跑到光緒帝面前安慰著道你要自己保重一點呢須知我已是風前之燭將來的責任還不是在你身上嗎但我聽得你現在不比以前自暴自棄的地方很多真替你可惜阿西太后一面説著也假意彈了幾點眼淚光緒帝聽了西太后的話説只微微把頭點了幾點這時忍不住咳了起來哇地一口鮮血直噴了出來正濺在西太后的衣上西太后著實吃了一驚忙説道你這症候來勢很是不輕快命太醫院趕緊來診治吧內監們聽了飛奔地去召太醫這裏西太后陪著皇上靜坐了一會不一刻太醫來了行過君臣禮仔細診斷了一遍説皇上怒氣傷肝鬱火上炎所以吐出血來了而且積鬱過久恐藥石一時不易見效西太后見説不覺長歎了一聲其時內監已推過西太后的臥車來慢慢地把光緒帝扶上車子西太后親自替皇上安放了枕衾又再三地叮囑幾句靜養的話從形式上看去母子間的情感似乎非常深厚呢光緒帝臥在車上雖有太監們護著可是半身實早失了知覺了似這樣地出了慈安殿仍用小舟渡到瀛台瑾妃已在那時侍候著只是玉容慘淡表示他因受責後身上傷痕劇痛所以有這樣的現象光緒帝見景傷情益使他心裏難受故此一見了瑾妃只是連連搖手似乎叫他退去不必再來侍候瑾妃會意便略去休息一刻又來榻前照料了有時在朦朧之中忽然呼起痛來倒把皇上驚醒了明知瑾妃的創痛心裏一氣病也愈加沈重了不言光緒帝臥病且説西太后送光緒皇上走後知道他病很厲害自己掌著朝政全恃垂簾的名目大權獨攬滿人族中誰不妒忌他呢就是近支的親王也沒一個不覬覦大位乘隙而動不幸光緒皇上有什麼差遲族人自然要競爭入繼到了那時一朝天子一朝臣別人繼了大統當然另有攝政之人西太后一旦大權被攫不免要受人指揮焉有今日的榮耀呢思來想去覺目下的地位倒是十分危險因召軍機大臣榮祿入內計議商量了一會終籌不出善後的良策來於是西太后也一天到晚愁眉不展地悶悶不樂慶王奕劻見西太后沒精打彩便乘間奏道後天是穆宗毅皇帝的陰壽忌辰老佛爺待怎樣辦理西太后也記了起來道咱們這幾天很不起徑只吩咐喇嘛誦一天經令大臣侍祭一番就是了奕劻奏道奴才的意思除了這幾種外還叫內監們唱一天戲給老佛爺解解悶哩西太后生平最喜歡的是聽戲所以也不説可否惟略略頷首已算允許的了奕劻領了諭旨便很高興地去辦不提到了穆宗陰壽的那天文武官員都換青服素褂齊齊地到太廟去祭奠一行完了禮便到頤和園中來給老佛爺叩頭西太后就在大院殿上設了素筵賞賜一班大臣這時內廷供奉的命人因庚子之後都也四散了所留存的不過一個老鄉親孫菊仙奕劻要討西太后的歡心又去外面招了個唱武生的柳筱閣來講這個柳筱閣本是從前柳月閣的兒子他老子柳月閣也是武生出名的尤長於做神怪戲所以有小猴子之稱柳筱閣得他師傅余老毛的祕傳演起戲來反高出他老子柳月閣之上因此京裏也很有點小名氣這天奕劻把柳筱閣召入頤和園內演戲西太后最相信看神怪劇而且為演怪戲的緣故在大院的戲臺三層樓上還特製了布景咧足見西太后的迷信神權間話少講言歸正傳且説柳筱閣在這天所演的戲是水簾洞金錢豹盜芭蕉扇三出是西太后親自所點柳筱閣便提足精神狠命地討好果然演來十分地周到大蒙西太后的贊許待戲演完之後西太后即召見柳筱閣問了姓名年歲柳筱閣一一答復了西太后大喜命內務府賞給柳筱閣三百塊錢柳筱閣謝恩出來一班唱戲的同行都很羡慕他從此以後西太后不時召柳筱閣進宮演劇於是柳筱閣居然也得出入宮禁了一天柳筱閣照常入宮演戲還帶了他的女兒小月一同進去演戲既畢西太后賞了他些綢緞之類筱閣和他的女兒小月前去謝恩西太后見小月面如滿月膚若羊指舉動之間很是活潑可喜西太后便指著問道這是誰呀筱閣叩頭答道是奴才的女兒西太后笑道今年幾歲了倒很覺是有趣就留在這裏明天叫你的妻子來領他罷柳筱閣連聲稱是立即叩謝了出來去準備他的妻子月香進宮那小月留在西太后身邊年紀雖只得五歲卻很能伺人的喜怒於是西太后越發喜歡他了到了第二天上午柳筱閣帶同妻子月香進宮來見西太后行禮畢西太后見月香相貌清秀言語溫婉雖是小家婦人還算彬彬有禮當下便對柳筱閣説道咱們這裏正少一個侍候的女子你的妻子甚合咱的心意就暫時留著過了些時再回去不遲柳筱閣是何等乖覺的人見西太后這樣説法正是求之而不得的事所以忙跪下謝恩西太后叫賞了繡絨衣料並古玩等等給柳筱閣由此那柳筱閣的妻子月香女兒小月都在西太后那裏侍候了西太后又命賜與小月金鎖鏈一具金手鐲子一副原來那金鎖鏈重約四兩光景內府置備著是遇到時節或萬壽的時候專把來賞給一班小格格的現在優伶的女兒也能得到這種恩賞不是出於異數嗎有幾個窮親王的格格還受不著這寵遇哩光陰如箭轉眼又過了幾時這個時候軍機大臣榮祿忽然逝世西太后得知很是哀悼即令朝臣議諡號擬了愨剛正忠四字呈西太后禦覽西太后便提起朱筆點了末一個字於是諡號定了文忠兩字不提這時朝中的大臣又紛紛地更動了一番把兩湖總督張之洞調署軍機大臣袁世凱擢了直隸總督總理大臣慶親王奕劻協辦大學士那桐又下詔書禁止纏足實行滿漢通婚這年忽然安徽兵變熊成其號台民黨鬧了一次風潮總算撲滅了但到了五月的中旬候補道員徐錫麟又鬧起革命來了講到這徐錫麟本是個日本留學生年紀還不到三十歲卻抱負大志腦筋裏滿貯著種族革命的思想他鑒於清政府的腐敗和外夷的侵略決意想把清政府推翻重組共和政府他既存了這般主旨便在日本長崎地方結識許多同志末了就從海外回國宣傳革命可是中國因屢鬧革命捕捉黨人很為嚴厲徐錫麟見自己是個留學生一舉一動很受官府的監視且于力量的一方面已然覺得不足籌計了一會覺得非從政界入手不可但在這個時候兩手空空如何能夠行事呢正在進退兩難的當兒恰巧逢著了女俠秋瑾兩人一交談倒很是投機當由秋瑾拿出錢來補助徐錫麟去做事那秋瑾是紹興的世家女兒也曾在學堂畢業遊歷過英美日本諸國為人極有才幹對於革命思想很是崇拜交遊的都是責任官吏所以徐錫麟很得到他一把助力當下二人商議好了徐錫麟捐了一個道員以便在政治上活動秋瑾自回紹興組織大通學堂行他那革命的素志徐錫麟自捐了道員竭力在官場中謀幹居然被他弄到一個路道投在安徽撫台恩銘的門下恩銘和他一談覺得他確有才華便已存了録用之心後來叫徐錫麟充了練兵的委員徐錫麟一有了兵權自然只望那革命的一方面下後他一邊練兵一頭約了天津的同志乘機起事紹興女俠秋瑾也準備回應不期天不從人願在舉事的前一天那天津的黨人因事機不密給官廳逮捕了其時的消息沒有現在的靈通因此徐錫麟全不知道到了那天便約安徽撫台看操以便刺殺恩銘乘時起事正在這緊要當兒風聲傳來説安徽將有革命起義餘黨已在天津就捕官府得了這個消息便下令捕捉徐錫麟徐錫麟方去進見撫台恩銘只聽得撫署外面一片拿革命黨的聲音此事連恩銘也不知道忙問外面什麼事鼓噪徐錫麟已然情虛見事已弄僵也不待恩銘下令就拔出手槍望安撫便擊恩銘身中兩槍尚能叫刺客這時署中文武職員一齊圍將上來把撫署大門閉上任徐錫麟有翅膀也休想飛得出去於是把徐錫麟捉獲又去捕那些學生軍可憐那班青年學子寡不敵衆大半死在槍彈之下了這裏又將徐錫麟一審自然是直認不諱那幾個官員還主張拿徐錫麟開腹剖心祭奠恩銘再把徐錫麟生前的信劄細細檢查一番發現了秋瑾約期舉事的電文來趕忙飛電紹興知府令密捕秋瑾就地正法那秋瑾在紹興眼巴巴地望那安徽動作自己好乘間回應卻不見有什麼消息正在疑惑時忽聽得安徽革命失敗到處紛紛傳説知道事已不成欲待逃走時那官兵已把大通學堂圍得水泄不通秋瑾見不能脫身也只好束手成擒了但秋瑾的心上本一點不害怕以為一些革命的嫌疑紹興知府是自己的義父諒一定會幫他洗剔的所以到了大堂之上兀是坦然和沒事一樣誰料人情勢利那知府高坐堂皇地審起事來秋瑾一見便待叫義父還不曾開口知府早把臉一沈放出嚴厲的面孔將驚堂一拍大怒起來要知後事如何且聽下回分解
