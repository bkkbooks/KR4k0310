body:
  text: 第五十二回老頭子紀昀妙解女孩兒福公祝壽卻説乾隆帝有一種古怪脾氣凡是他相信的人任你如何橫行不法便是親眼看見也總是説他好的那楊瑞蓮還只是一個小貪官獨有那和珅卻是越老越貪他常常派自己親信的家丁到江南湖廣各省去敲詐勒索沿路督撫大員迎接和相國的家丁好似迎接皇上一般這種風聲傳到京裏那班禦史老爺誰敢説一句間話獨那劉相國他是正人君子便忍不住奏了一本説和相國在外面如何招搖撞騙貪贓枉法乾隆帝看了便勃然大怒説劉相國有意挑撥把他傳進宮去當面訓斥了幾句氣得劉相國鬍子根根倒豎嘉郡王十分敬重劉相國那日便親自到相府去勸慰了一番説起和珅嘉郡王説道這個姦賊小王總有一天收拾他當時嘉郡王悄悄地打發人到各省去把和珅家人在外面招搖納賄的事體一樁一樁地察訪出來記在册子上預備將來查辦他可笑那和珅還睡在鼓裏他見皇上喜歡嘉郡王也天天在一旁稱讚嘉郡王如何忠孝勤學那乾隆帝聽了越發高興便與和珅商量説自己年紀已老打算趁此餘年享幾日清福把這皇位傳給嘉郡王和珅聽了皇上的話也竭力慫恿乾隆傳位他想如今他幫了嘉郡王的忙他年嘉郡王登了位少不得也要算他一位開國元勳自己的權勢將永遠立於不敗之地乾隆帝雖打定主意又因自己皇子衆多一朝宣布出去怕要鬧出亂子來便吩咐和珅暫守祕密如今是乾隆五十七年須要到六十年上才下這讓位的聖旨如今先下諭把育慶宮修理起來命嘉郡王帶了家眷搬進宮裏去住是防備意外的意思又親筆寫繼德堂三個字的匾額給嘉郡王懸挂在宮中暗藏著傳位的意思那嘉郡王見父皇在他身上如此費心不知是禍是福又不好問得心中正惶惑的時候外邊忽然傳説和相國請見嘉郡王因他是個貪官十分看不起他平日也少和他來往如今聽説他親自上門求見心中覺得詫異又因他是父皇第一親信的大臣又不好怠慢他只得迎出去相見那和珅見了嘉郡王搶上來打了一個躬開口便説恭喜王爺接著袖子裏拿出一個如意來雙手獻上嘉郡王接了如意心中越發詫異原來當時宮中規矩凡是秀女們點中了封妃子妃子們點中了封皇后那向他賀喜的人不便説明見了面便獻一個如意一來是向他賀喜的意思二來是暗地裏報一個喜信給他的意思如今和珅要討嘉郡王的好便來獻這個如意也是暗地裏報一個喜信的意思嘉郡王見了如意便説道小王有什麼喜事卻要煩相國的駕那和珅又打了一個躬悄悄地説道王爺還不知道嗎如今皇上已內定傳位給王爺了王爺倘然不信只看皇上親手寫的繼德堂三字這繼德二字便可以明白了皇上昨天曾和下官商量過來打算到六十年上讓位給王爺所以把王爺預先留在宮裏嘉郡王聽了心中雖止不住歡喜但因為和珅與聞這宮廷的機密事體心中越發嫌惡他當下免不過説了幾句感謝的話把他送了出去回進宮來自言自語地罵道這個老姦賊他到俺手中來賣弄玄虛麼將來總要他看看俺的手段和珅從育慶宮出來心想俺如今已巴結上新皇帝將來的祿位可以無憂的了只是老皇帝待我幾十年恩寵如今他快要退位了俺也要想一件事體出來報答老皇的恩德他回府去把自己這個意思對幕友們商量了一番內中一胡師爺獻計道當今皇上是好大喜功的他如今的傳位給皇子也是要學堯舜禪讓的故事如今相爺不如上一本奏摺先稱頌皇上一番再奏請交翰林院編一本紀皇上功勞的書為傳名萬代之計和珅聽了胡師爺的話不禁拍掌稱妙當下便由胡師爺擬了一個奏章第二天早朝和珅當殿遞上奏章上大概説皇上登極六十年以來海內澄清功蓋寰宇宜舉行登極周甲慶祝大典命內客翰林院編撰紀功書册曉之天下傳之萬世乾隆帝看了奏章起初是謙遜了一番當時文武百官誰不願討皇上的好便你一本我一本都跟著和珅奏請皇上舉行慶祝大典又交文學大臣編撰紀功書册後來和珅又獨上一本奏章説皇上登極以來有十件大功兩次打平準部兩次掃平金川平定回部平定臺灣收服廓爾喀收服安南招降緬甸平定貴州等等這十回戰功都是皇上親授機宜恩威並用因此鬚髮交翰林院把這十回戰功詳細記敘一面由百官們共上尊號稱為十全大帝聖旨下來紀功書著交和珅紀文達率領南齋各翰林詳細記敘不得過事鋪張至上尊號一節著無庸議那班文學大臣得了這個聖旨便忙著起草的起草修正的修正繕寫的繕寫那乾隆帝也常常親自到南書齋裏來察看南書齋裏以紀曉嵐為首凡是皇帝進出起坐都是紀曉嵐陪奉著看看到了大熱天氣那部紀功書快要完工紀曉嵐是怕熱為了這編纂的事體他只得忍著熱天天到南書齋裏來督看著他每到午後打量皇帝不出來了便赤膊盤辮高坐在炕床上拿著一柄大蒲扇搖著風嘴裏嚷著熱有一天他正脫去衣裳把辮子盤在頭頂上正盤到一半的時候忽聽得院子裏有唵唵幾聲喝道的聲音知道皇帝來了慌得那班翰林各個在座位上站了起來低著頭候著紀曉嵐已來不及穿衣服了一時無可躲避急向炕床底下一鑽屏聲靜息地縮著只聽得一陳靴腳響乾隆帝與和珅説著話和珅又説了許多恭維皇上戰功的話乾隆帝又吩咐這紀功書編纂完了趕著再編六巡江浙的遊記著和珅紀曉嵐兩人督率各翰林細細地編纂總須實事求是不可過意鋪張那和珅聽了口稱領旨接著皇帝問道紀曉嵐到什麼地方去了那領班的大臣奏稱有私事去去便來乾隆帝又問道這部紀功書定了名目沒有和珅奏稱暫時定名十全大武功記乾隆帝聽了呵呵大笑説道如此説來朕便稱十全老人罷接著皇帝便下座來走到各大書桌前隨手翻著看那文稿這時滿屋子靜悄悄的連咳嗽聲兒也沒有紀曉嵐這時趴在炕板底下氣悶得厲害那汗珠兒似下雨一般直淋下來熱得他撑大了嘴喘著氣半晌他側著耳朵聽聽外面毫無聲息他以為皇帝已經去了再也忍不住了便伸出頭來大聲問道老頭子去了嗎把滿屋子的人齊嚇了一跳乾隆帝十分詫異連問誰在那裏説話嚇得大家不敢説話到底是和珅的膽大回奏説聽去好似紀曉嵐的口音乾隆轉過身來對著炕床喝問誰在裏面只聽得炕下面有人説道臣紀文達在炕下皇帝問為什麼不出來紀曉嵐回奏説臣赤身露體不敢見駕乾隆帝説道恕你無罪快出來説話紀曉嵐聽了巴不得一下從炕板下面鑽出來紀曉嵐的身體高大爬了半天才出來看時他上身赤著膊渾身汗珠兒淌著滿粘著灰塵泥土乾隆帝上炕去坐下紀曉嵐嚇得只是跪在地下磕著頭隔了半晌乾隆帝冷冷地問道你這老頭子三字是給朕取的綽號嗎紀曉嵐不敢作聲乾隆帝又説道你是文學侍從大臣肚子裏是通的如今且把這老頭子三個字講解給朕聽聽若講得不差便恕你無罪那紀曉嵐到底是和皇帝親近慣的便大著膽奏説道皇上莫惱且聽臣解説老頭子三字是京中喚皇上的通稱皇上又稱萬歲這不是老嗎皇上是一國的元首這不是個頭嗎皇上又稱天子這不是個子嗎老頭子三字是尊敬皇上的稱呼並不是誹謗皇上的綽號紀曉嵐説到這裏乾隆帝忍不住説他解説得好從此以後這老頭子三字宮裏人人喚著乾隆帝有時聽得也不生氣一轉眼到了乾隆六十年乾隆帝暗暗地把讓位的典禮籌備舒齊這年九月初一早朝衆大臣在勤政殿上朝乾隆帝下諭説朕即位之初便對天立誓如能在位到一周花甲的年數便把皇位傳給太子不敢和聖祖在位六十一年的數相同如今已是乾隆六十年了朕已遵照列祖的成例把太子的名字寫好預藏在正大光明殿匾額後面便立刻派滿漢兩位相國帶同內監們到正大光明殿上去把那儲藏太子名字的金盒拿下來當殿打開一看見上面寫著册立皇十五子嘉郡王顒琰為太子以乾隆六十一年為嘉慶元年有承宜官當殿把詔書宣讀過文武百官一齊跪賀過退朝下來又趕到育慶宮去賀太子的喜那嘉郡王一面接過詔書一面接待衆官員又自己對衆人説了許多德薄寡能的客氣話百官退出宮以後忙趕到父皇宮中去謝恩那時太子的生母魏佳氏已封為第一貴妃見了他兒子又勸勉了一番到了第二年元旦早朝乾隆帝禦太和殿行過禪位禮把那傳國寶璽親自授給嘉慶皇帝稱做仁宗睿皇帝又尊乾隆帝為太上皇帝嘉慶雖説做了皇帝那臣下上奏章都稱著太上皇皇上所有一切奏章都須送給太上皇閲看便是那軍國大事也須由嘉慶皇帝去請過太上皇的訓才可以執行因此這位嘉慶帝卻十分不自由嘉慶帝是很孝敬太上皇的便也不以為意這一年是太上皇八十六歲萬壽不但文武百官都來賀壽便是那滿蒙回藏各盟旗的貝勒台吉以及各外國使臣都來上壽皇上下旨在太和中和保和三個大殿上賜宴又召集各省官紳年在六十歲以上的三千多人在圓明園中舉行千叟宴太上皇在宮中帶領妃嬪皇帝皇后各皇子福晉開一個家宴嘉慶皇后便是喜塔臘氏當時皇后拜過太上皇的壽太上皇便親自將孝賢皇后遺留下來的帽珠和朝珠賞給喜塔臘後又把許多珍寶賞給各皇子福晉這時只有那春阿妃還活著陪坐在一旁太上皇見了春阿妃想起從前少年時候許多風流韻事便忍不住傷心起來乾隆正淒涼的時候忽然外面太監捧進一個小楠木盒子來説是兩廣總督福文襄孝敬太上皇的小玩意兒嘉慶帝看了不知是什麼東西忙吩咐太監打開盒子一看原來裏面一座小屋子屋子中間擱著一座小屏風屏風前面有一張書桌桌上筆墨紙硯都擺設齊全盒子後面安著一個小機括把那機括輕輕一轉忽然屏風後面轉出一個西洋女孩兒來先走在屋簷口向外行過三跪九叩首禮轉身過去站在書桌前面慢慢地拂著桌子又注水在硯池裏磨著墨從書架上取下一幅朱砂箋來鋪在桌上這時三一個碧眼紅髯的人從屏後出來手裏拿著筆蘸著墨在紙上寫萬壽無疆四個字接著第二行又寫萬壽無疆四個滿字寫完了那機括也停住了盒子裏的人也不動了太上皇看了十分歡喜忙吩咐賞福文襄十萬兩銀子又禦筆寫一個壽字下面注著十全老人的款字一併賞給了福文襄那福文襄雖得了太上皇的賞賜但因為造這個小玩意兒花去的銀子也不下十萬裏面還送了一個人的性命原來造這個玩意的人是福文襄的一個心腹隨從他知道總督打算送太上皇一件出色的壽禮那親隨原有小聰明的他早在半年以前天天爬在屋頂上拿一匹布緊緊地扎住他自己的頭想著今天想明天想居然被他想出這巧妙的玩意來他關著門細細地造成了便去獻給總督看福文襄看了十分稱讚看那萬壽無疆四個字只有漢字怕太上皇看了不喜歡又吩咐那親隨加上滿字那親隨又爬上屋去想了二十多天便給他想通了機括加上滿字福文襄也十分歡喜便賞他二萬銀子那親隨雖得了銀子一時裏卻把他的聰明用盡從此便癡癡呆呆的回家去不上兩個月便一病死了這裏福文襄特打發人把這玩意兒送進京去第一道關口逃不過那和珅的手花了五萬銀子才替他送進宮去誰知那寧壽宮總管太監又向他要錢説倘然不給錢那機括走到萬壽無第三個字上停住了那時太上皇動了氣俺卻不管福文襄聽了害怕便也送他三萬銀子這種情形嘉慶帝統統知道他早已要著手查辦和珅了只因礙著太上皇的面子只得暫時忍著氣但他因為從前和珅遞過如意便也嫌惡如意這種東西滿洲風俗凡是過年過節一班王公大臣都要遞一柄如意算祝頌他一生如意的意思到了嘉慶帝手裏便特意下旨禁止遞如意的禮節他諭旨裏有兩句道諸臣以為如意在朕觀之轉不如意那文武百官接了這個諭旨見皇上痛恨如意大家弄得莫名其妙只得奉旨免了這個禮節有許多善於奉迎的大臣還上奏章稱頌皇上崇尚儉德獨有那劉相國知道嘉慶帝的心事因此嘉慶帝便重用劉相國有事便和劉相國商量到這時和珅才慢慢地有點覺悟嘉慶帝和他不對了他想如今仗著太上皇的勢力諒皇上也沒奈我何將來太上皇過世俺便辭官不做因此他常常進宮去伺候著太上皇那太上皇也非他不可裏面有個春阿妃外面一個和珅終日陪伴著乾隆帝那乾隆帝年紀也大了沒有精力遊玩便十分相信喇嘛的經咒常常盤著腿兒坐在炕上默念著經咒嘉慶帝每天早朝回宮來便到太上皇宮裏去商量朝政乾隆帝向南坐著嘉慶帝向西坐著和珅也站在一旁參議大事有一天他三人正商議的時候忽然乾隆帝盤腿合眼坐在炕上不作聲了嘉慶帝看了也不敢説話停了半晌便見太上皇的嘴一開一閉地動著慢慢地喉嚨裏有聲音説出話來嘉慶帝留心聽時卻一句也聽不出來只見他喃喃地念著半晌半晌忽聽太上皇大聲喝道什麼人和珅在一旁忙跪下來回奏道高天德苟文明接著太上皇又喃喃呐呐地念了一陳把手一揮叫嘉慶帝出去嘉慶帝只得退出來但是太上皇這種古怪形狀嘉慶帝看在眼裏心下十分疑惑問又不好問得到第二天悄悄去問劉相國劉相國也説不知後來嘉慶帝忍不住了在沒人的時候去問和珅和珅説道這是喇嘛教的密咒凡是在念咒的時候有人喊著名字那被喊的人便要立刻死去如今外面正鬧著白蓮教臣知道太上皇要咒死那白蓮教的首領所以太上皇問什麼人時臣便把那白蓮教兩個首領的名字回奏上去嘉慶帝聽了心中也是害怕想這和珅也懂得咒語這種姦臣不可不除因此心中越發容不得和珅要知和珅日後如何結局且聽下回分解
