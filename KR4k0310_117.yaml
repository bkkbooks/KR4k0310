body:
  text: 第七十七回倒鳳顛鸞喁喁私語立妃廢後赫赫天威卻説光武帝聽得宋弘兩句話便知婚事不諧只好打消此議等到筵散之後群臣告退光武帝進了內宮湖陽公主含羞帶愧地坐在金圈椅子上默默地不作一聲光武帝曉得他為著婚事不成才這樣的自己也不好上前勸慰只得用間話岔開談了一會便向靜寧宮郭娘娘那裏去了湖陽公主坐了一會自己覺得沒趣懶懶地朝著架上的鸚鵡發呆可是那只鸚鵡非常靈慧抖著翅膀對他説道穆穆文王意亂心慌湖陽公主聽了不禁嗤的一笑悄悄地罵道你這孽障又來作死了搧得我一頭灰那鸚鵡煞是作怪又響著喉嚨念道窈窕淑女君子好逑他聽了它這兩句不禁又打動他的心事只是對著它閃著星眼愣愣地出神暗道畜類尚知有關雎之韻可歎我劉黃年過三十仍然待字閨中孤衾獨擁對月興思畫眉生感悔不該投生富貴人家到如今弄得高不成低不就從此以往説不定老死閨中罷了若當初托生一個貧賤人家隨便擇一個如意郎君夫唱婦隨百年偕老倒也受盡人生的樂趣咧他自己對自己歎息了一回雙眼沒神渾身發軟幾乎要從椅子上軟癱下來那些宮女見他這樣誰都曉得他又觸起心事來了原來這湖陽公主本來是個多愁多病的佳人而且年過而立猶待字深閨怎能不起摽梅之歎呢所以平素那些宮女見他總是愁眉淚眼的起先大家搭訕著還來勸勸他呢後來知道他的生性怪癖所以大家益發不去惹他見他發起愁來大家都遠走高飛去遊玩了樂得他一個人清靜些他平日鎮日無所事事惟有讀經閲史做生活光武帝是個明白人曉得他的姐姐獨居寂寞常常的來和他趕圍棋論文讀書替他解除煩悶可巧今天郭娘娘身體不爽光武帝放心不下與他沒有談了幾句便起身走了他悲感了半天慢慢地起身輕移蓮步走到廊下沒精打采地間眺了一會可是一個人心中不自在憑你怎樣來尋趣總覺得呆呆的毫無生趣隨時隨地皆現出一種慘淡的色彩來其實景物何嘗慘淡不過隨著他的心地為轉移罷了他站了一會子越覺得十分煩悶便喚了一個宮女引著路一徑徑向禦園走來到了禦園的門口那些後宮衛士和看管園的官吏見公主遊園誰敢怠慢連忙大開園門一齊敬禮湖陽公主見他們過來敬禮心中大不耐煩一揮玉腕便令免禮那些衛士官吏謝恩八字排開他扶著宮女婷婷嫋嫋地走進花園這時正當暮春時候那園內的芍藥牡丹怒放得和錦蓋一樣展著笑靨飄搖欲活那些桃杏枝頭早已退了顔色碧蔭連雲子藏葉底他觸景生情不禁又起了一重感想暗道草木逢春尚有生榮之日獨我劉黃人老珠黃何日才能與草木一樣的逢春向榮呢他想到這裏忍不住粉腮淚落可怪那些樹枝上的小鳥不住地唧唧喳喳地叫個不住似乎嘲笑他懷春一樣更有那送春的杜宇一聲一聲地喚道不如歸去不如歸去他的一顆芳心可憐早就麻醉了哪裏還有心來領略那些欲去的春光呢懶洋洋地走競芳亭裏坐了一會子便又扶著宮女回到宮中從此紅顔易老白首難偕小子是個憨大直來直道有一句説一句向不喜憑空捏造顛倒是非以後湖陽公主他擇壻與否小子尋遍史鑒也未有記載所以小子也只好將他就此擱起另表別人罷光陰似箭一轉眼十五周年如飛而逝這年正是建武十五年的八月十二日光武帝在那雞聲三唱譙樓四鼓的當兒便在淑德宮中陰貴人的臥榻上起身了金鍾三響聖駕臨朝三百文臣四百武將躋躋蹡蹡鵠立兩旁當由值殿官唱道有事出班啓奏無事卷簾退朝話猶未了只見武班中閃出一人手執牙笏三呼萬歲光武帝見來者不是別人正是大司馬吳漢光武帝問道卿家有班有何議論吳漢俯伏金階奏道臣等一介武夫追隨聖躬十有八年自我主正統以來四方靜肅萬民樂業刀槍入庫馬放南山滿布升平氣象近數月來微聞南方交趾以及肖廣之間又有不良之徒明目張膽躍躍欲試臣之愚見兵甲許久未經訓練倘有不測為之奈何微臣今天冒瀆聖躬敢請下旨將三都軍馬調來逐日操練有一征伐無往不利也此乃微臣愚見未識聖躬以為如何他將這番話奏完以後靜候光武帝回答光武聽他這番話大不為然便答道大司馬的意見未然不是但現在天下疲耗急待滋養之氣且隴蜀一帶逐次蕩平交趾湖廣各處縱有一二莠民當有該處有司治辦何須勞師動衆枉耗資財呢以後非遇警報勿再言兵吳漢不敢再奏只得謝恩退下右班中鄧禹向賈復説道聖上不納大司馬的奏詞大人可知道是什麼用意呢賈復笑道這無非是聖上久曆兵戎心厭武事罷了鄧禹笑著點頭霎時當值官高喊退朝群臣紛紛退去光武帝退朝徑向靜寧宮而來郭娘娘連忙接駕進宮郭娘娘見光武帝面有不悅之色便問道今天退朝萬歲何故這樣不悅光武帝便將大司馬吳漢所奏的大意説了一遍郭娘娘正色説道大司馬的意見果然不錯萬歲何故不準其奏呢光武帝冷笑一聲向郭娘娘道梓童既然這樣替他扳駁想必另有高見孤家倒要來領教領教郭娘娘道萬歲哪里話來妾身並非庇護大司馬的旨意須知天下清平還防雞鳴狗盜凡事俱以預備為佳免得臨時措手不及為害不淺如今內患已平還防外侮自古道軍馬為國家之屏障豈可置之不理深望萬歲三思才好光武帝只是拈須微笑一語不發心中卻一百二十個不贊成又過幾天光武帝大宴群臣一班功臣爵士俱來入席光武帝親自執壺與衆臣斟酒真個是肅穆一堂無不守禮酒至半酣光武帝執壺向功臣問道衆卿家當初要是不遇見孤家預備做些什麼事業呢鄧禹首先立起來答道微臣不遇聖躬自忖學問可做一個文學據吏光武帝大笑道卿家出言未免過謙了卿家志行修整可官功曹依次問到賈復賈復立起來答道微臣出身寒素百無所長非遇萬歲素衣終身罷了光武帝益發笑不可抑地答道卿家品學兼優何能落拓如此最微也可得一縣令又問馬武馬武起身答道臣一介武夫除廝殺而外一無所長得遇萬歲畢身微幸否則一屠戶耳這幾句話説得哄堂大笑起來光武帝笑道只要不為盜賊亭長可以稱職光武帝今天有意遍問群臣一來是暗炫自己二來是試試群臣有無棄武修文之心結果心中十分詫異不獨一班文臣出口之乎就連一班目不識丁的武將王霸李通馬武之輩也都談吐風雅超俗不群原來自從那日光武帝駁回吳漢上疏之後鄧禹等一班便徹底瞭解光武帝的心理了三三兩兩退明議論大家皆欲順從天意你讀書我閲史滿口咿晤鎮日價手不釋卷更有李通馬武等一班不識字的人加倍用功一天到晚手不釋卷地苦讀預備聖上來試驗間話少説再表光武帝見群臣一個個都像溫文爾雅的書生將那血戰沙場的武夫氣概一洗乾淨怎麼不喜呢他偏與一班武將談個刺刺不休可怪他們應答如流口似懸河滔滔不絶把個光武帝樂得心花大放杯不離手只飲得滿面霞光醺然大醉群臣見光武帝已有了幾分酒意深恐酒後失儀便紛紛告退去了穿宮太監忙扶著聖駕徑向靜寧宮而來此刻光武帝雖然有了酒意卻認得路徑忙對太監説道快扶孤往淑德宮去太監哪也怠慢連忙轉道徑向淑德宮而來不一會到了淑德宮的正門口一群宮女忙進去稟知麗華麗華慌忙出來接駕只見光武帝吃得酒氣熏人踉踉蹌蹌而至麗華帶著一群宮女迎來將光武帝迎進宮中光武帝醉眼模糊坐在沈香榻上用手搭著麗華的香肩飄搖欲睡這時可把麗華著了忙急催宮女去辦醒酒湯枳橘露手忙腳亂一會子將醒酒湯送來麗華親自接了過來用嘴吹了一吹才用羊脂玉的茶匙舀了一茶匙送到光武帝的唇邊輕輕地喚道萬歲請用一匙醒酒湯呀光武帝微睜醉眼望著他儘管發笑他又輕輕地喚道萬歲請用罷再停一會要冷了光武帝猛地用手一格麗華一驚忙將身子往後一縮幸喜手中的醒酒湯沒有拋去連忙將碗匙遞與宮女自己輕舒玉臂將光武帝扶著將粉臉偎到光武帝的腮邊問道萬歲莫非見罪賤妾服伺不周麼光武帝哈哈大笑道大司馬哪裏話來自古道君不正臣可諫父不正子可諫水來土掩兵來將擋何況你又南征北戰屢建奇功孤家何能見罪與你呢麗華聽他滿口醉話不禁掩口失笑光武帝剔起眼睛向麗華喝道郭聖通難道孤家這幾句話説錯了麼你這樣的輕狂還稱得起一國之母嗎我每次有什麼國事你都要來扳駁我休要惹得氣起將你貶入冷宮去受罪到了那時看你扳駁不扳駁了他説罷癡笑了一陳子伏在麗華的肩上麗華聽了他這番話卻怔住了細細地忖量半天暗道酒後訴真情他既然説出這些話來我想與郭氏一定不睦了他沈思了一會子暗道萬歲本與我結婚在前而且海誓山盟永為鶼鰈不想他又與郭氏再婚倒弄個後來居上他竟為梓童我倒為貴人天下事哪有這樣反背公理呢我要和他去為難無奈他現已大權在手一翻了臉拿出正宮娘娘的派子來我可要吃不消了如今萬歲在面上看來對於他也不覺得有什麼不好而且今朝又説出這些話來難保暗中不發什麼嫌隙罷他想到這裏柳眉一鎖計從心來忙將光武帝扶著便教宮女先將枳橘露取來醒酒一轉眼枳橘露送來麗華硬灌了兩茶匙不一時光武帝果然漸漸地蘇醒過來便嚷口渴麗華忙去倒了一杯茶親自用小金盤托到光武帝身邊含笑説道請萬歲用茶罷光武帝忙將茶杯接了過去呷了一口便向麗華笑道愛妃這裏宮女盡多何消煩你的精神孤家倒生受了麗華含笑答道萬歲不用客氣罷方才賤妾等服侍不周不見罪就算萬幸了光武帝聽了他這兩句話十分蹊蹺便知酒後失言了漲紅了臉忙問道我可是説些什麼的想也想不起來了麗華笑道沒有説什麼光武帝搖頭笑道我不信不一定説什麼話得罪你了愛妃千萬莫要見怪只怪孤王今天多吃一杯愛妃孤王這裏賠罪了他説罷撩起龍袍便欲跪下去慌得麗華伸出一雙纖纖玉手拉住他笑道萬歲這算什麼不要折殺賤妾罷光武帝涎著臉笑道好人你今天可能恕我酒後無德我就感謝不盡了麗華掩口笑道萬歲敢是酒還未醒麼光武帝忙道早就醒了麗華笑道既然醒了為何顛顛倒倒地纏不清我又沒有説什麼儘管這樣磕頭蟲似地向誰賠小心呢光武帝笑道孤方才聽見你説出那句話來恐怕酒後失言有什麼言詞得罪你所以向你賠個小心不料你反而説我未曾醒酒還不是冤枉人麼麗華也不答話嗤地笑了一聲便將外套宮裝卸下坐到床邊向光武帝正色説道如今萬歲也好去了專是在這裏纏混什麼將大好光陰輕輕地耽誤了豈不可惜快點請駕回宮罷光武帝見他嬌嗔滿面越發情不自禁用手將他的玉腕抓住笑道愛妃你叫孤王到誰宮裏去麗華道萬歲不要胡混罷再不去又有人在背後議論我爭寵奪夕了光武帝笑著一把將他摟到懷中接了一個吻説道是誰膽敢説這樣的話呢愛妃快點寬衣罷辰光不早了他也不答話連著小衣往床裏一睡一言不發這時來了兩宮女替光武帝將龍袍內衣脫下扶他下床一面又替他們用被衾蓋好退了出去光武帝到了這時正是欲火中燒不可遏止而且又是酒後再也按捺不下便摟著麗華心肝寶貝地亂叫像煞嬰孩索乳一般嘰咕了半天麗華心中暗想道伴君如伴虎再不答應恐怕要決裂了便將小衣慢慢地解了半天才解了下來光武帝還能再耐一刻麼騰身上去大演起來麗華又做出各種的浪態來把個光武帝演得喘若吳牛恨不得將身子化在他的身上直演到譙樓四鼓才算停鑼息鼓光武帝將他緊緊地摟住問道愛妃你方才究竟為著什麼事情嗔怪孤家呢請你直接告訴孤家罷他聽了不禁滿臉淚痕哽咽不住一句話也説不出來光武帝見他這般模樣更是弄得莫名其妙益發加緊問道好人你爽性説出來孤家好代你出氣憑他是誰只消一聲管教他立刻死無葬身之地他哭得和淚人一樣總不肯説出端底把個光武帝弄得又氣又憐低聲下氣地哄道愛妃你有什麼冤枉盡管對我説我總替你出氣就是了你只管哭不肯爽爽快快地説了出來究竟算什麼意思呢他用絹帕將粉腮上的積淚拭去然後哽哽咽咽地説道賤妾與萬歲本是先訂百年互相可以體諒不想後來這個他説到這裏卻又故意噎住不説了光武帝愈是疑雲疊起催問道愛妃你怎的説了兩句又停住作甚呢他説道寧教我受一點屈不要去説罷省得萬歲聽見又多增煩惱還是不説為佳自古道冤仇宜解不宜結為人讓步不為癡光武帝急道愛妃平日不是一個極其爽快的人麼怎的今朝一句話就吞吞吐吐地這樣難説呢他説道他的勢力無論如何比我來得大山雖高怎能遮住太陽呢要想和他作對不是以卵擊石枉討沒趣麼光武帝聽了他這兩句話心中才有五分明白但是還不知道他們究竟為著什麼事情參商的他摟著他接了幾個吻問道愛妃你是孤家的性命你被別人家欺侮如我被別人家欺侮一樣還是請你快一些説出來罷免得孤家在這裏納悶吧他道老實説一句誰和萬歲是第一個花燭夫妻呢光武帝道那個還用問什麼不是你還有誰呢他冷笑一聲現在的天理簡直一點也沒有了有多少後來居上的人心還不足還要依勢淩人一些兒也不肯放鬆幸虧我是寬宏的人換了別一個不曉得要鬧出什麼花樣來了自己身為萬民之母一點不莊重鎮日價地就將爭寵奪恃的念頭橫著心裏雞腸猴肚穿長補短自己不好出來罵人卻叫一班宮女出來罵人萬歲爺你老人家鎮日價忙著國家大事哪里知道我們的內容呢他説到這裏便不再説了光武帝本來是個極聰明的人還要他細説麼便冷笑了幾聲對他説道愛妃你且暫且息怒今天早朝孤家包替你出氣就是了他假意驚惶道萬歲那動不得那就害了賤妾了還是由他去罷光武帝也不答話合著眼睛打了一個朦朧已到寅牌時候只聽雞聲亂唱鐘鼓齊鳴麗華急忙先自起身然後服侍光武起身光武帝梳洗已畢帶怒上朝受了文武百官朝拜已畢便命值殿官修了一封草詔廢郭後為庶人群臣聽了莫不大驚失色這正是舌乃是非本口為禍福門要知後事如何且看下回分解
