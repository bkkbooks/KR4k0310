body:
  text: 第七十八回煮茗挑燈高賢陳妙策弒夫媚敵蠻婦動癡情卻説光武帝聽了陰麗華一番諷刺讒媚的諛詞察也不察竟至下詔將郭後廢了朝中文武誰都不曉得一回什麼事情互相驚訝不止可憐一位德行俱備的郭娘娘奉了旨意也不辨白繳出印綬徙居冷宮聽候發落那個色藝兼全的陰貴人竟安安逸逸地超居中宮母儀天下了這時群臣中卻惱動了一位大臣你道是誰就是大司寇郅鄆他越班出來俯伏金階三呼萬歲已畢奏道臣聞夫婦之好父子間尚且難言況屬臣下怎敢參議但願陛下慎察可否勿令天下貽譏社稷方可無憂光武帝尚自猶豫鄧禹賈復馬援馮異四位大臣一齊出班各上陳詞俱雲郭後未失德儀不可廢為庶人致失萬民仰望光武帝才對衆臣説道諸卿能深體孤意但是孤家此舉想亦未會過甚吧鄧禹奏道聖躬威德早著海內歸心但此舉微臣等殊不明了內容不敢妄加指議不過顧名思議還是請聖躬三思後行才好光武帝道衆卿之義不為無見孤王格外施恩順從諸卿便了衆大臣謝恩退下光武帝便傳旨封郭後為中山太后郭後次子為輔中山王還有三子劉康劉延劉焉亦俱封為王位也不易儲原來郭後長子劉疆早在建武二年間已立為皇太子了陰氏亦五子名陽蒼荊衡京許貴人寵幸極鮮太只生一子名英至此亦準了諸臣之請乃令竇容告廟將各皇子晉封公位不在話下單講前次吳漢曾雲交趾有人作亂究竟是誰讀者恐怕不甚明白在下趁此敘一敘交趾麓冷縣令征凡生兩個女兒長名側次名二俱有萬夫不當之勇雙手可舉千竹征側行年十九早與邑人詩索為妻征二亦有了夫壻姓巴名邱俱是南方勇士征側的容貌醜得不堪雙目深陷有如鷹隼闊口獠牙一頭紅發慣施兩把截頭刀征二卻出落得花容月貌十二分齊整性情極其暴戾慣使兩口青鋒刀他嫁了巴邱之後夫妻之間卻不和睦可是征側的心理卻非常野橫常想殺進中原奪取漢家的天下他的父親征凡不準亂動所以他們不敢重違父命鎮日價勾徒結類舞刀弄棒的征凡以為他們好武也不去十分阻止誰知今年六月裏征凡患疫死了他們姊妹兩個見他的父親死了益發無管束和兩匹野馬一樣歹心勃發四處招集兵馬準備起事不到半月竟招到有三萬多蠻兵征側便想自居為南方女大王交趾太守蘇定深恐他們的勢焰滔大便令兵馬司帶了五千名健卒到麓冷縣去繳械征家姊妹聞報大怒公然引動蠻兵群起反抗將五千兵殺得十去八九還有幾個腿快的逃回去報告蘇定蘇定聞得這個消息大吃一驚忙要領兵親自去征剿猛可裏只聽得四處喊殺連天金鼓大震探馬飛報日南合浦各處蠻兵俱接應徵家姐妹反進交趾境內請令定奪蘇定聽了嚇得張口結舌半晌説不出一句話來料想孤城難守不如棄城逃走罷他打定了主意便收拾細軟帶著家小騰雲價地不知去向了這時征家姐妹帶著各路蠻兵蜂擁進了交趾的城邑東搶西劫為所欲為未到三日連奪六十餘城由是蠻兵愈聚愈多這時已不下四十余萬威名大振遠近皆驚更有與交趾搭界的地方官民人等無不惴惴不安深怕大兵一到玉石俱焚你也飛章告急我也遣使求救那告急的表章真個似雪片飛來光武帝聞報大怒對衆臣説道不想南蠻竟有這樣的野心膽敢不服王令強占土地殊深可恨待孤家親領大兵前去剿滅便了鄧禹聽了這話連忙出班奏道主公乃萬乘之君怎好親自勞動聖駕臣舉一人包在三月之內掃除蠻夷便了光武帝問道愛卿所保何人鄧禹道虎賁中郎將馬援足智多謀是征討能將何不著他前去呢光武帝大喜道愛卿之言正合孤意便加封馬援為伏波將軍又令扶樂侯劉隆明遠將軍段志偏將軍王霸大司馬吳漢四人為左右參贊點齊精兵十萬克日興師馬援奉旨謝恩次日便與隨行諸將點齊兵馬航海南征艨艟戰艦多至千隻鼓浪乘風其快如箭在路非止一日那天到了合浦馬援下令停泊岸旁正要登岸明遠將軍段志立在馬援的身旁猛地倒下口流白沫不省人事衆將大驚馬援對加將説道段將軍不慣登舟而且初到南方水土不服致有此疾快令軍醫醫治隨軍的醫生忙來診視藥方還未開下段志大叫一聲早已嗚呼哀哉了衆將軍見還未出手先亡大將一個個搖頭噘嘴都暗道此番出兵不見得什麼順利吧獨有馬援若無其事對衆將慨然説道大丈夫以身許國血戰沙場當以馬革裹尸才算幸運呢諸位將軍勿以小挫便欲灰心才好呢諸將領聽他這番話説得慷慨淋漓誰不興奮鼓舞呢一個個伸拳虜袖預備廝殺馬援一面令人將段志尸身用棺盛好運回原籍一面拔隊登陸這時方在九月的時候赤日炎炎揮汗如雨和北方的三伏天氣差不多馬援下令扎起大營暫住兩日吳漢問道如今我們方到此地正好乘著鋭氣去攻合浦怎麼反先住幾天呢馬援笑道吳將軍你只知其一不知其二士卒們遠涉征途未免勞苦而且這兩天又是奇熱得十分厲害士卒們誰有鬥志呢不如暫息兩日一面先派人探明地理再行進兵也不為遲吳漢聽他這番話十分佩服到了天晚馬援一人徒步出去在大營四周間行了一回瞥見山麓裏燈光隱透似乎有人家的樣子馬援觸動心事背著手徑向那燈光處走來走到那燈光所在只見數椽茅舍聽得見裏面隱隱有讀書聲音馬援歎道如今亂到這樣這裏還有讀書人安居此地真是人間仙境他便走近去用手敲門裏面一會子有個十二三歲的小僮將門開放揉著瞳睡的眼睛問道現在半夜三更的是誰在這裏吵鬧馬援聽他説話的口音竟不像是南方的口吻心中暗暗納罕便答道勞你通報你家主人一聲就説有個姓馬的求見那小僮答應進去不多時裏面走出一位儒冠道服的人來年紀大約在二十左右面如冠玉唇若丹朱一種風雅態度直令人望而生敬馬援雙手一拱那少年也答了一個禮便請馬援入室只見裏面陳設得精雅非凡明窗淨几書櫥內滿堆著牙籤玉軸琳琅滿目美不勝收那少年便請馬援入坐自己陪著小僮獻茶那少年首先向馬援問道尊駕莫非平西羌的虎賁中郎將馬援將軍麼馬援聽他這話不由得大吃一驚忙答道正是在下不知尊駕何由得知呢那少年笑道小子去年在春富山舍舅處聽得舍舅談起將軍來端的是個絶大的英雄鄧禹以後一人而已當時小子還不十分盡信及聽説將軍平服西羌屢建奇功小子才心意神往今日見將軍的面貌與舍舅所説相同故冒昧奉問一聲不料果然是將軍真是三生有幸呢馬援聽他這番話便料到他一定是嚴子陵的外甥了便肅然起敬道蒙嘉獎許實不敢當但不知尊駕可是嚴老丈的令甥尤清麼那少年起身答道然也馬援問道不知閣下何故遠來此地乞道其詳尤清笑道辱承下問小弟七歲時即到此地從師求學了到了十五歲的時候家嚴家慈相繼棄世小弟孑然一身不願再往北上所以就在此地與亂世相混了馬援道以先生的天才退隱未免可惜小弟身膺王命來平蠻虜先生還肯出山助弟一臂之力麼尤清笑道山野村夫厭世已久自忖菲材不堪大用只請收回成命罷馬援再三孰請無奈尤清立志頗堅不願再與塵世相見馬援知道勸也無益便問道先生既不願出山但是小弟遠來此地水土民情皆未瞭解與軍事上不無發生許多障礙敢請給以指教尤清也不再推辭便將地勢民情風俗一一地指示與他馬援心中大喜這時譙樓已敲四鼓馬援忙辭了尤清便要回營尤清親自將他送到大門以外馬援正要動身尤清忙喊道馬將軍請暫留一步我還有一句話要告訴與你馬援聽罷慌忙住腳回頭問道先生有何指教尤清道在軍出發之前務要多辦大蒜每人嘴裏都要含一瓣大蒜方可人平馬安此地山嵐瘴氣極其厲害而且一班士卒又是初到此地的不耐噁心就要發生瘟疫有了大蒜還不怕什麼山嵐瘴氣了馬援稱謝回營到了辰牌時候便下令去買大蒜一百擔備用軍需官奉令去辦衆將不知是什麼緣故齊問馬援買蒜何用馬援便鈄尤清的囑咐説了一遍衆將大喜霎時大蒜辦來馬援便如法炮製下令動兵直向合浦進發未到半日大兵到了合浦城下早有探馬飛報蠻兵首領哈明哈明聞報大怒點兵出城迎戰哈明手持熟銅大砍刀坐下烏騅馬沖到馬援的營前厲聲罵戰馬援領著衆將軍帶了三千兵馬列成陳勢只見哈明耀武揚威正在那裏罵陳吳漢便過來請令馬援見吳漢討令心中大喜忙令他出陳吳漢拍馬闖到垓心厲聲大喝道蠻囚少要逞能快快過來納命哈明掄起熟鋼刀兜頭就砍吳漢舉槍相迎二人大戰了一百多回合吳漢覷準一個破綻長嘯一聲手起一槍哈明翻身落馬馬援見吳漢得勝便令王霸帶兵前去搶城自己和劉隆吳漢揮軍掩殺將那些蠻兵殺得東逃西散血流成河王霸這時早將城奪了在城上鳴金收兵馬援見城已得了滿心歡喜忙率大軍進城又命王霸帶了三萬精兵去攻九真未到半日九真已下話休煩屑不到半月將蠻兵占據的六十多個城邑完全奪了回來十萬雄師一齊向交趾進發那天到了交趾便下令交交趾城團團圍起側二姐妹聽得各探報正要起兵去迎敵天師不想失敗得這樣快法兵臨城下他們哪里有一些懼怯姐妹商議迎敵之計征二道讓我去打頭陳不將這幾個狗頭捉住誓不回頭他説罷點齊了三千蠻兵開城挑戰王霸也等不得馬援令下大吼一聲一馬闖到垓心厲聲喝道你那蠻婆娘快來納命征二怒從心上起惡向膽邊生揮動青鋒刀來戰王霸兩個搭上手翻翻滾滾地大戰一百多合未分勝負金鼓大震兩邊士卒呐喊助威又戰了三十合王霸漸漸不支錘法散亂只有遮架工夫沒有還手的能力吳漢長嘯一聲一馬飛來替回王霸那征二戰著王霸不禁心中暗道久聞北方出美男怎的這人也生得這樣醜怪呢及見吳漢出馬已不像王霸那樣醜怪了三綹長須方面大耳鳳目有神心中已起了愛慕之心和吳漢又戰了五十多合吳漢不是他的對手虛晃一槍敗回陳來對馬援喘息説道叵耐這蠻婆著實厲害非常棘手馬援勃然大怒便要親自出馬劉隆上前説道殺雞焉用牛刀諒這蠻婆能有多少伎倆讓末將前去將他結果便了馬援道劉將軍須要小心為要劉隆點首答應拍動白馬耍起長槍徑取征二征二見自己連敗兩將不禁十分得意站在垓心罵不絶口瞥見漢陳中沖出一個少年將軍來面如冠玉唇若丹朱目似朗星眉比漆刷真個是千般秀麗百樣溫文他把一縷愛的念頭從腳底一直透到頭頂上閃著星眼看得呆了劉隆闖到垓心一聲大喝道你那蠻婆娘發的什麼呆快來納命罷這一聲方才將他飛出去的魂靈收了轉來忙舞雙鋒和劉隆戰了二十餘合故意兜轉馬頭落荒就去劉隆哪里肯舍縱馬追來趕到無人之處征二霍地扭轉馬頭認真和劉隆廝殺不到十二合劉隆槍法散亂被征二看個破綻一伸玉手將劉隆的腰用力一扯劉隆坐不穩翻身落馬征二隨著飛身下馬將他往懷中一摟偎著粉臉展開笑靨向劉隆説道我的冤家你今天可不要強了可依我一件事情放你活命否則青鋒刀它沒有眼睛用手一帶你可要到閻王那裏去了劉隆聽他這些話心中早已明白他卻生出一計便涎著臉皮問道小姐你請説罷我劉某不是不知趣的憑你怎麼我沒有不答應的他向劉隆瞟了一眼然後笑道你要是不棄我是個蠻女我願隨你做個他説到這裏雙頰飛霞便噎住了劉隆笑道你的意思我已曉得了但是還有一個人將他放在哪里看官這本是劉隆有心和他開玩笑的誰知竟碰上了疼指頭了征二聽他這話卻大費躊躇沈吟了一會子便毅然對劉隆道將軍且請放心奴家自有道理劉隆便知他已有夫壻了便又對他説道既蒙小姐青眼相加劉某感激無地不過要想真正百頭偕老那麼小姐非依順我們漢家不可征二笑道這也無須將軍多慮奴不將身子附托你便罷既然將身子事你焉有夫南妻北之理當然報順漢家呀劉隆見他事事遵從卻一時想不出別的法子來難他了正要開口瞥見西北上煙塵大起便知兵卒趕來忙對征二説道姑娘請放手後面的兒郎趕到了被他們看見反而不美征二連忙放了手兩個人驀地分開飛身上馬各持兵刃故意大殺起來不一刻兩邊的士卒俱已趕到二人假意大殺四十個回合征二晃了一刀帶馬收兵入城而去劉隆也隨後領兵回營見了馬援也不隱瞞便爽直地將上項事情説了一遍馬援鼓掌笑道將軍的豔福真正不淺帳下諸將俱來道賀劉隆心中早已打定主意此刻也不作聲這也不在話下再説征二回城征側連忙接入大帳慰勞了一陳征二懶洋洋地退入自己的住處這時已經到申牌時候不一時吃過晚飯他一個人坐在房裏兀地亂想出神他的腦海裏不住地浮著一個劉隆何等俊俏何等英武何等溫文越想越愛正在這間思的當兒侍女跑進來報道巴將軍回來了他聽了這一句怒從心上起便啐道他回來就回來何必你們大驚小怪的做什麼難道我還去迎接他不成那個侍女碰了一個釘子努著嘴站在一旁一聲不響一刻兒巴邱已經走進房來見他怒容滿面忙滿臉堆下笑容來低聲問道小姐今天敢是和誰鬥氣這樣的不悅他見巴邱那一副可憎的面目和劉隆相比真有天淵之別不禁將平日的愛情完全付與東洋大海見他問話便氣衝衝地答道我和別人生氣與你什麼相干誰要你來獻這些假意殷勤呢巴邱不覺十分詫異暗道他從來沒有待我這種樣子今天究竟為著什麼事情這樣動怒他便走到他的身邊説道莫非不才有什麼不到之處得罪了小姐麼他見他這樣問不禁大聲説道誰敢得罪誰呢我十年不見你這個東西也罷只怪我當初瞎了眼睛嫁了你這個不尷不尬的鬼罷了巴邱聽了把那無名火高舉三千丈按捺不住大聲罵道好不識擡舉的賤人估量著今天在戰場上一定是看見什麼美男子了便生野心了好好好咱老子也不是一盞省油燈他更不能耐用手在桌子上一拍罵道好雜種我看中美男子你便怎麼樣巴邱更不能下臺用手去拔寶劍他早已掣劍在手説時遲那時快一劍飛來巴邱早已身首異處了他殺了巴邱總算泄了心頭之恨這正是戀慕心頭客斷送枕邊人要知後事如何且看下回分解
