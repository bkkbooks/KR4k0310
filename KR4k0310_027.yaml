body:
  text: 第二十六回入空門順治遜國陷情網康熙亂倫卻説小宛正昏昏沈沈的時候被宮女拉出去跪在太後腳下只聽得太后喝一聲賤人擡起頭來便有宮女上來挽住小宛的雲髻往腦脖子後面一拉小宛的臉便擡了起來太后冷笑一聲説到長得好狐媚子的臉替我掌嘴宮女們便揚起手掌向兩邊粉臉上打去一連打了三四十下打得小苑臉上紅腫眼前金星亂進他心裏又氣又急眼前一陳昏黑不覺暈絶過去宮女們把一碗冷水在小苑臉上一潑小宛驚醒過來太后便吩咐宮女問這賤丫頭什麼地方來的小宛一面哽咽著把自己的來歷仔仔細細地説了卻仍是瞞著説自己是冒家的女兒正説明皇帝踉踉蹌蹌地跑了進來皇帝一向是怕太后的見了這樣子只得低著脖子恭恭敬敬地站在一旁不敢説一句話只聽得太后問完了話便吩咐宮女打死了罷上來四個粗蠢的旗婦手裏各拿著紅漆棍又拿著一個紅布袋要把小宛裝進袋去這是宮裏的刑法宮女犯了死罪便裝在布袋裏一頓亂棍打死皇帝到了這時候便忍不住上去跪倒在地求著他原是好人家女兒是洪學士送進宮來的倘然太后要打死他應當先辦洪學士的罪太后聽皇帝説起洪學士便觸動了私心那口氣便也軟了下來吩咐宮女道攆他出去罷皇帝又求道這漢女已進宮多日再攆他出去於皇家體面不好看太后想了一想卻不不錯便吩咐關到西山玉泉寺去皇帝再要求時太后手指皇帝的臉大聲道你可看見神武門裏俺的旨意麼漢女進宮的便砍腦袋今天我還看在皇帝面上饒了賤人一條狗命呢説著逼著宮女把董小宛拉出宮去坐一肩小轎內監擡著直送上西山玉泉寺裏去這玉泉寺是供奉喇嘛的清宮裏的規矩宮人犯罪的重則立時打死輕則寄寺學佛董小宛住在寺裏倒也覺得清淨天天念佛自己知道紅顔溥命便也看破紅塵一心修道不多幾天居然把這項經卷讀熟小宛原是一個聰明女子他參透經典的奧理心中恩怨兩忘什麼冒巢民什麼順治皇帝都不挂在他心上獨有那順治帝迷戀得厲害他自小宛出宮以後雖有別的妃嬪伺候著但他想起小菀便日夜悲啼過了幾天皇帝實在忍耐不住便花了許多銀錢買通宮女太監們瞞住了太后的耳目悄悄地偷上西山去在玉泉寺中見了小宛兩人抱頭痛哭小宛把許多紅塵虛幻的話慰勸皇帝皇帝總是依依不捨在玉泉寺裏一連住了三天還不肯回宮後來給太后知道了打發總管太監擡著軟轎來接駕又説皇帝倘然不肯回宮去太后便要自己上山來了小宛又再三勸著皇帝説陛下倘不忘臣妾將來在五臺山上還得一見後來太后又打發內監來催逼皇帝無可奈何上轎回宮去誰知皇帝回宮的第二天忽然看管玉泉寺的內監報説董鄂妃不見了皇帝聽了萬分傷心暗地裏打發許多太監各處去找尋也是毫無消息皇帝把侍候小宛的宮女傳來親自盤問那宮女説妃子怕是成仙去了這幾天風清月白的夜裏只見妃子在寺後面的瑤臺上走來走去地望著月兒內監們趕去看時已是影蹤全無了這不是仙去了麼皇帝聽了反快活起來拍著手説道朕原説他是蓮花仙子呢如今果然成仙去了可是叫朕怎樣呢説著便呆笑起來這個消息傳到太后耳裏怕從此把皇帝引瘋了便暗暗地吩咐人到西山去連夜放了一把火把玉泉寺燒成一片焦土可憐燒死了許多宮女太監內中有一個宮女的尸身很象小宛的太后使吩咐宮人故意聲張起來説小宛被火燒死了皇帝聽了也不悲傷隔了幾天忽然宮裏吵嚷起來説皇帝走了又在皇帝書房裏搜得皇帝遺下的手詔上面寫道太祖太宗創垂基業所關至重元良儲嗣不可久虛朕子玄燁佟佳氏所生岐嶷穎慧克承宗桃茲立為皇太子即皇帝位特命內大臣索尼蘇克薩哈過必隆鼇拜為輔臣伊等皆勳舊重臣朕以腹心寄託其勉矢忠藎保翊嗣君佐理政務布告中外咸使聞之欽此當時皇太后看了這手詔怔了半天便吩咐把內大臣鼇拜傳進宮來商量停妥便傳諭出去説皇帝急病身亡遺詔立太子玄燁為皇帝這個消息一傳出去文武百官都到大清門外候旨太后傳旨出去所有滿漢臣工一概不許進宮只吩咐明天在太和殿朝見新皇帝第二天那文武大臣貝勒親王一齊在太和殿候駕三下靜鞭新皇帝登基這時玄燁年紀只有八歲坐在龍椅上受百官朝賀鼇拜和洪承疇站在兩旁皇帝下旨改號稱康熙一面在白虎殿裏一般的替順治皇帝辦起喪帶來且説順治皇帝自從偷出宮門以後只因換了平常衣服路上也沒有人來盤問他京城裏的路他是不認識的他信步向西走去看看出了北京城這時是深秋天氣只見眼前一片荒涼順治皇帝心中想起從前和董小宛在樹林中密語一番恩情起了無限感慨腳下一腳高一腳低向麥田中走去正走時前面田路旁遠遠地來了一個癩頭和尚手中拿一軸破畫嘴裏高一聲低一聲地不知唱些什麼看看走近皇帝跟前只見他深深地打了一個問訊説道阿彌陀佛師父來了麼世祖聽了心中不覺一怔道這和尚那裏見過的怎麼啜音怪熟呢再看他時見他渾身長著癩瘡一隻左眼已瞎身上袈裟千襯百衲赤著一雙腳便問他道你赤著腳不怕冷嗎那和尚哈哈大笑著道冷是什麼什麼是冷世祖聽了不覺觸動禪機心下恍然大悟接著説道什麼是我我是什麼那和尚道善哉善哉世祖問他你手中拿的是什麼畫那和尚見問便放聲大哭起來哭夠多時才説道貧僧原是五臺山清涼寺裏的僧人俺師父道行很高修煉到八十歲上忽然對貧僧説道我明日要下山去了當時貧僧不忍離開師父拉住他的衣裳放聲大哭師父看我哭得傷心便説這是定數哭也無用我念你一片至誠如今給你一幅畫兒畫上畫著一個沒有眉毛的人你記著二十年後你帶著這幅畫兒下山進京去自有人替你補畫上那畫中人兒的眉毛世祖聽他説話離奇便向他要那幅畫兒看見上面果然畫著一個赤腳和尚和尚臉上果然缺少兩條眉毛世祖看了便在腰上挂著的筆袋裏掏出一支筆來替他補畫上兩條眉毛那和尚見世祖替他畫了眉毛便爬在地下連連磕頭口中喊著師父説道俺師父叮囑我那補畫眉毛的人便是我的後身我聽了師父的話如今恰恰二十年便下山來尋訪在江湖上飄泊了多年才找到了貴檀越貴檀越不是我的師父是什麼請師父快回山去世祖便問他你的師父如今到什麼地方去了那和尚説道俺師父自從給了我這幅畫以後第二天便圓寂了世祖聽了低著頭半晌忽然大笑道俺跟你去罷那和尚説道師父也該去了山上的女菩薩也候著師父多日了世祖問他什麼女菩薩那和尚説道便是玉泉寺的女菩薩世祖聽了拉著那和尚飛也似地跑去後來世祖和董鄂妃一塊兒在五臺山上清涼寺裏修道吳梅村有一首清涼山贊佛詩便是世祖和董妃的事體那詩道雙成明靚影徘徊玉作屏風璧作台薤露雕殘千里草清涼山下六龍來這個消息傳到太后耳朵裏懊悔從前不該攆走董鄂妃如今自己親生的兒子孤淒淒地出家在五臺山上但這件事體又不好聲張出去只得推説禮佛便帶著康熙皇帝巡幸到五臺山太皇太后瞞著衆人暗暗地到清涼寺去訪問只見一個癩和尚又聾又瞎問他説話十句倒有九句不曾聽得太皇太后無可奈何對著寺門灑著幾點眼淚下山回宮去到了第二年太皇太后又到五臺山去只見那山門半圮連那癩和尚也不在了太皇太后便下旨重建清涼寺算是太皇太后的私廟以後太皇太后年紀也老了行動不便便也不曾到五臺山去只是心中常常記念著罷了倒是康熙皇帝年紀漸漸大起來長得人物漂亮精明強幹在順治手裏已經打敗明將史可法滅了明帝子孫福王唐王魯王又趕走了永明王打敗了鄭成功收得臺灣海島後來平西王吳三桂平南王尚之信靖南王耿精忠造反也經八旗兵打平到了康熙時候地方上十分太平太皇太后替他請了兩位師傅一位是河南人湯斌一位是魏裔介這兩位學士天天在瀛台對皇帝講解經史後來又請侍講學士高士奇講解宋學皇帝也十分好學天天和大臣們講論不倦他回進宮去對宮女們講解那宮女聽了莫名其妙這時有一位太公主是太宗皇帝的幼女世祖皇帝的胞妹康熙皇帝的姑母只因面貌長得美麗年紀又小只大得康熙皇帝五歲太皇太后不捨得他出宮去把他留在宮裏到二十二歲還不曾招駙馬康熙皇帝和這位姑母又最好自幼小跟著姑母一床兒睡許多乳母保姆宮女們伺候他他都不要一進宮來便找他姑母玩兒去後來上了學在上書房聽了講回宮來也找他姑母講解去這位太公主原也讀得滿肚子詩書他姑侄兩人常常談著學問娓娓不倦因此康熙皇帝和他姑母的交情越發深厚他兩人在沒人的時候常常説些知心話大家竟忘了姑侄的名分這時康熙皇帝年紀已有十七歲了天天和他姑母做著伴這男女的情竇早已開了他姑母二十二歲正是女孩兒情意纏綿的時候誰知這時康熙皇帝因讀書用功過度便得了咯血的症候太皇太后知道了十分憂愁忙請禦醫服藥調治禦醫説須安心靜養太皇太后意思要把皇帝搬到寧壽宮去親自照看他佟佳太后要把皇帝搬進慈寧宮去住著皇帝都不願意卻住在永樂宮裏只要姑母陪伴他別的宮女保姆一概不許進房子來太皇太后認做他是孩子氣也便依他那太公主終日陪伴著侄兒在病榻上耳鬢廝磨軟語溫存康熙皇帝又長得俊俏動人日子多了兩人情不自禁便做出風流事體來皇帝償了心願那病竟完全好了女孩兒家到底膽怯便悄悄地把這件事體告訴母親太皇太后聽了嚇了一大跳忙把皇帝喚來暗地裏埋怨他誰知康熙皇帝少年任性定要把姑母封了妃子又説倘不依我便願不做皇帝太皇太后怕鬧出事來便也只得聽他胡鬧去待太皇太后逝世以後康熙皇帝便索性一道聖旨把姑母封做淑妃滿朝文武看了十分詫異便有禦史官奏章勸皇帝收回聖旨把太公主另嫁駙馬皇帝看了十分生氣道姑母既不是朕的母親又不是朕的女兒也不是朕的同胞姊妹封做妃子免得出宮去吃苦有什麼使不得從此以後皇帝便大了膽揀那宮女中有姿色的便隨處臨幸有別的宮女撞見他不知害羞那宮女被寵幸的便封他做妃子不上一年那宮裏的妃子已有四十六個任你大臣如何勸諫他總置之不理那時有一個太監名小如意的性情十分乖巧在外面買了許多邪書偷偷地帶進宮來獻與皇帝皇帝平日只見侍讀學士講些經史從不曾看見這種有趣味的書從此他便丟了經史的學問沒日沒夜地看那些書看到有味的時候連飯也不想吃覺也不要睡終日拉著那班妃子照書上的法兒大做起來有一天皇帝坐在湖山石上看書小如意站在一旁伺候著遠遠地看見一個宮女走來皇帝忽然異想天開自己先在山洞子裏躲起來吩咐小如意如此如此看看那宮女走到跟前小如意上去不由分説一把拉住把他推進洞去嚇得那宮女嬌啼宛轉只聽得山洞子裏哭喊一陳子那宮女吃了虧踉踉蹌蹌地逃了出來停了一會又來了一個宮女小如意如法炮製皇帝這一天共鬧玩了四個宮女心中十分快樂可憐那宮女白吃了虧到底也不知是誰欺侮他呢小如意又哄著皇帝説漢女如何如何嬌嫩如何如何溫柔皇帝聽了記任腦子裏又打聽得文華大學士張英家裏和那尚書姚江家裏養著許多美人張家和姚家原是親家兩家都娶得七八個如夫人個個長得姿色嬌豔體態風流北京人有幾句兒歌説道論美人數姚張你有西施女我有貴妃楊等間不得見一見魂飛揚這個歌兒小如意傳進宮去皇帝聽了便夜夜思量講到這兩家的美人要算姚江第四位小姐長得最可人意張英知道了便去求婚配給自己的二公子那二公子官也做到京卿自娶得姚家的女兒歡喜得什麼似的天天香花供養著等間不出房門一步有一天是皇太后的萬壽早幾天便有上諭下來凡漢官命婦一律隨著滿人進宮去叩祝這一天凡是張姚兩家的女眷因為貪玩宮庭的風景只叫他丈夫在朝做官的一個個按品大裝進宮去拜夀那張學士的二媳婦也到了宮裏隨班叩祝過太后傳諭便在內廷賜宴坐過了席領著到上苑去遊玩盡一日之歡直到萬家燈火的時候才一齊退出宮來各個上轎回家張家的女眷一共坐了六肩轎子大家走出轎來一看二少太太已經換了一個別的女人姚家的四小姐不知到什麼地方去了問那女人時那女人也莫名其妙那京卿跑來一看見自己心愛的妻子給宮裏偷換去了如何不怒便對著那女人吵嚷起來張學士聽得了忙進來攔住説千萬莫聲張給宮裏知道了俺們全家人的性命不保他兒子聽了也只得忍氣吞聲地把陌生女人收下過了幾天皇太后下了一道懿旨説凡漢官命婦以後一律不準進宮百官們看了這道旨意都莫名其妙獨有張學士父子兩人心中十分難受康熙皇帝玩過漢女以後便把宮裏幾十個旗女一齊丟在腦後過了幾天他覺得悶在宮裏十分膩煩便和小如意商量打算悄悄地偷出宮去遊玩小如意起初聽了不敢奉旨無奈皇帝生性暴躁説怎麼定要怎麼的小如意也違拗不過只得改換了袍褂兩人裝作主仆模樣偷偷地出宮去大街小巷地遊玩皇帝幾十年悶在宮裏如今滿個京城亂跑怎會不樂有時上館子去吃喝有時到窯子裏遊玩遊到天色傍晚便偷偷地回宮去誰知遊了幾天卻遊出風流事體來了有一天皇帝帶著小如意正在驢馬大街上走著忽然迎面來了一輛驢車車中端坐一位美貌婦人皇帝不覺看怔了那車轅兒撞在他身上他也不覺得車廂裏的婦人水盈盈的兩道眼光原也注定在皇帝臉上看得他呆得厲害便不覺吟吟一笑這一笑都把皇帝笑得越發呆了那驢車在前面走著皇帝慌慌張張在後跟著一直跟出西直門一家門口停住把個皇帝纍得滿身是汗氣喘吁吁他便悄悄地叮囑小如意無論如何今夜須把這婦人弄進宮來説著自己先回宮去了要知那美婦人進宮與否且聽下回分解
