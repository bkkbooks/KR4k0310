body:
  text: 第五十八回皇兒仁慈不殺禽獸天子義俠挽救窮酸卻説道光帝被皇后殺死他最寵愛的蕊香妃子以後心中正不舒服忽然宗人府奏稱豫親王淫逼侍女寅格致死便不覺大怒起來立刻提筆在摺子上批著賜死兩字虧著豫王福晉和道光皇后十分要好暗地裏放了一個風聲那福晉帶了公子趕進宮來跪在皇帝皇后跟前替他丈夫求饒皇后也替豫王福晉説了許多好話接著又是惇親王瑞親王看在弟兄面上約著一齊進宮來替豫王求饒那豫王福晉又到隆格親王府裏去哀求總算把皇帝的氣寬了下來交宗人府大臣會同刑部大臣擬罪後來定下罪來裕德興著即革去王爵發交宗人府圈禁三年期滿回家不許出外惹禍豫王福晉為了丈夫這樁案件東奔西走花去了三十萬兩銀子才得保全豫王一條性命但是這三年工夫福晉冷清清地住在府裏十分淒涼道光皇後知道他的苦處便常常把他喚進宮去間談有時叫把大公子也帶進宮去皇后看看那大公子長得面貌清秀性情和順便替他求著皇帝把豫王的爵位賞給了大公子大家叫他小豫親王看看那小豫親王也到了年紀了皇后便指婚把福郡王的格格配給小豫親王振德到大婚的這一天也是皇后替他在皇帝跟前求情把裕德興從宗人府裏救了出來放回家去從此豫親王一家人都感激皇后的恩德那豫王福晉一心想爬高見道光帝的大公主面貌也長得不錯性情也十分豪爽福晉每一次進宮去這大公主便拉著他問長問短十分親熱清宮裏的規矩公主一生下地來便和他父母分離交給保姆不是萬壽生節一家人不得見面一個公主生下地來直到下嫁只和他父母見上十幾面兒終身在保姆身邊過活因此常常受保姆的欺侮保姆的權威很大那公主和親生父母十分生疏便見了父母的面也不敢把自己的苦楚説出來只有這大公主因道光皇后寵愛他從小養在宮裏身邊有二十個侍女和八個保姆服侍他這公主雖説是女孩兒卻有男孩兒的心性終日大説大笑愛騎馬射箭豫王福晉一心想替他説媒説給他自己的弟弟名叫符珍的説到那符珍雖是二十歲的男子卻是女孩兒的心性白嫩臉面俊俏身材雖讀得一肚子的詩書卻是十分軟弱生平怕見生人説一句話就要臉紅豫王福晉便替他向皇后求親去皇后問女兒可願意嗎大公主聽説男孩兒十分柔順心中早願意了皇后和皇帝説知便把大公主指婚給符珍另造了一座駙馬府到了吉期大公主辭別了父母到府行過大禮接著公婆來朝見過媳婦便把這位公主冷清清關在內院裏不得和駙馬見面兒大公主心中十分詫異有時豫王福晉來看望他大公主背地裏問他怎麼不見駙馬豫王福晉勸他説道這是本朝的規矩你耐著些兒罷公主聽了越發弄得莫名其妙符珍自從娶了公主但這公主是面長面圓也不曾見過終日被關在外院書房裏要進去也不能心中十分懊悔看看過了五個月他夫妻兩人還不得見一面兒大公主是一個直爽人他忍不得了便吩咐侍女把駙馬去宣召進來誰知被保姆上來攔住了説這是使不得的吃外人傳出去説公主不愛廉恥大公主也沒法只得耐住了再隔三個月公主又要去宣召駙馬又被保姆攔住了説道公主倘一定要宣召駙馬進來須得要花幾個遮羞錢大公主便拿出一百銀子保姆説不夠又添了一百兩也説不夠添到五百兩銀子保姆終是説不夠説道宮裏打發俺到府中來照應公主倘要宣召駙馬須是俺替公主擔干系的公主一氣便也罷了到了正月初一大公主進宮去拜歲見了他父皇便問道父皇究竟將臣女家與何人道光帝聽了十分詫異説道那符珍不是你丈夫嗎大公主問道什麼符珍符珍是怎麼樣的人臣女嫁了一年卻不曾見過他一面道光帝問道你兩人為什麼不見面大公主説道保姆不許臣女和他見面臣女如何得見道光帝説道你夫妻們的事體保姆如何管得大公主又問道父皇不是派保姆到府中來管臣女的嗎道光帝道全沒有這件事大公主聽在肚子裏回府去先把保姆喚到跟前來訓斥了一頓趕出府去又把駙馬召進內院去夫妻兩人一屋子住著從此後一連生了八個兒女自從清朝立國以來公主生兒生女的只有這位大公主從來清朝的公主都是不得和駙馬見面大多害相思病而死這都是那些保姆故意作弄的因為清宮的規矩公主死了便把駙馬趕出府去除房屋繳還內務府外那公主的器用衣飾全為這班保姆吞沒這班保姆因貪得公主的衣飾便想出法子來逼死公主有人説那保姆虐待公主好似鴇母虐待妓女如今再説道光帝被皇后束縛在宮裏時時有皇后的心腹在暗地裏監督著心中十分懊悶他沒有什麼事消遣自幼兒原練得好弓馬他每天便帶著一班皇子在禦花園中練習騎射清宮的規矩皇子落下地來便有保姆抱出宮去交給奶媽了一個皇子照例須八個保姆八個奶媽八個針線上人八個漿洗上人四人燈火上人四個鍋竈上人到三歲斷奶以後便除去奶媽添八個太監名叫諳達教他飲食教他説話教他走路教他行禮到六歲時候穿著小袍褂小靴帽領著他跟大臣們站班當差每天五更起來一樣穿著朝衣進乾清門過高門檻便有太監抱著他進門回頭向兩面一看踱著方步到禦座前跟著親王們上朝朝罷送到上書房去上學到十二歲有滿文諳達教他讀滿文十四歲教他學騎射宮中喚皇子為阿哥皇子住的地方稱做阿哥房又稱青宮直到父皇駕崩才得帶著生母妻子出宮去住著做皇子的一生和父皇除上朝的時候只見得十幾面見面的時候又不得説話因此做皇子的和皇帝感情十分冷淡道光皇帝改了這些老規矩常常把皇子召進宮去帶在身邊一塊兒遊玩後來皇帝因禦花園太小便索興帶了禦林軍到木蘭打圍去道光帝最愛的是四皇子奕濘六皇子奕欣此番出巡便把這兩個皇子帶在身邊那穆彰阿見皇帝寵愛奕欣勝過奕詝便暗暗地和奕詝結交常常送些禮物又對奕欣説皇上是一位聰明英武的聖王大阿哥須在父皇跟前格外獻些本領使父皇看了歡喜那皇帝的位置便穩穩是你的了奕欣聽了穆彰阿的話便整日習練武藝每到騎射的時候總是他得的賞賜獨多道光帝心中漸漸偏愛奕欣奕詝在一旁冷眼看著知道父皇獨寵那六皇子那六皇子得了父皇的寵愛對著他又做出許多驕傲的樣子來心中實在有些難受便和他師傅杜受田來商量那杜受田是翰林出身胸中很有計謀當下便指教他如此這般的法子奕詝記在肚子裏隔了幾天各人帶了兵馬預備明天打圍去第二天皇帝出門身邊有七個皇子跟著到了西山大家動起手來獨有那四皇子奕詝勒住了馬跟定了父皇不動便是他手下的兵士們也各按兵不動道光帝看了也十分詫異便問我兒為什麼不打獵去那奕詝在馬上躬身回答道臣子心想如今時當春令鳥獸正好孕育臣子不忍多傷生命以違天和且也不忍以弓馬之長與諸弟競爭呢奕詝冠冕堂皇地説了這幾句話倒不覺把個道光帝聽怔了半晌歎道吾兒真有人君之度説著便傳令收場那班王爺正殺得起徑忽然聽説傳旨收場大家都覺得奇怪但是皇命不敢不遵一場掃興個個掩旗息鼓回來這一晚皇帝回到寢殿裏想起日間四皇子的一番説話覺得仁慈寬大便打定主意傳位給奕詝把他的名字暗暗地寫下了道光帝雖罷了這圍獵的事體但他因住在行宮裏十分自由一時裏不想回京他這時只把一個靜妃博爾濟錦氏帶在身旁那靜妃生著嬌小身材俊俏面龐又是一副伶牙俐齒終日有説有笑他陪伴著皇帝卻也不覺得寂寞這一天皇帝要一個人出去打獵靜妃説也要去那五皇子奕誴説也要去那奕誴是靜妃親生的兒子自幼長得十分頑皮只因他弓馬嫺熟每逢皇上出去圍獵總是帶著他去的今天他父子夫妻三人帶了一大隊神機兵去打圍獵卻十分快樂那靜妃穿著一身獵裝愈顯得婀娜之中帶著剛健皇帝帶著他母子二人在林中亂闖東奔西跑皇帝的馬快早和那班兵士離得遠了看看身後只留下幾個貼身太監和禦前侍衛忽然一頭小獐兒在皇帝馬前跑過皇帝抽箭射去那獐兒帶著箭逃出林子去了皇帝吩咐衆人站住他自己匹馬趕出林子去四面一看不見那獐兒卻遠遠地看見一株大樹下一個男子在那裏上吊看他拿帶子在樹枝兒套著一個圈子把頸子湊上去吊住兩腳騰空臨風擺動著道光帝起了一片憐惜之心便在箭壺裏抽出一支箭來颼的一聲射去不偏不倚地把帶子射斷了男子落下地來十分詫異急向四面看時道光帝隱身在樹林裏他見沒人便拾起來又要上吊道光帝拍馬趕去把他帶子奪下來這時道光帝穿的是獵裝那男子説道俺活著挨漿受餓不尋死卻怎麼説著大哭起來道光帝喝住他制止他不要哭繼續問他你怎麼到這地方來的那男子抹淚説道俺原是四川人得了一個小小的功名進京來考銓選考了第二名心想不久便有差使了便把家眷接到京裏來住著守著誰知一守三年那考第三名直至第十名的都得了差使出去了獨我永得不到差使住在京裏吃盡當光老婆替人家縫衣裳女兒替人家鄉花賺得幾個工錢過日子看看實在撑下不去了便想到部裏去問一個信卻被那班差役們攔住了不得進去是我氣憤極了打聽得皇上在熱河出巡便瞞著家裏人悄悄地來這地方尋死我也不想別的只望萬歲爺知道了可憐我這客地孤魂便大發慈悲打發幾個盤纏使我妻女搬著我的棺材回四川去這個恩德便是我做了鬼也不忘記的説著又撑不住大哭起來道光帝生長在帝王家卻想不到世間有如此苦惱的人便怔怔地看著他哭那人哭過了又從身邊掏出一本奏摺來交給道光帝道光帝也不看便從身邊掏出一個白玉鼻煙壺來交給這男子叮囑他道你拿這個到吏部大堂去不怕沒有差使給你你快離了這地方這裏是皇家禁地吃禦林軍捉住了要砍腦袋的呢道光帝説著拍馬轉身去了那男子拿了一個鼻煙壺心中將信將疑又看看這煙壺玉色光潤知道是珍貴東西心想便得不到差使把這煙壺賣去也能度得幾天他想到這裏把死的念頭也打消了便趕進京去穿著一身破舊的袍子大著膽子踱進吏部大堂去那班差役認為他瘋了便上去攔他他便大嚷起來頓時驚動了裏面的堂官便打發人出來問他卻不肯説一定要見了堂官才肯説那堂官聽了也詫異起來便親自出來問時他才把那白玉煙壺拿出來堂官見了也莫名其妙拿給尚書看尚書是滿人名叫育明一看認得是皇上隨身用的東西忙去供在大堂上大家對它朝拜著又出來把這男子迎進去問他這鼻煙壺從什麼地方得來的那男子便將遇見道光帝救命的情形一一説了出來育明告訴他你遇見的便是當今皇上那男子聽了嚇得忙跪了下去對著煙壺磕頭磕個不住育明叫人把他扶起來問他要什麼那男子伸手拍拍自己額頭説道俺想湖北黃陂縣的缺分想了十多年了他的話不曾説完那育明便吩咐寫劄子那堂官立刻把委他做黃陂縣的劄子寫好交給他自己那人得了劄子雙手捧著連連打躬作揖走出衙門去道光帝回京育明便把這白玉鼻煙壺奉還皇上便問那窮漢得了什麼差使去了育明回奏説委他個黃陂縣道光帝笑著説道這個人也太薄福了這一點點小官也值得拿性命去拼後來那人到了任因為他是皇上特別提拔的上司便另眼相看他上任後狠狠地刮了幾年地皮上司也不敢去參革他六年工夫他整整刮了五十多萬兩如今再説道光皇后原是侍衛顧齡的女兒姓鈕鈷祿氏顧齡曾出任外官到蘇州去做過將軍這鈕鑽祿氏也隨任到蘇州蘇州的女孩兒都是聰明伶俐的那顧齡平時也和地方上紳士來往那紳士也常帶著妻女到將軍衙門裏來玩耍鈕鈷祿氏和那班紳士女兒要好女伴們學著許多閨房的玩兒什麼繡花呢唱曲呢打牙牌呢排七巧板兒呢樣樣都會樣樣兒都精後來選到宮裏道光帝因他才貌雙全封他做了妃子過了幾年又封為皇貴妃後來皇后佟佳氏死了這鈕鈷祿氏便册立補升了皇后這位皇后仗著自己伶俐聰明便事事要爭勝他又因自己統率六宮便擺出皇后身份來監察皇帝不許皇帝隨意召幸因此皇后和皇帝感情一天壞似了一天此番皇帝帶了博爾濟錦氏到熱河住了多時皇后心中越發不自在了待到回宮來見了靜妃的面不免有些冷言冷語那博爾濟錦氏也是一個厲害角色何況正在得寵的時候如何肯讓但是一個是妃子一個是皇后在地位勢力上是不能對敵的他便用暗箭傷人的法子先到皇太后跟前去獻些小殷勤這時皇太后因皇帝崇尚節儉住在慈寧宮裏十分清苦靜妃覷著太后不周不備的地方送些禮物皇太后心中也很感激他又算他是得寵的妃子便也假以辭色那靜妃看看皇太后和他走一條路便慢慢地在言語裏説了許多皇后的壞話那皇太后見皇后事事賣弄聰明心性高傲本來也不歡喜他從前的皇後佟佳氏原是皇太后的內親如今見鈕鈷祿氏是由貴妃升做皇後的也有幾分瞧不起再加靜妃常常在皇太后跟前言三語四他婆媳二人的感情便愈鬧愈惡那皇后也有幾分覺得又打聽得是靜妃在中間鼓弄從此皇后見了靜妃便不給他好臉色看靜妃在表面上總是十分敬重皇后每到皇帝召幸他的時候便一邊哭著一邊訴説著皇后如何虐待他如何嫉妒他女人的眼淚原是很有力量的況且是寵妃的眼淚力量越發大了再加皇后事事要制服著皇帝皇帝心中原也有些恨著皇后如今聽了靜妃的話越發把皇后冷淡起來了太后皇帝靜妃走了一條路正在那裏用全副精神擺布皇后的時候偏偏那五皇子不爭氣鬧出亂子來幾乎叫靜妃失了寵五皇子奕誴是靜妃的親生兒子和四皇子奕詝同年同月同日只是時辰上差了一點據清宮裏的人傳出來説原是五皇子先落地四皇子遲了一個時辰後來被全妃花了銀錢故意遲報因此四皇子做了哥哥五皇子反做了弟弟這奕誴生下地來自小兒性情粗暴膽大妄為最不愛讀書住在阿哥房裏只因他氣力大那班兄弟人人吃他的虧因此人人懷恨在心卻又怕他動蠻便也無可奈何他但是這個五皇子仗著他母親正在得寵的當兒小小年紀已經封了淳郡王這位郡王爺名位雖高但他卻依舊不愛讀書要知後事如何且聽下回分解
