body:
  text: 第一回杏花村裏鶯鳴燕唱布林湖邊月證山盟翠巒列枕緑野展茵春風含笑杏花醉人在這山環水繞香花如繡的一片原野裏黃金似的日光斜照在一叢梨樹林子裏那梨花正開得一片雪白迎風招動那緑頂紫領的小鳥如穿梭似地在林子裏飛來飛去從高枝兒飛到低柱兒震得那花瓣兒一片一片地落下地來平鋪在翠緑的草地上好似一幅綢子上繡束花朵兒夾著一聲聲細碎的鳥語在這寂靜的林子裏真好似世外桃源一般正靜悄悄的時候忽然遠遠地聽得一陳鈴鐺聲響接著一片嬌脆説笑的聲音只見當頭一匹白馬馬背上馱著一個穿紫紅袍的女孩兒看他擎著白玉也似的手臂一邊打著馬斜刺地從梨樹林子裏跑了出來後面接二連三的有兩個姑娘一般也騎著馬從林子裏趕出來看去一個穿翠緑旗袍的年紀大些約摸也有二十前後了另一個穿玄色旗袍的年紀大約十七八歲他兩個一邊趕著一邊嘴裏笑罵道小蹄子看你跑到天上去看看趕上那女孩兒笑得伏在鞍橇上坐不住身後面一個姑娘拍著手笑嚷道倒也倒也這穿經袍的女孩兒一個倒載蔥真的摔下馬來後面兩個姑娘已經趕到面前他們急忙跳下馬來搶上前去一個按住肩兒一個騎在他胸脯上按得個結實一起捋起了袖子數他的肋骨那地下的女孩子笑得他只是雙腳亂蹬他擎起了兩條腿兒袍服下面露出蔥緑色的褲腳來一雙瘦淩淩的鞋底兒向著天他們玩夠多時才放手讓他坐起來這小女孩子望去年紀也有十五六歲了長著長籠式的面龐兒兩麵粉腮兒上擦著濃濃的胭脂一雙水盈盈的眼珠子斜溜過去向那姑娘狠狠地瞪了一眼接著嗤的一聲笑了出來這一笑真是千嬌百媚任你鐵石人看了也要動心那年紀大的姑娘指著他對那穿玄色旗袍的姑娘説道二妹子你看三妹子又裝出這浪人的樣兒來了那三妹子笑説道我浪人不浪人與你們什麼相干説話的當兒那大姑娘蹲下身去擎著臂兒替三妹子攏一攏鬢兒説道你看梳得光光的後鬢兒出門便弄毛了回家去給媽見了又要聽嘰咕呢那三妹子一邊低著脖子讓姊姊給他梳頭一邊嘴裏嘰咕著説道還説呢回家去媽媽問我時我便説兩個姊姊欺侮一個妹妹原來他姊姊三人梳著一式的大圓頭油光漆黑矗在頭頂上越顯得嫋嫋婷婷那兩片後鬢直披在腦脖後面襯著白粉也似的頸便出落得分外精神前鬢兒兩邊各各插一朵紅花越顯得眉清目秀唇紅齒白一會兒那二姑娘拔著一小把小草兒來三人團團圍坐著鬥草玩兒正玩得出神忽聽得一聲吹角響大姑娘嚷道爹爹回來了咱們看去三姑娘回頭看時果然見他父親跨著一匹大馬領頭兒跑在前面後面跟著一大群驢馬有七八條大漢手裏擎著馬鞭子個個騎著馬趕著望去黑壓壓的一串慢慢地在山坡下走過去三姑娘看見了便丟下他兩個姊姊急急爬上馬背飛也似地趕了過去這裏大姑娘和二姑娘也個個騎上馬背跟在後面父親幹木兒遠遠地見女兒們趕來便停住了馬候著他是最喜歡三姑娘的看到三姑娘一匹馬跑到面前便在馬背上摟了過來和自己疊坐在一個鞍子上一面説笑著走去走了一程遠望山坳裏露出一堆屋子來那屋子也有五六十間外面圍著一圈矮矮的石牆幹木兒回過頭來對他的同伴説道我們快到家了一句話不曾説完忽然聽得半空中嗚鳴鳴一聲響三支沒羽箭落在他馬前幹木兒看了臉上陡地變了顔色只説得一聲惡便氣得他胡鬚根根倒豎眼睛睜得和銅鈴一般大自言自語道他們又來了嗎隨即回過頭去高聲嚷道夥計留神呵我們又有好架打了那班大漢聽了齊喝一聲拿傢夥去便著地上卷起了一縷塵土飛也似地向山坳裏跑去那姊姊三人也跟著快跑三姑娘一邊跑著一邊回過頭去看看布庫裏山尖上早見有一個長大漢子騎著馬站著好似在那裏獰笑呢靜悄悄的一座山鄉一霎時罩滿了慘霧愁雲幹木兒家裏人聲鬧成一片幹木兒的大兒子諾因阿拉爬在屋脊之上不住地吹號角兒嗚嗚地響著這一村裏的人聽了這聲音知道又要械鬥了便各個跳起身來手裏拿著傢夥往屋外飛跑也有騎牲口的也有走著的幹木兒領著頭兒一簇人約有三五百個一齊擁出山坳來山坳口原築有一座大木柵門他們走出了柵門幹木兒便吩咐把柵門閉上娘兒們都站在柵門裏張望那布庫裏山北面梨皮峪的村民和山南面布林胡裏的村民原是多年積下的仇恨兩村的人常常尋仇雪恨一言不合便以性命相搏梨皮峪的村主名喚猛哥已是一個六十多歲的老頭兒他膝下有一個兒子名喚烏拉特出落得一表人才臂力過人他常常帶領村衆過山去報仇總是得勝回來這布林胡裏村上的人吃他的虧已是不少人人把這烏拉特恨入骨髓如今打聽得幹木兒從嶺外趕得一批驢回來他又帶領著一大群村民過山來意欲劫奪那一群驢馬他一個人立馬山頂先發三支沒羽箭算是一個警報後來見幹木兒領了大隊人馬出來他便把槍桿兒一招那梨皮峪的村民跟著他同潮水似地沖下山來到得一片平原上兩邊站成陳勢發一聲喊刀槍並舉弓箭相迎早已打得斷臂折腿頭破血流幹木兒騎在高大的馬上指揮著大衆見有受傷的忙叫人去搶奪回來擡到柵門裏面去那班娘兒們忙著包腿的包腿扎頭的扎頭便是那幹木兒的三個女兒也擠在人群裏幫著攙扶包扎那姊妹三人大姑娘名叫恩庫倫二姑娘名叫正庫倫三姑娘名叫佛庫倫恩庫倫已嫁了丈夫正庫倫已經説定了婆家只有佛庫倫還不曾説得人家他三姊妹都長得美人兒似的只有佛庫倫格外標致平日村坊上的男子們見了佛庫僧誰不愛他便是沒有話説也要上去和他兜搭幾句借此親近美人兒的香澤無奈這布林胡裏村坊上的男子雖多卻沒有一個是他看得上眼的見了這班男子連正眼都不肯瞧他一瞧如今見自己村坊裏的人和別人打架不覺激發了他興奮的心腸便幫著他母親姊姊在柵門裏管那班受傷的一會兒攙扶這個男人一回兒安慰那個男人一會兒替他們包扎傷口一回兒拿水漿牛奶喂他們吃説也奇怪那班受傷的人凡是經過三姑娘服侍的便個個精神抖擻包好了傷口重復跳出柵門去廝打這一場惡鬥布林胡裏的村民和前三年大不相同人人奮勇個個拼命看看那邊梨皮峪的村民漸漸打敗下來那烏拉特站在馬背上看著自己的村民漸漸有點支援不住了他便大喊一聲跳下馬來舞動長槍向人叢裏殺進去他那支槍舞得四面亂轉大家近不得他的身讓出一條路來他直奔幹木兒馬前幹木兒眼明手快看看他到來便在馬上挽弓搭箭颼的一聲向烏拉特射去那烏拉特肩窩上早中個著只聽得他大喊一聲轉身便走這裏幹木兒拍馬追去三五百村民跟著大喊快捉烏拉特快捉烏拉特這時梨皮峪的村民見頭兒受了傷人人心驚個個膽寒大家轉身把烏拉特一裹裹在人叢裏向山頂上逃去這裏面獨惱了一人諾因阿拉他在三年前和梨皮峪的人械鬥曾中烏拉特一箭如今他見烏拉特也中了一箭他如何肯舍便緊緊地在後面追著一心要把烏拉特生擒活捉過來以報一箭之仇他逢人便殺見馬便刺把梨皮峪的人殺得落花流水東奔西逃他們到這時恨爹娘不給他多生兩條腿跑得快些看看殺到布庫裏山頂上離自己人也遠了那梨皮峪村民也七零八落逃的逃死的死剩下不多幾個了但是那仇人烏拉特兀是找尋不到諾因阿拉到底膽小不敢追過嶺去便停槍勒馬跑下回來這一遭布林胡裏人得了大勝人人興高彩烈狂呼大笑立刻斬了三頭牛六頭豬十二腔羊一百隻雞召集了許多村民男女老少在幹木兒院子裏大吃大喝起來恩庫倫姊妹三人也跟著他爹娘吃酒這一夜是四月十五日天上挂著圓圓的月兒照在院子裏分外精神那佛庫倫姑娘重習脂粉再整雲鬢在月光下面走來走去那臉上出落得分外光彩引得那班吃酒的人未飲先醉只聽得滿院子嚷著三姑娘的名字有幾個仗著酒蓋住臉上去和他胡纏惱得三姑娘一溜煙避出院子去玩月兒天上明月人間良夜這布林胡裏地方位置在長白山東面胡天八月冰雪載途又在這萬山叢中雖説是偏僻荒涼絶少生趣但是一到了這春夏之夜一般也是清風入戶好花遍野如今這佛庫倫是人間絶豔天上青娥長在這山水窮僻之鄉毳幕腥氈之地他孤芳獨賞對此良辰美景便不覺有美人遲暮之歎他想到布林胡裏的村民都是一班勇男笨婦絶少一個英姿颯爽的男兒和我佛庫倫匹配得上的他想到這裏又回到日間那個烏拉特他立馬山頭何等英雄氣概後來他指揮村民直沖柵門他那面龐兒越發看得親切真可以稱得上唇紅齒白眉清目秀八個字像我佛庫倫倘能嫁得這樣一個夫壻才可稱得才子佳人一雙兩好呢如今我和他是世代仇家眼見得這段姻緣只得付之幻影空花了這是佛庫倫女孩兒的心事他站在院子外面擡著脖子一邊望著月兒一邊勾起了他一腔情思佛庫倫想到心煩意亂的時候便忙撇下忽然想起那布林胡裏湖邊的夜景一定不弱這湖邊是他和兩個姊姊常去遊玩的地方離家門又不遠他便悄悄的一個人分花拂柳地走去才過山坡便露出一片湖水來這時四山沈寂臨流倒影湖面上映著月光照得和鏡子一般明淨他揀一塊臨水的山石坐下一股清泉從山腳上流下來流過石根發出潺潺的響聲來佛庫倫到了這時覺得心曠神怡心中塵俗都消他仰著臉只是怔怔地看著天上的月兒忽然聽得山腳下有人微微喘息的聲音接著悉悉索索的一陳響從長草堆裏爬出一個人來他面龐映著月亮佛庫倫認得他便是烏拉特這時他一寸芳心不覺一陳跳動忙把手絹兒按住了朱唇靜悄悄地在一旁看他只見烏拉特在地下爬著可憐他渾身血迹模糊臉色青白嘴裏不住地哼著他掙扎著爬到那泉水邊低下頭去伸著兩手掬起泉水來往嘴裏送一連吃了幾口才覺得精神清爽些誰知他一回頭見一個美人兒站在他面前不覺嚇了一跳便喘著氣問道姑娘可是布林胡裏村中的人麼佛庫倫聽了不好意思和他答話便微微地點了點頭烏拉特見了便顫微微地站了起來一步一步地向佛庫倫身邊走來佛庫倫看了認做他要來報仇忙轉身要逃去那烏拉特在後面氣喘噓噓地説道我烏拉特受了重傷如今被姑娘看見了料想要逃也逃不脫身姑娘你也不用回去驚動大衆我有一柄刀在這裏請姑娘把我的頭割下來拿回村去一則也顯了姑娘的功勞二則我死在美人兒似的姑娘手裏也是甘心的他説著從懷裏拔出一柄刀來哐當一聲丟在地上他自己的身子也跟著倒了下來佛庫倫聽他話説得可憐又見他撲倒在地面上身子一動也不動一時倒也弄得他進退兩難候了半晌佛庫倫便忍不住上前去扶他起來誰知那烏拉特傷口痛得早已暈厥過去他那衣襟上血迹沾了一大塊那血水還是往外流個不住不覺打動了佛庫倫的慈悲心腸便伸手插在他肋下慢慢地把他的身子拖到水邊他屈著一條腿把烏拉特的頭枕在自己膝蓋上輕輕地把他衣襟解開把自己的一方手絹蘸著水替他洗去血迹又扯下他一幅衣襟來扎住傷口這時烏拉特的臉迎著月光越發覺得英俊動人他的鼻息直沖在佛庫倫的粉腮兒上佛庫倫正在細細地打量他的面貌忽聽得他嘴裏喊出一聲阿唷來烏拉特醒過來了他睜開眼見自己倒在美人兒懷裏不覺微微一笑佛庫倫羞得忙推開他的身子一摔手要走去誰知那只左手被他攥得死緊任你如何掙扎他總死捏住不放不覺惱了這位美人就從地上拾起那柄刀來向烏拉特的手臂上砍去烏拉特卻毫不畏懼只是擡著脖子不住嘴地説道幾時再得和姑娘相見好説説我感謝姑娘的心意佛庫倫説道你要和我相見麼除非到真真廟裏去他一句話説完嗤地笑了一聲一摔手轉身去得無影無蹤了蘭關雪擁巫峽雲封布庫裏山東面有一座孤峰壁立千仞高插雲霄從布林胡裏村望去好似駱駝頸子昂頭天外村裏人便喚它駱駝嘴那駝嘴峰上隱約望去緒佛閣好似有一座廟宇村裏的人每每要爬上峰去探望探望苦得羊腸石壁無可攀援況又是終年積雪無路可尋一到春夏之交有一股瀑布從駱駝嘴直瀉下來長空匹練直流湖底山下面便是布林胡裏湖到這時水勢彭湃早把入山的路徑沒入水底裏去了一到秋天四山雲氣又迷住了桃源洞口所以村裏人雖想盡千方百計終不得見廬山真面目因此這一座孤廟總如海上仙山可望而不可及村裏人便把這座廟宇稱做真真廟村裏人有句話你要相見麼除非到真真廟裏去這是説不容易見面和不容易到真真廟裏去一般佛庫倫姑娘對烏拉特説這句話只因和他是世代仇家不容易見面的意思間話少説這時候又過了一個月布林胡裏村上早又是四望一白好似盤銀世界一般村坊裏人農事早罷便各個背著弓騎著馬向山之巔水之涯做那打獵的營生幹木兒也帶五七個大漢天天到西山射雕去有一天他射得好大一頭獐肩在肩膀上嘻嘻哈哈地笑著回來恩庫倫和佛庫倫接著進去一個眼錯他姊妹三人在後院子裏商量生烤獐肉下酒吃幹木兒一腳跨進院子去那獐肉氣味正熏得觸鼻便嚷道好香的肉味阿一眼見姊妹三人正烤著火吃得熱鬧幹木兒便嚷道來來來俺們大家來吃莫給他姊妹們吃完了我們的一招手便來了十二三個都是一家人男女老小便團團圍住大嚼起來吃到一半幹木兒指著他三姑娘笑説道小妮子人小心腸乖瞞著人悄悄吃這個也不知我和你大哥去打得這只獐來多麼的纍贅呢你們女孩子們只知道圖現成一句話説得佛庫倫不服氣了他把粉脖子一歪哼了一聲説道女孩子便怎麼樣爹爹莫看不起我們女兒明天我和我姊姊上山去照樣捉一隻來給爹爹看幹木兒聽了也把脖子一側説道真的麼佛庫倫説道有什麼不真幹木兒説道拿手掌來佛庫倫真的伸過手法和他父親打了手掌頓時引得屋子裏的人哄堂大笑都説明天看三姑娘捉一頭大獐來呢俊犬快馬禿袖蠻靴第二天一早佛庫倫悄悄地拉著他兩位姊姊出門打獵去三匹桃花馬馱著三個美人兒一溜煙上了東山到得山坡上各個跳下馬來每人牽著一條狗東尋西覓見那雪地上都是狼腳印子恩庫倫説道二位妹妹我們須要小心些這地方有大群的狼來過了還留著爪印兒呢我們要在一起不要走散才好佛庫倫一邊答應著一邊只是低著頭找尋一回兒只見那頭黑狗兒仰著脖子叫了一聲飛也似地跑到那山岡子下面去在壁腳上一個洞口用它的前爪亂爬亂抓佛庫倫跟在它後面知道洞裏面有野獸躲著忙向他兩個姊姊招手兒正庫倫和恩庫倫見了便悄悄地走上去見壁子下面有三個洞西面一個洞大些忙把腰上挂著的網子拿下來罩住了洞口對著那小洞裏放了一鳥槍突然有六七頭灰色野兔跳出洞外來一霎時被網子網住了左沖右突總是逃不脫身把個佛庫倫歡喜得什麼似的他兩手按住那網子只是嘻嘻的笑正庫倫上去把網子收起把六隻兔子分裝在他三姊妹的口袋裏正庫倫説道我們雖捉得幾頭兔子三妹子在爹爹前曾誇下海口説去捉一隻獐來我想那獐兒是膽小的必得要到荒山僻靜的地方去找才有呢恩庫倫聽了説道二妹子説得有理佛庫倫説道既然這樣我們不妨駱駝嘴下面找去三妹妹齊説一聲不錯重復走下山坡來騎上馬繞過山峽去便見那駱駝嘴高矗在面前那布林胡裏湖緊靠著山腳這時湖面上只看見層冰斷木凍水不波他三人騎著馬繞著湖邊走去在那盡頭便露出一條上山的路徑這山勢十分峻險又是滿山鋪著冰雪不容易上得去大家下得馬來攀藤附葛往上爬走了一程這三姊妹走得嬌喘噓噓香訐涔涔正庫倫一擡頭見那山壁子上飛出一群野鷹來便嚷道大姊姊快射那恩庫倫這時也看見了忙抽箭挽弓颼的一聲一支箭上去一隻鷹跟著翻身落下地來他的狗名做盧兒的見了嗚的一聲飛也似地上去叼在嘴裏他三姊妹這當兒便在路旁一塊山石上坐下來説些間話把身邊帶著的乾糧掏出來大家吃一個飽那盧兒嘴裏叼著死鷹送到恩庫倫跟前佛庫倫又誇大姊姊眼力手法如何高強怪不得大姊夫見了姊姊害怕正説時正庫倫一眼瞥見一隻山狸遠遠地沿著山壁走來他急忙從大姊姊手裏搶過弓箭來也是颼的一箭射中在山狸的脊梁上那山狸正在雪地上翻騰那頭盧兒也跑去攔頸子一口咬住拖到正庫倫跟前佛庫倫看了便嚷著好哇你兩個上得山來都得頭彩獨我沒有嗎他話不曾説完只聽得山岡子上有獐兒的叫聲佛庫倫聽了一拍手説道好哇我的也有了説道便站起身來挾了弓箭也不等他姊姊急急繞過山岡子去恩庫倫在後面喚他他也不睬正庫倫看看佛庫倫去得遠了忙在後面趕上去恩庫倫看看只剩下他一個在山腰裏便也只得跟上去山陡路滑一步一步地挨著挨了半天看看前面不見他兩人的影子誰知才轉過山腰只聽得正庫倫在前面哭喊恩庫倫心下一急腳下一緊忙追上去他往前一看不覺嚇得身子軟癱了半邊原來那佛庫倫在半山上正被一隻斑斕猛虎攔腰咬住往林子裏死拽那頭黑盧兒也嚇得倒拖著尾巴跟在正庫倫身後狂吠一轉眼那大蟲拖著佛庫倫向林子裏一轉便不見了嚇得恩庫倫嗥啕大哭他和正庫倫兩人死力掙扎著趕上前去到得林子裏四面一找靜悄悄的不見蹤迹也聽不到佛庫倫的哭喊聲再看看雪地上的腳迹見一陳子亂踏到了林子西面便找不出腳印兒來了他姊姊兩人心裏十分慌張一邊哭著一邊喚著四處亂尋看著天色昏黑也找不出一絲影迹來正庫倫急了只見他大喊一聲一縱身向山下跳去方得恩庫倫眼快忙上前挽住了兩人沒法想只得淒淒慘慘的尋路下山回得家去把這情形一層一節對他父親説了他兩人話沒有説完滿屋子的人便嗥啕大哭起來他母親格外哭得傷心逼著他丈夫要連夜上山去找尋幹木兒也懊悔昨天不該和他賭手掌説這句話玩兒話逼得他今天鬧出這個亂子來當下便招呼了許多夥計擎槍提刀燈籠火把一大族人上山尋去要知佛庫倫性命如何且聽下回分解
